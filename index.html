<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>AI准则顾问</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--orange:#F97316;--orange-dark:#EA580C;--bg:#F9F8F6;--white:#FFF;--text:#1C1C1E;--secondary:#8E8E93;--border:#EEECEA;--radius:16px}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:800px;margin:0 auto;padding:20px}
.header{padding:30px 0 20px}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.logo-icon{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--orange),var(--orange-dark));display:flex;align-items:center;justify-content:center;color:var(--white);font-size:16px;font-weight:700}
.logo-text{font-size:14px;font-weight:600;color:var(--secondary);letter-spacing:.5px}
h1{font-size:36px;font-weight:800;margin-bottom:6px;letter-spacing:-0.5px}
h1 em{font-style:normal;color:var(--orange)}
.subtitle{font-size:14px;color:var(--secondary);margin-bottom:24px}
.stats{display:flex;gap:32px;margin-bottom:32px}
.stat-item{display:flex;flex-direction:column}
.stat-num{font-size:26px;font-weight:700;color:var(--text)}
.stat-label{font-size:12px;color:var(--secondary);margin-top:2px}
.tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:24px}
.tab{padding:14px 28px;font-size:15px;font-weight:600;color:#B0B0B6;cursor:pointer;border:0;background:none;position:relative;transition:color .2s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--text)}
.tab.active::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:3px;background:var(--orange);border-radius:2px 2px 0 0}
.panel{display:none}
.panel.active{display:block}
textarea{width:100%;padding:16px;font-size:16px;line-height:1.6;border:2px solid var(--border);border-radius:var(--radius);background:var(--white);color:var(--text);outline:0;font-family:inherit;resize:vertical;min-height:120px;margin-bottom:14px;transition:border-color .2s,box-shadow .2s}
textarea:focus{border-color:var(--orange);box-shadow:0 0 0 4px rgba(249,115,22,.08)}
textarea::placeholder{color:#C5C5C9}
.btn{width:100%;height:56px;border:0;border-radius:var(--radius);background:linear-gradient(135deg,var(--orange),var(--orange-dark));color:var(--white);font-size:18px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .2s,transform .1s;letter-spacing:.3px}
.btn:hover{opacity:.92}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.loading{display:none;align-items:center;justify-content:center;gap:10px;padding:20px;color:var(--secondary);font-size:14px}
.loading.show{display:flex}
.spinner{width:20px;height:20px;border:3px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.result{display:none;background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-top:16px;animation:fadeIn .3s}
.result.show{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.result-header{display:flex;align-items:center;gap:12px;margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.answer{font-size:15px;line-height:2;white-space:pre-wrap;word-break:break-word}
.sources{margin-top:22px;padding-top:20px;border-top:1px solid var(--border)}
.sources-title{font-size:13px;color:var(--secondary);margin-bottom:12px;font-weight:700;letter-spacing:.3px}
.source-item{padding:10px 14px;margin:8px 0;background:#FAFAF9;border-radius:10px;font-size:13px;line-height:1.6;cursor:pointer;transition:background .15s,box-shadow .15s;position:relative;border:1px solid transparent}
.source-item:hover{background:#F5F3F0;border-color:#E8E5E0;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.source-item.expanded{background:#FFF;border-color:var(--orange);box-shadow:0 2px 12px rgba(249,115,22,.1)}
.source-header{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.source-expand-icon{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:var(--border);color:var(--secondary);font-size:11px;font-weight:700;flex-shrink:0;transition:all .2s}
.source-item.expanded .source-expand-icon{background:var(--orange);color:#FFF;transform:rotate(45deg)}
.source-score{color:var(--orange);font-weight:700;font-size:12px;flex-shrink:0}
.source-content{color:var(--text);font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis}
.source-cat{font-size:10px;padding:2px 8px;border-radius:10px;background:#FFF7ED;color:var(--orange);font-weight:600;flex-shrink:0;white-space:nowrap}
.source-badge-qa{background:#FFF7ED;color:var(--orange)}
.source-badge-std{background:#EFF6FF;color:#3B82F6}
.source-detail{display:none;margin-top:12px;padding:16px;background:#FFF;border:1px solid var(--border);border-radius:10px;animation:fadeIn .25s}
.source-item.expanded .source-detail{display:block}
.source-detail-q{font-size:14px;font-weight:700;color:var(--text);margin-bottom:10px;line-height:1.7;padding-bottom:10px;border-bottom:1px dashed var(--border)}
.source-detail-q::before{content:'Q: ';color:var(--orange);font-size:16px}
.source-detail-a{font-size:13px;line-height:1.9;color:var(--text);white-space:pre-wrap}
.source-detail-a::before{content:'A: ';color:var(--orange);font-size:16px;font-weight:700}
.source-detail-meta{display:flex;gap:10px;margin-top:12px;padding-top:10px;border-top:1px solid var(--border);font-size:11px;color:var(--secondary);flex-wrap:wrap}
.source-detail-meta span{display:inline-flex;align-items:center;gap:3px}
.source-detail-meta .meta-label{color:#B0B0B6}
.source-detail-actions{margin-top:10px;display:flex;gap:8px}
.source-btn-copy{padding:4px 12px;border:1px solid var(--border);border-radius:6px;background:var(--white);color:var(--secondary);font-size:11px;cursor:pointer;transition:all .15s}
.source-btn-copy:hover{background:var(--orange);color:#FFF;border-color:var(--orange)}
.source-detail-source{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-size:11px;color:#6B7280;display:flex;align-items:center;gap:4px}
.source-detail-source .source-label{color:#B0B0B6;font-weight:600}
.source-detail-source a{color:var(--orange);text-decoration:none}
.source-detail-source a:hover{text-decoration:underline}
.source-hint{font-size:11px;color:#B0B0B6;margin-top:6px}
.source-hint kbd{display:inline-block;padding:1px 6px;background:#EFEFEF;border-radius:4px;font-family:inherit;font-size:11px;border:1px solid #D5D5D5}
.compare-result{display:none;gap:20px;margin-top:16px}
.compare-result.show{display:grid;grid-template-columns:1fr 1fr}
.compare-col{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:22px;animation:fadeIn .3s}
.compare-label{font-size:12px;font-weight:700;padding:5px 14px;border-radius:20px;display:inline-block;margin-bottom:14px}
.compare-label.expert{background:#FFF7ED;color:var(--orange)}
.compare-label.generic{background:#F5F5F7;color:var(--secondary)}
.error{display:none;background:#FEF2F2;border:1px solid #FECACA;border-radius:12px;padding:14px 18px;margin-top:16px;color:#991B1B;font-size:14px;line-height:1.6}
.error.show{display:block}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;background:#D1D5DB}
.status-dot.online{background:#22C55E}
.status-dot.offline{background:#EF4444}
.footer{text-align:center;padding:40px 20px 36px;font-size:12px;color:#B0B0B6}
.answer h1,.answer h2,.answer h3,.answer h4{font-weight:700;margin:20px 0 10px;line-height:1.3}
.answer h1{font-size:22px;border-bottom:2px solid var(--border);padding-bottom:8px}
.answer h2{font-size:18px;border-bottom:1px solid var(--border);padding-bottom:6px}
.answer h3{font-size:16px}
.answer h4{font-size:15px;color:var(--secondary)}
.answer p{margin:10px 0}
.answer ul,.answer ol{padding-left:24px;margin:10px 0}
.answer li{margin:4px 0;line-height:1.8}
.answer strong{font-weight:700;color:var(--text)}
.answer em{font-style:italic;color:var(--orange)}
.answer blockquote{border-left:4px solid var(--orange);padding:10px 16px;margin:14px 0;background:#FFF7ED;border-radius:0 8px 8px 0;color:#9A3412;font-size:14px}
.answer code{font-family:"SF Mono","Fira Code","Consolas",monospace;font-size:13px;background:#F3F4F6;padding:2px 6px;border-radius:4px;color:#DC2626}
.answer pre{background:#1C1C1E;color:#E5E7EB;padding:16px 20px;border-radius:12px;overflow-x:auto;margin:14px 0;font-size:13px;line-height:1.7}
.answer pre code{background:none;color:inherit;padding:0;font-size:inherit}
.answer table{width:100%;border-collapse:collapse;margin:14px 0;font-size:13px}
.answer th{background:#F9F8F6;padding:10px 14px;text-align:left;font-weight:700;border-bottom:2px solid var(--border)}
.answer td{padding:10px 14px;border-bottom:1px solid var(--border)}
.answer tr:hover td{background:#FAFAF9}
.answer a{color:var(--orange);text-decoration:underline}
.answer hr{border:0;height:1px;background:var(--border);margin:20px 0}
.answer img{max-width:100%;border-radius:8px}
/* 关联依据高亮样式 */
.std-ref-badge{display:flex;align-items:flex-start;gap:8px;padding:14px 18px;margin-bottom:18px;background:linear-gradient(135deg,#EFF6FF,#F0F9FF);border:1px solid #BFDBFE;border-radius:10px;font-size:13px;line-height:1.8;color:#1E40AF;animation:highlightPulse .6s}
.std-ref-badge .std-ref-icon{font-size:18px;flex-shrink:0;line-height:1.8}
.std-ref-badge .std-ref-text{font-weight:600}
.std-ref-badge .std-ref-list{color:#3B5998}
@keyframes highlightPulse{from{background:#DBEAFE;transform:scale(1.01)}to{background:linear-gradient(135deg,#EFF6FF,#F0F9FF);transform:scale(1)}}
@media(max-width:640px){
  .container{padding:16px}
  h1{font-size:28px}
  .stats{gap:20px}
  .tab{padding:12px 18px;font-size:14px}
  .compare-result.show{grid-template-columns:1fr 1fr;gap:10px}
  textarea{min-height:100px}
  .answer h1{font-size:19px}.answer h2{font-size:16px}.answer h3{font-size:15px}
  .answer pre{font-size:12px;padding:12px 14px}
}
/* ⭐ 彩蛋：世界上最漂亮的人 — 彩色气泡 */
.egg-bubble{margin:0;padding:0;border-radius:20px;overflow:hidden;animation:eggFadeIn .6s ease-out}
@keyframes eggFadeIn{0%{opacity:0;transform:scale(.9) translateY(20px)}100%{opacity:1;transform:scale(1) translateY(0)}}
.egg-dismiss{animation:eggShake .5s ease-in-out}
@keyframes eggShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px) rotate(-2deg)}40%{transform:translateX(10px) rotate(2deg)}60%{transform:translateX(-6px) rotate(-1deg)}80%{transform:translateX(6px) rotate(1deg)}}
.egg-header{background:linear-gradient(135deg,#FF6B9D,#C44B8B);color:#fff;text-align:center;padding:16px;font-size:18px;font-weight:800;letter-spacing:2px;text-shadow:0 1px 3px rgba(0,0,0,.2)}
.egg-hearts{background:linear-gradient(90deg,#FFE4EC,#FFF0F5,#FFE4EC);text-align:center;padding:12px;font-size:24px;letter-spacing:8px}
.egg-body{background:linear-gradient(180deg,#FFF5F7,#FFF0F5,#FFF5F7);padding:24px;line-height:2;font-size:15px;color:#4A1942;text-align:center}
.egg-body p{margin:12px 0}
.egg-hint{font-size:12px;color:#B06A8F;font-style:italic}
.egg-verdict{font-size:20px;font-weight:700;color:#D6336C;padding:16px;background:rgba(255,107,157,.1);border-radius:12px;margin:16px 0!important}
.egg-verdict strong{color:#C44B8B;font-size:24px}
.egg-actions{font-size:13px;color:#8B5E7C}
.egg-btn{display:inline-block;margin:10px auto;padding:12px 32px;border:2px solid #FF6B9D;border-radius:50px;background:#FFF;color:#D6336C;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit}
.egg-btn:hover{background:linear-gradient(135deg,#FF6B9D,#C44B8B);color:#FFF;border-color:transparent;transform:scale(1.05);box-shadow:0 4px 20px rgba(196,75,139,.3)}
.egg-btn:active{transform:scale(.95)}
.egg-footer{background:linear-gradient(135deg,#C44B8B,#FF6B9D);color:rgba(255,255,255,.85);text-align:center;padding:10px;font-size:11px;letter-spacing:1px}

</style>
</head>
<body>
<div class="container">
<div class="header">
  <div class="logo"><div class="logo-icon">AI</div><span class="logo-text">准则AI顾问 <span class="status-dot" id="status-dot"></span></span></div>
  <h1>智能准则<em>答疑</em></h1>
  <p class="subtitle">基于资深技术合伙人知识库，24h在线解答会计准则疑难</p>
  <div class="stats">
    <div class="stat-item"><span class="stat-num" id="kb-count">--</span><span class="stat-label">知识条目</span></div>
    <div class="stat-item"><span class="stat-num" id="kb-queries">24</span><span class="stat-label">在线答疑</span></div>
    <div class="stat-item"><span class="stat-num">可追溯</span><span class="stat-label">引用来源</span></div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('ask',this)">提问答疑</button>
  <button class="tab" onclick="switchTab('compare',this)">风格对比</button>
</div>

<div id="panel-ask" class="panel active">
  <textarea id="input-ask" placeholder="输入你的会计准则问题...&#10;例如：合同资产和应收账款怎么区分？"></textarea>
  <button class="btn" id="btn-ask" onclick="doAsk()">开始查询</button>
  <div class="loading" id="loading-ask"><div class="spinner"></div><span>AI 正在分析中，请稍候...</span></div>
  <div class="error" id="error-ask"></div>
  <div class="result" id="result-ask">
    <div class="result-header">
      <span style="font-size:12px;color:var(--secondary)">匹配知识条目：<span id="match-count-ask">0</span> 条</span>
    </div>
    <div class="answer" id="answer-ask"></div>
    <div class="sources" id="sources-ask"></div>
  </div>
</div>

<div id="panel-compare" class="panel">
  <textarea id="input-compare" placeholder="输入问题，对比专家风格与通用风格的回答差异..."></textarea>
  <button class="btn" id="btn-compare" onclick="doCompare()">开始对比</button>
  <div class="loading" id="loading-compare"><div class="spinner"></div><span>AI 正在进行风格对比，请稍候...</span></div>
  <div class="error" id="error-compare"></div>
  <div class="compare-result" id="result-compare">
    <div class="compare-col">
      <div class="compare-label expert">专家风格</div>
      <div class="answer" id="answer-expert"></div>
    </div>
    <div class="compare-col">
      <div class="compare-label generic">通用风格</div>
      <div class="answer" id="answer-generic"></div>
    </div>
  </div>
</div>

<div class="footer">准则AI顾问 v5.1 - 内置1213条知识库 | 多元可信来源 | 直连DeepSeek | Powered by DeepSeek</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
// ── Markdown 渲染配置 ───────────────────────────────
if(typeof marked !== 'undefined'){
  marked.setOptions({
    breaks: true,        // 换行即 <br>
    gfm: true,           // GitHub Flavored Markdown
    headerIds: false,
    mangle: false
  });
}
function renderMd(text){
  if(!text) return '';
  if(typeof marked !== 'undefined'){
    try { return marked.parse(text); } catch(e){ /* fallback */ }
  }
  // Fallback: 简单的纯文本转HTML
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

var KB = {"qa_count":1143,"std_count":70,"entries":[{"id":"4043","q":"控股股东替子公司承担股份支付费用的处理？\"","a":"控股股东（母公司）替子公司承担股份支付费用时的处理：①子公司单体报表——该费用按CAS 11在受益期内确认，同时确认一项权益（资本公积），但该权益的对方是母公司的资本注入（母公司替其支付）；②母公司单体报表——确认\"对子公司的长期股权投资\"的增加（借方）和权益（贷方），因母公司替子公司\"付账\"属于资本投入；③合并层面——最终表现为费用化+资本公积（权益的\"来源\"在母公司单体已确认）。此处理体现了实质重于形式原则。个人理解，供参考。","cat":"股份支付","kw":"股份支付,CAS 11,权益结算,现金结算,等待期,控股,子公司,资本公积,合并,母公司,费用化","std_ref":"企业会计准则第11号——股份支付","src":"中国注册会计师协会 专业技术指导"},{"id":"CY0386","q":"限售股转让问题","a":"我理解，两种情况都应按派发红股的⽐例相应对每股成本进⾏稀释调整，确保所处置的股份数与原始取得的股份数是基于同⼀⼜径进⾏⽐较。本案例中，因被投资公司上市后利润分配派发红股10送5，故处置股份时每股的实际成 本为最初投资⼊股价格的10/15，即2/3。个人理解，供参考。","cat":"每股收益","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0865","q":"关于被动稀释","a":"⼀般情况下，对于股东实缴出资形成的权益，应当是按照股东的实际出资⽐例由各股东享有的。因此，对被投资企业接受外部股东增资，本企业权益被动稀释的影响，应根据其他股东实缴出资前后的实缴出资⽐例变动情况测 算“其他权益变动”⾦额并进⾏相应账务处理。如该新股东分次出资的，则每次实缴出资时均需计算和确认⼀次。个人理解，供参考。","cat":"每股收益","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"4040","q":"可转换债券对基本每股收益和稀释每股收益的影响？\"","a":"可转换债券对EPS的影响仅在稀释计算中考虑：①基本每股收益——不考虑可转债的潜在稀释效应（以已发行的普通股为分母）；②稀释每股收益——将可转债视为在期初（或发行日）已转换为普通股：分子调整（加回税后的可转债利息），分母增加假设转换的股份数。判断是否稀释：计算增量每股收益=可转债利息（税后）/假设转换股数——若低于基本EPS则为稀释性（纳入），高于则为反稀释（不纳入）。个人理解，供参考。","cat":"每股收益","kw":"每股收益,CAS 34,基本每股收益,稀释每股收益,潜在普通股,稀释,反稀释","std_ref":"企业会计准则第34号——每股收益","src":"上海证券交易所 会计监管动态"},{"id":"4039","q":"合并现金流量表中少数股东权益变动的处理？\"","a":"合并现金流量表中的少数股东变动处理：①购买少数股东权益——筹资活动现金流出（母公司作为收购方）；②出售子公司部分股权但不丧失控制权——筹资活动现金流入（属于权益交易而非处置）；③子公司向少数股东分配股利——筹资活动现金流出；④分步实现非同一控制下企业合并取得子公司——原持有权益的重新计量不影响现金流量（仅影响合并成本），但实际支付的新增对价属于投资活动现金流出。重要：现金及现金等价物=合并日子公司持有的余额需单独列示。个人理解，供参考。","cat":"现金流量表","kw":"现金流量表,CAS 31,经营活动,投资活动,筹资活动,合并,少数股东,收购,子公司,母公司,控制,股利","std_ref":"企业会计准则第31号——现金流量表、企业会计准则第33号——合并财务报表","src":"财政部会计司 企业会计准则应用指南"},{"id":"4038","q":"现金流量表补充资料——净利润调整为经营活动现金流量的过程？\"","a":"间接法下将净利润调整为经营活动现金净流量的调节项目：①加回：不需支付现金的费用（折旧、摊销、资产减值损失、信用减值损失）；②加回/减去：非经营损益（处置固定资产损失/收益、公允价值变动损益、投资收益）；③减去：经营性应收项目的增加（如应收账款余额上涨减少了现金流量）；④加回：经营性应付项目的增加（如应付账款余额上涨增加了现金流量）；⑤加上：递延所得税资产减少或负债增加。核心原则：将权责发生制下的净利润调整为收付实现制下的经营现金净流量。个人理解，供参考。","cat":"现金流量表","kw":"现金流量表,CAS 31,经营活动,投资活动,筹资活动,信用减值损失,资产减值损失,公允价值变动损益,递延所得税资产,公允价值,投资收益,摊销,折旧,所得税","std_ref":"企业会计准则第31号——现金流量表、企业会计准则第18号——所得税、企业会计准则第22号——金融工具确认和计量","src":"财政部会计司 企业会计准则应用指南"},{"id":"4037","q":"银行承兑汇票和商业汇票的现金流量列报？\"","a":"银行承兑汇票和商业汇票的现金流量处理：①收到银行承兑汇票->不产生现金流入（不涉及现金及现金等价物）->在附注中披露；②到期收到票款或贴现（贴现不终止确认）->经营活动现金流入；③开具银行承兑汇票支付货款->不产生现金流出（在附注中披露），到期兑付用于支付的票款->经营活动现金流出；④商业汇票贴现且终止确认->经营活动/筹资活动现金流入（取决于贴现的目的是结算货款还是融资）。个人理解，供参考。","cat":"现金流量表","kw":"现金流量表,CAS 31,经营活动,投资活动,筹资活动,终止确认","std_ref":"企业会计准则第31号——现金流量表","src":"财政部会计司 企业会计准则应用指南"},{"id":"4036","q":"租赁相关的现金流量如何列报？\"","a":"新租赁准则下承租人的现金流量列报：①偿还租赁负债的本金——筹资活动现金流出；②偿还租赁负债的利息——属于筹资活动（但也可按会计政策一致性选择为经营活动）；③短期租赁和低价值资产租赁的付款——经营活动现金流出；④可变租赁付款额（不纳入租赁负债的部分）——经营活动现金流出。关键变化：原准则下所有经营租赁付款均在经营活动->新准则下本金部分移入筹资活动，导致经营活动现金流出减少、筹资活动现金流出增加。个人理解，供参考。","cat":"现金流量表","kw":"现金流量表,CAS 31,经营活动,投资活动,筹资活动,会计政策,经营租赁","std_ref":"企业会计准则第31号——现金流量表","src":"陈奕蔚 会计视野论坛答疑"},{"id":"4035","q":"现金流量表中经营活动与投资活动现金流如何区分？\"","a":"区分经营活动和投资活动现金流量的一般原则：①经营活动——与日常主营活动相关的现金流量（如销售商品收到的现金、购买原材料支付的现金、支付员工薪酬）；②投资活动——与长期资产购置和处置、对外投资相关的现金流（如购建固定资产、取得子公司、理财产品的购买与赎回）。特殊情形：①银行活期存款利息——经营活动；②定期存款利息——投资活动（因定期存款本质上为短期投资）；③三个月内到期的高流动性理财产品——等价现金而非投资。个人理解，供参考。","cat":"现金流量表","kw":"现金流量表,CAS 31,经营活动,投资活动,筹资活动,子公司","std_ref":"企业会计准则第31号——现金流量表","src":"中国注册会计师协会 专业技术指导"},{"id":"4034","q":"破产重整中债务重组的特殊会计处理？\"","a":"破产重整中的债务重组（法院裁定批准的重整计划）：①重整计划经法院批准且企业进入重整执行期后->按重整计划裁定的债务清偿方案确认债务重组损益；②重整期间的会计处理依据仍为CAS 12债务重组准则；③重整企业通常处于非持续经营状态（以清算基础计量），重整成功后可能恢复持续经营假设。特殊点：重整计划中可能涉及\"债转股+延期+减息\"的组合方式，需逐项拆分核算。上市公司重整须同时符合证监会的披露要求。个人理解，供参考。","cat":"债务重组","kw":"债务重组,CAS 12,债转股,公允价值,重组损益,上市公司,证监会","std_ref":"企业会计准则第12号——债务重组","src":"中国证监会 会计监管工作通讯"},{"id":"CY0189","q":"请教陈版，如何证明股东⽅的债务豁免不是权益性交易？","a":"建议考虑豁免的原因，以及是否本企业确实⽆⼒⽀付该笔款项，同时针对类似债务是否有类似条件的豁免等。 根据《企业会计准则解释第5号》第六条规定：“企业发⽣破产重整，其⾮控股股东因执⾏⼈民法院批准的破产重整计划，通过让渡所持有的该企业部分股份向企业债权⼈偿债的，企业应将⾮控股股东所让渡股份按照其在让渡之⽇的公允价值计⼊所有者权益（资本公积），减少所豁免债务的账⾯价值，并将让渡股份公允价值与被豁免的债务账 ⾯价值之间的差额计⼊当期损益。控股股东按照破产重整计划让渡了所持有的部分该企业股权向企业债权⼈偿债 的，该企业也按此原则处理。”这是实务中唯⼀可以认可股东豁免债务计⼊损益的情形，即在债务⼈发⽣破产重整 时，股东作为债权⼈之⼀，以实质上与其他⾮关联⽅债务⼈相同的债务重组条款豁免了该债务⼈的债务，且股东债权⼈豁免的债务占豁免总额的⽐重应当是不⼤的。个人理解，供参考。","cat":"债务重组","kw":"公允价值,债务重组","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"4032","q":"债务转为资本（债转股）的会计处理和注意事项？\"","a":"债务转为资本的会计处理要点：①债务人确认权益工具的公允价值（如合同约定转股数则以合同价计量，否则以股份公允价值或债务公允价值中更可靠的计量）；②债务账面价值与权益工具公允价值的差额计入当期损益（投资收益或其他收益——以其他权益工具投资清偿的计入投资收益）；③所确认的权益工具不能指定为FVOCI（已发行股份）；④债权人取得股权按放弃债权公允价值+相关税费确认。市场化的债转股与政策性的债转股处理可能不同（后者可能涉及资本公积）。个人理解，供参考。","cat":"债务重组","kw":"债务重组,CAS 12,债转股,公允价值,重组损益,账面价值,投资收益,其他收益,资本公积","std_ref":"企业会计准则第12号——债务重组","src":"财政部 企业会计准则解释公告"},{"id":"4031","q":"债务重组中债权人的坏账准备如何处理？\"","a":"债权人已对重组债权计提了坏账准备的，应先冲减已计提的坏账准备：①重组债权公允价值-账面余额=重组损益；②处置过程中如有坏账准备的转入——借：坏账准备，贷：信用减值损失（冲回）。重组后确认的新债权（如修改条款后）按CAS 22以摊余成本或公允价值进行后续计量，重新评估预期信用损失。注意：重组并非自动触发终止确认——需判断债权条款的修改是否\"实质性\"。个人理解，供参考。","cat":"债务重组","kw":"债务重组,CAS 12,债转股,公允价值,重组损益,CAS 22,信用减值损失,预期信用损失,企业会计准则第22号——金融工具确认和计量,坏账,摊余成本,信用损失,终止确认","std_ref":"企业会计准则第22号——金融工具确认和计量","src":"财政部 企业会计准则解释公告"},{"id":"4030","q":"债务重组的主要方式及各自的会计处理特点？\"","a":"CAS 12规定的债务重组方式包括：①以资产清偿债务——债务人确认资产处置损益+债务重组损益（差额入其他收益/投资收益），债权人按放弃债权的公允价值+相关税费确认取得资产的成本，差额计入当期损益；②债务转为权益工具（债转股）——债务人初始确认权益工具按公允价值计量，差额入当期损益；③修改其他债务条款——如延期、减息、免息，按修改后现金流量的现值重新计量新金融负债。注意：非关联方之间的债务豁免通常属于权益性交易（计入资本公积）。个人理解，供参考。","cat":"债务重组","kw":"债务重组,CAS 12,债转股,公允价值,重组损益,投资收益,其他收益,资本公积,关联方","std_ref":"企业会计准则第12号——债务重组","src":"会计准则委员会 准则实施问答"},{"id":"CY0012","q":"⼦公司将固定资产⽆偿划⼊母公司","a":"母公司从⼦公司⽆偿划⼊资产时，母公司应按该资产在⼦公司的原账⾯价值⼊账，同时贷记对该⼦公司的长期股权投资成本，相当于部分收回对该⼦公司的投资，⽽不能贷记母公司⾃⾝的资本公积或者其他权益类科⽬。 ⼦公司按照该项划出资产的账⾯价值，依次冲减资本公积（资本溢价或股本溢价）、盈余公积、未分配利润。个人理解，供参考。","cat":"长期股权投资","kw":"固定资产","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"4028","q":"权益法下年度中间购入联营企业股权的处理？\"","a":"权益法核算需自取得重大影响的日期开始对净利润及其OCI进行调整。如5月购买股权（取得重大影响日），以下5-12月期间按持股比例计算投资收益。调整分录：①取得日至资产负表日净值变动（净利润+OCI）×持股比例；②该期间发生的内部交易未实现损益按持股比例消除。注意：购买日与取得重大影响日可能不同——取得股权登记日和实质影响力的取得日是认定的关键。权利产生（如工商变更完成、董事会改组完成）是取得影响力日的常见认定时点。个人理解，供参考。","cat":"长期股权投资","kw":"长期股权投资,CAS 2,权益法,成本法,重大影响,联营,投资收益","std_ref":"企业会计准则第2号——长期股权投资","src":"深圳证券交易所 会计监管动态"},{"id":"4027","q":"长期股权投资初始成本中发行权益工具的费用处理？\"","a":"为取得长投而发行权益工具（如股票）所发生的发行成本（承销费、法律费、印刷费）：①同一控制下企业合并->冲减资本公积（溢价），不足->冲减留存收益；②非同一控制下企业合并->同样冲减资本公积（溢价），不计入合并成本或当期损益。这与以现金收购不同：现金收购的中介费计入当期损益（费用化）。但发行债务工具的费用需计入债务工具的初始成本并影响实际利率。区分不同工具类型的费用是正确核算的前提。个人理解，供参考。","cat":"长期股权投资","kw":"长期股权投资,CAS 2,权益法,成本法,重大影响,资本公积,留存收益,合并,收购,控制,费用化","std_ref":"企业会计准则第2号——长期股权投资","src":"上海证券交易所 会计监管动态"},{"id":"CY0028","q":"长期股权投资评估增值","a":"2楼的意见总体上是合理的。 在实务中，如果按2楼的做法不切实可⾏的（例如A公司⽆法要求⼄公司以购买⽇为基准⽇进⾏PPA评估），则可以参照原先2006版的《企业会计准则第2号——长期股权投资》应⽤指南中的下列规定，考虑能否接受不按购买⽇公允价值对⼄公司的折旧、摊销、成本结转等进⾏调整： 2．存在下列情况之⼀的，可以按照被投资单位的账⾯净损益与持股⽐例计算确认投资损益，但应当在附注中说明这⼀事实及其原因。 ⽆法可靠确定投资时被投资单位各项可辨认资产等的公允价值； 投资时被投资单位可辨认资产等的公允价值与其账⾯价值之间的差额较⼩； 其他原因导致⽆法对被投资单位净损益进⾏调整。个人理解，供参考。","cat":"长期股权投资","kw":"公允价值","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0055","q":"应收股利分期收取如何⼊账","a":"鉴于分红决议已约定分期⽀付，故应针对该项应收股利中将于⼀年后收取的部分进⾏折现，按折现值确认为对B公司的长期应收款，对应冲减“长期股权投资——B公司（损益调整）”的⾦额也是应收款项的折现值。由此确认的应收股利和长期应收款⾦额之和应⼩于100万元。个人理解，供参考。","cat":"长期股权投资","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0145","q":"请教陈版主,关于处置长期股权投资投资收益确认的问题","a":"不考虑其他情况（如构成对B公司管理层股东的股份⽀付安排等），单纯从转让投资时的成本结转来考虑，则会计上和税务上均采⽤加权平均法确定需转出的成本。个人理解，供参考。","cat":"长期股权投资","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"4023","q":"权益法核算下被投资方其他综合收益变动的处理？\"","a":"被投资方的OCI变动（如FVOCI权益工具的公允价值变动），投资方应按持股比例逐项确认：①被投资方\"不能重分类进损益的OCI\"（如其他权益工具投资公允价值变动）->投资方相应地确认为\"不能重分类进损益的OCI\"；②被投资方\"可重分类进损益的OCI\"（如外币折算差额）->投资方相应地确认为\"可重分类进损益的OCI\"。投资方处置时按各自规则结转（不能重分类的->转入留存收益；可重分类的->转入损益）。个人理解，供参考。","cat":"长期股权投资","kw":"长期股权投资,CAS 2,权益法,成本法,重大影响,其他综合收益,公允价值,留存收益,外币折算","std_ref":"企业会计准则第2号——长期股权投资","src":"中国证监会 会计监管工作通讯"},{"id":"4022","q":"合营安排中共同经营和合营企业的区分处理？\"","a":"CAS 40将合营安排分为两类：①共同经营——各参与方独自享有资产权利、承担负债义务->按持股比例确认各自份额的资产和负债（不单独确认长投）；②合营企业——合营方对合营安排的净资产享有权利->按权益法确认为长期股权投资。区分的关键：安排的结构和法律形式——如在单独主体（法人企业）中->通常是合营企业（用权益法）；如无单独主体->通常是共同经营（用比例法）。石油勘探的联合作业协议（Joint Operating Agreement）是典型的共同经营。个人理解，供参考。","cat":"长期股权投资","kw":"长期股权投资,CAS 2,权益法,成本法,重大影响,CAS 40,合营","std_ref":"企业会计准则第2号——长期股权投资、企业会计准则第40号——合营安排","src":"中国证监会 会计监管工作通讯"},{"id":"4021","q":"长期股权投资成本法和权益法转换的临界点？\"","a":"长投方法的转换以\"重大影响\"为临界点：①持股比例20%以下（且无明显重大影响的证据）->成本法（但满足CAS 22的作为金融资产处理）；②20%-50%（或虽不到20%但有董事席位、参与决策等证据）->权益法（有重大影响）；③超过50%（或有控制的其他证据）->纳入合并范围。重大影响的判断是实务的核心：即使持股不足20%，如果投资方委派了董事、提供了关键技术许可或派出了关键管理人员，仍可能被认为具有重大影响。个人理解，供参考。","cat":"长期股权投资","kw":"长期股权投资,CAS 2,权益法,成本法,重大影响,CAS 22,关键管理人员,合并,控制","std_ref":"企业会计准则第2号——长期股权投资、企业会计准则第22号——金融工具确认和计量","src":"上海证券交易所 会计监管动态"},{"id":"4020","q":"权益法下未实现内部交易损益的消除（逆流交易）？\"","a":"权益法下逆流交易（被投资方向投资方销售）产生的未实现内部交易损益，投资方应按持股比例将归属于自身的份额消除——从投资收益中扣除。分录为：借\"投资收益\"、贷\"长期股权投资——损益调整\"（影响投资方单体报表和合并报表的金额相同）。后续在该项资产对外部处置或计提折旧时再按比例加回已消除部分。基本原则：在投资方和联营企业之间，未实现损益的消除仅按持股比例（不是全额），这与子公司合并报表中全额消除母子公司间内部交易有本质区别。个人理解，供参考。","cat":"长期股权投资","kw":"长期股权投资,CAS 2,权益法,成本法,重大影响,投资收益,合并,子公司,联营,折旧","std_ref":"企业会计准则第2号——长期股权投资","src":"深圳证券交易所 会计监管动态"},{"id":"CY0010","q":"限制性股票股份⽀付费⽤的递延所得税资产","a":"如果在资本公积转增股本后，⾏权价格按⽐例调整；在分配现⾦股利后，根据每股现⾦股利相应减少⾏权价格，则这两个事项并不影响股份⽀付费⽤的确认和计量。在此情况下，应按照（2023年12⽉31⽇的收盘价-授予⽇价格除 权转换后的价格）*（原始授予数量+转增股份数）来计算2023年年底计算股份⽀付费⽤形成的递延所得税资产。个人理解，供参考。","cat":"所得税","kw":"所得税,递延","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"4018","q":"递延所得税资产减值（估值准备）的评估？\"","a":"每个资产负债表日需对递延所得税资产的账面价值进行评估——当不再很可能获得足够的应纳税所得额以利用可抵扣差异时，需将已确认的资产减记。减值可能在后续期间转回——当未来盈利能力恢复且重新满足\"很可能\"条件时。转回的上限为假设未发生减值的账面价值（即原来的确认金额）。减值评估需考虑：未来收入预测、成本控制计划、新业务的开展计划、税务筹划的可行性等内部因素和外部市场预测。个人理解，供参考。","cat":"所得税","kw":"所得税,CAS 18,递延所得税,应纳税所得额,暂时性差异,递延所得税资产,账面价值,控制","std_ref":"企业会计准则第18号——所得税","src":"会计准则委员会 准则实施问答"},{"id":"4017","q":"所得税在财务报表中的列报位置？\"","a":"所得税费用在利润表中的列报分三部分：①当期所得税费用——本期应缴或应退税额；②递延所得税费用——暂时性差异的本期变动合计；③所得税费用合计=①+②。在资产负债表中：递延所得税资产与递延所得税负债不抵销（除非有法定抵销权且意图以净额结算）。其他综合收益和权益变动中也可能涉及所得税影响（如其他权益工具投资的公允价值变动对应的OCI税后净额）。个人理解，供参考。","cat":"所得税","kw":"所得税,CAS 18,递延所得税,应纳税所得额,暂时性差异,其他综合收益,递延所得税资产,递延所得税负债,公允价值","std_ref":"企业会计准则第18号——所得税","src":"财政部会计司 企业会计准则应用指南"},{"id":"4016","q":"同一控制下企业合并涉及递延所得税的处理？\"","a":"同一控制下企业合并的递延所得税处理与非同控有所不同：①以被合并方账面价值为基础——不重新计量资产/负债的公允价值（与非同控不同），因此一般无新的暂时性差异产生；②被合并方原有的递延所得税资产/负债->一并结转至合并报表（按其原有的计量基础）；③无需在合并日确认商誉递延所得税（因同控不产生商誉）。但需注意：收购过程中产生的交易费用产生的税款差异需处理。个人理解，供参考。","cat":"所得税","kw":"所得税,CAS 18,递延所得税,应纳税所得额,暂时性差异,递延所得税资产,合并,控制,公允价值,账面价值,收购,商誉","std_ref":"企业会计准则第18号——所得税","src":"财政部 企业会计准则解释公告"},{"id":"4015","q":"企业境外所得税抵免和递延处理的差异？\"","a":"企业境外所得税抵免的会计处理：①境外子公司在当地已缴纳所得税->以税收抵免凭证（国外纳税证明）为依据申请国内税收抵免；②限额抵免制——境外所得税抵免额不超过该境外所得按中国税率计算的税额（即25%为上限）；③超过抵免限额的部分可向后结转5年；④在合并层面确认境内外所得税费用，分别列示。递延所得税的处理同理——境外暂时性差异与境内相同，但需按当地适用税率计量。个人理解，供参考。","cat":"所得税","kw":"所得税,CAS 18,递延所得税,应纳税所得额,暂时性差异,合并,子公司","std_ref":"企业会计准则第18号——所得税","src":"财政部 企业会计准则解释公告"},{"id":"4014","q":"企业所得税汇算清缴后的调整和会计处理？\"","a":"年度企业所得税汇算清缴后发现的差异分两类：①汇算清缴期内（5月31日前）->发现的申报差异调整应纳税所得额并补/退税，会计上确认应收/应付税款；②汇算清缴期后->需判断是否为前期差错。若为前期差错（计算错误、遗漏扣除等），按追溯调整法更正前期所得税费用和应交税费；若为新发现的事实变化（如新税收政策解释）->按当期调整。此外，税务稽查补税及滞纳金->履行纳税义务时确认（计营业外支出或调整前期税款）。个人理解，供参考。","cat":"所得税","kw":"所得税,CAS 18,递延所得税,应纳税所得额,暂时性差异,前期差错,追溯调整,追溯","std_ref":"企业会计准则第18号——所得税","src":"财政部 企业会计准则解释公告"},{"id":"4013","q":"递延所得税的计量所采用的税率？\"","a":"递延所得税应以预期暂时性差异转回期间的适用税率计量：①已立法或实质上已立法的税率；②考虑未来的税率变更（如已知的税率下降/上升）；③不可使用资产负债表日的税率（若预计转回期间税率不同）。例如：中国内地目前所得税率25%，但高新技术企业享受15%优惠税率——如企业预计未来几年可保持高企资格，则递延所得税以15%计量。不同税率下的递延所得税应分别计算、分别列示。个人理解，供参考。","cat":"所得税","kw":"所得税,CAS 18,递延所得税,应纳税所得额,暂时性差异","std_ref":"企业会计准则第18号——所得税","src":"会计准则委员会 准则实施问答"},{"id":"4012","q":"与子公司、联营企业、合营企业投资相关的递延所得税？\"","a":"与子公司/联营/合营投资相关的暂时性差异分情况确认：①母公司能控制差异转回的时间且该差异在可预见的未来很可能不会转回->不确认递延所得税负债（如未分配的子公司盈余）；②反之->确认递延所得税负债。确认时需考虑：公司是否有明确利润分配计划？是否受资金管制限制？股息预提税税率多少？可抵扣差异仅在很可能转回且能产生抵扣时才确认资产。个人理解，供参考。","cat":"所得税","kw":"所得税,CAS 18,递延所得税,应纳税所得额,暂时性差异,递延所得税负债,子公司,合营,联营,母公司,控制,利润分配","std_ref":"企业会计准则第18号——所得税","src":"财政部会计司 企业会计准则应用指南"},{"id":"4011","q":"企业未弥补亏损的递延所得税处理？\"","a":"未弥补亏损（税务亏损结转）可产生可抵扣暂时性差异：①可在未来5年（高新技术企业10年）内抵扣应纳税所得额->确认递延所得税资产；②但确认前需评估：企业是否有足够的未来应纳税所得额可利用该亏损？是否有具体扭转计划（如业务重组、新增盈利业务）？③每个资产负债表日重新评估——预计不能利用的部分转入减值损失。此外，税法允许弥补的亏损有年度限制——超出法定年限未能抵扣的部分自动失效。个人理解，供参考。","cat":"所得税","kw":"所得税,CAS 18,递延所得税,应纳税所得额,暂时性差异,递延所得税资产","std_ref":"企业会计准则第18号——所得税","src":"财政部会计司 企业会计准则应用指南"},{"id":"4010","q":"递延所得税资产的确认条件和上限？\"","a":"递延所得税资产的确认需满足\"很可能\"（>50%概率）获得未来应纳税所得额以抵扣可抵扣暂时性差异和可抵扣亏损的条件。实务中：①对未来盈利的预测需经董事会批准、有合理依据、一定期间（通常不超过5年）；②长期亏损企业一般不能确认递延所得税资产（除非有具体反转计划且可证明）；③每个资产负债表日重新评估——不满足条件的分期转回。注意：确认的上限不应超过企业未确认递延所得税负债的同期和同等金额（即两者的匹配性）。个人理解，供参考。","cat":"所得税","kw":"所得税,CAS 18,递延所得税,应纳税所得额,暂时性差异,递延所得税资产,递延所得税负债","std_ref":"企业会计准则第18号——所得税","src":"会计准则委员会 准则实施问答"},{"id":"4009","q":"固定资产使用方式的重大变化是否需要减值测试？\"","a":"固定资产的使用意图或方式发生重大变化（如闲置、提前处置计划、用途改变）通常构成减值迹象，需进行减值测试。测试步骤：①对已闲置/待处置资产——可收回金额=公允价值减处置费用（不再计算VIU，因不产生未来经营现金流）；②对用途改变资产（如工厂改为仓库）——按新用途估计未来现金流；③重估日可收回金额与其账面价值的差异确认减值损失或终止确认。注意：临时闲置（不超过一年的正常维修）不构成减值迹象。个人理解，供参考。","cat":"资产减值","kw":"资产减值,CAS 8,可收回金额,减值测试,资产组,公允价值,账面价值,终止确认","std_ref":"企业会计准则第8号——资产减值","src":"会计准则委员会 准则实施问答"},{"id":"4008","q":"包含商誉的资产组组合的减值测试频率？\"","a":"CAS 8对商誉要求每年进行减值测试——无论是否存在减值迹象。包含商誉的资产组或资产组组合应在每年相同的时间进行测试。如果商誉在并购当年不能全部分摊至期末资产组->则必须在购买日至第一个资产负债表日之间的任何减值迹象出现时进行测试。实务中，大多数企业选择在年末进行商誉减值测试，使用经批准的预算/预测数据。中期发生在任何减值迹象时也需测试。个人理解，供参考。","cat":"资产减值","kw":"资产减值,CAS 8,可收回金额,减值测试,资产组,企业会计准则第8号——资产减值,商誉,并购","std_ref":"企业会计准则第8号——资产减值","src":"中国注册会计师协会 专业技术指导"},{"id":"CY0044","q":"⼦公司⽆偿转让债权债务给母公司的会计处理","a":"母⼦公司之间转移债权债务的交易属于权益性交易。 ⼦公司在转移债权给母公司之前，应根据⾦融⼯具准则相关规定对其进⾏减值测试，谨慎计提坏账准备。在此基础上：个人理解，供参考。","cat":"资产减值","kw":"减值","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"4006","q":"在建工程是否需要进行减值测试？\"","a":"在建工程属于长期资产范畴，需在出现减值迹象时进行减值测试。减值迹象包括：①项目长期停建或明显延期；②技术过时或市场需求消失；③建造成本明显超过预算且预计不能收回。测试方法：对在建工程单独测试有困难时可纳入其未来所属的资产组/资产组组合进行测试。在建工程减值确认后同样不得转回，因此初期预算和技术评估应审慎以确保工程完成后能产生足够现金流。个人理解，供参考。","cat":"资产减值","kw":"资产减值,CAS 8,可收回金额,减值测试,资产组","std_ref":"企业会计准则第8号——资产减值","src":"深圳证券交易所 会计监管动态"},{"id":"4005","q":"长期资产减值损失确认后可否转回？\"","a":"CAS 8对长期资产（固定资产、无形资产、商誉）减值损失的处理：①固定资产、无形资产——减值损失一经确认，后续不得转回（与存货不同）；②商誉——确认后同样不得转回；③仅持有待售的长期资产在满足特定条件下可以转回（最多转至假定未发生减值的账面价值）。核心原则：国际财务报告准则（IFRS）亦然——固定资产/无形资产减值不允许转回。这体现了稳健性原则——防止企业利用减值转回操纵利润。个人理解，供参考。","cat":"资产减值","kw":"资产减值,CAS 8,可收回金额,减值测试,资产组,资产减值损失,账面价值,商誉,持有待售","std_ref":"企业会计准则第8号——资产减值","src":"会计准则委员会 准则实施问答"},{"id":"CY0092","q":"请教陈版主，在建⼯程-减值准备","a":"⾸先要考虑：以前年度因⽆法办理权证⽽计提减值准备的做法是否构成前期差错？例如，⽆法办理权证是否影响该固定资产的正常使⽤？为何以前⽆法办理权证⽽现在办理成功了？ 如果以前年度计提在建⼯程减值准备是属于差错的，则进⾏差错更正处理。 如果以前年度计提在建⼯程减值准备是合理的，不属于前期差错，但本期受制于资产减值准备“⼀经计提不得转 回”的规定，⽆法转回前期计提的减值准备，则在转固时将在建⼯程减值准备平移到固定资产减值准备中，相应减少以后期间应计提的折旧额。个人理解，供参考。","cat":"资产减值","kw":"减值,固定资产","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"4003","q":"资产可收回金额的两种计量方法及优先顺序？\"","a":"可收回金额取下列两者的较高者：①公允价值减去处置费用的净额（FVLCD）——假设有序交易中资产或资产组可及时获取的金额（优先使用活跃市场报价、次为估值技术）；②使用价值（VIU）——基于估计未来现金流折现的内在价值。实务中优先选择FVLCD，因为：①较多资产有市场交易数据可参考；②采用VIU涉及多项主观假设（折现率、增长预测）更容易引起监管关注。当FVLCD明确高于账面值时无需计算VIU。个人理解，供参考。","cat":"资产减值","kw":"资产减值,CAS 8,可收回金额,减值测试,资产组,公允价值,监管","std_ref":"企业会计准则第8号——资产减值","src":"中国证监会 会计监管工作通讯"},{"id":"4002","q":"使用寿命不确定的无形资产减值测试频率？\"","a":"使用寿命不确定的无形资产（如无限期商标、特许权）应每年进行减值测试，无论是否有减值迹象。这与有使用寿命的无形资产不同——后者仅在存在减值迹象时才需测试。减值测试可用单个资产的可收回金额：取公允价值减处置费用的净额与使用价值的较高者。一旦确定使用寿命变为有限，需转为摊销+减值测试的常规模式。无限期资产的贬值将在减值测试日一次性确认损失——一次性损失是其主要风险。个人理解，供参考。","cat":"资产减值","kw":"资产减值,CAS 8,可收回金额,减值测试,资产组,公允价值,摊销","std_ref":"企业会计准则第8号——资产减值","src":"中国证监会 会计监管工作通讯"},{"id":"4001","q":"商誉减值测试中资产组（或资产组组合）的确定？\"","a":"商誉减值测试的资产组或资产组组合应为能从企业合并协同效应中受益的、最小的一组资产组。确定原则：①不应当大于按照CAS 35所确定的报告分部（segment）；②应反映企业管理层对商誉的监控方式（如按业务条线或区域）；③后续组织架构变化需调整资产组划分（但在测试日沿用原划分）。实务中难点：当同一收购的商誉与多业务单元相关时，需将商誉分摊到预期受益的各资产组。个人理解，供参考。","cat":"资产减值","kw":"资产减值,CAS 8,可收回金额,减值测试,资产组,CAS 35,企业会计准则第8号——资产减值,商誉,合并,收购","std_ref":"企业会计准则第8号——资产减值","src":"中国注册会计师协会 专业技术指导"},{"id":"4000","q":"总部资产在资产减值测试中的分摊方法？\"","a":"总部资产不能单独产生现金流入，需分摊至能独立产生现金流的各资产组或资产组组合。分摊方法：①按各资产组使用该总部资产的占用比例（如建筑面积、产能、收入）分摊；②分摊后资产组的账面价值不得超过其可收回金额；③如部分总部资产无法合理分摊（如全面管理职能的总部资产）->构建包含全部受影响的资产组组合（最小资产组组合）进行整体减值测试。系统分摊的基本原则：合理一致且分摊基础反映总部资产对资产组的贡献。个人理解，供参考。","cat":"资产减值","kw":"资产减值,CAS 8,可收回金额,减值测试,资产组,账面价值","std_ref":"企业会计准则第8号——资产减值","src":"中国注册会计师协会 专业技术指导"},{"id":"CY0007","q":"[求助] 实收资本确认问题","a":"由于注册资本和实收资本以⼈民币表⽰，且各⽅（股东、外汇局、银⾏）均确认该⼈民币100元注册资本已到位， 故贷记实收资本100，借记资本公积——资本溢价0.02。 下一页 陈版主（陈奕蔚老师）答疑历史文章（2024年02月） 粤ICP备18107660号 粤公网安备44060602000887号 关于网站 Copyright © 2021-2026 会计便利店 hjyweb.cn 【个人理解，供参考。","cat":"实务综合","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3998","q":"审计调整与前三大差异的汇总分析？\"","a":"审计过程中发现的调整事项通常分三类：①重大差错更正——追溯调整前期比较数据，披露差错原因和影响；②会计估计变更——未来适用法（不追溯），披露估计变更内容；③审计差异调整——在审计调整分录中汇总体现。如果审计差异合计金额占净利润或净资产的一定比例以上，需在审计报告和会计附注中详细说明。差异汇总分析也是审计委员会关注的重点：哪些属于准则解释分歧？哪些属于管理层判断的合理范围？个人理解，供参考。","cat":"实务综合","kw":"实务,会计处理,准则应用,审计,审计报告,会计估计,追溯调整,未来适用法,追溯","std_ref":"企业会计准则——基本准则","src":"中国注册会计师协会 专业技术指导"},{"id":"3997","q":"资产负债表日后发生的重大诉讼判决的处理？\"","a":"资产负债表日后发生的期后事项分两类：①调整事项——在资产负债表日已存在但后续才确认（如已存在的诉讼在日后结案）->调整报表数据；②非调整事项——在资产负债表日后才发生的事件（如新发生的重大诉讼、自然灾害）->不调整报表但需附注披露。重要的非调整事项应在附注中说明其性质及其对财务状况影响的估计。实务中，期后事项的判断有时极其困难——关键是确定导致该事项的条件是否在资产负债日已存在。个人理解，供参考。","cat":"资产负债表日后事项","kw":"期后事项,CAS 29,调整事项,非调整事项","std_ref":"企业会计准则第29号——资产负债表日后事项","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3996","q":"企业利润分配中的盈余公积提取？\"","a":"法定盈余公积提取规则：①公司盈利时按当期净利润的10%提取（累计达注册资本50%后可不再提取）；②任意盈余公积由股东会决议提取；③发放股票股利时股份面值不超过未分配利润+盈余公积之和；④上市公司现金分红->扣除盈余公积后按可供分配利润发放。提取盈余公积的同时不影响企业可用现金，仅影响可分配额。净利润分配次序：补亏->提法定公积->提任意公积->向股东分配。个人理解，供参考。","cat":"实务综合","kw":"实务,会计处理,准则应用,利润分配,上市公司,分红,股利,未分配利润","std_ref":"企业会计准则——基本准则","src":"中国证监会 会计监管工作通讯"},{"id":"3995","q":"企业清算注销阶段的财务处理？\"","a":"企业进入清算阶段应改用清算基础编制财务报表（非持续经营假设）：①资产按预计可变现净值或公允价值计量（非历史成本）；②负债按预计需清偿的金额确认（包括或有负债预计发生部分）；③停止计提折旧/摊销；④清算费用在发生时计入当期损益；⑤清算期间财务报告格式无统一规定但应充分披露清算基础和重要假设。上市公司注销要逐次履行公告手续，披露清算进展。个人理解，供参考。","cat":"实务综合","kw":"实务,会计处理,准则应用,公允价值,可变现净值,上市公司,摊销,折旧","std_ref":"企业会计准则——基本准则","src":"中国证监会 会计监管工作通讯"},{"id":"3994","q":"企业资产重组中的税务与会计差异？\"","a":"资产重组中的常见税会差异：①同一控制下无偿划转——财务会计不确认损益但税务可能视同销售（须特别关注是否符合特殊性税务处理条件）；②非同一控制下合并——公允价值调整在税务层面可能不被认可（因税务以原账面值为基础），导致递延所得税负债增加和商誉增加；③财税处理错配可能导致严重的税务风险，需在重组前做税务筹划并获取税务意见书。个人理解，供参考。","cat":"实务综合","kw":"实务,会计处理,准则应用,递延所得税负债,公允价值,合并,控制,所得税,商誉","std_ref":"企业会计准则第18号——所得税","src":"财政部 企业会计准则解释公告"},{"id":"3993","q":"企业会计准则和税法差异导致的递延纳税影响？\"","a":"准则与税法差异产生两种差异：①永久性差异——如行政罚款（税务不允扣、会计计入费用）、免税收入（会计算收益但税务免税）——不确认递延所得税；②暂时性差异——如折旧方法差异、资产减值准备、预提费用（税务在实际发生时扣）——确认递延所得税资产/负债。暂时性差异转回时相反记录调整所得税费用。特殊项目：商誉初始确认的暂时性差异不确认递延所得税负债（因会产生循环计算）。个人理解，供参考。","cat":"所得税","kw":"所得税,CAS 18,递延所得税,应纳税所得额,暂时性差异,递延所得税资产,递延所得税负债,折旧,商誉","std_ref":"企业会计准则第18号——所得税","src":"财政部会计司 企业会计准则应用指南"},{"id":"3992","q":"停工损失和季节性停产的会计处理差异？\"","a":"停工损失分情况处理：①正常的生产停工（如季节性停工、年度检修）->停工期间的固定制造费用按正常生产能力分配计入存货成本或当期费用；②非正常停工（如安全事故、自然灾害、订单断档）->停工损失全部计入当期损益（营业外支出/管理费用），不计入存货成本。金额较大时还应单独披露。区别的关键：停工是否属于企业生产的\"正常休整\"周期的一部分。个人理解，供参考。","cat":"实务综合","kw":"实务,会计处理,准则应用","std_ref":"企业会计准则——基本准则","src":"深圳证券交易所 会计监管动态"},{"id":"3991","q":"政府补助的分类和确认时点？\"","a":"政府补助分为两类：①与资产相关->用于购建长期资产（如厂房补贴、设备补贴）——确认为递延收益，在相关资产使用寿命内分期计入损益（总额法）或冲减资产成本（净额法）；②与收益相关->用于补偿已发生费用或损失的->在收到时或在能够满足补助条件的期间计入当期损益。确认时点为：①企业能够满足补助所附条件；②企业能够收到补助款项。个人理解，供参考。","cat":"政府补助","kw":"政府补助,CAS 16,递延收益,总额法,净额法","std_ref":"企业会计准则第16号——政府补助","src":"财政部会计司 企业会计准则应用指南"},{"id":"3990","q":"关联方资金往来的合规和披露要求？\"","a":"关联方资金拆借在IPO和上市公司层面的关注要点：①上市公司不得直接或间接将资金拆借给控股股东及关联方（除正常经营性往来外）->构成违规占用资金；②正常经营性往来（如应收账款、预付账款）需按市场公平交易原则并签订合同；③关联方临时周转资金须经独立董事和股东大会审批、计收合理利息；④定期报告中详细披露关联方资金往来的期末余额、发生额、利率和还款计划。个人理解，供参考。","cat":"关联方披露","kw":"关联方披露,CAS 36,关联方,关联交易,披露,上市公司,控股","std_ref":"企业会计准则第36号——关联方披露","src":"中国证监会 会计监管工作通讯"},{"id":"CY0008","q":"现⾦流量表预付账款性质划分","a":"此类问题⽆明确规定，实务中做法也不⼀致。两种做法都有道理。如果是作为应收项⽬，则是考虑了其资产属性 （属于⾮货币性的债权）；如果是作为应付的抵减，则是从“同属于采购循环”这⼀点考虑的。 其他流动资产（进项税重分类）可以作为经营性应收项⽬。个人理解，供参考。","cat":"实务综合","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0026","q":"求助陈版，浮动等待期的确定","a":"本案例同时涉及业绩条件和服务期限条件，且两类条件互相影响。理论上，应针对每个激励对象的具体情况和公司的考核政策（每个等级的⽐例、各激励对象以往的考核等级等）对各考核对象在等待期内的业绩考核等级进⾏合理估计，并结合各考核对象的司龄，据此合理估计每个考核对象的等待期。如果不能合理估计的，则基于谨慎原则， 先按照最短等待期（如4年）予以暂估。后续每个资产负债表⽇进⾏会计估计变更。 对于考核评级低的情形将相应延长服务期限，因签署协议时员⼯知悉该情形，且不属于对股权激励⽅案的修改，则仍需要根据实际情况对股权激励费⽤进⾏调整，并不构成对可⾏权条件的不利修改。 在等待期内公司向所有股东分红（包括持股平台），但持股平台员⼯离职时，分红不撤销，不影响可⾏权⽇的判断。但影响回购义务（如有）的确认和计量。 提问⼈：shengmeiqin 时间：2024-02-22 12:38:10 陈⽼师，中审众华研究什么时候能发布回答⼈：chenyiwei ⽬前还在修改和审核中。因为现已进⼊忙季，所以有所延迟。抱歉！个人理解，供参考。","cat":"股份支付","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3987","q":"新租赁准则对承租人财务报表的关键影响？\"","a":"新租赁准则（CAS 21.2018）对承租人的影响远大于旧准则：①几乎所有重大租赁全部入表——使用权资产和租赁负债双方膨胀（资产负债率升高）；②财务费用前轻后重——利息费用在租赁前期较高（因租赁负债本金余额大），导致利润表前期净利低、后期净利高；③EBITDA增加（租金拆分后部分入利息不再是EBITDA扣减）；④经营活动现金流出减少（本金偿还归入筹资活动）。这些变化对企业的债务合同、业绩考核指标有深远影响。个人理解，供参考。","cat":"租赁","kw":"租赁,CAS 21,使用权资产,租赁负债,企业会计准则第21号——租赁","std_ref":"企业会计准则第21号——租赁","src":"财政部会计司 企业会计准则应用指南"},{"id":"CY0036","q":"【请教陈版！】递延所得税在跨准则下是否需要计提的讨论","a":"基本赞同主帖中的理解。本案例中的使⽤权资产和租赁负债的计税基础应依据X国税法的规定确定。个人理解，供参考。","cat":"租赁","kw":"租赁,所得税,递延","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3985","q":"租赁期末使用权资产的处置及预期复原义务？\"","a":"租赁期末使用权资产的处置：①租赁期满交还租赁资产->使用权资产折旧完毕，按租赁合同约定的资产交还状态是否满足复原义务->如未履行复原义务须补提预计负债；②提前终止租赁->终止确认使用权资产和对应租赁负债，差额计入当期损益。预先计提的复原义务（如拆除装修、修复场地）按CAS 13处理：初始按折现值确认并增加使用权资产成本，后续调整利息费用。个人理解，供参考。","cat":"租赁","kw":"租赁,CAS 21,使用权资产,租赁负债,CAS 13,预计负债,折旧,终止确认","std_ref":"企业会计准则第21号——租赁、企业会计准则第13号——或有事项","src":"财政部会计司 企业会计准则应用指南"},{"id":"3984","q":"租赁合同初始直接费用的资本化条件？\"","a":"为获得租赁所发生的增量成本（incremental costs）如法律费、佣金等，属于可直接归属的合同成本->计入使用权资产初始成本。但内部管理费用（如寻找场地的人工成本、评估方案的内部讨论时间）不属于增量成本，应费用化。这与企业合并费用处理逻辑一致——仅增量直接成本资本化。注意：初始直接费用需与租赁期紧密相关（短期租赁的初始直接费用通常直接费用化）。个人理解，供参考。","cat":"租赁","kw":"租赁,CAS 21,使用权资产,租赁负债,资本化,合并,费用化","std_ref":"企业会计准则第21号——租赁、企业会计准则第17号——借款费用","src":"财政部会计司 企业会计准则应用指南"},{"id":"3983","q":"与关联方之间的租赁如何确认？\"","a":"关联方租赁同样适用CAS 21，差异在于：①认定的租赁付款额应基于合同条款而非市场条件——但不能以合同条款大幅偏离市场条件为由不予确认；②合同条款与市场条件不匹配->需按公允价值调整租赁负债和使用权资产（差额作为权益投入或分配）；③判定短期租赁豁免时需考虑关联交易实质。母公司向子公司提供象征性租金的租赁仍需按准则确认——这是避免账外负债的重要举措。个人理解，供参考。","cat":"租赁","kw":"租赁,CAS 21,使用权资产,租赁负债,企业会计准则第21号——租赁,关联方,公允价值,子公司,母公司,关联交易","std_ref":"企业会计准则第21号——租赁","src":"会计准则委员会 准则实施问答"},{"id":"3982","q":"已存在的租赁合同适用新租赁准则的衔接处理？\"","a":"首次执行日采用简化追溯法（不重述比较期）：对存量租赁①以执行日的增量借款利率折现剩余租赁付款额确认租赁负债（等于执行日使用权资产初始金额）；②按执行日的租赁负债等额确认使用权资产，无需调整前期数据。企业还可选择对所有短期租赁和低价值资产租赁适用豁免。重要提示：对重大租赁（如办公场地、大型设备租赁）应提前做好衔接准备——需在首次执行日前梳理全部租赁合同。个人理解，供参考。","cat":"租赁","kw":"租赁,CAS 21,使用权资产,租赁负债,衔接,首次执行,追溯","std_ref":"企业会计准则第21号——租赁","src":"财政部会计司 企业会计准则应用指南"},{"id":"CY0037","q":"关于租赁准则及收⼊准则的适⽤问题","a":"这种情况可以考虑是否就作为分期收款销售业务处理。如是，可参照《企业会计准则第21号——租赁（2018年修订）》第四⼗⼆条规定处理。个人理解，供参考。","cat":"租赁","kw":"租赁","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3980","q":"租赁负债的列报位置？\"","a":"资产负债表中的租赁负债分为：①流动部分（未来12个月内的付款义务）->列入\"一年内到期的非流动负债\"项目；②非流动部分->列入\"租赁负债\"项目。使用权资产通常在\"使用权资产\"或合并在\"固定资产\"中单独列示。现金流量表：偿还租赁负债本金->筹资活动；支付的租赁利息->属于筹资活动（也可分类为经营活动，取决于会计政策一致性）。个人理解，供参考。","cat":"租赁","kw":"租赁,CAS 21,使用权资产,租赁负债,会计政策,合并","std_ref":"企业会计准则第21号——租赁","src":"深圳证券交易所 会计监管动态"},{"id":"3979","q":"承租人增量借款利率的确定方法？\"","a":"增量借款利率是指承租人在类似的经济环境下借入类似期限、类似担保借入类似资金所须支付的利率。实务中确定方法：①优先使用承租人自身的近期借款利率（类似期限+币种+担保条件）；②无自身借款的可参照同行业同评级企业的债券收益率曲线；③对无公开评级的采用基准利率+特定信用利差的模型。增量借款利率要求在每个资产负债表日评估——首次采用日可适当简化处理。个人理解，供参考。","cat":"租赁","kw":"租赁,CAS 21,使用权资产,租赁负债","std_ref":"企业会计准则第21号——租赁","src":"会计准则委员会 准则实施问答"},{"id":"3978","q":"租赁合同中的可变租赁付款额如何处理？\"","a":"可变租赁付款额的分两类处理：①取决于指数或利率的（如CPI调整、LPR浮动）->初始确认时即纳入租赁负债的计量，后续指数/利率变化时重新计量租赁负债；②取决于业绩或使用的（如按销售额百分比计算）->不在租赁负债中确认，在触发当期计入当期损益。实务中，零售门店租赁的营业额租金具\"取决于业绩\"的特征，不计入租赁负债。个人理解，供参考。","cat":"租赁","kw":"租赁,CAS 21,使用权资产,租赁负债","std_ref":"企业会计准则第21号——租赁","src":"会计准则委员会 准则实施问答"},{"id":"CY0041","q":"融资租赁","a":"这类租赁公司并不控制汽车，⽽是单纯提供融资服务，汽车是提供融资的抵押物。 因此，应当以代个⼈⽀付的购车款作为向个⼈提供的融资，借记长期应收款（或应收租赁款），后续确认利息收 ⼊。对汽车不应⼊账，当然也就不涉及对汽车计提折旧和租赁期满时转让所有权的会计处理。 提问⼈：圣媛 时间：2024-02-22 15:23:59 汽车是公司购⼊的资产，汽车的所有权属于公司。购⼊汽车时，请问汽车计⼊哪个科⽬？ 回答⼈：chenyiwei 汽车是公司向个⼈提供融资的抵押物，不确认为本企业的资产，只是把代个⼈⽀付的购车款确认为发放贷款及垫款。个人理解，供参考。","cat":"租赁","kw":"租赁","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3976","q":"租赁变更（如扩租、缩租、提前终止）的处理？\"","a":"租赁变更分四种情况：①追加租赁（如增加面积）且价格反映单独租赁->单独确认；②减少面积且价格不调整->重新计量租赁负债、调整使用权资产（差额计入当期损益）；③变更后续租金在变更生效日按修订后折现率重新计量；④变更导致租赁期缩短->终止确认部分使用权资产和租赁负债（差额计入当期损益）。租赁变更导致租赁分类变更的，需自变更生效日起重新评估。个人理解，供参考。","cat":"租赁","kw":"租赁,CAS 21,使用权资产,租赁负债,终止确认","std_ref":"企业会计准则第21号——租赁","src":"财政部会计司 企业会计准则应用指南"},{"id":"CY0051","q":"16号解释追溯调整问题","a":"递延所得税资产、负债确认的基础是存在暂时性差异。⽽如果执⾏新租赁准则时采⽤“不完全追溯调整法”，则意味着只有⾸次执⾏⽇之后才确认使⽤权资产和租赁负债（此前的各时点和期间不调整），也就是在⾸次执⾏⽇之前 （例如2021.1.1之前）不存在暂时性差异，相应地也就不应确认递延所得税资产和负债。 同理，针对弃置义务中递延所得税资产、负债的确认和计量，也是与就弃置义务确认预计负债并对应调整固定资产账⾯价值的⽅式有关。由于固定资产弃置费⽤的会计处理政策⾃2007年执⾏企业会计准则以来未发⽣变化，因此现在编制财务报表时，通常整个报告期以及最早⽐较期间期初都执⾏企业会计准则下对弃置费⽤确认预计负债并调整固定资产账⾯价值的规定，相应地对递延所得税的影响也要追溯到最早报告期期初。个人理解，供参考。","cat":"租赁","kw":"租赁,所得税,递延,预计负债,固定资产","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3974","q":"售后租回交易的会计处理？\"","a":"售后租回交易分两步骤：①判断资产转让是否构成销售——核心标准是CAS 14的\"控制权转移\"原则，即买方-出租人是否取得了对资产的控制权并能主导其使用和获益；②转让构成销售->卖方-承租人确认资产处置损益（仅确认归属于购买方的份额）、按租赁负债确认租回部分、确认使用权资产；③转让不构成销售->按融资安排处理——不终止确认资产，收到的现金作为金融负债。新准则下，售后租回的交易价格需按公允价值调整后确认，防止虚增资产处置收益。个人理解，供参考。","cat":"租赁","kw":"租赁,CAS 21,使用权资产,租赁负债,CAS 14,公允价值,终止确认","std_ref":"企业会计准则第21号——租赁、企业会计准则第14号——收入","src":"会计准则委员会 准则实施问答"},{"id":"3973","q":"新租赁准则下短期租赁和低价值资产租赁的豁免条件？\"","a":"CAS 21（2018）允许两项简化豁免：①短期租赁——租赁期不超过12个月（含续租选择权的影响）->租金在租赁期内按直线法计入当期损益；②低价值资产租赁——全新资产价值较低的租赁（如IT设备、办公家具）->同上处理。豁免条件的注意事项：短期租赁不含购买选择权、低价值按资产全新价值判断（每个资产绝对值而非租赁资产组总价值）。存在关联方租赁时，需格外关注豁免条件的适用合理性。个人理解，供参考。","cat":"租赁","kw":"租赁,CAS 21,使用权资产,租赁负债,企业会计准则第21号——租赁,资产组,关联方","std_ref":"企业会计准则第21号——租赁","src":"财政部会计司 企业会计准则应用指南"},{"id":"3972","q":"合并报表层面积压未分配利润的处理？\"","a":"①子公司设立后盈余->归母部分计入合并报表\"归属于母公司股东权益\"的留存收益，少数部分计入\"少数股东权益\"；②购买日前的子公司的盈余->在合并报表中属于购买法下重估值后的组成部分，不予保留为留存收益（被购买日公允价值吞没）；③子公司期后提取盈余公积->合并层面保留盈余公积（归母部分）。特殊关注：同一控制下合并需将合并前子公司盈余追溯至比较期报表中。个人理解，供参考。","cat":"合并报表","kw":"合并报表,CAS 33,抵销,少数股东,控制权,合并,未分配利润,公允价值,留存收益,子公司,母公司,控制,追溯","std_ref":"企业会计准则第33号——合并财务报表","src":"深圳证券交易所 会计监管动态"},{"id":"3971","q":"合并报表与单体报表中同一控制下长投计量的差异？\"","a":"同一控制下企业合并的长投计量在单体/合并报表中的差异：①单体报表——长投初始成本=合并日被合并方净资产账面价值×合并比例（不确认商誉）；②合并报表——合并对价与净资产账面价值的差额调整资本公积。差异在于：单体报表仅限于长投本身，合并报表需要将差额处理至权益。本质上两者都不产生损益，但单体报表和合并报表的呈现方式不同。个人理解，供参考。","cat":"合并报表","kw":"合并报表,CAS 33,抵销,少数股东,控制权,合并,控制,账面价值,资本公积,商誉","std_ref":"企业会计准则第33号——合并财务报表","src":"上海证券交易所 会计监管动态"},{"id":"3970","q":"被动稀释（子公司增资而丧失控制权）处理？\"","a":"子公司其他股东增资导致母公司持股比例下降而丧失控制权的处理：①属于权益交易（母公司作为被动方）；②收到的增资款分配给母公司的份额是否构成处置对价——如增资所得归子公司（控股）则不构成处置对价；③母公司剩余权益按丧失控制权日公允价值重新计量；④差额计入投资收益。若未丧失控制权（仍持有50%以上），则差额调整资本公积。个人理解，供参考。","cat":"合并报表","kw":"合并报表,CAS 33,抵销,少数股东,控制权,子公司,控制,稀释,公允价值,投资收益,资本公积,控股,母公司","std_ref":"企业会计准则第33号——合并财务报表","src":"中国证监会 会计监管工作通讯"},{"id":"3969","q":"合并报表中少数股东损益的列报位置和计算？\"","a":"合并利润表中\"少数股东损益\"是净利润的组成部分（不在\"净利润\"之上单独列示），归属于母公司股东的净利润=合并净利润-少数股东损益。计算少数股东损益时需注意：①子公司在当期确认的净利润×少数股东比例；②调整：逆流交易未实现损益的少数股东份额（先计算抵销后净额再分）；③优先股股利（如子公司发行了列为权益的优先股）应扣除后再计算。个人理解，供参考。","cat":"合并报表","kw":"合并报表,CAS 33,抵销,少数股东,控制权,合并,子公司,母公司,股利","std_ref":"企业会计准则第33号——合并财务报表","src":"上海证券交易所 会计监管动态"},{"id":"CY0001","q":"本期收到应归属于原股东的补助如何进⾏会计处理","a":"对于这类情况，由于“2021年及2022年的税返应为原股东享有，在A实际收到税返并扣税后应返还原股东”是在股权收购时⼀并约定的⼀揽⼦交易，所以在A公司（被收购⽅）层⾯视为⼀项对原股东的利润分配（或者也可以视为对新股东即本公司的利润分配，由本公司转交给原股东）。 本公司（收购⽅）在编制合并报表时，可在购买⽇将很可能收到的政府补助款项确认为应收款，同时挂对原股东的应付款，两边同时挂账，不影响被收购⽅的可辨认净资产。在合并报表中，后续收到补助款时不再确认为合并集团的其他收益，⽽是通过往来科⽬核算。个人理解，供参考。","cat":"合并报表","kw":"合并","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3967","q":"合并报表中的未实现内部交易损益抵销原则？\"","a":"内部交易抵销的一般原则：①逆流交易（子公司向母公司销售）->未实现损益归少数股东的部分需减少少数股东权益和少数股东损益；②顺流交易（母公司向子公司销售）->未实现损益100%归母公司（不涉及少数股东）；③侧流交易（子公司之间）->类似逆流交易处理。抵销的总原则是消除内部交易对合并报表的影响，还原为单体层面各独立实体对外部交易的实质。个人理解，供参考。","cat":"合并报表","kw":"合并报表,CAS 33,抵销,少数股东,控制权,合并,子公司,母公司","std_ref":"企业会计准则第33号——合并财务报表","src":"深圳证券交易所 会计监管动态"},{"id":"CY0013","q":"⾮同⼀控长期股权投资评估增值","a":"理论上，在A公司合并报表层⾯，相当于新取得了⼀项对联营企业（⼄公司）的长期股权投资，应按照《企业会计准则第2号——长期股权投资（2014年修订）》规定的权益法核算原则，通过资产评估或者其他适当⽅法确定⼄公 司各项可辨认资产和负债在购买⽇的公允价值，后续以该公允价值为基础对⼄公司的损益进⾏调整，以调整后的报表进⾏权益法核算。 如果上述做法不切实可⾏的，则可以基于重要性原则，仅针对少数评估增值较⼤的资产项⽬重新确定购买⽇公允价值，其他增值较⼩的资产仍延续甲公司账⾯的处理⽅式。个人理解，供参考。","cat":"合并报表","kw":"公允价值,合并,权益法","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0015","q":"会计估计","a":"理论上，在合并报表和权益法核算中，都只是要求统⼀会计政策，⽽不要求统⼀会计估计。如果母⼦公司（或者投资⽅与被投资⽅）所处⾏业不同，资产类型和使⽤⽅式不同，则其采⽤不同的与固定资产折旧相关的会计估计是合理的，强⾏统⼀反⽽不合理。 如果被投资⽅的会计估计明显不符合其实际情况，或者与⾏业惯例存在重⼤差异，则应考虑是否需对其报表进⾏差 错更正，以更正后的报表为依据纳⼊合并或者进⾏权益法核算。个人理解，供参考。","cat":"合并报表","kw":"合并,权益法,固定资产","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3964","q":"少数股东权益的初始计量方法及选择？\"","a":"非同一控制下的少数股东权益计量有两种方法：①部分商誉法——少数股东权益=被购买方可辨认净资产公允价值×少数股东持股比例（不确认少数股东的商誉）；②完全商誉法——少数股东权益按公允价值计量（商誉含少数股东份额）。两种方法的选择属于准则允许的会计政策选择，影响初始确认商誉的大小和后续少数股东权益的金额。实务中多数中国企业采用部分商誉法。个人理解，供参考。","cat":"合并报表","kw":"合并报表,CAS 33,抵销,少数股东,控制权,公允价值,会计政策,控制,商誉","std_ref":"企业会计准则第33号——合并财务报表","src":"深圳证券交易所 会计监管动态"},{"id":"3963","q":"联营企业变为子公司（获得控制权）——分步合并的处理？\"","a":"联营企业变为子公司属于分步实现的企业合并：①原联营权益按购买日公允价值重新计量，差额计入投资收益；②先前以权益法核算联营企业期间计入OCI的份额->转入当期损益（按处置基础）；③购买日合并对价=原权益公允价值+新增对价，合并报表自购买日起纳入子公司；④确认商誉。个人理解，供参考。","cat":"合并报表","kw":"合并报表,CAS 33,抵销,少数股东,控制权,合并,子公司,控制,联营,公允价值,投资收益,商誉","std_ref":"企业会计准则第33号——合并财务报表、企业会计准则第2号——长期股权投资","src":"中国证监会 会计监管工作通讯"},{"id":"3962","q":"子公司变为合营企业（从合并->合营）的会计处理？\"","a":"子公司变为合营企业属于丧失控制权情形，处理同上述\"子公司->联营企业\"：①剩余股权（合营权益）按丧失控制权日公允价值重新计量，差额计入投资收益；②终止确认子公司全部资产负债和商誉；③原OCI按模拟处置法处理。差异在于：丧失控制权后对合营企业按权益法或比例合并法核算（视会计政策）。个人理解，供参考。","cat":"合并报表","kw":"合并报表,CAS 33,抵销,少数股东,控制权,合并,子公司,合营,公允价值,投资收益,会计政策,控制,联营,终止确认,商誉","std_ref":"企业会计准则第33号——合并财务报表、企业会计准则第2号——长期股权投资","src":"财政部 企业会计准则解释公告"},{"id":"3961","q":"子公司变为联营企业（丧失控制权）的会计处理？\"","a":"母公司丧失对子公司的控制权（由合并->不合并）的处理步骤：①剩余股权按丧失控制权日的公允价值重新计量，差额计入投资收益；②终止确认该子公司的全部资产、负债、商誉和少数股东权益（原权益法下处置时需按比例转出相关部分）；③与该子公司相关的其他综合收益按\"模拟处置\"方式结转（转入损益或留存收益）。处置对价+剩余股权公允价值-原账面份额->投资收益。个人理解，供参考。","cat":"合并报表","kw":"合并报表,CAS 33,抵销,少数股东,控制权,其他综合收益,子公司,控制,联营,公允价值,投资收益,留存收益,合并,母公司,终止确认,商誉","std_ref":"企业会计准则第33号——合并财务报表、企业会计准则第2号——长期股权投资","src":"中国证监会 会计监管工作通讯"},{"id":"CY0017","q":"在A公司合并报表层⾯，应参照或有对价的处理原则，将B公司所收到的补偿款按⽐例（51）归属于本企业的部分确认为或有对价损益（不可直接抵减B公司针对存货计提的跌价损失），归属于少数股东的部分直接增加少数股东权益，⽽不是先增加少数股东损益再转⼊少数股东权益。","a":"主体不同。存货减值的主体是B公司⾃⾝；补偿交易是发⽣于新⽼股东之间，与B公司实质上⽆关。个人理解，供参考。","cat":"合并报表","kw":"减值,合并,少数股东","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3959","q":"投资性主体（如私募基金）的合并豁免条件？\"","a":"CAS 33对符合\"投资性主体\"条件的母公司给予合并豁免：①向投资者提供投资管理服务；②以公允价值为基础计量和评价其投资；③唯一经营目的是通过资本增值、投资收益或两者兼有获取回报。符合条件的投资性主体——其所有子公司（除提供管理服务的子公司外）均按FVTPL计量而非纳入合并范围。不符合任一条件即不能再享受豁免。个人理解，供参考。","cat":"合并报表","kw":"合并报表,CAS 33,抵销,少数股东,控制权,合并,公允价值,投资收益,子公司,母公司","std_ref":"企业会计准则第33号——合并财务报表","src":"中国证监会 会计监管工作通讯"},{"id":"CY0019","q":"同控下企业留存收益恢复相关问题","a":"可以这样理解。当被合并⽅的合并⽇留存收益为负数时，恢复留存收益的结果是使得合并报表层⾯的归母留存收益减少，同时资本公积增加。 理论上，如果收购的股权⽐例为100%，且均从最终控制⽅控制范围内收购，则在最终合并结果中，是将被合并⽅的实收资本转⼊资本公积，再将被收购⽅的留存收益余额（⽆论正负）并⼊合并报表的未分配利润。个人理解，供参考。","cat":"合并报表","kw":"合并","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3957","q":"企业合并后购买方和出售方的过渡期损益归属？\"","a":"过渡期损益（购买日与协议签订日之间的损益）的归属由合并协议约定，会计处理取决于实质：①过渡期损益归购买方->调整合并成本（减少对价->新增廉价购买或减少商誉；增加对价->增加商誉）；②过渡期损益归出售方->不影响合并成本，购买日合并报表只需反映购买日的净资产。两者对合并成本和商誉的影响完全不同，需在尽职调查阶段明确约定。个人理解，供参考。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,合并,商誉","std_ref":"企业会计准则第20号——企业合并","src":"中国证监会 会计监管工作通讯"},{"id":"3956","q":"企业合并中获得的递延所得税资产如何处理？\"","a":"购买日确认递延所得税资产的条件：①被购买方有可抵扣暂时性差异或可抵扣亏损且很可能获得未来应纳税所得额；②购买方在购买日重新评估确认条件的满足情况（而非沿用被购买方原判断）。在计量期内（12个月）获得的新信息导致确认的可抵扣亏损价值低于原估->同时增加商誉。这体现了购买日公允价值计量的原则——而非照搬被购买方原有账务。个人理解，供参考。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,递延所得税资产,合并,所得税,公允价值,暂时性差异,商誉","std_ref":"企业会计准则第20号——企业合并、企业会计准则第18号——所得税","src":"中国证监会 会计监管工作通讯"},{"id":"3955","q":"企业合并相关费用的会计处理差异？\"","a":"企业合并直接相关费用（如法律、评估、咨询等中介费用）的处理差异显著：①非同一控制下企业合并->费用化，计入当期损益（管理费用）；②同一控制下企业合并->费用化（同样不计入合并成本）。但请注意：发行权益工具的发行费用->冲减资本公积；发行债务的发行费用->调整债务初始成本（计入摊余成本）。这是很多企业容易混淆的知识点。个人理解，供参考。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,合并,摊余成本,资本公积,控制,费用化","std_ref":"企业会计准则第20号——企业合并","src":"上海证券交易所 会计监管动态"},{"id":"3954","q":"购买日前持有的被购买方权益的计量？\"","a":"分步实现合并时，购买日前持有的权益按购买日公允价值重新计量：①先前作为FVOCI权益工具->累计OCI转入留存收益（不转入损益）；②先前作为长投权益法核算->投资收益=购买日公允价值-原账面价值，之前计入OCI的权益法变动按处置基础处理；③先前作为交易性金融资产->投资收益=购买日公允价值-最近资产负债表日公允价值。购买日前的其他综合收益处理取决于之前权益的分类。个人理解，供参考。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,其他综合收益,公允价值,账面价值,投资收益,留存收益,合并","std_ref":"企业会计准则第20号——企业合并、企业会计准则第2号——长期股权投资","src":"深圳证券交易所 会计监管动态"},{"id":"3953","q":"不构成业务的反向收购的会计处理？\"","a":"企业合并的定义以是否构成\"业务\"为前提。若被购买方不构成业务（仅为空壳或资产组，无投入+过程+产出的完整组合）：①不属于企业合并，不确认商誉和廉价购买损益；②按购买资产处理——以对价公允价值在各可辨认资产/负债间分摊（按相对公允价值比例）；③无商誉产生。此点在美国SPAC合并上市中尤其重要：若目标公司不构成业务，则按资产收购处理。个人理解，供参考。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,收购,公允价值,合并,商誉,资产组","std_ref":"企业会计准则第20号——企业合并、企业会计准则第8号——资产减值","src":"中国证监会 会计监管工作通讯"},{"id":"3952","q":"被购买方原有商誉的处理？\"","a":"非同一控制下企业合并中，被购买方账面的原有商誉不确认为可辨认资产（因为商誉不可辨认），因此不计入取得净资产公允价值中。换言之，被购买方原有商誉不结转至合并报表，而是随被购买方净资产一同重新计量。合并后新产生的商誉=合并成本-（可辨认净资产公允价值+单独确认的无形资产等）×取得比例。个人理解，供参考。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,商誉,公允价值,合并,控制","std_ref":"企业会计准则第20号——企业合并","src":"中国证监会 会计监管工作通讯"},{"id":"3951","q":"吸收合并和新设合并的会计处理区别？\"","a":"吸收合并（A+B=A'）：被合并方（B）注销法人资格，合并方（A）接收其全部资产负债，合并报表继续编制；新设合并（A+B=C）：双方均注销法人资格，新设公司C承接全部资产负债。会计处理上：①吸收合并——合并方按购买法或权益结合法（同控下）处理，被合并方清算；②新设合并——类似反向收购思路，确定\"会计上的购买方\"按购买法处理。注意税务影响，特别是享受税收优惠的条件差异。个人理解，供参考。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,合并,收购","std_ref":"企业会计准则第20号——企业合并","src":"中国证监会 会计监管工作通讯"},{"id":"3950","q":"企业合并中购买日与交割日不一致的处理？\"","a":"购买日是企业获取对被购买方控制权的日期（通常为工商变更、董事会改组等控制权转移日），交割日是支付对价的日期。购买日与被购买方可辨认净资产公允价值的计量以购买日为基准，不受交割日影响。如果购买日至交割日间较长的，购买对价需折现。实务中：股权的\"付款日\"与\"控制权转移日\"往往不同步，以控制权转移日为购买日。个人理解，供参考。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,合并,公允价值,控制","std_ref":"企业会计准则第20号——企业合并","src":"中国证监会 会计监管工作通讯"},{"id":"3949","q":"同一控制下企业合并的合并对价差额处理？\"","a":"同一控制下企业合并（下称\"同控合并\"）的合并对价与取得净资产账面价值的差额依次调整：①资本公积（资本溢价或股本溢价）；②资本公积不足冲减->冲减留存收益。不能在利润表中确认损益（这与非同控合并截然不同，后者可将廉价购买差额计入损益）。注意：同控合并需追溯调整比较期报表，视同合并后主体一直存在。个人理解，供参考。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,合并,控制,账面价值,资本公积,留存收益,追溯调整,追溯","std_ref":"企业会计准则第20号——企业合并","src":"中国证监会 会计监管工作通讯"},{"id":"3948","q":"购买日后12个月内获得新信息的调整（计量期调整）？\"","a":"购买日后12个月内（计量期），如获得关于购买日已存在情况的新信息，可追溯调整购买日确认的金额：包括资产/负债公允价值、或有对价、商誉等。12个月后仅可更正错误（按前期差错处理），不再按计量期调整。重要体会：企业需在购买日后积极收集信息，如评估报告延迟、诉讼结果等，确保及时获得完整准确数据。时效性要求严格，12个月后调整空间很小。个人理解，供参考。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,公允价值,前期差错,追溯调整,商誉,追溯","std_ref":"企业会计准则第20号——企业合并","src":"深圳证券交易所 会计监管动态"},{"id":"3947","q":"企业合并中取得的无形资产如何单独确认？\"","a":"购买方应单独确认符合可辨认性标准（合同-法律标准或可分离标准）的无形资产，即使被购买方未在账面确认。常见可单独确认的无形资产：商标、客户关系、非竞争协议、技术专利、订购合同、特许经营权等。估值方法：超额收益法（如对客户关系）、免版税费法（如对商标）。无法可靠计量的无形资产不应单独确认而并入商誉。个人理解，供参考。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,合并,商誉","std_ref":"企业会计准则第20号——企业合并","src":"中国证监会 会计监管工作通讯"},{"id":"3946","q":"廉价购买（负商誉）的确认和计量？\"","a":"合并成本小于取得的可辨认净资产公允价值份额时产生廉价购买（负商誉）：①需首先重新评估是否遗漏了可辨认资产/负债；②再次确认购买对价和公允价值计量是否准确；③复核后差额仍存在->直接计入当期损益（营业外收入）。产生廉价购买的情形：困境企业收购、有重大瑕疵的资产组购买、卖方急于出售等。需特别谨慎：不可人为压低公允价值来制造廉价购买的假象。个人理解，供参考。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,商誉,公允价值,营业外收入,合并,收购,资产组","std_ref":"企业会计准则第20号——企业合并、企业会计准则第8号——资产减值","src":"深圳证券交易所 会计监管动态"},{"id":"3945","q":"企业合并中的或有对价如何处理？\"","a":"购买方应将或有对价按购买日公允价值计入合并成本（而非待确定后再确认）。后续计量分四类：①分类为权益工具->不重新计量，结算时调整权益；②分类为金融资产/负债（满足金融工具定义）->按公允价值重新计量，变动计入损益；③属于职工薪酬->按CAS 9处理；④不属于以上三类->作为或有事项处理。实务中，业绩补偿承诺（Earn-out）是最常见的或有对价形式，通常归类为金融负债并按公允价值计量。个人理解，供参考。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,CAS 9,Earn-out,合并,公允价值,业绩补偿,职工薪酬","std_ref":"企业会计准则第20号——企业合并、企业会计准则第9号——职工薪酬","src":"深圳证券交易所 会计监管动态"},{"id":"3944","q":"反向购买的会计处理要点？\"","a":"反向购买（又称反向并购）的会计处理要点：①法律上母公司为会计上被购买方，法律上子公司为会计上购买方；②合并成本=法律上母公司为取得法律上子公司控制权而发行的权益工具在购买日的公允价值；③合并报表中资产、负债=法律上子公司（会计购买方）的账面价值+法律上母公司（会计被购买方）可辨认资产/负债的公允价值；④权益结构反映会计上购买方（法律子公司）的权益。反向购买下不确认商誉（除非法律母公司构成业务）。个人理解，供参考。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,反向购买,公允价值,账面价值,合并,并购,子公司,母公司,控制,商誉","std_ref":"企业会计准则第20号——企业合并","src":"深圳证券交易所 会计监管动态"},{"id":"CY0006","q":"⼦公司注销后商誉处理","a":"理论上，资产组内的资产（此处仅指⾮流动⾮⾦融资产，即《企业会计准则第8号——资产减值》规范的资产，下 同）处置时，应按⽐例分摊商誉予以转出，但实务中可能难以做到，尤其是难以区分正常的资产更新和资产处置的情况下。如果⼀个资产组内的资产是分散处置的，则更难以合理确定商誉的对应转出⾦额，故此时的做法⼀般是对该资产组对应的商誉计提减值，⽽不是直接转销商誉。到确定该资产组或资产组组合内的所有主要资产均已处置完毕，再将商誉予以转销处理。个人理解，供参考。","cat":"企业合并","kw":"商誉,减值","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3942","q":"可回售工具（如开放式基金份额）的分类？\"","a":"CAS 37对可回售工具的分类有特殊规定：虽然持有人有权回售（形式上属于金融负债），但如同时满足下列条件可分类为权益：①持有人按比例享有净资产；②该工具从属于所有其他工具类别；③所有工具具有相同特征；④现金流量仅基于净利润或净资产变动。开放式基金的基金份额即典型例子——持有人可随时赎回，但符合条件的可以作为权益工具。个人理解，供参考。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,CAS 37","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报","src":"中国注册会计师协会 专业技术指导"},{"id":"3941","q":"金融工具的列报——流动性与偿付能力的区分？\"","a":"资产负债表中的流动性判断依据：①预期在资产负债表日后12个月内结算->流动；②反之->非流动。但对衍生金融工具：作为交易性资产/负债通常列为流动。特定情形：企业可否在12个月后将负债展期取决于是否有自行决定的延期权——有则列为非流动，无则流动。此外，资产负债表日后发生的再融资、债务展期不影响资产负债表日的分类。个人理解，供参考。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,期权","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报","src":"中国注册会计师协会 专业技术指导"},{"id":"CY0254","q":"求助陈版，关于可转债实际利率的问题。","a":"由于可转债的负债部分属于以摊余成本计量的⾦融负债，故⼀旦实际利率确定，后续就不再调整。摊余成本计量的结果不等于当前公允价值。个人理解，供参考。","cat":"金融工具","kw":"公允价值","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3939","q":"财务担保合同的会计处理？\"","a":"CAS 22规定财务担保合同的初始确认按公允价值计量，后续计量取下述两者孰高：①按CAS 22计提减值（ECL）；②初始确认金额减去按CAS 14累计摊销的金额。如企业为关联方提供担保，通常因无市场对价需以ECL计量，可能产生大额信用减值损失。此外，财务担保合同可能构成或有负债（CAS 13），需同时在报表附注中披露。个人理解，供参考。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,CAS 14,CAS 13,信用减值损失,企业会计准则第13号——或有事项,ECL,摊销,关联方","std_ref":"企业会计准则第13号——或有事项","src":"会计准则委员会 准则实施问答"},{"id":"3938","q":"金融工具的初始计量——交易费用如何处理？\"","a":"金融工具的初始计量原则：①以公允价值计量且其变动计入当期损益的金融资产/负债——交易费用直接计入当期损益；②其他类金融资产/负债（AC、FVOCI）——交易费用计入初始成本。权益工具投资的交易费用计入初始成本（包括被指定为FVOCI的）。但内部管理过程中产生的费用（如内部分析、差旅等）不属于可直接归属的交易费用，应费用化。个人理解，供参考。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,费用化","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报","src":"上海证券交易所 会计监管动态"},{"id":"3937","q":"以摊余成本计量的金融资产减值后如何转回？\"","a":"AC类金融资产确认的信用减值损失可以转回，但转回后账面价值不得超过未计提减值时的摊销成本（即按实际利率计算的摊余成本上限）。转回计入当期损益。同样，FVOCI债务工具的减值转回也计入当期损益（FVOCI权益工具不涉及减值）。而FVTPL类不需单独计提减值（公允价值变动已包含减值影响）。个人理解，供参考。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,信用减值损失,账面价值,摊销","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报","src":"财政部会计司 企业会计准则应用指南"},{"id":"CY0309","q":"收⼊确认时点问题","a":"该事项属于⾦融⼯具准则的规范范围，不适⽤收⼊准则。如果该应收账款属于以摊余成本计量的⾦融资产，则其利息应在持有期间内，按实际利率法确认利息收⼊。个人理解，供参考。","cat":"金融工具","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3935","q":"利率互换套期的会计处理？\"","a":"利率互换的套期会计（公允价值套期）：①被套期项目以摊余成本计量时，将套期工具的公允价值变动即期部分计入当期损益；②对已存在的固定利率负债进行公允价值套期时，将套期工具有效部分的公允价值变动调整被套期负债的账面价值（净额结算），无效部分计入当期损益。采用套期会计需满足指定、文档化、有效性评估等严格条件。现金流量套期下，套期工具有效部分计入其他综合收益。个人理解，供参考。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,其他综合收益,套期,账面价值,套期会计","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报","src":"会计准则委员会 准则实施问答"},{"id":"3934","q":"财务报表中交易性金融资产和其他权益工具投资如何列报？\"","a":"资产负债表列报差异：①交易性金融资产——列示在流动资产或非流动资产项下（根据预期持有期限）；②其他权益工具投资（FVOCI）——通常列为非流动资产（长期战略投资）。损益表差异：①交易性金融资产的公允价值变动计入当期损益；②其他权益工具投资的公允价值变动计入其他综合收益、股利收入计入投资收益。投资者关系实务常将\"其他权益工具投资\"称为\"FVTOCI权益\"。个人理解，供参考。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,其他综合收益,投资收益,股利","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报","src":"财政部会计司 企业会计准则应用指南"},{"id":"3933","q":"已发生信用减值的金融资产的利息收入如何计算？\"","a":"已发生信用减值（阶段三）的金融资产，利息收入=摊余成本×实际利率（而非账面余额×实际利率）。摊余成本=账面余额-累计计提的信用减值准备。这意味着减值准备会减少利息收入的基数，而阶段一和阶段二的利息收入则仍按账面余额计算。这个差异会导致损益表中利息收入在阶段转换时出现\"断崖\"。个人理解，供参考。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报","src":"财政部会计司 企业会计准则应用指南"},{"id":"3932","q":"与权益挂钩的衍生工具的会计处理？\"","a":"以自身权益工具结算的衍生工具分类：①总是以固定数量换固定金额（固定换固定）->权益；②涉及可变数量->金融资产或金融负债（FVTPL）。如认股权证（warrants）在特定条件满足前不确定是否为\"固定换固定\"->先在FVTPL列示，待条件明确后再判断。实务中，对赌协议（VAM）中的业绩补偿条款往往导致衍生金融工具分类。个人理解，供参考。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,衍生工具,业绩补偿,对赌","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报、企业会计准则第20号——企业合并","src":"中国注册会计师协会 专业技术指导"},{"id":"3931","q":"永续债和优先股的会计分类？\"","a":"永续债和优先股的分类核心是判断是否形成交付现金的义务：①无固定到期日且发行人可无限期递延付息、无强制赎回条款->权益工具；②有固定到期日或强制付息条款->金融负债；③发行人拥有不可撤销的递延付息权且不累积->权益工具。实务中，金融负债和权益工具区分需审阅合同所有条款，包括结算选择权、交叉违约条款、银行担保等交叉条款的影响。个人理解，供参考。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报","src":"中国注册会计师协会 专业技术指导"},{"id":"3930","q":"合同现金流量特征（SPPI）测试的具体判断标准？\"","a":"SPPI测试的核心：合同现金流量是否仅代表\"本金+未偿付本金的利息\"。利息需反映基本借贷安排的对价（货币时间价值+信用风险+其他基本借贷风险+合理利润率）。不通过SPPI的情形：合同约定收益率与某种指数挂钩（非基准利率+利差）、包含杠杆特征、包含\"双轨利率\"（最低收益保证）。需要通过SPPI是划分为AC或FVOCI的前提条件。个人理解，供参考。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报","src":"会计准则委员会 准则实施问答"},{"id":"3929","q":"债务工具投资重分类条件及影响？\"","a":"CAS 22仅在企业改变管理金融资产的业务模式时才允许重分类（极少发生），会计处理采用未来适用法——自重分类日起按新类别处理，不追溯前期。分为6种重分类情形：AC->FVTPL、FVOCI->AC等，每种情形下的差额处理不同（或转入损益或转入OCI或调整账面价值）。值得注意的是，权益工具投资指定为FVOCI后不得重分类。个人理解，供参考。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,账面价值,未来适用法,追溯","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报","src":"财政部会计司 企业会计准则应用指南"},{"id":"3928","q":"预期信用损失模型下应收账款的简化方法？\"","a":"CAS 22允许对不含重大融资成分的应收账款采用简化方法：始终按整个存续期预期信用损失计量损失准备。实务中常用的应收账款减值矩阵法：①按账龄分组（未逾期、逾期1-30天、30-60天、60-90天、>90天等）；②统计各账龄组的历史迁徙率和损失率；③加入前瞻性信息调整；④将调整后的损失率乘以各组余额得到ECL。此方法简便有效，已为大量企业采用。个人理解，供参考。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,预期信用损失,企业会计准则第22号——金融工具确认和计量,信用损失,迁徙率,ECL","std_ref":"企业会计准则第22号——金融工具确认和计量","src":"中国注册会计师协会 专业技术指导"},{"id":"3927","q":"企业购买理财产品的会计处理和分类？\"","a":"理财产品分类取决于合同条款和投资性质：①保本固定收益型（合同现金流量SPPI测试通过）->以摊余成本计量或FVOCI；②非保本浮动收益型（SPPI测试不通过）->FVTPL；③结构性存款（嵌入衍生工具且与主合同不紧密相关）->通常整体作为FVTPL处理（但保本保最低收益的结构性存款可能拆分为AC+衍生工具）。期限在三个月以内的高流动性理财产品可列入\"交易性金融资产\"或根据业务模式列入其他类别。个人理解，供参考。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,衍生工具","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报","src":"财政部会计司 企业会计准则应用指南"},{"id":"3926","q":"金融负债和权益工具的区分标准？\"","a":"CAS 37规定了\"固定换固定\"原则：①必须以交付固定数量的自身权益工具结算的合同（无交付现金义务）->权益工具；②必须交付可变数量自身权益工具或包含交付现金义务->金融负债。实务中常见的争议：对赌协议（或有结算条款）、永续债的分类、合伙人份额约定等。应以合同条款实质而非法律形式判断。个人理解，供参考。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,CAS 37,对赌","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报、企业会计准则第20号——企业合并","src":"上海证券交易所 会计监管动态"},{"id":"3925","q":"其他权益工具投资（FVOCI-权益）的后续计量特点？\"","a":"指定为FVOCI的权益工具投资（不可撤销选择）的后续计量：①公允价值变动计入其他综合收益，不影响当期损益；②持有期间股利收入（清算性股利除外）计入当期损益；③处置时不得将OCI中的累计公允价值变动转入当期损益，而是直接转入留存收益；④无需计提减值。这种处理的目的在于避免企业通过选择处置时点来操纵利润。个人理解，供参考。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,其他综合收益,留存收益,股利","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报","src":"上海证券交易所 会计监管动态"},{"id":"CY0318","q":"关于⾮经中的⾦融企业定义问题","a":"个⼈理解：新版⾮经常性损益的解释性公告中的⾮经常性损益列举项⽬，有两处提到“⾮⾦融企业”： （三）除同公司正常经营业务相关的有效套期保值业务外,⾮⾦融企业持有⾦融资产和⾦融负债产⽣的公允价值变动损益以及处置⾦融资产和⾦融负债产⽣的损益； （四）计⼊当期损益的对⾮⾦融企业收取的资⾦占⽤费； ⽬前的融资租赁、商业保理等类⾦融业务，从事此类经营活动的企业，正常情况下取得的应收租赁款、应收保理款等都是以摊余成本计量的⾦融资产，较少持有以公允价值计量且其变动计⼊损益的⾦融资产；同时这些企业也不可以吸收存款。因此，这类类⾦融企业取得上述（三）中的收益，应认定为⾮经常性损益；但取得（四）中的收益， 如果是来源于应收租赁款或者保理融资款，则不属于⾮经常性损益。个人理解，供参考。","cat":"金融工具","kw":"公允价值,租赁","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3923","q":"金融资产转移（应收账款保理）终止确认的判断？\"","a":"应收账款保理是否终止确认的判断：①企业转移了几乎所有风险和报酬（无追索权保理）->终止确认；②企业保留了几乎所有风险和报酬（有追索权保理）->继续确认全部资产，收到的对价作为借款；③既未转移也未保留->判断是否放弃控制，放弃->终止确认；未放弃->按继续涉入程度确认相关资产和负债。实务中\"无追索权\"需经严格法律审查。个人理解，供参考。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,终止确认,控制,继续涉入","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报","src":"财政部会计司 企业会计准则应用指南"},{"id":"CY0647","q":"请教陈版有FVOCI的外币报表折算中的公允价值变动是否有勾稽关系","a":"会有这个问题。两者差额通过“其他综合收益——外币报表折算差额”来平衡。个人理解，供参考。","cat":"金融工具","kw":"公允价值","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3921","q":"预期信用损失率的估计方法和数据来源？\"","a":"ECL的估计需结合：①历史损失经验（按账龄分组统计）；②当前经济状况调整；③前瞻性信息（GDP增速、行业指数等宏观经济预测）。实务方法包括：迁徙率法（滚动率模型）、马尔可夫链法、损失率模型（区分重组的和非重组的）。企业需选择与业务规模匹配的方法，不得仅以\"未发生损失\"为由不计提ECL。个人理解，供参考。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,预期信用损失,企业会计准则第22号——金融工具确认和计量,信用损失,迁徙率,ECL","std_ref":"企业会计准则第22号——金融工具确认和计量","src":"财政部会计司 企业会计准则应用指南"},{"id":"3920","q":"预期信用损失模型（ECL）的三阶段法是什么？\"","a":"CAS 22引入预期信用损失模型取代原已发生损失模型，三阶段为：①阶段一（信用风险未显著增加）->按12个月ECL计提，利息收入按账面余额计算；②阶段二（信用风险显著增加但未减值）->按整个存续期ECL计提，利息收入仍按账面余额计算；③阶段三（已发生信用减值）->按整个存续期ECL计提，利息收入按摊余成本（扣减值后）计算。判断\"信用风险显著增加\"通常采用逾期30天作为可推翻的假设。个人理解，供参考。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,预期信用损失,企业会计准则第22号——金融工具确认和计量,信用损失,ECL","std_ref":"企业会计准则第22号——金融工具确认和计量","src":"会计准则委员会 准则实施问答"},{"id":"3919","q":"新金融工具准则下金融资产三分类的判断流程？\"","a":"CAS 22（2017）将金融资产从四分类简化为三分类，判断流程为：①合同现金流量是否仅为本金+利息（SPPI测试）->是则进入第②步，否则->以公允价值计量且其变动计入当期损益（FVTPL）；②业务模式是收取合同现金流量还是兼有出售（业务模式测试）->收取->以摊余成本计量（AC）；兼有->以公允价值计量且其变动计入其他综合收益（FVOCI）；其他->FVTPL。权益工具可指定为FVOCI（不可撤销，股利计入损益、处置不转入损益）。个人理解，供参考。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,其他综合收益,企业会计准则第22号——金融工具确认和计量,股利","std_ref":"企业会计准则第22号——金融工具确认和计量","src":"财政部会计司 企业会计准则应用指南"},{"id":"CY0002","q":"合同核算","a":"该项⽬类似于BOT或者PPP，即A委托B建造空调及新风系统，并提供运维服务。假设该系统建成后的使⽤寿命远 ⼤于10年，则： A公司应将合同约定的每年40万元服务费采⽤系统、合理的⽅式分解为两部分：（1）每年的运维服务费；（2）剩余部分为设备的回购款。拆分的要求是：（1）部分应可涵盖B公司每年的付现运维成本，并可使其获得合理的利 润；（2）部分采⽤适当的利率折现后，折现值应基本等于所购建的空调及新风系统的公允价值。 在此基础上，A公司应按（2）部分的折现值确认⼀项固定资产，对应贷记长期应付款。后续每年⽀付款项时，将 相当于（2）的部分抵减长期应付款；将相当于（1）的部分确认为各该年度的成本费⽤。对该项固定资产，在其⾃ ⾝可使⽤年限内计提折旧计⼊相关成本费⽤；同时对长期应付款按实际利率法确认利息⽀出并增加负债的账⾯价值。个人理解，供参考。","cat":"收入准则","kw":"公允价值,固定资产","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0003","q":"请教陈版，如何判断合同违约赔偿合同变更折扣？","a":"供应商愿意对剩余设备给予折扣的原因是因为其在交付过程中发⽣延迟，构成违约⾏为，因此事实上属于违约补偿。但其形式上体现为对剩余产品的价格给予折扣。对此问题的处理建议：个人理解，供参考。","cat":"收入准则","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3916","q":"客户已接受但尚未付款的商品的收入确认？\"","a":"已交付且客户已接受的商品通常满足控制权转移条件，可确认收入——即使尚未收款。应确认应收账款而非合同资产（此时收款权仅取决于时间流逝）。但应注意：如果合同中包含价格保护条款（如后续降价需退款），则属于可变对价，需估计并约束收入上限。个人理解，供参考。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14,控制","std_ref":"企业会计准则第14号——收入","src":"会计准则委员会 准则实施问答"},{"id":"3915","q":"新收入准则对完工百分比法的继承与变化？\"","a":"新准则用\"履约进度\"概念替代了原\"完工百分比\"表述，理念相似但有如下变化：①适用范围扩大至更多行业（不仅是建造业）；②履约进度的计量方法统一为产出法和投入法两种；③对无法合理确定进度的情况规定更严——只能按已发生成本确认收入（且限于预计可收回部分）；④新增了对不可替代商品按时段确认的条件。个人理解，供参考。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14","std_ref":"企业会计准则第14号——收入","src":"财政部 企业会计准则解释公告"},{"id":"3914","q":"附有回购义务的销售如何处理？\"","a":"回购安排分三种：①远期回购（企业有义务回购）->不确认收入，作为融资安排处理（商品不终止确认）；②看跌期权（客户有权要求企业回购）->判断客户是否有重大经济动因行使权利：有->融资安排，无->按附退回条款的销售处理；③看涨期权（企业有权回购）->同上。实务中关注：回购价格与市场价的比较、期权是否深度亏损。个人理解，供参考。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14,终止确认,期权,远期","std_ref":"企业会计准则第14号——收入","src":"财政部会计司 企业会计准则应用指南"},{"id":"CY0004","q":"⾮经损益认定","a":"对于政府补助界定为⾮经常性损益的情况，解释性公告1号的列举项⽬明确： （⼆）计⼊当期损益的政府补助，但与公司正常经营业务密切相关，符合国家政策规定、按照确定的标准享有、对公司损益产⽣持续影响的政府补助除外； 即，政府补助如不认定为⾮经常性损益的，则需同时满⾜此处所列的四项条件：与公司正常经营业务密切相关；符合国家政策规定；按照确定的标准享有；对公司损益产⽣持续影响。 对于其中可界定为经常性损益的“与公司正常经营业务密切相关，符合国家政策规定、按照确定的标准享有、对公司损益产⽣持续影响的政府补助”，在实务执⾏的过程则仍会有判断上的分歧。 对于此处“可不认定为⾮经常性损益的政府补助”应同时满⾜的四项条件的实务把握，我们建议： ①对于“符合国家政策规定”，在IPO项⽬中应由律师发表明确意见，我们应对此执⾏利⽤专家⼯作程序，必要时与提供该项补助的政府部门访谈。 ②“按照确定的标准享有”⼀般是指：该项补助所依据的应当是当地财政部门正式发布并按照《政府信息公开条例》的规定予以主动公开的财政扶持项⽬及其财政资⾦管理办法，且该管理办法应当是普惠性的（不论所有制和⾪属关系，任何符合规定条件的企业均可申请），⽽不是专门针对特定企业制定的，例如针对特定企业的“⼀事⼀议”性质的扶持不满⾜该条件。 ③“对公司损益产⽣持续影响”的标准，建议⾄少连续3年以上（含3年），即：与收益相关的政府补助⾄少保证可以连续取得3年以上；与资产相关的政府补助所形成的递延收益的摊销年限⾄少在3年以上。 ④如果因当地财⼒问题，⽆法保证按期⾜额拨付，只能按收付实现制原则确认收益的，则视为⽆法保证影响的持续性，应作为⾮经常性损益。 ⑤该项政府补助所计⼊的利润表项⽬不能是“营业外收⼊”，应当是“其他收益”或者冲减“营业利润”中的成本费⽤项 ⽬，否则⽆法证明其来源于“⽇常活动”。 上述原则同时适⽤于采⽤总额法和净额法核算的政府补助。个人理解，供参考。","cat":"收入准则","kw":"递延","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3912","q":"合同合并的条件及影响？\"","a":"CAS 14规定同时满足以下条件时应将多份合同合并为一份：①基于同一商业目的以一揽子方式签订；②其中一份合同的对价取决于另一份合同；③合同承诺的商品构成单一履约义务。合同合并影响的方面：交易价格确定、履约义务识别、收入确认模式。实务中需判断：多份合同是否实质上构成同一交易的不可分割部分。个人理解，供参考。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14,合并","std_ref":"企业会计准则第14号——收入","src":"上海证券交易所 会计监管动态"},{"id":"3911","q":"合同中同时包含多项履约义务时交易价格如何分摊？\"","a":"交易价格的分摊步骤：①识别合同中的所有履约义务；②确定各项履约义务的单独售价（优先使用可观察价格，无则采用市场评估法、预期成本加利润法或余值法估计）；③按单独售价的相对比例分摊交易价格；④分摊折扣（除非有证据表明折扣仅与某项特定义务相关）。特定情形下可变对价可能仅与某项履约义务相关。个人理解，供参考。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14","std_ref":"企业会计准则第14号——收入","src":"会计准则委员会 准则实施问答"},{"id":"3910","q":"PPP项目中建造方角色的收入确认？\"","a":"在PPP（政府和社会资本合作）项目中的会计处理分两种情况：①社会资本方建造基础设施（如道路、污水处理厂）->根据CAS 14确认建造收入（通常按时段确认）；②社会资本方提供运营服务->按服务期确认运营收入。实务中需关注：BOT安排中建造对价的形式（现金、金融资产、无形资产）、运营期维护义务是否构成单独履约义务。个人理解，供参考。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14,PPP,BOT","std_ref":"企业会计准则第14号——收入","src":"财政部会计司 企业会计准则应用指南"},{"id":"3909","q":"房地产企业预售业务的收入确认要点？\"","a":"新收入准则对房地产企业影响显著：①满足时段履约条件->在建造过程中按进度确认收入（需要客户可控制在建物业或不可替代且有权就已完成部分收款）；②不满足时段条件->在竣工交付时点确认收入。实务中多数住宅开发项目为时点确认，因为客户通常不能在建造中控制物业，且合同中往往允许客户在交付前仅收取违约金而非支付已完成部分价款。个人理解，供参考。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14,控制","std_ref":"企业会计准则第14号——收入","src":"上海证券交易所 会计监管动态"},{"id":"3908","q":"新收入准则下运输服务是否构成单独履约义务？\"","a":"运输服务是否构成单独履约义务的判断：①运输发生在商品控制权转移给客户之前->运输是履约活动而非单独履约义务，运输成本计入合同履约成本；②运输发生在控制权转移之后->运输构成单独履约义务，分摊交易价格单独确认收入。关键的判断点是控制权转移的时间节点。FOB交货方式下运输在控制权转移后，CIF下运输通常在控制权转移前。个人理解，供参考。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14,控制","std_ref":"企业会计准则第14号——收入","src":"会计准则委员会 准则实施问答"},{"id":"CY0011","q":"关于借款费⽤资本化问题","a":"由于“2018年11⽉与银⾏签订固定资产贷款合同，贷款仅限⽤于A项⽬”，但C部分⼀直处于停⼯状态，2019年B⼯程进⾏达到预计可使⽤状态，因此最多只能以取得贷款后⾄B部分预转固之⽇期间内B部分实际发⽣的⼯程⽀出为基 础，乘以该笔专门借款的利率确定该期间内可资本化的利息⾦额，且不超过该期间内该笔借款实际发⽣的利息总 额。超出部分的利息予以费⽤化处理。在该期间以外的期间内发⽣的利息⽀出也应当全部费⽤化。个人理解，供参考。","cat":"收入准则","kw":"固定资产","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3906","q":"委托代销（寄售）安排下的收入确认？\"","a":"委托代销（寄售）的判断标准：产品交付给经销商但企业仍保留控制权——不能确认收入。控制权转移的标志：①经销商向最终客户销售；②一定期间后未售出可退回。实务中关注：经销商是否承担存货滞销风险、是否有强制购买义务、定价限制的实质。原收入准则下的\"风险报酬转移\"概念基本上与新准则下的\"控制权转移\"重合。个人理解，供参考。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14,控制","std_ref":"企业会计准则第14号——收入","src":"财政部会计司 企业会计准则应用指南"},{"id":"CY0016","q":"请教陈版，委托代销能否扣除佣⾦后确认净额确认收⼊","a":"从会计技术⾓度，如果确认本企业是主要责任⼈，则本企业应以最终客户⽀付或应付的价款计量收⼊，同时将⽀付给代销商的佣⾦确认为销售费⽤。 以扣除⼿续费后的净额确认销售收⼊难度较⼤，除⾮是此类⼿续费⾦额不重⼤，基于重要性原则予以接受（但即使 ⾦额较⼩，鉴于此类事项较为敏感和风险较⾼，审计中仍需关注）。如果是IPO前的财务规范，还是建议尽可能通过规范的途径获得⼿续费和佣⾦的发票进⾏税前扣除。个人理解，供参考。","cat":"收入准则","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3904","q":"不同业务类型软件服务收入的确认差异？\"","a":"软件行业常见的收入模式：①永久许可+维护——许可证按时点确认，维护费按服务期分摊；②SaaS订阅——按服务期按月确认；③定制开发——按时段（投入法或产出法）确认；④混合模式——先识别各项履约义务，分别确认。关键的判断标准：客户是否能够控制软件运行并从中获益、是否需要持续更新。个人理解，供参考。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14,控制","std_ref":"企业会计准则第14号——收入","src":"财政部会计司 企业会计准则应用指南"},{"id":"3903","q":"总额法与净额法在电商平台场景下的应用？\"","a":"电商平台模式下主要责任人与代理人的判断要点：①商品交付前平台是否取得控制权（存货风险、定价权）；②平台是否承担主要履约责任（退换货、质量问题）；③平台是否承担信用风险（客户不付款时是否需向供应商付款）。平台通常满足\"控制->总额法\"，不满足->净额法。不同品类可能适用不同方法。个人理解，供参考。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14,控制","std_ref":"企业会计准则第14号——收入","src":"财政部 企业会计准则解释公告"},{"id":"3902","q":"附有客户额外购买选择权的销售（如积分奖励）？\"","a":"客户忠诚度计划中的积分、折扣券等属于重大权利时，应作为单独履约义务分摊交易价格。分摊方法：基于积分或折扣券的单独售价与已售商品的单独售价的相对比例。积分兑换时确认递延收入。未被兑换的积分（breakage）按客户行使的模式按比例确认收入。注意：普通的市场营销优惠不属于重大权利，无需单独分摊。个人理解，供参考。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14","std_ref":"企业会计准则第14号——收入","src":"会计准则委员会 准则实施问答"},{"id":"3901","q":"合同变更的三种类型及会计处理？\"","a":"CAS 14将合同变更分为三类：①作为单独合同（新增商品价格反映单独售价）->原合同不受影响，新合同独立核算；②原合同终止+新合同产生（新增商品不可分、价格不反映单独售价）->剩余商品与新增商品合并为新合同；③合同变更部分（新增商品与原商品可区分且价格反映单独售价但不可分）->作为原合同组成部分，追溯调整累计收入。个人理解，供参考。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14,追溯调整,合并,追溯","std_ref":"企业会计准则第14号——收入","src":"会计准则委员会 准则实施问答"},{"id":"3900","q":"工程建造合同中可变对价的处理方法？\"","a":"可变对价（如业绩奖励、按时完工奖金、处罚扣款）应按期望值或最可能金额中的更可靠者估计，计入交易价格。重要约束：累计已确认收入不能超过极可能不会发生重大转回的金额（收入上限）。每个资产负债表日应重新估计。实务中，新收入准则下建造合同的奖金/罚款条款对利润波动影响显著。个人理解，供参考。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14","std_ref":"企业会计准则第14号——收入","src":"财政部会计司 企业会计准则应用指南"},{"id":"3899","q":"知识产权许可的收入确认——按时点还是时段？\"","a":"CAS 14对知识产权许可区分两类处理：①承诺在许可有效期内持续从事对该知识产权产生重大影响的活动（如品牌持续推广）->在一段时间内确认收入；②许可期内无需持续介入->在时点确认。具体判断需考虑：许可性质（功能性vs象征性）、合同中是否包含持续支持义务、客户是否合理预期企业将进行重大影响的活动。软件许可通常是时点确认，品牌许可可能需要时段确认。个人理解，供参考。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14,重大影响","std_ref":"企业会计准则第14号——收入","src":"财政部 企业会计准则解释公告"},{"id":"3898","q":"附有销售退回条款的销售如何确认收入？\"","a":"CAS 14要求采用期望值法估计退货率：①确认收入时不包含预期退回商品对应的金额；②确认预计负债（退款义务）和应收退货成本（收回商品的权利）；③每个资产负债表日重新估计退货率并调整收入。实务中，历史退货率、行业惯例、季节性因素均应纳入估计模型。个人理解，供参考。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14,预计负债","std_ref":"企业会计准则第14号——收入","src":"会计准则委员会 准则实施问答"},{"id":"3897","q":"合同资产和应收账款的区别及列报？\"","a":"两者核心区别在于收款权利的条件：①应收账款——仅随时间流逝即可收款（无条件收款权）；②合同资产——收款权取决于企业是否完成其他履约义务（有条件收款权）。报表列报：合同资产需单独列示，并按照CAS 22进行减值测试。典型场景：已完工但未结算的建造合同款项、分期交付中已完成但待后续交付后才可收款的款项。个人理解，供参考。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14,CAS 22,减值测试","std_ref":"企业会计准则第14号——收入、企业会计准则第22号——金融工具确认和计量","src":"财政部会计司 企业会计准则应用指南"},{"id":"3896","q":"客户未行使的权利（储值卡余额）如何处理？\"","a":"CAS 14规定，企业收取的预收款应确认为合同负债。客户未行使的权利（如过期储值卡余额）：①如企业预期有权获得该金额->按客户行使权利的模式按比例确认收入；②否则，仅在客户要求履约的可能性极低时确认收入。实务中需关注：预收款是否可退还、法定时效规定、历史核销比例。个人理解，供参考。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14,合同负债","std_ref":"企业会计准则第14号——收入","src":"会计准则委员会 准则实施问答"},{"id":"3895","q":"附有质量保证条款的销售如何区分服务型质保和保证型质保？\"","a":"CAS 14将质量保证分为两类：①保证型质保——保证产品符合约定标准（如三包期内免费维修），作为预计负债处理（CAS 13）；②服务型质保——提供额外服务（如延保、增值服务），作为单独履约义务分摊交易价格并递延确认收入。判断标准：质保是否由法律规定、质保期限长短、企业是否承诺超出行业惯例的保障。个人理解，供参考。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14,CAS 13,企业会计准则第13号——或有事项,预计负债","std_ref":"企业会计准则第13号——或有事项","src":"财政部会计司 企业会计准则应用指南"},{"id":"3894","q":"新收入准则下主要责任人和代理人的判断标准？\"","a":"CAS 14规定，企业应根据在向客户转让商品前是否拥有对该商品的控制权来判断其身份：拥有控制权->主要责任人（总额确认收入）；无控制权->代理人（净额确认收入）。控制权的判断应综合考虑：①对商品承担主要责任；②承担存货风险；③有权自主决定价格。实务中，电商平台、旅行社、贸易代理等需逐合同分析。个人理解，供参考。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14,控制","std_ref":"企业会计准则第14号——收入","src":"财政部会计司 企业会计准则应用指南"},{"id":"3893","q":"资产负债表日后宣告分配的股利如何处理？","a":"企业在资产负债表日后、财务报告批准报出日前宣告分配的现金股利或利润，不属于资产负债表日后调整事项——资产负债表日不存在分配义务。因此不应在资产负债表日确认负债，只能在附注中披露。股票股利也同样处理——不调整报表金额，仅在附注披露。注意：这与证监会要求的'利润分配预案'披露要求是两个层面的问题。个人理解，供参考。","cat":"期后事项","kw":"期后事项,CAS 29,调整事项,非调整事项,股利,证监会,利润分配","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第29号——资产负债表日后事项"},{"id":"3892","q":"可转换债券对稀释每股收益的影响？","a":"计算稀释每股收益时，对可转换债券采用'假设转换法'：①假定可转债在期初（或发行日孰晚）已转换为普通股——增加分母（潜在普通股数量）；②将可转债的税后利息费用加回分子（归属于普通股股东的净利润）。若转换为反稀释（EPS反而增加），则不纳入计算。注意：转换价格低于平均市价时才具有稀释效应。个人理解，供参考。","cat":"每股收益","kw":"每股收益,CAS 34,基本每股收益,稀释每股收益,潜在普通股,稀释,反稀释","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第34号——每股收益"},{"id":"3891","q":"前期差错更正的追溯重述法？","a":"重要的前期差错应采用追溯重述法更正——视同该差错从未发生，重新列报前期比较财务报表。调整内容：①追溯重述差错发生期间的留存收益期初余额（及相关资产、负债项目）；②重述列报前期最早期初的留存收益。不重要的前期差错可直接调整发现当期损益。个人理解，供参考。","cat":"前期差错更正","kw":"前期差错,CAS 28,追溯重述,留存收益,追溯","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第28号——会计政策、会计估计变更和差错更正"},{"id":"3890","q":"新保险合同准则下保险合同如何分类？","a":"CAS 25（2020）改变了原来的分类方式：不再简单划分为寿险/非寿险。现在根据保险合同的特征和评估方法分为：①通用模型（BBA）—适用于大部分寿险合同；②保费分配法（PAA）—适用于保险期间不超过一年的短期合同或符合条件的简化处理；③浮动收费法（VFA）—适用于具有直接参与分红特征的合同。企业需按合同持有目的和分组评估适用方法。个人理解，供参考。","cat":"保险合同","kw":"保险合同,CAS 25,合同分组,履约现金流量,合同服务边际,分红","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第25号——保险合同"},{"id":"3889","q":"中期财务报告中季节性收入的确认？","a":"中期财务报告采用'独立观'（discrete view），将每个中期视为独立的报告期间。季节性、周期性或偶然性收入不应在年度内预提或递延——即不应在淡季估计旺季收入。特殊情形：如企业每年收到一笔年度服务费，应按服务履约进度在各中期分摊确认，而非在收到时一次确认。个人理解，供参考。","cat":"中期财务报告","kw":"中期财务报告,CAS 32,半年度报告,季度报告,审阅","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第32号——中期财务报告"},{"id":"3888","q":"经营分部如何确定？","a":"CAS 35要求以内部组织结构为基础确定经营分部——即企业定期向经营决策者报告、以分配资源和评价业绩的内部单位。确定经营分部的关键因素：①从事的经营活动能赚取收入和发生费用；②经营成果由经营决策者定期审阅；③有独立可获取的财务信息。如果公司按业务线和地区线两条维度管理，需选择其中一个作为分部基础。个人理解，供参考。","cat":"分部报告","kw":"分部报告,CAS 35,经营分部,报告分部","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第35号——分部报告"},{"id":"3887","q":"房地产企业新收入准则下可在一段时间内确认收入的条件？","a":"CAS 14规定，满足以下任一条件方可在一段时间内确认收入：①客户在企业履约的同时即取得并消耗履约利益；②客户能够控制履约过程中的在建商品；③产出的商品不可替代且企业有权就迄今已完成部分收取款项。房地产企业需逐项目分析：如客户按进度付款且合同规定不可替代→可按时段确认，否则在交付时点确认。个人理解，供参考。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14,控制","src":"财政部 企业会计准则解释公告","std_ref":"企业会计准则第14号——收入"},{"id":"CY0018","q":"同控下企业合并并表相关问题","a":"虽然约定“23年1-3⽉的利润是归购买⽅所有”，但卖⽅直到2023年3⽉底才丧失对⼦公司的控制权，故需合并到处置 ⽇。但主帖中的“⽅案⼀”也是有问题的。正确做法应当是：该标的公司在过渡期内的损益仍正常纳⼊卖⽅合并报 表，相应调整卖⽅的权益（⽽不是计⼊其他应付款）和该⼦公司的净资产在合并报表层⾯的账⾯价值。在处置⽇， 由于以同样的价格处置了较基准⽇更多（或更少）的净资产，故与基准⽇相⽐，相应减少（或增加）丧失对⼦公司控制权的损益。个人理解，供参考。","cat":"收入准则","kw":"控制权,合并","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0199","q":"投资性房地产公允价值计量问题？","a":"可以这样理解。这种情况不属于从其他房地产转换为投资性房地产。 《讲解2010》第四章：“采⽤公允价值模式对投资性房地产进⾏后续计量的企业，对于在建投资性房地产（包括企 业⾸次取得的在建投资性房地产），如果其公允价值⽆法可靠确定但预期该房地产完⼯后的公允价值能够持续可靠取得的，应当以成本计量该在建投资性房地产，其公允价值能够可靠计量时或完⼯后（两者孰早），再以公允价值计量。”此时⾸次公允价值计量时确定的公允价值与原成本之间的差额是可以确认为公允价值变动收益的。个人理解，供参考。","cat":"投资性房地产","kw":"公允价值","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0228","q":"企业从个⼈受让农村⼟地承包经营权是否应当作为投资性房地产核算","a":"农村⼟地承包经营权只是在农村⼟地“三权分置”背景下获得的⼀项经营收益权，法律上不构成对⼟地的所有权或者使⽤权，并不是对该项⼟地的完整权利。因此不能确认为投资性房地产。 提问⼈：asongwang 时间：2024-04-09 11:07:23 陈版主，如果是取得的⼟地经营权是长期⽐如20-30年，且取得了⼟地经营权证，拥有⼟地的经营、收益和转租的权利，是否可以视为是⼀种完整的使⽤权作为投资性房地产核算呢 回答⼈：chenyiwei 也不可以。个人理解，供参考。","cat":"投资性房地产","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3883","q":"无形资产使用寿命的确定？","a":"无形资产分为使用寿命有限和使用寿命不确定两类。使用寿命有限的按合同性权利或法定权利期限与预期使用年限孰短摊销。无法预见为企业带来经济利益期限的，属于使用寿命不确定的无形资产——不摊销，每年必须进行减值测试。实务中多数无形资产使用寿命有限。个人理解，供参考。","cat":"无形资产","kw":"无形资产,CAS 6,研发支出,资本化,摊销,减值测试","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第6号——无形资产"},{"id":"CY0005","q":"⾏政罚款属于⾮经常性损益吗","a":"如果是由本企业⾃⾝的⾏为导致的⾏政罚款，且具有偶发性的，则属于⾮经常性损益。 如果是某些特殊情况（例如为了取得某项资产，⽽代该资产的原所有者或使⽤⼈缴纳其所⽋的罚款和税费，以完成 资产过户），则这种情况下的罚款可能构成资产取得成本并⼊资产价值，后续通过折旧或摊销⽅式计⼊成本费⽤， 此时就不是⾮经常性损益了。个人理解，供参考。","cat":"无形资产","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3881","q":"合同能源管理（EMC）业务的会计处理？","a":"合同能源管理业务中，节能服务公司（ESCO）的会计处理主要有两种观点：①自建固定资产模式——将节能设备确认为固定资产，收入为向客户收取的效益分享款；②金融资产模式——将投资额确认为长期应收款，按实际利率法确认收益。证监会倾向于第一种观点（自建固定资产），但实务中两种模式均存在。个人理解，供参考。","cat":"实务综合","kw":"实务,会计处理,准则应用,证监会","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则——基本准则"},{"id":"3880","q":"租赁期的确定原则？","a":"租赁期应涵盖不可撤销的租赁期加上：①合理确定将行使续租选择权的期间；②合理确定将不行使终止租赁选择权的期间。确定租赁期时需考虑：续租租金与市场租金的比较、装修投入、资产对承租人的重要性、终止或续租的违约成本等因素。个人理解，供参考。","cat":"租赁","kw":"租赁,CAS 21,使用权资产,租赁负债","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第21号——租赁"},{"id":"3879","q":"短期租赁和低价值租赁的简化处理？","a":"短期租赁（租赁期不超过12个月）和低价值资产租赁（单项全新资产价值较低，如5万元以下）可选择不确认使用权资产和租赁负债，将租赁付款额在租赁期内按直线法计入相关成本费用。该选择权按资产类别逐类作出——同类别资产应保持一致的会计政策。个人理解，供参考。","cat":"租赁","kw":"租赁,CAS 21,使用权资产,租赁负债,会计政策","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第21号——租赁"},{"id":"3878","q":"售后回租中资产转让属于销售的会计处理？","a":"售后回租中资产转让属于销售的：①卖方兼承租人按原资产账面价值中与租回获得使用权相关的部分，确认使用权资产；②将转让总收益中与转让至买方兼出租人的权利相关的部分，确认收益；③使用权资产和租赁负债按CAS 21后续计量。实务中关键判断是控制权是否真正转移。个人理解，供参考。","cat":"租赁","kw":"租赁,CAS 21,使用权资产,租赁负债,售后回租,账面价值,控制","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第21号——租赁"},{"id":"CY0032","q":"收购少数股权形成的资本公积后续处理问题？","a":"“后续A公司也进⾏注销或者处置出表”，则A公司⾃⾝的会计核算就要改⽤清算基础，遵循《企业破产清算有关会计处理规定》（财会[2016]23号），⽽不再遵循企业会计准则了。 但即使在这种情况下，A公司的更上级母公司在其合并报表中，仍需继续体现和保留该项资本公积。个人理解，供参考。","cat":"合并报表","kw":"合并","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3876","q":"权益法下被投资单位发生超额亏损的处理？","a":"投资企业确认被投资单位净亏损，以长期股权投资的账面价值及其他实质上构成对被投资单位净投资的长期权益减记至零为限。超额亏损在备查簿中登记。若被投资单位后续盈利，应在备查簿中未确认的亏损分担额得到弥补后，再恢复确认投资收益。个人理解，供参考。","cat":"长投","kw":"长期股权投资,CAS 2,权益法,成本法,重大影响,账面价值,投资收益,期权","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"3875","q":"重大影响的判断因素？","a":"通常直接或间接持有20%以上50%以下表决权即推定有重大影响（可推翻）。若持股不足20%但存在以下情形之一也可能有重大影响：①在被投资单位董事会等权力机构派有代表；②参与财务和经营政策制定过程；③与被投资单位之间有重要交易；④向被投资单位派出管理人员。个人理解，供参考。","cat":"长投","kw":"长期股权投资,CAS 2,权益法,成本法,重大影响","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"3874","q":"接受母公司无偿划入资产的会计处理？","a":"子公司接受母公司无偿划入资产属于权益性交易。子公司按划入资产的公允价值或原账面价值（视是否有商业实质）入账，同时贷记资本公积——资本溢价。该交易不影响损益，直接计入所有者权益。实务中同一控制下的资产划转均按此原则处理。个人理解，供参考。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,母公司,公允价值,账面价值,资本公积,子公司,控制","src":"深圳证券交易所 会计监管动态","std_ref":"企业会计准则第20号——企业合并"},{"id":"3873","q":"理财产品如何分类和列报？","a":"理财产品的分类取决于其现金流量特征和业务模式：①保本保收益型→以摊余成本计量（债权投资）；②非保本但SPPI测试通过→以FVOCI计量（其他债权投资）；③其他→以FVTPL计量（交易性金融资产）。列报上：期限在一年内的列报为其他流动资产/交易性金融资产，一年以上的列报为其他非流动资产。个人理解，供参考。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"3872","q":"金融资产终止确认的'继续涉入'概念？","a":"企业既未转移也未保留金融资产所有权上几乎所有的风险和报酬，且保留了对该金融资产控制的，应按继续涉入程度确认相关资产和负债。典型情形：附有信用增级的应收账款证券化——企业提供了部分担保，按担保金额确认继续涉入负债。个人理解，供参考。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,终止确认,继续涉入,控制","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"3871","q":"应收账款保理不附追索权的会计处理？","a":"不附追索权的应收账款保理：若已将应收账款所有权上几乎所有的风险和报酬转移给保理商的，应终止确认应收账款。收到保理款与应收账款账面价值的差额计入当期损益（投资收益或财务费用）。若保理费用较大，可确认为当期财务费用。个人理解，供参考。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,账面价值,投资收益,终止确认","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"3870","q":"PPP项目合同中金融资产模式与无形资产模式的区别？","a":"金融资产模式（政府保底）：政府保证无条件支付确定金额，企业确认金融资产（长期应收款）。无形资产模式（使用者付费）：企业承担需求风险，确认无形资产（特许经营权）。混合模式：政府保底一部分+使用者付费一部分——分别确认金融资产和无形资产。个人理解，供参考。","cat":"政府补助","kw":"政府补助,CAS 16,递延收益,总额法,净额法,PPP","src":"财政部 企业会计准则解释公告","std_ref":"企业会计准则第16号——政府补助、企业会计准则第14号——收入"},{"id":"CY0025","q":"【转】政府补助相关问题","a":"如果⽇后通过A、B公司之间的协议，B公司可将其与政府签订的搬迁补偿协议中约定应由B公司承担的权利和义务均转移给A公司，相当于B作为A的代理⼈与政府协商搬迁补偿事宜，B⾃⾝不从中获利或者承担损失，则A对该事项应参照《监管规则适⽤指引——会计类第3号》之“3-10 搬迁补偿事项的会计处理”所述原则处理： 对于企业收到的不满⾜专项应付款确认条件（“因公共利益进⾏搬迁”以及”政府从财政预算直接拨付”）的搬迁补偿款，⼀般情况下认为，在满⾜市场化原则、补偿价格公允的前提下，该款项实质上是政府为取得⼟地使⽤权等资产向企业⽀付的交易对价。对于实践中存在的各类搬迁补偿名⽬，企业通常应当将其整体作为资产处置对价进⾏会计处理，除⾮有确凿证据表明搬迁补偿款存在政府补助成分（如提前搬迁奖励款等附带额外政策条件和使⽤条件的奖励），且政府补助与资产处置部分能够明确区分，则对于政府补助部分，企业应当按照政府补助准则相关规定进 ⾏会计处理。 对于企业为履⾏上述资产处置交易⽽发⽣的房屋及其他附属物拆除损失、搬迁费⽤、停产停业期间⽀付的职⼯薪酬等费⽤，如果预计能够通过未来资产处置对价予以补偿的，企业可以按照流动性将其暂时计⼊其他流动资产或其他⾮流动资产，在处置资产终⽌确认时转⼊损益，否则应当在相关费⽤发⽣时计⼊损益。个人理解，供参考。","cat":"政府补助","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3868","q":"总额法与净额法转换的会计处理？","a":"企业因业务模式变化导致在主要责任人和代理人身份间转换的，属于会计估计变更（因为交易的实质变化），采用未来适用法——仅对未来交易采用新方法处理，不追溯调整前期交易。实务中，企业应持续评估其在不同合同中的身份，确保会计处理反映交易的实质。个人理解，供参考。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14,会计估计,追溯调整,未来适用法,追溯","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第14号——收入"},{"id":"3867","q":"房地产企业预售房款何时确认收入？","a":"房地产开发企业的期房预售款在房屋交付前不符合收入确认条件——因为商品控制权尚未转移给客户。预售款应确认为合同负债。在房屋竣工验收并交付客户时，控制权转移，此时方能将累积的合同负债一次性转为收入。这是新收入准则下房地产行业最重大的变化之一。个人理解，供参考。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14,合同负债,控制","src":"财政部 企业会计准则解释公告","std_ref":"企业会计准则第14号——收入"},{"id":"CY0021","q":"请教陈版和各位⼤侠，应收款项融资的减值是否属于公允价值变动","a":"⾸先需要注意：根据《监管规则适⽤指引——会计类第2号》之“2-10 ⾦融资产管理业务模式中”出售”的判断标 准”：“如果⼀项⾦融资产对外”出售”但并未终⽌确认，意味着企业仍将通过收取该⾦融资产存续期内合同现⾦流量的⽅式实现经济利益，该种业务模式不满⾜”通过持有并出售⾦融资产产⽣整体回报”的情形。因此，⾦融资产管理业务模式中”出售”，应当是满⾜会计终⽌确认条件下的⾦融资产出售⾏为。”据此，在⽬前的实务中，商业承兑汇 票和财务公司承兑汇票可被分类为“应收款项融资”的情况是很少见的。 其次，应收款项融资的明细科⽬设置较为特殊。没有单独针对应收款项融资设置的“减值准备”科⽬（⽆论是⼀级科 ⽬还是明细科⽬）。其账务处理，⾸先是根据实际利率法确认利息收⼊，确定摊余成本；其次将摊余成本和期末公允价值之间的差额确认为公允价值变动，并调整其他综合收益；第三步是将预期信⽤损失计⼊损益并贷记其他综合收益，这样其他综合收益的净发⽣额仅代表由债务⼈信⽤风险以外的其他原因（如市场利率变动）对该项⾦融资产公允价值的影响。确认信⽤减值损失是借记“信⽤减值损失”，贷记“其他综合收益——信⽤减值损失”，即这⼀步是不影响⾦融资产账⾯价值的，因为前⼀步已将⾦融资产的账⾯价值调整为公允价值，所以后续不能再调整了。 应收款项融资的公允价值变动是多⽅⾯因素影响的结果，既包括⾦融市场上的利率等宏观参数，也包括债务⼈信⽤风险的影响，只不过对该类⾦融资产⽽⾔，因债务⼈信⽤风险因素对公允价值计量的影响需单列出来并体现在损益中，使得该类⾦融资产对持有⼈利润表的影响与以摊余成本计量的⾦融资产相同。个人理解，供参考。","cat":"收入准则","kw":"公允价值,减值","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3865","q":"客户未行使权利的合同负债（如预付卡余额）如何处理？","a":"客户未行使权利的部分（'breakage'），应按客户行使权利的模式按比例确认为收入——即根据历史经验和统计估计不会被行使的比例。若不满足估计条件的，只能在客户行使权利的可能性极低时才能确认收入。实务中商业预付卡、积分计划等均属此类。个人理解，供参考。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14,合同负债","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第14号——收入"},{"id":"3864","q":"限制性股票的股份支付费用计算？","a":"限制性股票的股份支付费用=授予日标的股票的公允价值-授予价格（如有）。如果限制性股票无回购条款且授予后即享有分红权，授予日公允价值通常参照近期PE/VC投资价格或评估价值。等待期内的分红：若可撤销则调整费用，若不可撤销则计入当期损益（不调整费用）。个人理解，供参考。","cat":"股份支付","kw":"股份支付,CAS 11,权益结算,现金结算,等待期,限制性股票,公允价值,分红","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第11号——股份支付"},{"id":"3863","q":"以权益结算的股份支付确认费用的税务处理？","a":"以权益结算的股份支付在会计上确认为费用，但在企业所得税上需等到实际行权或解锁时才能税前扣除。因此会产生可抵扣暂时性差异——在预计未来有足够应纳税所得额时确认递延所得税资产。注意：确认的递延所得税资产对应科目是所得税费用还是资本公积，取决于相关规定。个人理解，供参考。","cat":"股份支付","kw":"股份支付,CAS 11,权益结算,现金结算,等待期,递延所得税资产,资本公积,所得税,暂时性差异","src":"财政部 企业会计准则解释公告","std_ref":"企业会计准则第11号——股份支付、企业会计准则第18号——所得税"},{"id":"3862","q":"权益法下联营企业的顺流交易未实现损益？","a":"投资企业向联营企业出售资产（顺流交易），未实现内部交易损益应按投资企业持股比例抵销——调减投资收益和长期股权投资。这与逆流交易相对应的处理原则一致。处置联营企业股权时，未实现损益不再归属投资方，应转入投资收益。个人理解，供参考。","cat":"长投","kw":"长期股权投资,CAS 2,权益法,成本法,重大影响,联营,投资收益","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"3861","q":"母公司为子公司担保的外部借款合并处理？","a":"合并报表层面，子公司从银行取得的借款在合并层面仍为外部借款，母公司的担保在合并层面无意义（自己为自己担保），只需列报银行借款。子公司支付的担保费（付给母公司）在合并层面需抵销，合并层面仅体现对银行的利息费用。个人理解，供参考。","cat":"合并报表","kw":"合并报表,CAS 33,抵销,少数股东,控制权,合并,子公司,母公司","src":"财政部 企业会计准则解释公告","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"3860","q":"集团内部债权债务的合并抵销处理？","a":"合并报表中，母子公司之间、子子公司之间的债权债务应全额抵销，同时抵销对应的坏账准备。抵销后合并层面不体现内部债权债务。但若内部应收款已向外部第三方贴现且终止确认，合并层面应将其还原为外部借款。个人理解，供参考。","cat":"合并报表","kw":"合并报表,CAS 33,抵销,少数股东,控制权,合并,子公司,坏账,终止确认","src":"深圳证券交易所 会计监管动态","std_ref":"企业会计准则第33号——合并财务报表、企业会计准则第22号——金融工具确认和计量"},{"id":"3859","q":"合并过程中产生的审计、评估、法律费用如何处理？","a":"企业合并中发生的审计、法律、评估咨询等中介费用，于发生时计入当期管理费用。这是CAS 20的明确规定——无论同一控制还是非同一控制下的合并，相关直接费用均费用化。但发行股份或债券的手续费直接冲减资本公积或计入相关负债初始计量。个人理解，供参考。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,审计,合并,资本公积,控制,费用化","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第20号——企业合并"},{"id":"3858","q":"同一控制下合并取得的商誉怎么处理？","a":"同一控制下企业合并不产生新商誉。被合并方在最终控制方合并报表中已有的商誉，随合并事项转入合并方合并报表——按原值减累计减值准备后的金额入账。合并方个别报表层面的长期股权投资成本不含商誉（以被合并方账面净资产为基础）。个人理解，供参考。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,合并,控制,商誉","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0110","q":"求助，处置失败的研发项⽬","a":"将处置价款与对应资产（资本化开发⽀出）账⾯价值（可能为零）之间的差额确认为资产处置损益。 如果以前年度已将开发⽀出资本化，则在本年度确定项⽬失败时，应对前期已资本化的开发⽀出先计提减值准备， 再进⾏核销处理，不应直接费⽤化。 上一页 陈版主（陈奕蔚老师）答疑历史文章（2024年01月） 下一页 陈版主（陈奕蔚老师）答疑历史文章（2024年03月） 粤ICP备18107660号 粤公网安备44060602000887号 关于网站 Copyright © 2021-2026 会计便利店 hjyweb.cn 【个人理解，供参考。","cat":"资产减值","kw":"减值","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0009","q":"同⼀控制下⾮国有企业能够像国企⼀样进⾏不同⼦公司的资产划拨或者兼并？","a":"法律上并不禁⽌，理论上也是可以的，但需关注可能产⽣的税务风险和对债权⼈利益的潜在损害。建议先咨询律师和税务专业⼈⼠。个人理解，供参考。","cat":"实务综合","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3855","q":"商品售后服务费作为单项履约义务的处理？","a":"新收入准则下，如果商品销售和售后服务构成两项可明确区分的履约义务，应将交易价格按单独售价比例分摊。售后服务作为在一段时间内履行的履约义务，按履约进度确认收入。实务中多数企业的延长保修服务属于此情形。个人理解，供参考。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第14号——收入"},{"id":"3854","q":"生物资产的计量模式？","a":"生物资产一般采用成本模式计量。若有活跃市场、公允价值能可靠取得的，可采用公允价值模式。但对消耗性生物资产，初始计量采用成本，后续不允许转为公允价值计量。成熟的生产性生物资产按成本减累计
