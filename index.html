d":"CY0304","q":"集团内股份⽀付","a":"l理论上对母公司个别报表层⾯⽽⾔确实是权益结算股份⽀付（接收服务企业没有结算义务），但因为接受服务⽅ 是母公司，结算义务⽅是⼦公司，所以虽然是权益结算股份⽀付，但实际上是从⼦公司抽回投资，所以是减少对⼦公司的长期股权投资成本，⽽不是增加母公司⾃⾝的资本公积。所以实际上和现⾦结算股份⽀付没有太⼤区别。个人理解，供参考。","cat":"长期股权投资","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0311","q":"chenyiwei 请教陈⽼师关于重组后长期股权投资的初始确认问题","a":"A先⽣新公司：可按同⼀控制下合并取得⼦公司处理； 其他股东的新公司：根据对XX公司有⽆重⼤影响，分别作为长期股权投资按权益法核算，或者作为⾦融资产和核 算。如果满⾜⾮交易性权益⼯具投资条件的，可在取得⽇选择指定为以公允价值计量且其变动计⼊其他综合收益的 ⾦融资产，列报为其他权益⼯具投资。个人理解，供参考。","cat":"长期股权投资","kw":"公允价值,合并,权益法","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0400","q":"关于债务重组时，⼦公司豁免母公司债务的会计处理","a":"权益性交易会计处理的特点是：投资⽅调整对被投资⽅的长期股权投资账⾯价值；被投资⽅调整权益。⽽不是双⽅都调整权益。因此，如果⼦公司豁免母公司的债务构成权益性交易的，⼦公司应按照豁免债权的账⾯价值冲减权益 （依次冲减资本公积（资本溢价或股本溢价）、盈余公积、未分配利润），母公司相应减少对该⼦公司的长投账⾯价值。如果所豁免的债务⼤于母公司对⼦公司的长投账⾯价值的，则母公司个别报表中将超出部分确认为投资收 益，视同⼦公司对母公司的⼀项股利分配。个人理解，供参考。","cat":"长期股权投资","kw":"债务重组","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0419","q":"国企持有有限合伙⼈企业少数股权的账务处理","a":"从该基⾦的架构看，在董事会中占2/5席位，虽不能控制董事会的表决，但也⾜以产⽣重⼤影响；投委会表决权每 个出资⼈各具备⼀票表决权，即甲占1/4。因此，本案例中更⼤的可能性是具有重⼤影响，除⾮其他出资⼈保证A的出资本⾦安全和取得约定收益（或者保底收益）。 因此，A对其在该基⾦中的份额应采⽤权益法核算。报表上列报为长期股权投资。个人理解，供参考。","cat":"长期股权投资","kw":"权益法","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0433","q":"请教陈版主，关于权益法单位其他股东分配导致⽐例增加问题","a":"这种情况也可以认为是“被投资单位除净损益、其他综合收益和利润分配以外所有者权益的其他变动”所引起。因此，本企业作为投资⽅，应测算在该事项发⽣前后本企业在该被投资企业中所享有净资产份额的增减变动额，即 【分配后净资产分配后本企业所占权益⽐例-分配前净资产分配前本企业净资产所占权益⽐例】。相应调整“长期股 权投资——其他权益变动”和“资本公积——其他资本公积”。个人理解，供参考。","cat":"长期股权投资","kw":"权益法","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0115","q":"请教版主，离退休⼈员社会化费⽤确认长期应付款的问题","a":"对于移交地⽅管理的离退休⼈员的相关费⽤，⼀般是在移交时，依据基准⽇的精算结果计提⼀项负债，然后尽快将该项负债资⾦拨付给接收离退休⼈员的地⽅机构，以结算该项负债。此后该项资⾦的不⾜或者结余与本企业⽆关。 如果该资⾦的余额不⾜以⽀付后续⽀出，仍需由本企业继续承担不⾜部分的补⾜责任的，则本企业应确保在移交后每年继续进⾏精算，并根据精算结果对上述负债的余额进⾏调整。调整⾦额视情况计⼊管理费⽤或者其他综合收 益。个人理解，供参考。","cat":"实务综合","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0119","q":"应收账款保理费⽤，属于⾮经吗？","a":"如果被保理的应收账款均系正常经营活动产⽣，且将此类应收账款进⾏保理融资是常规操作，则保理融资费⽤是企业的正常融资费⽤，在可预见的未来将会重复发⽣，成为影响未来期间损益的长期因素，报表使⽤者在预测未来盈利能⼒时应将该因素纳⼊考虑。因此，不属于⾮经常性损益。个人理解，供参考。","cat":"实务综合","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0121","q":"招商费⽤⼊账疑问","a":"该项资产的运营收⼊（如租⾦）归谁所有？⼦公司的运营费⽤如何获得补偿？⼦公司承担运营费⽤与获得运营收⼊是否相称，整体交易是否公允合理？个人理解，供参考。","cat":"实务综合","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0122","q":"关于员⼯持股平台借款的账务处理","a":"由于该借款系以平台名义借⼊，平台是向银⾏还本付息的⾸要义务⼈，因此平台应同时确认对银⾏的借款和对员⼯的债权，以及分别确认与之相关的利息⽀出和利息收⼊。个人理解，供参考。","cat":"实务综合","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0127","q":"请教陈版主：同控下⽆偿划拨冲减资本公积问题","a":"在个别报表层⾯仅冲减资本公积的做法并不恰当。因为个别报表层⾯每个权益项⽬在《公司法》等法律法规中都有特定的含义和⽤途，例如可供分配股利的留存收益就是根据未分配利润的余额确定的，盈余公积的计提和使⽤是否合规也取决于其核算是否符合公司法规定，等等。因此个别报表层⾯的资本公积是不应出现负数的。如果资本公积有⼤额负数，但未分配利润为正数，后续依据该未经冲减的未分配利润余额对股东进⾏分红，则进⼀步侵蚀了利⽤净资产保障债权⼈利益的基础。 ⽽且，这个问题在会计准则中是有明⽂规定的。 因此，不建议对于会计准则有明⽂规定的事项直接不遵循其规定。个人理解，供参考。","cat":"实务综合","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0132","q":"求助，0对价减资，母⼦公司的财务税务处理问题","a":"基本赞同主帖中的处理意见。税务处理问题建议再与税务专业⼈⼠沟通确认。个人理解，供参考。","cat":"实务综合","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0149","q":"经销商未达到销售⽬标⽽扣除保证⾦的账务处理","a":"该事项与代理费的结算是同⼀交易的两个⽅⾯，两者密切关联，故冲减“销售费⽤——代理费”更为合理。个人理解，供参考。","cat":"实务综合","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0151","q":"请教陈版，员⼯激励奖⾦的确认","a":"该做法总体上合理。 该安排在性质上属于“其他长期职⼯福利”，理论上应采⽤设定提存计划的会计处理模式，但因为期限较短，影响最 终发放⾦额的唯⼀较⼤变量就是考核期内业绩，因此也可以简化为依据考核期内业绩预测确定计提数，并在服务期内分摊的处理⽅式。 由于属于长期激励计划，因此还需要考虑折现因素影响。实务中如果折现因素的影响显著不重⼤的，也可简化处理，不考虑折现。个人理解，供参考。","cat":"实务综合","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"QA0126","q":"辞退福利和内退福利的会计处理区别?","a":"CAS 9规定,辞退福利和内退福利的处理不同:(1)辞退福利—在同时满足企业不能单方面撤回解除计划、确认相关重组成本时确认应付职工薪酬,一次性计入当期损益;(2)内退福利—职工内退至正式退休期间的工资和社保,比照辞退福利处理,但需分期确认。实务中内退计划通常涉及较长的等待期,需对未来支付的金额进行精算折现。个人理解,供参考。","cat":"职工薪酬","kw":"辞退福利,内退福利,精算,折现,应付职工薪酬,重组","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第9号——职工薪酬"},{"id":"QA0127","q":"累积带薪缺勤和非累积带薪缺勤的区别?","a":"CAS 9区分两类带薪缺勤:(1)累积带薪缺勤—未休完的年假可结转下年,企业应在每个资产负债表日按预期将使用的额外天数确认应付职工薪酬。确认金额=额外天数×日工资率×(1-预期放弃率);(2)非累积带薪缺勤—病假、婚假等不可结转,在实际发生时确认费用,不提前计提。实务中累积年假的计量需结合历史使用数据。个人理解,供参考。","cat":"职工薪酬","kw":"带薪缺勤,累积,非累积,年假,病假,结转,应付职工薪酬","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第9号——职工薪酬"},{"id":"QA0128","q":"短期利润分享计划的会计处理?","a":"CAS 9规定,短期利润分享计划(年终奖与利润挂钩):(1)在同时满足职工提供服务期间和金额可可靠估计时确认应付职工薪酬;(2)金额=利润超额部分×约定比例×预期支付概率。当期奖金计入当期损益(或符合资本化条件的资产成本)。实务中常见的是,按年度考核结果在次年发放的奖金需在资产负债表日计提。个人理解,供参考。","cat":"职工薪酬","kw":"利润分享,年终奖,应付职工薪酬,计提,奖金,预计支付","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第9号——职工薪酬、企业会计准则第17号——借款费用"},{"id":"QA0129","q":"职工教育经费和工会经费的计提和税务处理?","a":"职工教育经费按工资总额8%计提(实际发生额可税前扣除,超支可结转);工会经费按2%计提(需取得工会收据方可税前扣除)。会计处理:(1)按实际发生金额计入相关成本费用;(2)超过规定比例的部分在纳税调整时调增。注意:自2018年起,职工教育经费的税前扣除比例从2.5%提高至8%。个人理解,供参考。","cat":"职工薪酬","kw":"职工教育经费,工会经费,计提比例,税前扣除,纳税调整,工资总额","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第9号——职工薪酬"},{"id":"QA0130","q":"离职后福利(设定提存vs设定受益)的区别?","a":"CAS 9区分两种离职后福利:(1)设定提存计划—企业向独立基金缴存固定金额,职工退休后从基金领取待遇(如企业年金、补充养老保险)。企业无后续义务,按缴存金额计入当期损益;(2)设定受益计划—企业承诺退休后按约定公式支付待遇。企业需精算折现确认义务,精算利得/损失计入其他综合收益。实务中,中国企业绝大多数为设定提存计划。个人理解,供参考。","cat":"职工薪酬","kw":"离职后福利,设定提存,设定受益,精算,企业年金,补充养老保险,OCI","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第9号——职工薪酬"},{"id":"QA0131","q":"固定资产折旧方法的选择和变更?","a":"CAS 4规定的折旧方法包括:直线法、工作量法、双倍余额递减法和年数总和法。企业应根据固定资产经济利益的预期消耗方式选择折旧方法。改变折旧方法属于会计政策变更,需追溯调整(中国准则下)。选择时需保持一致,不得随意变更。个人理解,供参考。","cat":"固定资产","kw":"折旧方法,直线法,双倍余额递减法,年数总和法,工作量法,政策变更,经济利益","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第4号——固定资产"},{"id":"QA0132","q":"固定资产后续支出的资本化vs费用化?","a":"CAS 4规定固定资产后续支出满足确认条件时资本化:(1)资本化条件—延长使用寿命、提高生产能力、提升产品质量、显著降低成本等;(2)日常修理支出—费用化计入当期损益;(3)大修理支出—满足资本化条件的可作为大修理支出资本化(不计入原资产价值,单独作为一项资产核算)。实务中的判断要点:后续支出是否带来超过原评估绩效水平的未来经济利益。个人理解,供参考。","cat":"固定资产","kw":"后续支出,资本化,费用化,大修理,日常修理,使用寿命,生产能力","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第4号——固定资产、企业会计准则第17号——借款费用"},{"id":"QA0133","q":"固定资产报废和处置的会计处理?","a":"固定资产处置(报废、出售、毁损)的处理:(1)转入清理—将账面价值转入固定资产清理科目;(2)清理过程中发生的费用—计入固定资产清理借方;(3)出售收入和残料—计入固定资产清理贷方;(4)结转清理净损益—净收益计入资产处置损益(出售)或营业外收入(报废),净损失计入资产处置损益或营业外支出。正常出售产生的损益计入资产处置损益,而报废毁损的计入营业外收支。个人理解,供参考。","cat":"固定资产","kw":"固定资产清理,报废,出售,毁损,资产处置损益,营业外收入,营业外支出","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第4号——固定资产"},{"id":"QA0134","q":"固定资产改扩建的会计处理?","a":"固定资产改扩建(更新改造)的处理:(1)将原固定资产的账面价值转入在建工程(终止确认原固定资产);(2)改扩建期间发生的工程支出计入在建工程;(3)被替换部分的账面价值扣除(减项);(4)改扩建完成后按新的账面价值在重新确定的剩余使用寿命内计提折旧。改扩建后固定资产的性能指标(产能、能耗、精度等)应显著提升。注意:与日常修理不同,改扩建要求实质性改变资产功能。个人理解,供参考。","cat":"固定资产","kw":"改扩建,在建工程,被替换部分,更新改造,剩余使用寿命,性能提升,日常修理","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第4号——固定资产"},{"id":"QA0135","q":"固定资产盘盈和盘亏的处理?","a":"固定资产盘盈(盘点发现账外资产):(1)按同类或类似固定资产的市场价格减去按新旧程度估计的价值损耗后的余额作为入账价值;(2)盘盈金额作为前期差错处理—通过以前年度损益调整科目转入留存收益,不得直接计入当期损益。固定资产盘亏:(1)将账面价值转入待处理财产损溢;(2)查明原因后计入营业外支出(正常损失)或向责任人索赔;(3)取得理赔后冲减损失。个人理解,供参考。","cat":"固定资产","kw":"盘盈,盘亏,以前年度损益调整,留存收益,待处理财产损溢,营业外支出,前期差错","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第4号——固定资产"},{"id":"QA0136","q":"存货的初始计量—采购成本、加工成本和其他成本?","a":"CAS 1规定存货成本包括:(1)采购成本—买价+进口关税+运费+装卸费+运输途中的合理损耗+入库前挑选整理费;(2)加工成本—直接人工+按照一定方法分配的制造费用;(3)其他成本—使存货达到当前场所和状态所发生的其他支出。不计入存货成本的项目:销售费用、管理费用、非正常损耗、仓储费用(生产过程中为达到下一生产阶段必需的仓储除外)。个人理解,供参考。","cat":"存货","kw":"采购成本,加工成本,制造费用,合理损耗,挑选整理费,销售费用,管理费用,非正常损耗,仓储费","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第1号——存货"},{"id":"QA0137","q":"存货可变现净值的确定方法?","a":"CAS 1要求存货按成本与可变现净值孰低计量。可变现净值的确定:(1)产成品/商品—估计售价-估计销售费用-相关税费;(2)用于出售的材料—市价-销售费用;(3)用于生产的材料—如果产成品未减值,材料不减值(成本>市价也不用提跌价);如果产成品减值,材料按产成品可变现净值与材料成本差额计提跌价。估计售价的确定:有合同的按合同价;超过合同数量的部分按一般市场价。个人理解,供参考。","cat":"存货","kw":"可变现净值,成本与可变现净值孰低,估计售价,合同价,市场价,产成品,材料,销售费用,跌价准备","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第1号——存货"},{"id":"QA0138","q":"存货跌价准备的计提和转回?","a":"存货跌价准备的处理:(1)计提—当存货成本>可变现净值时,差额计提存货跌价准备,计入资产减值损失;(2)转回—如果以前减记存货价值的影响因素已经消失,在原已计提的存货跌价准备金额内转回,冲减资产减值损失;(3)转回的金额以原计提的跌价准备金额为上限(不能使账面价值超过原成本)。注意:存货跌价准备的转回不同于固定资产减值(不得转回)。个人理解,供参考。","cat":"存货","kw":"存货跌价准备,资产减值损失,可变现净值,转回,单项计提,分类计提,减值迹象,成本恢复","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第1号——存货"},{"id":"QA0139","q":"存货的发出计价方法?","a":"CAS 1允许的发出存货计价方法:(1)先进先出法(FIFO)—假定先入库的先发出,期末存货反映最近购入成本;(2)加权平均法(月末一次加权平均或移动加权平均)—平滑各批成本差异;(3)个别计价法—适用于不可互换的特定项目(如珠宝、艺术品、大型设备)。注意:后进先出法(LIFO)在中国准则下不允许使用。一经选定方法应保持一致性,如需变更按会计政策变更处理。个人理解,供参考。","cat":"存货","kw":"先进先出,加权平均,个别计价,后进先出禁止,一致性,会计政策变更,物价变动","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第1号——存货"},{"id":"QA0140","q":"存货盘点结果的处理(盘盈盘亏)?","a":"存货盘点差异的处理:(1)盘盈—按重置成本入账,冲减管理费用(或待查明原因后处理);(2)盘亏—扣除残值和责任人赔偿后计入管理费用(正常损失)或营业外支出(非正常损失如被盗)。盘亏涉及的进项税额转出:管理不善造成的存货损失(如霉变、过期)—需做进项税额转出;自然灾害造成的损失—不需进项税额转出。个人理解,供参考。","cat":"存货","kw":"盘盈,盘亏,重置成本,管理费用,营业外支出,进项税额转出,管理不善,自然灾害","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第1号——存货"},{"id":"QA0141","q":"委托加工物资和受托加工物资的核算?","a":"委托加工物资的会计处理:(1)发出材料—借记委托加工物资,贷记原材料;(2)支付加工费和增值税—借记委托加工物资,借记应交税费-进项税额;(3)收回加工后的物资—按加工完后的实际成本转入原材料或库存商品。受托加工物资(收到对方材料)不确认为本企业的存货,只在备查簿中登记。收到的加工费作为企业的主营业务收入。注意:委托加工的消费税由受托方代扣代缴。个人理解,供参考。","cat":"存货","kw":"委托加工,受托加工,委托加工物资,消费税,进项税额,加工费,备查簿,原材料,库存商品","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第1号——存货"},{"id":"QA0142","q":"周转材料(低值易耗品和包装物)的会计处理?","a":"低值易耗品和包装物的摊销方法:(1)一次转销法—领用时全部计入成本费用;(2)五五摊销法—领用时摊销50%,报废时摊销另50%;(3)分次摊销法(按使用期分期摊销)。包装物的特殊处理:(1)随同产品出售单独计价的—确认为其他业务收入;(2)出租包装物—确认租金收入和其他业务成本;(3)出借包装物—摊销额计入销售费用。个人理解,供参考。","cat":"存货","kw":"周转材料,低值易耗品,包装物,一次转销法,五五摊销法,分次摊销,其他业务收入,销售费用","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第1号——存货"},{"id":"QA0143","q":"停工损失和废品损失的会计处理?","a":"停工损失的分类处理:(1)正常停工(季节性检修、计划内停水停电)—制造费用,计入产品成本;(2)非正常停工(灾害、安全事故、原材料短缺)—计入营业外支出。废品损失:(1)可修复废品—返修费用计入产品成本;(2)不可修复废品—按废品成本(扣除残值)计入废品损失,正常范围内计入产品成本,超出正常范围的计入当期损益。个人理解,供参考。","cat":"存货","kw":"停工损失,废品损失,正常损失,非正常损失,制造费用,营业外支出,可修复废品,不可修复废品","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第1号——存货"},{"id":"QA0144","q":"房地产企业存货的核算特点?","a":"房地产开发企业的存货主要包括:(1)开发成本—土地征用及拆迁补偿费、前期工程费、建安工程费、基础设施费、公共配套设施费、开发间接费;(2)开发产品—已完工待售的房产;(3)出租开发产品—适用投资性房地产准则;(4)周转房—用于安置回迁户的临时房产。收入确认遵循CAS 14。成本结转按建筑面积或按套内面积分摊至已售部分。利息资本化的起止时点与一般企业不同。个人理解,供参考。","cat":"存货","kw":"房地产开发企业,开发成本,开发产品,公共配套设施,建筑面积分摊,收入确认,利息资本化,回迁房","src":"财政部 企业会计准则解释公告","std_ref":"企业会计准则第1号——存货、企业会计准则第14号——收入、企业会计准则第17号——借款费用"},{"id":"QA0145","q":"存货成本核算中的制造费用分摊?","a":"制造费用的合理分摊方法:(1)生产工人工时比例法—以各产品耗用的生产工时为基础分配;(2)生产工人工资比例法—以各产品的直接人工工资为基础;(3)机器工时比例法—适用于机械化程度高的生产线;(4)按年度计划分配率分配法—季节性生产企业可先按计划分配率预分配,年末调整差异。制造费用中的固定部分按正常生产能力分摊,闲置产能对应的固定制造费用应直接计入当期损益。个人理解,供参考。","cat":"存货","kw":"制造费用,生产工时,机器工时,计划分配率,正常生产能力,闲置产能,固定制造费用,直接人工","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第1号——存货"},{"id":"QA0146","q":"审计报告的类型及出具条件?","a":"中国注册会计师审计准则1501号等规定了审计报告的类型:(1)无保留意见—财务报表在所有重大方面按照适用的财务报告编制基础编制;(2)保留意见—存在重大但不广泛的错报或审计范围受限但不广泛;(3)否定意见—存在重大且广泛的错报;(4)无法表示意见—审计范围受限且可能产生的影响重大且广泛。强调事项段和其他事项段不改变审计意见类型。个人理解,供参考。","cat":"审计实务","kw":"审计报告,无保留意见,保留意见,否定意见,无法表示意见,强调事项段,审计范围受限,重大错报","src":"中国注册会计师协会 专业技术指导","std_ref":"中国注册会计师审计准则"},{"id":"QA0147","q":"重大错报风险评估(固有风险和控制风险)?","a":"审计准则1211号要求识别和评估重大错报风险:(1)固有风险—假定不存在相关内部控制时,交易/账户余额/披露容易出错的可能性;(2)控制风险—内部控制未能防止或纠正错报的风险。评估固有风险时考虑:外部环境变化、行业特殊性、交易的复杂性、需要运用估计的程度、舞弊动机等。评估控制风险需:了解内部控制设计、测试控制运行有效性。个人理解,供参考。","cat":"审计实务","kw":"重大错报风险,固有风险,控制风险,审计准则1211,风险评估,内部控制,舞弊风险,认定层级","src":"中国注册会计师协会 专业技术指导","std_ref":"中国注册会计师审计准则、企业内部控制基本规范"},{"id":"QA0148","q":"函证程序在审计中的应用?","a":"审计准则1312号规定了函证程序:(1)银行存款和借款—必须函证(除非不重要且风险低);(2)应收账款—通常应函证;(3)其他往来款项—基于风险评估确定。函证的控制:由审计师独立发出和收回(不能由被审计单位经手)。回函差异需调查原因并追加审计程序。未回函的需执行替代程序(检查合同、发票、出库单、银行流水等)。电子函证平台的使用需评估安全性和可靠性。个人理解,供参考。","cat":"审计实务","kw":"函证,银行存款,应收账款,审计准则1312,回函差异,替代程序,电子函证,独立发出","src":"中国注册会计师协会 专业技术指导","std_ref":"中国注册会计师审计准则"},{"id":"QA0149","q":"存货监盘的程序和要点?","a":"审计准则1311号规定了存货监盘程序:(1)在资产负债表日(或前后)亲临现场;(2)观察管理层的盘点程序是否合规有效;(3)执行抽盘(从盘点表追查至实物和从实物追查至盘点表);(4)关注特殊存货(在途、第三方寄存、发出商品、代加工等);(5)关注呆滞和过时存货的识别;(6)盘点差异需查明原因。如果资产负债表日无法监盘,可在期后执行并检查变动记录。个人理解,供参考。","cat":"审计实务","kw":"存货监盘,审计准则1311,抽盘,盘点表,特殊存货,呆滞存货,期后盘点,盘点差异,发出商品","src":"中国注册会计师协会 专业技术指导","std_ref":"中国注册会计师审计准则"},{"id":"QA0150","q":"关键审计事项的确定和沟通?","a":"审计准则1504号要求上市公司审计报告中沟通关键审计事项:(1)与治理层沟通后确定;(2)重点关注领域(重大错报风险高的领域);(3)涉及重大管理层判断(如商誉减值测试、收入确认);(4)本期重大交易或事项的影响。每个关键审计事项需描述:为什么被认为是关键审计事项、审计如何应对。数量通常为1-3个(过多可能说明审计质量存在问题)。无法表示意见的审计报告不需要沟通关键审计事项。个人理解,供参考。","cat":"审计实务","kw":"关键审计事项,审计准则1504,治理层沟通,重大错报风险,管理层判断,收入确认,商誉减值","src":"中国注册会计师协会 专业技术指导","std_ref":"中国注册会计师审计准则"},{"id":"QA0151","q":"持续经营假设审计?","a":"审计准则1324号要求审计师评估管理层对持续经营假设的合理性:(1)识别可能导致持续经营能力产生重大疑虑的事项(巨额亏损、债务违约、诉讼等);(2)评估管理层的应对计划(资产出售、债务重组、增资等);(3)如果重大疑虑存在,评价披露是否充分。根据评估结果:无重大不确定性—标准意见;存在重大不确定性但披露充分—增加持续经营相关段;披露不充分—保留或否定意见。个人理解,供参考。","cat":"审计实务","kw":"持续经营,审计准则1324,重大不确定性,债务违约,巨额亏损,应对计划,重大疑虑,强调事项段","src":"中国注册会计师协会 专业技术指导","std_ref":"中国注册会计师审计准则"},{"id":"QA0152","q":"关联方交易的审计程序?","a":"审计准则1323号要求对关联方交易实施专项审计程序:(1)识别关联方—检查股权结构、治理层清单、关联方关系声明;(2)识别关联方交易—关注异常交易(价格偏离市场价格、交易条件不合理);(3)评估商业理由—交易是否具有商业实质;(4)获取充分证据—检查合同、审查价格条款、向第三方询证。特别关注:与未披露关联方的交易、在资产负债表日前后异常交易、关联方资金占用等。个人理解,供参考。","cat":"审计实务","kw":"关联方交易,审计准则1323,识别关联方,商业实质,异常交易,价格偏离,资金占用,隐蔽关联方","src":"中国注册会计师协会 专业技术指导","std_ref":"中国注册会计师审计准则"},{"id":"QA0153","q":"期初余额的审计程序?","a":"首次承接审计业务时,按审计准则1332号对期初余额实施程序:(1)查阅前任审计师的工作底稿(如可行);(2)评估期初余额(上期结转)是否恰当;(3)检查期初余额是否恰当反映了会计政策的运用;(4)对流动资产/负债的期初余额—检查上期结转记录;(5)对存货—监盘或替代程序;(6)对长期资产—检查上期购置文件。期初余额存在重大错报且未被恰当更正时,应出具保留或否定意见。个人理解,供参考。","cat":"审计实务","kw":"期初余额,审计准则1332,前任审计师,工作底稿,首次审计,会计政策,期初存货,保留意见","src":"中国注册会计师协会 专业技术指导","std_ref":"中国注册会计师审计准则"},{"id":"QA0154","q":"审计抽样的应用?","a":"审计准则1314号规定审计抽样:(1)控制测试—测试内部控制运行有效性,关注偏差率(如果预期偏差率高于可容忍偏差率,不依赖该控制);(2)细节测试—测试交易和余额的准确性。抽样方法:统计抽样(随机选样、系统选样)和非统计抽样(判断选样)。样本量确定需考虑:可接受的信赖过度风险、可容忍偏差率/错报、预期总体偏差率/错报。分层抽样可提高效率(将总体按金额/风险分层)。个人理解,供参考。","cat":"审计实务","kw":"审计抽样,控制测试,细节测试,统计抽样,非统计抽样,偏差率,样本量,可容忍偏差,分层抽样","src":"中国注册会计师协会 专业技术指导","std_ref":"中国注册会计师审计准则、企业内部控制基本规范"},{"id":"QA0155","q":"审计工作底稿的归档和管理?","a":"审计准则1131号要求审计工作底稿在审计报告日后60天内最终归档成册。底稿内容包括:(1)审计计划(总体策略和具体计划);(2)风险评估程序和结果;(3)实质性程序的性质/时间/范围;(4)审计证据和结论;(5)重大事项纪要(包括与治理层的沟通);(6)审计报告草稿。底稿的保管期限:自审计报告日起至少10年。电子底稿需有完整的访问控制和备份机制。底稿所有权归属会计师事务所。个人理解,供参考。","cat":"审计实务","kw":"审计工作底稿,归档,审计准则1131,审计计划,风险评估,实质性程序,保管期限,监管检查,电子底稿","src":"中国注册会计师协会 专业技术指导","std_ref":"中国注册会计师审计准则"},{"id":"QA0156","q":"外币交易的初始确认和后续计量?","a":"CAS 19规定:(1)初始确认—外币交易按交易发生日的即期汇率(或其近似汇率)折算为记账本位币;(2)后续计量—货币性项目(应收应付、货币资金)按资产负债表日即期汇率折算,汇兑差额计入当期损益;非货币性项目以历史成本计量的不调整,以公允价值计量的按公允价值确定日的汇率折算。实务中,企业应指定经常使用的折算汇率,如月初汇率或加权平均汇率。个人理解,供参考。","cat":"外币折算","kw":"即期汇率,近似汇率,货币性项目,后续计量,汇兑差额,公允价值","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第19号——外币折算"},{"id":"QA0157","q":"外币报表折算方法的区别?","a":"外币报表折算方法:(1)现行汇率法—资产负债项目按资产负债表日即期汇率折算,实收资本按历史汇率,利润表按平均汇率。折算差额计入其他综合收益(外币报表折算差额);(2)时态法—货币性项目按资产负债表日汇率,非货币性项目按历史汇率。中国准则采用现行汇率法,但恶性通货膨胀经济中的境外经营需先调整再按现行汇率法折算。个人理解,供参考。","cat":"外币折算","kw":"现行汇率法,时态法,折算差额,OCI,恶性通货膨胀,境外经营,平均汇率","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第19号——外币折算"},{"id":"QA0158","q":"恶性通货膨胀经济中的外币折算?","a":"境外经营处于恶性通货膨胀经济(三年累计通胀率接近或超过100%)时:(1)先对境外经营财务报表按当地一般物价指数进行调整;(2)再按资产负债表日即期汇率折算。这与正常折算方法不同(先调后折)。判断指标包括:居民偏好以非货币性资产或相对稳定的外币持有财富、利率与物价指数挂钩等。个人理解,供参考。","cat":"外币折算","kw":"恶性通货膨胀,境外经营,物价指数,先调后折,即期汇率,通胀率","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第19号——外币折算"},{"id":"QA0159","q":"记账本位币的选择和变更?","a":"CAS 19规定,企业通常以人民币为记账本位币。但业务收支以外币为主的企业可选择某种外币。选择需考虑:(1)销售商品和提供劳务时主要使用的货币;(2)融资活动获得资金的主要货币;(3)保存经营收入的主要货币。记账本位币一经确定不得随意变更,确需变更的采用未来适用法。个人理解,供参考。","cat":"外币折算","kw":"记账本位币,人民币,外币,未来适用法,融资活动,销售货币,经营收入","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第19号——外币折算"},{"id":"QA0160","q":"企业合并中取得境外子公司净资产的折算?","a":"企业合并中取得境外子公司,购买日的处理:(1)被购买方可辨认净资产按购买日的即期汇率折算为母公司记账本位币;(2)合并对价(以外币支付)按购买日汇率折算;(3)合并产生的商誉按购买日汇率确认(后续不再因汇率变动调整)。购买日后,境外子公司净资产的折算差额在合并报表中计入其他综合收益。个人理解,供参考。","cat":"外币折算","kw":"企业合并,境外子公司,购买日汇率,商誉,折算差额,OCI,合并报表","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第19号——外币折算"},{"id":"QA0161","q":"非货币性资产交换的商业实质判断?","a":"CAS 7规定,满足以下条件之一通常具有商业实质:(1)换入资产的未来现金流量在风险、时间、金额方面与换出资产显著不同;(2)换入资产与换出资产的预计未来现金流量现值不同且差额重大。不具有商业实质的交换按账面价值计量,不确认损益。实务中需要结合企业持有资产的目的和经营战略综合判断。个人理解,供参考。","cat":"非货币性资产交换","kw":"商业实质,未来现金流量,风险,时间,金额,现值,账面价值","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第7号——非货币性资产交换"},{"id":"QA0162","q":"非货币性交换中涉及补价的处理?","a":"补价(支付或收到的货币资金):支付的补价占换入资产公允价值(或换出资产公允价值+补价)的比例<25%的属于非货币性资产交换;≥25%的适用货币性交易准则。收到补价方确认部分收益;支付补价方将补价计入换入资产成本。按公允价值计量时,换入资产成本=换出资产公允价值+支付的补价(或-收到的补价)+相关税费。个人理解,供参考。","cat":"非货币性资产交换","kw":"补价,25%比例,货币性交易,公允价值,账面价值,部分收益,相关税费","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第7号——非货币性资产交换"},{"id":"QA0163","q":"非货币性交换中多项资产的分配?","a":"涉及多项资产时:(1)按公允价值计量的—按各项资产的公允价值占总额的比例分摊;(2)按账面价值计量的(不具有商业实质)—按各自的账面价值比例分摊。涉及多项换出资产的,需按换出资产的公允价值比例分配换入资产的入账价值。涉及金融资产的交换需要按CAS 22单独处理。个人理解,供参考。","cat":"非货币性资产交换","kw":"多项资产,公允价值分摊,账面价值分摊,金融资产,入账价值,交换比例","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第7号——非货币性资产交换、企业会计准则第22号——金融工具确认和计量"},{"id":"QA0164","q":"以股权投资换取固定资产的会计处理?","a":"以长期股权投资换入固定资产:(1)如交换具有商业实质且公允价值能可靠计量—按换出股权的公允价值确认换入固定资产入账价值,换出股权公允价与账面价的差额计入投资收益;(2)如不具有商业实质—按换出股权的账面价值确认换入固定资产入账价值,不确认收益。换出的长投如果是权益法核算的,需终止确认权益法并结转相应的其他综合收益。个人理解,供参考。","cat":"非货币性资产交换","kw":"股权投资,固定资产置换,商业实质,公允价值,账面价值,投资收益,权益法终止","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第7号——非货币性资产交换、企业会计准则第2号——长期股权投资"},{"id":"QA0165","q":"关联方之间的非货币性交换的特殊考虑?","a":"关联方之间的非货币性资产交换需特别关注:(1)商业实质的判断—关联方之间的交易可能缺乏商业实质,应按账面价值计量;(2)如果有确凿证据表明公允价值公允(如第三方评估),可按公允价值计量;(3)无论何种计量基础,需遵循CAS 36的关联方披露要求,包括交易金额、定价政策和未结算项目。个人理解,供参考。","cat":"非货币性资产交换","kw":"关联方交易,商业实质,公允价值,账面价值,第三方评估,关联方披露,定价政策","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第7号——非货币性资产交换、企业会计准则第36号——关联方披露"},{"id":"QA0166","q":"公允价值计量的三个层次?","a":"CAS 39规定公允价值计量三个层次:(1)第一层次—相同资产/负债在活跃市场中的公开报价(最可靠,如股票收盘价);(2)第二层次—除第一层次外可观察的输入值(相似资产报价、利率曲线、隐含波动率);(3)第三层次—不可观察的输入值(基于企业自身假设,如财务预测、折现率)。企业应优先使用第一层次输入值。第三层次公允价值变动对利润的影响需在附注中单独披露。个人理解,供参考。","cat":"公允价值计量","kw":"公允价值层次,第一层次,第二层次,第三层次,活跃市场,公开报价,不可观察输入值,折现率","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第39号——公允价值计量"},{"id":"QA0167","q":"非金融资产的公允价值计量?","a":"非金融资产(固定资产、无形资产等)的公允价值计量:(1)市场参与者视角—按资产在当前市场条件下最佳用途使用(最高最佳使用);(2)估值前提—按市场参与者使用或出售该资产的能力来计量;(3)估值方法—市场法(参考可比交易)、收益法(未来现金流折现)、成本法(重置成本减贬值)。注意需考虑资产的地理位置、物理状况、法律限制等因素。个人理解,供参考。","cat":"公允价值计量","kw":"非金融资产,最高最佳使用,市场参与者,市场法,收益法,成本法,重置成本,可比交易","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第39号——公允价值计量、企业会计准则第2号——长期股权投资"},{"id":"QA0168","q":"负债和企业自身权益工具的公允价值计量?","a":"负债的公允价值计量需考虑不履约风险(企业自身信用风险)的影响。具体:(1)按市场参与者转移该负债所支付的价格计量;(2)不履约风险变化导致的公允价值变动通常计入当期损益;(3)指定为FVOCI的金融负债的信用风险变动计入OCI。企业自身权益工具(如认股权证)按市场参与者愿意支付的价格计量。个人理解,供参考。","cat":"公允价值计量","kw":"负债,不履约风险,自身信用风险,FVOCI,金融负债,权益工具,认股权证,信用风险变动","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第39号——公允价值计量"},{"id":"QA0169","q":"估值技术在实际中的应用?","a":"常用估值技术:(1)市场法—参考相同或可比资产/负债的最近交易价格;(2)收益法—将未来现金流量折现至现值,适用于收益可预测的资产(如特许经营权、客户关系);(3)成本法—反映重置或再造同等资产的成本,适用于无市场交易参考的专用设备。选择时应优先使用可观察输入值,定期评估估值技术是否持续适当。变更估值技术按会计估计变更处理。个人理解,供参考。","cat":"公允价值计量","kw":"市场法,收益法,成本法,估值技术,折现现金流,可观察输入值,会计估计变更,重置成本","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第39号——公允价值计量、企业会计准则第2号——长期股权投资"},{"id":"QA0170","q":"公允价值层次间的转换?","a":"公允价值计量层次之间的转换:(1)转换时点—导致转换的事件或情况发生变化的日期;(2)转换频率—可能频繁发生(如股票从活跃市场退市,从第一层次转为第二层次);(3)披露要求—在附注中披露当期各层次之间重大转换的金额和原因。企业应制定公允价值层次划分的书面政策和评估程序,确保层次分类的准确性和一致性。个人理解,供参考。","cat":"公允价值计量","kw":"公允价值层次转换,转换时点,第一层次,第二层次,第三层次,转换频率,附注披露","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第39号——公允价值计量"},{"id":"QA0171","q":"会计政策变更的累积影响数如何计算?","a":"累积影响数=假设新政策自始至终采用的情况下,对列报前期最早期初留存收益的累计影响。步骤:(1)确定新旧政策下的各期差异;(2)计算差异对所得税的影响(税后净额);(3)加总各期税后差异。累积影响数只追溯至列报前期的最早期初,更早期间的差异直接调整该期初留存收益。个人理解,供参考。","cat":"会计政策/估计变更","kw":"累积影响数,追溯调整法,留存收益,列报前期,所得税影响,税后净额","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第28号——会计政策、会计估计变更和差错更正"},{"id":"QA0172","q":"会计估计变更的披露要求?","a":"会计估计变更的披露:(1)变更的内容和原因;(2)变更对当期的影响金额;(3)变更对未来期间的影响金额(如可合理预期);(4)影响金额无法确定的,披露无法确定的事实和理由。常见估计变更:坏账准备计提比例、折旧年限和残值率、存货可变现净值、预计负债金额等。重大项目需在报表附注中重点披露。个人理解,供参考。","cat":"会计政策/估计变更","kw":"会计估计变更,附注披露,影响金额,坏账率,折旧年限,预计负债,未来影响","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第28号——会计政策、会计估计变更和差错更正、企业会计准则第22号——金融工具确认和计量"},{"id":"QA0173","q":"前期差错的重要性判断标准?","a":"前期差错是否属于重大差错的判断:(1)金额—差错的绝对金额或相对比例是否影响报表使用者的经济决策;(2)性质—差错是否涉及舞弊、合规性、关键业绩指标等。常见重大差错:收入确认提前/推迟、资产减值漏提、合并范围错误、成本费用跨期等。非重大差错可在发现当期直接调整,无需追溯重述。个人理解,供参考。","cat":"会计政策/估计变更","kw":"前期差错,重要性,金额标准,性质标准,舞弊,合并范围,收入确认","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第28号——会计政策、会计估计变更和差错更正"},{"id":"QA0174","q":"追溯重述法的具体操作?","a":"追溯重述法的步骤:(1)确定差错对各期间的影响(含所得税影响);(2)编制更正分录—调整差错发生期间的资产/负债和留存收益;(3)重述列报期间的所有比较财务报表;(4)附注中披露差错性质、影响金额和各期更正金额。注意:追溯重述后,比较财务报表视同差错从未发生。不可将调整直接计入发现当期的损益(除不重大差错)。个人理解,供参考。","cat":"会计政策/估计变更","kw":"追溯重述法,更正会计分录,比较报表,留存收益,附注披露,所得税影响","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第28号——会计政策、会计估计变更和差错更正"},{"id":"QA0175","q":"会计估计变更中的管理层偏见?","a":"会计估计应基于可获取的可靠信息,避免管理层偏见。常见偏见:(1)乐观偏见—过高估计资产可收回金额或过低估计负债;(2)锚定偏见—过度依赖上期估计而未关注新信息;(3)确认偏见—只关注支持管理层预期的信息。审计师需重点关注重大会计估计的合理性,包括测试管理层假设的敏感性、比较历史估计的准确性。个人理解,供参考。","cat":"会计政策/估计变更","kw":"会计估计,管理层偏见,乐观偏见,锚定偏见,确认偏见,敏感性分析,审计","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第28号——会计政策、会计估计变更和差错更正"},{"id":"QA0176","q":"首次执行新准则的过渡安排?","a":"以新金融工具准则为例的过渡安排:(1)分类和计量—比较期不重述,差额调整期初留存收益;(2)减值—从已发生损失转为预期信用损失模型,采用简化过渡法(比较期不重述);(3)套期会计—可选择继续适用原套期会计或新准则。新收入准则的过渡:可选择完全追溯或简化追溯(仅调整首次执行日的未完成合同)。个人理解,供参考。","cat":"会计政策/估计变更","kw":"首次执行,过渡安排,新金融工具准则,新收入准则,简化追溯,比较期,留存收益","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第28号——会计政策、会计估计变更和差错更正、企业会计准则第22号——金融工具确认和计量"},{"id":"QA0177","q":"会计政策变更与会计估计变更的实务区分?","a":"实务中最易混淆的是折旧方法的变更:折旧方法改变属于会计政策变更,折旧年限调整属于会计估计变更(IAS 8将折旧方法变更视为估计变更)。中国准则下建议按CAS 28分类。实务中企业往往倾向于按估计变更处理(无需追溯)。实际处理时需结合变更的原因进行专业判断,不应为了提高便利性而滥用估计变更。个人理解,供参考。","cat":"会计政策/估计变更","kw":"折旧方法,折旧年限,政策变更,估计变更,IAS 8,CAS 28,专业判断","src":"财政部 企业会计准则解释公告","std_ref":"企业会计准则第28号——会计政策、会计估计变更和差错更正"},{"id":"QA0178","q":"会计差错更正在税务上的处理?","a":"前期差错更正的税务处理:(1)少记收入或多记成本费用—补缴税款,涉及滞纳金甚至罚款;(2)多记收入或少记成本费用—申请退税或抵减以后期应纳税所得额;(3)涉及资产减值的补提—不得税前扣除(仅是会计处理差异);(4)企业需同时调整税务申报表,并提供充分的佐证材料。重大差错更正往往引起税务机关的关注。个人理解,供参考。","cat":"会计政策/估计变更","kw":"差错更正,税务处理,补缴税款,退税,纳税调整,滞纳金,税务申报","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第28号——会计政策、会计估计变更和差错更正"},{"id":"QA0179","q":"经营分部的识别标准?","a":"CAS 35规定经营分部基于内部管理报告架构识别:(1)从事能赚取收入和发生费用的经营活动;(2)经营成果由主要经营决策者定期审阅;(3)具有独立的财务信息。遵循管理层法(以内部组织架构和管理报告为基础)。两个或以上经营分部在经济特征相似且满足合并条件时可合并为一个报告分部。个人理解,供参考。","cat":"分部报告","kw":"经营分部,报告分部,管理层法,主要经营决策者,内部管理报告,经济特征相似,合并","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第35号——分部报告"},{"id":"QA0180","q":"报告分部的确定门槛?","a":"经营分部满足以下任一条件即应作为报告分部披露:(1)收入(含对外+分部间)占所有分部总收入的10%或以上;(2)利润/亏损的绝对值占所有盈利/亏损分部之和绝对值较大者的10%或以上;(3)资产占所有分部总资产的10%或以上。未达到门槛的分类为其他项目合并披露。报告分部对外总收入<合并总收入75%时需增加报告分部。个人理解,供参考。","cat":"分部报告","kw":"10%门槛,收入门槛,利润门槛,资产门槛,75%测试,其他项目,对外收入,合并收入","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第35号——分部报告"},{"id":"QA0181","q":"分部间交易的定价和披露?","a":"分部间交易应当按企业实际转移价格计量,并在附注中披露:(1)分部间交易定价的基础和方法;(2)分部间交易金额;(3)分部间交易未实现利润的抵消信息。集团内部转移价格的制定需符合独立交易原则(尤其在跨境交易中涉及转让定价合规)。高比例分部间交易(如垂直整合型企业)需重点披露。个人理解,供参考。","cat":"分部报告","kw":"分部间交易,转移价格,独立交易原则,转让定价,分部附注,内部交易,未实现利润抵消","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第35号——分部报告"},{"id":"QA0182","q":"如何确定主要经营决策者?","a":"CAS 35中主要经营决策者是指定期审阅各经营分部的经营成果、分配资源、评价业绩的决策者。通常为CEO和高级管理层团队,或管理委员会。不一定是单一个人,而是职能群体。判断标准:谁在实质上负责评估分部绩效并做出资源分配决策,与其法律头衔无关。从董事会纪要、管理层会议记录等内部文档可识别。个人理解,供参考。","cat":"分部报告","kw":"主要经营决策者,CEO,管理委员会,事业部总裁,资源分配,绩效评价,内部文档,董事会纪要","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第35号——分部报告"},{"id":"QA0183","q":"分类信息的分部披露格式?","a":"CAS 35要求每个报告分部至少披露:(1)分部收入和费用(含利息收入和支出);(2)分部利润或亏损;(3)分部资产和负债;(4)折旧摊销和资本性支出;(5)非现金费用(减值损失等);(6)按产品或服务分类的对外收入;(7)按地区分类的对外收入和非流动资产。还需提供分部信息与合并报表总额的调节表,使分部合计能调节到合并总数。个人理解,供参考。","cat":"分部报告","kw":"分部披露,分部收入,分部费用,分部资产,分部负债,折旧摊销,调节表,地区信息","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第35号——分部报告"},{"id":"QA0184","q":"中期财务报告的编制原则?","a":"CAS 32规定中期财务报告采用独立观原则—每个中期视同独立的会计期间。具体:(1)资产和负债的确认与计量同年度报表一致;(2)收入和费用的确认基于年初至今的实际发生额;(3)季节性收入应在发生时确认,不得在中期之间平滑分配;(4)会计估计变更采用未来适用法。中期报表附注可以比年度报表简化。个人理解,供参考。","cat":"中期财务报告","kw":"独立观,中期,季节性收入,平滑分配,会计估计变更,未来适用法,简化附注,年初至今","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第32号——中期财务报告"},{"id":"QA0185","q":"中期报表的所得税费用确认?","a":"中期所得税费用采用年度有效税率法:(1)估计全年的预计有效税率;(2)将年初至本中期止的税前利润乘以预计年度有效税率计算累计所得税费用;(3)减上期累计已确认的所得税费用,得到本中期所得税费用。年度有效税率需考虑:税法优惠、不可抵扣费用、递延所得税资产的可实现性等。税率重大变化时在变化当期调整。个人理解,供参考。","cat":"中期财务报告","kw":"中期所得税,年度有效税率法,税前利润,累计所得税,预计有效税率,税率调整,所得税费用","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第32号——中期财务报告、企业会计准则第18号——所得税"},{"id":"QA0186","q":"中期报告中的资产减值处理?","a":"中期资产减值特殊规则:(1)商誉等需每年测试减值的资产,中期存在减值迹象时仍需测试;(2)中期确认的减值损失,后续中期或年度不得转回(适用CAS 8不得转回规定);(3)中期存货跌价准备的转回遵循CAS 1;(4)中期ECL如果在后续表明情况好转可以转回。中期减值测试方法与年度相同,但可使用合理估计。个人理解,供参考。","cat":"中期财务报告","kw":"中期减值,商誉,无形资产,减值迹象,不得转回,存货跌价,ECL,信用减值转回,合理估计","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第32号——中期财务报告、企业会计准则第8号——资产减值、企业会计准则第1号——存货、企业会计准则第22号——金融工具确认和计量"},{"id":"QA0187","q":"中期报告中的基本每股收益计算?","a":"中期基本每股收益的计算:(1)分子—年初至本中期的归属于普通股股东的净利润;(2)分母—年初至本中期的发行在外普通股加权平均数;(3)稀释性判断—基于年初至本中期的累计数据;(4)股票股利、配股、分拆等—追溯调整加权平均股数。中期每股收益与年度计算方法相同,但期间更短。个人理解,供参考。","cat":"中期财务报告","kw":"中期每股收益,基本每股收益,稀释每股收益,加权平均,净利润,潜在普通股,股票股利,追溯调整","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第32号——中期财务报告"},{"id":"QA0188","q":"中期财务报告的范围和内容?","a":"CAS 32要求中期财务报告至少包括:(1)简化的资产负债表、利润表、现金流量表、所有者权益变动表;(2)中期财务报表附注。附注需包括:重大事项、会计政策变更、估计变更和差错更正、季节性收入、重大关联交易、财务承诺和或有事项的变化等。比较信息应包括上年同期的中期数据。个人理解,供参考。","cat":"中期财务报告","kw":"中期报告内容,简化资产负债表,简化利润表,中期附注,比较信息,会计政策变更,季节性,关联交易","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第32号——中期财务报告"},{"id":"QA0189","q":"前期差错更正在审计中的处理?","a":"审计中发现前期差错的处理:(1)确定差错的重大性;(2)重大差错—要求管理层按追溯重述法更正;如管理层不同意,可能出具保留或否定意见;(3)非重大差错—可建议在发现当期调整。常见审计发现的差错:收入跨期、成本费用挂账、折旧计提错误、减值准备漏提、合并范围错误等。差错是否表明内控存在重大缺陷也需评估。个人理解,供参考。","cat":"前期差错更正","kw":"审计,前期差错,重大性,追溯重述法,保留意见,否定意见,收入跨期,内控缺陷,合并范围","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第28号——会计政策、会计估计变更和差错更正"},{"id":"QA0190","q":"前期差错涉及的递延所得税调整?","a":"前期差错更正常伴随递延所得税调整:(1)差错导致资产/负债账面价值与计税基础产生差异时,需同时确认递延所得税资产或负债;(2)递延所得税的对方科目为留存收益(而非所得税费用);(3)更正后如果以前年度可抵扣亏损发生变化,需重新评估递延所得税资产。前期差错更正涉及的税务处理往往需要调整当年的税务申报。个人理解,供参考。","cat":"前期差错更正","kw":"递延所得税,留存收益,计税基础,可抵扣亏损,所得税费用,税务申报,纳税调整,配比原则","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第28号——会计政策、会计估计变更和差错更正、企业会计准则第18号——所得税"},{"id":"QA0191","q":"常见的会计差错类型和原因?","a":"实务中常见的前期差错:(1)收入确认差错—提前或推迟确认、总额法/净额法误用;(2)费用跨期差错—费用未在应归属期间入账;(3)资产确认差错—应资本化的支出费用化;(4)资产减值差错—减值迹象漏评或减值金额错误;(5)合并报表差错—合并范围错误、内部交易抵销不完整;(6)税务差错—税款计提错误。原因:准则理解偏差、信息不完整、人为疏忽或舞弊。健全内控可降低差错发生率。个人理解,供参考。","cat":"前期差错更正","kw":"差错类型,收入确认,费用跨期,资本化,资产减值,合并范围,税务差错,内部控制,舞弊","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第28号——会计政策、会计估计变更和差错更正、企业会计准则第17号——借款费用"},{"id":"QA0192","q":"会计差错更正对企业财务指标的影响?","a":"前期差错更正对财务指标的影响:(1)留存收益—直接影响期初数;(2)净利润—比较期间的净利润发生变化;(3)每股收益—比较期间的EPS需重新计算;(4)净资产收益率和资产负债率—受净值变化影响;(5)现金流—更正影响损益的同时可能影响经营活动现金流。重大差错更正往往导致企业发布更正公告,引起市场关注。个人理解,供参考。","cat":"前期差错更正","kw":"财务指标,留存收益,净利润,每股收益,净资产收益率,资产负债率,更正公告,市场关注","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第28号——会计政策、会计估计变更和差错更正"},{"id":"QA0193","q":"追溯重述法在首次执行日的操作?","a":"追溯重述法在首次执行日:(1)确定差错对列报前期期初留存收益的累积影响;(2)对所有相关账户进行调整;(3)重述比较财务报表;(4)附注中披露差错性质、各期更正金额。如果累积影响数无法确定(如信息缺失),从可确定的期间开始重述。追溯重述涉及复杂的会计分录和税务调整,需谨慎操作。个人理解,供参考。","cat":"前期差错更正","kw":"追溯重述法,留存收益,比较报表,累积影响数,无法确定,重述披露,税务调整,会计分录","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第28号——会计政策、会计估计变更和差错更正"},{"id":"QA0194","q":"合并范围确定的控制三要素?","a":"CAS 33规定控制三要素:(1)权力—投资方是否拥有对被投资方的权力(如多数表决权、罢免权、合同安排赋予的权利);(2)可变回报—是否享有被投资方的可变回报(股利、管理费、超额收益等);(3)权力影响回报—是否能运用权力影响回报(是否为主要责任人而非代理人)。控制强调实质而非形式,持股过半仅是参考指标之一。个人理解,供参考。","cat":"合并报表","kw":"控制三要素,权力,可变回报,代理人,主要责任人,持股比例,表决权,实质重于形式","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"QA0195","q":"结构化主体的合并判断?","a":"结构化主体(资产支持证券ABS、信托计划、基金等)的合并判断:(1)表决权不是唯一控制判断依据;(2)需综合考虑:设立目的和设计、相关活动及主导权、可变回报的量级和可变性;(3)管理人往往以代理人身份出现,判断是否为主要责任人考虑:决策权范围、其他方实质性权利、报酬水平、风险敞口。ABS发起行通常因担任服务商且持有次级份额而需要合并。个人理解,供参考。","cat":"合并报表","kw":"结构化主体,ABS,信托,合并,代理人,主要责任人,发起行,服务商,次级份额,可变回报","src":"财政部 企业会计准则解释公告","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"QA0196","q":"母子公司会计政策不一致的处理?","a":"合并报表编制中母子公司应采用统一的会计政策。若政策不一致(如母公司采用CR折旧、子公司采用SL折旧):(1)合并报表需将子公司政策调整为与母公司一致;(2)调整分录在合并工作底稿中体现而非修改子公司单体账;(3)常见不一致:折旧方法、存货计价方法、收入确认时点、预计负债估计方法等;(4)非重大差异:影响金额对合并报表不重大时可不予调整,但需在附注中说明。个人理解,供参考。","cat":"合并报表","kw":"统一会计政策,合并调整,折旧方法,存货计价,收入确认,调整分录,工作底稿,非重大差异","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"QA0197","q":"合并报表中内部交易未实现利润的抵销?","a":"内部交易未实现利润的抵销:(1)顺流交易(母公司→子公司)—抵销母公司收入成本和子公司存货中的未实现利润;(2)逆流交易(子公司→母公司)—抵销子公司收入和母公司存货中的未实现利润;(3)内部交易固定资产—抵销未实现利润和多提的折旧;(4)内部债权债务—抵销内部应收应付和坏账准备。抵销方法受股权比例和交易方向影响。内部交易抵销是合并报表最复杂的环节之一。个人理解,供参考。","cat":"合并报表","kw":"内部交易,未实现利润,顺流交易,逆流交易,抵销,存货,固定资产,内部债权债务,坏账准备","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第33号——合并财务报表、企业会计准则第22号——金融工具确认和计量"},{"id":"QA0198","q":"出售子公司股权不丧失控制权的处理?","a":"出售部分子公司股权但不丧失控制权(如从80%减至60%)的处理:(1)处置价款与按处置比例计算的子公司净资产账面价值的差额—调整资本公积(而非确认投资收益);(2)属于权益交易而非处置;(3)合并报表中不重新计量剩余权益;(4)利润表中不产生处置损益。这与出售+丧失控制权的处理有本质区别,后者需确认投资收益。个人理解,供参考。","cat":"合并报表","kw":"丧失控制权,不丧失控制权,权益交易,资本公积,处置损益,合并报表,剩余权益,处置比例","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"QA0199","q":"母公司向少数股东购买股权的处理?","a":"母公司向少数股东购买子公司股权(增持不改变控制状态)属于权益交易:(1)支付对价与按新增比例计算的子公司净资产份额的差额—调整资本公积(不足则调整留存收益);(2)不确认商誉或损益;(3)合并报表中不重新计量子公司资产/负债。这是因为企业合并已在取得控制权日完成,后续增持仅是权益的内部转移,不影响企业合并完成的认定。个人理解,供参考。","cat":"合并报表","kw":"权益交易,少数股东,增持,资本公积,留存收益,商誉,企业合并,内部转移","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"QA0200","q":"合并报表中的所得税处理?","a":"合并报表递延所得税处理要点:(1)内部交易未实现利润抵销—存货账面低于计税基础产生可抵扣差异,确认递延所得税资产;(2)购买日公允价值调整—资产增值产生应纳税差异,确认递延所得税负债并调整商誉;(3)内部交易产生的递延所得税按购买方税率计算。合并报表税率与各单体税率不一致时,统一使用母公司税率计算递延所得税。个人理解,供参考。","cat":"合并报表","kw":"递延所得税,内部交易,公允价值调整,商誉,母公司税率,未实现利润,抵销,可抵扣差异","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第33号——合并财务报表、企业会计准则第18号——所得税"},{"id":"QA0201","q":"合并现金流量表的编制?","a":"合并现金流量表的编制方法:(1)以合并资产负债表和合并利润表为基础—采用间接法或直接法编制;(2)逐笔抵销集团内部现金流量—内部购销、内部借贷、内部投资等;(3)少数股东权益变动—子公司向少数股东分红在筹资活动列示;(4)收购/出售子公司—投资活动中列示收购/出售净额。合并现金流量表需与合并资产负债表中的货币资金变动一致。个人理解,供参考。","cat":"合并报表","kw":"合并现金流量表,间接法,直接法,内部现金流量抵销,筹资活动,投资活动,少数股东,收购子公司","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"QA0202","q":"复杂股权结构下的合并处理(多层控股)?","a":"多层控股(母公司→子公司→孙公司)的合并:(1)逐层合并法—先从孙公司合并到子公司,再与母公司合并;(2)一次合并法—将所有子公司和孙公司数据一次纳入合并工作底稿。关键处理:(1)间接持股的少数股东权益和损益—需递归计算;(2)内部交易涉及多层级—需逐层抵销;(3)子公司间的交易—全额抵销。多层控制下控制权路径可能复杂,需逐层分析控制关系。个人理解,供参考。","cat":"合并报表","kw":"多层控股,逐层合并,一次合并,少数股东,间接持股,内部交易抵销,递归计算,控制权路径","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"QA0203","q":"合并报表中子公司超额亏损的处理?","a":"子公司超额亏损(子公司亏损超过少数股东权益)的处理:(1)少数股东权益为零后,超额亏损由母公司承担(即全部计入归属于母公司的净利润);(2)少数股东权益不能为负数(在中国准则下);(3)子公司后续实现盈利时,按相反顺序恢复—先归还母公司承担的超额亏损,再将剩余利润分配给少数股东。在IFRS下,少数股东可以承担超额亏损使少数股东权益为负。中国准则和IFRS在此存在差异。个人理解,供参考。","cat":"合并报表","kw":"超额亏损,少数股东权益,少数股东,母公司承担,子公司亏损,净利润,恢复,IFRS差异","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"QA0204","q":"投资性房地产的范围界定?","a":"CAS 3规定投资性房地产包括:(1)已出租的土地使用权;(2)持有并准备增值后转让的土地使用权;(3)已出租的建筑物。不包括:自用房地产、作为存货的房地产(开发企业的房产)、以经营租赁方式租入再转租的建筑物(适用CAS 21)。已出租建筑物的确认时点为租赁期开始日。个人理解,供参考。","cat":"投资性房地产","kw":"已出租土地使用权,持有增值转让,已出租建筑物,自用房地产,存货,经营租赁转租","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第3号——投资性房地产、企业会计准则第21号——租赁"},{"id":"QA0205","q":"成本模式转为公允价值模式?","a":"成本模式转为公允价值模式属于会计政策变更,采用追溯调整法:(1)转换日按公允价值计量;(2)公允价值与原账面价值的差额调整期初留存收益;(3)对所有投资性房地产采用同一种模式;(4)公允价值模式一经采用不得转回成本模式。变更需有活跃市场证据支持,通常在房地产市场交易活跃时进行。个人理解,供参考。","cat":"投资性房地产","kw":"成本模式,公允价值模式,追溯调整法,留存收益,活跃市场,不得转回,会计政策变更","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第3号——投资性房地产"},{"id":"QA0206","q":"自用房地产转为投资性房地产(公允价值模式)?","a":"自用房地产(固定资产/无形资产)转换为公允价值模式计量的投资性房地产:(1)转换日公允价值>原账面价值—差额计入其他综合收益(不影响当期损益);(2)转换日公允价值<原账面价值—差额计入公允价值变动损益(当期损益)。这种不对称处理防止企业利用转换操纵利润。转换日后按公允价值计量,变动计入当期损益。个人理解,供参考。","cat":"投资性房地产","kw":"自用转投资性房地产,公允价值模式,其他综合收益,公允价值变动损益,操纵利润,转换日","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第3号——投资性房地产"},{"id":"QA0207","q":"投资性房地产转为自用的处理?","a":"公允价值模式的投资性房地产转为自用固定资产—转换日以公允价值作为入账价值,与原账面价值的差额计入当期损益(公允价值变动损益)。成本模式的投资性房地产转为自用—按账面价值结转,不产生转换差额。转换日为房地产达到自用状态的日期。转换后按固定资产准则计提折旧。个人理解,供参考。","cat":"投资性房地产","kw":"投资性房地产转自用,公允价值模式,成本模式,转换日,公允价值变动损益,固定资产,折旧","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第3号——投资性房地产"},{"id":"QA0208","q":"房地产企业部分出租部分自用的处理?","a":"房地产企业开发的房产部分出租、部分自用、部分待售:(1)出租部分确认为投资性房地产;(2)自用部分确认为固定资产;(3)待售部分确认为存货(开发产品)。各部分能单独计量和出售应分别核算;不能单独计量的按建筑面积比例分配。大型商业综合体经常呈现多种用途混合,需按实际用途合理划分。个人理解,供参考。","cat":"投资性房地产","kw":"部分出租,部分自用,部分待售,分别核算,建筑面积比例,商业综合体,房地产开发企业","src":"深圳证券交易所 会计监管动态","std_ref":"企业会计准则第3号——投资性房地产"},{"id":"QA0209","q":"投资性房地产的后续支出处理?","a":"投资性房地产后续支出:(1)资本化—使未来经济利益超过原评估绩效水平(如装修升级、扩建),计入投资性房地产成本;(2)费用化—日常维修养护支出,计入当期损益(其他业务成本)。公允价值模式下资本化的后续支出增加账面价值;成本模式下比照固定资产规则处理。注意投资性房地产的装修摊销与一般固定资产不同。个人理解,供参考。","cat":"投资性房地产","kw":"后续支出,资本化,费用化,装修,日常维修,公允价值模式,成本模式,其他业务成本","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第3号——投资性房地产、企业会计准则第17号——借款费用"},{"id":"QA0210","q":"消耗性vs生产性生物资产的分类?","a":"CAS 5将生物资产分为两类:(1)消耗性—为出售或收获而持有,如存栏待售的牲畜、生长中的林木、养殖中的鱼,按成本计量,期末减值测试;(2)生产性—为产出农产品或提供劳务而持有,如果树、产奶的牛、种畜,可选择成本模式或公允价值模式。消耗性生物资产收获后转存货处理;生产性生物资产类似固定资产需计提折旧。个人理解,供参考。","cat":"生物资产","kw":"消耗性生物资产,生产性生物资产,成本模式,公允价值模式,折旧,存货,减值","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第5号——生物资产"},{"id":"QA0211","q":"生物资产的收获和农产品初始确认?","a":"从生产性生物资产上收获的农产品(如采摘的水果、挤出的牛奶),按收获时的公允价值减销售费用确定入账价值。收获后适用CAS 1存货准则。消耗性生物资产收获(如伐木)—收获后转入存货(木材),按账面价值结转。农产品的初始确认使用公允价值,后续按存货成本与可变现净值孰低计量。个人理解,供参考。","cat":"生物资产","kw":"农产品,收获,公允价值减销售费用,存货,可变现净值,木材,牛奶,水果","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第5号——生物资产、企业会计准则第1号——存货"},{"id":"QA0212","q":"生物资产公允价值模式的适用?","a":"生物资产采用公允价值模式需满足:(1)有活跃市场的公开报价;(2)公允价值能够持续可靠取得。一旦选择,对所有同类生物资产均须采用公允价值模式。公允价值变动计入当期损益。从公允价值模式转回成本模式不允许。目前我国农业企业多采用成本模式,因大部分生物资产缺乏活跃市场。个人理解,供参考。","cat":"生物资产","kw":"公允价值模式,活跃市场,公开报价,持续性,公允价值变动损益,成本模式,不得转回","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第5号——生物资产"},{"id":"QA0213","q":"天然起源的生物资产的会计处理?","a":"天然起源的生物资产(天然林、天然草场等):(1)按名义金额(通常1元)确认入账,同时确认等额的营业外收入;(2)后续管护费用按实际发生资本化或费用化。天然起源资产的公允价值难以合理确定,故采用名义金额处理。实务中天然起源的生物资产往往由国有或集体单位持有。个人理解,供参考。","cat":"生物资产","kw":"天然起源,名义金额,营业外收入,管护费,国有林场,初始确认,收获成本","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第5号——生物资产、企业会计准则第17号——借款费用"},{"id":"QA0214","q":"生物资产减值与转回的特殊规定?","a":"消耗性生物资产—按CAS 1存货准则,可变现净值低于账面值时计提跌价准备;后续可变现净值回升可在原计提范围内转回。生产性生物资产—按CAS 8固定资产准则,减值一经确认不得转回。减值迹象需考虑:自然灾害(冻灾、疫病)、农产品价格大幅下跌、生长状况恶化(病虫害)等。个人理解,供参考。","cat":"生物资产","kw":"消耗性生物资产,生产性生物资产,可变现净值,减值跌价准备,减值转回,自然灾害,病虫害","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第5号——生物资产、企业会计准则第1号——存货、企业会计准则第8号——资产减值"},{"id":"QA0215","q":"资产负债表日后调整事项的具体类型?","a":"CAS 29列举的调整事项包括:(1)诉讼案件在日后结案—需调整预计负债或确认新负债;(2)资产的减值证据在日后取得—如债务人破产,需补提坏账;(3)购入资产成本或售出资产收入在日后确定—如发票在日后到达;(4)日后发现财务报表舞弊或差错;(5)日后确定的股利分配预案(作为利润分配处理,不调整前期报表)。调整事项需在报表中确认并在附注中说明影响。个人理解,供参考。","cat":"资产负债表日后事项","kw":"调整事项,诉讼结案,破产,坏账,前期差错,舞弊,股利分配预案,财务报表","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第29号——资产负债表日后事项"},{"id":"QA0216","q":"资产负债表日后非调整事项的披露要求?","a":"非调整事项不调整报表数据,但需在附注中充分披露。包括:(1)重大投资、并购或处置;(2)发行股票或债券;(3)重大诉讼或仲裁;(4)自然灾害造成的重大损失;(5)汇率或税率重大变化;(6)资产价格重大波动等。披露内容:事项的性质、内容及其对财务状况和经营成果的估计影响(或无法估计的原因)。重要非调整事项未披露可能使报表使用者产生误解。个人理解,供参考。","cat":"资产负债表日后事项","kw":"非调整事项,附注披露,并购,诉讼,自然灾害,汇率变动,子公司破产,清算,重大投资","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第29号——资产负债表日后事项"},{"id":"QA0217","q":"资产负债表日后事项的涵盖期间?","a":"CAS 29规定涵盖期间为:资产负债表日(12月31日)至财务报告批准报出日。批准报出日通常:(1)上市公司—董事会批准报出日;(2)非上市国有企业—总经理办公会或类似机构批准日;(3)需经股东大会审议的—以董事会批准日为准。批准报出日后发现的重要事项,按前期差错更正处理。实务中需制定合理的审批流程和时间表。个人理解,供参考。","cat":"资产负债表日后事项","kw":"涵盖期间,资产负债表日,批准报出日,董事会,股东大会,总经理办公会,前期差错更正","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第29号——资产负债表日后事项"},{"id":"QA0218","q":"资产负债表日后发现上年度销售退回的处理?","a":"资产负债表日后、财务报告批准报出日前,发生上年度销售退回:(1)属于调整事项—调整报告年度的营业收入和营业成本;(2)调减报告年度的应收账款和应交税费(增值税);(3)同时考虑所得税影响。如果退回发生在批准报出日后,则作为当期事项处理。实务中季末退货率异常应引起审计师关注。个人理解,供参考。","cat":"资产负债表日后事项","kw":"销售退回,调整事项,营业收入,营业成本,应收账款,所得税,批准报出日,审计关注","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第29号——资产负债表日后事项"},{"id":"QA0219","q":"保险合同的识别和分拆?","a":"CAS 25(2020)要求将保险合同中的嵌入衍生工具、可拆分的投资成分和承诺的服务分拆处理:(1)嵌入衍生工具—特征与主合同不紧密相关时需分拆按CAS 22处理;(2)可区分的投资成分—分拆按CAS 22或CAS 21处理;(3)明确的承诺服务—分拆按CAS 14收入准则处理。核心原则:合同中含有多种成分时,必须识别并拆分不属于保险风险的部分。个人理解,供参考。","cat":"保险合同","kw":"保险合同,分拆,嵌入衍生工具,投资成分,承诺服务,保险风险,收入准则","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第25号——保险合同、企业会计准则第22号——金融工具确认和计量、企业会计准则第21号——租赁、企业会计准则第14号——收入"},{"id":"QA0220","q":"保险合同准备金的计量?","a":"新CAS 25采用普遍适用模型(GMM)计量保险合同负债:(1)履约现金流量—未来现金流概率加权估计+折现+非金融风险调整;(2)合同服务边际(CSM)—首日利得不确认损益,确认为CSM并在保险期间内分摊;(3)首日损失—立即确认亏损并在亏损组中核算。CSM的分摊基于保险单元比例在保险期间内摊销。CSM在每个资产负债表日重新计量。个人理解,供参考。","cat":"保险合同","kw":"保险合同负债,GMM,履约现金流量,合同服务边际,折现,风险调整,首日损失,保费收入","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第25号——保险合同"},{"id":"QA0221","q":"保险服务收入的确认原则?","a":"新CAS 25下保险服务收入的确认:(1)保险收入不包括投资成分—收取保费中投资成分相关金额不作为保险收入;(2)保险收入=保费分摊额+预期风险敞口释放额+预期费用回收额;(3)收入随服务提供逐步确认,非收到保费时一次性确认。保险服务费用在发生时确认。新准则下保险收入远低于原准则下的保费收入。个人理解,供参考。","cat":"保险合同","kw":"保险服务收入,投资成分,风险敞口,保费分摊,保险服务业绩,保险服务费用,新CAS 25","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第25号——保险合同"},{"id":"QA0222","q":"分出再保险合同的会计处理?","a":"分出再保险的处理:(1)分出人确认分出再保险资产(应收分保款+分出准备金);(2)分出人向再保险人支付的分出保费不确认为收入减少,而是分出再保险费用;(3)再保险人应摊回赔款—确认为分出再保险收入;(4)分出人需对分出再保险资产进行减值测试。分出人不能因分保而终止确认对原被保险人的赔付义务。个人理解,供参考。","cat":"保险合同","kw":"分出再保险,分出保费,再保险人,应收分保款,分出费用,赔付分摊,减值测试,分出准备金","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第25号——保险合同"},{"id":"QA0223","q":"经营活动现金流量的间接法和直接法区别?","a":"CAS 31允许两种编制方法:(1)直接法—按现金收入和支出的主要类别列示,直观但不常用(因企业需逐笔分类);(2)间接法—以净利润为起点,调整非现金项目、存货和经营性应收应付变动、投资和筹资活动影响。中国企业实务中绝大多数采用间接法编制经营活动现金流量。间接法下需在附注中披露净利润调节为经营活动现金流量的信息。个人理解,供参考。","cat":"现金流量表","kw":"直接法,间接法,净利润调节,非现金项目,经营性应收应付,存货变动,附注披露","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第31号——现金流量表"},{"id":"QA0224","q":"租赁相关的现金流量列报?","a":"新租赁准则下:(1)偿还租赁负债本金—筹资活动现金流出;(2)偿还租赁负债利息—筹资活动(但可按会计政策一致选择为经营活动);(3)短期租赁和低价值资产租赁付款—经营活动现金流出;(4)可变租赁付款额(不纳入租赁负债部分)—经营活动现金流出。关键变化:原准则下所有经营租赁付款在经营活动,新准则下本金部分移入筹资活动。个人理解,供参考。","cat":"现金流量表","kw":"租赁,使用权资产,租赁负债,筹资活动,经营活动,短期租赁,低价值资产租赁","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第31号——现金流量表"},{"id":"QA0225","q":"现金流量表中的汇率变动影响?","a":"汇率变动对现金及现金等价物的影响:(1)外币现金流量采用现金流量发生日的即期汇率或近似汇率折算;(2)外币现金项目的期末余额与期初余额的差额中,汇率变动产生的部分在现金流量表中单独列示(汇率变动对现金的影响);(3)此项目作为现金净增加额的调节项(不能与经营活动/投资活动/筹资活动混淆)。个人理解,供参考。","cat":"现金流量表","kw":"汇率变动,外币折算,即期汇率,近似汇率,现金等价物,汇率影响,调节项","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第31号——现金流量表"},{"id":"QA0226","q":"现金流量表中的购买和处置子公司?","a":"购买或处置子公司的现金流量处理:(1)购买子公司—投资活动现金流出中列示购买价款减去购买日子公司持有的现金及现金等价物后的净额;(2)处置子公司—投资活动现金流入中列示处置价款减去处置日子公司持有的现金及现金等价物后的净额;(3)附注中需单独披露购买/处置子公司对现金流量的影响。全年现金流量表不应包含子公司购买日前的现金流量。个人理解,供参考。","cat":"现金流量表","kw":"购买子公司,处置子公司,净额列示,投资活动,现金流量,附注披露,购买日,处置日","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第31号——现金流量表"},{"id":"QA0227","q":"现金流量表中利息和股利的分类?","a":"利息和股利的分类:(1)收到利息—经营活动或投资活动(企业根据自身情况选择,一致应用);(2)支付利息—经营活动或筹资活动;(3)收到股利—经营活动或投资活动;(4)支付股利—筹资活动。企业一旦选定分类方法应保持一致性,并需在附注中披露分类政策。实务中大多数中国上市公司将收到利息和股利分类为投资活动,支付利息分类为经营活动。个人理解,供参考。","cat":"现金流量表","kw":"利息分类,股利分类,经营活动,投资活动,筹资活动,一致性,附注披露,分类政策","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第31号——现金流量表"},{"id":"QA0228","q":"增值税即征即退、出口退税的政府补助处理?","a":"不同类型税收优惠的处理差异:(1)增值税即征即退、先征后退—属于政府补助,计入其他收益;(2)直接免征、减征增值税—不属于政府补助,无需会计处理;(3)出口退税—企业收回代垫的进项税,不属于政府补助;(4)所得税减免—不属于政府补助。实务中常见误区:误将各种税收优惠全部归类为政府补助。个人理解,供参考。","cat":"政府补助","kw":"增值税即征即退,出口退税,税收优惠,其他收益,直接免征,先征后退","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第16号——政府补助"},{"id":"QA0229","q":"政府补助的退回处理?","a":"已确认的政府补助需要退回时:(1)相关递延收益尚未摊销完毕—冲减递延收益,超出部分计入当期损益;(2)不存在相关递延收益—直接计入当期损益;(3)采用净额法—视同从未收到补助,调整相关资产账面价值并补提折旧。退回原因多为:未满足补助条件、项目未通过验收、专项资金违规使用等。个人理解,供参考。","cat":"政府补助","kw":"退回,递延收益,冲减,当期损益,净额法,补提折旧","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第16号——政府补助"},{"id":"QA0230","q":"政府补助的确认时点?","a":"政府补助应在同时满足两个条件时确认:(1)企业能满足补助所附条件;(2)企业能够收到补助。理论上权责发生制,但实践中地方财政拨款慢,确认为应收的需审慎评估可收回性。如预计拨款存在重大不确定性,或地方财政已严重恶化,不宜按应收金额确认。多数企业倾向于实际收到时才确认。个人理解,供参考。","cat":"政府补助","kw":"确认时点,权责发生制,收付实现制,可收回性,财政拨款,审慎","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第16号——政府补助"},{"id":"QA0231","q":"库存股对每股收益的影响?","a":"企业回购库存股对EPS的影响:(1)基本EPS分母需扣除库存股加权平均数—回购后分母=总股数-库存股加权平均数;(2)库存股不享有股息和表决权,不参与基本EPS计算;(3)库存股重新发行时自发行日起加权计入分母;(4)稀释EPS中,库存股不作为潜在普通股处理。如果企业用借款大量回购,分母减少会提升EPS,但同时增加财务风险。个人理解,供参考。","cat":"每股收益","kw":"库存股,回购,加权平均,分母,基本EPS,稀释EPS,财务风险","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第34号——每股收益"},{"id":"QA0232","q":"稀释每股收益的计算顺序?","a":"多种潜在普通股并存时,按稀释程度从大到小逐次计入稀释EPS。稀释程度=增量股每股收益=增量净利润/增量股数。反稀释的潜在普通股(增加EPS)不得计入。步骤:(1)单独计算每种潜在普通股的增量EPS;(2)按增量EPS从小到大排序;(3)逐次加入计算直至出现反稀释。最稀释的项目最先计入,确保稀释EPS充分反映潜在的稀释效应。个人理解,供参考。","cat":"每股收益","kw":"稀释顺序,增量股,反稀释,排序,多种潜在普通股,计算步骤","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第34号——每股收益"},{"id":"QA0233","q":"每股收益在合并报表中的计算?","a":"合并报表每股收益:(1)分子—合并净利润扣除归属于少数股东的净利润(归属于母公司普通股股东的净利润);(2)分母—母公司发行在外普通股的加权平均数(不受子公司股权结构影响);(3)子公司、合营企业、联营企业发行的可行权转换为母公司普通股的潜在普通股计入稀释EPS。计算合并每股收益时不调整归属于少数股东的净利润。个人理解,供参考。","cat":"每股收益","kw":"合并报表,少数股东,加权平均,母公司普通股,子公司潜在普通股,稀释","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第34号——每股收益、企业会计准则第33号——合并财务报表"},{"id":"QA0234","q":"集团内股份支付的处理?","a":"集团内股份支付(母公司奖励子公司员工)的处理:(1)母公司结算(以自身权益工具授予子公司员工)—母公司计入对子公司的长期股权投资;子公司按权益结算的股份支付处理;(2)母公司以现金结算—子公司按现金结算处理;(3)子公司无结算义务时(由母公司直接授予)—子公司不确认费用。结算方式的差异会直接影响母子公司的个别报表处理。个人理解,供参考。","cat":"股份支付","kw":"集团股份支付,权益结算,现金结算,长期股权投资,资本公积,母公司,子公司","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第11号——股份支付"},{"id":"QA0235","q":"取消和结算股份支付计划的处理?","a":"取消或结算已授予的股份支付计划时:(1)加速确认剩余等待期内的服务金额—全部在取消日一次性确认;(2)如有替代方案,新旧方案差额计入当期损益;(3)职工自愿放弃可不作为取消处理。重新定价(降低行权价)视为对原方案的修改,需确认增量支出。个人理解,供参考。","cat":"股份支付","kw":"取消,结算,加速确认,替代方案,重新定价,增量支出,行权价","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第11号——股份支付"},{"id":"QA0236","q":"股份支付的确认和计量基本原则?","a":"CAS 11规定:以权益结算的股份支付按授予日权益工具的公允价值计量(不以行权日价值调整);以现金结算的股份支付按每个资产负债表日负债的公允价值计量(重新计量直至行权)。费用在等待期内分摊确认。权益结算在授予日定死公允价值,现金结算每个期末都要重新评估,这是两者最核心的差异。个人理解,供参考。","cat":"股份支付","kw":"权益结算,现金结算,授予日公允价值,重新计量,等待期,行权","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第11号——股份支付"},{"id":"QA0237","q":"所得税费用的构成?","a":"CAS 18规定所得税费用由当期所得税和递延所得税组成:(1)当期所得税—应纳税所得额×适用税率,调整期初欠缴/预缴差异;(2)递延所得税—递延所得税负债和递延所得税资产当期变动净额(不含直接计入OCI或权益的项目)。当期所得税和递延所得税分别计算,两者之和(或差)即为利润表中的所得税费用。个人理解,供参考。","cat":"所得税","kw":"当期所得税,递延所得税,应纳税所得额,适用税率,税率调整,OCI,递延所得税费用","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第18号——所得税"},{"id":"QA0238","q":"递延所得税资产的确认限制?","a":"递延所得税资产的确认受限于未来应纳税所得额的可获得性。确认条件:(1)未来很可能取得足够的应纳税所得额—基于财务预测和税务规划;(2)如果可抵扣暂时性差异预期转回期间企业处于亏损状态,不得确认递延所得税资产;(3)税法和会计的差异导致的亏损可结转后需评估可抵扣年限。实务中,长期亏损企业确认递延所得税资产需审慎,往往被出具保留意见。个人理解,供参考。","cat":"所得税","kw":"递延所得税资产,确认限制,应纳税所得额,财务预测,可抵扣亏损,税务规划,保留意见","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第18号——所得税"},{"id":"QA0239","q":"合并报表层面递延所得税的处理?","a":"合并报表递延所得税主要来自:(1)内部交易未实现利润抵销—存货账面低于计税基础,确认递延所得税资产;(2)购买日公允价值调整—资产增值产生应纳税差异,确认递延所得税负债并调整商誉;(3)内部交易递延所得税按购买方税率计算。合并报表税率与各单体税率不一致时,统一使用母公司税率。个人理解,供参考。","cat":"所得税","kw":"合并报表,递延所得税,内部交易,公允价值调整,商誉,母公司税率,未实现利润抵销","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第18号——所得税"},{"id":"QA0240","q":"股份支付的所得税影响?","a":"股份支付的税务处理与会计处理差异:(1)会计上按授予日公允价值在等待期确认费用;(2)税法上只有在实际行权时才能税前扣除,扣除金额为行权日股票公允价值与行权价的差额(不是授予日公允价值);(3)会计费用和税务扣除的时间差异产生递延所得税资产。企业在确认递延所得税资产时需预估可行权数量和未来股价。个人理解,供参考。","cat":"所得税","kw":"股份支付,递延所得税资产,行权日,可行权数量,公允价值,税前扣除,等待期","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第18号——所得税"},{"id":"QA0241","q":"企业合并中产生的递延所得税?","a":"企业合并中的递延所得税处理:(1)购买日公允价值调整导致的暂时性差异—确认递延所得税负债/资产,对方科目为商誉或廉价购买损益;(2)被合并方原有可抵扣亏损—合并后能否利用取决于未来应纳税所得额预期;(3)合并中确认的递延所得税在后续计量期间发生变化的,计入当期所得税费用(而非调整商誉)。购买日12个月计量期内信息调整除外。个人理解,供参考。","cat":"所得税","kw":"企业合并,递延所得税,购买日,公允价值调整,商誉,可抵扣亏损,计量期,所得税费用","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第18号——所得税"},{"id":"QA0242","q":"资产组减值测试的步骤?","a":"CAS 8规定资产组减值测试步骤:(1)确定资产组的账面价值(含分摊的商誉);(2)估计资产组的可收回金额(FVLCD与VIU两者较高);(3)比较账面价值与可收回金额—如账面>可收回,确认减值损失;(4)分摊减值:先冲减商誉,再按其他资产账面比例分摊(每项资产不得低于其自身FVLCD、VIU或零中的最高者)。商誉全额冲减后,剩余减值才分摊至其他资产。个人理解,供参考。","cat":"资产减值","kw":"资产组,可收回金额,FVLCD,VIU,商誉,减值分摊,账面价值,冲减商誉","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第8号——资产减值"},{"id":"QA0243","q":"使用价值(VIU)计算的关键参数?","a":"使用价值(VIU)计算:(1)未来现金流量—基于管理层批准的最远财务预算(通常不超过5年);(2)预测期后永续增长率—应为稳定或下降的增长率,通常不超过行业长期平均增长率;(3)折现率—反映当前市场对货币时间价值和该资产特定风险的税前折现率,通常以WACC为基础调整。多个资产组或CGU的折现率应反映不同的风险水平,不能对所有资产组用同一折现率。个人理解,供参考。","cat":"资产减值","kw":"使用价值,VIU,未来现金流量,折现率,WACC,永续增长率,税前折现率,财务预算","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第8号——资产减值"},{"id":"QA0244","q":"商誉减值测试的特殊规定?","a":"CAS 8规定商誉不摊销,但每年必须进行减值测试(无论是否有减值迹象)。商誉应以资产组或资产组组合为测试对象。测试方法:(1)将商誉分摊至从企业合并协同效应中受益的资产组或组合;(2)比较含商誉的资产组账面价值与可收回金额;(3)减值先冲减商誉,剩余再分摊至其他资产。商誉减值损失一经确认不得转回。购买方不构成业务的,购买溢价不确认商誉。个人理解,供参考。","cat":"资产减值","kw":"商誉,减值测试,每年测试,资产组,协同效应,不得转回,不构成业务,购买溢价","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第8号——资产减值"},{"id":"QA0245","q":"资产减值迹象的识别?","a":"CAS 8列举的减值迹象分为外部和内部:(1)外部—资产市价大幅下跌、经营环境重大不利变化、市场利率或投资回报率提高影响折现率;(2)内部—资产陈旧过时或实体损坏、使用方式重大不利变化、资产被终止使用或计划提前处置。每个资产负债表日应系统评估减值迹象。识别到减值迹象后立即进行减值测试。个人理解,供参考。","cat":"资产减值","kw":"减值迹象,外部迹象,内部迹象,市价下跌,经营环境,陈旧过时,投资回报率,折现率","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第8号——资产减值"},{"id":"QA0246","q":"总部资产减值的测试方法?","a":"总部资产(企业集团总部办公楼、研发中心等)不能独立产生现金流,需分摊至资产组进行减值测试:(1)将总部资产账面价值合理分摊至各资产组(按账面价值比例或其他合理基础);(2)对含分摊总部资产的各资产组进行减值测试;(3)总部资产难以分摊至个别资产组时,先将部分账面价值分摊,再将剩余总部资产分摊至最小资产组组合进行第二次测试。个人理解,供参考。","cat":"资产减值","kw":"总部资产,分摊,资产组,账面价值比例,可收回金额,两次测试,资产组组合","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第8号——资产减值"},{"id":"QA0247","q":"坏账准备计提方法的实务选择?","a":"应收款项坏账准备的计提方法:(1)单项计提—对金额重大或有客观证据表明已发生减值的应收款项,逐项测试可收回金额;(2)组合计提—对信用风险特征相似的应收款项(按账龄、客户类型、地区等分组),采用减值矩阵法或迁徙率模型。新金融工具准则下需考虑前瞻性信息调整历史损失率。实务中大多数企业采用账龄分析法结合单项计提。个人理解,供参考。","cat":"实务综合","kw":"坏账准备,单项计提,组合计提,减值矩阵,迁徙率,前瞻性信息,账龄分析法,信用风险","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第22号——金融工具确认和计量"},{"id":"QA0248","q":"企业收到政府拆迁补偿款的会计处理?","a":"政府拆迁补偿款可分三段处理:(1)补偿固定资产拆除损失—计入营业外支出和营业外收入;(2)补偿搬迁费用—冲减搬迁费用或递延分期确认;(3)补偿购置新房产—属于与资产相关的政府补助,通过递延收益分期转其他收益或净额法冲减资产成本。税务上拆迁补偿款可暂不计入应税所得(满足特定条件时)。个人理解,供参考。","cat":"实务综合","kw":"拆迁补偿,政府补助,递延收益,营业外收入,资产相关,搬迁费用,所得税","src":"财政部 企业会计准则解释公告","std_ref":"企业会计准则——基本准则"},{"id":"QA0249","q":"企业财产保险赔款的会计处理?","a":"财产保险赔款的处理原则:(1)损失和赔偿分别确认,不能以预计赔偿冲减损失;(2)实际收到赔款时计入营业外收入或冲减原确认的损失;(3)如已确认预付赔款,收到时冲减预付账款;(4)保险赔款与资产账面差额影响当期损益。损失和赔款不配比,各自独立确认,不能因为预计收到赔款而不确认损失。保险理赔周期较长,需每个报告期评估可收回性。个人理解,供参考。","cat":"实务综合","kw":"保险赔款,营业外收入,营业外支出,预付赔款,独立确认,不配比,损失确认","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则——基本准则"},{"id":"QA0250","q":"合同违约金、赔偿金的会计处理?","a":"违约金的处理取决于产生原因:(1)因自身履约瑕疵导致的赔偿—营业外支出;(2)因延迟交付导致的赔偿—营业外支出;(3)收到客户违约金—冲减应收账款坏账或作为营业外收入。判定原则:与主营业务直接相关的计入收入/成本调整,无关的计入营业外收支。税务上需关注违约金能否税前扣除(是否符合经营相关的合理支出)。个人理解,供参考。","cat":"实务综合","kw":"违约金,赔偿金,营业外支出,营业外收入,冲减收入,税前扣除,主营业务","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则——基本准则"},{"id":"QA0251","q":"外汇管制的企业资金管理应对?","a":"外汇管制环境下企业的资金管理:(1)境内企业对外支付需提供真实交易背景材料;(2)大额购付汇需向外管局申报;(3)跨境资金池需外管局批准;(4)境外放款和担保受额度限制。违规的外汇收支行为可能面临行政处罚甚至刑事责任。企业应建立跨境资金管理制度明确审批流程和申报要求。实务中外汇管制对走出去企业影响较大。个人理解,供参考。","cat":"实务综合","kw":"外汇管制,资金管理,跨境支付,外管局,申报,境外放款,担保,行政处罚","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则——基本准则"},{"id":"QA0252","q":"企业收到科技项目经费(研发补贴)的处理?","a":"科技经费的处理取决于补贴性质:(1)与收益相关且无后续义务—收到时计入当期损益;(2)与资产相关(资金用于购置专用设备)—通过递延收益分期转其他收益或冲减资产成本;(3)有验收义务且在验收前可能退回—先挂其他应付款或专项应付款,验收通过后再转损益。很多企业收到经费时直接进损益的做法可能面临审计调整的风险。个人理解,供参考。","cat":"实务综合","kw":"科技经费,研发补贴,递延收益,验收义务,专项应付款,资产相关,损益确认","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则——基本准则"},{"id":"QA0253","q":"分支机构和子公司的核算区别?","a":"分公司与子公司的核算差异:(1)法律形式—分公司非法人,子公司独立法人;(2)科目—分公司无实收资本,通过上级拨入资金核算总部拨款,子公司有独立实收资本;(3)报表—分公司纳入总公司汇总报表(非合并),子公司纳入合并报表;(4)税务—分公司与总公司合并申报企业所得税,子公司独立纳税。实务中分公司越来越多被要求类似子公司的独立核算方式。个人理解,供参考。","cat":"实务综合","kw":"分公司,子公司,汇总报表,合并报表,上级拨入资金,企业所得税,独立核算","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则——基本准则"},{"id":"QA0254","q":"股东减资的会计处理?","a":"股东撤资退股的处理:(1)按减少的实收资本冲减股本/实收资本;(2)支付对价超出减少实收资本的部分依次冲减资本公积>盈余公积>未分配利润;(3)差额不能直接冲减未分配利润(需遵循资本保全原则)。减资方案经股东大会批准后,应将应付减资款确认为负债。实务中减资涉及工商变更、税务(可能涉及个税)、债权人公告等。个人理解,供参考。","cat":"实务综合","kw":"减资,退股,实收资本,资本公积,盈余公积,未分配利润,资本保全,股东会决议","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则——基本准则"},{"id":"QA0255","q":"公允价值计量中第三层次的敏感性分析?","a":"公允价值第三层次计量(不可观察输入值)的敏感性分析:(1)披露重大不可观察输入值的范围和加权平均值;(2)描述输入值变化对公允价值的敏感程度—合理可能的变动对公允价值的影响;(3)如第三层次公允价值占比较重大,需提供定性和定量分析。常见第三层次输入值:长期增长率、折现率、预期波动率、信用利差等。个人理解,供参考。","cat":"实务综合","kw":"公允价值第三层次,敏感性分析,不可观察输入值,折现率,波动率,定量分析,附注披露","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则——基本准则"},{"id":"QA0256","q":"会计估计中的管理层假设如何审计?","a":"审计师对管理层会计估计假设的审计程序:(1)测试假设的合理性—与历史数据、行业数据、经济环境对比;(2)检查管理层是否考虑了替代性假设;(3)评估假设的一致性和稳健性;(4)执行敏感性分析—测试关键假设的合理变动对估计结果的影响;(5)对比上期估计与实际结果的偏差,评估管理层估计的历史准确性。重大假设(折现率、增长率)通常需要利用估值专家的工作。个人理解,供参考。","cat":"实务综合","kw":"会计估计,管理层假设,敏感性分析,审计程序,历史准确性,折现率,增长率,估值专家","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则——基本准则"},{"id":"QA0257","q":"其他综合收益的结转规则?","a":"OCI的后续结转分三类:(1)满足条件可转损益的OC—如外币报表折算差额,在处置境外经营时转入当期损益;(2)FVOCI债务工具的OC—处置时转入当期损益;(3)不得转损益的OCI—指定为FVOCI的权益工具,处置时转入留存收益。可转和不可转的OCI在附注中需分别披露。个人理解,供参考。","cat":"报表列报","kw":"其他综合收益,结转,OCI,处置,留存收益,FVOCI,外币折算差额","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第30号——财务报表列报"},{"id":"QA0258","q":"净资产收益率(ROE)的计算和分析?","a":"净资产收益率(ROE)=归属于母公司股东的净利润/平均归属于母公司股东的净资产。加权平均ROE考虑了报告期内净资产变动的时间权重。计算平均净资产时:(1)发行新股—按新股实际到位时间加权;(2)利润分配—视同利润分配在期初已完成。ROE是证监会上市公司再融资监管的重要指标(不低于6%是配股和增发的条件之一)。个人理解,供参考。","cat":"报表列报","kw":"净资产收益率,ROE,加权平均,净利润,净资产,再融资,配股,增发,证监会","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第30号——财务报表列报"},{"id":"QA0259","q":"营业收入扣除项(非主营业务)的披露?","a":"上市公司需在年报中披露营业收入扣除项—与主营业务无关的业务收入和不具备商业实质的收入。包括:(1)正常经营之外的其他业务收入;(2)偶发的贸易收入;(3)内部抵消未实现的收入;(4)不具有商业实质的关联交易收入。扣除后营收金额若低于1亿元且净利润为负,可能触发退市风险警示。实务中营收扣除项的认定需结合公司业务模式判断。个人理解,供参考。","cat":"报表列报","kw":"营业收入扣除,非主营业务,商业实质,退市,关联交易,贸易收入,净利润,退市风险警示","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第30号——财务报表列报"},{"id":"QA0260","q":"政府补助在财务报表中的列报?","a":"政府补助在报表中的列报:(1)与资产相关的政府补助—在资产负债表中列报为递延收益(非流动负债),按资产折旧进度转入其他收益;(2)与收益相关的政府补助—用于补偿已发生费用的,收到时计入其他收益或冲减相关成本费用;(3)利润表中其他收益科目归集与日常活动相关的政府补助;(4)附注需披露补助的种类、金额和附条件信息。个人理解,供参考。","cat":"报表列报","kw":"政府补助列报,递延收益,其他收益,资产相关,收益相关,附注披露,利润表","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第30号——财务报表列报"},{"id":"QA0261","q":"交叉持股的合并处理?","a":"交叉持股(集团内公司互相持有股份)的合并处理:(1)子公司持有母公司股份—在合并报表中作为库存股处理,抵减权益,相应的股利抵销;(2)子公司之间相互持股—按正常投资抵销处理;(3)复杂的循环持股—需用数学方程组法或迭代法确定各层级权益金额。核心原则:合并报表中不得出现集团内部互相持有的权益。实务中交叉持股的合并处理较为复杂,核心是恢复各公司对对方的投资至原始成本。个人理解,供参考。","cat":"合并报表","kw":"交叉持股,库存股,合并抵销,循环持股,数学方程,迭代法,权益抵销,股利抵销","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"QA0262","q":"特许经营权收入的确认?","a":"特许经营权收入确认取决于合同实质:(1)初始加盟费—通常在加盟店开业时一次性确认(但如后续仍需提供持续服务的,应递延);(2)持续加盟费—按服务期确认收入;(3)按营业额比例提取的特许权使用费—在加盟店实现销售时确认。注意区分初始加盟费的性质:如果初始加盟费包含显著的持续服务成分,应分摊至服务期确认。个人理解,供参考。","cat":"收入准则","kw":"特许经营权,加盟费,持续加盟费,特许权使用费,递延收入,服务期","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第14号——收入"},{"id":"QA0263","q":"合同中存在重大融资成分的处理?","a":"CAS 14要求合同对价中包含重大融资成分时,以现金售价折现的金额确认收入。简化处理:(1)预收款到交货间隔不超过一年—忽略融资成分;(2)先交货后收款超过一年—按折现确认,差额确认为利息收入。判断是否重大应考虑:承诺对价与现售价格的差异、付款时间表长短、隐含利率水平。个人理解,供参考。","cat":"收入准则","kw":"重大融资成分,折现,利息收入,现金售价,时间价值","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第14号——收入"},{"id":"QA0264","q":"附带价格保护条款的收入确认?","a":"价格保护条款(如后续降价需退还差额)属于可变对价,需估计并约束收入上限。处理:(1)按期望值或最可能金额估计价格保护金额;(2)确认收入时将此金额作为可变对价的减项;(3)每个资产负债表日重新估计。实务中,电子产品行业的价格保护较为普遍,需建立完善的销售台账和价格变动跟踪机制。个人理解,供参考。","cat":"收入准则","kw":"价格保护,可变对价,收入上限,期望值,最可能金额,重新估计","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第14号——收入"},{"id":"QA0265","q":"客户未行使权利(储值卡过期余额)的处理?","a":"客户未行使的权利(如过期储值卡余额)处理:(1)如企业预期有权获得该金额,按客户行使权利的模式按比例确认收入;(2)否则,仅在客户要求履约的可能性极低时确认收入。实务中需关注:预收款是否可退还、法定时效规定、历史核销比例。不可退还的储值卡过期后,企业可将余额逐步确认为收入。个人理解,供参考。","cat":"收入准则","kw":"合同负债,储值卡,未行使权利,预收款,过期余额,breakage","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第14号——收入"},{"id":"QA0266","q":"售后代管商品安排的收入确认?","a":"售后代管商品(客户已购买但要求暂存)的确认条件:CAS 14要求同时满足:(1)代管具有商业实质;(2)商品可单独识别;(3)商品可随时交付给客户;(4)企业不能将该商品用于其他用途。满足条件时可在代管时点确认收入。实务中需要签署正式的代管协议并做好实物隔离。个人理解,供参考。","cat":"收入准则","kw":"售后代管,暂存,控制权转移,实物隔离,代管协议,商业实质","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第14号——收入"},{"id":"QA0267","q":"总额法和净额法在代理业务中的判断?","a":"判断总额法还是净额法的核心:企业是否在向客户转让商品前拥有控制权。以下因素支持总额法:承担主要责任、承担存货风险、自主定价权、承担信用风险。以下因素支持净额法:赚取固定佣金或比例佣金、不承担存货风险、商品由第三方直接发货。不同品类可能适用不同方法,同一企业可能同时存在总额法和净额法处理的业务。个人理解,供参考。","cat":"收入准则","kw":"总额法,净额法,主要责任人,代理人,控制权,存货风险,定价权,佣金","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第14号——收入"},{"id":"QA0268","q":"金融资产转移的过手测试?","a":"CAS 23规定资产证券化中的过手安排需同时满足三个条件才能被认定为过手安排:(1)无延误支付—企业不垫付资金;(2)无再投资—除现金等价物外的资金不得再进行投资;(3)无权抵押或出售原资产。不满足过手测试的,直接进入风险报酬转移测试。实务中资产证券化交易结构设计需确保过手测试的合规性。个人理解,供参考。","cat":"金融工具","kw":"过手测试,资产证券化,无延误支付,无再投资,无权抵押,风险报酬转移","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"QA0269","q":"应收账款保理与资产证券化的区别?","a":"应收账款保理和资产证券化的主要区别:(1)保理—银行或保理商买入应收账款,有追索权/无追索权之分,通常不改变应收账款的担保方式;(2)资产证券化(ABS)—以应收账款的未来现金流为基础发行证券,通常涉及SPV和分层设计。会计处理上:无追索权保理可终止确认;ABS需判断风险和报酬是否转移。个人理解,供参考。","cat":"金融工具","kw":"应收账款保理,资产证券化,追索权,SPV,终止确认,风险和报酬,分层设计","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报、企业会计准则第33号——合并财务报表"},{"id":"QA0270","q":"金融资产转移中的继续涉入?","a":"企业既未转移也未保留几乎所有风险和报酬时,判断是否放弃控制:(1)放弃控制—终止确认;(2)未放弃控制—按继续涉入程度确认相关资产和负债。继续涉入资产=转移部分的最大损失敞口;继续涉入负债=继续涉入的公允价值。实务中,信用增级、流动性支持等安排可能导致继续涉入。个人理解,供参考。","cat":"金融工具","kw":"继续涉入,综合收益,终止确认,风险和报酬,信用增级,流动性支持,最大损失敞口","src":"财政部 企业会计准则解释公告","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"QA0271","q":"金融负债和权益工具的区分(永续债)?","a":"CAS 37规定了金融负债和权益工具的区分标准。永续债分类核心判断:(1)发行人是否负有交付现金或金融资产的义务;(2)是否以固定数量自身权益工具结算。典型权益特征:无固定到期日、发行人可无限期递延付息、无强制赎回条款。典型负债特征:有固定到期日、强制付息、必须按固定金额赎回。实务中需审阅合同全部条款综合判断。个人理解,供参考。","cat":"金融工具","kw":"永续债,优先股,金融负债,权益工具,递延付息,强制赎回,交叉违约","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"QA0272","q":"金融工具减值的三阶段ECL模型?","a":"CAS 22的ECL三阶段:(1)阶段一—信用风险未显著增加,按12个月ECL计提,利息按账面余额计算;(2)阶段二—信用风险显著增加但未减值,按存续期ECL计提,利息仍按账面余额计算;(3)阶段三—已发生信用减值,按存续期ECL计提,利息按摊余成本(扣减准备后)计算。信用风险显著增加的判断通常采用逾期30天作为可推翻的假设。个人理解,供参考。","cat":"金融工具","kw":"预期信用损失,ECL,三阶段,12个月,存续期,信用减值,逾期30天,利息收入","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"QA0273","q":"权益法下顺流交易和逆流交易的处理?","a":"权益法核算时,投资方与被投资方之间的内部交易:(1)顺流交易(投资方出售给被投资方)—按持股比例消除未实现损益,减少投资收益;(2)逆流交易(被投资方出售给投资方)—按持股比例消除,减少长期股权投资账面价值。内部交易损失如果是资产减值损失(如存货跌价),不进行抵消。实务中需逐笔识别内部交易并建立台账管理。个人理解,供参考。","cat":"长期股权投资","kw":"权益法,顺流交易,逆流交易,未实现损益,抵消,内部交易,投资收益","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"QA0274","q":"未实缴出资的权益法核算?","a":"未实缴出资但具有重大影响的投资处理:(1)权益法核算时仅按实际出资比例享有或承担被投资单位损益;(2)若章程约定按认缴比例分红,在符合分红条件时按认缴比例确认应收股利;(3)未实缴部分对应的收益不调整长期股权投资账面价值。实务中,出资计划和时间表应在协议中明确约定,作为权益法核算的基础。个人理解,供参考。","cat":"长期股权投资","kw":"未实缴出资,权益法,实际出资比例,认缴比例,分红,应收股利,账面价值","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"QA0275","q":"长期股权投资转换:金融资产→权益法?","a":"金融资产转为权益法(从无重大影响到有重大影响):(1)原持有的金融资产按转换日公允价值重新计量;(2)转换日公允价值与原账面价值的差额计入当期损益;(3)转换日长期股权投资成本=原金融资产转换日公允价值+新增投资成本;(4)转换后开始按权益法核算,区分购买日公允价值调整。注意:指定为FVOCI的权益工具处置时OCI转入留存收益。个人理解,供参考。","cat":"长期股权投资","kw":"金融资产转权益法,重新计量,转换日,公允价值,FVOCI,当期损益,新增投资","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"QA0276","q":"权益法→成本法的转换处理?","a":"权益法转为成本法(增持导致控制):分步实现非同一控制下合并:(1)原权益法投资按购买日公允价值重新计量;(2)之前计入OCI的权益法变动按处置基础处理(可重分类部分转入损益);(3)购买日对价=原权益法投资公允价值+新增对价;(4)合并差价确认商誉或廉价购买损益。核心:权益法下的OCI需在购买日转出(除非永久不可重分类)。个人理解,供参考。","cat":"长期股权投资","kw":"权益法转成本法,分步实现,购买日,重新计量,OCI,商誉,廉价购买,控制","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"QA0277","q":"委托经营/承包经营的合并判断?","a":"委托经营/承包经营下承包方是否控制被承包主体的判断:(1)发包方是否保留了重大经营和财务决策权(如重大投资、融资、利润分配权);(2)承包方可否被无条件罢免。发包方保留实质性权利且可无条件罢免承包方的,承包方是代理人,不合并。反之承包方可能构成控制。实务中判断的最终决定权在谁手里是关键。个人理解,供参考。","cat":"合并报表","kw":"委托经营,承包经营,控制,代理人,实质性权利,无条件罢免,决策权","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"QA0278","q":"合并报表中逆流交易的超额亏损处理?","a":"逆流交易(子公司→母公司)中子公司亏损超额的会计处理:(1)首先是母公司在权益法下按比例确认投资损失至账面为零;(2)如有长期应收款等实质上构成净投资的权益,继续冲减;(3)超额部分确认预计负债(如母公司有兜底义务)。合并报表层面内部逆流交易的抵销不影响超额亏损的处理顺序。个人理解,供参考。","cat":"合并报表","kw":"逆流交易,超额亏损,权益法,长期应收款,预计负债,合并抵销,兜底义务","src":"财政部 企业会计准则解释公告","std_ref":"企业会计准则第33号——合并财务报表、企业会计准则第2号——长期股权投资"},{"id":"QA0279","q":"合并报表中子公司购买少数股东股权?","a":"子公司购买少数股东股权(增持)属于权益交易:(1)购买对价与按新增比例计算的净资产份额的差额调整资本公积;(2)不确认商誉或损益;(3)合并报表中不重新计量子公司资产负债。这是因为企业合并在取得控制权日已完成,后续增持仅是权益的内部转移。合并报表中减少的少数股东权益与支付对价的差额调整归母权益。个人理解,供参考。","cat":"合并报表","kw":"少数股东,增持,权益交易,资本公积,商誉,内部转移,归属母公司权益","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY0181","q":"租⾦赔偿⾦新租赁准则下如何处理","a":"该项赔偿⾦与使⽤权资产的终⽌确认相关，因此应确认为资产处置损益。但实务中也可以接受列⼊营业外⽀出。提问⼈：沉默羔⽺ 时间：2024-04-11 13:47:00 是否可以计⼊费⽤的租赁费中呢？ 回答⼈：chenyiwei 不可以。不是正常的因使⽤资产造成的⽀出。个人理解，供参考。","cat":"租赁","kw":"租赁","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"QA0281","q":"转租赁的分类原则?","a":"转租赁的分类以原租赁的使用权资产为标的资产:(1)转租赁是否构成融资租赁—判断转租赁的租赁期是否覆盖原租赁期绝大部分;(2)融资租赁转租赁—按融资租赁出租人处理,保留原租赁负债;(3)经营租赁转租赁—承租人/出租人分别核算原租赁和转租赁。转租赁下承租人是中间人,其核算比单纯承租人或出租人更复杂。个人理解,供参考。","cat":"租赁","kw":"转租赁,融资租赁,经营租赁,使用权资产,中间人,出租人,承租人","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第21号——租赁"},{"id":"QA0282","q":"租赁变更的会计处理?","a":"租赁变更(租赁范围或对价变更)的处理:(1)不构成单独租赁的—重新计算租赁负债(按修订后折现率),同时调整使用权资产;(2)租赁范围缩小或租赁期缩短—减少使用权资产和租赁负债,差额计入当期损益;(3)折现率—采用租赁变更生效日的增量借款利率。租赁变更与租赁修改不同:变更是合同条款调整,修改是合同重签。个人理解,供参考。","cat":"租赁","kw":"租赁变更,单独租赁,折现率,增量借款利率,使用权资产,租赁负债,范围缩小","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第21号——租赁"},{"id":"QA0283","q":"差错更正与会计估计变更的区分实务?","a":"区分的三个因素:(1)判断时是否存在对准则或事实的误解—基于误解的属于前期差错;(2)新信息是否改变了原始判断基础—基于新信息的调整属于估计变更;(3)后续调整是否反映原始判断错误。企业常将本属于差错的事项作为估计变更处理(从而无需追溯),这种处理可能被认定为滥用会计估计。个人理解,供参考。","cat":"实务综合","kw":"前期差错,会计估计变更,追溯调整,未来适用法,滥用,新信息,原始判断","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则——基本准则"},{"id":"QA0284","q":"企业建立研发费用辅助账的要求?","a":"高企认定和研发费用加计扣除均要求建立研发费用辅助账。辅助账应按研发项目分别归集,记录:人员人工、直接投入、折旧摊销、设计试验费、其他费用等。各项费用占比需符合规定(其他费用不超过总额20%)。辅助账的建立可借助ERP系统或专用软件,确保费用归集的准确性和可追溯性。税务稽查时辅助账是核心证据。个人理解,供参考。","cat":"实务综合","kw":"研发费用,辅助账,高企认定,加计扣除,项目归集,人员人工,折旧摊销,税务稽查","src":"财政部 企业会计准则解释公告","std_ref":"企业会计准则——基本准则"},{"id":"QA0285","q":"应付职工薪酬的期末余额分析?","a":"应付职工薪酬期末余额分析:(1)短期薪酬—计提数减实际支付数,余额为应付未付;(2)辞退福利—计提未支付部分;(3)带薪缺勤—预期下年将使用的累积未休年假对应的薪酬。应付职工薪酬贷方余额过大(占工资总额比例异常)可能表明企业推迟发放工资需关注。余额为借方则表明多付或预付款。实务中需按月核对工资计算表和发放记录。个人理解,供参考。","cat":"职工薪酬","kw":"应付职工薪酬,余额分析,短期薪酬,辞退福利,带薪缺勤,工资表,核对","src":"深圳证券交易所 会计监管动态","std_ref":"企业会计准则第9号——职工薪酬"},{"id":"QA0286","q":"社会保险费和住房公积金的会计和税务处理?","a":"社保和住房公积金的处理:(1)企业部分—计入相关成本费用,通过应付职工薪酬核算;(2)个人部分—从工资中代扣,通过其他应付款核算;(3)企业缴纳时—冲减应付职工薪酬(企业部分)和其他应付款(个人部分)。税务上:企业部分可在税前扣除(社保按实际缴纳、公积金不超过12%);个人部分可在个税中扣除。实务中社保基数和公积金基数可能不同,需分别核算。个人理解,供参考。","cat":"职工薪酬","kw":"社会保险,住房公积金,应付职工薪酬,其他应付款,代扣代缴,税前扣除,社保基数","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第9号——职工薪酬"},{"id":"QA0287","q":"政府补助退回的税务处理?","a":"政府补助退回时:(1)如已计入应税收入—退回时冲减当期收入或确认为损失税前扣除;(2)如未计入应税收入(免税补助)—退回时直接减少资产或当期损益,不涉及纳税调整;(3)退回时涉及的增值税—如已开票且缴税,需办理退税或抵减以后税款。实务中政府补助的税务处理因补助性质和取得条件不同而存在较大差异。个人理解,供参考。","cat":"政府补助","kw":"政府补助退回,税务处理,应税收入,免税补助,增值税退税,纳税调整","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第16号——政府补助"},{"id":"QA0288","q":"设定受益计划的精算假设?","a":"设定受益计划涉及的关键精算假设:(1)折现率—基于高质量公司债券或国债收益率;(2)死亡率—参照国家发布的经验生命表;(3)离职率—根据企业历史数据估计;(4)工资增长率—考虑通胀和职业发展。精算假设变动产生的精算利得/损失计入OCI(中国准则)。精算假设的微小变动可能对设定受益义务产生重大影响,需专业精算师评估。个人理解,供参考。","cat":"职工薪酬","kw":"设定受益计划,精算假设,折现率,死亡率,离职率,工资增长率,精算利得,OCI","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第9号——职工薪酬"},{"id":"QA0289","q":"企业年金(补充养老保险)的会计处理?","a":"企业年金的会计处理:(1)企业缴纳部分—计入当期成本费用,同时确认应付职工薪酬;(2)个人缴纳部分—从工资中代扣;(3)资金委托给受托人管理后形成独立信托财产,企业不再确认为资产。企业年金属于设定提存计划,企业按缴费额确认费用。税务优惠:企业缴费在工资总额5%以内可税前扣除。实务中企业年金方案需经职工代表大会审议。个人理解,供参考。","cat":"职工薪酬","kw":"企业年金,设定提存计划,补充养老保险,税前扣除,受托人,信托财产,缴费率","src":"深圳证券交易所 会计监管动态","std_ref":"企业会计准则第9号——职工薪酬"},{"id":"QA0290","q":"处置子公司部分股权丧失控制权的处理?","a":"丧失控制权的处理步骤:(1)终止确认子公司资产负债和少数股东权益;(2)剩余股权按丧失控制权日的公允价值重新计量;(3)处置对价+剩余股权公允价值-按原持股比例计算的净资产的差额计入投资收益;(4)与子公司相关的OCI全额转入当期损益。这是与不丧失控制权完全不同的处理方式,后者差额调整资本公积。个人理解,供参考。","cat":"合并报表","kw":"丧失控制权,剩余股权,重新计量,投资收益,OCI,资本公积,处置对价","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"QA0291","q":"首次执行新金融工具准则的分类调整?","a":"首次执行CAS 22(2017)的分类调整:(1)原贷款和应收款项→通常分入AC或FVOCI;(2)原可供出售金融资产→可能分入FVOCI(权益)或FVTPL;(3)原持有至到期投资→通常分入AC。调整差额计入期初留存收益。首次执行日需全面重分类,且首次执行日前的比较期不重述。减值从已发生损失转为ECL也需全面评估,适用简化过渡安排。个人理解,供参考。","cat":"金融工具","kw":"首次执行,新金融工具准则,分类调整,期初留存收益,比较期不重述,ECL过渡","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"QA0292","q":"新收入准则首次执行的简化追溯?","a":"新收入准则首次执行可选择简化追溯法(仅调整首次执行日未完成合同):(1)比较期不重述;(2)首次执行日的累积影响调整期初留存收益;(3)对已完成合同(首次执行前已完成全部履约义务的)不调整;(4)首次执行日需重新评估的—合同中重大融资成分的判断。简化追溯法大幅降低了首次执行的实施成本,多数企业采用此法。个人理解,供参考。","cat":"收入准则","kw":"首次执行,新收入准则,简化追溯,比较期,留存收益,已完成合同,重大融资成分","src":"财政部 企业会计准则解释公告","std_ref":"企业会计准则第14号——收入"},{"id":"QA0293","q":"企业合并中SPE(特殊目的主体)是否合并?","a":"发起人是否合并SPE的判断标准:(1)SPE的经营决策权是否由发起人控制(通过章程、协议等);(2)发起人是否享有SPE的绝大部分经济利益;(3)发起人是否承担了SPE的绝大部分风险。典型需要合并的SPE:资产证券化中的发行载体(发起行兼服务商且持有次级份额)、项目融资中的项目公司(企业主导设计并承担风险)。控制三要素模型同样适用实质判断。个人理解,供参考。","cat":"合并报表","kw":"SPE,特殊目的主体,合并,资产证券化,项目公司,发起行,次級份额,控制三要素","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"QA0294","q":"结构化主体(VIE)的合并?","a":"VIE(可变利益实体)的合并需基于控制三要素模型判断:(1)权力—通过协议安排获得对VIE相关活动的决策权;(2)可变回报—享有VIE的剩余利益或承担重大损失风险;(3)权力影响回报—能否运用权力主导VIE活动以影响其回报水平。中国企业通过VIE架构境外上市的,通常将VIE纳入合并报表。判断时需特别关注协议条款的实质性权利和控制力。个人理解,供参考。","cat":"合并报表","kw":"VIE,可变利益实体,协议控制,合并报表,境外上市,实质性权利,控制三要素","src":"深圳证券交易所 会计监管动态","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"QA0295","q":"收入确认五步法模型?","a":"CAS 14五步法:(1)识别合同;(2)识别履约义务;(3)确定交易价格;(4)分摊交易价格;(5)在履约时确认收入。五步法模型统一了原不同收入准则的处理方法。核心变化:从风险报酬转移模型转向控制权转移模型。每个步骤都涉及重大判断,特别是履约义务的识别和交易价格的分摊。个人理解,供参考。","cat":"收入准则","kw":"五步法,收入确认,履约义务,交易价格,分摊,控制权转移","src":"深圳证券交易所 会计监管动态","std_ref":"企业会计准则第14号——收入"},{"id":"QA0296","q":"合同中单项履约义务的识别?","a":"商品或服务可明确区分的条件:(1)客户能从该商品本身或与其他易获得资源一起受益;(2)商品/服务的承诺可与合同中其他承诺区分。不可明确区分的需合并为单一履约义务。实务中最常见的争议点:免费安装和售后服务是否构成单独履约义务。个人理解,供参考。","cat":"收入准则","kw":"履约义务,可明确区分,单独受益,合并,安装,售后服务","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第14号——收入"},{"id":"QA0297","q":"附有客户额外购买选择权的处理?","a":"额外购买选择权(积分、折扣券等)构成重大权利时,作为单独履约义务分摊交易价格。分摊基于积分的单独售价与已售商品的单独售价的相对比例。积分兑换时确认收入。未被兑换的积分(breakage)按客户行使的模式按比例确认。普通营销优惠不属于重大权利,无需单独分摊。个人理解,供参考。","cat":"收入准则","kw":"积分,客户忠诚度,单独履约义务,分摊,breakage,额外购买选择权","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第14号——收入"},{"id":"CY0157","q":"待执⾏合同中资产和负债的确认","a":"场景⼀：这种情况在合同刚签订和刚开始履⾏时属于待执⾏合同。后续随着服务提供逐步确认收⼊，相应逐步累积收款权利；但此时对⽅尚未⽀付款项，双⽅履⾏合同义务的程度开始出现差异，因⽽不再是待执⾏合同，此时应就双⽅履⾏合同义务程度上的差异确认资产和负债，即针对已提供的服务所对应的收款权利中尚未收到款项的部分确认应收账款或合同资产。 场景⼆：与场景⼀类似。针对已让渡使⽤权的期间（即已交付给承租⼈使⽤的期间）所对应的收款权利中尚未收到款项的部分确认应收租⾦。 场景三：融资租赁已转移租赁物所有权上的主要风险和报酬，相当于分期收款销售，⽽不是让渡有限时间内的使⽤权，故相当于本企业的主要合同义务（转移资产控制权）已全部履⾏完毕。这与经营租赁是完全不同的。个人理解，供参考。","cat":"收入准则","kw":"控制权,租赁","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"QA0299","q":"优先股是金融负债还是权益工具?","a":"优先股分类核心:是否承担交付现金的义务。(1)强制分红或到期赎回—金融负债;(2)分红由董事会决定且无赎回义务—权益工具;(3)可赎回优先股(持有人有权要求赎回)—通常为金融负债。累积优先股的欠付红利构成发行人义务。分类影响企业的资产负债率和利息保障倍数等财务指标。个人理解,供参考。","cat":"金融工具","kw":"优先股,金融负债,权益工具,强制分红,可赎回,累积优先股,资产负债率","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"QA0300","q":"企业合并中的合并费用的处理?","a":"企业合并直接相关费用(法律、评估、咨询等中介费):(1)非同一控制下—费用化计入管理费用;(2)同一控制下—同样费用化。发行权益工具的发行费用冲减资本公积;发行债务工具的发行费用调整债务初始成本。这是很多企业容易混淆的知识点。个人理解,供参考。","cat":"企业合并","kw":"合并费用,中介费,费用化,管理费用,发行费用,资本公积,摊余成本","src":"财政部 企业会计准则解释公告","std_ref":"企业会计准则第20号——企业合并"},{"id":"QA0301","q":"非同控合并中递延所得税的确认?","a":"购买日公允价值调整导致的暂时性差异需确认递延所得税:(1)资产增值产生应纳税差异—确认递延所得税负债,对应调整商誉;(2)资产减值或负债增加产生可抵扣差异—确认递延所得税资产,对应调整商誉或廉价购买损益。后续差异转回时调整所得税费用。购买日12个月内的计量期可追溯调整。个人理解,供参考。","cat":"企业合并","kw":"递延所得税,购买日,公允价值调整,商誉,应纳税差异,可抵扣差异,计量期","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第20号——企业合并、企业会计准则第18号——所得税"},{"id":"QA0302","q":"集团内部固定资产交易的抵销?","a":"母公司将设备出售给子公司作为固定资产使用时的合并抵销:(1)抵销内部销售收入和成本;(2)抵销内部交易未实现利润;(3)抵销多提的折旧。分录:借营业收入(母公司),贷营业成本(母公司),贷固定资产原值(未实现利润);同时借固定资产累计折旧(多提折旧),贷管理费用。内部交易固定资产处置时需抵销处置损益。个人理解,供参考。","cat":"合并报表","kw":"内部交易,固定资产,抵销,未实现利润,多提折旧,营业收入,营业成本,管理费用","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"QA0303","q":"股份支付中限制性股票的会计处理?","a":"限制性股票分三步:(1)授予日—收到职工出资确认股本和资本公积,同时对回购义务确认负债;(2)等待期内—按授予日股票公允价减去认购价的差额分摊股份支付费用;(3)解禁日—转回回购义务负债。费用摊销时需按可行权人数的最佳估计调整累计费用。实务中限制性股票是A股最常用的股权激励工具。个人理解,供参考。","cat":"股份支付","kw":"限制性股票,回购义务,解禁,等待期,公允价值,可行权估计","src":"深圳证券交易所 会计监管动态","std_ref":"企业会计准则第11号——股份支付"},{"id":"QA0304","q":"可转换公司债券的分拆处理?","a":"可转债的分拆:(1)负债成分公允价值—未来现金流按类似债券的市场利率折现;(2)权益成分—发行价减负债成分公允价值,计入其他权益工具;(3)发行费用按公允价值比例分摊。后续:负债按摊余成本核算,权益不变。转换时终止确认负债成分并转入权益(股本+资本公积)。个人理解,供参考。","cat":"金融工具","kw":"可转债,分拆,负债成分,权益成分,其他权益工具,摊余成本","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"QA0305","q":"收入确认五步法模型?","a":"CAS 14五步法:(1)识别合同;(2)识别履约义务;(3)确定交易价格;(4)分摊交易价格;(5)在履约时确认收入。五步法模型统一了原不同收入准则的处理方法。核心变化:从风险报酬转移模型转向控制权转移模型。每个步骤都涉及重大判断,特别是履约义务的识别和交易价格的分摊。个人理解,供参考。","cat":"收入准则","kw":"五步法,收入确认,履约义务,交易价格,分摊,控制权转移","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第14号——收入"},{"id":"QA0306","q":"合同中单项履约义务的识别?","a":"商品或服务可明确区分的条件:(1)客户能从该商品本身或与其他易获得资源一起受益;(2)商品/服务的承诺可与合同中其他承诺区分。不可明确区分的需合并为单一履约义务。实务中最常见的争议点:免费安装和售后服务是否构成单独履约义务。个人理解,供参考。","cat":"收入准则","kw":"履约义务,可明确区分,单独受益,合并,安装,售后服务","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第14号——收入"},{"id":"QA0307","q":"附有客户额外购买选择权的处理?","a":"额外购买选择权(积分、折扣券等)构成重大权利时,作为单独履约义务分摊交易价格。分摊基于积分的单独售价与已售商品的单独售价的相对比例。积分兑换时确认收入。未被兑换的积分(breakage)按客户行使的模式按比例确认。普通营销优惠不属于重大权利,无需单独分摊。个人理解,供参考。","cat":"收入准则","kw":"积分,客户忠诚度,单独履约义务,分摊,breakage,额外购买选择权","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第14号——收入"},{"id":"QA0308","q":"合同合并的条件?","a":"CAS 14规定同时满足以下条件时将多份合同合并为一份:(1)同一商业目的以一揽子方式签订;(2)合同对价相互依赖;(3)合同承诺的商品构成单一履约义务。合同合并影响交易价格确定、履约义务识别和收入确认模式。实务中需判断多份合同是否实质上构成同一交易的不可分割部分。个人理解,供参考。","cat":"收入准则","kw":"合同合并,一揽子,商业目的,交易价格,履约义务","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第14号——收入"},{"id":"QA0309","q":"优先股是金融负债还是权益工具?","a":"优先股分类核心:是否承担交付现金的义务。(1)强制分红或到期赎回—金融负债;(2)分红由董事会决定且无赎回义务—权益工具;(3)可赎回优先股(持有人有权要求赎回)—通常为金融负债。累积优先股的欠付红利构成发行人义务。分类影响企业的资产负债率和利息保障倍数等财务指标。个人理解,供参考。","cat":"金融工具","kw":"优先股,金融负债,权益工具,强制分红,可赎回,累积优先股,资产负债率","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"QA0310","q":"企业合并中的合并费用的处理?","a":"企业合并直接相关费用(法律、评估、咨询等中介费):(1)非同一控制下—费用化计入管理费用;(2)同一控制下—同样费用化。发行权益工具的发行费用冲减资本公积;发行债务工具的发行费用调整债务初始成本。这是很多企业容易混淆的知识点。个人理解,供参考。","cat":"企业合并","kw":"合并费用,中介费,费用化,管理费用,发行费用,资本公积,摊余成本","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第20号——企业合并"},{"id":"QA0311","q":"非同控合并中递延所得税的确认?","a":"购买日公允价值调整导致的暂时性差异需确认递延所得税:(1)资产增值产生应纳税差异—确认递延所得税负债,对应调整商誉;(2)资产减值或负债增加产生可抵扣差异—确认递延所得税资产,对应调整商誉或廉价购买损益。后续差异转回时调整所得税费用。购买日12个月内的计量期可追溯调整。个人理解,供参考。","cat":"企业合并","kw":"递延所得税,购买日,公允价值调整,商誉,应纳税差异,可抵扣差异,计量期","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第20号——企业合并、企业会计准则第18号——所得税"},{"id":"QA0312","q":"集团内部固定资产交易的抵销?","a":"母公司将设备出售给子公司作为固定资产使用时的合并抵销:(1)抵销内部销售收入和成本;(2)抵销内部交易未实现利润;(3)抵销多提的折旧。分录:借营业收入(母公司),贷营业成本(母公司),贷固定资产原值(未实现利润);同时借固定资产累计折旧(多提折旧),贷管理费用。内部交易固定资产处置时需抵销处置损益。个人理解,供参考。","cat":"合并报表","kw":"内部交易,固定资产,抵销,未实现利润,多提折旧,营业收入,营业成本,管理费用","src":"财政部 企业会计准则解释公告","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"QA0313","q":"股份支付中限制性股票的会计处理?","a":"限制性股票分三步:(1)授予日—收到职工出资确认股本和资本公积,同时对回购义务确认负债;(2)等待期内—按授予日股票公允价减去认购价的差额分摊股份支付费用;(3)解禁日—转回回购义务负债。费用摊销时需按可行权人数的最佳估计调整累计费用。实务中限制性股票是A股最常用的股权激励工具。个人理解,供参考。","cat":"股份支付","kw":"限制性股票,回购义务,解禁,等待期,公允价值,可行权估计","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第11号——股份支付"},{"id":"QA0314","q":"可转换公司债券的分拆处理?","a":"可转债的分拆:(1)负债成分公允价值—未来现金流按类似债券的市场利率折现;(2)权益成分—发行价减负债成分公允价值,计入其他权益工具;(3)发行费用按公允价值比例分摊。后续:负债按摊余成本核算,权益不变。转换时终止确认负债成分并转入权益(股本+资本公积)。个人理解,供参考。","cat":"金融工具","kw":"可转债,分拆,负债成分,权益成分,其他权益工具,摊余成本","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"QA0315","q":"收入确认五步法模型?","a":"CAS 14五步法:(1)识别合同;(2)识别履约义务;(3)确定交易价格;(4)分摊交易价格;(5)在履约时确认收入。五步法模型统一了原不同收入准则的处理方法。核心变化:从风险报酬转移模型转向控制权转移模型。每个步骤都涉及重大判断,特别是履约义务的识别和交易价格的分摊。个人理解,供参考。","cat":"收入准则","kw":"五步法,收入确认,履约义务,交易价格,分摊,控制权转移","src":"深圳证券交易所 会计监管动态","std_ref":"企业会计准则第14号——收入"},{"id":"QA0316","q":"合同中单项履约义务的识别?","a":"商品或服务可明确区分的条件:(1)客户能从该商品本身或与其他易获得资源一起受益;(2)商品/服务的承诺可与合同中其他承诺区分。不可明确区分的需合并为单一履约义务。实务中最常见的争议点:免费安装和售后服务是否构成单独履约义务。个人理解,供参考。","cat":"收入准则","kw":"履约义务,可明确区分,单独受益,合并,安装,售后服务","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第14号——收入"},{"id":"QA0317","q":"附有客户额外购买选择权的处理?","a":"额外购买选择权(积分、折扣券等)构成重大权利时,作为单独履约义务分摊交易价格。分摊基于积分的单独售价与已售商品的单独售价的相对比例。积分兑换时确认收入。未被兑换的积分(breakage)按客户行使的模式按比例确认。普通营销优惠不属于重大权利,无需单独分摊。个人理解,供参考。","cat":"收入准则","kw":"积分,客户忠诚度,单独履约义务,分摊,breakage,额外购买选择权","src":"深圳证券交易所 会计监管动态","std_ref":"企业会计准则第14号——收入"},{"id":"QA0318","q":"合同合并的条件?","a":"CAS 14规定同时满足以下条件时将多份合同合并为一份:(1)同一商业目的以一揽子方式签订;(2)合同对价相互依赖;(3)合同承诺的商品构成单一履约义务。合同合并影响交易价格确定、履约义务识别和收入确认模式。实务中需判断多份合同是否实质上构成同一交易的不可分割部分。个人理解,供参考。","cat":"收入准则","kw":"合同合并,一揽子,商业目的,交易价格,履约义务","src":"深圳证券交易所 会计监管动态","std_ref":"企业会计准则第14号——收入"},{"id":"QA0319","q":"优先股是金融负债还是权益工具?","a":"优先股分类核心:是否承担交付现金的义务。(1)强制分红或到期赎回—金融负债;(2)分红由董事会决定且无赎回义务—权益工具;(3)可赎回优先股(持有人有权要求赎回)—通常为金融负债。累积优先股的欠付红利构成发行人义务。分类影响企业的资产负债率和利息保障倍数等财务指标。个人理解,供参考。","cat":"金融工具","kw":"优先股,金融负债,权益工具,强制分红,可赎回,累积优先股,资产负债率","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"QA0320","q":"企业合并中的合并费用的处理?","a":"企业合并直接相关费用(法律、评估、咨询等中介费):(1)非同一控制下—费用化计入管理费用;(2)同一控制下—同样费用化。发行权益工具的发行费用冲减资本公积;发行债务工具的发行费用调整债务初始成本。这是很多企业容易混淆的知识点。个人理解,供参考。","cat":"企业合并","kw":"合并费用,中介费,费用化,管理费用,发行费用,资本公积,摊余成本","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第20号——企业合并"},{"id":"QA0321","q":"非同控合并中递延所得税的确认?","a":"购买日公允价值调整导致的暂时性差异需确认递延所得税:(1)资产增值产生应纳税差异—确认递延所得税负债,对应调整商誉;(2)资产减值或负债增加产生可抵扣差异—确认递延所得税资产,对应调整商誉或廉价购买损益。后续差异转回时调整所得税费用。购买日12个月内的计量期可追溯调整。个人理解,供参考。","cat":"企业合并","kw":"递延所得税,购买日,公允价值调整,商誉,应纳税差异,可抵扣差异,计量期","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第20号——企业合并、企业会计准则第18号——所得税"},{"id":"QA0322","q":"集团内部固定资产交易的抵销?","a":"母公司将设备出售给子公司作为固定资产使用时的合并抵销:(1)抵销内部销售收入和成本;(2)抵销内部交易未实现利润;(3)抵销多提的折旧。分录:借营业收入(母公司),贷营业成本(母公司),贷固定资产原值(未实现利润);同时借固定资产累计折旧(多提折旧),贷管理费用。内部交易固定资产处置时需抵销处置损益。个人理解,供参考。","cat":"合并报表","kw":"内部交易,固定资产,抵销,未实现利润,多提折旧,营业收入,营业成本,管理费用","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"QA0323","q":"股份支付中限制性股票的会计处理?","a":"限制性股票分三步:(1)授予日—收到职工出资确认股本和资本公积,同时对回购义务确认负债;(2)等待期内—按授予日股票公允价减去认购价的差额分摊股份支付费用;(3)解禁日—转回回购义务负债。费用摊销时需按可行权人数的最佳估计调整累计费用。实务中限制性股票是A股最常用的股权激励工具。个人理解,供参考。","cat":"股份支付","kw":"限制性股票,回购义务,解禁,等待期,公允价值,可行权估计","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第11号——股份支付"},{"id":"QA0324","q":"可转换公司债券的分拆处理?","a":"可转债的分拆:(1)负债成分公允价值—未来现金流按类似债券的市场利率折现;(2)权益成分—发行价减负债成分公允价值,计入其他权益工具;(3)发行费用按公允价值比例分摊。后续:负债按摊余成本核算,权益不变。转换时终止确认负债成分并转入权益(股本+资本公积)。个人理解,供参考。","cat":"金融工具","kw":"可转债,分拆,负债成分,权益成分,其他权益工具,摊余成本","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"CY0169","q":"求助陈版，关于投资设⽴民办⾮的处理","a":"⼀般可以这样处理，但具体的会计处理要看合作合同和实际操作中的具体运作情况。个人理解，供参考。","cat":"收入准则","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"QA0326","q":"合同中单项履约义务的识别?","a":"商品或服务可明确区分的条件:(1)客户能从该商品本身或与其他易获得资源一起受益;(2)商品/服务的承诺可与合同中其他承诺区分。不可明确区分的需合并为单一履约义务。实务中最常见的争议点:免费安装和售后服务是否构成单独履约义务。个人理解,供参考。","cat":"收入准则","kw":"履约义务,可明确区分,单独受益,合并,安装,售后服务","src":"财政部 企业会计准则解释公告","std_ref":"企业会计准则第14号——收入"},{"id":"QA0327","q":"附有客户额外购买选择权的处理?","a":"额外购买选择权(积分、折扣券等)构成重大权利时,作为单独履约义务分摊交易价格。分摊基于积分的单独售价与已售商品的单独售价的相对比例。积分兑换时确认收入。未被兑换的积分(breakage)按客户行使的模式按比例确认。普通营销优惠不属于重大权利,无需单独分摊。个人理解,供参考。","cat":"收入准则","kw":"积分,客户忠诚度,单独履约义务,分摊,breakage,额外购买选择权","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第14号——收入"},{"id":"QA0328","q":"合同合并的条件?","a":"CAS 14规定同时满足以下条件时将多份合同合并为一份:(1)同一商业目的以一揽子方式签订;(2)合同对价相互依赖;(3)合同承诺的商品构成单一履约义务。合同合并影响交易价格确定、履约义务识别和收入确认模式。实务中需判断多份合同是否实质上构成同一交易的不可分割部分。个人理解,供参考。","cat":"收入准则","kw":"合同合并,一揽子,商业目的,交易价格,履约义务","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第14号——收入"},{"id":"QA0329","q":"优先股是金融负债还是权益工具?","a":"优先股分类核心:是否承担交付现金的义务。(1)强制分红或到期赎回—金融负债;(2)分红由董事会决定且无赎回义务—权益工具;(3)可赎回优先股(持有人有权要求赎回)—通常为金融负债。累积优先股的欠付红利构成发行人义务。分类影响企业的资产负债率和利息保障倍数等财务指标。个人理解,供参考。","cat":"金融工具","kw":"优先股,金融负债,权益工具,强制分红,可赎回,累积优先股,资产负债率","src":"深圳证券交易所 会计监管动态","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"QA0330","q":"企业合并中的合并费用的处理?","a":"企业合并直接相关费用(法律、评估、咨询等中介费):(1)非同一控制下—费用化计入管理费用;(2)同一控制下—同样费用化。发行权益工具的发行费用冲减资本公积;发行债务工具的发行费用调整债务初始成本。这是很多企业容易混淆的知识点。个人理解,供参考。","cat":"企业合并","kw":"合并费用,中介费,费用化,管理费用,发行费用,资本公积,摊余成本","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第20号——企业合并"},{"id":"QA0331","q":"非同控合并中递延所得税的确认?","a":"购买日公允价值调整导致的暂时性差异需确认递延所得税:(1)资产增值产生应纳税差异—确认递延所得税负债,对应调整商誉;(2)资产减值或负债增加产生可抵扣差异—确认递延所得税资产,对应调整商誉或廉价购买损益。后续差异转回时调整所得税费用。购买日12个月内的计量期可追溯调整。个人理解,供参考。","cat":"企业合并","kw":"递延所得税,购买日,公允价值调整,商誉,应纳税差异,可抵扣差异,计量期","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第20号——企业合并、企业会计准则第18号——所得税"},{"id":"QA0332","q":"集团内部固定资产交易的抵销?","a":"母公司将设备出售给子公司作为固定资产使用时的合并抵销:(1)抵销内部销售收入和成本;(2)抵销内部交易未实现利润;(3)抵销多提的折旧。分录:借营业收入(母公司),贷营业成本(母公司),贷固定资产原值(未实现利润);同时借固定资产累计折旧(多提折旧),贷管理费用。内部交易固定资产处置时需抵销处置损益。个人理解,供参考。","cat":"合并报表","kw":"内部交易,固定资产,抵销,未实现利润,多提折旧,营业收入,营业成本,管理费用","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"QA0333","q":"股份支付中限制性股票的会计处理?","a":"限制性股票分三步:(1)授予日—收到职工出资确认股本和资本公积,同时对回购义务确认负债;(2)等待期内—按授予日股票公允价减去认购价的差额分摊股份支付费用;(3)解禁日—转回回购义务负债。费用摊销时需按可行权人数的最佳估计调整累计费用。实务中限制性股票是A股最常用的股权激励工具。个人理解,供参考。","cat":"股份支付","kw":"限制性股票,回购义务,解禁,等待期,公允价值,可行权估计","src":"深圳证券交易所 会计监管动态","std_ref":"企业会计准则第11号——股份支付"},{"id":"QA0334","q":"可转换公司债券的分拆处理?","a":"可转债的分拆:(1)负债成分公允价值—未来现金流按类似债券的市场利率折现;(2)权益成分—发行价减负债成分公允价值,计入其他权益工具;(3)发行费用按公允价值比例分摊。后续:负债按摊余成本核算,权益不变。转换时终止确认负债成分并转入权益(股本+资本公积)。个人理解,供参考。","cat":"金融工具","kw":"可转债,分拆,负债成分,权益成分,其他权益工具,摊余成本","src":"财政部 企业会计准则解释公告","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"QA0335","q":"存货期末计量的成本与可变现净值孰低?","a":"CAS 1要求存货期末按成本与可变现净值孰低计量。计提跌价准备时:有合同约定的按合同价,超过合同数量的按市场价。用于生产而持有的材料,如其生产的产成品可变现净值高于成本,则材料按成本计量;如产成品减值,材料按可变现净值计量。每期末需重新评估。个人理解,供参考。","cat":"存货","kw":"成本与可变现净值孰低,可变现净值,跌价准备,合同价,市场价,材料减值","src":"财政部 企业会计准则解释公告","std_ref":"企业会计准则第1号——存货"},{"id":"QA0336","q":"固定资产折旧年限的确定?","a":"折旧年限应考虑:(1)预计生产能力或实物产量;(2)有形损耗(使用频率、自然力);(3)无形损耗(技术进步、市场需求);(4)法律或类似限制(如租赁期)。净残值通常不超过原值5%,但应合理估计。税法规定的最低折旧年限(房屋20年、设备10年、电子设备3年)可作为参考。个人理解,供参考。","cat":"固定资产","kw":"折旧年限,预计净残值,有形损耗,无形损耗,生产能力,税法规定,最低年限","src":"财政部 企业会计准则解释公告","std_ref":"企业会计准则第4号——固定资产"},{"id":"QA0337","q":"固定资产试运行期间的会计处理?","a":"固定资产达到预定可使用状态前发生的试运行支出计入在建工程,试运行产出的销售收入冲减在建工程成本(或确认收入再结转成本)。试运行达到设计技术指标后转入固定资产。试运行期间不提取折旧。试运行明显超过合理期限的,应评估是否已实质达到预定可使用状态。个人理解,供参考。","cat":"固定资产","kw":"试运行,在建工程,预定可使用状态,资本化,折旧,产出收入","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第4号——固定资产"},{"id":"QA0338","q":"暂停使用的固定资产折旧?","a":"固定资产暂停使用(季节性停用、正常修理停用)期间应当继续计提折旧,因为折旧反映随时间推进的消耗而非实际使用情况。但持有待售期间停止计提折旧(CAS 42),因为已按公允价值减出售费用计量。注意区分暂停使用和持有待售—持有待售有严格的确认条件。个人理解,供参考。","cat":"固定资产","kw":"暂停使用,季节性停用,持有待售,折旧计提,持有待售条件,CAS 42","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第4号——固定资产、企业会计准则第42号——持有待售的非流动资产、处置组和终止经营"},{"id":"QA0339","q":"企业购入旧固定资产的折旧?","a":"购入已使用过的固定资产按购入成本确认原值,折旧年限按资产的预计剩余使用寿命确定(而非完整寿命),残值按剩余价值的合理估计确定。可参照同类或类似资产确定折旧政策,但需结合购入时的实际状况。购入旧资产可能需要大修后才能使用,大修费用可资本化。个人理解,供参考。","cat":"固定资产","kw":"购入旧资产,剩余使用寿命,预计残值,折旧政策,大修,购买价款","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第4号——固定资产、企业会计准则第17号——借款费用"},{"id":"QA0340","q":"非货币性资产交换的税费处理?","a":"非货币性交换涉及的税费:(1)增值税—换出资产视同销售,按公允价值计算销项税;(2)换入资产进项税可抵扣;(3)价外税费(契税、印花税)—计入换入资产成本;(4)所得税—公允价值模式下交换确认的损益计入应纳税所得额。增值税和所得税的视同销售规则需区分处理。个人理解,供参考。","cat":"非货币性资产交换","kw":"增值税,销项税,进项税,契税,印花税,所得税,价外税费","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第7号——非货币性资产交换"},{"id":"QA0341","q":"关联方关系的认定标准?","a":"CAS 36规定一方控制、共同控制另一方或对另一方施加重大影响,以及两方以上同受一方控制共同控制或重大影响的构成关联方。主要包括:母子公司、联营企业、合营企业、主要投资者个人(持股>=5%)及密切家庭成员、关键管理人员等。同受国家控制的企业不因同受国家控而认定为关联方(国企之间的擦边球)。个人理解,供参考。","cat":"关联方披露","kw":"关联方,控制,共同控制,重大影响,关键管理人员,国有企业","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第36号——关联方披露"},{"id":"QA0342","q":"关联交易的披露要求?","a":"关联交易披露原则:重要性原则下的充分披露。常见类型:购销、提供劳务、担保、租赁、代理、资金融通、关键管理人员薪酬等。披露内容包括:关联方关系性质、交易类型、交易金额(含比例)、未结算项目、定价政策。重大交易还需提供担保抵押情况。合并内部交易已抵销,无需在个别报表披露。个人理解,供参考。","cat":"关联方披露","kw":"关联交易,披露,定价政策,担保,资金融通,关键管理人员薪酬,重要性","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第36号——关联方披露"},{"id":"QA0343","q":"企业合并中取得的无形资产确认?","a":"购买方应单独确认符合可辨认性标准(合同-法律或可分离)的无形资产,即使被购买方未在账面确认。常见可单独确认的:商标、客户关系、非竞争协议、技术专利、特许经营权等。估值方法:超额收益法(客户关系)、免版税费法(商标)。无法可靠计量的不单独确认而并入商誉。个人理解,供参考。","cat":"企业合并","kw":"无形资产,可辨认性,合同-法律标准,可分离标准,超额收益法,免版税费法,商誉","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第20号——企业合并"},{"id":"QA0344","q":"反向购买的会计处理?","a":"反向购买(借壳上市)的处理要点:(1)法律母公司是会计被购买方,法律子公司是会计购买方;(2)合并成本=法律母公司为取得法律子公司控制权发行的权益工具在购买日的公允价值;(3)合并报表资产负债=法律子公司账面值+法律母公司可辨认资产负债的公允价值;(4)权益结构反映会计购买方。反向购买下不确认商誉(除非法律母公司构成业务)。个人理解,供参考。","cat":"企业合并","kw":"反向购买,会计购买方,法律母公司,合并成本,权益结构,商誉","src":"财政部 企业会计准则解释公告","std_ref":"企业会计准则第20号——企业合并"},{"id":"QA0345","q":"企业合并中或有对价的后续计量?","a":"或有对价(业绩补偿)的后续计量分四类:(1)权益工具—不重新计量;(2)金融资产/负债—按公允价值重计,变动计入损益;(3)属于职工薪酬—按CAS 9处理;(4)其他—或有事项处理。实务中最常见的是业绩补偿承诺(Earn-out),通常归类为金融负债并按公允价值重计,估值变动直接影响利润。个人理解,供参考。","cat":"企业合并","kw":"或有对价,业绩补偿,金融负债,公允价值,重计,Earn-out,职工薪酬","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第20号——企业合并、企业会计准则第9号——职工薪酬"},{"id":"CY0561","q":"过渡期损益是否影响商誉","a":"⾮同⼀控制下合并中，交易双⽅对被购买⽅过渡期损益归属的约定，会影响到购买⽅在购买⽇获取的被购买⽅可辨认净资产公允价值。相应地，会影响到购买⽇的商誉初始计量⾦额。 如果因过渡期亏损由购买⽅承担导致商誉增加的，则后续减值测试中应从严把握。个人理解，供参考。","cat":"企业合并","kw":"公允价值,商誉,减值,合并","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"QA0347","q":"同一控制下企业合并的合并对价差额处理?","a":"同控合并的合并对价与取得净资产账面价值的差额依次调整:(1)资本公积(资本溢价);(2)资本公积不足冲减则冲减留存收益。不能确认损益(与非同控不同)。同控合并需追溯调整比较期报表,视同合并后主体一直存在。合并利润表包含被合并方自合并当期期初至合并日的损益。个人理解,供参考。","cat":"企业合并","kw":"同一控制,合并对价差额,资本公积,留存收益,追溯调整,比较期报表","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第20号——企业合并"},{"id":"QA0348","q":"分步交易实现同一控制下企业合并?","a":"分步交易实现同控合并:同控合并要求一次完成,分步购买不适用于同控合并准则。如分步收购同一最终控制方的股权最终达到控制,应将各次交易视为一揽子交易合并处理。各次交易的差额先调整资本公积,不足冲减留存收益。关键是判断多次交易是否基于同一商业目的且互为条件。个人理解,供参考。","cat":"企业合并","kw":"分步交易,同一控制,一揽子交易,资本公积,留存收益,最终控制方","src":"财政部 企业会计准则解释公告","std_ref":"企业会计准则第20号——企业合并"},{"id":"QA0349","q":"子公司以其股份换取母公司股份的处理?","a":"子公司以自身股份换取母公司股份构成集团内部交易:(1)个别报表层面—子公司确认库存股处理;(2)合并报表层面—将子公司的库存股重分类为母公司的权益抵减项。实质上属于集团内部的股份回购或权益重组,不影响合并层面的净利润。实务中较为少见,处理需要逐层分析。个人理解,供参考。","cat":"合并报表","kw":"子公司换股,库存股,合并抵销,权益重组,内部交易,净利润","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"QA0350","q":"企业合并中的过渡期损益归属?","a":"过渡期损益(购买日与协议签订日之间)归属由合并协议约定:(1)归购买方—调整合并成本(减少对价则减商誉,增加对价则增商誉);(2)归出售方—不影响合并成本。两者对商誉的影响完全不同,需在尽调阶段明确约定。实务中常见条款:过渡期损益归购买方且损益按实际发生调整购买对价。个人理解,供参考。","cat":"企业合并","kw":"过渡期损益,合并成本,商誉,协议约定,尽调,购买日","src":"深圳证券交易所 会计监管动态","std_ref":"企业会计准则第20号——企业合并"},{"id":"QA0351","q":"被购买方原有商誉的处理?","a":"非同一控制下企业合并中被购买方账面的原有商誉不确认为可辨认资产(商誉不可辨认),因此不计入取得净资产。原有商誉不结转至合并报表,随净资产一同重新计量。合并后新商誉=合并成本-(可辨认净资产公允价值+单独确认的无形资产等)乘取得比例。个人理解,供参考。","cat":"企业合并","kw":"原有商誉,不可辨认,重新计量,可辨认资产,合并商誉,取得比例","src":"财政部 企业会计准则解释公告","std_ref":"企业会计准则第20号——企业合并"},{"id":"QA0352","q":"子公司超额亏损的合并处理?","a":"子公司亏损超过少数股东权益时:(1)少数股东权益为零后超额亏损由母公司承担;(2)少数股东权益不能为负数(中国准则);(3)后续盈利时先归还母公司承担的超额亏损,剩余分配给少数股东。IFRS下少数股东可承担超额亏损使权益为负,中国准则与IFRS在此存在差异。个人理解,供参考。","cat":"合并报表","kw":"超额亏损,少数股东权益,母公司承担,子公司亏损,净利润,IFRS差异","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"QA0353","q":"合并现金流量表的编制方法?","a":"合并现金流量表的编制:(1)以合并资产负债表和合并利润表为基础;(2)逐笔抵销集团内部现金流量—内部购销、借贷、投资等;(3)子公司向少数股东分红在筹资活动列示;(4)收购/出售子公司在投资活动列示净额。合并现金流量表需与合并资产负债表中的货币资金变动一致。个人理解,供参考。","cat":"合并报表","kw":"合并现金流量表,间接法,直接法,内部现金流量抵销,筹资活动,投资活动","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY0079","q":"境外⼟地核算","a":"参照《企业会计准则解释第1号》第⼆条规定：“中国境内企业设在境外的⼦公司在境外发⽣的交易或事项，境内不存在且受法律法规等限制或交易不常见，企业会计准则未作出规范的，可以将境外⼦公司已经进⾏的会计处理结 果，在符合《企业会计准则–基本准则》的原则下，按照国际财务报告准则进⾏调整后，并⼊境内母公司合并财务报表的相关项⽬。”。 按照IFRS下的惯例，拥有永久所有权的⼟地应确认为固定资产，不计提折旧。该处理与企业会计准则的原则和规定并不⽭盾，因此可以将该处理结果平移到母公司按中国企业会计准则编制的合并报表中。个人理解，供参考。","cat":"合并报表","kw":"合并,固定资产","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"QA0355","q":"外币专门借款汇兑差额资本化?","a":"CAS 17规定外币专门借款本金及利息的汇兑差额在资本化期间内可以资本化。但仅限于外币专门借款而非一般借款。一般借款的汇兑差额只能费用化计入财务费用。资本化的汇兑差额是借款费用的一部分。资本化金额以当期实际发生的汇兑差额为限,不能预计。个人理解,供参考。","cat":"借款费用","kw":"外币借款,汇兑差额,专门借款,资本化,一般借款,费用化","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第17号——借款费用"},{"id":"QA0356","q":"借款辅助费用是否可以资本化?","a":"借款辅助费用(手续费、佣金等)的处理:(1)专门借款的辅助费用—在所购建资产达到预定可使用状态前资本化;(2)一般借款的辅助费用—费用化计入当期损益。这与利息的专门/一般分类逻辑一致。借款的承销费、律师费、评估费等都可作为辅助费用,但内部差旅费除外。个人理解,供参考。","cat":"借款费用","kw":"辅助费用,手续费,资本化,费用化,专门借款,一般借款","src":"深圳证券交易所 会计监管动态","std_ref":"企业会计准则第17号——借款费用"},{"id":"QA0357","q":"售后租回交易(构成销售)的处理?","a":"构成销售的售后租回——判断标准以CAS 14的\"控制权转移\"为唯一依据（非原风险报酬模型）：(1)卖方/承租人—确认资产处置损益（仅限于已转移至买方的权利部分）；(2)保留使用权部分—按租赁准则确认使用权资产和租赁负债；(3)买方/出租人—确认购入资产并按租赁准则处理。销售对价高于或低于公允价值的差额调整租金。实务中售后租回是否构成销售的核心是看控制权是否实质性转移。个人理解，供参考。","cat":"租赁","kw":"售后租回,资产处置损益,使用权资产,租赁负债,公允价值,租金调整","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第21号——租赁、企业会计准则第14号——收入"},{"id":"QA0358","q":"低价值资产租赁的豁免?","a":"CAS 21允许对低价值资产租赁采用简化处理(不确认使用权资产和租赁负债),前提是单项资产全新时价值较低(通常5000美元以下且不包含购买选择权)。判断低价值的依据:资产本身全新状态下的价值,而非租赁付款额的大小。低价值资产租赁付款在租赁期内按直线法或其他系统合理方法确认为费用。个人理解,供参考。","cat":"租赁","kw":"低价值资产租赁,豁免,使用权资产,租赁负债,直线法,全新价值","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第21号——租赁"},{"id":"CY0182","q":"关于汽车租赁能否确认为租赁负债和使⽤权资产的实务。","a":"汽车属于耐⽤消费品，⼀般理解不属于低价值资产；同时租赁期限6年，也不属于短期租赁。故不应简化处理，应按照准则规定确认使⽤权资产和租赁负债。同时还应按照解释16号第⼀条规定，针对租赁负债确认递延所得税资 产，针对使⽤权资产确认递延所得税负债。个人理解，供参考。","cat":"租赁","kw":"租赁,所得税,递延","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"QA0360","q":"所得税费用的利润表列报?","a":"所得税费用在利润表中单独列示在利润总额之后。由当期所得税和递延所得税组成。直接计入OCI的项目的相关税费(如FVOCI的公允价值变动对应的递延税)不在利润表所得税费用中列报。同一控制下企业合并追溯调整涉及的所得税调整留存收益。每股收益计算时分子使用扣除所得税费用后的净利润。个人理解,供参考。","cat":"所得税","kw":"所得税费用,利润表列报,当期所得税,递延所得税,OCI,留存收益,每股收益","src":"深圳证券交易所 会计监管动态","std_ref":"企业会计准则第18号——所得税"},{"id":"QA0361","q":"税率变动对递延所得税的影响?","a":"税率变动时递延所得税资产/负债按新预计适用税率重新计量,影响计入当期所得税费用(除非与原计入OCI或权益的项目相关)。税率变动通常在税法正式颁布且确认适用时调整。实务中企业需密切关注税收优惠政策变化对递延所得税的影响。税率降低会导致递延所得税资产减少(费用增加),税率提高则相反。个人理解,供参考。","cat":"所得税","kw":"税率变动,递延所得税,重新计量,所得税费用,OCI,税收优惠","src":"财政部 企业会计准则解释公告","std_ref":"企业会计准则第18号——所得税"},{"id":"QA0362","q":"递延所得税资产的可实现性评估?","a":"递延所得税资产需基于未来应纳税所得额的预测评估可实现性。评估因素:(1)历史盈利记录;(2)未来财务预测;(3)可抵扣暂时性差异的转回时间;(4)税务筹划策略。如果预计未来应纳税所得额不足以利用可抵扣差异,需计提递延所得税资产减值准备(备抵科目)。长期亏损企业确认递延所得税资产需审慎。个人理解,供参考。","cat":"所得税","kw":"递延所得税资产,可实现性,应纳税所得额,财务预测,备抵,亏损,税务筹划","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第18号——所得税"},{"id":"QA0363","q":"递延所得税在购买日的确认?","a":"购买日确认递延所得税资产的条件:(1)被购买方有可抵扣暂时性差异或可抵扣亏损且很可能获得未来应纳税所得额;(2)购买方在购买日重新评估确认条件(而非沿用被购买方原判断)。计量期内(12个月)获得新信息导致可抵扣亏损价值低于原估—同时增加商誉。这体现了购买日公允价值计量原则。个人理解,供参考。","cat":"所得税","kw":"递延所得税资产,可抵扣亏损,购买日,计量期,商誉,公允价值","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第18号——所得税"},{"id":"QA0364","q":"资产重组的税务处理(特殊性税务处理)?","a":"资产重组(股权收购、资产收购、合并、分立)可选择特殊性税务处理(递延纳税),需满足:收购比例>=50%、股权支付比例>=85%、具有合理商业目的、12个月内不转让取得的股权等。特殊性处理下,资产/股权的计税基础按原计税基础确认(实质是递延纳税而非免税)。选择特殊性处理需备案,做好财税差异台账管理。个人理解,供参考。","cat":"所得税","kw":"资产重组,特殊性税务处理,递延纳税,收购比例,股权支付,商业目的,计税基础","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第18号——所得税"},{"id":"QA0365","q":"或有负债的披露要求?","a":"或有负债(潜在义务或金额不能可靠计量的现时义务)的披露:(1)或有负债的性质;(2)经济利益流出不确定性的说明;(3)财务影响估计(或无法估计的说明);(4)补偿的可能性。如果经济利益流出的可能性极小(不超过5%),可不披露。实务中诉讼、担保、税务争议是最常见的或有负债披露事项。个人理解,供参考。","cat":"或有事项","kw":"或有负债,披露,潜在义务,现时义务,可能性极小,诉讼,担保,税务争议","src":"财政部 企业会计准则解释公告","std_ref":"企业会计准则第13号——或有事项"},{"id":"QA0366","q":"产品质量保证的预计负债处理?","a":"产品质量保证费分两种情况:(1)保证型质保(法定或合同约定)—按CAS 13确认为预计负债,根据历史维修率和销售额估计;(2)服务型质保(延保)—作为单独履约义务按CAS 14处理。保证型质保的预计负债余额在资产负债表中列报为预计负债。实务中需根据产品生命周期不断更新维修率数据。个人理解,供参考。","cat":"或有事项","kw":"产品质量保证,预计负债,保证型,服务型,延保,历史维修率,单独履约义务","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第13号——或有事项、企业会计准则第14号——收入"},{"id":"QA0367","q":"资产弃置义务的会计处理?","a":"资产弃置义务(核电站退役、矿山关闭恢复等):(1)取得或建造时按弃置费现值确认预计负债,同时增加资产成本;(2)后续按实际利率法计提利息费用;(3)资产成本部分随折旧分摊;(4)弃置估计变动调整资产账面价值(不超过可收回金额)。弃置费的估计需聘请独立评估师和工程师。个人理解,供参考。","cat":"或有事项","kw":"资产弃置义务,预计负债,现值,折旧,实际利率法,折现率,弃置费用","src":"深圳证券交易所 会计监管动态","std_ref":"企业会计准则第13号——或有事项"},{"id":"QA0368","q":"以资产清偿债务的债务重组?","a":"以资产清偿债务:债务人应将所清偿债务账面价值与转让资产账面价值的差额计入其他收益(债务重组收益)。债权人将放弃债权的公
