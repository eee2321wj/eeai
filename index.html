折旧和减值计量。个人理解，供参考。","cat":"生物资产","kw":"生物资产,CAS 5,消耗性,生产性,折旧,公允价值","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第5号——生物资产"},{"id":"3853","q":"消耗性生物资产与生产性生物资产的区分？","a":"消耗性生物资产是指为出售或在将来收获农产品而持有的生物资产（如肉牛、用材林、养殖的鱼）。生产性生物资产是指为产出农产品、提供劳务或出租而持有的生物资产（如奶牛、果树、产畜）。两者的根本区别在于持有目的：前者用于一次性消耗，后者长期反复产出。个人理解，供参考。","cat":"生物资产","kw":"生物资产,CAS 5,消耗性,生产性,折旧","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第5号——生物资产"},{"id":"3852","q":"不涉及现金的重大投资和筹资活动如何披露？","a":"不涉及当期现金收支、但对企业财务状况和未来现金流量有重大影响的投资和筹资活动，应在现金流量表附注中披露。例如：债务转为资本、融资租赁固定资产、以发行股份方式收购子公司等。这些信息帮助报表使用者全面了解企业的投融资活动。个人理解，供参考。","cat":"现金流量表","kw":"现金流量表,CAS 31,经营活动,投资活动,筹资活动,收购,子公司,重大影响,融资租赁","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第31号——现金流量表"},{"id":"3851","q":"外币现金流量如何折算？","a":"外币现金流量采用现金流量发生日的即期汇率（或近似汇率）折算为记账本位币。汇率变动对现金的影响作为单独的调节项目列示。注意：外币报表折算时，资产负债表项目按期末汇率、损益表项目按近似汇率，产生的折算差额计入其他综合收益。个人理解，供参考。","cat":"现金流量表","kw":"现金流量表,CAS 31,经营活动,投资活动,筹资活动,其他综合收益,汇率","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第31号——现金流量表"},{"id":"3850","q":"将净利润调节为经营活动现金流量的方法？","a":"间接法下，从净利润出发，调整：①不影响现金流量的项目（折旧摊销、减值准备等）；②不属于经营活动的损益（投资收益、财务费用等）；③经营性应收应付项目的变动（应收账款增减、存货增减、应付账款增减等）；④递延所得税资产/负债变动。实务中按准则附录格式逐项填列。个人理解，供参考。","cat":"现金流量表","kw":"现金流量表,CAS 31,经营活动,投资活动,筹资活动,递延所得税资产,投资收益,摊销,折旧,所得税","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第31号——现金流量表、企业会计准则第18号——所得税"},{"id":"3849","q":"借款费用停止资本化的时点？","a":"购建或生产符合资本化条件的资产达到预定可使用或可销售状态时，借款费用即应停止资本化。实务中需逐项判断：实体建造已基本完成、所购建的资产与设计要求/合同要求/生产要求基本相符、后续支出很少。如果所购建资产各部分分别完工且可独立使用，应分别停止资本化。个人理解，供参考。","cat":"借款费用","kw":"借款费用,CAS 17,资本化,专门借款,一般借款","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第17号——借款费用"},{"id":"3848","q":"暂停资本化的条件？","a":"购建或生产活动发生非正常中断且中断时间连续超过3个月的，应暂停借款费用资本化，将中断期间的借款费用计入当期损益。正常中断（如季节性停工、例行检修等）无需暂停资本化。判断正常还是非正常的关键：看中断是否是购建资产达到预定可使用状态的必经程序。个人理解，供参考。","cat":"借款费用","kw":"借款费用,CAS 17,资本化,专门借款,一般借款","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第17号——借款费用"},{"id":"3847","q":"重组义务的确认条件？","a":"企业因重组而承担的重组义务，在同时满足以下条件时确认为预计负债：①有详细、正式的重组计划；②该重组计划已对外公告（使相关方形成合理预期）。重组义务的金额应仅包括与重组直接相关的支出（如员工遣散费、合同终止违约费），不包括与未来经营活动相关的支出。个人理解，供参考。","cat":"或有事项","kw":"或有事项,CAS 13,预计负债,现时义务,很可能流出","src":"财政部 企业会计准则解释公告","std_ref":"企业会计准则第13号——或有事项"},{"id":"CY0077","q":"关于对外担保","a":"此前，新⾦融⼯具准则实施前，按照或有事项准则，如果确有证据表明导致经济利益流出企业的可能性不⾜50%， 则可以不计提预计负债。 但在新⾦融⼯具准则实施后，此类担保损失虽然仍在预计负债列报，但其适⽤的会计准则是⾦融⼯具准则，适⽤预期信⽤损失模型确认坏账损失和计提准备。在此情况下，需考虑损失概率和期望值，⽽不再适⽤此前预计负债的规定，所以仍可能需计提预计负债。个人理解，供参考。","cat":"或有事项","kw":"预计负债","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3845","q":"推定义务与法定义务的区别？","a":"法定义务是因合同、法律法规等产生的义务。推定义务是因企业的行为（如公开承诺、过去的惯例、行业惯例等）使其他方建立了合理预期、企业将履行该义务。实务中，产品质量保证同时包含法定义务（法律规定）和推定义务（企业主动提供的质保服务）。个人理解，供参考。","cat":"或有事项","kw":"或有事项,CAS 13,预计负债,现时义务,很可能流出","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第13号——或有事项"},{"id":"CY0622","q":"请教陈版及各位⽼师，关于弃置费⽤的使⽤问题","a":"如果确定这些⽀出确实属于弃置费⽤的开⽀范围内的，则可以从相应的预计负债中列⽀，借：预计负债，贷：银⾏存款等。 同时，根据最新情况变化，对预计负债的应有余额进⾏重新评价测算，对其相关调整按照《企业会计准则解释第6 号》第⼀条规定处理。个人理解，供参考。","cat":"或有事项","kw":"预计负债","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3843","q":"恶性通货膨胀经济下境外经营的会计处理？","a":"境外经营处于恶性通货膨胀经济中的，其财务报表应按照CAS 19的要求进行重述——首先按资产负债表日的计量单位表述（消除通货膨胀影响），然后再按资产负债表日即期汇率折算。实务中按国际惯例通常以三年累计通胀率接近或超过100%作为恶性通货膨胀的判断指标。个人理解，供参考。","cat":"外币折算","kw":"外币折算,CAS 19,折算差额,即期汇率,其他综合收益,汇率","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第19号——外币折算"},{"id":"3842","q":"实质上构成对境外经营净投资的货币性项目？","a":"如果企业对境外经营存在长期应收款，且该应收款在可预见的未来没有计划收回或不打算收回，则实质上是企业对境外经营的净投资。该应收款产生的汇兑差额在个别报表中计入财务费用，但在合并报表中应计入其他综合收益（外币报表折算差额）。个人理解，供参考。","cat":"外币折算","kw":"外币折算,CAS 19,折算差额,即期汇率,其他综合收益,合并","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第19号——外币折算"},{"id":"3841","q":"境外经营的处置时累计折算差额如何处理？","a":"境外经营处置时（包括出售、清算、返还资本等），与该境外经营相关的外币报表折算差额应从所有者权益转入当期损益。如果是部分处置（如出售比例不是100%），应按处置比例结转。这一处理确保了在处置时点之前累计在其他综合收益中的折算差额得以实现。个人理解，供参考。","cat":"外币折算","kw":"外币折算,CAS 19,折算差额,即期汇率,其他综合收益","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第19号——外币折算"},{"id":"3840","q":"外币货币性项目的期末折算？","a":"外币货币性项目（如应收账款、应付账款、借款等）在资产负债表日应按期末即期汇率折算为记账本位币。因汇率变动产生的汇兑差额一般计入当期财务费用。但需注意：与购建固定资产相关的外币专门借款产生的汇兑差额，在资本化期间内可予资本化。个人理解，供参考。","cat":"外币折算","kw":"外币折算,CAS 19,折算差额,即期汇率,其他综合收益,资本化,专门借款,汇率","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第19号——外币折算、企业会计准则第17号——借款费用"},{"id":"3839","q":"境外子公司记账本位币如何确定？","a":"CAS 19要求根据境外经营所处的主要经济环境中的货币来确定记账本位币。主要判断因素：①销售商品和服务的计价和结算货币；②主要成本费用的计价和结算货币；③融资活动产生的资金是哪种货币；④是否自主经营还是仅作为集团的延伸。实务中境外子公司如主要用当地货币交易、自主经营，则以当地货币为记账本位币。个人理解，供参考。","cat":"外币折算","kw":"外币折算,CAS 19,折算差额,即期汇率,其他综合收益,子公司","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第19号——外币折算"},{"id":"3838","q":"售后回租构成融资时CAS与IFRS处理差异？","a":"CAS 21和IFRS 16在售后回租构成融资的处理上基本一致——不确认销售收入，视为抵押融资处理。差异主要在计量细节：IFRS 16对租赁负债的计量更强调折现率的运用。CAS层面，如果资产转让不构成销售，按CAS 21第五十二条处理。个人理解，供参考。","cat":"租赁","kw":"租赁,CAS 21,使用权资产,租赁负债,售后回租","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第21号——租赁、国际财务报告准则第16号、国际财务报告准则第16号——租赁"},{"id":"3837","q":"科技财政经费收到与支出的会计处理？","a":"收到财政科技经费时：借记'银行存款'，贷记'递延收益'。发生研发费用时：借记'研发支出'（区分财政拨付与自筹部分），贷记相关科目。期末按符合条件的支出，将递延收益结转至其他收益或冲减研发费用。自筹部分支出计入当期损益或资本化。个人理解，供参考。","cat":"政府补助","kw":"政府补助,CAS 16,递延收益,总额法,净额法,其他收益,资本化","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第16号——政府补助、企业会计准则第17号——借款费用"},{"id":"3836","q":"PPP项目自建工程的合并抵销？","a":"合并范围内将PPP项目发包给内部承包方的，编制合并报表时：若发包方是主要责任人，需抵销内部建造收入和成本；若发包方是代理人，无需抵销。非政府方的类PPP项目可参照上述原则，也可以参考合同能源管理业务的处理——证监会倾向'自建固定资产并为客户提供服务'的观点。个人理解，供参考。","cat":"实务综合","kw":"实务,会计处理,准则应用,合并,PPP,证监会","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第14号——收入"},{"id":"CY0014","q":"请教陈版主和各位⽼师：企业调整业务后安全⽣产费结转的问题","a":"理论上应冲减当初计提时所计⼊的成本费⽤科⽬（即贷记销售成本）。如果本期已⽆销售成本，则贷记管理费⽤或者营业外收⼊也可以接受。个人理解，供参考。","cat":"实务综合","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3834","q":"国资兼并中评估基准日后新增资产的处理？","a":"评估报告有效期自基准日起一年，即假设一年内公允价值不会发生重大变化。基准日后但仍在评估有效期内的新增资产，若公允价值与账面价值差异不大（尤其采用成本法评估的情况），一般无需重新评估，但需与交易对方确认。重大新增资产仍建议补充评估。个人理解，供参考。","cat":"实务综合","kw":"实务,会计处理,准则应用,公允价值,账面价值","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"3833","q":"母子公司间委托加工并销售的会计处理？","a":"母公司委托子公司加工产品并销售的模式下，需分析哪一方是主要责任人：若子公司仅提供加工服务、不承担存货风险、不参与定价，子公司为代理人，净额法确认加工费收入。母公司为产品的主要责任人，总额法确认销售收入。合并层面内部交易需全额抵销。个人理解，供参考。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,子公司,合并,母公司","src":"财政部 企业会计准则解释公告","std_ref":"企业会计准则第20号——企业合并"},{"id":"3832","q":"分公司审计的特殊考虑？","a":"分公司非独立法人，会计处理特点：无实收资本（用'上级拨入资金'），一般无资本公积、盈余公积科目，仅设未分配利润。分公司独立缴纳流转税但不是独立所得税纳税主体。审计报告需遵循《中国注册会计师审计准则第1601号》，明确报告目的、分发范围和使用限制。个人理解，供参考。","cat":"实务综合","kw":"实务,会计处理,准则应用,审计,资本公积,注册会计师,审计报告,所得税,未分配利润","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则——基本准则"},{"id":"CY0020","q":"增发股票的⼿续费，如何在权益变动表中披露","a":"可以直接抵减发⾏股票（股东投⼊资本）增加的资本公积净额。个人理解，供参考。","cat":"实务综合","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3830","q":"私有化退市后股权激励的置换处理？","a":"私有化退市置换原股权激励计划时，需分析新计划与原计划是否存在实质差异：若仅因上市地变更而调整，实质性条款未变的，可视为对原计划的修改，按修改日重新计量。若新计划是全新安排，且原计划已取消，则按新计划处理——原计划未确认的费用不再确认，新计划按授予日计量。个人理解，供参考。","cat":"股份支付","kw":"股份支付,CAS 11,权益结算,现金结算,等待期,股权激励","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第11号——股份支付"},{"id":"3829","q":"租赁资产相关支出的现金流量指定？","a":"出租方受承租方委托代建租赁资产部分工程，支出由承租方承担的，属于代收代付性质。应确认为经营活动现金流量（收到/支付其他与经营活动有关的现金），若满足条件可按净额抵销列报。同时需判断该代建业务是否应按净额法确认收入和成本。个人理解，供参考。","cat":"租赁","kw":"租赁,CAS 21,使用权资产,租赁负债","src":"深圳证券交易所 会计监管动态","std_ref":"企业会计准则第21号——租赁"},{"id":"3828","q":"租赁协议中按营收/净利分红的处理？","a":"租赁协议约定'按营收比例1%或净利20%（孰高）向A公司分红'，属于可变租赁付款额，且并非取决于指数或比率。在金额确定后纳入当期租金成本，与使用权资产折旧计入相同的成本费用科目。此类付款额不纳入租赁负债初始计量。个人理解，供参考。","cat":"租赁","kw":"租赁,CAS 21,使用权资产,租赁负债,分红,折旧","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第21号——租赁"},{"id":"CY0022","q":"祝陈版主龙年⾝体安康，⼼想事成。","a":"谢谢！也祝各位⽹友新年快乐！龙⾏⼤运！个人理解，供参考。","cat":"实务综合","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3826","q":"新旧仓库置换是否具有商业实质的判断？","a":"需关注新旧仓库在房屋结构、剩余使用年限、可使用面积、仓储条件、运行成本等方面是否存在实质性差异。存在实质性差异则具有商业实质，以公允价值为基础核算换入资产。换入资产的入账价值为不含增值税金额，应比较项目决算金额与评估值的差异，选择更可靠的信息入账。个人理解，供参考。","cat":"固定资产","kw":"固定资产,折旧,减值,CAS 4,公允价值","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第4号——固定资产"},{"id":"3825","q":"投资性房地产经营权出售的实质？","a":"A公司将投资性房地产15年经营权出售给B公司，同时约定每年上缴固定收益、不足由A差额补足的，实质为融资行为。A个别报表层面出售时确认收入，合并层面应冲回收入，将收到的资金计入长期应付款，每年支付的固定收益拆分为归还本金和利息分别处理。个人理解，供参考。","cat":"实务综合","kw":"实务,会计处理,准则应用,合并","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则——基本准则"},{"id":"3824","q":"清产核资无法清查价值时如何处理？","a":"根据《国有企业清产核资办法》，清产核资需包含账务清理、资产清查、价值重估、损益认定、资金核实等完整内容。若仅能进行实物清点、无账面价值和清查价值，不属于完整的清产核资，不应出具清产核资报告，应出具资产盘点报告或资产实物状态清查报告。个人理解，供参考。","cat":"实务综合","kw":"实务,会计处理,准则应用,账面价值","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则——基本准则"},{"id":"CY0114","q":"政府补助实务处理","a":"理论上肯定是要按照税法规定的标准化的处理⽅法进⾏纳税调整和审计调整的。如果被审计单位减持不调整，可以从影响⼤⼩（包括定性和定量⽅⾯）、当地有⽆事实上的此类税务处理惯例等因素综合考虑能否接受被审计单位⽬前的处理，⽽不作进⼀步调整。个人理解，供参考。","cat":"政府补助","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3822","q":"政策性拆迁中'财政预算直接拨付'的含义？","a":"要求从财政专户直接拨款到被拆迁企业银行账户，不得通过施工单位、土储中心等过手。目前实务中满足该条件的情形较少，基本按资产处置处理（确认资产处置损益），参照《监管规则适用指引——会计类第3号》3-10。不符合条件的拆迁补偿按政府补助准则处理。个人理解，供参考。","cat":"政府补助","kw":"政府补助,CAS 16,递延收益,总额法,净额法,监管","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第16号——政府补助"},{"id":"CY0152","q":"政府补助是否与⽇常经营活动相关的判断","a":"上述三项⼀般理解都属于与⽇常活动相关，应计⼊其他收益。根据财政部会计司发布的政府补助准则解读： 政府补助准则不对“⽇常活动”进⾏界定。通常情况下，若政府补助补偿的成本费⽤是营业利润之中的项⽬，或该补助与⽇常销售等经营⾏为密切相关（如增值税即征即退等），则认为该政府补助与⽇常活动相关。 上述补助对象都是在利润表上计⼊管理费⽤或者营业成本等“营业利润之中的项⽬”，故属于与⽇常活动相关的政府补助。个人理解，供参考。","cat":"政府补助","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3820","q":"涉及红包/优惠券的会计处理？","a":"广告平台向用户提供可抵扣订单金额的红包/优惠券，应作为平台的销售费用处理。即使平台同时是交易成交平台并向商户收取佣金，该处理结论也不受影响。可参考《上市公司执行企业会计准则案例解析2024》案例6-09。个人理解，供参考。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,上市公司","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"3819","q":"合并范围内往来产生的汇兑损益是否可以抵销？","a":"合并范围内外币往来款产生的汇兑损益，在合并报表层面应继续保留，不能与其他综合收益抵消。例外情况：若该应收款项满足'实质上构成对境外经营净投资的外币货币性项目'定义，其汇兑损益可计入其他综合收益（外币报表折算差额）。个人理解，供参考。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,其他综合收益,合并","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"3818","q":"看跌期权与看涨期权的区分？","a":"看涨期权是持有人有权买入标的资产；看跌期权是持有人有权卖出标的资产。要区分的是谁持有期权、谁签出期权。卖方持有看涨期权时，在商品价格上涨时按固定价格回购更有利；卖方持有看跌期权时，在商品价格下跌时按固定价格卖出更有利。实务中不少人对方向判断混淆。个人理解，供参考。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,期权","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"3817","q":"商业承兑汇票在集团财务公司贴现能否终止确认？","a":"集团内A公司收到B公司的商业承兑汇票后向集团财务公司C贴现的，即使C出具承诺书承诺直接向B追索，若C后续可能将票据再贴现，原'不向A追索'的约定可能不适用。基于谨慎原则，A公司不能终止确认该商业承兑汇票。终止确认需满足将所有风险和报酬转移给转入方。个人理解，供参考。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,终止确认","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"CY0031","q":"⾮同⼀控制下企业合并","a":"应当穿透到底层资产来分析。如果B是A的⼦公司，则应分析B是否构成业务；如果A对B⽆控制权但有重⼤影响， 则应注意区分联营企业是否构成业务。 如果A控制B，⽽B构成业务的，则仍属于企业合并。 如果A对B⽆控制权但有重⼤影响，则根据《2017年会计监管协调会——具体会计问题监管⼜径》：“被购买⽅仅持有⼀项对联营公司投资时，是否构成业务，需要判断其所持有的联营公司本⾝是否构成业务。如果联营公司本⾝只持有现⾦、以公允价值计量的⾦融资产等，并不构成业务，则被购买⽅持有的相应长期股权投资也不构成业务；如果联营公司本⾝构成业务，则被购买⽅持有的长期股权投资也构成业务。也即，被购买⽅主要资产为联营公司股权时，对其是否构成业务的判断，应穿透⾄联营公司层⾯确定。”。个人理解，供参考。","cat":"收入准则","kw":"控制权,公允价值,合并","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3815","q":"合同负债与应收账款能否抵销列报？","a":"两者不可抵销列报。证监会在《2020年上市公司年报会计监管报告》中明确该抵销属于错误。仅在合同不可撤销、企业在转让商品前已取得无条件收款权时，才可同时确认应收账款和合同负债（如不可撤销的工程总承包合同）。实务中这类情形较少。个人理解，供参考。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14,合同负债,上市公司,监管,证监会,会计监管","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第14号——收入"},{"id":"3814","q":"向客户收取的贴现利息是否属于可变对价？","a":"若销售合同中已明确约定由客户承担贴现利息，或虽无约定但已形成稳定商业惯例的，该贴现利息应按可变对价处理——在确认收入时作为交易价格的调整项。若仅是一次性安排且无先例，则可能作为债务重组处理。个人理解，供参考。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14,债务重组","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第14号——收入"},{"id":"3813","q":"逾期利息与现金折扣的区别？","a":"两者本质差异并非是否违约：现金折扣是为鼓励客户提前回款给予的价格折让，属于可变对价，应冲减收入。应收账款逾期利息属于资金占用费，非金融企业取得的该类收入应计入投资收益，不确认为营业收入。这是收入准则与金融工具准则的边界问题。个人理解，供参考。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14,投资收益","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第14号——收入"},{"id":"CY0034","q":"求助陈版主委贷及优先股投资的会计处理","a":"虽然该项委贷是在办理ODI审批登记之前的临时性措施，但其本⾝是⼀项独⽴的⾦融资产，应根据其⾃⾝的合同现 ⾦流量特征和管理模式确定其分类。有可能被分类为债权投资。其核算与⼀般的委托贷款相同，利息作为应收利息核算及列报。个人理解，供参考。","cat":"收入准则","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3811","q":"处置少数股权而缴纳的所得税在合并报表中的列报？","a":"处置少数股权未丧失控制权的，合并报表层面所得税应区分两部分：①与股权持有期间利润相关的所得税计入损益；②与股权增值所得部分对应的所得税冲减资本公积。这参照了《监管规则适用指引——会计类第1号》同控下合并股权置换所得税的处理原则。个人理解，供参考。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,合并,所得税,资本公积,监管,控制","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0042","q":"关于吸收合并商誉计算的问题！求教！！！","a":"对于2020年的控股和2023年的吸收合并，⼀般不认为是⼀揽⼦交易。 吸收合并⼦公司不属于会计意义上的企业合并。母公司个别报表层⾯应按《企业会计准则解释第7号》第四条规定处理。基本原则是将原先合并报表层⾯确认的对B公司的商誉平移到吸收合并完成后的A公司个别报表中。个人理解，供参考。","cat":"企业合并","kw":"商誉,合并","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3809","q":"一致行动协议下能否将持股较少的主体纳入合并？","a":"A公司仅持有C公司7%股权，但与持有16%股权的B合伙企业签署一致行动协议，若A可接受B的股东权利委托（仅让渡表决权，不让渡财产权利），则A可控制C公司51%股权对应的表决权，取得C的控制权。此时商誉计算时，B持有的16%权益仍作为少数股东权益。个人理解，供参考。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,合并,少数股东,控制,商誉","src":"财政部 企业会计准则解释公告","std_ref":"企业会计准则第20号——企业合并、企业会计准则第33号——合并财务报表"},{"id":"3808","q":"同一控制下吸收合并的个别报表处理？","a":"A发行股份吸收合并B、C（同受D控制），合并完成后仅剩A一个法人主体，无需编制合并报表。A个别报表中，取得的B、C净资产账面价值与发行股份面值之间的差额调整资本公积。A个别报表层面不体现原B、C的留存收益。这是同一控制下吸收合并的特殊性——个别报表即为最终报表。个人理解，供参考。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,合并,控制,账面价值,资本公积,留存收益","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0049","q":"现⾦流量表问题-母公司增资","a":"不论是否构成企业合并，在母公司（投资⽅）的个别现⾦流量表中都是填⼊“投资⽀付的现⾦”。 “取得⼦公司及其其他营业单位⽀付的现⾦净额”⼀般是⽤于发⽣⾮同⼀控制下企业合并时，购买⽅的合并报表层⾯ （如果是吸收合并或者新设合并，且在会计上构成⾮同⼀控制下合并的，才可能出现在个别报表层⾯）。详见《中审众环研究2020》之“问题5-2-20（取得或处置⼦公司及其他营业单位⽀付或收到的现⾦）”。个人理解，供参考。","cat":"企业合并","kw":"合并","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3806","q":"公允价值减出售费用的含义？","a":"公允价值减去出售费用后的净额（FVLCD）是资产减值测试中的关键概念。公允价值是市场参与者在有序交易中出售资产可收到的价格。出售费用是直接归属于资产处置的增量成本（如法律费用、印花税、搬运费等），不包括财务费用和所得税费用。个人理解，供参考。","cat":"公允价值计量","kw":"公允价值,CAS 39,估值技术,输入值,市场法,所得税,减值测试","src":"财政部 企业会计准则解释公告","std_ref":"企业会计准则第39号——公允价值计量"},{"id":"3805","q":"非活跃市场的公允价值如何确定？","a":"非活跃市场下，企业应使用估值技术确定公允价值。常用的估值技术：市场法（参考可比公司或交易）、收益法（现金流折现）、成本法（重置成本）。选择估值技术时应最大化使用可观察输入值、最小化使用不可观察输入值。同一资产可能有多个估值结果，应选择最具代表性的。个人理解，供参考。","cat":"公允价值计量","kw":"公允价值,CAS 39,估值技术,输入值,市场法","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第39号——公允价值计量、企业会计准则第2号——长期股权投资"},{"id":"3804","q":"公允价值计量的三个层次如何区分？","a":"第一层次：相同资产或负债在活跃市场未经调整的报价（最可靠）。第二层次：直接或间接可观察的、除第一层次外的输入值——如类似资产在活跃市场的报价、相同资产在非活跃市场的报价等。第三层次：不可观察输入值——企业基于最佳可得信息的主观判断和假设。三个层次按输入值的可靠性排序。个人理解，供参考。","cat":"公允价值计量","kw":"公允价值,CAS 39,估值技术,输入值,市场法","src":"财政部 企业会计准则解释公告","std_ref":"企业会计准则第39号——公允价值计量"},{"id":"3803","q":"固定资产折旧年限变更属于政策变更还是估计变更？","a":"固定资产折旧年限变更属于会计估计变更。折旧年限是基于对资产预期经济利益的估计，随着使用情况和新信息的出现，需要对原有估计进行修正——这是典型的估计变更。应采用未来适用法，不追溯调整前期报表。实务中容易混淆的是：改变折旧方法是政策变更，改变折旧年限是估计变更。个人理解，供参考。","cat":"政策/估计变更","kw":"会计政策变更,会计估计变更,CAS 28,追溯调整,未来适用法,折旧,会计估计,追溯","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第28号——会计政策、会计估计变更和差错更正"},{"id":"3802","q":"前期差错更正的追溯调整如何处理？","a":"重要的前期差错应采用追溯重述法更正：调整发现当期的期初留存收益，并调整前期比较数据。不重要的前期差错可直接调整发现当期的相关项目。在确定重要性时，既要考虑金额大小，也要考虑差错的性质——例如：虚构收入的差错即使金额不重大，性质上也是重大的。个人理解，供参考。","cat":"政策/估计变更","kw":"会计政策变更,会计估计变更,CAS 28,追溯调整,未来适用法,前期差错,追溯,留存收益","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第28号——会计政策、会计估计变更和差错更正"},{"id":"3801","q":"会计政策变更与会计估计变更的区别？","a":"会计政策变更是指企业对相同交易或事项由原采用的会计政策改用另一会计政策。会计估计变更是指由于资产和负债的当前状况及预期经济利益和义务发生了变化，对资产或负债的账面价值或资产的定期消耗金额进行调整。核心区别：政策变更是对'确认、计量、列报基础'的改变，估计变更是基于最新信息对'金额'的修正。个人理解，供参考。","cat":"政策/估计变更","kw":"会计政策变更,会计估计变更,CAS 28,追溯调整,未来适用法,会计估计,会计政策,账面价值","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第28号——会计政策、会计估计变更和差错更正"},{"id":"3800","q":"以账面价值计量的非货币性资产交换？","a":"不具有商业实质或换入和换出资产的公允价值均不能可靠计量的，以换出资产的账面价值为基础确定换入资产成本，不确认损益。涉及补价的：收到补价方按比例确认收益，支付补价方增加资产成本。实务中大多数无商业实质的交换属于此类。个人理解，供参考。","cat":"非货币性资产交换","kw":"非货币性资产交换,CAS 7,商业实质,公允价值,账面价值","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第7号——非货币性资产交换"},{"id":"3799","q":"非货币性资产交换以公允价值计量时的处理？","a":"具有商业实质且换入或换出资产的公允价值能可靠计量的，应以换出资产的公允价值为基础确定换入资产的成本（除非有确凿证据表明换入资产公允价值更可靠）。换出资产公允价值与账面价值的差额计入当期损益。涉及补价的：收到补价方确认收益，支付补价方增加资产成本。个人理解，供参考。","cat":"非货币性资产交换","kw":"非货币性资产交换,CAS 7,商业实质,公允价值,账面价值","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第7号——非货币性资产交换"},{"id":"3798","q":"非货币性资产交换具有商业实质的判断？","a":"判断是否具有商业实质，需关注换入资产与换出资产的未来现金流量在风险、时间、金额方面是否存在显著不同。若存在显著不同，则具有商业实质，以公允价值为基础核算。例如新旧仓库置换：若两者在房屋结构、剩余使用年限、可使用面积、仓储条件等方面存在实质性差异，则具有商业实质。个人理解，供参考。","cat":"非货币性资产交换","kw":"非货币性资产交换,CAS 7,商业实质,公允价值,账面价值","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第7号——非货币性资产交换"},{"id":"3797","q":"多个项目共用专门借款时利息如何分配？","a":"专门借款用于多个项目的，应按各项目占用的专门借款金额比例、占用时间分配利息资本化金额。未使用的专门借款暂时投资产生的收益，应从资本化利息中扣除——但不能将投资收益直接冲减在建工程成本，而是作为借款费用净额的减项。个人理解，供参考。","cat":"借款费用","kw":"借款费用,CAS 17,资本化,专门借款,一般借款,投资收益","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第17号——借款费用"},{"id":"3796","q":"外币借款的汇兑差额能否资本化？","a":"外币专门借款的汇兑差额，在资本化期间内可予资本化（相当于借款费用的调整），计入相关资产成本。但需注意：①仅限专门借款的汇兑差额；②非资本化期间的汇兑差额计入财务费用；③一般借款的汇兑差额一律不计入资产成本。个人理解，供参考。","cat":"借款费用","kw":"借款费用,CAS 17,资本化,专门借款,一般借款","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第17号——借款费用"},{"id":"3795","q":"借款辅助费用（如银团费用）的资本化处理？","a":"银团贷款属于专门借款的前提下，银团费用属于借款辅助费用，应纳入实际利率计算。根据实际利率法，计算资本化期间内应计入利息的银团费用，随专门借款利息一并资本化。其他期间计入利息支出的银团费用予以费用化。处理依据优先按照借款费用准则应用指南的要求执行。个人理解，供参考。","cat":"借款费用","kw":"借款费用,CAS 17,资本化,专门借款,一般借款,费用化","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第17号——借款费用"},{"id":"3794","q":"一般借款的利息资本化如何处理？","a":"一般借款利息资本化金额=累计资产支出超过专门借款部分的加权平均数×一般借款加权平均利率。累计资产支出加权平均数=∑（每笔资产支出金额×该笔支出占用的天数/当期天数）。一般借款的资本化金额不能超过当期实际发生的利息金额——这是上限。个人理解，供参考。","cat":"借款费用","kw":"借款费用,CAS 17,资本化,专门借款,一般借款","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第17号——借款费用"},{"id":"3793","q":"专门借款的利息资本化条件？","a":"专门借款的利息资本化需同时满足：①资产支出已经发生；②借款费用已经发生；③为使资产达到预定可使用或可销售状态所必要的购建或生产活动已经开始。三个条件缺一不可。资本化期间为满足上述条件至资产达到预定可使用状态之间。非正常中断超过3个月的应暂停资本化。个人理解，供参考。","cat":"借款费用","kw":"借款费用,CAS 17,资本化,专门借款,一般借款","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第17号——借款费用"},{"id":"CY0360","q":"不属于持有待售资产，原因见上。 提问⼈：⽴⽅光年 时间：2024-05-17 092747","a":"持有⽬的不是资本增值或者获取租⾦收⼊；也可能只能整体出售。提问⼈：xiny973025 时间：2024-06-21 11:51:06 陈版，想要补充咨询⼀下，如果A公司已与B公司协议约定抵偿⼯程款，同时B公司给予了1年的过户期，在这个期间因未能及时抵付给供应商⽽发⽣跌价的，跌价损失如何处理？ 回答⼈：chenyiwei 这种情况属于担保物的跌价。如果没有直接将⼯抵房确认为债权⼈⾃⾝资产，则相当于此前的应收⼯程款并未终⽌确认，此时通过应收⼯程款的坏账准备来调整。个人理解，供参考。","cat":"持有待售","kw":"持有待售","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3791","q":"划分为持有待售资产的时点？","a":"划分为持有待售资产的时点应同时满足以下条件：①企业已就处置该资产作出决议；②已与受让方签订不可撤销的转让协议；③转让将在一年内完成。如果在资产负债表日之前已满足上述条件，则在资产负债表日即应将其划分为持有待售资产，不再计提折旧。个人理解，供参考。","cat":"持有待售","kw":"持有待售,CAS 42,处置组,终止经营,停止折旧,折旧","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第42号——持有待售的非流动资产、处置组和终止经营"},{"id":"3790","q":"终止经营的列报要求？","a":"终止经营是指已被处置或被分类为持有待售的、能够单独区分的组成部分，且满足：①代表一项独立的主要业务或一个主要经营地区；②或拟对一个独立的主要业务或经营地区进行处置的一项相关联计划的一部分。终止经营的利润表列报应区分持续经营损益和终止经营损益，并在附注中披露终止经营的详情。个人理解，供参考。","cat":"持有待售","kw":"持有待售,CAS 42,处置组,终止经营,停止折旧","src":"财政部 企业会计准则解释公告","std_ref":"企业会计准则第42号——持有待售的非流动资产、处置组和终止经营"},{"id":"3789","q":"持有待售资产的认定条件？","a":"持有待售资产需同时满足：①该资产在当前状况下可立即出售（仅需通常和惯例的出售程序）；②出售极可能发生（已作出决议、已签订有约束力的转让协议、预计在一年内完成出售）；③出售价格与公允价值相比合理。如果持有一年以上仍未出售，应重新评估是否继续满足持有待售条件。个人理解，供参考。","cat":"持有待售","kw":"持有待售,CAS 42,处置组,终止经营,停止折旧,公允价值","src":"财政部 企业会计准则解释公告","std_ref":"企业会计准则第42号——持有待售的非流动资产、处置组和终止经营"},{"id":"3788","q":"资产负债表日后期间发生重大火灾是否属于调整事项？","a":"资产负债表日后期间新发生的火灾属于非调整事项。因为火灾在资产负债表日并不存在，其损失反映的是日后新发生的情况。若损失重大，应在附注中披露该日后非调整事项的性质和影响金额。但若火灾暴露了资产负债表日已存在的安全隐患，则有关资产减值可能属于调整事项。个人理解，供参考。","cat":"资产负债表日后事项","kw":"期后事项,CAS 29,调整事项,非调整事项","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第29号——资产负债表日后事项"},{"id":"3787","q":"资产负债表日后资产价格发生重大波动如何处理？","a":"资产负债表日后资产价格发生重大波动，如股票市价大跌、大宗商品价格暴跌等，属于非调整事项——因价格波动反映的是资产负债表日后新发生的情况。但当情况严重到可能影响持续经营假设时，可能引发对持续经营假设的重大疑虑，需在附注中披露。个人理解，供参考。","cat":"资产负债表日后事项","kw":"期后事项,CAS 29,调整事项,非调整事项","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第29号——资产负债表日后事项"},{"id":"3786","q":"资产负债表日后发现的舞弊是否属于调整事项？","a":"若舞弊发生在资产负债表日或之前，属于前期差错，应作为资产负债表日后调整事项处理——追溯重述前期报表。若舞弊发生在资产负债表日后期间，属于当期事项。实务中关键是要确定舞弊行为的发生时间，从而判断是属于前期差错还是当期事项。个人理解，供参考。","cat":"资产负债表日后事项","kw":"期后事项,CAS 29,调整事项,非调整事项,前期差错,追溯","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第29号——资产负债表日后事项"},{"id":"3785","q":"资产负债表日后调整事项的判断标准？","a":"资产负债表日后调整事项需同时满足两个条件：①该事项在资产负债表日已经存在；②该事项在资产负债表日后取得新的或进一步的证据。例如：资产负债表日已存在的未决诉讼在日后判决，确认的赔偿金额与原估计不同——属于调整事项。若诉讼事项在资产负债表日后才发生，则属非调整事项。个人理解，供参考。","cat":"资产负债表日后事项","kw":"期后事项,CAS 29,调整事项,非调整事项","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第29号——资产负债表日后事项"},{"id":"3784","q":"与合营企业和联营企业交易的披露要求？","a":"与合营企业和联营企业的交易需要按关联方交易披露：交易性质、交易金额、定价政策、未结算款项的金额和条款、坏账准备等。重点关注交易价格的公允性——若不公允，需披露差额及处理方式。这是证监会对上市公司关联交易关注的重点。个人理解，供参考。","cat":"关联方披露","kw":"关联方披露,CAS 36,关联方,关联交易,披露,合营,联营,上市公司,证监会,坏账","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第36号——关联方披露、企业会计准则第22号——金融工具确认和计量"},{"id":"3783","q":"关键管理人员薪酬的关联方披露范围？","a":"关键管理人员薪酬的披露应包括：①工资、奖金和津贴；②社会保险费和住房公积金；③股份支付或利润分享计划对应的费用；④辞退福利等。披露时通常按'董事、监事及高级管理人员'汇总披露，但高管与董事、监事的薪酬宜分开列示。个人理解，供参考。","cat":"关联方披露","kw":"关联方披露,CAS 36,关联方,关联交易,披露,关键管理人员,股份支付,辞退福利","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第36号——关联方披露"},{"id":"3782","q":"母公司向子公司提供免费担保是否属于关联交易？","a":"母公司为子公司融资提供免费担保属于关联交易，需在附注中披露担保金额、期限、是否收取担保费等。合并层面该担保会被抵销，但个别报表层面应披露。若母公司收取担保费，子公司支付的担保费在合并层面需抵销。个人理解，供参考。","cat":"关联方披露","kw":"关联方披露,CAS 36,关联方,关联交易,披露,子公司,母公司,合并","src":"深圳证券交易所 会计监管动态","std_ref":"企业会计准则第36号——关联方披露"},{"id":"3781","q":"一致行动协议下是否存在关联方关系？","a":"一致行动协议本身可能导致协议各方构成关联方。若A公司与B公司控股股东签署一致行动协议，需按控股股东意思表示行使股东权利，表明A与B公司及其控股股东之间存在特殊关系。即使A仅持有7%股权且仅委派1名董事，仍可能因一致行动安排而与B构成关联方。个人理解，供参考。","cat":"关联方披露","kw":"关联方披露,CAS 36,关联方,关联交易,披露,控股","src":"深圳证券交易所 会计监管动态","std_ref":"企业会计准则第36号——关联方披露"},{"id":"3780","q":"关联方交易采用净额法时如何披露交易金额？","a":"关联方交易会计处理采用净额法的，交易金额仍按净额法认定和披露。但建议同时在披露表格下方以脚注方式披露交易流水全额，以提高透明度。实务中，关联方交易的披露要求比非关联交易更严格——即使按净额法核算，也应在附注中充分披露交易规模。个人理解，供参考。","cat":"关联方披露","kw":"关联方披露,CAS 36,关联方,关联交易,披露","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第36号——关联方披露"},{"id":"3779","q":"永续债对每股收益计算的影响？","a":"归属于永续债持有人的净利润在计算每股收益时，应分别列报'归属于母公司普通股股东的每股收益'和'归属于其他权益工具持有者的每股收益'。永续债利息（税后）在计算基本每股收益时从净利润中扣除。两者不可合并为一个每股收益数字。个人理解，供参考。","cat":"每股收益","kw":"每股收益,CAS 34,基本每股收益,稀释每股收益,潜在普通股,合并,母公司","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第34号——每股收益"},{"id":"3778","q":"限制性股票对每股收益计算的影响？","a":"限制性股票在计算基本每股收益时，应视为发行在外的普通股（因为一般享有分红权），纳入加权平均股数。在计算稀释每股收益时，若限制性股票的行权价低于平均市价，应将差额部分按'库存股法'调整：假设用行权价收到的资金按平均市价回购股份，净增股数=限制性股票数-回购股份数。个人理解，供参考。","cat":"每股收益","kw":"每股收益,CAS 34,基本每股收益,稀释每股收益,潜在普通股,限制性股票,稀释,分红","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第34号——每股收益"},{"id":"3777","q":"合并报表与母公司个别报表的每股收益有何不同？","a":"母公司个别报表的每股收益仅基于母公司自身净利润计算。合并报表的每股收益应以合并净利润为基础，归属于母公司普通股股东的净利润为分子，母公司发行在外的普通股加权平均数为分母。合并层面的每股收益反映了集团整体为母公司股东创造的盈利。个人理解，供参考。","cat":"每股收益","kw":"每股收益,CAS 34,基本每股收益,稀释每股收益,潜在普通股,合并,母公司","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第34号——每股收益"},{"id":"CY0872","q":"关于回购⾃⾝股份⽤于出售，是否影响基本每股收益计算？","a":"回购库存股导致减少了发⾏在外股份数量，所以会对基本每股收益和稀释每股收益的分母都会产⽣影响。虽然将来拟⽤于再次出售，但在作为库存股核算期间不享有股东权利，实际上仍减少了发⾏在外股份数量。个人理解，供参考。","cat":"每股收益","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3775","q":"可转换债券对每股收益计算的影响？","a":"对于可转换债券，在计算稀释每股收益时应采用'假设转换法'：①将可转债假设于期初或发行日转换为普通股；②将可转债负债部分当期已确认的利息费用（税后）加回归属于普通股股东的净利润；③增加的普通股股数为假设转换将发行的股数。若转换具有反稀释效应，则不应纳入稀释每股收益计算。个人理解，供参考。","cat":"每股收益","kw":"每股收益,CAS 34,基本每股收益,稀释每股收益,潜在普通股,稀释,反稀释","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第34号——每股收益"},{"id":"3774","q":"存在多项潜在普通股时稀释每股收益的计算顺序？","a":"计算稀释每股收益时，应按照各潜在普通股的稀释程度从大到小的顺序，逐步将其计入稀释每股收益的计算。稀释程度以'增量每股收益'（即假设转换所增加的归属于普通股股东的净利润除以增加的普通股股数）衡量。增量每股收益越小的潜在普通股，稀释程度越大，应优先纳入计算。个人理解，供参考。","cat":"每股收益","kw":"每股收益,CAS 34,基本每股收益,稀释每股收益,潜在普通股,稀释","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第34号——每股收益"},{"id":"CY1691","q":"计算稀释每股收益问题","a":"https://bbs.esnai.com/thread-5494038-1-1.html个人理解，供参考。","cat":"每股收益","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3772","q":"金融资产终止确认的'过手测试'条件？","a":"企业将金融资产转移给另一方，若要终止确认该金融资产，需满足'过手测试'：①企业从该资产收取现金流量的合同权利已转移；②企业已将金融资产所有权上几乎所有的风险和报酬转移；③企业既没有转移也没有保留几乎所有的风险和报酬，但未保留对金融资产的控制。个人理解，供参考。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,终止确认,控制","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"CY0677","q":"请教陈版：关于集团或母公司对被投资单位长期债权视同“净投资的长期权 益”的会计处理","a":"当A、B作出将原往来款项认定为“净投资”的决议后，A、B和C的处理仍然应当是对应的。即，A、B作为长期应收款核算（以摊余成本计量的⾦融资产），对应地，C应转为长期应付款核算。主帖中所建议的“A、B作为长期应收款，C作为资本公积”的处理是不对应的，转为净投资并不豁免C在⽇后财务状况改善后的偿还义务，因此相应的⾦融负债不能转为C的权益。个人理解，供参考。","cat":"金融工具","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3770","q":"融资性质下长期应付款的利息处理？","a":"融资性质的长期应付款应按实际利率法确认利息费用。若合同未明确约定利率，应按同期银行贷款利率或内含利率计算。利息费用在符合资本化条件时可计入相关资产成本（如资产建造期间），否则计入财务费用。个人理解，供参考。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,资本化","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报、企业会计准则第17号——借款费用"},{"id":"3769","q":"集团内公司之间无偿划转资产的入账价值？","a":"属于权益性交易，实务中通常按划出方原账面价值作为划入方入账价值（无需资产评估备案的情况）。若有条件允许且进行了评估、且被划转资产不构成业务的，划入方按评估值入账更合理。个人理解，供参考。","cat":"实务综合","kw":"实务,会计处理,准则应用,账面价值","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则——基本准则"},{"id":"3768","q":"生产季节性停工期间的土地使用权摊销计入哪类科目？","a":"参照四部委2022年年报工作通知（财会[2022]32号），厂区内土地使用权和厂房停工期间的折旧、摊销应直接计入营业成本，不区分开工/停工期间分别计入制造费用、管理费用。这是统一规范的做法。个人理解，供参考。","cat":"固定资产","kw":"固定资产,折旧,减值,CAS 4,摊销","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第4号——固定资产"},{"id":"3767","q":"外币双择期合同作为交易性金融资产处理？","a":"该交易若顺利执行可获利金额固定，应作为交易性金融资产处理。需进一步了解合同汇率与即期汇率的关系、交易目的，以判断是否为嵌入衍生工具或是否需要分拆处理。个人理解，供参考。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,衍生工具,汇率","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"3766","q":"供应商融资安排中应付账款的终止确认？","a":"需根据CAS 22金融负债终止确认的规定分析商业实质。若企业向供应商签发票据后，供应商向银行贴现，企业仍需承担付款义务的，不终止确认应付账款。若企业已与银行建立直接融资安排，应付账款可终止确认并确认银行借款。个人理解，供参考。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,终止确认","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"3765","q":"自然人控股公司是否需要编制合并报表？","a":"公司之间若无股权关系，不存在母子公司关系，不能编制一般意义上的合并报表。管理上如有需求，可编制特殊基础的汇总报表，但需严格限制用途和分发范围，不能对外提供。个人理解，供参考。","cat":"报表列报","kw":"报表列报,CAS 30,列报,附注,持续经营,合并,控股,子公司","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第30号——财务报表列报"},{"id":"CY0297","q":"内退⼈员薪酬会计处理","a":"内退⼈员的薪酬属于辞退福利范畴，也应通过“应付职⼯薪酬”科⽬核算。 根据《企业会计准则应⽤指南汇编2024》P256：“企业实施职⼯内部退休计划的，在内退计划符合本章规定的确认条件时，企业应当将⾃职⼯停⽌提供服务⽇⾄正常退休⽇期间、企业拟⽀付的内退职⼯⼯资和缴纳的社会保险费 等，确认为应付职⼯薪酬， ⼀次性计⼊当期损益，⽽不能在职⼯内退后分期确认因⽀付内退职⼯⼯资和为其缴纳社会保险费等产⽣的义务”。个人理解，供参考。","cat":"职工薪酬","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0063","q":"房地产联合营企业溢价及摊销问题请教","a":"房地产项⽬公司属于“单⼀资产实体”，不构成“业务”（参考：《中审众环研究2020》之“问题3-2-1（收购“单⼀资产实体”是否构成业务合并）”）。因此，其收购溢价不形成商誉，⽽是构成对投资⽅⽽⾔的开发产品或开发成本等存货成本的⼀部分，在实现销售时⼀并结转成本。 该溢价的来源，在于房地产开发项⽬公司的股权变动作价⼀般是依据收益法（假设开发法）作价，其作价⾦额⼀般 ⾼于成本法（资产基础法）的估值。个人理解，供参考。","cat":"企业合并","kw":"商誉,合并,成本法","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3762","q":"以前年度已抵扣进项税因异常原因转出的处理？","a":"首先要判断是否属于前期差错：如属于应追溯重述前期报表。如不可抵扣的原因是后续发生的（如税务机关认定属于不可抵扣项目），则应确认为当期损失。实务中与税务机关的沟通非常重要。个人理解，供参考。","cat":"实务综合","kw":"实务,会计处理,准则应用,前期差错,追溯","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则——基本准则"},{"id":"3761","q":"子公司有偿转让资产给母公司（同控）如何处理？","a":"同一控制下的资产转让，转让价格与账面价值的差额计入资本公积。合并层面该交易需完全抵销，资产继续按原账面价值列报。这是同一控制下交易权益性交易原则的体现——不确认损益。个人理解，供参考。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,子公司,母公司,账面价值,资本公积,合并,控制","src":"深圳证券交易所 会计监管动态","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0023","q":"祝陈版和各位坛友2024新年快乐","a":"谢谢！也祝各位⽹友新年快乐！龙⾏⼤运！个人理解，供参考。","cat":"实务综合","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0024","q":"祝陈版新年快乐，龙年⼤吉！","a":"谢谢！也祝本版⾯全体⽹友新年快乐，万事如意！个人理解，供参考。","cat":"实务综合","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0030","q":"是否需要确认股份⽀付费⽤？","a":"因为B、C合计占A公司的100%股权，实缴后股权⽐例未发⽣变动；且此次属于对原认缴出资的实缴，不具有为了获取员⼯或其他⽅的服务⽽予以补偿或激励的性质，故不属于股份⽀付。个人理解，供参考。","cat":"实务综合","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0080","q":"⽣产企业销售给第三⽅后，再通过租赁公司租回的业务收⼊问题？","a":"⾸先应判断上述主帖中的各交易步骤是否为⼀揽⼦交易。从主帖来看构成⼀揽⼦交易的可能性较⼤。 在构成⼀揽⼦交易的假设前提下，该交易属于售后租回，应根据新租赁准则的规定判断其中的资产转让是否属于销售，据此进⾏相应的会计处理（第五⼗⼀条或者第五⼗⼆条）。个人理解，供参考。","cat":"租赁","kw":"租赁","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3756","q":"BOT无形资产管线更新替换的会计处理？","a":"PPP无形资产是运营收费权，不是基础设施资产本身，管线拆除等正常更新替换不影响无形资产账面价值。若管线拆除是因合同服务条款变更，需按变更后条款调整会计处理，包括终止确认部分无形资产。个人理解，供参考。","cat":"无形资产","kw":"无形资产,CAS 6,研发支出,资本化,摊销,BOT,账面价值,终止确认,PPP","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第6号——无形资产、企业会计准则第14号——收入"},{"id":"CY0038","q":"请教陈版主，2023年执⾏新保险合同准则后融资性担保公司报表披露问题","a":"2023年度，新保险合同准则仅适⽤于“在境内外同时上市的企业以及在境外上市并采⽤国际财务报告准则或企业会计准则编制财务报表的企业”，故担保公司在2023年度尚未受到新保险合同准则影响。可继续沿⽤此前的列报⽅ 式。个人理解，供参考。","cat":"收入准则","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3754","q":"代编分录服务是否违反审计独立性？","a":"若以审计调整建议方式提出，且经管理层签字认可并相应调整账务，不属于'会计和记账服务'，不违反独立性准则。关键是审计师不承担管理层职责、不负责批准和记账。个人理解，供参考。","cat":"实务综合","kw":"实务,会计处理,准则应用,审计","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则——基本准则"},{"id":"3753","q":"内控缺陷判断——流程审批结束前转固是否构成缺陷？","a":"流程结束前转固表明审批流程滞后于实际情况，理论上存在内控缺陷。实务中考虑谨慎性原则，应尽早及时确认成本费用（不推迟折旧成本的确认）。但对不影响损益或可能导致确认收益的事项，审慎程度可以适当降低。个人理解，供参考。","cat":"实务综合","kw":"实务,会计处理,准则应用,内控,折旧","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则——基本准则"},{"id":"CY0039","q":"其他综合收益列表","a":"在转换当期，该项其他综合收益的发⽣额可以列⼊所有者权益变动表：（⼀）综合收益总额。并体现在利润表的“其他综合收益”中。个人理解，供参考。","cat":"实务综合","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3751","q":"信托资金的会计处理（为本公司融资设立or为其他方融资设立）？","a":"若信托是为B公司自身融资设立的，B公司将其纳入合并范围，个别报表确认为其他非流动资产按成本法核算。若信托是为母公司或其他子公司融资，B公司仅为出资，持有份额确认为以公允价值计量且其变动计入当期损益的金融资产。个人理解，供参考。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,合并,子公司,母公司","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报、企业会计准则第2号——长期股权投资"},{"id":"3750","q":"新金融准则下应收账款坏账准备如何披露三阶段模型？","a":"15号编报规则是披露规则，不规范确认计量要求。CAS 22（2017）下，应收账款、应收租赁款等流动资产基本不使用三阶段模型测算坏账准备，附注中三阶段模型披露仅为备用，一般不会用到。按账龄法计提坏账准备符合准则简化要求。个人理解，供参考。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,坏账","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"3749","q":"可供出售金融资产处置时累计OCI如何结转？","a":"其他债权投资（FVOCI债务工具）处置时，累计在其他综合收益中的公允价值变动应转入当期损益（投资收益）。其他权益工具投资（FVOCI权益工具）处置时，累计OCI直接转入留存收益，不经过损益。两者处理原则不同。个人理解，供参考。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,其他综合收益,投资收益,留存收益","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"CY0046","q":"国有企业收到财政⽆偿划转房产","a":"应按评估值⼊账更为合理。因为这是单项资产⽽不是业务，很难⽤“同⼀控制下合并”的⽅法处理。⽽且也存在避免虚增公允价值变动损益的考虑。个人理解，供参考。","cat":"实务综合","kw":"公允价值,合并","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3747","q":"外币报表折算中内部往来抵销的汇率差异处理？","a":"内部往来余额按期末汇率折算后余额应相等，可直接抵销干净，抵销分录中不会出现汇兑损益或OCI。各自报表中的汇兑损益和折算差额应予以保留，不互相抵销。这是合并层面的常规操作。个人理解，供参考。","cat":"实务综合","kw":"实务,会计处理,准则应用,汇率,合并","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则——基本准则"},{"id":"CY0052","q":"出售⼦公司股权，又租回⼦公司物业及附属设施等全部资产的会计处理","a":"处置⼦公司股权与“取回⼦公司物业及附属设施”是否为⼀揽⼦交易？“取回⼦公司物业及附属设施”具体是如何操作的，有⽆年限约定？个人理解，供参考。","cat":"实务综合","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3745","q":"农村土地承包经营权能否作为投资性房地产？","a":"农村土地承包经营权只是经营收益权，法律上不构成对土地的所有权或使用权，不能确认为投资性房地产。即使长期取得经营权证、拥有经营收益和转租权利，也应当确认为使用权资产而非无形资产，转租也不能转为投资性房地产。个人理解，供参考。","cat":"实务综合","kw":"实务,会计处理,准则应用","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则——基本准则"},{"id":"3744","q":"子公司分红因诉讼未确定的处理？","a":"因诉讼事项决议将分红先用于补偿诉讼支出，这仅是分红的预授权，最终可分配金额不确定。建议先不确认投资收益和应收股利，到金额确定后再按实际获得分红金额处理。体现了谨慎性原则。个人理解，供参考。","cat":"长投","kw":"长期股权投资,CAS 2,权益法,成本法,重大影响,子公司,分红,应收股利,投资收益,股利","src":"深圳证券交易所 会计监管动态","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"3743","q":"子公司回购股份的母公司合并报表处理？","a":"子公司回购股份在母公司合并报表层面等同于购买少数股权，按权益性交易处理。母公司应计算回购前后在子公司净资产中所享有份额的差额，与子公司支付的回购款比较，差额调整合并报表层面的权益。合并报表层面无库存股列报。个人理解，供参考。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,合并,子公司,母公司","src":"深圳证券交易所 会计监管动态","std_ref":"企业会计准则第20号——企业合并"},{"id":"3742","q":"内部交易中已缴纳税款子公司不能抵扣的合并抵销？","a":"母公司在内部交易中缴纳的税款中子公司不能抵扣的部分，在合并报表层面直接计入损益（税金及附加）。内部交易损益按不含税金额计算，这是合并报表还原经济实质的体现。个人理解，供参考。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,合并,子公司,母公司","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第20号——企业合并"},{"id":"3741","q":"无形资产出资取得公司控制权（非同控）如何处理？","a":"母公司个别报表层面，长期股权投资按无形资产公允价值入账，公允价值与账面价值的差额计入资产处置损益。合并报表层面，无形资产一直在母公司控制范围内，账面价值保持不变，母公司个别报表确认的资产处置损益需抵销。个人理解，供参考。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,控制,公允价值,账面价值,合并,母公司","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第20号——企业合并"},{"id":"3740","q":"不动产权登记费是否资本化？","a":"通过对不动产进行权利登记可使权益获得更好保护，有助于通过出售等方式获取经济利益，符合资本化条件。但如果金额较小也可简化处理予以费用化。实务中体现了重要性原则的运用。个人理解，供参考。","cat":"固定资产","kw":"固定资产,折旧,减值,CAS 4,资本化,费用化","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第4号——固定资产、企业会计准则第17号——借款费用"},{"id":"3739","q":"项目建设期管理人员工资是否计入在建工程？","a":"财务人员、党建人员等属于一般行政人员，建设期内和建成后的工作内容相同，与固定资产达到预定可使用状态无直接关系。应直接计入管理费用，不计入在建工程。参考《中审众环研究2020》问题1-1-29。个人理解，供参考。","cat":"固定资产","kw":"固定资产,折旧,减值,CAS 4","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第4号——固定资产"},{"id":"CY0057","q":"关于固定资产经营权和产权分离，会计处理的问题","a":"虽然名义上还拥有产权，但已不能带来经济利益流⼊，不再享有“占有、使⽤、收益、处分”的权利，因此不满⾜继续确认为资产的条件，建议参照⽆偿划转处理，在集团指令的委托经营的⽣效⽇，视同将该资产⽆偿划转给集团， 按该资产的账⾯价值冲减权益。 对于法律上仍保留的所有权，需注意进⾏备查登记。个人理解，供参考。","cat":"固定资产","kw":"固定资产","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0162","q":"请教陈版：关于现⾦流量列报的问题","a":"这个问题⽬前较为普遍。当票据贴现不能终⽌确认时，相应的现⾦流率只能归⼊筹资活动。后续票据到期兑付，相应的短期借款（或其他流动负债）也相应消除，此时是没有现⾦流量的。只能在附注中“不涉及现⾦的重⼤投资与 筹资活动”部分中补充披露。个人理解，供参考。","cat":"报表列报","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0172","q":"营业收⼊扣除","a":"原⽂：与主营业务⽆关的业务收⼊是指与上市公司正常经营业务⽆直接关系，或者虽与正常经营业务相关，但由于其性质特殊、具有偶发性和临时性，影响报表使⽤者对公司持续经营能⼒做出正常判断的各项收⼊。 个⼈理解：此处并未明确规定“处置⼦公司前取得的⼦公司的正常营业收⼊”是否纳⼊扣除范围。应当区分不同情况予以讨论，关键是该⼦公司的处置是否影响到公司的持续经营能⼒。例如，如果被处置的⼦公司构成单独的报告分部（可理解为相当于终⽌经营），则应予以剔除；如果达不到单独报告分部或者终⽌经营标准的，则可以不扣除。个人理解，供参考。","cat":"报表列报","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3735","q":"售后回租交易中支付租金义务何时产生？","a":"主要考虑以租赁期开始日为标志——即取得了主导已识别资产使用的权利。如尚未收到全部价款仅办理抵押手续，可说明尚未产生支付租金义务。实务中的关键时间节点是资产实际移交使用。个人理解，供参考。","cat":"租赁","kw":"租赁,CAS 21,使用权资产,租赁负债,售后回租","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第21号——租赁"},{"id":"3734","q":"未分配利润转增资本的投资者账务处理？","a":"未分配利润转增资本是被投资企业股东权益内部结构的调整，不影响投资者对该项投资的成本或公允价值，投资者无需进行账务处理。这与现金分红不同——现金分红需要确认投资收益。个人理解，供参考。","cat":"实务综合","kw":"实务,会计处理,准则应用,未分配利润,公允价值,投资收益,分红","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则——基本准则"},{"id":"3733","q":"资本公积的性质分类？","a":"资本公积分两部分：资本溢价和权益结算股份支付形成的部分属资本性投入（不能转留存收益）；其他资本公积中除股份支付外的部分更多是过渡性项目，类似其他综合收益，日后最终转入损益。这一分类对理解权益结构很重要。个人理解，供参考。","cat":"实务综合","kw":"实务,会计处理,准则应用,其他综合收益,资本公积,留存收益,股份支付","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则——基本准则"},{"id":"3732","q":"母子公司票据贴现的合并抵销？","a":"合并报表层面基础交易已抵销，体现为获得融资。应将贴现款确认为短期借款，贴现息在贴现日至到期日间分摊确认为利息支出，到期支付视同还本付息。合并层面还原了经济实质——外部融资而非内部交易。个人理解，供参考。","cat":"实务综合","kw":"实务,会计处理,准则应用,合并,子公司","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则——基本准则"},{"id":"3731","q":"基金管理人是否纳入合并范围的判断？","a":"投资决策委员会不就管理人本身的财务经营事项进行决策，判断管理人是纳入合并时不考虑投委会。但判断管理人管理的基金是否纳入合并时，通常需考虑投委会的构成和决策机制。两者是不同的合并范围判断问题。个人理解，供参考。","cat":"实务综合","kw":"实务,会计处理,准则应用,合并","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则——基本准则"},{"id":"3730","q":"以前年度已抵扣进项税转出的处理？","a":"关注是否属于前期差错：如属于前期差错，应相应更正前期报表；不属于前期差错的，作为清算损失处理。实务中需要与税务专业人士沟通确认是否可以留抵退税或结转抵扣。个人理解，供参考。","cat":"实务综合","kw":"实务,会计处理,准则应用,前期差错","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则——基本准则"},{"id":"3729","q":"分公司注销往来挂账如何处理？","a":"总部应先对其他应收款计提坏账准备、确认信用减值损失，再进行坏账核销处理。不宜在注销时一次性将往来差额计入损益——应按照正常的会计程序分步处理。个人理解，供参考。","cat":"实务综合","kw":"实务,会计处理,准则应用,信用减值损失,坏账","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第22号——金融工具确认和计量"},{"id":"CY0074","q":"【求助】请教陈版主关于本期内新增又处置⼦公司现流表的问题","a":"⾸先明确讨论前提：这两次股权受让和转让交易互相独⽴，不构成⼀揽⼦交易。在此前提下：个人理解，供参考。","cat":"实务综合","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3727","q":"小企业会计准则下对赌条款的处理？","a":"小企业会计准则和企业会计制度中均无对赌条款的明确规定。建议在签订融资对赌条款时转换至企业会计准则——因为后续融资和资本运作不可避免，应尽早规范化。对赌条款的会计处理比较复杂，小准则确实力不从心。个人理解，供参考。","cat":"实务综合","kw":"实务,会计处理,准则应用,对赌","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第20号——企业合并"},{"id":"3726","q":"前期差错更正是否影响前期内控审计报告意见类型？","a":"重大前期差错更正表明前期财务报表相关内控存在重大缺陷。如果前期已出具了内控审计报告，应重新出具该期的内控审计报告。这是内控审计准则的明确要求。个人理解，供参考。","cat":"实务综合","kw":"实务,会计处理,准则应用,审计,审计报告,内控,内控审计,前期差错","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则——基本准则、企业内部控制基本规范"},{"id":"3725","q":"公司自行开发ERP能否作为研发项目？","a":"ERP用于内部管理非企业对外销售的产品。小规模IT部门不可能起主导作用，更可能是外购软件安排（形成无形资产）而非研发项目。若公司确实主导开发并满足研发定义，可作为研发活动计入研发费用——但能否加计扣除和认定为高新是另一问题。个人理解，供参考。","cat":"无形资产","kw":"无形资产,CAS 6,研发支出,资本化,摊销","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第6号——无形资产"},{"id":"3724","q":"异地搬迁老厂区固定资产减值后是否继续折旧？","a":"老厂区停产后资产虽已闲置，不符合持有待售条件，计提减值后仍需按减值后的账面价值在剩余使用寿命内计提折旧。除非资产符合持有待售条件或已报废清理。实务中不能因为计提了减值就停止折旧。个人理解，供参考。","cat":"实务综合","kw":"实务,会计处理,准则应用,折旧,账面价值,持有待售","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则——基本准则"},{"id":"CY0076","q":"⾦融负债的核销","a":"不能仅以“已过诉讼时效”为由即认定“⾦融负债对应的现时义务已解除”。已过诉讼时效只是表明债权⼈丧失了就该债权寻求司法救济的权利，即法院不再保障其胜诉权，但对应的实体权利仍在，债权⼈仍可寻求其他救济途径。根据《民法典》第188条，实体权利的有效期是20年。个人理解，供参考。","cat":"实务综合","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0094","q":"请教陈版，贴现未到期还原的商业承兑票据，期末是否需要计提坏账？","a":"贴现未到期还原的商业承兑票据，期末应视同应收账款计提坏账准备。个人理解，供参考。","cat":"实务综合","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3721","q":"认缴制下的债转股如何处理？","a":"母公司对子公司以未实缴出资情况下的往来借款进行债转股，应区分已实缴与未实缴部分的处理。已形成实缴出资义务的借款转增资本更合理，否则可能造成出资不实。实务中需关注是否符合公司法关于出资的规定。个人理解，供参考。","cat":"债务重组","kw":"债务重组,CAS 12,债转股,公允价值,重组损益,子公司,母公司","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第12号——债务重组"},{"id":"3720","q":"法院判决解除租赁合同是债务重组还是租赁变更？","a":"法院判决解除租赁合同属于租赁变更，不是债务重组。应收租金差额应冲减租金收入，而非确认债务重组损益。债务重组准则是针对金融工具债权债务的重新安排，而租赁合同解除属于租赁准则的范畴。个人理解，供参考。","cat":"债务重组","kw":"债务重组,CAS 12,债转股,公允价值,重组损益","src":"财政部 企业会计准则解释公告","std_ref":"企业会计准则第12号——债务重组"},{"id":"3719","q":"迪链现金折扣属于债务重组还是可变对价？","a":"若现金折扣不是原销售合同约定、无使用先例，对已持有的迪链申请贴现属于债务重组。若后续该模式成为常规操作、双方形成了结算预期，可逐步转化为可变对价处理。实务中需要看业务模式是否已经固化。个人理解，供参考。","cat":"债务重组","kw":"债务重组,CAS 12,债转股,公允价值,重组损益","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第12号——债务重组"},{"id":"CY0267","q":"现⾦流量表有关问题","a":"现⾦流量表正表中的发⽣额应以实际发⽣的本企业现⾦及现⾦等价物变动为基础。此类三⽅或更多⽅⾯的互相抹账结算，不涉及现⾦流，所以在现⾦流量表正表中不反映也是正常的。可在附注中对该抹账安排根据债务重组准则的相关要求作出披露。个人理解，供参考。","cat":"债务重组","kw":"债务重组","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3717","q":"债务重组中债务人分批次豁免的确认时点？","a":"同一合同分两批次豁免债务——第一批300万元为无条件豁免，应立即确认债务重组收益。第二批附条件再豁免300万元的，需在条件满足时才能确认债务重组收益，不能在条件满足前提前确认。个人理解，供参考。","cat":"债务重组","kw":"债务重组,CAS 12,债转股,公允价值,重组损益","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第12号——债务重组"},{"id":"3716","q":"处置长期股权投资时的成本结转方法？","a":"会计和税务上均采用加权平均法确定处置股权的成本，不考虑先进先出法。每次取得股权的成本应单独核算，处置时按加权平均单价计算处置成本。实务中如果各批取得价格差异较大，加权平均法可以平滑处置损益。个人理解，供参考。","cat":"长投","kw":"长期股权投资,CAS 2,权益法,成本法,重大影响","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"3715","q":"权益法下认缴未实缴的按认缴比例分红如何处理？","a":"未实缴出资的，权益法核算时仅按实际出资比例享有或承担被投资单位的损益。若章程约定按认缴比例分红，需在符合分红条件时按认缴比例确认投资收益，同时确认应收股利。未实缴部分对应的收益不调整长期股权投资账面价值。个人理解，供参考。","cat":"长投","kw":"长期股权投资,CAS 2,权益法,成本法,重大影响,分红,账面价值,应收股利,投资收益,股利","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"3714","q":"收购后协商减少收购款是否直接调整长投成本？","a":"属于购买日后补充的价格调整，不构成一揽子交易，不直接调整长期股权投资成本。应先对长投进行减值测试计提减值损失。若账面已确认尚未支付的收购款为负债，将该负债转入营业外收入。减值损失金额不应小于营业外收入金额。个人理解，供参考。","cat":"长投","kw":"长期股权投资,CAS 2,权益法,成本法,重大影响,收购,营业外收入,一揽子交易,减值测试","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"3713","q":"非上市公司换股合并的长投初始计量基础？","a":"合并成本应按合并日的股价（增发权益工具的公允价值）计量，不应直接按基准日股价。如果合并日与基准日之间股价发生重大变化，用基准日价格会严重高估或低估合并成本。实务中应获取合并日的交易价格或估值。个人理解，供参考。","cat":"长投","kw":"长期股权投资,CAS 2,权益法,成本法,重大影响,上市公司,合并,公允价值","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"3712","q":"联营企业发生同控合并时投资收益如何处理？","a":"联营企业发生同一控制下企业合并时，投资方在权益法下应按享有联营企业净资产变动的份额确认投资收益。同控合并对联营企业属于权益性交易，投资方对应享有的部分也应作为权益性交易调整资本公积。个人理解，供参考。","cat":"长投","kw":"长期股权投资,CAS 2,权益法,成本法,重大影响,投资收益,合并,联营,资本公积,控制","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"3711","q":"权益法核算下被动稀释与超额亏损的处理顺序？","a":"参考《监管规则适用指引——会计类第3号》之3-2，应先按享有的被投资单位净资产变动份额确认相关投资损益、其他综合收益、资本公积，调整长投账面价值。再按当期应享有净资产变动净额与前期未确认投资净损失孰低的原则，确认前期未确认的投资净损失。未确认的投资净损失可由应享有的其他权益变动份额弥补。个人理解，供参考。","cat":"长投","kw":"长期股权投资,CAS 2,权益法,成本法,重大影响,其他综合收益,稀释,账面价值,资本公积,监管","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"3710","q":"接受股权捐赠如何处理？","a":"需先分析交易的经济实质（是否隐蔽关联方、捐赠目的等）。若捐赠协议约定捐赠前的未分配利润归原股东，表明该部分净资产不在受赠范围内。若接受方可控制被投资企业，合并报表中将归属原股东的权益确认为负债。个人理解，供参考。","cat":"长投","kw":"长期股权投资,CAS 2,权益法,成本法,重大影响,合并,控制,关联方,未分配利润","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"3709","q":"属于权益的永续债在所有者权益变动表如何填列？","a":"归属于永续债持有人的净利润属于'归属于其他权益工具持有者的净利润'，与归属母公司股东净利润和少数股东损益三者并列，三者之和等于合并报表净利润。即使个别报表层面也有必要区分列示。个人理解，供参考。","cat":"报表列报","kw":"报表列报,CAS 30,列报,附注,持续经营,合并,母公司,少数股东","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第30号——财务报表列报、企业会计准则第33号——合并财务报表"},{"id":"CY0175","q":"应交税费列报","a":"并不是将所有与增值税相关的明细科⽬合计起来考虑，是每⼀个明细科⽬的余额分别考虑其余额的重分类。因此可能同时存在借⽅余额的明细科⽬被重分类为资产，⽽另⼀些贷⽅余额的明细科⽬被重分类为负债的情况。 应交税费附注中“增值税”项⽬的余额是期末填列在“应交税费”项⽬中的各个与增值税相关的明细科⽬余额相抵后按净额填列。个人理解，供参考。","cat":"报表列报","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3707","q":"固定资产清理期末能否有余额？","a":"'固定资产清理'期末可以有余额，在资产负债表中单列该项目。若企业报表格式无此项目，可自行添加，或余额较小时并入'固定资产'项目列示。实务中只要存在已转入清理但尚未完成处置的资产，就应有余额。个人理解，供参考。","cat":"报表列报","kw":"报表列报,CAS 30,列报,附注,持续经营","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第30号——财务报表列报"},{"id":"3706","q":"应收账款不同项目的应收款和预收款能否抵销列报？","a":"不同项目的应收账款和合同负债不应抵销列报，应按项目分别列示应收账款和合同负债，分别计提坏账准备（除非合同明确约定违约时可相互抵销）。应收账款账龄应按项目分别测算，避免抵销后账龄列报不合理。个人理解，供参考。","cat":"报表列报","kw":"报表列报,CAS 30,列报,附注,持续经营,合同负债,坏账","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第30号——财务报表列报、企业会计准则第22号——金融工具确认和计量"},{"id":"3705","q":"现金流净额列示条件是否需要三个条件同时满足？","a":"三个条件需同时满足才可按净额列报。'周转快、期限短'可参考企业正常营业周期判断——若资金代收代付间隔短、企业无法投入自身资金周转，符合净额列报标准。'金额大'指按总额列报会严重扭曲现金流量结构。该判断原则目前仍适用。个人理解，供参考。","cat":"报表列报","kw":"报表列报,CAS 30,列报,附注,持续经营","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第30号——财务报表列报"},{"id":"CY0180","q":"关于定存及其利息的计提和列报问题","a":"你的理解有⼀定合理性，但要注意区分资产的流动性。对于预计持有期限超过⼀年且剩余存款期限超过⼀年的项⽬ （即使是不可交易的），属于⾮流动资产，不应列报为货币资⾦，⽽应当列报为其他⾮流动资产。 关于期末利息的计提，确保收⼊对应的经济利益能够流⼊企业是任何收⼊确认均应满⾜的要求。对于不可交易的定期存款⽽⾔，如果提前⽀取会损失利息，且⽆法证明企业具有持有⾄到期的明确意图和财务能⼒，则在持有期间不应对其计提利息，或者⾄少不应按存单票⾯的定期利率对其计提利息。 提问⼈：V-MAN 时间：2024-04-01 16:32:06 陈版，那如果是担保期限超过1年的，定期存款和其他应收款是不是也应该重分类到其他⾮流动资产？ 回答⼈：chenyiwei 可以这样理解。个人理解，供参考。","cat":"报表列报","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3703","q":"现金流量表附表固定资产折旧如何填列？","a":"根据本期计提折旧金额填列，不是期末余额减期初余额。需剔除资本化计入其他长期资产成本的折旧额（如计入在建工程的折旧）。无形资产摊销、长期待摊费用摊销、使用权资产折旧同理。实务中梳理附表项目时应与总账的本期计提数核对一致。个人理解，供参考。","cat":"报表列报","kw":"报表列报,CAS 30,列报,附注,持续经营,折旧,摊销,资本化","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第30号——财务报表列报、企业会计准则第17号——借款费用"},{"id":"3702","q":"员工激励奖金（4年期与累计EBIT挂钩）如何处理？","a":"该安排属于'其他长期职工福利'。因期限较短、最终发放金额仅受业绩影响，可简化为按考核期业绩预测确定计提数，在服务期内分摊。属于长期激励计划，需考虑折现影响——若折现影响不重大可简化处理。个人理解，供参考。","cat":"职工薪酬","kw":"职工薪酬,CAS 9,辞退福利,离职后福利,设定受益计划","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第9号——职工薪酬"},{"id":"CY0327","q":"股份⽀付确认","a":"《监管规则适⽤指引——会计类第3号》之3-9实际上是对股份⽀付会计准则的补充。主要强调两点：1、如果在任 何情况下激励对象都不能享有企业权益⼯具公允价值变动的相关收益和风险，则不属于股份⽀付，适⽤其他会计准则（如职⼯薪酬准则）；2、在总体上适⽤股份⽀付准则的情况下，对于因未满⾜可⾏权条件⽽导致未被授予的权 益⼯具，如果相应的激励对象也仍从中获取了经济利益（如回购价格⾼于原授予价格的差额），则该部分经济利益虽然不适⽤股份⽀付准则，但应适⽤其他相关会计准则（如股份⽀付准则）。 因此，在主帖案例中，正确的理解应当是“仅针对离职⼈员，将此前确认的股份⽀付冲减，再按照回售收益确认为职⼯薪酬费⽤”。但需注意：在实际操作中，应针对预期⽆法解锁的相关激励股份，在等待期内逐期确认职⼯薪酬费⽤，针对离职率的估计应当与计量股份⽀付费⽤时的离职率估计保持⼀致。⽽不是在实际回购时才确认。个人理解，供参考。","cat":"职工薪酬","kw":"公允价值","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0628","q":"请教陈版主，离职员⼯股份⽀付费⽤是否应持续计量⾄员⼯离职时点","a":"在激励对象离职当年，因为未满⾜服务期限条件，最终可⾏权的权益⼯具数量为零，即累计应确认的股份⽀付费⽤总额为零，所以在离职当年⽆需确认新的股份⽀付费⽤，还要将前期已确认的与该激励对象相关的股份⽀付费⽤在离职当年度冲回，冲减离职当年度的相关成本费⽤项⽬。 因此，主帖中计算⽅法⼀、三应组合使⽤才能达到正确效果。提问⼈：ZXCGHGT 时间：2024-08-12 11:25:09 陈版，如果员⼯满⾜服务期限条件，只是到期后员⼯不打算⾏权，这个是否也是冲销掉以前年度确认的费⽤？谢谢回答⼈：chenyiwei 这种情况，服务期限条件和⾮市场业绩条件均已满⾜，故不能冲回已确认的费⽤。个人理解，供参考。","cat":"职工薪酬","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3699","q":"通用软件的成本结转年限？","a":"300万元开发支出全部资本化前提下，产品生命周期3年，一般按3年摊销，即每年摊销100万元无形资产到营业成本。摊销年限应反映该软件预期带来经济利益的期间。若产品生命周期可能更短，应相应缩短摊销年限。个人理解，供参考。","cat":"无形资产","kw":"无形资产,CAS 6,研发支出,资本化,摊销","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第6号——无形资产、企业会计准则第17号——借款费用"},{"id":"3698","q":"财政部2025年无形资产准则实施问答的核心要点？","a":"已费用化的研发样机支出不得在以后期间销售时冲回转入存货或营业成本。关于国有研发样机出售是否需要进场交易：关键看样机用途——与正常商品一样用于出售的无需招投标；用于自用、展示的则需要。这体现了'一惯性'原则。个人理解，供参考。","cat":"无形资产","kw":"无形资产,CAS 6,研发支出,资本化,摊销,准则实施问答,费用化","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第6号——无形资产"},{"id":"3697","q":"合作研发模式下子公司研发支出的处理？","a":"若母公司可主导研发成果整体商业化，子公司相当于为母公司提供研发外包服务。子公司应将研发支出通过'合同履约成本'归集转入营业成本，确认营业收入的同时确认一项收益分享权资产。子公司个别报表中不能确认研发支出——研发支出应在母公司报表层面确认。个人理解，供参考。","cat":"无形资产","kw":"无形资产,CAS 6,研发支出,资本化,摊销,子公司,母公司","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第6号——无形资产"},{"id":"CY0050","q":"求助陈版主，研发费⽤资本化过程中⽆法合理分摊到项⽬上的折旧如何处理","a":"也可以这样理解。在⽬前的实务中，针对研发费⽤的确认和计量，开发⽀出资本化、研发投⼊认定等问题，都有必要尽可能保持谨慎。个人理解，供参考。","cat":"无形资产","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3695","q":"研发样件成本能否按预计售价确认入库冲减研发费用？","a":"不可以。应遵循《监管规则适用指引——会计类第3号》3-11，以正常设计生产能力下的必要合理支出为基础确认存货成本。转出金额不能超出累计资本化的开发支出总额。这一规定旨在防止企业通过将研发支出转入存货来虚增利润。个人理解，供参考。","cat":"无形资产","kw":"无形资产,CAS 6,研发支出,资本化,摊销,监管","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第6号——无形资产、企业会计准则第17号——借款费用"},{"id":"CY0174","q":"政府补助","a":"⾸先，“企业将与设备相关的部分确认为与资产相关的补助、⾮设备部分确认为与收益相关的补助”该做法是否合 理？应该是根据对应的作为补助对象的研发⽀出是资本化⽀出还是费⽤化⽀出来判断，⽽不是根据补助对象是设备还是材料、⼈⼯来判断。 在合理划分与收益相关的政府补助和与资产相关的政府补助的基础上（其划分标准是对应于费⽤化⽀出还是资本化 ⽀出），与收益相关的政府补助在对应的费⽤化⽀出发⽣时，采⽤系统、合理的⽅式从递延收益转⼊其他收益（前提是能够合理确信最终可以通过政府组织的验收）；与资本化⽀出相关的补助继续保留在递延收益中，按照新的⾮专利技术摊销年限分期确认其他收益。 提问⼈：zgkjsy1975 时间：2024-07-11 16:10:53 某煤矿企业收到政府补助资⾦500万元，要求⽤于煤矿安全改造项⽬，因属于安全改造项⽬，企业想通过专项储备 ⼀次性结转累计折旧，是否可以将收到的政府补助资⾦500万元⼀次性在当期确认其他收益？ 回答⼈：chenyiwei 由于专项储备是在计提时才影响损益的，⼀般情况下此处直接结转累计折旧的专项储备是在以前年度已经计提的， 故可以认为是对以前年度专项储备计提⾦额的补助，故可以接受在收到补助款时⼀次性计⼊其他收益。个人理解，供参考。","cat":"政府补助","kw":"递延","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3693","q":"政府补助是否与日常活动相关的判断？","a":"三项补助（招商经费、科技企业孵化器补助、科技计划课题补助）均属于与日常活动相关的政府补助，计入'其他收益'。判断依据是：补助所补偿的成本费用属于营业利润构成项目，或与日常经营行为密切相关。与日常活动无关的政府补助才计入营业外收入。个人理解，供参考。","cat":"政府补助","kw":"政府补助,CAS 16,递延收益,总额法,净额法,营业外收入,其他收益","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第16号——政府补助"},{"id":"3692","q":"与资产相关政府补助分期纳税是否需要审计调整？","a":"理论上需按税法规定的一次性纳税要求进行纳税调整。若被审计单位坚持不调整，可从影响大小（定性+定量）、当地是否有此类税务处理惯例等因素综合判断能否接受其现有处理。审计调整的金额如不重大，可接受不调整。个人理解，供参考。","cat":"政府补助","kw":"政府补助,CAS 16,递延收益,总额法,净额法,审计","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第16号——政府补助"},{"id":"3691","q":"PPP项目中的政府拨付资金是否为政府补助？","a":"PPP项目中政府和企业是平等的商事主体。政府补助是政府以公共事务管理者身份无偿授予的资源，同一交易中不应同时兼具两种身份。该款项的实质可能是政府代付工程款，结算企业对政府的应收款或无形资产，不属于政府补助。个人理解，供参考。","cat":"政府补助","kw":"政府补助,CAS 16,递延收益,总额法,净额法,PPP","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第16号——政府补助、企业会计准则第14号——收入"},{"id":"3690","q":"员工股权激励中员工承担股价下跌风险如何处理？","a":"不涉及单独确认衍生工具。基于谨慎原则，等待期内回购义务相关负债的账面价值保持原授予价格不变。若最终回购价低于授予价（员工承担了下跌损失），差额在实际回购时转入资本公积。这体现了对员工在企业服务中获得激励的实质判断。个人理解，供参考。","cat":"股份支付","kw":"股份支付,CAS 11,权益结算,现金结算,等待期,股权激励,账面价值,资本公积,衍生工具","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第11号——股份支付"},{"id":"3689","q":"股份支付与利润分享计划的核心区别？","a":"核心区别是激励对象能否通过正常退出途径享有或承担激励股权的公允价值变动收益或损失。若退出价格按原始出资加利息确定，员工无法享有股权增值收益，这属于利润分享计划而非股份支付。非上市公司股权公允价值难以确定的，可暂不按股份支付处理。个人理解，供参考。","cat":"股份支付","kw":"股份支付,CAS 11,权益结算,现金结算,等待期,公允价值,上市公司","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第11号——股份支付"},{"id":"3688","q":"撤材料后股份支付的摊销期限是否需要调整？","a":"按新的IPO计划修改剩余摊销期限。若预计近期IPO无成功希望，可将前期已确认的股份支付费用冲回。再次提交申报时重新估计等待期。实务中这是IPO审慎处理股份支付的重要方面，关键是对IPO成功可能性的重新评估。个人理解，供参考。","cat":"股份支付","kw":"股份支付,CAS 11,权益结算,现金结算,等待期,摊销","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第11号——股份支付"},{"id":"3687","q":"员工持股计划中公司回购股份如何处理？","a":"员工持股计划由公司控制，应纳入合并报表范围。合并层面处理参照《企业会计准则解释第7号》第五条限售股回购义务的处理。未解锁份额收回不必然确认回购义务，需判断是否存在等待期。实务中关键是判断员工是否实质性享有了股权激励。个人理解，供参考。","cat":"股份支付","kw":"股份支付,CAS 11,权益结算,现金结算,等待期,合并,控制,股权激励","src":"财政部 企业会计准则解释公告","std_ref":"企业会计准则第11号——股份支付"},{"id":"3686","q":"股份支付二次授予能否冲销前次费用？","a":"第二次转让与前次转给实控人（无等待期）的股份支付交易无直接关系，不能冲销之前已确认的股份支付费用。第二次股份支付费用总额=第二次授予日公允价值-授予价格。两次股份支付应各自独立确认费用。个人理解，供参考。","cat":"股份支付","kw":"股份支付,CAS 11,权益结算,现金结算,等待期,公允价值","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第11号——股份支付"},{"id":"3685","q":"实际控制人回购离职员工股权激励份额是否构成股份支付？","a":"股份最初来源为发行人向持股平台定向增发的，实际控制人收回股份后若无再次授予计划，构成新的股权激励，需要确认股份支付费用。实务中这是IPO审核的常见关注点，需关注实控人收回股份的价格与公允价值的关系。个人理解，供参考。","cat":"股份支付","kw":"股份支付,CAS 11,权益结算,现金结算,等待期,控制,股权激励,公允价值","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第11号——股份支付"},{"id":"3684","q":"递延所得税资产确认是否需要以未来有足够应纳税所得额为前提？","a":"需要区分情况。一般可抵扣暂时性差异和可抵扣亏损，确认递延所得税资产需以很可能获得足够的未来应纳税所得额为限。但交易性金融资产公允价值变动相关的递延所得税负债，不需要以此为前提——因为其转回是确定的（出售或到期时）。个人理解，供参考。","cat":"所得税","kw":"所得税,CAS 18,递延所得税,应纳税所得额,暂时性差异,递延所得税资产,递延所得税负债,公允价值","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第18号——所得税"},{"id":"3683","q":"化工生产线关停后如何确认递延所得税资产？","a":"若此前全额转入营业外支出属于前期差错，先更正。更正后资产账面价值为零，计税基础为原值，产生可抵扣暂时性差异。在预计可预见未来有足够应纳税所得额的前提下，确认递延所得税资产。已收到的预收款账面价值与计税基础相同，不涉及递延税影响。个人理解，供参考。","cat":"所得税","kw":"所得税,CAS 18,递延所得税,应纳税所得额,暂时性差异,递延所得税资产,账面价值,前期差错","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第18号——所得税"},{"id":"CY0029","q":"递延所得税资产与递延所得税负债","a":"递延所得税负债仍需确认。因为递延所得税负债（除了与对⼦公司、合营企业和联营企业的长期股权投资相关的以外）的确认不考虑未来转回的可能性，也不考虑未来有⽆⾜够的应纳税所得额。 在已确认递延所得税负债的基础上，可在已确认的递延所得税负债的限度内确认与可抵扣亏损相关的递延所得税资产。个人理解，供参考。","cat":"所得税","kw":"所得税,递延","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0035","q":"【求助陈版】递延所得税资产、负债是否属于货币性项⽬","a":"递延所得税资产和负债本⾝并不导致确定⾦额的未来流⼊或流出，⽽是根据资产、负债项⽬的账⾯价值和计税基础之间的暂时性差异⾦额计算的，因此不属于需在期末调整汇兑损益的“外币货币性项⽬”。其⾦额的变动按规定调 整“所得税费⽤——递延所得税费⽤”或“其他综合收益”等相关科⽬。个人理解，供参考。","cat":"所得税","kw":"所得税,递延","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3680","q":"使用权资产与租赁负债初始确认差异的递延所得税如何处理？","a":"使用权资产≠租赁负债不等于满足初始确认豁免条件。应就两者初始计量金额中孰低者确认等额的递延所得税资产和负债。根据解释第16号，即使预计未来应纳税所得额为负，也应在已确认的递延所得税负债限度内确认与租赁负债相关的递延所得税资产。个人理解，供参考。","cat":"所得税","kw":"所得税,CAS 18,递延所得税,应纳税所得额,暂时性差异,递延所得税资产,递延所得税负债","src":"财政部 企业会计准则解释公告","std_ref":"企业会计准则第18号——所得税"},{"id":"3679","q":"工艺升级后原已资本化的研发支出如何处理？","a":"工艺升级改造需重新进行临床前研究，表明原有资本化金额已不再符合资产确认条件。建议全额计提减值，计入资产减值损失，不应将前期资本化支出转入研发费用。因为这是资产价值的减损，不是费用的当期发生。个人理解，供参考。","cat":"资产减值","kw":"资产减值,CAS 8,可收回金额,减值测试,资产组,资产减值损失,资本化","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第8号——资产减值、企业会计准则第17号——借款费用"},{"id":"CY0137","q":"请教陈版，异地搬迁⽼⼚区停产后不可利旧固定资产和⽆形资产问题","a":"基于此情形， B分公司⽼⼚区在2024年全⾯停产后即成为闲置资产，也不符合确认为持有待售资产的条件。因此， 在计提减值后，仍需依据计提减值后的账⾯价值计提折旧或摊销。 同时，建议关注减值计提时的可收回⾦额测算依据，是否考虑了当地⼟地出让市场低迷，在可预见的未来⽆法实现收储或开发这⼀事实的影响。个人理解，供参考。","cat":"资产减值","kw":"减值,持有待售,固定资产","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3677","q":"存货跌价准备与应收款项坏账准备计提的区别？","a":"存货跌价本质上是对已发生损失的确认，即使按组合（如库龄）计提，所计提的跌价准备也可以对应到特定的单项存货——这是与应收款项组合计提坏账准备的重大区别。应收款项按组合计提时并不要求能追溯至特定债务人的信用损失。个人理解，供参考。","cat":"资产减值","kw":"资产减值,CAS 8,可收回金额,减值测试,资产组,坏账,信用损失,追溯","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第8号——资产减值、企业会计准则第22号——金融工具确认和计量"},{"id":"3676","q":"老厂区停产后不可利旧的固定资产和无形资产如何处理？","a":"老厂区全面停产后成为闲置资产，不符合持有待售资产条件，计提减值后仍需按减值后的账面价值计提折旧或摊销。减值测试时需考虑土地市场状况、可预见未来收储或开发的可能性，合理判断可收回金额。实务中对停产厂区的资产减值测试需关注当地工业用地市场的实际状况。个人理解，供参考。","cat":"资产减值","kw":"资产减值,CAS 8,可收回金额,减值测试,资产组,账面价值,摊销,折旧,持有待售","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第8号——资产减值"},{"id":"3675","q":"已资本化研发项目研发失败后的如何处理？","a":"进入资本化阶段后研发失败或终止的，应先将截至失败前的所有研发支出确认为'研发支出——资本化支出'，再对该资本化支出计提减值准备，不应直接转入研发费用。计提减值后，若公司作出彻底停止研发项目的决策，可按公司资产减值核销制度核销相关资产和减值准备。个人理解，供参考。","cat":"资产减值","kw":"资产减值,CAS 8,可收回金额,减值测试,资产组,资本化","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第8号——资产减值、企业会计准则第17号——借款费用"},{"id":"3674","q":"账龄1年以内占99%以上如何计算预期信用损失率？","a":"实务中一般沿用原准则下的固定比例计提坏账准备，确保新准则下计提水平不低于原准则。也可细化账龄分段（如0-3个月、3-6个月等）计算迁徙率，前提是基础数据和内控能持续提供稳定可靠的数据。不宜机械套用公式而不考虑业务实际。个人理解，供参考。","cat":"资产减值","kw":"资产减值,CAS 8,可收回金额,减值测试,资产组,预期信用损失,信用损失,内控,坏账,迁徙率","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第8号——资产减值、企业会计准则第22号——金融工具确认和计量"},{"id":"3673","q":"商誉减值测试中品牌、技术与商誉的测试顺序？","a":"根据企业会计准则第8号——资产减值第二十五条规定，应'先对不包含商誉的资产组进行减值测试，再对包含商誉的资产组进行测试'。先做品牌和技术减值测试，据此调整资产组账面金额，再确定商誉减值金额（先抵减商誉，再分摊给其他资产）。实务中这一顺序不可颠倒。个人理解，供参考。","cat":"资产减值","kw":"资产减值,CAS 8,可收回金额,减值测试,资产组,商誉","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第8号——资产减值"},{"id":"3672","q":"应收账款保理费用是否属于非经常性损益？","a":"若被保理的应收账款为正常经营活动产生，且保理融资是常规操作，保理费用属于正常融资费用，在未来会重复发生，不属于非经常性损益。实务中关键是看是否属于企业常规的资金管理方式。个人理解，供参考。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,非经常性损益,经常性损益","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"3671","q":"其他权益工具投资是否需要计提减值？","a":"其他权益工具投资的公允价值变动不影响损益，因此不需要确认计入损益的减值损失。公允价值变动直接体现为其他综合收益的变动，公允价值下降本身就反映了价值减损。IASB认为对FVOCI权益工具另外计提减值会造成重复计算。个人理解，供参考。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,其他综合收益","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"3670","q":"不良资产包的会计处理？","a":"不良资产包因债务人信用问题，原合同条款对估计未来现金流量意义不大，一般分类为以公允价值计量且其变动计入当期损益的金融资产，列报为交易性金融资产或其他非流动资产。实际收到款项时冲抵金融资产账面价值，期末评估剩余可收回金额确认公允价值变动损益。个人理解，供参考。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,公允价值变动损益,账面价值","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"3669","q":"内资股份公允价值如何确定？","a":"港股价格不能直接作为内资股份的公允价值（香港联交所并非主要市场）。可以港股价格为基础，考虑两地流通性差异、转让限制等因素，采用恰当的估值技术合理估计。实务中常用流动性折扣（DLOM）调整。个人理解，供参考。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"3668","q":"可转债实际利率确定后能否调整？","a":"可转债负债部分属于以摊余成本计量的金融负债，实际利率确定后后续不再调整。摊余成本计量的结果不等于当前公允价值——这是摊余成本法的固有特征。即使市场利率发生大幅变化，也不应调整实际利率来反映市场变化。个人理解，供参考。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报、企业会计准则第2号——长期股权投资"},{"id":"3667","q":"处置FVOCI的所得税如何处理？","a":"处置其他权益工具投资（FVOCI）时，累计的公允价值变动由其他综合收益直接转入留存收益，不经过损益。对应的递延所得税也直接调整留存收益，不经过所得税费用。处置时的当期所得税费用需根据转让收益计算。这是准则对FVOCI权益工具的特殊规定。个人理解，供参考。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,其他综合收益,所得税,留存收益","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报、企业会计准则第18号——所得税"},{"id":"3666","q":"云信、建信融通等电子债权凭证如何列报？","a":"目前仍参照财会[2021]32号规定处理：云信、建信融通等不属于《票据法》规范的票据，不在'应收票据'项目列示，通常列报为应收款项融资或应收账款。实务中此类电子债权凭证越来越普遍，但准则层面尚无专门规定。个人理解，供参考。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"CY1182","q":"关于掉期业务的处理问题","a":"如果企业的记账本位币是⼈⺠币，则该交易⽆法起到锁定美元汇率从⽽规避外汇⻛险的效果，其实质是以700万美元作为质押，从银⾏取得700*7.2433=5070.31万元⼈⺠币，⼀年后归还该 5070.31万元⼈⺠币，该笔借款名义上是没有利息的，但个⼈理解这应当是基于本公司与银⾏之间的⻓期业务合作关系，银⾏给予的让利。 因此，建议直接按照外币质押⼈⺠币借款进⾏会计处理。作为质押品的700万美元转⼊其他应收款（期末需按现⾏即期汇率进⾏汇率调整并确认汇兑损益），取得5070.31万元⼈⺠币作为借款本⾦贷记短期借款.银⾏预先⽀付的该业务收益160万元可以看作美元存款的利息收⼊，在其存续期内分摊确认。 建议进⼀步了解该业务的经济实质，以及银⾏在该业务中靠什么盈利，以便进⼀步分析。个人理解，供参考。","cat":"金融工具","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY1292","q":"远期外汇合约会计处理咨询","a":"由于没有明确的被套期项⽬，因此不能使⽤套期会计⽅法，直接将该项远期合约作为以公允价值计量且其变动计⼊损益的⾦融资产或⾦融负债处理。资产负债表上列报为交易性⾦融资产或者交易性⾦融负债。个人理解，供参考。","cat":"金融工具","kw":"公允价值","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3663","q":"协定存款的性质认定及列报？","a":"定期存款纳入存款监管、银行保证本金安全，与理财产品有本质区别，属于存款。函证时应包含被划走的协定存款+50万流动资金。列报上：未划走部分列报货币资金，划走部分列报交易性金融资产。实务中需依据具体的存款协议条款判断是否无条件随时支取。个人理解，供参考。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,监管","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"3662","q":"买方票据贴现属于融资还是应付账款继续列报？","a":"需根据CAS 22金融负债终止确认规定分析商业实质。属于企业自身融资行为：融资方为银行或金融机构的列报'短期借款'（筹资活动现金流），融资方为非金融机构的列报'其他流动负债'。不属于自身融资行为则继续列报'应付账款'（经营活动现金流）。实务中常见争议在于供应商融资安排的终止确认。个人理解，供参考。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,终止确认","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"3661","q":"大股东兜底式员工持股计划是否构成股份支付？","a":"大股东向员工授予卖出期权（兜底承诺），对上市公司而言属权益结算股份支付。费用应在等待期内确认，计量基础为卖出期权在授予日的公允价值。这个问题需要从两个层面来看：上市公司受益于大股东的安排获得了员工服务，故构成股份支付；大股东自身的期权授予不影响上市公司报表。个人理解，供参考。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,股份支付,上市公司,期权","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"3660","q":"直租模式下的融资租赁vs经营租赁判断？","a":"需要对合同条款进行综合分析：若租赁期占资产使用寿命的绝大部分、租赁付款额现值相当于资产公允价值的绝大部分、资产具有专用性等，通常应分类为融资租赁。对于数据中心租电模式，需判断是否将土地使用、房屋租赁、电力供应打包为一揽子服务。个人理解，供参考。","cat":"租赁","kw":"租赁,CAS 21,使用权资产,租赁负债,经营租赁,融资租赁,公允价值","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第21号——租赁"},{"id":"CY0128","q":"⼀年内到期的融资租赁保证⾦在报表什么项⽬⾥列报","a":"这类保证⾦⼀般是⼀年内到期的长期应收款，列报为⼀年内到期的⾮流动资产。个人理解，供参考。","cat":"租赁","kw":"租赁","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3658","q":"售后回租中资产转让是否构成销售的判断关键？","a":"核心取决于运营期内标的资产使用由谁主导和控制——包括对外销售服务的价格条款、营销策略是否由本企业确定，风险盈亏由谁享有承担，租赁费用与运营期费用如何确定及是否关联等。如果企业实质上仍控制资产的使用，未转移控制权，则资产转让不构成销售。个人理解，供参考。","cat":"租赁","kw":"租赁,CAS 21,使用权资产,租赁负债,售后回租,控制","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第21号——租赁"},{"id":"3657","q":"无产权车位：应确认为无形资产还是使用权资产？","a":"使用权资产的确认前提是存在租赁，依据'租赁三要素'（特定已识别资产、特定租赁期限、对资产使用的控制权），人防车位使用权满足上述三要素，确认为使用权资产合理。不能因为无法取得产权证就将其排除在租赁准则之外。个人理解，供参考。","cat":"租赁","kw":"租赁,CAS 21,使用权资产,租赁负债,控制","src":"深圳证券交易所 会计监管动态","std_ref":"企业会计准则第21号——租赁"},{"id":"3656","q":"长期租赁未约定具体付款时间的如何处理？","a":"相当于承接了一笔贷款人可随时要求偿还的负债，此时实际利率为零。应按不折现的租金总额确认使用权资产和租赁负债，租赁负债无对应的利息支出。实务中这种情况较少见，若有明确的付款计划或惯例，应按实际利率法处理。个人理解，供参考。","cat":"租赁","kw":"租赁,CAS 21,使用权资产,租赁负债","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第21号——租赁"},{"id":"CY0135","q":"求助⼀下关于融资租赁的问题","a":"该事项属于“售后租回交易中的资产转让不属于销售”的情形，应按新租赁准则第五⼗⼆条规定处理，即视为以该汽车为抵押获取融资，B公司⽀付的款项视为为本企业提供的融资，确认为长期应付款。 该项交易的会计处理不使⽤“使⽤权资产”和“租赁负债”科⽬。个人理解，供参考。","cat":"租赁","kw":"租赁","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3654","q":"售后租回的现金流量如何列报？","a":"以所购车辆为抵押获取融资的，后续还款相当于还本付息，现金流量性质为筹资活动（支付其他与筹资活动有关的现金）。实务中需注意区分：真正的经营性售后回租的租金支付属于经营活动；以融资为目的的售后回租属于筹资活动。关键看资产转让是否构成销售。个人理解，供参考。","cat":"租赁","kw":"租赁,CAS 21,使用权资产,租赁负债,售后回租","src":"深圳证券交易所 会计监管动态","std_ref":"企业会计准则第21号——租赁"},{"id":"3653","q":"融资租赁购车业务如何处理？","a":"经济实质是以车辆为抵押获取融资，参照租赁准则第五十二条'售后租回资产转让不属于销售'处理。不确认使用权资产和租赁负债，支付给出租方的款项形成长期应付款，后续还款相当于还本付息。实务中汽车融资租赁大多属于此模式。个人理解，供参考。","cat":"租赁","kw":"租赁,CAS 21,使用权资产,租赁负债,融资租赁","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第21号——租赁"},{"id":"CY0136","q":"【求助陈版主】关于16号解释确认使⽤权资产相关递延问题","a":"参照《监管规则适⽤指引——会计类第4号》之“4-8 关于租赁负债相关递延所得税资产的确认”： 公司在确认递延所得税资产时，应当考虑公司当前应纳税暂时性差异在未来期间转回时将产⽣的可⽤来抵扣可抵扣暂时性差异的所得税影响。对于租赁交易，即使预计未来期间公司根据相关税法规定确定的应纳税所得额整体为负数，公司应当考虑预计未来期间转回的使⽤权资产等所产⽣的应纳税暂时性差异，确认与租赁负债相关的可抵扣暂时性差异产⽣的递延所得税资产。 据此，在确认了与使⽤权资产相关的递延所得税负债后，如果预计该企业可预见的未来应纳税所得额仍将持续为负数的，则应在已确认的递延所得税负债的限度内确认与可抵扣亏损相关的递延所得税资产，后续与递延所得税负债同步转回。如果可抵扣亏损⼩于与使⽤权资产相关的应纳税暂时性差异⾦额的，则超出部分的递延所得税资产确认额度在各项可抵扣暂时性差异（如资产减值准备、租赁负债）之间，按照“转回时间早的优先、转回不确定性⼩的 优先”的原则进⾏分配。个人理解，供参考。","cat":"租赁","kw":"减值,租赁,所得税,递延","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0150","q":"新15号编报规则下应收账款坏账准备","a":"15号编报规则是披露规则，并不规范确认或计量⽅⾯的问题。 在CAS 22（2017）下，实务中对于属于流动资产的应收账款和应收租赁款，基本不会使⽤三阶段模型测算坏账准备。附注模板中的应收账款三阶段模型的相关披露应当只是在少数情况下备⽤的，⼀般不会⽤到。个人理解，供参考。","cat":"租赁","kw":"租赁","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3650","q":"同一控制下吸收合并的长投及商誉如何处理？","a":"B公司按同一控制下吸收合并原则处理：被合并方资产、负债按在母公司合并报表中的账面价值入账。母公司合并报表中原有的商誉原值减减值准备后的金额，B公司个别报表无需体现商誉减值损失。吸收合并后原合并层面的商誉下沉到存续公司个别报表。个人理解，供参考。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,合并,控制,商誉,账面价值,母公司","src":"深圳证券交易所 会计监管动态","std_ref":"企业会计准则第20号——企业合并"},{"id":"3649","q":"吸收合并中未实现内部交易损益如何处理？","a":"母公司吸收合并子公司不影响合并报表层面资产、负债的计量基础，内部交易未实现损益在合并报表层面仍未实现。个别报表层面则需区分顺流交易和逆流交易分别讨论。顺流交易：母公司账面的未实现利润在合并层面予以抵销；逆流交易：子公司账面的未实现利润在合并层面调整存货。个人理解，供参考。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,合并,子公司,母公司","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第20号——企业合并"},{"id":"3648","q":"子公司将孙公司股权无偿划转给母公司的合并处理？","a":"同一控制下无偿划转，差额计入资本公积。合并报表层面需还原原有未分配利润，保持合并报表未分配利润不变。实质上是集团内部权益架构调整，不影响合并报表的资产、负债总额。个别报表中划出方冲减权益、划入方按账面价值入账。个人理解，供参考。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,合并,子公司,母公司,账面价值,资本公积,控制,未分配利润","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第20号——企业合并"},{"id":"3647","q":"母公司收购少数股东股权——少数股东未实缴如何处理？","a":"少数股东未实缴出资的，母公司收购其股权时需考虑：若少数股东从未实缴，其享有的权益份额可能为零。收购价格与享有净资产份额的差额按权益性交易原则处理，调整资本公积。若收购价格明显高于享有份额，需关注是否存在隐蔽的利益输送或薪酬安排。个人理解，供参考。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,收购,母公司,少数股东,资本公积","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第20号——企业合并、企业会计准则第33号——合并财务报表"},{"id":"3646","q":"国有收购少数股东股权如何处理？","a":"国有企业按同期银行贷款利率4倍收购自然人股东股权，应计入长期股权投资成本，而非作为改革改制费用计入管理费用。收购少数股权属于权益性交易，收购价格与享有份额的差额调整资本公积。这是购买少数股权的标准处理，不应费用化。个人理解，供参考。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,收购,少数股东,资本公积,费用化","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第20号——企业合并、企业会计准则第33号——合并财务报表"},{"id":"CY0064","q":"同⼀控制下⽆偿划转⼦公司合并报表处理","a":"“A集团的全资⼦公司B将其全资⼦公司C划转给母公司A集团”，即C公司仍然是全年纳⼊A集团合并报表范围的。所以C公司产⽣的利润在A的合并报表中正常体现在留存收益中，不影响合并报表中的资本公积。 请注意：该事项对A⽽⾔不改变合并报表范围，因此不是企业合并。个人理解，供参考。","cat":"企业合并","kw":"合并","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3644","q":"母公司处置唯一子公司后次年半年报如何披露？","a":"2025年半年报报告期内已无子公司，不需编制合并报表。对前期比较数据，建议同时披露2024年上半年度的单体和合并利润表作为前期比较数据。实务中，报告期内处置全部子公司导致不再有子公司的，中期报告和年度报告均无需编制合并报表。个人理解，供参考。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,子公司,母公司,合并","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第20号——企业合并"},{"id":"3643","q":"非同一控制下合并并表日被收购方其他综合收益怎么处理？","a":"收购日被收购方的其他综合收益在购买日合并报表中全部清零——即视同购买日重新开始计量。各类其他综合收益（重新计量设定受益计划、其他债权投资公允价值变动、现金流量套期、境外经营折算差额等）在购买日均不结转至损益，直接冲减被购买方期初留存收益。这是购买法的基本要求。个人理解，供参考。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,其他综合收益,设定受益计划,合并,收购,控制,公允价值,留存收益,套期","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0073","q":"求助陈版主关于同⼀控制下的合并⽇确定！！！","a":"根据《企业会计准则解释第6号》第⼆条规定： ⼆、根据《企业会计准则第20号——企业合并》，在同⼀控制下的企业合并中，合并⽅在企业合并中取得的资产和负债，应当按照合并⽇在被合并⽅的账⾯价值计量。在被合并⽅是最终控制⽅以前年度从第三⽅收购来的情况 下，合并⽅在编制财务报表时，应如何确定被合并⽅资产、负债的账⾯价值？ 答：同⼀控制下的企业合并，是指参与合并的企业在合并前后均受同⼀⽅或相同的多⽅最终控制，且该控制不是暂时性的。从最终控制⽅的⾓度看，其在合并前后实际控制的经济资源并没有发⽣变化，因此有关交易事项不应视为购买。合并⽅编制财务报表时，在被合并⽅是最终控制⽅以前年度从第三⽅收购来的情况下，应视同合并后形成的报告主体⾃最终控制⽅开始实施控制时起，⼀直是⼀体化存续下来的，应以被合并⽅的资产、负债(包括最终控 制⽅收购被合并⽅⽽形成的商誉)在最终控制⽅财务报表中的账⾯价值为基础，进⾏相关会计处理。合并⽅的财务 报表⽐较数据追溯调整的期间应不早于双⽅处于最终控制⽅的控制之下孰晚的时间。 本解释发布前同⼀控制下的企业合并未按照上述规定处理的，应当进⾏追溯调整，追溯调整不切实可⾏的除外。如果丙和甲⼄之间原先并⽆关联，则虽然“2023年9⽉30⽇：A收购丙所持B公司的全部股权，收购A公司持股B公司 100%”的交易构成同⼀控制下合并，但因为A、B从2023年2⽉7⽇起才处于同⼀最终控制⽅的最终控制下，故在A的 会计处理中，B的各项资产、负债的账⾯价值为B⾃⾝的账⾯价值（假设B⼀直处于丙的最终控制下）。A公司的 2023年12⽉31⽇的合并报表是将B公司2⽉7⽇⾄12⽉31⽇损益纳⼊合并范围。 在2⽉7⽇，A尚⽆对B的长投，故不能直接将A对B的长投成本与与2⽉7⽇B公司的净资产互相抵销。这两者之间的差异实际上是A的合并报表层⾯应还原的B公司于该期间内形成的留存收益。个人理解，供参考。","cat":"企业合并","kw":"商誉,合并","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3641","q":"同一控制下企业合并是否符合同控条件？","a":"对乙公司而言，甲公司设立乙公司后将子公司股权转入乙公司，参与合并的各方均处于同一最终控制方控制下且该控制非暂时性的，属于同一控制下合并。同控判断的两个核心条件：①合并前后均受同一方或相同多方最终控制；②该控制非暂时性（通常指合并前后均不少于一年）。个人理解，供参考。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,合并,控制,子公司","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0087","q":"请教陈版，关于商誉资产组转移的问题","a":"从主帖所述情况看，⾃购买⽇起，商誉就全部归属于资产组A1，⽽未分摊给资产组A2，即资产组A2⽆对应的商 誉。假设该做法是合理的，则在后续集团重组中，是将A1资产组转移给集团的另⼀家⼦公司，故A1对应的商誉应同步转移⾄该受让⽅⼦公司。 站在该受让⽅⼦公司B的视⾓，其取得A1业务应按照《企业会计准则解释第6号》第⼆条规定处理，其承接A1业务对应的各项资产、负债，应在本集团合并报表层⾯的账⾯价值作为会计处理的基础。个人理解，供参考。","cat":"企业合并","kw":"商誉,合并","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3639","q":"反向购买中发行费用如何处理？","a":"站在购买方B公司合并报表层面，发行费用是特殊的非同一控制下合并交易费用，应直接计入管理费用。虽然在A（法律上母公司）个别报表中可计入对B的长投成本，但合并报表层面需按实质重于形式原则，还原到交易费用。因为反向购买实质上是B公司的原股东取得了对A公司的控制权。个人理解，供参考。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,反向购买,合并,母公司,控制","src":"深圳证券交易所 会计监管动态","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0090","q":"请教陈版关于权益法核算的处理问题","a":"建议了解：当初本公司⼊股该联营企业时，对⼊股前该公司的留存收益归属问题是如何约定的？当初协议中是否已经明确约定本企业不享有此前的滚存利润？如果是，则在确定投资⽇取得被投资企业可辨认净资产公允价值份额 时，不应将不归属于本企业的留存收益包含在内。如果此前因疏忽等原因未注意到这⼀点，则属于前期差错，应予以更正，调整投资成本中包含的隐含商誉⾦额，或者调整在投资⽇计⼊营业外收⼊的⾦额。 如果此前约定投资⽇的滚存利润由新⽼股东按投资后的股权⽐例共享，但实际分配时仅分配给⽼股东，则应关注出现这⼀情况的原因，根据具体原因确定应如何处理。个人理解，供参考。","cat":"企业合并","kw":"公允价值,商誉,权益法","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3637","q":"收购时的价格调整机制（对赌）对标的公司报表有何影响？","a":"若交易双方之间的事项不要求标的公司进行分配或补差，对标的公司自身个别报表无影响。坏账准备的计提应依据金融工具准则独立判断。若对赌调整只是新老股东之间调整交易作价的借口，标的公司自身无需跟进调整。实务中需严格区分：股东层面的对赌安排与标的公司自身报表的关系，两者是独立的。个人理解，供参考。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,收购,对赌,坏账","src":"深圳证券交易所 会计监管动态","std_ref":"企业会计准则第20号——企业合并、企业会计准则第22号——金融工具确认和计量"},{"id":"3636","q":"未过户股权的投资是否应当并表？","a":"未完成工商变更不是未取得控制权的决定性因素。判断是否并表需综合考虑：是否拥有对被投资方的权力、是否通过参与被投资方相关活动享有可变回报、是否能够运用权力影响回报金额。工商登记仅是形式要件，实质性控制权的判断应基于经济实质。实务中以股权交割日而非工商变更日为并表基准日的做法较常见。个人理解，供参考。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,控制","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第20号——企业合并"},{"id":"3635","q":"代持还原是否构成企业合并？","a":"如果实际控制人一直控制被投资企业，从隐名股东变为显名股东不属于会计上的企业合并，而是母公司对子公司的增资行为。以实缴出资额作为初始投资成本（后一种观点更合理）。实务中需注意：关键是判断变更登记前后实质控制关系是否发生了变化，如果实质控制关系从未改变，仅是法律形式变更，不构成企业合并。个人理解，供参考。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,合并,子公司,母公司,控制","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0141","q":"请教陈版，关于集团内公司之间⽆偿划转资产，如何⼊账的问题","a":"这类交易属于权益性交易。由于⽆偿划转通常不需要办理资产评估，所以实务中通常以被划转资产在划出⽅的原账 ⾯价值作为划⼊⽅的⼊账价值。 当然，从会计原理⾓度⽽⾔，如果有条件进⾏评估并且也进⾏了评估，则划⼊⽅按评估值⼊账更为合理。前提是被划转的资产不构成“业务”，因⽽对划⼊⽅⽽⾔不构成同⼀控制下的企业合并。个人理解，供参考。","cat":"企业合并","kw":"合并","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3633","q":"订单未成立时向客户支付的补偿是冲减收入还是计入销售费用？","a":"首先要区分本企业的身份：若本企业为代理人，补偿款属于应付客户对价，理论上应冲减收入。如合同已成立后因本企业以外原因未履行，补偿冲减收入。如确实合同尚未成立即支付补偿，可计入销售费用。实务中应分析支付的商业实质，不宜一概而论。个人理解，供参考。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第14号——收入"},{"id":"3632","q":"无书面合同情况下的收入确认如何处理？","a":"对'先干活后签合同'的情况，需根据历史经验和行业惯例判断双方是否已对价款和支付方式存在事实上的共识（满足CAS 14第五条'合同成立'条件）。满足后运用可变对价原则合理谨慎估计收入。后续实际结算金额与估计不一致的，按会计估计变更处理。客户赖账属于信用问题，全额计提坏账后核销。个人理解，供参考。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14,会计估计,坏账","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第14号——收入"},{"id":"3631","q":"广告资源互换如何确认收入？","a":"若双方都能单独出售对应服务且有公允价值，按收入准则分别确认收入和成本。若无法单独确定公允价值，按非货币性资产交换准则，以换出资产的公允价值为基础确认换入资产成本。实务中，广告互换常见于同行业企业，关键是要能确定各自服务的公允价值。若双方服务价值相当，可以采用简化处理（不确认损益）。个人理解，供参考。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14,公允价值","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第14号——收入"},{"id":"3630","q":"收入准则下主要责任人与代理人身份如何确认？","a":"核心判断标准是企业在向客户转让商品前是否控制了该商品。控制的三个迹象：①企业承担向客户转让商品的首要责任；②企业在转让商品前承担存货风险；③企业有权自主决定商品价格。若同时满足上述条件，为主要责任人（总额法）；否则为代理人（净额法）。奶茶加盟店案例中，品牌方若承担向消费者提供产品服务的首要责任、自主定价，则为主要责任人。个人理解，供参考。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14,控制","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第14号——收入"},{"id":"CY0045","q":"求助陈版及各位⼤佬","a":"要看A、C之间的关系，即A取得对B的控制权，对A⽽⾔是同⼀控制下合并还是⾮同⼀控制下合并。 如果是⾮同⼀控制下合并，则A的个别报表层⾯按权益法（41%股权⽐例）核算到B公司撤资⽇（即A公司取得C公司控制权的购买⽇），以截⾄该⽇的账⾯价值作为后续成本法核算的投资成本基础；合并报表层⾯则需对所持股权按购买⽇公允价值重新计量，并确认投资收益，作为合并成本，据此计算合并报表层⾯商誉的初始计量⾦额。 如果是同⼀控制下合并，则个别报表层⾯应以合并⽇（取得对C控制权之⽇）取得C的净资产在最终控制⽅合并报 表层⾯的账⾯价值为投资成本，与原先权益法下长投账⾯价值之间的差额调整权益；合并报表层⾯需追溯重述前期 ⽐较数据，视同⾃最早报告期期初就已经是⼦公司。个人理解，供参考。","cat":"收入准则","kw":"控制权,公允价值,商誉,合并,权益法,成本法","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3628","q":"委托运营费收入在'对价很可能收回'条件不满足后如何处理？","a":"若'对价很可能收回'条件不再满足，后续无需再按原合同确认收入。已确认收入的应收款项应计提坏账准备。后续只有在已提供服务且已实际收到价款时，才能确认收入。这是新收入准则五大步骤中第一步'识别合同'的要求——若对价很可能收回的条件不再满足，则实质上合同已不满足准则定义的合同条件。个人理解，供参考。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14,坏账","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第14号——收入、企业会计准则第22号——金融工具确认和计量"},{"id":"CY0047","q":"⼤额存单利息收⼊的纳税调整","a":"是，应进⾏纳税调整。 根据《企业所得税法实施条例》第⼗⼋条：企业所得税法第六条第（五）项所称利息收⼊，是指企业将资⾦提供他 ⼈使⽤但不构成权益性投资，或者因他⼈占⽤本企业资⾦取得的收⼊，包括存款利息、贷款利息、债券利息、⽋款利息等收⼊。 利息收⼊，按照合同约定的债务⼈应付利息的⽇期确认收⼊的实现。 根据国家税务总局发布的《〈企业所得税法实施条例〉释义》中对该条的解释： 「释义」本条是关于收⼊总额中的利息收⼊的规定。 本条是对企业所得税法第六条第（五）项中的“利息收⼊”作的细化说明。企业所得税法只将“利息收⼊”作为收⼊的⼀种形式，但并未具体解释何为利息收⼊，利息收⼊到底包括那些种类？这就是本条所要回答的问题。 原内资税条例实施细则第七条第三款规定：“条例第五条第（三）项所称利息收⼊，是指纳税⼈购买各种债券等 有价证券的利息、外单位⽋款付给的利息以及其他利息收⼊。”本条对上述规定进⾏了修改完善，将利息收⼊定义 是指企业将资⾦提供他⼈使⽤但不构成权益性投资，或者因他⼈占⽤本企业资⾦取得的收⼊，包括存款利息、贷款利息、债券利息、⽋款利息等收⼊，这样概括更为全⾯、具体。 ⼀、“利息”的内涵和外延 利息收⼊通常理解为企业为他⼈提供贷款⽽按照约定利率获得的报酬，即贷款资⾦的价格。此外，实践中还可能存在其他形式的、实际效果等同于资⾦借贷的⾏为。因此本条有必要对“利息”的定义作出从宽解释，尽量覆盖所有的同类情况。 本条规定的利息主要包括两种类型： （⼀）企业将资⾦提供他⼈使⽤但不构成权益性投资。企业将资⾦提供他⼈使⽤，可能是借贷⾏为，也可能是股权投资⾏为。股权投资即权益性投资是企业为取得对另⼀企业净资产的所有权⽽进⾏的投资，通常是股权投资。⽽利息则是债权投资取得的收益，即按照固定期限、固定利率实现的投资回报。利息根据法律规定或者合同约定，可以分期（每⽉或每年）交付或者在收回本⾦时以及其他时间⼀次性交付。 （⼆）因企业的资⾦被他⼈占⽤⽽从他⼈取得的收⼊。实践中，⼀些企业不采取借贷形式，但因为其他原因占⽤了其他企业的资⾦，因⽽产⽣等同借贷⾏为的法律后果，即该企业应当按照法律规定或者双⽅约定的利率向提供资 ⾦的企业⽀付相当于利息的报酬。⽽这部分报酬也应属于企业所得税法第六条第（五）项所称的利息收⼊，应当依照规定缴纳企业所得税。 本条还具体列举了⼏种利息收⼊的形式，包括存款利息、贷款利息、债券利息、⽋款利息等。存款利息是企业将 ⾃有资⾦存⼊银⾏，从⽽由银⾏向其定期⽀付的利息收⼊。贷款利息是企业将⾃有资⾦借贷给他⼈使⽤，由他⼈按约定利率和期限⽀付的利息收⼊。存款利息和贷款利息的区别在于借款⼈即资⾦使⽤⼈不同，前者是银⾏等办理吸收存款业务的⾦融机构，后者是有资⾦需求的其他企业或者个⼈。债券利息是指企业购买政府债券、⾦融机构或其他企业的债券，由这些债券发⾏主体按规定或约定期限⽀付的利息收⼊。⽋款利息是其他企业或个⼈不能按期履⾏对该企业⽀付款项的义务，⽽使得本来应该属于该企业的资⾦在⼀段时间内仍属于有⽀付款项义务的企业或个⼈所有。 ⼆、利息收⼊的确认 会计准则规定，企业的利息收⼊同时满⾜下列条件的，应当确认收⼊：⼀是相关的经济利益能够流⼊企业；⼆是收⼊的⾦额能够合理地计量。 ⼀般⽽⾔，企业利息收⼊⾦额，应当按照有关借款合同或协议约定的⾦额确定。对于企业持有到期的长期债券或发放长期贷款取得的利息收⼊，可按照实际利率法确认收⼊的实现。关于持有⾄到期投资（主要是债权性投资）、贷款等的利息收⼊或某些⾦融负债的利息费⽤的确认，新会计准则规定采⽤实际利率法进⾏计算确定。实际利率 法，是指将⾦融资产或⾦融负债在预期存续期间或适⽤的更短期间内的未来现⾦流量，折现为该⾦融资产或⾦融负债当前账⾯价值，从⽽得出该⾦融资产或⾦融负债的实际利率（折现率），并按实际利率计算各期利息收⼊或利息费⽤的⽅法。考虑到实际利率法的处理结果与现⾏税法规定的名义利率法（合同利率法）差异较⼩，且能够反映有关资产的真实报酬率。所以，税法也认同企业采⽤实际利率法来确认利息收⼊的⾦额。个人理解，供参考。","cat":"收入准则","kw":"所得税","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3626","q":"经销商未达到销售目标而扣除保证金应冲减销售费用还是计入营业外收入？","a":"保证金扣除与代理费结算是同一交易的两个方面，两者密切相关。冲减'销售费用——代理费'更合理，不宜计入营业外收入。实务中需看保证金的具体用途：若保证金本质是履约保障金，达不到目标时的扣除是对代理服务的对价调整，应冲减代理费。个人理解，供参考。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14,营业外收入","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第14号——收入"},{"id":"3625","q":"批发企业品牌推广协议支出应计入销售费用还是冲减收入？","a":"一般采用计入销售费用的观点。可参考《监管规则适用指引——会计类第2号》之'2-3 应付客户对价的判断'。若支付对象是经销商，需先判断经销商的代理人或主要责任人身份——该判断直接影响真正'客户'的认定及商品销售收入确认时点。如果向客户支付的对价并未取得可明确区分的商品或服务，应冲减收入；但品牌推广服务通常是可明确区分的。个人理解，供参考。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14,监管","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第14号——收入"},{"id":"3624","q":"合同履约成本中的运费如何处理？","a":"运费金额较小的可简化处理直接计入营业成本，或并入发出商品成本列示。一般商品销售交易中使用'合同履约成本'科目的情形较少。实务中，如果运费构成合同履约的必要成本且预计可收回，可作为合同履约成本确认为一项资产，在收入确认时转入营业成本。但大多数情况下金额不大，直接费用化更简便。个人理解，供参考。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14,费用化","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第14号——收入"},{"id":"3623","q":"因履约瑕疵导致客户不认可债权，应作为债务重组还是收入调整？","a":"这个问题需要从两个层面来看。若因本企业履约有瑕疵导致对方不认可债权，应作为收入调整冲减收入，不属于债务重组。债务重组应基于纯财务原因（如债务人财务困难），其他原因导致的债权变更应适用其他准则。实务中常见的判断标准：如果重新协商是因产品质量问题、延迟交货等履约瑕疵，冲减收入；如果纯粹因对方资金周转困难给予让步，属于债务重组。个人理解，供参考。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14,债务重组","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第14号——收入"},{"id":"3622","q":"分期付款购买固定资产（试剂+设备捆绑销售）如何处理？","a":"设备控制权在期初已转移应确认收入，试剂随交付逐月确认。购买方应将总价折现，按设备与试剂的单独售价比例分摊给两项履约义务。实务中需注意：设备与试剂构成两项可明确区分的履约义务，各在商品控制权转移时点确认收入；合同对价中隐含的融资成分需折现处理。个人理解，供参考。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14,控制","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第14号——收入"},{"id":"3621","q":"销售中外部单位承担回购责任，本企业如何确认收入？","a":"若本企业（甲公司）处于主导地位并承担滞销风险，外部单位（A公司）仅是资金提供者（代理人），本企业应按净额法确认收入。收入性质实际上为利息收入而非销售收入。首先要区分谁是主要责任人：看谁承担存货风险、谁决定定价、谁对客户承担首要责任。若外部单位仅提供资金但不参与经营决策，其实质是融资安排。个人理解，供参考。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第14号——收入"},{"id":"3620","q":"贸易业务净额法下收入确认时点如何确定？","a":"净额法下企业相当于居间作用，应在下游客户取得商品控制权时确认收入——即获得客户接受商品的证据后。首先要区分本企业在交易中是主要责任人还是代理人：若企业从未取得商品控制权、不承担存货风险，则为代理人，按净额法确认收入。实务中常见误区是以为发货时即可确认收入，但代理人确认收入的时点应是客户签收确认。个人理解，供参考。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14,控制","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第14号——收入"},{"id":"3619","q":"免费期收入如何处理——咨询服务协议第一个月免费、后续119个月收费？","a":"第一个月免费是基于后续月份收费而给予的优惠，两者存在直接关联。由于各月服务内容类似，应将全部120个月的合同总价在120个月内按直线法分摊确认收入。不宜将免费期单独视为一项履约义务，也不宜在免费期确认零收入。这体现了新收入准则下'可变对价'应在合同期内系统分摊的原则。个人理解，供参考。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第14号——收入"},{"id":"CY0048","q":"授权经营不动产出租是否可以确认为投资性房地产","a":"不可以。 根据《讲解2010》第四章中对于“已出租的建筑物”的解释： （三）已出租的建筑物 已出租的建筑物是指企业拥有产权的、以经营租赁⽅式出租的建筑物，包括⾃⾏建造或开发活动完成后⽤于出租的建筑物以及正在建造或开发过程中将来⽤于出租的建筑物。例如，甲公司将其拥有的某栋⼚房整体出租给⼄公司， 租赁期2年。对于甲公司⽽⾔，⾃租赁期开始⽇起，该栋⼚房属于投资性房地产。企业在判断和确认已出租的建筑 物时，应当把握以下要点: 1.⽤于出租的建筑物是指企业拥有产权的建筑物。企业以经营租赁⽅式租⼊再转租的建筑物不属于投资性房地产。例如，甲企业与⼄企业签订了⼀项经营租赁合同，⼄企业将其持有产权的⼀栋办公楼出租给甲企业，为期5年。甲企业⼀开始将该办公装后⽤于⾃⾏经营餐馆。2年后，由于连续亏损，甲企业将餐馆转租给丙公司，以赚取租⾦差价。这种情况下，对于甲企业⽽⾔，该栋楼不属于其投资性房地产。对于⼄企业⽽⾔，则属于其投资性房地产。 ……个人理解，供参考。","cat":"收入准则","kw":"租赁","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3617","q":"换货升级的处理：客户退回旧产品并支付差价换购新产品，属于合同变更还是新合同？","a":"换货升级是否属于合同变更或新合同，取决于旧产品退回时原合同是否已经终结。主要判断因素：（1）旧产品退回是否按合同约定（如质保期内换货）——是，则属于原合同的履约事项；（2）旧产品退回是新的独立交易——如果旧产品的退货权在老合同中已明确或按商业惯例退货期已过，此时换购新产品属于一项新合同；（3）中间地带——如果老合同对退货条款不明确，旧产品退回+差价换新的实质，既涉及老合同的终止（退货退款义务），又涉及新合同的成立（购买新产品）。建议分开拆分两个交易：先处理退货退款，再处理新品销售。个人理解，供参考。","cat":"实务综合","kw":"实务,会计处理,准则应用","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则——基本准则"},{"id":"3616","q":"公允价值计量的投资性房地产出租时，如何区分租金收入和物业费收入？","a":"投资性房地产以公允价值模式计量时，不计提折旧，公允价值变动计入公允价值变动损益。租金收入应按CAS 14规定的五步法处理：（1）每期租金按直线法（或其他系统方法）确认收入，除非其他方法更合理；（2）如果租金是不等额的，需要将合同总租金在租赁期内按直线法分摊。与租金捆绑的物业费、水电费等如果是代收代付性质（即企业不承担主要责任、不能主导定价），应按净额法确认收入（或冲减相关费用）。如果是企业的独立增值服务（如保安、保洁等），则构成单独的履约义务，应分摊交易价格并按各自的履约进度确认收入。个人理解，供参考。","cat":"实务综合","kw":"实务,会计处理,准则应用,CAS 14,公允价值变动损益,公允价值,折旧","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第14号——收入"},{"id":"3615","q":"在建工程包含哪些必要支出？试车费用如何处理？","a":"根据CAS 4，在建工程成本包括使固定资产达到预定可使用状态前发生的全部必要支出：（1）建筑工程支出（材料、人工、机械费用）；（2）安装工程支出（设备价款、安装费用）；（3）需要安装的设备（已到货尚未安装的设备）；（4）试车费用：负荷联合试车费减去试车产品收入后的净额；（5）符合资本化条件的借款费用；（6）其他直接相关费用（如设计费、勘查费等）。特别注意：试车期间产出的产品如可对外销售，应按收入准则确认销售收入，同时将试车净支出计入在建工程成本——即试车收入冲减在建工程成本，而不是直接计入营业收入。个人理解，供参考。","cat":"实务综合","kw":"实务,会计处理,准则应用,CAS 4,资本化,借款费用","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第4号——固定资产、企业会计准则第17号——借款费用"},{"id":"CY0096","q":"时点法确认收⼊依据","a":"此问题应当逐条对照新收⼊准则第⼗⼀条规定的应使⽤时段法的三种情形，说明为何都不符合。例如：个人理解，供参考。","cat":"实务综合","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0099","q":"请问陈⽼师关于现⾦结算的股份⽀付取消会计处理。","a":"现⾦结算股份⽀付中累积计⼊成本费⽤的⾦额等于最终结算给激励对象的现⾦。因此，如果现⾦结算股份⽀付在可 ⾏权⽇未达到可⾏权条件中市场条件⽽取消结算，则冲回前期确认的负债，对应冲减股份⽀付费⽤。 提问⼈：v724292421 时间：2024-03-04 21:20:30 请教陈⽼师，现⾦结算股权⽀付： 1，关于准则说，只要满⾜可⾏权条件⾮市场条件，企业就应当确认相应的成本费⽤（则不能冲销）？ 2，结合1，如果我说的没错，那么企业跟激励对象约定了可⾏权条件中市场业绩，但是激励对象确实没有实现可⾏权条件中市场业绩（⽽满⾜⾮市场条件），企业确认相应的成本费⽤和应付职⼯薪酬，如果按约定条款，企业不能 ⽀付给激励对象，那么应付职⼯薪酬不就是长期挂账了（因不能冲销）？还是仍需当做员⼯投⼊（转⼊资本公积） 呢？ 回答⼈：chenyiwei个人理解，供参考。","cat":"实务综合","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3612","q":"出租办公楼的佣金如何进行会计处理？","a":"这属于CAS 14下的合同取得成本。出租人支付给代理中介的佣金（用于寻找租户），属于不取得租赁合同就不会发生的增量成本，如果预期能够收回，应当确认为一项资产（合同取得成本或其他非流动资产）。该资产在租赁期内系统摊销，摊销额计入当期损益。如果租期较短或佣金金额不重大，可采用简化处理方法——在支付时直接计入费用。实务中，对于长期租约（如5年以上办公楼租赁），佣金可能金额较大，建议采用资本化处理以反映匹配原则。个人理解，供参考。","cat":"实务综合","kw":"实务,会计处理,准则应用,CAS 14,摊销,资本化","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第14号——收入、企业会计准则第17号——借款费用"},{"id":"CY0100","q":"职⼯福利费的计提与发放","a":"根据《财政部关于企业加强职⼯福利费财务管理的通知》（财企[2009]242号）规定：“企业给职⼯发放的节⽇补 助、未统⼀供餐⽽按⽉发放的午餐费补贴，应当纳⼊⼯资总额管理”。因此，将过节费作为职⼯福利费列⽀是不恰当的。 该项过节费应在实际发放时计⼊相关成本费⽤。个人理解，供参考。","cat":"实务综合","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3610","q":"对于收款可能性不确定的合同，已发生的履约成本如何处理？","a":"根据CAS 14，在合同开始时如果对价的可收回性存在重大不确定性，需要谨慎判断是否满足合同存在的五个条件之一——「企业很可能收回因向客户转让商品或服务而有权获得的对价」。如果不满足，该安排不属于准则范围内的「合同」，此时已发生的履约成本应直接计入当期损益（主营业务成本），不应确认为资产（合同资产或存货）。因为此时没有可靠的收款基础，资本化条件不成立。只有在以后期间对价的可收回性得到合理保证后，后续发生的成本才按准则正常处理。个人理解，供参考。","cat":"实务综合","kw":"实务,会计处理,准则应用,CAS 14,资本化","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第14号——收入、企业会计准则第17号——借款费用"},{"id":"3609","q":"用于送礼的客户礼品未送完被出售，如何处理账务？","a":"购入礼品时如已计入业务招待费，后续将未送出的礼品出售：可以以实际购入该批礼品的成本金额为限冲减当初的业务招待费，如果出售收入超出购入成本的部分，则计入营业外收入。实务中的账务处理步骤：先冲减原费用科目（借：银行存款/应收账款，贷：业务招待费），金额以原购入成本为限，超出部分计入营业外收入。这符合会计核算的实质重于形式原则——既然礼品未实际送出，当初计入招待费的假设就不成立，需要「拨回」原计入的额度。个人理解，供参考。","cat":"实务综合","kw":"实务,会计处理,准则应用,营业外收入","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则——基本准则"},{"id":"CY0101","q":"⽣产过程中的成品抽检成本如何计算？","a":"由于抽检是必须的流程，因此⽤于抽检的样品的成本应由最终实现销售的产品数量负担，相应增加其单位成本。即本案例中计算最终的单位⽣产成本时，分母为90件。个人理解，供参考。","cat":"实务综合","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3607","q":"剥离事业部给子公司相关会计处理：资产划转和人员安置如何处理？","a":"事业部剥离给子公司属于集团内部的业务重组。关键步骤：（1）将事业部相关的可辨认资产和负债按其账面价值（或公允价值，视情况而定）划转至子公司；（2）如果涉及人员劳动合同从母公司转至子公司，相关的应付职工薪酬也需要一并转移；（3）母公司作为对子公司的长期股权投资增加处理。如果划转的净资产公允价值高于账面价值，母公司个别报表中差额计入资产处置损益。在合并报表中，该交易属于内部交易，差额应予以抵消，不产生损益。实务中还必须考虑业务重组的税务影响——增值税、企业所得税、土地增值税等方面的合规性。个人理解，供参考。","cat":"实务综合","kw":"实务,会计处理,准则应用,子公司,公允价值,账面价值,合并,母公司,所得税,职工薪酬","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则——基本准则"},{"id":"3606","q":"处置固定资产时账面净值不确定（总价打包购置未分部件），如何确定账面净值？","a":"最佳方案是查阅历史账务资料确定实际成本及分部件金额。如果不可行，可以采用替代方法：（1）参照市场价格或行业工程定额标准确定重置成本；（2）聘请评估机构采用重置成本法进行评估；（3）如果金额不重大，可按处置收入作为账面净值简化处理（即确认零损益）。实务中，企业应当在固定资产卡片中尽可能细化到可独立处置的最小单元（如一条生产线至少拆分为各核心设备和辅助设备），以备将来处置时能合理确定账面净值。如果在工程竣工决算时没有分项，事后很难准确拆分。个人理解，供参考。","cat":"实务综合","kw":"实务,会计处理,准则应用","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"3605","q":"同一产线中设备分批转固后，整条产线尚未投产时的折旧如何处理？","a":"这是固定资产会计中的特殊场景——部分设备已单项达到预定可使用状态，但整条产线还不能产出合格产品。此时，已转固设备的折旧应计入「营业成本」（而非管理费用或存货成本），原因在于该折旧是与生产准备活动相关的、不可避免的支出，应归属到生产线产品的成本中（尽管尚未产出产品）。待整条产线投产后，这部分先期折旧可能需要在产品批次中合理分摊。如果不分摊且金额重大，可能导致首批产品单位成本畸高。实务中建议在会计核算办法中事先明确此类情况的折旧处理原则，以保持一致性。个人理解，供参考。","cat":"实务综合","kw":"实务,会计处理,准则应用,折旧","src":"深圳证券交易所 会计监管动态","std_ref":"企业会计准则——基本准则"},{"id":"CY0106","q":"请教或有对价会计处理","a":"⼀般情形下，或有对价资产属于以公允价值计量且其变动计⼊损益的⾦融资产或⾦融负债，在最终结算⾦额（或⾃ ⾝权益⼯具数量）最终确定之前的每个资产负债表⽇都应重新计量其公允价值，并确认公允价值变动损益。 不清楚你看到的信息的出处是什么，也可能是你的理解有误。个人理解，供参考。","cat":"实务综合","kw":"公允价值","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0109","q":"证监会会计类1号","a":"“该项投资不满⾜权益⼯具定义”的原因是：该项投资附有回售条件，且直接以被投资企业作为回购义务⼈，因此被投资企业在接受投资款的同时即承担了导致经济利益流出企业的现时义务，故不符合权益⼯具定义，应确认⾦融负债。“投资⽅拥有与普通股股东⼀致的投票权及分红权等权利”的事实不影响该项判断。个人理解，供参考。","cat":"实务综合","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3602","q":"持续经营假设在评估时有哪些关键迹象？出现重大疑问时如何处理？","a":"根据CAS 30（财务报表列报），管理层需要在编制财务报表时评估企业持续经营能力。关键负面迹象包括：（1）净流动负债或净负债状态持续恶化；（2）主要债务违约或即将到期且无明确的再融资计划；（3）核心经营业务持续大幅亏损；（4）关键经营许可证即将到期但无续期预期；（5）重大未决诉讼可能导致的巨额赔偿；（6）丧失主要市场、客户或供应商。如果出现重大疑问，管理层需要制定并评估缓解计划（如资产处置、债务重组、再融资方案），并在财务报表附注中充分披露相关不确定性和管理层的应对计划。如果缓解计划不可行，则不能采用持续经营假设。个人理解，供参考。","cat":"财务报表列报","kw":"报表列报,CAS 30,列报,附注,持续经营,债务重组","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第30号——财务报表列报"},{"id":"3601","q":"现金流量表中，定期存款和结构性存款如何列报？","a":"定期存款的列报取决于持有目的和期限：（1）持有至到期且期限在三个月以内（含三个月）的，可计入现金及现金等价物；（2）期限三个月以上且属于非质押的，计入「债权投资」或其他非流动资产；（3）已质押的定期存款，无论期限长短，均不能列入现金及现金等价物，应在其他流动资产或其他非流动资产中列报为「受限货币资金」。结构性存款的本金保本类型（保本型），如果期限短（三个月内），且流动性强，可视为现金等价物；非保本浮息的结构性存款应作为交易性金融资产列报。实务中需要在附注中充分披露现金及现金等价物的构成。个人理解，供参考。","cat":"财务报表列报","kw":"报表列报,CAS 30,列报,附注,持续经营","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第30号——财务报表列报"},{"id":"3600","q":"资产负债表日后事项（调整事项与非调整事项）如何区分和处理？","a":"根据CAS 29，调整事项是资产负债表日已经存在的情况提供补充证据的事项——需要调整财务报表。例如：资产负债表日前的应收账款在日后期间实际被确认无法收回（提供了减值存在的补充证据）、日后期间法院判决证实了资产负债表日存在现时义务。非调整事项是表明资产负债表日后新发生情况的事项——只需披露不需调整。例如：日后期间发生的重大企业合并、发行新股、重大自然灾害等。关键判断标准：事由的根源是产生于资产负债表日之前还是之后。实务中的口诀：根源在「年前」——调整事项；根源在「年后」——非调整事项。个人理解，供参考。","cat":"财务报表列报","kw":"报表列报,CAS 30,列报,附注,持续经营,CAS 29,合并","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第30号——财务报表列报、企业会计准则第29号——资产负债表日后事项"},{"id":"3599","q":"投资性房地产与固定资产的判断：办公楼初始自用后被闲置并短期出租，如何分类？","a":"根据CAS 3，投资性房地产需满足：（1）为赚取租金或资本增值而持有；（2）能够单独计量和出售。短期出租办公楼不能据此重分类为投资性房地产。应当继续在「固定资产」科目下核算，折旧政策不变，租金收入计入其他业务收入。只有当管理层明确决定将该项房地产由自用转为「长期用于对外经营性租赁」，即持有目的发生根本性改变时，才能重分类为投资性房地产。转换日通常选择租赁期开始日或管理层正式变更用途的决议日。实务中短期闲置物业偶尔出租的情况非常多，不能因为几个月的出租就改变分类。个人理解，供参考。","cat":"财务报表列报","kw":"报表列报,CAS 30,列报,附注,持续经营,CAS 3,折旧","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第30号——财务报表列报、企业会计准则第3号——投资性房地产"},{"id":"CY0134","q":"本年发现的前期舞弊，是否需要调整前期内控审计报告意见类型","a":"重⼤前期差错更正表明在前期财务报表相关内控存在重⼤缺陷，个⼈理解此时应重新出具前期内控审计报告。个人理解，供参考。","cat":"会计政策/估计变更","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3597","q":"PPP项目由金融资产模式转为政府每年签订采购服务合同的模式，属于会计政策变更还是会计估计变更？","a":"根据CAS的相关规定和分析，这种模式转换应作为会计估计变更，采用未来适用法进行衔接。原因是：模式的转换是由外部因素的重大变化驱动的（政府改变了PPP合同管理模式，从原固定支付安排变为每年签订采购服务合同），企业会计政策并未改变，改变的只有对合同现金流量的估计。因此，这不是企业主动选择的政策变更，而是外部环境变化导致的估计变更。未来适用法的含义是：不需要追溯调整以前年度，只需要自变更之日起按新模式进行会计处理即可。个人理解，供参考。","cat":"会计政策/估计变更","kw":"会计政策变更,会计估计变更,CAS 28,追溯调整,未来适用法,会计估计,会计政策,PPP,衔接,追溯","src":"财政部 企业会计准则解释公告","std_ref":"企业会计准则第28号——会计政策、会计估计变更和差错更正、企业会计准则第14号——收入"},{"id":"3596","q":"会计政策变更、会计估计变更和前期差错更正如何区分？","a":"三者本质区别在于变更的对象和原因。会计政策变更：变更了计量基础、确认原则或报告框架（如存货发出从先进先出法变更为加权平均法）。会计估计变更：由于新信息或新情况的出现，调整了原有的估计（如坏账计提比例调整、固定资产使用寿命调整）。前期差错更正：发现以前期间的财务报告存在计算错误、应用会计政策错误、疏忽或曲解事实。处理方式不同：政策变更一般采用追溯调整法，估计变更采用未来适用法，前期差错更正采用追溯重述法。实务中最容易混淆的是「政策变更」与「估计变更」——如果变更同时涉及两者，应按估计变更处理。个人理解，供参考。","cat":"会计政策/估计变更","kw":"会计政策变更,会计估计变更,CAS 28,追溯调整,未来适用法,会计估计,会计政策,前期差错,坏账,追溯","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第28号——会计政策、会计估计变更和差错更正"},{"id":"3595","q":"基本每股收益中是否包含终止经营净利润？","a":"根据CAS 34，基本每股收益应以归属于母公司普通股股东的合并净利润（包括持续经营净利润和终止经营净利润）为计算基础。因此，基本每股收益包含了终止经营净利润。同理，稀释每股收益也应包括。实务中的列示方式：在利润表中，分别列示「持续经营每股收益」和「终止经营每股收益」（即每股收益可以分解为两部分），也可以只列示综合数字。CPA教材中可能存在不同的表述方式，但实务处理以合并净利润总额（含终止经营）计算基本每股收益为妥。个人理解，供参考。","cat":"持有待售","kw":"持有待售,CAS 42,处置组,终止经营,停止折旧,CAS 34,每股收益,合并,母公司,稀释","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第42号——持有待售的非流动资产、处置组和终止经营、企业会计准则第34号——每股收益"},{"id":"3594","q":"终止经营的定义和列报要求是什么？与持有待售有何区别？","a":"根据CAS 42，终止经营是企业满足以下条件之一的组成部分：（1）该组成部分被处置或已被划分为持有待售类别；（2）该组成部分在报告期间内处置或终止。与持有待售的主要区别：（1）持有待售是资产的分类状态（着眼于「尚未处置」），终止经营是报告期的经营成果列报（着眼于「已处置或终止」的业务线）；（2）持有待售适用于个别资产或处置组，终止经营适用于构成主要业务线或经营地区的组成部分。终止经营需要在利润表中单独列示：终止经营净利润（税后）在持续经营净利润之后单独列示。个人理解，供参考。","cat":"持有待售","kw":"持有待售,CAS 42,处置组,终止经营,停止折旧","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第42号——持有待售的非流动资产、处置组和终止经营"},{"id":"3593","q":"持有待售资产的计量规则是什么？划分为持有待售后的减值如何处理？","a":"根据CAS 42，企业将非流动资产或处置组划分为持有待售类别后，应按「账面价值与公允价值减去出售费用后的净额孰低」进行计量。如果账面价值高于公允价值减去出售费用后的净额，计提减值准备，差额计入资产减值损失。持有待售资产不计提折旧或摊销。后续资产负债表日，如果公允价值回升，原已计提的减值准备可在原计提范围内转回。需要注意的是，划分为持有待售是一个「触发事件」——归类调整当日就需要按照孰低原则进行重新计量，之前年度未计提的减值损失不能在这一天集中确认。个人理解，供参考。","cat":"持有待售","kw":"持有待售,CAS 42,处置组,终止经营,停止折旧,资产减值损失,公允价值,账面价值,摊销,折旧","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第42号——持有待售的非流动资产、处置组和终止经营"},{"id":"CY0823","q":"实务中如果预计⼀年内能完成出售，则作为持有待售的可能性更⼤。抵债房产除⾮⽤于出租，⼀般不确认为投资性房地产。2、没有明确的定量指引，⼀般建议1年以内，最多不超过5年。","a":"这⾥的讨论分别针对投资性房地产和持有待售资产，两者适⽤不同的准则，不能混淆。个人理解，供参考。","cat":"持有待售","kw":"持有待售","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3591","q":"数据资产在现有准则框架下如何处理？企业自用数据能否确认为无形资产？","a":"根据《企业数据资源相关会计处理暂行规定》，企业使用的数据资源，符合CAS 6无形资产定义和确认条件的，应当确认为无形资产。确认条件包括：可辨认性（可分离或源自合同性权利）、控制、未来经济利益很可能流入、成本可靠计量。实务中的难点：（1）数据资源是否可辨认——如果是加密的、唯一的、且有明确权属的数据库，可能满足可辨认性；（2）成本计量——企业需要对数据采集、清洗、标注、脱敏等各环节成本进行精细化核算；（3）后续计量——数据资源的有效期高度不确定，如何确定合理的使用寿命和摊销方法是挑战。个人理解，供参考。","cat":"无形资产","kw":"无形资产,CAS 6,研发支出,资本化,摊销,控制","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第6号——无形资产"},{"id":"CY0081","q":"研发产出物⽤于⽣产的会计和税务处理","a":"本案例中，研发领料在经过研发过程后，其可变现净值会明显减少。因此，研发产出物（废板及废料）应根据其可变现净值⼊账并确认为存货，相应冲减研发⽀出。即，把研发领料在经过研发环节后的价值降低额作为研发⽀出的组成部分。个人理解，供参考。","cat":"无形资产","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3589","q":"音乐作品无形资产的摊销方法应该采用什么方式？能否用计划收入比例法？","a":"根据《企业会计准则解释第11号》，采用「计划收入比例法」摊销无形资产不恰当。建议采用年限平均法（直线法）进行摊销。计划收入比例法的问题是：（1）无形资产未来产生的经济利益与其在生命周期内的收入分配并不必然呈线性对应关系；（2）未来收入的预测本质上是不确定的，可能导致摊销金额的随意性。年限平均法则将成本在预计使用寿命内均匀摊销，避免了这种随意性。类似的，影视剧版权的摊销也不应采用「计划收入比例法」，应改按直线法。个人理解，供参考。","cat":"无形资产","kw":"无形资产,CAS 6,研发支出,资本化,摊销","src":"财政部 企业会计准则解释公告","std_ref":"企业会计准则第6号——无形资产"},{"id":"3588","q":"欧盟CE认证/仿制药一致性评价的费用能否资本化？","a":"这属于特殊的研发项目。对于仿制药一致性评价的费用处理，有两派观点：（1）费用化——评价实质是「检验」已有产品是否符合标准，不产生新的技术知识，属于质量控制成本；（2）资本化——评价是获取上市许可的必要步骤，类似于取得行政许可权的成本，与获取存在市场（即仿制药产品可上市销售）直接相关。实务中，如果通过评价能够获得新的市场准入并产生经济利益，符合无形资产的确认条件，可参考资本化处理。欧盟CE认证同理——属于医疗器械进入市场的必要步骤，相关费用可以资本化确认无形资产。个人理解，供参考。","cat":"无形资产","kw":"无形资产,CAS 6,研发支出,资本化,摊销,控制,费用化","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第6号——无形资产、企业会计准则第17号——借款费用"},{"id":"3587","q":"研发费用资本化的条件是什么？研究阶段和开发阶段如何划分？","a":"根据CAS 6，研究阶段的支出全部费用化，开发阶段的支出满足六项资本化条件时确认为无形资产。六个条件（全部必须满足）：（1）完成该无形资产使其能使用或出售在技术上可行；（2）具有完成该无形资产并使用或出售的意图；（3）无形资产产生经济利益的方式（包括证明存在市场或内部有用性）；（4）有足够的技术、财务资源和其他资源支持以完成开发并加以使用或出售；（5）归属于该无形资产开发阶段的支出能可靠计量。实务中，研究阶段与开发阶段的界限划分是最大难点——一般以是否完成「技术可行性论证」为界。个人理解，供参考。","cat":"无形资产","kw":"无形资产,CAS 6,研发支出,资本化,摊销,费用化","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第6号——无形资产、企业会计准则第17号——借款费用"},{"id":"3586","q":"房地产企业开发商品房涉及的土地使用权出让金和建筑施工成本对应的借款利息，是否需要资本化？","a":"根据CAS 17，房地产开发企业开发的用于出售的房地产开发产品（商品房）属于符合资本化条件的资产（需要相当长时间才能达到可销售状态）。具体处理：（1）取得土地使用权出让金对应的借款利息：如果该借款属于专门为项目筹集的资金，或土地使用权阶段已满足资本化开始条件，相应的利息应资本化；（2）建筑施工成本对应的借款利息：在施工期内，占用的一般借款和专门借款的利息均应资本化；（3）资本化终点为商品房竣工备案并达到可交付状态时。实务中，房地产企业应建立分项目、分地块的借款费用台账进行精细化核算。个人理解，供参考。","cat":"借款费用","kw":"借款费用,CAS 17,资本化,专门借款,一般借款","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第17号——借款费用"},{"id":"3585","q":"外币专门借款的汇兑差额能否资本化？","a":"根据CAS 17，外币专门借款本金及利息的汇兑差额，在资本化期间内可以资本化。但仅限于外币专门借款（而非一般借款）。资本化的汇兑差额是外币借款由于汇率变动产生的差额，其性质是借款费用的一部分。实务中需要注意：（1）同样是外币借款，如果是一般借款，其汇兑差额不能资本化，只能计入财务费用；（2）资本化金额应以「当期
