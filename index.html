<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>AI准则顾问</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--orange:#F97316;--orange-dark:#EA580C;--bg:#F9F8F6;--white:#FFF;--text:#1C1C1E;--secondary:#8E8E93;--border:#EEECEA;--radius:16px}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:800px;margin:0 auto;padding:20px}
.header{padding:30px 0 20px}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.logo-icon{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--orange),var(--orange-dark));display:flex;align-items:center;justify-content:center;color:var(--white);font-size:16px;font-weight:700}
.logo-text{font-size:14px;font-weight:600;color:var(--secondary);letter-spacing:.5px}
h1{font-size:36px;font-weight:800;margin-bottom:6px;letter-spacing:-0.5px}
h1 em{font-style:normal;color:var(--orange)}
.subtitle{font-size:14px;color:var(--secondary);margin-bottom:24px}
.stats{display:flex;gap:32px;margin-bottom:32px}
.stat-item{display:flex;flex-direction:column}
.stat-num{font-size:26px;font-weight:700;color:var(--text)}
.stat-label{font-size:12px;color:var(--secondary);margin-top:2px}
.tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:24px}
.tab{padding:14px 28px;font-size:15px;font-weight:600;color:#B0B0B6;cursor:pointer;border:0;background:none;position:relative;transition:color .2s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--text)}
.tab.active::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:3px;background:var(--orange);border-radius:2px 2px 0 0}
.panel{display:none}
.panel.active{display:block}
textarea{width:100%;padding:16px;font-size:16px;line-height:1.6;border:2px solid var(--border);border-radius:var(--radius);background:var(--white);color:var(--text);outline:0;font-family:inherit;resize:vertical;min-height:120px;margin-bottom:14px;transition:border-color .2s,box-shadow .2s}
textarea:focus{border-color:var(--orange);box-shadow:0 0 0 4px rgba(249,115,22,.08)}
textarea::placeholder{color:#C5C5C9}
.btn{width:100%;height:56px;border:0;border-radius:var(--radius);background:linear-gradient(135deg,var(--orange),var(--orange-dark));color:var(--white);font-size:18px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .2s,transform .1s;letter-spacing:.3px}
.btn:hover{opacity:.92}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.loading{display:none;align-items:center;justify-content:center;gap:10px;padding:20px;color:var(--secondary);font-size:14px}
.loading.show{display:flex}
.spinner{width:20px;height:20px;border:3px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.result{display:none;background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-top:16px;animation:fadeIn .3s}
.result.show{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.result-header{display:flex;align-items:center;gap:12px;margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.answer{font-size:15px;line-height:2;white-space:pre-wrap;word-break:break-word}
.sources{margin-top:22px;padding-top:20px;border-top:1px solid var(--border)}
.sources-title{font-size:13px;color:var(--secondary);margin-bottom:12px;font-weight:700;letter-spacing:.3px}
.source-item{padding:10px 14px;margin:8px 0;background:#FAFAF9;border-radius:10px;font-size:13px;line-height:1.6;cursor:pointer;transition:background .15s,box-shadow .15s;position:relative;border:1px solid transparent}
.source-item:hover{background:#F5F3F0;border-color:#E8E5E0;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.source-item.expanded{background:#FFF;border-color:var(--orange);box-shadow:0 2px 12px rgba(249,115,22,.1)}
.source-header{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.source-expand-icon{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:var(--border);color:var(--secondary);font-size:11px;font-weight:700;flex-shrink:0;transition:all .2s}
.source-item.expanded .source-expand-icon{background:var(--orange);color:#FFF;transform:rotate(45deg)}
.source-score{color:var(--orange);font-weight:700;font-size:12px;flex-shrink:0}
.source-content{color:var(--text);font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis}
.source-cat{font-size:10px;padding:2px 8px;border-radius:10px;background:#FFF7ED;color:var(--orange);font-weight:600;flex-shrink:0;white-space:nowrap}
.source-badge-qa{background:#FFF7ED;color:var(--orange)}
.source-badge-std{background:#EFF6FF;color:#3B82F6}
.source-detail{display:none;margin-top:12px;padding:16px;background:#FFF;border:1px solid var(--border);border-radius:10px;animation:fadeIn .25s}
.source-item.expanded .source-detail{display:block}
.source-detail-q{font-size:14px;font-weight:700;color:var(--text);margin-bottom:10px;line-height:1.7;padding-bottom:10px;border-bottom:1px dashed var(--border)}
.source-detail-q::before{content:'Q: ';color:var(--orange);font-size:16px}
.source-detail-a{font-size:13px;line-height:1.9;color:var(--text);white-space:pre-wrap}
.source-detail-a::before{content:'A: ';color:var(--orange);font-size:16px;font-weight:700}
.source-detail-meta{display:flex;gap:10px;margin-top:12px;padding-top:10px;border-top:1px solid var(--border);font-size:11px;color:var(--secondary);flex-wrap:wrap}
.source-detail-meta span{display:inline-flex;align-items:center;gap:3px}
.source-detail-meta .meta-label{color:#B0B0B6}
.source-detail-actions{margin-top:10px;display:flex;gap:8px}
.source-btn-copy{padding:4px 12px;border:1px solid var(--border);border-radius:6px;background:var(--white);color:var(--secondary);font-size:11px;cursor:pointer;transition:all .15s}
.source-btn-copy:hover{background:var(--orange);color:#FFF;border-color:var(--orange)}
.source-detail-source{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-size:11px;color:#6B7280;display:flex;align-items:center;gap:4px}
.source-detail-source .source-label{color:#B0B0B6;font-weight:600}
.source-detail-source a{color:var(--orange);text-decoration:none}
.source-detail-source a:hover{text-decoration:underline}
.source-hint{font-size:11px;color:#B0B0B6;margin-top:6px}
.source-hint kbd{display:inline-block;padding:1px 6px;background:#EFEFEF;border-radius:4px;font-family:inherit;font-size:11px;border:1px solid #D5D5D5}
.compare-result{display:none;gap:20px;margin-top:16px}
.compare-result.show{display:grid;grid-template-columns:1fr 1fr}
.compare-col{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:22px;animation:fadeIn .3s}
.compare-label{font-size:12px;font-weight:700;padding:5px 14px;border-radius:20px;display:inline-block;margin-bottom:14px}
.compare-label.expert{background:#FFF7ED;color:var(--orange)}
.compare-label.generic{background:#F5F5F7;color:var(--secondary)}
.error{display:none;background:#FEF2F2;border:1px solid #FECACA;border-radius:12px;padding:14px 18px;margin-top:16px;color:#991B1B;font-size:14px;line-height:1.6}
.error.show{display:block}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;background:#D1D5DB}
.status-dot.online{background:#22C55E}
.status-dot.offline{background:#EF4444}
.footer{text-align:center;padding:40px 20px 36px;font-size:12px;color:#B0B0B6}
.answer h1,.answer h2,.answer h3,.answer h4{font-weight:700;margin:20px 0 10px;line-height:1.3}
.answer h1{font-size:22px;border-bottom:2px solid var(--border);padding-bottom:8px}
.answer h2{font-size:18px;border-bottom:1px solid var(--border);padding-bottom:6px}
.answer h3{font-size:16px}
.answer h4{font-size:15px;color:var(--secondary)}
.answer p{margin:10px 0}
.answer ul,.answer ol{padding-left:24px;margin:10px 0}
.answer li{margin:4px 0;line-height:1.8}
.answer strong{font-weight:700;color:var(--text)}
.answer em{font-style:italic;color:var(--orange)}
.answer blockquote{border-left:4px solid var(--orange);padding:10px 16px;margin:14px 0;background:#FFF7ED;border-radius:0 8px 8px 0;color:#9A3412;font-size:14px}
.answer code{font-family:"SF Mono","Fira Code","Consolas",monospace;font-size:13px;background:#F3F4F6;padding:2px 6px;border-radius:4px;color:#DC2626}
.answer pre{background:#1C1C1E;color:#E5E7EB;padding:16px 20px;border-radius:12px;overflow-x:auto;margin:14px 0;font-size:13px;line-height:1.7}
.answer pre code{background:none;color:inherit;padding:0;font-size:inherit}
.answer table{width:100%;border-collapse:collapse;margin:14px 0;font-size:13px}
.answer th{background:#F9F8F6;padding:10px 14px;text-align:left;font-weight:700;border-bottom:2px solid var(--border)}
.answer td{padding:10px 14px;border-bottom:1px solid var(--border)}
.answer tr:hover td{background:#FAFAF9}
.answer a{color:var(--orange);text-decoration:underline}
.answer hr{border:0;height:1px;background:var(--border);margin:20px 0}
.answer img{max-width:100%;border-radius:8px}
/* 关联依据高亮样式 */
.std-ref-badge{display:flex;align-items:flex-start;gap:8px;padding:14px 18px;margin-bottom:18px;background:linear-gradient(135deg,#EFF6FF,#F0F9FF);border:1px solid #BFDBFE;border-radius:10px;font-size:13px;line-height:1.8;color:#1E40AF;animation:highlightPulse .6s}
.std-ref-badge .std-ref-icon{font-size:18px;flex-shrink:0;line-height:1.8}
.std-ref-badge .std-ref-text{font-weight:600}
.std-ref-badge .std-ref-list{color:#3B5998}
@keyframes highlightPulse{from{background:#DBEAFE;transform:scale(1.01)}to{background:linear-gradient(135deg,#EFF6FF,#F0F9FF);transform:scale(1)}}
@media(max-width:640px){
  .container{padding:16px}
  h1{font-size:28px}
  .stats{gap:20px}
  .tab{padding:12px 18px;font-size:14px}
  .compare-result.show{grid-template-columns:1fr 1fr;gap:10px}
  textarea{min-height:100px}
  .answer h1{font-size:19px}.answer h2{font-size:16px}.answer h3{font-size:15px}
  .answer pre{font-size:12px;padding:12px 14px}
}
/* ⭐ 彩蛋：世界上最漂亮的人 — 彩色气泡 */
.egg-bubble{margin:0;padding:0;border-radius:20px;overflow:hidden;animation:eggFadeIn .6s ease-out}
@keyframes eggFadeIn{0%{opacity:0;transform:scale(.9) translateY(20px)}100%{opacity:1;transform:scale(1) translateY(0)}}
.egg-dismiss{animation:eggShake .5s ease-in-out}
@keyframes eggShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px) rotate(-2deg)}40%{transform:translateX(10px) rotate(2deg)}60%{transform:translateX(-6px) rotate(-1deg)}80%{transform:translateX(6px) rotate(1deg)}}
.egg-header{background:linear-gradient(135deg,#FF6B9D,#C44B8B);color:#fff;text-align:center;padding:16px;font-size:18px;font-weight:800;letter-spacing:2px;text-shadow:0 1px 3px rgba(0,0,0,.2)}
.egg-hearts{background:linear-gradient(90deg,#FFE4EC,#FFF0F5,#FFE4EC);text-align:center;padding:12px;font-size:24px;letter-spacing:8px}
.egg-body{background:linear-gradient(180deg,#FFF5F7,#FFF0F5,#FFF5F7);padding:24px;line-height:2;font-size:15px;color:#4A1942;text-align:center}
.egg-body p{margin:12px 0}
.egg-hint{font-size:12px;color:#B06A8F;font-style:italic}
.egg-verdict{font-size:20px;font-weight:700;color:#D6336C;padding:16px;background:rgba(255,107,157,.1);border-radius:12px;margin:16px 0!important}
.egg-verdict strong{color:#C44B8B;font-size:24px}
.egg-actions{font-size:13px;color:#8B5E7C}
.egg-btn{display:inline-block;margin:10px auto;padding:12px 32px;border:2px solid #FF6B9D;border-radius:50px;background:#FFF;color:#D6336C;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit}
.egg-btn:hover{background:linear-gradient(135deg,#FF6B9D,#C44B8B);color:#FFF;border-color:transparent;transform:scale(1.05);box-shadow:0 4px 20px rgba(196,75,139,.3)}
.egg-btn:active{transform:scale(.95)}
.egg-footer{background:linear-gradient(135deg,#C44B8B,#FF6B9D);color:rgba(255,255,255,.85);text-align:center;padding:10px;font-size:11px;letter-spacing:1px}

</style>
</head>
<body>
<div class="container">
<div class="header">
  <div class="logo"><div class="logo-icon">AI</div><span class="logo-text">准则AI顾问 <span class="status-dot" id="status-dot"></span></span></div>
  <h1>智能准则<em>答疑</em></h1>
  <p class="subtitle">基于资深技术合伙人知识库，24h在线解答会计准则疑难</p>
  <div class="stats">
    <div class="stat-item"><span class="stat-num" id="kb-count">--</span><span class="stat-label">知识条目</span></div>
    <div class="stat-item"><span class="stat-num" id="kb-queries">24</span><span class="stat-label">在线答疑</span></div>
    <div class="stat-item"><span class="stat-num">可追溯</span><span class="stat-label">引用来源</span></div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('ask',this)">提问答疑</button>
  <button class="tab" onclick="switchTab('compare',this)">风格对比</button>
</div>

<div id="panel-ask" class="panel active">
  <textarea id="input-ask" placeholder="输入你的会计准则问题...&#10;例如：合同资产和应收账款怎么区分？"></textarea>
  <button class="btn" id="btn-ask" onclick="doAsk()">开始查询</button>
  <div class="loading" id="loading-ask"><div class="spinner"></div><span>AI 正在分析中，请稍候...</span></div>
  <div class="error" id="error-ask"></div>
  <div class="result" id="result-ask">
    <div class="result-header">
      <span style="font-size:12px;color:var(--secondary)">匹配知识条目：<span id="match-count-ask">0</span> 条</span>
    </div>
    <div class="answer" id="answer-ask"></div>
    <div class="sources" id="sources-ask"></div>
  </div>
</div>

<div id="panel-compare" class="panel">
  <textarea id="input-compare" placeholder="输入问题，对比专家风格与通用风格的回答差异..."></textarea>
  <button class="btn" id="btn-compare" onclick="doCompare()">开始对比</button>
  <div class="loading" id="loading-compare"><div class="spinner"></div><span>AI 正在进行风格对比，请稍候...</span></div>
  <div class="error" id="error-compare"></div>
  <div class="compare-result" id="result-compare">
    <div class="compare-col">
      <div class="compare-label expert">专家风格</div>
      <div class="answer" id="answer-expert"></div>
    </div>
    <div class="compare-col">
      <div class="compare-label generic">通用风格</div>
      <div class="answer" id="answer-generic"></div>
    </div>
  </div>
</div>

<div class="footer">准则AI顾问 v5.1 - 内置1213条知识库 | 多元可信来源 | 直连DeepSeek | Powered by DeepSeek</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
// ── Markdown 渲染配置 ───────────────────────────────
if(typeof marked !== 'undefined'){
  marked.setOptions({
    breaks: true,        // 换行即 <br>
    gfm: true,           // GitHub Flavored Markdown
    headerIds: false,
    mangle: false
  });
}
function renderMd(text){
  if(!text) return '';
  if(typeof marked !== 'undefined'){
    try { return marked.parse(text); } catch(e){ /* fallback */ }
  }
  // Fallback: 简单的纯文本转HTML
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

var KB = {"qa_count":1143,"std_count":70,"entries":[{"id":"CY1302","q":"⾟苦陈版主了","a":"参阅《企业会计准则应⽤指南汇编2024》第⼗⼆章中的“权益⼯具公允价值的确定”部分（P296～301），⽤千估计授予职⼯期权的定价模型⾄少应考虑下列因素：（ 1) 期权的⾏权价格；（ 2) 期权的期限；（ 3) 基础股份的现⾏价格；(4) 股价的预计波动率；（ 5) 股份的预计股利；（ 6) 期权期限内的⽆⻛险利率。因此，如果采⽤期权定价模型确定权益⼯具公允价值的，则⾄少应披露所采⽤的模型和上述6项参数。如果使⽤的其他模型⽤到其他参数的，则其他重要参数也应⼀并披露。 如果不是采⽤期权定价模型，⽽是采⽤其他模型（例如对于限制性股票的公允价值，采⽤授予⽇股票市价与授予价格之间的差额确定第⼀类限制性股票的公允价值），则据实披露。提问⼈：爬爬呀 时间：2025-05-07 16:22:21 继续追问下：授予⽇权益⼯具公允价值的确定⽅法为根据《企业会计准则第11号⼀股份⽀付》，公司以授予⽇股票收盘价与授予价格之间的差额作为每股限制性股票的股份⽀付成本，将最终确认本激励计划的股份⽀付费⽤。 那么授予⽇权益⼯具公允价值的重要参数为：授予⽇收盘价、股数。⽽不是为历史波动率、⽆⻛险收益率、股息率吧？⾟苦陈版主指导了。回答⼈：chenyiwei 主要参数如我上⾯所回复。当然预期数据⽐单纯的历史数据更重要。提问⼈：爬爬呀 时间：2025-04-27 22:15:31 请问⼀下，前些年运费事项调整，有些上市公司年报中将销售费⽤调整⾄营业成本，这块对应的现⾦流也进⾏追溯调整了，这块是否正确呢？ 回答⼈：chenyiwei 也不是不可以调整。但准则并未规定“购买商品、接受劳务⽀付的现⾦”对应于营业成本，“⽀付其他与经营活动有关的现⾦”对应于期间费⽤。提问⼈：爬爬呀 时间：2025-05-04 16:37:17 是不是这样理解。以运费调整事项为例，准则对此并未涉及到现⾦流的规定，这样追溯调整并不正确。回答⼈：chenyiwei 这并不是原则性问题，调与不调均可。个人理解，供参考。","cat":"股份支付","kw":"公允价值,求助陈版主,⾟苦陈版主了","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第11号——股份支付"},{"id":"CY0386","q":"限售股转让问题","a":"我理解，两种情况都应按派发红股的⽐例相应对每股成本进⾏稀释调整，确保所处置的股份数与原始取得的股份数是基于同⼀⼜径进⾏⽐较。本案例中，因被投资公司上市后利润分配派发红股10送5，故处置股份时每股的实际成 本为最初投资⼊股价格的10/15，即2/3。个人理解，供参考。","cat":"每股收益","kw":"限售股转让问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第34号——每股收益"},{"id":"CY0865","q":"关于被动稀释","a":"⼀般情况下，对于股东实缴出资形成的权益，应当是按照股东的实际出资⽐例由各股东享有的。因此，对被投资企业接受外部股东增资，本企业权益被动稀释的影响，应根据其他股东实缴出资前后的实缴出资⽐例变动情况测 算“其他权益变动”⾦额并进⾏相应账务处理。如该新股东分次出资的，则每次实缴出资时均需计算和确认⼀次。个人理解，供参考。","cat":"每股收益","kw":"关于被动稀释","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第34号——每股收益"},{"id":"CY1561","q":"及各位⾼⼿：其他债权投资的交易费⽤与公允价值的问题","a":"参照IFRS 9第B5.2.2段： The following example illustrates the accounting for transaction costs on the initial and subsequent measurement of a financial asset measured at fair value with changes through other comprehensive income in accordance with either paragraph 5.7.5 or 4.1.2A. An entity acquires a financial asset for CU100 plus a purchase commission of CU2. Initially, the entity recognises the asset at CU102. The reporting period ends one day later, when the quoted market price of the asset is CU100. If the asset were sold, a commission of CU3 would be paid. On that date, the entity measures the asset at CU100 (without regard to the possible commission on sale) and recognises a loss of CU2 in other comprehensive income. If the financial asset is measured at fair value through other comprehensive income in accordance with paragraph 4.1.2A, the transaction costs are amortised to profit or loss using the effective interest method.个人理解，供参考。","cat":"实务综合","kw":"公允价值,求助陈版及各位⾼⼿,其他债权投资的交易费⽤与公允价值的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1441","q":"资产⼊账价值确定","a":"https://bbs.esnai.com/forum.php?mod=viewthread tid=5492710 提问⼈：⽼好⼈6 时间：2025-06-04 21:53:31 请教陈版主，我司与政府进⾏退成⼊ 园交易，需确认换⼊资产的⼊账价值。 已知：⼀是我司的旧仓库与政府给我司建设的新仓库之间的交换；⼆是我司换出资产价值净值703万元，评估价值2000万元；三是政府换⼊资产项⽬财务决算含税⾦额为4400万元，不含税为 4100万元，同时我司聘请第三⽅进⾏评估，评估资产含税价值为4200万元。 问题为：换⼊资产的价值确认。具体为：⼀是如何判断交易是否具有商业实质，如果不具有商业实质，则换⼊资产按换出资产价值进⾏⼊账；⼆是如果具有商业实质，我司与政府交易，⼊账价值是否应按含税价⼊账，以及是⽤项⽬决算⾦额还是评估价⼊账合适。是否有相关的准则或政策依据。 回答⼈：chenyiwei 商业实质是指换⼊资产和换出资产在未来现⾦流量的⾦额、时间、⻛险程度等⽅⾯的区别。对于此处的新旧仓库置换，建议关注新旧仓库在房屋结构、剩余使⽤年限、可使⽤⾯积和仓储容量、仓储条件、运⾏成本等⽅⾯是否存在实质性的差异。如有，则可以认为具有商业实质，以公允价值为基础进⾏该项实物补偿的会计核算。 ⼊账价值应为不含增值税的⾦额。建议了解项⽬决算⾦额和评估值的差异原因（均需换算为不含税⾦额，在此基础上进⾏⽐较），考虑哪个信息更为可靠。提问⼈：⽼好⼈6 时间：2025-06-09 17:24:54 陈⽼师，为什么应该以不含增值税⾦额⼊账呢？这个是否有相关的政策依据？ 回答⼈：chenyiwei 在可以抵扣进项税额的情况下，资产、费⽤的⼊账价值都是不含税的。个人理解，供参考。","cat":"实务综合","kw":"公允价值,资产⼊账价值确定","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1409","q":"关于严格执⾏退市制度的意⻅，相关的财务指标描述","a":"以上交所科创板股票上市规则为例（其他交易所、板块类似）： 12.2.1 本规则所称重⼤违法强制退市，包括下列情形： …… （四）根据中国证监会⾏政处罚决定载明的事实，公司披露的营业收⼊、利润总额或者净利润任⼀年度虚假记载⾦额达到2亿元以上，且超过该年度披露的相应科⽬⾦额绝对值的30%；或者资产负债表中资产和负债科⽬任⼀年度虚假记载⾦额合计达到2亿元以上，且超过该年度披露的年度期末净资产⾦额绝对值的30%（计算资产负债表中资产和负债科⽬虚假记载⾦额合计数时，虚增和虚减⾦额合计计算；本项情形适⽤于2024年度及以后年度的虚假记载⾏为）。 （五）根据中国证监会⾏政处罚决定载明的事实，公司披露的营业收⼊、利润总额或者净利润连续2年虚假记载⾦额合计达到3亿元以上，且超过该2年披露的相应科⽬合计⾦额的20%；或者公司披露的资产负债表中资产和负债科⽬连续2年虚假记载⾦额合计达到3亿元以上，且超过该2年披露的年度期末净资产合计⾦额的20%（计算前述合计数时，相关财务数据为负值的，先取其绝对值再合计计算；计算资产负债表中资产和负债科⽬虚假记载⾦额合计数时，虚增和虚减⾦额合计计算；本项情形适⽤于2024年度及以后年度的虚假记载⾏为）。 （六）根据中国证监会⾏政处罚决定载明的事实，公司披露的年度报告财务指标连续3年存在虚假记载，前述财务指标包括营业收⼊、利润总额、净利润、资产负债表中的资产或者负债科⽬ （本项情形适⽤于2020年度及以后年度的虚假记载⾏为）。 ……个人理解，供参考。","cat":"实务综合","kw":"请教陈版,关于严格执⾏退市制度的意⻅,相关的财务指标描述","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1192","q":"有限合伙企业分配投资款","a":"既然“能核算每个项⽬本⾦和收益”，那就应当“按项⽬投资成本冲减实收资本，项⽬投资收益作为利润分配”。⽬前投资类合伙企业基本采⽤项⽬制，根据单个项⽬结算投资本⾦和收益是完全有条件的。 《合伙企业法》对合伙企业的架构和经营的限制要⽐《公司法》对公司的规范程度更⼩，因此合伙企业的⾃由度更⼤，这在⼀定程度上是因为合伙企业对其债务承担⽆限责任。合伙企业法并不禁⽌合伙企业在总体留存收益为负数的情况下分配合伙企业就某个项⽬获得的收益。⽬前投资类合伙企业的合伙协议基本都会约定合伙企业不得对外举债，因此除了合伙企业的管理费和⽇常运营费⽤所产⽣的经营性负债以外，基本不会有融资性的负债，相应地，此类利润分配对债权⼈利益不会造成重⼤损害，⽆需过度限制或禁⽌。 对于合伙⼈收到投资款的会计处理。如果合伙⼈此前对其合伙份额已采⽤符合准则规定的公允价值计量，则由于此前已将公允价值变动收益体现在损益中，故收到分配款项（不论是以收回本 ⾦还是分配收益的名义）均冲减投资或⾦融资产的账⾯价值；如果因此前条件所限未能进⾏恰当的公允价值计量，⽽是以成本作为对公允价值的最佳估计的，则收到分配款项时，按照分配通知中载明的还本⾦额冲减资产账⾯价值，收益分配⾦额确认为投资收益。个人理解，供参考。","cat":"实务综合","kw":"公允价值,有限合伙企业分配投资款","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0409","q":"及⼤家：商品购销中存在的⼀个问题","a":"理论上，经销商应根据每⽉的进货和销售情况，谨慎判断能否满⾜获得⼚家提供的销售⽀持的条件，并考虑⼚家的信⽤风险，对很可能取得的销售⽀持⾦额予以合理估计，作为对当期采购进货成本的调整。不应完全依据⼚家开来的发票进⾏账务处理，避免各期⽑利率⼤幅波动。 提问⼈：yjhly2011 时间：2024-06-14 12:18:57 陈版主您好，每个⽉能统计出⼚家即供应商给予经销商的各种市场⽀持的⾦额，但当⽉经销商是否进货或进哪⼏个品种的产品及数量不确定。还有这种情况，在5⽉端午节即将到来之即，经销商付款10万元购买⼚家特制的节⽇礼 盒200盒⽤于市场促销，礼盒主要随销售品次⽉⼚家确定返还给经销商10万这部分市场⽀持，即次⽉经销在给⼚家 进货付款时，这10万可以抵货款。所以很纠结如何进⾏账务处理，这些每⽉⼚家给予经销商的市场，如何匹配产品 （现有库存还是待购进）的单位成本，且每次进货的产品品种也不⼀样，每⽉每个产品的库存数量也在不断发⽣变化。希望陈版主指点⼀些建议，谢谢！ 回答⼈：chenyiwei 建议采⽤先进先出或加权平均等⽅式匹配市场⽀持与采购之间的对应关系。个人理解，供参考。","cat":"实务综合","kw":"请教陈版主及⼤家,商品购销中存在的⼀个问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1867","q":"！关于业务分拆账务处理相关问题。","a":"情况⼀： ⼄公司发⾏股份的对象可以是甲或者东⽅公司。如果向东⽅公司发⾏股份，则相当于甲公司先将A业务相关净资产上划到东⽅公司，然后东⽅公司再以这些净资产对⼄公司注资。 如果⼄公司向甲公司发⾏股份，则甲公司将这些净资产的账⾯价值转为对⼄公司的⻓期股权投资成本；⼄公司按同⼀控制下合并处理，对这些净资产按其原账⾯价值⼊账，与新发股份⾯值之间的差额调整资本公积。 如果⼄公司向东⽅公司发⾏股份，则甲公司⾸先将A业务相关净资产转移给东⽅公司，按A业务净资产的账⾯价值依次冲减资本公积（资本溢价）、盈余公积、未分配利润；⼄公司的处理同上。东⽅公司按照这些净资产的账⾯价值借记“⻓期股权投资——⼄公司”，贷记“⻓期股权投资——甲公司”。 如果⼄公司以货币资⾦为对价接受A业务，则甲公司按收到现⾦与A业务相关净资产账⾯价值之间的差额确认为资产处置损益；⼄公司将⽀付的现⾦与取得A业务净资产账⾯价值之间的差额调整权益。 情况⼆：基本处理原则同情况⼀。但有可能⾦额⽅向相反。上⽂中“依次冲减权益”的地⽅会变为增加权益，即贷记资本公积（资本溢价）。个人理解，供参考。","cat":"实务综合","kw":"合并,请教陈版主,关于业务分拆账务处理相关问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1498","q":"收⼊确认问题","a":"此问题取决于2023年度确认收⼊是否构成⼀项前期差错，即：当初2023年内确认收⼊时，是否符合收⼊准则规定的收⼊确认条件，尤其是依据当时B公司的财务状况、还款意愿等来看，是否符合“对价很可能收回”的条件？如果当初2023年符合收⼊确认条件，则有⽆证据表明B公司的财务状况、偿债能⼒的恶化是当初收⼊确认后新出现且当初⽆法合理估计的新情况、新事项所导致？ 如果构成前期差错且影响重⼤的，则应采⽤追溯重述法进⾏更正。 如果不属于前期差错的，则不影响前期已确认的收⼊和成本，⽽是将⽬前的解决⽅案（由A公司将该套专⽤设备及相关⼚房⼀并购⼊）是⼀项新的单独交易，应作为债务重组（以⾮现⾦资产抵偿债务）进⾏会计处理。个人理解，供参考。","cat":"债务重组","kw":"债务重组,求助陈版主,收⼊确认问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第12号——债务重组"},{"id":"CY0189","q":"如何证明股东⽅的债务豁免不是权益性交易？","a":"建议考虑豁免的原因，以及是否本企业确实⽆⼒⽀付该笔款项，同时针对类似债务是否有类似条件的豁免等。 根据《企业会计准则解释第5号》第六条规定：“企业发⽣破产重整，其⾮控股股东因执⾏⼈民法院批准的破产重整计划，通过让渡所持有的该企业部分股份向企业债权⼈偿债的，企业应将⾮控股股东所让渡股份按照其在让渡之⽇的公允价值计⼊所有者权益（资本公积），减少所豁免债务的账⾯价值，并将让渡股份公允价值与被豁免的债务账 ⾯价值之间的差额计⼊当期损益。控股股东按照破产重整计划让渡了所持有的部分该企业股权向企业债权⼈偿债 的，该企业也按此原则处理。”这是实务中唯⼀可以认可股东豁免债务计⼊损益的情形，即在债务⼈发⽣破产重整 时，股东作为债权⼈之⼀，以实质上与其他⾮关联⽅债务⼈相同的债务重组条款豁免了该债务⼈的债务，且股东债权⼈豁免的债务占豁免总额的⽐重应当是不⼤的。个人理解，供参考。","cat":"债务重组","kw":"公允价值,债务重组,请教陈版,如何证明股东⽅的债务豁免不是权益性交易","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第12号——债务重组"},{"id":"CY1218","q":"应收账款转让账务处理","a":"将应收账款出售给第三⽅，不是与债务⼈协商修改债务条件，因此不属于债务重组。应根据《企业会计准则第23号——⾦融资产转移》的相关规定来分析能否终⽌确认该项应收账款，并对该 项出售业务作出相应的会计处理。 如果满⾜终⽌确认条件的，还应关注处置价格的公允性，包括受让⽅是否与本企业之间存在隐蔽的关联⽅关系，其为何愿意出资购⼊⼀项预计可收回⾦额为零的债权等。如果该交易是公允 的，具有合理商业理由，则出售价格⾼于原账⾯价值的差额可确认为“投资收益——⾦融资产终⽌确认损益”；如果因涉及权益性交易的影响，实际上是股东对本企业的资本性投⼊的，则本企业应将该差额计⼊“资本公积——资本溢价或股本溢价”。个人理解，供参考。","cat":"债务重组","kw":"债务重组,应收账款转让账务处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第12号——债务重组、《企业会计准则第23号——⾦融资产转移》"},{"id":"CY1699","q":"债务重组","a":"理论上存在不按照权益性交易处理的可能性。例如，《关于做好上市公司2009年年度报告及相关⼯作的公告》（证监会公告[2009]34号）中提及：“在破产债务重整中，上市公司的控股股东、控股股东控制的其他关联⽅、上市公司的实质控制⼈等以债权⼈身份，通过债权⼈会议等⽅式，同其他债权⼈共同对上市公司做出的实质上相同⽐例的债务豁免，不属于权益性交易。’。但实际操作中对该事项的认可是⾮常严格的。⾸先需要证明⺟公司及其关联⽅并不是破产⼦公司的主要债权⼈，⺟公司不能主导债权⼈会议的表决；其次要证明⾮关联⽅的豁免⽐例是合理的，与该⼦公司的实际财务状况和清偿能⼒相适应。个人理解，供参考。","cat":"债务重组","kw":"债务重组","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第12号——债务重组"},{"id":"CY1785","q":"关于债务重组会计处理。","a":"参照财政部会计司发布的企业会计准则实施问答（ http://kjs.mof.gov.cn/zt/kjzzss/ … 0210425_3691695.htm）:“如果债权⼈与债务⼈间的债务重组是在公平交易的市场环境中达成的交易，放弃债权的公允价值通常与受让资产的公允价值相等，且通常不⾼于放弃债权的账⾯余额。” 故本案例中的抵债资产在债权⼈的⼊账价值不⾼于重组债权的本⾦+利息（包括以前年度未确认的利息收⼊），即5800万元。对于抵债资产公允价值⾼于被抵偿债务本息的200万元不应确认为收益。个人理解，供参考。","cat":"债务重组","kw":"公允价值,债务重组,请教陈版,关于债务重组会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第12号——债务重组"},{"id":"CY0012","q":"⼦公司将固定资产⽆偿划⼊母公司","a":"母公司从⼦公司⽆偿划⼊资产时，母公司应按该资产在⼦公司的原账⾯价值⼊账，同时贷记对该⼦公司的长期股权投资成本，相当于部分收回对该⼦公司的投资，⽽不能贷记母公司⾃⾝的资本公积或者其他权益类科⽬。 ⼦公司按照该项划出资产的账⾯价值，依次冲减资本公积（资本溢价或股本溢价）、盈余公积、未分配利润。个人理解，供参考。","cat":"长期股权投资","kw":"固定资产,⼦公司将固定资产⽆偿划⼊母公司","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"CY1349","q":"重⼤影响的判断","a":"“控制”和“共同控制”是互斥的，不能同时存在于⼀个被投资企业中；但“控制”和“重⼤影响”，以及“共同控制”和“重⼤影响”是可以共存于同⼀个被投资企业中的。根据《监管规则适⽤指引——会计类第1号》之“1-2 重⼤影响的判断”： 重⼤影响的判断关键是分析投资⽅是否有实质性的参与权⽽不是决定权。另外，值得注意的是，重⼤影响为对被投资单位的财务和经营政策有”参与决策的权⼒”⽽⾮”正在⾏使的权⼒”（例如，投资⽅已派驻董事并积极参与被投资⽅的经营管理），其判断的核⼼应当是投资⽅是否具备参与并施加重⼤影响的权⼒，⽽投资⽅是否正在实际⾏使该权⼒并不是判断的关键所在。 投资⽅有权⼒向被投资单位委派董事，⼀般可认为对被投资单位具有重⼤影响，除⾮有明确的证据表明其不能参与被投资单位的财务和经营决策。投资⽅向被投资单位派驻了董事，但存在明确的证据表明其不能实际参与被投资单位的财务和经营决策时，不应认定为对被投资单位具有重⼤影响，例如，存在被投资单位控股股东等积极反对投资⽅欲对其施加影响的事实，可能表明投资⽅不能实质参与被投资单位的经营决策。 就主帖案例⽽⾔，如果⼩股东和⼤股东是⾮关联⽅，⼩股东及其委派的董事可以基于⾃身利益最⼤化的⽴场参与被投资企业财务和经营决策的，则虽然不能单⽅⾯主导这些决策，但仍应认定具有重⼤影响。但如果⼤股东和⼩股东之间存在关联⽅关系的，尤其是⼩股东属于⼤股东的⼦公司的情况，则有可能⼩股东并⽆重⼤影响。 提问⼈：⼤呆呆 时间：2025-04-29 13:13:09 谢谢陈⽼师的回复！学习了《瑞华研究》问题3-1-52（对持股⽐例不到20%，但派⼀名董事的参股公司能否按权益法核算）的内容。其中提到“不能简单地认为仅仅派驻⼀名董事即必然可对被投资单位施加重⼤影响。因为重⼤影响的定义是“投资⽅对被投资单位的财务和经营政策有参与决策的权⼒，但并不能够控制或者与其他⽅⼀起共同控制这些政策的制定”，因此重⼤影响归根结底是要通过在董事会上提出议案和参与表决的⽅式，促使有利于⾃身利益的财务、经营政策⽅⾯的议案获得通过（但对所议事项不具有单⽅⾯的决定权或者否决权）。因此，虽然派驻了董 事，但是如果不能单独提出议案，或者由其他原因导致影响或改变表决结果的潜在可能性较⼩的，则不能认为具有重⼤影响。” 请教：个人理解，供参考。","cat":"长期股权投资","kw":"权益法,重⼤影响的判断","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"CY1709","q":"请问陈版，关于与他⼈合作取得资产包处置后分回利润的核算及税收问题","a":"如果A只是财务投资，不参与具体运作，则A打款给B的500万元应确认为以公允价值计量且其变动计⼊损益的⾦融资产，列报为交易性⾦融资产。后续收回⾦额超出原投资成本的差额确认为投资收益。 如果截⾄期末，整个交易尚未完成，则A应参考竞拍成功的可能性、该批废旧物资的最新市价和预计加⼯成本等因素，合理估计该项⾦融资产的期末公允价值，相应确认公允价值变动损益。提问⼈：菠菜之灵 时间：2025-09-19 10:46:20 感谢陈版，再追问下，A其实是参与具体运作的，合作的⽬的只是双⽅合作资⾦量更⼤，能拿更⼤的标。包括竞拍标的的选择，采购竞拍价上限，销售渠道及最终销售价格都是由双⽅共同决定的。这种情况下，核算⽅式是否有不同。 回答⼈：chenyiwei ⼀般理解还是作为⾦融资产核算。因为虽然可能对该合作项⽬具有重⼤影响，但实务中没有对某个特定项⽬作为⻓投按权益法核算的做法。但实际上，此时作为⾦融资产核算和权益法核算确认份额的结果⽆重⼤差异。 提问⼈：菠菜之灵 时间：2025-09-19 10:48:20 感谢⼤佬解答。税务问题的听懂了，没疑问了。 关于投资款核算的问题，再追问下，A其实是跟B共同管理专项计划，合作以B的名义只是资⾦量更⼤，能拿更⼤的标的。这种情况下，会不会影响核算？ 回答⼈：chenyiwei ⼀般理解不影响。个人理解，供参考。","cat":"长期股权投资","kw":"公允价值,权益法,请问陈版,关于与他⼈合作取得资产包处置后分回利润的核算及税收问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"CY0028","q":"长期股权投资评估增值","a":"2楼的意见总体上是合理的。 在实务中，如果按2楼的做法不切实可⾏的（例如A公司⽆法要求⼄公司以购买⽇为基准⽇进⾏PPA评估），则可以参照原先2006版的《企业会计准则第2号——长期股权投资》应⽤指南中的下列规定，考虑能否接受不按购买⽇公允价值对⼄公司的折旧、摊销、成本结转等进⾏调整： 2．存在下列情况之⼀的，可以按照被投资单位的账⾯净损益与持股⽐例计算确认投资损益，但应当在附注中说明这⼀事实及其原因。 ⽆法可靠确定投资时被投资单位各项可辨认资产等的公允价值； 投资时被投资单位可辨认资产等的公允价值与其账⾯价值之间的差额较⼩； 其他原因导致⽆法对被投资单位净损益进⾏调整。个人理解，供参考。","cat":"长期股权投资","kw":"公允价值,折旧,摊销,长期股权投资评估增值","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第2号——长期股权投资、《企业会计准则第2号——长期股权投资》"},{"id":"CY0055","q":"应收股利分期收取如何⼊账","a":"鉴于分红决议已约定分期⽀付，故应针对该项应收股利中将于⼀年后收取的部分进⾏折现，按折现值确认为对B公司的长期应收款，对应冲减“长期股权投资——B公司（损益调整）”的⾦额也是应收款项的折现值。由此确认的应收股利和长期应收款⾦额之和应⼩于100万元。个人理解，供参考。","cat":"长期股权投资","kw":"应收股利分期收取如何⼊账","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"CY0145","q":",关于处置长期股权投资投资收益确认的问题","a":"不考虑其他情况（如构成对B公司管理层股东的股份⽀付安排等），单纯从转让投资时的成本结转来考虑，则会计上和税务上均采⽤加权平均法确定需转出的成本。个人理解，供参考。","cat":"长期股权投资","kw":"请教陈版主,关于处置长期股权投资投资收益确认的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"CY1310","q":"关于其他权益⼯具投资的公允价值计量","a":"因为被投资⽅A是银⾏，其主要资产和负债是⾦融资产和⾦融负债。如果A对其各项⾦融资产和⾦融负债⼂按⾦融⼯具准则规定核算，则在⽆其他账⾯价值与公允价值之间可能有较⼤差异的资产（如房地产）的情况下，其账⾯净资产与可辨认净资产公允价值基本接近。 但可辨认净资产公允价值并不等于股权的公允价值。尤其是在被投资企业是银⾏，⽽⽬前内地和⾹港股市中银⾏股普遍处于“破净”状态（即市净率低于1）。如果以享有被投资企业净资产份额来计量，就是变相的权益法核算，这个结果不能代表股权的公允价值，因为绝⼤部分企业（即使是⾮上市公司）的市净率也不会刚好等于1。建议咨询评估专业⼈⼠意⻅以合理确定公允价值的估值⽅法。例如，如果该银⾏有明确的现⾦股利政策，每年的现⾦分红⽐较稳定的，则可以采⽤现⾦股利折现法确定其股权的公允价值。 理论上，估值⽅法确定后，可以根据以前年度各年末的参数确定以前年度各年末的公允价值，如与成本差异重⼤的，应作为前期差错予以更正。但实务中⼀般不会将此类差错进⾏追溯重述处理，⽽是当年度⼀次性调整其他综合收益。个人理解，供参考。","cat":"长期股权投资","kw":"公允价值,权益法,求助陈版,关于其他权益⼯具投资的公允价值计量","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"CY1180","q":"⻓投权益法核算，是否需要按投资公司的会计政策对被投资公司进⾏调整","a":"⾸先，虽然权益法核算要求“被投资单位采⽤的会计政策及会计期间与投资⽅不⼀致的，应当按照投资⽅的会计政策及会计期间对被投资单位的财务报表进⾏调整，并据以确认投资收益和其他综合收益等”（《企业会计准则第2号——⻓期股权投资》第⼗⼀条），但主帖提到的坏账准备问题不是会计政策⽽是会计估计，理论上会计估计不是强制要求统⼀的范围。但如果A公司认为B 公司不计提坏账准备的做法是不恰当的，因⽽对其进⾏调整，则应以会计差错更正的名义进⾏。但直接将A本身的坏账准备计提⽅法和⽐例套⽤到B是否合适，仍需讨论。 其次，如果以往⼀贯认为B不计提坏账是差错，则本年度的权益法核算，以及依据权益法核算到年末的⻓期股权投资账⾯价值转⼊持有待售资产时，均应保持差错更正后的计量基础，不应“因为⻢上要出售此部分股权了”就不再持续进⾏该更正。个人理解，供参考。","cat":"长期股权投资","kw":"权益法,持有待售,⻓投权益法核算,是否需要按投资公司的会计政策对被投资公司进⾏调整","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第2号——长期股权投资、《企业会计准则第2号——⻓期股权投资》"},{"id":"CY1425","q":"关于联营企业重⼤影响的判断","a":"这⼀条仅仅是⼀个辅助指标，单凭重⼤交易这⼀点并不能证明重⼤影响必然存在。还需要结合其他因素综合考虑。因为会计上的“重⼤影响”概念针对的是被投资企业的决策机制和治理结构，与业务层⾯的依赖是两个范畴的问题。 ⼀般情况下，只有当投资⽅作为被投资企业的主要收⼊来源具有不可替代性时，“重⼤交易”才能在判断是否构成重⼤影响时纳⼊考虑。如果并⾮具有不可替代性，则不作为构成重⼤影响的理由。 提问⼈：Cpaer2023 时间：2025-06-09 17:24:33 陈⽼师，投资⽅作为被投资企业的主要收⼊来源具有“不可替代性”，这个不可替代性实务中通常会从哪些⽅⾯判断呢？ 回答⼈：chenyiwei 考虑该被投资企业是否专为该投资⽅配套的⽬的⽽建设；获取其他收⼊来源在技术上和经济上是否具有可⾏性和合理性等。个人理解，供参考。","cat":"长期股权投资","kw":"关于联营企业重⼤影响的判断","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"CY1297","q":"关于库存股变动的联营企业权益法计算问题","a":"联营企业回购部分股份作为其库存股，会导致该联营企业发⾏在外的股份数量减少，相应地本企业对该联营企业的持股⽐例会被动上升。不论其是否注销库存股，都是这个效果。由此计算 的“⻓期股权投资——其他权益变动”⾦额应为：【回购前联营企业归⺟权益回购前本企业持股⽐例-回购后联营企业归⺟权益回购后本企业持股⽐例】。其中，回购后联营企业归⺟权益=回购前联营企业归⺟权益-回购价款。 后续联营企业注销库存股时，归⺟权益和本企业的持股⽐例均不再变动，因此对权益法核算没有影响。 后续以库存股对员⼯进⾏股权激励时，需到解锁时才会增加该联营企业的权益和发⾏在外股份数量。在等待期内，投资⽅只需要按照该联营企业确认的股份⽀付费⽤和资本公积，按⽐例确认投资收益（减少）和资本公积（其他资本公积）即可。个人理解，供参考。","cat":"长期股权投资","kw":"权益法,关于库存股变动的联营企业权益法计算问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"CY0010","q":"限制性股票股份⽀付费⽤的递延所得税资产","a":"如果在资本公积转增股本后，⾏权价格按⽐例调整；在分配现⾦股利后，根据每股现⾦股利相应减少⾏权价格，则这两个事项并不影响股份⽀付费⽤的确认和计量。在此情况下，应按照（2023年12⽉31⽇的收盘价-授予⽇价格除 权转换后的价格）*（原始授予数量+转增股份数）来计算2023年年底计算股份⽀付费⽤形成的递延所得税资产。个人理解，供参考。","cat":"所得税","kw":"所得税,递延,限制性股票股份⽀付费⽤的递延所得税资产","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第18号——所得税"},{"id":"CY0123","q":"权益法对⼀个被投公司的核算是先处理被动稀释还是先处理超额 亏损呢？","a":"参考：《监管规则适⽤指引——会计类第3号》之“3-2 权益法下未确认投资净损失后续得到弥补的会计处理”： 权益法核算下，被投资单位所有者权益发⽣变动时，投资⽅应按照其分享⽐例调整长期股权投资账⾯价值（损益调整、其他综合收益及其他权益变动），并相应确认投资损益、其他综合收益及资本公积，以反映被投资单位所有者权益变动情况。如果投资⽅长期股权投资已冲减⾄零并存在未确认的投资净损失，后续当被投资单位的净资产增加时，投资⽅应先按照其分享⽐例以及被投资单位净资产变动项⽬，分别确认相关投资损益、其他综合收益、资本公积以及长期股权投资账⾯价值；再按照当期应享有的被投资单位净资产变动净额与前期未确认的投资净损失两者孰低，确认前期未确认的投资净损失，尚未确认的投资净损失继续在备查簿中登记。 关于《会计类3号》之3-2在实务中的理解和应⽤，建议关注以下两点： 第⼀、投资⽅未确认的投资净损失是否可以由应享有被投资单位未来企业的其他权益变动份额弥补？ 此前，《企业会计准则第2号——长期股权投资》第⼗⼆条和《企业会计准则解释第9号》的规定只是明确了投资⽅未确认的投资净损失可以由应享有被投资单位以后期间的净利润和其他综合收益增加额弥补，但未明确是否可以由应享有被投资单位以后期间除净利润、其他综合收益之外的其他权益（以下简称其他权益）份额弥补。实务中对于该问题存在不同的观点。 在⽬前的实务中，容易引发困惑的⼀个典型场景是：被投资企业属于从事研发项⽬（如新药研发）的项⽬公司，早期研发投⼊较⼤且尚不符合资本化条件，导致重⼤亏损，并由此导致净资产为负数；但后续可通过多轮外部融资使得净资产恢复为正数。这种情况下，导致未确认投资净损失的原因是累计经营亏损（未确认投资损失），⽽导致净资产增加的原因是联营企业取得外部投资（本企业应就分享份额增加资本公积）。 《会计类3号》对《企业会计准则解释第9号》作了⼀定的补充和澄清，要求投资⽅⼀⽅⾯确认更多的资本公积，另 ⼀⽅⾯确认更多的投资损失，由此导致更少的净利润，相对更为谨慎，相关⽰例见【例1】。 【例1】权益法下未确认投资净损失后续得到弥补的会计处理 背景： A上市公司与⾮关联⽅B公司于2×19年12⽉共同投资设⽴了C公司，C公司实收资本1,000万元，其中A公司出资250 万元，占实收资本⽐例为25%。截⾄2×20年6⽉30⽇，C公司已累计亏损1,500万元，净资产为-500万元。2×20年7⽉ 1⽇，C公司引进外部投资者D公司，D公司增资⾦额5,000万元，增加实收资本250万元，增资价格为20元/股。该增资事项完成后，C公司实收资本变为1,250万元，其中A公司占⽐20%、B公司占⽐60%、D公司占⽐20%。增资前 后，A公司均对C公司具有重⼤影响。A公司并⽆其他实质上构成对C公司的净投资的长期权益，也没有承担额外损失的义务。 问题： 2×20年7⽉1⽇，D公司对C公司增资后，C公司净资产由负数转为正数，A公司是否需要确认以前未确认的投资净损失？ 分析： 按《会计类3号》的意见，A公司于2×20年7⽉1⽇应先按照其分享⽐例以及C公司净资产变动项⽬，确认相关资本公积以及长期股权投资账⾯价值： 借：长期股权投资——其他权益变动 1,000（5,000*20%） ——损益调整 50（-250/25% 5%） 贷：长期股权投资——成本 50（250/25% 5%） 资本公积——其他资本公积 1,000 然后，按照当期应享有的被投资单位净资产变动净额1,000万元与前期未确认的投资净损失100万元（原未确认的投资净损失-125万元/25% 20%）两者孰低，确认前期未确认的投资净损失： 借：投资收益 100 贷：长期股权投资——损益调整 100 经前述处理后，“长期股权投资——损益调整”在增资前余额-250万元，由于被动稀释视同处置5%股权，转出其中- 50万元，再恢复确认此前未确认的超额亏损100万元后余额为-300万元。相关业务在D公司对C公司增资前后的具体对照： 损益调整 -250 （-1,500 20%）-300 其他权益变动 （5,000 20%）1,000 * 账⾯价值合计 0 900 A公司未确认的投资净损失 -125 0 投资⽅在确认应享有被投资单位净资产变动份额时，应当以取得投资时被投资单位可辨认净资产的公允价值持续计量⾄资产负债表⽇的账⾯价值为基础。【例1】中，C公司为A公司发起新设，因此A公司取得对C公司投资时C公司净资产账⾯价值=公允价值。 ** 增资后“长期股权投资——成本”余额200万元，⽐增资后C公司实收资本1,250万元的20%少50万元，原因在于： D公司对C公司增资的5,000万元，其中250万元计⼊了实收资本，但是该250万元中A公司应享有的20%的份额50万元，A公司将其作为“被投资单位除净损益、其他综合收益和利润分配以外所有者权益的其他变动”计⼊“长期股权投资——其他权益变动”中。 第⼆、在被投资单位实现净利润或其他综合收益增加净额时，投资⽅弥补前期投资⽅未确认的投资净损失如何根据本期增加净额的类型进⾏具体操作？ 《企业会计准则解释第9号》要求是先以本期增加净额的分享额“根据登记的未确认投资净损失的类型”弥补前期未 确认投资净损失，有剩余的再按权益法确认投资收益和其他综合收益等；《会计类3号》则是先根据本期增加净额 的类型确认投资收益和其他综合收益等，再将前期未确认的投资净损失（以当期应享有的增加净额为限）予以确认 ⼊账。在具体操作层⾯，实务中对《企业会计准则解释第9号》的规定存在不同理解，《会计类3号》之3-2对其进 ⾏补充和澄清，以促进会计准则在资本市场的⼀致有效执⾏。【例2】中的情形三和情形四体现了执⾏《会计类3 号》之3-2后更明确、合理的会计处理结果。 【例2】权益法下未确认投资净损失后续得到弥补的会计处理背景： A公司持有B公司20%股权，可以对B公司构成重⼤影响。2×21年因B公司持续亏损，A公司对B公司超额亏损应承 担份额10万元仅在账外备查登记。为简化，假设A公司并⽆其他实质上构成对B公司的净投资的长期权益，也没有承担额外损失的义务，A公司取得对B公司投资时B公司净资产账⾯价值=公允价值，本例中也⽆需考虑企业所得税的影响。 情形⼀：2×22年B公司实现净利润40万元。 情形⼆：2×22年B公司实现的净利润为60万元。 情形三：B公司2×22年实现净利润40万元，实现其他综合收益20万元。情形四：B公司2×22年仅实现了其他综合收益20万元。 问题： 2×22年度，A公司应如何对前期未确认的投资净损失进⾏弥补并相应调整长期股权投资账⾯价值？ 分析： 按《企业会计准则解释第9号》的规定： （⼀）投资⽅当期对被投资单位净利润和其他综合收益增加净额的分享额⼩于或等于前期未确认投资净损失的，根据登记的未确认投资净损失的类型，弥补前期未确认的应分担的被投资单位净亏损或其他综合收益减少净额等投资净损失。 （⼆）投资⽅当期对被投资单位净利润和其他综合收益增加净额的分享额⼤于前期未确认投资净损失的，应先按照以上（⼀）的规定弥补前期未确认投资净损失；对于前者⼤于后者的差额部分，依次恢复其他长期权益的账⾯价值和恢复长期股权投资的账⾯价值，同时按权益法确认该差额。 投资净损失包括了净亏损与其他综合收益减少额两个类型。情形⼀和情形⼆下，由于2×22年B公司实现了净利润， 与前期A公司未确认的投资净损失产⽣的原因是因为B公司的净亏损，类型匹配，因此实务执⾏中不存在争议，A 公司对情形⼀和情形⼆的处理结果如下： 情形 长期股权投资账⾯价值恢复（减少以“-”表⽰） 期末未确认投资净损失的构成损益调整 其他综合收益 ⼩计 净利润 其他综合收益 ⼩计 但是，是否能⽤某⼀类型的增加额弥补前期未确认的另⼀类型的减少额，实务中存在不同理解。在情形三和情形四下，能否⽤享有的2×22年B公司实现的其他综合收益增加额的份额弥补前期未确认的净亏损承担额，根据不同的理解，可能存在以下处理结果： 观点⼀、在理解和执⾏《企业会计准则解释第9号》“投资⽅当期对被投资单位净利润和其他综合收益增加净额的分享额”与“前期未确认投资净损失”的⼤⼩关系时，分别类型⽐⼤⼩，相应的处理结果分步考虑如下： 第⼀步，“当期对被投资单位净利润的分享额”⼩于“前期未确认投资净亏损”，同时确认“当期对被投资单位其他综合收益增加净额的分享额”： 情形 长期股权投资账⾯价值恢复（减少以“-”表⽰） 期末未确认投资净损失的构成损益调整 其他综合收益 ⼩计 净利润 其他综合收益 ⼩计 情 形 三 0 4 4 -2 0 -2 情 形 四 0 4 4 -10 0 -10 第⼆步，经第⼀步处理后，长期股权投资账⾯价值回升，根据《企业会计准则第2号——长期股权投资》第⼗⼆条规定的“投资⽅确认被投资单位发⽣的净亏损，应当以长期股权投资的账⾯价值以及其他实质上构成对被投资单位净投资的长期权益减记⾄零为限”，以第⼀步调整后的长期股权投资账⾯价值与前期未确认的投资净损失孰低为 限，确认前期未确认的投资净损失，会计处理结果为： 情形 长期股权投资账⾯价值恢复（减少以“-”表⽰） 期末未确认投资净损失的构成损益调整 其他综合收益 ⼩计 净利润 其他综合收益 ⼩计 观点⼆、在理解和执⾏《企业会计准则解释第9号》“投资⽅当期对被投资单位净利润和其他综合收益增加净额的分享额”与“前期未确认投资净损失”的⼤⼩关系时，按两类型的合计⽐⼤⼩，相应的处理结果为： 情形 长期股权投资账⾯价值恢复（减少以“-”表⽰） 期末未确认投资净损失的构成损益调整 其他综合收益 ⼩计 净利润 其他综合收益 ⼩计 按《会计类3号》的规定： 《会计类3号》赞同前述观点⼀的处理。前述不同观点下的会计处理结果对2×22年度A公司的利润表影响为： 情形 观点⼀ 观点⼆ 净利润 其他综合收益 综合收益总额 净利润 其他综合收益 综合收益总额 按《会计类3号》⽀持的观点⼀处理，A公司在情形三和情形四下⼀⽅⾯确认更多的其他综合收益，另⼀⽅⾯确认更多的投资损失，由此导致更少的净利润，相对更为谨慎。个人理解，供参考。","cat":"所得税","kw":"公允价值,所得税,权益法,资本化,请教陈版主,权益法对⼀个被投公司的核算是先处理被动稀释还是先处理超额,亏损呢","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第18号——所得税、《企业会计准则第2号——长期股权投资》"},{"id":"CY1269","q":"股份⽀付计⼊研发费⽤可以加计扣除的部分计提递延所得税问题","a":"如果股份⽀付费⽤在计⼊研发费⽤（仅限于费⽤化⽀出）后，同样可以享受100%的加计扣除（此问题请查阅税法规定和咨询税务专业⼈⼠意⻅确认），则计算未来预计可以税前抵扣⾦额时应使⽤【公允价值数量2】计算可扣除⾦额。其中对应于会计上确认的股份⽀付费⽤的2倍的部分，对应贷记“所得税费⽤——递延所得税费⽤”，超出部分贷记资本公积。 提问⼈：爬爬呀 时间：2025-04-20 21:41:32 追问下：《企业会计准则应⽤指南汇编2024》，有这样⼀个案例，即针对研发费⽤这块，不管是否资本化，应该都不会涉及到确认递延所得税资产的情况。麻烦陈版主再指导下，⾟苦陈版了 【例18-2】⼄企业当期发⽣研究开发⽀出共计2000万元，其中，研究阶段⽀出400万元，开发阶段符合资本化条件前发⽣的⽀出为400万元，符合资本化条件后⾄达到预定⽤途前发⽣的⽀出为1200万元。税法规定，研究开发⽀出未形成⽆形资产计⼊当期损益的，按照研究开发费⽤实际发⽣额的100%在税前加计扣除；形成⽆形资产的，按照⽆形资产成本的200%在税前摊销。假定开发形成的⽆形资产在当期期末已达到预定⽤途（尚未开始摊销）。 本例中，⼄企业当期发⽣的研究开发⽀出中，按照第七章⽆形资产规定应予费⽤化的⾦额为800万元，形成⽆形资产的成本为1200万元，即期末所形成⽆形资产的账⾯价值为1200万元。 ⼄企业当期发⽣的2000万元研究开发⽀出，按照税法规定可在当期税前扣除的⾦额为1600万元（费⽤化⾦额800万元+100%加计扣除⾦额800万元）。所形成⽆形资产在未来期间可予税前扣除的⾦额为2400万元，其计税基础为2400万元，形成暂时性差异1200万元。 该内部开发形成的⽆形资产的账⾯价值与其计税基础之间产⽣的1200万元暂时性差异系资产初始确认时产⽣的，确认该资产时既不影响会计利润也不影响应纳税所得额，按照本章规定，不确认暂时性差异的所得税影响。 回答⼈：chenyiwei 该例⼦中所说的不确认递延所得税资产，是指本期发⽣的资本化开发⽀出，以及本期发⽣且本期直接享受加计扣除的费⽤化⽀出。⽽你的案例是本期发⽣费⽤化⽀出，但加计扣除是在后期享受。所以不适⽤该案例。个人理解，供参考。","cat":"所得税","kw":"公允价值,所得税,递延,资本化,摊销,请教陈版,股份⽀付计⼊研发费⽤可以加计扣除的部分计提递延所得税问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第18号——所得税"},{"id":"CY1860","q":"各⾃然⼈股东出资价格不⼀致是否存在个⼈所得税的⻛险，本次增资还不是同⽐例增资，价格也不⼀致，如果涉及个⼈所得税，应该怎么计算个税呢还请陈版主以及版内各位⽼师帮忙解答","a":"增资价格低于1元，意味着注册资本并未缴⾜，所以是不符合法律法规规定的。因此最低增资价格为1元。如果被投资公司的每1元实收资本对应的净资产公允价值低于1元，要以该公允价值作价增资的，则⼀般采⽤新股东先按元作价增资，然后原股东再按零对价或者名义总价1元转让部分存量股份给新股东的做法。 税务问题建议咨询税务专业⼈⼠意⻅。提问⼈：⼤呆呆 时间：2025-12-04 14:05:44 陈版，您看是否这样理解：甲⽅⼄⽅共同投资丙⽅。甲投资 1000，⼄⽅投资500，丙⽅实收资本1500。经运营丙⽅亏损600万元，增资时丙⽅净资产900万元（1500-600）假如同公允价值，净资产每股0.6元。甲⽅增资500万元，折股833.33万股。 此时甲⽅占⽐：1833.33÷2000=91.96% 折合股本：2000×91.67%=1833.33 ⼄⽅应零对价转给甲⽅的股本为：1833.33-1500=333.33 这样理解正确吗？ 回答⼈：chenyiwei 甲⽅增资500万元，折股833.33万股，则模拟的丙⽅总股本要达到1500+833.33=2333.33万股，甲⽅占1833.33/2333.33=78.57%，根据实际只能增加注册资本500万来算，甲⽅增资后应获得注册资本份额=2000*78.57%=1571.429万股，与增资后甲所占的注册资本份额1000+500=1500相⽐，相差71.429万股，所以⼄⽅应⽆偿转让71.429万元注册资本给甲⽅。个人理解，供参考。","cat":"所得税","kw":"公允价值,所得税,各⾃然⼈股东出资价格不⼀致是否存在个⼈所得税的⻛险,本次增资还不是同⽐例增资,价格也不⼀致,如果涉及个⼈所得税,应该怎么计算个税呢还请陈版主以及版内各位⽼师帮忙解答","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第18号——所得税"},{"id":"CY0836","q":"集团公司收到政府补贴后注⼊控股⼦公司如何记账","a":"从上述规定来看，应按规定增加B对你公司的出资额，需按规定办理增资⼿续。 参考：《关于印发加强企业财务信息管理暂⾏规定的通知》（财企[2012]23号）第⼋条： 第⼋条 企业财务信息管理单位在年度决算⼯作中，应当加强决算质量的审核，同时关注企业收到和使⽤财政性资⾦及其带动社会资本的有关情况。 企业收到的财政性资⾦应当纳⼊企业预算管理，实现资⾦统⼀管控，提⾼财政性资⾦使⽤的整体效益。企业收到资本性财政性资⾦，列作国有实收资本或股本，企业股东(⼤)会或董事会、经理办公会等决策机构应当出具同意注 (增)资的书⾯材料。企业⼀个会计年度内多次收到资本性财政性资⾦的，可暂作资本公积，但应在次年履⾏法定程序转增国有实收资本或股本；发⽣增资扩股、改制上市等事项，应当及时转增。 企业集团母公司将资本性财政性资⾦拨付所属全资或控股法⼈企业使⽤的，应当作为股权投资。母公司所属控股法⼈企业暂⽆增资扩股计划的，列作委托贷款，与母公司签订协议，约定在发⽣增资扩股、改制上市等事项时，依法将委托贷款转为母公司的股权投资。 企业收到费⽤性财政性资⾦，列作收益，符合《财政部国家税务总局关于专项⽤途财政性资⾦企业所得税处理问题的通知》(财税[2011]70号)规定不征税条件的，可作为不征税收⼊。企业按规定将费⽤性财政性资⾦拨付所属全 资或控股法⼈企业使⽤，中间拨付环节企业均作为往来款项。个人理解，供参考。","cat":"所得税","kw":"所得税,集团公司收到政府补贴后注⼊控股⼦公司如何记账","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第18号——所得税"},{"id":"CY1541","q":"股份⽀付还是利润分享计划","a":"股份⽀付和利润分享计划的⼀个重要区别在于其退出⽅式，即激励对象能否通过正常的退出途径，完全享有或承担其获授的激励股权的公允价值变动相关收益或损失。如果可以，则为股份⽀付；如不是，则不是股份⽀付，可能仅为利润分享计划。 在主帖案例中，“员⼯每年按上述约定向执⾏事务合伙⼈提出转让其财产份额，转让⽐例不超过其名下持股平台财产份额总数的百分之三⼗五的，经执⾏事务合伙⼈同意，由执⾏事务合伙⼈或其指定的第三⼈购买,价格即按该等财产份额对应的甲⽅股份的市场公允价格确定，如市场⽆明确定价，以拟转让时财产份额对应的甲⽅净资产值确定;或者由执⾏事务合伙⼈决定，将持股平台转让员⼯所持A公司相应股份所得的收益，向员⼯分配，⼄⽅同时减少其对持股平台的财产份额。”为此需要进⼀步核实公允价值确定的具体⽅法，确定其是否符合股份⽀付准则应⽤指南关于权益⼯具公允价值确定的相关要求。如果对此不明确的，则鉴于⾮上市公司股权直接获取公允价值信息难度较⼤，可暂不按照股份⽀付处理，但后续实际退出时员⼯获得的收益需补充确认职 ⼯薪酬费⽤。 提问⼈：爬爬呀 时间：2025-07-14 09:17:38 追问下，如何判定激励对象是否为通过正常的退出途径呢？ 回答⼈：chenyiwei 即，激励对象能否根据其⾃⼰的意愿，在有序交易中出售其所获得的激励股权，对于出售交易对象、出售时间、价格等均不受限制。个人理解，供参考。","cat":"所得税","kw":"公允价值,股份⽀付还是利润分享计划","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第18号——所得税"},{"id":"CY0857","q":"重新出报告，递延所得税确认的问题","a":"这个问题的关键是判断2022年时预计后续仍将适⽤⼩微企业优惠税率，故持续按⼩微企业优惠税率确认递延所得税资产的做法，是否构成前期差错。 参照《监管规则适⽤指引——会计类第1号》之“1-24 区分会计估计变更和差错更正”：“企业不应简单将会计估计与实际结果对⽐认定存在差错。如果企业前期作出会计估计时，未能合理使⽤报表编报时已经存在且能够取得的可靠信息，导致前期会计估计结果未恰当反映当时情况，则应属于前期差错，应当适⽤前期差错更正的会计处理⽅法； 反之，如果企业前期的会计估计是以当时存在且预期能够取得的可靠信息为基础作出的，随后因资产和负债的当前状况及预期经济利益和义务发⽣了变化⽽变更会计估计的，则属于会计估计变更，应当适⽤会计估计变更的会计处理⽅法。”。 据此，就本案例，应关注最终结果与2022年末的估计之间存在差异的原因，考虑该差异原因是否为2022年末之后新出现且站在2022年末这⼀时点上难以合理预见的事项；2022年末作出这⼀估计时是否已经全⾯、综合分析考虑了当时已存在且可以合理获取的所有信息。 如果2022年末不构成前期差错的，则此次重新出具报告时对2022年末的递延所得税计量仍维持原先的处理。个人理解，供参考。","cat":"所得税","kw":"所得税,递延,请教陈版,重新出报告,递延所得税确认的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第18号——所得税"},{"id":"CY0235","q":"递延所得税资产","a":"这种情形下应注意区分前期确认递延所得税资产是否属于前期差错。 根据《监管规则适⽤指引——会计类第1号》之“1-24 区分会计估计变更和差错更正”： 企业不应简单将会计估计与实际结果对⽐认定存在差错。如果企业前期作出会计估计时，未能合理使⽤报表编报时已经存在且能够取得的可靠信息，导致前期会计估计结果未恰当反映当时情况，则应属于前期差错，应当适⽤前期差错更正的会计处理⽅法；反之，如果企业前期的会计估计是以当时存在且预期能够取得的可靠信息为基础作出 的，随后因资产和负债的当前状况及预期经济利益和义务发⽣了变化⽽变更会计估计的，则属于会计估计变更，应当适⽤会计估计变更的会计处理⽅法。 即，企业在第⼀年确认递延所得税资产时，是否存在对当时已颁布实施的税法规定的误解或误⽤，即误以为某个项 ⽬可以在税前扣除，但实际上是不可以扣除的？如果是，则属于前期差错，应按前期差错更正处理；如果此前依据当时的税法规定是可以扣除的，但后续资产负债表⽇后修改了税法规定，变为不得扣除，则不属于前期差错，⽽是会计估计变更。个人理解，供参考。","cat":"所得税","kw":"所得税,递延,递延所得税资产","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第18号——所得税"},{"id":"CY1394","q":"坏账准备可以确认递延资产吗？","a":"作为⼀般原则，根据现⾏的企业所得税法律法规，当企业有累积未弥补亏损，且尚未超出税法规定的税前补亏年限（如5年或10年）时，其在补亏期间获得的应纳税所得额⾸先⽤于弥补税务亏损，到税务亏损弥补完后有剩余的应纳税所得额时才需要计算纳税。相应地，对税前补亏期间递延所得税资产的确认也应体现出税法规定的这⼀顺序，即：在未来的税前补亏年限内预计可获得的应纳税所得额的限度内，⾸先应当确认与可弥补亏损相关的递延所得税资产，只有当已就所有的尚未超出税前补亏期限的可弥补亏损均确认了递延所得税资产后，如果预测税前补亏期间可获得的应纳税所得额⼤于需在税前弥补的累计亏损，才能在剩余的预计应纳税所得额的限度内，就资产、负债的账⾯价值和计税基础之间的可抵扣暂时性差异（如资产减值准备）确认相应的递延所得税资产。 即，亏损企业在尚未⾜额就可抵扣亏损确认递延所得税资产之前，原则上不应就可抵扣暂时性差异确认递延所得税资产。个人理解，供参考。","cat":"所得税","kw":"减值,所得税,递延,请教陈⽼师,坏账准备可以确认递延资产吗","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第18号——所得税"},{"id":"CY0120","q":"已资本化的研发项⽬研发失败的后续处理","a":"如果在进⼊资本化阶段后发⽣研发项⽬的失败或终⽌，则⾸先将截⾄失败或终⽌前的所有研发⽀出均确保列⼊“研发⽀出——资本化⽀出”，然后针对该项资本化研发⽀出计提减值准备。即，进⼊资本化阶段后，同⼀研发项⽬不应再有费⽤化的研发⽀出。 计提减值准备后如何核销，取决于公司的研发项⽬管理制度和资产减值准备核销管理制度如何规定。⼀般情况下， 如果公司作出彻底停⽌⼀个研发项⽬的决策，通常也就意味着相关的资产及其减值准备可以进⾏核销处理。具体可参阅财政部发布的《企业资产损失财务处理暂⾏办法》（财企[2003]233号）、国资委印发的《中央企业资产减值 准备财务核销⼯作规则》（国资发评价[2005]67号）、国家税务总局发布的《企业资产损失所得税税前扣除管理办法》（国家税务总局公告[2011]25号）等规定。个人理解，供参考。","cat":"所得税","kw":"减值,所得税,资本化,已资本化的研发项⽬研发失败的后续处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第18号——所得税"},{"id":"CY1307","q":"⽤能权不建议作为使⽤寿命不确定的⽆形资产。多数企业购⼊该权利是为了项⽬⾃⽤，因此建议在对应的建设项⽬的折旧年限内摊销。此类⽤能权⽆活跃市场，后续能否转让有重⼤不确定性，不应将后续转让作为其未来经济利益实现的主要⽅式。","a":"如前所述，个⼈不赞同作为使⽤寿命不确定的⽆形资产。回售权产⽣的现⾦流⼊需要考虑其实现的可能性、预计转售价格和预计转售时间等因素，有重⼤不确定性。提问⼈：爬爬呀 时间：2025-04-30 16:24:36 ⾟苦陈版主了。如果是其他资产作为使⽤寿命不确定的⽆形资产，那么如何考虑回售权对减值测试的影响呢？ 回答⼈：chenyiwei 如前所述，回售的不确定性很⼤，不建议作为主要考虑。基于简化考虑，建议回售的现⾦流量按零考虑，该⽤能权对应的经济利益流⼊仅限于作为资产组的⼀部分，通过主营业务的⽣产经营获取的现⾦流。 提问⼈：爬爬呀 时间：2025-05-06 17:08:09 继续追问⼀下，⾟苦陈版主了。像使⽤寿命不确认的⽆形资产进⾏减值测试时不考虑回售权的影响。是否同这个案例原理⼀样“减值测试时不考虑股东的回购承诺的影响，将回购承诺看作⼀项单独的衍⽣⼯具处理。 ”原贴⻅《陈版主，求助⻓投减值问题 https://bbs.esnai.com/thread-5047469-1-1.html (出处: 中国会计视野论坛)》 同时像我问道的⽆形资产回售权，为何不考虑作为⼀项单独的衍⽣⼯具呢？ 回答⼈：chenyiwei个人理解，供参考。","cat":"资产减值","kw":"减值,折旧,摊销,⽤能权不建议作为使⽤寿命不确定的⽆形资产,多数企业购⼊该权利是为了项⽬⾃⽤,因此建议在对应的建设项⽬的折旧年限内摊销,此类⽤能权⽆活跃市场,后续能否转让有重⼤不确定性,不应将后续转让作为其未来经济利益实现的主要⽅式","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第8号——资产减值"},{"id":"CY1433","q":"销售时先计提资产减值损失90元，其他业务收⼊、成本确认10元，此处理其他业务⽑利为0，亏损体现在资产减值损失科⽬。请教陈版主哪个⽅法更加合理？","a":"这种情况下，退回的商品应按成本与可变现净值孰低作为⼊账价值，即在预计应收退货成本时，就应考虑退回商品发⽣减值的可能性，将预计的退货损失计⼊营业成本中。这样，将退回的⽆法修复的不良品作为废料销售时，其收⼊等于成本，⽑利为零。 即，在测算应收退货成本时，需考虑收回的退货报废的可能性，针对可作为正常商品出售和需报废处理两种情况分别测算可变现净值，并确保应收退货成本的⼊账⾦额不⾼于成本与可变现净值孰低。 主帖中的⽅法2虽然计提了资产减值损失，但确认时点在实际收到退货时，可能偏晚，也不是很恰当的做法。提问⼈：xiongmao12 时间：2025-06-04 18:06:16 感谢陈版主解答。我理解您的意思是在预计退货率的时候，就把这块退货可能得损失考虑进去。但是在实际操作层⾯会涉及复杂的估计，因为退回产品是否可以返修以及是否能够返修成功均有不确定性，如果均采⽤估计数去做，可能反⽽存在调节利润的空间。所以是否⽅案2在⼀定程度上也是可以接受的，⾄少能够保证进⼊当期利润表的减值数据是完整、准确的 回答⼈：chenyiwei 实务中也有⼀定的可接受性。个人理解，供参考。","cat":"资产减值","kw":"减值,销售时先计提资产减值损失90元,其他业务收⼊,成本确认10元,此处理其他业务⽑利为0,亏损体现在资产减值损失科⽬,请教陈版主哪个⽅法更加合理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第8号——资产减值"},{"id":"CY0044","q":"⼦公司⽆偿转让债权债务给母公司的会计处理","a":"母⼦公司之间转移债权债务的交易属于权益性交易。 ⼦公司在转移债权给母公司之前，应根据⾦融⼯具准则相关规定对其进⾏减值测试，谨慎计提坏账准备。在此基础上：个人理解，供参考。","cat":"资产减值","kw":"减值,⼦公司⽆偿转让债权债务给母公司的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第8号——资产减值"},{"id":"CY0372","q":"求肋陈版以及各位⼤神，关于银⾏收回已核销贷款的会计处理问题","a":"如主帖所述，在收回已核销的贷款时，应进⾏恢复原已被核销的贷款减值准备的会计处理。相应地，在期末贷款减值准备应有余额⼀定的前提下（贷款减值准备年末的应有余额是根据模型测算⽽得到的），也就由于这部分减值准备的恢复，相应减少了期末应补提的准备⾦额，在主帖表格中就体现为“重新计量”这⼀⾏⾦额的减少。所以最终仍然是平衡的。 提问⼈：frankmylove 时间：2024-05-18 00:00:58 版主的回复是合理的。 另外有⼀个类似的问题，就是转让⾦融资产的时候，⼀般⾦融资产根据信⽤减值模型可能计提了减值准备，是不是如果是处于第⼀/⼆阶段的话，专卖的时候不⽤核销减值准备（即账⾯价值不变），如果是处于第三阶段的简直准 备的话，账⾯价值就要扣除相应的减值准备了? 回答⼈：chenyiwei 不⼀定是与处于哪⼀阶段有关，⽽是与采⽤组合计提⽅式还是单项计提⽅式有关。如采⽤单项计提⽅式的，则终⽌确认时需同时转销对应的减值准备；组合计提则不需要。个人理解，供参考。","cat":"资产减值","kw":"减值,求肋陈版以及各位⼤神,关于银⾏收回已核销贷款的会计处理问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第8号——资产减值"},{"id":"CY1163","q":"请教持有破净上市公司股权减值问题","a":"单纯从公允价值计量⽽⾔，活跃市场上的交易价格是公允价值的第⼀层次，故应以交易所的交易价格作为公允价值。 但是，因为是以权益法核算的⻓期股权投资，⽽为了减值测试之⽬的，可收回⾦额是“公允价值减去处置费⽤的净额”和“未来现⾦流量现值”两者中的较⾼者，故还应测算未来现⾦流量现值，即根据未来盈利预测测算其若⼲年内可分配的现⾦股利，取其折现值。从该B公司的状况⽽⾔，其未来现⾦流量现值应不会低于股价。 四部委《关于严格执⾏企业会计准则 切实做好企业2023年年报⼯作的通知》（财会[2023]29号）：“对于采⽤权益法核算的⻓期股权投资，当被投资⽅股价出现明显下跌且远低于被投资单位净资产的账⾯价值时，表明投资⽅对被投资单位的该项⻓期股权投资存在减值迹象，投资⽅应当对该项⻓期股权投资估计可收回⾦额，可收回⾦额应当根据该项⻓期股权投资的公允价值减去处置费⽤后的净额与该项⻓期股权投资预计未来现⾦流量的现值两者之间较⾼者确定。”。个人理解，供参考。","cat":"资产减值","kw":"公允价值,减值,权益法,请教持有破净上市公司股权减值问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第8号——资产减值"},{"id":"CY0092","q":"在建⼯程-减值准备","a":"⾸先要考虑：以前年度因⽆法办理权证⽽计提减值准备的做法是否构成前期差错？例如，⽆法办理权证是否影响该固定资产的正常使⽤？为何以前⽆法办理权证⽽现在办理成功了？ 如果以前年度计提在建⼯程减值准备是属于差错的，则进⾏差错更正处理。 如果以前年度计提在建⼯程减值准备是合理的，不属于前期差错，但本期受制于资产减值准备“⼀经计提不得转 回”的规定，⽆法转回前期计提的减值准备，则在转固时将在建⼯程减值准备平移到固定资产减值准备中，相应减少以后期间应计提的折旧额。个人理解，供参考。","cat":"资产减值","kw":"减值,固定资产,折旧,请教陈版主,在建⼯程-减值准备","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第8号——资产减值"},{"id":"CY0578","q":"组合销售存货跌价测试","a":"这种情况应当以A、B、C产品的销售组合为基础，按照组合内各种商品的成本（或市场单独售价）⽐例将该组合 的销售总价进⾏分摊。据此合理确定各种产品各⾃的可变现净值。再分别与对应的存户账⾯价值相⽐较，不应直接按照标价作为该种商品可变现净值的确定依据。 另外，根据《企业会计准则第1号——存货》第⼗⼋条：“企业通常应当按照单个存货项⽬计提存货跌价准备。对于数量繁多、单价较低的存货，可以按照存货类别计提存货跌价准备。与在同⼀地区⽣产和销售的产品系列相关、具 有相同或类似最终⽤途或⽬的，且难以与其他项⽬分开计量的存货，可以合并计提存货跌价准备。”本案例中必须组合使⽤的ABC三种产品就属于“与在同⼀地区⽣产和销售的产品系列相关、具有相同或类似最终⽤途或⽬的，且难以与其他项⽬分开计量的存货”，故也可以按组合计提跌价准备。个人理解，供参考。","cat":"资产减值","kw":"合并,存货跌价,组合销售存货跌价测试","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第8号——资产减值、《企业会计准则第1号——存货》"},{"id":"CY1544","q":"建设项⽬地下砂⽯资源经营权","a":"假设此处的“建设项⽬地下砂⽯资源经营权”（以下简称经营权）的收益法评估是合理的，商业开发利⽤⽅案是切实可⾏的，则该交易实际上相当于是⼄公司在获得该经营权后，将其在未来⼀定年限内的相关权益转让给某施⼯单位（需注意是否为排他转让，以及每年的转让价款是否固定或可确定）。 如果未来5年内权益转让的价款是固定或可确定的，且为排他性的转让，则应按照该项⽆形资产的变相处置进⾏会计处理，确认处置损益。剩余第6-10年的经营权仍可以确认为⽆形资产（该部分⽆形资产在头5年内不摊销）。 如果未来5年内权益转让的价款有较⼤不确定性，取决于被授权⽅的效益，则属于许可他⼈使⽤本企业资产，仍可确认为⽆形资产，并在10年内摊销。理论上摊销⽅法应为产量法最为恰当。如果产量⽆法合理估计的，也可以采⽤平均年限法。但需合理关注减值问题。个人理解，供参考。","cat":"资产减值","kw":"减值,摊销,建设项⽬地下砂⽯资源经营权","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第8号——资产减值"},{"id":"CY1764","q":"⺟公司A单体报表的处理：原⼦公司-1130万元未分配利润调减⺟公司留存收益，⺟公司因前期进⾏⻓投减值⽽产⽣的差额，计⼊资本公积借：资产 70","a":"《企业会计准则解释第7号》第四条规定：“原⺟公司对该原⼦公司⻓期股权投资的账⾯价值与按上述原则将原⼦公司的各项资产、负债等转⼊原⺟公司后形成的差额，应调整资本公积；资本公积不⾜冲减的，调整留存收益。”按照这⾥的字⾯意思，则⺟公司对被吸收合并的⼦公司的⻓期股权投资账⾯价值（零）与取得⼦公司净资产负数-330万元之间的差额330应计⼊资本公积处理。但该做法是否合理是值得商榷的，个⼈理解是对于此前已计提的减值准备余额，应以已计提的减值准备为限转⼊留存收益更合理。 提问⼈：⼤呆呆 时间：2025-10-28 16:39:29 陈版，以前年度计提的坏账准备能否在吸收当期转回资产减值损失，计⼊利润表？ 回答⼈：chenyiwei 不建议，这不是真正的⼦公司信⽤状况恢复。事实上⼦公司的信⽤状况并⽆改善。个人理解，供参考。","cat":"资产减值","kw":"减值,合并,⺟公司A单体报表的处理,原⼦公司-1130万元未分配利润调减⺟公司留存收益,⺟公司因前期进⾏⻓投减值⽽产⽣的差额,计⼊资本公积借","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第8号——资产减值"},{"id":"CY0741","q":"债务重组 修改收款节点形成展期","a":"对于此类修改债务条件，⾸先应判断该条款修改是否为实质性的。由于本案例中该项应收账款的原实际利率为零， 故延长付款期限的安排虽然会导致债权⼈延迟收回现⾦⽽承担资⾦时间价值损失，但这部分损失在会计上是很难体现出来的，即会计上不会因为该项债务延期⽽⽴即确认信⽤减值损失。 修改条件后的债权，账龄应延续计算。但对于发⽣过债务重组的债权，其信⽤风险特征均有特殊性，故建议尽可能采⽤个别认定法计提准备。 提问⼈：877046713 时间：2024-09-13 15:14:50 陈⽼师，债权⼈需不需要将分期收款⾦额折现确认⼀项新债权，新债权与原债权的差额确认投资收益回答⼈：chenyiwei 区分是否构成实质性修改⽽有所不同，详见上⾯回复。个人理解，供参考。","cat":"资产减值","kw":"减值,债务重组,修改收款节点形成展期","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第8号——资产减值"},{"id":"CY0007","q":"[求助] 实收资本确认问题","a":"由于注册资本和实收资本以⼈民币表⽰，且各⽅（股东、外汇局、银⾏）均确认该⼈民币100元注册资本已到位， 故贷记实收资本100，借记资本公积——资本溢价0.02。 下一页 陈版主（陈奕蔚老师）答疑历史文章（2024年02月） 粤ICP备18107660号 粤公网安备44060602000887号 关于网站 Copyright © 2021-2026 会计便利店 hjyweb.cn 【个人理解，供参考。","cat":"实务综合","kw":"[求助],实收资本确认问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1895","q":"关于同控合并的准则差异以及PRC下个报处理的探讨","a":"问题1：基本赞同你的理解。 问题2：对同⼀控制下合并是否只能采⽤⼀种⽅法是值得讨论的问题。个⼈意⻅是笼统规定只能采⽤⼀种⽅法并不合理，应区分是否具有商业实质（从合并⽅本身的⻆度来看，⽽不是从最终控制⽅⻆度来看）采⽤不同的处理⽅法。即具有商业实质的⽤购买法，不具有商业实质的（例如同⼀实控⼈下的业务为了IPO⽬的进⾏的重组）⽤权益结合法。另外，对不公允的交易对价部分应按权益性交易原则处理。 问题3：对于出售⽅⾃身报表，在确保交易价格公允且具有商业实质的前提下，应可确认处置收益。超过标的股权公允价值的交易对价按权益性交易原则处理。提问⼈：ZLY326 时间：2025-12-15 10:46:15 陈版，关于问题3再追问⼀下，实务中，同控交易定价更多的是我压根都不出评估报告，所以我压根都不知道交易价格的多少是在公允价值，多少是超过。这种情况下，对出售⽅的股权处置， 是否也按照权益性交易处理⽐较合适？⽽⾮计⼊投资收益？ 回答⼈：chenyiwei 理论上计⼊资本公积并不恰当。个人理解，供参考。","cat":"实务综合","kw":"公允价值,合并,【请教陈版】关于同控合并的准则差异以及PRC下个报处理的探讨","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0654","q":"参与股权上翻，⾦融资产是否终⽌确认？","a":"参与被投资企业的股权上翻，由持有A公司股权变为持有⼄公司的股权，原先持有的A公司股权投资这⼀⾦融资产 应当终⽌确认，同时按公允价值初始确认⼀项新的⾦融资产，即对⼄公司的其他⾮流动⾦融资产（或者其他权益⼯具投资），此时原先累计的其他综合收益应转⼊留存收益。 但在实务中，仍需关注该交易是否具有商业实质，例如⼄公司是否仅持有A公司的100%股权⽽没有其他经营性资 产或负债；⼄公司股票在境内外上市的可能性是否显著⼤于A公司等。如果⼄公司仅持有A公司的100%股权，且上市可能性并⽆重⼤差异，则该交易可能是没有商业实质的。此时如借机变更⾦融资产的分类等，则需谨慎关注其中可能涉及的舞弊风险。 提问⼈：lijun613 时间：2024-08-16 11:51:06 感谢陈版回复。如果没有商业实质，那应该延续原来核算⽅式继续持有该项资产，原计⼊综合收益的变动也不能结转到未分配利润吧？ 回答⼈：chenyiwei 持股⽐例较低的情况下，⼀般此类上翻交易不具有商业实质的可能性较⼩。个人理解，供参考。","cat":"实务综合","kw":"公允价值,参与股权上翻,⾦融资产是否终⽌确认","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0480","q":"关于偿还股权分置改⾰代为垫付股份的会计处理","a":"对于被被垫付的这部分⾮流通股股东，在被垫付的时点（即股权分置改⾰的完成时点，该部分股东所持股份获得流通权时），⼀⽅⾯因所持股份获得流通权，其估值体系相应发⽣变化，应确认公允价值的相应增加（确认公允价值变动损益或者其他综合收益），另⼀⽅⾯也承担了向上市公司⼤股东偿还被垫付股份的义务，该部分义务属于以公允价值计量且其变动计⼊损益的⾦融负债。即账务处理应为： 借：交易性⾦融资产（或其他权益⼯具投资）——公允价值变动贷：其他流动/⾮流动负债 贷：公允价值变动损益（或其他综合收益） 后续偿还股份时：借：其他流动/⾮流动负债，贷：交易性⾦融资产（或其他权益⼯具投资）——成本、公允价值变动 如果被垫付股份发⽣于企业会计准则⾸次执⾏⽇之前，则应在⾸次执⾏企业会计准则之⽇按照《企业会计准则第38 号——⾸次执⾏企业会计准则》及相关专家⼯作组意见规定进⾏衔接调整处理；后续在⾸次执⾏2017年修订后的⾦融⼯具准则之⽇，按照2017年修订后⾦融⼯具准则中的衔接规定进⾏调整处理。个人理解，供参考。","cat":"实务综合","kw":"公允价值,关于偿还股权分置改⾰代为垫付股份的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0909","q":"关于永续债划分为⾦融负债or权益⼯具的问题","a":"⽬前⼀般做法是：由国资委直接⾏使出资⼈职责的集团公司本部，或者集团公司下的全资⼦企业，如发⾏永续债要分类为权益⼯具的，都将“按规定上缴国有资本收益除外”作为“利润分配”的例外条款，以免“上缴国有资本收益”这 ⼀强制性的法定义务触发永续债中的强制付息条款。没有该除外条款的，反⽽可能导致被分类为⾦融负债。有了该除外条款的，可能可以接受分类为权益。 提问⼈：gpqg 时间：2024-11-12 17:12:04 陈版，加上“除上缴国有资本收益的除外”这⼀条，为什么就可能分类为权益⼯具呢？其内在逻辑是什么呢？ 我的理解，像国资委等从本质上来说也是这些国企的股东，如果加上这⼀条，那么对其他股东是否公平呢，要不分红就都不分红，有这么⼀个特殊的条款，是否没有做到⼀视同仁？ 回答⼈：chenyiwei 其他企业是否分红完全由股东会（属于企业⾃⾝权⼒机构）决定，即视同企业可以⾃⾏决定是否分红；但上缴国有资本收益属于法定义务，企业不能通过⾃⾝⾏为避免该项义务。个人理解，供参考。","cat":"实务综合","kw":"请教陈版,关于永续债划分为⾦融负债or权益⼯具的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0704","q":"为融资，政府将公办学校校产作为股东出资是否合法","a":"公办学校校舍属于公益性资产，不符合在企业会计体系下爱确认为资产的条件，不得⽤作对平台公司增资。 根据《财政部 发展改⾰委 ⼈民银⾏ 银监会关于制⽌地⽅政府违法违规融资⾏为的通知》（财预[2012]463号）第三条： 三、加强对融资平台公司注资⾏为管理 地⽅政府对融资平台公司注资必须合法合规，不得将政府办公楼、学校、医院、公园等公益性资产作为资本注 ⼊融资平台公司。严格执⾏《⼟地管理法》等有关规定，地⽅政府将⼟地注⼊融资平台公司必须经过法定的出让或划拨程序。以出让⽅式注⼊⼟地的，融资平台公司必须及时⾜额缴纳⼟地出让收⼊并取得国有⼟地使⽤证；以划拨 ⽅式注⼊⼟地的，必须经过有关部门依法批准并严格⽤于指定⽤途。融资平台公司经依法批准利⽤原有划拨⼟地进 ⾏经营性开发建设或转让原划拨⼟地使⽤权的，应当按照规定补缴⼟地价款。地⽅各级政府不得将储备⼟地作为资产注⼊融资平台公司，不得承诺将储备⼟地预期出让收⼊作为融资平台公司偿债资⾦来源。个人理解，供参考。","cat":"实务综合","kw":"为融资,政府将公办学校校产作为股东出资是否合法","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1446","q":"审计助理求助","a":"作为⼀个⾮法⼈的会计主体，分公司的会计处理与其他会计主体并⽆本质区别，仅是其与总部和其他分公司的往来和营运资⾦拨付⽅⾯存在特殊性，例如分公司没有实收资本概念，接受上级 （总部）拨⼊的营运资⾦⼀般通过往来科⽬核算，或者设置“上级拨⼊资⾦”科⽬；⼀般也没有资本公积和盈余公积科⽬。只设置未分配利润科⽬。 分公司通常独⽴缴纳增值税等流转税费，但不是独⽴的企业所得税纳税主体，是否需在分公司报表中体现其盈利或亏损对整体公司所得税的影响，应与委托⽅协商确定，并在编制基础中予以说明。 审计报告⼀般需遵循《中国注册会计师审计准则第1601号——审计特殊⽬的财务报表的特殊考虑》及其应⽤指南的规定，明确报告⽬的和⽤途、分发范围和使⽤限制等。这些内容需与报表附注的“编制基础”部分中的相应表述对应。个人理解，供参考。","cat":"所得税","kw":"所得税,审计助理求助","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第18号——所得税"},{"id":"CY1149","q":"请教⼀下关于明股实债的问题","a":"“实收资本”科⽬的确认和计量实际上在很⼤程度上是由相关交易或事项的法律形式决定的。虽然是明股实债，但投资协议约定需增加被投资企业的实收资本，且投资⽅的出资完全符合《公司法》等法律、⾏政法规和部⻔规章所规定的出资形式要件的，则被投资企业也应当计⼊实收资本。同时，如果被投资⽅负有回购义务的，则应就该项回购义务确认⼀项⾦融负债，对应借记资本公积。这样，⼀⽅⾯增加实收资本，另⼀⽅⾯减少资本公积，最终对权益总额的影响为零，这样处理就兼顾了法律形式和经济实质要求。 后续如果由被投资企业通过减资的⽅式实现投资⼈退出的，则借：其他应付款（或⻓期应付款等代表回购义务的⾦融负债科⽬，下同），贷：银⾏存款；同时：借：实收资本，贷：资本公积。 如果由股东收购该项明股实债股份，解除被投资企业的回购义务的，则被投资企业应于回购义务解除时：借：其他应付款，贷：资本公积。个人理解，供参考。","cat":"实务综合","kw":"陈版主,请教⼀下关于明股实债的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0826","q":"对于单独补偿，停⼯停产损失补偿、清退实际使⽤⼈及承租⼈费⽤、安置职⼯费为1千万元，抵减停⼯停产成本、承租⼈费⽤、安置费等其他费⽤性⽀出后，剩余⾦额作为政府补助，确认递延收益-与收益相关，计⼊当期损益。","a":"可参照《监管规则适⽤指引——会计类第3号》之“3-10 搬迁补偿事项的会计处理”所述原则处理，原⽂如下： 对于企业收到的不满⾜专项应付款确认条件（“因公共利益进⾏搬迁”以及”政府从财政预算直接拨付”）的搬迁补偿款，⼀般情况下认为，在满⾜市场化原则、补偿价格公允的前提下，该款项实质上是政府为取得⼟地使⽤权等资产向企业⽀付的交易对价。对于实践中存在的各类搬迁补偿名⽬，企业通常应当将其整体作为资产处置对价进⾏会计处理，除⾮有确凿证据表明搬迁补偿款存在政府补助成分（如提前搬迁奖励款等附带额外政策条件和使⽤条件的奖励），且政府补助与资产处置部分能够明确区分，则对于政府补助部分，企业应当按照政府补助准则相关规定进⾏会计处理。 对于企业为履⾏上述资产处置交易⽽发⽣的房屋及其他附属物拆除损失、搬迁费⽤、停产停业期间⽀付的职⼯薪酬等费⽤，如果预计能够通过未来资产处置对价予以补偿的，企业可以按照流动性将其暂时计⼊其他流动资产或其他 ⾮流动资产，在处置资产终⽌确认时转⼊损益，否则应当在相关费⽤发⽣时计⼊损益。 在本案例中，赞同作为资产处置处理，包括将停⼯停产损失补偿、清退实际使⽤⼈及承租⼈费⽤、安置职⼯费⽤等也纳⼊资产处置损益范畴⼀并在完成“腾房交地”时并⼊资产处置损益（此前发⽣的此类⽀出在确保可通过补偿款收回的前提下，可以暂时作为其他流动资产或者其他⾮流动资产挂账）。 对于是否适⽤《企业会计准则第42号——持有待售的⾮流动资产、处置组和终⽌经营》，关键是看被征收的⼟地和房屋是否满⾜“持有待售资产”的定义和确认条件，尤其是“根据类似交易中出售此类资产或处置组的惯例，在当前 状况下即可⽴即出售”这⼀条件是否满⾜（即在签约时已处于闲置状态，⼀旦签约可随时搬迁）。如不满⾜该条件 的，则直接按固定资产、⽆形资产等具体资产项⽬的处置处理。 提问⼈：595699395 时间：2024-10-12 23:06:12 问题是，如果是在全民所有制时期根据95年的规定记⼊资本公积，改制时点仍按照划拨⼟地管理，若按照财务通则，或应⽤企业会计准则，在95年的规定已经废⽌的前提下，在那个时点仍保留资本公积是否正确？ 回答⼈：chenyiwei 虽然现在已废⽌了当初确认该部分资本公积所依据的原规定，但并不表明以前年度确认资本公积的处理是差错，所以应继续保留这部分资本公积。 提问⼈：595699395 时间：2024-10-16 14:38:22 陈版，是否可考虑会计政策变更？因为原⽂件废⽌，企业会计准则也没有相应的规定，且划拨地公司没有所有权， ⽆法控制，也不作为增资，亦不属于政府补助，在⾸次应⽤企业会计准则的时点，是否应作为政策变更？ 回答⼈：chenyiwei 不应作为政策变更。作为历史遗留问题，仍延续原先的会计处理。个人理解，供参考。","cat":"政府补助","kw":"递延,持有待售,固定资产,对于单独补偿,停⼯停产损失补偿,清退实际使⽤⼈及承租⼈费⽤,安置职⼯费为1千万元,抵减停⼯停产成本,承租⼈费⽤,安置费等其他费⽤性⽀出后,剩余⾦额作为政府补助,确认递延收益-与收益相关,计⼊当期损益","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第16号——政府补助、《企业会计准则第42号——持有待售的⾮流动资产、处置组和终⽌经营》"},{"id":"CY1719","q":"关联⽅和关联交易","a":"“，处置⼦公司后12个⽉内上市公司A仍将公司B认定为关联⽅”是证券监管规则的要求，不是会计准则⽅⾯的要求，因此在会计准则中（即附注中披露关联⽅交易时）是没有这个问题的。会计处理遵循实质重于形式原则，但不会机械地将这种情况⼀定认定为关联⽅交易。关键是是否存在某些交易不公允、不具有商业合理性的迹象。个人理解，供参考。","cat":"关联方披露","kw":"关联⽅和关联交易","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第36号——关联方披露"},{"id":"CY0008","q":"现⾦流量表预付账款性质划分","a":"此类问题⽆明确规定，实务中做法也不⼀致。两种做法都有道理。如果是作为应收项⽬，则是考虑了其资产属性 （属于⾮货币性的债权）；如果是作为应付的抵减，则是从“同属于采购循环”这⼀点考虑的。 其他流动资产（进项税重分类）可以作为经营性应收项⽬。个人理解，供参考。","cat":"实务综合","kw":"现⾦流量表预付账款性质划分","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0026","q":"浮动等待期的确定","a":"本案例同时涉及业绩条件和服务期限条件，且两类条件互相影响。理论上，应针对每个激励对象的具体情况和公司的考核政策（每个等级的⽐例、各激励对象以往的考核等级等）对各考核对象在等待期内的业绩考核等级进⾏合理估计，并结合各考核对象的司龄，据此合理估计每个考核对象的等待期。如果不能合理估计的，则基于谨慎原则， 先按照最短等待期（如4年）予以暂估。后续每个资产负债表⽇进⾏会计估计变更。 对于考核评级低的情形将相应延长服务期限，因签署协议时员⼯知悉该情形，且不属于对股权激励⽅案的修改，则仍需要根据实际情况对股权激励费⽤进⾏调整，并不构成对可⾏权条件的不利修改。 在等待期内公司向所有股东分红（包括持股平台），但持股平台员⼯离职时，分红不撤销，不影响可⾏权⽇的判断。但影响回购义务（如有）的确认和计量。 提问⼈：shengmeiqin 时间：2024-02-22 12:38:10 陈⽼师，中审众华研究什么时候能发布回答⼈：chenyiwei ⽬前还在修改和审核中。因为现已进⼊忙季，所以有所延迟。抱歉！个人理解，供参考。","cat":"股份支付","kw":"求助陈版,浮动等待期的确定","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第11号——股份支付"},{"id":"CY0806","q":"租赁付款变动后使⽤权资产变化","a":"这种情况是租赁变更，是租约条款变更引起的，不是会计政策变更或者前期差错更正，不应追溯到变更⽣效之前。所以应将变更后的剩余租赁期内现⾦流折现到变更⽣效⽇⽽不是初始的租赁期开始⽇。虽然可能导致后续剩余租赁期间内使⽤权资产的折旧与变更前差异重⼤，但这是反映了变更前后的真实情况。 “上述案例如果⽤未来4年的租赁付款折现到现在时点，使⽤权资产是要调增的，⽽租赁付款额是减少的”为何会出 现这种情况？因为在租赁变更部分不构成单独租赁的情况下，基本的处理思路就是将租赁负债的变动⾦额相应同⽅向调整使⽤权资产，所以使⽤权资产和租赁负债都是同增同减，不应出现⽅向相反的变化。 提问⼈：zl7476 时间：2024-10-08 17:03:48 “上述案例如果⽤未来4年的租赁付款折现到现在时点，使⽤权资产是要调增的，⽽租赁付款额是减少的”为何会出 现这种情况？因为在租赁变更部分不构成单独租赁的情况下，基本的处理思路就是将租赁负债的变动⾦额相应同⽅向调整使⽤权资产，所以使⽤权资产和租赁负债都是同增同减，不应出现⽅向相反的变化 这是因为 在使⽤权资产确认的时候，后⾯4年的租赁付款折现到当时的时点，是⼀个⽐较⼩的数字。但是在现在这个租赁期限还剩下4年的时候，虽然租赁付款额是减少了，但是折现到现在这个时点的，实际测算下来，使⽤权资产反⽽增加了，简单的例⼦就是后⾯4年 100元/年折现到10年前，和95元/年折现4年，年折现率在4.8%，⽼师请看以下我的计算草稿，是不是有错误？ 折现率 4.80% 租⾦ npv 0 779.72 1 100 95.42 2 100 91.05 3 100 86.88 4 100 82.9 5 100 79.1 租⾦ npv 6 100 75.48 338.45 7 100 72.02 1 95 90.65 8 100 68.72 2 95 86.5 9 100 65.58 3 95 82.54 10 100 62.57 4 95 78.76 后4年 400 268.89 380 338.45 回答⼈：chenyiwei 你的理解有误。租赁负债（包括后4年的）在租赁期间内，本来就因为利息的确认⽽导致其账⾯价值不断增加，此时将租赁变更后的租赁付款额折现值与同⼀时点变更后折现值相⽐较，⼤概率是调减的。 提问⼈：zl7476 时间：2024 10-14 11:24:23 继续请教⽼师，上楼⽼师回复的是对的，这个案例⾥⾯，未来4年租赁付款额调整后，剩余租赁负债是减少的（未 来总租赁付款额-利息，这2个数字都有减⼩，相减也是减⼩），但是，未来使⽤权资产是调增的，因为未来租赁付款额折现到现在这个时点，也就是未来4年减少的租赁付款额，折现到现在这个时点，⾦额是⼤于原来租⾦折现到10年前时点的，导致，使⽤权资产调增，租赁负债减少，这样调整分录该如何表述呢？ 回答⼈：chenyiwei 不应有这个问题，租赁变更中对使⽤权资产和租赁负债的调整应当是⾦额和⽅向都相同的。个人理解，供参考。","cat":"租赁","kw":"租赁,折旧,租赁付款变动后使⽤权资产变化","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁"},{"id":"CY0036","q":"【请教陈版！】递延所得税在跨准则下是否需要计提的讨论","a":"基本赞同主帖中的理解。本案例中的使⽤权资产和租赁负债的计税基础应依据X国税法的规定确定。个人理解，供参考。","cat":"租赁","kw":"租赁,所得税,递延,【请教陈版,】递延所得税在跨准则下是否需要计提的讨论","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁"},{"id":"CY0877","q":"关于固定资产出租后原计提的减值准备转回的问题","a":"在原制度下，固定资产减值准备的转回处理应遵循“关于执⾏《企业会计制度》和相关会计准则有关问题解答 （四）”（财会[2004]3号）第四条的规定，如下： 四、问：企业对于已经计提了减值准备的固定资产和⽆形资产，如果在以后期间其价值得以恢复，应如何进⾏会计处理？ 答：企业对于已经计提了减值准备的固定资产，如果有迹象表明以前期间据以计提固定资产减值准备的各种因素发⽣了变化，使得固定资产的可收回⾦额⼤于其账⾯价值的，对以前期间已计提的固定资产减值准备应当转回。 企业转回已计提的固定资产减值准备时，应按不考虑减值因素情况下应计提的累计折旧与考虑减值准备因素情况下计提的累计折旧之间的差额，借记”固定资产减值准备”科⽬，贷记”累计折旧”科⽬；按固定资产可收回⾦额与不考虑减值因素情况下计算确定的固定资产账⾯净值两者中较低者，与价值恢复前的固定资产账⾯价值之间的差额， 借记”固定资产减值准备”科⽬，贷记”营业外⽀出–计提的固定资产减值准备”科⽬。转回已计提的固定资产减值准 备后，固定资产的账⾯价值不应超过不考虑减值因素情况下计算确定的固定资产账⾯净值。 ⽆形资产计提了减值准备后，当表明⽆形资产发⽣减值的迹象全部消失或部分消失，⽽将以前年度已确认的减值损失予以全部或部分转回的，企业应按不考虑减值因素情况下计算确定的⽆形资产账⾯价值与其可收回⾦额进⾏⽐较，以两者中较低者，与价值恢复前的⽆形资产账⾯价值之间的差额，借记”⽆形资产减值准备”科⽬，贷记”营业 外⽀出–计提的⽆形资产减值准备”科⽬。 企业对于本问题解答发布之前已经转回的固定资产或⽆形资产减值准备，其会计处理与本问题解答的规定不⼀致的，应进⾏追溯调整。 即，减值准备转回的条件是“有迹象表明以前期间据以计提固定资产减值准备的各种因素发⽣了变化，使得固定资产的可收回⾦额⼤于其账⾯价值”，与⽤于出租没有直接关系。但⽤于租赁这⼀事项可能对其未来现⾦流量的预测产⽣影响，从⽽导致此前计提的减值准备转回。 若出租构成融资租赁，根据原2001版《企业会计准则——租赁》的规定，在租赁开始⽇，出租⼈应当将租赁开始⽇最低租赁收款额作为应收融资租赁款的⼊账价值，并同时记录未担保余值，将最低租赁收款额与未担保余值之和与其现值之和的差额记录为未实现融资收益。由于该准则下对租赁内含利率的定义是“在租赁开始⽇，使最低租赁收 款额的现值与未担保余值的现值之和等于租赁资产原账⾯价值的折现率”，因此实际上是将租赁收款额和租赁资产 原账⾯价值之间的差额均作为未实现融资收益，不单独确认资产处置损益。个人理解，供参考。","cat":"租赁","kw":"减值,租赁,固定资产,折旧,请教陈版,关于固定资产出租后原计提的减值准备转回的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁"},{"id":"CY0625","q":"同⼀集团下母⼦公司交易","a":"根据《国务院国资委关于优化中央企业资产评估管理有关事项的通知》（国资发产权规[2024]8号）： ⼆、进⼀步优化资产评估和估值事项 (⼀)中央企业及其⼦企业发⽣以下经济⾏为时，依照相关法律和企业章程履⾏决策程序后，可以不对相关标的进⾏评估： 符合国资监管有关规定⽆偿划转股权、资产； 履⾏出资⼈职责的机构对国家独资、全资出资企业增资、减资； 国有独资、国有全资企业之间进⾏交易； 企业原股东同⽐例增资、减资； 有限责任公司整体变更为股份有限公司或者股份有限公司变更为有限责任公司，股东及其持股⽐例不变； 中央企业内部同⼀控制下的母公司与其独资、全资⼦企业之间，或独资、全资⼦企业之间以及股东及其持股⽐例完全相同的⼦企业之间进⾏交易； 解散注销未发⽣债务或已将债务清偿且不涉及⾮货币资产在不同股东之间分配的企业，或资产、负债由原股东承继的⼀⼈有限责任公司； 拟通过公开挂牌⽅式转让⽆法获取标的企业资料的参股股权以及账⾯原值低于500万元(含500万元)的存货、固定资产等，或出售、租赁能够获取公开市场价格的房产。 (⼆)中央企业及其⼦企业发⽣以下经济⾏为时，依照相关法律和企业章程履⾏决策程序后，可以聘请专业机构对相关标的进⾏估值： 标的为境外企业或资产的交易； 并购上市公司； 标的为原创性技术、前沿性技术、涉密技术、“卡脖⼦”关键核⼼技术、战略性新兴产业企业，以及主要任务为研发⾸台(套)装备、⾸批次材料、⾸版次软件等产品且尚未形成稳定销售收⼊的企业的交易； 中央企业管理基⾦按照市场惯例对外投资或转让所持股权； 标的为有限合伙企业份额的交易。 除上述第⼀种情形集团公司应当履⾏备案程序外，其他经济⾏为涉及的估值事项管理⽅式和管理内容，包括管理主体、备案主体、审核主体、⼯作程序、估值机构选聘、估值结果使⽤等，由中央企业制定估值项⽬管理制度予以明确，并报送国务院国资委。 可对照上述规定，确定本次交易是否属于上述可不进⾏资产评估的情况。如是可以以标的公司经审计的账⾯净资产为基础确定交易价格。个人理解，供参考。","cat":"租赁","kw":"租赁,固定资产,同⼀集团下母⼦公司交易","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁"},{"id":"CY1214","q":"先合理预测⼀下20年期间的每年⼩⻨收购价格，确定⼀个相对合理的价格，然后乘以总的⼩⻨数量，进⾏折现，确认使⽤权资产和租赁负债，当明确了各年的实际⼩⻨收购价，与预测的存在差异，不调整使⽤权资产价值和租赁付款额，将租赁付款额之间的差额直接计⼊当期损益；","a":"每年的租⾦按照固定的⼩⻨数量乘以当年的⼩⻨收购价格确定，这是租赁农地的⼀种常⻅租⾦确定⽅式，属于“取决于指数或⽐率的可变租赁付款额”。根据《企业会计准则第21号——租赁 （2018年修订）》第⼗⼋条规定，取决于指数或⽐率的可变租赁付款额在初始计量时根据租赁期开始⽇的指数或⽐率确定的⾦额计⼊使⽤权资产和租赁负债。 根据租赁准则第⼆⼗六条规定：“在租赁期开始⽇后，根据担保余值预计的应付⾦额发⽣变动，或者因⽤于确定租赁付款额的指数或⽐率变动⽽导致未来租赁付款额发⽣变动的，承租⼈应当按照变动后租赁付款额的现值重新计量租赁负债。在这些情形下，承租⼈采⽤的折现率不变；但是，租赁付款额的变动源⾃浮动利率变动的，使⽤修订后的折现率。”。第⼆⼗七条规定：“承租⼈在根据本准则第⼆⼗五条、第⼆⼗六条或因实质固定付款额变动重新计量租赁负债时，应当相应调整使⽤权资产的账⾯价值。使⽤权资产的账⾯价值已调减⾄零，但租赁负债仍需进⼀步调减的，承租⼈应当将剩余⾦额计⼊当期损益。”。即，本案例中后续⼩⻨收购价发⽣变动时，需按变动后的⼩⻨收购价重新测算后续剩余租赁期内的付款额，并按原折现率折现到发⽣变动之⽇， 据此对使⽤权资产和租赁负债的账⾯价值进⾏相应调整。 提问⼈：SSSS1111 时间：2025-03-31 09:58:08 陈⽼师，如果第五年年估计的⼩⻨收购价和实际有差异，前四年没有差异；是不是把从第五年和后续年度的租赁付款额重新折现到第五年，然后据此调整账⾯使⽤权资产和租赁负债？ 回答⼈：chenyiwei 是。个人理解，供参考。","cat":"租赁","kw":"租赁,先合理预测⼀下20年期间的每年⼩⻨收购价格,确定⼀个相对合理的价格,然后乘以总的⼩⻨数量,进⾏折现,确认使⽤权资产和租赁负债,当明确了各年的实际⼩⻨收购价,与预测的存在差异,不调整使⽤权资产价值和租赁付款额,将租赁付款额之间的差额直接计⼊当期损益","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁、《企业会计准则第21号——租赁 （2018年修订）》"},{"id":"CY1609","q":"租赁期满租赁资产恢复⾄租赁条款约定状态预计将发⽣的成本现值。回答⼈：chenyiwei","a":"i\" tabindex=\"-1\"> 租赁期满租赁资产恢复⾄租赁条款约定状态预计将发⽣的成本现值。回答⼈：chenyiwei 3、租赁期满租赁资产恢复⾄租赁条款约定状态预计将发⽣的成本现值。回答⼈：chenyiwei 租赁期开始⽇初始确认的时候，使⽤权资产≠租赁负债，并不等同于满⾜初始确认豁免的条件。仍应就两者初始计量⾦额中的孰低者（如使⽤权资产扣除预付的租⾦后，等于租赁负债）确认等额的递延所得税资产和负债。 主帖中的3项确实是使得使⽤权资产的初始计量⾦额不同于租赁负债初始计量⾦额的因素，但3将预计恢复⽀出的折现值确认为预计负债⽽不是租赁负债，但并不导致在租赁期开始⽇对资产和负债的初始计量⾦额各⾃的合计数产⽣差异。因此这部分预计负债也是应当根据解释16号第⼀条规定确认递延所得税资产的。 提问⼈：安好 时间：2025-08-05 16:28:40 陈版您好，如果租赁期3年，初始确认时⼀次性全额预付，即租赁负债为0，这种情况是不是就满⾜初始确认豁免条件了？谢谢！ 回答⼈：chenyiwei 这种情况下使⽤权资产等于预付租⾦，租赁负债为零，此时⽆暂时性差异。提问⼈：爬爬呀 时间：2025-08-07 22:19:32个人理解，供参考。","cat":"租赁","kw":"租赁,所得税,递延,预计负债,租赁期满租赁资产恢复⾄租赁条款约定状态预计将发⽣的成本现值,回答⼈,chenyiwei","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁"},{"id":"CY0037","q":"关于租赁准则及收⼊准则的适⽤问题","a":"这种情况可以考虑是否就作为分期收款销售业务处理。如是，可参照《企业会计准则第21号——租赁（2018年修订）》第四⼗⼆条规定处理。个人理解，供参考。","cat":"租赁","kw":"租赁,关于租赁准则及收⼊准则的适⽤问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁、《企业会计准则第21号——租赁（2018年修订）》"},{"id":"CY0814","q":"消防未验收的使⽤权资产","a":"⾸先要明确讨论前提，即主帖案例适⽤租赁准则是合理的。实务中很多此类案例实质上是政府垫资购建固定资产， 后续分期还款，这种情况应作为分期付款购建固定资产处理，⽽不是租赁。建议谨慎识别是否属于这种情形。另外还要假设该租⾦并未因为存在政府补助因素⽽不公允。 在上述假设的前提下，使⽤权资产应在开始使⽤该⼚房时（即2024年3⽉）初始确认，在免租期内仍需计提折旧。 使⽤权资产应针对已实际移交给本企业（不论是否实际使⽤）的部分确认。后续随着逐步移交⽽相应确认新的使⽤权资产。 提问⼈：huangjiayong 时间：2024-10-12 16:08:37 陈版主您好，想对您说的这个假设做进⼀步追问： 如果是政府垫资购建固定资产后续分期还款，在这个情况下如果政府代建的⼚房是分批交付的。⽐⽅说2024年3 ⽉份已经交付了部分⼚房给企业⽣产，2024年6⽉份交付了第⼆部分⼚房，剩余⼚房尚未交付，但企业等到政府将 ⼚房完整交付给企业之后再付款。 我们项⽬组内部的观点是企业预计政府什么时候交付，分阶段按照已交付部分的⼚房⾯积乘以租⾦，折现确认长期应付款与长期应收款，这样可以吗？ 回答⼈：chenyiwei 基本可以。个人理解，供参考。","cat":"租赁","kw":"租赁,固定资产,折旧,消防未验收的使⽤权资产","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁"},{"id":"CY0582","q":"特殊交易的收⼊判断","a":"商业模式按照BOT的运作模式，但是交易对⼿不是政府，⽽是民营企业，这种情况下可以参考《企业会计准则解释第14号》第⼀条的规定，但前提是业主⽅满⾜“双控制”“双特征”条件。 如果所购建的设施是该民营企业⾃⾝⽣产经营过程中使⽤，则这种情况下也有较⼤可能性应采⽤租赁会计模式，即视情况确定租赁类型为融资租赁或经营租赁（本企业为出租⼈，对⽅民营企业为承租⼈，根据所购建资产所有权上的主要风险和报酬是否转移，确定租赁类型，相应确定应采⽤的会计处理模式）。 如果公司不负责建设，但是作为总包⽅，则在⽬前的监管环境下，需谨慎考虑本企业是否可以作为主要责任⼈。在确定属于主要责任⼈的前提下（这种可能性很⼩），⼀般采⽤成本加成法（例如在成本基础上再加5%或10%的⽑ 利）作为建造阶段的收⼊⾦额，实务中也有收⼊、成本等额，建造阶段⽑利为零的做法。 提问⼈：zhaoxia001 时间：2024-07-23 15:01:24 谢谢陈总，对⽅为总包⽅，作为主要出资⽅，其基本未提供实质建造服务，建造均外包给外部⽆关联独⽴第三⽅， 对于主要责任⼈和代理⼈的判定⽅⾯，主要需注意哪些要点，谢谢陈总。 回答⼈：chenyiwei个人理解，供参考。","cat":"租赁","kw":"租赁,特殊交易的收⼊判断","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁"},{"id":"CY0454","q":"公司对外出租的固定资产租赁到期经翻修改造后可以转⼊存货吗？","a":"⽬前准则中只是对投资性房地产变为存货的处理有规定，对于其他出租资产（原作为固定资产核算的）转为存货没有具体规定，但借鉴投资性房地产的例⼦也是具有参考价值的。 根据四部委2021年年报⼯作通知（财会[2021]32号）：“企业应当按照《企业会计准则第3号——投资性房地产》 （财会〔2006〕3号）等相关规定，必须有确凿证据表明房地产⽤途发⽣改变，才能将投资性房地产转换为其他资 产或者将其他资产转换为投资性房地产，并在附注中披露房地产转换情况、理由以及对损益或所有者权益的影响等相关信息。例如，房地产开发企业将投资性房地产转换为存货的，应当结合业务实质严格把握重新开发的判断，必须有确凿证据表明⽤于经营出租的房地产重新开发⽤于对外销售，通常该房地产应有诸如功能、性能变化等实质性的变化和重⼤的结构性调整”。 如果除了投资性房地产以外的其他出租资产收回后，经过改造，也有了“诸如功能、性能变化等实质性的变化和重 ⼤的结构性调整”，则也可以从固定资产转为存货，但具体掌握的尺度，应根据所处⾏业和该产品的具体情况⽽定。总体上看，应从严把握。个人理解，供参考。","cat":"租赁","kw":"租赁,固定资产,公司对外出租的固定资产租赁到期经翻修改造后可以转⼊存货吗","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁、《企业会计准则第3号——投资性房地产》"},{"id":"CY0041","q":"融资租赁","a":"这类租赁公司并不控制汽车，⽽是单纯提供融资服务，汽车是提供融资的抵押物。 因此，应当以代个⼈⽀付的购车款作为向个⼈提供的融资，借记长期应收款（或应收租赁款），后续确认利息收 ⼊。对汽车不应⼊账，当然也就不涉及对汽车计提折旧和租赁期满时转让所有权的会计处理。 提问⼈：圣媛 时间：2024-02-22 15:23:59 汽车是公司购⼊的资产，汽车的所有权属于公司。购⼊汽车时，请问汽车计⼊哪个科⽬？ 回答⼈：chenyiwei 汽车是公司向个⼈提供融资的抵押物，不确认为本企业的资产，只是把代个⼈⽀付的购车款确认为发放贷款及垫款。个人理解，供参考。","cat":"租赁","kw":"租赁,折旧,融资租赁","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁"},{"id":"CY1010","q":"政府给予的氢能车⾥程补贴收⼊是计⼊营业收⼊还是其他收","a":"参照《监管规则适⽤指引———会计类第1号》之“1-23 政府补贴收⼊的性质和确认条件”： ⼆、政府补助以应收⾦额计量的条件 政府补助通常在企业能够满⾜政府补助所附条件以及企业能够收到政府补助时才能予以确认。判断企业能够收到政府补助，应着眼于分析和落实企业能够符合财政扶持政策规定的相关条件且预计能够收到财政扶持资⾦的”确凿 证据”，例如，关注政府补助的发放主体是否具备相应的权⼒和资质，补助⽂件中索引的政策依据是否适⽤，申请 政府补助的流程是否合法合规，是否已经履⾏完毕补助⽂件中的要求，实际收取资⾦前是否需要政府部门的实质性审核，同类型政府补助过往实际发放情况，补助⽂件是否有明确的⽀付时间，政府是否具备履⾏⽀付义务的能⼒等因素。 对照上述指引，如果符合按应收⾦额确认政府补助的条件，则挂账其他应收款，对应冲减固定资产成本或者挂账递延收益（假设出租构成经营租赁）。 另外提⽰关注：本企业是否仅为过⼿，属于代理⼈？如是，则不能按转租赁处理。个人理解，供参考。","cat":"租赁","kw":"租赁,递延,固定资产,求助陈版主,政府给予的氢能车⾥程补贴收⼊是计⼊营业收⼊还是其他收","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁"},{"id":"CY0051","q":"16号解释追溯调整问题","a":"递延所得税资产、负债确认的基础是存在暂时性差异。⽽如果执⾏新租赁准则时采⽤“不完全追溯调整法”，则意味着只有⾸次执⾏⽇之后才确认使⽤权资产和租赁负债（此前的各时点和期间不调整），也就是在⾸次执⾏⽇之前 （例如2021.1.1之前）不存在暂时性差异，相应地也就不应确认递延所得税资产和负债。 同理，针对弃置义务中递延所得税资产、负债的确认和计量，也是与就弃置义务确认预计负债并对应调整固定资产账⾯价值的⽅式有关。由于固定资产弃置费⽤的会计处理政策⾃2007年执⾏企业会计准则以来未发⽣变化，因此现在编制财务报表时，通常整个报告期以及最早⽐较期间期初都执⾏企业会计准则下对弃置费⽤确认预计负债并调整固定资产账⾯价值的规定，相应地对递延所得税的影响也要追溯到最早报告期期初。个人理解，供参考。","cat":"租赁","kw":"租赁,所得税,递延,预计负债,固定资产,16号解释追溯调整问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁"},{"id":"CY0942","q":"转租赁由经营租赁变更为经营租赁时折现率选取","a":"⾸先建议考虑此前将转租赁认定为经营租赁是否恰当，例如为何没有考虑到后续的续租。如果此前分类为经营租赁不恰当的，则应进⾏差错更正处理。 其次，如果不属于差错更正的，则在新租约签订⽇，看作⼀项新的转租赁（⽽不是原转租赁的变更，因为新租约签订于原转租赁租约到期后）。如果新的转租赁确实属于融资租赁的，则按照新转租赁开始⽇的承租⼈租赁借款利率或者租赁内含利率进⾏折现处理，⼀般理解不应确认重⼤的资产处置损益。 第三，在主帖案例中，就转租赁确认重⼤的资产处置损益的原因是原租赁为集团内部的关联交易，租⾦低于市场租 ⾦⽔平，导致利润被输送到转租赁出租⼈。转租赁出租⼈在对原租赁进⾏会计处理时，应将原租赁租⾦低于市场租 ⾦导致的差异按权益性交易原则计⼊资本公积处理，同时按原租赁开始⽇的市场租⾦折现确认使⽤权资产。这样也有助于减少转租赁期开始⽇确认的资产处置损益。个人理解，供参考。","cat":"租赁","kw":"租赁,求助陈版,转租赁由经营租赁变更为经营租赁时折现率选取","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁"},{"id":"CY1026","q":"“先租后让，达产出让”政策下⼟地使⽤权的确认","a":"我理解“租”和“出让”两步应该是⼀揽⼦交易。应作为⼀个整体考虑。即⼀开始就按20年确认使⽤权资产，后续预计将⽀付的出让⾦也在折现之后纳⼊租赁负债的初始计量中。使⽤权资产的折旧年限为20年；租赁负债的存续期限为 5年，⾄付清出让⾦为⽌（仅在租赁负债存续期间才确认相关的利息⽀出，⼀旦付清，后续就没有与租赁负债相关 的利息⽀出了）。 满⾜出让条件并通过出让⽅式取得⼟地使⽤权后，将原使⽤权资产的原值和累计折旧分别平移为“⽆形资产——⼟地使⽤权”的原值和累计摊销。如果最终的出让⾦与最初预计不⼀致的，则差额调整⽆形资产的原值。 上一页 陈版主（陈奕蔚老师）答疑历史文章（2024年11月） 粤ICP备18107660号 粤公网安备44060602000887号 关于网站 Copyright © 2021-2026 会计便利店 hjyweb.cn 【个人理解，供参考。","cat":"租赁","kw":"租赁,折旧,摊销,“先租后让,达产出让”政策下⼟地使⽤权的确认","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁"},{"id":"CY0645","q":"成本法做合并报表","a":"在⽤成本法合并结果直接做抵销的情况下，由于长期股权投资账⾯价值仅为初始投资成本，未纳⼊投资⽇后的⼦公司权益变动情况，因此在投资⽇后⼦公司的权益变动是不需要进⾏抵销处理的，可直接平移到合并报表中，当然要 注意抵销内部交易、划出归属少数股权的部分。 你的理解基本合理。因此成本法抵销确实⽐权益法下的抵销要简单。提问⼈：迷茫⼩明 时间：2024-08-02 16:24:37 感谢陈版回复！！再问⼀个问题，所谓长投的初始投资成本，是不是也分不同的情况，例如资产收购或者企业并 购，合并⽇的初始长投成本就是购买对价，所以合并⽇抵消的就应该是评估增值/减值后权益和长投成本，合并⽇ 后每年做成本法抵消的数就是合并⽇的那个分录，其他⾮并购的⼦公司，也就是⾃⼰设⽴的⼦公司，由于设⽴时没有净利润，成本法抵消只会抵消实收资本、资本公积和长投，合并⽇后的每年抵消同样是抵消实收资本、资本公积和长投，然后上⾯说的两种情况，都是根据合并⽇后⼦公司净利润的情况，确认少数股权，没确认少数股权的那部分利润就留在了集团中 回答⼈：chenyiwei 可以这样理解。 提问⼈：迷茫⼩明 时间：2024-08-02 16:45:39 陈版，我还有个关于递延所得税的问题请教⼀下您，为什么企业并购的时候增值部分会确认DTL，⽽资产收购增值却不确认DTL呢 回答⼈：chenyiwei 这就是所得税核算中的“初始确认豁免”，如果不豁免则不符合历史成本原则，且会陷⼊死循环。提问⼈：迷茫⼩明 时间：2024-08-05 15:39:34 陈版，为什么成本法⽐权益法简单，但教材中没有讲成本法，实务中直接⽤成本法做抵消会简便很多吧，所以权益法的适⽤场景是什么呢？ 回答⼈：chenyiwei 这是受到原来《企业会计制度》的影响，因为企业会计制度下对⼦公司在个别报表层⾯就是权益法核算，所以合并报表都是在权益法核算的基础上编制的。转为执⾏准则后，这个习惯还是被沿⽤下来了。个人理解，供参考。","cat":"合并报表","kw":"减值,合并,所得税,递延,权益法,成本法,成本法做合并报表","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY1187","q":"求助版主，总公司房产租赁给分公司确认投资性房地产个体报表和合并报表的问题。","a":"总分公司属于同⼀个法⼈，在该公司的报表中，实际上就是⾃⽤的固定资产。 在总分公司汇总申报情况下，应以企业法⼈报表（即总分公司的汇总报表）为基础进⾏纳税申报。提问⼈：lfterry007 时间：2025-03-29 17:29:13 请问版主：“应以企业法⼈报表为基础进⾏纳税申报”企业法⼈报表是按固定资产计提折旧模式申报？还是按总公司的投资性房地产公允模式申报？ 回答⼈：chenyiwei 取决于主管税务机关是否允许会计上以公允价值模式计量的投资性房地产在税前扣除折旧。这可能各地政策不⼀致，建议咨询税务机关确认。提问⼈：lfterry007 时间：2025-04-02 15:39:19 chenyiwei“取决于主管税务机关是否允许会计上以公允价值模式计量的投资性房地产在税前扣除折旧。这可能各地政策不⼀致，建议咨询税务机关确认” 版主我想问的是，总分汇总纳税申报如果是以法⼈汇总报表为基础进⾏纳税申报，法⼈汇总报表已经把投资性房地产还原为固定资产会计上已经不存在公允价值计量的投资性房地产了，应该不存在你说的主管税务机关是否允许会计上以公允价值模式计量的投资性房地产在税前扣除折旧的问题了吧？ 是不是总分汇总纳税申报就是根据法⼈汇总报表还原为固定资产后的固定资产计提折旧的情况申报？ 回 答 ⼈ ：chenyiwei 我理解应当是。 提问⼈：lfterry007 时间：2025-04-09 19:22:08 chenyiwei：我理解应当是 陈版主你回复的“我理解应该是”，指的是认同按固定资产计提折旧的情况申报吗？还是认同你再5楼的回复“要取决于税务机关是否允许会计上以公允价值模式计量的投资性房地产在税前扣除折旧”？ 回答⼈：chenyiwei 税法上没有投资性房地产概念，所以主要是看能否视同固定资产，在税前扣除折旧。个人理解，供参考。","cat":"合并报表","kw":"公允价值,合并,租赁,固定资产,折旧,求助版主,总公司房产租赁给分公司确认投资性房地产个体报表和合并报表的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY0205","q":"战投出资的会计处理","a":"如果严格按照准则的字⾯意思，应该将该1000万元继续冲减盈余公积和未分配利润。但也可以接受将资本公积冲成负数。但需注意：（1）资本公积中的“其他资本公积”不可⽤于冲减；（2）如股本溢价中有此前因其他交易或事项形成的⾦额的，本次也可以⽤于冲减。 提问⼈：stacton202 时间：2024-09-02 11:00:18 请教陈⽼师，在被投单位A⾃⾝承担战投回购义务的情况下，1）A上述冲减资本公积的分录，是在A的公司层⾯， 还是A合并层⾯（A也有⼦公司）？2）被投单位A的控股股东甲，在计算对A享有的归母损益时，要剔掉战投所占 A份额吗？还是按⼯商登记的包含战投的份额？3）甲在计算所占A的权益时（归母权益），按照A的净资产乘以所占⽐例，是否要剃掉战投所占A份额？4）因为是A承担回购义务，负债已经体现在A的报表⾥（借：资本公积/盈余公积/未分配利润，贷⽅负债，A报表⾥战投的股本还留着），所以甲的合并报表⾥不再需要按回购⾦额从少数股东权益调整⾄负债了吧？ 因为本⾝也不在A的权益⾥，也就不存在少数股东权益了？感谢您！！ 回答⼈：chenyiwei 少数股东权益按加回回购义务相关负债后的⼦公司权益乘以少数股权⽐例计算。甲的合并报表⾥不再需要按回购⾦额从少数股东权益调整⾄负债。 回答⼈：chenyiwei 上一页 陈版主（陈奕蔚老师）答疑历史文章（2024年02月） 下一页 陈版主（陈奕蔚老师）答疑历史文章（2024年04月） 粤ICP备18107660号 粤公网安备44060602000887号 关于网站 Copyright © 2021-2026 会计便利店 hjyweb.cn 【个人理解，供参考。","cat":"合并报表","kw":"合并,少数股东,战投出资的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY1759","q":"合并层⾯存货未实现利润递延所得税资产的确认","a":"合并报表层⾯就内部交易未实现损益产⽣的可抵扣暂时性差异，是通过内部买⽅（主帖案例中的S公司）将标的存货对外销售⽽实现的。包括确认DTA时的适⽤税率也是内部买⽅的适⽤税 率。相应地，在考虑是否满⾜DTA的确认条件时，应考虑内部买⽅（⽽不是内部卖⽅）在后续将标的资产对外出售或者消耗时，该内部买⽅能否获得⾜够多的应纳税所得额（注意：与内部卖 ⽅的纳税状况⽆关）。因此，并不是“只要公司能确认该存货未来能够实现对外销售即满⾜了DTA的确认条件”，仍需考虑内部买⽅的纳税状况。 提问⼈：5120210048 时间：2025-10-14 11:10:09 陈版主好，谢谢你的回复，我理解DTA的确认就是指未来可以⽤来抵税，那么只要确认未来S公司（内部买⽅）最终能将标的资产对外销售时，在对外销售时的那⼀刻因内部买⼊的⾼成本导致S公司销售当⽉或当年少交或不交所得税，因此就实现了抵税作⽤，所以在确认未实现利润的DTA时⽆需考虑S公司未来是否有⾜够的应纳税所得额，只要确认存货能对外销售就可以。 回答⼈：chenyiwei 只有S公司未来有⾜够的应纳税所得额，暂时性差异转回时才能起到抵税的效果，所以必须考虑S公司的未来盈利状况。提问⼈：zhuzlcn6 时间：2025-11-04 09:26:43 我也没理解这个未来抵税是怎么个抵法，感觉楼主讲得也挺有道理的，望陈版主针对楼主的案例再详细的解释⼀下，⾮常感谢！ 回答⼈：chenyiwei 未来抵税，是指未来S公司将该资产对外出售或耗⽤时，因计税基础⾼于账⾯价值，实际需缴纳的所得税⽐【（处置价款-计税基础）*S公司适⽤税率】要少。个人理解，供参考。","cat":"合并报表","kw":"合并,所得税,递延,合并层⾯存货未实现利润递延所得税资产的确认","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY0001","q":"本期收到应归属于原股东的补助如何进⾏会计处理","a":"对于这类情况，由于“2021年及2022年的税返应为原股东享有，在A实际收到税返并扣税后应返还原股东”是在股权收购时⼀并约定的⼀揽⼦交易，所以在A公司（被收购⽅）层⾯视为⼀项对原股东的利润分配（或者也可以视为对新股东即本公司的利润分配，由本公司转交给原股东）。 本公司（收购⽅）在编制合并报表时，可在购买⽇将很可能收到的政府补助款项确认为应收款，同时挂对原股东的应付款，两边同时挂账，不影响被收购⽅的可辨认净资产。在合并报表中，后续收到补助款时不再确认为合并集团的其他收益，⽽是通过往来科⽬核算。个人理解，供参考。","cat":"合并报表","kw":"合并,本期收到应归属于原股东的补助如何进⾏会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY0518","q":"外币报表折算","a":"减值准备也是资产账⾯价值的组成部分，所以也应当按照期末汇率折算，即期末余额为：长期股权投资成本⼈民币 700元，减值准备⼈民币-70元。 减值准备的期初、期末折合⼈民币余额之间的变动属于汇率变动形成，在合并报表层⾯对应于其他综合收益。提问⼈：chenyunlin 时间：2024-07-04 11:14:31 请教陈版主，如果存在少数股东的情况，合并层⾯抵销的内部往来的坏账准备⽽产⽣的外币报表折算差，少数股东需要分配这部分的外币报表折算差么？谢谢。 回答⼈：chenyiwei ⾮全资⼦公司的外币报表折算差额需按⽐例分摊给少数股东。提问⼈：tempo111 时间：2024-10-28 10:43:15 境外A公司属于甲集团的⼦公司，合并范围内，A公司⽤加元记账本位币，按照加拿⼤会计准则列报报表，按照外 币报表折算过程中能否按照中国企业会计准则重编报表，⽐如列到加拿⼤期间费⽤的项⽬调整⾄主营业务成本列报 （假设认为单体列报错误），然后在甲集团合并？还是需要在甲集团合并报表上以合并视⾓调整⾄主营业务成本列报（实际上该业务从单体还是合并，均认为应该列报到主营业务成本项⽬）？ 回答⼈：chenyiwei 在进⾏⼦公司的外币报表折算时，对于⼦公司报表中体现出的明显列报错误，应当进⾏更正处理。 如果境内外报表列报的要求和规则不同的，则按照中国企业会计准则中的列报规定对境外⼦公司报表进⾏调整处理。个人理解，供参考。","cat":"合并报表","kw":"减值,合并,少数股东,外币报表折算","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY0013","q":"⾮同⼀控长期股权投资评估增值","a":"理论上，在A公司合并报表层⾯，相当于新取得了⼀项对联营企业（⼄公司）的长期股权投资，应按照《企业会计准则第2号——长期股权投资（2014年修订）》规定的权益法核算原则，通过资产评估或者其他适当⽅法确定⼄公 司各项可辨认资产和负债在购买⽇的公允价值，后续以该公允价值为基础对⼄公司的损益进⾏调整，以调整后的报表进⾏权益法核算。 如果上述做法不切实可⾏的，则可以基于重要性原则，仅针对少数评估增值较⼤的资产项⽬重新确定购买⽇公允价值，其他增值较⼩的资产仍延续甲公司账⾯的处理⽅式。个人理解，供参考。","cat":"合并报表","kw":"公允价值,合并,权益法,⾮同⼀控长期股权投资评估增值","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表、《企业会计准则第2号——长期股权投资（2014年修订）》"},{"id":"CY0015","q":"会计估计","a":"理论上，在合并报表和权益法核算中，都只是要求统⼀会计政策，⽽不要求统⼀会计估计。如果母⼦公司（或者投资⽅与被投资⽅）所处⾏业不同，资产类型和使⽤⽅式不同，则其采⽤不同的与固定资产折旧相关的会计估计是合理的，强⾏统⼀反⽽不合理。 如果被投资⽅的会计估计明显不符合其实际情况，或者与⾏业惯例存在重⼤差异，则应考虑是否需对其报表进⾏差 错更正，以更正后的报表为依据纳⼊合并或者进⾏权益法核算。个人理解，供参考。","cat":"合并报表","kw":"合并,权益法,固定资产,折旧,会计估计","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY1242","q":"⻓投已核销坏账","a":"⾸先，以前年度的⻓期股权投资核销很可能是不符合相关规定的，属于会计差错。 参照《中央企业资产减值准备财务核销⼯作规则》（国资发评价[2005]67号）第⼗⼆条：短期投资跌价准备和⻓期投资跌价准备依据下列证据进⾏财务核销： （⼀）上市流通的短期投资和⻓期债权投资发⽣事实损失的，应当取得企业内部业务授权投资和处置的相关⽂件，以及有关证券交易结算机构出具的合法交易资⾦结算单据； （⼆）被投资单位被宣告破产的，应当取得法院破产清算的清偿⽂件及执⾏完毕证明； （三）被投资单位被注销、吊销⼯商登记或被有关机构责令关闭的，应当取得当地⼯商部⻔注销、吊销公告，或有关机构的决议或⾏政决定⽂件，以及被投资单位清算报告及清算完毕证明； （四）涉及诉讼的，应当取得司法机关的判决或裁定及执⾏完毕的证据；⽆法执⾏或被法院终⽌执⾏的，应当取得法院终⽌裁定等法律⽂件； （五）涉及仲裁的，应当取得相应仲裁机构出具的仲裁裁决书，以及仲裁裁决执⾏完毕的相关证明； （六）其他⾜以证明该短期投资或⻓期投资发⽣事实损失的合法、有效证据。 因此，由于被投资企业没有注销，且受让了其他股东的股权，故当初就不应对该项股权投资进⾏核销处理。现在发现该错报后，应对其进⾏更正处理，恢复此前已被核销的⻓期股权投资和减值准备，再加上收购其他股东的权益所⽀付的价款作为⻓期股权投资的账⾯价值，并将其纳⼊合并报表范围。个人理解，供参考。","cat":"合并报表","kw":"减值,合并,⻓投已核销坏账","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY1044","q":"B集团合并报表层⾯应对该票据列报为短期借款。提问⼈：lzjing 时间：2025-02-19 082912","a":"可终⽌确认的，属于经营活动；不能终⽌确认的，属于筹资活动。提问⼈：殿chen4828 时间：2025-03-18 14:52:47 请教陈版，银⾏给了我们3000万授信，其中1000万是票据，那我们票据实际开出来并付款，我们这个票据账记哪⾥？记应付票据还是短期借款？ 回答⼈：chenyiwei 应付票据。 提问⼈：15869155436 时间：2025-09-03 14:46:54 借楼问：您好！ 我是⼀名企业财务⼈员，在实际⼯作中遇到⼀个会计准则适⽤问题，恳请您指导。 背景： 我公司为上市公司。在2023年12⽉31⽇，对某笔信⽤⻛险较⾼的商业承兑汇票（由应收账款转⼊）全额计提了坏账准备。该票据于2024年1⽉15⽇（审计报告⽇前）成功兑付。问题： 此“期后成功托收”的事实，是否可作为确凿证据，证明该票据在资产负债表⽇的信⽤⻛险已显著降低？在编制2023年财报时，我们应如何选择： 作为资产负债表⽇后调整事项，冲回2023年末的坏账准备，调整当期损益？ 还是基于报表⽇点的状态维持原计提，将利得体现在2024年？ 我们理解《企业会计准则第22号》的减值要求，但对此情形下是否适⽤《第29号——资产负债表⽇后事项》作为调整事项存在疑惑。恳请就期后票据托收能否调整报告期减值这⼀原则给予权威指导。 感谢您的宝贵时间！ 回答⼈：chenyiwei个人理解，供参考。","cat":"合并报表","kw":"减值,合并,B集团合并报表层⾯应对该票据列报为短期借款,提问⼈,lzjing,2025-02-19,082912","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY0368","q":"顺流交易已实现损益的处理","a":"此前的回复是基于个⼈对合并报表层⾯权益法属于“单⾏合并”的理解。但既然2024年CPA考试教材和最新的《应⽤指南汇编2024》均要求在实现当年度在合并报表层⾯恢复营业收⼊和营业成本，则实际操作中应照此处理。 另外需注意：根据《监管规则适⽤指引——会计类第4号》之“4-5 权益法下顺流交易产⽣的未实现内部交易损益以处置或视同处置股权⽅式实现时的会计处理”：“对于投资⽅与联营企业、合营企业之间发⽣顺流交易产⽣的未实现内部交易损益，因处置或视同处置联营企业、合营企业股权导致未实现内部交易损益得以实现，投资⽅应作为股权处置损益计⼊当期投资收益，前期在投资⽅合并财务报表中予以抵销的未实现内部交易相关收⼊、成本或资产处置损益等不予恢复。”。即，如果是通过处置联营企业股权（不再对其具有重⼤影响）⽽实现该项顺流交易损益的， 则合并报表层⾯应并⼊投资收益计算，不再确认收⼊和成本。 提问⼈：破罗马 时间：2024-05-20 09:57:37 陈⽼师，在《应⽤指南汇编2024》中貌似没有看到要求在实现当年度在合并报表层⾯恢复营业收⼊和营业成本的内容？CPA教材确是有。 回答⼈：chenyiwei 参考《监管规则适⽤指引——会计类第4号》之“4-5 权益法下顺流交易产⽣的未实现内部交易损益以处置或视同处置股权⽅式实现时的会计处理”。个人理解，供参考。","cat":"合并报表","kw":"合并,权益法,顺流交易已实现损益的处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY1765","q":"各公司库存商品中对内、对外销售的数量和⽐例是否稳定，能否合理区分存货中将要对外销售和对内销售的部分？","a":"⼀般可以这样理解。 提问⼈：yzqt123456 时间：2025-10-11 13:09:53 @chenyiwei 陈版主您好，还想再追问⼀下 ①您提到“如果对内销售占⽐较⼤，且能够合理区分…则可以站在合并集团的视⻆进⾏相应的调整”。 就我们的情况（内部销售占⽐⾼且可通过采购⽐例进⾏区分），您是否认为已经满⾜了进⾏重分类的条件？ 如果进⾏重分类，具体⽅法是否是：将预期⽤于对内销售的部分，全部重分类⾄其在下游公司的存货类别？ 例如： 将B公司库存商品中“备货给A”的焦炭、C公司库存商品中“备货给A”的铁矿⽯，在合并层⾯重分类⾄“原材料”。将A公司库存商品中“备货给D”的钢锭，在合并层⾯重分类⾄“在产品”（或“原材料”）？ ②考虑到我们产业链⼀体化的特点，在存货附注中，除了按原材料、在产品、库存商品等常规分类披露外，是否有必要以备注或附表的形式，说明合并层⾯对于内部流转存货的重分类原则？ （如果是上市公司） 例如，在附注中增加说明：“本集团合并报表存货列报时，对于⼦公司间预计⽤于内部后续⽣产环节的存货，已从其原列报的‘库存商品’重分类⾄后续⽣产环节对应的‘原材料’或‘在产品’项⽬。” 您认为这样的披露是否必要且恰当？ 回答⼈：chenyiwei个人理解，供参考。","cat":"合并报表","kw":"合并,各公司库存商品中对内,对外销售的数量和⽐例是否稳定,能否合理区分存货中将要对外销售和对内销售的部分","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY0017","q":"在A公司合并报表层⾯，应参照或有对价的处理原则，将B公司所收到的补偿款按⽐例（51）归属于本企业的部分确认为或有对价损益（不可直接抵减B公司针对存货计提的跌价损失），归属于少数股东的部分直接增加少数股东权益，⽽不是先增加少数股东损益再转⼊少数股东权益。","a":"主体不同。存货减值的主体是B公司⾃⾝；补偿交易是发⽣于新⽼股东之间，与B公司实质上⽆关。个人理解，供参考。","cat":"合并报表","kw":"减值,合并,少数股东,在A公司合并报表层⾯,应参照或有对价的处理原则,将B公司所收到的补偿款按⽐例,归属于本企业的部分确认为或有对价损益,不可直接抵减B公司针对存货计提的跌价损失,归属于少数股东的部分直接增加少数股东权益,⽽不是先增加少数股东损益再转⼊少数股东权益","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY0967","q":"股份⽀付","a":"该事项实际上是⾃然⼈⼄以其在⾃⾝研发成果中所享有的份额对C公司⼊股。C公司应按该研发成果的作价⾦额确认⽆形资产，再按照协议约定确认应归属于B公司和⾃然⼈⼄的实收资本⾦额。站在C公司层⾯不涉及股份⽀付， 就是股东以⽆形资产出资的⾏为。 站在B公司层⾯（如果B可以控制C），该安排相当于以⼀项权益⼯具（⼦公司C的36%股权，即少数股东权益）换取⼄提供研发服务，这种情况是符合股份⽀付定义的，作为股份⽀付处理是恰当的。 提问⼈：1584387116 时间：2024-11-25 09:04:34 ⾮常感谢陈版主的回复。 在这个case中，现在外部审计师坚持将给到⾃然⼈⼄的份额，作为C公司的股份⽀付，理由是，A公司对C公司增资时，在增资协议中，同时提及了B公司的股东甲与⾃然⼈⼄的约定。因该事项涉及条件“⾃然⼈⼄完成知识产权时 将获取C公司的股权”，因⽽被认定为是C公司的股份⽀付。 这是审计师后台质控部门给出的结论，想请教下，我从股份⽀付的哪个点出发可以Battle审计师。感谢感谢。回答⼈：chenyiwei ⾃然⼈⼄对C⼊股的前提是研发成功，以研发成果中的份额对C出资，所以对C⽽⾔就是取得⼀项⽆形资产，同时增加股本和资本公积。研发费⽤并不确认在C层⾯。个人理解，供参考。","cat":"合并报表","kw":"少数股东,股份⽀付","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY0019","q":"同控下企业留存收益恢复相关问题","a":"可以这样理解。当被合并⽅的合并⽇留存收益为负数时，恢复留存收益的结果是使得合并报表层⾯的归母留存收益减少，同时资本公积增加。 理论上，如果收购的股权⽐例为100%，且均从最终控制⽅控制范围内收购，则在最终合并结果中，是将被合并⽅的实收资本转⼊资本公积，再将被收购⽅的留存收益余额（⽆论正负）并⼊合并报表的未分配利润。个人理解，供参考。","cat":"合并报表","kw":"合并,同控下企业留存收益恢复相关问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY1641","q":"求教陈版主，商誉减值测试中品牌、技术和商誉减值测试","a":"根据《企业会计准则第8号——资产减值》第⼆⼗五条规定：“在对包含商誉的相关资产组或者资产组组合进⾏减值测试时，如与商誉相关的资产组或者资产组组合存在减值迹象的，应当先对不包含商誉的资产组或者资产组组合进⾏减值测试，计算可收回⾦额，并与相关账⾯价值相⽐较，确认相应的减值损失。再对包含商誉的资产组或者资产组组合进⾏减值测试，⽐较这些相关资产组或者资产组组合的账⾯价值（包括所分摊的商誉的账⾯价值部分）与其可收回⾦额，如相关资产组或者资产组组合的可收回⾦额低于其账⾯价值的，应当确认商誉的减值损失，按照本准则第⼆⼗⼆条的规定处理”。IAS 36第88段规定：“When, as described in paragraph 81, goodwill relates to a cash-generating unit but has not been allocated to that unit, the unit shall be tested for impairment, whenever there is an indication that the unit may be impaired, by comparing the unit’s carrying amount, excluding any goodwill, with its recoverable amount. Any impairment loss shall be recognised in accordance with paragraph 104.”。 总体上看你的做法是合理的。先做品牌和技术的减值测试，以此调整资产组⾦额，进⽽确定商誉减值⾦额。但在这种情况下，由于不包含商誉就不能确定资产组的整体可收回⾦额，所以个⼈ 理解可能是指先将各项资产的账⾯价值与其市场价值（公允价值减去处置费⽤）相⽐较，对单项资产进⾏减值。如果不能确定品牌、技术等⽆形资产的“公允价值减去处置费⽤的净额”，则还是只能将其账⾯价值并⼊含商誉的资产组账⾯价值测算未来现⾦流量现值，如有减值则先冲减商誉，再将剩余的减值⾦额分摊给包括品牌、技术等⽆形资产在内的该资产组可收回资产。个人理解，供参考。","cat":"企业合并","kw":"公允价值,商誉,减值,求教陈版主,商誉减值测试中品牌,技术和商誉减值测试","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并、《企业会计准则第8号——资产减值》"},{"id":"CY0657","q":"PPA分摊","a":"由于此次原股东对标的企业的债权和股权是⼀并转让，总体转让价格低于债权的名义⾦额，标的企业处于资不抵债状态，因此建议将交易总价全部分配给债权，⽽长期股权投资的初始⼊账⾦额为零。在此基础上，对标的企业的可辨认净资产（不含其对A的负债）确定公允价值，将其与合并报表层⾯的合并成本（零）⽐较，确定合并报表层⾯的商誉。 提问⼈：summerxxy 时间：2024-08-16 10:15:06 追问：请教陈版，若对标的企业的可辨认净资产（不含其对A的负债）确定公允价值，将其与合并报表层⾯的合并成本（零）⽐较，确定合并报表层⾯的商誉。 标的企业负债主要就是⽋关联⽅B的负债，⽬前债权⽅为A，如果可辨认净资产不包括这个负债，是否导致合并层⾯负商誉？此时A公司账⾯应收3000万，这个负债账⾯价值5000万，A公司单体是否确认营业外收⼊，若这样 合并和单体都会有营业外收⼊，应该如何理解？ 个⼈理解：交易前的评估报告。B对标的企业债权账⾯值为5,000万元⼈民币评估减值2000万，转让协议约定， 标的公司债权对应的转让价格为⼈民币3,000万元。这个视同B对C债务豁免，因为按照39号准则公允价值计量来 说，相关负债或企业⾃⾝权益⼯具被其他⽅作为资产持有的，企业应当在计量⽇从持有对应资产的市场参与者⾓ 度，以对应资产的公允价值为基础，确定该负债或企业⾃⾝权益⼯具的公允价值。不存在债权债务不等。相当于在合并⽇前，标的公司单体报表C按照评估报告将其原母公司豁免的债务转⼊资本公积。 回答⼈：chenyiwei 这只是对可收回⾦额的估计，不同于正式的豁免。标的企业报表中的负债仍为5000万元，编制合并报表时调整到 3000万元，与债权⼈个别报表中的应收款项账⾯价值相抵。个人理解，供参考。","cat":"企业合并","kw":"公允价值,商誉,减值,合并,PPA分摊","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0794","q":"同⼀控制下企业合并权益变动表","a":"这种情况是合理的，即因为同⼀年度内发⽣注资和同⼀控制下合并两个事项，⽽其导致的实收资本或者对价的变动都是体现在合并报表的资本公积中的，因此，资本公积的净变动是两者之差。 在合并权益变动表中，母公司对被合并⽅的注资和⽀付合并对价，都是体现在“所有者投⼊和减少资本——其他”中。 提问⼈：wangyuhui888 时间：2024-10-10 11:40:58 另外，如果收购同控，因为最终控制⽅对标的公司的持有的穿透⽐例发⽣发⽣，年初的少数股东权益以及本年的少数股东损益是否需要追溯呢，还是仅仅调整收购时点的少数股东权益呢 回答⼈：chenyiwei 要注意区分所收购的被合并⽅股权是来⾃同⼀控制下的关联⽅还是来⾃外部⾮关联⽅。前者要追溯，后者⽆需追溯。参考《监管规则适⽤指引——会计类第1号》之“1-6 同⼀控制下企业合并的会计处理”。 提问⼈：wangyuhui888 时间：2024-10-16 16:21:18 陈⽼师，为避免歧义 我进⾏以下举例： 标的公司A：期初净资产1000万元，实收资本1000万元。出售⽅B公司持有其100%股权，最终控制⽅C公司持有B 公司60%股权。后来B公司将其持有A公司的100%股权出售⾄最终控制⽅C公司。 求助：最终控制⽅C公司对A公司的少数股权股东权益，在出售前以前是1000*40%=4000万元，交易后，最终控制 ⽅持有A公司的权益为1000万元，没有少数股东权益了，那么期初是否需要追溯呢？ 回答⼈：chenyiwei 不能这样理解。该交易就是⼀项集团内部交易，不涉及外部交易对⼿，外部少数股东对任⼀⼦公司的持股⽐例均未发⽣变化，所以不会导致合并报表层⾯少数股东权益增加。也就不存在追溯的问题。个人理解，供参考。","cat":"企业合并","kw":"合并,少数股东,同⼀控制下企业合并权益变动表","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY1065","q":"关于计⼊权益的递延所得税","a":"主帖中由⾦融资产转为同⼀控制下合并的会计处理不合理。本案例属于分步交易实现同⼀控制下企业合并，其个别报表层⾯的处理请参阅《企业会计准则应⽤指南汇编2024》P61～63。即在合并⽇个别报表层⾯的账务处理应为： 借：⻓期股权投资——B公司 22000（=40000 55%） 借：资本公积——资本溢价 33000 贷：现⾦ 50000 贷：交易性⾦融资产 5000 关于DTL的处理，取决于税法上如何确定该项55%股权投资的计税基础。⼀般理解，其计税基础应为历次投资成本之和，即1000+50000=51000，与账⾯价值22000之间存在可抵扣暂时性差异29000。但是，根据所得税准则第⼗四条规定，如果A公司在可预⻅的未来不会处置其持有的B公司55%股权，即该项可抵扣暂时性差异很可能不会转回，则不应确认DTA。对原先作为⾦融资产核算期间确认的DTL，在转为⻓期股权投资核算后其基础也已不存在，故应做转销处理： 借：DTL 1000 贷：资本公积——资本溢价 1000 若案例中不是因为同控，⽽是因为A将B的5%转让给1全资控股股东，且价格⾮公允⽽判断为权益性交易的情况下，这种情况下的DTL转销应遵循⾦融资产处置的⼀般处理原则。由于DTL是针对以往持有期间的公允价值变动，与后续交易价格的不公允⽆关，故A公司仍应将相当于公允价值和原账⾯价值之间的差额确认为投资收益，将DTL转回的影响计⼊“所得税费⽤——递延所得税费⽤”，将实际转让价格⾼于公允价值的差额计⼊资本公积。这部分资本公积如计⼊应纳税所得额的，则对应缴纳的所得税直接从资本公积中抵减。个人理解，供参考。","cat":"企业合并","kw":"公允价值,合并,所得税,递延,关于计⼊权益的递延所得税","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY1353","q":"同⼀控制下的企业合并，如何确认应该转回多少⾦额归属于现⾏⺟公司的留存收益⾦额？","a":"由于被收购⽅在合并⽇前的历史沿⾰（历次股权变动）的情况可能⽐较复杂，因此需要结合具体背景信息进⾏个案分析。⼀般掌握的原则是不超过被合并⽅留存收益乘以从同⼀控制下其他成员企业处收购的股权⽐例的乘积。如果有部分标的股权的卖⽅（同⼀集团内其他成员企业）最初取得标的股权是通过⾮同⼀控制下的交易，则该⾮同⼀控制下交易⽇前对应形成的留存收益不恢复。 另外，可恢复留存收益份额的计算，应根据被合并⽅各项资产、负债在最终控制⽅合并报表层⾯的账⾯价值进⾏必要的调整（如果最初被合并⽅是通过⾮同⼀控制下企业合并被纳⼊最终控制 ⽅合并报表范围的）。 提问⼈：hbwgh 时间：2025-05-07 10:54:08 陈⽼师好，因为同⼀控制下企业合并的基本处理原则是视同合并后形成的报告主体在合并⽇及以前期间⼀直存在，在编制合并⽇合并财务报表时，应将⺟公司⻓期股权投资和⼦公司所有者权益抵销，但⼦公司原由企业集团其他企业控制时的留存收益在合并财务报表中是存在的，所以对于被合并⽅在企业合并前实现的留存收益(盈余公积和未分配利润之和)中归属于合并⽅的部分， 在合并⼯作底稿中，应编制下列会计分录： 借：资本公积(以资本溢价或股本溢价的贷⽅余额为限) 贷：盈余公积(归属于现⾏⺟公司部分) 贷：未分配利润(归属于现⾏⺟公司部分) 那么请问陈⽼师，⼀般如何确认归属于现⾏⺟公司的留存收益⾦额是多少呢？ 回答⼈：chenyiwei https://bbs.esnai.com/forum.php ? … 313 pid=9373194个人理解，供参考。","cat":"企业合并","kw":"合并,同⼀控制下的企业合并,如何确认应该转回多少⾦额归属于现⾏⺟公司的留存收益⾦额","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY1482","q":"或有对接和股份⽀付的划分","a":"参照《2013年上市公司年报会计监管报告》： 通常情况下，如果款项的⽀付以相关⼈员未来期间的任职为条件，那么相关款项很可能是职⼯薪酬⽽不是企业合并的合并成本。此外，以下因素也有助于企业在实务中判断相关款项的性质： 相关款项⽀付是对在企业任职的原股东的特殊安排，还是同样适⽤于不在企业任职的原股东；如果不考虑相关款项⽀付安排，这些原股东身份的个⼈作为⾼管的薪酬与其他⾼管相⽐是否处于合理⽔平；决定具体⽀付⾦额的因素与企业估值的关系等。 在本案例中，由于存在“如甲或⼄离职A或B公司，则各⾃对应的未解锁部分股票由A⽆偿回购”的约定，故该安排属于股份⽀付⽽不是或有对价。其公允价值通常即为该等股份于授予⽇的发⾏价。相关股份⽀付费⽤在合理估计的等待期内摊销（由于允许最多2次延⻓等待期，因此等待期的⻓度是可变的，需进⾏合理估计）。同时对于⽇后的回购义务，应根据《企业会计准则解释第7号》第五条规定确认与回购义务相关的⾦融负债。 提问⼈：sjy_0727 时间：2025-06-30 16:20:04 陈总，还想继续讨论以下：（1）少数股东在收到股权转让款后，从⼆级市场购⼊A公司的股票⾮新发⾏，如果没有解锁的话，A有权⽆偿即以零元回购少数股东持有的股票。少数股东从⼆级市场购买A的股票没有价格上的优惠，这种是不是不符合股份⽀付概念，更贴近或有对价。（2）对于⽇后的零元回购对于A来说是不是⼀种权利的概念，更符合⾦融资产 回答⼈：chenyiwei 可以考虑作为或有对价处理。个人理解，供参考。","cat":"企业合并","kw":"公允价值,合并,少数股东,摊销,或有对接和股份⽀付的划分","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY1032","q":"⼦公司⽆偿划转孙公司给⺟公司的会计处理","a":"A公司：借：⻓投——C 50万元，贷：⻓投——B 50万元 （注：不能调整A⾃身的资本公积。同时该划转对A⽽⾔并⾮企业合并，故按照B对C的原投资成本⼊账，⽽不是按照C的账⾯净资产。） B公司如你所述借：未分配利润 50万，贷：⻓投 50万。提问⼈：Ralph⼩王⼦ 时间：2025-09-08 16:55:26 陈版，如果按贷⻓投-B50万做的话，⺟公司对B的⻓投就出负数了回答⼈：chenyiwei 超出部分作投资收益确认，⻓期股权投资以冲减⾄零为限。提问⼈：嘿喵警⻓zz 时间：2025-09-22 16:21:31 陈版，如果是孙公司之间的⽆偿划转，那单体层⾯⺟公司对⼦公司的⻓投⼆级明细是否需要调整？举个例⼦，A公司是⺟公司，投资200万100%持有B公司，投资100万100%持有C公司，B公司投资50万100%持有D公司。截⾄24年底，D公司净资产100万元。24年底，整理组织架构，B公司根据集团指示将D公司股权0对价转让给C公司。A、B、C账务处理是不是这样： B公司：借：未分配利润（若没有资本公积） 50 贷：⻓期股权投资-D 50 C公司：借：⻓期股权投资-D 100 贷：资本公积 100 A公司：借：⻓期股权投资-C 50 贷：⻓期股权投资-B 50 ，还是说不需要这⼀步调整？ 回答⼈：chenyiwei A公司个别报表层⾯的处理：借：⻓投——C 50（或100），贷：⻓投——B 50（或100）。个人理解，供参考。","cat":"企业合并","kw":"合并,请教陈版,⼦公司⽆偿划转孙公司给⺟公司的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY1190","q":"⽆形资产评估增值递延所得税问题","a":"虽然该项由企业合并形成的⽆形资产可能使⽤寿命不确定，不需要进⾏摊销，但这种情况并不属于确认递延所得税负债的可豁免范围，故在购买⽅合并报表层⾯仍需就该项⽆形资产确认递延所得税负债，即使其的可预⻅的未来很可能不会转回。 初始确认递延所得税负债的对应借⽅科⽬是商誉。提问⼈：不哎上班 时间：2025-03-21 17:00:05 ⽼师，想问下，评估增值确认递延所得税负债的对⽅科⽬不是资本公积吗？为什么放在上商誉呢？是因为不进⾏摊销，未来不能够转回，所以才放商誉的吗？ ⽼师，问个相关的问题，如果上⾯的A公司是亏损公司，可弥补⾦额很⼤，预计未来也不能弥补完；上⾯评估增值的⽆形资产按照10年进⾏摊销；那么在做公允报表的时候，⽆形资产的评估增值要做递延所得税负债，对⽅科⽬是资本公积；是不是也可以以评估增值的⾦额就亏损确认递延所得税资产呢？确认递延所得税资产的对⽅科⽬是所得税？ 回答⼈：chenyiwei “如果上⾯的A公司是亏损公司，可弥补⾦额很⼤，预计未来也不能弥补完”则在确认递延所得税负债后，可同时确认等额的与可抵扣亏损相关的递延所得税资产。初始确认时的对应科⽬不是所得税费⽤。 回答⼈：chenyiwei “评估增值确认递延所得税负债的对⽅科⽬不是资本公积”这只是编制合并报表时的⼀项暂时性处理，这部分资本公积最终还是要与购买⽅的⻓投相抵销，最终调整商誉，不会在购买⽅合并报表中体现资本公积等权益变动。个人理解，供参考。","cat":"企业合并","kw":"商誉,合并,所得税,递延,摊销,⽆形资产评估增值递延所得税问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY1313","q":"如果⼄公司2024年收购了⼀个⼩的游戏公司丙，丙的游戏⻛格与⼄公司明显不同，是否构成新的资产组？ 回答⼈：chenyiwei","a":"i\" tabindex=\"-1\"> 如果⼄公司2024年收购了⼀个⼩的游戏公司丙，丙的游戏⻛格与⼄公司明显不同，是否构成新的资产组？ 回答⼈：chenyiwei 3、如果⼄公司2024年收购了⼀个⼩的游戏公司丙，丙的游戏⻛格与⼄公司明显不同，是否构成新的资产组？ 回答⼈：chenyiwei 该项商誉对应的业务是游戏研发和运营（整体），⽽不是特定的某⼀款游戏或者某⼀个开发⼈员。虽然“2024年，⼄公司被收购时的游戏已经摊销完毕，已经开发了⼏款新游戏在运营，开发和运营团队也已经⼤部分变更”，但该公司的游戏开发和运营业务仍然是延续的，团队的核⼼开发和运营能⼒仍在，因此减值测试的资产组仍然是⼄公司的游戏业务对应的资产。 接受外部委托开发游戏，也是在原有的游戏开发业务基础上延伸出来的，也利⽤了原有的开发资源，因此不构成⼀个新的资产组。 如果⼄公司2024年收购了⼀个⼩的游戏公司丙，丙的游戏⻛格与⼄公司明显不同，开发和运营团队独⽴，则丙公司可能构成⼀个单独的资产组。提问⼈：song2003921 时间：2025-04-29 12:31:50 陈⽼师，如果丙公司构成⼀个新的资产组，则在测试⼄公司商誉是否减值时，不能包括丙公司对吧？ 回答⼈：chenyiwei ⼀般认为不应包含。个人理解，供参考。","cat":"企业合并","kw":"商誉,减值,摊销,如果⼄公司2024年收购了⼀个⼩的游戏公司丙,丙的游戏⻛格与⼄公司明显不同,是否构成新的资产组,回答⼈,chenyiwei","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY1204","q":"收购
