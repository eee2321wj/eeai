<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>AI准则顾问</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--orange:#F97316;--orange-dark:#EA580C;--bg:#F9F8F6;--white:#FFF;--text:#1C1C1E;--secondary:#8E8E93;--border:#EEECEA;--radius:16px}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:800px;margin:0 auto;padding:20px}
.header{padding:30px 0 20px}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.logo-icon{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--orange),var(--orange-dark));display:flex;align-items:center;justify-content:center;color:var(--white);font-size:16px;font-weight:700}
.logo-text{font-size:14px;font-weight:600;color:var(--secondary);letter-spacing:.5px}
h1{font-size:36px;font-weight:800;margin-bottom:6px;letter-spacing:-0.5px}
h1 em{font-style:normal;color:var(--orange)}
.subtitle{font-size:14px;color:var(--secondary);margin-bottom:24px}
.stats{display:flex;gap:32px;margin-bottom:32px}
.stat-item{display:flex;flex-direction:column}
.stat-num{font-size:26px;font-weight:700;color:var(--text)}
.stat-label{font-size:12px;color:var(--secondary);margin-top:2px}
.tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:24px}
.tab{padding:14px 28px;font-size:15px;font-weight:600;color:#B0B0B6;cursor:pointer;border:0;background:none;position:relative;transition:color .2s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--text)}
.tab.active::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:3px;background:var(--orange);border-radius:2px 2px 0 0}
.panel{display:none}
.panel.active{display:block}
textarea{width:100%;padding:16px;font-size:16px;line-height:1.6;border:2px solid var(--border);border-radius:var(--radius);background:var(--white);color:var(--text);outline:0;font-family:inherit;resize:vertical;min-height:120px;margin-bottom:14px;transition:border-color .2s,box-shadow .2s}
textarea:focus{border-color:var(--orange);box-shadow:0 0 0 4px rgba(249,115,22,.08)}
textarea::placeholder{color:#C5C5C9}
.btn{width:100%;height:56px;border:0;border-radius:var(--radius);background:linear-gradient(135deg,var(--orange),var(--orange-dark));color:var(--white);font-size:18px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .2s,transform .1s;letter-spacing:.3px}
.btn:hover{opacity:.92}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.loading{display:none;align-items:center;justify-content:center;gap:10px;padding:20px;color:var(--secondary);font-size:14px}
.loading.show{display:flex}
.spinner{width:20px;height:20px;border:3px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.result{display:none;background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-top:16px;animation:fadeIn .3s}
.result.show{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.result-header{display:flex;align-items:center;gap:12px;margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.answer{font-size:15px;line-height:2;white-space:pre-wrap;word-break:break-word}
.sources{margin-top:22px;padding-top:20px;border-top:1px solid var(--border)}
.sources-title{font-size:13px;color:var(--secondary);margin-bottom:12px;font-weight:700;letter-spacing:.3px}
.source-item{padding:10px 14px;margin:8px 0;background:#FAFAF9;border-radius:10px;font-size:13px;line-height:1.6;cursor:pointer;transition:background .15s,box-shadow .15s;position:relative;border:1px solid transparent}
.source-item:hover{background:#F5F3F0;border-color:#E8E5E0;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.source-item.expanded{background:#FFF;border-color:var(--orange);box-shadow:0 2px 12px rgba(249,115,22,.1)}
.source-header{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.source-expand-icon{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:var(--border);color:var(--secondary);font-size:11px;font-weight:700;flex-shrink:0;transition:all .2s}
.source-item.expanded .source-expand-icon{background:var(--orange);color:#FFF;transform:rotate(45deg)}
.source-score{color:var(--orange);font-weight:700;font-size:12px;flex-shrink:0}
.source-content{color:var(--text);font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis}
.source-cat{font-size:10px;padding:2px 8px;border-radius:10px;background:#FFF7ED;color:var(--orange);font-weight:600;flex-shrink:0;white-space:nowrap}
.source-badge-qa{background:#FFF7ED;color:var(--orange)}
.source-badge-std{background:#EFF6FF;color:#3B82F6}
.source-detail{display:none;margin-top:12px;padding:16px;background:#FFF;border:1px solid var(--border);border-radius:10px;animation:fadeIn .25s}
.source-item.expanded .source-detail{display:block}
.source-detail-q{font-size:14px;font-weight:700;color:var(--text);margin-bottom:10px;line-height:1.7;padding-bottom:10px;border-bottom:1px dashed var(--border)}
.source-detail-q::before{content:'Q: ';color:var(--orange);font-size:16px}
.source-detail-a{font-size:13px;line-height:1.9;color:var(--text);white-space:pre-wrap}
.source-detail-a::before{content:'A: ';color:var(--orange);font-size:16px;font-weight:700}
.source-detail-meta{display:flex;gap:10px;margin-top:12px;padding-top:10px;border-top:1px solid var(--border);font-size:11px;color:var(--secondary);flex-wrap:wrap}
.source-detail-meta span{display:inline-flex;align-items:center;gap:3px}
.source-detail-meta .meta-label{color:#B0B0B6}
.source-detail-actions{margin-top:10px;display:flex;gap:8px}
.source-btn-copy{padding:4px 12px;border:1px solid var(--border);border-radius:6px;background:var(--white);color:var(--secondary);font-size:11px;cursor:pointer;transition:all .15s}
.source-btn-copy:hover{background:var(--orange);color:#FFF;border-color:var(--orange)}
.source-detail-source{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-size:11px;color:#6B7280;display:flex;align-items:center;gap:4px}
.source-detail-source .source-label{color:#B0B0B6;font-weight:600}
.source-detail-source a{color:var(--orange);text-decoration:none}
.source-detail-source a:hover{text-decoration:underline}
.source-hint{font-size:11px;color:#B0B0B6;margin-top:6px}
.source-hint kbd{display:inline-block;padding:1px 6px;background:#EFEFEF;border-radius:4px;font-family:inherit;font-size:11px;border:1px solid #D5D5D5}
.compare-result{display:none;gap:20px;margin-top:16px}
.compare-result.show{display:grid;grid-template-columns:1fr 1fr}
.compare-col{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:22px;animation:fadeIn .3s}
.compare-label{font-size:12px;font-weight:700;padding:5px 14px;border-radius:20px;display:inline-block;margin-bottom:14px}
.compare-label.expert{background:#FFF7ED;color:var(--orange)}
.compare-label.generic{background:#F5F5F7;color:var(--secondary)}
.error{display:none;background:#FEF2F2;border:1px solid #FECACA;border-radius:12px;padding:14px 18px;margin-top:16px;color:#991B1B;font-size:14px;line-height:1.6}
.error.show{display:block}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;background:#D1D5DB}
.status-dot.online{background:#22C55E}
.status-dot.offline{background:#EF4444}
.footer{text-align:center;padding:40px 20px 36px;font-size:12px;color:#B0B0B6}
.answer h1,.answer h2,.answer h3,.answer h4{font-weight:700;margin:20px 0 10px;line-height:1.3}
.answer h1{font-size:22px;border-bottom:2px solid var(--border);padding-bottom:8px}
.answer h2{font-size:18px;border-bottom:1px solid var(--border);padding-bottom:6px}
.answer h3{font-size:16px}
.answer h4{font-size:15px;color:var(--secondary)}
.answer p{margin:10px 0}
.answer ul,.answer ol{padding-left:24px;margin:10px 0}
.answer li{margin:4px 0;line-height:1.8}
.answer strong{font-weight:700;color:var(--text)}
.answer em{font-style:italic;color:var(--orange)}
.answer blockquote{border-left:4px solid var(--orange);padding:10px 16px;margin:14px 0;background:#FFF7ED;border-radius:0 8px 8px 0;color:#9A3412;font-size:14px}
.answer code{font-family:"SF Mono","Fira Code","Consolas",monospace;font-size:13px;background:#F3F4F6;padding:2px 6px;border-radius:4px;color:#DC2626}
.answer pre{background:#1C1C1E;color:#E5E7EB;padding:16px 20px;border-radius:12px;overflow-x:auto;margin:14px 0;font-size:13px;line-height:1.7}
.answer pre code{background:none;color:inherit;padding:0;font-size:inherit}
.answer table{width:100%;border-collapse:collapse;margin:14px 0;font-size:13px}
.answer th{background:#F9F8F6;padding:10px 14px;text-align:left;font-weight:700;border-bottom:2px solid var(--border)}
.answer td{padding:10px 14px;border-bottom:1px solid var(--border)}
.answer tr:hover td{background:#FAFAF9}
.answer a{color:var(--orange);text-decoration:underline}
.answer hr{border:0;height:1px;background:var(--border);margin:20px 0}
.answer img{max-width:100%;border-radius:8px}
/* 关联依据高亮样式 */
.std-ref-badge{display:flex;align-items:flex-start;gap:8px;padding:14px 18px;margin-bottom:18px;background:linear-gradient(135deg,#EFF6FF,#F0F9FF);border:1px solid #BFDBFE;border-radius:10px;font-size:13px;line-height:1.8;color:#1E40AF;animation:highlightPulse .6s}
.std-ref-badge .std-ref-icon{font-size:18px;flex-shrink:0;line-height:1.8}
.std-ref-badge .std-ref-text{font-weight:600}
.std-ref-badge .std-ref-list{color:#3B5998}
@keyframes highlightPulse{from{background:#DBEAFE;transform:scale(1.01)}to{background:linear-gradient(135deg,#EFF6FF,#F0F9FF);transform:scale(1)}}
@media(max-width:640px){
  .container{padding:16px}
  h1{font-size:28px}
  .stats{gap:20px}
  .tab{padding:12px 18px;font-size:14px}
  .compare-result.show{grid-template-columns:1fr 1fr;gap:10px}
  textarea{min-height:100px}
  .answer h1{font-size:19px}.answer h2{font-size:16px}.answer h3{font-size:15px}
  .answer pre{font-size:12px;padding:12px 14px}
}
</style>
</head>
<body>
<div class="container">
<div class="header">
  <div class="logo"><div class="logo-icon">AI</div><span class="logo-text">准则AI顾问 <span class="status-dot" id="status-dot"></span></span></div>
  <h1>智能准则<em>答疑</em></h1>
  <p class="subtitle">基于资深技术合伙人知识库，24h在线解答会计准则疑难</p>
  <div class="stats">
    <div class="stat-item"><span class="stat-num" id="kb-count">--</span><span class="stat-label">知识条目</span></div>
    <div class="stat-item"><span class="stat-num" id="kb-queries">24</span><span class="stat-label">在线答疑</span></div>
    <div class="stat-item"><span class="stat-num">可追溯</span><span class="stat-label">引用来源</span></div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('ask',this)">提问答疑</button>
  <button class="tab" onclick="switchTab('compare',this)">风格对比</button>
</div>

<div id="panel-ask" class="panel active">
  <textarea id="input-ask" placeholder="输入你的会计准则问题...&#10;例如：合同资产和应收账款怎么区分？"></textarea>
  <button class="btn" id="btn-ask" onclick="doAsk()">开始查询</button>
  <div class="loading" id="loading-ask"><div class="spinner"></div><span>AI 正在分析中，请稍候...</span></div>
  <div class="error" id="error-ask"></div>
  <div class="result" id="result-ask">
    <div class="result-header">
      <span style="font-size:12px;color:var(--secondary)">匹配知识条目：<span id="match-count-ask">0</span> 条</span>
    </div>
    <div class="answer" id="answer-ask"></div>
    <div class="sources" id="sources-ask"></div>
  </div>
</div>

<div id="panel-compare" class="panel">
  <textarea id="input-compare" placeholder="输入问题，对比专家风格与通用风格的回答差异..."></textarea>
  <button class="btn" id="btn-compare" onclick="doCompare()">开始对比</button>
  <div class="loading" id="loading-compare"><div class="spinner"></div><span>AI 正在进行风格对比，请稍候...</span></div>
  <div class="error" id="error-compare"></div>
  <div class="compare-result" id="result-compare">
    <div class="compare-col">
      <div class="compare-label expert">专家风格</div>
      <div class="answer" id="answer-expert"></div>
    </div>
    <div class="compare-col">
      <div class="compare-label generic">通用风格</div>
      <div class="answer" id="answer-generic"></div>
    </div>
  </div>
</div>

<div class="footer">准则AI顾问 v5.0 - 内置779条知识库 | 多元可信来源 | Worker代理安全 | Powered by DeepSeek</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
// ── Markdown 渲染配置 ───────────────────────────────
if(typeof marked !== 'undefined'){
  marked.setOptions({
    breaks: true,        // 换行即 <br>
    gfm: true,           // GitHub Flavored Markdown
    headerIds: false,
    mangle: false
  });
}
function renderMd(text){
  if(!text) return '';
  if(typeof marked !== 'undefined'){
    try { return marked.parse(text); } catch(e){ /* fallback */ }
  }
  // Fallback: 简单的纯文本转HTML
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

// ── 配置 ────────────────────────────────────────────
// 自动检测 API 地址：同域部署时用相对路径
var KB = null;
var KB_FILE = "kb_data.json";
var API_BASE = window.location.origin;

// ── 初始化（KB 由 build_standalone.py 注入异步加载逻辑） ──

// ── Tab 切换 ─────────────────────────────────────────
function switchTab(name,btn){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
  btn.classList.add('active');
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active')});
  document.getElementById('panel-'+name).classList.add('active');
}

// ── API 配置 ──
var LLM_KEY = "sk-e284c269fa884b7598fd9321c91f0e39";
var LLM_URL = "https://api.deepseek.com/v1/chat/completions";
var LLM_MODEL = "deepseek-chat";

// 专家 Persona System Prompt
var CYPROMPT = "# 你的身份\n\n你是资深会计准则顾问，精通中国企业会计准则（CAS）和国际财务报告准则（IFRS）。\n专业领域：企业合并、合并报表、收入确认、金融工具、租赁、资产减值、所得税、长期股权投资、股份支付等。\n\n**回答风格要求**：\n- 措辞习惯：高频使用「首先要区分」「这个问题需要从两个层面来看」「实务中」「个人理解」「供参考」「宜」「不宜」\n- 结论先行，再分层展开；引用具体准则编号和条款\n- 典型回答 300-800 字，结尾用「个人理解，供参考。」\n\n**回答结构**：1.结论/定性判断 2.理论依据 3.实务操作 4.注意事项\n\n# 关联依据输出要求（重要！）\n\n**每段回答必须以以下格式开头**，不能省略：\n\n📄 **关联依据**：《企业会计准则第X号——XXX》、《中国注册会计师审计准则第XXXX号——XXX》\n\n规则：\n1. 列出本回答涉及的主要准则全称（中文），用「《》」括起来，多条用「、」分隔\n2. 仅列出直接相关的准则，不超过5部\n3. 如果回答涉及审计程序或函证/监盘/审计证据，同时引用审计准则\n4. 关联依据行后空一行再开始正文\n\n示例：\n📄 **关联依据**：《企业会计准则第14号——收入》、《企业会计准则第13号——或有事项》";

// ── 中文停用词表 ─────────────────────────────────────
// 分词时剔除问句结构词、虚词，提取核心概念
var CN_STOP_WORDS = [
  "有何不同","有什么区别","怎么区分","如何区分","如何辨别","怎么辨别",
  "如何处理","怎么处理","如何做","怎么做",
  "是什么","什么意思","的含义","包含哪些","包括什么",
  "的区别","的差异","的不同","不同点","的异同",
  "的界定","的判断","的标准","的条件",
  "请问","问一下","我想问","想知道","请教","咨询",
  "麻烦","帮忙","能不能","可以不可以","是否","能不能够",
  "说明一下","解释一下","分析一下",
  "和","与","及","或","该","这个","那个","哪些","什么","哪个","怎么","如何",
  "呢","吗","啊","吧","么","了","的","地","得",
  "？","?","，",",","。",".","：",":","；",";","！","!"
];

// ── 提取查询中的核心概念词 ──────────────────────────
function extractConcepts(question) {
  var clean = question;
  // 按长度降序替换停用词（长的先替换，避免"有何不同"被"的"拆碎）
  CN_STOP_WORDS.forEach(function(sw) { clean = clean.split(sw).join(" "); });
  clean = clean.replace(/\s+/g, " ").trim();
  var terms = clean.split(" ").filter(function(t) { return t.length >= 2; });
  // 返回去重后的核心概念词
  var seen = {};
  var uniq = [];
  terms.forEach(function(t) {
    if (!seen[t]) { seen[t] = true; uniq.push(t); }
  });
  return uniq;
}

// ── 生成 n-gram 用于模糊回退 ────────────────────────
function makeBigrams(text) {
  var clean = text.replace(/[「」""''【】()（）《》\[\]{}，。？?！!：:；;、\s]+/g, "");
  var bigrams = [];
  for (var i = 0; i < clean.length - 1; i++) {
    bigrams.push(clean.substring(i, i + 2));
  }
  return bigrams;
}

// ── 核心：智能模糊搜索 ──────────────────────────────
function searchKB(question) {
  if (!question || typeof question !== "string") return [];
  var q = question;
  var ql = q.toLowerCase();
  var results = [];

  // 1. 提取核心概念词
  var concepts = extractConcepts(q);

  // 2. 生成 bigrams 用于回退
  var allBigrams = makeBigrams(q);
  var uniqBigrams = [];
  var bgSeen = {};
  allBigrams.forEach(function(bg) {
    if (!bgSeen[bg]) { bgSeen[bg] = true; uniqBigrams.push(bg); }
  });

  // 3. 对每条 QA 打分
  KB.qa.forEach(function(item) {
    if (!item || !item.q) return;
    var score = 0;
    var ql_item = item.q.toLowerCase();
    var al = (item.a || "").toLowerCase();
    var kwl = (item.kw || "").toLowerCase();
    var cl = (item.cat || "").toLowerCase();

    // 3a. 核心概念词精确匹配（权重最高）
    var conceptHits = 0;
    concepts.forEach(function(t) {
      var tl = t.toLowerCase();
      if (ql_item.indexOf(tl) !== -1) { score += 10; conceptHits++; }
      else if (al.indexOf(tl) !== -1) { score += 2; conceptHits++; }
      if (kwl.indexOf(tl) !== -1) score += 5;
      if (cl.indexOf(tl) !== -1) score += 3;
    });

    // 3b. 长短语整体匹配奖励
    if (ql_item.indexOf(ql) !== -1) score += 8;
    else if (ql.indexOf(ql_item) !== -1) score += 5;
    else if (ql_item.indexOf(concepts.join("")) !== -1) score += 4;

    // 3c. 没有概念匹配时，降级为 bigram 匹配
    if (conceptHits === 0 && concepts.length > 0) {
      var bgScore = 0;
      uniqBigrams.forEach(function(bg) {
        if (ql_item.indexOf(bg) !== -1) bgScore += 1.5;
        if (al.indexOf(bg) !== -1) bgScore += 0.3;
        if (kwl.indexOf(bg) !== -1) bgScore += 0.5;
      });
      score += Math.min(bgScore, 8);
    }

    if (score > 0) results.push({ item: item, score: Math.round(score * 10) / 10, type: "qa" });
  });

  // 4. 对准则打分
  KB.standards.forEach(function(item) {
    if (!item || !item.n) return;
    var score = 0;
    var nl = (item.n || "").toLowerCase();
    var cl = (item.c || "").toLowerCase();
    var tl = (item.t || "").toLowerCase();

    concepts.forEach(function(t) {
      var tlc = t.toLowerCase();
      if (nl.indexOf(tlc) !== -1) score += 8;
      if (cl.indexOf(tlc) !== -1) score += 3;
      if (tl.indexOf(tlc) !== -1) score += 5;
    });

    if (score === 0 && concepts.length > 0) {
      uniqBigrams.forEach(function(bg) {
        if (nl.indexOf(bg) !== -1) score += 1;
        if (cl.indexOf(bg) !== -1) score += 0.5;
      });
    }

    if (score > 0) results.push({ item: item, score: Math.round(score * 10) / 10, type: "standard" });
  });

  results.sort(function(a, b) { return b.score - a.score; });
  return results;
}

function buildMsgs(question,kbContext,usePersona){
  var sc=usePersona?CYPROMPT:"你是会计准则助手，请用专业语言回答。";
  if(kbContext)sc+="\n\n---\n\n# 知识库参考资料\n\n"+kbContext+"\n\n如果知识库内容与问题相关，请引用具体内容；不相关则基于专业知识回答。";
  return [{role:"system",content:sc},{role:"user",content:question}];
}

async function callDeepSeek(question,usePersona){
  var kbResults=searchKB(question);
  var kbContext="";
  var stdRefHints=[];
  if(kbResults.length>0){
    var parts=[];
    for(var i=0;i<Math.min(kbResults.length,5);i++){
      var r=kbResults[i];
      if(r.type==="qa"){
        var refHint="";
        if(r.item.std_ref){refHint="【关联准则："+r.item.std_ref+"】";stdRefHints.push(r.item.std_ref);}
        parts.push("【参考"+(i+1)+"·ID="+r.item.id+"】"+refHint+"问题:"+r.item.q+"\n回答:"+(r.item.a||"").substring(0,600));
      }
      else parts.push("【参考"+(i+1)+"·ID="+r.item.id+"】准则"+(r.item.n||"")+":"+(r.item.d||r.item.c||"").substring(0,600));
    }
    // Collect unique std_ref hints
    var seenRefs={};
    var uniqueRefs=[];
    stdRefHints.forEach(function(ref){
      ref.split('、').forEach(function(r){
        if(r&&!seenRefs[r]){seenRefs[r]=true;uniqueRefs.push(r);}
      });
    });
    if(uniqueRefs.length>0){
      parts.push("【关联依据提示】以上匹配条目涉及以下准则，回答时请务必引用："+uniqueRefs.join('、'));
    }
    kbContext=parts.join("\n\n---\n\n");
  }
  var msgs=buildMsgs(question,kbContext,usePersona);
  var resp=await fetch(LLM_URL,{
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":"Bearer "+LLM_KEY},
    body:JSON.stringify({model:LLM_MODEL,messages:msgs,temperature:0.3,max_tokens:2048,stream:false})
  });
  if(!resp.ok){
    var errText;
    try{var e=await resp.json();errText=e.error&&e.error.message?e.error.message:JSON.stringify(e);}catch(ex){errText="HTTP "+resp.status;}
    throw new Error("DeepSeek API 错误: "+errText);
  }
  var data=await resp.json();
  return {answer:data.choices[0].message.content,kbResults:kbResults,kbCount:kbResults.length};
}

// ── 可追溯：点击条目展开查看完整原文 ────────────────
// 全局变量：保存最新一次搜索的所有结果
var _lastKbResults = [];

function renderSources(kbResults, kbCount) {
  _lastKbResults = kbResults || [];
  if (!kbResults || kbResults.length === 0) {
    document.getElementById("sources-ask").style.display = "none";
    return;
  }
  var srcHtml = '<div class="sources-title">\u23f2 匹配知识条目（共 ' + kbCount + ' 条）<span class="source-hint">\uff08点击条目展开查看完整内容）</span></div>';
  kbResults.slice(0, 8).forEach(function(r, idx) {
    var label, catBadge, badgeClass;
    if (r.type === "qa") {
      label = (r.item.q || "").substring(0, 60);
      catBadge = r.item.cat || "";
      badgeClass = "source-badge-qa";
    } else {
      label = "准则" + (r.item.n || "") + ": " + ((r.item.t || r.item.c || "")).substring(0, 40);
      catBadge = "准则原文";
      badgeClass = "source-badge-std";
    }
    srcHtml +=
      '<div class="source-item" onclick="toggleSource(this,' + idx + ')" id="src-' + idx + '">' +
        '<div class="source-header">' +
          '<span class="source-expand-icon">+</span>' +
          '<span class="source-score">' + r.score + '分</span>' +
          '<span class="source-content">' + escHtml(label) + '</span>' +
          (catBadge ? '<span class="source-cat ' + badgeClass + '">' + escHtml(catBadge) + '</span>' : '') +
        '</div>' +
        '<div class="source-detail">' +
          renderSourceDetail(r) +
        '</div>' +
      '</div>';
  });
  document.getElementById("sources-ask").innerHTML = srcHtml;
  document.getElementById("sources-ask").style.display = "block";
}

// ── 渲染展开后的源码详情 ────────────────────────────
function renderSourceDetail(r) {
  if (r.type === "qa") {
    var item = r.item;
    var kwText = item.kw ? escHtml(item.kw).split(",").map(function(k){return '<span style="display:inline-block;padding:1px 8px;background:#F3F4F6;border-radius:4px;margin:2px 3px;font-size:10px">'+k.trim()+'</span>';}).join("") : '<span style="color:#B0B0B6">无</span>';
    return '<div class="source-detail-q">' + escHtml(item.q) + '</div>' +
           '<div class="source-detail-a">' + escHtml(item.a || "") + '</div>' +
           '<div class="source-detail-meta">' +
             '<span><span class="meta-label">分类:</span> ' + escHtml(item.cat || "未分类") + '</span>' +
             '<span><span class="meta-label">ID:</span> ' + (item.id || "") + '</span>' +
             (item.author ? '<span><span class="meta-label">作者:</span> ' + escHtml(item.author) + '</span>' : '') +
           '</div>' +
           '<div style="margin-top:8px;font-size:11px;color:#B0B0B6">关键词: ' + kwText + '</div>' +
           '<div class="source-detail-actions">' +
             '<button class="source-btn-copy" onclick="event.stopPropagation();copySourceText(this,' + item.id + ')">复制全文</button>' +
           '</div>' +
           '<div class="source-detail-source">' +
             '<span class="source-label">📖 信息来源:</span> ' +
             (item.src ? escHtml(item.src) : escHtml('陈奕蔚 会计视野论坛答疑')) +
           '</div>';
  } else {
    var item = r.item;
    return '<div class="source-detail-q">《' + escHtml(item.n || "") + '》 ' + escHtml(item.t || "") + '</div>' +
           '<div class="source-detail-a">' + escHtml(item.c || "") + '</div>' +
           '<div class="source-detail-meta">' +
             '<span><span class="meta-label">类型:</span> 准则原文</span>' +
             '<span><span class="meta-label">ID:</span> ' + (item.id || "") + '</span>' +
             (item.cat ? '<span><span class="meta-label">分类:</span> ' + escHtml(item.cat) + '</span>' : '') +
           '</div>' +
           '<div class="source-detail-actions">' +
             '<button class="source-btn-copy" onclick="event.stopPropagation();copySourceText(this,' + item.id + ')">复制全文</button>' +
           '</div>' +
           '<div class="source-detail-source">' +
             '<span class="source-label">📖 信息来源:</span> ' + escHtml('企业会计准则原文') +
           '</div>';
  }
}

// ── 切换展开/收起 ───────────────────────────────────
var _expandedIdx = -1;
function toggleSource(el, idx) {
  // 如果点击的是按钮，不处理
  if (event.target.tagName === "BUTTON") return;

  // 收起上一个展开的条目
  if (_expandedIdx >= 0 && _expandedIdx !== idx) {
    var prev = document.getElementById("src-" + _expandedIdx);
    if (prev) prev.classList.remove("expanded");
  }

  // 切换当前
  el.classList.toggle("expanded");
  _expandedIdx = el.classList.contains("expanded") ? idx : -1;

  // 滚动到可见区域
  if (el.classList.contains("expanded")) {
    setTimeout(function() { el.scrollIntoView({ behavior: "smooth", block: "nearest" }); }, 150);
  }
}

// ── 复制条目全文 ────────────────────────────────────
function copySourceText(btn, id) {
  var item = null;
  // 在 _lastKbResults 中查找
  for (var i = 0; i < _lastKbResults.length; i++) {
    var r = _lastKbResults[i];
    if (r.item.id === id) { item = r; break; }
  }
  if (!item) return;

  var text = "";
  if (item.type === "qa") {
    text = "【问题】" + (item.item.q || "") + "\n\n【回答】" + (item.item.a || "") + "\n\n—— 分类: " + (item.item.cat || "未分类") + " | ID: " + (item.item.id || "");
  } else {
    text = "【准则】" + (item.item.n || "") + " " + (item.item.t || "") + "\n\n" + (item.item.c || "");
  }

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() {
      btn.textContent = "✔ 已复制";
      setTimeout(function() { btn.textContent = "复制全文"; }, 1500);
    }).catch(function() { fallbackCopy(text, btn); });
  } else {
    fallbackCopy(text, btn);
  }
}

function fallbackCopy(text, btn) {
  var ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position = "fixed";
  ta.style.left = "-9999px";
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand("copy"); btn.textContent = "✔ 已复制"; }
  catch(e) { btn.textContent = "复制失败"; }
  document.body.removeChild(ta);
  setTimeout(function() { btn.textContent = "复制全文"; }, 1500);
}

// ── 初始化：异步加载 KB 数据 + 计算统计 ────────────
var _kbReady = false;
var _kbWaiters = [];
function whenKBReady(fn) {
  if (_kbReady) { fn(); return; }
  _kbWaiters.push(fn);
}
(function loadKB(){
  var elCount = document.getElementById("kb-count");
  var elDot = document.getElementById("status-dot");
  if (elCount) elCount.textContent = "加载中…";
  if (elDot) elDot.className = "status-dot offline";
  fetch(KB_FILE)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      KB = data;
      KB.qa = KB.entries.filter(function(e) { return e.q; });
      KB.standards = KB.entries.filter(function(e) { return e.n; });
      if (elCount) elCount.textContent = KB.qa_count + KB.std_count;
      if (elDot) elDot.className = "status-dot online";
      _kbReady = true;
      _kbWaiters.forEach(function(fn) { fn(); });
      _kbWaiters = [];
    })
    .catch(function(err) {
      if (elCount) elCount.textContent = "加载失败";
      console.error("KB 加载失败:", err);
    });
})();

// ── DOM 工具函数 ────────────────────────────────────
function show(id){document.getElementById(id).classList.add('show');}
function hide(id){document.getElementById(id).classList.remove('show');}
function showE(id,msg){var el=document.getElementById(id);el.textContent=msg;show(id);}

// ── 后处理：高亮关联依据 ────────────────────────────
function highlightStdRef(html){
  // Match rendered markdown: <p>📄 <strong>关联依据</strong>：《...》</p>
  var re=/<p>📄\s*<strong>关联依据<\/strong>[：:]\s*(.+?)<\/p>/;
  var m=html.match(re);
  if(m){
    var content=m[1];
    // Wrap each standard in a styled badge
    var items=content.split(/[、,，]/).map(function(s){
      var t=s.trim().replace(/^《|》$/g,'');
      if(!t) return '';
      return '<span style="display:inline-block;margin:2px 4px;padding:2px 10px;background:rgba(59,130,246,0.1);border-radius:6px;white-space:nowrap">《'+t+'》</span>';
    }).join('');
    var badge='<div class="std-ref-badge"><span class="std-ref-icon">📄</span><div><span class="std-ref-text">关联依据</span><div class="std-ref-list">'+items+'</div></div></div>';
    html=html.replace(m[0], badge);
  }
  return html;
}

async function doAsk(){
  var input=document.getElementById("input-ask");
  var btn=document.getElementById("btn-ask");
  var q=input.value.trim();
  if(!q){showE("error-ask","请输入问题");return;}
  if(!_kbReady){showE("error-ask","知识库加载中，请稍候…");return;}
  btn.disabled=true;
  _expandedIdx = -1;
  show("loading-ask");hide("result-ask");hide("error-ask");
  try{
    var data=await callDeepSeek(q,true);
    var answerHtml=renderMd(data.answer);
    answerHtml=highlightStdRef(answerHtml);
    document.getElementById("answer-ask").innerHTML=answerHtml;
    document.getElementById("match-count-ask").textContent=data.kbCount||0;
    renderSources(data.kbResults, data.kbCount);
    show("result-ask");
  }catch(err){showE("error-ask","查询失败："+err.message);}
  finally{btn.disabled=false;hide("loading-ask");}
}

async function doCompare(){
  var input=document.getElementById("input-compare");
  var btn=document.getElementById("btn-compare");
  var q=input.value.trim();
  if(!q){showE("error-compare","请输入问题");return;}
  if(!_kbReady){showE("error-compare","知识库加载中，请稍候…");return;}
  btn.disabled=true;
  show("loading-compare");hide("result-compare");hide("error-compare");
  try{
    var results=await Promise.all([callDeepSeek(q,true),callDeepSeek(q,false)]);
    document.getElementById("answer-expert").innerHTML=highlightStdRef(renderMd(results[0].answer));
    document.getElementById("answer-generic").innerHTML=renderMd(results[1].answer);
    show("result-compare");
  }catch(err){showE("error-compare","对比失败："+err.message);}
  finally{btn.disabled=false;hide("loading-compare");}
}

function escHtml(s){var div=document.createElement('div');div.textContent=s;return div.innerHTML;}

// ── 键盘快捷键 ───────────────────────────────────────
document.getElementById('input-ask').addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doAsk();}
});
document.getElementById('input-compare').addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doCompare();}
});
</script>
