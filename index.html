疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0020","q":"增发股票的⼿续费，如何在权益变动表中披露","a":"可以直接抵减发⾏股票（股东投⼊资本）增加的资本公积净额。个人理解，供参考。","cat":"实务综合","kw":"增发股票的⼿续费,如何在权益变动表中披露","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0618","q":"回购利息和本⾦作为其他权益⼯资投资的处置价款和其账⾯价值的差额计⼊留存收益，2、、回购利息作为⼀项衍⽣⼯具，每期进⾏确认公允价值变动，当触发回购条款时，分别作其他权益⼯具投资的终⽌确认和衍⽣⼯具的终","a":"⾸先要考虑：⼀般情况下，设定对赌回购条款时，相关的股权投资是否符合“⾮交易性权益⼯具投资”的判断条件？ 是否应分类为以公允价值计量且其变动计⼊损益的⾦融资产，列报为其他⾮流动⾦融资产？ 如果确实将其指定为其他权益⼯具投资更合理（如前所述，这种可能性不⼤），则在持有该投资期间，应将由其⼤股东签发的卖出期权单独作为⼀项以公允价值计量且其变动计⼊损益的⾦融资产核算，确认其公允价值变动损益。到回购条款被触发，双⽅就回购问题签订协议后，终⽌确认原其他权益⼯具投资和衍⽣⾦融资产，这两者的原账⾯价值之和与回购价款（本⾦+利息）之间的差额计⼊留存收益。 提问⼈：lanxiaolan 时间：2024-07-29 11:44:32 请教陈版主：1、衍⽣⾦融资产的公允价值变动是按照（⾏权价）回购价款与按持股⽐例计算的被投资单位净资产之差确定的嘛，还是？个人理解，供参考。","cat":"股份支付","kw":"公允价值,回购利息和本⾦作为其他权益⼯资投资的处置价款和其账⾯价值的差额计⼊留存收益,回购利息作为⼀项衍⽣⼯具,每期进⾏确认公允价值变动,当触发回购条款时,分别作其他权益⼯具投资的终⽌确认和衍⽣⼯具的终","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第11号——股份支付"},{"id":"CY1581","q":"企业会计制度下，融资租赁的会计处理","a":"《企业会计制度》下对融资租赁出租⼈的会计处理也是有规定的，即：在租赁开始⽇，出租⼈应当将租赁开始⽇最低租赁收款额作为应收融资租赁款的⼊账价值，并同时记录未担保余值，将最低租赁收款额与未担保余值之和与其现值之和的差额记录为未实现融资收益。 根据这⼀规定，在租赁开始⽇，出租⼈应按最低租赁收款额，借记”应收融资租赁款”科⽬，按未担保余值的⾦额，借记”未担保余值”科⽬，按租赁资产的原账⾯价值，贷记”融资租赁资产”科⽬，按上述科⽬计算后的差额，贷记”未实现融资收益”科⽬。 即，在原制度下，租赁物的原账⾯价值与应收租赁款折现值之间的差额体现在未实现融资收益科⽬中，不体现销售收⼊和成本。这可能与当初该制度制定时融资租赁出租⼈仅限专⻔的租赁公司有关。个人理解，供参考。","cat":"租赁","kw":"租赁,企业会计制度下,融资租赁的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁"},{"id":"CY1748","q":"租赁准则所得税费⽤问题","a":"根据《企业会计准则第32号——中期财务报告》第⼗⼀条规定：“企业在中期财务报表中应当采⽤与年度财务报表相⼀致的会计政策”。因此，理论上编制季度财务报表时所采⽤的会计政策和年度财务报表应当⼀致，在此情况下，与租赁相关的所得税费⽤，虽然存在租⾦⽀付不均衡的情况，但各期【（使⽤权资产折旧+租赁负债相关利息⽀出）*税率】仍应等于当期、递延所得税费⽤之和。 会计上对使⽤权资产折旧和税法上对租⾦的扣除均是按直线法摊销，这部分应⽆明显差异；由于采⽤实际利率法和各期⽀付租⾦不同，导致各期的租赁负债相关利息⽀出⾦额不同，但也不⾄于出现主帖所说的按季度计算不勾稽的情况，关键是要确保递延所得税资产、递延所得税负债在各季度末余额的准确性。个人理解，供参考。","cat":"租赁","kw":"租赁,所得税,递延,折旧,摊销,租赁准则所得税费⽤问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁、《企业会计准则第32号——中期财务报告》"},{"id":"CY0022","q":"祝陈版主龙年⾝体安康，⼼想事成。","a":"谢谢！也祝各位⽹友新年快乐！龙⾏⼤运！个人理解，供参考。","cat":"实务综合","kw":"祝陈版主龙年⾝体安康,⼼想事成","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0914","q":"和各位⽼师：公益性资产的会计处理。","a":"公益性⽣物资产属于⽣物资产准则规定的特例，主要考虑是⽇后有可能转为其他类型的⽣物资产（如防风林转为⽤材林），从⽽具备未来经济利益流⼊的潜⼒。但是，⽔库的公益性资产是否符合该条件，需要谨慎考虑，⼀般不建议如此处理，尤其是通过少提折旧增加利润更是不恰当的。 提问⼈：13623806346 时间：2024-11-05 15:02:06 请教陈版主和各位⽼师：公益性资产的会计处理。 《⽔利部办公厅关于加强⽔利扶贫项⽬资产后续管理的通知》（办振兴〔2021〕293号）规定： ⽔利扶贫项⽬资产按经营性资产、公益性资产和到户类资产进⾏分类管理。经营性资产主要为按市场化运作、具有经营性质的⽔利项⽬固定资产及权益性资产等；公益性资产主要为保障供⽔安全、防洪安全、农业灌溉等，具有公益性质的⽔利基础设施固定资产等；到户类资产主要为通过财政补助等形式帮助贫困户建设的⽔窖、⽔柜、⽔井等固定资产。 根据上述规定，是否可以将公益性资产作为固定资产核算？ 谢谢！ 回答⼈：chenyiwei 公益性资产很难满⾜企业会计体系下确认为资产的条件，即其⾃⾝具备产⽣未来现⾦流⼊的潜⼒。因此，⼀般理解不应在企业会计体系下确认为固定资产。 但是，公益性资产购建的⽬的是提供公共服务，即公益性资产具备提供公共服务的潜⼒，因此符合政府会计体系下确认为资产的条件，应在政府资产负债表中确认为资产。个人理解，供参考。","cat":"固定资产","kw":"固定资产,折旧,请教陈版主和各位⽼师,公益性资产的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第4号——固定资产"},{"id":"CY1509","q":"是。2、回售权的⾏权价⼤概率是未来届时的公允价值，⽬前难以确定，且以届时公允价值回售情况下该衍⽣⼯具的公允价值为零，故⽆需确认衍⽣⾦融资产或负债。提问⼈：爬爬呀 时间：2025-07-17 211843","a":"⼀般不作为衍⽣⼯具，直接作为权益***易处理，即在获得实控⼈⽀付的补偿款时，按实际收到的补偿款贷记权益。提问⼈：开⼼的六六 时间：2025-09-26 16:58:45 陈版主，针对⽤能权，公司根据⾃⼰使⽤情况，将冗余⽤能权通过市场交易给第三⽅，该销售业务事项是否构成与⽣产经营活动有关计列营业收⼊呢？ 回答⼈：chenyiwei 不属于⽇常活动。因为⽤能权本身不是本企业的产品或者正常经销的商品。个人理解，供参考。","cat":"实务综合","kw":"公允价值,回售权的⾏权价⼤概率是未来届时的公允价值,⽬前难以确定,且以届时公允价值回售情况下该衍⽣⼯具的公允价值为零,故⽆需确认衍⽣⾦融资产或负债,提问⼈,爬爬呀,2025-07-17,211843","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0732","q":"借款违约⾦什么条件下可以确认违约⾦收⼊？","a":"根据主帖信息，此时对逾期利息（违约⾦）的计量⽅法是明确的，主要是关注其可收回性问题。 甲公司应关注⼄公司（借款⽅）的还款能⼒和股权抵押担保的有效性（例如，该股权是否已被抵押给其他债权⼈， 或者已被查封或冻结⽽导致⽆法变现等），谨慎评估⼄公司⾃⾝有能⼒偿还的⾦额和抵押品变现可能收回的⾦额， 在确保可收回⾦额的折现值⼤于本⾦的前提下，才能在预计可收回⾦额⼤于本⾦的限度内确认利息收⼊和逾期利息收⼊。个人理解，供参考。","cat":"实务综合","kw":"借款违约⾦什么条件下可以确认违约⾦收⼊","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0114","q":"政府补助实务处理","a":"理论上肯定是要按照税法规定的标准化的处理⽅法进⾏纳税调整和审计调整的。如果被审计单位减持不调整，可以从影响⼤⼩（包括定性和定量⽅⾯）、当地有⽆事实上的此类税务处理惯例等因素综合考虑能否接受被审计单位⽬前的处理，⽽不作进⼀步调整。个人理解，供参考。","cat":"政府补助","kw":"政府补助实务处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第16号——政府补助"},{"id":"CY0988","q":"先收到政府补助款后确认补助范围的会计处理","a":"针对与资产相关的政府补助的性质在对应的资产转固后才得以明确的情况，应⾃其性质明确之时起，将对应的递延收益在该资产的剩余折旧年限内摊销，计⼊各该年度的其他收益。就主帖案例⽽⾔，就是⾃2024年内性质明确之⽇起摊销该部分与资产相关的政府补助，摊销年限为对应资产的剩余折旧摊销年限。 提问⼈：落实 时间：2024-11-26 08:30:27 陈版主，我司会针对政府批复⽂件梳理⼀版明细，事务所进⾏审计后可能会有微调。那“性质明确”之⽇是指公司出具明细的公司批复⽇期、事务所的审计基准⽇还是报告⽇？ 回答⼈：chenyiwei 公司出具明细的公司批复⽇期。与审计⽇期⽆关。明确性质是企业管理层的会计责任，不是审计责任。个人理解，供参考。","cat":"政府补助","kw":"递延,折旧,摊销,先收到政府补助款后确认补助范围的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第16号——政府补助"},{"id":"CY0152","q":"政府补助是否与⽇常经营活动相关的判断","a":"上述三项⼀般理解都属于与⽇常活动相关，应计⼊其他收益。根据财政部会计司发布的政府补助准则解读： 政府补助准则不对“⽇常活动”进⾏界定。通常情况下，若政府补助补偿的成本费⽤是营业利润之中的项⽬，或该补助与⽇常销售等经营⾏为密切相关（如增值税即征即退等），则认为该政府补助与⽇常活动相关。 上述补助对象都是在利润表上计⼊管理费⽤或者营业成本等“营业利润之中的项⽬”，故属于与⽇常活动相关的政府补助。个人理解，供参考。","cat":"政府补助","kw":"政府补助是否与⽇常经营活动相关的判断","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第16号——政府补助"},{"id":"CY0662","q":"求助陈⽼师，新公司法关于资本公积可以⽤来弥补亏损，有什么具体影响嘛","a":"这个问题更多地是法律上的问题。⽆论如何，会计处理总是清楚和简单的。 需要注意：根据该条规定，仅可在盈余公积不⾜时，“按规定”使⽤资本公积弥补亏损，也就是还需要等待财政部或者国务院层⾯上针对资本公积补亏问题制定的专项实施细则。在该专项实施细则出台前，⽬前以资本公积补亏仍然是不可操作的。预计该细则中将对补亏的条件、限额、操作程序等作出具体规定。但我个⼈⽬前尚不清楚该细则是否已在制定过程中。个人理解，供参考。","cat":"实务综合","kw":"求助陈⽼师,新公司法关于资本公积可以⽤来弥补亏损,有什么具体影响嘛","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0706","q":"关于劳务派遣⽤⼯，⽤⼈单位核算问题","a":"⾸先对照《企业会计准则第9号——职⼯薪酬（2014年修订）》的规定，判断劳务⼈员是否在会计意义上是属于你公司（⽤⼈单位）的“职⼯”。如果是，则每⽉付给劳务派遣公司⼯⼈的应发⼯资及公司部分五险⼀⾦属于职⼯薪酬性质，应通过“应付职⼯薪酬”科⽬核算；反之，则作为劳务费核算，不属于职⼯薪酬。 ⽆论何种情况，⽀付给派遣公司的服务费、管理费均列⼊咨询费或者劳务费，具体依据本企业的科⽬体系设置⽽定。个人理解，供参考。","cat":"实务综合","kw":"关于劳务派遣⽤⼯,⽤⼈单位核算问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则、《企业会计准则第9号——职⼯薪酬（2014年修订）》"},{"id":"CY0648","q":"劣后级收益分类的问题","a":"这部分收益实际上是持有期间累积的，只是清算时⼀次性分配收回。因此作为持有期间损益也可以接受。 上一页 陈版主（陈奕蔚老师）答疑历史文章（2024年06月） 下一页 陈版主（陈奕蔚老师）答疑历史文章（2024年08月） 粤ICP备18107660号 粤公网安备44060602000887号 关于网站 Copyright © 2021-2026 会计便利店 hjyweb.cn 【个人理解，供参考。","cat":"实务综合","kw":"请教陈版劣后级收益分类的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1144","q":"请教陈⽼师：关于⾦融负债和权益⼯具的区分","a":"⼀般理解，是否分配优先股股利，可由发⾏⽅⾃主决定，故（2）不构成分类为发⾏⽅权益⼯具的障碍。 但这个问题确实存在不够严密的地⽅。其成⽴的前提是“是否分配优先股股利完全由发⾏⽅⾃主决定，不受其他条件限制”。但如果优先股股利的发放因某些客观因素的限制⽽⽆法实现时（例如没有⾜够的可供分配利润）投资者也有回售权，则这种情况下的投资者回售权也会成为导致不能分类为发⾏⽅权益⼯具的因素。个人理解，供参考。","cat":"实务综合","kw":"请教陈⽼师,关于⾦融负债和权益⼯具的区分","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0031","q":"⾮同⼀控制下企业合并","a":"应当穿透到底层资产来分析。如果B是A的⼦公司，则应分析B是否构成业务；如果A对B⽆控制权但有重⼤影响， 则应注意区分联营企业是否构成业务。 如果A控制B，⽽B构成业务的，则仍属于企业合并。 如果A对B⽆控制权但有重⼤影响，则根据《2017年会计监管协调会——具体会计问题监管⼜径》：“被购买⽅仅持有⼀项对联营公司投资时，是否构成业务，需要判断其所持有的联营公司本⾝是否构成业务。如果联营公司本⾝只持有现⾦、以公允价值计量的⾦融资产等，并不构成业务，则被购买⽅持有的相应长期股权投资也不构成业务；如果联营公司本⾝构成业务，则被购买⽅持有的长期股权投资也构成业务。也即，被购买⽅主要资产为联营公司股权时，对其是否构成业务的判断，应穿透⾄联营公司层⾯确定。”。个人理解，供参考。","cat":"收入准则","kw":"控制权,公允价值,合并,⾮同⼀控制下企业合并","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY1760","q":"⺟公司向⼦公司捐赠资产的会计及税务处理","a":"A作为B的⺟公司，向B⽆偿划转资产不应冲减A⾃身的资本公积或者计⼊营业外⽀出，应将划出资产的原账⾯价值转⼊对B的⻓期股权投资成本。 B公司对取得该⽣产线的⼊账价值确定，取决于该⽣产线是否构成业务。如构成业务的，则按同⼀控制下合并的处理原则，按照该⽣产线在A的原账⾯价值⼊账，同时增加资本公积；反之，若不构成业务的，则按公允价值（评估值）⼊账，对应增加资本公积。 税务处理问题建议咨询税务专业⼈⼠意⻅。提问⼈：姜姜jj 时间：2025-10-15 12:49:52 陈⽼师您好，⺟公司的⽣产线是0对价划转，对于⺟公司来说，是少了⼀项资产，确认⻓投就⽆法体现少了⼀项资产了，为什么要确认⻓投呢？谢谢！ 回答⼈：chenyiwei ⺟公司并未丧失对该资产的控制权，以该项资产对⼦公司进⾏资本性投⼊。提问⼈：姜姜jj 时间：2025-10-11 14:33:48 如下问题请教陈⽼师： 背景：B公司是A公司的全资⼦公司。为⽀持B公司业务发展，A公司将⼀条⽣产线⽆偿划转给B公司，该条⽣产线在A公司的账⾯价值为800万，评估的公允价值为1200万。A公司与B公司分别应如何会计、税务处理？假设企业所得税税率为25%，增值税税率13%。 向陈⽼师求助，以下会计及税务处理哪项正确（会计分录涉及多步骤的，简化处理）： A公司：借：资本公积800 贷：固定资产800 不涉及企业所得税 A公司：借：营业外⽀出800 贷：固定资产800 且营业外⽀出800不得企业所得税前扣除，须做纳税调增。 B公司：借：固定资产800 贷：资本公积800 同时确认企业所得税，借：资本公积200 贷：应交企业所得税200 B公司：借：固定资产800 贷：资本公积800 同时确认企业所得税，借：所得税费⽤200 贷：应交企业所得税200 第（1）、（2），A公司是否还需按固定资产的公允价值计算缴纳增值税？谢谢！ 回答⼈：chenyiwei https://bbs.esnai.com/thread-5494265-1-1.html个人理解，供参考。","cat":"收入准则","kw":"控制权,公允价值,合并,所得税,固定资产,⺟公司向⼦公司捐赠资产的会计及税务处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0560","q":"合作建房账务处理","a":"该情形下，上市公司与客户的合作建房协议包含了多重交易： 收⼊合同。上市公司与客户合作建房，客户能控制建好的⼚房时，上市公司向客户提供了⼀项建筑服务。上 市公司为建房所发⽣的⽀出是为了履⾏建筑服务履约义务⽽发⽣的投⼊，应计⼊“合同履约成本”，并在确认建筑服务收⼊时，采取和收⼊确认相⼀致的原则结转⾄营业成本。与客户的合同⼀开始就约定客户向上市公司⽀付⼚房建造费⽤时需扣除上市公司按照市场价格实际应承担的房租，这表明上市公司向客户提供建筑服务包含了两部分对 价：⼀部分是取得⼚房在协议期内的使⽤权这⼀项⾮现⾦对价；另⼀部分是客户⽀付的现⾦对价。上市公司应将使 ⽤权资产的公允价值，即市场租⾦价格于租赁期开始⽇的现值计⼊建筑服务的交易价格。如果市场租⾦价格不能合理估计的，上市公司应当参照其向客户提供类似建筑服务的单独售价间接确定交易价格。同时，如果该协议期超过 1年，合同约定在协议期满后客户才⽀付上市公司⼚房建造费⽤，该合同还可能包含了重⼤融资成分。 租赁合同。上市公司作为承租⼈，获取了⾃完⼯验收后⾄协议期满这⼀期间内标的⼚房的使⽤权，形成⼀项租赁。上市公司应在租赁期开始⽇（⼚房验收通过可供上市公司使⽤之⽇）确认使⽤权资产。 在租赁期开始⽇之前，上市公司确认建筑服务收⼊形成的收款权，预计客户将⽀付现⾦的部分计⼊“应收款项”，存在重⼤融资成分的，在协议期内按实际利率计算融资收益；预计折抵租⾦的部分，我们认为可以采取以下两种⽅法之⼀进⾏处理： 在确认收⼊时将该部分计⼊“应收款项”，视同在建造期间，上市公司核算的仍是向客户的收款权，于租赁期开始⽇时，上市公司以“应收款项”和“应付租赁付款额”净额结算，将折抵租⾦部分在租赁期开始⽇从“应收款项”调整⾄“使⽤权资产”。 在确认收⼊时将该部分计⼊“预付款项”，列⽰于“其他⾮流动资产”，即：作为预付的租赁付款额核算并列 ⽰，在租赁期开始⽇，将“预付款项”结转⾄“使⽤权资产”。个人理解，供参考。","cat":"收入准则","kw":"公允价值,履约义务,租赁,合作建房账务处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY1826","q":"向集团关联企业提供资⾦借贷进⾏减值会计处理时","a":"根据2017年修订后的CAS 22，可以简化按照“整个存续期”测试减值的情况，只有第五⼗七条、第六⼗三条规定的以下情况： 第五⼗七条 对于购买或源⽣的已发⽣信⽤减值的⾦融资产，企业应当在资产负债表⽇仅将⾃初始确认后整个存续期内预期信⽤损失的累计变动确认为损失准备。在每个资产负债表⽇，企业应当将整个存续期内预期信⽤损失的变动⾦额作为减值损失或利得计⼊当期损益。即使该资产负债表⽇确定的整个存续期内预期信⽤损失⼩于初始确认时估计现⾦流量所反映的预期信⽤损失的⾦额，企业也应当将预期信⽤损失的有利变动确认为减值利得。 第六⼗三条 对于下列各项⽬，企业应当始终按照相当于整个存续期内预期信⽤损失的⾦额计量其损失准备： （⼀）由《企业会计准则第14号——收⼊》规范的交易形成的应收款项或合同资产，且符合下列条件之⼀： 该项⽬未包含《企业会计准则第14号——收⼊》所定义的重⼤融资成分，或企业根据《企业会计准则第14号——收⼊》规定不考虑不超过⼀年的合同中的融资成分。 该项⽬包含《企业会计准则第14号——收⼊》所定义的重⼤融资成分，同时企业做出会计政策选择，按照相当于整个存续期内预期信⽤损失的⾦额计量损失准备。企业应当将该会计政策选择适⽤于所有此类应收款项和合同资产，但可对应收款项类和合同资产类分别做出会计政策选择。 （⼆）由《企业会计准则第21号——租赁》规范的交易形成的租赁应收款，同时企业做出会计政策选择，按照相当于整个存续期内预期信⽤损失的⾦额计量损失准备。企业应当将该会计政策选择适⽤于所有租赁应收款，但可对应收融资租赁款和应收经营租赁款分别做出会计政策选择。在适⽤本条规定时，企业可对应收款项、合同资产和租赁应收款分别选择减值会计政策。 对其他企业（不仅仅是关联⽅）的资⾦拆借，不属于上⾯两条所述情形，故不能简化直接按照整个存续期计提减值。个人理解，供参考。","cat":"收入准则","kw":"减值,租赁,向集团关联企业提供资⾦借贷进⾏减值会计处理时","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入、《企业会计准则第14号——收⼊》、《企业会计准则第21号——租赁》"},{"id":"CY0034","q":"委贷及优先股投资的会计处理","a":"虽然该项委贷是在办理ODI审批登记之前的临时性措施，但其本⾝是⼀项独⽴的⾦融资产，应根据其⾃⾝的合同现 ⾦流量特征和管理模式确定其分类。有可能被分类为债权投资。其核算与⼀般的委托贷款相同，利息作为应收利息核算及列报。个人理解，供参考。","cat":"收入准则","kw":"求助陈版主委贷及优先股投资的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY1073","q":"⾮同⼀控制下企业合并，年末合并资产负债表与合并利润表、合并现⾦流量表的勾稽","a":"你所说的差额，即被购买⽅截⾄购买⽇的留存收益，属于购买⽅于购买⽇取得的被购买⽅可辨认净资产的⼀部分，应与购买⽅合并报表层⾯的⻓期股权投资进⾏抵销处理，不体现为购买⽅合并报表层⾯的净利润和净资产变动，只有购买⽇后被购买⽅的利润表才纳⼊购买⽅的合并利润表，从⽽影响购买⽅合并报表层⾯的期末留存收益。 合并现⾦流量表的处理原则类似。购买⽇，购买⽅所⽀付的现⾦对价减去被购买⽅于购买⽇所持有的现⾦及现⾦等价物余额后的净额列⼊“取得⼦公司或其他营业单位⽀付的现⾦净额”（如为负数则列⼊“收到其他与投资活动有关的现⾦”）。即被购买⽅于年初⾄购买⽇期间的现⾦变动的影响已体现在被购买⽅于购买⽇的现⾦及现⾦等价物余额中，所以不再重复列⼊其发⽣额。个人理解，供参考。","cat":"企业合并","kw":"合并,⾮同⼀控制下企业合并,年末合并资产负债表与合并利润表,合并现⾦流量表的勾稽","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0042","q":"关于吸收合并商誉计算的问题！求教！！！","a":"对于2020年的控股和2023年的吸收合并，⼀般不认为是⼀揽⼦交易。 吸收合并⼦公司不属于会计意义上的企业合并。母公司个别报表层⾯应按《企业会计准则解释第7号》第四条规定处理。基本原则是将原先合并报表层⾯确认的对B公司的商誉平移到吸收合并完成后的A公司个别报表中。个人理解，供参考。","cat":"企业合并","kw":"商誉,合并,关于吸收合并商誉计算的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0659","q":"合并报表⽇净资产公允价值⾼于⽀付对价","a":"根据《企业会计准则第20号——企业合并》第⼗三条（⼆）：购买⽅对合并成本⼩于合并中取得的被购买⽅可辨认净资产公允价值份额的差额，应当按照下列规定处理： 对取得的被购买⽅各项可辨认资产、负债及或有负债的公允价值以及合并成本的计量进⾏复核； 经复核后合并成本仍⼩于合并中取得的被购买⽅可辨认净资产公允价值份额的，其差额应当计⼊当期损益。 理论上，应在谨慎复核该差异的合理性之后，将该差额作为合并报表层⾯的营业外收⼊处理。但需要注意《中审众环研究2020》之“问题3-2-58（⾮同⼀控制下合并中负商誉确认应注意的问题）”所提⽰关注的问题，避免出现就负商誉确认营业外收⼊后，短期内又确认⼤额的被收购⽅可辨认资产减值损失的情况。个人理解，供参考。","cat":"企业合并","kw":"公允价值,商誉,减值,合并,合并报表⽇净资产公允价值⾼于⽀付对价","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并、《企业会计准则第20号——企业合并》"},{"id":"CY1585","q":"以专利申请权做实缴出资的账务处理","a":"在会计上，专利申请权如果满⾜⽆形资产的确认条件（相关经济利益很可能流⼊企业；成本能够可靠计量），可以确认为⽆形资产。但能否将其直接作为出资增加实收资本，则更多地是⼀项法律问题。《公司法》对⽤作出资的⾮货币财产的要求是“实物、知识产权、⼟地使⽤权、股权、债权等可以⽤货币估价并可以依法转让的⾮货币财产”；《市场主体登记管理条例》第⼗三条规定“出资⽅式应当符合法律、⾏政法规的规定。公司股东、⾮公司企业法⼈出资⼈、农⺠专业合作社(联合社)成员不得以劳务、信⽤、⾃然⼈姓名、商誉、特许经营权或者设定担保的财产等作价出资”，从这些规定看，似乎并未禁⽌以专利申请权出资，但具体是否可⾏，建议咨询律师和登记机关意⻅。个人理解，供参考。","cat":"企业合并","kw":"商誉,以专利申请权做实缴出资的账务处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0049","q":"现⾦流量表问题-母公司增资","a":"不论是否构成企业合并，在母公司（投资⽅）的个别现⾦流量表中都是填⼊“投资⽀付的现⾦”。 “取得⼦公司及其其他营业单位⽀付的现⾦净额”⼀般是⽤于发⽣⾮同⼀控制下企业合并时，购买⽅的合并报表层⾯ （如果是吸收合并或者新设合并，且在会计上构成⾮同⼀控制下合并的，才可能出现在个别报表层⾯）。详见《中审众环研究2020》之“问题5-2-20（取得或处置⼦公司及其他营业单位⽀付或收到的现⾦）”。个人理解，供参考。","cat":"企业合并","kw":"合并,现⾦流量表问题-母公司增资","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY1245","q":"预提维修基⾦","a":"“为防范未来不确定的⼤额维修⽀出，是否能在⽇常按照收⼊或资产⼀定⽐例每⽉预提维修的基⾦，⽤于未来⼤修理”是不可以的，因为此类针对未来⽀出的准备并不是针对已发⽣的交易或事项导致的现时义务，故不符合负债的定义和确认条件。 虽然这种计提思路类似于安全⽣产费等专项储备，但此处并不能简单套⽤专项储备的处理。专项储备的计提模式应严格限于其对应规定在字⾯上的适⽤范围，不能扩⼤。个人理解，供参考。","cat":"实务综合","kw":"预提维修基⾦","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1535","q":"项⽬合作会计处理（请陈版解惑）","a":"不论何种模式，因为B只是提供资⾦获取收益，不参与经营，即只是财务投资⼈，故应将对项⽬的投资确认为交易性⾦融资产。 理论上，B应在每⽉末根据A提供的项⽬经营状况信息，确认其⾃身应享有的收益份额，调整该项⾦融资产的账⾯价值并确认公允价值变动损益。实务中如果不跨年的，也可以简化为：在收到分配款项时冲减资产账⾯价值，将资产账⾯价值冲减⾄零后继续收到的款项确认为投资收益。个人理解，供参考。","cat":"实务综合","kw":"公允价值,项⽬合作会计处理,请陈版解惑","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0478","q":"求助，持股平台贷款事宜咨询","a":"持股平台以⾃⾝名义向银⾏取得借款时，应确认为负债，相应地其利息⽀出也可以计⼊持股平台的财务费⽤，但很可能这部分利息不能在税前扣除，关于税前扣除问题建议与主管税务机关沟通确认。 合伙⼈后续缴⼊的出资款可以确认为持股平台的权益。银⾏从持股平台账户中的扣款作为上述还本付息处理。合伙⼈实缴出资的计划当然要考虑借款还本付息的资⾦需求，也要考虑对被投资公司的出资需要。个人理解，供参考。","cat":"实务综合","kw":"持股平台贷款事宜咨询","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1625","q":"⼦公司分红账务处理","a":"“由于B公司存在诉讼事项，决议将分红先⽤于补偿诉讼预计发⽣的⽀出，待补偿后剩余部分分给各股东”，这种情况下的股东会决议只是对分红的⼀项预授权，最终可分配的⾦额并不确定，只是确定了分红⾦额上限为100万元，且在该诉讼事项了结之前⼤概率不会实际⽀付。 在此情况下，建议A公司先不确认投资收益和应收股利，到⾦额确定后再按照实际获得分红的⾦额进⾏投资收益的会计处理。个人理解，供参考。","cat":"实务综合","kw":"⼦公司分红账务处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0882","q":"奶⽜场⾃我繁殖的⽜犊如何确认初始成本？","a":"根据历史经验和⽬前的⽣产技术，“将来不作为⽣产性⽣物资产⼩⽜（断奶后直接卖和出售给医药公司⽤于抽⾎清）”是否不可避免地要发⽣，能否合理预计其发⽣的⽐例？ 个⼈理解此类情况可以⽐照⼯业企业中的废品损失处理。 如果属于不可避免地要发⽣，且其⽐例能够合理预计的情形，则啊分摊成本时就应当考虑该情况的影响，将此类次品⽜低价出售的损失分摊给⽇后可成为成熟奶⽜的⽜犊。个人理解，供参考。","cat":"实务综合","kw":"奶⽜场⾃我繁殖的⽜犊如何确认初始成本","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1837","q":"破产重整暂缓债务豁免处理","a":"重整期间暂缓⽀付的债权款项，与重整期间已获得豁免的债务采⽤相同原则处理。即需判断其经济实质与其他⾮关联⽅债权⼈给予的债务豁免是否相同，还是属于控股股东对被重整上市公司的资本性投⼊。例如，需要考虑该债务当初的形成原因和过程、款项性质；豁免的⾦额、⽐例和附加条件是否与⾮关联⽅债权⼈给予的豁免相同或相似；豁免⾦额与⾮关联⽅债权⼈的豁免⾦额是否具有可⽐性；等等。个人理解，供参考。","cat":"实务综合","kw":"破产重整暂缓债务豁免处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1210","q":"购⼊污⽔处理经营权⼊账问题","a":"建议第⼆项补偿费（根据未来若⼲年每年需要安置的职⼯⼈数和标准计算）尽可能合理估计，计⼊⽆形资产原值并确认相应负债。例如考虑精算⽅法能否适⽤。后续实际结果与初始估计数的差异计⼊各期损益处理。 如果确实难以在初始确认⽆形资产时对第⼆项补偿费作出合理估计的，则也可以接受不将其估计后纳⼊原值的做法，但需要在后续实际发⽣时计⼊当期损益处理，不再调整⽆形资产原值。个人理解，供参考。","cat":"实务综合","kw":"购⼊污⽔处理经营权⼊账问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1828","q":"事业单位⽆偿划转⼦企业股权组建集团公司的业务咨询","a":"问题5（1）关于被划转⼦公司留存收益的恢复：由于被合并⽅留存收益的恢复并不是以合并⽅个别报表层⾯的资本公积为限，⽽在将被合并⽅合并⽇之前的净资产均并⼊⼄公司资本公积之 后，是有⾜够多的资本公积⽤于恢复各⼦公司留存收益的，因此应确保各⼦公司留存收益的⾜额恢复。“合并⽅合并前的留存收益中归属于合并⽅⼄公司的部分不进⾏恢复处理”的理解不恰当。 其他基本合理。个人理解，供参考。","cat":"实务综合","kw":"合并,事业单位⽆偿划转⼦企业股权组建集团公司的业务咨询","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1154","q":"企业间合作投资股票交易的处理","a":"如果明确这是⼀项有效的股票代持（请注意就此获取律师的法律专业意⻅），则⽬标企业收到委托⽅的款项时确认为⼀项负债，按委托⽅指令购⼊股票时冲减该项负债，即不将以⾃⼰名义持有的该项股票确认为⾃身的资产。后续涉及该项股票的资⾦往来，包括从被投资企业收到股利后转付给委托⽅，以及根据委托⽅指令处置股票并将处置价款⽀付给委托⽅，均按代收代付处 理，不确认损益。个人理解，供参考。","cat":"实务综合","kw":"企业间合作投资股票交易的处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1067","q":"⽣效判决中违约⾦、迟延履⾏利息⼊账时点？","a":"作为胜诉⼀⽅，依据⽣效判决取得了向败诉⽅收取这些款项的权利，但会计上能否确认为资产，还取决于对应的经济利益能否流⼊企业（即该款项实际收到的可能性）的判断。只有在综合各 ⽅⾯信息谨慎判断后，确认这些款项很可能收到（即收到的可能性⼤于50%），才可以在收到⼆审判决当天即确认此类应收款项和营业外收⼊。在实务中，基于谨慎考虑，多数还是在实际收到时确认。个人理解，供参考。","cat":"实务综合","kw":"⽣效判决中违约⾦,迟延履⾏利息⼊账时点","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0404","q":"员⼯退股","a":"由于背景不清晰，需要补充说明以下情况：“退股按照初始⼊账价格退出（即：员⼯退股不享有持有期间的损益）”是否在任何情况下退股都是如此？即，员⼯能否通过正常途径享受激励股份的公允价值增值收益？ 这个问题涉及到该持股平台的性质是股份⽀付还是利润分享计划。另外，为何“员⼯持股满⾜股权要求，不是负债”？员⼯退股时是转让给其他员⼯，还是由公司收回注销？个人理解，供参考。","cat":"实务综合","kw":"公允价值,员⼯退股","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0669","q":"⾮经常性损益","a":"加计抵减⼀般是来源于企业的⽇常经营业务。因此判断加计抵减的影响是否作为⾮经常性损益，主要是考虑其是否为偶发性，例如所执⾏的加计抵减政策的有效期是否短于3年。 ⽬前执⾏的集成电路、⼯业母机、先进制造业企业增值税加计抵减政策的有效期都是到2027年，其有效期较长，因此可以在⼀段较长时间内成为企业的稳定收益来源，相应地可以不作为⾮经常性损益。个人理解，供参考。","cat":"实务综合","kw":"⾮经常性损益","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1379","q":"拆除的房屋建筑物原值是否能够计⼊在建⼯程","a":"如果是将⼟地和地上原有房屋建筑物⼀并购⼊，且购⼊时就明确将拆除原有房屋建筑物的，则地上原有房屋建筑物的账⾯价值应属于取得⼟地使⽤权的必要成本，应计⼊“⽆形资产——⼟地使 ⽤权”的账⾯价值，⽽不是计⼊在建⼯程的账⾯价值。拆除费⽤也同样处理。 参阅：《中审众环研究2020》之“问题1-1-4（拆除旧房并建造新房时，旧房原账⾯价值的处理）”。个人理解，供参考。","cat":"实务综合","kw":"拆除的房屋建筑物原值是否能够计⼊在建⼯程","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1014","q":"地产公司合作开发项⽬账务处理","a":"项⽬只能以A名义开发，即项⽬部应设置在A体内。相应地，该项⽬部账套应并⼊A公司报表，在A公司报表中完整反映该项⽬部的各项资产、负债、收⼊和成本费⽤情况。 B对该项⽬的投⼊在A公司报表中确认为负债，期末根据应由B享有或承担的项⽬盈亏，对该项负债的账⾯价值进 ⾏调整，对应计⼊项⽬开发成本或管理费⽤等科⽬。项⽬部对B的各项分配冲减该项负债。个人理解，供参考。","cat":"实务综合","kw":"地产公司合作开发项⽬账务处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0360","q":"不属于持有待售资产，原因见上。 提问⼈：⽴⽅光年 时间：2024-05-17 092747","a":"持有⽬的不是资本增值或者获取租⾦收⼊；也可能只能整体出售。提问⼈：xiny973025 时间：2024-06-21 11:51:06 陈版，想要补充咨询⼀下，如果A公司已与B公司协议约定抵偿⼯程款，同时B公司给予了1年的过户期，在这个期间因未能及时抵付给供应商⽽发⽣跌价的，跌价损失如何处理？ 回答⼈：chenyiwei 这种情况属于担保物的跌价。如果没有直接将⼯抵房确认为债权⼈⾃⾝资产，则相当于此前的应收⼯程款并未终⽌确认，此时通过应收⼯程款的坏账准备来调整。个人理解，供参考。","cat":"持有待售","kw":"持有待售,不属于持有待售资产,原因见上,提问⼈,⽴⽅光年,2024-05-17,092747","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第42号——持有待售的非流动资产、处置组和终止经营"},{"id":"CY1521","q":"设计费分摊问题","a":"如果⽆法单独区分该栋楼的设计费，则⾄少应当考虑：如果⼀开始聘请设计院提供的设计服务就不包含该幢楼，则设计费可以减少多少？可减少的设计费就是对应于该幢楼的直接⽀出。 如果⽆法采⽤上述“差量法”确定该幢楼对应的设计费，则采⽤其他系统、合理的基础（例如各幢楼的建筑⾯积或占地⾯积⽐例、造价⽐例等）确定应归属该幢楼的设计费，将其予以费⽤化处理。个人理解，供参考。","cat":"实务综合","kw":"设计费分摊问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0499","q":"中审众环研究","a":"原先打算在2023年出⼀个新版的，但后来修订整理的进度不及预期。 到了2024年，因为新的应⽤指南汇编和上市公司案例解析的发布，需要对这些新的规范进⾏研究，并对照新的规范全⾯重新修订《中审众环研究》中的表述。 ⽬前还在研究《应⽤指南汇编》，制作新旧对⽐和培训课件的阶段，争取尽早启动新⼀轮的《中审众环研究》全⾯修订⼯作。 谢谢关注！个人理解，供参考。","cat":"实务综合","kw":"中审众环研究","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1237","q":"资产负债表期末应付福利费可以有⾦额吗","a":"“应付职⼯薪酬——福利费”期末是可以有余额的，但这些余额必须符合负债的定义和确认条件，即：针对已发⽣的交易或事项的尚未结算的付款义务，⽽不是针对未来⽀出的准备。 因此，针对报告期内的租⾦，按照制度规定可以合理确定⽀付标准，但尚未⽀付（包括员⼯已提交发票但尚未⽀付，以及期后提交报告期内租房发票两种情况）可以在期末确认负债并保留余额。个人理解，供参考。","cat":"实务综合","kw":"资产负债表期末应付福利费可以有⾦额吗","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0799","q":"形式与实质不⼀致的收⼊成本疑问","a":"由于B并未向A提供“物业技术服务”，所以是A、B之间的权益性交易，相当于A为B承担被转移的⼈员⼯资。但因为A、B之间⽆直接股权关系，故A应冲减权益，B应确认成本费⽤同时增加资本公积。 如果有证据表明该⾼管系为A代持B的股权，即B的权益最终都归属于A，则可以认为这是A对B的资本性投⼊，B同样贷记资本公积，A借记对B的长投成本。个人理解，供参考。","cat":"实务综合","kw":"形式与实质不⼀致的收⼊成本疑问","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1554","q":"应收票据贴现付费⽤问题","a":"我理解也是财务费⽤。事实上贴现终⽌确认的情况都是应收款项融资。应收票据贴现满⾜终⽌确认条件的基本没有。提问⼈：爬爬呀 时间：2025-07-20 21:00:02 继续追问下： 像之前的帖⼦中有这样⼀个案例 问：1、6+9银⾏承兑汇票，在贴现时不需要考虑与银⾏签署的协议是否附有追索权。都可以终⽌确认。因为银⾏信誉度好；个人理解，供参考。","cat":"实务综合","kw":"应收票据贴现付费⽤问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0949","q":"请教合并利润表的问题","a":"⼀般情况下，如果购买⽇为上半⽉，则通常以当⽉⽉初的被购买⽅财务数据来模拟购买⽇的状况，相应地利润表和现⾦流量表的合并期间为最后⼀个⽉（当⽉⽉初⾄年末）。 但同时应关注：在当⽉⽉初和购买⽇之间，被购买⽅是否发⽣了影响其财务状况的重⼤变化。如果有，则应将该类重⼤变化包含在购买⽇净资产的确定中，以尽可能接近真实情况。个人理解，供参考。","cat":"实务综合","kw":"合并,请教合并利润表的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1070","q":"关于⽆偿划拨资产的⼊账问题","a":"理论上接受⽆偿划拨的资产也应按照划⼊⽇的公允价值⼊账，但因为实务中对于⽆偿划拨基本不做评估，难以确定其公允价值，故⼀般也接受采⽤在划出⽅的原账⾯价值作为⼊账价值。对于⼟地⼊账价值为1元名义⾦额的原因，建议进⼀步了解，以确定是否合理，例如是否确实难以合理估计其公允价值，或者该⼟地是否为划拨地等转让受限的⽤地。个人理解，供参考。","cat":"实务综合","kw":"公允价值,关于⽆偿划拨资产的⼊账问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1593","q":"公司折价购买房票的处理","a":"在不涉及关联交易的前提下，A公司折价购⼊的房票应按实际⽀付的对价⾦额⼊账。后续⽤其冲抵购房款时，将该房票的实际购⼊成本计⼊取得房屋的成本中。即，该房票记载的名义⾦额对会计处理⽆影响。有意义的是实际交易⾦额。个人理解，供参考。","cat":"关联方披露","kw":"公司折价购买房票的处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第36号——关联方披露"},{"id":"CY0153","q":"关于⼦公司使⽤母公司募集资⾦的会计处理","a":"母⼦公司各⾃个别报表层⾯的处理，取决于母公司是以何种⽅式将募集资⾦拨付给⼦公司的，例如，可能采⽤股权投资的⽅式；也可能要求⼦公司⽇后归还（计息或不计息）等。根据不同的情况选择该笔内部拨款的处理⽅式，但直接将母公司层⾯应付债券的会计处理下推到⼦公司层⾯肯定是不合适的，因为母公司是债券还本付息的⾸要责任 ⼈。个人理解，供参考。","cat":"实务综合","kw":"关于⼦公司使⽤母公司募集资⾦的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0328","q":"其他权益⼯具投资后，后续⽀付的管理费、托管费计⼊什么科","a":"应注意区分与取得投资相关的交易费⽤（初始直接费⽤）和持有投资期间的费⽤。前者可计⼊其他权益⼯具投资成本，后者应在发⽣时直接计⼊管理费⽤。 与取得投资直接相关，仅在取得投资时发⽣⼀次，⾦额与投资额挂钩，如未能成功投资则⽆需⽀付的，则属于初始直接费⽤；其他情况（如主帖中的托管费、管理费等）均应直接费⽤化处理。个人理解，供参考。","cat":"实务综合","kw":"求助陈版主,其他权益⼯具投资后,后续⽀付的管理费,托管费计⼊什么科","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0532","q":"其他⾮流动性⾦融资产可以设会计科⽬做账吗？","a":"从《应⽤指南汇编2024》各章的会计科⽬及其使⽤说明来看，“其他⾮流动⾦融资产”只是⼀个报表项⽬，“交易性 ⾦融资产”才是会计科⽬。期末对“交易性⾦融资产”科⽬的余额应进⾏分析填列，即属于流动资产的部分填⼊资产负债表的“交易性⾦融资产”项⽬，属于⾮流动资产的部分填⼊资产负债表的“其他⾮流动⾦融资产”项⽬。个人理解，供参考。","cat":"实务综合","kw":"其他⾮流动性⾦融资产可以设会计科⽬做账吗","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1737","q":"连锁企业与加盟商就加盟店⾯的单店盈利进⾏⽐例分成的账务处理","a":"业务模式1：本公司的初始投资确认为⼀项资产（其他⾮流动资产），取得的分红款⾸先冲减该项资产的成本，资产账⾯价值冲减为零后继续收到的分成款确认为投资收益。业务模式2：仅为提供运营管理服务，按照本公司实际获得的10%分成款确认为管理费收⼊，委派⼈员（店⻓等）的⼯资薪⾦如由本公司承担的，则作为该业务的营业成本。个人理解，供参考。","cat":"实务综合","kw":"连锁企业与加盟商就加盟店⾯的单店盈利进⾏⽐例分成的账务处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0343","q":"使⽤权资产相关问题","a":"“母公司承诺在⾮现⾦资产出资后三年内，以现⾦形式按照出资资产原值向⼦公司回购该部分资产”：回购后，该⼟地和设施是否仍由⼦公司使⽤？母公司的作价出资额是否虚⾼，本质上相当于将出资款推后3年⽀付？ 如果租⾦原本已由母公司代付，则3年后母公司为何还要向⼦公司付款回购这部分实物资产？ 建议⾸先把交易背景搞清楚。个人理解，供参考。","cat":"实务综合","kw":"请教陈版,使⽤权资产相关问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0391","q":"请问超过诉讼时效的应付账款可以核销吗","a":"⾦融负债核销的条件是相应的现时义务已经消除。⽽“诉讼时效已过”仅仅表明原债权⼈⽆胜诉权（即不再能通过诉讼⼿段追讨该笔⽋款），并不代表其实体权利已不存在。⽽且诉讼时效计算还会遇到暂停、中断等特殊问题，并不是从最初⼊账⽇起算满三年就⾃然过期。 因此，不能仅仅以“已过诉讼时效”为由认定满⾜核销应付账款的条件。个人理解，供参考。","cat":"实务综合","kw":"请问超过诉讼时效的应付账款可以核销吗","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1301","q":"同⼀控制下吸收合并内部往来款的问题","a":"吸收合并代表法律主体的“混同”，相应地，此前原有的债权债务关系将因为债权⼈和债务⼈的⼈格混同⽽消灭，因此⺟公司可以在吸收合并完成时直接在账⾯上作出终⽌确认原其他应收款的账务处理。相当于⺟公司先将⼦公司的该项其他应付款和⼦公司的其他资产负债⼀样纳⼊本企业报表，随即将其与本企业原有的其他应收款进⾏对冲处理。个人理解，供参考。","cat":"实务综合","kw":"合并,同⼀控制下吸收合并内部往来款的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0872","q":"关于回购⾃⾝股份⽤于出售，是否影响基本每股收益计算？","a":"回购库存股导致减少了发⾏在外股份数量，所以会对基本每股收益和稀释每股收益的分母都会产⽣影响。虽然将来拟⽤于再次出售，但在作为库存股核算期间不享有股东权利，实际上仍减少了发⾏在外股份数量。个人理解，供参考。","cat":"每股收益","kw":"关于回购⾃⾝股份⽤于出售,是否影响基本每股收益计算","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第34号——每股收益"},{"id":"CY1799","q":"与同⼀交易对⼿进⾏双向股权时，收购少数股权的处理","a":"仅仅根据主帖中的表述不能判断这两者的股权置换是否构成⼀揽⼦交易，需要分析两个交易的⽬的、甲⼄两家公司的经营业务及其关联性、处置和收购价格是否分别依据各⾃标的股权的公允价值等。 会计处理可参照《上市公司执⾏企业会计准则案例解析2024》之“案例12-14 ⾮全资⼦公司分⽴为两家公司后仅控制其中⼀家公司”。个人理解，供参考。","cat":"实务综合","kw":"公允价值,请教陈版,与同⼀交易对⼿进⾏双向股权时,收购少数股权的处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1375","q":"监管规则适⽤指引会计类第1号问题1-1","a":"股东的基本权利包括表决权、优先增资权、分红权、处置和资本增值权等。应从这些权利的⻆度来分析这些特殊股权的持有者与其他普通股股东所享有的权利之间是否存在重⼤差异，并由此导致⻛险和报酬的享有和承担情况存在实质性差异。例如，优先分红或者不按⽐例分红就是⽐较典型的“投资⽅承担的险和报酬与普通股股东实质差异”。个人理解，供参考。","cat":"实务综合","kw":"监管规则适⽤指引会计类第1号问题1-1","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1691","q":"计算稀释每股收益问题","a":"https://bbs.esnai.com/thread-5494038-1-1.html个人理解，供参考。","cat":"每股收益","kw":"计算稀释每股收益问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第34号——每股收益"},{"id":"CY0677","q":"关于集团或母公司对被投资单位长期债权视同“净投资的长期权 益”的会计处理","a":"当A、B作出将原往来款项认定为“净投资”的决议后，A、B和C的处理仍然应当是对应的。即，A、B作为长期应收款核算（以摊余成本计量的⾦融资产），对应地，C应转为长期应付款核算。主帖中所建议的“A、B作为长期应收款，C作为资本公积”的处理是不对应的，转为净投资并不豁免C在⽇后财务状况改善后的偿还义务，因此相应的⾦融负债不能转为C的权益。个人理解，供参考。","cat":"金融工具","kw":"请教陈版,关于集团或母公司对被投资单位长期债权视同“净投资的长期权,益”的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第37号——金融工具列报"},{"id":"CY0677","q":"关于集团或母公司对被投资单位长期债权视同“净投资的长期权 益”的会计处理","a":"当A、B作出将原往来款项认定为“净投资”的决议后，A、B和C的处理仍然应当是对应的。即，A、B作为长期应收款核算（以摊余成本计量的⾦融资产），对应地，C应转为长期应付款核算。主帖中所建议的“A、B作为长期应收款，C作为资本公积”的处理是不对应的，转为净投资并不豁免C在⽇后财务状况改善后的偿还义务，因此相应的⾦融负债不能转为C的权益。个人理解，供参考。","cat":"金融工具","kw":"请教陈版,关于集团或母公司对被投资单位长期债权视同“净投资的长期权,益”的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第37号——金融工具列报"},{"id":"CY1182","q":"关于掉期业务的处理问题","a":"如果企业的记账本位币是⼈⺠币，则该交易⽆法起到锁定美元汇率从⽽规避外汇⻛险的效果，其实质是以700万美元作为质押，从银⾏取得700*7.2433=5070.31万元⼈⺠币，⼀年后归还该 5070.31万元⼈⺠币，该笔借款名义上是没有利息的，但个⼈理解这应当是基于本公司与银⾏之间的⻓期业务合作关系，银⾏给予的让利。 因此，建议直接按照外币质押⼈⺠币借款进⾏会计处理。作为质押品的700万美元转⼊其他应收款（期末需按现⾏即期汇率进⾏汇率调整并确认汇兑损益），取得5070.31万元⼈⺠币作为借款本⾦贷记短期借款.银⾏预先⽀付的该业务收益160万元可以看作美元存款的利息收⼊，在其存续期内分摊确认。 建议进⼀步了解该业务的经济实质，以及银⾏在该业务中靠什么盈利，以便进⼀步分析。个人理解，供参考。","cat":"金融工具","kw":"关于掉期业务的处理问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第37号——金融工具列报"},{"id":"CY0023","q":"祝陈版和各位坛友2024新年快乐","a":"谢谢！也祝各位⽹友新年快乐！龙⾏⼤运！个人理解，供参考。","cat":"实务综合","kw":"祝陈版和各位坛友2024新年快乐","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0291","q":"实收资本原来股东已经实缴，⼯商上也已经写明实缴，","a":"如果确认⽼股东的600万元出资额当初是实缴的（需获取验资报告、出资证明书等相关证据，并核查实缴资⾦⼊账 的凭证、⾮货币出资的产权转移证明等），则⽬前⽆任何资产、负债的事实表明原股东事实上已将原公司的资产全部取⾛。 这类情况通常是出现在为了获取特定资质或许可⽽收购“净壳”公司的交易中，例如为了获取某项建筑资质，收购⼀家拥有该资质的公司，但与原股东约定在收购前需将原公司的资产、负债清理⼲净，变成“净壳”。 对这类情况，应重点关注标的公司的负债是否清理⼲净，是否可能导致收购⽅（本企业）为被收购⽅原先的负债承担责任或损失。对此可能需要聘请律师协助⼯作。 如果确定资产、负债均已清理⼲净，且历史上实收资本600万也是实缴的，则需要借记另⼀个权益科⽬（⼀般是未分配利润）将权益总额变为零。 后续新股东对该壳公司的增资，按常规⽅法进⾏会计处理和法律程序即可，可通过额外的固定资产增资（需经评估），将注册资本和实收资本增⾄1200万元。个人理解，供参考。","cat":"固定资产","kw":"固定资产,实收资本原来股东已经实缴,⼯商上也已经写明实缴","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第4号——固定资产"},{"id":"CY1292","q":"远期外汇合约会计处理咨询","a":"由于没有明确的被套期项⽬，因此不能使⽤套期会计⽅法，直接将该项远期合约作为以公允价值计量且其变动计⼊损益的⾦融资产或⾦融负债处理。资产负债表上列报为交易性⾦融资产或者交易性⾦融负债。个人理解，供参考。","cat":"金融工具","kw":"公允价值,远期外汇合约会计处理咨询","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第37号——金融工具列报"},{"id":"CY1337","q":"掉期业务截⽌报表⽇公允价值重估问题","a":"此类交易的近端和远端是⼀个整体交易的两个步骤，因此在对该项⾦融⼯具估值时应作为⼀个整体予以考虑，远端和近端应同时进⾏公允价值重估。 从主帖信息来看，也有另⼀种可能性，即如果两笔交易的美元⾦额相同，则该安排实际上是以⼀定的美元为质押，取得三个⽉期的⼈⺠币借款，其交易⽬的并不是为了缓解美元的汇率⻛险。如果是，则也可以采⽤简化处理，在⽬前只有承诺⽽未实际发⽣交易的情况下，⽆需进⾏会计处理。个人理解，供参考。","cat":"金融工具","kw":"公允价值,陈版主,掉期业务截⽌报表⽇公允价值重估问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第37号——金融工具列报"},{"id":"CY1260","q":"现⾦分配原则：","a":"理论上，既然合伙⼈将对合伙企业的投资列报为“其他⾮流动⾦融资产”，则在每期末应根据管理⼈提供的投资管理报告等相关信息，基于底层资产的公允价值和合伙企业的收益分配规则，测算本企业期末所占合伙企业份额的公允价值，并确认公允价值变动损益。后续从合伙企业收到分配款时，因为此前在持有期间已确认过公允价值变动损益，故收到的分配款均冲减⾦融资产的账 ⾯价值，不再确认收益，以免重复。 实务中，如果⽆法做到每期末确认在合伙企业中份额的公允价值变动损益，因此期末对该项⾦融资产只能以成本计量的，则在收到合伙企业管理⼈的分配通知时，应核对其分配⾦额的计算是否符合合伙协议约定。在确认符合合伙协议约定的前提下，按照合伙协议约定的收益分配顺序处理，即分配通知上注明返还出资款的⾦额作为收回投资处理，贷记该项⾦融资产；分配通知上注明的收益分配⾦额确认为投资收益。 提问⼈：我购乐112 时间：2025-04-02 16:45:51 陈版主，您好，之前您说：“则应作为“其他⾮流动资产”（不是“其他⾮流动⾦融资产”）核算及列报”吗？ 回答⼈：chenyiwei “其他⾮流动资产”是指对合伙企业具有控制、共同控制或者重⼤影响的情形；“其他⾮流动⾦融资产”是指对合伙企业不具有控制、共同控制、重⼤影响的情形。个人理解，供参考。","cat":"报表列报","kw":"公允价值,现⾦分配原则","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第30号——财务报表列报"},{"id":"CY0297","q":"内退⼈员薪酬会计处理","a":"内退⼈员的薪酬属于辞退福利范畴，也应通过“应付职⼯薪酬”科⽬核算。 根据《企业会计准则应⽤指南汇编2024》P256：“企业实施职⼯内部退休计划的，在内退计划符合本章规定的确认条件时，企业应当将⾃职⼯停⽌提供服务⽇⾄正常退休⽇期间、企业拟⽀付的内退职⼯⼯资和缴纳的社会保险费 等，确认为应付职⼯薪酬， ⼀次性计⼊当期损益，⽽不能在职⼯内退后分期确认因⽀付内退职⼯⼯资和为其缴纳社会保险费等产⽣的义务”。个人理解，供参考。","cat":"职工薪酬","kw":"内退⼈员薪酬会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第9号——职工薪酬"},{"id":"CY0063","q":"房地产联合营企业溢价及摊销问题请教","a":"房地产项⽬公司属于“单⼀资产实体”，不构成“业务”（参考：《中审众环研究2020》之“问题3-2-1（收购“单⼀资产实体”是否构成业务合并）”）。因此，其收购溢价不形成商誉，⽽是构成对投资⽅⽽⾔的开发产品或开发成本等存货成本的⼀部分，在实现销售时⼀并结转成本。 该溢价的来源，在于房地产开发项⽬公司的股权变动作价⼀般是依据收益法（假设开发法）作价，其作价⾦额⼀般 ⾼于成本法（资产基础法）的估值。个人理解，供参考。","cat":"企业合并","kw":"商誉,合并,成本法,摊销,房地产联合营企业溢价及摊销问题请教","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0024","q":"祝陈版新年快乐，龙年⼤吉！","a":"谢谢！也祝本版⾯全体⽹友新年快乐，万事如意！个人理解，供参考。","cat":"实务综合","kw":"祝陈版新年快乐,龙年⼤吉","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1361","q":"企业合并","a":"按照⽬前的会计处理规定，标的企业（B）期初⾄处置⽇（对A⽽⾔是处置⽇，对C⽽⾔是合并⽇）之间的损益，在A、C的合并报表中都会体现。 A作为处置⽅，应合并B公司报表直⾄处置⽇。 C公司作为同⼀控制下合并的合并⽅，在合并报表层⾯需追溯重述其前期⽐较数据。因此在编制集团的⼤合并报表时需进⾏⼀定的技术处理以消除该重复情况。 上一页 陈版主（陈奕蔚老师）答疑历史文章（2025年03月） 下一页 陈版主（陈奕蔚老师）答疑历史文章（2025年05月） 粤ICP备18107660号 粤公网安备44060602000887号 关于网站 Copyright © 2021-2026 会计便利店 hjyweb.cn 【个人理解，供参考。","cat":"企业合并","kw":"合并,企业合并","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0023","q":"祝陈版和各位坛友2024新年快乐","a":"谢谢！也祝各位⽹友新年快乐！龙⾏⼤运！个人理解，供参考。","cat":"实务综合","kw":"祝陈版和各位坛友2024新年快乐","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0024","q":"祝陈版新年快乐，龙年⼤吉！","a":"谢谢！也祝本版⾯全体⽹友新年快乐，万事如意！个人理解，供参考。","cat":"实务综合","kw":"祝陈版新年快乐,龙年⼤吉","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0030","q":"是否需要确认股份⽀付费⽤？","a":"因为B、C合计占A公司的100%股权，实缴后股权⽐例未发⽣变动；且此次属于对原认缴出资的实缴，不具有为了获取员⼯或其他⽅的服务⽽予以补偿或激励的性质，故不属于股份⽀付。个人理解，供参考。","cat":"实务综合","kw":"是否需要确认股份⽀付费⽤","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0080","q":"⽣产企业销售给第三⽅后，再通过租赁公司租回的业务收⼊问题？","a":"⾸先应判断上述主帖中的各交易步骤是否为⼀揽⼦交易。从主帖来看构成⼀揽⼦交易的可能性较⼤。 在构成⼀揽⼦交易的假设前提下，该交易属于售后租回，应根据新租赁准则的规定判断其中的资产转让是否属于销售，据此进⾏相应的会计处理（第五⼗⼀条或者第五⼗⼆条）。个人理解，供参考。","cat":"租赁","kw":"租赁,⽣产企业销售给第三⽅后,再通过租赁公司租回的业务收⼊问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁"},{"id":"CY1630","q":"问题求助","a":"你搜索AI得出的结果是错误的。 对于研发过程中形成的样品、样机的成本归集与核算，应遵循《企业会计准则解释第15号》第⼀条和《监管规则适⽤指引——会计类第3号》之“3-11 固定资产达到预定可使⽤状态前试运⾏产品的会计处理”所述原则处理。存货成本包括直接材料、直接⼈⼯以及按照⼀定⽅法分配的制造费⽤，是企业正常设计⽣产能⼒下的必要合理⽀出。固定资产达到预定可使⽤状态前试⽣产的存货，应以正常设计⽣产能⼒下的必要合理⽀出为基础，确认相关存货成本，试运⾏期间实际投⼊⾦额超出存货成本的部分计⼊在建⼯程。正常设计⽣产能⼒下的必要合理⽀出，应结合固定资产达到预定可使⽤状态后的正常设计产能、产品正常⽣产投⼊产出⽐等因素考虑。 因此，你所收集到的“按名义⾦额1元⼊账存货”的做法是错误的。应根据上述原则，参照正常量产后的预计成本，将完整的成本构成项⽬分摊到试⽣产产品成本。 另外，根据财政部会计司发布的⽆形资产准则实施问答（ http://kjs.mof.gov.cn/zt/kjzzss/ … 0250417_3962191.htm），可转⼊研发中试⽣产产品成本的⾦额以资本化的研发⽀出为限。个人理解，供参考。","cat":"无形资产","kw":"固定资产,资本化,问题求助","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第6号——无形资产"},{"id":"CY0038","q":"2023年执⾏新保险合同准则后融资性担保公司报表披露问题","a":"2023年度，新保险合同准则仅适⽤于“在境内外同时上市的企业以及在境外上市并采⽤国际财务报告准则或企业会计准则编制财务报表的企业”，故担保公司在2023年度尚未受到新保险合同准则影响。可继续沿⽤此前的列报⽅ 式。个人理解，供参考。","cat":"收入准则","kw":"请教陈版主,2023年执⾏新保险合同准则后融资性担保公司报表披露问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0039","q":"其他综合收益列表","a":"在转换当期，该项其他综合收益的发⽣额可以列⼊所有者权益变动表：（⼀）综合收益总额。并体现在利润表的“其他综合收益”中。个人理解，供参考。","cat":"实务综合","kw":"其他综合收益列表","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0046","q":"国有企业收到财政⽆偿划转房产","a":"应按评估值⼊账更为合理。因为这是单项资产⽽不是业务，很难⽤“同⼀控制下合并”的⽅法处理。⽽且也存在避免虚增公允价值变动损益的考虑。个人理解，供参考。","cat":"实务综合","kw":"公允价值,合并,国有企业收到财政⽆偿划转房产","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0039","q":"其他综合收益列表","a":"在转换当期，该项其他综合收益的发⽣额可以列⼊所有者权益变动表：（⼀）综合收益总额。并体现在利润表的“其他综合收益”中。个人理解，供参考。","cat":"实务综合","kw":"其他综合收益列表","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1382","q":"求助陈⽼师！外汇掉期业务会计处理","a":"我理解，假设公司的本位币不是美元，则该安排并不能转移或者化解美元的汇率⻛险，因为在交易前后，公司所持有的5000万美元都不会发⽣变化。该交易更接近于以5000万美元为质押借⼊ ⼈⺠币和⽇元（如主帖所述“提⾼美元资⾦的收益”）。因此不涉及运⽤套期会计⽅法。个人理解，供参考。","cat":"金融工具","kw":"求助陈⽼师,外汇掉期业务会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第37号——金融工具列报"},{"id":"CY1486","q":"项⽬投资款及分红的账务处理","a":"这类交易中，作为接受投资⽅，因为分红与项⽬收益挂钩，并⾮固定收益，因此就取得投资款和投资⽅在该项⽬中的权益所确认的负债不属于以摊余成本计量的⾦融负债，相应地分配给投资 ⽅的收益不能视为利息，该分配额计⼊营业成本更合理。个人理解，供参考。","cat":"金融工具","kw":"项⽬投资款及分红的账务处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第37号——金融工具列报"},{"id":"CY1665","q":"处置投资业务收到的现⾦，现⾦流量表中如何列报？","a":"采⽤⽅案⼀，全部作为“收回投资收到的现⾦”。依据：《应⽤指南汇编2024》P1227： (1 ) 收回投资收到的现⾦。 本项⽬反映企业出售、转让或到期收回除现⾦等价物以外的分类为以公允价值计批且其变动计⼊当期损益的⾦融资产（以下简称交易性⾦融资产） 、分类为以摊余成本计量的⾦融资产（以下简称债权投资）、分类为以公允价值计量且其变动计⼊其他综合收益的⾦融资产（以下简称其他债权投资）、指定为以公允价值计量且其变动计⼊其他综合收益的⾦融资产（ 以下简称其他权益⼯具投资）、⻓期股权投资等⽽收到的现⾦，但不包括侦权性投资收回的利息、收回的⾮现⾦资产，以及处置⼦公司及其他营业单位收到的现⾦净额。债权性投资收回的本⾦，在本项⽬反映，债权性投资收回的利息，不在本项⽬中反映，⽽在“ 取得投资收益收到的现⾦” 项⽬中反映。处置⼦公司及其他营业单位收到的现⾦净额单设项⽬反映。本项⽬可以根据“交易性⾦融资 产”、 ＂债权投资”、“其他债权投资” 、“其他权益丁具投资” 、“⻓期股权投资”、“库存现⾦”、“银⾏存款”等科⽬的记录分析填列。个人理解，供参考。","cat":"金融工具","kw":"公允价值,请教陈版主,处置投资业务收到的现⾦,现⾦流量表中如何列报","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第37号——金融工具列报"},{"id":"CY0046","q":"国有企业收到财政⽆偿划转房产","a":"应按评估值⼊账更为合理。因为这是单项资产⽽不是业务，很难⽤“同⼀控制下合并”的⽅法处理。⽽且也存在避免虚增公允价值变动损益的考虑。个人理解，供参考。","cat":"实务综合","kw":"公允价值,合并,国有企业收到财政⽆偿划转房产","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0052","q":"出售⼦公司股权，又租回⼦公司物业及附属设施等全部资产的会计处理","a":"处置⼦公司股权与“取回⼦公司物业及附属设施”是否为⼀揽⼦交易？“取回⼦公司物业及附属设施”具体是如何操作的，有⽆年限约定？个人理解，供参考。","cat":"实务综合","kw":"出售⼦公司股权,又租回⼦公司物业及附属设施等全部资产的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0052","q":"出售⼦公司股权，又租回⼦公司物业及附属设施等全部资产的会计处理","a":"处置⼦公司股权与“取回⼦公司物业及附属设施”是否为⼀揽⼦交易？“取回⼦公司物业及附属设施”具体是如何操作的，有⽆年限约定？个人理解，供参考。","cat":"实务综合","kw":"出售⼦公司股权,又租回⼦公司物业及附属设施等全部资产的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0074","q":"请教陈版主关于本期内新增又处置⼦公司现流表的问题","a":"⾸先明确讨论前提：这两次股权受让和转让交易互相独⽴，不构成⼀揽⼦交易。在此前提下：个人理解，供参考。","cat":"实务综合","kw":"【求助】请教陈版主关于本期内新增又处置⼦公司现流表的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0076","q":"⾦融负债的核销","a":"不能仅以“已过诉讼时效”为由即认定“⾦融负债对应的现时义务已解除”。已过诉讼时效只是表明债权⼈丧失了就该债权寻求司法救济的权利，即法院不再保障其胜诉权，但对应的实体权利仍在，债权⼈仍可寻求其他救济途径。根据《民法典》第188条，实体权利的有效期是20年。个人理解，供参考。","cat":"实务综合","kw":"⾦融负债的核销","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0921","q":"⾮同⼀控制下控股合并商誉","a":"根据《企业会计准则第18号——所得税》第五条规定：资产的计税基础，是指企业收回资产账⾯价值过程中，计算应纳税所得额时按照税法规定可以⾃应税经济利益中抵扣的⾦额。 在控股合并中，商誉仅在合并报表层⾯出现，⽽所得税的应纳税所得额计算是以个别报表为基础的，也就是商誉不存在单独扣除的问题，因此商誉的计税基础为零。 在吸收合并或者新设合并中，虽然个别报表层⾯有商誉，但根据《企业所得税法实施条例》第六⼗七条规定，“外购商誉的⽀出，在企业整体转让或者清算时，准予扣除”，即要等到企业不再持续经营时才可以扣除，即此时虽计税基础不为零，但暂时性差异转回时，持续经营假设已不再适⽤，所以也就视同计税基础为零处理。个人理解，供参考。","cat":"企业合并","kw":"商誉,合并,所得税,⾮同⼀控制下控股合并商誉","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并、《企业会计准则第18号——所得税》"},{"id":"CY0817","q":"设备加计扣除账务处理","a":"单就账务处理⽽⾔，如果在2022年度税前⼀次性扣除并加计扣除的做法是恰当的，则会计上确认递延所得税负债的处理是合理的。 本案例主要是税务问题，即在建⼯程是否属于税法规定中可以在税前⼀次性扣除并加计扣除的“固定资产”，还是必须要转固之后才能享受该优惠政策。建议就此问题咨询税务专业⼈⼠意见并与主管税务机关沟通确认。如果确定只能在转固后加计扣除的，则此前的处理存在差错，应冲回处理。 如果只有在转固后才能享受该项优惠，则在转固之前，虽然存在暂时性差异，但当时的情形属于既不是企业合并， 且在初始确认时既不影响会计利润也不影响应纳税所得额的资产初始确认，故尚不需要确认递延所得税。个人理解，供参考。","cat":"企业合并","kw":"合并,所得税,递延,固定资产,设备加计扣除账务处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0860","q":"多次收购形成⾮同⼀控制下的商誉","a":"收益法评估值反映被收购⽅整体股权的公允价值，是交易作价的依据，但不是确定被收购⽅可辨认净资产公允价值及对其进⾏后续计量的依据。被购买⽅可辨认净资产公允价值应采⽤资产基础法确定，并以此为基础⾃基准⽇起测算评估增值额的折旧、摊销等后续损益影响。 购买⽇合并报表层⾯需重新确定原持有股权的公允价值，可以以收益法下的基准⽇股权评估结果为基础计算，但需考虑收益法评估值对净利润变动影响的放⼤效应，⽽不是直接加减过渡期内的账⾯净利润。 如果投资成本已包含未实缴股权（需在购买⽇后由购买⽅实缴），则未实缴到位的股权535.4万元在计算可持续性可辨认净资产公允价值时应该加上。个人理解，供参考。","cat":"企业合并","kw":"公允价值,商誉,合并,折旧,摊销,多次收购形成⾮同⼀控制下的商誉","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0891","q":"⾃建⼤楼何时转固","a":"根据《企业会计准则第4号——固定资产》第五条规定：“固定资产的各组成部分具有不同使⽤寿命或者以不同⽅式为企业提供经济利益，适⽤不同折旧率或折旧⽅法的，应当分别将各组成部分确认为单项固定资产。” 由于房屋建筑物主体结构和装修的使⽤寿命不同，故应分别确认为两项固定资产。相应地，应根据各⾃状况分别转固。主体结构完成后单独转固，但在后续装修期间，主体结构的折旧额可以计⼊装修⼯程的成本。 上一页 陈版主（陈奕蔚老师）答疑历史文章（2024年09月） 下一页 陈版主（陈奕蔚老师）答疑历史文章（2024年11月） 粤ICP备18107660号 粤公网安备44060602000887号 关于网站 Copyright © 2021-2026 会计便利店 hjyweb.cn 【个人理解，供参考。","cat":"固定资产","kw":"固定资产,折旧,请教陈版主,⾃建⼤楼何时转固","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第4号——固定资产、《企业会计准则第4号——固定资产》"},{"id":"CY1315","q":"会计和税务","a":"“福利费”和“折旧费”这两种分类，严格来说是出于不同的⻆度，并不是互斥的。“福利费”是从费⽤的功能⽽⾔的，即其⽤途是职⼯福利；“折旧费”是从费⽤要素⽽⾔的，即其发⽣的来源和⽅式是固定资产折旧。只不过福利费有税前扣除限额和特定的财务管理要求。 在财务⽅⾯，根据《关于企业加强职⼯福利费财务管理的通知》（财企[2009]242号）规定，“企业尚未分离的内设集体福利部⻔所发⽣的设备、设施和⼈员费⽤，包括职⼯⻝堂、职⼯浴室、理发室、医务所、托⼉所、疗养院、集体宿舍等集体福利部⻔设备、设施的折旧、维修保养费⽤以及集体福利部⻔⼯作⼈员的⼯资薪⾦、社会保险费、住房公积⾦、劳务费等⼈⼯费⽤”属于福利费范围，因此在财务上将职⼯宿舍的折旧计⼊管理费⽤——福利费是合理的。个人理解，供参考。","cat":"固定资产","kw":"固定资产,折旧,会计和税务","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第4号——固定资产"},{"id":"CY0057","q":"关于固定资产经营权和产权分离，会计处理的问题","a":"虽然名义上还拥有产权，但已不能带来经济利益流⼊，不再享有“占有、使⽤、收益、处分”的权利，因此不满⾜继续确认为资产的条件，建议参照⽆偿划转处理，在集团指令的委托经营的⽣效⽇，视同将该资产⽆偿划转给集团， 按该资产的账⾯价值冲减权益。 对于法律上仍保留的所有权，需注意进⾏备查登记。个人理解，供参考。","cat":"固定资产","kw":"固定资产,关于固定资产经营权和产权分离,会计处理的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第4号——固定资产"},{"id":"CY0162","q":"关于现⾦流量列报的问题","a":"这个问题⽬前较为普遍。当票据贴现不能终⽌确认时，相应的现⾦流率只能归⼊筹资活动。后续票据到期兑付，相应的短期借款（或其他流动负债）也相应消除，此时是没有现⾦流量的。只能在附注中“不涉及现⾦的重⼤投资与 筹资活动”部分中补充披露。个人理解，供参考。","cat":"报表列报","kw":"请教陈版,关于现⾦流量列报的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第30号——财务报表列报"},{"id":"CY0172","q":"营业收⼊扣除","a":"原⽂：与主营业务⽆关的业务收⼊是指与上市公司正常经营业务⽆直接关系，或者虽与正常经营业务相关，但由于其性质特殊、具有偶发性和临时性，影响报表使⽤者对公司持续经营能⼒做出正常判断的各项收⼊。 个⼈理解：此处并未明确规定“处置⼦公司前取得的⼦公司的正常营业收⼊”是否纳⼊扣除范围。应当区分不同情况予以讨论，关键是该⼦公司的处置是否影响到公司的持续经营能⼒。例如，如果被处置的⼦公司构成单独的报告分部（可理解为相当于终⽌经营），则应予以剔除；如果达不到单独报告分部或者终⽌经营标准的，则可以不扣除。个人理解，供参考。","cat":"报表列报","kw":"营业收⼊扣除","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第30号——财务报表列报"},{"id":"CY1348","q":"。","a":"在会计上，在租赁⼟地上建造的各种设施应确认为⻓期待摊费⽤⽽不是固定资产。但不论是确认为⻓期待摊费⽤还是固定资产，其建设期间内对应的⼟地使⽤权（或使⽤权资产）摊销均计⼊该项资产的成本。 提问⼈：feiye33333 时间：2025-04-29 10:51:30 感谢陈⽼师，建设期间内对应的⼟地使⽤权（或使⽤权资产）摊销均计⼊该项资产的成本，这个知道，但是就是做竣⼯决算的时候这块租⽤的⼟地是单独形成使⽤权资产，还是分摊到设备中？⽬前审核的企业编制的竣⼯决算均将租⽤的⼟地分摊到设备中，这样处理是否正确？ 回答⼈：chenyiwei 建设期间的⼟地摊销可以分摊到房屋建筑物、构筑物等不动产中，但不应分摊到设备等动产。个人理解，供参考。","cat":"租赁","kw":"租赁,固定资产,摊销,求助陈版主","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁"},{"id":"CY0094","q":"贴现未到期还原的商业承兑票据，期末是否需要计提坏账？","a":"贴现未到期还原的商业承兑票据，期末应视同应收账款计提坏账准备。个人理解，供参考。","cat":"实务综合","kw":"请教陈版,贴现未到期还原的商业承兑票据,期末是否需要计提坏账","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0096","q":"时点法确认收⼊依据","a":"此问题应当逐条对照新收⼊准则第⼗⼀条规定的应使⽤时段法的三种情形，说明为何都不符合。例如：个人理解，供参考。","cat":"实务综合","kw":"时点法确认收⼊依据","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0099","q":"请问陈⽼师关于现⾦结算的股份⽀付取消会计处理。","a":"现⾦结算股份⽀付中累积计⼊成本费⽤的⾦额等于最终结算给激励对象的现⾦。因此，如果现⾦结算股份⽀付在可 ⾏权⽇未达到可⾏权条件中市场条件⽽取消结算，则冲回前期确认的负债，对应冲减股份⽀付费⽤。 提问⼈：v724292421 时间：2024-03-04 21:20:30 请教陈⽼师，现⾦结算股权⽀付： 1，关于准则说，只要满⾜可⾏权条件⾮市场条件，企业就应当确认相应的成本费⽤（则不能冲销）？ 2，结合1，如果我说的没错，那么企业跟激励对象约定了可⾏权条件中市场业绩，但是激励对象确实没有实现可⾏权条件中市场业绩（⽽满⾜⾮市场条件），企业确认相应的成本费⽤和应付职⼯薪酬，如果按约定条款，企业不能 ⽀付给激励对象，那么应付职⼯薪酬不就是长期挂账了（因不能冲销）？还是仍需当做员⼯投⼊（转⼊资本公积） 呢？ 回答⼈：chenyiwei个人理解，供参考。","cat":"实务综合","kw":"请问陈⽼师关于现⾦结算的股份⽀付取消会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0100","q":"职⼯福利费的计提与发放","a":"根据《财政部关于企业加强职⼯福利费财务管理的通知》（财企[2009]242号）规定：“企业给职⼯发放的节⽇补 助、未统⼀供餐⽽按⽉发放的午餐费补贴，应当纳⼊⼯资总额管理”。因此，将过节费作为职⼯福利费列⽀是不恰当的。 该项过节费应在实际发放时计⼊相关成本费⽤。个人理解，供参考。","cat":"实务综合","kw":"职⼯福利费的计提与发放","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0101","q":"⽣产过程中的成品抽检成本如何计算？","a":"由于抽检是必须的流程，因此⽤于抽检的样品的成本应由最终实现销售的产品数量负担，相应增加其单位成本。即本案例中计算最终的单位⽣产成本时，分母为90件。个人理解，供参考。","cat":"实务综合","kw":"⽣产过程中的成品抽检成本如何计算","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0106","q":"请教或有对价会计处理","a":"⼀般情形下，或有对价资产属于以公允价值计量且其变动计⼊损益的⾦融资产或⾦融负债，在最终结算⾦额（或⾃ ⾝权益⼯具数量）最终确定之前的每个资产负债表⽇都应重新计量其公允价值，并确认公允价值变动损益。 不清楚你看到的信息的出处是什么，也可能是你的理解有误。个人理解，供参考。","cat":"实务综合","kw":"公允价值,请教或有对价会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0074","q":"请教陈版主关于本期内新增又处置⼦公司现流表的问题","a":"⾸先明确讨论前提：这两次股权受让和转让交易互相独⽴，不构成⼀揽⼦交易。在此前提下：个人理解，供参考。","cat":"实务综合","kw":"【求助】请教陈版主关于本期内新增又处置⼦公司现流表的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0109","q":"证监会会计类1号","a":"“该项投资不满⾜权益⼯具定义”的原因是：该项投资附有回售条件，且直接以被投资企业作为回购义务⼈，因此被投资企业在接受投资款的同时即承担了导致经济利益流出企业的现时义务，故不符合权益⼯具定义，应确认⾦融负债。“投资⽅拥有与普通股股东⼀致的投票权及分红权等权利”的事实不影响该项判断。个人理解，供参考。","cat":"实务综合","kw":"证监会会计类1号","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0115","q":"请教版主，离退休⼈员社会化费⽤确认长期应付款的问题","a":"对于移交地⽅管理的离退休⼈员的相关费⽤，⼀般是在移交时，依据基准⽇的精算结果计提⼀项负债，然后尽快将该项负债资⾦拨付给接收离退休⼈员的地⽅机构，以结算该项负债。此后该项资⾦的不⾜或者结余与本企业⽆关。 如果该资⾦的余额不⾜以⽀付后续⽀出，仍需由本企业继续承担不⾜部分的补⾜责任的，则本企业应确保在移交后每年继续进⾏精算，并根据精算结果对上述负债的余额进⾏调整。调整⾦额视情况计⼊管理费⽤或者其他综合收 益。个人理解，供参考。","cat":"实务综合","kw":"请教版主,离退休⼈员社会化费⽤确认长期应付款的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0815","q":"施⼯⾏业的借款利息是否可以资本化","a":"我理解此处的问题是⼀般借款的借款费⽤是否满⾜资本化条件的问题。可参考《中审众环研究2020》之“问题1-1- 39（⼀般借款费⽤资本化问题）”。我们⼀般的把握⼜径是：将⼀般借款费⽤资本化的前提是能够核实⼀般借款资 ⾦与资本⽀出之间的对应关系，具体要求是在两者之间建⽴直接的、明确的、可跟踪的对应关系，以核实资本⽀出确实占⽤了⼀般借款资⾦，例如企业对借款资⾦专户存储并指定⽤途专门⽤于符合资本化条件的资产的购置或建造等。只有在满⾜该条件的前提下，才能对符合条件的资产的构建或者⽣产⽀出所占⽤的⼀般借款按照《企业会计准则第17号——借款费⽤》对⼀般借款费⽤资本化的规定。计算可资本化的⼀般借款费⽤⾦额。通常理解不能仅仅依据对财务报表的整体分析性复核（如报表项⽬之间对应关系的分析）就得出某项符合条件资产的购置或者建造占⽤了⼀般借款的结论。如果不能在⼀般借款资⾦和资本⽀出这两者之间建⽴直接的、明确的、可跟踪的对应关系，则 ⼀般借款⽀出应当予以费⽤化处理，不能资本化计⼊资产价值中。个人理解，供参考。","cat":"无形资产","kw":"资本化,施⼯⾏业的借款利息是否可以资本化","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第6号——无形资产、《企业会计准则第17号——借款费⽤》"},{"id":"CY0119","q":"应收账款保理费⽤，属于⾮经吗？","a":"如果被保理的应收账款均系正常经营活动产⽣，且将此类应收账款进⾏保理融资是常规操作，则保理融资费⽤是企业的正常融资费⽤，在可预见的未来将会重复发⽣，成为影响未来期间损益的长期因素，报表使⽤者在预测未来盈利能⼒时应将该因素纳⼊考虑。因此，不属于⾮经常性损益。个人理解，供参考。","cat":"实务综合","kw":"应收账款保理费⽤,属于⾮经吗","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0076","q":"⾦融负债的核销","a":"不能仅以“已过诉讼时效”为由即认定“⾦融负债对应的现时义务已解除”。已过诉讼时效只是表明债权⼈丧失了就该债权寻求司法救济的权利，即法院不再保障其胜诉权，但对应的实体权利仍在，债权⼈仍可寻求其他救济途径。根据《民法典》第188条，实体权利的有效期是20年。个人理解，供参考。","cat":"实务综合","kw":"⾦融负债的核销","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0094","q":"贴现未到期还原的商业承兑票据，期末是否需要计提坏账？","a":"贴现未到期还原的商业承兑票据，期末应视同应收账款计提坏账准备。个人理解，供参考。","cat":"实务综合","kw":"请教陈版,贴现未到期还原的商业承兑票据,期末是否需要计提坏账","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1573","q":"因债务重组取得破产重整公司股权的公允价值如何确定","a":"因债务⼈破产重整⽽取得重整公司股权，应按其于取得⽇的公允价值作为初始投资成本。但需要关注的是主帖中提及的”重整⽅案分析“是否可靠，特别是是否过于乐观了。实务中很少有清偿率可到100%的情况，否则破产重整也就没有意义了。例如，按照上市公司的同⾏业静态平均PE计算，前提是⽇后该公司可以上市且经营正常，⽬前实务中这种可能性不⼤。个人理解，供参考。","cat":"债务重组","kw":"公允价值,债务重组,因债务重组取得破产重整公司股权的公允价值如何确定","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第12号——债务重组"},{"id":"CY1031","q":"（陈版主）债务重组中引⼊信托","a":"建议根据管理⼈的要求，重新编制未来⻋流量和通⾏费收⼊的预测，与原预测数相⽐较，据此合理估计⽇后需划归信托计划的超额（超出原预测数的）通⾏费收⼊的⾦额及其折现值，将其作为负债预留，相应减少债务重组收益。 ⽇后实际的超额收⼊不同于原估计数的差额，作为会计估计变更处理，其影响计⼊后续期间的损益。个人理解，供参考。","cat":"债务重组","kw":"债务重组,陈版主,债务重组中引⼊信托","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第12号——债务重组"},{"id":"CY1892","q":"关联⽅债务重组是否需要单独公告？","a":"此类问题属于信息披露问题，在上市公司⼀般属于董秘办或者证代的职责范围，建议与交易所沟通确认。个人理解，供参考。","cat":"债务重组","kw":"债务重组,急急急,关联⽅债务重组是否需要单独公告","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第12号——债务重组"},{"id":"CY0267","q":"现⾦流量表有关问题","a":"现⾦流量表正表中的发⽣额应以实际发⽣的本企业现⾦及现⾦等价物变动为基础。此类三⽅或更多⽅⾯的互相抹账结算，不涉及现⾦流，所以在现⾦流量表正表中不反映也是正常的。可在附注中对该抹账安排根据债务重组准则的相关要求作出披露。个人理解，供参考。","cat":"债务重组","kw":"债务重组,现⾦流量表有关问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第12号——债务重组"},{"id":"CY0369","q":"关联⽅代偿是否构成债务重组？","a":"该事项对A⽽谈仍属于债务重组（B与C互为关联⽅，应作为⼀个整体看待）；但对于B⽽⾔则属于权益性交易。个人理解，供参考。","cat":"债务重组","kw":"债务重组,关联⽅代偿是否构成债务重组","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第12号——债务重组"},{"id":"CY0121","q":"招商费⽤⼊账疑问","a":"该项资产的运营收⼊（如租⾦）归谁所有？⼦公司的运营费⽤如何获得补偿？⼦公司承担运营费⽤与获得运营收⼊是否相称，整体交易是否公允合理？个人理解，供参考。","cat":"实务综合","kw":"招商费⽤⼊账疑问","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0122","q":"关于员⼯持股平台借款的账务处理","a":"由于该借款系以平台名义借⼊，平台是向银⾏还本付息的⾸要义务⼈，因此平台应同时确认对银⾏的借款和对员⼯的债权，以及分别确认与之相关的利息⽀出和利息收⼊。个人理解，供参考。","cat":"实务综合","kw":"关于员⼯持股平台借款的账务处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0127","q":"同控下⽆偿划拨冲减资本公积问题","a":"在个别报表层⾯仅冲减资本公积的做法并不恰当。因为个别报表层⾯每个权益项⽬在《公司法》等法律法规中都有特定的含义和⽤途，例如可供分配股利的留存收益就是根据未分配利润的余额确定的，盈余公积的计提和使⽤是否合规也取决于其核算是否符合公司法规定，等等。因此个别报表层⾯的资本公积是不应出现负数的。如果资本公积有⼤额负数，但未分配利润为正数，后续依据该未经冲减的未分配利润余额对股东进⾏分红，则进⼀步侵蚀了利⽤净资产保障债权⼈利益的基础。 ⽽且，这个问题在会计准则中是有明⽂规定的。 因此，不建议对于会计准则有明⽂规定的事项直接不遵循其规定。个人理解，供参考。","cat":"实务综合","kw":"请教陈版主,同控下⽆偿划拨冲减资本公积问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0132","q":"求助，0对价减资，母⼦公司的财务税务处理问题","a":"基本赞同主帖中的处理意见。税务处理问题建议再与税务专业⼈⼠沟通确认。个人理解，供参考。","cat":"实务综合","kw":"0对价减资,母⼦公司的财务税务处理问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0149","q":"经销商未达到销售⽬标⽽扣除保证⾦的账务处理","a":"该事项与代理费的结算是同⼀交易的两个⽅⾯，两者密切关联，故冲减“销售费⽤——代理费”更为合理。个人理解，供参考。","cat":"实务综合","kw":"经销商未达到销售⽬标⽽扣除保证⾦的账务处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0151","q":"员⼯激励奖⾦的确认","a":"该做法总体上合理。 该安排在性质上属于“其他长期职⼯福利”，理论上应采⽤设定提存计划的会计处理模式，但因为期限较短，影响最 终发放⾦额的唯⼀较⼤变量就是考核期内业绩，因此也可以简化为依据考核期内业绩预测确定计提数，并在服务期内分摊的处理⽅式。 由于属于长期激励计划，因此还需要考虑折现因素影响。实务中如果折现因素的影响显著不重⼤的，也可简化处理，不考虑折现。个人理解，供参考。","cat":"实务综合","kw":"请教陈版,员⼯激励奖⾦的确认","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0154","q":"⽬前实务关于云信和建信融通票据的处理","a":"⽬前对此问题的会计处理还是参照财会[2021]32号的上述规定，尚⽆新的更新规定。个人理解，供参考。","cat":"实务综合","kw":"请教陈版,⽬前实务关于云信和建信融通票据的处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0232","q":"关于协定存款性质认定和函证⾦额的疑问","a":"定期存款和理财产品的最⼤区别在于：定期存款纳⼊“存款”监管（如纳⼊存贷⽐等监管指标的计算），银⾏⾄少必须保证其本⾦安全；⽽理财产品没有保本保障。 因此，本案例中的定期存款应属于存款⽽不是理财产品。期末函证的银⾏存款⾦额应该包含被银⾏⾃动划⾛的“协定存款”+50万流动资⾦，但需对此予以单独说明，并对主要协定条款⼀并进⾏函证确认。 提问⼈：lyablb 时间：2024-04-09 16:50:45 陈版，我还有⼀个疑问，类似这种“协定存款”业务，好多公司都有，⽬的也是为了获取更⾼的存款利息，该⽐业务在列报的时候，是否需要考虑“⾦融⼯具准则”，与正常的银⾏存款活期利息有什么区别呢？谢谢 回答⼈：chenyiwei ⼴义上货币资⾦和银⾏存款也是⾦融资产，也适⽤⾦融⼯具准则，包括⾦融⼯具风险的相关披露要求。提问⼈：lyablb 时间：2024-04-16 13:51:30 ⾮常感谢陈版的回复，那这笔业务在报表列⽰应该放在哪个科⽬呢？是都还放在货币资⾦⾥（含被银⾏⾃动划⾛的部分），还是未划⾛部分列报货币资⾦，划⾛部分列报交易性⾦融资产？谢谢 回答⼈：chenyiwei 未划⾛部分列报货币资⾦，划⾛部分列报交易性⾦融资产。个人理解，供参考。","cat":"报表列报","kw":"关于协定存款性质认定和函证⾦额的疑问","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第30号——财务报表列报"},{"id":"CY0175","q":"应交税费列报","a":"并不是将所有与增值税相关的明细科⽬合计起来考虑，是每⼀个明细科⽬的余额分别考虑其余额的重分类。因此可能同时存在借⽅余额的明细科⽬被重分类为资产，⽽另⼀些贷⽅余额的明细科⽬被重分类为负债的情况。 应交税费附注中“增值税”项⽬的余额是期末填列在“应交税费”项⽬中的各个与增值税相关的明细科⽬余额相抵后按净额填列。个人理解，供参考。","cat":"报表列报","kw":"应交税费列报","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第30号——财务报表列报"},{"id":"CY1025","q":"持有基⾦份额，能否指定为以公允价值计量变动计⼊其他综合收益","a":"⼀般不可以。主要原因是基⾦份额对其发⾏⽅（基⾦）⽽⾔不符合权益⼯具的定义，只是依据《企业会计准则第37 号——⾦融⼯具确认和计量》第三章规定被⼈为确认为权益⼯具。 根据《企业会计准则第22号——⾦融⼯具确认和计量》的应⽤指南：（见《应⽤指南汇编2024》P741） 此处权益⼯具投资中的＂权益⼯具”，是指对千⼯具发⾏⽅来说，满⾜第三⼗⼋章⾦融⼯具列报中权益⼯具定义的 ⼯具。例如，对千发⾏⽅⽽⾔，普通股满⾜权益⼯具的定义，对千投资⽅⽽⾔，其持有的普通股投资属于权益⼯具投资。 对于符合⾦融负债定义、但按照第三⼗⼋章⾦融⼯具列报被分类为权益⼯具的可回售⼯具（如可随时赎回的开放式基⾦份额）和发⾏⽅仅在清算时才有义务向另⼀⽅按⽐例交付其净资产的⾦融⼯具（如属于有限寿命⼯具的封闭式基⾦、理财产品的份额或信托计划等寿命固定的结构化主体的份额）等特殊⾦融⼯具，因其从发⾏⽅的⾓度⽽⾔并不符合权益⼯具的定义，只是按照第三⼗⼋章⾦融⼯具列报作为权益⼯具列报，因此，从投资⽅的⾓度⽽⾔，其持有的此类特殊⾦融⼯具投资不符合指定为以公允价值计量且其变动计⼊其他综合收益的⾦融资产的条件。个人理解，供参考。","cat":"报表列报","kw":"公允价值,持有基⾦份额,能否指定为以公允价值计量变动计⼊其他综合收益","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第30号——财务报表列报、《企业会计准则第22号——⾦融⼯具确认和计量》"},{"id":"CY1767","q":"对于收益分配的问题，普通合伙⼈享有的是次级收益分配权。先有限返还有限合伙⼈的本⾦，然后再偿还普通合伙⼈的本⾦；同时相关的收益，也是普通合伙⼈列后于有限合伙⼈。因此普通合伙⼈享有次级权益，⽽⾮优先收益权。","a":"该GP是典型的代理⼈。主要考虑：持股⽐例仅为1%；收益分配顺序和⽐例符合市场上同类私募基⾦管理⼈的报酬⽔平，因⽽其所享有或承担的可变回报在量级和可变性⽅⾯并不重⼤。 根据《企业会计准则第33号——合并财务报表（2014年修订）》第⼗⼋条规定：“代理⼈仅代表主要责任⼈⾏使决策权，不控制被投资⽅。投资⽅将被投资⽅相关活动的决策权委托给代理⼈的，应当将该决策权视为⾃身直接持有。”。 提问⼈：gpqg 时间：2025-10-07 12:19:03 陈版，这个持股⽐例较低，如果普通合伙⼈持股⽐例是 5%左右，其他的也不变的话，是否也是代理⼈这个⻆⾊呢？或者我们在实务中判断，如果从持股⽐例的⻆度去分析判断的话，普通合伙⼈持股⽐例通常低于多少，⼤概率可能就属于代理⼈的⻆⾊呢？ 谢谢陈版！ 回答⼈：chenyiwei GP如果不是代理⼈，则其持股⽐例通常需⾄少达到30%以上⽐较稳妥。但还需要综合考虑其他因素。个人理解，供参考。","cat":"报表列报","kw":"合并,对于收益分配的问题,普通合伙⼈享有的是次级收益分配权,先有限返还有限合伙⼈的本⾦,然后再偿还普通合伙⼈的本⾦,同时相关的收益,也是普通合伙⼈列后于有限合伙⼈,因此普通合伙⼈享有次级权益,⽽⾮优先收益权","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第30号——财务报表列报、《企业会计准则第33号——合并财务报表（2014年修订）》"},{"id":"CY0703","q":"现⾦流量表补充资料","a":"早期附注项⽬中没有“使⽤范围受限但仍作为现⾦和现⾦等价物列⽰的情况”这⼀项，是后来才有的。后续我们修订该问答时，将对此作出相应调整。 “使⽤范围受限但仍作为现⾦和现⾦等价物列⽰的情况”⼀般是指其使⽤受到合规性监管，确保仅可在限定的⽤途范围内使⽤，但在该范围内的使⽤仍在很⼤程度上可由企业⾃主决定，并⾮被冻结或者不可动⽤的现⾦及现⾦等价 物。 提问⼈：萍实 时间：2024-09-06 14:01:56 同问，或者说“其中：母公司或集团内⼦公司使⽤受限制的现⾦和现⾦等价物”是“使⽤范围受限但仍作为现⾦和现 ⾦等价物列⽰的情况”中的⼀个组成部分吗？谢谢！ 回答⼈：chenyiwei 这两者的意思相差不⼤。⽬前2023年度以后的附注模板中已没有“母公司或集团内⼦公司使⽤受限制的现⾦和现⾦等价物”。个人理解，供参考。","cat":"报表列报","kw":"现⾦流量表补充资料","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第30号——财务报表列报"},{"id":"CY0180","q":"关于定存及其利息的计提和列报问题","a":"你的理解有⼀定合理性，但要注意区分资产的流动性。对于预计持有期限超过⼀年且剩余存款期限超过⼀年的项⽬ （即使是不可交易的），属于⾮流动资产，不应列报为货币资⾦，⽽应当列报为其他⾮流动资产。 关于期末利息的计提，确保收⼊对应的经济利益能够流⼊企业是任何收⼊确认均应满⾜的要求。对于不可交易的定期存款⽽⾔，如果提前⽀取会损失利息，且⽆法证明企业具有持有⾄到期的明确意图和财务能⼒，则在持有期间不应对其计提利息，或者⾄少不应按存单票⾯的定期利率对其计提利息。 提问⼈：V-MAN 时间：2024-04-01 16:32:06 陈版，那如果是担保期限超过1年的，定期存款和其他应收款是不是也应该重分类到其他⾮流动资产？ 回答⼈：chenyiwei 可以这样理解。个人理解，供参考。","cat":"报表列报","kw":"关于定存及其利息的计提和列报问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第30号——财务报表列报"},{"id":"CY0868","q":"关于永续债在所有者权益变动表列报的问题","a":"永续债持有⼈并⾮股东，因此对永续债持有⼈的分配不能称为“对股东的分配”。不清楚你所指案例的具体情况，建议再次结合具体数字核对。 提问⼈：gpqg 时间：2024-11-10 10:50:26 陈版，我在学习中审众环研究问题5-1-46时，⾥⾯的描述为： 向永续债持有⼈⽀付利息时，按实际⽀付利息的⾦额，冲减“其他权益⼯具”的账⾯价值，在股东权益变动表中填 ⼊“其他权益⼯具”列和“（三）利润分配——3、对股东的分配”⾏交叉处的单元格内。 此时计⼊ 利润分配-3、对股东的分配，是没有问题的吗。谢谢陈版！ 回答⼈：chenyiwei ⽬前的观点不倾向于作为“对股东的分配”，⽽是“其他”，后续将修订。个人理解，供参考。","cat":"报表列报","kw":"请教陈版,关于永续债在所有者权益变动表列报的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第30号——财务报表列报"},{"id":"CY1720","q":"关于《监管规则适⽤指引会计类第3号》股份⽀付","a":"如果名义上等待期已满，但员⼯回售股份给实控⼈时仍是按照“本⾦+利息”作价，⽽不同于回售时点的公允价值，则⾸先应考虑此前“⽆等待期”的认定是否符合实际情况，是否存在隐含的可⾏权条件。如果是，则仍有等待期，此时的员⼯离职相当于是在等待期内离职，应冲回此前确认的股份⽀付费⽤，并就回售价格⾼于原授予价格的差额确认职⼯薪酬费⽤（辞退福利）计⼊管理费⽤。 如果确实⽆等待期的，则在回售价格不⾼于回售时点公允价值的情况下，如主帖所述不适⽤3-9中的上述原则，即回售价格中的利息⽆需确认职⼯薪酬费⽤。但如果回售价格⾼于回售时点公允价值的，则差额应确认职⼯薪酬费⽤（辞退福利）。个人理解，供参考。","cat":"职工薪酬","kw":"公允价值,关于《监管规则适⽤指引会计类第3号》股份⽀付","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第9号——职工薪酬"},{"id":"CY0327","q":"股份⽀付确认","a":"《监管规则适⽤指引——会计类第3号》之3-9实际上是对股份⽀付会计准则的补充。主要强调两点：1、如果在任 何情况下激励对象都不能享有企业权益⼯具公允价值变动的相关收益和风险，则不属于股份⽀付，适⽤其他会计准则（如职⼯薪酬准则）；2、在总体上适⽤股份⽀付准则的情况下，对于因未满⾜可⾏权条件⽽导致未被授予的权 益⼯具，如果相应的激励对象也仍从中获取了经济利益（如回购价格⾼于原授予价格的差额），则该部分经济利益虽然不适⽤股份⽀付准则，但应适⽤其他相关会计准则（如股份⽀付准则）。 因此，在主帖案例中，正确的理解应当是“仅针对离职⼈员，将此前确认的股份⽀付冲减，再按照回售收益确认为职⼯薪酬费⽤”。但需注意：在实际操作中，应针对预期⽆法解锁的相关激励股份，在等待期内逐期确认职⼯薪酬费⽤，针对离职率的估计应当与计量股份⽀付费⽤时的离职率估计保持⼀致。⽽不是在实际回购时才确认。个人理解，供参考。","cat":"职工薪酬","kw":"公允价值,股份⽀付确认","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第9号——职工薪酬"},{"id":"CY0628","q":"离职员⼯股份⽀付费⽤是否应持续计量⾄员⼯离职时点","a":"在激励对象离职当年，因为未满⾜服务期限条件，最终可⾏权的权益⼯具数量为零，即累计应确认的股份⽀付费⽤总额为零，所以在离职当年⽆需确认新的股份⽀付费⽤，还要将前期已确认的与该激励对象相关的股份⽀付费⽤在离职当年度冲回，冲减离职当年度的相关成本费⽤项⽬。 因此，主帖中计算⽅法⼀、三应组合使⽤才能达到正确效果。提问⼈：ZXCGHGT 时间：2024-08-12 11:25:09 陈版，如果员⼯满⾜服务期限条件，只是到期后员⼯不打算⾏权，这个是否也是冲销掉以前年度确认的费⽤？谢谢回答⼈：chenyiwei 这种情况，服务期限条件和⾮市场业绩条件均已满⾜，故不能冲回已确认的费⽤。个人理解，供参考。","cat":"职工薪酬","kw":"请教陈版主,离职员⼯股份⽀付费⽤是否应持续计量⾄员⼯离职时点","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第9号——职工薪酬"},{"id":"CY1137","q":"在建⼯程领取原材料","a":"在建⼯程试运⾏期间领⽤的原材料，按照《企业会计准则解释第15号》第⼀条规定处理，形成可对外销售的试⽣产产品的部分，计⼊存货成本并最终转⼊销售成本；未形成可对外销售产品的部分应考虑是否属于试⻋的必要、合理损耗，前者可计⼊在建⼯程成本，后者应作为⾮正常损耗计⼊当期损益处理。 判断是否属于必要、合理损耗，可以参考相关国标、⾏业标准或者⾏业惯例，或者本企业以往类似⼯程项⽬的历史经验等。提问⼈：不哎上班 时间：2025-03-16 15:35:43 陈版，我问个相关的问题，被审计单位是⽣产型企业，企业每年都会⽣产设备进⾏改造升级，改造升级的过程中，企业会领⽤⼀些在存货科⽬核算的备品备件，然后资本化。对于这些备品备件，企业⽀付价款的现⾦流在购买商品核算，是否有必要调整到购建固定资产呢？ 此外如果不需要由购买商品调整到构建固定资产，那么现⾦流附表“ 存货的减少（减：增加）”项⽬，是否需要扣除在建⼯程领⽤的存货-备品备件呢？ 回答⼈：chenyiwei个人理解，供参考。","cat":"无形资产","kw":"固定资产,资本化,在建⼯程领取原材料","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第6号——无形资产"},{"id":"CY0435","q":"chenyiwei求助陈版主：关于章程约定的分红计划是否构成⾦融负债","a":"对C公司⽽⾔，其每年应优先分配给B公司的1200万元实际上是取得新能源项⽬指标的对价。应依据公司的预计经 营年限，对该1200万元采⽤适当折现率进⾏折现，按折现值确认“⽆形资产——特许经营权”和长期应付款。该⽆形资产在C公司的预计经营年限内摊销；每年⽀付1200万元优先分配款项时，从长期应付款中列⽀。如果因某年C公 司盈利不⾜导致1200万元递延⽀付的，则对于递延⽀付的部分仍挂在长期应付款中（列报为⼀年内到期的⾮流动负债），不重新编制该项长期应付款的实际利率摊销表。 在已作出上述处理的基础上，C公司对于取得B股东的出资款可正常确认为实收资本和资本公积。提问⼈：抟沙 时间：2024-06-19 14:59:29 负债是指企业过去的交易或者事项形成的、预期会导致经济利益流出企业的现时义务；这个长期应付款是否符合负债定义呢？ 回答⼈：chenyiwei 虽然有可能递延⽀付，但最终总要⽀付的，所以属于现时义务，符合负债定义。个人理解，供参考。","cat":"无形资产","kw":"递延,摊销,chenyiwei求助陈版主,关于章程约定的分红计划是否构成⾦融负债","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第6号——无形资产"},{"id":"CY1604","q":"⽀援乡村振兴资⾦的会计处理？","a":"主帖中的交易模式是实务中常⻅的业务模式，即光伏项⽬投资⽅（或建设⽅）需承担⼀定⽐例或⾦额的扶贫资⾦（2020年消除贫困地区后改称为乡村振兴基⾦，或其他类似名称，但实质不变）。由于缴纳此类基⾦系获得光伏项⽬建设权的必要前提，且承担此类⽀出不会导致光伏项⽬整体由预计盈利变为预计亏损，故不同于⼀般的独⽴捐赠事项，可将此类⽀出作为获得建设权的必要成本，计⼊在建⼯程或者⽆形资产，在光伏项⽬的运营期内摊销，计⼊各期营业成本。 参考：《中审众环研究2020》之“问题1-1-2（特定固定资产在建成后的使⽤期间内按规定需逐年⽀付的补偿费的会计处理）”。 上一页 陈版主（陈奕蔚老师）答疑历史文章（2025年06月） 下一页 陈版主（陈奕蔚老师）答疑历史文章（2025年08月） 粤ICP备18107660号 粤公网安备44060602000887号 关于网站 Copyright © 2021-2026 会计便利店 hjyweb.cn 【个人理解，供参考。","cat":"无形资产","kw":"固定资产,摊销,⽀援乡村振兴资⾦的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第6号——无形资产"},{"id":"CY0050","q":"研发费⽤资本化过程中⽆法合理分摊到项⽬上的折旧如何处理","a":"也可以这样理解。在⽬前的实务中，针对研发费⽤的确认和计量，开发⽀出资本化、研发投⼊认定等问题，都有必要尽可能保持谨慎。个人理解，供参考。","cat":"无形资产","kw":"折旧,资本化,求助陈版主,研发费⽤资本化过程中⽆法合理分摊到项⽬上的折旧如何处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第6号——无形资产"},{"id":"CY1793","q":"关于同⼀产线上设备分批转固的问题","a":"根据《企业会计准则第17号——借款费⽤》第⼗四条规定：“购建或者⽣产的符合资本化条件的资产的各部分分别完⼯，且每部分在其他部分继续建造过程中可供使⽤或者可对外销售，且为使该部分资产达到预定可使⽤或可销售状态所必要的购建或者⽣产活动实质上已经完成的，应当停⽌与该部分资产相关的借款费⽤的资本化。 购建或者⽣产的资产的各部分分别完⼯，但必须等到整体完⼯后才可使⽤或者可对外销售的，应当在该资产整体完⼯时停⽌借款费⽤的资本化。” 如主帖所述，“产线上不同的设备在我们设定的场景下是不可以单独使⽤的，但是实际上是可以单独使⽤的”，在此情况下，应认定已验收的部分已达到可使⽤状态，相应将已验收的部分转固。已转固部分的折旧在整条⽣产线投产之前计⼊营业成本。 整条产线都转固后，这些⼯艺验证相关费⽤是应该⼀次性计⼊营业成本，不能计⼊存货成本。个人理解，供参考。","cat":"无形资产","kw":"折旧,资本化,关于同⼀产线上设备分批转固的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第6号——无形资产、《企业会计准则第17号——借款费⽤》"},{"id":"CY0174","q":"政府补助","a":"⾸先，“企业将与设备相关的部分确认为与资产相关的补助、⾮设备部分确认为与收益相关的补助”该做法是否合 理？应该是根据对应的作为补助对象的研发⽀出是资本化⽀出还是费⽤化⽀出来判断，⽽不是根据补助对象是设备还是材料、⼈⼯来判断。 在合理划分与收益相关的政府补助和与资产相关的政府补助的基础上（其划分标准是对应于费⽤化⽀出还是资本化 ⽀出），与收益相关的政府补助在对应的费⽤化⽀出发⽣时，采⽤系统、合理的⽅式从递延收益转⼊其他收益（前提是能够合理确信最终可以通过政府组织的验收）；与资本化⽀出相关的补助继续保留在递延收益中，按照新的⾮专利技术摊销年限分期确认其他收益。 提问⼈：zgkjsy1975 时间：2024-07-11 16:10:53 某煤矿企业收到政府补助资⾦500万元，要求⽤于煤矿安全改造项⽬，因属于安全改造项⽬，企业想通过专项储备 ⼀次性结转累计折旧，是否可以将收到的政府补助资⾦500万元⼀次性在当期确认其他收益？ 回答⼈：chenyiwei 由于专项储备是在计提时才影响损益的，⼀般情况下此处直接结转累计折旧的专项储备是在以前年度已经计提的， 故可以认为是对以前年度专项储备计提⾦额的补助，故可以接受在收到补助款时⼀次性计⼊其他收益。个人理解，供参考。","cat":"政府补助","kw":"递延,折旧,资本化,摊销,政府补助","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第16号——政府补助"},{"id":"CY1435","q":"关于约定付款节点政府补助的会计处理","a":"政府补助的确认条件，和与政府补助相关的递延收益的摊销，是两回事。 关于政府补助的确认条件，是企业预期能够（合理保证）满⾜政府补助所附条件，以及企业预期能够收到政府补助（实务中多数情况下从严把握，参阅《监管规则适⽤指引——会计类第1 号》1-23按应收⾦额确认政府补助的条件）。 政府补助相关递延收益的摊销，是在已确认政府补助的前提下，将递延收益采⽤与作为补助对象的⽀出计⼊成本费⽤的模式相称的系统、合理的⽅式，对该项递延收益进⾏摊销，使得政府补助与作为补助对象的成本费⽤在利润表上实现合理配⽐。因此对于与资产相关的政府补助，其递延收益开始摊销的前提就是对应资产已开始计提折旧或摊销。个人理解，供参考。","cat":"政府补助","kw":"递延,折旧,摊销,关于约定付款节点政府补助的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第16号——政府补助"},{"id":"CY1882","q":"政府招商引资⽅案引起的后续账务处理","a":"如果能够就上述各事项之间的关联获取相关证据的（例如从2009年的招商引资协议开始，后续确认以应付的税收返还款和应收的回购款相抵后按净额结算），则可以认为该1亿元实质上是与资产相关的政府补助。 如果不作为政府补助⽽是作为债务豁免处理，则同样要就该安排背后的商业逻辑给出合理解释，即对当初政府⼊股的⽬的，以及现在为何放弃回购要求等均需给出解释。如能解释得通，且客观情况导致不能公开提及该政府补助事项，则也可以考虑依据该解释作出处理。但个⼈理解⾛这条路要把整个事项“说圆”的难度会更⼤。个人理解，供参考。","cat":"政府补助","kw":"政府招商引资⽅案引起的后续账务处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第16号——政府补助"},{"id":"CY1537","q":"政府补助下⼟地使⽤权在建期间的摊销","a":"在在建⼯程施⼯期间，⼯程占地的摊销应计⼊在建⼯程成本，即：借：在建⼯程，贷：累计摊销——⼟地使⽤权。相应地，原先对应于这部分摊销额的政府补助，从与⼟地使⽤权相关转变为与在建⼯程相关，后续这部分政府补助将随着固定资产（房屋建筑物）的折旧计提⽽相应逐步转⼊其他收益。 提问⼈：爬爬呀 时间：2025-07-14 15:54:39 是否这样来理解，即⼯程施⼯期间这部分对应的政府补助暂停摊销，等在⼯程完⼯后，跟随固定资产折旧再摊销政府补助？ 回答⼈：chenyiwei 是。个人理解，供参考。","cat":"政府补助","kw":"固定资产,折旧,摊销,政府补助下⼟地使⽤权在建期间的摊销","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第16号——政府补助"},{"id":"CY0923","q":"股权激励","a":"“2014年，所有指标都没有达到业绩条件的80%，根据和企业沟通2015年要完成业绩80%可能性也不⼤”表明业绩条件很可能不能达到，按照股权激励⽅案，届时可解锁股份数量为零，故累计应确认的股份⽀付费⽤⾦额为零。 回购义务的确认应遵循《企业会计准则解释第7号》第五条规定，并不是在回购义务被触发时才确认预计负债，这是⾦融负债，在授予员⼯股份时就应当确认，且与等待期内对业绩条件能否达成的判断⽆关。 提问⼈：Mark0507 时间：2024-11-25 17:24:10 谢谢陈⽼师，就上述案例，补充⼏个问题（纠正⼀下，案例中2014年、2015年及2018年系笔误，应当是2024年、 2025年及2028年）个人理解，供参考。","cat":"股份支付","kw":"预计负债,股权激励","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第11号——股份支付"},{"id":"CY0896","q":"员⼯⾃愿放弃限制性股票的处理","a":"第⼀种理解合理。 员⼯⾃愿放弃激励股权，属于《企业会计准则解释抵3号》第五条所指的“职⼯或其他⽅能够选择满⾜⾮可⾏权条件但在等待期内未满⾜的，企业应当将其作为授予权益⼯具的取消处理”。其中的⾮可⾏权条件，即包括按时缴纳认 购款、承诺不退出股份⽀付计划（因未满⾜服务期限条件和业绩条件的退出除外）等。 提问⼈：我就不减速 时间：2024-11-07 16:15:18 再请教陈版主，因第⼀期和第⼆期是独⽴的，该员⼯⽬前仅⾃愿放弃第⼀期，认为取消了第⼀期，是否仅加速确认第⼀期费⽤。⽽第⼆期未明确放弃，暂不属于“取消”，暂不加速确认第⼆期。这样理解是否合理？ 回答⼈：chenyiwei 可以这样理解。个人理解，供参考。","cat":"股份支付","kw":"员⼯⾃愿放弃限制性股票的处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第11号——股份支付"},{"id":"CY0789","q":"因员⼯⾝份变更股份⽀付取消的处理","a":"激励对象因被选举为监事，不再符合作为激励对象的条件，导致退出股权激励计划的，应按取消（加速可⾏权）处理。将原本应在剩余等待期内确认的⾦额⽴即计⼊当期损益，同时确认资本公积(其他资本公积)再转为资本公积 （股本溢价）。 根据《企业会计准则解释第3号》第五条规定：“职⼯或其他⽅能够选择满⾜⾮可⾏权条件但在等待期内未满⾜的， 企业应当将其作为授予权益⼯具的取消处理”。此处的“激励对象适格”属于⾮可⾏权条件，被选举为监事是由股东 ⼤会或者职代会决定的事项，两者都是企业内部机构，因此可以认为是企业⾏为，是企业⾃⾝可控制的事项，故因激励对象被选举为监事导致丧失激励资格的影响，应按加速可⾏权处理。个人理解，供参考。","cat":"股份支付","kw":"请教陈版主,因员⼯⾝份变更股份⽀付取消的处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第11号——股份支付"},{"id":"CY0674","q":"股权激励中，业绩指标对标⾏业企业下的费⽤确认","a":"“20XX年度同⾏业平均业绩（或者对标企业75分位值）”理论上应在该年度的12⽉31⽇即可确定，故在以后年度同 ⾏业年报公布完毕时获取相关数据并计算，应属于报告年度的资产负债表⽇后调整事项，据此纳⼊报告年度预计可解锁权益⼯具数量的估计。 如主帖所述，“假设2024年公司⾃⾝财务指标均完成了，但是由于对标的⾏业企业要到四⽉底才能公告完年报，才 能判断是否达到对标企业的⽔平，公司是4⽉30⽇公告年报”，在此情况下，除⾮有明确的相反证据，否则应⾸先假设已达到对标企业的业绩⽔平，据此对报告年度的股份⽀付费⽤进⾏计量。如果后续确定实际未达到的，则其影响作为前期差错更正处理。个人理解，供参考。","cat":"股份支付","kw":"股权激励中,业绩指标对标⾏业企业下的费⽤确认","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第11号——股份支付"},{"id":"CY0833","q":"股份⽀付处理求教","a":"因为原先的解锁条件是“未来公司上市后可解锁”，但实际情况是“公司业绩下滑，未来上市⽆望”，即预计不满⾜⾮市场业绩条件。因此，在该股份⽀付计划下累计应确认的股份⽀付费⽤应为零。前期已确认的股份⽀付费⽤应转回处理。 对于“实控⼈及员⼯在原计划上市期前已将股份全部出售给第三⽅”，相当于员⼯未满⾜原条款中的⾮可⾏权条件 （等待期内不得转让），有可能被理解为应作为加速可⾏权处理。但如证监会会计司组织编写的《上市公司执⾏企业会计准则案例解析2024》之“案例9 -09 终⽌股权激励计划的会计处理”中的表述，此时有两种不同的处理意见 （见该书P595），上述就是该两种意见之⼀。个人理解，供参考。","cat":"股份支付","kw":"股份⽀付处理求教","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第11号——股份支付"},{"id":"CY0841","q":"提前取消股权激励计划是否必须视作加速⾏权，⼀次性确认全部费⽤？","a":"个⼈对最近监管机构和准则制定机构内部可能存在的此类讨论的具体情况并不了解。 个⼈理解，权益结算股份⽀付取消的会计处理规定在很⼤程度上是规则化⽽不是原则化的，即为了防范少确认费⽤的舞弊风险，故从严把握要求取消情况下累计确认的股份⽀付费⽤不⼩于假设不取消情况下该项计划应确认的费 ⽤，但实务中对于什么是“假设不取消情况下该项计划应确认的费⽤”有不同理解，就是上⾯的两种观点。其实个⼈也是倾向于观点②，即惩罚性的规则是存在的，但惩罚并不是⽆限度的，①似乎已经超出了合理的限度。 但如前所述，这个问题本来就是规则⽽⾮原则，只要能够明确，⼤家照此执⾏就好。个人理解，供参考。","cat":"股份支付","kw":"提前取消股权激励计划是否必须视作加速⾏权,⼀次性确认全部费⽤","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第11号——股份支付"},{"id":"CY0684","q":"其他权益⼯具投资处置当期的所得税处理？","a":"就本期因处置其他权益⼯具投资产⽣的利得，不直接影响当期应交所得税，故⽆需在这⽅⾯特殊处理。 如果认为在可预见的未来可通过其他来源获得⾜够多的应纳税所得额，据此确认与可抵扣亏损相关的递延所得税资产的，则正常借记递延所得税资产，贷记“所得税费⽤——递延所得税费⽤”。 但在本案例中，⽐较重要的问题是：此前是否就该项⾦融资产公允价值的增加额确认过递延所得税负债？如果是， 则在预见到该项应纳税暂时性差异转回时将⽆⾜够多的应纳税所得额，故⽆需实际发⽣纳税义务时，是否确认过与可抵扣亏损相关的递延所得税资产？如是，则当时是如何进⾏会计处理的？这部分递延所得税资产、负债在处置⾦融资产时如何进⾏转回处理，才是更复杂的问题。个人理解，供参考。","cat":"所得税","kw":"公允价值,所得税,递延,其他权益⼯具投资处置当期的所得税处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第18号——所得税"},{"id":"CY1132","q":"关于股份⽀付的税务处理","a":"2022年度，股份⽀付费⽤的税前扣除⾦额为120，导致税务上的可抵扣亏损增加，相应可确认的递延所得税资产增加3万元（=20*15%），但该部分可抵扣亏损在会计上并未确认为费⽤，对应于额外的股份⽀付税前扣除，因此该项递延所得税资产3万元确认时对应的贷⽅科⽬是资本公积，后续该项递延所得税资产（与可抵扣亏损相关）转回时也是借记资本公积，最终在转回后对资本公积的累积影响为零。 这部分额外可扣除的费⽤在会计上不确认为成本费⽤，故除了所得税影响计⼊资本公积以外，对报表上的资本公积⾦额不产⽣影响。因此主帖中计算的“20（1-15%）-3=14万元”或者“17万元 （20万元（1-15%））”是不恰当的。个人理解，供参考。","cat":"所得税","kw":"所得税,递延,关于股份⽀付的税务处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第18号——所得税"},{"id":"CY0029","q":"递延所得税资产与递延所得税负债","a":"递延所得税负债仍需确认。因为递延所得税负债（除了与对⼦公司、合营企业和联营企业的长期股权投资相关的以外）的确认不考虑未来转回的可能性，也不考虑未来有⽆⾜够的应纳税所得额。 在已确认递延所得税负债的基础上，可在已确认的递延所得税负债的限度内确认与可抵扣亏损相关的递延所得税资产。个人理解，供参考。","cat":"所得税","kw":"所得税,递延,递延所得税资产与递延所得税负债","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第18号——所得税"},{"id":"CY0035","q":"【求助陈版】递延所得税资产、负债是否属于货币性项⽬","a":"递延所得税资产和负债本⾝并不导致确定⾦额的未来流⼊或流出，⽽是根据资产、负债项⽬的账⾯价值和计税基础之间的暂时性差异⾦额计算的，因此不属于需在期末调整汇兑损益的“外币货币性项⽬”。其⾦额的变动按规定调 整“所得税费⽤——递延所得税费⽤”或“其他综合收益”等相关科⽬。个人理解，供参考。","cat":"所得税","kw":"所得税,递延,【求助陈版】递延所得税资产,负债是否属于货币性项⽬","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第18号——所得税"},{"id":"CY0388","q":"关于递延所得税资产的确认","a":"应采⽤观点1，即基于各个资产负债表⽇当时的情况和当时可获得的信息作出会计估计，⽽不能基于当前审计⽇所 掌握的信息作出“后见之明”式的推断。A公司的基本⾯发⽣变更是在2023年，这⼀变化是由于其母公司对⼦公司业务战略的调整，在2022年末及更早时点是⽆法合理预见的。因此属于2023年内新发⽣的情况，符合《企业会计准则第28号——会计政策、会计估计变更和差错更正》对“会计估计变更”的定义，即“由于资产和负债的当前状况及预 期经济利益和义务发⽣了变化，从⽽对资产或负债的账⾯价值或者资产的定期消耗⾦额进⾏调整”，故应采⽤未来 适⽤法进⾏衔接，相关变化的影响体现在2023年度的损益中，不追溯前期。个人理解，供参考。","cat":"所得税","kw":"所得税,递延,请教陈版,关于递延所得税资产的确认","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第18号——所得税、《企业会计准则第28号——会计政策、会计估计变更和差错更正》"},{"id":"CY0496","q":"关于资产组的认定中如何判断独⽴于其他资产组产⽣现⾦流量","a":"根据《企业会计准则第8号——资产减值》第⼗⼋条：“资产组的认定，应当以资产组产⽣的主要现⾦流⼊是否独⽴于其他资产或者资产组的现⾦流⼊为依据。同时，在认定资产组时，应当考虑企业管理层管理⽣产经营活动的⽅ 式（如是按照⽣产线、业务种类还是按照地区或者区域等）和对资产的持续使⽤或者处置的决策⽅式等。” 在本案例中，因为管理层可⾃主决定产能在B、C之间的利⽤和分配⽅式，如果将B、C分别认定为资产组，则其可收回⾦额测算就可以被管理层决策操纵。为了避免出现财务操纵结果，对此类⽣产产品相同、⽬标市场重叠，事实上作为⼀个整体进⾏经营管理的产线、⼯⼚等，⼀般建议整体作为⼀个资产组处理。个人理解，供参考。","cat":"资产减值","kw":"减值,关于资产组的认定中如何判断独⽴于其他资产组产⽣现⾦流量","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第8号——资产减值、《企业会计准则第8号——资产减值》"},{"id":"CY0137","q":"异地搬迁⽼⼚区停产后不可利旧固定资产和⽆形资产问题","a":"基于此情形， B分公司⽼⼚区在2024年全⾯停产后即成为闲置资产，也不符合确认为持有待售资产的条件。因此， 在计提减值后，仍需依据计提减值后的账⾯价值计提折旧或摊销。 同时，建议关注减值计提时的可收回⾦额测算依据，是否考虑了当地⼟地出让市场低迷，在可预见的未来⽆法实现收储或开发这⼀事实的影响。个人理解，供参考。","cat":"资产减值","kw":"减值,持有待售,固定资产,折旧,摊销,请教陈版,异地搬迁⽼⼚区停产后不可利旧固定资产和⽆形资产问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第8号——资产减值"},{"id":"CY0981","q":"出⼜信⽤保险对计提信⽤减值损失的影响","a":"可参考：《中审众环研究2020》之“问题4-1-80（应收账款由第三⽅提供保证的，坏账准备如何计提）”。 公司将其部分应收账款向保险公司投保，在债务⼈因信⽤风险等原因导致⽆⼒⽀付款项的情况下，保险公司按保单条款的约定进⾏赔偿。这两种情形均属于由第三⽅提供的信⽤风险保护，不同于债务⼈⾃⾝提供的抵押或保证，是 ⼀项独⽴的⾦融⼯具，应单独对其进⾏核算。 对于第三⽅提供的信⽤风险保护，应根据《企业会计准则解释第5号》第⼆条规定的“信⽤风险缓释合约”的规定进 ⾏会计处理。鉴于其与坏账准备计提作为两个事项分别处理，故在坏账准备计提时不考虑投保信⽤保险可能获得保险赔偿的影响。个人理解，供参考。","cat":"资产减值","kw":"减值,出⼜信⽤保险对计提信⽤减值损失的影响","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第8号——资产减值"},{"id":"CY1400","q":"资本公积定向转增资本时的投资成本","a":"因为涉及到对赌，A作为对赌受益⽅，应将该项对赌可能产⽣的潜在经济利益流⼊确认为⼀项以公允价值计量且其变动计⼊损益的⾦融资产。截⾄对赌实际履⾏时，该项⾦融资产的公允价值应等于A额外获得的10%股权的公允价值。在将该10%新增股份登记⾄A名下后，该部分⾦融资产的账⾯价值就是该10%新增股权投资的成本。 同时，如果对原持有的10%股权是作为⾦融资产核算的，则需同步确认其公允价值变动或者其他综合收益；如果原先对该10%股权是按权益法核算的，则需注意依据最新的公允价值信息考虑原持有股份是否已发⽣减值，以及根据对应享有B公司权益变动情况确认其他权益变动。个人理解，供参考。","cat":"资产减值","kw":"公允价值,减值,权益法,资本公积定向转增资本时的投资成本","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第8号——资产减值"},{"id":"CY0344","q":"预付的认证费，如果后续订购到⼀定数量，会抵减货款","a":"各项认证内容是互相独⽴的，还是作为⼀个整体，只有全部报告均出具才算通过认证？ 如果是后者，则截⾄⽬前因仍有报告尚未出具，故整体可作为预付款项挂账，但期末需谨慎对其进⾏减值测试和计提减值准备（如需要）。 如果是前者，则针对已出具的报告对应的检测费⽤，需合理、谨慎地估计⽇后的采购量，确定这部分采购量能否按协议约定转移给供应商承担。如果很可能由供应商承担其全部或部分的，则根据预计从供应商收回的时间和⾦额确认为其他流动资产或者其他⾮流动资产；对于预计不能从供应商收回的部分确认为预付采购款，⽇后采购商品时摊 ⼊采购成本。不建议作为研发⽀出。个人理解，供参考。","cat":"资产减值","kw":"减值,预付的认证费,如果后续订购到⼀定数量,会抵减货款","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第8号——资产减值"},{"id":"CY1471","q":"为了已销售的商品储备的更换件减值测试⽅法","a":"以上两种情况，所影响的是减值测试的单元范围。在情形1下，以该特定订单下的相关商品作为减值测试单元；在情形2下，以可通⽤（互换）的商品类别作为减值测试单元。同⼀减值测试单元内部不同存货项⽬之间的增减值可以互抵，但不同的减值测试单元之间不能互抵。 对于更换件，⼀般理解是⽤于在售后服务中替换已售出商品中损坏的同类部件。⼀般不⽤于直接销售。因此，在确定其可变现净值时需要考虑的因素包括（但不限于）：该类更换件本身的仓储寿命和通⽤性；如能够单独出售的，其单独出售的可能性和预计售价；如被替换的故障部件可收回的，则收回故障部件的可变现净值；等等。个人理解，供参考。","cat":"资产减值","kw":"减值,求助陈版,为了已销售的商品储备的更换件减值测试⽅法","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第8号——资产减值"},{"id":"CY1290","q":"⼀般保理、应收账款转让等业务很少有此类情况，要么没有转移，要么已经转移。不容易出现急需涉⼊资产。8、有收回的影响，相当于核销了该部分坏账准备，所以必然与信⽤减值损失不同，但可以合理解释。","a":"此时该⾏应有数据。但仅从附注的披露来看⽆法判断相应的会计处理或者附注披露有⽆错误。提问⼈：爬爬呀 时间：2025-05-20 15:04:34 针对第七点事项：麻烦陈版主看⼀下这截图，“期初数在本期”这⼀⾏应该是有数据的吧。⾟苦陈版主了 mmexport1747724638629.png (212.75 KB, 下载次数: 73) 下载附件 2025-5-20 15:04 上传 回答⼈：chenyiwei 这⼀⾏⼀般不填数，也可以作为以下⼏⾏的合计数，没有统⼀规定。个人理解，供参考。","cat":"资产减值","kw":"减值,⼀般保理,应收账款转让等业务很少有此类情况,要么没有转移,要么已经转移,不容易出现急需涉⼊资产,有收回的影响,相当于核销了该部分坏账准备,所以必然与信⽤减值损失不同,但可以合理解释","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第8号——资产减值"},{"id":"CY1914","q":"若不属于债务重组的话，那么关于利息及滞纳⾦ 0.5 亿，A公司能否确认相关的利息收⼊呢？对于担保债权，A 公司能否确认为其他应收款进⾏核算，⽽对于普通债权转为股权，作为其他权益⼯具投资是否恰当呢？","a":"此类债务偿还安排是债务⼈重整的整体安排的⼀部分，实务中⼀般将其作为债务重组处理（虽然引⼊了投资⼈，但投资⼈并不直接向债权⼈偿还债务，偿还债务仍是债权⼈和债务⼈双⽅之间的安排，重整投资⼈的回购只是补充保障）。⽬前很多上市公司的破产重整都是此类业务模式。 即使考虑到重整投资⼈的介⼊，不认为这是严格意义上的债务重组，但会计处理结果仍然是不受影响的。债务重组准则本来就是建⽴在⾦融⼯具准则基础上的，即使没有债务重组准则，按照 ⾦融⼯具相关准则的规定和原则也可以得出相同的处理结果。 对于利息和滞纳⾦能否确认，应谨慎评估引⼊投资⼈后债务⼈还款能⼒的改善情况，如果有实质性改善的，则可以转回此前计提的部分坏账准备（按最新的预计可收回⾦额折现值调整），相应增加利息收⼊的计算基数。 对于担保债权，还款⾦额能够合理估计的，可继续作为以摊余成本计量的⾦融资产（如债权投资、其他流动/⾮流动资产等）核算及列报；对于转股取得的股权，如果拟⻓期持有的，可指定为其他权益⼯具投资，否则应分类为以公允价值计量且其变动计⼊损益的⾦融资产，列报为其他⾮流动⾦融资产。 提问⼈：gpqg 时间：2025-12-17 15:45:18 请教陈版，如果作为其他权益⼯具投资来核算，其公允价值能否按照： 1 亿/51%，计算出 100%股权的公允价值。然后再乘以 3%，作为其他权益⼯具投资的⼊账价值呢？ 谢谢陈版！ 回答⼈：chenyiwei 重整投资⼈愿意出1亿元取得51%股权并控股，可能有其他特殊考虑，不能据此按⽐例测算取得的3%股权公允价值。建议单独评估。个人理解，供参考。","cat":"金融工具","kw":"公允价值,债务重组,若不属于债务重组的话,那么关于利息及滞纳⾦,A公司能否确认相关的利息收⼊呢,对于担保债权,公司能否确认为其他应收款进⾏核算,⽽对于普通债权转为股权,作为其他权益⼯具投资是否恰当呢","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第37号——金融工具列报"},{"id":"CY0158","q":"点价模式销售⼤宗商品是否属于⾮经？","a":"如果这是⼀种固有、成熟的业务模式（指在本企业已经长期应⽤，且已建⽴了针对可能需承担的⼤宗商品市场价格变动风险的相关控制、对冲机制），则由此产⽣的损益是该固有业务模式的⼀部分，⼀般不作为⾮经常性损益。但如果⼤宗商品价格在短期内发⽣⼤幅度异动，由此导致的公允价值变动损益也有被认定为⾮经常性损益的可能性。个人理解，供参考。","cat":"实务综合","kw":"公允价值,请教陈版,点价模式销售⼤宗商品是否属于⾮经","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0177","q":"特许经营权如何做会计处理","a":"该特许权费的⽬的是获得品牌的使⽤权，更多地与营销相关，⽽不直接构成产品实体（尽管可能也需要向该品牌指定的供应商进货、遵循其品控要求等，从⽽对其所供应的餐品产⽣影响）。因此建议计⼊销售费⽤。个人理解，供参考。","cat":"实务综合","kw":"特许经营权如何做会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0206","q":"关于处置⼦公司资本公积是否可以转为投资收益","a":"这种情况下的资本公积是权益***易形成的，不可转留存收益，包括在处置⼦公司时。提问⼈：Mark0507 时间：2024-04-09 21:33:42 请教陈版，个人理解，供参考。","cat":"实务综合","kw":"请教陈版关于处置⼦公司资本公积是否可以转为投资收益","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0209","q":"关于客座率差价可以确认为收⼊吗？","a":"需要进⼀步了解该交易背后的商业逻辑和其他相关安排，例如：个人理解，供参考。","cat":"实务综合","kw":"请教陈版主,关于客座率差价可以确认为收⼊吗","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0223","q":"【求助陈版】关于提供服务收⼊的免费期","a":"可以这样理解。第⼀个⽉的免费是基于后⾯⽉份的付费，因此这两者是直接相关的，并且考虑到各⽉提供服务的内容和数量类似，故直线法是确认收⼊的最合理⽅法。个人理解，供参考。","cat":"实务综合","kw":"【求助陈版】关于提供服务收⼊的免费期","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0224","q":"求助！！⼩企业会计准则或企业会计制度对对赌条款的处理","a":"《⼩企业会计准则》和《企业会计制度》对此没有明确规定。考虑到这两项准则制度在⽬前都是适⽤于没有资本市场融资需求的企业，因此当企业⾛到“签订融资对赌条款”这⼀步时，就建议转换到企业会计准则，因为后续进⼀步的融资和资本运作将不可避免，建议尽早规范化。⽽会计核算适应资本运作要求也是规范化的重要⽅⾯。个人理解，供参考。","cat":"实务综合","kw":"⼩企业会计准则或企业会计制度对对赌条款的处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1182","q":"关于掉期业务的处理问题","a":"如果企业的记账本位币是⼈⺠币，则该交易⽆法起到锁定美元汇率从⽽规避外汇⻛险的效果，其实质是以700万美元作为质押，从银⾏取得700*7.2433=5070.31万元⼈⺠币，⼀年后归还该 5070.31万元⼈⺠币，该笔借款名义上是没有利息的，但个⼈理解这应当是基于本公司与银⾏之间的⻓期业务合作关系，银⾏给予的让利。 因此，建议直接按照外币质押⼈⺠币借款进⾏会计处理。作为质押品的700万美元转⼊其他应收款（期末需按现⾏即期汇率进⾏汇率调整并确认汇兑损益），取得5070.31万元⼈⺠币作为借款本⾦贷记短期借款.银⾏预先⽀付的该业务收益160万元可以看作美元存款的利息收⼊，在其存续期内分摊确认。 建议进⼀步了解该业务的经济实质，以及银⾏在该业务中靠什么盈利，以便进⼀步分析。个人理解，供参考。","cat":"金融工具","kw":"关于掉期业务的处理问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第37号——金融工具列报"},{"id":"CY1292","q":"远期外汇合约会计处理咨询","a":"由于没有明确的被套期项⽬，因此不能使⽤套期会计⽅法，直接将该项远期合约作为以公允价值计量且其变动计⼊损益的⾦融资产或⾦融负债处理。资产负债表上列报为交易性⾦融资产或者交易性⾦融负债。个人理解，供参考。","cat":"金融工具","kw":"公允价值,远期外汇合约会计处理咨询","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第37号——金融工具列报"},{"id":"CY0240","q":"陈⽼师，关于⼦公司2022年注销并签订债务转让协议，母公司承担债务，会计","a":"这种情况下，母公司应当在承接⼦公司的债务并注销⼦公司时，贷记相关负债科⽬，借记投资收益，作为清算⼦公司的损益的⼀部分。个人理解，供参考。","cat":"实务综合","kw":"陈⽼师,关于⼦公司2022年注销并签订债务转让协议,母公司承担债务","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0243","q":"求助股份⽀付相关问题","a":"该转让虽然是该⾼管和核⼼员⼯的个⼈⾏为，但企业也从中获益，故也属于股份⽀付。你的理解基本合理：应将该10万股做失效处理，按新的授予⽇重新确认股份⽀付。个人理解，供参考。","cat":"实务综合","kw":"求助股份⽀付相关问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0245","q":"！ppp模式下，关于折现的处理","a":"企业的观点是出于递延纳税的考虑，严格来说并不符合企业会计准则规定，只能从重要性⾓度考虑能否接受其处理了。个人理解，供参考。","cat":"实务综合","kw":"递延,请教陈版,ppp模式下,关于折现的处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0632","q":"问：能不能把回收收⼊冲减租赁费（求助）","a":"电动汽车在其使⽤寿命内可能要更换⼏次动⼒电池，即动⼒电池的使⽤寿命不同于车辆本⾝。根据《企业会计准则第4号——固定资产》第五条规定：“固定资产的各组成部分具有不同使⽤寿命或者以不同⽅式为企业提供经济利 益，适⽤不同折旧率或折旧⽅法的，应当分别将各组成部分确认为单项固定资产。”。因此，理论上应将动⼒电池 单独确认为⼀项固定资产，在其⾃⾝使⽤年限内单独计提折旧。这样，在使⽤寿命到期更换电池时，按常规的固定资产报废处置进⾏会计处理即可。 如果⽆法合理确定电池的原值和更换时点的账⾯价值的，则建议将新更换电池的⽀出予以费⽤化，电动汽车作为⼀项整体固定资产的原值和账⾯价值保持不变，后续继续按原定的使⽤年限计提折旧。个人理解，供参考。","cat":"租赁","kw":"租赁,固定资产,折旧,能不能把回收收⼊冲减租赁费","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁、《企业会计准则第4号——固定资产》"},{"id":"CY0128","q":"⼀年内到期的融资租赁保证⾦在报表什么项⽬⾥列报","a":"这类保证⾦⼀般是⼀年内到期的长期应收款，列报为⼀年内到期的⾮流动资产。个人理解，供参考。","cat":"租赁","kw":"租赁,⼀年内到期的融资租赁保证⾦在报表什么项⽬⾥列报","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁"},{"id":"CY0663","q":"新版指南合订本例21-59","a":"该【例21-59】对应于《租赁准则应⽤案例——卖⽅兼承租⼈对包含⾮取决于指数或⽐率的可变租赁付款额的售后租回交易的会计处理》，是对《企业会计准则解释第17号》第三条的具体应⽤与解释⽰例。 本案例有两种场景假设：1、甲公司在租赁期开始⽇能够合理估计上述售后租回交易租赁期内各期预期租赁付款 额；2、甲公司在租赁期开始⽇不能合理估计上述售后租回交易租赁期内各期预期租赁付款额，但能采⽤其他合理 ⽅法确定租回所保留的权利占⽐为25%。你说的3419元计⼊管理费⽤是针对情形⼀，即因为每期的租赁付款额是估计的，难免与实际情况存在差异，故实际付款额与原估计的该期付款额的差额在当期调整计⼊损益（如管理费 ⽤）。个人理解，供参考。","cat":"租赁","kw":"租赁,新版指南合订本例21-59","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁"},{"id":"CY0975","q":"承租⼈在租赁期间，由⼩规模纳税⼈变更为⼀般纳税⼈，对使⽤权资产的会 计处理","a":"严格来说做法应当是：不论是⼀般纳税⼈还是⼩规模纳税⼈，租赁付款额都是不含税的，即使是作为⼩规模纳税⼈期间，也应按照不含税的租⾦折现计量使⽤权资产和租赁负债，⽽将各期实际⽀付租⾦中包含的不能抵扣的增值税计⼊各期成本费⽤。这样，后续改为⼀般纳税⼈时，不涉及对使⽤权资产和租赁负债的重新计量问题。 如果影响⾦额不重⼤，基于简化考虑，建议对剩余期间内的租⾦重新折现（在改为⼀般纳税⼈后按不含税租⾦重新折现），重新折现确定的租赁负债应有余额（截⾄2023.2.1）与此前原有租赁负债余额之间的差额，冲减租赁负债 和使⽤权资产。后续重新计算租赁负债各期利息⽀出和使⽤权资产的各期折旧。个人理解，供参考。","cat":"租赁","kw":"租赁,折旧,承租⼈在租赁期间,由⼩规模纳税⼈变更为⼀般纳税⼈,对使⽤权资产的会,计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁"},{"id":"CY0611","q":"新租赁准则下，出租⽅融资租赁是否需要在初始阶段确认销售成本？","a":"根据《企业会计准则第21号——租赁（2018年修订）》第四⼗⼆条：⽣产商或经销商作为出租⼈的融资租赁，在租赁期开始⽇，该出租⼈应当按照租赁资产公允价值与租赁收款额按市场利率折现的现值两者孰低确认收⼊，并按照租赁资产账⾯价值扣除未担保余值的现值后的余额结转销售成本。 ⽣产商或经销商出租⼈为取得融资租赁发⽣的成本，应当在租赁期开始⽇计⼊当期损益。 据此，只有当出租⼈同时为该租赁资产的⽣产商或者经销商，融资租赁本质上等同于分期收款销售商品时，才应当在租赁期开始⽇确认收⼊和成本。如果出租⼈是专业租赁公司，就不会出现这种情况。个人理解，供参考。","cat":"租赁","kw":"公允价值,租赁,新租赁准则下,出租⽅融资租赁是否需要在初始阶段确认销售成本","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁、《企业会计准则第21号——租赁（2018年修订）》"},{"id":"CY0135","q":"求助⼀下关于融资租赁的问题","a":"该事项属于“售后租回交易中的资产转让不属于销售”的情形，应按新租赁准则第五⼗⼆条规定处理，即视为以该汽车为抵押获取融资，B公司⽀付的款项视为为本企业提供的融资，确认为长期应付款。 该项交易的会计处理不使⽤“使⽤权资产”和“租赁负债”科⽬。个人理解，供参考。","cat":"租赁","kw":"租赁,求助⼀下关于融资租赁的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁"},{"id":"CY1582","q":"！折旧差异确认递延的后续处理","a":"⾸先明确讨论前提：该事项最初发⽣于新租赁准则⾸次执⾏⽇之前，也不适⽤解释16号对初始确认豁免的修正规定。假设当时未在初始确认时确认递延所得税资产，仅就租赁期内各年折旧和利息费⽤的差异（发⽣额）确认递延所得税资产。 在上述假设前提下，暂时性差异由租赁期内的会计上利息费⽤和固定资产折旧之和，与税法允许每年税前扣除的固定资产折旧之间的差异形成。由于固定资产原值的税会差异，上述暂时性差异在租赁期满⽀付名义价款取得所有权后不会⽴即消除（即不应⼀次性转回租赁期内累积的递延所得税资产），后续还会继续通过固定资产折旧陆续转回。个人理解，供参考。","cat":"租赁","kw":"租赁,所得税,递延,固定资产,折旧,求助陈版,折旧差异确认递延的后续处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁"},{"id":"CY1259","q":"递延确认的疑问","a":"对于此类处于持续亏损（此处的“亏损”是指税务上的应纳税所得额为负数，下同）且预计在可预⻅的未来不会盈利的企业，对于应纳税暂时性差异仍应确认递延所得税负债（本案例为625万元）。同时在已确认的递延所得税负债的限度内，可确认与可抵扣亏损、可抵扣暂时性差异相关的递延所得税资产。 因此，本案例中可确认递延所得税资产的上限是625万元，包括与可抵扣亏损和可抵扣暂时性差异相关的递延所得税资产。如果仅就租赁负债账⾯价值确认递延所得税资产325万元，⽽不确认与可抵扣亏损相关的递延所得税资产，则是不合理的。个人理解，供参考。","cat":"租赁","kw":"租赁,所得税,递延,求助陈版主,递延确认的疑问","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁"},{"id":"CY0136","q":"【求助陈版主】关于16号解释确认使⽤权资产相关递延问题","a":"参照《监管规则适⽤指引——会计类第4号》之“4-8 关于租赁负债相关递延所得税资产的确认”： 公司在确认递延所得税资产时，应当考虑公司当前应纳税暂时性差异在未来期间转回时将产⽣的可⽤来抵扣可抵扣暂时性差异的所得税影响。对于租赁交易，即使预计未来期间公司根据相关税法规定确定的应纳税所得额整体为负数，公司应当考虑预计未来期间转回的使⽤权资产等所产⽣的应纳税暂时性差异，确认与租赁负债相关的可抵扣暂时性差异产⽣的递延所得税资产。 据此，在确认了与使⽤权资产相关的递延所得税负债后，如果预计该企业可预见的未来应纳税所得额仍将持续为负数的，则应在已确认的递延所得税负债的限度内确认与可抵扣亏损相关的递延所得税资产，后续与递延所得税负债同步转回。如果可抵扣亏损⼩于与使⽤权资产相关的应纳税暂时性差异⾦额的，则超出部分的递延所得税资产确认额度在各项可抵扣暂时性差异（如资产减值准备、租赁负债）之间，按照“转回时间早的优先、转回不确定性⼩的 优先”的原则进⾏分配。个人理解，供参考。","cat":"租赁","kw":"减值,租赁,所得税,递延,【求助陈版主】关于16号解释确认使⽤权资产相关递延问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁"},{"id":"CY0150","q":"新15号编报规则下应收账款坏账准备","a":"15号编报规则是披露规则，并不规范确认或计量⽅⾯的问题。 在CAS 22（2017）下，实务中对于属于流动资产的应收账款和应收租赁款，基本不会使⽤三阶段模型测算坏账准备。附注模板中的应收账款三阶段模型的相关披露应当只是在少数情况下备⽤的，⼀般不会⽤到。个人理解，供参考。","cat":"租赁","kw":"租赁,新15号编报规则下应收账款坏账准备","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁"},{"id":"CY0979","q":"联营单位不同⽐增资后还是联营，先计算投资的影响，还是先计算被动稀释 的影响？","a":"此问题⽬前⽆明确规定。如果在时间点1上的交易（股东2和股东3同时增资）属于⼀揽⼦交易的，则不能⼈为区分先后顺序，建议股东2将增资款与该时点前后本企业享有A公司净资产份额的变动额相⽐较，据此测算商誉和负商誉。即： 本次增资前后所享有A公司净资产份额的差额=股东2在时间点1增资后在A中的持股⽐例增资后A公司净资产-股东2 在时间点1增资前在A中的持股⽐例增资前A公司净资产。 增资后A公司净资产=增资前A公司净资产+时间点1股东2、3增资额合计。 该计算没有单独考虑时间点1之前已持有的A公司股份因时间点1股东3增资的稀释影响，但事实上这也是难以单独计算确定的。个人理解，供参考。","cat":"企业合并","kw":"商誉,联营单位不同⽐增资后还是联营,先计算投资的影响,还是先计算被动稀释,的影响","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0760","q":"关于同⼀控制下长投的账务处理","a":"⾸先需考虑该交易的合理性和公允性问题，尤其是少数股东为何也是零对价转让，是否表明C的资产减值准备计提不⾜。 对于B⽽⾔，其从A取得C的60%股权属于同⼀控制下的企业合并，从少数股东D取得40%股权属于购买少数股权。具体会计处理请参阅《监管规则适⽤指引——会计类第1号》之“1-6 同⼀控制下企业合并的会计处理”中“⼀、同时向控股股东和第三⽅购买股权达成的企业合并”。 相应地，此前由A持有的60%股权对应的⾃原购买⽇起算的亏损应按同⼀控制下合并的原则纳⼊B公司合并报表； 但此前由少数股东D持有的40%股份对应的前期亏损仍为少数股东损益。个人理解，供参考。","cat":"企业合并","kw":"减值,合并,少数股东,关于同⼀控制下长投的账务处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY1672","q":"有关业绩对赌协议的账务处理","a":"此类业绩补偿，理论上对于A公司⽽⾔属于以公允价值计量且其变动计⼊损益的⾦融资产；对B公司属于以公允价值计量且其变动计⼊损益的⾦融负债，对利润的影响都体现的公允价值变动损益中。 参照《监管规则适⽤指引——会计类第1号》之“1-7 ⾮同⼀控制下企业合并的或有对价”，此类⾦融资产或⾦融负债的公允价值计量，应当综合考虑标的企业未来业绩预测情况、或有对价⽀付 ⽅信⽤⻛险及偿付能⼒、其他⽅连带担保责任、货币时间价值等因素。 是否开具发票以及双⽅各⾃税务处理问题属于税务专业问题，⽬前尚不明确，建议咨询税务专业⼈⼠意⻅，并与主管税务机关沟通确认。个人理解，供参考。","cat":"企业合并","kw":"公允价值,合并,请教陈版主,有关业绩对赌协议的账务处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY1745","q":"三⽆投资转重⼤影响公允价值的确定","a":"被投资单位可辨认净资产公允价值⼀般需通过资产基础法评估确定，在某些特殊情况下（如⽆法可靠确定投资时被投资单位各项可辨认资产等的公允价值，或者投资时被投资单位可辨认资产等的公允价值与其账⾯价值之间的差额较⼩），也可以按照被投资单位的账⾯净损益与持股⽐例计算确认投资损益，但应当在附注中说明这⼀事实及其原因。 被投资单位可辨认净资产公允价值不同于整体股权公允价值，其中的差额即为隐含的商誉或负商誉。 如被投资单位有其他权益⼯具（属于权益⼯具的永续债、可转债中的权益成分等），应将其从归⺟净资产中扣除，以归属普通股股东的净资产为基础进⾏测算。个人理解，供参考。","cat":"企业合并","kw":"公允价值,商誉,三⽆投资转重⼤影响公允价值的确定","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY1241","q":"吸收合并后商誉处理问题","a":"⺟公司吸收合并⼦公司（假设该⼦公司是全资⼦公司，下同），对合并报表层⾯是完全没有影响的。合并报表层⾯的商誉及其减值准备仍保留。 ⺟公司个别报表层⾯对吸收合并事项按照《企业会计准则解释第7号》第四条规定处理。其中规定：“原为⾮同⼀控制下企业合并取得的⼦公司改为分公司的，原⺟公司购买原⼦公司时产⽣的合并成本⼩于合并中取得的可辨认净资产公允价值份额的差额，应计⼊留存收益；原⺟公司购买原⼦公司时产⽣的合并成本⼤于合并中取得的可辨认净资产公允价值份额的差额，应按照原⺟公司合并该原⼦公司的合并财务报表中商誉的账⾯价值转⼊原⺟公司的商誉。”。个人理解，供参考。","cat":"企业合并","kw":"公允价值,商誉,减值,合并,吸收合并后商誉处理问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0064","q":"同⼀控制下⽆偿划转⼦公司合并报表处理","a":"“A集团的全资⼦公司B将其全资⼦公司C划转给母公司A集团”，即C公司仍然是全年纳⼊A集团合并报表范围的。所以C公司产⽣的利润在A的合并报表中正常体现在留存收益中，不影响合并报表中的资本公积。 请注意：该事项对A⽽⾔不改变合并报表范围，因此不是企业合并。个人理解，供参考。","cat":"企业合并","kw":"合并,同⼀控制下⽆偿划转⼦公司合并报表处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY1057","q":"请问关于⾮同⼀控制下企业合并被合并⽅的会计处理","a":"⾮同⼀控制下合并中，如果是存量股权收购，则被购买⽅除了调整实收资本科⽬的股东明细以外，⼀般⽆需其他处理；涉及购买⽅增资的，按接受增资进⾏会计处理。 通常情况下，被购买⽅不应根据购买⽇的各项可辨认资产、负债的公允价值对其⾃身报表中的资产、负债计量进⾏调整。但是，在《应⽤指南汇编2024》P618中也提及：“⾮同⼀控制下的企业合并中，购买⽅通过企业合并取得被购买⽅100 ％股权的，被购买⽅可以按照合并中确定的可辨认资产、负债的公允价值确认其账⾯价值。除此之外，其他情况下被购买⽅不应因企业合并改记有关资产、负债的账⾯价值。”。个人理解，供参考。","cat":"企业合并","kw":"公允价值,合并,求助陈版主,请问关于⾮同⼀控制下企业合并被合并⽅的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY1023","q":"⾮同⼀合并下递延所得税负债与商誉","a":"对于⾮同⼀控制下企业合并（被购买⽅构成业务）中获得的被收购⽅可辨认净资产的公允价值⼤于计税基础的差 额，属于应纳税暂时性差异，应确认递延所得税负债，在合并报表层⾯对应调整商誉（⽽不是资本公积）。但后续递延所得税负债转回时，仍是贷记“所得税费⽤——递延所得税费⽤”。 若可辨认净资产公允价值⼤于整体股权公允价值（购买成本），则应⾸先对可辨认净资产的公允价值进⾏复核，斌根据复核后的可辨认净资产公允价值与计税基础之间的应纳税暂时性差异⾦额乘以该⼦公司的适⽤税率，确认递延所得税负债，相应减少计⼊营业外收⼊的负商誉⾦额。个人理解，供参考。","cat":"企业合并","kw":"公允价值,商誉,合并,所得税,递延,⾮同⼀合并下递延所得税负债与商誉","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0073","q":"关于同⼀控制下的合并⽇确定！！！","a":"根据《企业会计准则解释第6号》第⼆条规定： ⼆、根据《企业会计准则第20号——企业合并》，在同⼀控制下的企业合并中，合并⽅在企业合并中取得的资产和负债，应当按照合并⽇在被合并⽅的账⾯价值计量。在被合并⽅是最终控制⽅以前年度从第三⽅收购来的情况 下，合并⽅在编制财务报表时，应如何确定被合并⽅资产、负债的账⾯价值？ 答：同⼀控制下的企业合并，是指参与合并的企业在合并前后均受同⼀⽅或相同的多⽅最终控制，且该控制不是暂时性的。从最终控制⽅的⾓度看，其在合并前后实际控制的经济资源并没有发⽣变化，因此有关交易事项不应视为购买。合并⽅编制财务报表时，在被合并⽅是最终控制⽅以前年度从第三⽅收购来的情况下，应视同合并后形成的报告主体⾃最终控制⽅开始实施控制时起，⼀直是⼀体化存续下来的，应以被合并⽅的资产、负债(包括最终控 制⽅收购被合并⽅⽽形成的商誉)在最终控制⽅财务报表中的账⾯价值为基础，进⾏相关会计处理。合并⽅的财务 报表⽐较数据追溯调整的期间应不早于双⽅处于最终控制⽅的控制之下孰晚的时间。 本解释发布前同⼀控制下的企业合并未按照上述规定处理的，应当进⾏追溯调整，追溯调整不切实可⾏的除外。如果丙和甲⼄之间原先并⽆关联，则虽然“2023年9⽉30⽇：A收购丙所持B公司的全部股权，收购A公司持股B公司 100%”的交易构成同⼀控制下合并，但因为A、B从2023年2⽉7⽇起才处于同⼀最终控制⽅的最终控制下，故在A的 会计处理中，B的各项资产、负债的账⾯价值为B⾃⾝的账⾯价值（假设B⼀直处于丙的最终控制下）。A公司的 2023年12⽉31⽇的合并报表是将B公司2⽉7⽇⾄12⽉31⽇损益纳⼊合并范围。 在2⽉7⽇，A尚⽆对B的长投，故不能直接将A对B的长投成本与与2⽉7⽇B公司的净资产互相抵销。这两者之间的差异实际上是A的合并报表层⾯应还原的B公司于该期间内形成的留存收益。个人理解，供参考。","cat":"企业合并","kw":"商誉,合并,求助陈版主关于同⼀控制下的合并⽇确定","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并、《企业会计准则第20号——企业合并》"},{"id":"CY0670","q":"同⼀控制下的企业合并，⽀付对价带有其他综合收益该如何结转？","a":"同⼀控制下企业合并中，合并⽅作为对价转移出去的⾮货币性资产，如果存在对应的其他综合收益，则这部分其他综合收益也是⼀并在合并⽇转⼊资本公积（资本溢价或股本溢价），不转⼊损益或者留存收益。 如果作为对价转移出去的⾮货币性资产原先以公允价值计量，有累计的公允价值变动损益，则在合并⽇不存在特殊的结转问题，也不需要将此前的留存收益转⼊资本公积。 如果作为对价转移出去的对联营企业的长期股权投资有对应的“资本公积——其他资本公积”，则这部分“资本公积 ——其他资本公积”应转⼊“资本公积——资本溢价或股本溢价”。个人理解，供参考。","cat":"企业合并","kw":"公允价值,合并,同⼀控制下的企业合并,⽀付对价带有其他综合收益该如何结转","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0087","q":"关于商誉资产组转移的问题","a":"从主帖所述情况看，⾃购买⽇起，商誉就全部归属于资产组A1，⽽未分摊给资产组A2，即资产组A2⽆对应的商 誉。假设该做法是合理的，则在后续集团重组中，是将A1资产组转移给集团的另⼀家⼦公司，故A1对应的商誉应同步转移⾄该受让⽅⼦公司。 站在该受让⽅⼦公司B的视⾓，其取得A1业务应按照《企业会计准则解释第6号》第⼆条规定处理，其承接A1业务对应的各项资产、负债，应在本集团合并报表层⾯的账⾯价值作为会计处理的基础。个人理解，供参考。","cat":"企业合并","kw":"商誉,合并,请教陈版,关于商誉资产组转移的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0608","q":"业绩对赌半年报如何处理","a":"根据《企业会计准则第32号——中期财务报告》第⼗⼀条：“企业在中期财务报表中应当采⽤与年度财务报表相⼀致的会计政策。”因此，在中期也需要根据对赌业绩的完成情况、未来盈利预测的最新发展变化等，对业绩补偿 （或有对价）的公允价值进⾏调整，同时进⾏商誉减值测试和计提减值。如在中期进⼀步计提减值准备的，这部分减值准备后续同样不能转回。 对此问题，IFRS下有⼀个专门的解释公告IFRIC 10《Interim Financial Reporting and Impairment》，可供参考。个人理解，供参考。","cat":"企业合并","kw":"公允价值,商誉,减值,业绩对赌半年报如何处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并、《企业会计准则第32号——中期财务报告》"},{"id":"CY0090","q":"关于权益法核算的处理问题","a":"建议了解：当初本公司⼊股该联营企业时，对⼊股前该公司的留存收益归属问题是如何约定的？当初协议中是否已经明确约定本企业不享有此前的滚存利润？如果是，则在确定投资⽇取得被投资企业可辨认净资产公允价值份额 时，不应将不归属于本企业的留存收益包含在内。如果此前因疏忽等原因未注意到这⼀点，则属于前期差错，应予以更正，调整投资成本中包含的隐含商誉⾦额，或者调整在投资⽇计⼊营业外收⼊的⾦额。 如果此前约定投资⽇的滚存利润由新⽼股东按投资后的股权⽐例共享，但实际分配时仅分配给⽼股东，则应关注出现这⼀情况的原因，根据具体原因确定应如何处理。个人理解，供参考。","cat":"企业合并","kw":"公允价值,商誉,权益法,请教陈版关于权益法核算的处理问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY1652","q":"关于同⼀控制下企业合并⽐较期间追溯调整问题","a":"由于截⾄2022年末，同⼀控制下合并尚未发⽣，故不应将期后发⽣的同⼀控制下合并事项，对报告期内的合并报表进⾏追溯重述处理。 如果有特殊的财务信息需求，则也可以假设该同⼀控制下合并事项在2021年前即已完成，所形成的相关股权架构在报告期内持续存在且延续⾄今，据此编制特殊基础财务报表，并按照1601号审计准则对其出具审计报告，需注意在报表附注中充分披露编制⽬的、预定⽤途，所采⽤的具体编制基础等；审计报告需按该准则规定增设强调事项段，说明审计⽬的、报告的预定⽤途和分发范围等问题。个人理解，供参考。","cat":"企业合并","kw":"合并,关于同⼀控制下企业合并⽐较期间追溯调整问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0989","q":"⾮同控，购买⽇的被投资单位的使⽤权和租赁负债怎么抵消？抵消是否影响 少数股东权益？","a":"如果该租赁对A公司⽽⾔属于融资租赁，则A、B的会计处理是对称的，抵销较为容易。 如果该租赁对A⽽⾔是经营租赁，则A、B对该租赁的处理不对称。此时应⾸先对B的报表进⾏调整，冲销B报表中 按照新租赁准则确认的使⽤权资产和租赁负债，以及相关的使⽤权资产折旧、租赁负债利息等会计处理，再按照原租赁准则下承租⼈对经营租赁的会计处理规定进⾏处理，这样就可以进⾏双⽅之间内部交易的抵销了。该事项会对B的可辨认净资产公允价值产⽣影响，故最终体现为对商誉和少数股东权益初始计量⾦额的影响。个人理解，供参考。","cat":"企业合并","kw":"公允价值,商誉,少数股东,租赁,折旧,⾮同控,购买⽇的被投资单位的使⽤权和租赁负债怎么抵消,抵消是否影响,少数股东权益","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY1871","q":"收购⾮同⼀控制下企业合并要求把被收购⽅不良资产卖给收购⽅⺟公司 是否构成⼀揽⼦…","a":"判断⼀揽⼦交易的依据是合并报表准则第五⼗⼀条，即各步骤是否为了实现同⼀商业⽬的⽽⼀并筹划，互为前提和条件。 因为在同⼀协议中要求把被收购⽅不良资产卖给收购⽅⺟公司，因此该事项属于⼀揽⼦交易。作为补充证据，建议考虑：（1）不良资产的范围是否已明确划定，与标的公司其他资产和负债之间的界限是否清晰；（2）标的公司将不良资产处置给其原⺟公司是否可⾏，是否存在重⼤的实质性障碍，能否在短期内完成；（3）对标的公司进⾏评估和交易作价时是否未考虑该等不良资产的影响。个人理解，供参考。","cat":"企业合并","kw":"合并,收购⾮同⼀控制下企业合并要求把被收购⽅不良资产卖给收购⽅⺟公司,是否构成⼀揽⼦…","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0141","q":"关于集团内公司之间⽆偿划转资产，如何⼊账的问题","a":"这类交易属于权益性交易。由于⽆偿划转通常不需要办理资产评估，所以实务中通常以被划转资产在划出⽅的原账 ⾯价值作为划⼊⽅的⼊账价值。 当然，从会计原理⾓度⽽⾔，如果有条件进⾏评估并且也进⾏了评估，则划⼊⽅按评估值⼊账更为合理。前提是被划转的资产不构成“业务”，因⽽对划⼊⽅⽽⾔不构成同⼀控制下的企业合并。个人理解，供参考。","cat":"企业合并","kw":"合并,请教陈版,关于集团内公司之间⽆偿划转资产,如何⼊账的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY1328","q":"请问已费⽤化处理的研发样机后期销售应如何处理？","a":"这个实施问答的核⼼点是：前期已费⽤化（计⼊研发费⽤）的研发⽀出，即使后续形成了可对外销售的样机、样品等，也不能再从研发费⽤中转出计⼊存货成本和销售成本。其背后的逻辑 是：前期已费⽤化的研发⽀出不应因后续该研发项⽬的成功⽽进⾏调整。（《应⽤指南汇编2024》P174）这样处理的后果就是前期研发⽀出已费⽤化的情况下，后续实现样品、样机销售时只有收⼊⽽⽆对应的成本，但不影响其作为⽇常活动的收⼊确认。 需要注意的是：从逻辑上说，到了可产出对外销售的样品、样机的程度，⼤体上也就到了资本化阶段了。只是实务中⼤家都不敢或者不愿做资本化，因此产⽣了逻辑⽭盾。实务中不排除有些情况下产出样机、样品时不肯定能否实现销售或者研发最终能否成功，但确实应当是少数，现在⼤量出现费⽤化阶段产出样品、样机的情况，本身逻辑上就是不合理的。 提问⼈：Lsyb 时间：2025-05-23 15:37:01 请教下陈版主，该实施问答仅针对研发样机是吗？对于公司的销售样机是否也按此规定执⾏呢？ 公司主要客户为企业级客户，他们对产品稳定性要求较⾼，公司产品量产后，客户要求先进⾏测试，测试通过后才考虑购买，通常情况下测试后会将测试样品还回。针对这部分送测的样品， 因为每个客户的测试强度不⼀样，对样品的损耗程度不⼀样，因此样品测试后的状况及剩余价值也不确定，因此通常在领⽤出库的时候⼀次性计⼊销售费⽤-样品费，并在被查账登记，后期在公司对这部分销售样品做销售处理时，直接冲减当期的销售样品费。请问下这部分会计处理是否恰当？是否要参考研发样机的处理？ 回答⼈：chenyiwei ⾦额较⼩时可以这样处理，这基本上就是废料销售；如果设备可以正常使⽤，作为正常商品出售，则仍需确认收⼊（⽆对应成本）。个人理解，供参考。","cat":"收入准则","kw":"资本化,请问已费⽤化处理的研发样机后期销售应如何处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY1723","q":"全资⼦公司前期未转固，本年计提⼤额减值后破产清算的合并处理","a":"⾸先，因为⺟公司本身也向⼦公司提供了4000万元借款，是最⼤债权⼈之⼀，并且不排除⺟公司对⼦公司的超额亏损兜底的可能性，所以要谨慎考虑：即使⼦公司已被法院指定的管理⼈接管，但⺟公司是否仍应继续合并该⼦公司？ 其次，不论是否应当继续将该⼦公司纳⼊合并报表范围，此前⺟公司在个别报表层⾯对该⼦公司未计提⻓投减值和债权减值，很可能属于前期差错，应予以更正并追溯重述前期个别报表。 如果确定不再将该⼦公司纳⼊合并报表范围是恰当的，则如主帖所述，“⼦公司的1-8⽉的利润表要并表，那么对应上半年计提的资产减值也要并进来”，这部分减值损失⽆需特殊处理。相应地后续丧失控制权时，合并报表层⾯的处置损失相应减少。 如果法院受理⼦公司破产并指定管理⼈后，仍需要⺟公司额外承担每⽉固定的费⽤，则⺟公司后续对该⼦公司仍有经济涉⼊，在如前所述的合并范围问题中应⼀并纳⼊考虑，可能表明⺟公司继续控制⼦公司。如果确定不纳⼊合并范围是恰当的，则在达成该协议后，应就未来需提供的费⽤⼀次性计提，按其折现值确认预计负债，对应借记投资收益。 提问⼈：wx_61078e9d4d2d 时间：2025-10-15 09:55:52 陈⽼师，根据b公司的章程，⺟公司不承担b公司超额亏损的兜底责任；⽬前每个⽉⽀付的费⽤⾦额固定5万/⽉，⼀直都是以⺟公司像b公司提供借款形式⽀持，但是时间不定（b公司对⽔体造成污染，每个⽉都在⾃⾏整改费⽤在5万/⽉，直⾄政府验收合格），可能持续1、2年。以上情况下，我理解是b公司是可以出表的，但是因为具体费⽤不定，我们是否可以叫管理层合理估计⼀下，在出表时候做投资收益、预计负债考虑？ 回答⼈：chenyiwei 也可以出表并做预计负债考虑，但对预计负债的估计要很谨慎。个人理解，供参考。","cat":"收入准则","kw":"控制权,减值,合并,预计负债,全资⼦公司前期未转固,本年计提⼤额减值后破产清算的合并处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0762","q":"关于CAS.22第四⼗⼆条与债务重组的问题","a":"债务重组准则是从⾦融⼯具准则派⽣出来的，其对于⾦融资产、负债条款的修改的具体会计处理，也是引⽤到⾦融 ⼯具准则的相应规定。对于条款的修改，⾸先要判断该条款修改是否为实质性的，如果是实质性的，则会导致原⾦融资产（或⾦融负债）的终⽌确认，以及⼀项新的⾦融资产（或⾦融负债）的初始确认，初始确认的新⾦融资产或 ⾦融负债的公允价值与被终⽌确认的原⾦融资产或⾦融负债的账⾯价值之间的差额计⼊损益；如果是⾮实质性的， 则不导致原有⾦融资产或⾦融负债的终⽌确认，⽽是按照CAS 22第四⼗⼆条规定处理。 关于实质性修改的具体判定，参照《应⽤指南汇编2024》P324：“对于债务⼈，如果对债务或部分债务的合同条款 作出实质性修改形成重组债务，或者债权⼈与债务⼈之间签订协议，以承担实质上不同的重组债务⽅式替换原债 务，债务⼈应当终⽌确认原债务，同时按照修改后的条款确认⼀项新⾦融负债。其中，如果重组债务未来现⾦流⿏ （包括⽀付和收取的某些费⽤）现值与原债务的剩余期间现⾦流量现值之间的差异超过10% ，则意味着新的合同条款进⾏了实质性修改或者重组债务是实质上不同的，有关现值的计算均采⽤原债务的实际利率。”即，实质性变 化的判定是基于合同条款的，与债务⼈的实际履约能⼒⽆关，不能理解为针对履约能⼒差的债务⼈，相关修改就是 ⾮实质性的。 对于涉及债务重组的应收款项，⼀般应按个别认定法计提准备。理论上个别认定法的计提结果不考虑账龄。 债务⼈的债务重组收益的确认时点，⼀⽅⾯要确保相关的重⼤不确定性已经消除（或者已经履约完毕），另⼀⽅⾯要确保在技术上满⾜⾦融⼯具准则规定的原⾦融负债终⽌确认时点或者修改后条款⽣效时点。 主帖中引⽤的上述会计准则和监管规定之间并不存在冲突。个人理解，供参考。","cat":"收入准则","kw":"公允价值,债务重组,请教陈版主,关于CAS,22第四⼗⼆条与债务重组的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY1762","q":"此种定价是否属于监管指引2号的暂定价格交易","a":"第⼀种情况，由于在提货当⽇即确定价格，故不存在价格变动的不确定性，不属于暂定价格交易。 第⼆种情况，由于在提货当⽇价格不确定，需到当⽉⽉末根据当⽉均价最终确定价格，故属于暂定价格交易，涉及嵌⼊衍⽣⼯具。2⽉份因春节放假，剩余天数按当天价结算，故该种情况不存在暂定价格。 提问⼈：gulgdx 时间：2025-10-13 18:31:34 陈⽼师您好，A公司向上游铝⼚采购铝锭作为⽣产⽤的原料，对不同供应的采购定价⽅式归纳起来有两种： 第⼀种：结算⽅式:提货当⽇上海有⾊⽹公布的SMM A00铝最⾼价和最低价的算术平均价下浮100元/吨作为结算价,若遇节假⽇则价格向前顺延。 第⼆种：定价⽅式:按SMM上海有⾊⾦属⽹公布的有⾊现货⽹上报价99.70铝锭⽉均价下浮50元/吨作为结算价送到需⽅仓库。(2⽉份因春节放假，剩余天数按当天价结算) 请问： 上述两种结算⽅式下，A公司采购铝定是否均属于与“点价”交易，需要视采购合同中嵌⼊了⼀项衍⽣⾦融⼯？ 如果均是：是否在存货采购⼊库时，除确认应付账款外，还同时确认⼀项以公允价值计量且其变动计⼊损益的⾦融负债。后续该项⾦融负债的公允价值变动（直⾄最终确定价格）计⼊公允价值变动损益，不再调整存货的账⾯价值？ 回答⼈：chenyiwei https://bbs.esnai.com/thread-5494268-1-1.html 上一页 陈版主（陈奕蔚老师）答疑历史文章（2025年08月） 下一页 陈版主（陈奕蔚老师）答疑历史文章（2025年10月） 粤ICP备18107660号 粤公网安备44060602000887号 关于网站 Copyright © 2021-2026 会计便利店 hjyweb.cn 【个人理解，供参考。","cat":"收入准则","kw":"公允价值,此种定价是否属于监管指引2号的暂定价格交易","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0045","q":"及各位⼤佬","a":"要看A、C之间的关系，即A取得对B的控制权，对A⽽⾔是同⼀控制下合并还是⾮同⼀控制下合并。 如果是⾮同⼀控制下合并，则A的个别报表层⾯按权益法（41%股权⽐例）核算到B公司撤资⽇（即A公司取得C公司控制权的购买⽇），以截⾄该⽇的账⾯价值作为后续成本法核算的投资成本基础；合并报表层⾯则需对所持股权按购买⽇公允价值重新计量，并确认投资收益，作为合并成本，据此计算合并报表层⾯商誉的初始计量⾦额。 如果是同⼀控制下合并，则个别报表层⾯应以合并⽇（取得对C控制权之⽇）取得C的净资产在最终控制⽅合并报 表层⾯的账⾯价值为投资成本，与原先权益法下长投账⾯价值之间的差额调整权益；合并报表层⾯需追溯重述前期 ⽐较数据，视同⾃最早报告期期初就已经是⼦公司。个人理解，供参考。","cat":"收入准则","kw":"控制权,公允价值,商誉,合并,权益法,成本法,求助陈版及各位⼤佬","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY1730","q":"付费会员的账务处理？","a":"该事项应按《企业会计准则第14号——收⼊（2017年修订）》第四⼗条规定处理： 企业在合同开始（或接近合同开始）⽇向客户收取的⽆需退回的初始费（如俱乐部的⼊会费等）应当计⼊交易价格。企业应当评估该初始费是否与向客户转让已承诺的商品相关。该初始费与向客户转让已承诺的商品相关，并且该商品构成单项履约义务的，企业应当在转让该商品时，按照分摊⾄该商品的交易价格确认收⼊；该初始费与向客户转让已承诺的商品相关，但该商品不构成单项履约义务的，企业应当在包含该商品的单项履约义务履⾏时，按照分摊⾄该单项履约义务的交易价格确认收⼊；该初始费与向客户转让已承诺的商品不相关的，该初始费应当作为未来将转让商品的预收款，在未来转让该商品时确认为收⼊。 企业收取了⽆需退回的初始费且为履⾏合同应开展初始活动，但这些活动本身并没有向客户转让已承诺的商品的，该初始费与未来将转让的已承诺商品相关，应当在未来转让该商品时确认为收⼊，企业在确定履约进度时不应考虑这些初始活动；企业为该初始活动发⽣的⽀出应当按照本准则第⼆⼗六条和第⼆⼗七条规定确认为⼀项资产或计⼊当期损益。 据此，应⾸先考虑该部分会员权益系对应于哪些履约义务。例如“送⼀套市价80元的产品”“每⽉赠送20元的满减优惠券”“全年在公司购买的任何商品均可以享受⾮会员价格的95折或9折”都是不同的履约义务。根据不同履约义务履约的可能性和对客户的让利幅度等因素估计各项履约义务的单独售价，据此对会员权益的总价（200元）进⾏分拆，分摊到各单项履约义务，分别在各项履约义务履约时确认收⼊，例如分摊到80元商品的价款在交付该商品时确认收⼊，对应结转成本；购物打折和优惠券可以简化处理，在整个会员权益的有效期内分摊确认收⼊。个人理解，供参考。","cat":"收入准则","kw":"履约义务,请教陈版主,付费会员的账务处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入、《企业会计准则第14号——收⼊（2017年修订）》"},{"id":"CY0047","q":"⼤额存单利息收⼊的纳税调整","a":"是，应进⾏纳税调整。 根据《企业所得税法实施条例》第⼗⼋条：企业所得税法第六条第（五）项所称利息收⼊，是指企业将资⾦提供他 ⼈使⽤但不构成权益性投资，或者因他⼈占⽤本企业资⾦取得的收⼊，包括存款利息、贷款利息、债券利息、⽋款利息等收⼊。 利息收⼊，按照合同约定的债务⼈应付利息的⽇期确认收⼊的实现。 根据国家税务总局发布的《〈企业所得税法实施条例〉释义》中对该条的解释： 「释义」本条是关于收⼊总额中的利息收⼊的规定。 本条是对企业所得税法第六条第（五）项中的“利息收⼊”作的细化说明。企业所得税法只将“利息收⼊”作为收⼊的⼀种形式，但并未具体解释何为利息收⼊，利息收⼊到底包括那些种类？这就是本条所要回答的问题。 原内资税条例实施细则第七条第三款规定：“条例第五条第（三）项所称利息收⼊，是指纳税⼈购买各种债券等 有价证券的利息、外单位⽋款付给的利息以及其他利息收⼊。”本条对上述规定进⾏了修改完善，将利息收⼊定义 是指企业将资⾦提供他⼈使⽤但不构成权益性投资，或者因他⼈占⽤本企业资⾦取得的收⼊，包括存款利息、贷款利息、债券利息、⽋款利息等收⼊，这样概括更为全⾯、具体。 ⼀、“利息”的内涵和外延 利息收⼊通常理解为企业为他⼈提供贷款⽽按照约定利率获得的报酬，即贷款资⾦的价格。此外，实践中还可能存在其他形式的、实际效果等同于资⾦借贷的⾏为。因此本条有必要对“利息”的定义作出从宽解释，尽量覆盖所有的同类情况。 本条规定的利息主要包括两种类型： （⼀）企业将资⾦提供他⼈使⽤但不构成权益性投资。企业将资⾦提供他⼈使⽤，可能是借贷⾏为，也可能是股权投资⾏为。股权投资即权益性投资是企业为取得对另⼀企业净资产的所有权⽽进⾏的投资，通常是股权投资。⽽利息则是债权投资取得的收益，即按照固定期限、固定利率实现的投资回报。利息根据法律规定或者合同约定，可以分期（每⽉或每年）交付或者在收回本⾦时以及其他时间⼀次性交付。 （⼆）因企业的资⾦被他⼈占⽤⽽从他⼈取得的收⼊。实践中，⼀些企业不采取借贷形式，但因为其他原因占⽤了其他企业的资⾦，因⽽产⽣等同借贷⾏为的法律后果，即该企业应当按照法律规定或者双⽅约定的利率向提供资 ⾦的企业⽀付相当于利息的报酬。⽽这部分报酬也应属于企业所得税法第六条第（五）项所称的利息收⼊，应当依照规定缴纳企业所得税。 本条还具体列举了⼏种利息收⼊的形式，包括存款利息、贷款利息、债券利息、⽋款利息等。存款利息是企业将 ⾃有资⾦存⼊银⾏，从⽽由银⾏向其定期⽀付的利息收⼊。贷款利息是企业将⾃有资⾦借贷给他⼈使⽤，由他⼈按约定利率和期限⽀付的利息收⼊。存款利息和贷款利息的区别在于借款⼈即资⾦使⽤⼈不同，前者是银⾏等办理吸收存款业务的⾦融机构，后者是有资⾦需求的其他企业或者个⼈。债券利息是指企业购买政府债券、⾦融机构或其他企业的债券，由这些债券发⾏主体按规定或约定期限⽀付的利息收⼊。⽋款利息是其他企业或个⼈不能按期履⾏对该企业⽀付款项的义务，⽽使得本来应该属于该企业的资⾦在⼀段时间内仍属于有⽀付款项义务的企业或个⼈所有。 ⼆、利息收⼊的确认 会计准则规定，企业的利息收⼊同时满⾜下列条件的，应当确认收⼊：⼀是相关的经济利益能够流⼊企业；⼆是收⼊的⾦额能够合理地计量。 ⼀般⽽⾔，企业利息收⼊⾦额，应当按照有关借款合同或协议约定的⾦额确定。对于企业持有到期的长期债券或发放长期贷款取得的利息收⼊，可按照实际利率法确认收⼊的实现。关于持有⾄到期投资（主要是债权性投资）、贷款等的利息收⼊或某些⾦融负债
