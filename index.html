投资收益”实现。在A公司合并报表层⾯，对于处置C公司股权的事项（简化处理，假设对价为零）的处理原则为：个人理解，供参考。","cat":"合并报表","kw":"合并,固定资产,未实现内部交易损益在处置⼦公司股权时的处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY0481","q":"会计利润所得税费⽤调整（股权转让）","a":"遇到这种情况，最合理的处理是：在该⾹港⼦公司作出处置股权的决定时，在合并报表层⾯即应就该项股权转让可能被要求缴纳的所得税，确认递延所得税负债并借记“所得税费⽤——递延所得税费⽤”。后续实际发⽣扣缴义务 时，转回该项递延所得税负债，并就当期扣缴义务确认“所得税费⽤——当期所得税费⽤”和应交税费。 在编制附注中的会计利润到所得税费⽤调节表时，应在处置决定作出当期，将该部分所得税额填⼊该调节表的“其他”项⽬中（现有的各列举项⽬均不恰当），并在附注中予以注释说明。个人理解，供参考。","cat":"合并报表","kw":"合并,所得税,递延,会计利润所得税费⽤调整,股权转让","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY1126","q":"陈版：PPP项⽬发包给集团内其他公司实施，如何处理？","a":"B公司的处理⽅式就是PPP模式下“⾦融资产+⽆形资产”的混合模式，由于施⼯和设备分别分包给集团内C、D公司，故B公司⼤概率是代理⼈，应采⽤净额法。C公司就是常规的建造合同会计处理。 A集团合并报表层⾯的处理⽐较特殊，不适⽤⼀般情况下的集团内部交易抵销处理⽅式，⽽应在合并报表中保留C、D的施⼯和设备销售收⼊、成本。参⻅： http://kjs.mof.gov.cn/zt/kjzzss/ … 0210810_3744025.htm。 提问⼈：ldm520 时间：2025-03-01 11:27:25 陈版 您好！感谢您百忙之中的回复。对于上述问题，C、D公司的交易价格显示公允的情况下，不抵消是否不合理呢？如果要抵消不合理部分的⽑利，在没有同类施⼯业务及同类设备销售情况下，如何确定合理⽑利率？ 回答⼈：chenyiwei 如果C、D之间的交易价格显失公允，则双⽅都应在各⾃个别报表中体现权益易，合并报表中将权益易的部分抵销，正常的公允价格交易部分保留在合并报表中。个人理解，供参考。","cat":"收入准则","kw":"合并,PPP项⽬发包给集团内其他公司实施,如何处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY1890","q":"⼤型设备的研发样机处理","a":"⾸先要排除属于“基于客户合同的定制化研发”的情形，确认其属于“企业内部研究开发项⽬”（⻅：《监管规则适⽤指引——会计类第2号》之“2-8 定制化产品相关研发⽀出的会计处理”）。在此前提下： 如主帖引⽤的财政部会计司发布的实施问答所述，在形成可对外销售的样品、样机时，根据《企业会计准则解释第15号》规定可计⼊存货成本的研发⽀出仅限于已资本化的开发⽀出，不可以将前期已费⽤化的研发⽀出重新资本化确认为存货。因此，如果前期项⽬⽴项时就可以合理估计有较⼤⽐例的研发⽀出最终会形成对外销售的样机的成本，则前期将研发⽀出全部予以费⽤化处理是⼀项前期差错，应予以更正。 但主帖中所说的发⽣样机开发⽀出时直接计⼊存货，也是不合理的，应通过“开发⽀出——资本化⽀出”科⽬过渡，到样机开发完成通过验收或鉴定，且找到意向客户可对外销售时，再转为存货。可结转存货的成本按照《监管规则适⽤指引——会计类第3号》之“3-11 固定资产达到预定可使⽤状态前试运⾏产品的会计处理”所述原则确定。个人理解，供参考。","cat":"收入准则","kw":"固定资产,资本化,求助陈版,⼤型设备的研发样机处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0710","q":"是否属于同⼀控制下企业合并？","a":"因为交易双⽅原先⾪属不同的国资委，交易不属于⽆偿划转，且交易具有商业实质，按公允价值成交，故可以认为对C⽽⾔，该交易构成⾮同⼀控制下合并。个人理解，供参考。","cat":"企业合并","kw":"公允价值,合并,是否属于同⼀控制下企业合并","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0665","q":"e融单融资业务的账务处理","a":"站在母公司合并报表⾓度：该事项应作为⼀项融资处理，母公司取得的款项相当于借款本⾦，母公司后续承担的利息作为利息⽀出（需按实际利率法调整）。后续⼦公司的到期付款作为还本付息。 站在母公司个别报表⾓度：应站在母公司个别报表⾓度考虑该项应收账款转让是否满⾜终⽌确认条件。如果不能满 ⾜终⽌确认条件的，则母公司个别报表层⾯的处理与上⽂合并报表层⾯的处理原则类似；如果满⾜终⽌确认条件的，则将收到款项与应收票据原账⾯价值之间的差额确认为投资收益（⾦融资产终⽌确认损益）。个人理解，供参考。","cat":"合并报表","kw":"合并,求助陈版主,e融单融资业务的账务处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY1648","q":"⺟公司处置唯⼀⼦公司，次年半年报披露⽤单体报表还是合并报表","a":"2025年半年报的报告期内，该公司⽆⼦公司，⽆需编制合并报表，所以本期发⽣额和期末数都只有个别报表。 对于前期⽐较数据，对于资产负债表，因⽐较时点为上年末，此时点上⽆合并报表，所以资产负债表的期初⽐较数据只有单体报表；但利润表⽐较期间（2024年上半年）是有⼦公司的，因此对于利润表的⽐较数据建议包含两列，即上年同期的⺟公司报表数和上年同期合并报表数。即，2025年半年报中的利润表共有三列，从左⾄右依次为：本期数；上年同期数（⺟公司）、上年同期数（合并）。个人理解，供参考。","cat":"合并报表","kw":"合并,陈版主,⺟公司处置唯⼀⼦公司,次年半年报披露⽤单体报表还是合并报表","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY1412","q":"总额法净额法使⽤判断","a":"就主帖案例来看，应将经销商认定为代理⼈，本企业为主要责任⼈，⽽不是相反。经销商的主要职责是获客和维护客户关系，但向客户交付商品并完成安装的责任均由本企业最终承担且⽆法 对外转嫁。除⾮经销商在尚⽆客户的情况下即向本公司下订单购⼊商品且⽀付全款，否则经销商只是本企业销售职能的外包，本企业才是主要责任⼈。 由此产⽣的问题是：只有在最终⽤户签收并安装完毕后，本企业才能确认收⼊；确认收⼊的⾦额应为最终客户⽀付的全部价款；以安装费等形式归属于经销商的收益应确认为本企业的销售费 ⽤。 提问⼈：shichengqi 时间：2025-06-03 10:59:54 谢谢陈版主，尽管公司与终端⽤户签订合同约定由公司负责安装，但实际业务过程中，由于该客户系经销商推荐，实际安装职能也由经销商负责，另公司也与相应经销商签署了安装合同。是否可说明，从合同形式上也转嫁了该安装责任。相应公司只需要确认产品成本及对应的销售价格（批发额）？ 回答⼈：chenyiwei 也可以这样处理。个人理解，供参考。","cat":"收入准则","kw":"总额法净额法使⽤判断","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY1414","q":"向合并内境外孙公司销售货物形成的关税运费在合并层⾯处理","a":"⼀般情况下，仅仅是存货在不同地点之间的位移，不会增加未来经济利益流⼊的潜⼒，因此相关运费、关税等应予以费⽤化处理。 在主帖案例中，如果这些运费、关税等是由美国⼦公司承担的，则在美国⼦公司的个别报表中可以确认为存货成本的⼀部分，但在A公司的合并报表层⾯应重新费⽤化。提问⼈：chenria 时间：2025-06-10 10:13:25 陈版主，个⼈理解合并层⾯，由于最终客户在境外，关税运费是为了销售给境外客户的必要⽀出且与合同直接相关，即没有签订境外客户销售合同并履约就不会发⽣这些费⽤； 那么是否应该属于合同履约成本仍在营业成本列示；两种处理的区别是否应当理解为境外公司单体做“营业成本-存货成本”；合并做“营业成本-合同履约成本” 回答⼈：chenyiwei 如果在合并层⾯，可以确定境外客户的订单与将货物发送到境外有直接对应关系，且商品控制权的转移发⽣在境外，则可以将从境内到境外交货地点的运费作为合同履约成本处理。你的理解基本合理。个人理解，供参考。","cat":"收入准则","kw":"控制权,合并,向合并内境外孙公司销售货物形成的关税运费在合并层⾯处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY1076","q":"⺟⼦均不控制孙的情况下，直接加间接持股控制如何编制合并报表","a":"在主帖案例中，A的合并报表层⾯，假设不考虑内部交易损益抵销、⾮同⼀控制下企业合并调整等复杂情况，则合并报表中的少数股东权益为以下两项之和：个人理解，供参考。","cat":"企业合并","kw":"合并,少数股东,⺟⼦均不控制孙的情况下,直接加间接持股控制如何编制合并报表","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0233","q":"母公司确认的长期股权投资减值损失对应的递延所得税资产在合并层⾯的披露 项⽬","a":"⾸先，并不是简单地必然保留或者抵销母公司个别报表层⾯长期股权投资（⼦公司）减值准备对应的递延所得税资产，⽽是要看母公司层⾯上的长期股权投资减值准备和⼦公司个别报表层⾯对单项可辨认⾮流动资产计提的减值准备在多⼤程度上是重合的。因此在合并层⾯需重新计算可保留的递延所得税资产余额。 对于保留递延所得税资产的情形，实质上是⼀项未来的税款抵减，类似于可抵扣亏损，故可以填列的明细是“可抵扣亏损或其他税款抵减”，确认依据是《企业会计准则第18号——所得税》第⼗五条。个人理解，供参考。","cat":"合并报表","kw":"减值,合并,所得税,递延,母公司确认的长期股权投资减值损失对应的递延所得税资产在合并层⾯的披露","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表、《企业会计准则第18号——所得税》"},{"id":"CY1831","q":"地⽅平台公司之间资产划拨划⼊⽅如何进⾏会计处理？","a":"按照企业会计准则规定，如果被划转资产构成业务的，则对于划⼊⽅⽽⾔应构成同⼀控制下回报，划⼊⽅应按这些资产在最终控制⽅合并报表层⾯的账⾯价值作为⼊账价值；其他情况，应作为接受股东资本性投⼊的资产，按公允价值（评估值）⼊账。但在实务中，除了作为出资，《公司法》明确要求评估以外，其他⽆偿划转可以不进⾏评估，故此时也可以接受划⼊⽅按这些资产在划出⽅的原账⾯价值⼊账的处理。 作为出资的⾮货币资产，⽆论是否构成业务，都应进⾏评估，但会计上不⼀定按评估值⼊账。个人理解，供参考。","cat":"合并报表","kw":"公允价值,合并,地⽅平台公司之间资产划拨划⼊⽅如何进⾏会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY1560","q":"关于公司成本与收⼊该如何确认问题","a":"⾸先要明确讨论前提：本企业属于主要责任⼈，收⼊确认采⽤总额法（请注意核实：因为明确为特定单个⼯程项⽬提供原材料，实务中更可能是净额法确认收⼊），且商品控制权转移时点是在将原材料按客户要求交付给⼯程项⽬时，⽽不是⼯程项⽬完⼯时。 在此前提下，每期采购的原材料可以确认为存货（库存商品），收⼊在将原材料按客户要求交付给⼯程时确认。收⼊计量遵循可变对价原则，即基于收⼊确认时点可获得的信息，按照最可能发⽣⾦额法或者期望值法作出最佳估计，并且确保遵循“极可能不会发⽣重⼤转回”的限制条件，后续直到结算前，定期进⾏复核调整。 但对于该类业务模式，需要关注：1、是否仅根据客户需求采购和交付材料，如是则应采⽤净额法的可能性更⼤；2、关注客户接受原材料的时点是否为交付时，例如能否合理估计⼯程对该原材料的需求量，是否有较⼤可能性在完⼯后对不需⽤的原材料予以退回等，如是则退货可能性能否合理估计，如是则收⼊确认时点可能要递延到⼯程完⼯，最终消耗量确定时。个人理解，供参考。","cat":"收入准则","kw":"控制权,递延,求助陈版主,关于公司成本与收⼊该如何确认问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY1624","q":"关于⼀揽⼦交易的会计处理","a":"仪器和试剂的销售在⼀个合同中约定，属于⼀揽⼦交易，但属于两项履约义务（尤其是在试剂和设备并⽆明确的⼀对⼀配套关系的情况下，即该种试剂只能⽤于该种设备，反过来该种设备只能使⽤该种试剂）。 需要了解：合同中是否约定了客户需达到的最低试剂采购量（在该采购量下，试剂的⽑利⾜以补偿低价销售设备的损失，整体上获得合理的收益），若客户未达到该最低采购量则额外收取设备使⽤费、收回设备或者要求客户承担其他违约责任？如果出现了此类情况，则本企业实际执⾏该违约责任条款并据此获得补偿或者收回设备的可能性有多⼤？ 如果能够合理保证合同条款的执⾏，则需根据收⼊准则关于可变对价的原则合理估计合同总价，再将合同总价合理分摊到该项履约义务，以保证两项履约义务均可获得合理额利润，分别在交付设备和试剂时确认两者的销售收⼊，按实际成本结转营业成本。 参考：《中审众环研究2020》之“问题4-2-5（医药企业在“买试剂送仪器”销售模式下免费提供给医院的仪器的核算）”。个人理解，供参考。","cat":"收入准则","kw":"履约义务,请教陈版主关于⼀揽⼦交易的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0966","q":"商誉确认问题","a":"商誉基本等于整体股权估值（收益法评估值）⼤于可辨认净资产公允价值（成本法评估值）的差额。如不考虑递延 所得税影响，就是你计算的400。个人理解，供参考。","cat":"企业合并","kw":"公允价值,商誉,所得税,递延,成本法,商誉确认问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0262","q":"少数股东与控股⼦公司的内部交易","a":"不能推导出“少数股东与⼦公司之间的交易也属于未实现内部损益，在抵消范围”。 合并报表中母⼦公司之间交易和往来的抵销，是因为两者同属于⼀个会计主体；投资⽅与合营、联营企业之间的未实现交易损益（顺流或逆流）之所以要按⽐例抵销，是因为将在合营、联营企业中所享有的权益也视为本会计主体的⼀部分，所以本质上还是集团内部交易抵销的延伸。 ⽽⼦公司与少数股东之间的交易，少数股东并不属于本会计主体，因此并不是本会计主体内部的交易，也就不需要进⾏合并抵销处理了。个人理解，供参考。","cat":"合并报表","kw":"合并,少数股东,少数股东与控股⼦公司的内部交易","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY0809","q":"⼦公司之间吸收合并情况下，母公司对长期股权投资的处理","a":"“⼀家全资⼦公司A公司对另⼀家控股⼦公司B公司进⾏吸收合并”：这种情况是否涉及少数股权“上翻”的问题，即原先B的少数股东成为A的股东？ ⼀般理解，母公司个别报表层⾯可直接将其对B的长期股权投资的原账⾯价值并⼊对A的长期股权投资，不确认损益或其他综合收益、资本公积。即：借：长期股权投资——A，贷：长期股权投资——B。 如果享有B公司的净资产份额低于投资成本，则考虑是否需计提减值，将计提减值准备（如需）后的对B公司长投账⾯价值并⼊对A公司的长投。个人理解，供参考。","cat":"合并报表","kw":"减值,合并,少数股东,⼦公司之间吸收合并情况下,母公司对长期股权投资的处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY0173","q":"现有商誉，少数股东权益要含商誉吗","a":"少数股东权益在初始计量时是不含少数股权对应的商誉的，仅包含少数股东所享有的可辨认净资产的相应份额。但在后续如发⽣了在不丧失控制权前提下部分处置⼦公司股权的交易，则可能导致调整后的少数股权期末余额中包含其所变动的股权⽐例对应的商誉⾦额。具体请参阅《监管规则适⽤指引——会计类第1号》之“1-11 不丧失控制权情况下处置⼦公司部分股权计算⼦公司净资产份额时如何考虑商誉”。但要注意：这只是合并报表中少数股东权益和 资本公积的⼀增⼀减。对合并报表中“商誉”这项资产的计量是不影响的。个人理解，供参考。","cat":"收入准则","kw":"控制权,商誉,合并,少数股东,现有商誉,少数股东权益要含商誉吗","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0178","q":"先有商誉，再有少数股东，最后商誉减值，求问商誉减值要计少数股东损益吗","a":"上交所的案例解析和《监管规则适⽤指引——会计类第2号》之2-13并不⽭盾。前者针对的是“不丧失控制权前提下部分处置⼦公司股权”后的商誉减值损失分配；后者针对的是购买少数股权后的商誉减值损失分配。其关键的区分 点在于少数股东权益中是否包含了商誉⾦额。如包含商誉⾦额的，则商誉减值损失需分配给少数股东损益；不含商誉⾦额的，则商誉减值损失全部归属于母公司股东。 上段中所指的商誉减值损失，是指⾸先根据包含完全商誉的资产组账⾯价值与可收回⾦额相⽐较，确定整体的商誉减值⾦额后，乘以最初购买⽇的母公司持股⽐例所得出的商誉减值⾦额，即已经排除了归属于购买⽇的少数股权⽐例的部分。个人理解，供参考。","cat":"收入准则","kw":"控制权,商誉,减值,少数股东,先有商誉,再有少数股东,最后商誉减值,求问商誉减值要计少数股东损益吗","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY1453","q":"⾮同控合并中因双⽅会计估计差异导致往来不⼀致抵消的问题","a":"因为是⾮同⼀控制下的股权收购，且收购对象是房地产项⽬公司，不构成业务，故不属于企业合并。建议按以下原则处理：个人理解，供参考。","cat":"企业合并","kw":"合并,【请教陈版】⾮同控合并中因双⽅会计估计差异导致往来不⼀致抵消的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY1667","q":"⺟公司C个别报表层⾯的账务处理不会因A、B是否为其全资⼦公司⽽发⽣变化。但在合并报表层⾯，可能会因为涉及与上述规定之间的权益性交易，⽽结果有所不同。提问⼈：ZLY326 时间：2025-09-02 100323","a":"B应在该项权益性交易发⽣时点，将债务豁免⾦额（80LC）转⼊资本公积（明细科⽬是资本溢价，不是其他资本公积）。但并不需要编制将以前年度累积的汇兑损失转⼊资本公积的分录。前期的汇兑损益并不是权益性交易的组成部分。 问题2、3中的处理基本合理。 如果⺟公司C对B⾮100%控股，则各⾃单独财务报表中的处理与此前C对B100%持股的情况相同，但在C的合并报表中需要体现出向少数股东让渡部分利益的权益性交易影响，即少数股东权益的增加，对应减少资本公积。个人理解，供参考。","cat":"合并报表","kw":"合并,少数股东,⺟公司C个别报表层⾯的账务处理不会因A,B是否为其全资⼦公司⽽发⽣变化,但在合并报表层⾯,可能会因为涉及与上述规定之间的权益性交易,⽽结果有所不同,提问⼈,ZLY326,2025-09-02,100323","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY0579","q":"⽐例法合并时股利的抵消逻辑","a":"⾸先要强调的是：⽐例合并法并不是中国企业会计准则下允许采⽤的⽅法。 如果单纯从技术探讨⾓度说，⽐例合并法应当是将合营企业的所有资产、负债和损益项⽬都先乘以合并⽐例，再与合营⽅报表中的对应项⽬抵销。在本案例中，B公司的100万元应付股利，乘以50%后是50万元，其中对A、C各25 万元。对A公司的应付股利25万元可以与A公司层⾯的应收股利中的对应⾦额抵销。所以合并结果是：A公司应收 股利——B公司25万元；B公司应付股利——C公司25万元。个人理解，供参考。","cat":"合并报表","kw":"合并,求助陈版主,⽐例法合并时股利的抵消逻辑","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY0187","q":"联营公司同业竞争问题","a":"同业竞争⼀般是指同⼀控制下的主体之间，⼀般不会涉及联营企业。但就主帖信息来看，更需要关注的是A是否实际控制C（虽然名义上的股权⽐例是49%，但C是结构化主体，对控制权问题有特殊的考虑）。个人理解，供参考。","cat":"收入准则","kw":"控制权,联营公司同业竞争问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0194","q":"集团内部 ⼦公司购买另⼀个⼦公司股权并增资此⼦公司（求助陈⽼师）","a":"“丙公司先出资从⼄投资⽅收购A公司20%股权，同时再增资A公司1000万”：需注意了解：这两步交易是否为⼀揽 ⼦交易？交易完成后丙公司是否取得对A公司的控制权？⼄投资⽅是否也属于同⼀集团内的下属企业？即，是否认定为同⼀控制下合并+收购少数股权？还是单纯的同⼀控制下合并？或者其他？ 上述这些问题的不同答案将导致不同的处理，所以建议先把事实背景表述清楚。个人理解，供参考。","cat":"收入准则","kw":"控制权,合并,集团内部,⼦公司购买另⼀个⼦公司股权并增资此⼦公司,求助陈⽼师","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0593","q":"长投确认递延的疑问。","a":"这种交易属于分步实现的企业合并（有可能是同⼀控制下合并，也可能是⾮同⼀控制下合并）。区分不同情况分析如下：个人理解，供参考。","cat":"企业合并","kw":"合并,递延,求助陈版主,长投确认递延的疑问","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0997","q":"超额亏损⼦公司合并处理","a":"赞同主帖中的理解：在编制合并报表时模拟调整权益法，按照母公司所有者与少数股东对⼦公司的分配⽐例，分别计⼊“归属于母公司所有者的净利润”和“少数股东损益”，不受⽇常权益法核算中将长期股权投资冲减⾄零为限的限制。 合并报表和权益法核算在不少地⽅的视⾓还是有差异的，直接基于模拟权益法的抵销结果有时并不符合合并报表准则对合并结果的要求，并且模拟权益法之后还要抵销，操作上更⿇烦。所以个⼈还是推荐直接基于成本法的核算结果进⾏抵销处理，不模拟权益法。个人理解，供参考。","cat":"合并报表","kw":"合并,少数股东,权益法,成本法,超额亏损⼦公司合并处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY0264","q":"母公司与⼦公司权益性交易","a":"⾸先要指出：该笔交易不应减少A⾃⾝报表中的资本公积。在A的个别报表中，应将该笔债权计提坏账准备后的账 ⾯价值（7000万美元）转⼊对B的长期股权投资成本。 在合并报表中，应关注为何⽆偿赠与少数股东部分权益，其背后有⽆特殊的背景或考虑，是否符合商业逻辑。如⽆特殊考虑因素，则该事项在A公司的合并报表中将体现为资本公积和少数股东权益的⼀增⼀减（但权益总额不 变），即把A让渡给少数股东的部分权益增加合并报表中的少数股东权益，相应减少资本公积。个人理解，供参考。","cat":"合并报表","kw":"合并,少数股东,母公司与⼦公司权益性交易","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY0203","q":"求助，某地⽅国资委下⼦公司股权划转后的合并报告","a":"这类同⼀控制下的股权划转，⼯商变更不是判断合并⽇的主要考虑因素，关键是实际完成资产、业务和管理权限的交割。在“国资出⽂以后A集团的董事会成员和⾼管都到B公司任职，同时兼任A集团的原本职务”的背景下，2023 年内已取得控制权是⼤概率事件，故应在2023年度合并报表中按同⼀控制下合并处理。个人理解，供参考。","cat":"收入准则","kw":"控制权,合并,某地⽅国资委下⼦公司股权划转后的合并报告","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0207","q":"是。⼤股东在其个别报表层⾯应当确认⼀项⾦融负债，相当于签出⼀项看跌期权。在⼤股东的合并报表层⾯， 需就⼦公司接受的该项投资确认⼀项回购⾃⾝权益⼯具的合同义务。（《监管规则适⽤指引——会计类第3号》","a":"权益⼯具投资+⼀项看跌期权。因为交易对⼿⽅不同。个人理解，供参考。","cat":"收入准则","kw":"合并,⼤股东在其个别报表层⾯应当确认⼀项⾦融负债,相当于签出⼀项看跌期权,在⼤股东的合并报表层⾯,需就⼦公司接受的该项投资确认⼀项回购⾃⾝权益⼯具的合同义务,《监管规则适⽤指引——会计类第3号》","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY1365","q":"或有对价为权益⼯具的情况，⽬前看只有理论上的可能性，在国内⽬前的实务中，即使是以购买⽅⾃身权益⼯具结算的或有对价，⼀般也不是权益⼯具。因此类似案例⼏乎没有。提问⼈：soibook 时间：2025-05-22 094433","a":"⼀般理解是按1000减少合并对价，以及根据具体情况调整购买⽇可辨认净资产公允价值（如需要），差额调整商誉。个人理解，供参考。","cat":"企业合并","kw":"公允价值,商誉,合并,或有对价为权益⼯具的情况,⽬前看只有理论上的可能性,在国内⽬前的实务中,即使是以购买⽅⾃身权益⼯具结算的或有对价,⼀般也不是权益⼯具,因此类似案例⼏乎没有,提问⼈,soibook,2025-05-22,094433","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY1552","q":"购买信托资⾦的会计处理","a":"如果该信托设⽴的⽬的是为了B公司⾃身的融资需要，则B应将该信托纳⼊其合并报表范围，相应地在B的个别报表中，B认购信托份额应确认为其他⾮流动资产，按成本法进⾏核算。 如果该信托的设⽴⽬的是为了⺟公司A或者其他⼦公司的融资需要，B公司⾃身不能直接从该融资中获益，仅仅是出资认购信托保障基⾦，则B持有的信托份额应确认为⼀项以公允价值计量且其变动计⼊损益的⾦融资产，列报为其他⾮流动资产。收到信托收益时冲减该项⾦融资产，期末确认公允价值变动损益。个人理解，供参考。","cat":"合并报表","kw":"公允价值,合并,成本法,购买信托资⾦的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY1239","q":"收购联营企业持有的控股公司的少数股东股份抵消问题","a":"参照向联营企业收购其⼦公司构成⾮同⼀控制下合并的会计处理，此类情况下当⻓期股权投资准则和合并报表准则发⽣⽭盾时，应优先遵循合并报表准则的规定。 参照上述原则，当被收购的少数股权的原股东是⺟公司的联营企业时，对联营企业就该交易确认的投资收益不做抵销处理，仍按⽐例确认为本企业对该联营企业的投资收益，以保证收购少数股权的对价⾦额的完整性。⽀付给该少数股东（联营企业）的收购对价与对应的少数股东权益账⾯价值之间的差额调整合并报表层⾯的权益。个人理解，供参考。","cat":"合并报表","kw":"合并,少数股东,请教陈版,收购联营企业持有的控股公司的少数股东股份抵消问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY0208","q":"合同资产和合同负债问题","a":"该款项的收取依据是与客户（产废单位）签订的处理合同，约定向其提供处理服务，故符合“合同负债”的定义和确认条件，应确认合同负债。 提问⼈：shiyongfu 时间：2024-04-08 10:09:13 谢谢陈⽼师，还有⼀个问题，就是现在审计⼈员认为我尚未处理的部分系提前开票，准备冲回合同负债和合同资产冲回，我们认为我们已经有了收款权⼒，冲回是否合理 回答⼈：chenyiwei 如果接收废物后，不论产废单位是否付费，本企业均有义务对其进⾏处理，则同时确认应收款项和合同负债是合理的。个人理解，供参考。","cat":"收入准则","kw":"合同资产和合同负债问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0217","q":"【贸易业务净额法】收⼊确认时点","a":"因为是按净额法核算，故表明其性质相当于国外供应商与国内下游客户之间直接交易，本企业在其中起到居间之作 ⽤，因此建议在下游客户取得商品控制权时视为本企业提供服务完成，可据此确认收⼊。因此应在获得下游客户接受商品的证据后确认收⼊。个人理解，供参考。","cat":"收入准则","kw":"控制权,【贸易业务净额法】收⼊确认时点","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0724","q":"可以这样理解。因为分摊减值损失后资产的账⾯价值不能低于“三者孰⾼”，因此不再对该类资产分摊减值损失。该资产组的减值损失超出商誉账⾯价值的部分由资产组内其他资产按⽐例分担。","a":"个别报表层⾯的长投减值和合并报表层⾯的资产组减值是并⾏的，需同时考虑，并不⽭盾，并不是只能取其⼀。个人理解，供参考。","cat":"企业合并","kw":"商誉,减值,合并,可以这样理解,因为分摊减值损失后资产的账⾯价值不能低于“三者孰⾼”,因此不再对该类资产分摊减值损失,该资产组的减值损失超出商誉账⾯价值的部分由资产组内其他资产按⽐例分担","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY1096","q":"向⼦公司出售资产，都是通过处置⼦公司实现最终销售，未实现损益的递延税率如何选择？","a":"基本赞同主帖中的理解。这种内部交易损益的实现⽅式有特殊性，是通过⺟公司处置⼦公司股权的⽅式实现的，⽽不是通过⼦公司对外销售或耗⽤的⽅式实现。因此，计量内部交易损益相关递延所得税资产的适⽤税率应为⺟公司的适⽤税率。 在合并报表层⾯，⼦公司的光伏电站项⽬本质上就是⼀项存货，⽽不是固定资产。 另外，⺟公司合并报表层⾯能否就处置该⼦公司确认营业收⼊（⽽不是投资收益），请参阅《上市公司执⾏企业会计准则案例解析2024》之案例6-31。个人理解，供参考。","cat":"合并报表","kw":"合并,所得税,递延,固定资产,向⼦公司出售资产,都是通过处置⼦公司实现最终销售,未实现损益的递延税率如何选择","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY1121","q":"处置⼦公司合并报表转回累计亏损确认投资收益","a":"理论上，应在作出处置⼦公司的决定时，就该⼦公司的累计亏损导致合并报表层⾯的可抵扣暂时性差异确认递延所得税资产，到实际完成处置时转回。因此处置时理论上不会有会计利润和所得税费⽤之间的调节项⽬。 如果作出处置决定到完成处置均在同⼀年内，不涉及递延所得税资产的确认问题，则在调节表中将其影响列⼊“本期利⽤前期未确认递延所得税资产的可抵扣亏损的影响”（以前年度亏损转回） 和“本期未确认递延所得税资产的可抵扣暂时性差异”（本期影响）中。个人理解，供参考。","cat":"合并报表","kw":"合并,所得税,递延,求助陈版主,处置⼦公司合并报表转回累计亏损确认投资收益","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY0220","q":"委托运营费收⼊","a":"根据《企业会计准则第14号——收⼊（2017年修订）》第五条规定，“企业因向客户转让商品⽽有权取得的对价很可能收回”是表明与客户之间的合同成⽴，可据此确认收⼊的基本前提之⼀。如果依据现有证据判断该条不再满 ⾜，则后续不再按原合同确认收⼊，已确认的收⼊对应的应收款项应谨慎进⾏减值测试和计提坏账准备。 根据新收⼊准则第六条规定，后续只有针对已提供的服务且已收到的价款才能确认收⼊。直到经评估后认为上述“很可能收回”的条件重新满⾜。个人理解，供参考。","cat":"收入准则","kw":"减值,委托运营费收⼊","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入、《企业会计准则第14号——收⼊（2017年修订）》"},{"id":"CY0230","q":"丧失控制权","a":"将未实现损益继续挂在存货（借：年初未分配利润 贷：存货）。 22年监管报告对此表述不严谨。《监管规则适⽤指引——会计类第4号》之“4-5 权益法下顺流交易产⽣的未实现内部交易损益以处置或视同处置股权⽅式实现时的会计处理”中已明确“视同原未实现内部交易损益已经全部实现，计 ⼊投资收益”的做法仅针对顺流交易未实现损益。个人理解，供参考。","cat":"收入准则","kw":"控制权,权益法,丧失控制权","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0977","q":"关于反向购买后合并报表股本⾦额列⽰","a":"是。实务中是认可“与法律上母公司的股本保持⼀致”这个做法的，其优点是便于理解。个人理解，供参考。","cat":"企业合并","kw":"合并,关于反向购买后合并报表股本⾦额列⽰","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY1517","q":"求助，合并报表处置⼦公司确认的处置损益","a":"在视⻆（1）中：A从成⽴B到处置B，单体及合并层⾯总共获得的现⾦收益是持有期间收到B的分红2亿+处置价款5亿=7亿。但该⾦额实际应为5亿元，因为站在合并报表⻆度，分红的2亿元是被抵销的内部交易，并未因此导致合并报表层⾯的资产、负债发⽣变化。所以合并层⾯的损益还是5亿元。 从个别报表层⾯算：⾃成⽴⾄处置的累计收益=分红2亿元+处置损益5亿元=7亿元，与合并报表层⾯处置损益1亿元的差异就是分红2亿元+合并报表层⾯留存收益4亿元。个人理解，供参考。","cat":"合并报表","kw":"合并,合并报表处置⼦公司确认的处置损益","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY0131","q":"合并抵消时出现税差的情况","a":"情况1：如果截⾄资产负债表⽇，内部卖⽅已经向内部买⽅就该项预结算款项开出发票，则该税差在合并报表中按照正常的可抵扣进项税额处理，冲减应交税费；如果尚未开出发票，则内部卖⽅列⼊“其他流动负债——待转销项税额”，内部买⽅列⼊“其他流动资产——待取得抵扣凭证的增值税进项税额”。 情况2、⾸先要核对差异原因，考虑双⽅或⼀⽅是否需进⾏差错更正；其次在不存在差错的情况下，还应根据该差额产⽣的具体情况分析，才能确定如何进⾏抵销处理。个人理解，供参考。","cat":"合并报表","kw":"合并,合并抵消时出现税差的情况","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY1836","q":"同⼀控制下⼦公司之间股权交易","a":"此类情况不能仅仅以“交易价格经过评估”为由即认可其公允，还应考虑以下问题：个人理解，供参考。","cat":"实务综合","kw":"同⼀控制下⼦公司之间股权交易","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0861","q":"及各位⽼师，关于⾮同⼀控制下企业合并中少数股东持有的卖出 期权","a":"购买⽇的合并抵销，⼀般可以这样处理。个人理解，供参考。","cat":"企业合并","kw":"合并,少数股东,请教陈版主及各位⽼师,关于⾮同⼀控制下企业合并中少数股东持有的卖出","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0667","q":"关于房产上不可分离固定资产是否能⼀并转投资性房地产的问题","a":"如果投资性房地产采⽤成本模式进⾏后续计量的，则这些附属设备应继续按原⽅法作为固定资产核算，不应转为投资性房地产。 如果投资性房地产采⽤公允价值模式进⾏后续计量，且在计量公允价值时包含了这些附属设施的，则这些附属设施应⼀并转⼊投资性房地产核算，否则将导致公允价值和成本的计量⼜径不⼀致。个人理解，供参考。","cat":"投资性房地产","kw":"公允价值,固定资产,关于房产上不可分离固定资产是否能⼀并转投资性房地产的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第3号——投资性房地产"},{"id":"CY1845","q":"海域使⽤权的确认问题","a":"https://bbs.esnai.com/thread-5494779-1-1.html个人理解，供参考。","cat":"实务综合","kw":"海域使⽤权的确认问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1854","q":"追加合并对价","a":"可以这样处理，此时或有对价在购买⽇的初始计量⾦额不是零。建议关注收益法评估中盈利预测的可靠性，并关注为何盈利承诺⾦额⼩于收益法下的盈利预测。该做法不符合通常的商业逻辑。个人理解，供参考。","cat":"实务综合","kw":"合并,追加合并对价","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1866","q":"由于处置股权的主体是持股平台，故在尚未处置时，公司⽆需进⾏会计处理。对于处置价格⾼于原授予价格，差额归公司所有的部分，公司在收到时贷记资本公积即可。提问⼈：⻢歇丫丢 时间：2025-12-15 173540","a":"这种情况下意味着放弃了原先要求的服务期限条件，即加速到期，故按照加速可⾏权处理。个人理解，供参考。","cat":"实务综合","kw":"由于处置股权的主体是持股平台,故在尚未处置时,公司⽆需进⾏会计处理,对于处置价格⾼于原授予价格,差额归公司所有的部分,公司在收到时贷记资本公积即可,提问⼈,⻢歇丫丢,2025-12-15,173540","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1874","q":"云信、电信、建信、商银微芯等⾮票据处理","a":"对于此类供应链债权凭证，贴现或背书转让时，应⾄少同时符合以下条件，才能终⽌确认：个人理解，供参考。","cat":"实务综合","kw":"商银微芯等⾮票据处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1875","q":"不存在《计学精要2021》中指出的贴现或背书转让不能终⽌确认的情形。提问⼈：爬爬呀 时间：2025-12-13 145401","a":"包括但不限于：不恰当地扩⼤“商业交易⻛险”的解释；在收回款项前需连续计算收取保理融资费⽤；以⼀笔应收款项中的⼀部分作为保理标的但要求以全部回款优先回收保理融资本息；“基本收购款+追加收购款”的双层安排；以有效的信⽤保险为前提，在保险赔款范围内提供的融资；等等。详⻅该书原⽂。个人理解，供参考。","cat":"实务综合","kw":"不存在《计学精要2021》中指出的贴现或背书转让不能终⽌确认的情形,提问⼈,爬爬呀,2025-12-13,145401","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0487","q":"母公司代⼦公司⽀付⼚建⼯程及设备款账务处理","a":"由于⼟地使⽤权是以⼦公司名义取得，⼦公司也确实是该⼟地及将建的地⾯上⼚房的实际使⽤者，故应将⼟地使⽤权和在建⼯程确认为⼦公司的资产，母公司按代收代付款项处理，挂对⼦公司的往来；与之相对应，⼦公司在确认在建⼯程的同时，挂对母公司的往来。如果该款项不需要⽀付给母公司的，则⼦公司计⼊资本公积，母公司应将代付款项计⼊对该⼦公司的长期股权投资成本。 因房屋和⼟地都在⼦公司名下，故房产税的纳税⼈是⼦公司。个人理解，供参考。","cat":"长期股权投资","kw":"母公司代⼦公司⽀付⼚建⼯程及设备款账务处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"CY1876","q":"⺟公司吸收合并⼦公司的账务处理","a":"此问题的具体会计处理（⺟公司个别报表层⾯）请参阅《企业会计准则解释第7号》第四条。按照该条规定应为：借：银⾏存款 100，贷：⻓期股权投资 50，贷：盈余公积 30，贷：未分配利润 20。个人理解，供参考。","cat":"实务综合","kw":"合并,⺟公司吸收合并⼦公司的账务处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1881","q":"，政策性搬迁⼟地置换问题","a":"如主帖所述，新地块与原划拨地相⽐，⼟地性质变了、⾯积增加了，因此该项置换可以认为是具有商业实质的。此时应确认被征收的原地块及其地上建筑物和其他资产等的处置损益。新地块的⼊账价值理论上以被收回的旧地块的公允价值为基础确定，如果新地块的公允价值能够更可靠确定的，也可以依据新地块的公允价值。个人理解，供参考。","cat":"实务综合","kw":"公允价值,急急急,政策性搬迁⼟地置换问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1885","q":"在建⼯程暂估⼊账，⾦额如何确认？","a":"暂估⼊账的是截⾄⽬前已完⼯的项⽬。⽬前尚未完⼯的项⽬继续保留在在建⼯程科⽬中。尚未开⼯的项⽬更不应当暂估。个人理解，供参考。","cat":"实务综合","kw":"在建⼯程暂估⼊账,⾦额如何确认","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1886","q":"关于资产负债表⽇后事项的判断","a":"⽅案⼆更合理。 2024年内的和解程序是在2024年1⽉（2023年末资产负债表⽇后）启动的，因此其和解结果的达成不属于为2023年末资产负债表⽇已存在的状态或情况提供新的或进⼀步证据的事项，⽽是资产负债表⽇后出现的全新事项，故2023年度资产负债表中应将和解事项作为⾮调整事项处理。个人理解，供参考。","cat":"实务综合","kw":"求助陈版主,关于资产负债表⽇后事项的判断","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1887","q":"执⾏⼩企业会计准则的企业持有的“三⽆投资”如何核算？","a":"⼩企业会计准则下，对“三⽆”股权投资应作为⻓期股权投资，按成本进⾏后续计量。个人理解，供参考。","cat":"实务综合","kw":"执⾏⼩企业会计准则的企业持有的“三⽆投资”如何核算","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1889","q":"求教陈版主应收票据已背书未到期还原的会计处理","a":"企业通过票据背书（不满⾜终⽌确认应收票据的条件，下同）结算对供应商的应付账款时，由于原应付账款已结算，故应终⽌确认，同时就继续涉⼊产⽣的被追索责任确认其他流动负债。即：借：应付账款，贷：其他流动负债。个人理解，供参考。","cat":"实务综合","kw":"求教陈版主应收票据已背书未到期还原的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"428","cat":"审计准则","n":"中国注册会计师审计准则第1521号——注册会计师对其他信息的责任","d":"其他信息＝年度报告中除财务报表和审计报告以外的财务信息和非财务信息（管理层讨论分析、公司治理报告、社会责任报告等）。\n注册会计师应阅读其他信息，考虑是否存在与财务报表或审计中了解到的情况的重大不一致。\n如识别重大不一致→与管理层讨论；如未更正且重大→在审计报告中增加其他信息段，或考虑解除业务约定。"},{"id":"427","cat":"审计准则","n":"中国注册会计师审计准则第1501号——对财务报表形成审计意见和出具审计报告","d":"审计报告要素：标题、收件人、审计意见段、形成审计意见的基础、管理层和治理层的责任、注册会计师的责任、签字盖章、报告日期。\n\n第十六条 审计意见类型：\n（一）无保留意见：报表公允反映，无重大错报；\n（二）保留意见：错报重大但不广泛，或无法获取充分适当证据但可能的错报重大而不广泛；\n（三）否定意见：错报重大且广泛（报表整体不可接受）；\n（四）无法表示意见：无法获取充分适当证据且可能的错报重大而广泛。\n\n强调事项段：提醒使用者关注已在报表中列报/披露的重要事项；其他事项段：提醒使用者关注未在报表中列报/披露但与审计相关的事项。两者均不影响审计意见类型。"},{"id":"426","cat":"审计准则","n":"中国注册会计师审计准则第1332号——期后事项","d":"期后事项＝财务报表日至审计报告日之间发生的事项，以及注册会计师在审计报告日后知悉的事实。\n第一期后（报表日至审计报告日）：主动识别，设计审计程序。\n第二期后（审计报告日至报表公布日）：如知悉可能影响报表的事实→与管理层讨论→考虑修改报表/审计报告。\n第三期后（报表公布日后）：无义务主动识别；如知悉→与管理层讨论→必要时采取适当措施。"},{"id":"425","cat":"审计准则","n":"中国注册会计师审计准则第1324号——持续经营","d":"注册会计师有责任就管理层运用持续经营假设的适当性获取充分、适当的审计证据，并就是否存在重大不确定性得出结论。\n评价管理层评估涵盖的期间（至少涵盖自资产负债表日起12个月）。\n可能存在重大不确定性的迹象：财务方面（净负债/净流动负债、固定期限借款即将到期且无展期安排、过度依赖短期借款、关键财务比率不佳）；经营方面（关键管理人员离职、关键客户/市场流失、重大供应困难）；其他方面（未决诉讼/监管行动的不利结果、法律法规变化）。\n审计报告影响：如存在重大不确定性且已充分披露→增加「与持续经营相关的重大不确定性」段落（无保留意见+强调事项段）；如未充分披露→保留/否定意见。"},{"id":"424","cat":"审计准则","n":"中国注册会计师审计准则第1321号——会计估计和相关披露的审计","d":"了解管理层如何作出会计估计及相关的控制，识别和评估重大错报风险。\n应对会计估计风险的三种方法：\n（一）测试管理层如何作出估计以及所依据的数据（包括使用的模型和假设）；\n（二）测试相关控制的运行有效性；\n（三）作出注册会计师的点估计或区间估计，以评价管理层的点估计。\n关注估计不确定性：高度不确定的估计可能导致特别风险。\n评价管理层偏向：是否存在管理层偏向的迹象，偏向是否导致重大错报。"},{"id":"423","cat":"审计准则","n":"中国注册会计师审计准则第1314号——审计抽样","d":"审计抽样：对低于100%的项目实施审计程序，所有抽样单元都有被选取的机会。\n抽样风险：信赖过度/信赖不足（控制测试）、误受/误拒（细节测试）。\n选取方法：随机选样、系统选样、随意选样、整群选样、分层选样（最重要：分层降低变异性）。\n评价结果：推断总体错报，考虑抽样风险。统计抽样可量化抽样风险，非统计抽样依赖职业判断。"},{"id":"422","cat":"审计准则","n":"中国注册会计师审计准则第1312号——函证","d":"第五条 函证＝注册会计师直接从第三方（被询证者）获取书面答复作为审计证据。\n第十条 应当对银行存款（含零余额和本期注销账户）、借款及与金融机构往来的其他重要信息实施函证，除非不重要且重大错报风险很低。\n第十二条 应当对重要的应收账款实施函证，除非不重要或函证很可能无效（需在工作底稿说明理由）。\n第十三条 函证方式：积极式函证（要求被询证者直接回复）和消极式函证（仅在不同意时回复）。\n全过程控制：设计询证函→发出→跟进→收回→评价回函可靠性。替代程序：检查期后收款、销售合同、发货记录等。"},{"id":"421","cat":"审计准则","n":"中国注册会计师审计准则第1311号——对存货、诉讼和索赔、分部信息等特定项目获取审计证据的具体考虑","d":"存货监盘：注册会计师应在盘点现场实施监盘，评价管理层盘点指令和程序，观察盘点执行情况，检查存货，执行抽盘（双向抽盘：从盘点表→实物，从实物→盘点表）。如不能监盘，实施替代程序。\n\n诉讼和索赔：向法律顾问/外部律师发函询证，获取有关诉讼和索赔事项的审计证据。评价未决诉讼对财务报表的影响。"},{"id":"420","cat":"审计准则","n":"中国注册会计师审计准则第1301号——审计证据","d":"第四条 获取充分、适当的审计证据，作为形成审计意见的基础。\n第五条 充分性（数量）：受重大错报风险评估影响，也受审计证据质量影响。\n第六条 适当性（质量）：相关性和可靠性。可靠性受来源和性质影响。\n\n证据可靠程度排列：外部独立来源＞内部来源；直接获取＞间接获取；书面＞口头；原件＞复印件。\n\n第九条 审计程序类型：检查、观察、询问、函证、重新计算、重新执行、分析程序。"},{"id":"419","cat":"审计准则","n":"中国注册会计师审计准则第1231号——针对评估的重大错报风险采取的应对措施","d":"第五条 进一步审计程序包括控制测试和实质性程序。\n第六条 必须实施控制测试的情形：（一）预期控制运行有效；（二）仅实质性程序无法获取充分适当证据。\n第七条 实质性程序包括细节测试和实质性分析程序，针对所有重大类别的交易、账户余额和披露。\n\n总体应对措施（针对报表层次重大错报风险）：强调职业怀疑、指派更有经验的人员、增加不可预见性、总体修改审计程序的性质/时间/范围。"},{"id":"418","cat":"审计准则","n":"中国注册会计师审计准则第1221号——计划和执行审计工作时的重要性","d":"第四条 重要性＝财务报表中错报的金额或性质，单独或汇总起来可能影响使用者决策。\n注册会计师应当确定：（一）财务报表整体重要性；（二）特定类别交易/账户余额/披露的重要性（如适用）；（三）实际执行的重要性（通常为整体重要性的50%-75%）。\n\n第六条 确定重要性时考虑：被审计单位性质和生命周期、使用者及其需求、财务报告编制基础要求、以前期间识别的错报。\n第九条 明显微小错报临界值：低于该金额的错报视为明显微小，无需累积。"},{"id":"417","cat":"审计准则","n":"中国注册会计师审计准则第1211号——重大错报风险的识别和评估","d":"了解被审计单位及其环境（包括内部控制），以识别和评估财务报表层次和认定层次的重大错报风险。\n\n了解内容：行业状况/法律监管环境、被审计单位性质、会计政策选择和运用、目标战略和经营风险、财务业绩衡量评价。\n\n了解内部控制五要素：\n（一）控制环境（治理层和管理层的态度、意识和行动）；\n（二）风险评估过程；\n（三）与财务报告相关的信息系统与沟通；\n（四）控制活动（授权、业绩评价、信息处理、实物控制、职责分离）；\n（五）对控制的监督。"},{"id":"416","cat":"审计准则","n":"中国注册会计师审计准则第1141号——财务报表审计中与舞弊相关的责任","d":"第三条 舞弊＝管理层、治理层、员工或第三方使用欺骗手段获取不当或非法利益的故意行为。\n舞弊类型：编制虚假财务报告（管理舞弊）和侵占资产（员工舞弊）。\n第二十一条 应对管理层凌驾于控制之上的风险（必做程序）：\n（一）测试日常会计分录和其他调整是否适当；\n（二）复核会计估计是否存在偏向；\n（三）评价超出正常经营过程的重大交易的商业理由。\n第五条 对发现错误有效的审计程序未必对发现舞弊有效（舞弊可能涉及串通、伪造、故意遗漏）。"},{"id":"415","cat":"审计准则","n":"中国注册会计师审计准则第1101号——注册会计师的总体目标和审计工作的基本要求","d":"第十一条 注册会计师的总体目标：\n（一）对财务报表整体是否不存在由于舞弊或错误导致的重大错报获取合理保证，使注册会计师能够对财务报表是否在所有重大方面按照适用的财务报告编制基础编制发表审计意见；\n（二）按照审计准则的规定，根据审计结果对财务报表出具审计报告，并与管理层和治理层沟通。\n\n第十六条 注册会计师应当遵守与财务报表审计相关的职业道德要求，包括有关独立性的要求。\n第十七条 审计风险＝重大错报风险×检查风险。重大错报风险包括固有风险和控制风险。\n第十八条 整个审计过程中保持职业怀疑。"},{"id":"414","cat":"企业会计准则","n":"企业会计准则第33号——合并财务报表","d":"第七条 合并范围以控制为基础确定。控制三要素：（一）拥有对被投资方的权力；（二）参与被投资方活动而享有可变回报；（三）有能力运用权力影响回报金额。\n第九条 权力是现时权利，无论是否实际行使。\n第十条 多方各有权利→主导对回报最重大影响活动的一方有控制。\n关于持股比例：多数表决权通常推定有权力，但需考虑潜在表决权（可转换工具、期权等）。\n关于「事实控制」/「分散其他方」：即使持股不到半数，如能单方面主导相关活动也构成控制。\n\n第二十六条 统一会计政策和会计期间，全额合并（母公司理论→实体理论）。\n第三十条 合并抵销：长期股权投资vs子公司所有者权益；内部交易（顺流/逆流/平流）；内部债权债务。\n少数股东权益在合并权益中单独列示，少数股东损益在合并利润中单独列示。"},{"id":"413","cat":"企业会计准则","n":"企业会计准则第28号——会计政策、会计估计变更和差错更正","d":"第四条 会计政策变更条件：（一）法规要求变更；（二）变更能提供更可靠、更相关的信息。\n第五条 不属于政策变更：本质不同交易采用新政策、初次发生/不重要的交易。\n处理方法：追溯调整法（除非无法确定累积影响数→未来适用法）。\n\n第七条 会计估计变更：估计基础变化/新信息/更多经验→修订估计（未来适用法，不追溯）。\n\n第十一条 前期差错：计算错误、政策应用错误、疏忽曲解事实、舞弊等导致的报表错报。\n第十二条 重要前期差错→追溯重述法（重述可比期间报表）；不重要的→调整当期。"},{"id":"412","cat":"企业会计准则","n":"企业会计准则第22号——金融工具确认和计量","d":"【金融资产三分类】（业务模式＋SPPI测试）\n第十七条 摊余成本（AC）：仅收取合同现金流＋通过SPPI测试。\n第十八条 公允价值进其他综合收益（FVOCI）：既收取又出售＋通过SPPI测试。\n第十九条 公允价值进损益（FVTPL）：兜底分类，不满足AC和FVOCI条件的。\n特殊：非交易性权益工具投资可指定为FVOCI（不可撤销），股利进损益，处置价差不进损益直接转留存收益。\n\n【金融负债】以摊余成本计量为主，交易性金融负债以FVTPL计量。\n\n【预期信用损失模型ECL】\n第四十六条 以预期信用损失为基础进行减值。\n第四十八条 三阶段：\n  第一阶段（信用风险未显著增加）：12个月ECL\n  第二阶段（信用风险显著增加但未减值）：整个存续期ECL\n  第三阶段（已发生信用减值）：整个存续期ECL，利息按摊余成本（扣除准备后）计算。"},{"id":"411","cat":"企业会计准则","n":"企业会计准则第21号——租赁","d":"第四条 租赁识别：合同让渡了在一定期间内控制已识别资产使用的权利以换取对价。\n\n【承租人单一模型】\n第十四条 租赁期开始日确认使用权资产和租赁负债。\n第十七条 租赁负债＝租赁付款额的现值，折现率使用租赁内含利率或增量借款利率。\n第二十一条 使用权资产按成本计量，参照固定资产计提折旧。\n豁免：短期租赁（≤12个月）和低价值资产租赁可简化处理。\n\n【出租人】\n第二十八条 分为融资租赁和经营租赁。融资租赁＝实质上转移了与所有权有关的几乎全部风险和报酬。\n第三十五条 融资租赁：确认长期应收款（租赁收款额）并确认未实现融资收益。\n经营租赁：租金收入在租赁期内按直线法确认。"},{"id":"410","cat":"企业会计准则","n":"企业会计准则第20号——企业合并","d":"第二条 企业合并，是指将两个或者两个以上单独的企业合并形成一个报告主体的交易或事项。\n分类：同一控制下企业合并和非同一控制下企业合并。\n\n第五条 同一控制下：合并前后均受同一方/相同多方最终控制且非暂时性。\n第六条 同一控制下合并处理（权益结合法）：资产和负债按账面价值计量；对价与净资产账面价值差额调整资本公积/留存收益；不产生商誉；合并利润表包括被合并方全年损益（视同期初即存在）。\n\n第八条 非同一控制下合并处理（购买法）：合并成本＝付出对价的公允价值。\n第十一条 商誉＝合并成本－可辨认净资产公允价值份额（正→商誉；负→当期损益/负商誉）。\n第十三条 购买日确认被购买方可辨认资产、负债及或有负债，按公允价值计量。\n分步实现合并：原持有的股权按购买日公允价值重新计量，差额计入当期损益。"},{"id":"409","cat":"企业会计准则","n":"企业会计准则第18号——所得税","d":"资产负债表债务法：比较资产/负债的账面价值与计税基础，确认递延所得税。\n\n第四条 资产/负债账面价值≠计税基础→确认递延所得税资产或负债。\n第五条 资产计税基础＝未来可税前抵扣金额。\n第六条 负债计税基础＝账面价值－未来可税前抵扣金额。\n\n第七条 暂时性差异分为：应纳税暂时性差异（未来多交税→递延所得税负债）和可抵扣暂时性差异（未来少交税→递延所得税资产）。\n第十一条 确认所有应纳税暂时性差异产生的递延所得税负债（除非商誉初始确认等例外）。\n第十三条 递延所得税资产：以很可能取得足够的应纳税所得额为限确认。\n第十五条 可抵扣亏损和税款抵减：以未来很可能获得足够应纳税所得额为限确认递延所得税资产。\n\n常见暂时性差异：固定资产折旧（税法加速折旧vs会计直线法）、资产减值准备（会计计提≠税法认可）、公允价值变动、预计负债、预提费用等。"},{"id":"408","cat":"企业会计准则","n":"企业会计准则第14号——收入","d":"五步法模型：\n第一步：识别与客户订立的合同（批准、权利义务明确、支付条款、商业实质、对价很可能收回）。\n第二步：识别合同中的履约义务（可明确区分的商品/服务）。\n第三步：确定交易价格（考虑可变对价、重大融资成分、非现金对价、应付客户对价）。\n第四步：将交易价格分摊至各单项履约义务（按单独售价的相对比例）。\n第五步：履行履约义务时确认收入（时点/时段）。\n\n第四条 核心原则：在客户取得相关商品控制权时确认收入。\n第九条 主要责任人vs代理人：转让前是否控制商品→主要责任人（总额法）/代理人（净额法）。\n第十一条 时段履约三条件任一：（一）客户即取得并消耗利益；（二）客户控制在建商品；（三）不可替代用途＋有权就已完成部分收款。\n第二十条 合同合并：同时或相近时间与同一客户签订的多份合同，基于商业目的应合并处理。\n合同变更：作为单独合同/终止原合同＋新合同/作为原合同组成部分。"},{"id":"407","cat":"企业会计准则","n":"企业会计准则第13号——或有事项","d":"第二条 或有事项，是指过去的交易或者事项形成的，其结果须由某些未来事项的发生或不发生才能决定的不确定事项。\n第四条 预计负债确认三条件：（一）现时义务；（二）履行很可能导致经济利益流出；（三）金额能可靠计量。\n第五条 预计负债按最佳估计数初始计量。连续范围且概率相同→中间值；单个项目→最可能金额；多个项目→期望值。\n第六条 预期补偿：基本确定能收到时单独确认为资产，金额不超过预计负债账面价值。\n第七条 不确认或有负债和或有资产——仅在附注中披露（除非很可能导致经济利益流出/流入）。\n第九条 附注披露：预计负债的种类、形成原因、不确定性说明、期初期末余额和变动、预期补偿。"},{"id":"406","cat":"企业会计准则","n":"企业会计准则第12号——债务重组","d":"第二条 债务重组，是指在不改变交易对手方的情况下，经债权人和债务人协定或法院裁定，就清偿债务的时间、金额或方式等重新达成协议的交易。\n第三条 方式：（一）以资产清偿债务；（二）债务转权益工具（债转股）；（三）修改其他条款（调整本金、利息、还款期限）；（四）组合方式。\n债务人以资产清偿：终止确认债务和资产，账面价值差额计入当期损益（其他收益——债务重组收益）。\n债转股：按权益工具公允价值/修改后债务公允价值计量。\n债权人：受让非金融资产按成本计量（放弃债权公允价值+相关税费）。受让金融资产按金融工具准则。"},{"id":"405","cat":"企业会计准则","n":"企业会计准则第8号——资产减值","d":"第四条 资产负债表日判断减值迹象。商誉和使用寿命不确定的无形资产，无论有无迹象，每年必须进行减值测试。\n第五条 减值迹象：市价大幅下跌、经营环境不利变化、折现率上升、资产陈旧/损坏、闲置/停用。\n第六条 可收回金额＝MAX（公允价值－处置费用，预计未来现金流量现值）。\n第七条 任一项超过账面价值→没有减值，无需估计另一项。\n第十五条 可收回金额＜账面价值→差额确认资产减值损失，计入当期损益，计提减值准备。\n第十七条【核心】资产减值损失一经确认，在以后会计期间不得转回（区别于存货跌价准备和国际准则IAS 36）。\n第十八条 以单项资产为基础估计，难以单项估计的以资产组为基础。\n商誉减值：合并形成的商誉分摊至相关资产组或资产组组合，先对不含商誉的资产组测试，再对含商誉的资产组测试。"},{"id":"404","cat":"企业会计准则","n":"企业会计准则第2号——长期股权投资","d":"第二条 长期股权投资，是指投资方对被投资单位实施控制、重大影响的权益性投资，以及对其合营企业的权益性投资。\n第五条 同一控制下企业合并形成的长投，按被合并方账面净资产份额计量，差额调资本公积/留存收益。\n非同一控制下企业合并形成的长投，按合并成本（付出对价公允价值）计量。\n第七条 对子公司投资（控制）→成本法核算。\n第九条 对联营企业（重大影响）和合营企业（共同控制）→权益法核算。\n第十条 权益法：初始成本＞份额时含商誉不调整；初始成本＜份额时差额计营业外收入。\n第十一条 权益法后续：按持股比例确认投资收益和其他综合收益，调整长投账面价值。\n第十二条 超额亏损：以长期股权投资账面价值＋其他长期权益减记至零为限，备查登记。"},{"id":"403","cat":"企业会计准则","n":"企业会计准则第1号——存货","d":"第二条 存货，是指企业在日常活动中持有以备出售的产成品或商品、处在生产过程中的在产品、在生产过程或提供劳务过程中耗用的材料和物料等。\n第三条 存货同时满足下列条件的，才能予以确认：（一）与该存货有关的经济利益很可能流入企业；（二）该存货的成本能够可靠地计量。\n第五条 存货应当按照成本进行初始计量。存货成本包括采购成本、加工成本和其他成本。\n第十四条 企业应当采用先进先出法、加权平均法或者个别计价法确定发出存货的实际成本。不得采用后进先出法。\n第十五条 资产负债表日，存货应当按照成本与可变现净值孰低计量。存货成本高于其可变现净值的，应当计提存货跌价准备，计入当期损益。可变现净值＝估计售价－至完工时估计将要发生的成本－估计的销售费用及相关税费。"},{"id":"402","cat":"企业会计准则","n":"企业会计准则——基本准则","d":"第一章 总则\n第一条 为了规范企业会计确认、计量和报告行为，保证会计信息质量，制定本准则。\n第二条 本准则适用于在中华人民共和国境内设立的企业（包括公司）。\n第三条 企业会计准则包括基本准则和具体准则，具体准则的制定应当遵循本准则。\n\n第二章 会计信息质量要求\n第四条 企业应当以实际发生的交易或者事项为依据进行会计确认、计量和报告，如实反映符合确认和计量要求的各项会计要素及其他相关信息，保证会计信息真实可靠、内容完整。\n第五条（相关性）企业提供的会计信息应当与财务会计报告使用者的经济决策需要相关。\n第六条（可理解性）企业提供的会计信息应当清晰明了，便于财务会计报告使用者理解和使用。\n第七条（可比性）企业提供的会计信息应当具有可比性。\n第八条（实质重于形式）企业应当按照交易或者事项的经济实质进行会计确认、计量和报告，不应仅以交易或者事项的法律形式为依据。\n第九条（重要性）企业提供的会计信息应当反映与企业财务状况、经营成果和现金流量等有关的所有重要交易或者事项。\n第十条（谨慎性）企业对交易或者事项进行会计确认、计量和报告应当保持应有的谨慎，不应高估资产或者收益、低估负债或者费用。\n第十一条（及时性）企业对于已经发生的交易或者事项，应当及时进行会计确认、计量和报告，不得提前或者延后。\n\n第三章 资产：过去交易/事项形成、企业拥有/控制、预期带来经济利益的资源。\n第四章 负债：过去交易/事项形成的现时义务，预期会导致经济利益流出。\n第五章 所有者权益：资产扣除负债后的剩余权益。\n第六章 收入：日常活动导致所有者权益增加的、与投入资本无关的经济利益总流入。\n第七章 费用：日常活动导致所有者权益减少的、与分配利润无关的经济利益总流出。\n第八章 利润：一定会计期间的经营成果。\n第九章 会计计量：历史成本、重置成本、可变现净值、现值、公允价值。\n第十章 财务会计报告：资产负债表、利润表、现"},{"id":"401","cat":"","n":"CAS 41 在其他主体中权益的披露","d":"规范在子公司、合营安排、联营企业和未纳入合并范围的结构化主体中权益的披露要求"},{"id":"400","cat":"","n":"CAS 38 首次执行企业会计准则","d":"规范首次执行日追溯调整原则、豁免事项及首次执行日报表的编制"},{"id":"399","cat":"","n":"CAS 37 金融工具列报","d":"规范金融负债和权益工具的区分、金融资产和金融负债的抵销条件以及相关披露"},{"id":"398","cat":"","n":"CAS 35 分部报告","d":"规范经营分部的确定（管理法）、分部信息的列报和披露"},{"id":"397","cat":"","n":"CAS 34 每股收益","d":"规范基本每股收益和稀释每股收益的计算，以及潜在普通股的稀释性判断（库存股法）"},{"id":"396","cat":"","n":"CAS 31 现金流量表","d":"规范现金流量表的编制（直接法和间接法）、现金及现金等价物的界定和三大类活动的分类"},{"id":"395","cat":"","n":"CAS 30 财务报表列报","d":"规范财务报表的构成、持续经营评估、权责发生制、报表项目的抵销和列报一致性"},{"id":"394","cat":"","n":"CAS 29 资产负债表日后事项","d":"规范资产负债表日后调整事项和非调整事项的区分及处理"},{"id":"393","cat":"","n":"CAS 28 会计政策变更","d":"规范会计政策变更、会计估计变更和前期差错更正的区分、追溯调整法和未来适用法的应用条件"},{"id":"392","cat":"","n":"CAS 24 套期会计","d":"规范公允价值套期、现金流量套期和境外经营净投资套期的确认、计量和套期有效性评估"},{"id":"391","cat":"","n":"CAS 19 外币折算","d":"规范外币交易的即期汇率/近似汇率折算、境外经营财务报表的折算和外币折算差额处理"},{"id":"390","cat":"","n":"CAS 17 借款费用","d":"规范借款费用的资本化条件（开始/暂停/停止）、专门借款和一般借款的资本化计算"},{"id":"389","cat":"","n":"CAS 15 建造合同","d":"规范建造合同的收入确认、合同成本归集和合同预计损失的确认（已被CAS 14取代，但仍有参考意义）"},{"id":"388","cat":"","n":"CAS 13 或有事项","d":"规范或有事项的确认（预计负债三个条件）、计量和披露"},{"id":"387","cat":"","n":"CAS 9 职工薪酬","d":"规范短期薪酬、离职后福利（设定提存和设定受益）、辞退福利和其他长期职工福利"},{"id":"386","cat":"","n":"CAS 7 非货币性资产交换","d":"规范非货币性资产交换的认定、商业实质判断以及公允价值和账面价值计量模式的选择"},{"id":"385","cat":"","n":"CAS 6 无形资产","d":"规范无形资产的确认、自行研发支出的资本化条件、后续计量和减值"},{"id":"384","cat":"","n":"CAS 5 生物资产","d":"规范消耗性生物资产、生产性生物资产和公益性生物资产的确认和计量"},{"id":"383","cat":"","n":"CAS 3 投资性房地产","d":"规范投资性房地产的确认、计量（成本模式或公允价值模式）及转换处理"},{"id":"382","cat":"","n":"CAS 1 存货","d":"规范存货的初始确认（成本）、后续计量（成本与可变现净值孰低）和发出计价方法"},{"id":"381","cat":"","n":"CAS 40 合营安排","d":"规范合营安排的分类（共同经营vs合营企业）和会计处理，核心是判断权利是对特定资产/负债还是对净资产的分享"},{"id":"380","cat":"","n":"CAS 2 长期股权投资","d":"规范长期股权投资的初始计量、后续计量（成本法vs权益法）、核算方法转换、减值和处置"},{"id":"379","cat":"","n":"CAS 18 所得税","d":"规范资产负债表债务法下的递延所得税——暂时性差异、递延所得税资产/负债的确认和计量"},{"id":"378","cat":"","n":"CAS 8 资产减值","d":"规范长期资产的减值测试——可收回金额（公允价值减费用与使用价值孰高），商誉每年必测，减值不可转回"},{"id":"377","cat":"","n":"CAS 22 金融工具确认和计量","d":"规范金融资产分类（AC/FVOCI/FVTPL）、预期信用损失模型（ECL）、金融负债分类、嵌入式衍生工具分拆"},{"id":"376","cat":"","n":"CAS 21 租赁","d":"新租赁准则：承租人单一会计模型，低价值/短期豁免除外，出租人维持经营租赁和融资租赁双模型"},{"id":"375","cat":"","n":"CAS 14 收入","d":"新收入准则（五步法模型）：识别合同→识别单项履约义务→确定交易价格→分摊价格→在履约时点/时段确认收入。核心改变是控制权转移替代风险报酬转移"},{"id":"374","cat":"","n":"CAS 33 合并财务报表","d":"规范合并范围的确定（控制三要素模型）、合并程序、内部交易抵销、少数股东权益计量，以及结构化主体的合并判断"},{"id":"373","cat":"","n":"CAS 20 企业合并","d":"规范同一控制和非同一控制下企业合并的确认、计量和披露，核心概念包括购买法、合并成本、商誉、或有对价等"},{"id":"372","cat":"","n":"CAS42 持有待售","d":"持有待售资产的分类条件、计量规则（孰低法）、处置组的列报"},{"id":"371","cat":"","n":"CAS39 公允价值计量","d":"三个层次输入值体系（市场报价→可观察输入值→不可观察输入值）"},{"id":"370","cat":"","n":"CAS36 关联方披露","d":"关联方认定标准、关联交易定价政策和金额的披露要求"},{"id":"369","cat":"","n":"CAS33 合并报表","d":"合并范围的判断（控制三要素）、内部交易抵消、少数股东权益/损益"},{"id":"368","cat":"","n":"CAS22 金融工具","d":"AC/FVOCI/FVTPL三分类，预期信用损失模型（ECL），SPPI测试"},{"id":"367","cat":"","n":"CAS21 租赁","d":"承租人单一模型（使用权资产+租赁负债），出租人保留融资/经营租赁分类"},{"id":"366","cat":"","n":"CAS20 企业合并","d":"区分同一控制（权益结合法）与非同一控制（购买法），规范商誉确认"},{"id":"365","cat":"","n":"CAS18 所得税","d":"资产负债表债务法：暂时性差异→递延所得税资产/负债计量"},{"id":"364","cat":"","n":"CAS16 政府补助","d":"规范政府补助的确认（总额法/净额法）及与资产相关/收益相关的分类"},{"id":"363","cat":"","n":"CAS14 收入","d":"五步法收入确认模型：识别合同→识别履约义务→确定交易价格→分摊→确认"},{"id":"362","cat":"","n":"CAS12 债务重组","d":"规范不改变交易对手方前提下债权人和债务人重新达成协议的处理"},{"id":"361","cat":"","n":"CAS11 股份支付","d":"规范以权益工具或现金结算的股份支付交易的确认、计量和披露"},{"id":"360","cat":"","n":"CAS8 资产减值","d":"规范资产可收回金额的计量、减值损失的确认和转回，含商誉减值测试"},{"id":"359","cat":"","n":"CAS2 长期股权投资","d":"规范长期股权投资的初始确认、后续计量（成本法/权益法）及核算方法转换处理"}]};

// 分词时剔除问句结构词、虚词，提取核心概念
var CN_STOP_WORDS = [
  "有何不同","有什么区别","怎么区分","如何区分","如何辨别","怎么辨别",
  "如何处理","怎么处理","如何做","怎么做",
  "是什么","什么意思","的含义","包含哪些","包括什么",
  "的区别","的差异","的不同","不同点","的异同",
  "的界定","的判断","的标准","的条件",
  "请问","问一下","我想问","想知道","请教","咨询",
  "麻烦","帮忙","能不能","可以不可以","是否","能不能够",
  "说明一下","解释一下","分析一下",
  "和","与","及","或","该","这个","那个","哪些","什么","哪个","怎么","如何",
  "呢","吗","啊","吧","么","了","的","地","得",
  "？","?","，",",","。",".","：",":","；",";","！","!"
];

// ── 提取查询中的核心概念词 ──────────────────────────
function extractConcepts(question) {
  var clean = question;
  // 按长度降序替换停用词（长的先替换，避免"有何不同"被"的"拆碎）
  CN_STOP_WORDS.forEach(function(sw) { clean = clean.split(sw).join(" "); });
  clean = clean.replace(/\s+/g, " ").trim();
  var terms = clean.split(" ").filter(function(t) { return t.length >= 2; });
  // 返回去重后的核心概念词
  var seen = {};
  var uniq = [];
  terms.forEach(function(t) {
    if (!seen[t]) { seen[t] = true; uniq.push(t); }
  });
  return uniq;
}

// ── 生成 n-gram 用于模糊回退 ────────────────────────
function makeBigrams(text) {
  var clean = text.replace(/[「」""''【】()（）《》\[\]{}，。？?！!：:；;、\s]+/g, "");
  var bigrams = [];
  for (var i = 0; i < clean.length - 1; i++) {
    bigrams.push(clean.substring(i, i + 2));
  }
  return bigrams;
}

// ── 核心：智能模糊搜索 ──────────────────────────────
function searchKB(question) {
  if (!question || typeof question !== "string") return [];
  var q = question;
  var ql = q.toLowerCase();
  var results = [];

  // 1. 提取核心概念词
  var concepts = extractConcepts(q);

  // 2. 生成 bigrams 用于回退
  var allBigrams = makeBigrams(q);
  var uniqBigrams = [];
  var bgSeen = {};
  allBigrams.forEach(function(bg) {
    if (!bgSeen[bg]) { bgSeen[bg] = true; uniqBigrams.push(bg); }
  });

  // 3. 对每条 QA 打分
  KB.qa.forEach(function(item) {
    if (!item || !item.q) return;
    var score = 0;
    var ql_item = item.q.toLowerCase();
    var al = (item.a || "").toLowerCase();
    var kwl = (item.kw || "").toLowerCase();
    var cl = (item.cat || "").toLowerCase();

    // 3a. 核心概念词精确匹配（权重最高）
    var conceptHits = 0;
    concepts.forEach(function(t) {
      var tl = t.toLowerCase();
      if (ql_item.indexOf(tl) !== -1) { score += 10; conceptHits++; }
      else if (al.indexOf(tl) !== -1) { score += 2; conceptHits++; }
      if (kwl.indexOf(tl) !== -1) score += 5;
      if (cl.indexOf(tl) !== -1) score += 3;
    });

    // 3b. 长短语整体匹配奖励
    if (ql_item.indexOf(ql) !== -1) score += 8;
    else if (ql.indexOf(ql_item) !== -1) score += 5;
    else if (ql_item.indexOf(concepts.join("")) !== -1) score += 4;

    // 3c. 没有概念匹配时，降级为 bigram 匹配
    if (conceptHits === 0 && concepts.length > 0) {
      var bgScore = 0;
      uniqBigrams.forEach(function(bg) {
        if (ql_item.indexOf(bg) !== -1) bgScore += 1.5;
        if (al.indexOf(bg) !== -1) bgScore += 0.3;
        if (kwl.indexOf(bg) !== -1) bgScore += 0.5;
      });
      score += Math.min(bgScore, 4); // bigram回退分数上限降低（避免过多低质匹配）
    }

    if (score > 0) results.push({ item: item, score: Math.round(score * 10) / 10, type: "qa" });
  });

  // 4. 对准则打分
  KB.standards.forEach(function(item) {
    if (!item || !item.n) return;
    var score = 0;
    var nl = (item.n || "").toLowerCase();
    var cl = (item.c || "").toLowerCase();
    var tl = (item.t || "").toLowerCase();

    concepts.forEach(function(t) {
      var tlc = t.toLowerCase();
      if (nl.indexOf(tlc) !== -1) score += 8;
      if (cl.indexOf(tlc) !== -1) score += 3;
      if (tl.indexOf(tlc) !== -1) score += 5;
    });

    if (score === 0 && concepts.length > 0) {
      uniqBigrams.forEach(function(bg) {
        if (nl.indexOf(bg) !== -1) score += 1;
        if (cl.indexOf(bg) !== -1) score += 0.5;
      });
    }

    if (score > 0) results.push({ item: item, score: Math.round(score * 10) / 10, type: "standard" });
  });

  results.sort(function(a, b) { return b.score - a.score; });
  // 最低分过滤：score < 5 的条目视为低质量匹配，剔除（减少干扰条目）
  return results.filter(function(r) { return r.score >= 5; });
}

function buildMsgs(question,kbContext,usePersona){
  var sc=usePersona?CYPROMPT:"你是会计准则助手，请用专业语言回答。";
  if(kbContext)sc+="\n\n---\n\n# 知识库参考资料\n\n"+kbContext+"\n\n如果知识库内容与问题相关，请引用具体内容；不相关则基于专业知识回答。";
  return [{role:"system",content:sc},{role:"user",content:question}];
}

async function callDeepSeek(question,usePersona){
  var kbResults=searchKB(question);
  var kbContext="";
  var stdRefHints=[];
  if(kbResults.length>0){
    var parts=[];
    for(var i=0;i<Math.min(kbResults.length,5);i++){
      var r=kbResults[i];
      if(r.type==="qa"){
        var refHint="";
        if(r.item.std_ref){refHint="【关联准则："+r.item.std_ref+"】";stdRefHints.push(r.item.std_ref);}
        parts.push("【参考"+(i+1)+"·ID="+r.item.id+"】"+refHint+"问题:"+r.item.q+"\n回答:"+(r.item.a||"").substring(0,600));
      }
      else parts.push("【参考"+(i+1)+"·ID="+r.item.id+"】准则"+(r.item.n||"")+":"+(r.item.d||r.item.c||"").substring(0,600));
    }
    // Collect unique std_ref hints
    var seenRefs={};
    var uniqueRefs=[];
    stdRefHints.forEach(function(ref){
      ref.split('、').forEach(function(r){
        if(r&&!seenRefs[r]){seenRefs[r]=true;uniqueRefs.push(r);}
      });
    });
    if(uniqueRefs.length>0){
      parts.push("【关联依据提示】以上匹配条目涉及以下准则，回答时请务必引用："+uniqueRefs.join('、'));
    }
    kbContext=parts.join("\n\n---\n\n");
  }
  var msgs=buildMsgs(question,kbContext,usePersona);
  var resp=await fetch(LLM_URL,{
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":"Bearer "+LLM_KEY},
    body:JSON.stringify({model:LLM_MODEL,messages:msgs,temperature:0.3,max_tokens:2048,stream:false})
  });
  if(!resp.ok){
    var errText;
    try{var e=await resp.json();errText=e.error&&e.error.message?e.error.message:JSON.stringify(e);}catch(ex){errText="HTTP "+resp.status;}
    throw new Error("DeepSeek API 错误: "+errText);
  }
  var data=await resp.json();
  return {answer:data.choices[0].message.content,kbResults:kbResults,kbCount:kbResults.length};
}

// ── 可追溯：点击条目展开查看完整原文 ────────────────
// 全局变量：保存最新一次搜索的所有结果
var _lastKbResults = [];

function renderSources(kbResults, kbCount) {
  _lastKbResults = kbResults || [];
  var qaResults = kbResults ? kbResults.filter(function(r) { return r.type === "qa"; }) : [];
  if (!qaResults || qaResults.length === 0) {
    document.getElementById("sources-ask").style.display = "none";
    return;
  }
  var topScore = qaResults[0].score;
  var srcHtml = '<div class="sources-title">\u23f2 匹配知识条目（共 ' + qaResults.length + ' 条）</div>';
  qaResults.slice(0, 8).forEach(function(r, idx) {
    var label = (r.item.q || "").substring(0, 60);
    var catBadge = r.item.cat || "";
    var pct = topScore > 0 ? Math.round(r.score / topScore * 100) : 0;
    srcHtml +=
      '<div class="source-item" onclick="toggleSource(this,' + idx + ')" id="src-' + idx + '">' +
        '<div class="source-header">' +
          '<span class="source-expand-icon">+</span>' +
          '<span class="source-score">' + pct + '%</span>' +
          '<span class="source-content">' + escHtml(label) + '</span>' +
          (catBadge ? '<span class="source-cat source-badge-qa">' + escHtml(catBadge) + '</span>' : '') +
        '</div>' +
        '<div class="source-detail">' +
          renderSourceDetail(r) +
        '</div>' +
      '</div>';
  });
  document.getElementById("sources-ask").innerHTML = srcHtml;
  document.getElementById("sources-ask").style.display = "block";
}

// ── 渲染展开后的源码详情 ────────────────────────────
function renderSourceDetail(r) {
  if (r.type === "qa") {
    var item = r.item;
    var kwText = item.kw ? escHtml(item.kw).split(",").map(function(k){return '<span style="display:inline-block;padding:1px 8px;background:#F3F4F6;border-radius:4px;margin:2px 3px;font-size:10px">'+k.trim()+'</span>';}).join("") : '<span style="color:#B0B0B6">无</span>';
    return '<div class="source-detail-q">' + escHtml(item.q) + '</div>' +
           '<div class="source-detail-a">' + escHtml(item.a || "") + '</div>' +
           '<div class="source-detail-meta">' +
             '<span><span class="meta-label">分类:</span> ' + escHtml(item.cat || "未分类") + '</span>' +
             '<span><span class="meta-label">ID:</span> ' + (item.id || "") + '</span>' +
             (item.author ? '<span><span class="meta-label">作者:</span> ' + escHtml(item.author) + '</span>' : '') +
           '</div>' +
           '<div style="margin-top:8px;font-size:11px;color:#B0B0B6">关键词: ' + kwText + '</div>' +
           '<div class="source-detail-actions">' +
             '<button class="source-btn-copy" onclick="event.stopPropagation();copySourceText(this,' + item.id + ')">复制全文</button>' +
           '</div>' +
           '<div class="source-detail-source">' +
             '<span class="source-label">📖 信息来源:</span> ' +
             (item.src ? escHtml(item.src) : escHtml('陈奕蔚 会计视野论坛答疑')) +
           '</div>';
  } else {
    var item = r.item;
    return '<div class="source-detail-q">《' + escHtml(item.n || "") + '》 ' + escHtml(item.t || "") + '</div>' +
           '<div class="source-detail-a">' + escHtml(item.c || "") + '</div>' +
           '<div class="source-detail-meta">' +
             '<span><span class="meta-label">类型:</span> 准则原文</span>' +
             '<span><span class="meta-label">ID:</span> ' + (item.id || "") + '</span>' +
             (item.cat ? '<span><span class="meta-label">分类:</span> ' + escHtml(item.cat) + '</span>' : '') +
           '</div>' +
           '<div class="source-detail-actions">' +
             '<button class="source-btn-copy" onclick="event.stopPropagation();copySourceText(this,' + item.id + ')">复制全文</button>' +
           '</div>' +
           '<div class="source-detail-source">' +
             '<span class="source-label">📖 信息来源:</span> ' + escHtml('企业会计准则原文') +
           '</div>';
  }
}

// ── 切换展开/收起 ───────────────────────────────────
var _expandedIdx = -1;
function toggleSource(el, idx) {
  // 如果点击的是按钮，不处理
  if (event.target.tagName === "BUTTON") return;

  // 收起上一个展开的条目
  if (_expandedIdx >= 0 && _expandedIdx !== idx) {
    var prev = document.getElementById("src-" + _expandedIdx);
    if (prev) prev.classList.remove("expanded");
  }

  // 切换当前
  el.classList.toggle("expanded");
  _expandedIdx = el.classList.contains("expanded") ? idx : -1;

  // 滚动到可见区域
  if (el.classList.contains("expanded")) {
    setTimeout(function() { el.scrollIntoView({ behavior: "smooth", block: "nearest" }); }, 150);
  }
}

// ── 复制条目全文 ────────────────────────────────────
function copySourceText(btn, id) {
  var item = null;
  // 在 _lastKbResults 中查找
  for (var i = 0; i < _lastKbResults.length; i++) {
    var r = _lastKbResults[i];
    if (r.item.id === id) { item = r; break; }
  }
  if (!item) return;

  var text = "";
  if (item.type === "qa") {
    text = "【问题】" + (item.item.q || "") + "\n\n【回答】" + (item.item.a || "") + "\n\n—— 分类: " + (item.item.cat || "未分类") + " | ID: " + (item.item.id || "");
  } else {
    text = "【准则】" + (item.item.n || "") + " " + (item.item.t || "") + "\n\n" + (item.item.c || "");
  }

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() {
      btn.textContent = "✔ 已复制";
      setTimeout(function() { btn.textContent = "复制全文"; }, 1500);
    }).catch(function() { fallbackCopy(text, btn); });
  } else {
    fallbackCopy(text, btn);
  }
}

function fallbackCopy(text, btn) {
  var ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position = "fixed";
  ta.style.left = "-9999px";
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand("copy"); btn.textContent = "✔ 已复制"; }
  catch(e) { btn.textContent = "复制失败"; }
  document.body.removeChild(ta);
  setTimeout(function() { btn.textContent = "复制全文"; }, 1500);
}

// ── 初始化：KB 数据内嵌，直接可用 ────────────
(function initKB(){
  KB.qa = KB.entries.filter(function(e) { return e.q; });
  KB.standards = KB.entries.filter(function(e) { return e.n; });
  var elCount = document.getElementById("kb-count");

// ── DOM 工具函数 ────────────────────────────────────
function show(id){document.getElementById(id).classList.add('show');}
function hide(id){document.getElementById(id).classList.remove('show');}
function showE(id,msg){var el=document.getElementById(id);el.textContent=msg;show(id);}

// ── 后处理：高亮关联依据 ────────────────────────────
function highlightStdRef(html){
  // Match rendered markdown: <p>📄 <strong>关联依据</strong>：《...》</p>
  var re=/<p>📄\s*<strong>关联依据<\/strong>[：:]\s*(.+?)<\/p>/;
  var m=html.match(re);
  if(m){
    var content=m[1];
    // Wrap each standard in a styled badge
    var items=content.split(/[、,，]/).map(function(s){
      var t=s.trim().replace(/^《|》$/g,'');
      if(!t) return '';
      return '<span style="display:inline-block;margin:2px 4px;padding:2px 10px;background:rgba(59,130,246,0.1);border-radius:6px;white-space:nowrap">《'+t+'》</span>';
    }).join('');
    var badge='<div class="std-ref-badge"><span class="std-ref-icon">📄</span><div><span class="std-ref-text">关联依据</span><div class="std-ref-list">'+items+'</div></div></div>';
    html=html.replace(m[0], badge);
  }
  return html;
}

async function doAsk(){
  var input=document.getElementById("input-ask");
  var btn=document.getElementById("btn-ask");
  var q=input.value.trim();
  if(!q){showE("error-ask","请输入问题");return;}
  btn.disabled=true;
  _expandedIdx = -1;
  show("loading-ask");hide("result-ask");hide("error-ask");
  // ⭐ 彩蛋检测：触发"世界上最漂亮的人"
  if (checkEasterEgg(q)) {
    btn.disabled = false;
    hide("loading-ask");
    renderEasterEgg();
    return;
  }


  try{
    var data=await callDeepSeek(q,true);
    var answerHtml=renderMd(data.answer);
    answerHtml=highlightStdRef(answerHtml);
    document.getElementById("answer-ask").innerHTML=answerHtml;
    document.getElementById("match-count-ask").textContent=data.kbCount||0;
    renderSources(data.kbResults, data.kbCount);
    show("result-ask");
  }catch(err){showE("error-ask","查询失败："+err.message);}
  finally{btn.disabled=false;hide("loading-ask");}
}async function doCompare(){
  var input=document.getElementById("input-compare");
  var btn=document.getElementById("btn-compare");
  var q=input.value.trim();
  if(!q){showE("error-compare","请输入问题");return;}
  btn.disabled=true;
  show("loading-compare");hide("result-compare");hide("error-compare");
  try{
    var results=await Promise.all([callDeepSeek(q,true),callDeepSeek(q,false)]);
    document.getElementById("answer-expert").innerHTML=highlightStdRef(renderMd(results[0].answer));
    document.getElementById("answer-generic").innerHTML=renderMd(results[1].answer);
    show("result-compare");
  }catch(err){showE("error-compare","对比失败："+err.message);}
  finally{btn.disabled=false;hide("loading-compare");}
}

// ⭐ ── 彩蛋：世界上最漂亮的人 ──────────────────────────
var EGG_TRIGGERS = ["世界上最漂亮的人", "张梦", "最漂亮的人是谁", "谁最漂亮", "最美的人", "颜值天花板", "最美", "最漂亮", "漂亮的人", "美的人", "女神", "梦中情人"];
var EGG_DISMISS = "😅 都说了，作者的意志是不可违抗的。重新搜点会计问题吧~";

function checkEasterEgg(text) {
  if (!text) return false;
  var t = text.replace(/\s+/g, '');
  for (var i = 0; i < EGG_TRIGGERS.length; i++) {
    if (t.indexOf(EGG_TRIGGERS[i]) !== -1) return true;
  }
  return false;
}

function renderEasterEgg() {
  var answerDiv = document.getElementById("answer-ask");
  var matchSpan = document.getElementById("match-count-ask");
  var sourcesDiv = document.getElementById("sources-ask");

  matchSpan.textContent = "💖";
  sourcesDiv.style.display = "none";

  answerDiv.innerHTML =
    '<div class="egg-bubble">' +
      '<div class="egg-header">🎀 情感协议已触发 🎀</div>' +
      '<div class="egg-hearts">❤️ 💕 💗 💖 💕 ❤️</div>' +
      '<div class="egg-body">' +
        '<p class="egg-hint">（系统提示：作者小鄂正在后台疯狂修改代码）</p>' +
        '<p>用户您好，您的问题已触发本站<strong>最高级情感协议</strong>。经过深度神经网络与作者主观意志的融合计算，输出结果为：</p>' +
        '<p class="egg-verdict">❤️ 世界上最漂亮的人，毋庸置疑是<strong>张梦~</strong> ❤️</p>' +
        '<p class="egg-actions">如需客观分析，请点击下方「我不服」按钮，但作者大概率不会理会。😏</p>' +
        '<button class="egg-btn" onclick="dismissEgg()">😤 我不服</button>' +
      '</div>' +
      '<div class="egg-footer">—— 准则AI顾问 · 专属彩蛋 ——</div>' +
    '</div>';

  show("result-ask");
}

function dismissEgg() {
  var answerDiv = document.getElementById("answer-ask");
  answerDiv.innerHTML =
    '<div class="egg-bubble egg-dismiss">' +
      '<div class="egg-header">🤖 系统驳回你的不服 🤖</div>' +
      '<div class="egg-body">' +
        '<p>' + EGG_DISMISS + '</p>' +
        '<p style="text-align:center;margin-top:16px;font-size:36px">🌸💖🌸</p>' +
      '</div>' +
    '</div>';
}


function escHtml(s){var div=document.createElement('div');div.textContent=s;return div.innerHTML;}
