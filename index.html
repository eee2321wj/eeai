<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>AI准则顾问</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--orange:#F97316;--orange-dark:#EA580C;--bg:#F9F8F6;--white:#FFF;--text:#1C1C1E;--secondary:#8E8E93;--border:#EEECEA;--radius:16px}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:800px;margin:0 auto;padding:20px}
.header{padding:30px 0 20px}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.logo-icon{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--orange),var(--orange-dark));display:flex;align-items:center;justify-content:center;color:var(--white);font-size:16px;font-weight:700}
.logo-text{font-size:14px;font-weight:600;color:var(--secondary);letter-spacing:.5px}
h1{font-size:36px;font-weight:800;margin-bottom:6px;letter-spacing:-0.5px}
h1 em{font-style:normal;color:var(--orange)}
.subtitle{font-size:14px;color:var(--secondary);margin-bottom:24px}
.stats{display:flex;gap:32px;margin-bottom:32px}
.stat-item{display:flex;flex-direction:column}
.stat-num{font-size:26px;font-weight:700;color:var(--text)}
.stat-label{font-size:12px;color:var(--secondary);margin-top:2px}
.tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:24px}
.tab{padding:14px 28px;font-size:15px;font-weight:600;color:#B0B0B6;cursor:pointer;border:0;background:none;position:relative;transition:color .2s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--text)}
.tab.active::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:3px;background:var(--orange);border-radius:2px 2px 0 0}
.panel{display:none}
.panel.active{display:block}
textarea{width:100%;padding:16px;font-size:16px;line-height:1.6;border:2px solid var(--border);border-radius:var(--radius);background:var(--white);color:var(--text);outline:0;font-family:inherit;resize:vertical;min-height:120px;margin-bottom:14px;transition:border-color .2s,box-shadow .2s}
textarea:focus{border-color:var(--orange);box-shadow:0 0 0 4px rgba(249,115,22,.08)}
textarea::placeholder{color:#C5C5C9}
.btn{width:100%;height:56px;border:0;border-radius:var(--radius);background:linear-gradient(135deg,var(--orange),var(--orange-dark));color:var(--white);font-size:18px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .2s,transform .1s;letter-spacing:.3px}
.btn:hover{opacity:.92}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.loading{display:none;align-items:center;justify-content:center;gap:10px;padding:20px;color:var(--secondary);font-size:14px}
.loading.show{display:flex}
.spinner{width:20px;height:20px;border:3px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.result{display:none;background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-top:16px;animation:fadeIn .3s}
.result.show{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.result-header{display:flex;align-items:center;gap:12px;margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.answer{font-size:15px;line-height:2;white-space:pre-wrap;word-break:break-word}
.sources{margin-top:22px;padding-top:20px;border-top:1px solid var(--border)}
.sources-title{font-size:13px;color:var(--secondary);margin-bottom:12px;font-weight:700;letter-spacing:.3px}
.source-item{padding:9px 12px;margin:6px 0;background:#FAFAF9;border-radius:8px;font-size:12px;line-height:1.6}
.source-score{color:var(--orange);font-weight:700;font-size:13px}
.source-content{color:var(--secondary);margin-left:8px}
.compare-result{display:none;gap:20px;margin-top:16px}
.compare-result.show{display:grid;grid-template-columns:1fr 1fr}
.compare-col{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:22px;animation:fadeIn .3s}
.compare-label{font-size:12px;font-weight:700;padding:5px 14px;border-radius:20px;display:inline-block;margin-bottom:14px}
.compare-label.expert{background:#FFF7ED;color:var(--orange)}
.compare-label.generic{background:#F5F5F7;color:var(--secondary)}
.error{display:none;background:#FEF2F2;border:1px solid #FECACA;border-radius:12px;padding:14px 18px;margin-top:16px;color:#991B1B;font-size:14px;line-height:1.6}
.error.show{display:block}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;background:#D1D5DB}
.status-dot.online{background:#22C55E}
.status-dot.offline{background:#EF4444}
.footer{text-align:center;padding:40px 20px 36px;font-size:12px;color:#B0B0B6}
.answer h1,.answer h2,.answer h3,.answer h4{font-weight:700;margin:20px 0 10px;line-height:1.3}
.answer h1{font-size:22px;border-bottom:2px solid var(--border);padding-bottom:8px}
.answer h2{font-size:18px;border-bottom:1px solid var(--border);padding-bottom:6px}
.answer h3{font-size:16px}
.answer h4{font-size:15px;color:var(--secondary)}
.answer p{margin:10px 0}
.answer ul,.answer ol{padding-left:24px;margin:10px 0}
.answer li{margin:4px 0;line-height:1.8}
.answer strong{font-weight:700;color:var(--text)}
.answer em{font-style:italic;color:var(--orange)}
.answer blockquote{border-left:4px solid var(--orange);padding:10px 16px;margin:14px 0;background:#FFF7ED;border-radius:0 8px 8px 0;color:#9A3412;font-size:14px}
.answer code{font-family:"SF Mono","Fira Code","Consolas",monospace;font-size:13px;background:#F3F4F6;padding:2px 6px;border-radius:4px;color:#DC2626}
.answer pre{background:#1C1C1E;color:#E5E7EB;padding:16px 20px;border-radius:12px;overflow-x:auto;margin:14px 0;font-size:13px;line-height:1.7}
.answer pre code{background:none;color:inherit;padding:0;font-size:inherit}
.answer table{width:100%;border-collapse:collapse;margin:14px 0;font-size:13px}
.answer th{background:#F9F8F6;padding:10px 14px;text-align:left;font-weight:700;border-bottom:2px solid var(--border)}
.answer td{padding:10px 14px;border-bottom:1px solid var(--border)}
.answer tr:hover td{background:#FAFAF9}
.answer a{color:var(--orange);text-decoration:underline}
.answer hr{border:0;height:1px;background:var(--border);margin:20px 0}
.answer img{max-width:100%;border-radius:8px}
@media(max-width:640px){
  .container{padding:16px}
  h1{font-size:28px}
  .stats{gap:20px}
  .tab{padding:12px 18px;font-size:14px}
  .compare-result.show{grid-template-columns:1fr 1fr;gap:10px}
  textarea{min-height:100px}
  .answer h1{font-size:19px}.answer h2{font-size:16px}.answer h3{font-size:15px}
  .answer pre{font-size:12px;padding:12px 14px}
}
</style>
</head>
<body>
<div class="container">
<div class="header">
  <div class="logo"><div class="logo-icon">AI</div><span class="logo-text">准则AI顾问 <span class="status-dot" id="status-dot"></span></span></div>
  <h1>智能准则<em>答疑</em></h1>
  <p class="subtitle">基于资深技术合伙人知识库，24h在线解答会计准则疑难</p>
  <div class="stats">
    <div class="stat-item"><span class="stat-num" id="kb-count">--</span><span class="stat-label">知识条目</span></div>
    <div class="stat-item"><span class="stat-num" id="kb-queries">--</span><span class="stat-label">累计查询</span></div>
    <div class="stat-item"><span class="stat-num">可追溯</span><span class="stat-label">引用来源</span></div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('ask',this)">提问答疑</button>
  <button class="tab" onclick="switchTab('compare',this)">风格对比</button>
</div>

<div id="panel-ask" class="panel active">
  <textarea id="input-ask" placeholder="输入你的会计准则问题...&#10;例如：合同资产和应收账款怎么区分？"></textarea>
  <button class="btn" id="btn-ask" onclick="doAsk()">开始查询</button>
  <div class="loading" id="loading-ask"><div class="spinner"></div><span>AI 正在分析中，请稍候...</span></div>
  <div class="error" id="error-ask"></div>
  <div class="result" id="result-ask">
    <div class="result-header">
      <span style="font-size:12px;color:var(--secondary)">匹配知识条目：<span id="match-count-ask">0</span> 条</span>
    </div>
    <div class="answer" id="answer-ask"></div>
    <div class="sources" id="sources-ask"></div>
  </div>
</div>

<div id="panel-compare" class="panel">
  <textarea id="input-compare" placeholder="输入问题，对比专家风格与通用风格的回答差异..."></textarea>
  <button class="btn" id="btn-compare" onclick="doCompare()">开始对比</button>
  <div class="loading" id="loading-compare"><div class="spinner"></div><span>AI 正在进行风格对比，请稍候...</span></div>
  <div class="error" id="error-compare"></div>
  <div class="compare-result" id="result-compare">
    <div class="compare-col">
      <div class="compare-label expert">专家风格</div>
      <div class="answer" id="answer-expert"></div>
    </div>
    <div class="compare-col">
      <div class="compare-label generic">通用风格</div>
      <div class="answer" id="answer-generic"></div>
    </div>
  </div>
</div>

<div class="footer">准则AI顾问 v2.3 - 内置195条知识库 | Markdown渲染 | Powered by DeepSeek</div>
</div>

var KB = {"qa_count":152,"std_count":43,"qa":[{"q":"审计意见的类型有哪些？什么情况下出具非无保留意见？","a":"根据审计准则1501号和1502号，审计意见分为以下类型：\n\n（1）无保留意见（标准/带强调事项段）：\n- 财务报表公允、合规\n- 带强调事项段的无保留意见——存在需要提醒报表使用者注意但未导致非无保留意见的重大事项（如持续经营重大不确定性、未决诉讼不确定性等）\n\n（2）保留意见（非无保留意见之一）：\n出具条件（满足其一）：\n- 存在重大但不广泛的错报（不是普遍的）；\n- 无法获取充分适当的审计证据，但未发现的错报可能的影响是重大但不广泛的。\n\n（3）否定意见：\n出具条件：存在重大且广泛的错报，导致财务报表整体不公允。\n- 这是最严重的审计意见类型——实际上宣告报表不可用。\n\n（4）无法表示意见：\n出具条件：无法获取充分适当的审计证据，且潜在影响可能是重大且广泛的。\n- 与否定意见的区别：否定意见是'发现了重大问题并确认严重'，无法表示意见是'无法判断'。\n\n'广泛'与'不广泛'的判断标准：\n- 错报是否局限于某一特定要素/账户/项目 → 是→不广泛\n- 是否与报表的重大部分相关（如收入确认） → 是→广泛\n- 与披露相关且对报表理解至关重要 → 可能是广泛\n\n审计意见类型直接影响企业再融资、评级、银行信贷等多项重大事项，是资本市场最关注的信号之一。","cat":"财务报表列报","kw":""},{"q":"审计调整和会计差错更正的财务报表处理差异是什么？","a":"审计调整 ≠ 会计差错更正，两者有本质区别：\n\n审计调整（审计师发现并要求调整）：\n- 目标：使财务报表不存在重大错报\n- 如企业接受调整并在财务报表签发前修正，属于正常编报过程中的调整（不构成前期差错更正）\n- 如企业不接受，审计师出具保留意见\n- 调整结论不自动构成'发现差错'，而是完善报表的过程\n\n会计差错更正（企业自行或监管发现前期报表错误）：\n- 如本期发现前期重要差错，应追溯重述——视同差错从未发生\n- 调整期初留存收益及相关资产负债项目\n- 在附注中披露差错性质、对前期各期的影响\n\n处理差异表：\n| 事项 | 审计调整（本期报表） | 前期差错（以前年度报表） |\n|------|---------------------|---------------------|\n| 调整时点 | 报表签发前的年末调整 | 报表签发后发现 |\n| 调整方式 | 调整本期报表 | 追溯重述前期报表 |\n| 会计处理 | 计入当期损益 | 调整期初留存收益 |\n\n实务常见交叉：上年审计未调整事项在本年新发现证据后如何处理——应按上年差错更正还是本年调整？关键判断：基础事实在资产负债表日是否已存在。","cat":"会计政策/估计变更","kw":""},{"q":"同一控制下企业合并中，如何进行合并报表的追溯调整？","a":"CAS 20规定同一控制下企业合并采用权益结合法，需要追溯调整前期比较数据：\n\n（1）合并资产负债表：期初余额应假定被合并方自最终控制方开始控制起即纳入合并。比较期间的期初数据也要相应调整。\n\n（2）合并利润表：应包含被合并方自合并当期期初至合并日的损益。同时重述前期比较数据，视同被合并方一直纳入合并范围。\n\n（3）合并现金流量表：同样追溯调整比较数据。\n\n（4）合并所有者权益变动表：调整期初留存收益和其他综合收益。\n\n具体编制方法：\n第一步，在合并工作底稿中记录'被合并方自合并当期期初各项目'的金额；\n第二步，在留存收益中调整对应的影响，把资产负债差额调至资本公积；\n第三步，书写附注披露，说明追溯调整对各比较期各项目的具体影响金额。\n\n特别注意事项：\n- 追溯调整可能导致以前期间的盈利指标、资产负债率等出现重大变化，需在附注或管理层讨论中说明。\n- 被合并方在合并日前与最终控制方或其他子公司的内部交易——也需在追溯调整中一并抵销。","cat":"合并报表","kw":""},{"q":"合并报表中处置子公司（丧失控制权）的损益计算和列报？","a":"丧失控制权处置子公司时：\n\n个别报表层面：\n处置损益 = 处置对价 - 处置部分长期股权投资账面价值（按账面成本）；\n仍然持有的剩余股权，如在丧失控制权后仍是联营/合营的，按权益法追溯调整；否则按金融资产分类。\n\n合并报表层面（处置当期的投资收益计算）：\n投资收益 = (处置对价 + 剩余股权公允价值) - (子公司自购买日起持续计算的净资产份额（含评估增值摊销后） + 商誉) + 其他综合收益可重分类转入。\n\n列报位置：\n- 合并利润表中，处置子公司的投资收益单独在利润表上列报（处置子公司及其他营业单位产生的投资收益项目）；\n- 建议在附注中披露处置价格、处置日子公司净资产、商誉转销金额、其他综合收益转入等分项信息。\n\n重要提示：\n- '全部对价'应包括所有从买方取得的对价（现金+非现金+或有对价），以及与处置直接相关的费用（如投行佣金）。\n- 剩余股权的公允价值如何确定——如无活跃市场报价，需要请评估师出具评估意见。","cat":"合并报表","kw":""},{"q":"上市公司重大资产重组的会计处理，如何区分同一控制和非同一控制？","a":"上市公司重大资产重组的类型多样，判断标准依据CAS 20：\n\n同一控制下重组的情形：\n- 重组前后参与各方均受同一母公司或相同多方最终控制，且该控制非暂时性（通常指重组前一年以上、重组后预期至少一年）。\n- 会计处理：权益结合法——被并方资产/负债按原账面价值入账，不确认新商誉。重组产生的差额调整资本公积/留存收益。\n\n非同一控制下重组的情形：\n- 不满足同一控制条件的（大多数借壳上市或三方重组）均为非同一控制。\n- 会计处理：购买法——合并成本超过可辨认净资产公允价值的差额确认商誉。\n\n借壳上市的特别处理（常见反向购买）：\n- 法律上母公司（壳公司）发行股份购买法律上子公司（拟上市主体）全部股权。\n- 会计上，法律上子公司为购买方，法律上母公司为被购买方。\n- 合并报表以法律上子公司为主体，列报法律上子公司的财务信息——但资本结构（股本）按法律上母公司在法律上子公司原有股数的比例模拟。\n\n监管审查重点：同一控制的认定是否勉强（比如使用家族控制、一致行动人协议等方式包装为同一控制）是证券监管中的要害问题。","cat":"企业合并","kw":""},{"q":"首次公开募股（IPO）过程中，股改和净资产折股的会计处理是什么？","a":"有限责任公司整体变更为股份公司（股改）是最常见的IPO前重组：\n\n净资产折股方案：\n整体变更时，原有限责任公司的净资产（包括实收资本、资本公积、盈余公积、未分配利润）按审计值折合为股份公司的股本。\n\n关键会计处理：\n（1）折股后实收资本 = 折合股份总数 × 每股面值（通常为1元）\n（2）净资产余额超出实收资本面的差额 → 计入资本公积（资本/股本溢价）\n（3）折股前的盈余公积和未分配利润的结构：\n  - 按折股前基准日的审计净资产整体转入股份公司\n  - 折股后的资产负债表中，盈余公积和未分配利润是否保留取决于具体方案。\n\n税务注意事项：\n- 整体变更税制处理——盈余公积和未分配利润转为资本公积时：需关注是否产生纳税义务（自然人股东视同分配再投资的争议）。\n- 股改方案中应结合税务师意见逐一明确税务处理。\n\n实务排序：股改基准日的审计报告是基础。建议会计师和验资机构密切配合，确保折股方案合规且不导致税负后患。","cat":"会计政策/估计变更","kw":""},{"q":"亏损合同的预计负债如何确认和计量？","a":"根据CAS 13，亏损合同是指履行合同义务不可避免发生的成本超过预期经济利益的合同。\n\n确认条件：\n- 合同具有约束力（无法单方面取消）；\n- 预期合同总成本 > 合同总收入（即预期净亏损）。\n\n计量金额：\n- 预计负债 = 履行合同的不可避免成本 - 预期经济利益\n- 不可避免成本取'履行合同的净成本'与'终止合同的罚金净额'两者中的较低者。\n\n如果合同存在相关资产（如存货），应先对该资产进行减值测试（按CAS 1存货跌价准备或CAS 8资产减值），不足的部分再确认预计负债。\n\n典型亏损合同场景：\n- 工程承包合同中预计总成本超过合同固定总价（尤其施工期间的调价争议未决时）；\n- 供货合同约定的销售价低于当前市场采购成本或生产成本（市价倒挂）。\n\n实务难点：\n- '不可避免成本'到底包括什么？——包括直接材料、直接人工、变动制造费用、可分拨的管理费用等与合同履行直接相关的增量成本；不包括已分摊的集团管理费用等沉没成本（已发生无法避免的）。\n- 如果合同可以取消（无违约金或赔偿净额很低），则不应确认亏损合同预计负债。","cat":"或有事项","kw":""},{"q":"重组义务的预计负债确认条件和计量要求是什么？","a":"根据CAS 13（或有事项），重组义务确认预计负债需满足两个条件：\n\n（1）存在详细、正式的重组计划：至少包括重组涉及的业务/场所、受影响的职工数量及岗位、预计重组成本支出总额、执行时间表。\n\n（2）已开始实施重组计划或已将重组计划主要内容告知受影响的各方，使他们对重组建立了合理预期（推定义务成立）。\n\n计量内容（重组预计负债的组成）：\n- 职工离职补偿（裁员补偿、提前退休补偿福利等）；\n- 关闭场所或设施的不可避免的租赁违约金；\n- 处置专用设备的损失；\n- 迁移成本（搬迁费、运输费等）。\n\n不计入重组预计负债的项目：\n- 未来期间的预计经营亏损——与重组义务无关（是未来的经营亏损）；\n- 资产处置利得（即使出售资产的收益与重组相关）——需单独确认资产处置损益，不能与重组负债抵销后以净额列报。\n\n实务分层：如果重组涉及辞退职工，辞退福利的确认时点有所提前——取'不能单方面撤回辞退计划日'与'确认重组相关费用日'的孰早者。","cat":"或有事项","kw":""},{"q":"公允价值计量的估值技术有哪些？如何选择合理的估值方法？","a":"根据CAS 39，公允价值计量采用三种估值技术：\n\n一、市场法：\n利用相同或可比资产/负债/企业组合的市场价格及其他相关信息。\n- 常用：可比上市公司倍数法、可比交易价格法。\n- 适用：有活跃交易的可比资产/企业。\n\n二、收益法：\n将未来现金流量转化为单一现值。\n- 常用：折现现金流量法（DCF）、期权定价模型（Black-Scholes、二项树）、多期超额收益法。\n- 适用：非上市企业股权评估、无形资产评估（客户关系、专利）、减值测试。\n\n三、成本法：\n以当前重置相关服务能力所需金额（重置成本）为基础，考虑各种贬值因素。\n- 适用：特殊设备、大型专用生产线（活跃二手市场不存在的）。\n\n选择原则：\n（1）应使用在当前情况下最能代表公允价值、有足够数据支持的估值方法（输入值最大化原则——优先使用可观察市场数据）；\n（2）可以同时使用多种方法并综合分析结果（不应简单取平均数或价格区间的中点）；\n（3）方法一经选定应保持一致使用，变更需说明理由。\n\n实务中不可取的简化：对于无活跃市场报价的股权投资，'以原始投资成本代替公允价值'——这违反了CAS 39的基本要求。","cat":"公允价值计量","kw":""},{"q":"权益结算股份支付的公允价值如何确定？可行权数量的预估调整？","a":"根据CAS 11，权益结算的股份支付属于授予职工的权益工具，按公允价值计量。\n\n公允价值的确定方法：\n（1）股票期权：普遍采用期权定价模型（最常用的是Black-Scholes-Merton模型或二项树模型），参数必须基于授予日的市场数据：股价、行权价、预计波动率（基于历史波动率合理调整）、预计期限（预计期权有效存续期，可短于合同期限）、无风险利率、预计股息率。\n（2）限制性股票：公允价值 = 授予日股票市价 - 行权价（职工的认购价）。不能直接按估值模型——因为限制性股票不能上市交易但不影响内在价值。\n\n可行权数量的预估调整：\n- 每个资产负债表日重新评估预计可行权的权益工具数量（根据最新离职率、业绩完成进度等）。\n- 如果预计可行权数量与先前估计不同，必须修正——但不追溯调整，仅调整当期和未来期间。\n- 影响变动的累计影响在当期确认，即：以前的每期费用不做追溯重述，仅当期损益体现前期估计偏差的全部影响。\n\n特殊情形：如果等待期内取消或结算该股份支付，应立即确认原本在剩余等待期内将确认的全部费用。这是管理层的主动行为，不能延缓确认。","cat":"股份支付","kw":""},{"q":"现金流量表间接法编制的调整项目有哪些？如何验证其正确性？","a":"间接法从净利润出发，调整到经营活动净现金流量。关键调整项目如下：\n\n一、加回非现金项目：\n（+）资产减值准备（存货跌价、信用减值、固定/无形资产减值等）\n（+）折旧与摊销（固定资产折旧、无形资产摊销、长期待摊费用摊销）\n（+）处置资产的净损失（-收益）\n（+）公允价值变动损失（-收益）\n（+）财务费用中的非经营部分（利息支出属于筹资应剔除）\n\n二、经营性应收应付项目变动：\n（-）存货增加（+减少）\n（-）经营性应收增加（+减少）\n（+）经营性应付增加（-减少）\n\n三、递延所得税与股份支付：\n（+/−）递延所得税资产减少（+）/增加（-）\n（+/−）递延所得税负债增加（+）/减少（-）\n（+）股份支付费用（非现金支出的权益结算股份支付）\n\n验证方法——三大勾稽核对：\n（1）资产负债表的期初期末变动数与间接法调整表的应收应付项目变动数是否一致；\n（2）计入经营活动流入的折旧是否等于资产负债表累计折旧变动数（需剔除处置资产的影响）；\n（3）间接法倒算出的经营活动净现金流是否与直接法结果一致。\n\n大部分现金流量表编表差异来自于调整项目遗漏或重分类错误，建议先用工作底稿逐项勾稽。","cat":"现金流量表","kw":""},{"q":"现金流量表中，经营活动、投资活动和筹资活动的划分原则是什么？","a":"根据CAS 31，现金流量分为三大类：\n\n经营活动现金流：企业投资和筹资以外活动产生的现金流。\n- 典型流入：销售商品/提供劳务收到的现金、税费返还、政府补助（与收益相关的非资本性补助）\n- 典型流出：购货款、职工薪酬、各项税费、管理费用和销售费用\n\n投资活动现金流：长期资产购建和处置，及非现金等价物范围内的投资。\n- 典型流入：处置固定资产/无形资产/子公司收回的现金、收到股利和利息\n- 典型流出：购置固定资产/无形资产/子公司支付的现金、对外投资支出\n\n筹资活动现金流：导致企业资本及债务规模和构成发生变化的活动。\n- 典型流入：吸收投资、发行债券、取得借款\n- 典型流出：偿还借款、分配股利、支付利息（注意：利息属于筹资活动——不同于旧准则）、回购股份\n\n两项特殊处理：\n（1）银行存款利息——属于经营活动还是投资活动？准则未明确指定，实务中多数归为经营活动（与日常经营相关）。\n（2）融资租赁支付的本金部分属于筹资活动，利息部分也属于筹资活动（新准则规定）。\n\n划分错误的常见例子：资产证券化收到的现金、固定资产分期付款——需仔细分析条款。","cat":"现金流量表","kw":""},{"q":"利润分享计划和奖金计划的会计处理要点是什么？","a":"根据CAS 9第十三条，存在法定或推定义务的利润分享和奖金计划，应确认预计费用和相关负债。\n\n确认条件：\n（1）因过去事项（职工已提供服务）而承担现时义务；\n（2）金额能够可靠估计。\n\n可靠估计的依据：\n- 利润分享计划的公式已在劳动合同或公司制度中明确（如年度净利润超额部分的X%）；\n- 过往年度已持续执行该计划（推定义务成立）；\n- 资产负债表日能够根据当年实际经营数据和计划公式计算。\n\n计量：\n- 按公式计算出的应分配给职工的计划金额，确认为应付职工薪酬和当期费用；\n- 如果支付期超过12个月，应折现计量。\n\n如果在资产负债表日后、报告批准报出日前，董事会或类似机构批准了具体的利润分享方案：\n- 如果该计划基于截至资产负债表日的服务期和业绩指标确定——属于调整事项，应在财务报表中体现；\n- 如果涉及的业绩与服务期在资产负债表日后——属于非调整事项，仅在附注中披露。\n\n典型实务场景：上市公司的年终奖、绩效奖金、超额利润分享（须在年末预计计提）。","cat":"职工薪酬","kw":""},{"q":"带薪缺勤的会计处理——累积带薪缺勤和非累积带薪缺勤有何区别？","a":"根据CAS 9，职工提供服务的年度内应确认职工未来可享受带薪缺勤的预计费用。\n\n累积带薪缺勤（可结转以后年度使用）：\n- 权利可以结转至下一年度（如未用完的年假可延下年）；\n- 企业在每一资产负债表日，应将职工当年已提供服务但未使用的累积带薪缺勤预计支付的薪酬金额，确认为应付职工薪酬（负债）和当期费用（或资产成本）；\n- 预计金额 = 预期未来将支付的职工薪酬增加金额。\n\n非累积带薪缺勤（不可结转下年）：\n- 权利仅限于当期使用，未使用部分作废；\n- 企业无需对未使用的非累积带薪缺勤确认负债——因为未使用不代表未来要支付；\n- 实际发生的带薪缺勤（如病假）直接计入当期损益。\n\n实务处理：\n- 我国多数企业的年假是强制性的（法定），且通常允许累积（有限结转），属于累积带薪缺勤；\n- 应在每年12月31日评估未使用年假对应的薪酬金额，计提应付职工薪酬。\n- 如果企业制度规定未用年假到某日期作废，需要合理估计哪些员工的年假实际会使用或支付补偿。","cat":"职工薪酬","kw":""},{"q":"长期股权投资的处置损益如何计算？处置后变为金融资产的处理？","a":"根据CAS 2，长期股权投资处置损益 = 处置收入 - 处置部分账面价值（加权平均或个别计价）。\n\n一般处置（仍持有部分，控制权/重大影响不变）：\n处置损益在个别报表中确认。剩余部分仍按原方法核算（成本法/权益法）。\n\n处置全部丧失控制权：\n- 个别报表：处置损益 = 实收价款 - 处置股权的账面价值\n- 合并报表：投资收益 = (处置价款 + 剩余股权公允价值) - (原持股比例计算的子公司净资产份额 + 商誉) + 其他综合收益转入\n\n处置部分至丧失控制权（但仍有重大影响/投资关系）：\n- 剩余股权按丧失控制权日的公允价值重新计量\n- 公允价值与原账面价值的差额进投资收益\n- 此后按权益法/金融资产核算\n\n处置部分至丧失控制权且不保留任何影响：\n- 剩余股权按公允价值作为金融资产的初始计量基础，全额确认处置损益\n\n实务注意事项：处置日与交割日的差异、过渡期损益归属、处置费用的处理。过渡期损益归属通常在产权交易合同中约定，是定价谈判的关键事项。","cat":"长期股权投资","kw":""},{"q":"权益法下如何对被投资方净利润进行公允价值基础调整？","a":"根据CAS 2第十一条，采用权益法核算时，应在被投资方账面净利润基础上进行调整：\n\n调整一——取得投资时被投资方各项可辨认资产和负债公允价值与账面价值的差额对当期损益的影响：\n- 如果投资时被投资方的固定资产公允价 > 账面价 → 以后各期应按公允价多计提折旧，从而调减被投资方净利润；\n- 如果存货公允价 > 账面价且该存货在当期已售出→调减净利润。\n\n调整二——投资方与被投资方会计政策不一致的，按投资方会计政策调整；\n\n调整三——投资方与被投资方资产负债表日不一致的，按统一日期调整（差异不超3个月且已调整期后事项）。\n\n调整四——逆流/顺流交易所含未实现利润按持股比例消除——但此调整应在公允价值基础调整之后进行。\n\n实例计算：\n被投资方报表净利润：100万\n- 投资时固定资产公允价值基础额外折旧（公允价值增值÷剩余年限）：减5万\n- 存货公允价值基础调整（已出售部分）：减2万\n调整后净利润：93万\n投资方应确认投资收益：93万 × 20% = 18.6万","cat":"长期股权投资","kw":""},{"q":"被投资方增资扩股导致投资方持股比例下降的会计处理是什么？","a":"如果被投资方增资扩股导致投资方持股比例下降但未丧失控制权或重大影响：\n\n情形一：控制权不变（如持股从60%降至55%——仍为子公司）：\n- 个别报表不调整长投成本；\n- 合并报表——视为与少数股东的权益交易，增资后按新比例计算的净资产份额与增资前份额的差额，调整资本公积（资本溢价）或留存收益。——不计入投资收益！\n\n情形二：丧失控制权但仍有重大影响（如从60%降至20%）：\n- 个别报表：处置股权对应的部分按实收处置款调整，剩余股权按丧失控制权日的公允价值重新计量→差额进投资收益；\n- 合并报表同理，但不确认处置损益（因是股权稀释不是主动处置）。\n\n情形三：重大影响不变（如从40%降至20%——仅比例变化）：\n- 权益法下，按变化后的持股比例持续计算应享有被投资单位的净损益份额。\n- 之前对应的其他综合收益按比例转入投资收益（如果可重分类进损益）。\n\n核心原则：是否跨类别（控制权/重大影响的存亡）是处理差异的关键。","cat":"长期股权投资","kw":""},{"q":"短期租赁和低价值资产租赁的豁免如何应用？","a":"根据CAS 21第六条，承租人可以选择对以下两类租赁不采用新准则的完整模型：\n\n一、短期租赁豁免（必须同时满足）：\n- 租赁期不超过12个月（注意：包含续租选择权——如果合理确定会续租则租赁期超过12个月）；\n- 不含购买选择权（含购买选择权的不能作为短期租赁处理）。\n\n处理：按期支付租金，直线法（或其他系统合理方法）确认租赁费用，不确认使用权资产和租赁负债。\n\n二、低价值资产租赁豁免：\n- 单项租赁资产全新状态下的绝对价值较低（通常指不超过40,000元或5,000美元）；\n- 与承租人其他租赁资产不高度依赖或相互关联。\n\n处理：同样不确认使用权资产和租赁负债，直接确认租赁费用。\n\n重要限制：\n（1）如果承租人将低价值资产转租或预期转租，不能用豁免；\n（2）低价值判断基于全新资产的绝对价值（不是账面净值）；\n（3）整体租赁合同总价高但单项价值低的（如大量桌椅），各单项都可豁免。\n\n两豁免都是可选处理（不是强制），企业也可选择完整模型处理以保持政策一致性。","cat":"租赁","kw":""},{"q":"新租赁准则下，出租人的会计处理有哪些变动？","a":"与新准则对承租人的重大改革相比，出租人层面基本延续了旧准则CAS 21的分类和处理框架：\n\n融资租赁（转移几乎所有风险和报酬）：\n（1）终止确认融资租赁资产；\n（2）确认应收融资租赁款 = 租赁投资净额（含未担保余值）的现值；\n（3）应收融资租赁款与资产账面价值的差额→资产处置损益（初始确认时确认）。\n\n经营租赁（未转移几乎所有风险和报酬）：\n（1）继续确认租赁资产（按固定资产/投资性房地产核算）；\n（2）租赁收入在租期内按直线法（或其他系统合理方法）确认；\n（3）与租赁相关的初始直接费用于发生时计入当期损益（或资本化后分期摊销）。\n\n特殊变化：新准则新增了对售后回租的指导。卖方-承租人→判断是否属于销售→如果是→确认部分处置损益（仅为转让给买方-出租人的部分）。详见CAS 21第五十至五十二条。\n\n生产商/经销商的特殊处理：如果是生产商/经销商作为出租人进行融资租赁，确认销售收入（租赁付款额的现值or资产公允价值孰低）、销售成本（资产账面价减去未担保余值现值），差额作为销售利润。","cat":"租赁","kw":""},{"q":"承租人如何使用增量借款利率确定租赁负债的折现率？","a":"由于租赁内含利率通常不可取得，承租人需使用增量借款利率作为折现率。\n\n增量借款利率的定义：承租人在类似经济环境下，以类似期间、类似抵押条件获取与使用权资产价值接近的资金所应支付的利率。\n\n确定步骤：\n（1）先确定'无风险基准利率'（同期国债收益率曲线），作为基准；\n（2）根据承租人的信用评级调整信用利差（参考近期银行借款、已发行债券的利率）；\n（3）根据租赁期匹配对应期限利率（不能全用1年期或5年期利率抹平——各笔租赁按各自期限）；\n（4）考虑租赁的宏观经济环境和担保安排的影响。\n\n实务简化方案（适合大多数非金融企业）：\n- 参照同期商业银行对公司发放的抵押贷款基准利率上浮10-30%；\n- 或者：同期LPR/贷款基础利率 + 根据企业信用等级调整的利差。\n\n常见误区：将所有租赁用同一个折现率——忽略了不同租赁的期限、币种、抵押条件差异。","cat":"租赁","kw":""},{"q":"所得税费用的当期和递延部分如何在财务报表中列报？","a":"根据CAS 18，所得税费用（收益）= 当期所得税 + 递延所得税。\n\n当期所得税：\n= 应纳税所得额（税务口径）× 适用税率\n通常在纳税申报后确定，年末按最佳估计数确认（如果未完成汇算清缴）。\n\n递延所得税：\n= （期末递延所得税负债 - 期初递延所得税负债）- （期末递延所得税资产 - 期初递延所得税资产）。\n\n列报规则：\n（1）利润表：'所得税费用'行项目包括当期和递延合计。\n（2）资产负债表：递延所得税资产和递延所得税负债应分别列报为非流动资产和非流动负债（不论预期转回时间）。\n（3）同一纳税主体、同一税种的递延所得税资产和负债可以互相抵销后以净额列报。\n\n计入其他综合收益的递延所得税：\n不是所有递延税变动都进损益——如果暂时性差异的产生源头计入其他综合收益（如FVOCI公允价值变动），其对应的递延税也应计入其他综合收益而非所得税费用。\n\n现金流量表处理：当期所得税的支付属于经营活动现金流出。递延所得税不影响现金。","cat":"所得税","kw":""},{"q":"不确认递延所得税的例外情形有哪些（初始确认豁免等）？","a":"CAS 18规定了初始确认豁免（即某些交易中的初始确认不产生递延所得税影响）：\n\n豁免一——商誉的初始确认：非同一控制下企业合并中初始确认商誉时，不相应确认递延所得税负债（因为此时确认DTL会导致商誉增加——循环反复——属于无效循环）。\n\n豁免二——对于具有以下特征的交易：既不影响会计利润也不影响应纳税所得额（或可抵扣亏损），且交易发生时既不会产生相等的应税和可抵扣暂时性差异。\n典型场景：\n- 非免税的合并中取得的资产和负债的初始确认——产生递延所得税影响\n- 但内部研发形成的无形资产——初始确认不影响损益也不影响税基→豁免\n\n豁免三——构成企业合并且不影响利润的总资产投资：部分情形下，相关税收影响在初始确认时不计入递延税。\n\n还有一项重要豁免：对子公司、分公司投资相关的应纳税暂时性差异，如果母公司能控制转回的时点并且该暂时性差异在可预见的未来很可能不会转回，可以不确认相应的DTL。\n\n实务中必须针对每项暂时性差异的初始来源逐条分析是否适用豁免，不能一刀切处理。","cat":"所得税","kw":""},{"q":"递延所得税资产的确认上限和评估程序是什么？","a":"根据CAS 18第十五条，递延所得税资产的确认上限是'很可能取得足够的应纳税所得额用以抵扣可抵扣暂时性差异'。\n\n评估程序（五步法）：\n\n（1）先确定可抵扣暂时性差异的总额；\n（2）判断其中是否有足够的应纳税暂时性差异（同一纳税主体、同一税务机关），如果有，可相应确认；\n（3）如仍有未抵消的可抵扣差异，评估未来是否有足够的应纳税所得额——需要盈利预测支持；\n（4）盈利预测需基于管理层批准的财务预算（通常3-5年），超过此期间的需特别谨慎；\n（5）每期期末重新评估，如预计未来无法实现，应转回已确认的资产并计入当期所得税费用。\n\n可考虑的税务筹划机会：包括改变折旧方法、出售租赁资产、债券转股等具有可行性的税务策略。\n\n实务保守原则：亏损企业确认DTA需要累计充分证据，包括已签约订单、长期合同、扭亏方案的可执行性等。","cat":"所得税","kw":""},{"q":"合并报表中因内部交易抵销产生的递延所得税如何处理？","a":"合并报表内部交易抵销与递延所得税的关联处理需特别注意。\n\n场景一——内部存货交易：\n合并抵销未实现利润→存货账面价值减少（低于计税基础）→可抵扣暂时性差异→确认递延所得税资产。分录：借：递延所得税资产，贷：所得税费用（递延）。后续存货售出后转回。\n\n场景二——内部固定资产交易：\n合并抵销未实现利润，同时因折旧减少抵销一部分→固定资产账面价值低于计税基础→确认递延所得税资产。每年折旧转回。\n\n场景三——内部债权债务抵销：\n内部应收账款和坏账准备抵销→合并层面坏账准备减少→转回递延所得税资产（借：所得税费用，贷：递延所得税资产）。\n\n税率选择：按购买资产方的适用税率（持有资产并负担税款的主体）。\n\n实务易错点：（1）不知道内部交易也要做递延税——这是合并报表最常见的编制错漏；（2）税率用错了（用了出售方税率而非购买方税率）。","cat":"所得税","kw":""},{"q":"使用价值计算中，折现率如何确定？有哪些常见误区？","a":"根据CAS 8和资产减值准则应用指南，使用价值计算中的折现率必须是税前折现率，并满足以下要求：\n\n（1）反映当前市场的货币时间价值评估（无风险报酬率 + 通胀溢价）；\n（2）反映该资产的特定风险（行业风险、经营风险、规模风险等）；\n（3）不反映已体现在未来现金流量中的风险（避免重复计算）。\n\n常见参照指标：加权平均资本成本（WACC）基础上调整。\n\n常见误区：\n①误用税后折现率（WACC）直接用于使用价值的计算——CAS 8要求税前折现率。两者的关系是：税前折现率 = 税后WACC ÷ （1 - 所得税率）仅在特定条件下近似成立，但不能简单套用。\n②折现率过低——如用3%甚至更低（可能存在低估风险溢价的问题）；\n③对未来现金流的增长率估计过高，同时折现率过低——双向利多，减值测试完全流于形式；\n④折现率未能反映资产组特定的风险，拿集团整体WACC直接用于高风险子公司。\n\n关键底线：折现率参数的确定需有外部可观察数据的支撑，管理层主观判断范围有边界。","cat":"资产减值","kw":""},{"q":"如何确定资产组（CGU）的可收回金额？商誉分摊至CGU后如何测试？","a":"商誉减值测试的CGU与普通资产减值测试的CGU稍有不同：\n\n商誉CGU的确定原则：\n（1）商誉应分摊至能够从企业合并协同效应中受益的最小资产组组合；\n（2）这一资产组不能大于CAS 35界定的经营分部；\n（3）测试用CGU的账面价值 = 直接可辨认资产 + 分摊的商誉 + 分摊的总部资产（如能合理一致基础分摊）。\n\n测试频率：至少每年一次（无论是否有减值迹象）。\n\n测试步骤：\n（1）计算包含商誉的CGU的可收回金额（以集团整体口径而不是母公司单独口径）；\n（2）比较可收回金额与含商誉的CGU账面价值；\n（3）如果可收回金额低于账面价值，差额先冲减商誉至零，剩余部分按比例分摊至CGU的其他资产（按各自账面价值比例）。\n\n实务常见风险：CGU划分过大（如将整个子公司作为一个CGU），使得即使内部某些业务已严重亏损，减值测试也能'蒙混过关'。","cat":"资产减值","kw":""},{"q":"资产减值损失的转回有什么限制？哪些资产不能转回？","a":"根据CAS 8，资产减值损失的转回规则分两类：\n\n可以转回的资产（损失确认后如果可收回金额回升）：\n- 存货（跌价准备可以转回，限于原计提金额）、持有待售资产、递延所得税资产、消耗性生物资产等。\n\n不能转回的资产（减值损失永久确认，即使价值回升也不得转回）：\n- 固定资产减值准备\n- 无形资产减值准备\n- 在建工程减值准备\n- 商誉减值准备\n- 长期股权投资减值准备\n- 采用成本模式计量的投资性房地产减值准备\n- 生产性生物资产减值准备\n\n为什么这些资产不得转回？因为这些长期资产的账面价值回升难以客观验证，允许转回可能导致企业通过操纵减值测试（前期多提后期转回）操纵利润。\n\n实务影响：企业计提以上资产的减值准备需要格外谨慎——一旦计提就是永久的利润侵蚀，无法修复。","cat":"资产减值","kw":""},{"q":"固定资产和无形资产减值测试中，可收回金额如何计算？","a":"根据CAS 8，可收回金额 = Max(公允价值 - 处置费用, 预计未来现金流量现值（使用价值）)。\n\n公允价值减处置费用（FVLCD）：\n- 优先采用活跃市场报价（很少适用）\n- 其次采用可比交易或行业估值倍数\n- 处置费用包括交易税、法律费、佣金等。\n\n使用价值（VIU）的计算要点：\n（1）现金流量预测基于管理层批准的最长5年的最新财务预算；\n（2）超5年的用递减或稳定增长率（不超长期行业平均增长率）；\n（3）折现率采用税前折现率，反映当前市场货币时间价值和资产特有风险；\n（4）预测口径：应基于资产的当前状况，不考虑将来未承诺的重组或改良。\n\n两个金额只需其一会高于账面价值即可通过减值测试。实务中通常计算使用价值（因FVLCD的输入值难以取得）。\n\n特别注意：自创商誉和未确认资产不包含在VIU的计算中。折现率的确定必须有充分的市场依据。","cat":"资产减值","kw":""},{"q":"什么是'实质固定付款额'？在租赁负债计量中如何应用？","a":"根据CAS 21，实质固定付款额是指形式上可能含可变条款但实际上不可避免支付的款项。\n\n判断标准：\n（1）如果付款条款表面上是可变的，但实际上不构成真实的可变性（即企业不可避免要支付），应作为固定付款额处理；\n（2）实质固定付款额的常见情形包括：\n  - 租赁协议约定'最低保底租金+可变超额部分'→最低保底部分是实质固定付款额\n  - 多种付款方案但企业只能选择其中一种→按该方案金额\n  - 多种可行方案但企业必然选择某一方案→按该方案金额\n\n在租赁负债计量中的应用：\n租赁负债 = Σ(实质固定付款额 + 合理确定的购买行权价 + 预期终止租赁需付金额 + 担保余值预计支付额)折现\n\n实务提示：不能仅以合同表面上写了'租金按月调整'就全部按可变处理——要看实质。如果'调整'有保底下限，下限部分是不可避免的实质固定付款额。","cat":"金融工具","kw":""},{"q":"金融资产减值中'信用风险显著增加'如何定义和判断？","a":"根据CAS 22，预期信用损失模型需评估信用风险是否'显著增加'以确定按12个月ECL还是全生命周期ECL计量。\n\n信用风险显著增加的判断标准（列举）：\n（1）内部定价机制——如果实际利率的变动超过阈值，通常表明信用风险显著变化；\n（2）外部评级下调；\n（3）合同付款逾期超过30天（可反证推翻）；\n（4）借款人经营环境或财务状况的重大不利变化；\n（5）预计会降低借款人偿债能力的监管、经济或技术环境变化等。\n\n一旦信用风险显著增加 → 按整个存续期预期信用损失计提。\n\n已发生信用减值的标志（通常指满足以下之一）：\n- 重大财务困难、破产或重整、违反合同（如逾期超90天）、债权人给予让步（非债务人自愿）、很可能破产、金融资产的活跃市场消失等。\n\n实务建议：企业应建立量化的预警指标体系（如违约概率模型、内部信用评级级别迁移矩阵）来客观记录，避免主观判断被质疑。","cat":"金融工具","kw":""},{"q":"衍生金融工具的确认和计量有哪些基本要求？","a":"衍生工具（期货、期权、互换、远期等）根据CAS 22一律以公允价值计量，且变动计入当期损益（FVTPL），除非被指定为套期工具并满足套期会计条件。\n\n基本规则：\n（1）初始确认：取得衍生工具时按公允价值进行初始确认（通常为交易日，零成本期权除外）；\n（2）后续计量：每报告期末重新按公允价值计量，公允价值变动计入'公允价值变动损益'；\n（3）结算：到期或提前平仓时，终止确认衍生工具，累计公允价值变动已体现在各期损益中。\n\n嵌入式衍生工具：如果嵌入式衍生工具不与主合同紧密相关（如可转债的转股权与债务合同的经济特征不一致），且主合同不以公允价值计量，应将嵌入式衍生工具分拆并单独按衍生工具处理。\n\n实务中的重点：公允价值估计方法的选择要符合CAS 39的层级要求。非标准化（场外交易的）衍生工具估值往往落入第三层级，审计难度大、主观性强。","cat":"金融工具","kw":""},{"q":"金融资产转移的'过手安排'和'继续涉入'如何判断？","a":"根据CAS 23（金融资产转移），资产证券化等交易中需要判断金融资产是否应终止确认。核心是风险和报酬是否已实质性转移。\n\n判断流程（三步法）：\n\n第一步——过手测试：如果仍保留收取现金流的合同权利但承担了向最终收款人支付的义务，需满足三个条件（无延误支付、无再投资（除现等价物）、无权抵押或出售原资产）才能被认定为'过手安排'。\n\n第二步——风险报酬转移测试：企业将金融资产所有权上几乎所有风险和报酬转移给转入方的，应终止确认。如果保留了几乎所有风险和报酬，不终止确认。如果不是几乎全部转移也不是几乎全部保留，进入第三步。\n\n第三步——控制测试：如果企业未转移也未保留对金融资产的控制，应按继续涉入程度确认有关资产和相关负债。如果保留了对资产的控制，按继续涉入程度继续确认资产。\n\n实务中信贷资产证券化最复杂的判断就在此——尤其是次级档的持有导致继续涉入的判断。","cat":"金融工具","kw":""},{"q":"如何区分金融负债和权益工具？永续债分类的判断框架是什么？","a":"根据CAS 37，区分金融负债和权益工具的核心标准是——是否存在支付现金或其他金融资产的合同义务。\n\n金融负债的特征（满足任一）：\n（1）存在向其他方交付现金或其他金融资产的合同义务；\n（2）在潜在不利条件下与其他方交换金融资产或负债的合同义务；\n（3）用自身权益工具结算——但股数随公允价变动的（非固定数量换固定金额）。\n\n权益工具的特征（同时满足）：\n（1）不存在交付现金的合同义务；\n（2）如果用自身权益工具结算，必须是固定数量换固定金额的。\n\n永续债分类实操判断框架：\n第一关——是否强制付息？利率跳升机制是否构成经济强制？有→金融负债\n第二关——投资人是否有回售权？有→金融负债\n第三关——发行人是否有必须赎回的义务（如特定日必须赎回）？有→金融负债\n第四关——是否有或有结算条款导致不可避免的交付义务？有→金融负债\n全部通过→权益工具。\n\n实务中大多数永续债被分类为金融负债就是因为利率跳升机制构成经济强制。","cat":"金融工具","kw":""},{"q":"合同资产和合同负债的列报有什么具体要求？","a":"根据CAS 14，合同资产和合同负债应以净额列报。具体规则：\n\n合同资产列报：同一合同下，合同资产减合同负债的净额在资产方列示（如果结果为正）。合同资产需按ECL模型计提减值准备。\n\n合同负债列报：同一合同下，合同负债减合同资产的净额在负债方列示（如果结果为正）。\n\n同一集团的各个子公司之间的不同合同，不能互相抵销。\n\n列报注意事项：\n（1）合同资产和应收账款的区别——应收账款是无条件收款权（仅时间因素），合同资产是附有履约条件的收款权；\n（2）合同资产和合同负债的按期分类——预期一年内收回/清偿的作为流动项目，超一年的作为非流动项目；\n（3）附注中应单独披露合同资产减值准备的变动（期初余额、本期计提、本期转回、核销、期末余额）。\n\n许多上市公司在首次执行新收入准则时，由于未能正确区分合同资产与应收账款，导致披露不准确。","cat":"收入准则","kw":""},{"q":"授予客户知识产权许可的收入确认有什么特殊规定？","a":"根据CAS 14第三十六条，授予客户知识产权许可需要区分为两类：\n\n第一类——属于在某一时点转让的许可：\n- 企业在许可有效期内不会对授予的许可进行重大影响的活动（如静态软件许可、固定内容版权许可）；\n- 在客户能够使用许可并从中获益的时点确认收入。\n\n第二类——属于在一段期间内转让的许可：\n同时满足以下所有条件时属于时段履约：\n（1）企业将从事对许可有重大影响的活动（如持续更新内容）；\n（2）客户将受到该活动的正面或负面影响；\n（3）该活动在发生时不会导致企业向客户转让商品。\n典型场景：品牌授权经营（加盟费）、持续更新的软件许可（SaaS）。\n\n基于销售或使用情况的特许权使用费：只在客户后续销售或使用实际发生时确认收入（不能提前按估计确认）。这是知识产权许可的一个特别规定。","cat":"收入准则","kw":""},{"q":"合同中包含的重大融资成分如何判断和处理？","a":"根据CAS 14第十七条，如果合同包含重大融资成分，应调整交易价格以反映货币时间价值。\n\n判断是否存在重大融资成分：\n（1）付款时点与商品/服务转让时点的时间间隔是否超过一年（超过一年是强烈信号）；\n（2）合同定价是否包含了融资成分的考量；\n（3）交易是否属于预付款后一年内交货（通常无重大融资成分）。\n\n处理方式：\n- 客户预付款（预收款）→ 融资利益归属客户→ 企业确认收入时加计利息收入\n- 企业先交货后收款→ 融资利益归属企业→ 交易价格折现后确认收入\n\n折现率的确定：采用合同双方单独交易中会采用的折现率，通常为企业的借款利率（如向客户提供赊销的隐性融资成本）。\n\n不调整的例外（简化处理）：转让商品与付款时点间隔不超过一年；或者企业可以选择不单独核算（金额影响不重大时）。","cat":"收入准则","kw":""},{"q":"可变对价的估计和限制条件是什么？什么是'极可能不会发生重大转回'？","a":"根据CAS 14第五十条，交易价格中包含的可变对价（如折扣、退款、绩效激励、罚款等）应按期望值法或最可能金额法估计。\n\n限制条件：可变对价计入交易价格的金额限于'极可能不会发生重大转回'的金额。这是收入准则中非常重要的保护条款。\n\n实务判断步骤：\n（1）估计可变对价总额（用期望值法或最可能金额法）；\n（2）评估转回的可能性和重大性——如果存在重大转回风险，应将该部分剔除。\n\n评估转回风险的具体因素：\n- 不确定因素是否贯穿整个合同期（如长期业绩目标）→转回风险高\n- 是否有历史数据支持估计→有历史数据→风险低\n- 不确定因素是否超出企业控制范围（如市场波动）→风险高\n\n实务中软件许可合同的绩效奖励、工程合同的提前完工奖、销售的年度返利都需要评估这个限制条件。不要高估可变对价导致后续大额冲回。","cat":"收入准则","kw":""},{"q":"收入确认的五步法模型的每一步操作要点是什么？","a":"CAS 14新收入准则五步法：\n\n第一步——识别与客户订立的合同：合同必须具有商业实质、对价很可能收回、双方已批准并承诺履行义务。\n\n第二步——识别合同中的单项履约义务：判断商品或服务是否可明确区分——客户可否单独受益+可否与合同其他承诺区分。\n\n第三步——确定交易价格：包括固定对价、可变对价（期望值法或最可能金额法）、重大融资成分（折现）、非现金对价（公允价值）、应付客户对价等变量的考虑。\n\n第四步——将交易价格分摊至各单项履约义务：按各履约义务的单独售价比例分摊。单独售价可观察的优先，否则估计（市场调整法、成本加毛利法、余值法）。\n\n第五步——在履行履约义务时（或过程中）确认收入：区分时点履约和控制权转移判断指标vs时段履约条件和履约进度计量（产出法或投入法）。\n\n五步法看似简单，但每一步都有大量判断空间，必须有充分的合同分析和底稿记录支持。","cat":"收入准则","kw":""},{"q":"合并报表中外币折算差额的计算和列报有什么要求？","a":"境外经营外币报表折算差额 = 境外经营净资产 × （期末汇率 - 历史汇率） + 境外经营净利润 × （期末汇率 - 平均汇率）\n\n实务计算要点：\n（1）资产负债项目：按期末即期汇率折算；\n（2）所有者权益项目（除未分配利润外）：按历史汇率（发生日即期汇率）；\n（3）利润表项目：按交易发生日即期汇率或当期平均汇率；\n（4）折算差额在资产负债表'其他综合收益'中单独列报。\n\n处置境外经营时：将累计外币折算差额由其他综合收益转入处置当期投资收益——这是利润表中处置收益的重要组成部分，很多企业提前预估不足。\n\n另外：母公司个别报表中对境外经营的长期应收款（实质上构成净投资的部分）产生的汇兑差额也计入其他综合收益，处置时转入损益。","cat":"合并报表","kw":""},{"q":"如何判断投资方是否对被投资方具有'控制'？三要素如何具体应用？","a":"根据CAS 33，控制的判断基于三个要素（缺一不可）：\n\n要素一：拥有对被投资方的权力——即实质性权利而非保护性权利。实质性权利包括表决权（直接持股或通过协议）、任免关键管理人员的权利、否决重大决策的权利等。\n\n要素二：通过参与被投资方的相关活动享有可变回报——回报可以是正的也可以是负的，包括股利、利息、管理费、协同效应收益，也包括可能的亏损和担保责任。\n\n要素三：有能力运用对被投资方的权力影响可变回报的金额——这是权力与回报的关联关系，即投资方是主要责任人而非代理人。\n\n实务判断难点：（1）分散持股的情况——无单一股东持有超过50%时，需考虑股东协议、分散程度、历史投票模式等；（2）结构化主体——不能用传统股权逻辑判断，要穿透看决策权的实质。","cat":"合并报表","kw":""},{"q":"合并报表中对联营企业和合营企业的权益法核算要注意哪些问题？","a":"合并报表层面，对合营企业和联营企业采用权益法核算，需要特别注意：\n\n（1）统一会计政策：如果联营企业采用的会计政策与集团不一致，应按集团政策调整（或按准则规定无需调整的除外）。\n\n（2）统一资产负债表日：如果联营企业资产负债表日与集团不一致（如集团12月31日，联营企业9月30日），应按统一日期编制调整报表（差异不超过三个月且已调整期后重大事项影响的可以通用）。\n\n（3）取得投资时公允价值基础调整：以投资时联营企业各项可辨认资产/负债的公允价值为基础，调整其净利润（如按公允价值提折旧）。\n\n（4）内部交易未实现利润：集团与联营企业间的顺流、逆流交易未实现利润按持股比例抵消。\n\n实务常见错误：合并报表编制人员忽略了权益法下的这些调整，导致投资收益计量不准确。","cat":"合并报表","kw":""},{"q":"合并报表中，同一控制下企业合并和不同一控制下企业合并的处理差异有哪些？","a":"同一控制（权益结合法）vs 非同一控制（购买法）的关键差异：\n\n同一控制：\n（1）被合并方资产/负债按原账面价值并入，不确认新的商誉；\n（2）合并对价与账面价值的差额调整资本公积/留存收益；\n（3）合并利润表包括被合并方自期初起的损益；\n（4）比较报表需追溯调整，视同合并后报告主体一直存在。\n\n非同一控制：\n（1）被购买方资产/负债按购买日公允价值计量；\n（2）合并成本超过可辨认净资产公允价值的差额确认商誉；\n（3）合并利润表仅包括购买日后的损益；\n（4）比较报表不追溯调整。\n\n两种方法的商业实质完全不同——同一控制是集团内部重组，非同一控制是独立交易主体的合并。不能混淆。","cat":"合并报表","kw":""},{"q":"合并报表中母子公司之间发生的内部债权债务和内部交易损益如何抵消？","a":"合并报表内部交易抵消的三步标准做法：\n\n第一步，抵消内部销售：借记营业收入，贷记营业成本。此前的错账是只抵消收入的80%——正确做法是所有内部销售收入都应100%抵消。\n\n第二步，抵消未实现内部利润：期末存货中包含的未实现内部销售利润（即未对外售出的存货对应的毛利）需抵消——借：营业成本，贷：存货。\n\n第三步，抵消内部债权债务：应收应付账款对抵，利息收支对抵。内部互相持有的债券投资与应付债券对抵，差额（如溢价购买）冲减投资收益。\n\n对于逆流交易（子公司卖给母公司），还需将未实现利润中属于少数股东的部分单独计算冲减少数股东损益。","cat":"合并报表","kw":""},{"q":"被购买方在购买日之前的亏损产生的可抵扣暂时性差异，购买方如何处理？","a":"根据CAS 18和CAS 20，购买日被购买方原有的可抵扣暂时性差异（包括可抵扣亏损）：\n\n（1）购买日应在识别可辨认资产和负债时，同步评估被购买方的可抵扣暂时性差异是否满足确认条件；\n（2）如果很可能获得未来应纳税所得额，应作为递延所得税资产确认——这会增加可辨认净资产的计量金额，从而减少商誉；\n（3）如果在购买日后12个月内（计量期间），获得关于购买日已存在事实的新信息，可调整购买日的递延所得税资产（对应调整商誉）；超过12个月的则计入当期损益。\n\n特别提示：购买日评估递延所得税资产的可实现性应保守——不能以'本次合并的协同效应'为由预期未来盈利。","cat":"企业合并","kw":""},{"q":"购买日如何识别被购买方的可辨认无形资产？","a":"根据CAS 20，无论被购买方是否在账面上确认，只要满足可辨认性标准（合同权利或可分离），都应在购买日单独确认并计量。\n\n常见可辨认无形资产清单：\n（1）与市场相关的：商标、商号、互联网域名、非竞争协议；\n（2）与客户相关的：客户名单、订单/生产积压、客户关系（含非合同性）；\n（3）与技术相关的：专利技术、非专利技术、计算机软件、数据库；\n（4）与艺术相关的：版权、艺术作品。\n\n估值方法：市场法（可比交易）、收益法（超额收益法、许可费节省法）、成本法（重置成本）。\n\n核心难点：商誉与可辨认无形资产的边界界定——未识别的无形资产会全部归入商誉，导致商誉虚高、无形资产被低估，影响后续减值测试的准确性。","cat":"企业合并","kw":""},{"q":"通过多次交易分步实现非同一控制下企业合并时，之前持有的股权如何处理？","a":"根据CAS 20第四十七条，分步实现企业合并的：\n\n（1）购买日之前持有的被购买方股权，应当按照购买日公允价值进行重新计量；\n（2）公允价值与账面价值的差额，计入当期投资收益；\n（3）购买日之前持有的股权涉及其他综合收益的，应当转为购买日所属当期投资收益（可重分类进损益的部分）。\n\n关键时间节点：购买日的确定至关重要。实务中必须基于实质控制权转移的标志（如合并协议获批、财产权交接完毕、购买方已支付大部分对价等）综合判断，不能仅以工商变更为准。","cat":"企业合并","kw":""},{"q":"企业合并中，购买日如何确定合并对价的公允价值？","a":"合并对价包括购买方支付的全部对价的购买日公允价值。具体包括：\n\n（1）支付的现金或现金等价物——按面值计量；\n（2）发行的权益工具——按购买日的公允价值（如果有活跃市场采用收盘价，否则需要评估）；\n（3）承担的负债——按购买日公允价值计量；\n（4）或有对价——按购买日公允价值计入合并成本，后续公允价值变动根据其分类（金融资产/负债或权益工具）处理。\n\n实务中容易忽略的是：如果合并协议约定分期付款，应将未来付款额折现到购买日计入合并且减去折现。折现率应反映企业的借款成本。","cat":"企业合并","kw":""},{"q":"非同一控制下企业合并中，合并成本与享有可辨认净资产公允价值份额的差额如何处理？","a":"根据CAS 20，合并成本大于可辨认净资产公允价值份额的差额，确认为商誉；合并成本小于可辨认净资产公允价值份额的差额（负商誉），经复核后计入当期损益。\n\n实务三步法：\n第一，全面识别被购买方可辨认资产、负债，包括账外无形资产（客户关系、专利、商标等）；\n第二，按公允价值准确计量各项可辨认资产和负债；\n第三，复核无误后，正差确认为商誉，负差计入营业外收入。\n\n特别注意：负商誉必须在附注中详细披露产生的原因和金额。监管层对廉价购买交易的关注度很高，务必留存充分的估值底稿。","cat":"企业合并","kw":""},{"q":"递延收益和预收款项的区别是什么？","a":"递延收益和预收款项虽然都在资产负债表的负债方，但属于性质完全不同的项目：\n\n递延收益：\n- 属于政府补助的递延项目（收到政府款项但相关资产/费用尚未确认时结转至该科目）；\n- 随着相关资产折旧或费用发生，分期转入其他收益或营业外收入；\n- 本质上是一种'待确认的收益'，不是企业欠第三方的负债。\n\n预收款项（合同负债）：\n- 属于企业向客户收取的合同价款但尚未履约（商品/服务未转让）；\n- 随着履约义务的完成，转入营业收入；\n- 属于典型的客户合同产生的负债，是结算义务。\n\n两者的区别表：\n| 维度 | 递延收益 | 预收款项/合同负债 |\n|------|---------|------------------|\n| 产生来源 | 政府补助 | 客户支付对价 |\n| 对手方 | 政府 | 客户 |\n| 日后转归 | 转入其他收益 | 转入营业收入 |\n| 法律性质 | 非负债性 | 真正的负债 |\n\n不应混淆两者——如果把政府补助错误地计入预收账款，将掩盖政府补助的财务影响，也无法正确在附注中披露政府补助的性质和金额。","cat":"政府补助","kw":""},{"q":"存货审计中，盘点差异的调整和披露要求是什么？","a":"对于存货盘点发现的差异，会计处理分为两个层面：\n\n日常盘点差异（非年末盘点）：\n- 自然消耗范围内的差异（正常损耗）：计入当期制造费用或管理费用。\n- 管理责任导致的异常差异：先记入待处理财产损溢，查明原因后——可收回的由责任人赔偿（其他应收款），不可收回的计入当期损益。\n\n年末（资产负债表日）盘点差异：\n- 盘亏在期末调整为当期损益；\n- 盘盈按重置成本冲减当期管理费用。\n- 所有盘盈亏均需要通过'待处理财产损溢'科目过渡，不能在利润表直接确认。\n\n披露要求：\n- 盘盈/盘亏金额重大的，应在附注中说明原因和影响金额；\n- 属于上年度差错的盘盈/盘亏（如上期已结束审计后发现差错），应按前期差错处理——追溯调整而非在当期损益体现。\n\n实务中常见注意事项：\n- 年末盘点必须是全盘而非抽查，除非采用永续盘存法且验证定期抽查的准确性；\n- 盘点差异的截止性处理——区分本年和跨年的出入库对盘点差异的影响。","cat":"现金流量表","kw":""},{"q":"套期会计的三种类型是什么？各自适用于什么场景？","a":"根据CAS 24（套期会计），套期关系分为三类：\n\n公允价值套期：\n- 对冲已确认资产/负债或未确认确定承诺的公允价值变动风险。\n- 典型场景：用利率互换对冲固定利率债券的公允价值变动风险。\n- 套期工具和被套期项目的公允价值变动均计入当期损益，互相抵销。\n\n现金流量套期：\n- 对冲已确认资产/负债或极可能发生的预期交易的现金流量变动风险。\n- 典型场景：用远期外汇合约对冲未来采购外币现金流的汇率风险。\n- 套期工具有效部分的公允价值变动计入其他综合收益（套期储备），无效部分计入当期损益。\n\n境外经营净投资套期：\n- 对冲境外经营净投资的外汇风险。\n- 典型场景：用外币借款对冲境外子公司净投资的外汇风险。\n- 套期工具的有效部分计入其他综合收益（外币折算差额），无效部分计入当期损益。\n\n套期会计的三大硬条件：\n（1）有正式的套期关系文档（指定和记录套期关系、风险管理目标和套期策略）；\n（2）套期预期高度有效（80%-125%之间）且能可靠计量；\n（3）套期有效性可定期评估并持续满足。\n\n如果企业不满足套期会计条件，两种衍生工具的公允价值变动都直接计入当期损益——对利润波动大的企业影响显著。","cat":"金融工具","kw":""},{"q":"首次执行企业会计准则时，如何追溯调整期初余额？","a":"根据CAS 38（首次执行企业会计准则），首次执行日的会计处理原则是'追溯调整，豁免优先'：\n\n基本规则：\n- 对所有事项按照企业会计准则进行追溯调整，如同企业一直采用准则进行会计处理。\n- 但在以下情形可以豁免追溯（采用未来适用法）：\n\n主要豁免事项：\n（1）企业合并：不以追溯重述在首次执行日前完成的企业合并；\n（2）资产减值：在首次执行日对所有资产按新准则进行减值测试，但不在期初计提商誉减值准备（留待后续测试）；\n（3）公允价值计量豁免：某些情形下可以公允价替代认定为成本入账物业、厂房和设备；\n（4）累计折算差额豁免：所有境外经营的外币报表累计折算差额在首次执行日视为零。\n\n对实务操作的关键要求：\n- 编制「首次执行日资产负债表」（即期初的资产负债表），并保持与上期末资产负债表勾稽；\n- 详细记录每一项追溯调整的计算底稿；\n- 在报表附注中披露准则转换对财务状况的影响。\n\n这主要适用于非上市企业转版新准则或IPO前的制度转换。","cat":"会计政策/估计变更","kw":""},{"q":"经营分部的确定标准和披露要求是什么？","a":"根据CAS 35（分部报告），经营分部的确定基于'管理法'，即按照企业内部管理报告结构划分：\n\n报告分部确定标准（满足以下三个定量门槛之一即需单独披露）：\n（1）该分部的收入（含对外交易和分部间交易）占所有分部总收入10%以上；\n（2）该分部的利润（或亏损）的绝对值占所有盈利分部合计利润与所有亏损分部合计亏损两者中绝对值较大者的10%以上；\n（3）该分部的资产占所有分部总资产的10%以上。\n\n合并不达标分部的限制：\n- 合并后的披露分部数量不宜超过10个（如有更多，应合并相似的分部）；\n- 所有单独报告的分部对外收入合计不得低于企业总收入的75%。如果达不到75%，需持续增加分部直到达标。\n\n披露内容：\n- 分部收入（区分对外交易和分部间交易）、分部费用、分部利润、分部资产和负债；\n- 分部收入、费用、利润到合并报表数据的调节表（十分关键也是审计重点）。\n\n实务中一个常见问题：部分企业以'整体经营'为由不披露分部信息——如果企业有多条差异明显的业务线（如地产+金融）、跨地域经营且不同地区盈亏结构显著不同，就应划分经营分部。","cat":"财务报表列报","kw":""},{"q":"设定受益计划和设定提存计划的区别是什么？","a":"根据CAS 9（职工薪酬），离职后福利分为两类：\n\n设定提存计划（Defined Contribution Plan）：\n- 企业向独立的基金或保险机构缴存固定费用后，不再承担进一步支付义务；\n- 会计处理简单——每期计提费用计入当期损益（或资产成本），对应的负债在支付时冲减；\n- 我国的法定养老保险和失业保险属于此类。\n\n设定受益计划（Defined Benefit Plan）：\n- 企业承诺职工退休后享有固定金额的福利（如每月补充退休金），企业必须确保计划的资产足以支付承诺的福利；\n- 会计处理复杂——每一报告期需要精算评估义务现值（PBO）、计划资产公允价值，并确认净负债或净资产；\n- 精算损益（如精算假设变动导致的负债变动）计入其他综合收益（不能重分类进损益）；\n- 净利息收入/费用计入财务费用；服务成本计入当期损益。\n\n实务提示：我国多数企业采用设定提存计划（基本养老保险）。设定受益计划主要在部分大型国有企业和外资企业中采用（如补充养老计划），会计处理复杂且依赖精算师的专业判断。","cat":"职工薪酬","kw":""},{"q":"新金融工具准则下，应收账款坏账准备与旧准则的衔接如何处理？","a":"新旧金融工具准则衔接的核心问题在于ECL模型与已发生损失模型的转换。根据CAS 22的衔接规定：\n\n（1）追溯调整原则：新准则一般要求追溯调整，但提供了若干简化处理。\n\n（2）不重述比较数据：首次执行新准则（如从CAS 22旧版切换到2017修订版）时，无需重述比较期间数据。只需将首次执行日的账面价值差额调整期初留存收益或其他综合收益。\n\n（3）应收账款坏账衔接实操：\n- 在首次执行日，按新准则ECL模型重新计算全量应收账款的预期信用损失；\n- 新旧模型计算的坏账金额差额，调整期初留存收益；\n- 不在利润表中反映为当期的信用减值损失变化。\n\n实务备忘：\n- 首次执行日的ECL计算底稿必须完整保留，作为审计证据；\n- 如果新旧差额较大，应在附注中单独说明过渡影响；\n- 首次执行日后新产生的应收款一律按新准则ECL模型计提——这不属于衔接问题，属于日常核算。","cat":"金融工具","kw":""},{"q":"业绩补偿（对赌协议）中，收到业绩补偿款如何会计处理？","a":"企业合并中的业绩补偿（对赌）涉及两个层次的处理：\n\n一、初始确认（购买日）：\n按购买日公允价值将业绩补偿确认为或有对价，作为合并成本的一部分。\n\n二、后续计量（两种路径）：\n路径1——作为CAS 22金融资产：在每一个资产负债表日按公允价值重新计量，变动计入当期损益。如果实际收到补偿高于公允价值，差额同样计入损益。\n路径2——作为权益工具：不重新计量，后续变动在权益内部调整。\n\n三、收到现金补偿时：\n\n如果业绩补偿在初始确认时已按公允价值计入合并成本：\n借：银行存款\n贷：交易性金融资产（或相应权益）\n   （差额可能进投资收益/资本公积）\n\n实务中最常见错误：购买日不做估计（没有确认或有对价），收到补偿款时直接计入营业外收入——这在审计中大概率会被要求追溯调整。\n\n另外要注意：业绩补偿方（原股东）用自身持有的上市公司股票进行补偿时，构成非货币性交易or回购，处理更复杂，需仔细分析合同的法律实质。","cat":"企业合并","kw":""},{"q":"共同经营和合营企业的会计处理差异是什么？","a":"根据CAS 40（合营安排），共同经营和合营企业的会计处理差异显著：\n\n共同经营的处理（各参与方直接享有权利和承担义务）：\n（1）确认其对应的资产份额（包括共同持有的资产和自身的资产）；\n（2）确认其对应的负债份额（包括共同承担的负债和自身的负债）；\n（3）确认其对应的收入份额和费用份额。\n本质上，共同经营的各参与方将合营安排的资产、负债、收入和费用按份额直接并入自己的账目。\n\n合营企业的处理（各参与方仅对该企业的净资产享有权利）：\n（1）按照CAS 2采用权益法核算其在合营企业中的权益；\n（2）或按照CAS 22指定的FVTPL模式计量（风险投资机构、共同基金等可选择）。\n\n两者的实质性差异：\n- 共同经营：参与方直接在自身报表中确认份额化的资产/负债/收入/费用（穿透处理）。\n- 合营企业：参与方只在报表中体现'长期股权投资'一项，同时按权益法确认投资收益。\n\n判断的关键：合营安排是否赋予各参与方对特定资产的权利或对特定负债的义务——有→共同经营；无→合营企业。","cat":"长期股权投资","kw":""},{"q":"自行研发的无形资产，开发支出资本化的五个条件是什么？","a":"根据CAS 6（无形资产），开发阶段支出需同时满足以下五个条件才能资本化：\n\n（1）完成该无形资产以使其能够使用或出售在技术上具有可行性——有详细可执行的技术路线图；\n（2）具有完成该无形资产并使用或出售的意图——非纯研究目的；\n（3）无形资产产生经济利益的方式（使用或出售），应能证明其市场或内部有用性；\n（4）有足够的技术、财务资源和其他资源支持，以完成开发和实现商业化；\n（5）归属于该无形资产开发阶段的支出能够可靠地计量。\n\n实务判断要点：\n- 研究阶段（探索性的，非具体目标）全部费用化。开发阶段（有明确应用目标）满足五条件才能资本化。\n- 区分研究和开发阶段的界限是关键难点——一般以'立项通过'或'原型开发通过'作为分界。\n- 如果无法区分研究和开发阶段，应全部费用化（谨慎处理）。\n\n容易疏忽的问题：已经资本化的开发支出在后续使用过程中如果发现技术过时或被替代，需及时计提减值准备。","cat":"资产减值","kw":""},{"q":"生物资产的分类和计量有什么特殊规定？","a":"根据CAS 5（生物资产），生物资产分为消耗性生物资产和生产性生物资产两大类：\n\n消耗性生物资产（为出售或收获为农产品而持有）：\n- 如生长中的林木、存栏待售的牲畜、养殖中的鱼类。\n- 按成本模式计量（初始确认为取得成本+后续管护费），期末减值测试。\n\n生产性生物资产（为产出农产品、提供劳务或出租而持有）：\n- 如果树、产奶的牛、种畜。\n- 初始确认按取得成本；后续计量可选择成本模式或公允价值模式。\n- 在达到预定生产经营目的后，按类似固定资产计提折旧。\n\n公益性生物资产（以防护、环境保护为主要目的）：\n- 如防风固沙林、水土保持林。\n- 按成本模式初始确认，不计提折旧。\n\n生物资产的特殊性：（1）天然增殖（幼崽出生）使资产数量增加，有别于一般资产的产出；（2）农产品收获时（如挤奶、伐木），生物资产未处置但价值已转移为农产品存货。\n\n实务难点：公允价值模式的选择——CAS 5允许（有条件）生物资产采用公允价值模式，但大多数企业选择成本模式以避免公允价值波动的估值困难。","cat":"生物资产","kw":""},{"q":"境外经营的恶性通货膨胀经济下会计处理有什么特殊要求？","a":"根据CAS 19以及《企业会计准则解释第5号》，如果境外经营处于恶性通货膨胀经济中（通常定义为三年累计通货膨胀率超过100%），应按IAS 29的要求处理：\n\n（1）该境外经营的财务报表应先按一般物价指数重述（消除通货膨胀的影响）；\n（2）重述后的财务报表再按期末即期汇率折算为人民币；\n（3）不单独列报外币折算差额——重述造成的调整计入当期损益或其他综合收益。\n\n我国对处于恶性通胀经济中的境外经营的特殊处理，目前在实务中适用场景较少（主要涉及在南美、非洲等部分高通胀国经营的企业）。但其核心原则是：通货膨胀对财务报表的影响必须被消除，不能使账面利润因通胀而虚增。\n\n实务建议：如果企业在高通胀国有经营，应建立专门的会计台账，分离出通胀对报表的影响，以帮助集团层面做出正确的合并调整。","cat":"外币折算","kw":""},{"q":"外币财务报表折算的四种汇率分别适用于哪些项目？","a":"根据CAS 19（外币折算），将境外经营的财务报表折算为人民币时，需正确使用不同汇率：\n\n一、资产负债表项目：\n- 资产和负债项目：期末即期汇率（资产负债表日汇率）\n- 所有者权益项目（除'未分配利润'外）：历史汇率（发生时的即期汇率）\n\n二、利润表项目：\n- 收入和费用项目：交易发生日的即期汇率，或即期汇率的近似汇率（如当期平均汇率）\n\n三、折算差额：\n- 外币报表折算差额在资产负债表'其他综合收益'中单独列报，不计入当期损益。\n\n四、特殊项目的处理：\n- 利润分配项目（如宣告发放股利）：按宣告日的汇率折算\n- 实收资本：按出资日的汇率折算，后续不变。\n\n实务中常见误区：\n- 将一个子公司的'年初未分配利润'直接从上年折算后报表抄入（这是对的），但同时将上年的外币折算差额也一并抄入——错误！每年需重新按新汇率计算累计折算差额。\n- 处置境外经营时，原计入其他综合收益的累计外币折算差额应转入处置当期损益。","cat":"外币折算","kw":""},{"q":"专门借款和一般借款的资本化计算方法差异是什么？","a":"CAS 17对专门借款和一般借款的资本化计算分别采用不同方法：\n\n专门借款（为建造资产而专门借入）：\n资本化金额 = 借款当期实际发生的利息费用（按实际利率法） - 将借款进行短期投资取得的投资收益。\n优点：无需加权平均资产支出，全部借款利息都可以资本化（扣减闲置收益后）。\n\n一般借款（非专为建造资产而借入的多用途借款）：\n资本化金额 = 累计资产支出超过专门借款部分的加权平均额 × 占用一般借款的加权平均资本化率。\n要点：\n（1）加权平均资产支出 = Σ（每笔资产支出 × 占用天数/期间总天数），通常按季度或年度计算；\n（2）加权平均资本化率 = 当期一般借款利息总额 ÷ 一般借款本金加权平均数；\n（3）一般借款资本化金额不得超过当期一般借款实际利息总额。\n\n实务常见错误：\n- 将专门借款的闲置收益计算错误（收益率取银行活期而不是实际的短期投资回报率）；\n- 加权平均资本化率用上期/上年度数据代替本期实际利率。","cat":"借款费用","kw":""},{"q":"借款费用资本化的开始、暂停和停止条件是什么？","a":"根据CAS 17（借款费用），资本化条件为：\n\n开始资本化（三个条件同时满足）：\n（1）资产支出已经发生（已用现金、转移非现金资产或承担带息债务等形式为建造付出）；\n（2）借款费用已经发生（已实际借入资金并计息）；\n（3）为使资产达到预定可使用或可销售状态所必要的购建或生产活动已经开始。\n\n暂停资本化：\n- 如果购建或生产活动发生非正常中断，且中断超过3个月的，应暂停资本化。\n- 非正常中断的判断：因不可抗力（如异常恶劣天气）、劳资纠纷、资金链断裂等原因导致的中断；正常中断（如季节性停工、例行安全检修）无需暂停。\n\n停止资本化：\n- 所建造或生产的资产达到预定可使用或可销售状态时，停止资本化。\n- 判断资产是否达可使用状态的核心标志：实体建造（含安装）工作已全部完成或实质上已完成；试运行结果表明能够正常运转或营业。\n\n资本化金额的计算：\n专门借款：资本化金额 = 当期实际借款利息 - 未动用借款的临时投资收益\n一般借款：资本化金额 = 累计资产支出超过专门借款部分 × 加权平均资本化率","cat":"借款费用","kw":""},{"q":"存货跌价准备的计提方法有哪些？如何确定可变现净值？","a":"根据CAS 1（存货），存货期末按「成本与可变现净值孰低」计量。\n\n存货跌价准备计提方法：\n（1）单项计提法（逐项比较）：对重大或特殊的存货逐项比较成本和可变现净值——这是首选方法。\n（2）分类计提法（按类别比较）：对数量繁多、单价较低的存货，可以按存货类别合并计提。\n（3）总体计提法：不推荐单独使用，只在少数特殊场景下配合使用。\n\n可变现净值的确定：\n- 可变现净值 = 估计售价 - 至完工估计将要发生的成本 - 估计的销售费用和相关税费\n- 有合同的按合同价（不超合同量），超过合同量部分按一般售价\n- 估计售价应当考虑资产负债表日后事项的影响\n\n容易出错的地方：市场价下跌但已签销售合同的部分不能用市场价格——必须用合同价格。同时在执行合同价时还要判断合同是否为亏损合同（成本超过收入时需额外确认预计负债）。","cat":"资产减值","kw":""},{"q":"非流动资产处置损益的列报和披露有哪些新要求？","a":"根据财会〔2017〕30号文（关于政府补助等准则的应用），非流动资产处置损益列报分两个层面：\n\n利润表层面：\n- 资产处置收益（损失以负号列示）：反映处置固定资产、在建工程、无形资产、生产性生物资产等非流动资产产生的损益；\n- 营业外收入/支出：反映报废毁损资产产生的损益（非正常处置）。\n\n附注披露层面：\n- 须按资产类别分别披露处置收入、处置资产的账面价值、处置费用和处置净损益；\n- 如果是持有待售资产处置损益，需单独注明属于持有待售相关的处置损益。\n\n实务提醒：\n- '处置'和'报废'的区分是判断列报科目的关键。有意识出售/交换的属于处置（资产处置收益科目），被动报废损毁的属于营业外收支。\n- 如果处置的是子公司（丧失控制权），不在'资产处置收益'中列报，而应单独以'处置子公司及其他营业单位产生的投资收益'项目列报（或合并利润表的一部分）。","cat":"长期股权投资","kw":""},{"q":"委托/受托经营（代管）业务的合并判断要点是什么？","a":"在实务中，企业代管他人资产（受托经营）或被他人代管（委托经营）时，能否纳入合并报表的判断应以CAS 33的'控制'三要素为基础：\n\n受托经营方是否需要合并：\n（1）是否对受托资产拥有实质性决策权（如自主决定生产计划、销售定价）？\n（2）是否从受托经营中获得可变回报并承担风险？\n（3）是否有能力运用权力影响回报？\n\n委托经营方是否不再合并：关键是委托方是否实质上丧失了决策主导权。如果委托经营协议只是形式上的'甩手掌柜'，委托方仍掌控核心决策，则仍应合并。\n\n实务提示：\n- 不能仅凭协议名称'委托经营'或'承包经营'就下结论——必须穿透看决策权的实质归属；\n- 判断底稿中建议包含协议条款摘要、决策权比较表、可变回报幅度分析等；\n- 部分上市公司利用委托经营安排隐藏亏损子公司于合并范围之外，这已成为监管关注的重点领域。","cat":"合并报表","kw":""},{"q":"基本每股收益和稀释每股收益的计算中，潜在普通股包括哪些？","a":"根据CAS 34（每股收益），潜在普通股是指可能赋予持有者在报告期或以后期间拥有普通股权利的工具。主要包括：\n\n（1）可转换公司债券（要在净利润和普通股股数两个方面同时调整）；\n（2）认股权证和股份期权（采用库存股法计算稀释效应，当行权价低于平均市价时具有稀释性）；\n（3）承诺将发行的股份（如有条件的股票增发）；\n（4）或有可发行股份（如果特定条件在报告期末已达到，则应纳入计算）。\n\n稀释每股收益计算中的顺序要求：\n- 先计算各项潜在普通股的增量每股收益（分子增量÷分母增量）；\n- 按增量每股收益从小到大的顺序逐项纳入稀释计算（增量越小越先纳入）；\n- 如果某一项纳入后导致稀释每股收益增加（反稀释效果），则不纳入。\n\n实务中常见盲点：对于盈利企业，库存股法是判断认股权证和股份期权稀释性的标准方法。如果行权价高于平均市价，则具有反稀释性，不应计入。","cat":"每股收益","kw":""},{"q":"其他综合收益的分类和重分类规则是什么？","a":"根据CAS 30，其他综合收益分为两大类：\n\n第一类——以后会计期间不能重分类进损益的其他综合收益：\n（1）重新计量设定受益计划净负债或净资产的变动；\n（2）指定为FVOCI的非交易性权益工具投资的公允价值变动（股利除外）；\n（3）企业自身信用风险变动引起的金融负债公允价值变动。\n\n第二类——以后会计期间满足条件时将重分类进损益的其他综合收益：\n（1）FVOCI债务工具投资的公允价值变动（扣除减值损失和汇兑损益）；\n（2）现金流量套期储备的有效部分；\n（3）外币财务报表折算差额；\n（4）按权益法核算的应享有被投资单位其他综合收益份额。\n\n实务中容易出错的情况：权益工具投资指定为FVOCI后，其公允价值变动永不再转入损益，只能转入留存收益。这是CAS 22的一个特别规则，目的是防止企业通过投资权益工具操纵利润。","cat":"财务报表列报","kw":""},{"q":"财务报表中'持续经营'假设存在重大不确定性时，如何披露？","a":"根据CAS 30（财务报表列报），如果企业存在持续经营的重大不确定性，即便财务报表仍按持续经营假设编制，也需要充分披露。\n\n披露要点：\n（1）在附注中明确说明存在可能导致对持续经营能力产生重大疑虑的事项或情况（如连续大额亏损、净负债、流动性严重不足、主要业务停顿等）；\n（2）说明管理层已经或拟采取的应对措施（如资产出售、债务重组、增资计划等）及其进展；\n（3）清晰说明财务报表仍基于持续经营假设编制的原因。\n\n如果持续经营假设不再恰当，则应采用清算基础编制财务报表——资产按可收回金额计量，负债重新分类，并全面调整财务报表。\n\n这是审计报告和年度报告中备受关注的内容，建议公司建立完善的持续经营评估制度，定期（至少每季度）评估，并留存充分的底稿记录。","cat":"财务报表列报","kw":""},{"q":"持有待售的非流动资产或处置组的计量和列报要求是什么？","a":"根据CAS 42（持有待售的非流动资产和终止经营），一旦资产或处置组被划为持有待售类别（满足可立即出售、极可能一年内完成出售等条件）：\n\n计量原则：（1）按账面价值与公允价值减出售费用孰低计量（即减值测试）；（2）停止计提折旧/摊销；（3）差额（账面价值高于公允减出售费用）确认为资产减值损失（可转回，这是与CAS 8的重要区别！）。\n\n资产负债表列报：\n（1）持有待售的非流动资产在流动资产大类下单列'持有待售资产'项目；\n（2）对应的负债在'持有待售负债'项目列报（如处置组的负债）；\n（3）原有的计量分类被覆盖，不再按原分类在固定资产、无形资产等项目中列报。\n\n特别注意：\n- 取得时即满足持有待售条件的购入资产，初始计量按公允价减出售费用，差额计入当期损益（资产减值损失）；\n- 终止经营：能够明确区分的独立主要业务或地区的组成部分，其损益应单独列报在利润表的'终止经营净利润'项目中。\n- 持有待售是资产处置的前奏，不同于资产闲置，两者的列报和计量均有很大差异。","cat":"持有待售","kw":""},{"q":"关联方交易中，价格不公允的部分如何进行会计处理？","a":"根据CAS 36（关联方披露）以及实质重于形式原则：\n\n价格不公允的关联交易应分为两个部分处理：\n\n（1）公允价格部分：按正常交易处理，确认收入/资产/费用等；\n（2）不公允的价差部分：视为股东资本性投入（权益性交易），直接计入资本公积（资本溢价）——不计入当期损益。\n\n实务中的价格不公允方向判断：\n- 向关联方高价采购或低价销售→多付的金额（或多损失的利润）→视同向股东分配或股东投入的反向操作→冲减资本公积；\n- 向关联方低价采购或高价销售→少付的金额（或多赚的利润）→视同股东资本性投入→增加资本公积。\n\n关键难点：什么是'公允价格'？——参考同一产品对外部第三方的售价、同行业毛利率水平、市场可比交易价格。\n\n监管查处重点：输送利益型关联交易往往伴随定价不公允，相关企业可能面临补税、财务信息更正等严重后果。","cat":"关联方披露","kw":""},{"q":"合同履约成本和合同取得成本有什么区别？资本化条件是什么？","a":"根据CAS 14（收入），合同履约成本和合同取得成本是两种不同性质的合同成本。\n\n合同履约成本：为履行合同而发生、不属于其他准则规范范围的成本。资本化条件：（1）与一项合同或可清晰辨认可预期合同直接相关；（2）产生或改良了未来用于履行履约义务的资源；（3）预计能够收回。如直接人工成本、直接材料成本、制造费用中与履行合同相关的部分。\n\n合同取得成本：为取得合同而发生的增量成本（如销售佣金），如果预期能够收回，应资本化。但如果摊销期在一年以内，可以选择在发生时直接费用化（简化处理）。\n\n两者的区别：\n- 时间维度：合同取得成本产生于合同签订前（获取合同的成本）；合同履约成本产生于合同执行中。\n- 费用化/资本化判断：合同取得成本仅限增量成本（不获取合同就不会发生的）；合同履约成本以是否产生/改良资源为标准。\n\n合同投标成本（即使中标）不属于增量成本，发生时直接费用化。","cat":"收入准则","kw":""},{"q":"经营租赁转融资租赁（作为出租人）如何处理？","a":"根据CAS 21第六十七条，原经营租赁转融资租赁（即修改或变更导致重新分类），出租人应自变更生效日起按融资租赁处理：\n\n（1）终止确认经营租赁相关的资产（即原固定资产或投资性房地产）；\n（2）确认应收融资租赁款（= 租赁收款额的现值 + 未担保余值现值）；\n（3）差额（应收融资租赁款 - 资产账面价值）计入当期损益。\n\n与承租人角度不同，出租人的经营租赁转融资租赁会计处理相对简单——相当于先按账面价值处置资产，再确认一项新的融资租赁应收款。资产处置损益（借贷差）一次性确认，不涉及递延。\n\n实务提醒：出租人在租赁变更日应取得内部审批和修改文件，同时更新合同台账和资产管理系统，确保税务处理和会计处理一致。\n\n另外，出租人在判断融资租赁转经营租赁时（相反的变更），处理逻辑是对称的：终止确认应收融资租赁款，确认原租赁资产。","cat":"租赁","kw":""},{"q":"投资性房地产采用公允价值模式和成本模式的差异和选择？","a":"根据CAS 3（投资性房地产），企业可选择成本模式或公允价值模式（在公允价值能持续可靠取得时）。\n\n成本模式（类似固定资产）：按期计提折旧/摊销，进行减值测试，不确认公允价值变动。\n\n公允价值模式：不折旧/不摊销，每期末按公允价值重新计量，变动计入当期损益（公允价值变动损益）。\n\n重要限制：同一企业只能对所有投资性房地产采用一种模式（不能部分成本、部分公允）；且一旦选公允价值模式就不能转回成本模式。\n\n实务选择考量：\n- 公允价值模式：利润表波动大（公允价值涨跌直接影响损益），但资产负债表中资产价值更反映市场实际；\n- 成本模式：利润表稳定，但资产价值可能严重偏离市价；\n- 公司估值和财务指标影响：选择公允价值模式的企业，资产周转率、资产负债率指标的计算依赖市场估值，稳定性较差。\n\n绝大多数A股公司采用成本模式，因为公允价值可靠取得困难，且波动性过大影响业绩稳定性。","cat":"公允价值计量","kw":""},{"q":"前期差错的更正（追溯重述）具体怎么操作？涉及哪些报表调整？","a":"根据CAS 28第十二条，重要的前期差错应当采用追溯重述法进行更正。\n\n操作步骤：\n（1）重塑前期财务报表，如同差错从未发生过——调整差错发生期间的留存收益和相关项目的期初余额；\n（2）在发现差错的当期财务报表附注中披露前期差错的详细性质、受影响的前期各期报表项目及更正金额。\n\n具体调整：\n- 差错影响损益的：调整期初留存收益；\n- 差错影响资产负债表的：调整资产/负债的期初余额；\n- 差错影响比较报表的：调整各比较期间的相关项目。\n\n不重要的前期差错：可直接调整发现当期的相关项目，无需追溯重述。\n\n重要提醒：\n- 在会计政策变更和前期差错更正之间不能混淆——会计政策变更是合法地改变计量方法；而前期差错是纠正之前的错误使用\n- 如果之前年度审计报告已出具，差错更正需要对已审计财务报表进行修正，影响重大时应重述签报告。","cat":"会计政策/估计变更","kw":""},{"q":"会计政策变更和会计估计变更的本质区别是什么？区分的实务意义？","a":"根据CAS 28：\n\n会计政策变更——指企业对于相同的交易或事项由原来采用的会计政策改为另一种会计政策。例如：存货计价方法由先进先出法改为加权平均法、投资性房地产由成本模式转为公允价值模式。\n\n会计估计变更——由于资产和负债的当前状况及预期未来经济利益和义务发生了变化，从而对资产负债账面价值和各期消耗金额的调整。例如：坏账计提比例的调整、固定资产折旧年限的变更。\n\n区分的关键：变更是因为'新信息、新发展'（估计变更）还是'选择不同的准则允许的方法'（政策变更）。\n\n实务意义：\n（1）政策变更一般需追溯调整（除准则有特殊规定外），而估计变更采用未来适用法（不追溯）；\n（2）政策变更必须充分披露变更原因、影响金额；\n（3）误将政策变更作为估计变更处理属于会计差错，可能导致财务报表的重大错报。\n\n常见灰色地带：存货跌价准备计提方法的调整、建造合同完工百分比的估计变更——容易混淆，需要审慎判断。","cat":"会计政策/估计变更","kw":""},{"q":"债转股涉及哪些会计处理要点？债务人应如何确认权益？","a":"债转股（将债务转为权益工具）：\n\n债务人：（1）终止确认债务的账面价值；（2）确认权益工具（实收资本/股本和资本公积），按权益工具的公允价值计量（如能可靠取得）；（3）债务账面价值和权益工具入账价值的差额计入投资收益。\n\n债权人：（1）终止确认债权的账面价值；（2）确认取得权益工具投资（长投或金融资产），按放弃债权的公允价值加相关税费作为初始确认成本；（3）放弃债权公允价值和账面价值的差额计入投资收益。\n\n操作要点：\n- 债务人确认的权益工具公允价值优先采用评估值；\n- 债权人取得的股权如达到控制/共同控制/重大影响则按长投核算，否则按金融资产处理；\n- 债转股后债务人资产负债率改善，应充分披露重组目的、金额及对财务结构的影响。\n\n注意区分：债转股与可转债转股不是同一回事——后者按原嵌入衍生工具的条款处理，不能简单套用债务重组规则。","cat":"债务重组","kw":""},{"q":"以多项资产清偿债务的重组如何处理？债权人和债务人的差异是什么？","a":"根据CAS 12（债务重组），以多项资产清偿债务时：\n\n债务人处理：（1）终止确认所清偿债务的账面价值；（2）转让资产的账面价值之和与债务账面价值的差额，计入'其他收益——债务重组收益'（仅限以资产清偿情况下）。\n\n债权人处理：（1）放弃债权的公允价值与账面价值差额计入投资收益（债务重组损失）；（2）取得的各项资产按放弃债权的公允价值分摊（按各项资产的公允价值比例分摊），作为各项资产的初始确认成本。\n\n新债务重组准则不再要求债务人对转让资产确认处置损益（资产处置收益），直接比较债务账面价值和资产账面价值。\n\n实用建议：债务重组中债权的公允价值的确定是核心难点——既要考虑可收回金额，又要考虑重组协议的具体条款。在实务中，通常以评估值为基础。","cat":"债务重组","kw":""},{"q":"贴息贷款的政府补助如何处理？政策性优惠贷款贴息和一般贴息有何不同？","a":"根据CAS 16第十四条：\n\n政策性优惠贷款贴息（财政部门直接将贴息拨付给银行，银行以优惠利率放贷给企业）：企业有两种选择：（1）以实际利率（优惠利率）计量借款，不单独确认贴息；（2）以公允价值计量借款（按同类非贴息贷款的利率折现），差额确认为政府补助（递延收益，在借款期内摊销）。\n\n一般贴息（企业先按正常利率付息，政府将贴息拨付给企业）：直接按实际收到的贴息确认为当期收益（若与补偿当期费用相关）或递延收益（若与借款购置的资产相关）。\n\n实务中多数企业选择方法（1）处理政策性优惠贷款，简单明了。方法（2）要求更高，适合精准核算的场景。","cat":"政府补助","kw":""},{"q":"政府补助采用总额法和净额法的区别？选择有何限制？","a":"根据CAS 16第十条，与资产相关的政府补助可以选用总额法或净额法，但一经选定不得随意变更。\n\n总额法：（1）收到补助时确认为递延收益；（2）资产使用寿命内分期转入其他收益（或营业外收入）；（3）资产负债表体现资产原值和递延收益。优势是反映资产的完整成本规模和补助金额。\n\n净额法：（1）收到补助时直接冲减资产账面价值；（2）按冲减后的账面价值计提折旧；（3）资产负债表不单独列示补助金额。优势是简化处理，缺点是无法单独看到资产原始规模。\n\n选择限制：\n（1）与收益相关的政府补助只能采用总额法；\n（2）与资产相关的可选择，但同一类补助需采用一致的会计政策；\n（3）实务中，大多数企业（包括上市公司）倾向采用总额法以完整反映资产规模。\n\n另外注意：政府补助确认为收益的期间必须与相关费用配比，不能一次性全部计入当期。","cat":"政府补助","kw":""},{"q":"集团股份支付（母公司给子公司高管股权）在个别报表和合并报表层面如何处理？","a":"集团股份支付涉及三个层面：\n\n1. 母公司个别报表：按结算方式处理。如果是母公司用自己的权益工具结算（母公司承担费用），母公司确认为对子公司的长期股权投资增加，同时确认资本公积。\n\n2. 子公司个别报表：确认为股份支付费用（管理费用），同时确认资本公积（视为母公司作为股东的资本性投入）。\n\n3. 合并报表层面：合并抵销母公司的长期股权投资和子公司的资本公积，最终体现为：管理费用（借方）= 资本公积（贷方），金额为授予日的公允价值在服务期内的摊销额。\n\n实务常见错误：子公司个别报表中不确认股份支付费用，全部在母公司层面确认——这是错误的！子公司拿到了职工的服务，就应当在自己的报表中确认费用。\n\n另外注意：如果是用子公司自身权益工具结算，那就不是集团股份支付，按常规CAS 11处理即可。","cat":"股份支付","kw":""},{"q":"限制性股票的股份支付费用如何计算和分摊？","a":"根据CAS 11，限制性股票的会计处理：\n\n授予日：（1）收到职工出资时确认股本和资本公积（股票溢价）；（2）同时就回购义务确认负债（根据限制性条件确定金额，常见为按出资额确认）并冲减库存股/其他权益工具。\n\n等待期内：按公允价值（授予日股票市价减去认购价）在服务期内分摊确认股份支付费用。分摊方法通常采用直线法（如果每期服务量均等）。\n\n解禁日：限制性股票达到解禁条件时，转回对应的就回购义务确认的负债。\n\n实务难点：（1）公允价值是授予日市价减去行权价，不是限制性股票本身的交易价；（2）如果解禁条件包含业绩条件（非市场条件），等待期需根据最佳估计的业绩完成进度调整；（3）解禁前发放的现金股利——可解禁的（预计最终归属的）确认为利润分配，不可解禁的冲减股份支付费用。","cat":"股份支付","kw":""},{"q":"研发支出加计扣除在会计处理和税务处理上的差异和递延所得税影响？","a":"根据CAS 18，研发支出有资本化和费用化两种会计处理，而税法上可享受加计扣除政策（制造业企业为100%，其他企业为75%）。\n\n两种情况分析：\n\n情况一（会计费用化，税法加计扣除）：\n如果当期费用化的研发支出在汇算清缴时享受加计扣除，未来没有扣除机会——属于永久性差异，不产生递延所得税。\n\n情况二（会计资本化，税法加计扣除）：\n内部研发形成的无形资产，会计上按账面价值摊销；税法上按加计后的计税基础摊销。会计摊销额小于税务摊销额，形成可抵扣暂时性差异（理论上）。但CAS 18第二十二条规定，如果无形资产初始确认时既不影响会计利润也不影响应纳税所得额，则不确认递延所得税——这适用于内部研发形成的无形资产。\n\n实务结论：研发加计扣除大多属于影响当期所得税的优惠（非暂时性差异）而非递延所得税事项。","cat":"所得税","kw":""},{"q":"合并报表中内部交易抵销产生的递延所得税如何处理？","a":"合并报表中的内部交易抵销会形成暂时性差异，因为：合并层面已抵销未实现利润，但税法以各法人主体为单位纳税，仍按原始交易价格计税。\n\n典型场景：\n\n1. 内部存货交易：合并抵销存货未实现利润→存货账面价值低于计税基础→确认递延所得税资产。后续存货对外售出时转回。\n\n2. 内部固定资产交易：合并抵销未实现利润并调整折旧→固定资产账面价值低于计税基础→确认递延所得税资产。后续逐年转回。\n\n3. 内部债权债务抵销对应坏账准备转回：减少递延所得税资产。\n\n税率选择：按购买方（持有资产方）的适用税率计算递延所得税。\n\n实务常见问题：合并报表编制人员遗漏内部交易对应的递延税影响，导致合并资产负债表和合并利润表的勾稽关系断裂。","cat":"所得税","kw":""},{"q":"资产减值准备的递延所得税如何确认？什么情况下不能确认？","a":"资产减值准备（如坏账准备、存货跌价准备、固定/无形/长投减值准备）属于可抵扣暂时性差异，因为会计上已确认损失但税法在实际发生损失前不允许税前扣除。\n\n确认递延所得税资产的条件（CAS 18第十二条）：企业未来很可能取得足够的应纳税所得额来抵扣暂时性差异。'很可能'通常理解为概率超过50%。\n\n不能确认递延所得税资产的情形：\n（1）企业长期亏损，无法合理预期未来有足够应纳税所得额；\n（2）持续经营存在重大不确定性；\n（3）减值对应商誉——商誉的初始确认不产生暂时性差异。\n\n实务要点：（1）确认递延所得税资产必须有盈利预测支持，不能仅凭管理层乐观估计；（2）每期期末重新评估未来应纳税所得额的充足性，不足时转回；（3）税法对各项准备金扣除的具体规定有差异，需逐项分析。","cat":"所得税","kw":""},{"q":"售后回租交易的会计处理三步法是什么？","a":"根据CAS 21第五十条至第五十二条，售后回租交易需要判断是否属于销售。\n\n属于销售的（卖方-承租人角度）：\n（1）终止确认标的资产，确认资产处置损益（仅就转让给买方-出租人的部分确认损益）；\n（2）按回租部分的公允价值比例，确认使用权资产（即回租对应的原账面价值）；\n（3）确认租赁负债（应付租金折现）。\n\n不属于销售的（实质是融资）：\n（1）不终止确认资产，将收到的款项确认为金融负债（如长期应付款）；\n（2）后续按金融负债摊余成本计量。\n\n实务关键点：如何判断是否属于销售——参考CAS 14收入确认'控制权转移'的标准，即买方是否取得了对资产的控制权并能主导使用和获益。许多售后回租交易的买断式回购条款使得整个交易实质上是抵押借款，不应确认处置损益。","cat":"租赁","kw":""},{"q":"租赁变更（如缩减租赁面积、延长租期）如何进行会计处理？","a":"根据CAS 21第二十八条，租赁变更作为一项单独租赁处理需同时满足：（1）增加一项或多项租赁资产的使用权（扩大租赁范围）；（2）增加的对价与新增范围的单独价格相当。\n\n不满足单独租赁条件的：\n\n缩减租赁面积：按比例减少使用权资产和租赁负债的账面价值，差额计入当期损益（资产处置收益）。\n\n延长租期：重新计量租赁负债（按新租期和修改后付款额折现），相应调整使用权资产。\n\n租金调整（不涉及范围或期限）：重新计量租赁负债并按变动期间计入当期损益或调整使用权资产（取决于是否属于实质固定付款额变动）。\n\n实务中租金调整（如疫情期间减租）的会计处理是近年来的热点问题，重点在于判断是临时的让步（作为可变租赁付款额计入当期损益）还是永久的缩减（重新计量租赁负债）。","cat":"租赁","kw":""},{"q":"新租赁准则下，低价值资产租赁的判断标准是什么？实务中如何操作？","a":"根据CAS 21，低价值资产租赁指单项租赁资产在全新状态下的绝对价值较低的租赁。CAS 21应用指南给出的参考值为不超过人民币40,000元（或美元5,000元）。\n\n判断要点：（1）以全新价值判断，不是按使用过的资产价值；（2）不能基于重要性量化判断——即使租赁资产的总价值很大，只要单件价值低即可；（3）母子公司各自判断，合并层面不能按汇总价值。\n\n典型低价值资产：笔记本电脑、平板电脑、办公桌椅、一般办公电话。\n\n不属于低价值资产的：汽车（因为全新状态下通常超过4万元）、大型复印机、专用设备。\n\n实务提示：低价值资产租赁豁免只是选择权，企业仍可选择按准则要求确认使用权资产，但通常会采用豁免以简化处理。","cat":"租赁","kw":""},{"q":"在建工程长期停工或暂停建设，是否需要计提减值准备？","a":"在建工程长期停工属于典型的减值迹象。根据CAS 8，企业应评估可收回金额。判断需要分两个维度：\n\n维度一：是否永久性停工（如项目取消）——立即按全额计提减值（或在回收价值范围内的部分冲减）。\n\n维度二：是否临时性停工——估算复工后的收益前景是否足以弥补停工期间的持有成本和潜在贬值。具体评估方法是：（1）预测复工后预计净现金流入；（2）将停工期延长导致的技术落后等影响纳入考虑；（3）折现率应反映时间价值和停工风险。\n\n实务要点：\n- 停工超过一年的在建工程必须重点关注减值迹象；\n- 不能以'管理层计划继续建设'为由简单通过减值测试，必须有具体可执行的复工计划和资金保障；\n- 减值损失的计量要区分可收回金额与账面价值的差额，不是简单按停工时间比例计算。","cat":"资产减值","kw":""},{"q":"固定资产减值测试的频率和触发条件是什么？","a":"根据CAS 8，企业应当在每个资产负债表日判断资产是否存在减值迹象。存在下列迹象的，应估计可收回金额：\n\n外部迹象：（1）资产的市价在当期大幅下跌；（2）企业经营的经济、技术或法律环境发生重大不利变化；（3）市场利率提高导致折现率上升；（4）企业净资产账面价值高于市值。\n\n内部迹象：（1）资产陈旧过时或实体损坏；（2）资产已或将被闲置、终止使用或提前处置；（3）内部报告显示资产经济绩效低于预期。\n\n注意：无论是否存在减值迹象，企业合并形成的商誉和尚未达到可使用状态的无形资产每年必须进行减值测试。\n\n实务建议：建立减值迹象检查清单和定期评估机制，不要等到年终审计才做。","cat":"资产减值","kw":""},{"q":"商誉减值测试中的资产组（CGU）如何划分？常见误区有哪些？","a":"根据CAS 8第二十三条，商誉应当自购买日起分摊至相关的资产组或资产组组合进行减值测试。资产组的认定应以'能够独立产生现金流入'为基本原则。\n\n实务划分要点：\n（1）资产组不能大于报告分部（按CAS 35经营分部口径）；\n（2）如果企业管理层按生产线、业务类型或地理区域等维度监控经营活动，则通常按该维度划分CGU；\n（3）商誉分摊后不能随意变更，除非有合理的重组或处置。\n\n常见误区：\n- 误区一：将整个子公司作为一个CGU——太粗放，不能反映真实减值风险\n- 误区二：将商誉分摊至不能独立产生现金流的辅助资产组\n- 误区三：每年简单的以子公司整体进行减值测试，掩蔽了深层减值信号\n\n合理做法：按协同效应受益范围将商誉分摊至能够受益的各资产组，分别测试。","cat":"资产减值","kw":""},{"q":"合营企业与联营企业的区别是什么？分类判断的要点有哪些？","a":"根据CAS 40（合营安排），合营安排分为共同经营和合营企业。联营企业则按CAS 2的定义——投资方能够对被投资方施加重大影响但不能控制或共同控制。\n\n核心区别：\n- 合营企业：投资方与其他合营方共同控制该主体，对该主体的净资产享有权利。必须存在集体控制+一致同意机制。\n- 共同经营：各参与方对合营安排的资产享有权利、对负债承担义务（不形成独立主体时尤其常见）。\n- 联营企业：仅具有重大影响（通常持股20%-50%，或通过派董事等方式具有参与决策权但无控制）。\n\n判断要点：（1）是共同控制还是重大影响？关键看否决权的存在；（2）如为共同控制，是共同经营还是合营企业？关键看权利对应的是净资产还是特定资产负债。\n\n实务建议：持股比例只是初步信号，最终判断要结合公司章程、股东协议、董事会构成等实质因素。","cat":"长期股权投资","kw":""},{"q":"长期股权投资减值测试中，可收回金额如何确定？","a":"根据CAS 8（资产减值），长期股权投资的可收回金额为公允价值减去处置费用后的净额与预计未来现金流量现值两者中的较高者。\n\n公允价值减去处置费用：优先使用市场法（可比公司、可比交易），其次是收益法估值。\n\n预计未来现金流量现值（使用价值）的计算要点：（1）现金流量预测基于管理层批准的最长5年期的最近财务预算；（2）超过5年的采用递减或稳定的增长率（不超过长期平均增长率）；（3）折现率采用税前折现率，反映当前市场货币时间价值和资产特定风险的评估。\n\n实务常见问题：（1）预测期过长导致减值测试流于形式；（2）折现率选择偏低，导致即使被投资方持续亏损也能通过减值测试；（3）忽略控制权溢价或少数股权折价对公允价值的影响。\n\n特别重要：长投减值一旦计提，不可在以后期间转回。","cat":"长期股权投资","kw":""},{"q":"长期股权投资核算方法转换（金融资产→权益法→成本法）如何进行会计处理？","a":"长期股权投资核算方法转换的基本规则：\n\n1. 金融资产→权益法（如5%→20%）：原金融资产公允价值加新增投资成本之和作为初始投资成本。原计入其他综合收益的累计公允价变动转入投资收益。\n\n2. 权益法→成本法（如20%→60%，分步交易实现企业合并）：见前述'分步交易'的解答——原权益法下账面价值按购买日公允价值重新计量，差额计入投资收益。\n\n3. 成本法→权益法（如60%→20%，处置子公司丧失控制权）：剩余股权按处置日公允价值重新计量，差额计入投资收益。\n\n4. 金融资产→成本法（直接一次取得控制权）：合并成本按支付对价公允价计量。\n\n关键要点：所有跨类别转换都涉及公允价值的重新计量，这是理解长投核算方法转换的核心。","cat":"长期股权投资","kw":""},{"q":"权益法核算的长期股权投资，被投资方发生超额亏损，投资方如何处理？","a":"根据CAS 2第十二条，权益法下投资方确认被投资方净亏损，以长期股权投资账面价值及其他实质上构成净投资的长期权益减记至零为限。\n\n具体顺序：先冲减长期股权投资的账面价值；再冲减长期应收款等实质上构成净投资的项目（如无回收计划的股东贷款）；最后按照合同或协议约定需承担额外义务的，确认预计负债。\n\n后续被投资方实现利润时，按与上述相反的顺序恢复：先冲回预计负债，再恢复长期应收款，最后恢复长期股权投资账面价值。\n\n实务注意：（1）'实质上构成净投资'的项目要按实质判断，不是所有往来款都算；（2）未确认的亏损份额应在备查簿中登记，在计算未来应享有利润份额时先扣除未确认亏损。","cat":"长期股权投资","kw":""},{"q":"永续债作为发行方，应分类为金融负债还是权益工具？","a":"根据CAS 37（金融工具列报），永续债（含可续期公司债、永续中票）的分类关键看是否满足'权益工具'的两个条件：（1）不存在向其他方交付现金或其他金融资产的合同义务；（2）不存在在潜在不利条件下与对手方交换金融资产或负债的合同义务。\n\n核心判断点：是否有付息义务？利率跳升机制是否形成经济上的强制付息？是否有赎回义务？投资人是否有回售权？发行人是否有必须赎回的义务？是否有清算优先权？是否有或有结算条款？\n\n实务中，大多数永续债被分类为金融负债，因为利率跳升机制使得发行人在经济实质上被迫赎回/付息。只有真正'永续''无任何潜在付息赎回义务'的永续债才能分类为权益工具。\n\n注意：永续债会计分类与税法上的税前扣除属性是两个独立问题，不可混淆。","cat":"金融工具","kw":""},{"q":"什么是'业务模式测试'和'SPPI测试'？两者关系如何？","a":"CAS 22对金融资产的分类要求双重测试：\n\n业务模式测试（宏观）：评估企业管理金融资产的方式——是仅仅收取合同现金流量（AC模式）、还是既收取合同现金流量又出售（FVOCI模式）、还是其他（FVTPL模式）。评估以组合层面进行，管理层意图很关键。\n\nSPPI测试（微观）：判断合同现金流量是否'仅为本金和利息的支付'。本金是初始确认时的公允价值，利息包括资金时间价值、信用风险、其他基本借贷风险以及合理利润率。\n\n两者关系：先做SPPI测试——不过则直接FVTPL；通过SPPI测试的，再根据业务模式分为AC或FVOCI。注意，SPPI测试中'利息'不包括权益风险回报，所以纯股权工具（如普通股）不能通过SPPI测试。\n\n实务中非标债务工具（如含减记条款的银行二级资本债、永续债）的SPPI测试非常考验专业判断。","cat":"金融工具","kw":""},{"q":"以公允价值计量的金融资产，如何确定公允价值层级（第一/二/三层级）？","a":"根据CAS 39，公允价值计量分为三个层级，按输入值的最低层级确定：\n\n第一层级：相同资产在活跃市场上未经调整的报价（如上市公司股票收盘价）。\n\n第二层级：除第一层级外的可观察输入值，包括：（1）类似资产在活跃市场的报价；（2）相同或类似资产在非活跃市场的报价；（3）除报价外的可观察输入值（如利率、收益率曲线）；（4）通过市场证实的输入值。\n\n第三层级：不可观察输入值（如私募股权、非上市期权），需要使用估值技术并依赖不可观察的参数。\n\n层级判断的影响：第三层级资产的公允价值变动需在附注中单独披露其估值技术和输入值的敏感性分析；层级之间的转移需按准则要求披露。\n\n实务中，大量非上市公司股权投资、结构化理财产品属于第三层级，估值的可靠性是审计重点。","cat":"金融工具","kw":""},{"q":"结构性存款和理财产品的分类与计量是怎样的？","a":"结构性存款和理财产品属于混合合同或金融资产。根据CAS 22，首先应根据合同现金流量特征（SPPI测试）和业务模式进行分类：\n\n（1）保本型结构性存款：如果合同现金流量仅为对本金和利息的支付（通过SPPI测试），且业务模式为收取合同现金流，可分类为以摊余成本计量（类似定期存款）。\n\n（2）非保本理财/衍生性质的结构性存款：未通过SPPI测试的，必须按公允价值计量且变动计入当期损益（FVTPL）。\n\n实务重要提醒：（1）不能以'理财'两个字的表面名称来判断，必须穿透分析底层资产和合同条款；（2）非保本理财产品产生的损益计入公允价值变动收益而非投资收益——个别企业计入投资收益以规避监管指标是不可取的；（3）在附注中应单独披露结构性存款和理财产品的主要条款和风险。","cat":"金融工具","kw":""},{"q":"预期信用损失（ECL）模型下，应收账款坏账准备如何计算？","a":"根据CAS 22第四十七条，企业应采用预期信用损失模型对应收账款计提坏账准备。简化方法（常用于应收账款）：按整个存续期预期信用损失计提。\n\n实操三步法：（1）分组——按逾期账龄划分组合（如未逾期、逾期1-30天、31-90天、91-180天、181天-1年、1年以上）；（2）确定各组的预期损失率——基于历史实际损失数据，并考虑前瞻性调整（经济环境变化等）；（3）计算坏账金额 = 各组应收账款余额 × 对应预期损失率。\n\n关键差异：旧准则的已发生损失模型是根据已发生的客观证据计提，新准则的预期信用损失模型是前瞻性的，即使尚未出现减值迹象，也需要根据预期计提。企业应建立并持续更新历史损失数据库，不能随意确定损失率。","cat":"金融工具","kw":""},{"q":"PPP/BOT项目收入如何分别确认建造服务和运营服务收入？","a":"PPP/BOT项目（含BOT、TOT、ROT等变体）的会计处理是基础设施领域的常见难题。根据解释第2号和CAS 14：\n\n建造阶段的收入确认：（1）金融资产模式——政府提供无条件付款承诺，按公允价值确认长期应收款，同时按建造服务的履约进度确认建造收入；（2）无形资产模式——企业获得收费权，按建造服务的履约进度确认建造收入，同时确认无形资产；（3）混合模式——部分金融资产+部分无形资产。\n\n运营阶段的收入确认：按照运营服务的履约义务确认收入。\n\n实务关键点：（1）正确识别特许经营权的性质是整个会计处理的基础；（2）建造期间的预计总成本需包含可预见的运营期间大修费用；（3）折现率的选择对金融资产和无形资产价值影响显著，需要合理确定。","cat":"收入准则","kw":""},{"q":"附带退货权的销售收入如何确认？退货率如何估计？","a":"根据CAS 14第三十二条，对于附有销售退回条款的销售，企业应当在客户取得相关商品控制权时，按照预期有权收取的对价金额确认收入（即预期不会退回的部分）。预期退回部分确认为'预计负债——应付退货款'，同时按照账面价值减去收回费用后的余额确认'应收退货成本'。\n\n退货率的估计方法：（1）基于历史退货数据（最常用）；（2）同行业可比数据；（3）统计模型（如大量同质化交易）。每一资产负债表日应重新评估退货率并调整。\n\n实务中的难点：新产品、新市场缺乏历史数据时的估计；季节性波动大的行业的处理；以及退货率估计变更属于会计估计变更，应按照CAS 28处理，不能追溯调整。","cat":"收入准则","kw":""},{"q":"总额法和净额法的判断（主要责任人vs代理人）有哪些核心指标？","a":"根据CAS 14第三十四条，企业应当根据其在向客户转让商品前是否拥有对该商品的控制权，来判断是主要责任人还是代理人。\n\n主要责任人（总额法确认收入）的迹象：（1）承担向客户转让商品的主要责任；（2）在转让商品前承担存货风险；（3）有权自主决定交易价格；（4）承担客户信用风险。\n\n代理人（净额法确认收入）的迹象：不承担上述责任和风险，按约定收取佣金或手续费。\n\n实务中最常见的问题是：电商平台、代理商、贸易商的身份判断。必须基于实质而不是法律形式来判断。如果企业在把商品交付给客户之前已经取得了对商品的实质性控制（如承担存货风险、价格决定权），就应该用总额法，反之净额法。\n\n特别提示：总额法和净额法对营业收入规模影响巨大，监管部门对此高度关注。","cat":"收入准则","kw":""},{"q":"合同变更有哪几种类型？各自的会计处理有什么区别？","a":"CAS 14第八条将合同变更分为三种情形：\n\n类型一（新增可明确区分+单独售价）：作为新合同单独处理。例如在原建筑工程合同基础上新增一栋楼的施工且价格公允。\n\n类型二（新增不可明确区分或售价不单独）：将原合同未履约部分与变更部分合并作为新合同，按变更日重新计算履约进度。\n\n类型三（两者兼有）：实际上实务中常见的混合情形，需要综合判断。\n\n合同变更处理的关键在于判断新增的商品或服务是否与原合同已履约部分可明确区分，以及定价是否反映其单独售价。这是新收入准则相比旧准则变化最大的部分之一。\n\n执业中应特别关注：施工合同、软件开发合同中的变更管理记录是否充分支持会计判断。","cat":"收入准则","kw":""},{"q":"如何判断合同中包含多项履约义务？捆绑销售如何处理？","a":"根据CAS 14第九条，合同开始日，企业应当对合同进行评估，识别其中的各项履约义务。判断标准：（1）客户能够从该商品或服务本身或与其他易获得资源一起受益（可明确区分）；（2）向客户转让商品或服务的承诺可与合同中的其他承诺区分开来。两项标准必须同时满足才能识别为单项履约义务。\n\n实务中的捆绑销售（如买手机送话费套餐），需要将交易价格按照各项履约义务的单独售价比例进行分摊。如果某项服务的单独售价无法直接观察，可以采用市场调整法、预计成本加毛利法或余值法来估计。\n\n关键风险点：低估了识别履约义务的数量，导致收入确认时点前移或后移，影响各期损益的准确性。","cat":"收入准则","kw":""},{"q":"处置子公司部分股权但仍保持控制权的，合并报表如何处理？","a":"母公司处置子公司部分股权但未丧失控制权，属于权益性交易。根据CAS 33第四十九条：\n\n个别报表：处置价款与处置部分长期股权投资账面价值差额计入投资收益。\n\n合并报表：处置价款与处置日按持股比例计算的子公司净资产份额的差额，调整资本公积（资本溢价不足冲减的，调整留存收益）。——注意，不是计入投资收益！\n\n这是因为控制权未变，合并报表层面视为与少数股东之间的权益交易，不确认损益。同样，购买少数股权也按此原则处理。这是合并报表中容易出错的知识点，务必区分控制权变与不变的差异。","cat":"合并报表","kw":""},{"q":"少数股东权益为负数时如何处理？后续恢复如何操作？","a":"少数股东权益为负数的情形：子公司超额亏损导致净资产为负，按持股比例计算的少数股东权益相应为负。\n\n根据CAS 33及财政部解释：（1）如果少数股东有义务承担超额亏损（如投资协议约定），应将超额亏损分摊给少数股东，形成'少数股东权益'的借方余额；（2）如果少数股东没有义务承担超额亏损，超额亏损全部由母公司承担，少数股东权益以零为限。\n\n后续子公司扭亏为盈时：应先以利润弥补母公司此前承担的超额亏损部分，再恢复少数股东权益的账面余额。实务中建议在附注中清晰披露少数股东权益为负的原因以及恢复机制，避免报表使用者误解。","cat":"合并报表","kw":""},{"q":"结构化主体（SPV/信托计划/资管计划）何时应纳入合并报表范围？","a":"结构化主体纳入合并范围的判断依据是CAS 33中的'控制'三要素：（1）拥有对被投资方的权力；（2）通过参与被投资方活动享有可变回报；（3）有能力运用权力影响回报金额。\n\n对于结构化主体（如资产支持专项计划、信托计划、有限合伙基金），实务判断重点：\n- 谁是该主体的主要责任人（发起人、管理人还是投资者）？\n- 决策权的实质范围有多大（是否有实质性罢免权）？\n- 可变回报的量级是否足够大（通常参考20%以上为重要）？\n- 是否存在代理人/委托人的判断问题？\n\n关键：不能仅以持股比例或表决权比例作为判断依据。结构化主体的合并判断需要综合分析权力、回报及其关联关系。这是监管检查的高频问题，必须留存完整的判断底稿。","cat":"合并报表","kw":""},{"q":"母公司对子公司长期股权投资成本法和合并报表中的调整逻辑是怎样的？","a":"根据CAS 2，母公司个别报表中对子公司长期股权投资采用成本法核算。但在合并报表中，需要按权益法进行调整，这是两个层次的不同处理：\n\n个别报表（成本法）：只确认实际收到的现金股利作为投资收益，不确认子公司留存收益变动。\n\n合并报表调整步骤：（1）将成本法调整为权益法——按持股比例确认子公司当年净损益份额和其他综合收益份额；（2）抵销母公司长期股权投资和子公司所有者权益；（3）确认少数股东权益和少数股东损益。\n\n实务中注意：成本法转权益法的调整必须完整，包括子公司实现净利润、分配股利、其他综合收益变动、其他权益变动等所有影响子公司净资产变动的因素。许多企业的合并附表中调整不完整，导致少数股东权益计算错误。","cat":"合并报表","kw":""},{"q":"连续编制合并报表时，以前年度内部交易如何持续抵销？","a":"连续编制合并报表时的内部交易抵销需要区分交易类型：\n\n一、存货内部交易：以前年度未实现利润在本期实现时，应做调整分录——借记'年初未分配利润'，贷记'营业成本'。同时抵销本期新发生的内部交易。\n\n二、固定资产内部交易：内部交易的固定资产在处置前，逐年抵销折旧中对应的未实现内部交易损益。处置当年，将剩余未实现损益转入资产处置收益。\n\n三、债权债务：应收账款和应付账款每期都需抵销，信用减值损失也需要抵销（以及递延所得税）。\n\n关键原则：合并报表的连续编制不是简单的重复抵销，而是要正确处理以前年度未实现损益的跨期转回。这是合并报表实务中出错率最高的环节之一。","cat":"合并报表","kw":""},{"q":"企业合并涉及或有对价的，如何进行初始确认和后续计量？","a":"根据CAS 20第十一条，购买方应当将合并协议中约定的或有对价按其购买日的公允价值计入合并成本。后续计量根据其分类不同处理：\n\n（1）分类为金融资产的：按CAS 22以公允价值计量，变动计入当期损益或其他综合收益；\n（2）分类为权益工具的：无需重新计量，后续结算在权益内部结转；\n（3）属于职工薪酬的：按CAS 9处理。\n\n实务中常见误区：将业绩补偿承诺（Earn-out）在购买日不确认，等到实际支付时才确认合并成本调整——这是错误的！必须在购买日按公允价值充分估计并确认。后续计量中，即使是对赌条件未达成也不必调减合并成本（除非属于计量期间调整）。","cat":"企业合并","kw":""},{"q":"商誉为负值（廉价购买）时如何进行会计处理和披露？","a":"商誉为负值即合并成本小于可辨认净资产公允价值份额的情况。根据CAS 20第十三条，购买方应当首先对被购买方可辨认资产、负债及或有负债的公允价值重新评估；重新评估后仍为负值的，确认为当期损益（营业外收入）。\n\n实务要点：（1）必须执行重新评估程序，不能直接确认收益——这是准则的硬性规定；（2）在附注中披露廉价购买的原因、重新评估的具体情况、确认的收益金额；（3）不应为了规避负商誉而人为提高可辨认净资产公允价值或压缩合并成本。监管机构对廉价购买的关注度很高，务必留存充分的审计证据。","cat":"企业合并","kw":""},{"q":"反向购买中合并成本的确定和合并报表编制要点有哪些？","a":"反向购买是CAS 20中较为复杂的情形。根据准则，法律上的子公司（实质上的购买方）通过发行权益证券换取法律上母公司的控制权。\n\n合并成本：应按照法律上的子公司（会计购买方）为获取法律上母公司的控制权而向法律上母公司的原股东发行的权益性证券的公允价值来确定。\n\n合并报表编制要点：（1）合并报表以法律上子公司的名义出具，但实际反映法律上母公司的财务信息；（2）法律上母公司的资产和负债按合并时的公允价值并入；（3）商誉计算以虚拟发行股份的公允价值减去被购买方可辨认净资产公允价值份额；（4）合并报表的权益结构反映的是法律上母公司的权益结构。\n\n实务中反向购买常见于借壳上市场景，必须严格按照准则规定处理，不得随意简化。","cat":"企业合并","kw":""},{"q":"企业合并中购买日的确定依据是什么？实务中如何把握？","a":"根据CAS 20第十条，购买日是购买方获得对被购买方控制权的日期。控制权转移的标志包括：（1）合并协议已获股东大会通过；（2）已办理必要的财产权交接手续；（3）购买方已支付合并价款的大部分并有权控制被购买方；（4）购买方实际上已控制被购买方的财务和经营政策并享有利益和承担风险。\n\n实务中常见问题：工商变更是否完成不是必要条件——实质控制权转移时即可确定为购买日。但也需要审慎判断，不能仅凭一纸协议就认定控制权转移。尤其是涉及审批机关的行业（如金融、能源），审批是控制权转移的必要前置条件。","cat":"企业合并","kw":""},{"q":"什么是'一揽子交易'？合并报表如何处理？","a":"'一揽子交易'是指多次交易虽然形式上是分步实施的，但从整体商业目的、定价机制、交易条件等方面来看，各次交易之间是互为前提、互相依存的，应当作为一个整体交易来处理。\n\n根据CAS 33应用指南，判断一揽子交易的参考因素包括：（1）各项交易是否同时签订或在彼此影响下签订；（2）各项交易是否构成一个整体才能达到商业目的；（3）前次交易是否依赖于后次交易的发生；（4）交易价格是否考虑了后续交易的影响。\n\n合并报表处理：若属于一揽子交易，母公司应将所有步骤作为一项企业合并处理，购买日应从取得控制权之日起确定，多次支付的对价应合计作为合并成本。","cat":"企业合并","kw":""},{"q":"分步交易实现企业合并，购买日之前持有的股权如何进行会计处理？","a":"根据CAS 20第四十七条，分步交易实现企业合并的，购买方在购买日对之前持有的被购买方权益，应按购买日公允价值重新计量，公允价值和账面价值的差额计入当期投资收益。\n\n实务要点：（1）此前作为金融资产核算的，先将其他综合收益转入投资收益，再按购买日公允价值重新计量；（2）此前作为长期股权投资权益法核算的，处置前先将其他综合收益按处置比例结转，再重新计量。\n\n但要注意，如果分步交易属于'一揽子交易'，则应按CAS 33的规定整体作为一项交易处理，不能分步确认损益。是否属于一揽子交易，应综合考量合同条款、定价逻辑、商业目的等因素综合判断。","cat":"企业合并","kw":""},{"q":"前期差错更正的追溯重述法如何操作？","a":"根据CAS28（会计政策、会计估计变更和差错更正准则），对于重要的前期差错，应采用追溯重述法进行更正。\n\n操作步骤：\n\n第一，确定前期差错的影响金额及影响的科目。对差错进行全面分析，确定影响期间和受影响科目。\n\n第二，调整发现当期（列报前期）最早期的期初留存收益。在调账分录中涉及损益项目的，使用\"以前年度损益调整\"科目过渡，最终转入留存收益。\n\n第三，重述比较数据。如果差错发生在上一报告期，应重述比较期间（上年同期）的财务报表数据。如果差错发生在更早期，比较数据可能也需要调整。\n\n第四，附注披露：应披露前期差错的性质、受影响的项目名称和更正金额、无法追溯重述的原因等。\n\n实务中常见难点：如果差错涉及多年累积，需要逐年计算并调整；如果前期数据不完整或无法获取，至少应尽可能更正可追溯的期间，并披露原因；税务影响：更正差错可能导致需要重新申报以前年度的所得税。","cat":"会计政策/估计变更","kw":""},{"q":"资产负债表日后调整事项和非调整事项的区别是什么？","a":"根据CAS29（资产负债表日后事项准则）：\n\n调整事项：对资产负债表日已经存在的情况提供了新的或进一步证据的事项。\n- 典型例子：日后期间收回一笔已被作为坏账核销的应收款项（证明资产负债表日该项应收款的可收回性判断有误）；\n- 诉讼案件在日后期间结案，证实资产负债表日存在现时义务且金额可以确定；\n- 日后期间发现财务报表存在重大错报。\n\n非调整事项：表明资产负债表日后发生的情况的事项。\n- 典型例子：日后期间发生重大火灾导致存货毁损（火灾发生在资产负债表日之后）；\n- 日后期间发行股票或债券；\n- 日后期间发生企业合并或处置子公司。\n\n处理上的区别：\n- 调整事项 → 调整财务报表相关数据；\n- 非调整事项 → 不调整报表，但性质重大的应在附注中披露事项的性质、内容及对财务状况和经营成果的影响估计。\n\n实务中关键判断点：导致该事项的根本原因在资产负债表日是否已经存在。个人理解，供参考。","cat":"资产负债表日后事项","kw":""},{"q":"现金流量表的编制方法和直接法间接法的区别？","a":"根据CAS31（现金流量表准则），企业应当采用直接法列报经营活动现金流量。同时，附注中应提供将净利润调节为经营活动现金流量的信息（间接法）。\n\n直接法：直接列示经营活动现金流入和流出的主要类别。\n- 销售商品提供劳务收到的现金\n- 收到的税费返还\n- 购买商品接受劳务支付的现金\n- 支付给职工及为职工支付的现金\n- 支付的各项税费等\n\n间接法：从净利润出发，通过调整不涉及现金的项目及经营性应收应付项目变动，倒算出经营活动净现金流量。\n- 调整项包括：资产减值准备、折旧摊销、处置资产损益、公允价值变动、财务费用、存货增减、经营性应收应付增减等。\n\n实务中，直接法的各项目数据需从会计分录中系统性地提取，不能简单通过资产负债表的期初期末差推算。建议设置现金流量辅助核算项目或使用现金流量表编制软件提高效率和准确性。","cat":"现金流量表","kw":""},{"q":"预计负债的确认的三个条件是什么？实务中怎么判断？","a":"根据CAS13（或有事项准则），确认预计负债需同时满足以下三个条件：\n\n第一，该义务是企业承担的现时义务：包括法定义务和推定义务。推定义务通常指企业的既往惯例、公开承诺或政策使其他方合理预期企业将承担的责任。\n\n第二，履行该义务很可能导致经济利益流出企业：'很可能'一般指发生概率大于50%但尚未达到基本确定（>95%）。诉讼案件在判决前阶段是否确认预计负债的关键判断点。\n\n第三，该义务的金额能够可靠地计量：存在一个合理的估计金额区间即可，不需要精确到分。如果只能给出一个区间，取区间内最可能的结果；如果区间内各结果可能性相同，取中间值。\n\n实务判例：\n- 未决诉讼：如律师出具的法律意见书表示很可能败诉并可以合理估计赔偿金额，应确认预计负债。\n- 产品质量保证：需要根据过往返修率、单次平均维修成本等历史数据合理估计。\n- 亏损合同：履行合同义务发生的不可避免成本超过预期经济利益的，应确认预计负债。","cat":"或有事项","kw":""},{"q":"辞退福利的确认时点和计量方法？","a":"根据CAS9（职工薪酬准则）第二十条，辞退福利的确认时点取以下两个日期中的孰早者：\n\n（1）企业不能单方面撤回因解除劳动关系计划或裁减建议所提供的辞退福利时；\n（2）企业确认涉及支付辞退福利的重组相关成本时。\n\n计量方法取决于预期支付时间：\n- 一年内支付的辞退福利，不折现；\n- 一年以上支付的，按照适当的折现率折现后计量。\n\n实务中常见问题：\n- 如果职工接受辞退而获得的补偿金额超过正常退休金、离职金的部分，属于辞退福利；\n- 辞退福利付款计划需要董事会等权力机构批准，口头承诺通常不构成确认条件；\n- 如果企业无法单方面撤回计划（比如已与工会签署了具有约束力的协议），即使尚未对外公告，也应在此时点确认。","cat":"职工薪酬","kw":""},{"q":"会计政策变更和会计估计变更怎么区分？追溯调整的适用条件？","a":"会计政策变更（CAS28）：指企业对相同的交易或事项由原来采用的会计政策改用另一会计政策。例如：存货发出计价由先进先出法改为加权平均法。\n\n会计估计变更：指由于资产和负债的当前状况及预期未来经济利益和义务发生了变化，从而对资产或负债的账面价值或资产的定期消耗金额进行的调整。例如：固定资产折旧年限由10年改为8年。\n\n核心区别：政策变更是「选择」的改变（有多个准则允许的方法可选）；估计变更是「判断」的改变（基于情况变化的重新评估）。\n\n追溯调整法适用于会计政策变更（除非无法合理确定累积影响数），将变更累积影响数调整列报前期最早期初留存收益，比较报表也按新政策重述。\n\n未来适用法适用于会计估计变更，变更影响在当期及未来期间确认，不调整比较数据。\n\n如果确实无法区分是政策变更还是估计变更，应作为会计估计变更处理（未来适用法）。","cat":"会计政策/估计变更","kw":""},{"q":"非货币性资产交换是否具有商业实质的判断标准？","a":"根据CAS7（非货币性资产交换准则），商业实质的判断基于以下两个条件：\n\n条件一：换入资产的未来现金流量在风险、时间分布或金额方面与换出资产显著不同。例如用存货换入固定资产，两者的现金流量模式显然不同，具有商业实质。\n\n条件二：换入资产与换出资产的预计未来现金流量现值不同，且差额与换出资产的公允价值相比是重大的。需要通过折现计算来定量判断。\n\n具有商业实质的交换：以公允价值为基础计量换入资产成本，差额确认损益。\n\n不具有商业实质的交换：以换出资产的账面价值为基础计量换入资产成本，不确认损益。\n\n实务中需要特别注意关联方之间的非货币性资产交换——这类交易可能存在利润操纵的动机，应审慎判断商业实质并充分披露。","cat":"非货币性资产交换","kw":""},{"q":"持有待售非流动资产的确认条件和计量规则？","a":"根据CAS42（持有待售非流动资产、处置组和终止经营准则），确认持有待售需同时满足以下条件：\n\n（1）在当前状况下可立即出售：资产已经处于可出售状态，不需要进行重大整治清理工作。\n（2）出售极可能发生：企业已经就一项出售计划作出决议（董事会或类似机构），且已获得确定的购买承诺（签订了具有法律约束力的出售协议）。通常预计在一年内完成出售。\n\n计量规则：\n持有待售的非流动资产按「账面价值与公允价值减去出售费用后的净额孰低」计量。如果账面价值高于（公允价值-出售费用），差额确认为资产减值损失。\n\n停止计提折旧或摊销。\n\n如果分类为持有待售后，公允价值减去出售费用后的净额增加的，原确认的减值损失可以转回（商誉除外），但转回金额不得超过原确认的减值损失。\n\n特别注意：如果一年内未完成出售，需评估是否继续满足持有待售条件；如不再满足，应转回正常资产列报。个人理解，供参考。","cat":"持有待售","kw":""},{"q":"公允价值的三个层次如何划分？什么是第三层次公允价值？","a":"根据CAS39（公允价值计量准则），公允价值输入值分为三个层次：\n\n第一层次：相同资产或负债在活跃市场上的未经调整的报价。如上市股票收盘价。最可靠，优先使用。\n\n第二层次：除第一层次外可直接或间接观察到的输入值。包括：活跃市场中类似资产或负债的报价；非活跃市场中相同或类似资产或负债的报价；除报价外可观察的输入值（如利率收益率曲线、隐含波动率）；市场验证的输入值。\n\n第三层次：不可观察的输入值。仅在相关可观察输入值无法获得时使用。典型场景：未上市股权投资（没有市场报价，也没有类似可比公司）；客户关系、自创专利等无形资产；缺乏流动性的结构化产品。\n\n第三层次公允价值需要自行开发估值模型并使用大量不可观察的参数，因此需要在附注中详细披露估值技术、关键假设、敏感性分析等信息。审计时应重点核查模型合理性和参数的客观性。","cat":"公允价值计量","kw":""},{"q":"债务重组中债权人和债务人的会计处理要点？","a":"根据CAS12（债务重组准则），2019年修订后债务重组的定义扩大到「不改变交易对手方」的情形，核心变化如下：\n\n债权人角度：\n（1）受让金融资产以外的资产：按放弃债权的公允价值作为受让资产的初始成本。放弃债权公允价值与账面价值的差额计入当期损益。\n（2）受让金融资产：按公允价值初始确认，公允价值与放弃债权账面价值的差额计入投资收益。\n（3）转为权益工具（债转股）：取得的权益工具按公允价值初始计量，差额计入投资收益。\n\n债务人角度：\n（1）以资产清偿债务：所清偿债务账面价值与转让资产账面价值的差额计入当期损益（其他收益-债务重组收益）。\n（2）转为权益工具（债转股）：所清偿债务账面价值与权益工具公允价值的差额计入当期损益。\n\n特别注意：新准则下不再使用「营业外收入/支出」科目，改为「其他收益」或「投资收益」。","cat":"债务重组","kw":""},{"q":"关联方的认定标准和范围是什么？","a":"CAS36（关联方披露准则）从控制、共同控制、重大影响三个维度定义关联方。\n\n构成关联方的主要情形：\n（1）该企业的母公司、子公司、与该企业受同一母公司控制的其他企业；\n（2）对该企业实施共同控制或重大影响的投资方；\n（3）该企业的合营企业和联营企业；\n（4）该企业的主要投资者个人及与其关系密切的家庭成员；\n（5）该企业的关键管理人员及与其关系密切的家庭成员；\n（6）上述（4）（5）中个人控制、共同控制或重大影响的其他企业。\n\n不构成关联方的情形：\n- 仅与企业发生日常交易关系的资金提供者、公用事业部门、政府部门和机构；\n- 仅与企业发生大量交易的经济依存关系的供应商、客户；\n- 共同控制合营企业的合营者之间（仅仅是共同投资关系，不单独构成关联方）。\n\n实务中需要建立完整的关联方清单，定期更新，并在财务报表附注中全面披露关联方关系和交易。","cat":"关联方披露","kw":""},{"q":"企业亏损产生的可抵扣暂时性差异何时确认递延所得税资产？","a":"根据CAS18第十五条，企业对能够结转以后年度的可抵扣亏损和税款抵减，应以很可能获得用来抵扣的应纳税所得额为限，确认DTA。\n\n判断'很可能获得'需考虑的因素：\n\n（1）亏损原因：是暂时性因素（如一次性资产减值）还是结构性因素（如行业衰退）？暂时性原因更容易支持DTA确认。\n\n（2）未来盈利预测的可信度：是否有经批准的盈利预测？过往预测的准确性如何？\n\n（3）可抵扣亏损的到期年限：如果只有短短几年就过期，需要有更充分的盈利证据。目前企业所得税亏损弥补期一般为5年，高新技术企业和科技型中小企业为10年。\n\n（4）是否存在税务筹划机会：企业是否可以通过某些安排（如资产处置、业务重组）创造应纳税所得额？\n\n如果缺乏有力证据，应保守处理——不确认或部分确认DTA。实务中不少上市公司的DTA确认过于乐观，后来发生减记。审计时应严格求证盈利预测的合理性和可实现性。个人理解，供参考。","cat":"所得税","kw":""},{"q":"递延所得税资产和递延所得税负债的确认原则？","a":"根据CAS18（所得税准则），采用资产负债表债务法核算所得税。\n\n递延所得税负债（DTL）：\n几乎全部应纳税暂时性差异都应确认DTL。应纳税暂时性差异=资产的账面价值>计税基础，或负债的账面价值<计税基础。\n\n典型场景：固定资产加速折旧（会计折旧慢于税法折旧）导致资产账面价值>计税基础→确认DTL。\n\n递延所得税资产（DTA）：\n可抵扣暂时性差异在「很可能取得足够的应纳税所得额用以抵扣」时确认DTA。可抵扣暂时性差异=资产账面价值<计税基础，或负债账面价值>计税基础。\n\n典型场景：计提资产减值准备（会计计提但税法不准扣除）→资产账面价值<计税基础→确认DTA。\n\nDTA的确认需要谨慎，每个资产负债表日重新评估：如果未来很可能无法获得足够的应纳税所得额，应减记DTA；如果情况变化，原减记可转回。","cat":"所得税","kw":""},{"q":"股份支付中可行权条件和非可行权条件的区别？","a":"CAS11将股份支付的授予条件分为可行权条件和非可行权条件。\n\n可行权条件：\n- 服务条件：要求职工完成一段特定期间的服务（如三年内不得离职）；\n- 业绩条件：\n  * 市场条件：与权益工具市场价格相关（如股价涨幅超过指数20%），在估计授予日公允价值时即应考虑，后续不调整；\n  * 非市场条件：其他业绩指标（如净利润增长率≥15%），在估计授予日公允价值时暂不考虑，但在等待期每个资产负债表日根据最新可行权数估计调整确认金额。\n\n非可行权条件：\n- 不是获取权益工具的必要条件，而是其他要求（如规定职工必须自己出资购买一定股票）。\n- 在确定授予日公允价值时即予以考虑，后续不再调整。\n\n实务建议：在合同签署前仔细梳理各类条件的性质并分类记录，一旦分类错误将导致整个等待期的计量出错。个人理解，供参考。","cat":"股份支付","kw":""},{"q":"股份支付的权益结算和现金结算有什么区别？","a":"CAS11（股份支付准则）将股份支付分为两大类：\n\n权益结算的股份支付：\n- 最终以权益工具（自己公司的股票或股票期权）结算；\n- 授予日按公允价值计量，后续不再重新计量公允价值变动；\n- 借方：成本/费用，贷方：资本公积-其他资本公积；\n- 等待期内每一个资产负债表日确认的金额=预计可行权数量×授予日公允价值÷等待期×已过期间。\n\n现金结算的股份支付：\n- 最终以现金支付（如模拟股票、现金股票增值权）；\n- 在每一个资产负债表日和结算日按公允价值重新计量，变动计入当期损益；\n- 借方：成本/费用，贷方：应付职工薪酬（负债）；\n- 负债的公允价值变动计入公允价值变动损益。\n\n实务中关键区别点：看最终结算义务的内容——付股票还是付现金。有些安排看似付现金但金额按股价计算，仍是现金结算。","cat":"股份支付","kw":""},{"q":"政府补助的会计处理方法有哪些？如何判断采用哪种方法？","a":"根据CAS16（政府补助准则），政府补助分为与资产相关的政府补助和与收益相关的政府补助。\n\n与资产相关的政府补助（用于购建长期资产）：\n（1）总额法：确认为递延收益，在资产使用寿命内按合理、系统的方法分期计入损益；\n（2）净额法：直接冲减相关资产的账面价值，在报表附注中披露。\n\n与收益相关的政府补助（补偿已发生或未来期间的费用/损失）：\n（1）补偿已发生的费用或损失：直接计入当期损益或冲减成本；\n（2）补偿未来的费用或损失：确认为递延收益，在确认相关费用的期间计入损益。\n\n企业可选择总额法或净额法，但同一类政府补助应采用一致的方法。实务中大多数企业选择总额法，因为能更清晰地反映资产的原始价值和政府补助的财务影响。","cat":"政府补助","kw":""},{"q":"资产组（CGU）的确定方法和实务考虑？","a":"根据CAS8，资产组是指企业可以认定的最小资产组合，其产生的现金流入应当基本上独立于其他资产或资产组产生的现金流入。\n\n实务中确定CGU的核心原则：\n\n第一，以「独立产生现金流入」为判断基石。如果一项资产或一条生产线的产品和销售渠道独立于其他资产，一般可单独作为CGU。\n\n第二，考虑管理层监控经营的方式。如果企业按业务线或区域管理业绩，CGU的划分通常与之保持一致。\n\n第三，如果几项资产必须一起使用才能产生独立的现金流入，应组合成一个CGU。例如一个工厂的生产线、配套仓库和环保设施通常构成一个CGU。\n\n第四，CGU的认定在后续期间一般保持一致，不能随意变更。如果资产组的构成发生变化（如处置了某条生产线），需在附注中披露变更原因。\n\n商誉减值测试时，CGU应当是能够从企业合并协同效应中受益的最小资产组组合。","cat":"资产减值","kw":""},{"q":"资产减值迹象有哪些？出现减值迹象后该如何测试？","a":"根据CAS8（资产减值准则）第五条，企业应当在资产负债表日判断资产是否存在可能发生减值的迹象。\n\n外部迹象：\n（1）资产的市场价格在当期大幅下跌，跌幅明显高于时间推移或正常使用预期的下跌；\n（2）企业经营所处的经济、技术或法律环境以及资产所处的市场在当期或近期发生重大不利变化；\n（3）市场利率或其他市场投资回报率的提高影响企业计算资产可收回金额的折现率。\n\n内部迹象：\n（4）有证据表明资产已陈旧过时或实体已损坏；\n（5）资产已或将被闲置、终止使用或提前处置；\n（6）内部报告表明资产的经济绩效已低于或将低于预期。\n\n如果出现上述任何迹象，应估计该项资产的可收回金额。可收回金额=Max(公允价值-处置费用, 预计未来现金流现值)。\n\n需要注意：商誉和使用寿命不确定的无形资产无论是否有减值迹象，至少每年进行一次减值测试。","cat":"资产减值","kw":""},{"q":"租赁负债和使用权资产的初始计量与后续计量？","a":"初始计量：\n\n第一，租赁负债 = 租赁期开始日尚未支付的租赁付款额的现值。租赁付款额包括：固定付款额（扣除租赁激励）、取决于指数或比率的可变付款额、预期行使购买选择权的行权价格、预期行使终止租赁选择权需支付的款项、担保余值的预计应支付金额。\n\n第二，使用权资产 = 租赁负债 + 租赁开始日或之前支付的付款额 - 租赁激励 + 初始直接费用 + 复原成本。\n\n后续计量：\n\n租赁负债按实际利率法摊销，确认利息费用：借：财务费用，贷：租赁负债。支付租金时：借：租赁负债，贷：银行存款。\n\n使用权资产按成本模式计量：参照自有固定资产计提折旧。折旧年限取租赁期与资产剩余使用寿命的孰短者。\n\n如果租赁变更（如租赁期变化、租赁范围变化），需重新计量租赁负债并调整使用权资产。个人理解，供参考。","cat":"租赁","kw":""},{"q":"新租赁准则下，承租人会计处理的核心变化是什么？对财务报表有什么影响？","a":"CAS21（新租赁准则）对承租人最大的改变是取消了融资租赁和经营租赁的分类，对几乎所有租赁都要求确认使用权资产和租赁负债。\n\n核心变化：\n（1）资产负债表：原经营租赁的表外资产和负债现在入表，对资产负债率有显著影响，尤其是零售、航空、物流等高租赁密度行业。\n（2）利润表：原经营租赁下直线法确认费用，新准则下前期费用较高（利息费用前大后小+使用权资产折旧），后期费用较低。\n（3）现金流量表：原经营租赁全部计入经营活动；新准则下偿还租赁负债本金部分计入筹资活动。\n\n两项简化处理（豁免）：（1）短期租赁（租赁期不超过12个月）；（2）低价值资产租赁（单项全新价值通常≤5,000美元）。\n\n折现率的确定是关键：优先使用租赁内含利率，通常不可取得时使用承租人增量借款利率。","cat":"租赁","kw":""},{"q":"预期信用损失模型中'前瞻性信息'如何量化？","a":"根据CAS22，预期信用损失的计量应当反映通过评价一系列可能的结果而确定的无偏概率加权平均金额，以及货币时间价值。\n\n前瞻性信息的量化实务方法：\n\n第一，识别关键经济变量：GDP增长率、行业景气指数、M2增速、利率水平、失业率等。选择与客户信用风险最相关的指标。\n\n第二，设计至少三种情景：基准情景（最可能发生）、乐观情景、悲观情景。每种情景赋予发生概率。\n\n第三，将经济变量的预测值映射到违约概率或损失率的调整系数上。例如可以通过回归分析建立历史数据中经济变量与坏账率的关系模型。\n\n第四，计算加权预期损失率 = Σ(各情景损失率 × 发生概率)。\n\n实务中如果数据积累不足，也可采用简化调整：在历史损失率基础上加3-5个百分点的前瞻性调整因子，但需要在底稿中说明依据。不宜仅凭经验「拍板」。","cat":"金融工具","kw":""},{"q":"金融资产的三种分类（FVTPL、FVOCI、AC）如何判断？","a":"CAS22基于两个维度对金融资产进行分类：\n\n第一维度：企业管理金融资产的业务模式。\n- 收取合同现金流量为目标 → AC（摊余成本）或FVOCI（具体看第二维度）\n- 既收取合同现金流量又出售 → FVOCI\n- 其他业务模式（包括交易目的） → FVTPL\n\n第二维度：金融资产的合同现金流量特征（SPPI测试）。\n- 合同现金流量仅为对本金和未偿付本金的利息支付 → 通过SPPI测试，可能是AC或FVOCI\n- 不满足SPPI条件 → 强制分类为FVTPL\n\n实务判断流程：先看SPPI——不通过则直接FVTPL；通过SPPI再看业务模式。\n\n特殊选项：初始确认时如果可消除或显著减少会计错配，可将金融资产不可撤销地指定为FVTPL。权益工具投资可选择指定为FVOCI（不可撤销），但其股利仍计入损益。","cat":"金融工具","kw":""},{"q":"金融工具准则下，应收账款的预期信用损失（ECL）怎么计提？有没有比较简洁实用的方法？","a":"CAS22（金融工具准则）对应收账款采用预期信用损失模型，区别于原准则的已发生损失模型。\n\n实务中常用的简化方式是「迁徙率矩阵法」。操作步骤：\n\n（1）先按账龄分组（0-6月、6-12月、1-2年、2-3年、3年以上等）；\n（2）计算各账龄组的「迁徙率」，即从当前阶段「迁徙」到更差阶段的概率。取过往3-5年的历史数据；\n（3）根据迁徙率推导历史损失率，再结合前瞻性信息（如宏观经济走势、行业景气度等）进行调整；\n（4）对每一账龄组，用应收账款余额×该组的预期损失率=应计提的减值准备。\n\n对于金额重大的单项应收账款，宜单独评估其预期信用损失。前瞻性信息的调整不能走过场，建议在底稿中明确记录调整依据和数据来源。","cat":"金融工具","kw":""},{"q":"并购产生的商誉如何进行减值测试？","a":"根据CAS8（资产减值准则），企业合并形成的商誉至少应当在每年年度终了进行减值测试。\n\n减值测试基本流程：\n第一，将商誉分配至相关的资产组或资产组组合（CGU），该资产组应当能够从企业合并的协同效应中受益。分配时以购买日公允价值为基础确定分摊比例。\n\n第二，计算资产组（含商誉）的可收回金额，取公允价值减去处置费用后的净额与预计未来现金流量现值两者中的较高者。\n\n第三，将可收回金额与资产组账面价值（含商誉）比较，如果可收回金额小于账面价值，差额确认为商誉减值损失。\n\n实务特别注意：（1）减值损失首先抵减商誉账面价值，超额部分再按比例分摊到资产组的其他资产；（2）商誉减值损失一经确认不得在以后期间转回；（3）需要关注折现率的选择、预测期增长率等关键参数，底稿中应有充分记录。","cat":"合并报表","kw":""},{"q":"合并报表中少数股东权益和少数股东损益的计算口径？","a":"根据CAS33，少数股东权益是指子公司的所有者权益中不属于母公司直接或间接享有的份额。\n\n计算要点：\n第一，少数股东权益 = 子公司净资产 × 少数股东持股比例。子公司净资产包括股本、资本公积、盈余公积、未分配利润、其他综合收益等。\n\n第二，少数股东损益 = 子公司当期净利润 × 少数股东持股比例。需要特别注意：如果母子公司之间有逆流内部交易未实现利润，应将未实现利润中归属于少数股东的部分从少数股东损益中转出。\n\n第三，合并抵销分录中少数股东权益的变动：当子公司分配股利、其他综合收益变动、追加投资导致持股比例变动时，少数股东权益也应相应调整。\n\n实务中建议在合并工作底稿中单独列一栏跟踪少数股东的权益变动轨迹，便于审计复核。个人理解，供参考。","cat":"合并报表","kw":""},{"q":"合并报表中母子公司之间的内部交易抵消怎么做？尤其是涉及存货未实现利润的情况。","a":"合并报表内部交易抵消的基本原则在CAS33（合并财务报表准则）中有明确规定。实务操作的核心思路分三步走：\n\n第一步，抵消内部交易收入与成本。期末对母子公司之间发生的内部交易，先全额抵消营业收入和营业成本：借：营业收入，贷：营业成本。\n\n第二步，抵消期末存货中包含的未实现内部销售利润。即期末仍未对外出售的存货中，包含了内部交易的毛利部分，需要抵消：借：营业成本，贷：存货。\n\n第三步，如果之前期间也发生过同类内部交易，年初存货也可能包含上期未实现利润，需要做递延处理。\n\n实务中容易出错的地方：（1）未区分顺流交易和逆流交易——逆流交易还要分少数股东的那部分损益；（2）存货减值准备的连带影响——抵消了未实现利润后，对应的存货跌价准备也可能需要调整。","cat":"合并报表","kw":""},{"q":"如何判断是否对被投资单位具有'重大影响'？","a":"根据CAS2第二条，重大影响是指投资方对被投资单位的财务和经营政策有参与决策的权力，但不能够控制或者与其他方一起共同控制这些政策的制定。\n\n实务判断标准（存在下列情形之一通常表明具有重大影响）：\n（1）在被投资单位的董事会或类似权力机构中派有代表；\n（2）参与被投资单位的财务和经营政策制定过程；\n（3）与被投资单位之间发生重要交易；\n（4）向被投资单位派出管理人员；\n（5）向被投资单位提供关键技术资料。\n\n持股比例通常是一个重要参考：直接或间接持有20%以上但低于50%的表决权，一般认为具有重大影响。但比例不是绝对的——如能证明无法参与决策，即使持股20%也可能不构成重大影响。","cat":"长期股权投资","kw":""},{"q":"长期股权投资成本法和权益法的转换时点及会计处理？","a":"这是一个涉及CAS2和合并报表准则交织的问题。分三种场景：\n\n场景一：公允价值计量→权益法（如追加投资达到重大影响）。在转换日，原持有的股权投资按公允价值重新计量，公允价值与账面价值的差额计入当期损益或留存收益。\n\n场景二：权益法→成本法（如追加投资取得控制权，形成非同一控制下合并）。原持有的股权投资按购买日公允价值重新计量，差额计入投资收益。同时原计入其他综合收益的金额转入当期损益。\n\n场景三：成本法→权益法（如处置部分股权丧失控制权但仍具有重大影响）。剩余股权在丧失控制权日按公允价值重新计量，差额计入投资收益。之后按权益法进行后续计量并追溯调整。\n\n实务中需要特别注意转换日的确定——通常是实际交割日或完成工商变更登记日，要有充足的审计证据支持。个人理解，供参考。","cat":"长期股权投资","kw":""},{"q":"长期股权投资权益法下，被投资单位其他综合收益变动，投资方如何处理？","a":"根据CAS2（长期股权投资准则）第十二条：投资方在确认应享有被投资单位净损益的份额时，应当以取得投资时被投资单位各项可辨认资产等的公允价值为基础，对被投资单位的净利润进行调整后确认。\n\n对于被投资单位其他综合收益的变动，投资方应当按照应享有的份额，调整长期股权投资的账面价值，同时计入其他综合收益。\n\n具体分录为：借：长期股权投资-其他综合收益，贷：其他综合收益（或相反分录）。\n\n需要特别注意的是：（1）该其他综合收益在以后期间能否重分类进损益，取决于被投资单位对其的分类；（2）如果投资方处置了该项长期股权投资，原计入其他综合收益的金额应当转入投资收益。","cat":"长期股权投资","kw":""},{"q":"履约义务在一段时间内履行的三个条件怎么应用？","a":"CAS14第十一条规定，满足下列任一条件即属于在一段时间内履行履约义务，应按履约进度确认收入：\n\n条件一：客户在企业履约的同时即取得并消耗企业履约所带来的经济利益。典型场景：运输服务、保洁服务。\n\n条件二：客户能够控制企业履约过程中的在建商品。典型场景：在客户场地上建造资产。\n\n条件三：企业履约过程中所产出的商品具有不可替代用途，且企业在整个合同期间内有权就累计至今已完成的履约部分收取款项。这是一个联合条件，两个子条件必须同时满足。\n\n三个条件都不满足的，属于在某一时点履行履约义务，商品控制权转移给客户时一次性确认收入。实务中定制化设备制造适用条件三的场景较多，但「不可替代」和「有权收款」都需要充分证据支撑。","cat":"收入准则","kw":""},{"q":"附有质量保证条款的销售如何区分保证型质保和服务型质保？","a":"根据CAS14第三十三条，需要判断质保是否向客户提供了一项「额外服务」。\n\n第一，保证型质保：为向客户保证所销售的商品符合既定标准而提供的质保，属于一项保证，仍按原收入准则处理——确认预计负债。该质保不会产生单独的履约义务。\n\n第二，服务型质保：向客户提供除商品质量保证之外的额外服务（如延长保修、定期维护），构成单项履约义务。收入应在质保服务期间内分摊确认。\n\n判断实务要点：（1）质保是否为法定要求——法定质保通常是保证型；（2）客户是否可以单独购买该质保——如果可以，是服务型的强信号；（3）质保期限是否明显长于行业惯例。\n\n个人理解，供参考。","cat":"收入准则","kw":""},{"q":"主要责任人和代理人的判断标准是什么？对收入确认有什么影响？","a":"根据CAS14第三十四条，企业在向客户转让商品前是否拥有对该商品的控制权，是判断主要责任人还是代理人的核心标准。\n\n三项具体判断指标：\n（1）企业是否承担向客户转让商品的主要责任；\n（2）企业是否在转让商品之前或之后承担了该商品的存货风险；\n（3）企业是否有权自主决定所交易商品的价格。\n\n如果满足上述三个条件中的任意一项，通常表明企业是主要责任人，应按总额法确认收入（按已收或应收对价总额）。如果三项都不满足，则为代理人，应按净额法确认收入。\n\n实务中电商平台、贸易中间商等需要特别分析。关键看谁对客户「负责」，谁承担存货风险，谁有定价权。个人理解，供参考。","cat":"收入准则","kw":""},{"q":"新收入准则下，合同资产和应收账款到底应该怎么区分？实务必操上有什么判断要点？","a":"这个问题需要从两个层面来看。\n\n第一，理论层面。根据CAS14（收入准则）第三十四条：合同资产是企业已向客户转让商品而有权收取对价的权利，该权利取决于时间流逝之外的其他因素。应收账款是企业无条件收取对价的权利，仅取决于时间流逝。\n\n关键区别在于「是否还有未履行的义务」。合同资产通常对应已发货但质保或其他履约义务尚未完成的情形；应收账款则是所有履约义务均已完成。\n\n第二，实务判断要点：（1）看合同条款——如果收款权附有除信用风险之外的条件，就是合同资产；（2）看履约进度——未完工部分的应收款应为合同资产；（3）看质保条款——质保期内的应收款需判断是保证型还是服务型。\n\n实务中常见误区是把所有已开票未收款都归为应收账款。宜逐笔分析合同条款中的收款条件。","cat":"收入准则","kw":""},{"q":"购买日可辨认净资产公允价值如何确定？尤其是无形资产评估部分。","a":"根据CAS20第十三条，购买方在购买日应当对合并成本进行分配，确认被购买方各项可辨认资产、负债及或有负债的公允价值。\n\n可辨认无形资产的识别是实务中的重点和难点：\n\n第一，无论被购买方账面是否确认，只要满足「可辨认性标准」（可分离或源自合同性权利），都应在购买日按公允价值单独确认。常见的有：客户关系、未完成订单、技术专利、商标、非竞争协议等。\n\n第二，公允价值的确定方法：优先使用活跃市场报价（通常不适用）；其次采用估值技术，如多期超额收益法（MPEEM）评估客户关系、收益提成法（Relief-from-Royalty）评估商标和专利。\n\n第三，评估参数的选择需合理且有依据，包括折现率、预期使用寿命、客户流失率等，建议在底稿中详细记录。\n\n个人理解，供参考。","cat":"企业合并","kw":""},{"q":"同一控制下企业合并在合并报表中如何追溯调整比较期数据？","a":"CAS20规定同一控制下企业合并采用权益结合法，视同合并后的报告主体自最终控制方开始控制时点起一直存在。\n\n合并报表编制要点：\n第一，合并资产负债表：被合并方的资产、负债按原账面价值计量，不产生新的商誉。合并对价与被合并方净资产账面价值的差额，调整资本公积或留存收益。\n\n第二，合并利润表：应当包含被合并方自合并当期期初至合并日的损益，同时追溯调整前期比较数据。\n\n第三，合并现金流量表：同样追溯调整比较期数据。\n\n实务中常见问题：如果被合并方在合并前与最终控制方的其他子公司发生过交易，需要特别注意内部交易的抵消处理。个人理解，供参考。","cat":"企业合并","kw":""},{"q":"非同一控制下企业合并中，被购买方原来确认的商誉在合并报表中如何处理？","a":"首先要区分被购买方原已确认的商誉的性质。如果是被购买方通过自身之前的并购形成的商誉，在购买方的合并报表中不予确认。\n\n根据CAS20（企业合并准则），非同一控制下企业合并采用购买法。购买方在购买日对被购买方的各项可辨认资产、负债按照公允价值进行计量，购买对价超过被购买方可辨认净资产公允价值份额的差额，确认为本次合并的商誉。\n\n实务中需要特别注意：被购买方原有商誉不属于可辨认资产，因此不单独计量，其价值已包含在本次合并产生的商誉中。个人理解，供参考。","cat":"企业合并","kw":""}],"standards":[{"s":"CAS 41 在其他主体中权益的披露","c":"规范在子公司、合营安排、联营企业和未纳入合并范围的结构化主体中权益的披露要求","t":""},{"s":"CAS 38 首次执行企业会计准则","c":"规范首次执行日追溯调整原则、豁免事项及首次执行日报表的编制","t":""},{"s":"CAS 37 金融工具列报","c":"规范金融负债和权益工具的区分、金融资产和金融负债的抵销条件以及相关披露","t":""},{"s":"CAS 35 分部报告","c":"规范经营分部的确定（管理法）、分部信息的列报和披露","t":""},{"s":"CAS 34 每股收益","c":"规范基本每股收益和稀释每股收益的计算，以及潜在普通股的稀释性判断（库存股法）","t":""},{"s":"CAS 31 现金流量表","c":"规范现金流量表的编制（直接法和间接法）、现金及现金等价物的界定和三大类活动的分类","t":""},{"s":"CAS 30 财务报表列报","c":"规范财务报表的构成、持续经营评估、权责发生制、报表项目的抵销和列报一致性","t":""},{"s":"CAS 29 资产负债表日后事项","c":"规范资产负债表日后调整事项和非调整事项的区分及处理","t":""},{"s":"CAS 28 会计政策变更","c":"规范会计政策变更、会计估计变更和前期差错更正的区分、追溯调整法和未来适用法的应用条件","t":""},{"s":"CAS 24 套期会计","c":"规范公允价值套期、现金流量套期和境外经营净投资套期的确认、计量和套期有效性评估","t":""},{"s":"CAS 19 外币折算","c":"规范外币交易的即期汇率/近似汇率折算、境外经营财务报表的折算和外币折算差额处理","t":""},{"s":"CAS 17 借款费用","c":"规范借款费用的资本化条件（开始/暂停/停止）、专门借款和一般借款的资本化计算","t":""},{"s":"CAS 15 建造合同","c":"规范建造合同的收入确认、合同成本归集和合同预计损失的确认（已被CAS 14取代，但仍有参考意义）","t":""},{"s":"CAS 13 或有事项","c":"规范或有事项的确认（预计负债三个条件）、计量和披露","t":""},{"s":"CAS 9 职工薪酬","c":"规范短期薪酬、离职后福利（设定提存和设定受益）、辞退福利和其他长期职工福利","t":""},{"s":"CAS 7 非货币性资产交换","c":"规范非货币性资产交换的认定、商业实质判断以及公允价值和账面价值计量模式的选择","t":""},{"s":"CAS 6 无形资产","c":"规范无形资产的确认、自行研发支出的资本化条件、后续计量和减值","t":""},{"s":"CAS 5 生物资产","c":"规范消耗性生物资产、生产性生物资产和公益性生物资产的确认和计量","t":""},{"s":"CAS 3 投资性房地产","c":"规范投资性房地产的确认、计量（成本模式或公允价值模式）及转换处理","t":""},{"s":"CAS 1 存货","c":"规范存货的初始确认（成本）、后续计量（成本与可变现净值孰低）和发出计价方法","t":""},{"s":"CAS 40 合营安排","c":"规范合营安排的分类（共同经营vs合营企业）和会计处理，核心是判断权利是对特定资产/负债还是对净资产的分享","t":""},{"s":"CAS 2 长期股权投资","c":"规范长期股权投资的初始计量、后续计量（成本法vs权益法）、核算方法转换、减值和处置","t":""},{"s":"CAS 18 所得税","c":"规范资产负债表债务法下的递延所得税——暂时性差异、递延所得税资产/负债的确认和计量","t":""},{"s":"CAS 8 资产减值","c":"规范长期资产的减值测试——可收回金额（公允价值减费用与使用价值孰高），商誉每年必测，减值不可转回","t":""},{"s":"CAS 22 金融工具确认和计量","c":"规范金融资产分类（AC/FVOCI/FVTPL）、预期信用损失模型（ECL）、金融负债分类、嵌入式衍生工具分拆","t":""},{"s":"CAS 21 租赁","c":"新租赁准则：承租人单一会计模型，低价值/短期豁免除外，出租人维持经营租赁和融资租赁双模型","t":""},{"s":"CAS 14 收入","c":"新收入准则（五步法模型）：识别合同→识别单项履约义务→确定交易价格→分摊价格→在履约时点/时段确认收入。核心改变是控制权转移替代风险报酬转移","t":""},{"s":"CAS 33 合并财务报表","c":"规范合并范围的确定（控制三要素模型）、合并程序、内部交易抵销、少数股东权益计量，以及结构化主体的合并判断","t":""},{"s":"CAS 20 企业合并","c":"规范同一控制和非同一控制下企业合并的确认、计量和披露，核心概念包括购买法、合并成本、商誉、或有对价等","t":""},{"s":"CAS42 持有待售","c":"持有待售资产的分类条件、计量规则（孰低法）、处置组的列报","t":""},{"s":"CAS39 公允价值计量","c":"三个层次输入值体系（市场报价→可观察输入值→不可观察输入值）","t":""},{"s":"CAS36 关联方披露","c":"关联方认定标准、关联交易定价政策和金额的披露要求","t":""},{"s":"CAS33 合并报表","c":"合并范围的判断（控制三要素）、内部交易抵消、少数股东权益/损益","t":""},{"s":"CAS22 金融工具","c":"AC/FVOCI/FVTPL三分类，预期信用损失模型（ECL），SPPI测试","t":""},{"s":"CAS21 租赁","c":"承租人单一模型（使用权资产+租赁负债），出租人保留融资/经营租赁分类","t":""},{"s":"CAS20 企业合并","c":"区分同一控制（权益结合法）与非同一控制（购买法），规范商誉确认","t":""},{"s":"CAS18 所得税","c":"资产负债表债务法：暂时性差异→递延所得税资产/负债计量","t":""},{"s":"CAS16 政府补助","c":"规范政府补助的确认（总额法/净额法）及与资产相关/收益相关的分类","t":""},{"s":"CAS14 收入","c":"五步法收入确认模型：识别合同→识别履约义务→确定交易价格→分摊→确认","t":""},{"s":"CAS12 债务重组","c":"规范不改变交易对手方前提下债权人和债务人重新达成协议的处理","t":""},{"s":"CAS11 股份支付","c":"规范以权益工具或现金结算的股份支付交易的确认、计量和披露","t":""},{"s":"CAS8 资产减值","c":"规范资产可收回金额的计量、减值损失的确认和转回，含商誉减值测试","t":""},{"s":"CAS2 长期股权投资","c":"规范长期股权投资的初始确认、后续计量（成本法/权益法）及核算方法转换处理","t":""}]};
var API_BASE = window.location.origin;

// ── 初始化 ──────────────────────────────────────────
(function init(){
  loadStats();
  setInterval(loadStats, 30000); // 每30秒刷新统计
})();

async function loadStats(){
  try{
    var resp = await fetch(API_BASE + '/api/kb/stats');
    if(resp.ok){
      var data = await resp.json();
      document.getElementById('kb-count').textContent = data.total_entries || data.qa_count || '--';
      document.getElementById('kb-queries').textContent = data.total_queries || '--';
      document.getElementById('status-dot').className = 'status-dot online';
    } else {
      document.getElementById('status-dot').className = 'status-dot offline';
    }
  }catch(e){
    document.getElementById('status-dot').className = 'status-dot offline';
  }
}

function switchTab(name,btn){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
  btn.classList.add('active');
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active')});
  document.getElementById('panel-'+name).classList.add('active');
}
