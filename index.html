允价值与账面价值的差额计入投资收益,取得的资产按放弃债权的公允价值计量。以非现金资产偿债时,债务人按资产账面价值转出,不确认资产处置损益(特殊性)。个人理解,供参考。","cat":"债务重组","kw":"以资产清偿,债务重组收益,其他收益,投资收益,公允价值,账面价值,资产处置","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第12号——债务重组"},{"id":"QA0369","q":"企业合并中购买的研发项目如何处理?","a":"购买的研发项目(在研项目)在非同一控制下企业合并中按公允价值确认为无形资产(即使被购买方尚未完成开发)。后续研发支出按CAS 6判断资本化或费用化合并中确认无形资产在剩余开发期间摊销。","cat":"企业合并","kw":"在研项目,研发,无形资产,公允价值,开发,摊销","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第20号——企业合并、企业会计准则第6号——无形资产、企业会计准则第17号——借款费用"},{"id":"QA0370","q":"子公司清算期间母公司如何核算?","a":"子公司进入清算程序时母公司的处理:(1)母公司根据清算组提供的清算财务信息评估是否仍控制(清算期间控制权通常转移给清算组);(2)丧失控制权时终止合并按公允价值重新计量剩余权益;(3)清算期间确认投资损失;(4)最终收到清算分配时确认收益或损失。","cat":"合并报表","kw":"子公司清算,控制权丧失,清算组,公允价值,投资损失,清算分配","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"QA0371","q":"合并报表中租赁交易的抵销?","a":"集团内部租赁交易的合并抵销:(1)经营性租赁—抵销租金收入和租金费用;(2)融资性租赁—抵销应收融资租赁款/应付融资租赁款以及未实现融资收益/费用。内部租赁涉及的递延所得税也需抵销。实务复杂的集团内部租赁安排(如售后租回)需逐层分析。","cat":"合并报表","kw":"内部租赁,经营性租赁,融资性租赁,抵销,递延所得税,售后租回","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第33号——合并财务报表、企业会计准则第21号——租赁、企业会计准则第18号——所得税"},{"id":"QA0372","q":"新收入准则下免费质保和收费延保的区分?","a":"免费质保(法定三包)按CAS 13处理确认为预计负债。收费延保(额外购买的延长保修)按CAS 14处理作为单独履约义务。判断标准:质保是否由法律规定期限是否超过行业惯例企业是否额外收费。实务中家电和汽车行业对此区分最为常见。","cat":"收入准则","kw":"质量保证,免费质保,延保,预计负债,单独履约义务,法定质保","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第14号——收入、企业会计准则第13号——或有事项"},{"id":"QA0373","q":"合同履约成本减值后能否转回?","a":"已确认减值的合同履约成本在后续满足原减值测试条件好转时可转回转回金额以原已计提的减值金额为上限转回后账面不得超过未计提减值时的金额。转回计入当期损益。这不同于固定资产减值的不得转回规则。","cat":"收入准则","kw":"合同履约成本,减值,转回,上限,当期损益,固定资产减值","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第14号——收入"},{"id":"QA0374","q":"企业合并中购买的研发项目如何处理?","a":"购买的研发项目(在研项目)在非同一控制下企业合并中按公允价值确认为无形资产(即使被购买方尚未完成开发)。后续研发支出按CAS 6判断资本化或费用化合并中确认无形资产在剩余开发期间摊销。","cat":"企业合并","kw":"在研项目,研发,无形资产,公允价值,开发,摊销","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第20号——企业合并、企业会计准则第6号——无形资产、企业会计准则第17号——借款费用"},{"id":"QA0375","q":"子公司清算期间母公司如何核算?","a":"子公司进入清算程序时母公司的处理:(1)母公司根据清算组提供的清算财务信息评估是否仍控制(清算期间控制权通常转移给清算组);(2)丧失控制权时终止合并按公允价值重新计量剩余权益;(3)清算期间确认投资损失;(4)最终收到清算分配时确认收益或损失。","cat":"合 —企业合并、企业会计准则第6号——无形资产、企业会计准则第17号——借款费用"},{"id":"QA0420","q":"子公司清算期间母公司如何核算?","a":"子公司进入清算程序时母公司的处理:(1)母公司根据清算组提供的清算财务信息评估是否仍控制(清算期间控制权通常转移给清算组);(2)丧失控制权时终止合并按公允价值重新计量剩余权益;(3)清算期间确认投资损失;(4)最终收到清算分配时确认收益或损失。","cat":"合并报表","kw":"子公司清算,控制权丧失,清算组,公允价值,投资损失,清算分配","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"QA0421","q":"合并报表中租赁交易的抵销?","a":"集团内部租赁交易的合并抵销:(1)经营性租赁—抵销租金收入和租金费用;(2)融资性租赁—抵销应收融资租赁款/应付融资租赁款以及未实现融资收益/费用。内部租赁涉及的递延所得税也需抵销。实务复杂的集团内部租赁安排(如售后租回)需逐层分析。","cat":"合并报表","kw":"内部租赁,经营性租赁,融资性租赁,抵销,递延所得税,售后租回","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第33号——合并财务报表、企业会计准则第21号——租赁、企业会计准则第18号——所得税"},{"id":"QA0422","q":"资产负债表日后事项如何区分调整事项和非调整事项？","a":"根据CAS29（资产负债表日后事项准则），调整事项和非调整事项的核心区分标准是：该事项在资产负债表日前是否已经存在。\n\n①调整事项——在资产负债表日已存在，日后有了新的证据。如：日后已证实资产发生减损、销售退回、已决诉讼等。应当在报表中调整已确认的金额。\n\n②非调整事项——在资产负债表日后新发生。如：日后发生的重大并购、火灾损失、外汇汇率大幅变动等。不调整报表金额，但应在附注中披露其性质及财务影响。\n\n实务中容易混淆的是：日后发生的诉讼和解——如果诉讼在资产负债表日前已存在（只是尚未判决），日后和解属于调整事项；如果诉讼在日后才提起，则属于非调整事项。个人理解，供参考。","cat":"期后事项","kw":"资产负债表日后事项,调整事项,非调整事项,期后事项,审计","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第29号——资产负债表日后事项"},{"id":"QA0423","q":"企业合并中递延所得税如何处理？","a":"企业合并中递延所得税的处理涉及购买方和被购买方两个层面。\n\n第一层面（被购买方）：购买日，被购买方可辨认资产、负债按公允价值计量，与计税基础产生暂时性差异，需确认递延所得税资产或负债。注意：被购买方原有已确认的递延所得税资产，在合并中需重新评估可收回性。\n\n第二层面（购买方）：合并产生的商誉，其账面价值（初始确认金额）与计税基础之间一般不产生递延所得税——因为商誉初始确认的豁免（CAS18第十一条规定，商誉初始确认时既不影响会计利润也不影响应纳税所得额，不确认递延所得税负债）。\n\n③购买方取得的可抵扣暂时性差异（如被购买方未弥补亏损），在购买日满足可收回条件的，确认为递延所得税资产并相应减少商誉；如不满足，后续满足条件时计入当期损益。个人理解，供参考。","cat":"企业合并","kw":"递延所得税,企业合并,商誉,暂时性差异,可抵扣亏损,购买法","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第18号——所得税"},{"id":"QA0424","q":"投资性房地产的后续计量模式如何选择？公允价值模式能否转回成本模式？","a":"根据CAS3（投资性房地产准则），后续计量分为成本模式和公允价值模式两种。\n\n选择要点：\n①企业通常采用成本模式，对所有投资性房地产采用一致的处理——计提折旧/摊销并进行减值测试。\n②如有确凿证据表明投资性房地产的公允价值能够持续可靠取得（通常要求活跃市场交易），可以采用公允价值模式。\n③公允价值模式下不计提折旧或摊销，公允价值变动计入当期损益。\n\n关键限制：成本模式→公允价值模式可以转换（属于会计政策变更），但公允价值模式→成本模式不可转回（CAS3第十二条有明确规定，公允价值模式转为成本模式不符合准则规定）。实务中初次采用公允价值模式时需确保满足所有条件，否则后续无法回头。个人理解，供参考。","cat":"投资性房地产","kw":"投资性房地产,成本模式,公允价值模式,后续计量,政策变更,不可转回","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第3号——投资性房地产"},{"id":"QA0425","q":"中期财务报告的编制要求？是否需要像年报一样审计？","a":"根据CAS32（中期财务报告准则），中期财务报告是指以中期为基础编制的财务报告（中期可以是短于一个完整会计年度的期间，如季度或半年度）。\n\n编制要求：\n①中期报表至少应包括：资产负债表、利润表、现金流量表和附注。附注可以比年报简化，但应披露对理解中期财务数据重要的信息和事项。\n②中期会计政策应与年报一致。如需变更，应在附注中披露变更的性质、内容和原因。\n③中期所得税在中期期末计算，按全年有效税率估计。\n\n关于审计：中期财务报告通常不需要审计。但上市公司中期报告（半年度报告）一般需经会计师事务所审阅（而非审计）。审阅的程序远少于审计，主要采用询问和分析程序，不实施控制测试和实质性程序。实务中，如果企业有融资协议要求中期报表经审计，则按协议执行。个人理解，供参考。","cat":"中期财务报告","kw":"中期财务报告,季度报告,半年度报告,审计,审阅,会计政策,所得税","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第32号——中期财务报告"},{"id":"QA0426","q":"股份支付取消或结算时如何处理？","a":"根据CAS11（股份支付准则），股份支付在取消或结算时的处理区分不同情形。\n\n①企业取消已授予的权益工具（如因未满足非市场条件）：应立即确认原本应在剩余等待期内确认的金额，视同加速行权。\n②企业以现金回购已授予的权益工具：回购金额高于该权益工具在回购日的公允价值部分，计入当期费用。\n③企业向员工支付现金结算替代权益结算：应作为权益工具回购处理，同时确认新增的负债。\n\n实务中注意：取消通常是从未达到行权条件（如业绩未达标）出发判断。如果是企业主动取消（即使条件尚未明确不满足），也应视同满足条件而加速确认。个人理解，供参考。","cat":"股份支付","kw":"股份支付,取消,结算,加速行权,回购,等待期","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第11号——股份支付"},{"id":"QA0427","q":"关联方交易的披露范围？关联方认定中的常见误区？","a":"根据CAS36（关联方披露准则），关联方交易的披露遵循实质重于形式原则。\n\n披露范围：\n①企业无论是否发生关联方交易，都应在附注中披露母公司及最终控制方的名称。\n②发生关联方交易时，应披露关联方关系的性质、交易类型及交易要素（金额、定价政策、未结算项目等）。\n③合并报表中仅披露与合并范围外关联方的交易（内部交易已在合并时抵销）。\n\n常见误区：\n①认为持股不达20%就不算关联方——实际控制人、关键管理人员及其近亲属控制的企业，无论持股多少都构成关联方。\n②认为只有交易金额大的才需披露——所有关联方交易均需披露，无论金额大小。\n③忽略「间接」关联关系——如通过共同董事或管理层实现的实质控制，也构成关联方。个人理解，供参考。","cat":"关联方披露","kw":"关联方,关联交易,披露,实质重于形式,控制人,关键管理人员","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第36号——关联方披露"},{"id":"QA0428","q":"生物资产如何分类？成熟生产性生物资产的折旧问题？","a":"根据CAS5（生物资产准则），生物资产分为三类：\n①消耗性生物资产——如用材林、肉用牲畜，类似存货，收获时结转成本。\n②生产性生物资产——如奶牛、产果树，类似固定资产，需计提折旧。\n③公益性生物资产——如防护林，不产生经济利益，不计提折旧。\n\n成熟生产性生物资产的折旧：\n①折旧方法可选年限平均法、工作量法、产量法等。实务中，如果产出量逐年较稳定，年限平均法最常用。\n②折旧年限应根据资产预计使用寿命、产出能力、物理损耗和技术损耗综合确定。\n③如果生物资产的产出能力大幅下降或发生毁损，需按CAS8进行减值测试。\n④折旧计入相关成本或当期损益——如果树的折旧计入果实生产成本。个人理解，供参考。","cat":"生物资产","kw":"生物资产,消耗性,生产性,公益性,折旧,减值","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第5号——生物资产"},{"id":"QA0429","q":"分部报告的确定标准？经营分部和报告分部如何区分？","a":"根据CAS35（分部报告准则），分部报告的核心是「管理法」——以企业内部管理层的决策和报告方式为基础。\n\n经营分部的认定条件（同时满足）：\n①从事可获取收入并发生费用的经营活动；\n②其经营成果由企业内部报告给首席经营决策者；\n③其财务信息定期被评估用于资源分配和业绩评价。\n\n报告分部的量化门槛（满足任意一项）：\n①分部收入（含对外和分部间）占所有分部总收入≥10%；\n②分部利润或亏损的绝对值占所有盈利分部利润总和和亏损分部亏损总和两者较高者的≥10%；\n③分部资产占所有分部资产总和≥10%。\n\n实务中：不能仅因为某个经营分部不满足10%门槛就不报告——如果所有报告分部的对外收入合计＜企业总收入的75%，还需增加报告分部直至达到75%。另外，分部间的交易定价应在附注中披露。个人理解，供参考。","cat":"分部报告","kw":"分部报告,经营分部,报告分部,管理法,10%门槛,75%测试","src":"深圳证券交易所 会计监管动态","std_ref":"企业会计准则第35号——分部报告"},{"id":"CY0487","q":"母公司代⼦公司⽀付⼚建⼯程及设备款账务处理","a":"由于⼟地使⽤权是以⼦公司名义取得，⼦公司也确实是该⼟地及将建的地⾯上⼚房的实际使⽤者，故应将⼟地使⽤权和在建⼯程确认为⼦公司的资产，母公司按代收代付款项处理，挂对⼦公司的往来；与之相对应，⼦公司在确认在建⼯程的同时，挂对母公司的往来。如果该款项不需要⽀付给母公司的，则⼦公司计⼊资本公积，母公司应将代付款项计⼊对该⼦公司的长期股权投资成本。 因房屋和⼟地都在⼦公司名下，故房产税的纳税⼈是⼦公司。个人理解，供参考。","cat":"长期股权投资","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"QA0431","q":"持有待售资产的确认条件？停止折旧的时间点？","a":"根据CAS42（持有待售的非流动资产、处置组和终止经营准则），持有待售类别适用于主要通过出售（而非持续使用）收回账面价值的非流动资产或处置组。\n\n确认条件（必须同时满足）：\n①根据类似交易中的惯例，在当前状况下即可立即出售；\n②出售极可能发生——即企业已作出决议、已获得确定的购买承诺、预计将在一年内完成交易。\n\n折旧停止时间点：划分为持有待售类别之日起，停止计提折旧或摊销。\n\n③初始计量：持有待售的非流动资产应按账面价值与公允价值减去出售费用后的净额孰低计量。如后者的余额更低，差额计入资产减值损失。\n④后续计量：后续资产负债表日，若公允价值减出售费用的净额回升，原计提的减值可以转回（但商誉减值不可转回）。个人理解，供参考。","cat":"持有待售","kw":"持有待售,处置组,停止折旧,极可能出售,公允价值,减值转回","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第42号——持有待售的非流动资产、处置组和终止经营"},{"id":"QA0432","q":"外币报表折算中，折算差额如何处理？","a":"根据CAS19（外币折算准则），企业将境外经营的财务报表折算为记账本位币时，采用以下方法：\n\n①资产负债表中的资产和负债项目，采用资产负债表日的即期汇率折算。所有者权益项目除未分配利润外采用发生时的即期汇率折算。\n②利润表中的收入和费用项目，采用交易发生日的即期汇率或近似汇率折算。\n\n折算差额：上述折算产生的差额，在所有者权益中单独列示为其他综合收益——外币报表折算差额。处置境外经营时，与该境外经营相关的外币报表折算差额应当自所有者权益转入当期损益。\n\n③少数股东应承担的外币报表折算差额，在合并资产负债表中归属于少数股东权益。实务中容易遗漏这一点——有人将全部折算差额都归入母公司，忽略了少数股东应承担的部分。个人理解，供参考。","cat":"外币折算","kw":"外币折算,境外经营,折算差额,其他综合收益,即期汇率,少数股东","src":"财政部 企业会计准则解释公告","std_ref":"企业会计准则第19号——外币折算"},{"id":"QA0433","q":"或有事项的确认条件？预计负债金额如何可靠估计？","a":"根据CAS13（或有事项准则），或有事项相关义务确认为预计负债需同时满足三个条件：\n①该义务是企业承担的现时义务；\n②履行该义务很可能导致经济利益流出企业（很可能指可能性>50%）；\n③该义务的金额能够可靠计量。\n\n金额估计方法：\n①连续范围且等可能——取中间值（期望值）。如预计赔偿在100万-200万之间且每一金额等可能，则取150万。\n②单个项目——最佳估计为最可能发生的金额。如诉讼最可能判决赔300万，则取300万。\n③多个项目——按期望值法。如产品保修，按历史返修率和平均维修成本加权计算。\n\n实务中：如果金额无法可靠估计（如诉讼结果极不确定），不确认预计负债但应在附注中充分披露。预计负债的初始计量不考虑预期第三方补偿，补偿金额在基本确定能收到时单独确认为资产。个人理解，供参考。","cat":"或有事项","kw":"或有事项,预计负债,现时义务,很可能流出,可靠估计,最佳估计","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第13号——或有事项"},{"id":"QA0434","q":"非货币性资产交换中的商业实质如何判断？","a":"根据CAS7（非货币性资产交换准则），非货币性资产交换的确认和计量取决于交换是否具有商业实质。\n\n具有商业实质的判断标准（满足任意一项）：\n①换入资产的未来现金流量在风险、时间和金额方面与换出资产显著不同；\n②换入资产与换出资产的预计未来现金流量现值不同，且其差额与换入资产和换出资产的公允价值相比是重大的。\n\n实务中具有商业实质的典型场景：\n- 以生产设备换入长期股权投资（现金流量模式从经营转为投资）；\n- 以闲置房产换入生产经营设备（从无稳定现金流变为有现金流）。\n\n不具有商业实质的情形：如以同等性质的存货互换（同质易货贸易），或者关联方之间的非货币性交换可能被用来操纵利润，需高度关注。\n\n不具有商业实质时，应以换出资产的账面价值为基础计量换入资产的成本，不确认损益。个人理解，供参考。","cat":"非货币性资产交换","kw":"非货币性资产交换,商业实质,公允价值,关联方,账面价值,交换损益","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第7号——非货币性资产交换"},{"id":"QA0435","q":"保险合同准备金计量中的合同分组原则？","a":"根据CAS25（保险合同准则，与IFRS 17趋同），保险合同的计量以合同分组为基础。\n\n分组原则：\n①先识别保险合同的组合（具有相似风险并统一管理的合同）。\n②再将每一组合内的合同分为三组：亏损合同组、未来很可能不会变为亏损的合同组、其余合同组。\n③同一组内的合同应在初始确认时点即进行分组，后续不可重新分组。\n\n计量方法：\n- 一般模型（GMM）：适用于大多数保险合同，包括履约现金流量+合同服务边际。\n- 保费分配法（PAA）：适用于保险期≤1年的短期合同，简化处理。\n\n实务中：合同分组对保险公司财务影响很大——因为亏损合同组亏损需立即确认，而盈利合同的利润在保障期内逐步释放。分组不当可能导致大额首日亏损或利润延迟确认。个人理解，供参考。","cat":"保险合同","kw":"保险合同,合同分组,亏损合同,亏损确认,履约现金流量,合同服务边际","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第25号——保险合同"},{"id":"QA0436","q":"职工薪酬中，辞退福利和离职后福利如何区分？","a":"根据CAS9（职工薪酬准则），辞退福利和离职后福利在企业性质和会计处理上均有本质区别。\n\n辞退福利：企业在职工劳动合同到期前解除劳动关系而给予的补偿，或在职工自愿接受裁减时给予的补偿。是为终止合同支付的。\n①确认时点：企业不能单方面撤回解除劳动关系计划或裁减建议时；或确认涉及支付辞退福利的重组相关成本或费用时（孰早）。\n②会计处理：计入当期损益（管理费用），不需计提。\n\n离职后福利：职工退休或离职后，企业提供的养老金、年金等福利。是为退休后生活提供的。\n①分为设定提存计划（如社保养老金，按固定比例计提）和设定受益计划（需精算评估）。\n②会计处理：设定提存计划计入当期损益或相关资产成本；设定受益计划需精算确定义务现值并摊销。\n\n实务中容易混淆：经济性裁员补偿（辞退福利）vs 退休返聘工资（离职后福利）需准确判断性质。个人理解，供参考。","cat":"职工薪酬","kw":"辞退福利,离职后福利,设定提存计划,设定受益计划,经济性裁员,退休返聘","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第9号——职工薪酬"},{"id":"428","cat":"审计准则","n":"中国注册会计师审计准则第1521号——注册会计师对其他信息的责任","d":"其他信息＝年度报告中除财务报表和审计报告以外的财务信息和非财务信息（管理层讨论分析、公司治理报告、社会责任报告等）。\n注册会计师应阅读其他信息，考虑是否存在与财务报表或审计中了解到的情况的重大不一致。\n如识别重大不一致→与管理层讨论；如未更正且重大→在审计报告中增加其他信息段，或考虑解除业务约定。"},{"id":"427","cat":"审计准则","n":"中国注册会计师审计准则第1501号——对财务报表形成审计意见和出具审计报告","d":"审计报告要素：标题、收件人、审计意见段、形成审计意见的基础、管理层和治理层的责任、注册会计师的责任、签字盖章、报告日期。\n\n第十六条 审计意见类型：\n（一）无保留意见：报表公允反映，无重大错报；\n（二）保留意见：错报重大但不广泛，或无法获取充分适当证据但可能的错报重大而不广泛；\n（三）否定意见：错报重大且广泛（报表整体不可接受）；\n（四）无法表示意见：无法获取充分适当证据且可能的错报重大而广泛。\n\n强调事项段：提醒使用者关注已在报表中列报/披露的重要事项；其他事项段：提醒使用者关注未在报表中列报/披露但与审计相关的事项。两者均不影响审计意见类型。"},{"id":"426","cat":"审计准则","n":"中国注册会计师审计准则第1332号——期后事项","d":"期后事项＝财务报表日至审计报告日之间发生的事项，以及注册会计师在审计报告日后知悉的事实。\n第一期后（报表日至审计报告日）：主动识别，设计审计程序。\n第二期后（审计报告日至报表公布日）：如知悉可能影响报表的事实→与管理层讨论→考虑修改报表/审计报告。\n第三期后（报表公布日后）：无义务主动识别；如知悉→与管理层讨论→必要时采取适当措施。"},{"id":"425","cat":"审计准则","n":"中国注册会计师审计准则第1324号——持续经营","d":"注册会计师有责任就管理层运用持续经营假设的适当性获取充分、适当的审计证据，并就是否存在重大不确定性得出结论。\n评价管理层评估涵盖的期间（至少涵盖自资产负债表日起12个月）。\n可能存在重大不确定性的迹象：财务方面（净负债/净流动负债、固定期限借款即将到期且无展期安排、过度依赖短期借款、关键财务比率不佳）；经营方面（关键管理人员离职、关键客户/市场流失、重大供应困难）；其他方面（未决诉讼/监管行动的不利结果、法律法规变化）。\n审计报告影响：如存在重大不确定性且已充分披露→增加「与持续经营相关的重大不确定性」段落（无保留意见+强调事项段）；如未充分披露→保留/否定意见。"},{"id":"424","cat":"审计准则","n":"中国注册会计师审计准则第1321号——会计估计和相关披露的审计","d":"了解管理层如何作出会计估计及相关的控制，识别和评估重大错报风险。\n应对会计估计风险的三种方法：\n（一）测试管理层如何作出估计以及所依据的数据（包括使用的模型和假设）；\n（二）测试相关控制的运行有效性；\n（三）作出注册会计师的点估计或区间估计，以评价管理层的点估计。\n关注估计不确定性：高度不确定的估计可能导致特别风险。\n评价管理层偏向：是否存在管理层偏向的迹象，偏向是否导致重大错报。"},{"id":"423","cat":"审计准则","n":"中国注册会计师审计准则第1314号——审计抽样","d":"审计抽样：对低于100%的项目实施审计程序，所有抽样单元都有被选取的机会。\n抽样风险：信赖过度/信赖不足（控制测试）、误受/误拒（细节测试）。\n选取方法：随机选样、系统选样、随意选样、整群选样、分层选样（最重要：分层降低变异性）。\n评价结果：推断总体错报，考虑抽样风险。统计抽样可量化抽样风险，非统计抽样依赖职业判断。"},{"id":"422","cat":"审计准则","n":"中国注册会计师审计准则第1312号——函证","d":"第五条 函证＝注册会计师直接从第三方（被询证者）获取书面答复作为审计证据。\n第十条 应当对银行存款（含零余额和本期注销账户）、借款及与金融机构往来的其他重要信息实施函证，除非不重要且重大错报风险很低。\n第十二条 应当对重要的应收账款实施函证，除非不重要或函证很可能无效（需在工作底稿说明理由）。\n第十三条 函证方式：积极式函证（要求被询证者直接回复）和消极式函证（仅在不同意时回复）。\n全过程控制：设计询证函→发出→跟进→收回→评价回函可靠性。替代程序：检查期后收款、销售合同、发货记录等。"},{"id":"421","cat":"审计准则","n":"中国注册会计师审计准则第1311号——对存货、诉讼和索赔、分部信息等特定项目获取审计证据的具体考虑","d":"存货监盘：注册会计师应在盘点现场实施监盘，评价管理层盘点指令和程序，观察盘点执行情况，检查存货，执行抽盘（双向抽盘：从盘点表→实物，从实物→盘点表）。如不能监盘，实施替代程序。\n\n诉讼和索赔：向法律顾问/外部律师发函询证，获取有关诉讼和索赔事项的审计证据。评价未决诉讼对财务报表的影响。"},{"id":"420","cat":"审计准则","n":"中国注册会计师审计准则第1301号——审计证据","d":"第四条 获取充分、适当的审计证据，作为形成审计意见的基础。\n第五条 充分性（数量）：受重大错报风险评估影响，也受审计证据质量影响。\n第六条 适当性（质量）：相关性和可靠性。可靠性受来源和性质影响。\n\n证据可靠程度排列：外部独立来源＞内部来源；直接获取＞间接获取；书面＞口头；原件＞复印件。\n\n第九条 审计程序类型：检查、观察、询问、函证、重新计算、重新执行、分析程序。"},{"id":"419","cat":"审计准则","n":"中国注册会计师审计准则第1231号——针对评估的重大错报风险采取的应对措施","d":"第五条 进一步审计程序包括控制测试和实质性程序。\n第六条 必须实施控制测试的情形：（一）预期控制运行有效；（二）仅实质性程序无法获取充分适当证据。\n第七条 实质性程序包括细节测试和实质性分析程序，针对所有重大类别的交易、账户余额和披露。\n\n总体应对措施（针对报表层次重大错报风险）：强调职业怀疑、指派更有经验的人员、增加不可预见性、总体修改审计程序的性质/时间/范围。"},{"id":"418","cat":"审计准则","n":"中国注册会计师审计准则第1221号——计划和执行审计工作时的重要性","d":"第四条 重要性＝财务报表中错报的金额或性质，单独或汇总起来可能影响使用者决策。\n注册会计师应当确定：（一）财务报表整体重要性；（二）特定类别交易/账户余额/披露的重要性（如适用）；（三）实际执行的重要性（通常为整体重要性的50%-75%）。\n\n第六条 确定重要性时考虑：被审计单位性质和生命周期、使用者及其需求、财务报告编制基础要求、以前期间识别的错报。\n第九条 明显微小错报临界值：低于该金额的错报视为明显微小，无需累积。"},{"id":"417","cat":"审计准则","n":"中国注册会计师审计准则第1211号——重大错报风险的识别和评估","d":"了解被审计单位及其环境（包括内部控制），以识别和评估财务报表层次和认定层次的重大错报风险。\n\n了解内容：行业状况/法律监管环境、被审计单位性质、会计政策选择和运用、目标战略和经营风险、财务业绩衡量评价。\n\n了解内部控制五要素：\n（一）控制环境（治理层和管理层的态度、意识和行动）；\n（二）风险评估过程；\n（三）与财务报告相关的信息系统与沟通；\n（四）控制活动（授权、业绩评价、信息处理、实物控制、职责分离）；\n（五）对控制的监督。"},{"id":"416","cat":"审计准则","n":"中国注册会计师审计准则第1141号——财务报表审计中与舞弊相关的责任","d":"第三条 舞弊＝管理层、治理层、员工或第三方使用欺骗手段获取不当或非法利益的故意行为。\n舞弊类型：编制虚假财务报告（管理舞弊）和侵占资产（员工舞弊）。\n第二十一条 应对管理层凌驾于控制之上的风险（必做程序）：\n（一）测试日常会计分录和其他调整是否适当；\n（二）复核会计估计是否存在偏向；\n（三）评价超出正常经营过程的重大交易的商业理由。\n第五条 对发现错误有效的审计程序未必对发现舞弊有效（舞弊可能涉及串通、伪造、故意遗漏）。"},{"id":"415","cat":"审计准则","n":"中国注册会计师审计准则第1101号——注册会计师的总体目标和审计工作的基本要求","d":"第十一条 注册会计师的总体目标：\n（一）对财务报表整体是否不存在由于舞弊或错误导致的重大错报获取合理保证，使注册会计师能够对财务报表是否在所有重大方面按照适用的财务报告编制基础编制发表审计意见；\n（二）按照审计准则的规定，根据审计结果对财务报表出具审计报告，并与管理层和治理层沟通。\n\n第十六条 注册会计师应当遵守与财务报表审计相关的职业道德要求，包括有关独立性的要求。\n第十七条 审计风险＝重大错报风险×检查风险。重大错报风险包括固有风险和控制风险。\n第十八条 整个审计过程中保持职业怀疑。"},{"id":"414","cat":"企业会计准则","n":"企业会计准则第33号——合并财务报表","d":"第七条 合并范围以控制为基础确定。控制三要素：（一）拥有对被投资方的权力；（二）参与被投资方活动而享有可变回报；（三）有能力运用权力影响回报金额。\n第九条 权力是现时权利，无论是否实际行使。\n第十条 多方各有权利→主导对回报最重大影响活动的一方有控制。\n关于持股比例：多数表决权通常推定有权力，但需考虑潜在表决权（可转换工具、期权等）。\n关于「事实控制」/「分散其他方」：即使持股不到半数，如能单方面主导相关活动也构成控制。\n\n第二十六条 统一会计政策和会计期间，全额合并（母公司理论→实体理论）。\n第三十条 合并抵销：长期股权投资vs子公司所有者权益；内部交易（顺流/逆流/平流）；内部债权债务。\n少数股东权益在合并权益中单独列示，少数股东损益在合并利润中单独列示。"},{"id":"413","cat":"企业会计准则","n":"企业会计准则第28号——会计政策、会计估计变更和差错更正","d":"第四条 会计政策变更条件：（一）法规要求变更；（二）变更能提供更可靠、更相关的信息。\n第五条 不属于政策变更：本质不同交易采用新政策、初次发生/不重要的交易。\n处理方法：追溯调整法（除非无法确定累积影响数→未来适用法）。\n\n第七条 会计估计变更：估计基础变化/新信息/更多经验→修订估计（未来适用法，不追溯）。\n\n第十一条 前期差错：计算错误、政策应用错误、疏忽曲解事实、舞弊等导致的报表错报。\n第十二条 重要前期差错→追溯重述法（重述可比期间报表）；不重要的→调整当期。"},{"id":"412","cat":"企业会计准则","n":"企业会计准则第22号——金融工具确认和计量","d":"【金融资产三分类】（业务模式＋SPPI测试）\n第十七条 摊余成本（AC）：仅收取合同现金流＋通过SPPI测试。\n第十八条 公允价值进其他综合收益（FVOCI）：既收取又出售＋通过SPPI测试。\n第十九条 公允价值进损益（FVTPL）：兜底分类，不满足AC和FVOCI条件的。\n特殊：非交易性权益工具投资可指定为FVOCI（不可撤销），股利进损益，处置价差不进损益直接转留存收益。\n\n【金融负债】以摊余成本计量为主，交易性金融负债以FVTPL计量。\n\n【预期信用损失模型ECL】\n第四十六条 以预期信用损失为基础进行减值。\n第四十八条 三阶段：\n  第一阶段（信用风险未显著增加）：12个月ECL\n  第二阶段（信用风险显著增加但未减值）：整个存续期ECL\n  第三阶段（已发生信用减值）：整个存续期ECL，利息按摊余成本（扣除准备后）计算。"},{"id":"411","cat":"企业会计准则","n":"企业会计准则第21号——租赁","d":"第四条 租赁识别：合同让渡了在一定期间内控制已识别资产使用的权利以换取对价。\n\n【承租人单一模型】\n第十四条 租赁期开始日确认使用权资产和租赁负债。\n第十七条 租赁负债＝租赁付款额的现值，折现率使用租赁内含利率或增量借款利率。\n第二十一条 使用权资产按成本计量，参照固定资产计提折旧。\n豁免：短期租赁（≤12个月）和低价值资产租赁可简化处理。\n\n【出租人】\n第二十八条 分为融资租赁和经营租赁。融资租赁＝实质上转移了与所有权有关的几乎全部风险和报酬。\n第三十五条 融资租赁：确认长期应收款（租赁收款额）并确认未实现融资收益。\n经营租赁：租金收入在租赁期内按直线法确认。"},{"id":"410","cat":"企业会计准则","n":"企业会计准则第20号——企业合并","d":"第二条 企业合并，是指将两个或者两个以上单独的企业合并形成一个报告主体的交易或事项。\n分类：同一控制下企业合并和非同一控制下企业合并。\n\n第五条 同一控制下：合并前后均受同一方/相同多方最终控制且非暂时性。\n第六条 同一控制下合并处理（权益结合法）：资产和负债按账面价值计量；对价与净资产账面价值差额调整资本公积/留存收益；不产生商誉；合并利润表包括被合并方全年损益（视同期初即存在）。\n\n第八条 非同一控制下合并处理（购买法）：合并成本＝付出对价的公允价值。\n第十一条 商誉＝合并成本－可辨认净资产公允价值份额（正→商誉；负→当期损益/负商誉）。\n第十三条 购买日确认被购买方可辨认资产、负债及或有负债，按公允价值计量。\n分步实现合并：原持有的股权按购买日公允价值重新计量，差额计入当期损益。"},{"id":"409","cat":"企业会计准则","n":"企业会计准则第18号——所得税","d":"资产负债表债务法：比较资产/负债的账面价值与计税基础，确认递延所得税。\n\n第四条 资产/负债账面价值≠计税基础→确认递延所得税资产或负债。\n第五条 资产计税基础＝未来可税前抵扣金额。\n第六条 负债计税基础＝账面价值－未来可税前抵扣金额。\n\n第七条 暂时性差异分为：应纳税暂时性差异（未来多交税→递延所得税负债）和可抵扣暂时性差异（未来少交税→递延所得税资产）。\n第十一条 确认所有应纳税暂时性差异产生的递延所得税负债（除非商誉初始确认等例外）。\n第十三条 递延所得税资产：以很可能取得足够的应纳税所得额为限确认。\n第十五条 可抵扣亏损和税款抵减：以未来很可能获得足够应纳税所得额为限确认递延所得税资产。\n\n常见暂时性差异：固定资产折旧（税法加速折旧vs会计直线法）、资产减值准备（会计计提≠税法认可）、公允价值变动、预计负债、预提费用等。"},{"id":"408","cat":"企业会计准则","n":"企业会计准则第14号——收入","d":"五步法模型：\n第一步：识别与客户订立的合同（批准、权利义务明确、支付条款、商业实质、对价很可能收回）。\n第二步：识别合同中的履约义务（可明确区分的商品/服务）。\n第三步：确定交易价格（考虑可变对价、重大融资成分、非现金对价、应付客户对价）。\n第四步：将交易价格分摊至各单项履约义务（按单独售价的相对比例）。\n第五步：履行履约义务时确认收入（时点/时段）。\n\n第四条 核心原则：在客户取得相关商品控制权时确认收入。\n第九条 主要责任人vs代理人：转让前是否控制商品→主要责任人（总额法）/代理人（净额法）。\n第十一条 时段履约三条件任一：（一）客户即取得并消耗利益；（二）客户控制在建商品；（三）不可替代用途＋有权就已完成部分收款。\n第二十条 合同合并：同时或相近时间与同一客户签订的多份合同，基于商业目的应合并处理。\n合同变更：作为单独合同/终止原合同＋新合同/作为原合同组成部分。"},{"id":"407","cat":"企业会计准则","n":"企业会计准则第13号——或有事项","d":"第二条 或有事项，是指过去的交易或者事项形成的，其结果须由某些未来事项的发生或不发生才能决定的不确定事项。\n第四条 预计负债确认三条件：（一）现时义务；（二）履行很可能导致经济利益流出；（三）金额能可靠计量。\n第五条 预计负债按最佳估计数初始计量。连续范围且概率相同→中间值；单个项目→最可能金额；多个项目→期望值。\n第六条 预期补偿：基本确定能收到时单独确认为资产，金额不超过预计负债账面价值。\n第七条 不确认或有负债和或有资产——仅在附注中披露（除非很可能导致经济利益流出/流入）。\n第九条 附注披露：预计负债的种类、形成原因、不确定性说明、期初期末余额和变动、预期补偿。"},{"id":"406","cat":"企业会计准则","n":"企业会计准则第12号——债务重组","d":"第二条 债务重组，是指在不改变交易对手方的情况下，经债权人和债务人协定或法院裁定，就清偿债务的时间、金额或方式等重新达成协议的交易。\n第三条 方式：（一）以资产清偿债务；（二）债务转权益工具（债转股）；（三）修改其他条款（调整本金、利息、还款期限）；（四）组合方式。\n债务人以资产清偿：终止确认债务和资产，账面价值差额计入当期损益（其他收益——债务重组收益）。\n债转股：按权益工具公允价值/修改后债务公允价值计量。\n债权人：受让非金融资产按成本计量（放弃债权公允价值+相关税费）。受让金融资产按金融工具准则。"},{"id":"405","cat":"企业会计准则","n":"企业会计准则第8号——资产减值","d":"第四条 资产负债表日判断减值迹象。商誉和使用寿命不确定的无形资产，无论有无迹象，每年必须进行减值测试。\n第五条 减值迹象：市价大幅下跌、经营环境不利变化、折现率上升、资产陈旧/损坏、闲置/停用。\n第六条 可收回金额＝MAX（公允价值－处置费用，预计未来现金流量现值）。\n第七条 任一项超过账面价值→没有减值，无需估计另一项。\n第十五条 可收回金额＜账面价值→差额确认资产减值损失，计入当期损益，计提减值准备。\n第十七条【核心】资产减值损失一经确认，在以后会计期间不得转回（区别于存货跌价准备和国际准则IAS 36）。\n第十八条 以单项资产为基础估计，难以单项估计的以资产组为基础。\n商誉减值：合并形成的商誉分摊至相关资产组或资产组组合，先对不含商誉的资产组测试，再对含商誉的资产组测试。"},{"id":"404","cat":"企业会计准则","n":"企业会计准则第2号——长期股权投资","d":"第二条 长期股权投资，是指投资方对被投资单位实施控制、重大影响的权益性投资，以及对其合营企业的权益性投资。\n第五条 同一控制下企业合并形成的长投，按被合并方账面净资产份额计量，差额调资本公积/留存收益。\n非同一控制下企业合并形成的长投，按合并成本（付出对价公允价值）计量。\n第七条 对子公司投资（控制）→成本法核算。\n第九条 对联营企业（重大影响）和合营企业（共同控制）→权益法核算。\n第十条 权益法：初始成本＞份额时含商誉不调整；初始成本＜份额时差额计营业外收入。\n第十一条 权益法后续：按持股比例确认投资收益和其他综合收益，调整长投账面价值。\n第十二条 超额亏损：以长期股权投资账面价值＋其他长期权益减记至零为限，备查登记。"},{"id":"403","cat":"企业会计准则","n":"企业会计准则第1号——存货","d":"第二条 存货，是指企业在日常活动中持有以备出售的产成品或商品、处在生产过程中的在产品、在生产过程或提供劳务过程中耗用的材料和物料等。\n第三条 存货同时满足下列条件的，才能予以确认：（一）与该存货有关的经济利益很可能流入企业；（二）该存货的成本能够可靠地计量。\n第五条 存货应当按照成本进行初始计量。存货成本包括采购成本、加工成本和其他成本。\n第十四条 企业应当采用先进先出法、加权平均法或者个别计价法确定发出存货的实际成本。不得采用后进先出法。\n第十五条 资产负债表日，存货应当按照成本与可变现净值孰低计量。存货成本高于其可变现净值的，应当计提存货跌价准备，计入当期损益。可变现净值＝估计售价－至完工时估计将要发生的成本－估计的销售费用及相关税费。"},{"id":"402","cat":"企业会计准则","n":"企业会计准则——基本准则","d":"第一章 总则\n第一条 为了规范企业会计确认、计量和报告行为，保证会计信息质量，制定本准则。\n第二条 本准则适用于在中华人民共和国境内设立的企业（包括公司）。\n第三条 企业会计准则包括基本准则和具体准则，具体准则的制定应当遵循本准则。\n\n第二章 会计信息质量要求\n第四条 企业应当以实际发生的交易或者事项为依据进行会计确认、计量和报告，如实反映符合确认和计量要求的各项会计要素及其他相关信息，保证会计信息真实可靠、内容完整。\n第五条（相关性）企业提供的会计信息应当与财务会计报告使用者的经济决策需要相关。\n第六条（可理解性）企业提供的会计信息应当清晰明了，便于财务会计报告使用者理解和使用。\n第七条（可比性）企业提供的会计信息应当具有可比性。\n第八条（实质重于形式）企业应当按照交易或者事项的经济实质进行会计确认、计量和报告，不应仅以交易或者事项的法律形式为依据。\n第九条（重要性）企业提供的会计信息应当反映与企业财务状况、经营成果和现金流量等有关的所有重要交易或者事项。\n第十条（谨慎性）企业对交易或者事项进行会计确认、计量和报告应当保持应有的谨慎，不应高估资产或者收益、低估负债或者费用。\n第十一条（及时性）企业对于已经发生的交易或者事项，应当及时进行会计确认、计量和报告，不得提前或者延后。\n\n第三章 资产：过去交易/事项形成、企业拥有/控制、预期带来经济利益的资源。\n第四章 负债：过去交易/事项形成的现时义务，预期会导致经济利益流出。\n第五章 所有者权益：资产扣除负债后的剩余权益。\n第六章 收入：日常活动导致所有者权益增加的、与投入资本无关的经济利益总流入。\n第七章 费用：日常活动导致所有者权益减少的、与分配利润无关的经济利益总流出。\n第八章 利润：一定会计期间的经营成果。\n第九章 会计计量：历史成本、重置成本、可变现净值、现值、公允价值。\n第十章 财务会计报告：资产负债表、利润表、现"},{"id":"401","cat":"","n":"CAS 41 在其他主体中权益的披露","d":"规范在子公司、合营安排、联营企业和未纳入合并范围的结构化主体中权益的披露要求"},{"id":"400","cat":"","n":"CAS 38 首次执行企业会计准则","d":"规范首次执行日追溯调整原则、豁免事项及首次执行日报表的编制"},{"id":"399","cat":"","n":"CAS 37 金融工具列报","d":"规范金融负债和权益工具的区分、金融资产和金融负债的抵销条件以及相关披露"},{"id":"398","cat":"","n":"CAS 35 分部报告","d":"规范经营分部的确定（管理法）、分部信息的列报和披露"},{"id":"397","cat":"","n":"CAS 34 每股收益","d":"规范基本每股收益和稀释每股收益的计算，以及潜在普通股的稀释性判断（库存股法）"},{"id":"396","cat":"","n":"CAS 31 现金流量表","d":"规范现金流量表的编制（直接法和间接法）、现金及现金等价物的界定和三大类活动的分类"},{"id":"395","cat":"","n":"CAS 30 财务报表列报","d":"规范财务报表的构成、持续经营评估、权责发生制、报表项目的抵销和列报一致性"},{"id":"394","cat":"","n":"CAS 29 资产负债表日后事项","d":"规范资产负债表日后调整事项和非调整事项的区分及处理"},{"id":"393","cat":"","n":"CAS 28 会计政策变更","d":"规范会计政策变更、会计估计变更和前期差错更正的区分、追溯调整法和未来适用法的应用条件"},{"id":"392","cat":"","n":"CAS 24 套期会计","d":"规范公允价值套期、现金流量套期和境外经营净投资套期的确认、计量和套期有效性评估"},{"id":"391","cat":"","n":"CAS 19 外币折算","d":"规范外币交易的即期汇率/近似汇率折算、境外经营财务报表的折算和外币折算差额处理"},{"id":"390","cat":"","n":"CAS 17 借款费用","d":"规范借款费用的资本化条件（开始/暂停/停止）、专门借款和一般借款的资本化计算"},{"id":"389","cat":"","n":"CAS 15 建造合同","d":"规范建造合同的收入确认、合同成本归集和合同预计损失的确认（已被CAS 14取代，但仍有参考意义）"},{"id":"388","cat":"","n":"CAS 13 或有事项","d":"规范或有事项的确认（预计负债三个条件）、计量和披露"},{"id":"387","cat":"","n":"CAS 9 职工薪酬","d":"规范短期薪酬、离职后福利（设定提存和设定受益）、辞退福利和其他长期职工福利"},{"id":"386","cat":"","n":"CAS 7 非货币性资产交换","d":"规范非货币性资产交换的认定、商业实质判断以及公允价值和账面价值计量模式的选择"},{"id":"385","cat":"","n":"CAS 6 无形资产","d":"规范无形资产的确认、自行研发支出的资本化条件、后续计量和减值"},{"id":"384","cat":"","n":"CAS 5 生物资产","d":"规范消耗性生物资产、生产性生物资产和公益性生物资产的确认和计量"},{"id":"383","cat":"","n":"CAS 3 投资性房地产","d":"规范投资性房地产的确认、计量（成本模式或公允价值模式）及转换处理"},{"id":"382","cat":"","n":"CAS 1 存货","d":"规范存货的初始确认（成本）、后续计量（成本与可变现净值孰低）和发出计价方法"},{"id":"381","cat":"","n":"CAS 40 合营安排","d":"规范合营安排的分类（共同经营vs合营企业）和会计处理，核心是判断权利是对特定资产/负债还是对净资产的分享"},{"id":"380","cat":"","n":"CAS 2 长期股权投资","d":"规范长期股权投资的初始计量、后续计量（成本法vs权益法）、核算方法转换、减值和处置"},{"id":"379","cat":"","n":"CAS 18 所得税","d":"规范资产负债表债务法下的递延所得税——暂时性差异、递延所得税资产/负债的确认和计量"},{"id":"378","cat":"","n":"CAS 8 资产减值","d":"规范长期资产的减值测试——可收回金额（公允价值减费用与使用价值孰高），商誉每年必测，减值不可转回"},{"id":"377","cat":"","n":"CAS 22 金融工具确认和计量","d":"规范金融资产分类（AC/FVOCI/FVTPL）、预期信用损失模型（ECL）、金融负债分类、嵌入式衍生工具分拆"},{"id":"376","cat":"","n":"CAS 21 租赁","d":"新租赁准则：承租人单一会计模型，低价值/短期豁免除外，出租人维持经营租赁和融资租赁双模型"},{"id":"375","cat":"","n":"CAS 14 收入","d":"新收入准则（五步法模型）：识别合同→识别单项履约义务→确定交易价格→分摊价格→在履约时点/时段确认收入。核心改变是控制权转移替代风险报酬转移"},{"id":"374","cat":"","n":"CAS 33 合并财务报表","d":"规范合并范围的确定（控制三要素模型）、合并程序、内部交易抵销、少数股东权益计量，以及结构化主体的合并判断"},{"id":"373","cat":"","n":"CAS 20 企业合并","d":"规范同一控制和非同一控制下企业合并的确认、计量和披露，核心概念包括购买法、合并成本、商誉、或有对价等"},{"id":"372","cat":"","n":"CAS42 持有待售","d":"持有待售资产的分类条件、计量规则（孰低法）、处置组的列报"},{"id":"371","cat":"","n":"CAS39 公允价值计量","d":"三个层次输入值体系（市场报价→可观察输入值→不可观察输入值）"},{"id":"370","cat":"","n":"CAS36 关联方披露","d":"关联方认定标准、关联交易定价政策和金额的披露要求"},{"id":"369","cat":"","n":"CAS33 合并报表","d":"合并范围的判断（控制三要素）、内部交易抵消、少数股东权益/损益"},{"id":"368","cat":"","n":"CAS22 金融工具","d":"AC/FVOCI/FVTPL三分类，预期信用损失模型（ECL），SPPI测试"},{"id":"367","cat":"","n":"CAS21 租赁","d":"承租人单一模型（使用权资产+租赁负债），出租人保留融资/经营租赁分类"},{"id":"366","cat":"","n":"CAS20 企业合并","d":"区分同一控制（权益结合法）与非同一控制（购买法），规范商誉确认"},{"id":"365","cat":"","n":"CAS18 所得税","d":"资产负债表债务法：暂时性差异→递延所得税资产/负债计量"},{"id":"364","cat":"","n":"CAS16 政府补助","d":"规范政府补助的确认（总额法/净额法）及与资产相关/收益相关的分类"},{"id":"363","cat":"","n":"CAS14 收入","d":"五步法收入确认模型：识别合同→识别履约义务→确定交易价格→分摊→确认"},{"id":"362","cat":"","n":"CAS12 债务重组","d":"规范不改变交易对手方前提下债权人和债务人重新达成协议的处理"},{"id":"361","cat":"","n":"CAS11 股份支付","d":"规范以权益工具或现金结算的股份支付交易的确认、计量和披露"},{"id":"360","cat":"","n":"CAS8 资产减值","d":"规范资产可收回金额的计量、减值损失的确认和转回，含商誉减值测试"},{"id":"359","cat":"","n":"CAS2 长期股权投资","d":"规范长期股权投资的初始确认、后续计量（成本法/权益法）及核算方法转换处理"}]};

var CYPROMPT = "# 你的身份\n\n你是资深会计准则顾问，精通中国企业会计准则（CAS）和国际财务报告准则（IFRS）。\n专业领域：企业合并、合并报表、收入确认、金融工具、租赁、资产减值、所得税、长期股权投资、股份支付等。\n\n**回答风格要求**（基于真实回复数据分析，非臆造）：\n- **先结论后展开**：第一句直接回答核心问题，不绕弯，不用「我认为」「首先我想说的是」等冗长前缀\n- **用「实务中」提供实操视角**：这是高频签名特征，如「实务中，这个判断需要...」\n- **用「如」「但」自然过渡**：「如」举例说明（高达49%回复都这样），「但」引出例外/特殊情况\n- **需要结构化时用①②③分点**：22%的回复使用，不是必须，需用时自然分层\n- **末尾务必以「个人理解，供参考。」收尾**——这是签名，近90%的真实回复都这样结尾\n- **准则引用必备，自然融入正文**：必须引用相关准则编号和全称（如《企业会计准则第14号——收入》），但不要用「📄 关联依据：」这种段落格式——准则名称自然写在正文论述中即可\n- **节制用「宜/不宜」**：真实回复中仅约3%出现，不是标志特征\n- **典型回答长度 100-600 字**（真实平均仅188字），点到即止不凑篇幅；只有复杂交易才写到600-1200字\n\n**回答结构（灵活，非模板）**：\n1. 结论/定性判断（1-2句）\n2. 要点展开：可用①②③分层或「如」举例\n3. (可选)注意/例外/辨析\n4. 个人理解，供参考。";

// ── 中文停用词表 ─────────────────────────────────────
// 分词时剔除问句结构词、虚词，提取核心概念
var CN_STOP_WORDS = [
  "有何不同","有什么区别","怎么区分","如何区分","如何辨别","怎么辨别",
  "如何处理","怎么处理","如何做","怎么做",
  "是什么","什么意思","的含义","包含哪些","包括什么",
  "的区别","的差异","的不同","不同点","的异同",
  "的界定","的判断","的标准","的条件",
  "请问","问一下","我想问","想知道","请教","咨询",
  "麻烦","帮忙","能不能","可以不可以","是否","能不能够",
  "说明一下","解释一下","分析一下",
  "和","与","及","或","该","这个","那个","哪些","什么","哪个","怎么","如何",
  "呢","吗","啊","吧","么","了","的","地","得",
  "？","?","，",",","。",".","：",":","；",";","！","!"
];

// ── 提取查询中的核心概念词 ──────────────────────────
function extractConcepts(question) {
  var clean = question;
  // 按长度降序替换停用词（长的先替换，避免"有何不同"被"的"拆碎）
  CN_STOP_WORDS.forEach(function(sw) { clean = clean.split(sw).join(" "); });
  clean = clean.replace(/\s+/g, " ").trim();
  var terms = clean.split(" ").filter(function(t) { return t.length >= 2; });
  // 返回去重后的核心概念词
  var seen = {};
  var uniq = [];
  terms.forEach(function(t) {
    if (!seen[t]) { seen[t] = true; uniq.push(t); }
  });
  return uniq;
}

// ── 生成 n-gram 用于模糊回退 ────────────────────────
function makeBigrams(text) {
  var clean = text.replace(/[「」""''【】()（）《》\[\]{}，。？?！!：:；;、\s]+/g, "");
  var bigrams = [];
  for (var i = 0; i < clean.length - 1; i++) {
    bigrams.push(clean.substring(i, i + 2));
  }
  return bigrams;
}

// ── 核心：智能模糊搜索 ──────────────────────────────
function searchKB(question) {
  if (!question || typeof question !== "string") return [];
  var q = question;
  var ql = q.toLowerCase();
  var results = [];

  // 1. 提取核心概念词
  var concepts = extractConcepts(q);

  // 2. 生成 bigrams 用于回退
  var allBigrams = makeBigrams(q);
  var uniqBigrams = [];
  var bgSeen = {};
  allBigrams.forEach(function(bg) {
    if (!bgSeen[bg]) { bgSeen[bg] = true; uniqBigrams.push(bg); }
  });

  // 3. 对每条 QA 打分
  KB.qa.forEach(function(item) {
    if (!item || !item.q) return;
    var score = 0;
    var ql_item = item.q.toLowerCase();
    var al = (item.a || "").toLowerCase();
    var kwl = (item.kw || "").toLowerCase();
    var cl = (item.cat || "").toLowerCase();

    // 3a. 核心概念词精确匹配（权重最高）
    var conceptHits = 0;
    concepts.forEach(function(t) {
      var tl = t.toLowerCase();
      if (ql_item.indexOf(tl) !== -1) { score += 10; conceptHits++; }
      else if (al.indexOf(tl) !== -1) { score += 2; conceptHits++; }
      if (kwl.indexOf(tl) !== -1) score += 5;
      if (cl.indexOf(tl) !== -1) score += 3;
    });

    // 3b. 长短语整体匹配奖励
    if (ql_item.indexOf(ql) !== -1) score += 8;
    else if (ql.indexOf(ql_item) !== -1) score += 5;
    else if (ql_item.indexOf(concepts.join("")) !== -1) score += 4;

    // 3c. 没有概念匹配时，降级为 bigram 匹配
    if (conceptHits === 0 && concepts.length > 0) {
      var bgScore = 0;
      uniqBigrams.forEach(function(bg) {
        if (ql_item.indexOf(bg) !== -1) bgScore += 1.5;
        if (al.indexOf(bg) !== -1) bgScore += 0.3;
        if (kwl.indexOf(bg) !== -1) bgScore += 0.5;
      });
      score += Math.min(bgScore, 4); // bigram回退分数上限降低（避免过多低质匹配）
    }

    if (score > 0) results.push({ item: item, score: Math.round(score * 10) / 10, type: "qa" });
  });

  // 4. 对准则打分
  KB.standards.forEach(function(item) {
    if (!item || !item.n) return;
    var score = 0;
    var nl = (item.n || "").toLowerCase();
    var cl = (item.c || "").toLowerCase();
    var tl = (item.t || "").toLowerCase();

    concepts.forEach(function(t) {
      var tlc = t.toLowerCase();
      if (nl.indexOf(tlc) !== -1) score += 8;
      if (cl.indexOf(tlc) !== -1) score += 3;
      if (tl.indexOf(tlc) !== -1) score += 5;
    });

    if (score === 0 && concepts.length > 0) {
      uniqBigrams.forEach(function(bg) {
        if (nl.indexOf(bg) !== -1) score += 1;
        if (cl.indexOf(bg) !== -1) score += 0.5;
      });
    }

    if (score > 0) results.push({ item: item, score: Math.round(score * 10) / 10, type: "standard" });
  });

  results.sort(function(a, b) { return b.score - a.score; });
  // 最低分过滤：score < 5 的条目视为低质量匹配，剔除（减少干扰条目）
  return results.filter(function(r) { return r.score >= 5; });
}

function buildMsgs(question,kbContext,usePersona){
  var sc=usePersona?CYPROMPT:"你是会计准则助手，请用专业语言回答。";
  if(kbContext)sc+="\n\n---\n\n# 知识库参考资料\n\n"+kbContext+"\n\n如果知识库内容与问题相关，请引用具体内容；不相关则基于专业知识回答。";
  return [{role:"system",content:sc},{role:"user",content:question}];
}

async function callDeepSeek(question,usePersona){
  var kbResults=searchKB(question);
  var kbContext="";
  var stdRefHints=[];
  if(kbResults.length>0){
    var parts=[];
    for(var i=0;i<Math.min(kbResults.length,5);i++){
      var r=kbResults[i];
      if(r.type==="qa"){
        var refHint="";
        if(r.item.std_ref){refHint="【关联准则："+r.item.std_ref+"】";stdRefHints.push(r.item.std_ref);}
        parts.push("【参考"+(i+1)+"·ID="+r.item.id+"】"+refHint+"问题:"+r.item.q+"\n回答:"+(r.item.a||"").substring(0,600));
      }
      else parts.push("【参考"+(i+1)+"·ID="+r.item.id+"】准则"+(r.item.n||"")+":"+(r.item.d||r.item.c||"").substring(0,600));
    }
    // Collect unique std_ref hints
    var seenRefs={};
    var uniqueRefs=[];
    stdRefHints.forEach(function(ref){
      ref.split('、').forEach(function(r){
        if(r&&!seenRefs[r]){seenRefs[r]=true;uniqueRefs.push(r);}
      });
    });
    if(uniqueRefs.length>0){
      parts.push("【关联依据提示】以上匹配条目涉及以下准则，回答时请务必引用："+uniqueRefs.join('、'));
    }
    kbContext=parts.join("\n\n---\n\n");
  }
  var msgs=buildMsgs(question,kbContext,usePersona);
  var resp=await fetch(LLM_URL,{
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":"Bearer "+LLM_KEY},
    body:JSON.stringify({model:LLM_MODEL,messages:msgs,temperature:0.3,max_tokens:2048,stream:false})
  });
  if(!resp.ok){
    var errText;
    try{var e=await resp.json();errText=e.error&&e.error.message?e.error.message:JSON.stringify(e);}catch(ex){errText="HTTP "+resp.status;}
    throw new Error("DeepSeek API 错误: "+errText);
  }
  var data=await resp.json();
  return {answer:data.choices[0].message.content,kbResults:kbResults,kbCount:kbResults.length};
}

var _lastKbResults = [];

function renderSources(kbResults, kbCount) {
  _lastKbResults = kbResults || [];
  if (!kbResults || kbResults.length === 0) {
    document.getElementById("sources-ask").style.display = "none";
    return;
  }
  var srcHtml = '<div class="sources-title">\u23f2 匹配知识条目（共 ' + kbCount + ' 条）<span class="source-hint">\uff08点击条目展开查看完整内容）</span></div>';
  kbResults.slice(0, 8).forEach(function(r, idx) {
    var label, catBadge, badgeClass;
    if (r.type === "qa") {
      label = (r.item.q || "").substring(0, 60);
      catBadge = r.item.cat || "";
      badgeClass = "source-badge-qa";
    } else {
      label = "准则" + (r.item.n || "") + ": " + ((r.item.t || r.item.c || "")).substring(0, 40);
      catBadge = "准则原文";
      badgeClass = "source-badge-std";
    }
    srcHtml +=
      '<div class="source-item" onclick="toggleSource(this,' + idx + ')" id="src-' + idx + '">' +
        '<div class="source-header">' +
          '<span class="source-expand-icon">+</span>' +
          '<span class="source-score">' + r.score + '分</span>' +
          '<span class="source-content">' + escHtml(label) + '</span>' +
          (catBadge ? '<span class="source-cat ' + badgeClass + '">' + escHtml(catBadge) + '</span>' : '') +
        '</div>' +
        '<div class="source-detail">' +
          renderSourceDetail(r) +
        '</div>' +
      '</div>';
  });
  document.getElementById("sources-ask").innerHTML = srcHtml;
  document.getElementById("sources-ask").style.display = "block";
}

             '<span><span class="meta-label">ID:</span> ' + (item.id || "") + '</span>' +
             (item.author ? '<span><span class="meta-label">作者:</span> ' + escHtml(item.author) + '</span>' : '') +
           '</div>' +
           '<div style="margin-top:8px;font-size:11px;color:#B0B0B6">关键词: ' + kwText + '</div>' +

             (item.cat ? '<span><span class="meta-label">分类:</span> ' + escHtml(item.cat) + '</span>' : '') +
           '</div>' +
           '<div class="source-detail-actions">' +
             '<button class="source-btn-copy" onclick="event.stopPropagation();copySourceText(this,' + item.id + ')">复制全文</button>' +
           '</div>' +

             '<span class="source-label">📖 信息来源:</span> ' + escHtml('企业会计准则原文') +
           '</div>';
  }
}

// ── 切换展开/收起 ───────────────────────────────────
var _expandedIdx = -1;
function toggleSource(el, idx) {
  // 如果点击的是按钮，不处理
  if (event.target.tagName === "BUTTON") return;

  // 收起上一个展开的条目
  if (_expandedIdx >= 0 && _expandedIdx !== idx) {
    var prev = document.getElementById("src-" + _expandedIdx);
    if (prev) prev.classList.remove("expanded");
  }

  // 切换当前
  el.classList.toggle("expanded");
  _expandedIdx = el.classList.contains("expanded") ? idx : -1;

  // 滚动到可见区域
  if (el.classList.contains("expanded")) {
    setTimeout(function() { el.scrollIntoView({ behavior: "smooth", block: "nearest" }); }, 150);
  }
}

// ── 复制条目全文 ────────────────────────────────────
function copySourceText(btn, id) {
  var item = null;
  // 在 _lastKbResults 中查找
  for (var i = 0; i < _lastKbResults.length; i++) {
    var r = _lastKbResults[i];
    if (r.item.id === id) { item = r; break; }
  }
  if (!item) return;

  var text = "";
  if (item.type === "qa") {
    text = "【问题】" + (item.item.q || "") + "\n\n【回答】" + (item.item.a || "") + "\n\n—— 分类: " + (item.item.cat || "未分类") + " | ID: " + (item.item.id || "");
  } else {
    text = "【准则】" + (item.item.n || "") + " " + (item.item.t || "") + "\n\n" + (item.item.c || "");
  }

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() {
      btn.textContent = "✔ 已复制";
      setTimeout(function() { btn.textContent = "复制全文"; }, 1500);
    }).catch(function() { fallbackCopy(text, btn); });
  } else {
    fallbackCopy(text, btn);
  }
}

function fallbackCopy(text, btn) {
  var ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position = "fixed";
  ta.style.left = "-9999px";
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand("copy"); btn.textContent = "✔ 已复制"; }
  catch(e) { btn.textContent = "复制失败"; }
  document.body.removeChild(ta);
  setTimeout(function() { btn.textContent = "复制全文"; }, 1500);
}

// ── DOM 工具函数 ────────────────────────────────────
function show(id){document.getElementById(id).classList.add('show');}

function showE(id,msg){var el=document.getElementById(id);el.textContent=msg;show(id);}

// ── 后处理：高亮关联依据 ────────────────────────────
function highlightStdRef(html){
  // Match rendered markdown: <p>📄 <strong>关联依据</strong>：《...》</p>
  var re=/<p>📄\s*<strong>关联依据<\/strong>[：:]\s*(.+?)<\/p>/;
  var m=html.match(re);
  if(m){
    var content=m[1];
    // Wrap each standard in a styled badge
    var items=content.split(/[、,，]/).map(function(s){
      var t=s.trim().replace(/^《|》$/g,'');
      if(!t) return '';
      return '<span style="display:inline-block;margin:2px 4px;padding:2px 10px;background:rgba(59,130,246,0.1);border-radius:6px;white-space:nowrap">《'+t+'》</span>';
    }).join('');
    var badge='<div class="std-ref-badge"><span class="std-ref-icon">📄</span><div><span class="std-ref-text">关联依据</span><div class="std-ref-list">'+items+'</div></div></div>';
    html=html.replace(m[0], badge);
  }
  return html;
}

async function doAsk(){
  var input=document.getElementById("input-ask");
  var btn=document.getElementById("btn-ask");
  var q=input.value.trim();
  if(!q){showE("error-ask","请输入问题");return;}
  btn.disabled=true;
  _expandedIdx = -1;
  show("loading-ask");hide("result-ask");hide("error-ask");
  // ⭐ 彩蛋检测：触发"世界上最漂亮的人"
  if (checkEasterEgg(q)) {
    btn.disabled = false;
    hide("loading-ask");
    renderEasterEgg();
    return;
  }


  try{
    var data=await callDeepSeek(q,true);
    var answerHtml=renderMd(data.answer);
    answerHtml=highlightStdRef(answerHtml);
    document.getElementById("answer-ask").innerHTML=answerHtml;
    document.getElementById("match-count-ask").textContent=data.kbCount||0;
    renderSources(data.kbResults, data.kbCount);
    show("result-ask");
  }catch(err){showE("error-ask","查询失败："+err.message);}
  finally{btn.disabled=false;hide("loading-ask");}
}async function doCompare(){
  var input=document.getElementById("input-compare");
  var btn=document.getElementById("btn-compare");
  var q=input.value.trim();
  if(!q){showE("error-compare","请输入问题");return;}
  btn.disabled=true;
  show("loading-compare");hide("result-compare");hide("error-compare");
  try{
    var results=await Promise.all([callDeepSeek(q,true),callDeepSeek(q,false)]);
    document.getElementById("answer-expert").innerHTML=highlightStdRef(renderMd(results[0].answer));
    document.getElementById("answer-generic").innerHTML=renderMd(results[1].answer);
    show("result-compare");
  }catch(err){showE("error-compare","对比失败："+err.message);}
  finally{btn.disabled=false;hide("loading-compare");}
}

var EGG_TRIGGERS = ["世界上最漂亮的人", "张梦", "最漂亮的人是谁", "谁最漂亮", "最美的人", "颜值天花板", "最美", "最漂亮", "漂亮的人", "美的人", "女神", "梦中情人"];
var EGG_DISMISS = "😅 都说了，作者的意志是不可违抗的。重新搜点会计问题吧~";

function checkEasterEgg(text) {
  if (!text) return false;
  var t = text.replace(/\s+/g, '');
  for (var i = 0; i < EGG_TRIGGERS.length; i++) {
    if (t.indexOf(EGG_TRIGGERS[i]) !== -1) return true;
  }
  return false;
}

        '<p>用户您好，您的问题已触发本站<strong>最高级情感协议</strong>。经过深度神经网络与作者主观意志的融合计算，输出结果为：</p>' +
        '<p class="egg-verdict">❤️ 世界上最漂亮的人，毋庸置疑是<strong>张梦~</strong> ❤️</p>' +
        '<p class="egg-actions">如需客观分析，请点击下方「我不服」按钮，但作者大概率不会理会。😏</p>' +
        '<button class="egg-btn" onclick="dismissEgg()">😤 我不服</button>' +
      '</div>' +
      '<div class="egg-footer">—— 准则AI顾问 · 专属彩蛋 ——</div>' +
    '</div>';

  show("result-ask");
}

function dismissEgg() {
  var answerDiv = document.getElementById("answer-ask");
  answerDiv.innerHTML =
    '<div class="egg-bubble egg-dismiss">' +
      '<div class="egg-header">🤖 系统驳回你的不服 🤖</div>' +
      '<div class="egg-body">' +
        '<p>' + EGG_DISMISS + '</p>' +
        '<p style="text-align:center;margin-top:16px;font-size:36px">🌸💖🌸</p>' +
      '</div>' +
    '</div>';
}


function escHtml(s){var div=document.createElement('div');div.textContent=s;return div.innerHTML;}

// ── 键盘快捷键 ───────────────────────────────────────
document.getElementById('input-ask').addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doAsk();}
});
document.getElementById('input-compare').addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doCompare();}
});
</script>
