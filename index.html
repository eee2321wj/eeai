":"公允价值,拟上市公司对⾼管及员⼯授予限制性股权能否⼀次性确认股份⽀付费⽤","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第9号——职工薪酬"},{"id":"CY0549","q":"关于废弃物资源综合利⽤项⽬的成本核算问题","a":"理论上应该是可⾏的，当然如果此类交互的影响显著不重⼤，也可以简化处理。个人理解，供参考。","cat":"实务综合","kw":"关于废弃物资源综合利⽤项⽬的成本核算问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1739","q":"同⼀控制下企业合并的处理","a":"由于B是矿业公司，⼀般理解不构成业务，所以A收购B也就不是企业合并，故作为不构成业务的资产购买处理，但因为涉及关联⽅交易，作价明显偏低，故A应按照B股权的公允价值作为对B 的⻓期股权投资初始成本，收购价格低于该公允价值的差额计⼊资本公积，再以股权公允价值为基础确定各项可辨认资产、负债在合并报表层⾯的⼊账价值。合并报表层⾯不确认商誉和递延所得税。个人理解，供参考。","cat":"企业合并","kw":"公允价值,商誉,合并,所得税,递延,同⼀控制下企业合并的处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0974","q":"新三板股票停盘，如何会计处理","a":"这应当主要涉及长期停牌股票的公允价值计量问题。参照中国证券业协会发布的“《证券公司⾦融⼯具估值指引》等三项指引的通知”（中证协发[2018]216号）：“长期停牌股票应根据停牌原因、停牌时间及停牌公司公告等信 息，采⽤市场法、收益法、成本法等估值技术确定公允价值，具体估值⽅法包括指数收益法、可⽐公司法、市场价格模型法、现⾦流折现法、市场乘数法、重臵成本法等。” 具体建议咨询估值⽅⾯的专业⼈⼠。个人理解，供参考。","cat":"长期股权投资","kw":"公允价值,成本法,新三板股票停盘,如何会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"CY0246","q":"分公司注销，母分公司存在⼤额往来挂账，请问往来如何进⾏账务处理","a":"理论上总部应先对其计提坏账准备，确认信⽤减值损失，然后再进⾏坏账核销处理。个人理解，供参考。","cat":"资产减值","kw":"减值,分公司注销,母分公司存在⼤额往来挂账,请问往来如何进⾏账务处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第8号——资产减值"},{"id":"CY0551","q":"长期应收款利息调整与未实现融资收益","a":"通常情况下两者是⼀样的。但设置“未实现融资收益”科⽬也只是⼀种核算⽅法或者习惯，也可以不设置该科⽬⽽采 ⽤其他⽅式，例如“长期应收款——利息调整”。个人理解，供参考。","cat":"实务综合","kw":"长期应收款利息调整与未实现融资收益","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1255","q":"直接法编制现⾦流量表中汇率变动对现⾦及现⾦等价物的影响⾦额来源","a":"这个项⽬理论上的主要构成除了主帖中所指的发⽣额的折算汇率影响外，更多地是期初、期末结存的外币现⾦及现⾦等价物的汇兑损益，以及境外经营⼦公司与货币资⾦相关的外币折算差额等。也包括实际发⽣货币兑换时确认的汇兑损益。 这个项⽬完全采⽤正向计算的难度较⼤，因此实务中采⽤倒挤的⽅法较多。但倒挤出来的数字与根据其⼏个主要来源⼤致测算的⾦额之间不应有重⼤差异。个人理解，供参考。","cat":"外币折算","kw":"直接法编制现⾦流量表中汇率变动对现⾦及现⾦等价物的影响⾦额来源","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第19号——外币折算"},{"id":"CY1314","q":"进⼝货物汇率确定","a":"理论上⼊账汇率应当是进⼝⽇期或申报⽇期的即期汇率。按⽉初1⽇汇率折算是实务中的简化做法，可在汇率波动不⼤时采⽤。 ⼀旦存货⼊账，对应确认了应付账款，后续汇率变动对应付账款的影响就计⼊财务费⽤——汇兑损益，不再调整存货的账⾯价值。个人理解，供参考。","cat":"外币折算","kw":"进⼝货物汇率确定","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第19号——外币折算"},{"id":"CY0562","q":"股权转让协议中实际⽀付⾦额与股权对价不⼀致时如何申报印花税？","a":"个⼈理解，按照实际成交价格（C公司账⾯净资产额）作为印花税的计税依据。 实际⽀付款项时，将股权转让款与B⽋C的往来款对抵，属于另⼀项独⽴交易，与印花税计税依据⽆关。个人理解，供参考。","cat":"实务综合","kw":"股权转让协议中实际⽀付⾦额与股权对价不⼀致时如何申报印花税","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0568","q":"迟迟未付的股利要算利息吗","a":"如果没有明确约定，则⽆需计提利息。 但需注意：根据7⽉1⽇起实施的新公司法第212条：“股东会作出分配利润的决议的，董事会应当在股东会决议作出之⽇起六个⽉内进⾏分配。”因此应付股利是不应长期挂账不⽀付的。对于⽬前挂账的应付股利，建议在2024年底 前（即新公司法⽣效后6个⽉内）⽀付完毕。个人理解，供参考。","cat":"实务综合","kw":"迟迟未付的股利要算利息吗","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0604","q":"购⼊的设备⽤于出售","a":"这种情况相当于本企业代垫设备购建款项，5年后收回垫款，年息为单利1.2%。 因此，本企业垫资购买的设备不应确认为本企业的固定资产或者存货，⽽应确认为对⼊驻企业的⼀项债权，每年末按约定确认利息收⼊，5年后收回该垫款的本息。期末如预计⼊驻企业将会⽆⼒⽀付的，则还需对该债权计提减值 准备。个人理解，供参考。","cat":"资产减值","kw":"减值,固定资产,购⼊的设备⽤于出售","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第8号——资产减值"},{"id":"CY0751","q":"关于集团成⽴基⾦收购上市公司的会计处理","a":"从主帖信息来看，集团完全是通过基⾦对上市公司具有重⼤影响的，⽽不是⼀部分股权由集团直接持有，另⼀部分以财务投资⽬的由基⾦持有。在这种情况下，该基⾦并不符合“风险投资机构、共同基⾦、信托公司或包括投连险 基⾦在内的类似主体”，应直接对其持有的上市公司股份采⽤权益法核算。即，在基⾦公司层⾯直接运⽤权益法。 不可以对基⾦所持有的上市公司股份采⽤成本进⾏后续计量，⽆论是作为长期股权投资还是⾦融资产。个人理解，供参考。","cat":"长期股权投资","kw":"权益法,请教陈版主,关于集团成⽴基⾦收购上市公司的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"CY1825","q":"请问陈版主：关于使⽤对⽅资质开展合作经营并表的问题","a":"由于A借⽤B的资质，故对外必须以B公司名义开展业务。对于A能否将该业务相关的资产、负债、收⼊、成本费⽤完整纳⼊其⾃身报表，需考虑该业务能否成为⼀个可明确界定范围边界，且符合《企业会计准则第33号——合并财务报表（2014年修订）》第⼆⼗条规定的“单独主体”。需重点关注B公司的壳是否“⼲净”，例如：B公司是否⾃身还经营其他业务；B是否还存在其他已知或潜在的负债尚未结清，是否可能使⽤A的该项业务的相关资产偿还这些负债；等等。 如果不能将该业务相关的资产、负债、收⼊、成本费⽤完整纳⼊其⾃身报表，也可以考虑将⼚房、设备等视作租赁处理，按照租赁准则相关规定确认使⽤权资产和租赁负债（如存在固定付款额或者取决于指数或⽐率的付款额），将与该业务相关的收⼊、成本等体现在A的报表中，差额通过⼀个与B之间的往来科⽬平衡。个人理解，供参考。","cat":"合并报表","kw":"合并,租赁,请问陈版主,关于使⽤对⽅资质开展合作经营并表的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表、《企业会计准则第33号——合并财务报表（2014年修订）》"},{"id":"CY0575","q":"国资委出资可否算作是股东的出资，股东是主管部门","a":"⼀般情况下，同⼀政府下属的不同委办局所属企业之间，在该政府主导下的划转，可作为同⼀控制下合并处理。 本案例中的划转以评估值作价，其⽬的是作为股东XX局的出资，相当于国资委与XX局之间先进⾏⼀次⽆偿划转， 然后股东XX局再将接受划⼊的公司股权作为出资投⼊到该新成⽴的平台公司。个人理解，供参考。","cat":"实务综合","kw":"合并,请教陈⽼师,国资委出资可否算作是股东的出资,股东是主管部门","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0595","q":"⽣产过程中的GMP稳定性测试费会计处理","a":"个⼈理解是将⽤于检验的药品的成本分摊摊计⼊对应批次可供出售的药品产成品的成本中。如果整个批次被选中作为样品的，则该批次的⽣产成本直接计⼊营业成本。个人理解，供参考。","cat":"实务综合","kw":"⽣产过程中的GMP稳定性测试费会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0607","q":"关于已背书、贴现票据已到期的问题","a":"对于已背书、贴现且已到期的票据（尤其是商业承兑汇票和财务公司承兑汇票，以及中⼩银⾏承兑的银⾏承兑汇票）应关注期后到期付款情况，在贴现银⾏实际收到票据款之前，不应终⽌确认该应收票据。个人理解，供参考。","cat":"实务综合","kw":"请教陈版主,关于已背书,贴现票据已到期的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0612","q":"⽆偿划拨股权","a":"对于A（划出⽅）⽽⾔，由于该项交易属于⽆偿划出，不是具有商业实质的处置交易，故A公司在划出D股权时， 应将D股权对应的“其他综合收益——其他权益⼯具投资公允价值变动”转⼊资本公积处理，⽽不是转⼊留存收益。个人理解，供参考。","cat":"实务综合","kw":"公允价值,⽆偿划拨股权","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0573","q":"有限合伙企业和关联⽅共同投资","a":"虽然合作投资⽅是LP，法律上LP不能执⾏合伙事务，但LP仍可能对合伙企业具有控制、共同控制或者重⼤影响。如果该合作投资的LP对合伙企业具有控制、共同控制或者重⼤影响的，则为关联交易。个人理解，供参考。","cat":"关联方披露","kw":"有限合伙企业和关联⽅共同投资","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第36号——关联方披露"},{"id":"CY0070","q":"⽆合同客户回款会计处理","a":"⾸先建议聘请律师了解这些流失客户的当前状况（例如是否已破产或者注销），以及依据相关合同和法律法规规 定，谨慎判断客户要求索回款项或者继续提供服务的可能性有多⼤。如果确定客户要求索回款项或者继续提供服务的可能性极⼩，则可以在履⾏必要的内部决策程序的基础上，将这些合同负债转为营业收⼊。 所需的外部证据参照应收、预付款项坏账核销所需证据，具体可参阅《关于建⽴健全企业应收款项管理制度的通知》（财企[2002]513号）、《关于印发中央企业资产减值准备财务核销⼯作规则的通知》（国资发评价[2005]67 号）、《企业资产损失所得税税前扣除管理办法》（国家税务总局公告[2011]25号）等。 提问⼈：7847748 时间：2024-03-07 21:38:25 您好陈⽼师，公司该批预收款项未找到合同资料及前期提供过服务的证明，仅有银⾏回单证据，⼤部分回单有汇款 ⼈名称及附⾔“服务费、续费、合同款”，那预收款项核销可以结转营业收⼊吗？查了很多案例都是结转营业外收⼊的，但是这家公司的回单注明了服务费或合同款，是不是结转营业收⼊更合适呢，按⾮经常性损益披露。请陈⽼师指教！ 回答⼈：chenyiwei 在新收⼊准则下，确认为营业收⼊似乎更合理，见新收⼊准则第三⼗九条。个人理解，供参考。","cat":"收入准则","kw":"减值,所得税,⽆合同客户回款会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0722","q":"关于租赁保证⾦如何折现的问题","a":"这种情况需要将租赁保证⾦和租⾦作为⼀个整体，计算综合的IRR，采⽤该相同的IRR对租赁负债和长期应收款 （保证⾦）进⾏折现，分别确认利息⽀出和利息收⼊。 参考：《中审众环研究2020》之“问题4-2-14（涉及保证⾦及⼿续费的售后租回构成融资租赁交易的会计处理）”、 “问题4-2-16（涉及保证⾦和服务费并考虑可抵扣增值税进项税额影响的融资租赁业务的综合案例）”。个人理解，供参考。","cat":"租赁","kw":"租赁,请教陈版,关于租赁保证⾦如何折现的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁"},{"id":"CY0617","q":"劳动仲裁与不服起诉","a":"这种情况取决于对法院判决改变劳动仲裁结果的可能性的估计。 如果预计法院判决维持原仲裁结果的可能性较⼤，则应依据仲裁结果确认相应的应付职⼯薪酬。实务中，这种可能性相对较⼤。个人理解，供参考。","cat":"实务综合","kw":"劳动仲裁与不服起诉","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0445","q":"归母损益的计算","a":"2楼的意见具有⼀定合理性。 在被投资企业处于累计亏损状态的情况下，除⾮对后续出资的缴⾜已有明确计划，并落实了出资资⾦来源，且新股东明确表⽰同意承担前期亏损，否则基于谨慎考虑，建议按较⾼的⽐例计算确定本企业应分担的在被投资企业亏损 中的份额。 提问⼈：stacton202 时间：2024-07-12 13:47:35 请问陈⽼师，如果前两年⼩股东表⽰会实缴的，⼤股东按认缴⽐例确认归母亏损；第三年开始情况有变，可能⽆法完成实缴了，那这种情况下，第三年的当期亏损按认缴⽐例计算归母，还是前三年都按认缴⽐例补确认在第三年？ 这是属于会计估计变更还是？感谢~ 回答⼈：chenyiwei 按会计估计变更处理，前三年都按认缴⽐例补确认在第三年。个人理解，供参考。","cat":"会计政策/估计变更","kw":"归母损益的计算","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第28号——会计政策、会计估计变更和差错更正"},{"id":"CY1660","q":"股权收购中保底收益款的核算","a":"是否最初项⽬公司设⽴时，就约定了若⼲年后本企业需按照约定的本⾦+利息作价收购原股东在项⽬公司中的股权？本企业与项⽬公司及其原股东是什么关系？原股东的投⼊是否具有明股实债性质？ 如果对上述问题的回复均为“是”，则本企业才是项⽬公司的真正股东。当初项⽬公司设⽴时，本企业就应当按照投资协议中的回购约定，按照其他股东投⼊的本⾦确认对项⽬公司的⻓投成本并贷记⻓期应付款，后续每年按照约定的回购利率确认利息⽀出（借：财务费⽤——利息⽀出，贷：⻓期应付款——应计利息），⽀付回购款时：借：⻓期应付款——本⾦、应计利息，贷： 银⾏存款。 即，如果按照上述处理，所⽀付的利息不应计⼊⻓投成本。 如果前期没有如此处理，可能需考虑作为前期差错更正处理。个人理解，供参考。","cat":"会计政策/估计变更","kw":"股权收购中保底收益款的核算","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第28号——会计政策、会计估计变更和差错更正"},{"id":"CY0619","q":"公司上市政府补贴应计⼊其他收益还是营业外收⼊","a":"这类补贴⼀般是偶发性的，与⽇常活动⽆关，故⼀般计⼊营业外收⼊。个人理解，供参考。","cat":"实务综合","kw":"求助陈版主,公司上市政府补贴应计⼊其他收益还是营业外收⼊","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0369","q":"关联⽅代偿是否构成债务重组？","a":"该事项对A⽽谈仍属于债务重组（B与C互为关联⽅，应作为⼀个整体看待）；但对于B⽽⾔则属于权益性交易。个人理解，供参考。","cat":"债务重组","kw":"债务重组,关联⽅代偿是否构成债务重组","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第12号——债务重组"},{"id":"CY1506","q":"政府补助分类问题","a":"后续因补助款项实际⽤途不同于原先的预计，导致对补助的分类进⾏调整的，属于会计估计变更（原先会计处理所依据的分类相对于当时可获得的信息即有明显不合理的除外），不属于前期差错，故⽆需追溯重述前期的会计处理，但应针对截⾄会计估计变更⽇的递延收益余额，按照变更后的会计估计进⾏分类和摊销等会计处理。个人理解，供参考。","cat":"政府补助","kw":"递延,摊销,政府补助分类问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第16号——政府补助"},{"id":"CY0903","q":"与资产相关的政府补助补助多个资产的问题","a":"⾸先明确该补助对应的固定资产范围。在该范围内，如果涉及多项固定资产的，则建议按照各项固定资产的原值⽐例将补贴分摊到相关的各项固定资产，后续在各该项固定资产的折旧年限内摊销该项递延收益。如果固定资产数量较多，则可以按照重要性原则，选择其中若⼲项⾦额最重⼤的固定资产分摊政府补助。个人理解，供参考。","cat":"政府补助","kw":"递延,固定资产,折旧,摊销,与资产相关的政府补助补助多个资产的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第16号——政府补助"},{"id":"CY1806","q":"关于股份⽀付处理","a":"主帖中存在股份⽀付的服务期限条件和业绩条件，故股份⽀付费⽤应在等待期内分摊确认，不应⼀次性确认。应确认的股份⽀付费⽤总额为授予⽇该批限制性股票市价与授予价格之间的差额。 因为对于不能达到业绩条件的激励对象，其对应的股票产⽣的收益归属于公司，如果公司没有回购股票的义务，则⽆需根据《企业会计准则解释第7号》第五条规定确认与回购义务相关的负债。个人理解，供参考。","cat":"股份支付","kw":"求助陈版,关于股份⽀付处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第11号——股份支付"},{"id":"CY0216","q":"⼤股东兜底式员⼯持股计划","a":"“⼤股东兜底式”持股计划，相当于⼤股东向参与该计划的员⼯授予卖出期权，在特定时间如公司股价低于约定价 格，则员⼯有权将其所获得的激励股份按约定价格出售给⼤股东。所以该计划对上市公司⽽⾔属于权益结算股份⽀付，其股份⽀付费⽤应在等待期内确认，⽽不能到⼤股东实际承担兜底义务时才确认。 上述权益结算股份⽀付费⽤的计量基础为该项卖出期权在授予⽇的公允价值。个人理解，供参考。","cat":"股份支付","kw":"公允价值,⼤股东兜底式员⼯持股计划","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第11号——股份支付"},{"id":"CY0195","q":"求助：⾮经常性损益所得税影响是否包括递延所得税费⽤？","a":"⾮经常性损益的所得税影响数，即⾮经常性损益项⽬对合并利润表中“所得税费⽤”项⽬（包括当期所得税费⽤和递延所得税费⽤，下同）的影响⾦额，即以下两项⽬之间的差额： 合并利润表中实际列⽰的所得税费⽤⾦额（包括当期所得税费⽤和递延所得税费⽤）； 假设不存在⾮经常性损益项⽬的情况下，合并利润表中“所得税费⽤”项⽬的列报⾦额。 因此，“审计反馈⾮经所得税影响仅指的是税务⼜径的计算缴纳的企业所得税，不包括递延”的活法是不恰当的。个人理解，供参考。","cat":"所得税","kw":"合并,所得税,递延,⾮经常性损益所得税影响是否包括递延所得税费⽤","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第18号——所得税"},{"id":"CY0097","q":"递延所得税问题","a":"“会计准则收⼊确认时点与企业所得税的纳税义务发⽣时间不⼀致”：这是传统的利润表法下“时间性差异”的概念， 但当前的所得税会计准则采⽤的是“资产负债表债务法”，以资产、负债的账⾯价值和计税基础之间存在“暂时性差异”作为确认递延所得税资产、负债的基础。这两个概念体系并不对等。但总体来说，暂时性差异的概念要⼤于时间性差异，在现⾏准则下需确认递延所得税资产或负债的场合，在原时间性差异的概念下也应确认。个人理解，供参考。","cat":"所得税","kw":"所得税,递延,递延所得税问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第18号——所得税"},{"id":"CY0377","q":"跨地域经营所得税会计处理","a":"⽬前对于单独出具分⽀机构和总机构报表的处理没有明确规定，但⼀般理解，如果要单独出具总机构和分⽀机构各 ⾃的财务报表，则在此类财务报表中，通常理解也应当遵循配⽐原则，分别计算出本机构的应纳税所得额对应的所得税费⽤，并相应挂对总机构的往来款。如果由于汇总纳税的分⽀机构有亏损可弥补等原因，导致最终实际上缴给总机构的所得税款不同于按照本机构的应纳税所得额计算的⾦额的，则差额可以转⼊本机构的权益类项⽬。个人理解，供参考。","cat":"所得税","kw":"所得税,跨地域经营所得税会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第18号——所得税"},{"id":"CY1230","q":"未确认融资费⽤摊销计⼊在建⼯程","a":"也需要。但对于租赁负债的相关利息⽀出的资本化要谨慎。因为租赁负债实际上是专⻔为了购建使⽤权资产⽽发⽣的负债。虽然《监管规则适⽤指引——会计类第3号》之“3-6 租赁资产利息费 ⽤相关会计处理”规定“租赁期开始⽇后，租赁负债可视同企业的⼀般借款”，但很难在租赁负债和符合资本化条件的资产的购建之间建⽴明确的联系。因此实务中租赁负债相关利息⽀出资本化的案例很少⻅。个人理解，供参考。","cat":"租赁","kw":"租赁,资本化,摊销,未确认融资费⽤摊销计⼊在建⼯程","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁"},{"id":"CY0584","q":"使⽤权资产进⾏改建后转租，改建⽀出在会计和税法上如何处理？","a":"如果确定属于租赁的（不是作为⽆形资产的⼟地使⽤权），则⼟建改造⼯程⽀出应确认为长期待摊费⽤，摊销年限不超过剩余的⼟地租赁年限。 参考： http://kjs.mof.gov.cn/zt/kjzzss/ … 0210610_3717408.htm http://kjs.mof.gov.cn/zt/kjzzss/ … 0210425_3691863.htm个人理解，供参考。","cat":"租赁","kw":"租赁,摊销,使⽤权资产进⾏改建后转租,改建⽀出在会计和税法上如何处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁"},{"id":"CY1206","q":"房屋续租的问题","a":"房屋续租（不含⾏使已在使⽤权资产和租赁负债中体现的续租选择权的影响）应按租赁变更处理，这种情况下应⾸先计算出对租赁负债的调整⾦额，再按该⾦额对租赁负债、使⽤权资产进⾏同⽅向、同⾦额的调整，因此不会涉及确认损益。 可能涉及确认资产处置损益的情形是租赁期的缩短或者提前退租，以及幅度⾮常⼤的租⾦减免等。请核对主帖中所讲的资产处置损益的确认和计量是否恰当。个人理解，供参考。","cat":"租赁","kw":"租赁,房屋续租的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁"},{"id":"CY1913","q":"chenyiwei求助陈版主，BD项⽬关于后续开发的账务处理","a":"A公司是否实质性参与该药品的研发？还是仅仅提供资⾦？ 如果仅提供资⾦，则A公司应将研发完成前所提供的资⾦暂挂其他⾮流动资产（每期末不论有⽆减值迹象，均应进⾏减值测试），到研发成功后转⼊⽆形资产——特许经营权，连同额外⽀付的500万美元⼀并构成该项特许经营权的成本，在合理期限内摊销。个人理解，供参考。","cat":"资产减值","kw":"减值,摊销,chenyiwei求助陈版主,BD项⽬关于后续开发的账务处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第8号——资产减值"},{"id":"CY1387","q":"关于存货销售时跌价的处理","a":"要考虑：原先导致跌价计提的因素是否已经消失？出售价格是否代表了该商品在出售时点的正常市价？ ⼀般情况下，跌价准备都是在期末集中调整⼀次。已计提跌价的存货在期中出售时，不再对跌价进⾏调整，直接按该时点的账⾯价值转⼊销售成本，即跌价准备的转销⾦额均体现在出售当期的营业成本中。个人理解，供参考。","cat":"资产减值","kw":"请教陈版,关于存货销售时跌价的处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第8号——资产减值"},{"id":"CY1008","q":"⼯程减值","a":"应将在建⼯程减值和可能获得的赔偿款作为两个事项考虑，前者适⽤资产减值准则，后者适⽤或有事项准则（属于或有资产）。之所以这样考虑是因为：不论诉讼结果如何，在建⼯程已发⽣减值都已是确定的事实，因此需对其进 ⾏减值测试和计提减值准备。在测算可收回⾦额时不考虑可能取得的赔偿款。个人理解，供参考。","cat":"资产减值","kw":"减值,⼯程减值","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第8号——资产减值"},{"id":"CY0985","q":"及各位⽼师，IPO后原股东持股成本问题","a":"取决于本公司（投资⽅）对被投资公司是否具有控制、共同控制或重⼤影响。 如果具有控制、共同控制或重⼤影响，则应作为长期股权投资按成本法或者权益法核算。标的股份的后续公允价值变动不能作为调整长期股权投资账⾯价值的理由。 如果不具有控制、共同控制或重⼤影响，则需作为⾦融资产核算。不论作为哪⼀类⾦融资产，权益⼯具投资在期末都是按公允价值计量，并确认公允价值变动损益或者其他综合收益。个人理解，供参考。","cat":"长期股权投资","kw":"公允价值,权益法,成本法,请教陈版主及各位⽼师,IPO后原股东持股成本问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"CY1403","q":"作为GP持有⼩⽐例股份，且不享有收益，GP账⾯如何确认投资款","a":"理论上GP是参与财务和经营决策的，因此对合伙企业应具有重⼤影响，相应地理论上应⽐照对联营企业的⻓期股权投资，按权益法核算，列报为其他⾮流动资产（因为投资标的不是公司制企业的股权）。但在实务中，由于占⽐很⼩，以投资者身份取得的投资回报不重⼤，故也可以作为以公允价值计量且其变动计⼊损益的⾦融资产核算，列报为其他⾮流动⾦融资产（不能指定为其他权益⼯具投资）。个人理解，供参考。","cat":"长期股权投资","kw":"公允价值,权益法,作为GP持有⼩⽐例股份,且不享有收益,GP账⾯如何确认投资款","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"CY1034","q":"关于权益法核算⻓投拟出售部分⻓投处理","a":"对于权益法核算的⻓期股权投资，不可以仅仅因为拟出售其中的部分持股，⽽将部分⻓期股权投资重分类为⾦融资产。只有对被投资企业⽆控制、共同控制或重⼤影响的权益⼯具投资，或者由某些特殊主体（投资性主体，或者⻛险投资机构、共同基⾦以及类似主体）持有的权益⼯具投资才能作为⾦融资产核算。 因此，本案例中拟于本季度内出售的3%剩余部分不能重分类为⾦融资产。个人理解，供参考。","cat":"长期股权投资","kw":"权益法,关于权益法核算⻓投拟出售部分⻓投处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"CY0292","q":"处置⼦公司股权资本公积","a":"母公司（甲）将⼀个⼦公司（⼄）的股权零对价转移给另⼀⼦公司（丙），属于以⼄的股权对丙进⾏资本性投⼊的交易，不能减少甲⾃⾝的资本公积，应将对⼄的长期股权投资成本转⼊对丙的长期股权投资成本。会计分录为： 借：长期股权投资——丙，贷：长期股权投资——⼄。 因此，在这个交易中，不存在“之前母公司形成的资本公积要转⼊投资收益吗”这⼀问题。个人理解，供参考。","cat":"长期股权投资","kw":"处置⼦公司股权资本公积","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"CY0635","q":"出⼜消费税退税的疑问","a":"在原先的《企业会计制度》下，收到出⼜退还的消费税是冲减成本的。这个问题在企业会计准则下没有新的规定， 可以继续参照。个人理解，供参考。","cat":"实务综合","kw":"求助陈版主,出⼜消费税退税的疑问","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0646","q":"资产收购终⽌","a":"违约⾦与使⽤资⾦的规模、正常融资成本等均⽆关联，是在正常融资成本之外的额外惩罚性⽀出，因此⼀般是计⼊营业外⽀出处理。不应并⼊正常的融资利息处理。个人理解，供参考。","cat":"实务综合","kw":"资产收购终⽌","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0658","q":"关于暗保理业务模式下的债务⼈回款","a":"该安排事实上还是将债权转让的事实通知了债务⼈，与“暗保理”的原则不⼀致。这应该是保理商为增强资⾦安全性采取的保护措施。在合规性⽅⾯，个⼈未发现明显的合规⽅⾯的问题，建议再咨询律师确认。个人理解，供参考。","cat":"实务综合","kw":"求助陈版,关于暗保理业务模式下的债务⼈回款","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0673","q":"关于“债权投资计划”的账务处理⽅式","a":"此处主帖所列的17.1.1条和17.1.2条事项，其发⽣与否并不是发⾏⽅可⾃⾏控制的，且⽆法证明其在永续债的预计存续期内的发⽣可能性极低，可以忽略不计。因此该条款将导致该永续债不能分类为发⾏⽅的权益⼯具。个人理解，供参考。","cat":"实务综合","kw":"请教陈版主关于“债权投资计划”的账务处理⽅式","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0680","q":"应付股利","a":"在股东⼤会作出利润分配的决议时，公司就应确认应付股利。所以在主帖中应是在5⽉份确认应付股利。个人理解，供参考。","cat":"实务综合","kw":"应付股利","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1763","q":"⼀般情况下，在可以明确区分的前提下，对于已确认的收⼊所对应的应收账款或合同资产，因债务⼈（客户或其保证⼈）的信⽤⻛险原因予以调减的，按债务重组处理；对于尚未履⾏的履约义务所对应的合同价款进⾏调减的，按收⼊准则下的合同变更处理。如果不能明确区分这两者的，均作为合同变更处理。","a":"这种情况属于典型的明股实债，可参考《中审众环研究2020》之“问题4-1-73（接受“明股实债”投资的会计处理问题）”所述原则处理。具体原则是⾸先确定谁可能被要求承担回购责任，如是则在该⽅报表中确认回购义务相关负债（如有多⽅均可能被要求承担回购义务，即承担连带责任的，则均需确认该项负债，到各该⽅共同的⺟公司编制合并报表时再消除重复确认问题）。 被投资企业如⾃身不承担回购义务的，则在其⾃身报表中⽆需确认回购义务相关负债，但如果被投资⽅需作为⽀付收益的第⼀责任⼈的，则被投资⽅需在其⾃身报表中就存续期间内需承担的收益⽀付义务的折现值确认⼀项负债，初始确认时冲减权益（资本公积），后续对其计提利息⽀出并调整负债账⾯价值时计⼊财务费⽤。 提问⼈：爬爬呀 时间：2025-10-08 15:14:59 “如有多⽅均可能被要求承担回购义务，即承担连带责任的，则均需确认该项负债”。多⽅在单体报表确认的负债是否为全额确认，根据⾦融⼯具准则？⽽不是根据或有事项准考虑回购义务的可能性，承担回购⾦额的⽐例，确认预计负债？ 回答⼈：chenyiwei 分别全额确认，根据⾦融⼯具准则。 提问⼈：爬爬呀 时间：2025-12-17 13:41:54 有⼏个问题想继续追问下：个人理解，供参考。","cat":"收入准则","kw":"合并,履约义务,债务重组,预计负债,⼀般情况下,在可以明确区分的前提下,对于已确认的收⼊所对应的应收账款或合同资产,因债务⼈,客户或其保证⼈,的信⽤⻛险原因予以调减的,按债务重组处理,对于尚未履⾏的履约义务所对应的合同价款进⾏调减的,按收⼊准则下的合同变更处理,如果不能明确区分这两者的,均作为合同变更处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0755","q":"结转的时候应当计⼊营业外收⼊还是营业收⼊呢？","a":"应在合理保证剩余款项被要求偿还的可能性基本已不存在的情况下，将其转⼊损益。转⼊的损益项⽬⼀般为营业收 ⼊。虽然确实如你所述，理论上应当“将余额进⾏区分，区分其中哪些是出于交易习惯（类似于充100只使⽤95）产 ⽣的零星⾦额，这部分可以转⼊营业收⼊；剩余部分应当转⼊营业外收⼊”，但实务中这样做的难度可能较⼤，故建议全部转⼊营业收⼊。 提问⼈：Norger张2021 时间：2024-09-24 09:12:33 ⽼师，我有个疑问，在预收款项未确定与客户订单绑定前，到底是确认预收账款还是合同负债问题，⽐如，公司会通过外部平台卖产品，但是要求先充值后消费，基本为个⼈客户，在客户充值到平台后，该资⾦在平台因此暂时未做账务处理，后期公司将这笔款项定期转对公账户，问题1、客户在平台充值时假如该⾦额没有转⾄我司对公账 户，不做账是否合理，2、做账时确认预收账款还是合同负债合理，因为合同负债是与合同订单绑定的，但是在充 值时并未消费；3、⽬前根据平台每⽉的消费额来确认收⼊，但对应成本⽆法⼀⼀匹配，因此很多情况根据⽑利⽔ 平直接倒算成本，同时会衍⽣⼀部分问题即成本可调⽆法做把控，在审核⼦公司报表时发现，是否有更合理的⽅式做把控。 回答⼈：chenyiwei个人理解，供参考。","cat":"收入准则","kw":"结转的时候应当计⼊营业外收⼊还是营业收⼊呢","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0697","q":"国家重点研发计划项⽬联合实施协议","a":"参阅《监管规则适⽤指引——会计类第2号》之“2-8 定制化产品相关研发⽀出的会计处理”，根据研发成果控制权的归属，确定其应采⽤何种会计模式： 企业与客户签订合同，为客户研发、⽣产定制化产品。客户向企业提出产品研发需求，企业按照客户需求进⾏产品设计与研发。产品研发成功后，企业按合同约定采购量为客户⽣产定制化产品。对于履⾏前述定制化产品客户合同过程中发⽣的研发⽀出，若企业⽆法控制相关研发成果，如研发成果仅可⽤于该合同、⽆法⽤于其他合同，企业应按照收⼊准则中合同履约成本的规定进⾏处理，最终计⼊营业成本。若综合考虑历史经验、⾏业惯例、法律法规等因素后，企业有充分证据表明能够控制相关研发成果，并且预期能够带来经济利益流⼊，企业应按照⽆形资产准则相关规定将符合条件的研发⽀出予以资本化。 企业应当建⽴和完善相关内部控制，合理识别并归集研发费⽤与合同履约成本，恰当确认计⼊⽆形资产的研发⽀出。 判断企业能否控制该研发成果，主要参考：该研发成果是否专供海关⽅⾯使⽤；除了合同约定的客户（海关）以 外，本企业能否找到其他商业⽤户，⾃主进⾏后续商业运作并获取相关经济利益；海关技术中⼼的拨款能否涵盖本企业的实际研发成本，如不⾜则⾃筹资⾦部分如何收回和补偿。个人理解，供参考。","cat":"收入准则","kw":"控制权,资本化,国家重点研发计划项⽬联合实施协议","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0641","q":"⼀揽⼦交易的疑问","a":"在构成⼀揽⼦交易的情况下，单体和合并报表中都将每次交易的差额（其中，个别报表层⾯是每次处置价款与对应的被处置长期股权投资账⾯价值之间的差额；合并报表层⾯是每次处置价款与被处置的⼦公司股权所对应的净资产之间的差额）计⼊其他综合收益，到丧失控制权时⼀次性转⼊投资收益。 参照：《企业会计准则解释第5号》第五条；《企业会计准则应⽤指南汇编2024》第三章。提问⼈：liuweisheng 时间：2024-08-12 16:11:49 A多次向C出售A公司⼦公司B股权丧失控制权，是⼀揽⼦交易，丧失控制权之前的每⼀次交易，A将收到的交易价款与账⾯对应价值差额记⼊其他综合收益，C将⽀付的价款计⼊预付账款。那么C跟A的往来会有差异。这⾥如何理解，谢谢版主解惑。 回答⼈：chenyiwei 股权处置和股权收购的会计处理本⾝就不是完全对等的，例如对收购⽅⽽⾔构成同⼀控制下合并时，或者类似于此处的分多次交易处置⼦公司股权导致丧失控制权时。 C累计确认的预付账款应等于A截⾄同⼀时点累计收取的价款。如果A和C是同⼀集团内的企业，应抵销A确认的其他综合收益。到丧失控制权后，还需考虑同⼀控制下合并会计处理与处置⼦公司会计处理的⼜径差异问题。个人理解，供参考。","cat":"收入准则","kw":"控制权,合并,求助陈版主,⼀揽⼦交易的疑问","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0071","q":"通过持股平台进⾏集团股份⽀付的会计处理","a":"该事项相当于A的⼤股东代A、B承担了股份⽀付费⽤，所以A在个别报表和合并报表层⾯也需要就⼤股东代为承担全资⼦公司B的股份⽀付费⽤，确认对全资⼦公司B的长期股权投资和资本公积，即借记“长期股权投资——A”，贷记资本公积。在A的合并报表层⾯，A、B员⼯的股权激励费⽤均计⼊管理费⽤等成本费⽤项⽬。 提问⼈：青砖作尘 时间：2024-04-03 17:38:33 陈⽼师您好，补充请教个问题，单体报表上是根据员⼯劳动合同签署主体在母公司A或⼦公司B确认股份⽀付，还 是根据员⼯实际⼯作内容来确认呢？（例如由于社保公积⾦等因素导致员⼯在母公司签署劳动合同、发⼯资，实际在⼦公司履职） 回答⼈：chenyiwei 按实际⼯作内容，并不是与谁签订劳动合同。个人理解，供参考。","cat":"收入准则","kw":"合并,通过持股平台进⾏集团股份⽀付的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY1789","q":"关于对间接控股孙公司债务豁免的权益性交易的问题","a":"此类豁免利息的交易属于权益性交易，即基于双⽅之间特定的投资与被投资、控制与被控制的关系才得以发⽣。但因为甲不直接持有B的股权，故应视为甲先对A进⾏资本性投⼊，然后A再向 B进⾏转投⼊。因此，应顺着投资关系，采⽤逐级下推的处理模式： 甲公司：借：⻓期股权投资——A，贷：应收利息 A公司：借：⻓期股权投资——B，贷：资本公积——资本溢价B公司：借：应付利息，贷：资本公积——资本溢价 在各级⺟公司（甲、A）编制合并报表时，将本级对下级的⻓期股权投资与下级的资本公积相抵销。因为A对B持股85%，故在甲、A的合并报表中需反映少数股东权益的增加，相应A公司合并报表层⾯资本公积的增加额只是豁免的利息⾦额的85%。在甲公司的合并报表中，体现为资本公积减少相当于被豁免利息的15%的⾦额，相应少数股东权益增加。个人理解，供参考。","cat":"合并报表","kw":"合并,少数股东,关于对间接控股孙公司债务豁免的权益性交易的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY0108","q":"及各位⽼师：报告期内处置⼦公司，关于利润表合并的问题","a":"你的问题是如何编制合并报表的流程处理问题，实务中可以有多种⽅法，但⽆论如何，得到的最终结果必须⼀致， 即必须符合《企业会计准则第33号——合并财务报表（2014年修订）》第五⼗条的要求。 在处置⼦公司的当期，纳⼊合并范围的⼦公司报表实际上是不完整的（只有期初资产负债表和年初⾄处置⽇利润 表，没有期末资产负债表），就该报表本⾝⽽⾔是不平衡的，所以对应的抵销分录必然也是不平的（不平的差额⽤借记或贷记“未分配利润”但不实际过录的⽅式⼈为做平），将不平的⼦公司报表和不平的抵销分录相结合，得出最终结果平衡的效果。 或者，也可以通过抵销分录将母公司个别报表层⾯投资收益中对应于该⼦公司的期初⾄处置⽇净利润的部分还原到利润表各项⽬，即主帖中所述的“将投资收益中归归属于当期的净利润还原⾄收⼊成本费⽤”。个人理解，供参考。","cat":"合并报表","kw":"合并,请教陈版主及各位⽼师,报告期内处置⼦公司,关于利润表合并的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表、《企业会计准则第33号——合并财务报表（2014年修订）》"},{"id":"CY0893","q":"⽽吸收存款——作为抵偿应付票据的从权利“质押物”，即为中国银⾏所享有。","a":"根据⾦融⼯具列报准则第⼆⼗⼋条规定，⾦融资产和⾦融负债抵销列报应满⾜的条件之⼀是“企业具有抵销已确认 ⾦额的法定权利，且该种法定权利是当前可执⾏的”。 虽然“应收、应付基于同⼀交易对⼿；同⼀法律关系”，但银⾏并不能随时⾏使抵消权，⽽是只有到票据到期⽇才能从被冻结的保证⾦中收回票据⾦额。因此不满⾜上述加粗字体显⽰的条件，不能抵销后按净额列报。 提问⼈：⼩⽩菜菜 时间：2024-11-05 11:54:33 请教陈⽼师，那假设企业和银⾏签订协议，该保证⾦户款项已经归属银⾏，企业⽆权限动⽤，企业只会获取固定保证⾦收益，只是这个收益是到期⽇给企业，这样呢也不能抵消按净额列报 回答⼈：chenyiwei ⼀般也不建议抵销列报。否则相当于票据提前到期了，但票据还在外流通，与这个设定不符。个人理解，供参考。","cat":"合并报表","kw":"⽽吸收存款——作为抵偿应付票据的从权利“质押物”,即为中国银⾏所享有","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY1693","q":"关于交叉持股的合并抵消问题","a":"根据主帖中的数据，⺟公司合并报表层⾯，截⾄2025年9⽉末，A公司⽆直接少数股权（其全部股权由本公司和⼦公司B持有），少数股权仅体现在⼦公司B层⾯。 假设⼦公司B在2025年7⽉末取得A公司49%股权后，对其按权益法核算，B公司8-9⽉的净利润100万元中已包含按权益法确认的对A公司该期间内投资收益，且不存在内部交易等特殊事项， 则9⽉末的少数股东权益就是B公司该⽉末的净资产乘以15%。 提问⼈：kyhj0314 时间：2025-09-22 09:18:25 陈版，如果B公司购买A公司49%股权时，总公司合并层⾯产⽣资本公积，该资本公积是不是按照少数股东持股⽐例15%分摊给少数股东回答⼈：chenyiwei 这部分资本公积⽆需分配给少数股东，全部归属于⺟公司股东。个人理解，供参考。","cat":"合并报表","kw":"合并,少数股东,权益法,求助陈版主关于交叉持股的合并抵消问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY1134","q":"集团内公司间股权⽆偿划转的问题？","a":"划出⽅A公司个别报表层⾯按照对B公司⻓期股权投资的账⾯价值，依次冲减资本公积（资本溢价或股本溢价）、盈余公积、未分配利润；合并报表层⾯按照B公司于划出⽇的账⾯净资产，依次冲减资本公积（资本溢价或股本溢价）、盈余公积、未分配利润。 划⼊⽅C公司按同⼀控制下合并处理，按照划⼊⽇B公司账⾯净资产作为对B的⻓投成本，同时贷记资本公积；合并报表层⾯需追溯重述前期⽐较数据。 上一页 陈版主（陈奕蔚老师）答疑历史文章（2025年01月） 下一页 陈版主（陈奕蔚老师）答疑历史文章（2025年03月） 粤ICP备18107660号 粤公网安备44060602000887号 关于网站 Copyright © 2021-2026 会计便利店 hjyweb.cn 【个人理解，供参考。","cat":"合并报表","kw":"合并,请教陈⽼师,集团内公司间股权⽆偿划转的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY1632","q":"孙公司变为⼦公司后进⾏商誉减值测试时如何认定资产组","a":"这只是在合并报表范围内的内部交易，在合并层⾯应完全抵销其影响。由于B只是⼀个SPV，仅持有C公司股权，⾃身⽆经营性资产，因此B将C的股权转让给A，并不影响A合并报表中以资产减值测试为⽬的的资产组划分，仍将整体商誉230与从该次收购中获益的C公司、A公司资产组相关联，进⾏减值测试。 合并报表范围内的内部架构调整不应直接导致计提商誉减值准备。个人理解，供参考。","cat":"企业合并","kw":"商誉,减值,合并,孙公司变为⼦公司后进⾏商誉减值测试时如何认定资产组","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY1626","q":"交叉持股下的同⼀控之下企业合并","a":"这种情况视同A公司需将此前作为⾦融资产核算期间确认的公允价值变动和其他综合收益冲回，恢复到最原始的成本状态，再按照分步交易实现同⼀控制下合并进⾏会计处理。 由于B、C都是A的⼦公司，因此B对C的⾦融⼯具核算确认的公允价值变动和其他综合收益也应当冲回，再进⾏合并抵销处理。即A、B、C之间的互相投资均调整为成本模式，然后进⾏合并抵销处理。个人理解，供参考。","cat":"企业合并","kw":"公允价值,合并,交叉持股下的同⼀控之下企业合并","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY1747","q":"请教陈⽼师增资扩股问题？","a":"在⾮同⼀控制下合并中，当被购买⽅本身是⼀个集团企业时，对于取得被购买⽅购买⽇的可辨认净资产公允价值份额，应以被购买⽅合并报表层⾯的归⺟净资产（不含商誉、递延所得税资 产、递延所得税负债）⼝径确定。但这个表述并不意味着直接引⽤被购买⽅⾃身合并报表中的归⺟净资产账⾯数，⽽是需将其调整为购买⽇的公允价值，并且还要再乘以购买⽇持有的股权⽐例。个人理解，供参考。","cat":"企业合并","kw":"公允价值,商誉,合并,所得税,递延,请教陈⽼师增资扩股问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY1109","q":"关于同⼀控制下企业合并的问题","a":"B的合并报表仍参照⼀般的处置⼦公司时的合并范围确定原则，即C公司截⾄处置⽇的报表仍需纳⼊B的合并范围，不能视同⼀开始就不再合并。即此时A、B作为合并⽅和处置⽅的合并报表编制⼝径是不对等的。 如主帖所述，“做甲集团公司⼤合并⽤逐层合并的话，那就有两次C公司由最开始到去年底的数据”，此时应采⽤⼀定的技术处理⽅法来消除该项重复。个人理解，供参考。","cat":"企业合并","kw":"合并,请教陈版主关于同⼀控制下企业合并的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY1550","q":"过渡期亏损由资产购买⽅承担","a":"如果被购买⽅构成“业务”的，则由购买⽅承担的过渡期亏损，表明购买⽅⽀付同样对价获得的被购买⽅可辨认净资产减少，故该差额在购买⽇合并报表中确认商誉。如果被购买⽅不构成“业务”的，则购买⽅合并报表中不确认商誉，该差额只能分摊到各项所取得的可辨认资产的⼊账价值中。 不论是上述何种情况，后续期末对于减值问题都要⾼度关注。个人理解，供参考。","cat":"企业合并","kw":"商誉,减值,合并,过渡期亏损由资产购买⽅承担","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0631","q":"同⼀控制下企业合并的实操问题，⼦公司为亏损状态","a":"母公司从⼦公司取得孙公司股权，只是母公司控制范围内的架构重组，并未改变母公司合并报表的合并范围，故不属于企业合并。在交易价格公允的前提下，母公司对取得孙公司的股权的长期股权投资成本，应根据实际⽀付或应付的股权转让款确定。 ⼦公司按正常的处置⼦公司进⾏会计处理即可。孙公司只需调整实收资本科⽬中的股东明细。个人理解，供参考。","cat":"企业合并","kw":"合并,同⼀控制下企业合并的实操问题,⼦公司为亏损状态","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY1150","q":"企业会计准则解释第18号保证类质量保证问题，麻烦陈⽼师","a":"这个问题的关键点不是在于是否计提预计负债，⽽是保证性质保义务相关⽀出的核算科⽬和利润表上的列报项⽬。如果由于保证性质保义务相关⽀出⾦额较⼩或者难以合理估计，不符合预计负债确认条件，或者基于重要性原则进⾏简化处理的（在实际发⽣时计⼊损益），则在解释18号发布后，对以前年度所使⽤的核算科⽬和报表列报项⽬也需要进⾏追溯调整，即从销售费⽤调整到营业成本。 提问⼈：不哎上班 时间：2025-03-16 13:35:53 陈版，根据18号解释，保证性质保由销售费⽤调到营业成本，那么发⽣的保证性⽀出的现⾦流，是不是也应该由⽀付其他经营调整到购买商品？ 回答⼈：chenyiwei 如果是外购原材料或备品等⽤于维修的，可以调整到购买商品。个人理解，供参考。","cat":"会计政策/估计变更","kw":"预计负债,企业会计准则解释第18号保证类质量保证问题,麻烦陈⽼师","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第28号——会计政策、会计估计变更和差错更正"},{"id":"CY0690","q":"关于企业在电商平台店铺收⼊确认模式求助","a":"基本赞同主帖的理解：“应当按照订单总⾦额确认收⼊，有票及⽆票的平台账扣费⽤均需作为销售费⽤（运费除外）更合适”。个人理解，供参考。","cat":"实务综合","kw":"关于企业在电商平台店铺收⼊确认模式求助","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0694","q":"关于财政局将其⼦公司划转给另⼀个⼦公司的处理","a":"此类情况，我司作为划⼊⽅，按同⼀控制下合并处理。 如果增加实收资本，则需根据《公司法》规定对划⼊资产进⾏评估，如不增加本司实收资本则不需要评估。个人理解，供参考。","cat":"实务综合","kw":"合并,请教陈版主关于财政局将其⼦公司划转给另⼀个⼦公司的处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0671","q":"新⾦融⼯具准则下，担保⼈是否应将原预计负债调整为应计负债？","a":"是。法院判决担保⼈承担担保责任后（且担保⼈确认），则担保⽅应将原预计负债调整为应计负债。这与是否执⾏新⾦融⼯具准则⽆关。个人理解，供参考。","cat":"或有事项","kw":"预计负债,新⾦融⼯具准则下,担保⼈是否应将原预计负债调整为应计负债","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第13号——或有事项"},{"id":"CY0675","q":"关于员⼯离职补偿管理费⽤⼆级科⽬设置。","a":"如果确定在会计上属于辞退福利的，则在主帖所述的费⽤明细分类下，建议并⼊“管理费⽤”下的“职⼯薪酬”明细。个人理解，供参考。","cat":"职工薪酬","kw":"关于员⼯离职补偿管理费⽤⼆级科⽬设置","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第9号——职工薪酬"},{"id":"CY1597","q":"《⼩企业会计准则》差错审计调整","a":"审计调整都是在被审计年度的财务报表批准报出之前进⾏的，此时当然可以直接调整报告年度的财务报表。这⼀点与⼩企业准则本身规定的未来适⽤法并不⽭盾。未来适⽤法是针对在前期报表批准报出后发现的前期差错。 另外，在专项审计中，如果审计多年前的财务报表，则应将所发现的错报更正在相应的错误发⽣年度，并由被审计单位权⼒机构重新履⾏批准报出程序。提问⼈：yamingdingding 时间：2025-08-15 17:38:21 我觉得陈版的意思是，如果22年23年的财报已经批准报出了，在24年进⾏审计的时候如果发现以前年度的错误，应该在24年调整，⽽不应该追溯调整22-23年的数据了回答⼈：chenyiwei 可以这样理解。个人理解，供参考。","cat":"会计政策/估计变更","kw":"《⼩企业会计准则》差错审计调整","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第28号——会计政策、会计估计变更和差错更正"},{"id":"CY0707","q":"股份⽀付形成的其他资本公积是否能转增股本","a":"如果尚在等待期内，不确定对应的权益⼯具最终能否⾏权或解锁，则这部分其他资本公积不属于可转增资本的范围，需到⽇后转⼊资本溢价后才可⽤于转增资本。个人理解，供参考。","cat":"实务综合","kw":"请教陈版主,股份⽀付形成的其他资本公积是否能转增股本","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0708","q":"关于员⼯持股平台出售不满⾜解锁条件的本公司股票产⽣的收益如何进⾏会计 处理","a":"该安排相当于公司收回不满⾜解锁条件的股票，出售后将相当于“本⾦+利息”的部分返还给原持有⼈，剩余部分归企业。对于归属本企业的剩余部分，因为来源于⾃⾝权益⼯具的出售，故应按权益性交易原则处理。个人理解，供参考。","cat":"实务综合","kw":"关于员⼯持股平台出售不满⾜解锁条件的本公司股票产⽣的收益如何进⾏会计","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0715","q":"利息收⼊的分类","a":"母公司本⾝是⾮⾦融企业，因此对于拆借资⾦给⼦公司的利息收⼊，应作为投资收益或者“财务费⽤——利息收 ⼊”核算。 参照新收⼊准则应⽤指南中对于构成重⼤融资成分的利息收⼊的核算规定。个人理解，供参考。","cat":"实务综合","kw":"利息收⼊的分类","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0721","q":"其他权益⼯具投资","a":"因为是作为⾦融资产核算，所享有的净资产份额增加也就意味着该项⾦融资产的公允价值增加，所以作为公允价值变动计⼊其他综合收益。个人理解，供参考。","cat":"实务综合","kw":"公允价值,其他权益⼯具投资","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0753","q":"帮忙解答上市公司股权⾮关联⽅赠予问题","a":"关键是：这个赠送的背后商业逻辑和理由是什么？是否属于关联交易⾮关联化？ 如果⽆法给出合理（符合通常的商业逻辑和商业常识）的解释和理由，则审计师可能需以审计范围受限为由，对该上市公司的报表发表保留意见或者⽆法表⽰意见。个人理解，供参考。","cat":"关联方披露","kw":"求助陈版主帮忙解答上市公司股权⾮关联⽅赠予问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第36号——关联方披露"},{"id":"CY0427","q":"关于房开企业持续经营和递延所得税问题","a":"该企业“本期减少实缴资本6.5亿元，导致净资产为负数”的原因是什么？⽬前是否仍有开发中的房地产项⽬？如 有，则预计这些项⽬顺利完⼯交付并收回房款，是否不存在重⼤不确定性？是否已经（或可能）存在资⾦链断裂导致开发项⽬⽆法顺利进⾏下去的问题？ 如果没有这些明显的问题，则可以认为持续经营能⼒⽆重⼤疑虑，但对于递延所得税资产的确认问题还需要关注， 确保未来有⾜够应纳税所得额的前提下⽅可确认。个人理解，供参考。","cat":"所得税","kw":"所得税,递延,关于房开企业持续经营和递延所得税问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第18号——所得税"},{"id":"CY0086","q":"求助，公司回购⾃⼰公司股票，持有⽬的是⼀年后再出售，该如何进⾏会计处 理","a":"上市公司回购⾃⾝股份，不论是出于何种⽬的，均作为回购⾃⾝权益⼯具处理，按实际回购成本确认为库存股。持有期间，不确认其公允价值变动。后续再出售时，视为库存股重新对外发⾏，将重新出售所得款项净额与库存股成本之间的差额调整资本公积。个人理解，供参考。","cat":"所得税","kw":"公允价值,公司回购⾃⼰公司股票,持有⽬的是⼀年后再出售,该如何进⾏会计处","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第18号——所得税"},{"id":"CY1618","q":"请教，员⼯股权激励计划员⼯承担股价下跌⻛险的处理","a":"这种情况不涉及单独确认衍⽣⼯具。由于回购价格为“授予价格和回购时股票市场价格（董事会审议回购事项前1个交易⽇公司标的股票交易均价）的孰低值”，故基于谨慎原则，在等待期内回购义务相关负债的账⾯价值保持原授予价格不变。如果最终回购价格按照股票市价（低于原授予价格）实施，则实际回购价格低于原授予价格之间的差额在实际回购时转⼊资本公积处理。个人理解，供参考。","cat":"股份支付","kw":"员⼯股权激励计划员⼯承担股价下跌⻛险的处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第11号——股份支付"},{"id":"CY1712","q":"积分制股权激励是否需要核算","a":"被授予积分是后续取得激励股份的前提，即后续的激励股份也是为了补偿被授予积分所对应期间内，激励对象向本企业提供的服务。所以已被授予积分但在兑换前的期间也属于股份⽀付等待期的⼀部分，在该期间内应确认股份⽀付费⽤。 由于主帖的背景信息相当简略，如果需要进⼀步分析具体应如何进⾏会计处理，则还需要提供更详细的条款设计信息。个人理解，供参考。","cat":"股份支付","kw":"积分制股权激励是否需要核算","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第11号——股份支付"},{"id":"CY1727","q":"国资公司收到财政局资⾦是属于专项应付款或政府补助","a":"总体上看，作为专项拨款，最终计⼊资本公积的可能性更⼤。因为该A公司就是向其所⾪属的政府（也就是股东）申请资⾦，因此本质上属于政府对企业的资本性投⼊。由于该政府即为企业的股东，且⽆法证明该项拨款具有普惠性和公开性，因此不符合政府补助的⽆偿性特征，不应按政府补助进⾏会计处理。个人理解，供参考。","cat":"政府补助","kw":"请教陈版国资公司收到财政局资⾦是属于专项应付款或政府补助","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第16号——政府补助"},{"id":"CY1189","q":"投资性房地产计量","a":"这最后⼀句是和前⾯内容并列的，专指以成本模式对投资性房地产进⾏后续计量的企业，即，既然选定了成本模式，那就不论能否可靠确定投资性房地产的公允价值，均按“成本-累计折旧-减值准备”的后续计量模式对其进⾏计量。不仅仅是在建投资性房地产如此，是该企业的所有投资性房地产均如此。个人理解，供参考。","cat":"资产减值","kw":"公允价值,减值,折旧,投资性房地产计量","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第8号——资产减值"},{"id":"CY1732","q":"利息资本化","a":"我理解超出常规建设周期的这段时间，虽然尚未转固，但其整体上并⾮达到预定可使⽤状态所必需，因此在该期间内的借款费⽤不应资本化，因为不符合“必要⽀出”这⼀基本认定条件。⽽且， 在该期间内发⽣的其他额外⽀出导致固定资产原值超出原预算，该差额也可能存在其他减值⻛险。个人理解，供参考。","cat":"资产减值","kw":"减值,固定资产,资本化,利息资本化","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第8号——资产减值"},{"id":"CY0166","q":"房地产开发企业预交⼟征税事项","a":"根据《增值税会计处理规定》（财会[2016]22号），企业应在“应交税费”科⽬下设置“预交增值税”明细科⽬，核算 ⼀般纳税⼈转让不动产、提供不动产经营租赁服务、提供建筑服务、采⽤预收款⽅式销售⾃⾏开发的房地产项⽬ 等，以及其他按现⾏增值税制度规定应预缴的增值税额。预缴增值税的账务处理为：企业预缴增值税时，借记“应交税费——预交增值税”科⽬，贷记“银⾏存款”科⽬。⽉末，企业应将“预交增值税”明细科⽬余额转⼊“未交增值 税”明细科⽬，借记“应交税费——未交增值税”科⽬，贷记“应交税费——预交增值税”科⽬。房地产开发企业等在 预缴增值税后，应直⾄纳税义务发⽣时⽅可从“应交税费——预交增值税”科⽬结转⾄“应交税费——未交增值税”科 ⽬。 理论上，对这类纳税义务已发⽣但尚未实际缴纳的预缴税费，应同时确认⼀项资产和负债，以完整反映税款缴纳义务。但⽬前实务中的常见做法是仅作账外备查登记，⽽不作该账务处理。个人理解，供参考。","cat":"租赁","kw":"租赁,房地产开发企业预交⼟征税事项","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁"},{"id":"CY0222","q":"飞机租赁使⽤权资产价值如何确定？","a":"基于租赁资产的使⽤状况或者所产⽣的效益计算的租⾦属于可变租赁付款额，且并⾮取决于指数或⽐例。对于这种情况，除了售后租回等特殊情况以外（参见《企业会计准则解释第17号》第三条），是不纳⼊使⽤权资产和租赁负债计量的，⽽是在发⽣时直接计⼊相关成本费⽤。 但需要注意：是否存在事实上的最短飞⾏时间要求，从⽽导致该租⾦中事实上存在“实质固定付款额”的情况。个人理解，供参考。","cat":"租赁","kw":"租赁,求助陈版主,飞机租赁使⽤权资产价值如何确定","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁"},{"id":"CY0737","q":"收付实现制是开票确认收⼊还是收钱时？","a":"收付实现制通常不能⽤于企业会计核算，因此该问题在准则中并⽆明确的规定。⼀般理解是在实际收到现⾦时才确认收⼊，实际发⽣⽀出时才确认成本费⽤。在开票或收到发票，但尚未发⽣资⾦流动时不作账务处理。个人理解，供参考。","cat":"实务综合","kw":"收付实现制是开票确认收⼊还是收钱时","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0738","q":"收到⼯程承包商延期赔偿款的会计处理","a":"如果作为补偿对象的损失项⽬在利润表中直接有所体现的，则收到的补偿款直接冲减相关损失原计⼊的利润表项 ⽬，补偿款⾦额⼤于实际已在利润表中单独体现的损失⾦额的，超出部分冲减在建⼯程成本。个人理解，供参考。","cat":"实务综合","kw":"收到⼯程承包商延期赔偿款的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0740","q":"⼆级市场出售股票（交易性⾦融资产）产⽣的⼿续费和交易印花税如何⼊账？","a":"由于系与出售股票投资的交易直接相关，故直接计⼊（冲减）投资收益即可，即直接影响本次交易的损益。个人理解，供参考。","cat":"实务综合","kw":"⼆级市场出售股票,交易性⾦融资产,产⽣的⼿续费和交易印花税如何⼊账","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0998","q":"母公司购买⾮全资⼦公司持有的长期股权投资","a":"该事项就是⼀个普通的⼦公司向母公司出售资产的逆流交易，按照逆流交易未实现损益抵销的⼀般原理进⾏抵销即可，包括将未实现损益的抵消影响按⽐例分配给少数股权。 后续权益法核算中，理论上母公司A个别报表层⾯对C的权益法核算和合并报表层⾯对C的权益法核算基础是不同 的，合并报表层⾯应延续原先B公司个别报表中对C的权益法核算基础，所以后续在编制A的合并报表时，还需要 对“长期股权投资——C”的账⾯价值进⾏调整，这个调整也可以看作A、B之间内部交易损益的实现过程，也就是主帖中所说的“2024年1-9⽉A公司合并利润表中该事项的投资收益⾦额为0.9亿元，对C公司评估增值的1亿元在合并⼜径按C公司⼟地使⽤权剩余摊销年限进⾏摊销，每年调整对C公司的投资收益”。个人理解，供参考。","cat":"合并报表","kw":"合并,权益法,摊销,母公司购买⾮全资⼦公司持有的长期股权投资","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY1093","q":"关于合并抵消中的汇率变动问题","a":"需冲减的未实现损益是根据出售⽅（境内公司A）报表中的收⼊、成本⾦额确定的。由于本案例中合并报表的报告货币和A公司的记账本位币均为⼈⺠币，存货是⾮货币性项⽬不确认汇兑损益，故M0和M1针对该批商品的内部交易损益都是⼀样的，即均为⼈⺠币500。 英镑汇率在不同年度之间波动的影响，体现在合并报表的其他综合收益——外币折算差额中。提问⼈：wx_5da958a4acba 时间：2025-09-08 13:32:09 追问请教下陈⽼师，如果反过来，是境外公司以外币定价卖给了境内公司，此时未实现损益初始基准是外币，那么在合并报表时如何处理？ 回答⼈：chenyiwei 此时未实现损益⾦额按照卖⽅本位币计算，即卖⽅个别报表中的⽑利乘以交易发⽣⽇汇率。个人理解，供参考。","cat":"合并报表","kw":"合并,关于合并抵消中的汇率变动问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY0273","q":"交叉持股，⼦公司分红的处理","a":"假设母公司（合伙企业）的合伙协议约定从被投资企业取得分红后即应向合伙⼈按其出资⽐例进⾏分红，则⼦母公司收到⼦公司分红70万元后，需按11%⽐例对⼦公司分红7.7万元。此时，⼦公司在其个别报表中仍可将该7.7万元 确认为投资收益。 即，母⼦公司各⾃在个别报表中可以将对对⽅的投资确认为长期股权投资（或⾦融资产）。其中，⼦公司不论对母公司的持股⽐例多⼤，都不可能对母公司具有控制、共同控制或重⼤影响，只能将其对母公司的投资作为⾦融资产核算。相应地，取得⼦公司（或母公司）的分红，在投资⽅个别报表中均可确认为投资收益。 在母公司的合并报表中，⼦公司持有母公司的权益列作库存股（或类似的权益抵减项⽬），并抵销母⼦公司之间互相分红形成的投资收益。个人理解，供参考。","cat":"合并报表","kw":"合并,交叉持股,⼦公司分红的处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY0541","q":"联营企业的其他权益⼯具投资会计处理","a":"联营企业的其他权益⼯具投资发⽣公允价值变动的，联营企业⾃⾝账⾯上确认为其他综合收益变动。相应地，投资 ⽅企业在权益法核算中，应按⽐例确认“其他综合收益——在联营企业的不能转损益的其他综合收益中的份额”。即分录为： 借或贷：长期股权投资——其他综合收益 贷或借：其他综合收益——在联营企业的不能转损益的其他综合收益中的份额个人理解，供参考。","cat":"长期股权投资","kw":"公允价值,权益法,联营企业的其他权益⼯具投资会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"CY1344","q":"对联营企业减资超过⻓投账⾯价值的部分如何处理","a":"截⾄减资时点，D的净资产为1800万元，A按⽐例享有900万元，但D需分配给A的减资款是1800万元，这是否表明A将其应承担的D的亏损的⼀部分转移给了其⺟公司B，即⺟公司为⼦公司承担了被投资企业的部分亏损？ 基于上述考虑，A收回的减资款超出原⻓期股权投资账⾯价值的差额，应贷记资本公积——资本溢价或股本溢价处理。个人理解，供参考。","cat":"长期股权投资","kw":"对联营企业减资超过⻓投账⾯价值的部分如何处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"CY0978","q":"母⼦公司共同投资的公司如何判断控制⽅","a":"⽆论如何，A肯定可以控制C，因此A直接持有C的40%股权应作为对⼦公司的长期股权投资按成本法核算，不可能进⾏权益法核算。 对于B是否具有控制、共同控制或重⼤影响的问题，⼀般理解，因为B本⾝是A的全资⼦公司，所以B是A天然的⼀致⾏动⼈，所以⼀般情况下认为B不控制C，⽽是A直接控制C。除⾮存在以下特殊情况：个人理解，供参考。","cat":"长期股权投资","kw":"权益法,成本法,母⼦公司共同投资的公司如何判断控制⽅","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"CY1602","q":"存货置换上市公司增发新股","a":"参照⽬前债务重组准则对于债务⼈以存货抵债时，只能确认其他收益，⽽不能确认收⼊、成本的处理规定，对于此类以存货换取上市公司增发股票的情况，⼀般也不能确认收⼊、成本，只能将取得上市公司股票的公允价值（⼀般按发⾏价计算）与存货原账⾯价值之间的差额确认为其他收益。 提问⼈：yulichuan 时间：2025-08-07 09:41:57 那请问确认其他收益的这种处理⽅式有类似案例吗？⽬前看下来该业务满⾜了商业实质以及属于企业的⽇常活动，采⽤收⼊准则也没有不妥，您说的⾮⼀般情况具体是指满⾜什么条件。回答⼈：chenyiwei 没有类似案例，只是从不能确认收⼊这⼀⻆度出发考虑。提问⼈：⾐志坤 时间：2025-08-12 09:14:09 陈⽼师您好，这个案例应该与债务重组没有关系吧？为何要采⽤债务重组的处理原则进⾏账务处理，⽽不是采⽤⾮货币性资产交换准则第三条第（⼀）项“企业以存货换取客户的⾮货币性资产的，适⽤《企业会计准则第14号—收⼊》”的规定进⾏账务处理呢？ 回答⼈：chenyiwei 和债务重组没有直接关系。所借鉴的是“债务重组不是企业的⽇常业务，因此以存货作为重组⼿段时，交付给债权⼈的存货不能确认收⼊”这⼀点。个人理解，供参考。","cat":"收入准则","kw":"公允价值,债务重组,存货置换上市公司增发新股","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY1463","q":"处置少数股权⽽缴纳的所得税在合并报表中的列报","a":"参照《监管规则适⽤指引——会计类第1号》之“1-6 同⼀控制下企业合并的会计处理”之“三、同⼀控制下企业合并股权置换涉及的所得税问题”： 合并⽅以原有⼦公司股权置换同⼀控制下其他公司股权并取得控制权的，该交易构成同⼀控制下企业合并，合并⽅在该交易过程中可能会因股权处置所得缴纳企业所得税。股权处置所得应当分为股权持有期间产⽣的利润和股权增值所得两部分分别考虑相关所得税的会计处理。在合并财务报表中，当合并⽅对⼦公司股权的持有意图由⻓期持有变为对外出售时，不再满⾜不确认递延所得税的特殊情况，即投资企业能够控制暂时性差异转回的时间，且该暂时性差异在可预⻅的未来很可能不会转回。因此，合并⽅应就该⼦公司股权与持有期间产⽣的利润相关的暂时性差异确认递延所得税，并计⼊当期损益。针对股权增值所得部分，由于同⼀控制下股权置换交易属于权益性交易，与直接计⼊所有者权益的交易或者事项相关的当期所得税和递延所得税应当计 ⼊所有者权益。 参照上述原理，对于处置少数股权但不丧失控制权交易中所涉及的所得税，在合并报表层⾯也应区分两部分处理：与持有期间产⽣的利润相关的所得税计⼊损益；与股权增值所得部分对应的所得税冲减资本公积。个人理解，供参考。","cat":"收入准则","kw":"控制权,合并,所得税,递延,处置少数股权⽽缴纳的所得税在合并报表中的列报","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY1191","q":"求教，关于开发⽀出的会计处理","a":"不建议直接冲减开发⽀出（即使已收取的款项⽆需退还）。 理论上，在确保本企业继续保持对研发项⽬和研发成果主导和控制权的前提下，应将收取的款项分解为两部分：（1）未来形成研发成果后的知识产权授权许可价款；（2）为分享研发成果后续收益的投资款。前者应确认为合同负债，可在研发完成并达到合同约定条件时结转收⼊；后者应确认为⼀项⾦融负债。 实务中如果难以合理拆分上述两部分的，基于谨慎考虑全部作为⾦融负债列示，后续产⽣⽀付分成款的义务时冲减该项负债，分成款超出该项负债⾦额后，将仍需⽀付的分成款确认为营业成本。 提问⼈：phoenix_xz 时间：2025-03-20 08:44:33 陈版主，⽬前双⽅拟的未来分享收益⽅式为A公司⽣产成果产品，委托B公司作为全国代理，B公司每件产品收取⼀定⽐例的代理费，如果按您的意⻅，确认成⾦融负债，在未来需要⽀付代理费的时候去对冲负债，这样的话，会不会造成这个产品的⽑利率畸⾼。我理解或者做成知识产权授权收⼊的合同负债处理，与研发完成后的⽆形资产摊销按相同收益期结转，每年从⽆形资产摊销⾥结转相同的⾦额作为该收⼊的成本。 回答⼈：chenyiwei 也可以这样处理。个人理解，供参考。","cat":"收入准则","kw":"控制权,摊销,关于开发⽀出的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY1257","q":"合同报表层⾯确认的处置⼦公司投资收益，在利润总额到所得税费⽤计算表中披露在那项","a":"在合并报表层⾯的利润总额到所得税费⽤调节表中，如涉及因处置⼦公司损益导致的差异，可列⼊“⾮应税收⼊的影响”或者“不可抵扣的成本、费⽤和损失的影响”中。 另外需要注意：如果报告期内做出了处置⼦公司的决策，但在报告期内未完成处置，则对于该⼦公司累积的留存收益和其他综合收益，是需要在合并报表层⾯确认递延所得税负债的（报告期末仍保留该项递延所得税负债余额）。此时因确认该项递延所得税负债⽽在合并报表层⾯对应确认的所得税费⽤（递延所得税费⽤），在该调节表中可增设“其他”项披露。 提问⼈：爬爬呀 时间：2025-04-08 10:43:40 请教陈版主，“如果报告期内做出了处置⼦公司的决策，但在报告期内未完成处置，则对于该⼦公司累积的留存收益和其他综合收益，是需要在合并报表层⾯确认递延所得税负债的（报告期末仍保留该项递延所得税负债余额）。”，针对这部分确认递延所得税负债的考虑是什么？ 回答⼈：chenyiwei 原先如果通过⼦公司分红⽅式转回该部分暂时性差异，是⽆需确认递延所得税的，但如果通过股权处置⽅式收回，则由于股权处置时这部分留存收益需计⼊⺟公司的应纳税所得额，所以就会形成未来的纳税义务。个人理解，供参考。","cat":"收入准则","kw":"合并,所得税,递延,合同报表层⾯确认的处置⼦公司投资收益,在利润总额到所得税费⽤计算表中披露在那项","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY1360","q":"企业并购，购买⽅本身是亏损企业，增值部分是否仍需确认递延所得税","a":"在购买⽅合并报表层⾯，被购买⽅资产的评估增值（即账⾯价值⼤于计税基础导致的应纳税暂时性差异）仍需确认递延所得税负债，对应调整商誉，与购买⽅⾃身的亏损⽆关。因为购买⽅和被购买⽅各为独⽴的纳税主体，被购买⽅的盈利不能⽤于弥补购买⽅的亏损。 上述合并报表层⾯的递延所得税负债应依据被购买⽅的适⽤税率计算确定。个人理解，供参考。","cat":"企业合并","kw":"商誉,合并,所得税,递延,企业并购,购买⽅本身是亏损企业,增值部分是否仍需确认递延所得税","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY1009","q":"同⼀控制下企业合并在合并⽇之前分红","a":"请核对：C公司向B公司的分红，不可能早于B取得C公司股权？2022年4⽉30⽇，是否C向A分红？ 如果是，则在B的合并报表中，合并⽇前C向原股东A的分红仍作为⼀项“对股东的分配”列报，冲减合并报表层⾯的未分配利润（归母权益）。不应将被合并⽅合并⽇前分配给原股东的分红作为少数股东权益处理。个人理解，供参考。","cat":"企业合并","kw":"合并,少数股东,同⼀控制下企业合并在合并⽇之前分红","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY1901","q":"权益法核算的投资收益计算问题","a":"基本赞同主帖中的理解。 当被投资企业⾃身有⼦公司，需编制合并报表时，权益法核算的⼝径应当是被投资企业合并报表中的归⺟净资产和归⺟净利润。如果该被投资企业发⾏其他权益⼯具的，则归属于其他权益⼯具持有者的权益和损益还应从中进⼀步扣除，仅以归属于被投资企业普通股股东的净资产、净利润为依据计算。个人理解，供参考。","cat":"企业合并","kw":"合并,权益法,权益法核算的投资收益计算问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0075","q":"关于医药⾏业市场推⼴费的会计处理","a":"⾸先要明确经销商的地位是主要责任⼈还是代理⼈。如果是代理⼈的，则应按终端销售实现情况计提，确认为销售费⽤。 如果经销商是主要责任⼈的，则除了计提时点以外，还需要解决的问题是将计提⾦额确认为销售费⽤还是冲减收 ⼊。相关的会计处理依据是：（1）新收⼊准则第⼗九条关于“应付客户对价”的规定；（2）《监管规则适⽤指引 ——会计类第2号》之“2-3 应付客户对价的判断”；（3）《上海证券交易所会计监管动态2023年合辑》之“问题 17【市场推⼴服务费的会计处理】：经销商提供市场推⼴服务，相关费⽤应冲减营业收⼊还是计⼊销售费 ⽤？”等。 在这种情况下（经销商是主要责任⼈），基于经销商最终总要将购⼊的产品销售出去，故基于配⽐考虑，建议的处理原则：（1）应付客户对价属于应确认为销售费⽤的，则根据接受经销商提供营销服务的进度确认，与收⼊之间 不考虑配⽐；（2）应付客户对价属于应冲减收⼊的，则考虑与收⼊的配⽐原则，在收⼊确认时同步冲减收⼊，作 为对收⼊的调减处理。可根据以往历史经验合理估计经销商的退货等最终不能实现对外销售的⽐例，依据【对经销商确认的销售收⼊（1-预计退货率）返利⽐率】预计该部分⾦额。个人理解，供参考。","cat":"收入准则","kw":"关于医药⾏业市场推⼴费的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0078","q":"请教如何确认模具收⼊？","a":"⾸先明确讨论前提：（1）参照《监管规则适⽤指引——会计类第2号》之“2-1 识别履约义务时商品或服务是否具有 ⾼度关联性的判断”，认定模具设计制造与后续产品制造之间不存在⾼度关联性，故将这两者分解为两项履约义务；（2）由于模具制造为外包，故对于前⼀履约义务的收⼊确认采⽤净额法。 在上述前提下：个人理解，供参考。","cat":"收入准则","kw":"履约义务,请教如何确认模具收⼊","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0082","q":"评估基准⽇⾄购买⽇期间发⽣的交易","a":"⾸先明确讨论前提：“2021年7⽉6⽇A公司将在6⽉份⽣产的产成品销售给甲公司”与甲公司取得A公司控制权的交易 ⽆关，且该交易本⾝是公允的、具有合理商业理由。 在此前提下，虽然该交易是逆流交易，甲公司购买的存货2021年末还有60%未对外销售，但该销售交易发⽣于购买 ⽇前，此时A公司并不是甲公司合并集团的组成部分，因此⽆需进⾏抵销处理。 但如果在购买⽇前，A公司是甲公司的联营企业，在逆流交易发⽣时按⽐例抵销了未实现损益的，则在购买⽇后， 该笔按⽐例抵销的分录仍需在合并报表层⾯延续（甲公司个别报表层⾯因已转为成本法，故⽆需延续该笔抵销分录），并随着甲公司将原逆流交易标的存货逐步消耗或对外销售⽽实现。个人理解，供参考。","cat":"收入准则","kw":"控制权,合并,成本法,评估基准⽇⾄购买⽇期间发⽣的交易","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0083","q":"关于实际折现率的选择问题？","a":"理论上应根据合同中的还款计划表，采⽤XIRR()函数测算实际利率，以该实际利率进⾏折现。由于存在提前收回本⾦、发⽣各类税费等情况，因此实际利率⾼于合同约定的利率是正常情况。个人理解，供参考。","cat":"收入准则","kw":"关于实际折现率的选择问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0084","q":"关于续租确认使⽤权资产","a":"取决于你的续租合同是签订在第⼀笔租赁的租赁期结束⽇之前还是之后。如果是之后签订，则与第⼀项租赁⽆关； 如果是之前签订，则应在签订⽇作为对原租赁的变更处理。个人理解，供参考。","cat":"收入准则","kw":"租赁,关于续租确认使⽤权资产","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0085","q":"集团合并报表的处理","a":"如果母公司在其个别报表中作为主要责任⼈按总额法核算，则该项内部交易的抵销不应影响母公司对外交易确认的收⼊。此时的抵销应达到的要求是：将合并报表层⾯的营业成本调整为按照母⼦公司各⾃的实际成本⾦额计量，抵销内部⽑利，同时对于计⼊营业成本/合同履约成本的⼜径与母公司层⾯的收⼊确认政策⼀致，即根据母公司总体 采⽤时段法/时点法⽽作相应调整；如采⽤时段法的，则还需根据母公司的履约进度确定⽅法进⾏相应调整。 具体抵销时，⾸先将母⼦公司两者的计算⼜径调整⼀致，消除时间性差异（例如均调整为时段法，以母公司按时段法确认的成本模拟⼦公司的收⼊，同时将⼦公司的⽣产成本按该履约进度模拟结转营业成本），然后再抵销母公司的成本和⼦公司的收⼊。个人理解，供参考。","cat":"收入准则","kw":"合并,请教陈版,集团合并报表的处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0088","q":"如何理解审阅准则中期财务信息审阅业务","a":"原有的2101号审阅准则是将审阅视作⼀项独⽴业务，因此CPA需执⾏从了解客户开始的全套程序。⽽中期财务报表审阅（初次接受委托时的审阅除外）是对原有客户业务的续约，可以利⽤以前执⾏年度审计中对被审计单位业务、财务的了解，只需关注前次年度审计后是否有重⼤变化即可。 由于⽬前A股对于中期审阅并⽆法定要求，因此对于中期报表审阅⽬前暂时不需要制定单独的准则，⽬前中国审计准则体系下将其附属于2101号审阅准则，作为应⽤指南的附录收录，既保持了准则趋同，又⽐较符合现时国内的执业需求，是⼀种⽐较合理的处理。个人理解，供参考。","cat":"收入准则","kw":"如何理解审阅准则中期财务信息审阅业务","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0093","q":"！","a":"这种整体外包，虽然名义上A公司是主要责任⼈，但按照常理，A公司在选择分包供应商时，应会对对⽅的声誉、 专业胜任能⼒、财务实⼒等因素进⾏过考察，以确保分包商具备承担相应责任的能⼒。因此，当分包商出现履约瑕疵时，本企业是可以有把握将责任转嫁给该分包商的。在此情况下，整体分包并不表明本企业可以控制相关的商品或服务，故应采⽤净额法确认收⼊和成本。个人理解，供参考。","cat":"收入准则","kw":"求助陈版","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0095","q":"合同资产","a":"“客户通过……评级”要满⾜哪些条件？其中哪些条件与本企业向客户提供的商品或服务相关？ 通过评级的可能性⼤⼩如何？是否基本确定会通过？还是说存在不确定性？个人理解，供参考。","cat":"收入准则","kw":"请教陈版主,合同资产","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0098","q":"陈版主看过来","a":"⼄公司在单体和合并报表层⾯的处理原则不变，即在个别报表层⾯确认衍⽣⾦融负债，⽽合并报表层⾯需同时确认少数股东权益和回购⾃⾝权益⼯具的完整合同义务（本⾦+累计利息）。可参见《监管规则适⽤指引——会计类第 3号》之“3-5 对少数股权远期收购义务的会计处理”。 对甲公司IPO成功可能性的估计发⽣变化，在⼄公司个别报表层⾯将导致相关衍⽣⾦融负债的公允价值增加，对应需确认公允价值变动损失；⽽在⼄公司的合并报表中，在回购义务被实际触发之前，只需对回购义务负债按约定的利率计提利息⽀出并增加回购业务相关负债的账⾯价值即可。 提问⼈：爬爬呀 时间：2024-10-08 15:35:30 继续追问⼀下，由于对甲公司IPO成功可能性的估计发⽣变化，⼄公司个别报告以及合并报表处理思路如下：个别报表层⾯确认的公允价值变动损失，应当考虑递延所得税负债的影响。同时合并报告应个别报告层⾯确认的公允价值变动损失，以及递延所得税负债应当全部冲回。 已经回购时：⼄公司个别报表层⾯按付出对价的公允计⼊长期股权投资，同时将原确认的衍⽣⾦融负债需要全部转销，计⼊投资收益；合并报表层⾯视为购买少数股权，原先所确认的负债⾦额与⾏权时实付⾦额如存在差异的，该差异应进⼀步作为对权益项⽬的调整，即调整资本公积-资本溢价。 不知我的思路是否正确，⿇烦陈版主再指导⼀下，⾟苦了回答⼈：chenyiwei 基本可以这样理解。个人理解，供参考。","cat":"收入准则","kw":"公允价值,合并,少数股东,所得税,递延,急急急,陈版主看过来","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0103","q":"待执⾏亏损合同执⾏中预计负债的结转问题","a":"是。如果⼀个亏损合同，计提时⽆标的资产，计提了预计负债，后项⽬开始⽣产，产⽣了在产品，那么需要将预计负债转为存货跌价准备。 严格来说，是在每年末根据与该合同相关的存货情况以及合同收⼊、成本的确认情况，重新计量与该合同相关的亏损合同预计负债和存货跌价准备。这两者之和，随着合同收⼊的逐步确认，相应成本逐步结转，应当会逐渐减少。个人理解，供参考。","cat":"收入准则","kw":"预计负债,存货跌价,请教陈版主,待执⾏亏损合同执⾏中预计负债的结转问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0104","q":"净额法确认收⼊涉及相关科⽬列报问题","a":"在净额法下，因为本企业不控制提供给最终客户的商品或服务，所以不应将其确认为存货，⽽应通过往来科⽬（如其他应收款、其他应付款、其他流动资产、其他流动负债等）反映。 按照⼀般的账务处理流程，预付账款应转⼊存货，最后转⼊营业成本，⽽净额法下显然不是这样，所以预付给上游的款项应理解为为下游垫资，故确认为其他应收款或其他流动资产更恰当。 提问⼈：沉默羔⽺ 时间：2024-03-07 18:18:17 请教陈⽼师，⼤华原来的这种观点应该怎么理解？ “4. 业务实质与部分会计处理的“错位”是合理的 对于合同形式和业务实质相⼀致的委托加⼯业务，受托⽅并不需要将受托原材料进⾏报表列报，也不存在加⼯费之外的款项往来。上述案例中，尽管将购销交易的业务实质认定为委托加⼯，但会计处理上并没有改变购销合同下所形成的存货、债权和债务关系的列报。这种 “错位”是合理的，因为法定的债权和债务关系是真实存在的，债务关 系对应的存货资产也应该是存在的。” 回答⼈：chenyiwei 这种做法存在内在的逻辑⽭盾，个⼈对此不赞同。个人理解，供参考。","cat":"收入准则","kw":"请教陈版,净额法确认收⼊涉及相关科⽬列报问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0111","q":"和各位⼤佬","a":"⼀般采⽤观点2。具体可参阅《监管规则适⽤指引——会计类第2号》之“2-3 应付客户对价的判断”。 另外，像主帖这种情况，很可能此处所指的“客户”是经销商，此时应关注该等“客户”的地位是否为代理⼈，这个问题会直接影响到谁是本企业真正“客户”的判断，以及何时确认商品销售收⼊。个人理解，供参考。","cat":"收入准则","kw":"求助陈版主和各位⼤佬","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0113","q":"新⾦融准则下，购⼊不良资产包的会计处理","a":"虽然实务中有些基础资产的合同条款是满⾜“本⾦+利息”的基本借贷安排的，但由于债务⼈的信⽤存在问题，可能 ⽆法合理估计其实际可还款⾦额和时间，原合同条款对于估计未来现⾦流量的发⽣⾦额和时间已经没有多少意义。因此，⼀般分类为以公允价值计量且其变动计⼊损益的⾦融资产，列报为交易性⾦融资产或者其他⾮流动⾦融资 产。从中实际收到款项时，冲抵该⾦融资产的账⾯价值；期末对剩余款项的可收回⾦额进⾏谨慎的评估，据此确认 ⾦融资产的公允价值变动损益。个人理解，供参考。","cat":"收入准则","kw":"公允价值,请教陈版主,新⾦融准则下,购⼊不良资产包的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0118","q":"【求助陈版主】使⽤权资产内部租赁后的抵消问题","a":"理论上确实是“抵消B公司单体报表根据使⽤权资产折旧产⽣的营业成本、收⼊、合同资产，然后根据A集团计提折旧的⾦额200万元，当做施⼯成本投⼊，重新算B的履约进度，确认新的收⼊、成本、合同资产”。 如果做的⽐较精细，则应根据内部交易损益的抵销情况，重新测算B对外的合同预计总成本和履约进度，据此调整按履约进度确认的对外收⼊和成本。但这样操作⽐较复杂，实务中可能不⼀定会做到如此精细，可以考虑按重要性原则考虑能否接受相对简化的处理。个人理解，供参考。","cat":"收入准则","kw":"租赁,折旧,【求助陈版主】使⽤权资产内部租赁后的抵消问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0124","q":"关于境外母公司向其境内客户发保内维修配件的账务处理","a":"该项账务处理不合理。该安排的实质是境外母公司为本企业承担了保修服务中的配件成本。 如果能够确定收到的配件不会再退回，⽇后母公司也不会向本企业收款的，则本企业在收到此类维修备件时，应按其公允价值，借记“存货——维修备件”，贷记资本公积。 后续领⽤备件⽤于维修服务时：个人理解，供参考。","cat":"收入准则","kw":"公允价值,关于境外母公司向其境内客户发保内维修配件的账务处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0125","q":"[求助陈版]产品收⼊确认时点问题","a":"这种情况下，在客户签收产品时，可以认为控制权已转移（客户后续如何使⽤该产品，完全由客户⾃⾏确定，本公司不⼲预）。但有可能提出退换要求。此时应作为“附有销售退回条款的销售”，按新收⼊准则第三⼗⼆条规定处 理，即仅可确认预计不会退回部分的收⼊和成本。对于预计要退回的部分，应确认预计负债和应收退货成本。 如果因该产品成熟度不⾼，退货可能性⽆法合理估计，则客户签收时作为发出商品处理，收到客户款项计⼊合同负债。同时，企业应合理确定⼀项标志，确保在该标志时点上再发⽣退换货的可能性极低，则可以在该时点上确认收 ⼊和成本。个人理解，供参考。","cat":"收入准则","kw":"控制权,预计负债,[求助陈版]产品收⼊确认时点问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0126","q":"ppp项⽬下该笔业务是否为政府补助","a":"PPP项⽬是政府与企业作为平等的商事合同主体，企业向政府（及其所代表的当地公众）提供基础设施的建设、运维服务并获取合理报酬。⽽政府补助是政府基于“社会公共事务管理者”的⾝份⽆偿地将经济资源授予企业。因此， 这两者在同⼀交易或事项中是不应同时发⽣的（收到并⾮合同⼀⽅的上级政府拨付的款项除外）。 从此处主帖信息看，该款项可能是政府以代付⼯程款的形式结算本企业（社会资本⽅）对其形成的应收款或者⽆形资产，最终减少了PPP项⽬完⼯时社会资本⽅就该项⽬确认的⾦融资产或者⽆形资产。如果原PPP合同未对此作出 约定的，则应考虑签订补充协议对此予以明确。个人理解，供参考。","cat":"收入准则","kw":"请教陈版主ppp项⽬下该笔业务是否为政府补助","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0130","q":"关于当期处置⼦公司顺流交易抵消问题","a":"如果该笔顺流交易与后续处置⼦公司股权的交易不构成⼀揽⼦交易，则鉴于该项顺流交易系发⽣于母公司丧失对⼦公司控制权之前，故仍需进⾏合并抵销处理。你的理解基本合理。 参考：《监管规则适⽤指引——会计类第3号》之“4-5 权益法下顺流交易产⽣的未实现内部交易损益以处置或视同处置股权⽅式实现时的会计处理”。 提问⼈：蜀⼭penguin 时间：2024-04-12 16:29:14 请教陈版，同⼀集团下⼦公司A 卖了⼀批设备给⼦公司B（设备增值1000万），⼦公司A 有个固定资产处置收益 1000万，在合并层跟B 账上的固定资产做了抵消。 翻过第⼆年，⼦公司B 变成了合营企业（50%）。 请问合并层的抵消分录要怎么处理呢？ 原来合并层挂着， 借:期初未分配利润 1000万 贷：固定资产 1000万 是不是将未实现损益确认50%，剩余的按照B 摊销的进度调整分占损益。个人理解，供参考。","cat":"收入准则","kw":"控制权,合并,权益法,固定资产,摊销,关于当期处置⼦公司顺流交易抵消问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0138","q":"销售公司总额法净额法确认收⼊","a":"站在销售公司⽴场，主要考虑的问题是：其是否“以销定采”，即根据下游客户的订单向上游⽣产企业订货，从⽽确保其持有的存货数量⼩于或等于同⼀时点持有的下游客户待履⾏订单的数量，即所有存货均有对应的销售合同。如果是，则该销售公司应采⽤净额法核算；反之，如果该销售公司系根据⾃⾝对市场的研判向⽣产企业订货，从⽽在持有存货期间承担了滞销积压、商品公允价值变动等风险的（换⾔之，该销售公司有权⾃⾏决定在何时、以什么价格卖给谁），则应采⽤总额法核算。个人理解，供参考。","cat":"收入准则","kw":"公允价值,销售公司总额法净额法确认收⼊","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0143","q":"应收账款按照项⽬核算的应收款和预收款的列报","a":"赞同主帖中的处理意见。不同项⽬的应收账款和合同负债不应抵销列报。相应地，在对应收账款计提坏账准备时， 通常不应考虑对同⼀客户或者其关联⽅在不同项⽬下的合同负债的抵销影响，除⾮合同中对客户违约情况下的救济措施有特别约定，即在客户违约等特定场合下允许被审计单位⾃⾏将两者相抵。个人理解，供参考。","cat":"收入准则","kw":"应收账款按照项⽬核算的应收款和预收款的列报","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0144","q":"母公司为⼦公司办理应收账款保理业务如何处理？","a":"此问题与《企业会计准则解释第17号》第⼆条供应商融资安排的披露问题相关。 如果抛开母⼦公司关系，就视同普通的⾮关联⽅债权债务的保理，则相关帐务处理（特别是在债权⼈终⽌确认的情况下，债务⼈的负债项⽬是否需调整到短期借款），当涉及供应商融资安排的时候，企业应付供应商款项的性质有可能发⽣了变化。企业需结合融资安排相关条款，分析其商业实质，根据CAS 22关于⾦融负债终⽌确认等相关规定，确定原应付账款是否应终⽌确认并重新确认⼀项对融资提供⽅的“借款”。对于其商业实质的判断，除了影响资产负债表列报项⽬以外，也会影响现⾦流量表的列报项⽬，如企业根据约定的条款认定属于买⽅融资，判断应付供应商款项应终⽌确认并转列报于短期借款，则企业还款时的现⾦流将不再属于经营活动现⾦流，⽽是筹资活动现⾦流。 关于融资提供⽅⽀付供应商款项后企业原应付供应商款项的具体列报项⽬，我们的倾向性观点为（假设期限均为⼀年以内）： 商业实质判断 融资提供⽅ 资产负债表列报 还款现⾦流量列报 属于企业⾃⾝的融资⾏为 银⾏或其他⾦融机构 短期借款 筹资活动现⾦流 ⾮⾦融机构 其他流动负债 不属于企业⾃⾝的融资⾏为 ⽆需区分 应付账款 经营活动现⾦流 注1：融资提供⽅向供应商⽀付款项的时候通常不会通过企业，当该⽀付现⾦流没有通过企业流转的时候，企业不应将其反映在现⾦流量表中。 注2：《附录—会计科⽬和主要账务处理》中关于短期借款的规定：“本科⽬核算企业向银⾏或其他⾦融机构等借⼊的期限在1年以下（含1年）的各种借款。” 关于⾦融负债的终⽌确认，CAS 22规定： 第⼗⼆条 ⾦融负债（或其⼀部分）的现时义务已经解除的，企业应当终⽌确认该⾦融负债（或该部分⾦融负债）。 第⼗三条 企业（借⼊⽅）与借出⽅之间签订协议，以承担新⾦融负债⽅式替换原⾦融负债，且新⾦融负债与原⾦融负债的合同条款实质上不同的，企业应当终⽌确认原⾦融负债，同时确认⼀项新⾦融负债。 企业对原⾦融负债（或其⼀部分）的合同条款做出实质性修改的，应当终⽌确认原⾦融负债，同时按照修改后的条款确认⼀项新⾦融负债。 第⼗四条 ⾦融负债（或其⼀部分）终⽌确认的，企业应当将其账⾯价值与⽀付的对价（包括转出的⾮现⾦资产或承担的负债）之间的差额，计⼊当期损益。 CAS 22应⽤指南中关于“实质上不同”的规定：其中，“实质上不同”是指按照新的合同条款，⾦融负债未来现⾦流量 （包括⽀付和收取的任何费⽤）现值与原⾦融负债的剩余期间现⾦流量现值之间的差异⾄少相差10%。有关现值的计算均采⽤原⾦融负债的实际利率。我们理解该规定主要是针对同⼀债务⼈负债前后数量上的变化。供应商融资安排由于融资提供⽅的存在，债务的性质很可能也发⽣了变化。 当企业根据供应商融资安排的条款判断融资提供⽅为企业⽀付的供应商款项属于其⾃⾝的融资⾏为时，我们理解该负债的条款在性质上与原应付供应商款项具有实质上的不同，应终⽌确认原应付账款，确认⼀项新的⾦融负债（如短期借款或其他流动负债）。 企业在判断供应商融资安排是否属于其⾃⾝融资⾏为时，通常主要从以下⼏个⽅⾯综合予以考虑： 实施供应商融资安排的⽬的是什么？ 供应商融资安排与商品或服务的采购是否为⼀揽⼦交易，即供应商是否在实施该融资安排的前提下才同意商务合同中约定的结算和价格条款？ 供应商融资安排是否修改了原与供应商的付款约定，如变更了企业的付款⽇期？ 与融资提供⽅的条款商议（如利率或折现率）由谁主导谈判？ 融资安排相关费⽤或利息由谁承担？ 企业是否向融资提供⽅提供了增信、交叉违约、由第三⽅承担连带责任，或提供其他形式的担保？ 企业是否获得了提前付款的现⾦折扣或商业折扣等优惠？ 款项到期时是否为融资提供⽅提供了直接从企业现有银⾏账户直接划款的权利？ 供应商融资安排是否占⽤企业在融资提供⽅的授信额度？个人理解，供参考。","cat":"收入准则","kw":"母公司为⼦公司办理应收账款保理业务如何处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0146","q":"租赁收⼊跨期问题","a":"这种情况，要站在2022年12⽉31⽇（上年年末）的⽴场，考虑基于当时已存在的情况和可合理获取的信息，是否可以认为事实上已存在租赁合同，以及能否对租⾦作出合理估计。如果是，则该公司应在2022年末，参照新收⼊准则下关于可变对价的原则合理、谨慎地估计2022年度内可确认的租⾦收⼊。 如果确实符合上述条件，但2022年末未确认租⾦收⼊的，则属于前期差错，应予以更正。 按照常理分析，如果该部分仓库确实已在2022年初移交给B公司使⽤，则⼤概率双⽅是已对租赁问题做出了安排 的，因此完全不存在任何租约的可能性很⼩。建议对整个安排的全过程和其中的重要节点进⾏谨慎梳理，并向双⽅了解为何在租赁期结束后才补签合同。个人理解，供参考。","cat":"收入准则","kw":"租赁,请教陈版租赁收⼊跨期问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0148","q":"⽆形资产投资取得公司控制权","a":"在合并报表层⾯，该项⽆形资产⼀直在甲公司的控制范围以内，故合并报表层⾯其账⾯价值应保持不变，母公司个别报表中的资产处置损益和⼦公司报表中对应的⽆形资产增值部分应作抵销处理。这也是⼀种特殊形式的顺流交易 （母公司出售资产给⼦公司，⼦公司以⾃⾝权益⼯具作为⽀付对价），所以上述顺流交易抵销的影响应全部归属于母公司股东，不分摊给少数股东。个人理解，供参考。","cat":"收入准则","kw":"控制权,合并,少数股东,⽆形资产投资取得公司控制权","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0156","q":"如何确认递延所得税资产","a":"⾸先要考虑：此前全额转⼊营业外⽀出，后续签订拆除协议实际上可收回3750万元，这是否属于⼀项前期差错？ 如果属于前期差错的，则⾸先进⾏更正处理，再以更正后的数据为基础考虑下⼀步处理。 如果不属于前期差错的，则该项资产的账⾯价值为零（以前年度已全额计提准备，且该准备不得转回），计税基础为计提减值准备前的账⾯价值（4800万元），故可抵扣暂时性差异为4800万元。在该拆除变卖已有明确时间表，且预计可预见的未来可获得⾜够多的应纳税所得额的前提下，可针对该项可抵扣暂时性差异4800万元确认递延所得税资产1200万元。已收到的750万元的账⾯价值和计税基础相同，不涉及递延所得税确认问题。 提问⼈：XK2410 时间：2024-07-04 16:34:01 谢谢陈版！但是收到的750万预收款项（包括未收到的合同价款3000万），在未来期间固资拆除时，实际上税务能 可扣除损失是（4800－3750＝1050万元）；这才是未来期间能减少的应纳税所得额1050万，⽽不是未来可减少4800 万应纳税所得额，所以现在按4800万确认递延所得税资产是⾼估资产虚增利润，也不符合公司未来的实际。因⽽应统筹考虑按1050万元确认递延所得税资产。@chenyiwei 这样理解有问题吗？ 回答⼈：chenyiwei 我上⾯的表述应⽆问题，因为处置收益在会计和税法上都没有确认，暂时性差异仅针对此前会计上计提的减值准备。后续实际完成清理时，会计和税务上同时将处置价款计⼊损益，相应抵减处置损失。个人理解，供参考。","cat":"收入准则","kw":"减值,所得税,递延,如何确认递延所得税资产","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0748","q":"对公司及其⾮控股股东同时投资","a":"应将C公司对合伙企业的投资和对B公司的投资作为两项资产核算。但因为合伙企业持有B公司股权，因此这两者的公允价值是有相关性的。如果两者估值差异很⼤，应关注其合理性，必要时作为⼀揽⼦交易进⾏合理的调整。 （将交易总额在对合伙企业投资和对B公司投资这两项资产之间合理分配）个人理解，供参考。","cat":"实务综合","kw":"公允价值,对公司及其⾮控股股东同时投资","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0761","q":"餐饮公司给⾃⼰员⼯充值饭卡⽤于内部⾷堂消费的问题。","a":"要考虑：员⼯就是在外⾯的顾客就餐区和顾客⼀样消费，还是单独设置⼀个仅对员⼯开放的内部⾷堂？ 前者需视同销售处理，后者不⽤。个人理解，供参考。","cat":"实务综合","kw":"请教陈版,餐饮公司给⾃⼰员⼯充值饭卡⽤于内部⾷堂消费的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0770","q":"停⼯成本如何结转","a":"⼀般还是建议转⼊营业成本，尤其是在此类情况经常发⽣的情况下。如果确定属于偶发性的（在可预见的未来不会重复发⽣）且影响重⼤的，则可能可以接受计⼊营业外⽀出的做法。个人理解，供参考。","cat":"实务综合","kw":"停⼯成本如何结转","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0775","q":"关于不可区分变更造价情况下确认收⼊问题","a":"这种情况下收⼊的调整为负数是可能的。即做与上述举例中相反的会计分录。个人理解，供参考。","cat":"实务综合","kw":"关于不可区分变更造价情况下确认收⼊问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0776","q":"资本公积转增资本相关问题","a":"这种划⼊属于资本性投⼊，相应的资本公积明细科⽬为资本溢价，因此是可以转增资本的。税费问题建议咨询税务专业⼈⼠意见。个人理解，供参考。","cat":"实务综合","kw":"资本公积转增资本相关问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0785","q":"关于募集资⾦向控股⼦公司提供借款问题","a":"这⽅⾯属于证券监管范畴，⽬前尚⽆明确规定。你的理解有⼀定合理性，但建议与交易所监管⼈员确认。个人理解，供参考。","cat":"实务综合","kw":"请教陈版,关于募集资⾦向控股⼦公司提供借款问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0788","q":"关于投资双⽅共同增资后，⼀⽅资⾦未到位的会计处理","a":"被投资企业对于尚未收到的出资额不能确认为权益增加。对于投资者出资只能以收付实现制（实际收到）为基础确认。个人理解，供参考。","cat":"实务综合","kw":"请教陈版主,关于投资双⽅共同增资后,⼀⽅资⾦未到位的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0795","q":"请教⼀个关于未实现税务收益的问题","a":"基于与IFRS持续趋同的考虑，并且考虑在国内会计实务中也有类似的交易，因此可以参照IFRIC 23的规定处理。个人理解，供参考。","cat":"实务综合","kw":"请教⼀个关于未实现税务收益的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0796","q":"股份⽀付确认资本溢价的问题","a":"在⼦公司层⾯就确认为资本溢价。实际上，在等待期结束时就应当将累积的“资本公积——其他资本公积”转⼊“资本公积——资本溢价或股本溢价”，⽽不应等到实际⾏权时，否则会遗漏可⾏权条件已满⾜但持有⼈放弃⾏权的权益⼯具对应的资本公积。这与谁负责结算⽆关。个人理解，供参考。","cat":"实务综合","kw":"股份⽀付确认资本溢价的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0807","q":"应收票据附有追索权贴现，现⾦流量如何指定","a":"有追索权的贴现⼤概率不满⾜终⽌确认条件。此时收到的贴现款应作为“取得借款收到的现⾦”或者“收到其他与筹资活动相关的现⾦”。 由于后续到期时不再虚拟两笔⾦额相同、⽅向相反的现⾦流量，故该做法会整体上拉低经营活动现⾦流量净额。个人理解，供参考。","cat":"实务综合","kw":"应收票据附有追索权贴现,现⾦流量如何指定","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0818","q":"预付外币购⼊设备，⼈民币原值如何确认？","a":"应采⽤第⼆种观点。 参考： http://kjs.mof.gov.cn/zt/kjzzss/ … 0210302_3664191.htm。个人理解，供参考。","cat":"实务综合","kw":"预付外币购⼊设备,⼈民币原值如何确认","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0835","q":"求助：⼦公司正在清算过程中，在清偿完各项债务后，提前分配给母公司的 资⾦如何进…","a":"建议⾸先冲减留存收益，如不够则再冲减资本公积。在最终完成注销之前，暂不冲减实收资本。个人理解，供参考。","cat":"实务综合","kw":"⼦公司正在清算过程中,在清偿完各项债务后,提前分配给母公司的,资⾦如何进…","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0846","q":"关于信⽤较⾼6+9票据的终⽌确认问题","a":"基本赞同你的理解。6+9银⾏承兑汇票的贴现即使是附有追索权的，也不影响其终⽌确认。个人理解，供参考。","cat":"实务综合","kw":"关于信⽤较⾼6+9票据的终⽌确认问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0875","q":"拟成⽴公司未果，投资款产⽣的利息计⼊什么科⽬？","a":"由于被投资企业并未最终成⽴，因此存出投资款在存出期间的利息仍应正常确认为“财务费⽤——利息收⼊”。确认为某项资产、负债都是不恰当的。本质上就是存出资⾦的利息。个人理解，供参考。","cat":"实务综合","kw":"拟成⽴公司未果,投资款产⽣的利息计⼊什么科⽬","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0876","q":"员⼯损失赔偿⼊账科⽬","a":"这部分是企业扣减员⼯薪酬作为补偿，故应冲减职⼯薪酬费⽤（如经营费⽤下的明细科⽬）处理。个人理解，供参考。","cat":"实务综合","kw":"员⼯损失赔偿⼊账科⽬","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0883","q":"制造业交付环节收⼊确认特殊情况","a":"实务中基本可以接受主帖中的处理⽅法。个人理解，供参考。","cat":"实务综合","kw":"求助陈版,制造业交付环节收⼊确认特殊情况","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0885","q":"账务差错更正问题请教","a":"“可以制定⼀个整改计划在未来⼏年进⾏调整”即在未来若⼲年内逐步消化该项差错的影响，该做法⽆准则层⾯依据。⼀般不建议如此操作。既然“不是上市公司不需要对外披露报表”，为何又对报表重⼤变化如此敏感？个人理解，供参考。","cat":"实务综合","kw":"账务差错更正问题请教","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0886","q":"（⾮经问题）达不到重⼤影响的股权投资的投资收益或公允价值变动属于⾮ 经常性损益吗","a":"达不到重⼤影响的股权投资应作为⾦融资产核算。如果作为交易性⾦融资产核算的，则其公允价值变动应计⼊损益。此类公允价值变动损益属于⾮经常性损益。 从此类投资获得的股利收益是否为⾮经常性损益，⽬前⽆定论。建议考虑其是否偶发、影响⾦额是否重⼤等因素来考虑。个人理解，供参考。","cat":"实务综合","kw":"公允价值,⾮经问题,达不到重⼤影响的股权投资的投资收益或公允价值变动属于⾮,经常性损益吗","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0910","q":"求教陈版和各位⽼师：房地产企业收到的政府返还城市配套建设费⽤怎么处 理","a":"由于提供配套费减免是最初即约定的合作条件之⼀，且甲地政府代表在该合资公司中占49%股权，因此对于合资公司⽽⾔，更倾向于作为股东资本性投⼊处理。个人理解，供参考。","cat":"实务综合","kw":"求教陈版和各位⽼师,房地产企业收到的政府返还城市配套建设费⽤怎么处","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0917","q":"关于权益类永续债分配问题","a":"关于未分配利润为负数时是否可分配永续债利息的问题，⽬前法律上并⽆明⽂规定。个⼈理解既然并未明⽂禁⽌， 那么应当是可以的。因为永续债在法律上仍属于债务。 鉴于此问题不明确，建议咨询相关财政部门，并获取律师的法律专业意见。个人理解，供参考。","cat":"实务综合","kw":"关于权益类永续债分配问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0946","q":"⼤于2次的利率跳升也不是不⾏，但导致封顶利率⾼于同类同期债务⼯具利率的可能性会⼤为增加。2、初始利率就基本等于发⾏企业通常的债务融资利率，后⾯再跳升，难度就更⼤。","a":"与基准利率之间的利差扩⼤只发⽣⼀次，⼀般理解是不会导致⾼于同类同期债务⼯具利率的。个人理解，供参考。","cat":"实务综合","kw":"⼤于2次的利率跳升也不是不⾏,但导致封顶利率⾼于同类同期债务⼯具利率的可能性会⼤为增加,初始利率就基本等于发⾏企业通常的债务融资利率,后⾯再跳升,难度就更⼤","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0950","q":"关于并购重组案例资料","a":"上交所和深交所近期都发布过⼀组并购重组指导案例，可在两个交易所各⾃⽹站上查阅。 每⼀个案的具体条款只能查阅各上市公司在交易筹划和实施过程中陆续发布的临时公告。市场上的上市公司信息产品可能可以提供汇总查询服务。个人理解，供参考。","cat":"实务综合","kw":"关于并购重组案例资料","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0260","q":"联营企业发⽣同⼀控制企业合并时投资收益处理","a":"如果联营企业发⽣同⼀控制下合并，但不涉及本企业在该联营企业中的股权⽐例被稀释（例如联营企业以现⾦对价 ⽅式收购股权实现同⼀控制下合并），则不涉及分段计算问题，但“投资⽅不应当调整财务报表的⽐较信息”这⼀原则在此时仍然是适⽤的，即：投资⽅需对被投资⽅的合并报表进⾏必要的模拟调整，剔除因联营企业同⼀控制下合并对合并⽇前报表进⾏模拟调整的影响，将被合并⽅⾃合并⽇起才纳⼊该联营企业的合并报表，以该模拟调整后的合并报表所显⽰的联营企业归母净资产、净利润为基础进⾏权益法核算。个人理解，供参考。","cat":"企业合并","kw":"合并,权益法,联营企业发⽣同⼀控制企业合并时投资收益处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0265","q":"区分核⼼商誉的会计处理","a":"此问题在实务中有争议，可能要重新考虑。但核⼼商誉和⾮核⼼商誉的区分是写进了IFRS 3的结论基础的，仍有⼀定参考意义。个人理解，供参考。","cat":"企业合并","kw":"商誉,区分核⼼商誉的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0281","q":"所有者权益变动表年初调整中的其他填什么？","a":"“其他”项是指除了会计政策变更、前期差错更正以外的其他原因对期初留存收益的调整，例如同⼀控制下的企业合并、长期股权投资成本法转权益法的差额等。 例如，在《企业会计准则应⽤指南汇编2024》的“长期股权投资”⼀章中（原书P82），已经明确： （成本法转为权益法时）上述转换时需要调整的留存收益在报表所有者权益变动表中列⽰年末余额”到“本年年初余额”之间的“其他”项⽬中，从⽽对本年年初的留存收益进⾏调整，⽆需追溯调整⽐较期间数据。个人理解，供参考。","cat":"企业合并","kw":"合并,权益法,成本法,所有者权益变动表年初调整中的其他填什么","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0285","q":"企业价值评估增值，合并报表如何处理。","a":"应以购买⽇为基准⽇，进⾏以“购买对价分摊”为⽬的的评估，据此确定各单项可辨认净资产的公允价值（包括根据 《企业会计准则解释第5号》第⼀条规定识别和计量符合“可辨认性标准”的⽆形资产），剩余部分作为商誉。个人理解，供参考。","cat":"企业合并","kw":"公允价值,商誉,合并,求助陈版,企业价值评估增值,合并报表如何处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0338","q":"关于弃置费⽤确认递延所得税资产的问题","a":"⾸先，弃置费⽤等项⽬确认递延所得税资产和负债的前提是“不是企业合并、交易发⽣时既不影响会计利润也不影 响应纳税所得额（或可抵扣亏损）、且初始确认的资产和负债导致产⽣等额应纳税暂时性差异和可抵扣暂时性差异的单项交易”，即在固定资产初始确认时就弃置费⽤确认预计负债并增加固定资产账⾯价值。⽽实务中煤矿的弃置 费⽤多数是随着开采⽽逐步计提的，直接计⼊营业成本，这种情况下虽然也要确认递延所得税资产，但不属于解释16号的规范范围。 其次，对于属于解释16号适⽤范围的情形，由于在固定资产和预计负债（弃置费⽤）初始确认时同步确认了等额的递延所得税资产和负债，⽽递延所得税负债转回时将导致增加应纳税所得额，因⽽即使该企业⾃⾝没有⾜够多的应纳税所得额，但由应纳税暂时性差异转回形成的应纳税所得额总可以获得利⽤，因此也符合递延所得税资产的确认条件。 参考：《监管规则适⽤指引——会计类第4号》之“4-8 关于租赁负债相关递延所得税资产的确认”： 公司在确认递延所得税资产时，应当考虑公司当前应纳税暂时性差异在未来期间转回时将产⽣的可⽤来抵扣可抵扣暂时性差异的所得税影响。对于租赁交易，即使预计未来期间公司根据相关税法规定确定的应纳税所得额整体为负数，公司应当考虑预计未来期间转回的使⽤权资产等所产⽣的应纳税暂时性差异，确认与租赁负债相关的可抵扣暂时性差异产⽣的递延所得税资产。个人理解，供参考。","cat":"企业合并","kw":"合并,租赁,所得税,递延,预计负债,固定资产,关于弃置费⽤确认递延所得税资产的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0352","q":"增资导致企业股权被动稀释仍按权益法核算","a":"参考《监管规则适⽤指引——会计类第1号》之“1-3 特殊事项下权益法的应⽤”： ⼆、因被动稀释导致持股⽐例下降时，“内含商誉”的结转 因其他投资⽅对被投资单位增资⽽导致投资⽅的持股⽐例被稀释，且稀释后投资⽅仍对被投资单位采⽤权益法核算的情况下，投资⽅在调整相关长期股权投资的账⾯价值时，⾯临是否应当按⽐例结转初始投资时形成的”内含商 誉”问题。其中，“内含商誉”是指长期股权投资的初始投资成本⼤于投资时享有的被投资单位可辨认净资产公允价 值份额的差额。投资⽅因股权⽐例被动稀释⽽”间接”处置长期股权投资的情况下，相关”内含商誉”的结转应当⽐照投资⽅直接处置长期股权投资处理，即应当按⽐例结转初始投资时形成的”内含商誉”，并将相关股权稀释影响计⼊资本公积（其他资本公积）。 据此，因被投资⽅接受其他股东增资，导致本企业所持股权被被动稀释，应转⼊“资本公积——其他资本公积”的⾦额=（被动稀释后被投资企业净资产稀释后本企业持股⽐例-被动稀释前被投资企业净资产稀释前本企业持股⽐ 例）-应结转的内含商誉⾦额。 其中：被动稀释后被投资企业净资产=被动稀释前被投资企业净资产+本次外部股东对被投资企业增资额。个人理解，供参考。","cat":"企业合并","kw":"商誉,权益法,请教陈版主增资导致企业股权被动稀释仍按权益法核算","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0361","q":"购买⼦公司少数股东股权","a":"参照《监管规则适⽤指引——会计类第1号》之“1-6 同⼀控制下企业合并的会计处理”：“在同⼀控制下企业合并同时购买少数股东权益的交易中，对于少数股东作出的业绩承诺，在合并⽇的合并财务报表中，应当以公允价值进⾏初始确认并将其作为少数股东权益购买对价的⼀部分；在后续资产负债表⽇的合并财务报表中，若该或有对价属于 ⼀项⾦融⼯具，则应根据⾦融⼯具准则的相关规定，将其公允价值的后续变动计⼊当期损益。”。 据此：个人理解，供参考。","cat":"企业合并","kw":"公允价值,合并,少数股东,购买⼦公司少数股东股权","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0373","q":"同⼀控制企业合并问题","a":"由于此处两项交易均发⽣在2023年内，对于A⽽⾔应作为两项同⼀控制下合并交易处理。A合并C原本就属于同⼀控制下合并，因此在A的2023年度合并报表中，应将C的全年数据完整纳⼊合并。“⽤于与A公司合并的B公司合并报表是否不需要包含1-6⽉C公司的损益数据”只是合并报表的编制技术⽅法问题，C不论是先与B合并，再作为B的 ⼀部分并⼊A，还是直接并⼊A，不应影响A的合并结果，即确保对各⼦公司“既不重复，也不遗漏”。此处两项交易整体上看就是A对B、C、D均构成同⼀控制下合并。个人理解，供参考。","cat":"企业合并","kw":"合并,请教陈版同⼀控制企业合并问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0408","q":"商誉如何处理？","a":"你的理解“A公司虽然拟注销，但A公司整体业务活动还是保留的，只不过活动从事的主体由A公司变更为母公司， 所以即使A公司注销了，在公司合并报表层⾯，当时收购A公司形成的商誉仍然存在，因为形成商誉时对应的业务活动和资产仍然存在”是合理的。 但是，当初购买⽇未识别和计量被收购⽅的可辨认⽆形资产（专利申请权），虽然当时能否成功申请专利具有不确定性，但根据《企业会计准则解释第5号》第⼀条规定，对于被收购⽅满⾜该条规定的可辨认性标准的⽆形资产， 只要公允价值能够可靠计量，就应当确认⽆形资产。由于你公司未单独确认⽆形资产，很可能少计后续的累计摊销额。对此应作为差错更正处理。个人理解，供参考。","cat":"企业合并","kw":"公允价值,商誉,合并,摊销,商誉如何处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0443","q":"请教陈⽼师关于外币报表折算的问题","a":"由于该境外经营⼦公司是通过⾮同⼀控制下合并被纳⼊本企业合并报表范围的，对其进⾏外币报表折算主要是为了编制合并报表的需要，故可以接受采⽤购买⽇汇率作为折算起点的做法，但该做法的前提是仅折算购买⽇后的报 表，对购买⽇之前的报表不再折算。 参阅：《中审众环研究2020》之“问题5-1-25（外币报表折算汇率问题）”。个人理解，供参考。","cat":"企业合并","kw":"合并,请教陈⽼师关于外币报表折算的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0485","q":"请教关于合并报表商誉的问题","a":"在⾮同⼀控制下合并中，当被收购⽅⾃⾝报表中也存在商誉时，购买⽅在计算购买⽇应确认的商誉时，应剔除被收购⽅⾃⾝报表中原有的商誉，完全重新计算。被收购⽅⾃⾝报表中原有的商誉与购买⽅合并报表中就本次收购所确认的商誉之间没有经济上的联系。 因此，A合并报表中的商誉只包含本次A并B时在购买⽇重新计算的商誉。B⾃⾝报表中原有的商誉在A的合并报表中不体现。 提问⼈：⼆回三 时间：2024-06-26 09:27:05 那在A合并报表中，B原本的商誉是冲减未分配利润还是资本公积呢回答⼈：chenyiwei 不论哪个都可以。因为B的购买⽇的权益是不会体现在A的合并报表中的。个人理解，供参考。","cat":"企业合并","kw":"商誉,合并,请教关于合并报表商誉的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0490","q":"商誉减值⽽母公司报表长期股权投资没减值","a":"这两种情况下的减值可能是有所不同的，因此这种结果也不能说完全不可能出现。但必须对该差异作出合理解释。可参考：《中审众环研究2020》之“问题1-3-22（关于并购重组中对赌期结束减值测试中减值额如何计算的问 题）”。 提问⼈：soibook 时间：2024-06-26 15:32:49 谢谢陈⽼师，长期股权投资与商誉减值测试，都使⽤收益法或市场法，可收回⾦额涉及的都基本上是⼦公司整体， 可能有个别调整，⽐如现⾦流预测，可能有营运资⾦、税前税后的差别，但可回收⾦额基本是⼀样的，差别⼤的是账⾯价值，⼀个是长期股权投资，⼀个是商誉+长期资产，后者是变动。这个公式是不是有很⼤的参考意义。长期股权投资可收回⾦额=商誉测试时的可收回⾦额*持股⽐例？ 回答⼈：chenyiwei 这两者所依据的未来盈利预测或者现⾦流量预测在很⼤程度上是相同的，但折现率、资产组范围等⽅⾯的差异会导致最终结果不同，不⼀定成⽴你说的公式。 提问⼈：soibook 时间：2024-06-28 15:24:11 谢谢陈⽼师，那实务中，企业可以在外部评估机构出具的商誉的减值报告基础上⾃⾏调整⼀下，作为长期股权投资减值的依据吗？或者说长期资产，如固定资产、长期股权投资、商誉的减值⼀定要外部的评估才算数？毕竟商誉出现⼤额减值，⽽母公司长期股权投资不减值有点不通顺，虽然投资者看的是合并报表。 回答⼈：chenyiwei ⼀般实务中多数要求进⾏评估。个人理解，供参考。","cat":"企业合并","kw":"商誉,减值,合并,固定资产,商誉减值⽽母公司报表长期股权投资没减值","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0491","q":"反向收购原上市公司合并报表","a":"在合并报表中，由于已经按照反向购买的原则编制，故⽆需确定法律上被购买⽅（会计上的购买⽅）的收购成本， 因为其各项资产、负债都是按原账⾯价值计量的。 在重组后上市公司的个别报表中，是按照各项被收购资产（法律上的被购买⽅）的作价⾦额（以基准⽇公允价值为基础确定）作为对其长期股权投资的⼊账价值，相应增加股本和资本公积。在会计处理⽅⾯也不会涉及复杂的投资成本分摊确定问题。个人理解，供参考。","cat":"企业合并","kw":"公允价值,合并,反向收购原上市公司合并报表","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0528","q":"该上市公司的财务报表数据是否存疑？","a":"这种情况最⼤的可能性是2019年度内发⽣同⼀控制下企业合并，相应在2019年年报中对合并报表的前期⽐较数据进 ⾏了重述。你可以看下附注中的“合并范围的变更”“在其他主体中的权益”等部分，其中应有相应披露内容。个人理解，供参考。","cat":"企业合并","kw":"合并,求助陈版主,该上市公司的财务报表数据是否存疑","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0530","q":"及各位⽼师，关于⾮同控合并前发⽣的交易及往来余额，是否需进⾏ 合并抵消","a":"由购买⽅与被购买⽅之间的交易形成的往来款项，在购买⽇之前也是⽆需抵销的，因为的购买⽇之前，被购买⽅尚未成为购买⽅合并集团的⼀部分。但在购买⽇当天，需视同与企业合并同时发⽣了⼀项对此前形成的往来款项的结算交易，消除了购买⽅账⾯上原先对被购买⽅的应收或应付款项。该项结算交易的发⽣额为双⽅之间的债权债务于购买⽇的公允价值，所以在购买⽅合并报表中有可能要确认该项债权债务的结算损益（等于该项债权债务于购买⽇的原账⾯价值与公允价值之间的差额）。 提问⼈：jwl0102 时间：2024-07-11 10:12:36 请问陈版，对于购买⽇之前已经计提的坏账准备，在购买⽇的合并报表如何处理？个人理解，供参考。","cat":"企业合并","kw":"公允价值,合并,请教陈版及各位⽼师,关于⾮同控合并前发⽣的交易及往来余额,是否需进⾏,合并抵消","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0952","q":"以⼦公司股权为对价收购孙公司，如何账务处理及合并？","a":"⾸先明确讨论前提：主帖中两次股权交易（20X0年和20X2年）不构成⼀揽⼦交易；但20X2年内的“A公司将所持B 公司70%股份作价7亿转让给甲公司，同时，以7亿的价格收购了B公司所持F、G公司的股权”的交易是⼀揽⼦交 易。 在此前提下：个人理解，供参考。","cat":"实务综合","kw":"合并,请教陈版,以⼦公司股权为对价收购孙公司,如何账务处理及合并","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0955","q":"客服费⽤处理","a":"是。保证性质保的相关⽀出（含⼈⼯成本）也应列⼊营业成本。个人理解，供参考。","cat":"实务综合","kw":"客服费⽤处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0963","q":"新⾦融⼯具准则下实际控制⼈⽀付业绩补偿会计处理","a":"由于收购少数股权的交易对⼿是控股股东，故该项业绩补偿建议按照权益性交易原则处理，在有权收取补偿款时确认其他应收款和资本公积。 母公司应及时⽀付该补偿款，以免形成关联⽅资⾦占⽤。个人理解，供参考。","cat":"实务综合","kw":"新⾦融⼯具准则下实际控制⼈⽀付业绩补偿会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0982","q":"关于股权处置的问题","a":"https://bbs.esnai.com/forum.php ? … 984 pid=9365795 提问⼈：Ada12345 时间：2024-11-25 18:10:42 陈版主，在集团合并层⾯A公司确认的投资收益和B公司调整的权益是否还需要抵消调整回答⼈：chenyiwei 需要。个人理解，供参考。","cat":"实务综合","kw":"合并,关于股权处置的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0987","q":"关于股份⽀付的修改","a":"此类根据公司的现⾦分红、资本公积转增、股票股利等相应调整⾏权价格，在后两种情况下等⽐例调整可⾏权数量的安排，不影响股份⽀付等待期内应确认的费⽤总额，不属于股份⽀付条款和条件的修改，不需要按照股份⽀付修改的相关规定处理。个人理解，供参考。","cat":"实务综合","kw":"关于股份⽀付的修改","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0994","q":"关于股东不按出资⽐例分红得处理","a":"⾸先要了解：“达到某个条件，其中某个股东会少分⼀部分”这个条件具体是指什么条件？为何要定出这个安排？ 其次，某个股东放弃的分红，是由其他股东享有，还是后续不能再⽤于对股东的分配，只能永远留存于该企业？个人理解，供参考。","cat":"实务综合","kw":"请教陈版主关于股东不按出资⽐例分红得处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1017","q":"关于循环交易的问题","a":"如果这些交易流程是作为⼀个整体筹划的⼀揽⼦交易，则该交易很可能实质上是⼀项融资交易，不能确认销售收⼊和成本，也不能重复确认采购。属于空转贸易，是监管机构防范的对象。 鉴于其合规性风险较⼤，不建议执⾏此类交易。个人理解，供参考。","cat":"实务综合","kw":"关于循环交易的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1018","q":"⾼可靠性供电费⽤会计核算科⽬问题","a":"建议计⼊制造费⽤，分摊计⼊产品成本较为合适。 另外，如果⽀付⼀次后可以多年受益 ，则应先计⼊长期待摊费⽤，分年摊⼊成本费⽤。个人理解，供参考。","cat":"实务综合","kw":"⾼可靠性供电费⽤会计核算科⽬问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1042","q":"⼟地使⽤税退回问题","a":"如果基于2024年末可获得的信息，认为很可能获得⾼新技术企业认定的续期，并据此获取⼟地使⽤税退回的，则可在2024年末将预计很可能退回的⼟地使⽤税确认为⼀项其他流动资产，对应减少“税⾦及附加”项⽬中的计提数。个人理解，供参考。","cat":"实务综合","kw":"求助陈版,⼟地使⽤税退回问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1048","q":"EPC项⽬建设加后期运维收⼊确认","a":"可以这样理解。最终的会计处理结果与PPP业务类似。个人理解，供参考。","cat":"实务综合","kw":"EPC项⽬建设加后期运维收⼊确认","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0089","q":"评估增值的摊销","a":"如果⼟地是作为⼀个整体评估的，办公⽤地和⽣产⽤地的单位⾯积账⾯价值、单位⾯积评估值都相同，则如你所 述“评估增值部分也按照账⾯摊销⼜径分别计⼊管理⽤和制造费⽤”，即评估增值部分也需要在剩余⼟地使⽤年限内摊销，摊销额按2：8的⽐例分别计⼊管理费⽤和制造费⽤（或营业成本）。个人理解，供参考。","cat":"无形资产","kw":"摊销,评估增值的摊销","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第6号——无形资产"},{"id":"CY0091","q":"企业官⽹是否能够作为⽆形资产？","a":"IFRS下有⼀个解释公告SIC-32《⽆形资产：⽹站成本》，其原理是对⾃建⽹站的成本按照⽆形资产准则中的研究开发模式进⾏会计处理。可对照该解释公告确定是否符合资本化条件、何时可以开始资本化、哪些⽀出可以资本化等问题。个人理解，供参考。","cat":"无形资产","kw":"资本化,【请教陈版】企业官⽹是否能够作为⽆形资产","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第6号——无形资产"},{"id":"CY0112","q":"关于季节性⾷品加⼯期间⼟地使⽤权摊销计⼊哪类费⽤科⽬的问题？","a":"参照四部委2022年年报⼯作通知（财会[2022]32号），对于⼚区内⼟地使⽤权和⼚房停⼯期间的折旧和摊销，应直接计⼊营业成本处理。个人理解，供参考。","cat":"无形资产","kw":"折旧,摊销,关于季节性⾷品加⼯期间⼟地使⽤权摊销计⼊哪类费⽤科⽬的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第6号——无形资产"},{"id":"CY0116","q":"关于合作研发经费的会计处理","a":"仅仅依据知识产权归属的约定，缺乏具体的背景信息和收益分享的具体安排，⽆法判断哪⼀⽅主导该合作研发项 ⽬，以及谁可以控制该研发成果，故⽆法确定应采⽤何种会计处理模式。 建议先对照《监管规则适⽤指引——会计类第2号》之“2-8 定制化产品相关研发⽀出的会计处理”考虑应采⽤会计处理模式，如仍不清晰的，可提供进⼀步背景信息来讨论。 需要重点考虑的因素：个人理解，供参考。","cat":"无形资产","kw":"关于合作研发经费的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第6号——无形资产"},{"id":"CY0142","q":"求教陈版，关于研发⽀出披露疑问","a":"我理解对外销售的样机等试制产品的成本也属于该部分规定的资本化开发⽀出范围，通过“本年减少——转⼊当期损益”⼀列转出。个人理解，供参考。","cat":"无形资产","kw":"资本化,求教陈版,关于研发⽀出披露疑问","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第6号——无形资产"},{"id":"CY0276","q":"关于股票期权股份⽀付本期⾏权⾦额应该如何披露","a":"个⼈理解，上市公司附注的“股份⽀付”部分中“各项权益⼯具情况”中的“本年⾏权”的⾦额应按当初授予⽇公允价值计算，即等待期内累计计⼊股份⽀付相关成本费⽤的⾦额。个人理解，供参考。","cat":"股份支付","kw":"公允价值,关于股票期权股份⽀付本期⾏权⾦额应该如何披露","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第11号——股份支付"},{"id":"CY0345","q":"取消股权激励的资本公积能否转⼊未分配利润","a":"不可以，由股权激励形成的资本公积属于资本性投⼊性质，会计上在等待期内暂时列⼊其他资本公积。没有等待期的，或者等待期已满的资本公积（其他资本公积）可以转⼊资本溢价，⽤于转增资本。但不能直接转回未分配利 润。个人理解，供参考。","cat":"股份支付","kw":"求助陈版主,取消股权激励的资本公积能否转⼊未分配利润","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第11号——股份支付"},{"id":"CY0374","q":"期权价格股份⽀付价格","a":"考虑此前的⾃测结果与后续评估结果差异较⼤的原因（例如当初⾃测使⽤的模型和参数是否明显不当），判断是否属于前期差错。 参考：《监管规则适⽤指引——会计类第1号》之“1-24 区分会计估计变更和差错更正”： 企业不应简单将会计估计与实际结果对⽐认定存在差错。如果企业前期作出会计估计时，未能合理使⽤报表编报时已经存在且能够取得的可靠信息，导致前期会计估计结果未恰当反映当时情况，则应属于前期差错，应当适⽤前期差错更正的会计处理⽅法；反之，如果企业前期的会计估计是以当时存在且预期能够取得的可靠信息为基础作出的，随后因资产和负债的当前状况及预期经济利益和义务发⽣了变化⽽变更会计估计的，则属于会计估计变更，应当适⽤会计估计变更的会计处理⽅法。个人理解，供参考。","cat":"股份支付","kw":"期权价格股份⽀付价格","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第11号——股份支付"},{"id":"CY0382","q":"限制性股票问题","a":"在现⾦分红可撤销的情况下，不论预计未来能否解锁，在计提分红款时，都需要借记“其他应付款——限制性股票回购义务”，也就是减少了⽇后回购时应⽀付的价款。如果后续未解锁，则按照减少后的“其他应付款——限制性股票回购义务”余额⽀付回购款，借记“其他应付款——限制性股票回购义务”，贷记银⾏存款；将回购后的股份注销 时，借记股本，贷记库存股，差额借记“资本公积——股本溢价”。个人理解，供参考。","cat":"股份支付","kw":"请教陈版主限制性股票问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第11号——股份支付"},{"id":"CY0461","q":"求教陈版，股权激励期间离职⼈员激励费⽤的分摊","a":"应采⽤主帖中的“观点三”，即视同⼀次授予、分期解锁的股份⽀付处理。个人理解，供参考。","cat":"股份支付","kw":"求教陈版,股权激励期间离职⼈员激励费⽤的分摊","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第11号——股份支付"},{"id":"CY0403","q":"孵化园免除孵化期间的场地使⽤费并获得优先跟投权的账务处理问题","a":"个⼈理解，⾸先要明确该交易的经济实质，是完全公允的商业交易，还是包含了政府补助（A公司背后的政府单 位）因素。包括：“A公司于被审计单位⼊孵当年通过股权转让⽅式⾃⽼股东处获取被审计单位1%的股权”这⼀价格是否公允，与免除的场地使⽤费是否相当？提供给A公司的优先跟投权的公允价值多⼤（个⼈理解，如果就按照最新⼀轮的估值跟投，则该优先权的公允价值不⼤）？ 另外，对场地使⽤费的免除，能否直接界定为权益性交易，也可能存在疑问。虽然A公司持有被审计单位的少量股份（包括⼊驻时取得的1%股权和后续通过跟投取得的股权），但A公司更多地是财务投资⼈，其提供场地使⽤费 减免更多地是基于其作为政府下属单位和孵化园运营单位的⾝份，因此对于减免的场地使⽤费等计⼊资本公积的依据可能不⾜。 实务中可基于重要性原则和成本效益原则确定能否接受简化处理。个人理解，供参考。","cat":"政府补助","kw":"公允价值,孵化园免除孵化期间的场地使⽤费并获得优先跟投权的账务处理问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第16号——政府补助"},{"id":"CY0416","q":"投资性房地产计量模式变更涉及到的递延收益摊销问题","a":"如果单纯考虑核算⽅式转换时的处理问题，则此时的递延收益应当是全部转⼊损益（需追溯调整前期）。这⾥参照了IAS 41对于“与以公允价值计量的⽣物资产相关的政府补助”的会计处理原则，即收到时直接计⼊损益。个人理解，供参考。","cat":"政府补助","kw":"公允价值,递延,摊销,投资性房地产计量模式变更涉及到的递延收益摊销问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第16号——政府补助"},{"id":"CY0456","q":"⼯会经费返还是政府补助吗，算⾮经吗？","a":"需⾸先确定返还的理由、资⾦来源（谁给予的、资⾦来源是什么），返还到企业账还是⼯会账、具体⽤途要求等。这些问题确定之后才能判断。个人理解，供参考。","cat":"政府补助","kw":"⼯会经费返还是政府补助吗,算⾮经吗","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第16号——政府补助"},{"id":"CY0486","q":"求教陈版，公司与医院合作成⽴科研创新中⼼的会计处理","a":"该科研创新中⼼的实质是什么？是否实质上是⼄⽅（公司）部分研发环节（如临床试验）的外包？或者作为推⼴⼄ ⽅产品的渠道？其研发课题的制定是否由⼄⽅根据其⽣产经营需要来主导，研发成果是否主要供⼄⽅使⽤？ 如果上述假设符合事实，则⼄⽅（公司）应将该科创中⼼视为其⼀个研发部门来进⾏相应的会计处理。⼄⽅拨付给该中⼼的经费应按⼀定的系统、合理的⽅法分配到该中⼼的各研发项⽬，列⼊研发⽀出；取得卫健委拨付（经医院转⼿）的补助，作为与研发项⽬相关的政府补助处理。个人理解，供参考。","cat":"政府补助","kw":"求教陈版,公司与医院合作成⽴科研创新中⼼的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第16号——政府补助"},{"id":"CY0186","q":"回购义务在什么时候调整","a":"可以这样理解：仍列报为库存股。虽然已经确定需要回购，但由于未经董事会审批及中登登记等程序，第⼀期的回购义务期末是否仍确认在其他应付款中。个人理解，供参考。","cat":"报表列报","kw":"回购义务在什么时候调整","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第30号——财务报表列报"},{"id":"CY0200","q":"应付票据转应付账款","a":"没有专门规定，实务中也很少见到此类业务。如果应付票据到期⽆⼒兑付，⼀般仍在应付票据中核算，但需在附注中披露逾期情况。个人理解，供参考。","cat":"报表列报","kw":"应付票据转应付账款","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第30号——财务报表列报"},{"id":"CY0211","q":"求助，第16号解释第⼀条，财务报表列报最早期间的期初是指哪⼀年？","a":"因为常规年报只列⽰上⼀年度和本年年初的⽐较数据，所以“企业会计准则解释第16号提到的财务报表列报最早期间的期初”是指2022年1⽉1⽇，即⽐较期间的期初。 如果是IPO三年⼀期申报报表等多期报表，则为最早列报期间的期初，例如以2021-2023三年数据申报IPO，则“企业会计准则解释第16号提到的财务报表列报最早期间的期初”是指2021年1⽉1⽇。个人理解，供参考。","cat":"报表列报","kw":"第16号解释第⼀条,财务报表列报最早期间的期初是指哪⼀年","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第30号——财务报表列报"},{"id":"CY0062","q":"","a":"如果在资产负债表⽇或之前，已就“公司与全国性经销商拟于次年初停⽌合作，且不会发⽣⽆偿换货情形”予以明 确，则应根据变化后的基础信息为依据确认和计量期末的预计负债，⽽不应再沿⽤此前的⽅式。由此导致的变化作为会计估计变更处理。 提问⼈：你忒杀阿 时间：2024-08-15 19:14:38 A公司为境内母公司，以⼈民币为记账本位币，设⽴境外⼦公司B，B以欧元为记账本位币，先A公司销售产品给B，再由B对外销售，资产负债表⽇，A公司编制合并报表，在抵消内部交易时，假设期末不存在内部未实现损 益，在合并抵消时,抵消A公司对B的销售收⼊，以及B公司对外的销售成本，但B公司是境外⼦公司，基于合并报 表编制时利润表将按照平均汇率折算，此时抵消A公司的收⼊与B公司成本时将会存在差异，该部分抵消差异作为 外币报表折算差记⼊其他综合收益，问题：该部分内部交易抵消的差额会影响合并的利润，在测算所得税时是否考虑确认递延所得税资产，若基于外币报表折算差⼀般对所得税⽆影响的前提下，该部分是否在合并所得税勾稽表格中调整“按法定/适⽤税率计算的所得税费⽤” 回答⼈：chenyiwei ⾸先，“在抵消内部交易时，假设期末不存在内部未实现损益，在合并抵消时,抵消A公司对B的销售收⼊，以及B公司对外的销售成本”的理解是错误的。在合并抵销内部交易时，需抵销的是A对B的销售收⼊、A对B的销售成本， 以及B对外销售成本中所包含的内部交易利润。 其次，因B与A的记账本位币不同，导致B的成本（折算到⼈民币后）的⾦额可能受到外币折算差额的影响。但外 币折算差额⼀般⽆对应的递延所得税影响，故⽆需特别考虑。可以在合并所得税勾稽表格中作为“其他”项⽬调整其影响。 提问⼈：w451386810 时间：2024-08-30 11:53:48 求助陈版：本公司与其他公司成⽴了⼀家担保公司，并实际缴纳出资；担保公司在运营⼀段时间后决定注销，并将之前各股东的出资款归还；但现在由于⼀项担保业务仍存在纠纷，故⽽担保公司未能实际注销。 ⽬前本公司针对上述情况的账务处理是： 借：其他⾮流动⾦融资产 贷：其他应付款 请教陈版：上述账务处理是否合适？长期不能注销的话，是否存在股东抽逃资⾦的风险？后续如何处理合适？ 回答⼈：chenyiwei 由于被投资公司尚未注销，故原先的长期股权投资仍继续保留（可能需要对其计提减值）。如果投资款已经收回的，则建议象征性保留1元账⾯价值。 对于该项尚未解决的纠纷，应关注对本企业作为该担保公司股东的可能影响，如果本企业需要出资赔偿的，则谨慎评估确认预计负债。 根据《公司法》第256条：“公司在进⾏清算时，隐匿财产，对资产负债表或者财产清单作虚假记载，或者在未清偿债务前分配公司财产的，由公司登记机关责令改正，对公司处以隐匿财产或者未清偿债务前分配公司财产⾦额百分之五以上百分之⼗以下的罚款；对直接负责的主管⼈员和其他直接责任⼈员处以⼀万元以上⼗万元以下的罚款”。 因此在担保纠纷解决之前分配财产给股东，可能存在被处罚的风险。个人理解，供参考。","cat":"合并报表","kw":"减值,合并,所得税,递延,预计负债,求助陈版","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY0067","q":"关于母公司代⼦公司发放⼯资的现⾦流","a":"母公司个别报表层⾯：⽀付的其他与经营活动有关的现⾦。与之相对应，相关负债余额应列报为其他应付款或者其他流动负债。 合并报表层⾯：⽀付给职⼯以及为职⼯⽀付的现⾦。与之相对应，相关负债余额应调整到应付职⼯薪酬。个人理解，供参考。","cat":"合并报表","kw":"合并,关于母公司代⼦公司发放⼯资的现⾦流","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY1015","q":"矿⼭复垦义务增加，原确认的预计负债应当如何处理？","a":"此问题中，针对原已确认复垦义务的开采⾯积重新编制复垦⽅案，由此导致预计负债需重新测算，可按照《企业会计准则解释第6号》第⼀条规定处理。 ⼀、企业因固定资产弃置费⽤确认的预计负债发⽣变动的，应当如何进⾏会计处理？ 答：企业应当进⼀步规范关于固定资产弃置费⽤的会计核算，根据《企业会计准则第4号——固定资产》应⽤指南的规定，对固定资产的弃置费⽤进⾏会计处理。 本解释所称的弃置费⽤形成的预计负债在确认后，按照实际利率法计算的利息费⽤应当确认为财务费⽤；由于技术进步、法律要求或市场环境变化等原因，特定固定资产的履⾏弃置义务可能发⽣⽀出⾦额、预计弃置时点、折现率等变动⽽引起的预计负债变动，应按照以下原则调整该固定资产的成本： 对于预计负债的减少，以该固定资产账⾯价值为限扣减固定资产成本。如果预计负债的减少额超过该固定资产账⾯价值，超出部分确认为当期损益。 对于预计负债的增加，增加该固定资产的成本。 按照上述原则调整的固定资产，在资产剩余使⽤年限内计提折旧。⼀旦该固定资产的使⽤寿命结束，预计负债的所有后续变动应在发⽣时确认为损益。个人理解，供参考。","cat":"或有事项","kw":"预计负债,固定资产,折旧,矿⼭复垦义务增加,原确认的预计负债应当如何处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第13号——或有事项、《企业会计准则第4号——固定资产》"},{"id":"CY1219","q":"企业会计准则解释第18号","a":"可以这样理解。这个问题的关键是将保证性质保相关费⽤由销售费⽤调整到营业成本核算和列报，⽽不论其是否通过预计负债计提核算。个人理解，供参考。","cat":"或有事项","kw":"预计负债,企业会计准则解释第18号","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第13号——或有事项"},{"id":"CY1222","q":"售后维修时退下来的零部件⼊库该如何做账？","a":"⾸先，售后保证性质保性质的维修⽀出，现在规定是计⼊营业成本⽽不是销售费⽤。 这部分尚可使⽤的零部件按预计的可变现净值⼊账原材料（扣除预计修复费⽤），对应贷记营业成本（保证性质保费⽤）。如果此前就保证性质保义务确认了预计负债，发⽣维修⽀出时从预计负债中列⽀的，则收回可使⽤的零部件时，按其⼊账价值贷记预计负债。个人理解，供参考。","cat":"或有事项","kw":"预计负债,售后维修时退下来的零部件⼊库该如何做账","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第13号——或有事项"},{"id":"CY1470","q":"BOT后续修理⽀出的处理","a":"在⽆形资产模式下，对于不单独向政府或使⽤者收费的基础设施维护、更新⽀出，应参照财政部会计司发布的PPP⽆形资产模式案例中对于⾼速公路的“路⾯翻修义务”的处理⽅式，在运营期内基础设施的使⽤期间内，在两次⼤修或更新的间隔期内逐年计提预计负债，以及就已计提的部分确认利息⽀出。 如果是⾦额较⼩、发⽣频率较⾼的中⼩修理，尤其是周期的⼀年内的⽇常维护修理，⼀般在发⽣时直接将其⽀出计⼊营业成本处理。不能在运营初期⼀次性提⾜该类预计负债。个人理解，供参考。","cat":"或有事项","kw":"预计负债,请教陈版,BOT后续修理⽀出的处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第13号——或有事项"},{"id":"CY1490","q":"存放在加⼯⼚的货物被处置","a":"该项赔偿要求属于企业的或有资产，即“去的交易或者事项形成的潜在资产，其存在须通过未来不确定事项的发⽣或不发⽣予以证实”，因此不应确认。但对于已发⽣的资产损失应及时予以确认。 后续随着上述不确定性的消失，例如法院判决确认了本企业该项求偿权的有效性，⽅可作为其他应收款予以确认。 另外，根据或有事项准则规定，企业通常不应当披露或有资产。但或有资产很可能会给企业带来经济利益的，应当披露其形成的原因、预计产⽣的财务影响等。个人理解，供参考。","cat":"或有事项","kw":"存放在加⼯⼚的货物被处置","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第13号——或有事项"},{"id":"CY0573","q":"有限合伙企业和关联⽅共同投资","a":"虽然合作投资⽅是LP，法律上LP不能执⾏合伙事务，但LP仍可能对合伙企业具有控制、共同控制或者重⼤影响。如果该合作投资的LP对合伙企业具有控制、共同控制或者重⼤影响的，则为关联交易。个人理解，供参考。","cat":"关联方披露","kw":"有限合伙企业和关联⽅共同投资","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第36号——关联方披露"},{"id":"CY0753","q":"帮忙解答上市公司股权⾮关联⽅赠予问题","a":"关键是：这个赠送的背后商业逻辑和理由是什么？是否属于关联交易⾮关联化？ 如果⽆法给出合理（符合通常的商业逻辑和商业常识）的解释和理由，则审计师可能需以审计范围受限为由，对该上市公司的报表发表保留意见或者⽆法表⽰意见。个人理解，供参考。","cat":"关联方披露","kw":"求助陈版主帮忙解答上市公司股权⾮关联⽅赠予问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第36号——关联方披露"},{"id":"CY0858","q":"[求助] 请教陈版主：母公司资⾦归集户是否造成对⼦公司的抽逃出资","a":"根据“最⾼⼈民法院关于适⽤《中华⼈民共和国公司法》若⼲问题的规定（三）（2014年修正）”（法释[2014]2 号）第⼗⼆条：公司成⽴后，公司、股东或者公司债权⼈以相关股东的⾏为符合下列情形之⼀且损害公司权益为由，请求认定该股东抽逃出资的，⼈民法院应予⽀持： (⼀)制作虚假财务会计报表虚增利润进⾏分配； (⼆)通过虚构债权债务关系将其出资转出； (三)利⽤关联交易将出资转出； (四)其他未经法定程序将出资抽回的⾏为。 在本案例中，A公司利⽤资⾦归集操作，事实上将同⼀笔款项对⼦公司出资两次，有可能被认定为未⾜额实缴出 资，或者出资抽逃⾏为。建议与有关领域内的专业⼈⼠和政府部门沟通确认。 税务问题建议咨询税务专业⼈⼠意见。个人理解，供参考。","cat":"关联方披露","kw":"[求助],请教陈版主,母公司资⾦归集户是否造成对⼦公司的抽逃出资","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第36号——关联方披露"},{"id":"CY1371","q":"是否属于重⼤错报？","a":"考虑以下因素：（1）甲公司和⼄公司之间、他们与本企业之间分别是什么关系？是否存在关联⽅关系？（2）是否存在可能导致本企业对⼄公司的应付款具有敏感性和市场关注信息的因素？ ⼀般理解，因为重⼤错报的判断需考虑定性和定量两个因素。明细科⽬的区分从定量⻆度⽽⾔⼀般影响是不重⼤的，但需要考虑从定性⻆度⽽⾔是否存在导致其重⼤、敏感的因素。提问⼈：gpqg 时间：2025-05-08 23:15:41 陈版，您所说的「需要考虑从定性⻆度⽽⾔是否存在导致其重⼤、敏感的因素」，这⾥的重⼤ 敏感因素指的是什么呢？ 谢谢陈版！ 回答⼈：chenyiwei 就是是否涉及关联交易、资⾦占⽤等监管关注问题。个人理解，供参考。","cat":"关联方披露","kw":"请教陈版,是否属于重⼤错报","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第36号——关联方披露"},{"id":"CY1068","q":"是否可以调减应收账款？","a":"由于销售退货在2024年内已发⽣，且⾦额已确定，故会计上应据此冲减2024年度的销售收⼊。未开红票只是税务⼿续问题，不应对会计处理产⽣影响。另外对于此类跨期开具红票的事项，建议咨询税务专业⼈⼠，关注潜在的税务合规性⻛险。个人理解，供参考。","cat":"实务综合","kw":"是否可以调减应收账款","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1075","q":"是否视为投资收益的亏损","a":"根据《企业会计准则解释第7号》第四条规定，吸收合并全资⼦公司时，该全资⼦公司报表中的累计亏损（留存收益红字）在⺟公司个别报表层⾯也是直接借记留存收益，不通过投资收益等利润表项⽬体现。因此在字⾯上也不属于“投资收益的亏损”。但其本质上与处置投资的亏损⽆本质区别。个人理解，供参考。","cat":"实务综合","kw":"合并,是否视为投资收益的亏损","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1088","q":"试⽣产期间产出废品的处理","a":"参考： https://bbs.esnai.com/thread-5491264-1-1.html。个人理解，供参考。","cat":"实务综合","kw":"试⽣产期间产出废品的处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1099","q":"专户存储资⾦是否属于使⽤权受限资⾦","a":"这种情况⼀般理解不属于使⽤受限制的资⾦。 ⼀般理解的受限资产或者受限资⾦，是指由于外部第三⽅权利（如抵押、质押等）的设置或者被司法冻结等，导致该账户内的资⾦不可⽤于对外⽀付。但此类专户资⾦虽然仅限于特定⽤途， 但并未设置第三⽅权利，且在所限定⽤途的范围内，只要确保合规性，其使⽤事实上是不受限制的。个人理解，供参考。","cat":"实务综合","kw":"专户存储资⾦是否属于使⽤权受限资⾦","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1100","q":"⺟公司向⼦公司员⼯⽀付奖励⾦","a":"⾸先要明确：⺟公司⽀付的这笔资⾦，⽇后⼦公司是否需要偿还？ 如果⽆需偿还的，则⼦公司计⼊资本公积处理，⺟公司计⼊对该⼦公司的⻓期股权投资成本处理。如果需要偿还的，则双⽅互相挂往来处理。 对于⼦公司⽀付给员⼯的奖励⾦，均作为职⼯薪酬进⾏相关核算，计⼊⼦公司的成本费⽤。个人理解，供参考。","cat":"实务综合","kw":"⺟公司向⼦公司员⼯⽀付奖励⾦","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1111","q":"关于国有企业⺟⼦公司借款","a":"最合适的是投资收益，其次是财务费⽤——利息收⼊。 ⾮⾦融企业不应将利息收⼊纳⼊其营业收⼊。个人理解，供参考。","cat":"实务综合","kw":"关于国有企业⺟⼦公司借款","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1112","q":"中审众环研究·实务案例卷什么时候更新","a":"更新⼯作此前已经启动，但进展较慢。希望能够加快进度，在年内出⼀版更新版。谢谢关注！个人理解，供参考。","cat":"实务综合","kw":"中审众环研究·实务案例卷什么时候更新","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1114","q":"公益性资产的会计核算—–跪求陈版帮助","a":"这类问题已经不是单纯的技术问题，其处理⽅式本质上在于政府债务⻛险的化解进度。由于政策性很强，建议向其主管政府部⻔和上级政府部⻔了解。理论上说，这类资产不符合确认为企业资产的条件，并不因为其是在412号⽂发布前注⼊就完全排除⻛险。个人理解，供参考。","cat":"实务综合","kw":"公益性资产的会计核算—–跪求陈版帮助","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1117","q":"更换主体的⻓投会计处理","a":"主帖的处理可以接受。由于分配和再投资属于⼀揽⼦交易，分配额⼤于原投资成本的差额不应确认为收益。个人理解，供参考。","cat":"实务综合","kw":"更换主体的⻓投会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1124","q":"持有兄弟公司股份的核算","a":"由于C是A的⼦公司，即C是A天然的⼀致⾏动⼈，在参与B的财务、经营活动决策时，天然地与A保持⼀致，⽽不能单纯从C⾃身利益最⼤化的⻆度参与决策。因此，除⾮C是法律法规对其独 ⽴性有特殊要求的企业（如上市公司和⾦融企业），否则虽然C持有B的25%股权，但⼤概率C对B是没有重⼤影响的。个人理解，供参考。","cat":"实务综合","kw":"持有兄弟公司股份的核算","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0304","q":"集团内股份⽀付","a":"l理论上对母公司个别报表层⾯⽽⾔确实是权益结算股份⽀付（接收服务企业没有结算义务），但因为接受服务⽅ 是母公司，结算义务⽅是⼦公司，所以虽然是权益结算股份⽀付，但实际上是从⼦公司抽回投资，所以是减少对⼦公司的长期股权投资成本，⽽不是增加母公司⾃⾝的资本公积。所以实际上和现⾦结算股份⽀付没有太⼤区别。个人理解，供参考。","cat":"长期股权投资","kw":"集团内股份⽀付","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"CY0311","q":"chenyiwei 请教陈⽼师关于重组后长期股权投资的初始确认问题","a":"A先⽣新公司：可按同⼀控制下合并取得⼦公司处理； 其他股东的新公司：根据对XX公司有⽆重⼤影响，分别作为长期股权投资按权益法核算，或者作为⾦融资产和核 算。如果满⾜⾮交易性权益⼯具投资条件的，可在取得⽇选择指定为以公允价值计量且其变动计⼊其他综合收益的 ⾦融资产，列报为其他权益⼯具投资。个人理解，供参考。","cat":"长期股权投资","kw":"公允价值,合并,权益法,chenyiwei,请教陈⽼师关于重组后长期股权投资的初始确认问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"CY0400","q":"关于债务重组时，⼦公司豁免母公司债务的会计处理","a":"权益性交易会计处理的特点是：投资⽅调整对被投资⽅的长期股权投资账⾯价值；被投资⽅调整权益。⽽不是双⽅都调整权益。因此，如果⼦公司豁免母公司的债务构成权益性交易的，⼦公司应按照豁免债权的账⾯价值冲减权益 （依次冲减资本公积（资本溢价或股本溢价）、盈余公积、未分配利润），母公司相应减少对该⼦公司的长投账⾯价值。如果所豁免的债务⼤于母公司对⼦公司的长投账⾯价值的，则母公司个别报表中将超出部分确认为投资收 益，视同⼦公司对母公司的⼀项股利分配。个人理解，供参考。","cat":"长期股权投资","kw":"债务重组,关于债务重组时,⼦公司豁免母公司债务的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"CY0419","q":"国企持有有限合伙⼈企业少数股权的账务处理","a":"从该基⾦的架构看，在董事会中占2/5席位，虽不能控制董事会的表决，但也⾜以产⽣重⼤影响；投委会表决权每 个出资⼈各具备⼀票表决权，即甲占1/4。因此，本案例中更⼤的可能性是具有重⼤影响，除⾮其他出资⼈保证A的出资本⾦安全和取得约定收益（或者保底收益）。 因此，A对其在该基⾦中的份额应采⽤权益法核算。报表上列报为长期股权投资。个人理解，供参考。","cat":"长期股权投资","kw":"权益法,国企持有有限合伙⼈企业少数股权的账务处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"CY0433","q":"关于权益法单位其他股东分配导致⽐例增加问题","a":"这种情况也可以认为是“被投资单位除净损益、其他综合收益和利润分配以外所有者权益的其他变动”所引起。因此，本企业作为投资⽅，应测算在该事项发⽣前后本企业在该被投资企业中所享有净资产份额的增减变动额，即 【分配后净资产分配后本企业所占权益⽐例-分配前净资产分配前本企业净资产所占权益⽐例】。相应调整“长期股 权投资——其他权益变动”和“资本公积——其他资本公积”。个人理解，供参考。","cat":"长期股权投资","kw":"权益法,请教陈版主,关于权益法单位其他股东分配导致⽐例增加问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"CY0115","q":"请教版主，离退休⼈员社会化费⽤确认长期应付款的问题","a":"对于移交地⽅管理的离退休⼈员的相关费⽤，⼀般是在移交时，依据基准⽇的精算结果计提⼀项负债，然后尽快将该项负债资⾦拨付给接收离退休⼈员的地⽅机构，以结算该项负债。此后该项资⾦的不⾜或者结余与本企业⽆关。 如果该资⾦的余额不⾜以⽀付后续⽀出，仍需由本企业继续承担不⾜部分的补⾜责任的，则本企业应确保在移交后每年继续进⾏精算，并根据精算结果对上述负债的余额进⾏调整。调整⾦额视情况计⼊管理费⽤或者其他综合收 益。个人理解，供参考。","cat":"实务综合","kw":"请教版主,离退休⼈员社会化费⽤确认长期应付款的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0119","q":"应收账款保理费⽤，属于⾮经吗？","a":"如果被保理的应收账款均系正常经营活动产⽣，且将此类应收账款进⾏保理融资是常规操作，则保理融资费⽤是企业的正常融资费⽤，在可预见的未来将会重复发⽣，成为影响未来期间损益的长期因素，报表使⽤者在预测未来盈利能⼒时应将该因素纳⼊考虑。因此，不属于⾮经常性损益。个人理解，供参考。","cat":"实务综合","kw":"应收账款保理费⽤,属于⾮经吗","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0121","q":"招商费⽤⼊账疑问","a":"该项资产的运营收⼊（如租⾦）归谁所有？⼦公司的运营费⽤如何获得补偿？⼦公司承担运营费⽤与获得运营收⼊是否相称，整体交易是否公允合理？个人理解，供参考。","cat":"实务综合","kw":"招商费⽤⼊账疑问","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0122","q":"关于员⼯持股平台借款的账务处理","a":"由于该借款系以平台名义借⼊，平台是向银⾏还本付息的⾸要义务⼈，因此平台应同时确认对银⾏的借款和对员⼯的债权，以及分别确认与之相关的利息⽀出和利息收⼊。个人理解，供参考。","cat":"实务综合","kw":"关于员⼯持股平台借款的账务处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0127","q":"同控下⽆偿划拨冲减资本公积问题","a":"在个别报表层⾯仅冲减资本公积的做法并不恰当。因为个别报表层⾯每个权益项⽬在《公司法》等法律法规中都有特定的含义和⽤途，例如可供分配股利的留存收益就是根据未分配利润的余额确定的，盈余公积的计提和使⽤是否合规也取决于其核算是否符合公司法规定，等等。因此个别报表层⾯的资本公积是不应出现负数的。如果资本公积有⼤额负数，但未分配利润为正数，后续依据该未经冲减的未分配利润余额对股东进⾏分红，则进⼀步侵蚀了利⽤净资产保障债权⼈利益的基础。 ⽽且，这个问题在会计准则中是有明⽂规定的。 因此，不建议对于会计准则有明⽂规定的事项直接不遵循其规定。个人理解，供参考。","cat":"实务综合","kw":"请教陈版主,同控下⽆偿划拨冲减资本公积问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0132","q":"求助，0对价减资，母⼦公司的财务税务处理问题","a":"基本赞同主帖中的处理意见。税务处理问题建议再与税务专业⼈⼠沟通确认。个人理解，供参考。","cat":"实务综合","kw":"0对价减资,母⼦公司的财务税务处理问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0149","q":"经销商未达到销售⽬标⽽扣除保证⾦的账务处理","a":"该事项与代理费的结算是同⼀交易的两个⽅⾯，两者密切关联，故冲减“销售费⽤——代理费”更为合理。个人理解，供参考。","cat":"实务综合","kw":"经销商未达到销售⽬标⽽扣除保证⾦的账务处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0151","q":"员⼯激励奖⾦的确认","a":"该做法总体上合理。 该安排在性质上属于“其他长期职⼯福利”，理论上应采⽤设定提存计划的会计处理模式，但因为期限较短，影响最 终发放⾦额的唯⼀较⼤变量就是考核期内业绩，因此也可以简化为依据考核期内业绩预测确定计提数，并在服务期内分摊的处理⽅式。 由于属于长期激励计划，因此还需要考虑折现因素影响。实务中如果折现因素的影响显著不重⼤的，也可简化处理，不考虑折现。个人理解，供参考。","cat":"实务综合","kw":"请教陈版,员⼯激励奖⾦的确认","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1571","q":"看到⼀个离职补偿⾦的案例想请教下","a":"这种集团内部企业之间的成建制、规模化⼈员调动，应当是在集团统⼀安排下，由调⼊、调出双⽅签订协议约定具体操作⽅式，例如通过往来结算转移⽀付责任，还是通过权益性科⽬调整。在本案例中，如果约定补偿⾦由B负责发放，但最终与A结算，则主帖的处理基本合理。个人理解，供参考。","cat":"职工薪酬","kw":"看到⼀个离职补偿⾦的案例想请教下","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第9号——职工薪酬"},{"id":"CY1917","q":"股份⽀付离职后继续授予，应该怎么处理？","a":"该做法意味着放弃了原先的服务期限条件要求，故等待期在放弃该要求时（即激励对象离职时）⽴即届满，相应地剩余股份⽀付费⽤应加速确认。即按加速可⾏权处理。个人理解，供参考。","cat":"职工薪酬","kw":"请教陈版,股份⽀付离职后继续授予,应该怎么处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第9号——职工薪酬"},{"id":"CY1128","q":"12⽉26⽇结账，货币资⾦与对账单不⼀致","a":"需要调整，否则会计年度结束⽇期就不是12⽉31⽇了（或者不完全是12⽉31⽇），这不符合会计法和会计准则制度规定。个人理解，供参考。","cat":"实务综合","kw":"12⽉26⽇结账,货币资⾦与对账单不⼀致","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1142","q":"票据贴现利息现流问题","a":"对于满⾜终⽌确认条件的票据贴现，可以这样理解。但要注意：按照《应⽤指南汇编2024》，此类满⾜终⽌确认条件的贴现息应计⼊财务费⽤⽽不是投资收益。个人理解，供参考。","cat":"实务综合","kw":"票据贴现利息现流问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1156","q":"财政局拨⼊的资本⾦计⼊哪个科⽬","a":"建议向提供该笔资⾦的财政局，以及向城投公司的股东、上级主管单位咨询应如何处理。但在明确属于资本性投⼊的前提下，应该是或者增加实收资本，或者增加资本公积。个人理解，供参考。","cat":"实务综合","kw":"财政局拨⼊的资本⾦计⼊哪个科⽬","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1407","q":"关于企业发⽣⽕灾的处理问题","a":"固定资产清理科⽬是可以在期末留余额的，但对于借⽅余额，应谨慎关注其可收回性。 如果⽆法合理确定可获得保险赔偿的⾦额，则在履⾏必要⼿续后，在⽕灾发⽣的当期期末将固定资产清理的余额转⼊“营业外⽀出——固定资产毁损报废损失”处理。后续收到保险赔款时确认为营业外收⼊或者冲减营业外⽀出。 提问⼈：⼩乐安1314 时间：2025-06-03 10:45:06 陈版，追加⼀个问题，因为这个毁损的资产⾦额⽐较⼤，保险赔偿⾦额也会⽐较⼤，可能好⼏亿，对公司利润表影响也很⼤，这个年末这个保险赔偿⾦额需要100%确定才能冲减固定资产清理，还是说基本上可以确定就可以冲减 回答⼈：chenyiwei 基本上可以确定就可以冲减，但应注意遵循谨慎性原则。个人理解，供参考。","cat":"固定资产","kw":"固定资产,请教陈版,关于企业发⽣⽕灾的处理问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第4号——固定资产"},{"id":"CY0566","q":"PPP项⽬形成的资产后期计量账务处理","a":"主帖中的处理意见基本合理。 上述情况中涉及到原设备拆除时，被拆除设备的账⾯价值减少⽆形资产（或固定资产）账⾯价值，与拆除费⽤⼀并计⼊损益；其会计处理类似于固定资产处置处理，最终是影响损益⽽不是计⼊替换设备的账⾯价值。 提问⼈：monica068 时间：2024-09-04 13:36:12 技改拆除涉及到原设备拆除报废时，拆除原因是新增资产导致，从业务实质理解为属于技改成本中的⼀种，所以在会计处理时随着新增设备⼀起转资产原值了。这种做法不知道是否冲突了会计准则哇？主要是损益影响太⼤了 回答⼈：chenyiwei 被拆除的原设备是被替换的，被替换后，其原有的产出未来经济利益流⼊的能⼒就终⽌了，所以不应继续确认为资产。个人理解，供参考。","cat":"固定资产","kw":"固定资产,PPP项⽬形成的资产后期计量账务处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第4号——固定资产"},{"id":"CY0529","q":"固定资产更新问题","a":"⾸先，根据《企业会计准则第4号——固定资产》第五条规定：“固定资产的各组成部分具有不同使⽤寿命或者以不同⽅式为企业提供经济利益，适⽤不同折旧率或折旧⽅法的，应当分别将各组成部分确认为单项固定资产”。据 此，由于房屋建筑物主体结构与电梯的使⽤年限不同，应将电梯单独确认为⼀项固定资产，⽽不应并⼊房屋建筑物价值。 建议根据当初该房屋的决算资料，确定该电梯当初的原值和报废更换时点的账⾯价值，按其账⾯价值作报废处置处理；对于新换上的电梯单独确认为⼀项固定资产，其折旧年限为电梯本⾝的使⽤年限和所在房屋建筑物的剩余使⽤ 年限两者中的较短年限。 因为该电梯是⾃有产权房屋的附属设施，故不应确认为长期待摊费⽤。个人理解，供参考。","cat":"固定资产","kw":"固定资产,折旧,固定资产更新问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第4号——固定资产、《企业会计准则第4号——固定资产》"},{"id":"CY0221","q":"学校购买的图书应该⼊什么会计科⽬","a":"根据《民间⾮营利组织会计制度》第⼆⼗九条规定：“单位价值虽未达到规定标准，但使⽤期限超过1年的⼤批同类物资，如馆藏图书、，也可作为固定资产核算”；第三⼗条规定：“⾮营利组织的固定资产⼀般分为七类：房屋和建筑物、⼀般设备、专⽤设备、交通⼯具、陈列品、图书、其他固定资产。”根据第三⼗五条规定，图书的最短折旧 年限为5年。 提问⼈：jcflower 时间：2024-04-09 15:12:08 @chenyiwei陈版，《民间⾮营利组织会计制度》是哪年版的，我找⽂件《财会〔2004〕第7号》没有对应的条⽬， 还请告知⽂件号，谢谢！ 回答⼈：chenyiwei 财会[2004]7号。个人理解，供参考。","cat":"固定资产","kw":"固定资产,折旧,学校购买的图书应该⼊什么会计科⽬","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第4号——固定资产"},{"id":"CY0637","q":"经济适⽤住房","a":"根据《政府会计准则第3号——固定资产》第⼆条：“本准则所称固定资产，是指政府会计主体为满⾜⾃⾝开展业务活动或其他活动需要⽽控制的，使⽤年限超过1年（不含1年）、单位价值在规定标准以上，并在使⽤过程中基本保持原有物质形态的资产，⼀般包括房屋及构筑物、专⽤设备、通⽤设备等。”该准则第三条规定：“公共基础设施、政府储备物资、保障性住房、⾃然资源资产等，适⽤其他相关政府会计准则。”因此，经济适⽤住房不属于固定资 产。 政府对经济适⽤住房的财产权，主要是出售时收益的分成权。经济适⽤住房并不符合上述固定资产定义，故不能确认为政府会计体系下的固定资产。个人理解，供参考。","cat":"固定资产","kw":"固定资产,经济适⽤住房","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第4号——固定资产"},{"id":"CY0438","q":"⼀种原材料同时能⽣产多种产成品存货跌价的处理","a":"虽然2022年末没有需⽤到X原材料的在⼿订单，但可以根据以往经验，估计资产负债表⽇库存的100吨X原材料最终 ⽤于甲产品⽣产的⽐例。但这种做法的前提是各年度内使⽤X原材料⽣产的各种产品的数量⽐例保持基本稳定。如果没有⾜够的历史数据可作为估计依据的，也可以使⽤资产负债表⽇后实际⽣产情况的数据（资产负债表⽇后事项信息）作为参考。 在进⾏这⽅⾯测算时，需运⽤与存货成本结转⽅式相关的假设，例如，本公司结转存货成本采⽤的⽅式是先进先出法，则在考虑期后实际产量信息时，也是⽤先进先出法测算。 “其他产品是盈利的，并且期后使⽤了105吨X原材料，是否可以认为2022年末100吨X原材料都⽤于⽣产了盈利产品，不需要计提跌价”的观点是不恰当的。个人理解，供参考。","cat":"存货","kw":"存货跌价,⼀种原材料同时能⽣产多种产成品存货跌价的处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第1号——存货"},{"id":"CY0474","q":"chenyiwei求助陈⽼师：关于视同销售的问题","a":"磷渣属于⽣产过程中产⽣的废料，其可变现净值可能是正的，也可能是负的（扣除由本企业负担的处置费⽤之后）。但不论正数还是负数，其经济性质都是相同的。因此其会计处理应采⽤⼀致的⽅法。 建议的处理原则：磷渣的处置收⼊（如有）减去本企业承担的处置、运输费⽤（如有）后的净额，作为对主产品 （黄磷）⽣产成本的调整。不单独确认处置收⼊。个人理解，供参考。","cat":"存货","kw":"chenyiwei求助陈⽼师,关于视同销售的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第1号——存货"},{"id":"CY0225","q":"收购房地产企业问题","a":"本案例中的B公司⼤概率是不构成业务的，所以A公司就是出资收购了⼀个房地产开发项⽬（存货）。 该交易的实质，相当于A收购B100%股权，但其中1万平⽶商铺未纳⼊收购范围，仍归原股东所有。但原股东保留的1万平⽶商铺权益（假设⽬前并未指定到具体编号），并不构成“单独主体”。因此建议的处理⽅法：个人理解，供参考。","cat":"存货","kw":"收购房地产企业问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第1号——存货"},{"id":"CY0601","q":"耕地“占补平衡”指标开发项⽬如何确认收⼊","a":"承接此类项⽬的⼀般是政府平台公司，⾃⾝⽆实施能⼒，所有⼯作全部外包。通常认为此类企业在该类业务中⼀般为代理⼈⾓⾊，仅就所提供的管理服务（如有）确认管理费收⼊，以及就其为政府垫⽀的资⾦确认利息收⼊（如 有）。 已发⽣的项⽬成本按代收代付处理，通过往来科⽬核算，不确认为本企业的存货。个人理解，供参考。","cat":"存货","kw":"耕地“占补平衡”指标开发项⽬如何确认收⼊","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第1号——存货"},{"id":"CY1926","q":"废旧家电原材料存货跌价测试时的可变现净值计价基础","a":"由于购⼊废旧家电并不是作为旧货出售，⽽是拆解后出售产成品，故应以产成品售价扣减拆解、加⼯成本和相关税费作为可变现净值的计算依据。 对于具有明显淡旺季性质且可直接出售的瑕疵品（如空调），如果有较多的收购后直接出售的案例，则应根据预计出售时间考虑淡旺季价格波动的影响。个人理解，供参考。","cat":"存货","kw":"存货跌价,废旧家电原材料存货跌价测试时的可变现净值计价基础","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第1号——存货"},{"id":"CY1437","q":"关于存货取得成本","a":"个⼈意⻅：⽀付给甲平台的佣⾦（采购额的5%）可计⼊存货成本；⽀付给⼄平台的佣⾦（每⽉固定⽀出）不计⼊采购成本，⽽应当计⼊管理费⽤。主要考虑：⽀付给甲平台的佣⾦⽀出与采购额有明确关系，可以认为是采购存货使其达到当前状态和场所的必要、合理⽀出，故可以计⼊存货成本。个人理解，供参考。","cat":"存货","kw":"求助陈版主,关于存货取得成本","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第1号——存货"},{"id":"CY1528","q":"存货意外损毁，保
