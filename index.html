实际发生的汇兑差额」为限，不能预计；（3）如果专门借款有部分资金暂时闲置并产生汇兑收益，应冲减资本化金额。个人理解，供参考。","cat":"借款费用","kw":"借款费用,CAS 17,资本化,专门借款,一般借款,汇率","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第17号——借款费用"},{"id":"3584","q":"专门借款和一般借款的资本化计算方法有何不同？","a":"根据CAS 17，专门借款的资本化金额 = 专门借款当期实际发生的利息费用 - 暂时闲置资金的投资收益。即专门借款的利息全额资本化（扣除闲置资金收益）。一般借款的资本化金额 = 累计资产支出超过专门借款部分的加权平均数 × 一般借款的加权平均利率（资本化率）。资本化率 = 当期一般借款利息之和 ÷ 一般借款本金加权平均数。关键区别：专门借款不需要计算支出加权平均数和资本化率，全额资本化；一般借款需要按占用期间加权计算。实务中，一般借款资本化率的计算需要涵盖全部一般借款（包括长期借款和短期借款）。个人理解，供参考。","cat":"借款费用","kw":"借款费用,CAS 17,资本化,专门借款,一般借款,投资收益","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第17号——借款费用"},{"id":"3583","q":"借款费用资本化的条件是什么？开始、暂停和停止资本化的时点如何判断？","a":"根据CAS 17，借款费用资本化需同时满足三个条件：（1）资产支出已经发生；（2）借款费用已经发生；（3）使资产达到预定可使用或可销售状态所必要的购建或生产活动已经开始。资本化暂停：非正常中断连续超过3个月（如不可抗力、资金短缺等导致停工）。如果中断是使资产达到预定可使用状态的必要程序（如自然固化、陈酿），则不应暂停资本化。资本化停止：资产达到预定可使用或可销售状态时停止。实务中，「达到预定可使用状态」的标志需要结合资产性质和用途判断，包括物理完工、负荷调试成功、验收合格等。个人理解，供参考。","cat":"借款费用","kw":"借款费用,CAS 17,资本化,专门借款,一般借款","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第17号——借款费用"},{"id":"3582","q":"债转股（债务人发行权益工具清偿债务）的债务人如何处理？","a":"根据CAS 12，债务人初始确认权益工具时，应以权益工具的公允价值（优先使用）或所清偿债务的公允价值计量。两者差额计入当期损益（投资收益或营业外收入）。实务中，权益工具公允价值的确定是关键：（1）如果是上市公司股票，采用债务重组日的收盘价；（2）如果是非上市公司股权，需要进行估值评估；（3）如果债务和权益工具均无活跃市场公允价值，可采用估值技术。需要注意的是：债转股后，原债权人成为公司股东，企业需披露相关的股权结构变动情况。个人理解，供参考。","cat":"债务重组","kw":"债务重组,CAS 12,债转股,公允价值,重组损益,投资收益,营业外收入,上市公司","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第12号——债务重组"},{"id":"3581","q":"破产重整中的债务豁免，控股股东按相同比例豁免的债权，是否属于权益性交易？","a":"这是一个高度有争议的问题。根据证监会公告[2009]34号文的精神：在破产重整中，如果控股股东以债权人身份、与其他非关联债权人按相同比例豁免债权，且控股股东不能主导债权人会议表决的，该部分债务豁免可以不认定为权益性交易，从而债务人可将这部分豁免金额计入损益。但实务中认可条件非常苛刻：（1）母公司及其关联方不能是主要债权人或不能主导债权人会议；（2）需证明非关联方债权人的豁免比例合理且与子公司的实际财务状况和清偿能力相适应。除此之外，母子公司的债务豁免全部认定为权益性交易。个人理解，供参考。","cat":"债务重组","kw":"债务重组,CAS 12,债转股,公允价值,重组损益,控股,证监会,子公司,母公司,关联方","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第12号——债务重组"},{"id":"3580","q":"以组合方式（资产+权益+修改条款）进行债务重组时，各部分的清偿顺序如何确定？","a":"根据CAS 12，债务人以多项资产或处置组清偿债务的，应按以下顺序进行分析：（1）首先确定所转让资产和所清偿债务的公允价值；（2）将债务账面价值与转让资产账面价值的差额计入损益。如果重组涉及修改其他条款，应将修改后的债务整体确认为一项新金融负债（按公允价值初始计量），与原债务账面价值的差额计入损益。实务中，组合方式债务重组的各组成部分相互关联，不能简单割裂。建议按照合同约定的清偿条款顺序逐层处理。如果合同没有明确顺序，按公允价值比例分配。个人理解，供参考。","cat":"债务重组","kw":"债务重组,CAS 12,债转股,公允价值,重组损益,账面价值,处置组","src":"财政部 企业会计准则解释公告","std_ref":"企业会计准则第12号——债务重组"},{"id":"3579","q":"债权人豁免部分债务，剩余部分展期，属于债务重组吗？","a":"这属于债务重组无疑。根据CAS 12，债务重组是不改变交易对手方的前提下，经协商对债务偿还时间、金额或方式进行重新安排。豁免部分本金直接减少了偿还金额，剩余展期改变了偿还时间，两者都满足债务重组的定义。具体处理：（1）债权人：重新计算剩余债权的实际利率，确认重组损失（终止确认原债权的账面价值，确认新债权的公允价值）；（2）债务人：终止确认原债务的账面价值，确认新债务的公允价值，两者差额计入投资收益（或营业外收入）。需要注意：如果重组涉及债务人发行权益工具作为对价，债务人需要按权益工具的公允价值与债务账面价值的差额确认利得。个人理解，供参考。","cat":"债务重组","kw":"债务重组,CAS 12,债转股,公允价值,重组损益,账面价值,投资收益,营业外收入,终止确认","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第12号——债务重组"},{"id":"3578","q":"债务重组中，以资产清偿债务的，债权人和债务人各如何处理？","a":"根据CAS 12，债权人方面：（1）按放弃债权的公允价值加上相关税费作为受让资产的初始确认金额；（2）放弃债权的公允价值与账面价值的差额计入当期损益。债务人方面：（1）终止确认相关债务；（2）所清偿债务账面价值与转让资产账面价值（或发行权益工具公允价值）的差额计入当期损益。实务中的关键：受让资产的公允价值确定。如果接收的是非现金资产（如存货、固定资产、金融资产等），需要逐项评估其公允价值，且相关税费需要资本化。个人理解，供参考。","cat":"债务重组","kw":"债务重组,CAS 12,债转股,公允价值,重组损益,账面价值,资本化,终止确认","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第12号——债务重组、企业会计准则第17号——借款费用"},{"id":"3577","q":"专项应付款和联合申请单位拨款如何进行会计处理？","a":"专项应付款属于政府资本性投入，应区别于政府补助。根据相关规定，专项应付款在项目完成前作为长期负债列报；项目完成后形成长期资产的，转入资本公积；未形成长期资产的，经批准后核销。联合申请单位拨款的处理更为复杂：主申请单位收到各级政府拨款后拨付给联合申请单位，需要判断其身份是「转拨方」还是「代理方」。如果是转拨方，主申请单位应将自身可留用的部分确认为政府补助，拨出部分作为代收代付处理；如果主申请单位对项目成果有控制权，则可能需要将整个项目纳为己有。个人理解，供参考。","cat":"政府补助","kw":"政府补助,CAS 16,递延收益,总额法,净额法,资本公积,控制","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第16号——政府补助"},{"id":"3576","q":"政府补助的总额法和净额法有何区别？选择后能否变更？","a":"根据CAS 16，企业可以选择总额法或净额法列报政府补助，但一经选择不得随意变更。总额法下，与资产相关的政府补助确认为递延收益，在资产使用期限内按系统方法转入当期损益（冲减折旧或单独列示其他收益）；与收益相关的政府补助计入当期其他收益。净额法下，政府补助直接冲减相关资产的账面价值或相关费用。实务中，大多数中国企业选择总额法，因为可以更清晰地反映政府补助的规模和构成，也有利于与同行业企业进行比较。少数企业采用净额法，一般是为了简化核算。个人理解，供参考。","cat":"政府补助","kw":"政府补助,CAS 16,递延收益,总额法,净额法,账面价值,其他收益,折旧","src":"财政部 企业会计准则解释公告","std_ref":"企业会计准则第16号——政府补助"},{"id":"CY0321","q":"与增资扩能有关的政府补助是否与⽇常活动⽆关？","a":"实务中政府补助“与⽇常活动相关”的界定是⽐较宽泛的。像这类情况也属于与⽇常活动相关，最终计⼊其他收益。个人理解，供参考。","cat":"政府补助","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3574","q":"与资产相关的政府补助，递延收益如何摊销？设备不同部件使用不同折旧方法时如何处理？","a":"递延收益的摊销应当与相关资产折旧方法保持一致。具体而言：（1）分配到各资产的递延收益，摊销所依据的基础（年限、工作量等）应当与该资产计提折旧的基础一致；（2）如果某项部件选择了工作量法折旧，相应的递延收益也应按相同的工作量基数摊销；（3）如果后续发生大修改变了工作总量，递延收益的摊销基数应当与折旧保持一致——即或者都考虑大修，或者都不考虑。这种「相互匹配」的原则是为了确保收入与费用的配比不被不匹配的摊销方法扭曲。个人理解，供参考。","cat":"政府补助","kw":"政府补助,CAS 16,递延收益,总额法,净额法,摊销,折旧","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第16号——政府补助"},{"id":"3573","q":"政府补助是与资产相关还是与收益相关？判断标准是什么？","a":"根据CAS 16，判断标准是补助对象——补助用于购建长期资产（形成固定资产、无形资产）的，为与资产相关的政府补助；补助用于补偿已发生或将要发生的费用或损失的，为与收益相关的政府补助。如果补助文件中未明确补助对象，需要综合判断。实务中的辅助判断因素：（1）补助申请条件是否与设备投资直接相关；（2）补助资金用途是否被限定；（3）补助金额与设备投资额的匹配程度。如果补助文件中既未明确补助对象，补助申请条件与设备投资也无直接关系，则宜认定为与收益相关的政府补助。个人理解，供参考。","cat":"政府补助","kw":"政府补助,CAS 16,递延收益,总额法,净额法","src":"财政部 企业会计准则解释公告","std_ref":"企业会计准则第16号——政府补助"},{"id":"3572","q":"股份支付修改可行权条件（如加速行权、变更业绩条件）如何会计处理？","a":"股份支付计划的修改需要区分「有利修改」和「不利修改」。有利修改（如缩短等待期、降低行权价）：（1）加速行权——将原应在剩余等待期内确认的费用提前一次性确认完毕；（2）降低行权价——增量公允价值作为额外的股份支付费用在剩余等待期内摊销。不利修改（如延长等待期、提高行权价）：不应减少已确认的费用总额（即不利修改「视同没有发生」）。如果取消股份支付计划，按加速行权处理，将剩余费用一次性确认。实务中，企业应注意保留董事会决议、股东大会决议等书面证据来支撑股份支付修改的商业合理性。个人理解，供参考。","cat":"股份支付","kw":"股份支付,CAS 11,权益结算,现金结算,等待期,公允价值,摊销","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第11号——股份支付"},{"id":"3571","q":"现金结算的股份支付（股票增值权、虚拟股权）如何处理？后续公允价值变动如何入账？","a":"根据CAS 11，以现金结算的股份支付，企业应确认一项负债（应付职工薪酬），金额按资产负债表日承担义务的公允价值计量：（1）授予日不做会计处理（因为义务尚未产生）；（2）每个资产负债表日，按最新公允价值重新计量负债；（3）公允价值变动计入当期公允价值变动损益。与权益结算的股份支付不同：权益结算的股份支付在授予日按公允价值计量且后续不再调整；现金结算的则需要每个报告日按最新公允价值「刷新」。实务中，股票增值权的估值通常采用Black-Scholes-Merton模型或蒙特卡洛模拟，关键参数包括股价、波动率、无风险利率、预计行权期等。个人理解，供参考。","cat":"股份支付","kw":"股份支付,CAS 11,权益结算,现金结算,等待期,公允价值变动损益,公允价值,职工薪酬","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第11号——股份支付"},{"id":"3570","q":"集团内股份支付——母公司以自身权益工具对子公司员工进行股权激励，各层级报表如何处理？","a":"根据CAS 11和《企业会计准则解释第4号》，需要分层处理。接受服务企业（子公司）层面：没有结算义务的，按照权益结算的股份支付处理，确认费用并相应增加资本公积。结算企业（母公司）层面：以自身权益工具结算的，按权益结算股份支付处理，确认对子公司的长期股权投资和资本公积。合并报表层面：两个资本公积最终抵消，留下股份支付费用的影响（费用+资本公积）。实务中第一层判断：谁接受了服务（子公司），谁是结算方（母公司）。子公司确认费用但无实际现金流出，母公司无费用但增加长投，合并后费用「归属」到接受服务的子公司经营层面。个人理解，供参考。","cat":"股份支付","kw":"股份支付,CAS 11,权益结算,现金结算,等待期,子公司,母公司,股权激励,资本公积,合并","src":"财政部 企业会计准则解释公告","std_ref":"企业会计准则第11号——股份支付"},{"id":"CY0027","q":"对股东每股净资产的补偿","a":"请说明具体背景？补偿是由被收购⽅的原股东给予的，还是由其他⽅给予的？补偿款是否来源于收购⽅的关联⽅？ 另外，补偿款是⽀付给收购⽅，还是⽀付给标的企业？ 提问⼈：桂红艳 时间：2024-02-23 09:09:04 您好，陈⽼师，感谢您回复。补偿主要是甲公司（原始股东）最初按照10元/股购⼊⼄公司股份，三年后实际公司 每股净资产为5元/股未能达到10元/股，出于甲公司（原始股东）的补偿，⼄公司将差额部分每股净资产5元⽀付给甲公司（原始股东）作为罪每股净资产的补偿，甲公司（原始股东）对⼄公司持股⽐例未发⽣变化，每股净资产由10元每股减为5元每股。现甲公司（原始股东）收到该笔款项该如何进⾏账务处理？ 回答⼈：chenyiwei 该补偿款应当是由⼄公司⼤股东（⽽不是⼄公司）⽀付给甲公司的？如果由⼄公司（被投资企业）⽀付给甲公司 （股东），则没有意义，⼄公司的净资产进⼀步减少，起不到补偿作⽤？ 如果该补偿安排是与甲公司购⼊⼄公司股份同时达成的，则视为⼄公司股东授予甲公司⼀项卖出期权，即甲公司可在投资满3年后将标的股份按原始价格（10元/股）卖给⼄公司的⼤股东。甲公司应将该项卖出期权作为⼀项单独的衍⽣⾦融资产进⾏会计处理，确认为其他⾮流动⾦融资产。其核算独⽴于取得的⼄公司股份。具体可参考《监管规则适⽤指引——会计类第1号》之“1-1 特殊股权投资的确认与分类”中“⼀、附回售条款的股权投资”。个人理解，供参考。","cat":"股份支付","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0155","q":"请教陈版主关于实际控制⼈回购离职员⼯股权激励份额是否构成股份⽀付的问","a":"该股份的最初来源是发⾏⼈向持股平台定向增发的情况下，实际控制⼈收回上述股份的⾏为，因⽆后续再授予的计划，故同样构成新的股权激励，需要确认股份⽀付费⽤。个人理解，供参考。","cat":"股份支付","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3567","q":"股份支付中，股权激励平台成立时是否立即确认股份支付费用？","a":"股权激励平台（如员工持股合伙企业）成立时，即使该平台被明确定义为「股权激励平台」，但如果此时没有具体的激励对象和激励计划，不应确认股份支付费用。股份支付的确认时点是「授予日」——即企业与员工就股份支付的条款和条件达成一致的日期。平台成立和股份授予是两个独立的事项。只有在授予日，才能可靠计量所授予权益工具的公允价值，并开始摊销股份支付费用。实务中，不少企业在平台成立时过早确认了股份支付费用，导致费用确认期间与激励对象的服务期不匹配。应按「方案二」——平台成立时不确认，实际授予时再确认。个人理解，供参考。","cat":"股份支付","kw":"股份支付,CAS 11,权益结算,现金结算,等待期,股权激励,公允价值,摊销","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第11号——股份支付"},{"id":"3566","q":"成本法转权益法时，剩余股权如何按公允价值重新计量？","a":"这是因处置部分股权导致丧失控制权的典型场景。处理步骤：（1）处置部分按处置对价与账面价值的差额，在个别报表和合并报表分别确认损益；（2）剩余股权按丧失控制权日的公允价值重新计量；（3）合并报表层面，剩余股权公允价值与按新持股比例计算的被投资方可辨认净资产份额的差额，确认为投资收益（如果存在评估增值等也需要一并处理）；（4）剩余股权自丧失控制权日起开始权益法核算，视同初始确认。实务中剩余股权的公允价值确定是难点——如果被投资方是上市公司，可用收盘价；如果是非上市企业，需要评估。个人理解，供参考。","cat":"长期股权投资","kw":"长期股权投资,CAS 2,权益法,成本法,重大影响,公允价值,账面价值,投资收益,上市公司,合并,控制","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"CY0188","q":"新公司法认缴制下长期股权投资的确认","a":"严格来说，新旧公司法在出资⽅⾯的规定差异并不影响相关的会计处理原则。即使在现⾏的公司法下，股东也是以认缴出资额为限对公司承担责任。因此对于尚未实缴的出资，股东也需要在每期末考虑是否有必要确认预计负债并计⼊损益（投资收益）。只不过由于新公司法下加速到期的条件可能较以往宽松很多，因此股东需确认预计负债 （或其他情况下的应付出资款）的可能性较以往更⼤。但基本的会计处理原则还是⼀样的。个人理解，供参考。","cat":"长期股权投资","kw":"预计负债","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0193","q":"陈⽼师，请教下联营企业初始投资成本确定","a":"z这⾥的直接相关费⽤及其他必要⽀出，可类⽐为⾦融⼯具准则（新CAS 22）第三⼗三条中的”交易费⽤“，即：交易费⽤，是指可直接归属于购买、发⾏或处置⾦融⼯具的增量费⽤。增量费⽤是指企业没有发⽣购买、发⾏或处置相关⾦融⼯具的情形就不会发⽣的费⽤，包括⽀付给代理机构、咨询公司、券商、证券交易所、政府有关部门等的 ⼿续费、佣⾦、相关税费以及其他必要⽀出，不包括债券溢价、折价、融资费⽤、内部管理成本和持有成本等与交易不直接相关的费⽤。 审计费⽤，法律顾问费⽤，尽职调查费⽤均属于在交易前发⽣的⽀出，即使最终未完成交易，这些已⽀付的费⽤也不能收回，故不符合”增量费⽤“的定义，故应直接费⽤化⽽不能计⼊长期股权投资成本。个人理解，供参考。","cat":"长期股权投资","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3563","q":"母公司对子公司的长期股权投资在个别报表和合并报表中的差异是什么？","a":"个别报表中，母公司对子公司的长期股权投资采用成本法核算（除宣告发放股利外不确认投资收益）。合并报表中，长期股权投资与子公司所有者权益中的母公司份额进行抵消，代之以子公司各项资产、负债、收入、费用的逐项合并。两者之间存在本质区别：个别报表反映的是母公司的投资行为（资产视角），合并报表反映的是企业集团的整体经营（业务视角）。实务中编制合并底稿时，首先要计算合并日（或购买日）商誉，其次确认评估增值的后续摊销，最后抵消母公司长投和子公司权益。个人理解，供参考。","cat":"长期股权投资","kw":"长期股权投资,CAS 2,权益法,成本法,重大影响,合并,子公司,母公司,投资收益,摊销,商誉,股利","src":"财政部 企业会计准则解释公告","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"3562","q":"合营安排的分类：共同经营与合营企业的区分标准是什么？合并报表如何处理？","a":"根据CAS 40，合营安排分为共同经营和合营企业。核心区分标准是：参与方对合营安排的权利义务是直接针对特定资产和负债（共同经营），还是对合营安排净资产的权利（合营企业）。共同经营中，参与方按其份额确认相关资产、负债、收入和费用（即直接合并其份额）。合营企业中，参与方采用权益法核算（在合并报表中以「一行」列报），不逐项合并资产和负债。实务判断依据：合营安排是否设立单独主体、该单独主体的法律形式是否赋予参与方对净资产而非特定资产的权利。个人理解，供参考。","cat":"长期股权投资","kw":"长期股权投资,CAS 2,权益法,成本法,重大影响,CAS 40,合并,合营","src":"深圳证券交易所 会计监管动态","std_ref":"企业会计准则第2号——长期股权投资、企业会计准则第40号——合营安排"},{"id":"3561","q":"长期股权投资减值准备的计提和转回有何规定？与CAS 8资产减值的关系是什么？","a":"根据CAS 2，长期股权投资减值应按照CAS 8（资产减值）的规定处理。核心要点：（1）在每个资产负债表日评估是否存在减值迹象；（2）存在减值迹象的，进行减值测试；（3）可收回金额低于账面价值的差额计提减值准备；（4）长期股权投资减值准备一经确认，不得转回。实务中，长投减值的评估需要结合被投资方的经营状况、行业前景、市场估值等多维度信息。对于上市公司股权投资，如果股价持续低于账面价值，是减值的重要信号。对于非上市企业的股权投资，需要进行估值评估。个人理解，供参考。","cat":"长期股权投资","kw":"长期股权投资,CAS 2,权益法,成本法,重大影响,CAS 8,账面价值,上市公司,减值测试","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第2号——长期股权投资、企业会计准则第8号——资产减值"},{"id":"CY0218","q":"投房成本法改为公允价值计量","a":"是。追溯调整是将2022年1⽉1⽇的公允价值与账⾯价值的差额调整2022年期初留存收益。同时还需要调整报表的前期⽐较数据，视同在⽐较期间内已执⾏变更后的会计政策。个人理解，供参考。","cat":"长期股权投资","kw":"公允价值,成本法","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3559","q":"长期股权投资核算方法的转换——从金融资产到权益法如何衔接？","a":"这是分步取得重大影响的典型场景。处理步骤：（1）原持有的金融资产按转换日的公允价值重新计量；（2）公允价值与账面价值的差额计入当期投资收益；（3）原计入其他综合收益的累计公允价值变动，按金融工具准则的规定处理——如果是指定为FVOCI的权益工具，OCI转入留存收益；如果是FVOCI（债务工具），OCI转入投资收益；（4）新的初始投资成本=原持有金融资产的公允价值+新增投资成本。转换后按权益法进行后续计量。实务中，公允价值确定是关键环节，一般需要有独立评估或明确的市场价格支持。个人理解，供参考。","cat":"长期股权投资","kw":"长期股权投资,CAS 2,权益法,成本法,重大影响,其他综合收益,衔接,公允价值,账面价值,投资收益,留存收益","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"3558","q":"使用权资产租金不确定如何确认？租赁付款额取决于未来销售量或使用量时如何处理？","a":"根据CAS 21，可变租赁付款额分为两类：（1）取决于指数或比率的付款额——计入租赁负债的初始计量和后续调整中；（2）其他可变租赁付款额（如取决于未来销售量、使用量）——在触发事件或条件发生的期间计入当期损益，不计入租赁负债。例如，商场租约中「按营业额的5%」计算的租金属于第（2）类，初始计量和后续计量均不计入租赁负债，在实际发生时确认为费用。实务中的难点是：部分租赁付款额是混合型的——一部分固定或与CPI挂钩（计入租赁负债），另一部分与营业额挂钩（发生时计入损益）。需要逐项拆分分析。个人理解，供参考。","cat":"租赁","kw":"租赁,CAS 21,使用权资产,租赁负债","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第21号——租赁"},{"id":"3557","q":"租赁变更如何会计处理？租金减免是否属于租赁变更？缩短租赁期的处理？","a":"租赁变更指原合同条款之外的对租赁范围或租赁对价的变更。租金减免如果在租赁期开始日之后发生且非原合同条款约定，属于租赁变更。根据CAS 21，租赁变更生效日应：（1）重新评估租赁期；（2）按修订后的折现率重新计量租赁负债；（3）相应调整使用权资产。如果变更导致租赁范围缩小（如缩短租赁期）或完全终止部分租赁，则按比例转出部分使用权资产和租赁负债，差额计入损益。实务中，新冠疫情期间大量租金减免的处理引发了广泛讨论——是一次性计入当期损益还是作为租赁变更调整租赁负债。两种看法都有支持者，最终取决于减免条款与原合同的关系。个人理解，供参考。","cat":"租赁","kw":"租赁,CAS 21,使用权资产,租赁负债","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第21号——租赁"},{"id":"3556","q":"售后租回交易的会计处理：构成销售的售后租回和不构成销售的售后租回有何不同？","a":"根据CAS 21，需要先判断资产转让是否构成销售（控制权是否转移）。如果构成销售：（1）卖方-承租人：仅确认与转让给买方-出租人的权利相关的利得或损失；（2）买方-出租人：按购买资产和出租资产分别处理。使用权资产的计量按原账面价值中保留使用权的比例确定。如果不构成销售：（1）卖方-承租人：不终止确认资产，将收到的款项作为金融负债；（2）买方-出租人：不确认购入资产，将支付的款项作为金融资产。实务中，判断是否构成销售需要结合CAS 14收入准则关于控制权转移的判断标准。个人理解，供参考。","cat":"租赁","kw":"租赁,CAS 21,使用权资产,租赁负债,CAS 14,账面价值,控制,终止确认","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第21号——租赁、企业会计准则第14号——收入"},{"id":"3555","q":"融资租赁和经营租赁在出租人报表中的处理有何区别？","a":"CAS 21对出租人保留了融资租赁和经营租赁的双重分类。融资租赁：出租人终止确认标的资产，同时确认应收融资租赁款（租赁投资净额），后续按实际利率法计算各期利息收入。经营租赁：出租人保留标的资产在资产负债表上，继续计提折旧，租金收入按直线法（或其他系统方法）在各租赁期内确认。判断融资租赁的标准（满足任一即属融资租赁）：（1）租赁期结束时所有权转移；（2）承租人有优惠购买选择权；（3）租赁期占资产经济寿命的大部分（一般75%以上）；（4）最低租赁收款额现值几乎相当于资产公允价值（一般90%以上）。个人理解，供参考。","cat":"租赁","kw":"租赁,CAS 21,使用权资产,租赁负债,经营租赁,融资租赁,公允价值,折旧,终止确认","src":"深圳证券交易所 会计监管动态","std_ref":"企业会计准则第21号——租赁"},{"id":"3554","q":"短期租赁和低价值资产租赁的简化处理实务中如何应用？判断门槛是什么？","a":"CAS 21提供了两项简化处理豁免：（1）短期租赁——租赁期不超过12个月（不含续租选择权的影响）；（2）低价值资产租赁——单项租赁资产在全新状态下的绝对价值较低（一般5,000美元或等值人民币以下）。两项豁免可以分别独立应用。选择豁免后，租赁付款额在租赁期内按直线法确认费用，不确认使用权资产和租赁负债。实务中需要注意的是：低价值资产的判断是基于「全新单项资产」的价值，不是基于「企业自身资产总额」的比例。一台笔记本电脑即使是大型企业的租赁也符合低价值标准。但如果该资产与其他资产高度关联（如服务器集群），则不能分割评估。个人理解，供参考。","cat":"租赁","kw":"租赁,CAS 21,使用权资产,租赁负债","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第21号——租赁"},{"id":"3553","q":"租赁激励（如园区赠送消费卡）如何处理？何时冲减使用权资产？","a":"租赁激励的处理需要区分收到时点和应归属期间。如果激励是在租赁期开始日即可确认的（如园区赠送消费卡），应在租赁期开始日将可获取消费卡的折现值确认为一项长期应收款，同时从使用权资产的初始计量金额中扣减。后续实际收到消费卡时，从长期应收款转入预付账款或其他相应科目。不能在收到时直接冲减使用权资产——这忽略了货币时间价值和权责发生制的要求。实务中，租赁激励的形式越来越多样化（装修补贴、免租期、设备赠送等），建议企业建立台账逐项追踪。个人理解，供参考。","cat":"租赁","kw":"租赁,CAS 21,使用权资产,租赁负债","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第21号——租赁"},{"id":"3552","q":"新租赁准则下，使用权资产的折旧期限如何确定？如果租赁期包含续租选择权时如何处理？","a":"根据CAS 21，使用权资产的折旧期限为租赁期与标的资产剩余使用寿命两者中的较短者。但如果租赁期结束时标的资产所有权转移给承租人（如融资租赁），则折旧期限为标的资产的剩余使用寿命。租赁期的确定需要综合考虑：（1）合同约定的不可撤销租赁期；（2）承租人合理确定将行使续租选择权所涵盖的期间；（3）承租人合理确定将不行使终止租赁选择权所涵盖的期间。实务中的判断因素包括：标的资产对承租人的重要性、续租租金与市场租金的比较、装修投入和搬迁成本等。个人理解，供参考。","cat":"租赁","kw":"租赁,CAS 21,使用权资产,租赁负债,折旧,融资租赁","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第21号——租赁"},{"id":"3551","q":"新租赁准则下，预付租金在租赁期开始日之前如何处理？现金流如何分类？","a":"租赁期开始日之前的预付租金属于「为取得租赁资产而支付的现金」，应当作为投资活动现金流列报。在财务报表的资产负债表中，该项预付应重分类至「其他非流动资产」中列报，而不计入使用权资产（因为租赁期尚未开始）。租赁期正式开始后，将预付租金转入使用权资产的初始计量金额中——作为「在租赁期开始日或之前支付的租赁付款额」的一部分。实务中需要注意，租赁开始日与租赁期开始日可能是两个不同的日期，前者是合同签订日，后者是取得资产使用权的日期。只有后者才确认使用权资产和租赁负债。个人理解，供参考。","cat":"租赁","kw":"租赁,CAS 21,使用权资产,租赁负债","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第21号——租赁"},{"id":"3550","q":"研发费用加计扣除形成的差异属于永久性差异还是暂时性差异？对递延所得税的影响是什么？","a":"研发费用加计扣除属于永久性差异，不会产生递延所得税影响。原因是：加计扣除在计算当期应纳税所得额时发生，不改变各项资产或负债的计税基础，也不在以后期间转回。这与资产减值准备的「时间性差异」不同——减值准备在计提当期减少会计利润但不减少应纳税所得额（形成可抵扣暂时性差异），在以后期间实际发生损失时税前扣除（转回差异）。加计扣除仅一次性影响当期所得税费用（通过减少应纳税所得额），不涉及递延所得税资产的确认。个人理解，供参考。","cat":"所得税","kw":"所得税,CAS 18,递延所得税,应纳税所得额,暂时性差异,递延所得税资产","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第18号——所得税"},{"id":"3549","q":"关联方交易的转让定价调整对所得税的影响如何处理？","a":"首先，企业应当确保关联方交易遵循独立交易原则。如果税务机关在后续检查中对企业进行转让定价调整，该调整可以影响两个层面：（1）已申报的应纳税所得额；（2）关联方之间的应收应付款项。对于未决税务评估事项，企业应评估是否需要确认「应付税款（税务负债）」的最佳估计金额，在资产负债表中列报为「应交税费」或「预计负债」（取决于评估事项的阶段）。如果企业认为被调整的可能性较低，可在附注中披露为「或有负债」。实务中，大型跨国集团的转让定价争议通常涉及重大金额，需要充分披露并合理估计。个人理解，供参考。","cat":"所得税","kw":"所得税,CAS 18,递延所得税,应纳税所得额,暂时性差异,关联方,预计负债","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第18号——所得税"},{"id":"3548","q":"企业合并中，被购买方可辨认净资产的评估增值产生的递延所得税负债如何处理？","a":"在非同一控制下企业合并中，被购买方的可辨认资产在合并报表中按公允价值计量，而计税基础保持原账面价值。公允价值超过计税基础的部分形成应纳税暂时性差异，必须确认递延所得税负债。该递延所得税负债增加被购买方可辨认净资产的公允价值，从而影响商誉的计算。案例：固定资产评估增值1,000万元（税率25%），确认250万元递延所得税负债，可辨认净资产仅增加750万元（而非1,000万元）。实务中，购买日评估完成后，后续每个资产负债表日需要重新计量递延所得税负债（除非商誉后续发生减值）。个人理解，供参考。","cat":"所得税","kw":"所得税,CAS 18,递延所得税,应纳税所得额,暂时性差异,递延所得税负债,合并,公允价值,账面价值,控制,商誉","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第18号——所得税"},{"id":"3547","q":"企业计提的资产减值准备何时确认递延所得税资产？所有减值准备都能确认吗？","a":"资产减值准备形成的可抵扣暂时性差异，只有在「很可能获得足够的应纳税所得额」时才确认递延所得税资产。并非所有减值准备都能确认递延所得税资产。例如，企业计提了大量应收账款坏账准备，但历史数据显示实际核销比例极低，那么未来实际发生坏账的可能性不足以支撑确认全部递延所得税资产。又如，企业计提的商誉减值准备，其计税基础与账面价值的差异属于CAS 18规定的「初始确认豁免」范围，一般不确认对应的递延所得税。实务中建议对各项减值准备分别评估其未来税前扣除的可能性和时间，分项判断确认条件。个人理解，供参考。","cat":"所得税","kw":"所得税,CAS 18,递延所得税,应纳税所得额,暂时性差异,递延所得税资产,账面价值,坏账,商誉","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第18号——所得税、企业会计准则第22号——金融工具确认和计量"},{"id":"CY0060","q":"【求助陈版主】加计抵减政策到期原来结余的加计抵减额怎么处理","a":"参照财政部会计司2019年4⽉发布的“关于《关于深化增值税改⾰有关政策的公告》适⽤《增值税会计处理规定》有关问题的解读”：（ http://kjs.mof.gov.cn/zhengcejiedu/201904/t20190418_3227486.htm） ⽣产、⽣活性服务业纳税⼈取得资产或接受劳务时，应当按照《增值税会计处理规定》的相关规定对增值税相关业务进⾏会计处理；实际缴纳增值税时，按应纳税额借记“应交税费——未交增值税”等科⽬，按实际纳税⾦额贷 记“银⾏存款”科⽬，按加计抵减的⾦额贷记“其他收益”科⽬。 即，会计处理原则是在实际缴纳增值税时确认其他收益，类似于收付实现制，⽽不是权责发⽣制。在这种情况下， 留待以后年度享受的抵减额可以在帐外备查登记，但不会出现在账⾯上。也就是⼀般情况下不应出现“账⾯结余的 加计抵减额（涉及之前年度）”。建议检查此前的会计处理是否符合上述规定，如不符合的，则应进⾏差错更正处 理。个人理解，供参考。","cat":"所得税","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0069","q":"退回以前年度多缴纳税款","a":"以前年度多交税款是如何形成的？是否表明存在前期差错？⾸先要明确这个问题，才能判断收到的款项是冲减本年度的所得税费⽤、调整以前年度损益还是其他处理。个人理解，供参考。","cat":"所得税","kw":"所得税","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3544","q":"企业亏损确认递延所得税资产后，以后年度仍未盈利，是否需要冲回？","a":"每个资产负债表日都需要重新评估递延所得税资产的账面价值。如果评估后发现未来很可能无法获得足够的应纳税所得额，应当减记递延所得税资产的账面价值。这种减记在以后期间，如果情况发生改变且又很可能获得足够的应纳税所得额时，可以转回。实务中，税务机关对亏损确认的递延所得税资产关注度极高，审计师也通常对此保持职业怀疑态度。建议企业建立详细的递延所得税资产跟踪台账，记录每个差异项目对应的预计转回期间和转回金额。个人理解，供参考。","cat":"所得税","kw":"所得税,CAS 18,递延所得税,应纳税所得额,暂时性差异,递延所得税资产,账面价值,审计","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第18号——所得税"},{"id":"3543","q":"递延所得税资产的确认条件是什么？如何判断「很可能获得足够的应纳税所得额」？","a":"根据CAS 18，递延所得税资产的确认条件是：很可能获得足够的应纳税所得额以利用可抵扣暂时性差异。判断「很可能」的核心方法：（1）查看是否存在足够的应纳税暂时性差异——应纳税暂时性差异转回时产生应纳税所得额，可用于抵扣；（2）评估未来的经营盈利预测——管理层批准的盈利预测是最主要的证据；（3）检查是否存在税务筹划机会。特别注意：持续亏损企业，需要有非常强有力的证据（如已签署的大额合同、扭亏计划的外部认可等）才能证明未来盈利的可能性。如果近三年持续发生重大亏损，一般不得确认递延所得税资产（除非存在上述强有力的证据）。个人理解，供参考。","cat":"所得税","kw":"所得税,CAS 18,递延所得税,应纳税所得额,暂时性差异,递延所得税资产","src":"财政部 企业会计准则解释公告","std_ref":"企业会计准则第18号——所得税"},{"id":"3542","q":"资产组内部分资产单独处置时，如何确定处置部分的账面净值？","a":"最理想的情况是查阅历史账务资料，确定实际购置成本及各组成部分的分摊金额。如果不可行，可以参照以下方法：（1）参照市场价格或工程定额标准确定重置成本；（2）聘请评估机构采用重置成本法进行评估；（3）如果金额不重大，可以按处置价值处理（即以处置收入作为账面净值来简化处理）。实务中，对于总价打包购置的资产组（如变电站整体、整条生产线），如果没有分部件报价，在部分处置时确定账面净值确实存在困难。建议企业建立固定资产卡片时尽量细化到可独立处置的最小单元，以备将来处置时的核算需要。个人理解，供参考。","cat":"资产减值","kw":"资产减值,CAS 8,可收回金额,减值测试,资产组","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第8号——资产减值、企业会计准则第2号——长期股权投资"},{"id":"3541","q":"以0对价转让子公司全部股权时，是否需要对子公司计提减值准备？","a":"以0对价转让子公司，首先应评估在签约日之前或合约期间是否已存在减值迹象。如果在此之前子公司已经持续亏损、净资产为负且没有改善预期，应当对长期股权投资计提减值准备。计提减值后，账面价值为0，此时0对价转让不再产生额外的处置损益。如果之前未计提减值，表面上是0对价处置确认大额亏损，实际上是先前年份少计提了减值准备。实务中建议定期评估长投减值迹象，避免出现处置年度集中确认大额亏损的情况。审计师也会关注「0对价转让」背后的商业逻辑和减值测试的及时性。个人理解，供参考。","cat":"资产减值","kw":"资产减值,CAS 8,可收回金额,减值测试,资产组,子公司,账面价值,审计","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第8号——资产减值"},{"id":"3540","q":"长期资产（固定资产、无形资产）减值损失能否转回？与存货减值有何不同？","a":"根据CAS 8，已确认的长期资产（固定资产、无形资产、长期股权投资、商誉等）减值损失不得在以后期间转回。原因在于，长期资产的使用寿命较长，如果允许转回，可能被用作盈余管理的工具。相比之下，存货减值的处理不同（CAS 1）：存货跌价准备在影响因素消失且可变现净值回升时可以转回，因为存货一般在短期内出售或消耗，市场价格的波动更及时、更客观地反映在可变现净值中。实务中企业应当在资产负债表日重新复核存货可变现净值，及时转回不适当的跌价准备。个人理解，供参考。","cat":"资产减值","kw":"资产减值,CAS 8,可收回金额,减值测试,资产组,CAS 1,可变现净值,商誉","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第8号——资产减值、企业会计准则第1号——存货"},{"id":"3539","q":"商誉减值测试的频率是多少？什么情况下可以在年中测试？","a":"根据CAS 8，企业合并形成的商誉，至少应当在每年年度终了进行减值测试。但出现以下情况时应在年中追加测试：（1）企业所处的经济、技术或法律环境在年度中间发生重大不利变化；（2）企业的实际经营成果显著低于或将要低于预算或预期；（3）企业计划处置或重组相关业务；（4）相关资产组或资产组组合的市价发生大幅下跌。实务中建议建立商誉减值的持续监控机制，在编制每季度或每半年财务报表时评估是否有减值迹象，不能只在年报时才做测试。个人理解，供参考。","cat":"资产减值","kw":"资产减值,CAS 8,可收回金额,减值测试,资产组,商誉,合并","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第8号——资产减值"},{"id":"CY0139","q":"求助陈版-长期股权投资初始成本变动处理","a":"该情况属于在购买⽇后补充约定的价格调整安排，与当初的股权收购不构成⼀揽⼦交易，但也不能直接按照豁免的价款对长期股权投资成本进⾏调整，⽽是应当参照或有对价的处理⽅式，⾸先对现有的长期股权投资进⾏减值测试并计提减值准备，确认减值损失；其次，如果账⾯上已将尚未⽀付的收购款21万元确认为负债的，则将该负债转⼊营业外收⼊。理论上，前述减值损失⾦额不应⼩于营业外收⼊⾦额。个人理解，供参考。","cat":"资产减值","kw":"减值","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0183","q":"存货减值 是否可依赖评估报告","a":"在减值测试中将评估结果作为参考是常见的情况，关键是该评估的⽬的、⽅法、参数等是否与委托⽬的（进⾏资产减值测试）相适应。另外，在“存货近期⽆消息，⽆法确认可变现净值”的情况下，为何评估机构能够通过某些⽅法确定可收回⾦额？这种情形下确定的可变现净值是否可靠和可依赖？这些都是需要关注的问题。 尤其要注意：不能以资产基础法（成本法）的评估结果作为减值依据。对于存货，减值评估应采⽤市场法。个人理解，供参考。","cat":"资产减值","kw":"减值,成本法","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3536","q":"企业持续亏损的情况下，是否可以就可抵扣暂时性差异确认递延所得税资产？","a":"首先要区分暂时性差异的来源。对于持续亏损企业，在尚未就可抵扣亏损足额确认递延所得税资产的情况下，不应就其他可抵扣暂时性差异确认递延所得税资产。原因在于：企业缺乏转让定价或税务筹划的空间（因为持续亏损本身表明未来难以获得足够的应纳税所得额）。例外情形是：与租赁负债对应的使用权资产产生的可抵扣暂时性差异，可能可以根据IAS 12（CAS 18）的初始确认豁免原则做特殊处理。这是持续亏损实务中唯一可能确认的可抵扣暂时性差异类型。个人理解，供参考。","cat":"资产减值","kw":"资产减值,CAS 8,可收回金额,减值测试,资产组,CAS 18,递延所得税资产,所得税,暂时性差异","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第8号——资产减值、企业会计准则第18号——所得税"},{"id":"3535","q":"商誉减值测试中，资产组或资产组组合如何划分？总部资产如何分摊？","a":"根据CAS 8，商誉减值测试应以相关的资产组或资产组组合为单位进行。资产组划分的核心原则是：（1）独立产生现金流入的最小资产组合；（2）与企业管理层监控经营的方式一致；（3）与内部管理报告结构一致。总部资产（如总部大楼、管理信息系统等）不能单独产生独立现金流入，需要按照合理且一致的基础分摊至各资产组。分摊方法通常按资产组占用的资产规模或预期收益权重进行。实务中需要注意：资产组划分一旦确定，不应随意变更，避免通过「调整资产组边界」来回避减值。个人理解，供参考。","cat":"资产减值","kw":"资产减值,CAS 8,可收回金额,减值测试,资产组,商誉","src":"深圳证券交易所 会计监管动态","std_ref":"企业会计准则第8号——资产减值"},{"id":"CY1337","q":"陈版主，掉期业务截⽌报表⽇公允价值重估问题","a":"此类交易的近端和远端是⼀个整体交易的两个步骤，因此在对该项⾦融⼯具估值时应作为⼀个整体予以考虑，远端和近端应同时进⾏公允价值重估。 从主帖信息来看，也有另⼀种可能性，即如果两笔交易的美元⾦额相同，则该安排实际上是以⼀定的美元为质押，取得三个⽉期的⼈⺠币借款，其交易⽬的并不是为了缓解美元的汇率⻛险。如果是，则也可以采⽤简化处理，在⽬前只有承诺⽽未实际发⽣交易的情况下，⽆需进⾏会计处理。个人理解，供参考。","cat":"金融工具","kw":"公允价值","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3533","q":"同一控制下股权转让，转让方个别报表是否确认投资收益？","a":"同一控制下，转让方可以正常确认投资收益，前提是交易价格公允且具有合理商业理由。不能基于「集团整体视角的处理」来否定个别报表层面的损益确认。具体而言，如果母公司将子公司股权按评估公允价值全部转让给另一子公司，母公司的个别报表中应将转让对价与长期股权投资账面价值的差额计入投资收益。但在合并报表层面，该内部交易需要全额抵消。所谓「权益性交易不确认收益」的观点存在片面性——个别报表和合并报表的处理原则本就不同，两者各行其道。个人理解，供参考。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,投资收益,控制,账面价值,合并,子公司,母公司","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"3532","q":"权益法核算中，潜在表决权（如可转换债券、认股权证）是否影响长期股权投资的确认？","a":"权益法核算只考虑目前实际持有的股权比例，不考虑潜在表决权的影响。具体而言，在未实际行权之前，企业不能基于假设行权后的持股比例进行权益法核算。例如：企业目前持有被投资方30%股权（具有重大影响），同时还持有可转换债券（转换后可获得额外5%股权），在转换前仍只能按30%的比例进行权益法核算。潜在表决权只在判断是否构成「控制」（CAS 33）时需要考虑（评估其是否属于「现时可执行的实质性权利」），权益法下不涉及此考量。个人理解，供参考。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,CAS 33,控制,重大影响","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报、企业会计准则第33号——合并财务报表、企业会计准则第2号——长期股权投资"},{"id":"CY1382","q":"求助陈⽼师！外汇掉期业务会计处理","a":"我理解，假设公司的本位币不是美元，则该安排并不能转移或者化解美元的汇率⻛险，因为在交易前后，公司所持有的5000万美元都不会发⽣变化。该交易更接近于以5000万美元为质押借⼊ ⼈⺠币和⽇元（如主帖所述“提⾼美元资⾦的收益”）。因此不涉及运⽤套期会计⽅法。个人理解，供参考。","cat":"金融工具","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3530","q":"可转债的发行方如何处理？负债成分和权益成分如何拆分计量？","a":"根据CAS 22和CAS 37，可转债属于复合金融工具。发行方应首先确定金融负债成分的公允价值——未来应付本金和利息的折现值（以同类不含转股权的债务工具的市场利率折现）。然后，将发行价格与负债成分公允价值的差额分配至权益成分（其他权益工具）。初始确认后：（1）负债成分按摊余成本后续计量，利息费用按实际利率法计入损益；（2）权益成分不再重新计量。转股时，将负债成分的账面价值与权益成分一并转出，相应增加股本和资本溢价。实务中的难点是折现率的确定——需要寻找或构建不含转股权的可比债务工具。个人理解，供参考。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,CAS 37,账面价值","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"3529","q":"企业持有的理财产品如何分类？银行的结构性存款如何列报？","a":"理财产品需要根据其合同现金流量特征（SPPI测试）和业务模式进行三分类。银行发行的保本保收益型结构性存款，其合同现金流量仅为本金加上与银行信用风险相关的基本借贷安排，一般可通过SPPI测试，如果业务模式为持有收取合同现金流量，可分类为按摊余成本计量的金融资产。非保本浮动收益型理财产品，其收益与投资标的（股票、债券、外汇等）的市场表现挂钩，不满足SPPI条件，应分类为FVTPL。实务中，资产负债表中通常将期限在一年以内的列报为「交易性金融资产」，一年以上的列报为「其他非流动金融资产」。个人理解，供参考。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,外汇","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"3528","q":"金融负债和权益工具的区分：永续债在发行方报表中的处理？","a":"这个问题的核心是判断发行方是否拥有「无条件避免交付现金或其他金融资产」的权利。如果可以无条件避免（如发行方有自主决定权推迟付息且无累计义务），则分类为权益工具；否则为金融负债。实务中的判断维度：（1）是否存在不可避免的赎回义务——有则金融负债；（2）递延付息条款——如果递延付息是非累计的且没有经济约束，则可能支持权益分类；（3）清算时的清偿顺序——如果劣后于所有其他负债，支持权益分类。永续债的发行人应综合考虑这些因素进行判断，不能仅看名称。个人理解，供参考。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"3527","q":"SPPI测试（合同现金流量特征测试）的实务应用，含有杠杆的结构化产品能否通过SPPI测试？","a":"SPPI测试的核心是判断金融资产的合同现金流量是否仅为对本金和未偿付本金金额之利息的支付。如果合同条款引入了与基本借贷安排无关的风险或波动性敞口（如权益价格、商品价格、汇率变动等），则不满足SPPI条件，应分类为FVTPL。含有杠杆的结构化产品，如果杠杆放大了利息与基础利率之间的关系，使得现金流量波动性显著增加，一般不能通过SPPI测试。实务中的判断要点：看合同中是否包含任何改变现金流时点或金额的条款，是否存在与被投资方经营业绩挂钩的收益分成等。个人理解，供参考。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,汇率","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"3526","q":"预期信用损失模型（ECL）下，应收账款减值如何计提？三阶段模型的实务应用要点是什么？","a":"根据CAS 22，应收账款减值应按预期信用损失模型处理。对于不含重大融资成分的应收账款，可以采用简化方法（始终按整个存续期预期信用损失计提）。实务中常用的思路：（1）建立应收账款迁徙矩阵——分析历史回款数据，计算不同账龄的迁徙率和违约损失率；（2）结合前瞻性信息——经济环境变化、行业趋势等对信用风险进行调整；（3）单项重大评估与组合评估结合——金额重大的应收账款单独评估，其余按组合计提。第一阶段（信用风险未显著增加）：12个月ECL；第二阶段（信用风险显著增加）：整个存续期ECL；第三阶段（发生信用减值）：整个存续期ECL。个人理解，供参考。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,预期信用损失,信用损失,ECL,迁徙率","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"3525","q":"支付方式变更（电汇变更为银承/信用证/商票/供应链金融）是否属于债务重组？","a":"判断的核心是：是否实质性改变了偿还金额、利息或期限。具体分析如下：（1）电汇变更为支票：一般无需作为债务重组，因为本金、利息、支付期限、信用风险均无明显差异。（2）电汇变更为银行承兑汇票或信用证：需具体分析。如果信用风险未明显增加但支付期限拉长，则属于债务重组；如果期限相同则不属于。（3）电汇变更为商业承兑汇票：关键看支付期限是否变化。如果为他人背书的商票，还需评估信用风险变化。（4）供应链金融：同理，需同时考虑信用风险和付款期限是否实质性变化。个人理解，供参考。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,债务重组","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"CY1486","q":"项⽬投资款及分红的账务处理","a":"这类交易中，作为接受投资⽅，因为分红与项⽬收益挂钩，并⾮固定收益，因此就取得投资款和投资⽅在该项⽬中的权益所确认的负债不属于以摊余成本计量的⾦融负债，相应地分配给投资 ⽅的收益不能视为利息，该分配额计⼊营业成本更合理。个人理解，供参考。","cat":"金融工具","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY1665","q":"请教陈版主：处置投资业务收到的现⾦，现⾦流量表中如何列报？","a":"采⽤⽅案⼀，全部作为“收回投资收到的现⾦”。依据：《应⽤指南汇编2024》P1227： (1 ) 收回投资收到的现⾦。 本项⽬反映企业出售、转让或到期收回除现⾦等价物以外的分类为以公允价值计批且其变动计⼊当期损益的⾦融资产（以下简称交易性⾦融资产） 、分类为以摊余成本计量的⾦融资产（以下简称债权投资）、分类为以公允价值计量且其变动计⼊其他综合收益的⾦融资产（以下简称其他债权投资）、指定为以公允价值计量且其变动计⼊其他综合收益的⾦融资产（ 以下简称其他权益⼯具投资）、⻓期股权投资等⽽收到的现⾦，但不包括侦权性投资收回的利息、收回的⾮现⾦资产，以及处置⼦公司及其他营业单位收到的现⾦净额。债权性投资收回的本⾦，在本项⽬反映，债权性投资收回的利息，不在本项⽬中反映，⽽在“ 取得投资收益收到的现⾦” 项⽬中反映。处置⼦公司及其他营业单位收到的现⾦净额单设项⽬反映。本项⽬可以根据“交易性⾦融资 产”、 ＂债权投资”、“其他债权投资” 、“其他权益丁具投资” 、“⻓期股权投资”、“库存现⾦”、“银⾏存款”等科⽬的记录分析填列。个人理解，供参考。","cat":"金融工具","kw":"公允价值","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0056","q":"求助陈版主亏损合同中标的资产的概念.","a":"为该项⽬预付的材料设备款项属于亏损合同中的标的资产，应对其计提减值准备。但不能将全部预计合同亏损都通过对这些资产计提减值来体现。对这些资产计提的减值准备不能超出其账⾯价值与预计亏损率（负⽑利率）的乘 积。合同预计亏损超出可针对该合同相关资产计提的减值准备的部分，确认为亏损合同相关预计负债。个人理解，供参考。","cat":"收入准则","kw":"减值,预计负债","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3521","q":"新收入准则下，收入确认时点的判断——控制权转移的标志有哪些？","a":"根据CAS 14，在某一时点履行履约义务的企业，应当在客户取得相关商品控制权时确认收入。判断控制权转移的标志包括：（1）企业就该商品享有现时收款权利（即客户就该商品负有现时付款义务）；（2）企业已将该商品的法定所有权转移给客户；（3）企业已将该商品实物转移给客户；（4）企业已将该商品所有权上的主要风险和报酬转移给客户；（5）客户已接受该商品。这些标志应综合考量，不能孤立使用。实务中出口销售的收入确认时点判断最为复杂，需要结合具体的贸易术语（INCOTERMS）、合同条款综合判断。个人理解，供参考。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14,控制","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第14号——收入"},{"id":"CY0058","q":"求助陈版主关于新公司法下，长期股权投资的确认问题","a":"如果各⽅股东约定按实缴出资⽐例享有股东权利的，则不论是否约定了出资期限，各股东均⽆需将⾃⾝尚未实缴的出资确认为对被投资企业的投资成本和应付投资款。因为这属于待执⾏合同。根据或有事项准则规定，待执⾏合同除⾮变为亏损合同，否则⽆需确认资产和负债。 如果按照认缴⽐例享有权益，则认缴⽐例⼤于实缴⽐例的股东相当于接受了其他股东让渡的利益，此时应确认对其他股东（让出利益的股东）的负债，对应确认为长期股权投资。但此时的负债是对其他股东的，⽽不是对被投资企业的。个人理解，供参考。","cat":"收入准则","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3519","q":"新收入准则下，企业为获取合同而发生的增量成本（如销售佣金）如何处理？","a":"根据CAS 14，企业为取得合同发生的增量成本（即不取得合同就不会发生的成本），预期能够收回的，应当作为合同取得成本确认为一项资产。该资产在确认相关收入的同时系统摊销。实务中常见的增量成本包括：销售佣金、渠道介绍费、投标保证金（不含可退回的）等。合同取得成本的资本化条件需要同时满足：（1）属于增量成本；（2）预期能收回。摊销期限一般不应超过合同期限。如果合同期限小于一年，可采用简化处理方法直接在发生时计入当期损益。个人理解，供参考。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14,摊销,资本化","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第14号——收入、企业会计准则第17号——借款费用"},{"id":"CY0059","q":"买断式订阅收⼊如何确认","a":"履约义务的内容仍然是依托本企业所搭建的⽹络环境向客户提供包含各项软件功能的服务。应当可以满⾜“客户在企业履约的同时即取得并消耗企业履约所带来的经济利益”的条件，因此属于时段履约，合同总价款应在服务期内采⽤系统、合理的⽅式分摊确认收⼊。 提问⼈：7847748 时间：2024-06-26 11:31:23 您好陈⽼师，这个问题就在于合同签订为买断式，⽆服务期间，平台永久使⽤。后续⽀付年运营维护费，如果客户需要版本更新迭代也需再⽀付费⽤。这种永久卖断平台使⽤权，可以⼀次确认收⼊吗？还是需要考虑客户的⽣命周期，在产品声明周期内分期确认，这种预估服务期间依据不好提供，这个收⼊确认是按时点法还是按时段法？依据是什么呢？ 回答⼈：chenyiwei 理论上考虑⽣命周期。实务中⼀般按不短于10年。个人理解，供参考。","cat":"收入准则","kw":"履约义务","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3517","q":"新收入准则下，销售返利（促销奖励）的确认时点是什么？年末尚未结算的返利如何处理？","a":"销售返利属于可变对价。根据CAS 14，企业应当在合同开始时估计交易价格时，将预期支付给客户的返利金额从交易价格中扣除。年末尚未结算的返利，应当按照预期价值法（即基于历史返利率或合同约定条件）估计期末应确认的返利负债。具体操作：（1）每个报告期末，重新评估预期返利金额；（2）将差异调整当期收入。实务中，如果返利金额重大且估计不确定性高，应当注意信息披露的充分性。特别注意：不能等到返利实际支付时才确认——这会低估当期收入且不符合权责发生制原则。个人理解，供参考。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14,信息披露","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第14号——收入"},{"id":"3516","q":"新收入准则下，客户未行权的权利（如过期积分）何时确认收入？","a":"根据CAS 14，客户未行使的权利（如会员积分、储值卡余额）是企业向客户收取的预收款。企业预期有权获得客户未行使权利对应的金额时，应当按照客户行使权利的模式，按比例将未行使权利对应的金额确认为收入。实务中需要建立客户行为模型，基于历史数据分析积分兑换率或储值卡使用率（预期价值法），按照该比例逐步确认收入。如果有证据表明剩余未行使权利金额的绝大部分（如超过97%）预期不会被行使，可以在确定该事实时一次性确认。个人理解，供参考。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第14号——收入"},{"id":"3515","q":"分期收款销售商品应如何处理？按有重大融资成分的销售还是融资租赁处理？","a":"两者在实践中效果相同，没有本质区别。从准则适用的角度看，如果企业销售商品但给予客户分期付款的融资安排，属于CAS 14收入准则的适用范围；如果融资成分重大，需要按折现值确认收入。从融资租赁的角度看（CAS 21），该项交易也可能满足「转移了资产所有权相关的几乎全部风险和报酬」的条件。但不管从哪个角度处理，最终的收入确认金额、利息收入的确认节奏基本一致。实务中行业惯例通常是按收入准则下的重大融资成分处理更为自然，但两种做法都不算错。个人理解，供参考。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14,CAS 21,融资租赁","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第14号——收入、企业会计准则第21号——租赁"},{"id":"3514","q":"境外销售佣金费用支出应在何时确认？合同规定佣金在收到全部回款后再支付，费用确认时点如何判断？","a":"佣金属于CAS 14下的合同取得成本。根据收入准则，合同取得成本应当在确认相关收入的同时计入损益，与付款时间无关。即使合同约定佣金在收到全部回款后才支付，这不改变「现时义务」的存在。公司已通过代理商获取了销售订单，代理商已完成其履约义务，企业在确认销售收入的同时，应当确认相应的佣金费用。付款条件尚未满足不影响义务的确认。实务中，对应的负债应入账在「应付账款」或「其他应付款」科目下，待实际支付时冲销。个人理解，供参考。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第14号——收入"},{"id":"CY0065","q":"再请教陈版，关于融资租赁模式下承租⼈会计处理的问题","a":"这种“以租代买”交易，⽆需确认使⽤权资产和租赁负债，就按照分期付款购买设备处理即可。 我们理解，这种融资租赁协议，名为直租，实际上融资租赁公司仅提供融资，租赁资产的控制权由供应商直接转移给承租⼈，出租⼈实质上是以租赁物为抵押，以代付资产购建款项的形式向承租⼈提供融资。因此，对于此类租 赁，可以参照原租赁准则下的“售后回租构成融资租赁”或者新租赁准则下的“售后租回中的资产出售不构成销售”进 ⾏会计处理，不使⽤“使⽤权资产”和“租赁负债”科⽬。即承租⼈的处理要点为：个人理解，供参考。","cat":"收入准则","kw":"控制权,租赁","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3512","q":"集采降价导致的经销商补偿如何会计处理？以实物形式补偿客户的已购产品未来降价损失应如何处理？","a":"这属于典型的可变对价问题，但应认定为可变对价比额外购买选择权更合理。核心原因是：补偿是由卖方主动发起、客户被动接受的，客户并未拥有实质性权利去选择是否获取该补偿。因此，公司应将部分收入递延到后期补偿实际发生时确认。具体做法：在初次销售时，根据历史经验和市场预测估计未来需要补偿的金额（预期价值法），将这部分金额从初始交易价格中扣除，确认为合同负债，在实际发放补偿时转入收入。实务中，如果补偿金额重大且难以合理估计，需要充分的披露。个人理解，供参考。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14,合同负债","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第14号——收入"},{"id":"CY0066","q":"供销商的保理合同计⼊短期借款还是其他流动负债？","a":"此问题可以结合《企业会计准则解释第17号》第⼆条对供应商融资安排披露的规定来理解。 当涉及供应商融资安排的时候，企业应付供应商款项的性质有可能发⽣了变化。企业需结合融资安排相关条款，分析其商业实质，根据CAS 22关于⾦融负债终⽌确认等相关规定，确定原应付账款是否应终⽌确认并重新确认⼀项对融资提供⽅的“借款”。对于其商业实质的判断，除了影响资产负债表列报项⽬以外，也会影响现⾦流量表的列报项⽬，如企业根据约定的条款认定属于买⽅融资，判断应付供应商款项应终⽌确认并转列报于短期借款，则企业还款时的现⾦流将不再属于经营活动现⾦流，⽽是筹资活动现⾦流。 关于融资提供⽅⽀付供应商款项后企业原应付供应商款项的具体列报项⽬，我们的倾向性观点为（假设期限均为⼀年以内）： 商业实质判断 融资提供⽅ 资产负债表列报 还款现⾦流量列报 属于企业⾃⾝的融资⾏为 银⾏或其他⾦融机构 短期借款 筹资活动现⾦流 ⾮⾦融机构 其他流动负债 不属于企业⾃⾝的融资⾏为 ⽆需区分 应付账款 经营活动现⾦流 注1：融资提供⽅向供应商⽀付款项的时候通常不会通过企业，当该⽀付现⾦流没有通过企业流转的时候，企业不应将其反映在现⾦流量表中。 注2：《附录—会计科⽬和主要账务处理》中关于短期借款的规定：“本科⽬核算企业向银⾏或其他⾦融机构等借⼊的期限在1年以下（含1年）的各种借款。” 关于⾦融负债的终⽌确认，CAS 22规定： 第⼗⼆条 ⾦融负债（或其⼀部分）的现时义务已经解除的，企业应当终⽌确认该⾦融负债（或该部分⾦融负债）。 第⼗三条 企业（借⼊⽅）与借出⽅之间签订协议，以承担新⾦融负债⽅式替换原⾦融负债，且新⾦融负债与原⾦融负债的合同条款实质上不同的，企业应当终⽌确认原⾦融负债，同时确认⼀项新⾦融负债。 企业对原⾦融负债（或其⼀部分）的合同条款做出实质性修改的，应当终⽌确认原⾦融负债，同时按照修改后的条款确认⼀项新⾦融负债。 第⼗四条 ⾦融负债（或其⼀部分）终⽌确认的，企业应当将其账⾯价值与⽀付的对价（包括转出的⾮现⾦资产或承担的负债）之间的差额，计⼊当期损益。 CAS 22应⽤指南中关于“实质上不同”的规定：其中，“实质上不同”是指按照新的合同条款，⾦融负债未来现⾦流量 （包括⽀付和收取的任何费⽤）现值与原⾦融负债的剩余期间现⾦流量现值之间的差异⾄少相差10%。有关现值的计算均采⽤原⾦融负债的实际利率。我们理解该规定主要是针对同⼀债务⼈负债前后数量上的变化。供应商融资安排由于融资提供⽅的存在，债务的性质很可能也发⽣了变化。 当企业根据供应商融资安排的条款判断融资提供⽅为企业⽀付的供应商款项属于其⾃⾝的融资⾏为时，我们理解该负债的条款在性质上与原应付供应商款项具有实质上的不同，应终⽌确认原应付账款，确认⼀项新的⾦融负债（如短期借款或其他流动负债）。 企业在判断供应商融资安排是否属于其⾃⾝融资⾏为时，通常主要从以下⼏个⽅⾯综合予以考虑： 实施供应商融资安排的⽬的是什么？ 供应商融资安排与商品或服务的采购是否为⼀揽⼦交易，即供应商是否在实施该融资安排的前提下才同意商务合同中约定的结算和价格条款？ 供应商融资安排是否修改了原与供应商的付款约定，如变更了企业的付款⽇期？ 与融资提供⽅的条款商议（如利率或折现率）由谁主导谈判？ 融资安排相关费⽤或利息由谁承担？ 企业是否向融资提供⽅提供了增信、交叉违约、由第三⽅承担连带责任，或提供其他形式的担保？ 企业是否获得了提前付款的现⾦折扣或商业折扣等优惠？ 款项到期时是否为融资提供⽅提供了直接从企业现有银⾏账户直接划款的权利？ 供应商融资安排是否占⽤企业在融资提供⽅的授信额度？ 从本案例来看，从中获得融资利益的主要是N公司（供应商），假设Y公司未获得其他利益。如果该保理占⽤的是 Y在Z银⾏的信⽤额度，则Y公司可能确认为短期借款更合理；如果占⽤的是N公司⾃⾝的授信额度，则Y公司应保 持原科⽬（应付账款）不变。个人理解，供参考。","cat":"收入准则","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0033","q":"求助陈版主关于购买少数股东权益时，少数股东损益的确认","a":"可以这样理解。 由此导致少数股东权益有⼀项调整额（为了确保期初少数股权+本期少数股东损益等于期末少数股东权益，⽽加上的⼀项调整⾦额，对应于归母权益中的资本公积变动），应作为“所有者投⼊和减少资本——其他”列报于合并权益变动表中。个人理解，供参考。","cat":"合并报表","kw":"合并,少数股东","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3509","q":"母公司处置子公司部分股权但未丧失控制权，个别报表和合并报表分别如何处理？","a":"个别报表层面，按处置长期股权投资处理，处置对价与处置部分账面价值的差额计入投资收益。合并报表层面则完全不同：由于未丧失控制权，处置部分股权属于权益性交易，不确认投资收益。处置对价与处置部分对应的子公司净资产份额（含商誉）的差额，直接调整资本公积。两者的差异在合并工作底稿中通过抵销分录消除。实务中需要特别注意，处置部分子公司股权后，合并报表中商誉的账面价值不变，因为控制权未变。个人理解，供参考。","cat":"合并报表","kw":"合并报表,CAS 33,抵销,少数股东,控制权,合并,子公司,母公司,控制,账面价值,投资收益,资本公积,商誉","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"3508","q":"合并报表中，少数股权收购（收购子公司少数股东权益）如何处理？是否产生商誉？","a":"根据CAS 33，母公司收购子公司少数股权属于权益性交易，不产生新的商誉。购买对价与应享有子公司净资产份额（按新持股比例计算）之间的差额，直接调整资本公积（资本溢价）；资本公积不足冲减的，依次冲减盈余公积和未分配利润。这与取得控制权的企业合并完全不同——后者会产生商誉或负商誉。实务中经常混淆的点是：如果母公司先购买少数股权再取得控制权，各阶段的处理方法是不同的——少数股权阶段是权益性交易，取得控制权阶段是企业合并。个人理解，供参考。","cat":"合并报表","kw":"合并报表,CAS 33,抵销,少数股东,控制权,合并,收购,子公司,商誉,资本公积,母公司,控制,未分配利润","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY0040","q":"求助陈版主 母⼦颠倒式重组合并会计处理？","a":"A公司个别报表层⾯，按照其对B的长期股权投资的原账⾯价值，依次冲减资本公积（资本溢价）、盈余公积、未分配利润。 B公司取得A公司股权按同⼀控制下合并处理，以合并⽇（划⼊⽇）A公司账⾯净资产（如A公司有其他⼦公司的， 则按合并报表中的归母净资产⼜径）的90%作为长期股权投资成本，对应贷记资本公积。个人理解，供参考。","cat":"合并报表","kw":"合并","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3506","q":"合并报表中如何判断一致行动协议是否导致控制？受托表决权是否形成控制？","a":"首先看一致行动协议。如果协议约定各方在股东大会表决时行权必须一致，且投资方在一致行动体中有主导地位（如拥有最终决策权或一票否决权），则可能构成控制。关键看权力是否「现时可执行的实质性权利」。再看受托表决权。如果受托人可自主行使表决权（即委托方没有保留实质性罢免权），则受托人可能拥有对被投资方的权力。但如果委托方可随时无条件罢免受托人，则受托人是代理人而非主要责任人。实务中的判断逻辑是：谁的罢免权、谁的决策权，就控制到谁的手里。不能仅看形式上的委托协议，更要关注实质上的行权能力和经济动因。个人理解，供参考。","cat":"合并报表","kw":"合并报表,CAS 33,抵销,少数股东,控制权,合并,控制","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"3505","q":"合并报表中，母子公司之间发生债务重组是否一定遵循权益性交易处理？是否有例外情况？","a":"理论上存在不按权益性交易处理的可能性，但实务中认可的例外情形非常有限。证监会公告[2009]34号文提及的破产债务重整中，控股股东等以债权人身份、与其他债权人相同比例进行的债务豁免，不属于权益性交易。但必须同时满足：（1）母公司及其关联方不能是主要债权人，不能主导债权人会议表决；（2）需证明非关联方债权人的豁免比例合理，与子公司实际财务状况和清偿能力相适应。除此之外，母子公司之间的债务豁免一般认定为权益性交易，冲减资本公积而非确认损益。个人理解，供参考。","cat":"合并报表","kw":"合并报表,CAS 33,抵销,少数股东,控制权,合并,子公司,债务重组,资本公积,证监会,控股,母公司,关联方","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"3504","q":"交叉持股的合并报表如何处理？子公司持有母公司股权的情形下库藏股如何抵消？","a":"子公司持有的母公司股份，在合并报表层面应当作为库藏股处理，不得确认为合并主体的资产。具体抵销分录为：借记「库存股」（母公司权益的减项），贷记「长期股权投资」（子公司资产）。库藏股按照子公司取得成本计量。如果子公司将该投资分类为金融资产并按公允价值计量，公允价值变动在合并报表层面应予以抵消。实务中交叉持股多见于集团内部股权重组，需要注意该安排对每股收益计算的影响——计算基本每股收益时应剔除库藏股的影响。个人理解，供参考。","cat":"合并报表","kw":"合并报表,CAS 33,抵销,少数股东,控制权,合并,子公司,母公司,公允价值,每股收益","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"3503","q":"同一控制下三方债权债务转让及豁免：集团内三家公司的往来款如何会计处理？","a":"对于集团公司层面而言，集团内部的债权债务在合并报表层面本应全部抵消。但在个别报表层面，需要逐家公司进行账务处理。以典型场景为例：A公司将债权转让给集团母公司，集团母公司再将对该债务的豁免作为对B公司的资本性投入，借记「长期股权投资」，贷记「内部往来」。需要注意的是，母公司对子公司债务的豁免会导致长期股权投资成本增加，需要结合子公司的可收回金额审慎评估是否需要计提长期股权投资减值准备。实务中集团内债务豁免的交易结构需要仔细设计，既要考虑合并报表层面无影响的要求，也要防范税务风险。个人理解，供参考。","cat":"合并报表","kw":"合并报表,CAS 33,抵销,少数股东,控制权,控制,合并,子公司,母公司","src":"深圳证券交易所 会计监管动态","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"3502","q":"合并报表中，母公司对子公司增资导致持股比例变动，专项储备如何计算归母部分？","a":"专项储备中归属于母公司的余额按期末母公司持股比例计算，而非按月平均或分段计算。如果增资导致持股比例在年度中间发生变化，利润表中归母净利润需要分段计算（按照增资前后的持股比例分别计算应享有的份额），但专项储备的归母余额直接以期末持股比例确定。利润表分段计算的结果与专项储备按期末比例计算的差异，应当调整资本公积（资本溢价）。实务中这是一个容易被忽略的处理细节，尤其是在采掘业、建筑业等专项储备金额较大的企业中应当特别注意。个人理解，供参考。","cat":"合并报表","kw":"合并报表,CAS 33,抵销,少数股东,控制权,合并,子公司,母公司,资本公积","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"3501","q":"子公司发生超额亏损，母公司合并报表如何处理？是否继续确认少数股东应分担的亏损？","a":"根据CAS 33，子公司发生超额亏损时，少数股东应分担的亏损份额应以少数股东对该子公司的权益账面价值为限。如果公司章程或协议约定少数股东有义务承担超额亏损，则超出部分也应由少数股东分担；否则，超额亏损全部归属于母公司股东。实务中，少数股东对子公司权益账面价值通常包括：少数股东初始投资成本和累积享有的留存收益份额。当亏损金额超过该金额时，少数股东分担以零为下限。后续子公司恢复盈利时，先要补回以前年度未分担的亏损部分。个人理解，供参考。","cat":"合并报表","kw":"合并报表,CAS 33,抵销,少数股东,控制权,合并,子公司,母公司,账面价值,留存收益","src":"深圳证券交易所 会计监管动态","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY0054","q":"求助陈版主及各位⼤神，对印尼联合体的核算⽅式","a":"从主帖信息来看，设⽴联合体很可能仅是为了满⾜印尼2010年总统令中的形式要求，即外国建筑公司必须与本国建筑公司组成联合体才能承接印尼国内的建筑项⽬。该联合体完全由中国公司A控制，应作为其控制的主体纳⼊A公 司报表。鉴于联合体⽆法⼈资格，不存在⼀般意义上的母⼦公司关系，故联合体财务数据直接视同A的分公司并⼊ A的个别报表。 由于印尼B公司不出资，因此初始的少数股东权益为零。按约定分配给B公司的收益在合并报表中确认为成本费 ⽤。个人理解，供参考。","cat":"合并报表","kw":"合并,少数股东","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3499","q":"合并报表中内部往来（应收应付）抵消的同时，是否需要抵消因汇率变动产生的汇兑损益？","a":"内部往来余额应当全额抵消，这一点毋庸置疑。但一方在个别报表中确认的汇兑损益，不能与另一方的汇兑损益或者外币报表折算差额在合并层面相互抵消。这是因为两方确认汇兑损益的币种视角不同：一方以本位币计量外币货币性项目（确认汇兑损益），另一方以不同本位币计量同一项目。两者的汇兑损益在性质上并不对等，贸然抵消会导致合并报表不能正确反映企业的外汇风险敞口。实务中常见的是母公司与境外子公司之间的外币内部往来，在合并层面需要保留各自的汇兑损益，不能简单相互抵消。个人理解，供参考。","cat":"合并报表","kw":"合并报表,CAS 33,抵销,少数股东,控制权,合并,汇率,子公司,母公司,外汇","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"3498","q":"非同一控制下企业合并中，购买日与合并对价相关的或有对价如何处理？","a":"根据CAS 20，或有对价应按购买日的公允价值计入合并成本。后续处理取决于其分类：（1）如果或有对价被分类为金融资产或金融负债，后续公允价值变动计入当期损益；（2）如果被分类为权益工具，则后续不需重新计量。实务中常见的有业绩补偿承诺（对赌协议），需要判断其属于金融负债还是权益工具。关键在于看是否无法避免交付现金或金融资产。通常约定「如果业绩不达标，被购买方原股东需向购买方支付补偿」的情形中，购买方应确认一项以公允价值计量且其变动计入当期损益的金融资产。个人理解，供参考。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,合并,控制,公允价值,业绩补偿,对赌","src":"财政部 企业会计准则解释公告","std_ref":"企业会计准则第20号——企业合并"},{"id":"3497","q":"新设子公司时附有少数股东股权回购义务，母公司个别报表和合并报表分别如何处理？","a":"这个问题需要区分个别报表和合并报表两个层面。母公司个别报表层面，由于回购标的是子公司少数股权而非母公司自身权益工具，回购义务公允价值为零，无需确认金融负债。但合并报表层面就不一样了：少数股权在合并报表中属于合并层面的「自身权益工具」，根据CAS 37（金融工具列报），应当确认为一项金融负债。初始确认金额应为回购义务公允价值的现值，冲减资本公积；后续期间随着回购义务到期日临近，该金融负债的利息费用确认为财务费用。实务中这种情况在新设合资子公司时比较常见，初始确认时容易遗漏合并报表层面的负债确认。个人理解，供参考。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,CAS 37,合并,子公司,母公司,少数股东,公允价值,资本公积","src":"深圳证券交易所 会计监管动态","std_ref":"企业会计准则第20号——企业合并、企业会计准则第37号——金融工具列报、企业会计准则第33号——合并财务报表"},{"id":"3496","q":"被购买方在购买日之前的亏损产生的可抵扣暂时性差异，购买方在购买日如何处理？","a":"根据CAS 18，购买方在购买日应当评估被购买方原有的可抵扣暂时性差异（包括可抵扣亏损）是否符合递延所得税资产的确认条件。如果符合条件（即很可能获得足够的应纳税所得额以利用该可抵扣暂时性差异），应在购买日确认为递延所得税资产，相应减少商誉或增加负商誉。实务中，购买日对被购买方原有可抵扣亏损的评估需要特别注意：亏损企业本身处于困境，未来能否产生足够的应纳税所得额存在较大不确定性，因此需要审慎评估。个人理解，供参考。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,CAS 18,递延所得税资产,暂时性差异,所得税,商誉","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第20号——企业合并、企业会计准则第18号——所得税"},{"id":"3495","q":"非同一控制下企业合并中，被购买方可辨认净资产公允价值与账面价值的差额如何处理？是否需要确认递延所得税？","a":"在购买日的合并报表中，被购买方的可辨认资产和负债需要按购买日的公允价值进行计量。公允价值与账面价值之间的差额，应当调整相关资产或负债的账面价值。同时，由于合并报表层面调增（或调减）了资产账面价值，产生了新的暂时性差异，必须确认相应的递延所得税负债（或资产）。这一会计处理方法会增加被购买方可辨认净资产的公允价值，从而影响商誉的计算。实务中典型的场景包括：存货评估增值、固定资产评估增值、无形资产识别评估增值等。每一项评估增值都需要计算对应的递延所得税影响。个人理解，供参考。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,递延所得税负债,公允价值,账面价值,合并,控制,所得税,暂时性差异,商誉","src":"深圳证券交易所 会计监管动态","std_ref":"企业会计准则第20号——企业合并、企业会计准则第18号——所得税"},{"id":"3494","q":"同一控制下企业合并中，支付对价超过被合并方净资产账面价值份额的差额计入哪个科目？","a":"根据CAS 20，同一控制下企业合并中，合并方支付的合并对价（包括现金、非现金资产、承担的负债、发行的权益工具等）与合并日取得被合并方净资产账面价值份额的差额，应当调整资本公积（资本溢价或股本溢价）。如果资本公积不足冲减的，依次冲减盈余公积和未分配利润。实务中需要注意的是：这个差额既可以是被合并方净资产的「贷差」（支付对价小于净资产份额），也可以是「借差」（支付对价大于净资产份额），贷差只能增加资本公积，绝对不能计入当期损益。这是权益结合法下防止利润操纵的核心约束。个人理解，供参考。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,账面价值,合并,控制,资本公积,未分配利润","src":"财政部 企业会计准则解释公告","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0164","q":"关于合伙企业中GP作为合并⽅收购中的商誉问题","a":"⾸先要明确⼀点：合并报表层⾯确认商誉的⽐例并不是穿透的，⽽是依据直接收购被购买⽅的股权⽐例⽽定。 在本案例中，A虽然只持有C的10%权益，但C收购D的股权⽐例是100%，所以C的合并报表中确认D的商誉是针对100%股权。相应地，在A的合并报表层⾯，也是100%反映来源于D的商誉，并不是仅仅按照穿透后享有的权益⽐例确认10%的商誉。 所以，利⽤主帖中所述的⽅法并不能达到减少最终控制⽅（A）合并报表层⾯少确认商誉（将应确认为商誉的⾦额冲减资本公积）的⽬的。个人理解，供参考。","cat":"企业合并","kw":"商誉,合并","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3492","q":"同一控制下合并抵消分录中未分配利润如何处理？利润表抵消和资产负债表抵消如何互相配合？","a":"同一控制下企业合并编制合并报表时，利润表抵销分录中需要借记「年初未分配利润」等项目，以将被合并方自期初以来的利润表纳入合并范围；而资产负债表抵销分录中贷记「期末未分配利润」，体现被合并方期末留存收益。两笔分录叠加后整体是平衡的，但具体每个报表项目的抵消金额可能不同。核心逻辑是：合并利润表体现整个报告期内被合并方的经营成果，合并资产负债表体现合并日的权益结构，差额通过资本公积或留存收益来调整。实务中编制底稿时宜先做资产负债表抵消，再做利润表抵消，最后检查两部分是否衔接。个人理解，供参考。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,合并,控制,未分配利润,资本公积,留存收益,衔接","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第20号——企业合并"},{"id":"3491","q":"收购单一资产实体的会计处理：收购已进入破产程序的公司，如何判断是业务合并还是资产收购？","a":"这个问题需要从两个层面分析。根据CAS 20，企业合并的核心特征是被购买方构成「业务」，即一组能够为投资者带来回报的投入和实质性加工处理过程的集合。已进入破产程序的公司，如果其主要经营活动已停止、关键人员已流失、客户关系已丧失，那么通常不构成业务，此时取得该公司的各项可辨认资产和负债应视为资产收购，不需要确认商誉。但如果破产公司仍保留正常经营活动（如在重整期间仍持续经营），则需要进一步判断是否构成业务合并。实务中需要结合破产程序的具体阶段、实际经营状态等因素综合分析。个人理解，供参考。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,合并,收购,商誉","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第20号——企业合并"},{"id":"3490","q":"认缴与实缴比例不同时，合并报表中少数股东权益如何确认？后续按实缴比例分红产生差额如何处理？","a":"首先要区分章程约定的分红比例与认缴/实缴比例的关系。如果章程未约定分红比例，按谨慎原则应采用较低比例（认缴比例）确认归母损益。如果子公司盈利，母公司的实缴比例高于认缴比例，归属于母公司的净利润应按认缴比例计算。后续实际分红高于原先计算的归母净利润的部分，按权益性交易原则处理，计入资本公积，视作少数股东让渡给母公司股东的权益。反之亦然。实务中建议在投资协议或章程中明确约定分红比例，避免此类争议。个人理解，供参考。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,合并,少数股东,分红,资本公积,子公司,母公司","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第20号——企业合并、企业会计准则第33号——合并财务报表"},{"id":"3489","q":"同一控制下合并中，被合并方最初是最终控制方通过非同控取得并形成负商誉，合并方在合并报表中如何处理？","a":"这个问题需要从两个层面来看。第一，负商誉是损益项目而非资产，它是在购买日经复核确认后计入当期损益的。第二，合并方在合并报表层面，合并成本等于被合并方可辨认净资产在最终控制方合并报表层面的账面价值，这个账面价值已包含了当初负商誉的影响。如果负商誉发生在以前年度，合并报表中体现为留存收益的调整；如果发生在同一年度，体现为营业外收入。实务中要特别注意，负商誉不能作为一项资产长期挂账，必须在购买当期经复核无误后一次性计入损益。个人理解，供参考。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,合并,控制,商誉,账面价值,营业外收入,留存收益","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0165","q":"递延所得税负债产⽣的商誉","a":"“公司购买了⼀个空壳公司（公司有⼀块⼟地）”，则此时被收购⽅不构成业务，应按资产购买处理，⽆需确认商誉和递延所得税负债、参阅：《中审众环研究2020》之“问题2-3-8（由确认⼀组不构成业务的资产或净资产所产⽣的暂时性差异，能否确认递延所得税负债或递延所得税资产）”。 如果该被收购⽅确实构成“业务”，由此需确认与该⼟地的增值相关的递延所得税负债对应确认商誉的，则请参考证监会会计部组织编写的《上市公司执⾏企业会计准则案例解析（2020）》之“案例5-11 因收购时资产评估增值确认递延所得税负债产⽣的商誉及其减值问题”。个人理解，供参考。","cat":"企业合并","kw":"商誉,减值,所得税,递延","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3487","q":"非同一控制下企业合并中，被购买方原来确认的商誉在合并报表中如何处理？购买日是否需要做特殊调整？","a":"首先要区分被购买方原已确认的商誉的性质。如果是被购买方通过自身之前的并购形成的商誉，在购买方的合并报表中不予确认。根据CAS 20，非同一控制下企业合并采用购买法。购买方在购买日对被购买方的各项可辨认资产、负债按照公允价值进行计量，购买对价超过被购买方可辨认净资产公允价值份额的差额，确认为本次合并的商誉。实务中需要特别注意：被购买方原有商誉不属于可辨认资产，因此不单独计量，其价值已包含在本次合并产生的商誉中。个人理解，供参考。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,合并,控制,商誉,公允价值,并购","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第20号——企业合并"},{"id":"3486","q":"审计意见的类型有哪些？什么情况下出具非无保留意见？","a":"根据审计准则1501号和1502号，审计意见分为以下类型：\n\n（1）无保留意见（标准/带强调事项段）：\n- 财务报表公允、合规\n- 带强调事项段的无保留意见——存在需要提醒报表使用者注意但未导致非无保留意见的重大事项（如持续经营重大不确定性、未决诉讼不确定性等）\n\n（2）保留意见（非无保留意见之一）：\n出具条件（满足其一）：\n- 存在重大但不广泛的错报（不是普遍的）；\n- 无法获取充分适当的审计证据，但未发现的错报可能的影响是重大但不广泛的。\n\n（3）否定意见：\n出具条件：存在重大且广泛的错报，导致财务报表整体不公允。\n- 这是最严重的审计意见类型——实际上宣告报表不可用。\n\n（4）无法表示意见：\n出具条件：无法获取充分适当的审计证据，且潜在影响可能是重大且广泛的。\n- 与否定意见的区别：否定意见是'发现了重大问题并确认严重'，无法表示意见是'无法判断'。\n\n'广泛'与'不广泛'的判断标准：\n- 错报是否局限于某一特定要素/账户/项目 → 是→不广泛\n- 是否与报表的重大部分相关（如收入确认） → 是→广泛\n- 与披露相关且对报表理解至关重要 → 可能是广泛\n\n审计意见类型直接影响企业再融资、评级、银行信贷等多项重大事项，是资本市场最关注的信号之一。","cat":"财务报表列报","kw":"报表列报,CAS 30,列报,附注,持续经营,审计","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第30号——财务报表列报"},{"id":"3485","q":"审计调整和会计差错更正的财务报表处理差异是什么？","a":"审计调整 ≠ 会计差错更正，两者有本质区别：\n\n审计调整（审计师发现并要求调整）：\n- 目标：使财务报表不存在重大错报\n- 如企业接受调整并在财务报表签发前修正，属于正常编报过程中的调整（不构成前期差错更正）\n- 如企业不接受，审计师出具保留意见\n- 调整结论不自动构成'发现差错'，而是完善报表的过程\n\n会计差错更正（企业自行或监管发现前期报表错误）：\n- 如本期发现前期重要差错，应追溯重述——视同差错从未发生\n- 调整期初留存收益及相关资产负债项目\n- 在附注中披露差错性质、对前期各期的影响\n\n处理差异表：\n| 事项 | 审计调整（本期报表） | 前期差错（以前年度报表） |\n|------|---------------------|---------------------|\n| 调整时点 | 报表签发前的年末调整 | 报表签发后发现 |\n| 调整方式 | 调整本期报表 | 追溯重述前期报表 |\n| 会计处理 | 计入当期损益 | 调整期初留存收益 |\n\n实务常见交叉：上年审计未调整事项在本年新发现证据后如何处理——应按上年差错更正还是本年调整？关键判断：基础事实在资产负债表日是否已存在。","cat":"会计政策/估计变更","kw":"会计政策变更,会计估计变更,CAS 28,追溯调整,未来适用法,审计,留存收益,监管,前期差错,追溯","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第28号——会计政策、会计估计变更和差错更正"},{"id":"3484","q":"同一控制下企业合并中，如何进行合并报表的追溯调整？","a":"CAS 20规定同一控制下企业合并采用权益结合法，需要追溯调整前期比较数据：\n\n（1）合并资产负债表：期初余额应假定被合并方自最终控制方开始控制起即纳入合并。比较期间的期初数据也要相应调整。\n\n（2）合并利润表：应包含被合并方自合并当期期初至合并日的损益。同时重述前期比较数据，视同被合并方一直纳入合并范围。\n\n（3）合并现金流量表：同样追溯调整比较数据。\n\n（4）合并所有者权益变动表：调整期初留存收益和其他综合收益。\n\n具体编制方法：\n第一步，在合并工作底稿中记录'被合并方自合并当期期初各项目'的金额；\n第二步，在留存收益中调整对应的影响，把资产负债差额调至资本公积；\n第三步，书写附注披露，说明追溯调整对各比较期各项目的具体影响金额。\n\n特别注意事项：\n- 追溯调整可能导致以前期间的盈利指标、资产负债率等出现重大变化，需在附注或管理层讨论中说明。\n- 被合并方在合并日前与最终控制方或其他子公司的内部交易——也需在追溯调整中一并抵销。","cat":"合并报表","kw":"合并报表,CAS 33,抵销,少数股东,控制权,CAS 20,其他综合收益,追溯调整,合并,控制,追溯,资本公积,留存收益,子公司","src":"深圳证券交易所 会计监管动态","std_ref":"企业会计准则第33号——合并财务报表、企业会计准则第20号——企业合并"},{"id":"3483","q":"合并报表中处置子公司（丧失控制权）的损益计算和列报？","a":"丧失控制权处置子公司时：\n\n个别报表层面：\n处置损益 = 处置对价 - 处置部分长期股权投资账面价值（按账面成本）；\n仍然持有的剩余股权，如在丧失控制权后仍是联营/合营的，按权益法追溯调整；否则按金融资产分类。\n\n合并报表层面（处置当期的投资收益计算）：\n投资收益 = (处置对价 + 剩余股权公允价值) - (子公司自购买日起持续计算的净资产份额（含评估增值摊销后） + 商誉) + 其他综合收益可重分类转入。\n\n列报位置：\n- 合并利润表中，处置子公司的投资收益单独在利润表上列报（处置子公司及其他营业单位产生的投资收益项目）；\n- 建议在附注中披露处置价格、处置日子公司净资产、商誉转销金额、其他综合收益转入等分项信息。\n\n重要提示：\n- '全部对价'应包括所有从买方取得的对价（现金+非现金+或有对价），以及与处置直接相关的费用（如投行佣金）。\n- 剩余股权的公允价值如何确定——如无活跃市场报价，需要请评估师出具评估意见。","cat":"合并报表","kw":"合并报表,CAS 33,抵销,少数股东,控制权,其他综合收益,合并,子公司,控制,公允价值,账面价值,投资收益,追溯调整,合营,联营,摊销,商誉,追溯","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第33号——合并财务报表、企业会计准则第20号——企业合并、企业会计准则第2号——长期股权投资"},{"id":"3482","q":"上市公司重大资产重组的会计处理，如何区分同一控制和非同一控制？","a":"上市公司重大资产重组的类型多样，判断标准依据CAS 20：\n\n同一控制下重组的情形：\n- 重组前后参与各方均受同一母公司或相同多方最终控制，且该控制非暂时性（通常指重组前一年以上、重组后预期至少一年）。\n- 会计处理：权益结合法——被并方资产/负债按原账面价值入账，不确认新商誉。重组产生的差额调整资本公积/留存收益。\n\n非同一控制下重组的情形：\n- 不满足同一控制条件的（大多数借壳上市或三方重组）均为非同一控制。\n- 会计处理：购买法——合并成本超过可辨认净资产公允价值的差额确认商誉。\n\n借壳上市的特别处理（常见反向购买）：\n- 法律上母公司（壳公司）发行股份购买法律上子公司（拟上市主体）全部股权。\n- 会计上，法律上子公司为购买方，法律上母公司为被购买方。\n- 合并报表以法律上子公司为主体，列报法律上子公司的财务信息——但资本结构（股本）按法律上母公司在法律上子公司原有股数的比例模拟。\n\n监管审查重点：同一控制的认定是否勉强（比如使用家族控制、一致行动人协议等方式包装为同一控制）是证券监管中的要害问题。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,上市公司,控制,公允价值,账面价值,资本公积,留存收益,监管,合并,子公司,母公司,借壳上市,反向购买,商誉","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第20号——企业合并"},{"id":"3481","q":"首次公开募股（IPO）过程中，股改和净资产折股的会计处理是什么？","a":"有限责任公司整体变更为股份公司（股改）是最常见的IPO前重组：\n\n净资产折股方案：\n整体变更时，原有限责任公司的净资产（包括实收资本、资本公积、盈余公积、未分配利润）按审计值折合为股份公司的股本。\n\n关键会计处理：\n（1）折股后实收资本 = 折合股份总数 × 每股面值（通常为1元）\n（2）净资产余额超出实收资本面的差额 → 计入资本公积（资本/股本溢价）\n（3）折股前的盈余公积和未分配利润的结构：\n  - 按折股前基准日的审计净资产整体转入股份公司\n  - 折股后的资产负债表中，盈余公积和未分配利润是否保留取决于具体方案。\n\n税务注意事项：\n- 整体变更税制处理——盈余公积和未分配利润转为资本公积时：需关注是否产生纳税义务（自然人股东视同分配再投资的争议）。\n- 股改方案中应结合税务师意见逐一明确税务处理。\n\n实务排序：股改基准日的审计报告是基础。建议会计师和验资机构密切配合，确保折股方案合规且不导致税负后患。","cat":"会计政策/估计变更","kw":"会计政策变更,会计估计变更,CAS 28,追溯调整,未来适用法,资本公积,审计,审计报告,未分配利润","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第28号——会计政策、会计估计变更和差错更正"},{"id":"3480","q":"亏损合同的预计负债如何确认和计量？","a":"根据CAS 13，亏损合同是指履行合同义务不可避免发生的成本超过预期经济利益的合同。\n\n确认条件：\n- 合同具有约束力（无法单方面取消）；\n- 预期合同总成本 > 合同总收入（即预期净亏损）。\n\n计量金额：\n- 预计负债 = 履行合同的不可避免成本 - 预期经济利益\n- 不可避免成本取'履行合同的净成本'与'终止合同的罚金净额'两者中的较低者。\n\n如果合同存在相关资产（如存货），应先对该资产进行减值测试（按CAS 1存货跌价准备或CAS 8资产减值），不足的部分再确认预计负债。\n\n典型亏损合同场景：\n- 工程承包合同中预计总成本超过合同固定总价（尤其施工期间的调价争议未决时）；\n- 供货合同约定的销售价低于当前市场采购成本或生产成本（市价倒挂）。\n\n实务难点：\n- '不可避免成本'到底包括什么？——包括直接材料、直接人工、变动制造费用、可分拨的管理费用等与合同履行直接相关的增量成本；不包括已分摊的集团管理费用等沉没成本（已发生无法避免的）。\n- 如果合同可以取消（无违约金或赔偿净额很低），则不应确认亏损合同预计负债。","cat":"或有事项","kw":"或有事项,CAS 13,预计负债,现时义务,很可能流出,CAS 1,CAS 8,减值测试","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第13号——或有事项、企业会计准则第1号——存货、企业会计准则第8号——资产减值"},{"id":"3479","q":"重组义务的预计负债确认条件和计量要求是什么？","a":"根据CAS 13（或有事项），重组义务确认预计负债需满足两个条件：\n\n（1）存在详细、正式的重组计划：至少包括重组涉及的业务/场所、受影响的职工数量及岗位、预计重组成本支出总额、执行时间表。\n\n（2）已开始实施重组计划或已将重组计划主要内容告知受影响的各方，使他们对重组建立了合理预期（推定义务成立）。\n\n计量内容（重组预计负债的组成）：\n- 职工离职补偿（裁员补偿、提前退休补偿福利等）；\n- 关闭场所或设施的不可避免的租赁违约金；\n- 处置专用设备的损失；\n- 迁移成本（搬迁费、运输费等）。\n\n不计入重组预计负债的项目：\n- 未来期间的预计经营亏损——与重组义务无关（是未来的经营亏损）；\n- 资产处置利得（即使出售资产的收益与重组相关）——需单独确认资产处置损益，不能与重组负债抵销后以净额列报。\n\n实务分层：如果重组涉及辞退职工，辞退福利的确认时点有所提前——取'不能单方面撤回辞退计划日'与'确认重组相关费用日'的孰早者。","cat":"或有事项","kw":"或有事项,CAS 13,预计负债,现时义务,很可能流出,辞退福利","src":"财政部 企业会计准则解释公告","std_ref":"企业会计准则第13号——或有事项"},{"id":"3478","q":"公允价值计量的估值技术有哪些？如何选择合理的估值方法？","a":"根据CAS 39，公允价值计量采用三种估值技术：\n\n一、市场法：\n利用相同或可比资产/负债/企业组合的市场价格及其他相关信息。\n- 常用：可比上市公司倍数法、可比交易价格法。\n- 适用：有活跃交易的可比资产/企业。\n\n二、收益法：\n将未来现金流量转化为单一现值。\n- 常用：折现现金流量法（DCF）、期权定价模型（Black-Scholes、二项树）、多期超额收益法。\n- 适用：非上市企业股权评估、无形资产评估（客户关系、专利）、减值测试。\n\n三、成本法：\n以当前重置相关服务能力所需金额（重置成本）为基础，考虑各种贬值因素。\n- 适用：特殊设备、大型专用生产线（活跃二手市场不存在的）。\n\n选择原则：\n（1）应使用在当前情况下最能代表公允价值、有足够数据支持的估值方法（输入值最大化原则——优先使用可观察市场数据）；\n（2）可以同时使用多种方法并综合分析结果（不应简单取平均数或价格区间的中点）；\n（3）方法一经选定应保持一致使用，变更需说明理由。\n\n实务中不可取的简化：对于无活跃市场报价的股权投资，'以原始投资成本代替公允价值'——这违反了CAS 39的基本要求。","cat":"公允价值计量","kw":"公允价值,CAS 39,估值技术,输入值,市场法,上市公司,期权,减值测试","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第39号——公允价值计量、企业会计准则第2号——长期股权投资"},{"id":"3477","q":"权益结算股份支付的公允价值如何确定？可行权数量的预估调整？","a":"根据CAS 11，权益结算的股份支付属于授予职工的权益工具，按公允价值计量。\n\n公允价值的确定方法：\n（1）股票期权：普遍采用期权定价模型（最常用的是Black-Scholes-Merton模型或二项树模型），参数必须基于授予日的市场数据：股价、行权价、预计波动率（基于历史波动率合理调整）、预计期限（预计期权有效存续期，可短于合同期限）、无风险利率、预计股息率。\n（2）限制性股票：公允价值 = 授予日股票市价 - 行权价（职工的认购价）。不能直接按估值模型——因为限制性股票不能上市交易但不影响内在价值。\n\n可行权数量的预估调整：\n- 每个资产负债表日重新评估预计可行权的权益工具数量（根据最新离职率、业绩完成进度等）。\n- 如果预计可行权数量与先前估计不同，必须修正——但不追溯调整，仅调整当期和未来期间。\n- 影响变动的累计影响在当期确认，即：以前的每期费用不做追溯重述，仅当期损益体现前期估计偏差的全部影响。\n\n特殊情形：如果等待期内取消或结算该股份支付，应立即确认原本在剩余等待期内将确认的全部费用。这是管理层的主动行为，不能延缓确认。","cat":"股份支付","kw":"股份支付,CAS 11,权益结算,现金结算,等待期,公允价值,追溯调整,期权,限制性股票,追溯","src":"财政部 企业会计准则解释公告","std_ref":"企业会计准则第11号——股份支付"},{"id":"3476","q":"现金流量表间接法编制的调整项目有哪些？如何验证其正确性？","a":"间接法从净利润出发，调整到经营活动净现金流量。关键调整项目如下：\n\n一、加回非现金项目：\n（+）资产减值准备（存货跌价、信用减值、固定/无形资产减值等）\n（+）折旧与摊销（固定资产折旧、无形资产摊销、长期待摊费用摊销）\n（+）处置资产的净损失（-收益）\n（+）公允价值变动损失（-收益）\n（+）财务费用中的非经营部分（利息支出属于筹资应剔除）\n\n二、经营性应收应付项目变动：\n（-）存货增加（+减少）\n（-）经营性应收增加（+减少）\n（+）经营性应付增加（-减少）\n\n三、递延所得税与股份支付：\n（+/−）递延所得税资产减少（+）/增加（-）\n（+/−）递延所得税负债增加（+）/减少（-）\n（+）股份支付费用（非现金支出的权益结算股份支付）\n\n验证方法——三大勾稽核对：\n（1）资产负债表的期初期末变动数与间接法调整表的应收应付项目变动数是否一致；\n（2）计入经营活动流入的折旧是否等于资产负债表累计折旧变动数（需剔除处置资产的影响）；\n（3）间接法倒算出的经营活动净现金流是否与直接法结果一致。\n\n大部分现金流量表编表差异来自于调整项目遗漏或重分类错误，建议先用工作底稿逐项勾稽。","cat":"现金流量表","kw":"现金流量表,CAS 31,经营活动,投资活动,筹资活动,递延所得税资产,递延所得税负债,公允价值,摊销,折旧,所得税,股份支付","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第31号——现金流量表、企业会计准则第18号——所得税、企业会计准则第22号——金融工具确认和计量"},{"id":"3475","q":"现金流量表中，经营活动、投资活动和筹资活动的划分原则是什么？","a":"根据CAS 31，现金流量分为三大类：\n\n经营活动现金流：企业投资和筹资以外活动产生的现金流。\n- 典型流入：销售商品/提供劳务收到的现金、税费返还、政府补助（与收益相关的非资本性补助）\n- 典型流出：购货款、职工薪酬、各项税费、管理费用和销售费用\n\n投资活动现金流：长期资产购建和处置，及非现金等价物范围内的投资。\n- 典型流入：处置固定资产/无形资产/子公司收回的现金、收到股利和利息\n- 典型流出：购置固定资产/无形资产/子公司支付的现金、对外投资支出\n\n筹资活动现金流：导致企业资本及债务规模和构成发生变化的活动。\n- 典型流入：吸收投资、发行债券、取得借款\n- 典型流出：偿还借款、分配股利、支付利息（注意：利息属于筹资活动——不同于旧准则）、回购股份\n\n两项特殊处理：\n（1）银行存款利息——属于经营活动还是投资活动？准则未明确指定，实务中多数归为经营活动（与日常经营相关）。\n（2）融资租赁支付的本金部分属于筹资活动，利息部分也属于筹资活动（新准则规定）。\n\n划分错误的常见例子：资产证券化收到的现金、固定资产分期付款——需仔细分析条款。","cat":"现金流量表","kw":"现金流量表,CAS 31,经营活动,投资活动,筹资活动,子公司,资产证券化,融资租赁,职工薪酬,政府补助,股利","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第31号——现金流量表"},{"id":"3474","q":"利润分享计划和奖金计划的会计处理要点是什么？","a":"根据CAS 9第十三条，存在法定或推定义务的利润分享和奖金计划，应确认预计费用和相关负债。\n\n确认条件：\n（1）因过去事项（职工已提供服务）而承担现时义务；\n（2）金额能够可靠估计。\n\n可靠估计的依据：\n- 利润分享计划的公式已在劳动合同或公司制度中明确（如年度净利润超额部分的X%）；\n- 过往年度已持续执行该计划（推定义务成立）；\n- 资产负债表日能够根据当年实际经营数据和计划公式计算。\n\n计量：\n- 按公式计算出的应分配给职工的计划金额，确认为应付职工薪酬和当期费用；\n- 如果支付期超过12个月，应折现计量。\n\n如果在资产负债表日后、报告批准报出日前，董事会或类似机构批准了具体的利润分享方案：\n- 如果该计划基于截至资产负债表日的服务期和业绩指标确定——属于调整事项，应在财务报表中体现；\n- 如果涉及的业绩与服务期在资产负债表日后——属于非调整事项，仅在附注中披露。\n\n典型实务场景：上市公司的年终奖、绩效奖金、超额利润分享（须在年末预计计提）。","cat":"职工薪酬","kw":"职工薪酬,CAS 9,辞退福利,离职后福利,设定受益计划,上市公司","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第9号——职工薪酬"},{"id":"CY0630","q":"对于正常离职的员⼯给予⼀次性补贴属于辞退福利吗","a":"如果这是公司政策明确规定的，据此员⼯可以合理预期在正常离职情况下可获得补偿⾦，则这种补偿⾦应属于离职后福利⽽不是辞退福利，其属于为取得职⼯服务所⽀付的对价，故应在员⼯任职期间内确认，⽽不是实际离职时确认。在计提时，根据员⼯的任职岗位和部门分别计⼊对应的成本费⽤项⽬，⽽不是⼀律计⼊管理费⽤。 其中，如果不论任职年限多长，补偿⾦的⾦额是⼀样的，则在⼊职当期即应全额计提该补偿⾦；如果补偿⾦的⾦额随着任职年限延长⽽相应增加，则在该员⼯任职期间逐年计提该补偿⾦。个人理解，供参考。","cat":"职工薪酬","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3472","q":"长期股权投资的处置损益如何计算？处置后变为金融资产的处理？","a":"根据CAS 2，长期股权投资处置损益 = 处置收入 - 处置部分账面价值（加权平均或个别计价）。\n\n一般处置（仍持有部分，控制权/重大影响不变）：\n处置损益在个别报表中确认。剩余部分仍按原方法核算（成本法/权益法）。\n\n处置全部丧失控制权：\n- 个别报表：处置损益 = 实收价款 - 处置股权的账面价值\n- 合并报表：投资收益 = (处置价款 + 剩余股权公允价值) - (原持股比例计算的子公司净资产份额 + 商誉) + 其他综合收益转入\n\n处置部分至丧失控制权（但仍有重大影响/投资关系）：\n- 剩余股权按丧失控制权日的公允价值重新计量\n- 公允价值与原账面价值的差额进投资收益\n- 此后按权益法/金融资产核算\n\n处置部分至丧失控制权且不保留任何影响：\n- 剩余股权按公允价值作为金融资产的初始计量基础，全额确认处置损益\n\n实务注意事项：处置日与交割日的差异、过渡期损益归属、处置费用的处理。过渡期损益归属通常在产权交易合同中约定，是定价谈判的关键事项。","cat":"长期股权投资","kw":"长期股权投资,CAS 2,权益法,成本法,重大影响,其他综合收益,公允价值,账面价值,投资收益,合并,子公司,控制,商誉","src":"深圳证券交易所 会计监管动态","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"CY0229","q":"收购合营企业所⽀付的款项，现⾦流量表如何列报","a":"因为收购标的是合营企业股权，在收购⽅报表中确认为长期股权投资，故应作为“投资⽀付的现⾦”列⽰。个人理解，供参考。","cat":"长期股权投资","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3470","q":"被投资方增资扩股导致投资方持股比例下降的会计处理是什么？","a":"如果被投资方增资扩股导致投资方持股比例下降但未丧失控制权或重大影响：\n\n情形一：控制权不变（如持股从60%降至55%——仍为子公司）：\n- 个别报表不调整长投成本；\n- 合并报表——视为与少数股东的权益交易，增资后按新比例计算的净资产份额与增资前份额的差额，调整资本公积（资本溢价）或留存收益。——不计入投资收益！\n\n情形二：丧失控制权但仍有重大影响（如从60%降至20%）：\n- 个别报表：处置股权对应的部分按实收处置款调整，剩余股权按丧失控制权日的公允价值重新计量→差额进投资收益；\n- 合并报表同理，但不确认处置损益（因是股权稀释不是主动处置）。\n\n情形三：重大影响不变（如从40%降至20%——仅比例变化）：\n- 权益法下，按变化后的持股比例持续计算应享有被投资单位的净损益份额。\n- 之前对应的其他综合收益按比例转入投资收益（如果可重分类进损益）。\n\n核心原则：是否跨类别（控制权/重大影响的存亡）是处理差异的关键。","cat":"长期股权投资","kw":"长期股权投资,CAS 2,权益法,成本法,重大影响,其他综合收益,公允价值,投资收益,资本公积,留存收益,合并,子公司,少数股东,控制,稀释","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第2号——长期股权投资、企业会计准则第33号——合并财务报表"},{"id":"CY0160","q":"关于⼚房装修期间，租赁费⽤是否可以计⼊在建⼯程转⼊长摊核算？","a":"可以。参阅《中审众环研究2020》之“问题1-1-7（租赁的相关成本是否应当计⼊房屋建筑物的建造成本中）”。个人理解，供参考。","cat":"租赁","kw":"租赁","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3468","q":"新租赁准则下，出租人的会计处理有哪些变动？","a":"与新准则对承租人的重大改革相比，出租人层面基本延续了旧准则CAS 21的分类和处理框架：\n\n融资租赁（转移几乎所有风险和报酬）：\n（1）终止确认融资租赁资产；\n（2）确认应收融资租赁款 = 租赁投资净额（含未担保余值）的现值；\n（3）应收融资租赁款与资产账面价值的差额→资产处置损益（初始确认时确认）。\n\n经营租赁（未转移几乎所有风险和报酬）：\n（1）继续确认租赁资产（按固定资产/投资性房地产核算）；\n（2）租赁收入在租期内按直线法（或其他系统合理方法）确认；\n（3）与租赁相关的初始直接费用于发生时计入当期损益（或资本化后分期摊销）。\n\n特殊变化：新准则新增了对售后回租的指导。卖方-承租人→判断是否属于销售→如果是→确认部分处置损益（仅为转让给买方-出租人的部分）。详见CAS 21第五十至五十二条。\n\n生产商/经销商的特殊处理：如果是生产商/经销商作为出租人进行融资租赁，确认销售收入（租赁付款额的现值or资产公允价值孰低）、销售成本（资产账面价减去未担保余值现值），差额作为销售利润。","cat":"租赁","kw":"租赁,CAS 21,使用权资产,租赁负债,公允价值,账面价值,摊销,资本化,终止确认,售后回租,经营租赁,融资租赁","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第21号——租赁、企业会计准则第17号——借款费用"},{"id":"3467","q":"承租人如何使用增量借款利率确定租赁负债的折现率？","a":"由于租赁内含利率通常不可取得，承租人需使用增量借款利率作为折现率。\n\n增量借款利率的定义：承租人在类似经济环境下，以类似期间、类似抵押条件获取与使用权资产价值接近的资金所应支付的利率。\n\n确定步骤：\n（1）先确定'无风险基准利率'（同期国债收益率曲线），作为基准；\n（2）根据承租人的信用评级调整信用利差（参考近期银行借款、已发行债券的利率）；\n（3）根据租赁期匹配对应期限利率（不能全用1年期或5年期利率抹平——各笔租赁按各自期限）；\n（4）考虑租赁的宏观经济环境和担保安排的影响。\n\n实务简化方案（适合大多数非金融企业）：\n- 参照同期商业银行对公司发放的抵押贷款基准利率上浮10-30%；\n- 或者：同期LPR/贷款基础利率 + 根据企业信用等级调整的利差。\n\n常见误区：将所有租赁用同一个折现率——忽略了不同租赁的期限、币种、抵押条件差异。","cat":"租赁","kw":"租赁,CAS 21,使用权资产,租赁负债","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第21号——租赁"},{"id":"3466","q":"所得税费用的当期和递延部分如何在财务报表中列报？","a":"根据CAS 18，所得税费用（收益）= 当期所得税 + 递延所得税。\n\n当期所得税：\n= 应纳税所得额（税务口径）× 适用税率\n通常在纳税申报后确定，年末按最佳估计数确认（如果未完成汇算清缴）。\n\n递延所得税：\n= （期末递延所得税负债 - 期初递延所得税负债）- （期末递延所得税资产 - 期初递延所得税资产）。\n\n列报规则：\n（1）利润表：'所得税费用'行项目包括当期和递延合计。\n（2）资产负债表：递延所得税资产和递延所得税负债应分别列报为非流动资产和非流动负债（不论预期转回时间）。\n（3）同一纳税主体、同一税种的递延所得税资产和负债可以互相抵销后以净额列报。\n\n计入其他综合收益的递延所得税：\n不是所有递延税变动都进损益——如果暂时性差异的产生源头计入其他综合收益（如FVOCI公允价值变动），其对应的递延税也应计入其他综合收益而非所得税费用。\n\n现金流量表处理：当期所得税的支付属于经营活动现金流出。递延所得税不影响现金。","cat":"所得税","kw":"所得税,CAS 18,递延所得税,应纳税所得额,暂时性差异,其他综合收益,递延所得税资产,递延所得税负债,公允价值","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第18号——所得税"},{"id":"3465","q":"不确认递延所得税的例外情形有哪些（初始确认豁免等）？","a":"CAS 18规定了初始确认豁免（即某些交易中的初始确认不产生递延所得税影响）：\n\n豁免一——商誉的初始确认：非同一控制下企业合并中初始确认商誉时，不相应确认递延所得税负债（因为此时确认DTL会导致商誉增加——循环反复——属于无效循环）。\n\n豁免二——对于具有以下特征的交易：既不影响会计利润也不影响应纳税所得额（或可抵扣亏损），且交易发生时既不会产生相等的应税和可抵扣暂时性差异。\n典型场景：\n- 非免税的合并中取得的资产和负债的初始确认——产生递延所得税影响\n- 但内部研发形成的无形资产——初始确认不影响损益也不影响税基→豁免\n\n豁免三——构成企业合并且不影响利润的总资产投资：部分情形下，相关税收影响在初始确认时不计入递延税。\n\n还有一项重要豁免：对子公司、分公司投资相关的应纳税暂时性差异，如果母公司能控制转回的时点并且该暂时性差异在可预见的未来很可能不会转回，可以不确认相应的DTL。\n\n实务中必须针对每项暂时性差异的初始来源逐条分析是否适用豁免，不能一刀切处理。","cat":"所得税","kw":"所得税,CAS 18,递延所得税,应纳税所得额,暂时性差异,递延所得税负债,合并,子公司,母公司,控制,商誉","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第18号——所得税"},{"id":"3464","q":"递延所得税资产的确认上限和评估程序是什么？","a":"根据CAS 18第十五条，递延所得税资产的确认上限是'很可能取得足够的应纳税所得额用以抵扣可抵扣暂时性差异'。\n\n评估程序（五步法）：\n\n（1）先确定可抵扣暂时性差异的总额；\n（2）判断其中是否有足够的应纳税暂时性差异（同一纳税主体、同一税务机关），如果有，可相应确认；\n（3）如仍有未抵消的可抵扣差异，评估未来是否有足够的应纳税所得额——需要盈利预测支持；\n（4）盈利预测需基于管理层批准的财务预算（通常3-5年），超过此期间的需特别谨慎；\n（5）每期期末重新评估，如预计未来无法实现，应转回已确认的资产并计入当期所得税费用。\n\n可考虑的税务筹划机会：包括改变折旧方法、出售租赁资产、债券转股等具有可行性的税务策略。\n\n实务保守原则：亏损企业确认DTA需要累计充分证据，包括已签约订单、长期合同、扭亏方案的可执行性等。","cat":"所得税","kw":"所得税,CAS 18,递延所得税,应纳税所得额,暂时性差异,递延所得税资产,折旧","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第18号——所得税"},{"id":"3463","q":"合并报表中因内部交易抵销产生的递延所得税如何处理？","a":"合并报表内部交易抵销与递延所得税的关联处理需特别注意。\n\n场景一——内部存货交易：\n合并抵销未实现利润→存货账面价值减少（低于计税基础）→可抵扣暂时性差异→确认递延所得税资产。分录：借：递延所得税资产，贷：所得税费用（递延）。后续存货售出后转回。\n\n场景二——内部固定资产交易：\n合并抵销未实现利润，同时因折旧减少抵销一部分→固定资产账面价值低于计税基础→确认递延所得税资产。每年折旧转回。\n\n场景三——内部债权债务抵销：\n内部应收账款和坏账准备抵销→合并层面坏账准备减少→转回递延所得税资产（借：所得税费用，贷：递延所得税资产）。\n\n税率选择：按购买资产方的适用税率（持有资产并负担税款的主体）。\n\n实务易错点：（1）不知道内部交易也要做递延税——这是合并报表最常见的编制错漏；（2）税率用错了（用了出售方税率而非购买方税率）。","cat":"所得税","kw":"所得税,CAS 18,递延所得税,应纳税所得额,暂时性差异,递延所得税资产,合并,账面价值,坏账,折旧","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第18号——所得税、企业会计准则第22号——金融工具确认和计量"},{"id":"3462","q":"使用价值计算中，折现率如何确定？有哪些常见误区？","a":"根据CAS 8和资产减值准则应用指南，使用价值计算中的折现率必须是税前折现率，并满足以下要求：\n\n（1）反映当前市场的货币时间价值评估（无风险报酬率 + 通胀溢价）；\n（2）反映该资产的特定风险（行业风险、经营风险、规模风险等）；\n（3）不反映已体现在未来现金流量中的风险（避免重复计算）。\n\n常见参照指标：加权平均资本成本（WACC）基础上调整。\n\n常见误区：\n①误用税后折现率（WACC）直接用于使用价值的计算——CAS 8要求税前折现率。两者的关系是：税前折现率 = 税后WACC ÷ （1 - 所得税率）仅在特定条件下近似成立，但不能简单套用。\n②折现率过低——如用3%甚至更低（可能存在低估风险溢价的问题）；\n③对未来现金流的增长率估计过高，同时折现率过低——双向利多，减值测试完全流于形式；\n④折现率未能反映资产组特定的风险，拿集团整体WACC直接用于高风险子公司。\n\n关键底线：折现率参数的确定需有外部可观察数据的支撑，管理层主观判断范围有边界。","cat":"资产减值","kw":"资产减值,CAS 8,可收回金额,减值测试,资产组,子公司,所得税","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第8号——资产减值"},{"id":"3461","q":"如何确定资产组（CGU）的可收回金额？商誉分摊至CGU后如何测试？","a":"商誉减值测试的CGU与普通资产减值测试的CGU稍有不同：\n\n商誉CGU的确定原则：\n（1）商誉应分摊至能够从企业合并协同效应中受益的最小资产组组合；\n（2）这一资产组不能大于CAS 35界定的经营分部；\n（3）测试用CGU的账面价值 = 直接可辨认资产 + 分摊的商誉 + 分摊的总部资产（如能合理一致基础分摊）。\n\n测试频率：至少每年一次（无论是否有减值迹象）。\n\n测试步骤：\n（1）计算包含商誉的CGU的可收回金额（以集团整体口径而不是母公司单独口径）；\n（2）比较可收回金额与含商誉的CGU账面价值；\n（3）如果可收回金额低于账面价值，差额先冲减商誉至零，剩余部分按比例分摊至CGU的其他资产（按各自账面价值比例）。\n\n实务常见风险：CGU划分过大（如将整个子公司作为一个CGU），使得即使内部某些业务已严重亏损，减值测试也能'蒙混过关'。","cat":"资产减值","kw":"资产减值,CAS 8,可收回金额,减值测试,资产组,CAS 35,商誉,CGU,账面价值,合并,子公司,母公司","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第8号——资产减值、企业会计准则第35号——分部报告"},{"id":"3460","q":"资产减值损失的转回有什么限制？哪些资产不能转回？","a":"根据CAS 8，资产减值损失的转回规则分两类：\n\n可以转回的资产（损失确认后如果可收回金额回升）：\n- 存货（跌价准备可以转回，限于原计提金额）、持有待售资产、递延所得税资产、消耗性生物资产等。\n\n不能转回的资产（减值损失永久确认，即使价值回升也不得转回）：\n- 固定资产减值准备\n- 无形资产减值准备\n- 在建工程减值准备\n- 商誉减值准备\n- 长期股权投资减值准备\n- 采用成本模式计量的投资性房地产减值准备\n- 生产性生物资产减值准备\n\n为什么这些资产不得转回？因为这些长期资产的账面价值回升难以客观验证，允许转回可能导致企业通过操纵减值测试（前期多提后期转回）操纵利润。\n\n实务影响：企业计提以上资产的减值准备需要格外谨慎——一旦计提就是永久的利润侵蚀，无法修复。","cat":"资产减值","kw":"资产减值,CAS 8,可收回金额,减值测试,资产组,资产减值损失,递延所得税资产,账面价值,所得税,商誉,持有待售","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第8号——资产减值、企业会计准则第18号——所得税"},{"id":"CY0201","q":"同⼀控制企业下股权转让处理","a":"⾸先要确定：为何B、C的净资产是⼤额负数，但转让价格较⾼？尤其是C的账⾯净资产-500万，但仍按1000万转让？这是否涉及B的个别报表层⾯对C未恰当计提减值准备的问题？ 如果不考虑交易公允性问题（即A将B、C股权转让给E不属于权益性交易），并且假设这两步交易不是⼀揽⼦交易，则：个人理解，供参考。","cat":"资产减值","kw":"减值","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3458","q":"什么是'实质固定付款额'？在租赁负债计量中如何应用？","a":"根据CAS 21，实质固定付款额是指形式上可能含可变条款但实际上不可避免支付的款项。\n\n判断标准：\n（1）如果付款条款表面上是可变的，但实际上不构成真实的可变性（即企业不可避免要支付），应作为固定付款额处理；\n（2）实质固定付款额的常见情形包括：\n  - 租赁协议约定'最低保底租金+可变超额部分'→最低保底部分是实质固定付款额\n  - 多种付款方案但企业只能选择其中一种→按该方案金额\n  - 多种可行方案但企业必然选择某一方案→按该方案金额\n\n在租赁负债计量中的应用：\n租赁负债 = Σ(实质固定付款额 + 合理确定的购买行权价 + 预期终止租赁需付金额 + 担保余值预计支付额)折现\n\n实务提示：不能仅以合同表面上写了'租金按月调整'就全部按可变处理——要看实质。如果'调整'有保底下限，下限部分是不可避免的实质固定付款额。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,CAS 21","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报、企业会计准则第21号——租赁"},{"id":"3457","q":"金融资产减值中'信用风险显著增加'如何定义和判断？","a":"根据CAS 22，预期信用损失模型需评估信用风险是否'显著增加'以确定按12个月ECL还是全生命周期ECL计量。\n\n信用风险显著增加的判断标准（列举）：\n（1）内部定价机制——如果实际利率的变动超过阈值，通常表明信用风险显著变化；\n（2）外部评级下调；\n（3）合同付款逾期超过30天（可反证推翻）；\n（4）借款人经营环境或财务状况的重大不利变化；\n（5）预计会降低借款人偿债能力的监管、经济或技术环境变化等。\n\n一旦信用风险显著增加 → 按整个存续期预期信用损失计提。\n\n已发生信用减值的标志（通常指满足以下之一）：\n- 重大财务困难、破产或重整、违反合同（如逾期超90天）、债权人给予让步（非债务人自愿）、很可能破产、金融资产的活跃市场消失等。\n\n实务建议：企业应建立量化的预警指标体系（如违约概率模型、内部信用评级级别迁移矩阵）来客观记录，避免主观判断被质疑。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,预期信用损失,监管,信用损失,ECL","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"3456","q":"衍生金融工具的确认和计量有哪些基本要求？","a":"衍生工具（期货、期权、互换、远期等）根据CAS 22一律以公允价值计量，且变动计入当期损益（FVTPL），除非被指定为套期工具并满足套期会计条件。\n\n基本规则：\n（1）初始确认：取得衍生工具时按公允价值进行初始确认（通常为交易日，零成本期权除外）；\n（2）后续计量：每报告期末重新按公允价值计量，公允价值变动计入'公允价值变动损益'；\n（3）结算：到期或提前平仓时，终止确认衍生工具，累计公允价值变动已体现在各期损益中。\n\n嵌入式衍生工具：如果嵌入式衍生工具不与主合同紧密相关（如可转债的转股权与债务合同的经济特征不一致），且主合同不以公允价值计量，应将嵌入式衍生工具分拆并单独按衍生工具处理。\n\n实务中的重点：公允价值估计方法的选择要符合CAS 39的层级要求。非标准化（场外交易的）衍生工具估值往往落入第三层级，审计难度大、主观性强。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,CAS 39,公允价值变动损益,审计,终止确认,套期,套期会计,衍生工具,期权,远期","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报、企业会计准则第39号——公允价值计量"},{"id":"CY1914","q":"若不属于债务重组的话，那么关于利息及滞纳⾦ 0.5 亿，A公司能否确认相关的利息收⼊呢？对于担保债权，A 公司能否确认为其他应收款进⾏核算，⽽对于普通债权转为股权，作为其他权益⼯具投资是否恰当呢？","a":"此类债务偿还安排是债务⼈重整的整体安排的⼀部分，实务中⼀般将其作为债务重组处理（虽然引⼊了投资⼈，但投资⼈并不直接向债权⼈偿还债务，偿还债务仍是债权⼈和债务⼈双⽅之间的安排，重整投资⼈的回购只是补充保障）。⽬前很多上市公司的破产重整都是此类业务模式。 即使考虑到重整投资⼈的介⼊，不认为这是严格意义上的债务重组，但会计处理结果仍然是不受影响的。债务重组准则本来就是建⽴在⾦融⼯具准则基础上的，即使没有债务重组准则，按照 ⾦融⼯具相关准则的规定和原则也可以得出相同的处理结果。 对于利息和滞纳⾦能否确认，应谨慎评估引⼊投资⼈后债务⼈还款能⼒的改善情况，如果有实质性改善的，则可以转回此前计提的部分坏账准备（按最新的预计可收回⾦额折现值调整），相应增加利息收⼊的计算基数。 对于担保债权，还款⾦额能够合理估计的，可继续作为以摊余成本计量的⾦融资产（如债权投资、其他流动/⾮流动资产等）核算及列报；对于转股取得的股权，如果拟⻓期持有的，可指定为其他权益⼯具投资，否则应分类为以公允价值计量且其变动计⼊损益的⾦融资产，列报为其他⾮流动⾦融资产。 提问⼈：gpqg 时间：2025-12-17 15:45:18 请教陈版，如果作为其他权益⼯具投资来核算，其公允价值能否按照： 1 亿/51%，计算出 100%股权的公允价值。然后再乘以 3%，作为其他权益⼯具投资的⼊账价值呢？ 谢谢陈版！ 回答⼈：chenyiwei 重整投资⼈愿意出1亿元取得51%股权并控股，可能有其他特殊考虑，不能据此按⽐例测算取得的3%股权公允价值。建议单独评估。个人理解，供参考。","cat":"金融工具","kw":"公允价值,债务重组","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3454","q":"如何区分金融负债和权益工具？永续债分类的判断框架是什么？","a":"根据CAS 37，区分金融负债和权益工具的核心标准是——是否存在支付现金或其他金融资产的合同义务。\n\n金融负债的特征（满足任一）：\n（1）存在向其他方交付现金或其他金融资产的合同义务；\n（2）在潜在不利条件下与其他方交换金融资产或负债的合同义务；\n（3）用自身权益工具结算——但股数随公允价变动的（非固定数量换固定金额）。\n\n权益工具的特征（同时满足）：\n（1）不存在交付现金的合同义务；\n（2）如果用自身权益工具结算，必须是固定数量换固定金额的。\n\n永续债分类实操判断框架：\n第一关——是否强制付息？利率跳升机制是否构成经济强制？有→金融负债\n第二关——投资人是否有回售权？有→金融负债\n第三关——发行人是否有必须赎回的义务（如特定日必须赎回）？有→金融负债\n第四关——是否有或有结算条款导致不可避免的交付义务？有→金融负债\n全部通过→权益工具。\n\n实务中大多数永续债被分类为金融负债就是因为利率跳升机制构成经济强制。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,CAS 37","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"3453","q":"合同资产和合同负债的列报有什么具体要求？","a":"根据CAS 14，合同资产和合同负债应以净额列报。具体规则：\n\n合同资产列报：同一合同下，合同资产减合同负债的净额在资产方列示（如果结果为正）。合同资产需按ECL模型计提减值准备。\n\n合同负债列报：同一合同下，合同负债减合同资产的净额在负债方列示（如果结果为正）。\n\n同一集团的各个子公司之间的不同合同，不能互相抵销。\n\n列报注意事项：\n（1）合同资产和应收账款的区别——应收账款是无条件收款权（仅时间因素），合同资产是附有履约条件的收款权；\n（2）合同资产和合同负债的按期分类——预期一年内收回/清偿的作为流动项目，超一年的作为非流动项目；\n（3）附注中应单独披露合同资产减值准备的变动（期初余额、本期计提、本期转回、核销、期末余额）。\n\n许多上市公司在首次执行新收入准则时，由于未能正确区分合同资产与应收账款，导致披露不准确。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14,合同负债,上市公司,首次执行,子公司,ECL","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第14号——收入、企业会计准则第22号——金融工具确认和计量"},{"id":"3452","q":"授予客户知识产权许可的收入确认有什么特殊规定？","a":"根据CAS 14第三十六条，授予客户知识产权许可需要区分为两类：\n\n第一类——属于在某一时点转让的许可：\n- 企业在许可有效期内不会对授予的许可进行重大影响的活动（如静态软件许可、固定内容版权许可）；\n- 在客户能够使用许可并从中获益的时点确认收入。\n\n第二类——属于在一段期间内转让的许可：\n同时满足以下所有条件时属于时段履约：\n（1）企业将从事对许可有重大影响的活动（如持续更新内容）；\n（2）客户将受到该活动的正面或负面影响；\n（3）该活动在发生时不会导致企业向客户转让商品。\n典型场景：品牌授权经营（加盟费）、持续更新的软件许可（SaaS）。\n\n基于销售或使用情况的特许权使用费：只在客户后续销售或使用实际发生时确认收入（不能提前按估计确认）。这是知识产权许可的一个特别规定。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14,重大影响","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第14号——收入"},{"id":"3451","q":"合同中包含的重大融资成分如何判断和处理？","a":"根据CAS 14第十七条，如果合同包含重大融资成分，应调整交易价格以反映货币时间价值。\n\n判断是否存在重大融资成分：\n（1）付款时点与商品/服务转让时点的时间间隔是否超过一年（超过一年是强烈信号）；\n（2）合同定价是否包含了融资成分的考量；\n（3）交易是否属于预付款后一年内交货（通常无重大融资成分）。\n\n处理方式：\n- 客户预付款（预收款）→ 融资利益归属客户→ 企业确认收入时加计利息收入\n- 企业先交货后收款→ 融资利益归属企业→ 交易价格折现后确认收入\n\n折现率的确定：采用合同双方单独交易中会采用的折现率，通常为企业的借款利率（如向客户提供赊销的隐性融资成本）。\n\n不调整的例外（简化处理）：转让商品与付款时点间隔不超过一年；或者企业可以选择不单独核算（金额影响不重大时）。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第14号——收入"},{"id":"CY0068","q":"求助陈版，关于研发收⼊确认问题","a":"从主帖信息来看，约定了三个付款节点，除了第⼀个节点（预付款）之外，后两个节点⾖显著滞后于受托⽅的实际履约进度，且未见“在整个合同期间内有权就累计⾄今已完成的履约部分收取款项”（即“合格收款权”）⽅⾯的约 定。虽然未约定已⽀付的报酬返还情况，但仍不属于在⼀段时间内履约。⽐较合理的做法是在完成研究并完成项⽬报告及现场验收后确认收⼊并结转成本。个人理解，供参考。","cat":"收入准则","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3449","q":"收入确认的五步法模型的每一步操作要点是什么？","a":"CAS 14新收入准则五步法：\n\n第一步——识别与客户订立的合同：合同必须具有商业实质、对价很可能收回、双方已批准并承诺履行义务。\n\n第二步——识别合同中的单项履约义务：判断商品或服务是否可明确区分——客户可否单独受益+可否与合同其他承诺区分。\n\n第三步——确定交易价格：包括固定对价、可变对价（期望值法或最可能金额法）、重大融资成分（折现）、非现金对价（公允价值）、应付客户对价等变量的考虑。\n\n第四步——将交易价格分摊至各单项履约义务：按各履约义务的单独售价比例分摊。单独售价可观察的优先，否则估计（市场调整法、成本加毛利法、余值法）。\n\n第五步——在履行履约义务时（或过程中）确认收入：区分时点履约和控制权转移判断指标vs时段履约条件和履约进度计量（产出法或投入法）。\n\n五步法看似简单，但每一步都有大量判断空间，必须有充分的合同分析和底稿记录支持。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14,公允价值,控制","src":"财政部 企业会计准则解释公告","std_ref":"企业会计准则第14号——收入"},{"id":"3448","q":"合并报表中外币折算差额的计算和列报有什么要求？","a":"境外经营外币报表折算差额 = 境外经营净资产 × （期末汇率 - 历史汇率） + 境外经营净利润 × （期末汇率 - 平均汇率）\n\n实务计算要点：\n（1）资产负债项目：按期末即期汇率折算；\n（2）所有者权益项目（除未分配利润外）：按历史汇率（发生日即期汇率）；\n（3）利润表项目：按交易发生日即期汇率或当期平均汇率；\n（4）折算差额在资产负债表'其他综合收益'中单独列报。\n\n处置境外经营时：将累计外币折算差额由其他综合收益转入处置当期投资收益——这是利润表中处置收益的重要组成部分，很多企业提前预估不足。\n\n另外：母公司个别报表中对境外经营的长期应收款（实质上构成净投资的部分）产生的汇兑差额也计入其他综合收益，处置时转入损益。","cat":"合并报表","kw":"合并报表,CAS 33,抵销,少数股东,控制权,其他综合收益,合并,外币折算,投资收益,母公司,汇率,未分配利润","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"3447","q":"如何判断投资方是否对被投资方具有'控制'？三要素如何具体应用？","a":"根据CAS 33，控制的判断基于三个要素（缺一不可）：\n\n要素一：拥有对被投资方的权力——即实质性权利而非保护性权利。实质性权利包括表决权（直接持股或通过协议）、任免关键管理人员的权利、否决重大决策的权利等。\n\n要素二：通过参与被投资方的相关活动享有可变回报——回报可以是正的也可以是负的，包括股利、利息、管理费、协同效应收益，也包括可能的亏损和担保责任。\n\n要素三：有能力运用对被投资方的权力影响可变回报的金额——这是权力与回报的关联关系，即投资方是主要责任人而非代理人。\n\n实务判断难点：（1）分散持股的情况——无单一股东持有超过50%时，需考虑股东协议、分散程度、历史投票模式等；（2）结构化主体——不能用传统股权逻辑判断，要穿透看决策权的实质。","cat":"合并报表","kw":"合并报表,CAS 33,抵销,少数股东,控制权,关键管理人员,控制,股利","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"3446","q":"合并报表中对联营企业和合营企业的权益法核算要注意哪些问题？","a":"合并报表层面，对合营企业和联营企业采用权益法核算，需要特别注意：\n\n（1）统一会计政策：如果联营企业采用的会计政策与集团不一致，应按集团政策调整（或按准则规定无需调整的除外）。\n\n（2）统一资产负债表日：如果联营企业资产负债表日与集团不一致（如集团12月31日，联营企业9月30日），应按统一日期编制调整报表（差异不超过三个月且已调整期后重大事项影响的可以通用）。\n\n（3）取得投资时公允价值基础调整：以投资时联营企业各项可辨认资产/负债的公允价值为基础，调整其净利润（如按公允价值提折旧）。\n\n（4）内部交易未实现利润：集团与联营企业间的顺流、逆流交易未实现利润按持股比例抵消。\n\n实务常见错误：合并报表编制人员忽略了权益法下的这些调整，导致投资收益计量不准确。","cat":"合并报表","kw":"合并报表,CAS 33,抵销,少数股东,控制权,合并,合营,联营,公允价值,投资收益,会计政策,折旧","src":"深圳证券交易所 会计监管动态","std_ref":"企业会计准则第33号——合并财务报表、企业会计准则第2号——长期股权投资"},{"id":"3445","q":"合并报表中，同一控制下企业合并和不同一控制下企业合并的处理差异有哪些？","a":"同一控制（权益结合法）vs 非同一控制（购买法）的关键差异：\n\n同一控制：\n（1）被合并方资产/负债按原账面价值并入，不确认新的商誉；\n（2）合并对价与账面价值的差额调整资本公积/留存收益；\n（3）合并利润表包括被合并方自期初起的损益；\n（4）比较报表需追溯调整，视同合并后报告主体一直存在。\n\n非同一控制：\n（1）被购买方资产/负债按购买日公允价值计量；\n（2）合并成本超过可辨认净资产公允价值的差额确认商誉；\n（3）合并利润表仅包括购买日后的损益；\n（4）比较报表不追溯调整。\n\n两种方法的商业实质完全不同——同一控制是集团内部重组，非同一控制是独立交易主体的合并。不能混淆。","cat":"合并报表","kw":"合并报表,CAS 33,抵销,少数股东,控制权,合并,控制,公允价值,账面价值,资本公积,留存收益,追溯调整,商誉,追溯,比较报表","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"3444","q":"合并报表中母子公司之间发生的内部债权债务和内部交易损益如何抵消？","a":"合并报表内部交易抵消的三步标准做法：\n\n第一步，抵消内部销售：借记营业收入，贷记营业成本。此前的错账是只抵消收入的80%——正确做法是所有内部销售收入都应100%抵消。\n\n第二步，抵消未实现内部利润：期末存货中包含的未实现内部销售利润（即未对外售出的存货对应的毛利）需抵消——借：营业成本，贷：存货。\n\n第三步，抵消内部债权债务：应收应付账款对抵，利息收支对抵。内部互相持有的债券投资与应付债券对抵，差额（如溢价购买）冲减投资收益。\n\n对于逆流交易（子公司卖给母公司），还需将未实现利润中属于少数股东的部分单独计算冲减少数股东损益。","cat":"合并报表","kw":"合并报表,CAS 33,抵销,少数股东,控制权,合并,子公司,投资收益,母公司","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"3443","q":"被购买方在购买日之前的亏损产生的可抵扣暂时性差异，购买方如何处理？","a":"根据CAS 18和CAS 20，购买日被购买方原有的可抵扣暂时性差异（包括可抵扣亏损）：\n\n（1）购买日应在识别可辨认资产和负债时，同步评估被购买方的可抵扣暂时性差异是否满足确认条件；\n（2）如果很可能获得未来应纳税所得额，应作为递延所得税资产确认——这会增加可辨认净资产的计量金额，从而减少商誉；\n（3）如果在购买日后12个月内（计量期间），获得关于购买日已存在事实的新信息，可调整购买日的递延所得税资产（对应调整商誉）；超过12个月的则计入当期损益。\n\n特别提示：购买日评估递延所得税资产的可实现性应保守——不能以'本次合并的协同效应'为由预期未来盈利。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,CAS 18,递延所得税资产,暂时性差异,合并,所得税,商誉","src":"深圳证券交易所 会计监管动态","std_ref":"企业会计准则第20号——企业合并、企业会计准则第18号——所得税"},{"id":"3442","q":"购买日如何识别被购买方的可辨认无形资产？","a":"根据CAS 20，无论被购买方是否在账面上确认，只要满足可辨认性标准（合同权利或可分离），都应在购买日单独确认并计量。\n\n常见可辨认无形资产清单：\n（1）与市场相关的：商标、商号、互联网域名、非竞争协议；\n（2）与客户相关的：客户名单、订单/生产积压、客户关系（含非合同性）；\n（3）与技术相关的：专利技术、非专利技术、计算机软件、数据库；\n（4）与艺术相关的：版权、艺术作品。\n\n估值方法：市场法（可比交易）、收益法（超额收益法、许可费节省法）、成本法（重置成本）。\n\n核心难点：商誉与可辨认无形资产的边界界定——未识别的无形资产会全部归入商誉，导致商誉虚高、无形资产被低估，影响后续减值测试的准确性。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,商誉,减值测试","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第20号——企业合并、企业会计准则第2号——长期股权投资"},{"id":"3441","q":"通过多次交易分步实现非同一控制下企业合并时，之前持有的股权如何处理？","a":"根据CAS 20第四十七条，分步实现企业合并的：\n\n（1）购买日之前持有的被购买方股权，应当按照购买日公允价值进行重新计量；\n（2）公允价值与账面价值的差额，计入当期投资收益；\n（3）购买日之前持有的股权涉及其他综合收益的，应当转为购买日所属当期投资收益（可重分类进损益的部分）。\n\n关键时间节点：购买日的确定至关重要。实务中必须基于实质控制权转移的标志（如合并协议获批、财产权交接完毕、购买方已支付大部分对价等）综合判断，不能仅以工商变更为准。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,其他综合收益,合并,控制,公允价值,账面价值,投资收益","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0251","q":"关于⾮上市公司换股合并的长投初始计量","a":"合并成本应按合并⽇的股价（增发权益⼯具的公允价值）计量。即2023年6⽉股价*200万股。不应直接按基准⽇的股价。个人理解，供参考。","cat":"企业合并","kw":"公允价值,合并","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3439","q":"非同一控制下企业合并中，合并成本与享有可辨认净资产公允价值份额的差额如何处理？","a":"根据CAS 20，合并成本大于可辨认净资产公允价值份额的差额，确认为商誉；合并成本小于可辨认净资产公允价值份额的差额（负商誉），经复核后计入当期损益。\n\n实务三步法：\n第一，全面识别被购买方可辨认资产、负债，包括账外无形资产（客户关系、专利、商标等）；\n第二，按公允价值准确计量各项可辨认资产和负债；\n第三，复核无误后，正差确认为商誉，负差计入营业外收入。\n\n特别注意：负商誉必须在附注中详细披露产生的原因和金额。监管层对廉价购买交易的关注度很高，务必留存充分的估值底稿。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,公允价值,合并,控制,营业外收入,监管,商誉","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0371","q":"企业收到培训费补贴","a":"属于政府补助（通常理解是与费⽤相关，其补贴对象是前期对职⼯教育经费的计提额）。由于职⼯教育经费的计提 ⾦额是计⼊营业利润中的各个成本费⽤项⽬，所以该项政府补助与⽇常活动相关，可以计⼊其他收益。个人理解，供参考。","cat":"政府补助","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3437","q":"存货审计中，盘点差异的调整和披露要求是什么？","a":"对于存货盘点发现的差异，会计处理分为两个层面：\n\n日常盘点差异（非年末盘点）：\n- 自然消耗范围内的差异（正常损耗）：计入当期制造费用或管理费用。\n- 管理责任导致的异常差异：先记入待处理财产损溢，查明原因后——可收回的由责任人赔偿（其他应收款），不可收回的计入当期损益。\n\n年末（资产负债表日）盘点差异：\n- 盘亏在期末调整为当期损益；\n- 盘盈按重置成本冲减当期管理费用。\n- 所有盘盈亏均需要通过'待处理财产损溢'科目过渡，不能在利润表直接确认。\n\n披露要求：\n- 盘盈/盘亏金额重大的，应在附注中说明原因和影响金额；\n- 属于上年度差错的盘盈/盘亏（如上期已结束审计后发现差错），应按前期差错处理——追溯调整而非在当期损益体现。\n\n实务中常见注意事项：\n- 年末盘点必须是全盘而非抽查，除非采用永续盘存法且验证定期抽查的准确性；\n- 盘点差异的截止性处理——区分本年和跨年的出入库对盘点差异的影响。","cat":"现金流量表","kw":"现金流量表,CAS 31,经营活动,投资活动,筹资活动,审计,前期差错,追溯调整,追溯","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第31号——现金流量表"},{"id":"3436","q":"套期会计的三种类型是什么？各自适用于什么场景？","a":"根据CAS 24（套期会计），套期关系分为三类：\n\n公允价值套期：\n- 对冲已确认资产/负债或未确认确定承诺的公允价值变动风险。\n- 典型场景：用利率互换对冲固定利率债券的公允价值变动风险。\n- 套期工具和被套期项目的公允价值变动均计入当期损益，互相抵销。\n\n现金流量套期：\n- 对冲已确认资产/负债或极可能发生的预期交易的现金流量变动风险。\n- 典型场景：用远期外汇合约对冲未来采购外币现金流的汇率风险。\n- 套期工具有效部分的公允价值变动计入其他综合收益（套期储备），无效部分计入当期损益。\n\n境外经营净投资套期：\n- 对冲境外经营净投资的外汇风险。\n- 典型场景：用外币借款对冲境外子公司净投资的外汇风险。\n- 套期工具的有效部分计入其他综合收益（外币折算差额），无效部分计入当期损益。\n\n套期会计的三大硬条件：\n（1）有正式的套期关系文档（指定和记录套期关系、风险管理目标和套期策略）；\n（2）套期预期高度有效（80%-125%之间）且能可靠计量；\n（3）套期有效性可定期评估并持续满足。\n\n如果企业不满足套期会计条件，两种衍生工具的公允价值变动都直接计入当期损益——对利润波动大的企业影响显著。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,CAS 24,其他综合收益,套期,套期会计,子公司,衍生工具,远期,外汇,汇率,外币折算","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报、企业会计准则第24号——套期会计"},{"id":"3435","q":"首次执行企业会计准则时，如何追溯调整期初余额？","a":"根据CAS 38（首次执行企业会计准则），首次执行日的会计处理原则是'追溯调整，豁免优先'：\n\n基本规则：\n- 对所有事项按照企业会计准则进行追溯调整，如同企业一直采用准则进行会计处理。\n- 但在以下情形可以豁免追溯（采用未来适用法）：\n\n主要豁免事项：\n（1）企业合并：不以追溯重述在首次执行日前完成的企业合并；\n（2）资产减值：在首次执行日对所有资产按新准则进行减值测试，但不在期初计提商誉减值准备（留待后续测试）；\n（3）公允价值计量豁免：某些情形下可以公允价替代认定为成本入账物业、厂房和设备；\n（4）累计折算差额豁免：所有境外经营的外币报表累计折算差额在首次执行日视为零。\n\n对实务操作的关键要求：\n- 编制「首次执行日资产负债表」（即期初的资产负债表），并保持与上期末资产负债表勾稽；\n- 详细记录每一项追溯调整的计算底稿；\n- 在报表附注中披露准则转换对财务状况的影响。\n\n这主要适用于非上市企业转版新准则或IPO前的制度转换。","cat":"会计政策/估计变更","kw":"会计政策变更,会计估计变更,CAS 28,追溯调整,未来适用法,CAS 38,首次执行,追溯,公允价值,合并,商誉,减值测试","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第28号——会计政策、会计估计变更和差错更正"},{"id":"3434","q":"经营分部的确定标准和披露要求是什么？","a":"根据CAS 35（分部报告），经营分部的确定基于'管理法'，即按照企业内部管理报告结构划分：\n\n报告分部确定标准（满足以下三个定量门槛之一即需单独披露）：\n（1）该分部的收入（含对外交易和分部间交易）占所有分部总收入10%以上；\n（2）该分部的利润（或亏损）的绝对值占所有盈利分部合计利润与所有亏损分部合计亏损两者中绝对值较大者的10%以上；\n（3）该分部的资产占所有分部总资产的10%以上。\n\n合并不达标分部的限制：\n- 合并后的披露分部数量不宜超过10个（如有更多，应合并相似的分部）；\n- 所有单独报告的分部对外收入合计不得低于企业总收入的75%。如果达不到75%，需持续增加分部直到达标。\n\n披露内容：\n- 分部收入（区分对外交易和分部间交易）、分部费用、分部利润、分部资产和负债；\n- 分部收入、费用、利润到合并报表数据的调节表（十分关键也是审计重点）。\n\n实务中一个常见问题：部分企业以'整体经营'为由不披露分部信息——如果企业有多条差异明显的业务线（如地产+金融）、跨地域经营且不同地区盈亏结构显著不同，就应划分经营分部。","cat":"财务报表列报","kw":"报表列报,CAS 30,列报,附注,持续经营,CAS 35,审计,合并","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第30号——财务报表列报、企业会计准则第35号——分部报告"},{"id":"3433","q":"设定受益计划和设定提存计划的区别是什么？","a":"根据CAS 9（职工薪酬），离职后福利分为两类：\n\n设定提存计划（Defined Contribution Plan）：\n- 企业向独立的基金或保险机构缴存固定费用后，不再承担进一步支付义务；\n- 会计处理简单——每期计提费用计入当期损益（或资产成本），对应的负债在支付时冲减；\n- 我国的法定养老保险和失业保险属于此类。\n\n设定受益计划（Defined Benefit Plan）：\n- 企业承诺职工退休后享有固定金额的福利（如每月补充退休金），企业必须确保计划的资产足以支付承诺的福利；\n- 会计处理复杂——每一报告期需要精算评估义务现值（PBO）、计划资产公允价值，并确认净负债或净资产；\n- 精算损益（如精算假设变动导致的负债变动）计入其他综合收益（不能重分类进损益）；\n- 净利息收入/费用计入财务费用；服务成本计入当期损益。\n\n实务提示：我国多数企业采用设定提存计划（基本养老保险）。设定受益计划主要在部分大型国有企业和外资企业中采用（如补充养老计划），会计处理复杂且依赖精算师的专业判断。","cat":"职工薪酬","kw":"职工薪酬,CAS 9,辞退福利,离职后福利,设定受益计划,其他综合收益,公允价值","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第9号——职工薪酬"},{"id":"3432","q":"新金融工具准则下，应收账款坏账准备与旧准则的衔接如何处理？","a":"新旧金融工具准则衔接的核心问题在于ECL模型与已发生损失模型的转换。根据CAS 22的衔接规定：\n\n（1）追溯调整原则：新准则一般要求追溯调整，但提供了若干简化处理。\n\n（2）不重述比较数据：首次执行新准则（如从CAS 22旧版切换到2017修订版）时，无需重述比较期间数据。只需将首次执行日的账面价值差额调整期初留存收益或其他综合收益。\n\n（3）应收账款坏账衔接实操：\n- 在首次执行日，按新准则ECL模型重新计算全量应收账款的预期信用损失；\n- 新旧模型计算的坏账金额差额，调整期初留存收益；\n- 不在利润表中反映为当期的信用减值损失变化。\n\n实务备忘：\n- 首次执行日的ECL计算底稿必须完整保留，作为审计证据；\n- 如果新旧差额较大，应在附注中单独说明过渡影响；\n- 首次执行日后新产生的应收款一律按新准则ECL模型计提——这不属于衔接问题，属于日常核算。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,信用减值损失,其他综合收益,预期信用损失,衔接,坏账,账面价值,留存收益,审计,追溯调整,首次执行,信用损失,ECL,追溯","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"3431","q":"业绩补偿（对赌协议）中，收到业绩补偿款如何会计处理？","a":"企业合并中的业绩补偿（对赌）涉及两个层次的处理：\n\n一、初始确认（购买日）：\n按购买日公允价值将业绩补偿确认为或有对价，作为合并成本的一部分。\n\n二、后续计量（两种路径）：\n路径1——作为CAS 22金融资产：在每一个资产负债表日按公允价值重新计量，变动计入当期损益。如果实际收到补偿高于公允价值，差额同样计入损益。\n路径2——作为权益工具：不重新计量，后续变动在权益内部调整。\n\n三、收到现金补偿时：\n\n如果业绩补偿在初始确认时已按公允价值计入合并成本：\n借：银行存款\n贷：交易性金融资产（或相应权益）\n   （差额可能进投资收益/资本公积）\n\n实务中最常见错误：购买日不做估计（没有确认或有对价），收到补偿款时直接计入营业外收入——这在审计中大概率会被要求追溯调整。\n\n另外要注意：业绩补偿方（原股东）用自身持有的上市公司股票进行补偿时，构成非货币性交易or回购，处理更复杂，需仔细分析合同的法律实质。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,CAS 22,业绩补偿,对赌,公允价值,投资收益,营业外收入,资本公积,审计,上市公司,追溯调整,合并,追溯","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第20号——企业合并、企业会计准则第22号——金融工具确认和计量"},{"id":"3430","q":"共同经营和合营企业的会计处理差异是什么？","a":"根据CAS 40（合营安排），共同经营和合营企业的会计处理差异显著：\n\n共同经营的处理（各参与方直接享有权利和承担义务）：\n（1）确认其对应的资产份额（包括共同持有的资产和自身的资产）；\n（2）确认其对应的负债份额（包括共同承担的负债和自身的负债）；\n（3）确认其对应的收入份额和费用份额。\n本质上，共同经营的各参与方将合营安排的资产、负债、收入和费用按份额直接并入自己的账目。\n\n合营企业的处理（各参与方仅对该企业的净资产享有权利）：\n（1）按照CAS 2采用权益法核算其在合营企业中的权益；\n（2）或按照CAS 22指定的FVTPL模式计量（风险投资机构、共同基金等可选择）。\n\n两者的实质性差异：\n- 共同经营：参与方直接在自身报表中确认份额化的资产/负债/收入/费用（穿透处理）。\n- 合营企业：参与方只在报表中体现'长期股权投资'一项，同时按权益法确认投资收益。\n\n判断的关键：合营安排是否赋予各参与方对特定资产的权利或对特定负债的义务——有→共同经营；无→合营企业。","cat":"长期股权投资","kw":"长期股权投资,CAS 2,权益法,成本法,重大影响,CAS 40,CAS 22,合营,投资收益","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第2号——长期股权投资、企业会计准则第40号——合营安排、企业会计准则第22号——金融工具确认和计量"},{"id":"CY0246","q":"分公司注销，母分公司存在⼤额往来挂账，请问往来如何进⾏账务处理","a":"理论上总部应先对其计提坏账准备，确认信⽤减值损失，然后再进⾏坏账核销处理。个人理解，供参考。","cat":"资产减值","kw":"减值","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3428","q":"生物资产的分类和计量有什么特殊规定？","a":"根据CAS 5（生物资产），生物资产分为消耗性生物资产和生产性生物资产两大类：\n\n消耗性生物资产（为出售或收获为农产品而持有）：\n- 如生长中的林木、存栏待售的牲畜、养殖中的鱼类。\n- 按成本模式计量（初始确认为取得成本+后续管护费），期末减值测试。\n\n生产性生物资产（为产出农产品、提供劳务或出租而持有）：\n- 如果树、产奶的牛、种畜。\n- 初始确认按取得成本；后续计量可选择成本模式或公允价值模式。\n- 在达到预定生产经营目的后，按类似固定资产计提折旧。\n\n公益性生物资产（以防护、环境保护为主要目的）：\n- 如防风固沙林、水土保持林。\n- 按成本模式初始确认，不计提折旧。\n\n生物资产的特殊性：（1）天然增殖（幼崽出生）使资产数量增加，有别于一般资产的产出；（2）农产品收获时（如挤奶、伐木），生物资产未处置但价值已转移为农产品存货。\n\n实务难点：公允价值模式的选择——CAS 5允许（有条件）生物资产采用公允价值模式，但大多数企业选择成本模式以避免公允价值波动的估值困难。","cat":"生物资产","kw":"生物资产,CAS 5,消耗性,生产性,折旧,公允价值,减值测试","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第5号——生物资产"},{"id":"3427","q":"境外经营的恶性通货膨胀经济下会计处理有什么特殊要求？","a":"根据CAS 19以及《企业会计准则解释第5号》，如果境外经营处于恶性通货膨胀经济中（通常定义为三年累计通货膨胀率超过100%），应按IAS 29的要求处理：\n\n（1）该境外经营的财务报表应先按一般物价指数重述（消除通货膨胀的影响）；\n（2）重述后的财务报表再按期末即期汇率折算为人民币；\n（3）不单独列报外币折算差额——重述造成的调整计入当期损益或其他综合收益。\n\n我国对处于恶性通胀经济中的境外经营的特殊处理，目前在实务中适用场景较少（主要涉及在南美、非洲等部分高通胀国经营的企业）。但其核心原则是：通货膨胀对财务报表的影响必须被消除，不能使账面利润因通胀而虚增。\n\n实务建议：如果企业在高通胀国有经营，应建立专门的会计台账，分离出通胀对报表的影响，以帮助集团层面做出正确的合并调整。","cat":"外币折算","kw":"外币折算,CAS 19,折算差额,即期汇率,其他综合收益,合并,汇率","src":"财政部 企业会计准则解释公告","std_ref":"企业会计准则第19号——外币折算"},{"id":"3426","q":"外币财务报表折算的四种汇率分别适用于哪些项目？","a":"根据CAS 19（外币折算），将境外经营的财务报表折算为人民币时，需正确使用不同汇率：\n\n一、资产负债表项目：\n- 资产和负债项目：期末即期汇率（资产负债表日汇率）\n- 所有者权益项目（除'未分配利润'外）：历史汇率（发生时的即期汇率）\n\n二、利润表项目：\n- 收入和费用项目：交易发生日的即期汇率，或即期汇率的近似汇率（如当期平均汇率）\n\n三、折算差额：\n- 外币报表折算差额在资产负债表'其他综合收益'中单独列报，不计入当期损益。\n\n四、特殊项目的处理：\n- 利润分配项目（如宣告发放股利）：按宣告日的汇率折算\n- 实收资本：按出资日的汇率折算，后续不变。\n\n实务中常见误区：\n- 将一个子公司的'年初未分配利润'直接从上年折算后报表抄入（这是对的），但同时将上年的外币折算差额也一并抄入——错误！每年需重新按新汇率计算累计折算差额。\n- 处置境外经营时，原计入其他综合收益的累计外币折算差额应转入处置当期损益。","cat":"外币折算","kw":"外币折算,CAS 19,折算差额,即期汇率,其他综合收益,汇率,子公司,利润分配,股利,未分配利润","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第19号——外币折算"},{"id":"3425","q":"专门借款和一般借款的资本化计算方法差异是什么？","a":"CAS 17对专门借款和一般借款的资本化计算分别采用不同方法：\n\n专门借款（为建造资产而专门借入）：\n资本化金额 = 借款当期实际发生的利息费用（按实际利率法） - 将借款进行短期投资取得的投资收益。\n优点：无需加权平均资产支出，全部借款利息都可以资本化（扣减闲置收益后）。\n\n一般借款（非专为建造资产而借入的多用途借款）：\n资本化金额 = 累计资产支出超过专门借款部分的加权平均额 × 占用一般借款的加权平均资本化率。\n要点：\n（1）加权平均资产支出 = Σ（每笔资产支出 × 占用天数/期间总天数），通常按季度或年度计算；\n（2）加权平均资本化率 = 当期一般借款利息总额 ÷ 一般借款本金加权平均数；\n（3）一般借款资本化金额不得超过当期一般借款实际利息总额。\n\n实务常见错误：\n- 将专门借款的闲置收益计算错误（收益率取银行活期而不是实际的短期投资回报率）；\n- 加权平均资本化率用上期/上年度数据代替本期实际利率。","cat":"借款费用","kw":"借款费用,CAS 17,资本化,专门借款,一般借款,投资收益","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第17号——借款费用"},{"id":"3424","q":"借款费用资本化的开始、暂停和停止条件是什么？","a":"根据CAS 17（借款费用），资本化条件为：\n\n开始资本化（三个条件同时满足）：\n（1）资产支出已经发生（已用现金、转移非现金资产或承担带息债务等形式为建造付出）；\n（2）借款费用已经发生（已实际借入资金并计息）；\n（3）为使资产达到预定可使用或可销售状态所必要的购建或生产活动已经开始。\n\n暂停资本化：\n- 如果购建或生产活动发生非正常中断，且中断超过3个月的，应暂停资本化。\n- 非正常中断的判断：因不可抗力（如异常恶劣天气）、劳资纠纷、资金链断裂等原因导致的中断；正常中断（如季节性停工、例行安全检修）无需暂停。\n\n停止资本化：\n- 所建造或生产的资产达到预定可使用或可销售状态时，停止资本化。\n- 判断资产是否达可使用状态的核心标志：实体建造（含安装）工作已全部完成或实质上已完成；试运行结果表明能够正常运转或营业。\n\n资本化金额的计算：\n专门借款：资本化金额 = 当期实际借款利息 - 未动用借款的临时投资收益\n一般借款：资本化金额 = 累计资产支出超过专门借款部分 × 加权平均资本化率","cat":"借款费用","kw":"借款费用,CAS 17,资本化,专门借款,一般借款,投资收益","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第17号——借款费用"},{"id":"3423","q":"存货跌价准备的计提方法有哪些？如何确定可变现净值？","a":"根据CAS 1（存货），存货期末按「成本与可变现净值孰低」计量。\n\n存货跌价准备计提方法：\n（1）单项计提法（逐项比较）：对重大或特殊的存货逐项比较成本和可变现净值——这是首选方法。\n（2）分类计提法（按类别比较）：对数量繁多、单价较低的存货，可以按存货类别合并计提。\n（3）总体计提法：不推荐单独使用，只在少数特殊场景下配合使用。\n\n可变现净值的确定：\n- 可变现净值 = 估计售价 - 至完工估计将要发生的成本 - 估计的销售费用和相关税费\n- 有合同的按合同价（不超合同量），超过合同量部分按一般售价\n- 估计售价应当考虑资产负债表日后事项的影响\n\n容易出错的地方：市场价下跌但已签销售合同的部分不能用市场价格——必须用合同价格。同时在执行合同价时还要判断合同是否为亏损合同（成本超过收入时需额外确认预计负债）。","cat":"资产减值","kw":"资产减值,CAS 8,可收回金额,减值测试,资产组,CAS 1,可变现净值,预计负债,合并","src":"深圳证券交易所 会计监管动态","std_ref":"企业会计准则第8号——资产减值、企业会计准则第1号——存货"},{"id":"3422","q":"非流动资产处置损益的列报和披露有哪些新要求？","a":"根据财会〔2017〕30号文（关于政府补助等准则的应用），非流动资产处置损益列报分两个层面：\n\n利润表层面：\n- 资产处置收益（损失以负号列示）：反映处置固定资产、在建工程、无形资产、生产性生物资产等非流动资产产生的损益；\n- 营业外收入/支出：反映报废毁损资产产生的损益（非正常处置）。\n\n附注披露层面：\n- 须按资产类别分别披露处置收入、处置资产的账面价值、处置费用和处置净损益；\n- 如果是持有待售资产处置损益，需单独注明属于持有待售相关的处置损益。\n\n实务提醒：\n- '处置'和'报废'的区分是判断列报科目的关键。有意识出售/交换的属于处置（资产处置收益科目），被动报废损毁的属于营业外收支。\n- 如果处置的是子公司（丧失控制权），不在'资产处置收益'中列报，而应单独以'处置子公司及其他营业单位产生的投资收益'项目列报（或合并利润表的一部分）。","cat":"长期股权投资","kw":"长期股权投资,CAS 2,权益法,成本法,重大影响,账面价值,投资收益,营业外收入,合并,子公司,控制,政府补助,持有待售","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"3421","q":"委托/受托经营（代管）业务的合并判断要点是什么？","a":"在实务中，企业代管他人资产（受托经营）或被他人代管（委托经营）时，能否纳入合并报表的判断应以CAS 33的'控制'三要素为基础：\n\n受托经营方是否需要合并：\n（1）是否对受托资产拥有实质性决策权（如自主决定生产计划、销售定价）？\n（2）是否从受托经营中获得可变回报并承担风险？\n（3）是否有能力运用权力影响回报？\n\n委托经营方是否不再合并：关键是委托方是否实质上丧失了决策主导权。如果委托经营协议只是形式上的'甩手掌柜'，委托方仍掌控核心决策，则仍应合并。\n\n实务提示：\n- 不能仅凭协议名称'委托经营'或'承包经营'就下结论——必须穿透看决策权的实质归属；\n- 判断底稿中建议包含协议条款摘要、决策权比较表、可变回报幅度分析等；\n- 部分上市公司利用委托经营安排隐藏亏损子公司于合并范围之外，这已成为监管关注的重点领域。","cat":"合并报表","kw":"合并报表,CAS 33,抵销,少数股东,控制权,合并,上市公司,监管,子公司,控制","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"3420","q":"基本每股收益和稀释每股收益的计算中，潜在普通股包括哪些？","a":"根据CAS 34（每股收益），潜在普通股是指可能赋予持有者在报告期或以后期间拥有普通股权利的工具。主要包括：\n\n（1）可转换公司债券（要在净利润和普通股股数两个方面同时调整）；\n（2）认股权证和股份期权（采用库存股法计算稀释效应，当行权价低于平均市价时具有稀释性）；\n（3）承诺将发行的股份（如有条件的股票增发）；\n（4）或有可发行股份（如果特定条件在报告期末已达到，则应纳入计算）。\n\n稀释每股收益计算中的顺序要求：\n- 先计算各项潜在普通股的增量每股收益（分子增量÷分母增量）；\n- 按增量每股收益从小到大的顺序逐项纳入稀释计算（增量越小越先纳入）；\n- 如果某一项纳入后导致稀释每股收益增加（反稀释效果），则不纳入。\n\n实务中常见盲点：对于盈利企业，库存股法是判断认股权证和股份期权稀释性的标准方法。如果行权价高于平均市价，则具有反稀释性，不应计入。","cat":"每股收益","kw":"每股收益,CAS 34,基本每股收益,稀释每股收益,潜在普通股,稀释,期权,反稀释","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第34号——每股收益"},{"id":"3419","q":"其他综合收益的分类和重分类规则是什么？","a":"根据CAS 30，其他综合收益分为两大类：\n\n第一类——以后会计期间不能重分类进损益的其他综合收益：\n（1）重新计量设定受益计划净负债或净资产的变动；\n（2）指定为FVOCI的非交易性权益工具投资的公允价值变动（股利除外）；\n（3）企业自身信用风险变动引起的金融负债公允价值变动。\n\n第二类——以后会计期间满足条件时将重分类进损益的其他综合收益：\n（1）FVOCI债务工具投资的公允价值变动（扣除减值损失和汇兑损益）；\n（2）现金流量套期储备的有效部分；\n（3）外币财务报表折算差额；\n（4）按权益法核算的应享有被投资单位其他综合收益份额。\n\n实务中容易出错的情况：权益工具投资指定为FVOCI后，其公允价值变动永不再转入损益，只能转入留存收益。这是CAS 22的一个特别规则，目的是防止企业通过投资权益工具操纵利润。","cat":"财务报表列报","kw":"报表列报,CAS 30,列报,附注,持续经营,CAS 22,其他综合收益,设定受益计划,公允价值,留存收益,套期,股利","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第30号——财务报表列报、企业会计准则第22号——金融工具确认和计量、企业会计准则第2号——长期股权投资"},{"id":"3418","q":"财务报表中'持续经营'假设存在重大不确定性时，如何披露？","a":"根据CAS 30（财务报表列报），如果企业存在持续经营的重大不确定性，即便财务报表仍按持续经营假设编制，也需要充分披露。\n\n披露要点：\n（1）在附注中明确说明存在可能导致对持续经营能力产生重大疑虑的事项或情况（如连续大额亏损、净负债、流动性严重不足、主要业务停顿等）；\n（2）说明管理层已经或拟采取的应对措施（如资产出售、债务重组、增资计划等）及其进展；\n（3）清晰说明财务报表仍基于持续经营假设编制的原因。\n\n如果持续经营假设不再恰当，则应采用清算基础编制财务报表——资产按可收回金额计量，负债重新分类，并全面调整财务报表。\n\n这是审计报告和年度报告中备受关注的内容，建议公司建立完善的持续经营评估制度，定期（至少每季度）评估，并留存充分的底稿记录。","cat":"财务报表列报","kw":"报表列报,CAS 30,列报,附注,持续经营,审计,审计报告,债务重组","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第30号——财务报表列报"},{"id":"3417","q":"持有待售的非流动资产或处置组的计量和列报要求是什么？","a":"根据CAS 42（持有待售的非流动资产和终止经营），一旦资产或处置组被划为持有待售类别（满足可立即出售、极可能一年内完成出售等条件）：\n\n计量原则：（1）按账面价值与公允价值减出售费用孰低计量（即减值测试）；（2）停止计提折旧/摊销；（3）差额（账面价值高于公允减出售费用）确认为资产减值损失（可转回，这是与CAS 8的重要区别！）。\n\n资产负债表列报：\n（1）持有待售的非流动资产在流动资产大类下单列'持有待售资产'项目；\n（2）对应的负债在'持有待售负债'项目列报（如处置组的负债）；\n（3）原有的计量分类被覆盖，不再按原分类在固定资产、无形资产等项目中列报。\n\n特别注意：\n- 取得时即满足持有待售条件的购入资产，初始计量按公允价减出售费用，差额计入当期损益（资产减值损失）；\n- 终止经营：能够明确区分的独立主要业务或地区的组成部分，其损益应单独列报在利润表的'终止经营净利润'项目中。\n- 持有待售是资产处置的前奏，不同于资产闲置，两者的列报和计量均有很大差异。","cat":"持有待售","kw":"持有待售,CAS 42,处置组,终止经营,停止折旧,CAS 8,资产减值损失,公允价值,账面价值,摊销,折旧,减值测试","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第42号——持有待售的非流动资产、处置组和终止经营、企业会计准则第8号——资产减值"},{"id":"3416","q":"关联方交易中，价格不公允的部分如何进行会计处理？","a":"根据CAS 36（关联方披露）以及实质重于形式原则：\n\n价格不公允的关联交易应分为两个部分处理：\n\n（1）公允价格部分：按正常交易处理，确认收入/资产/费用等；\n（2）不公允的价差部分：视为股东资本性投入（权益性交易），直接计入资本公积（资本溢价）——不计入当期损益。\n\n实务中的价格不公允方向判断：\n- 向关联方高价采购或低价销售→多付的金额（或多损失的利润）→视同向股东分配或股东投入的反向操作→冲减资本公积；\n- 向关联方低价采购或高价销售→少付的金额（或多赚的利润）→视同股东资本性投入→增加资本公积。\n\n关键难点：什么是'公允价格'？——参考同一产品对外部第三方的售价、同行业毛利率水平、市场可比交易价格。\n\n监管查处重点：输送利益型关联
