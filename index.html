否可以转回，取决于资产性质。个人理解，供参考。","cat":"持有待售","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3791","q":"划分为持有待售资产的时点？","a":"划分为持有待售资产的时点应同时满足以下条件：①企业已就处置该资产作出决议；②已与受让方签订不可撤销的转让协议；③转让将在一年内完成。如果在资产负债表日之前已满足上述条件，则在资产负债表日即应将其划分为持有待售资产，不再计提折旧。个人理解，供参考。","cat":"持有待售","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3790","q":"终止经营的列报要求？","a":"终止经营是指已被处置或被分类为持有待售的、能够单独区分的组成部分，且满足：①代表一项独立的主要业务或一个主要经营地区；②或拟对一个独立的主要业务或经营地区进行处置的一项相关联计划的一部分。终止经营的利润表列报应区分持续经营损益和终止经营损益，并在附注中披露终止经营的详情。个人理解，供参考。","cat":"持有待售","kw":"","src":"财政部 企业会计准则解释公告"},{"id":"3789","q":"持有待售资产的认定条件？","a":"持有待售资产需同时满足：①该资产在当前状况下可立即出售（仅需通常和惯例的出售程序）；②出售极可能发生（已作出决议、已签订有约束力的转让协议、预计在一年内完成出售）；③出售价格与公允价值相比合理。如果持有一年以上仍未出售，应重新评估是否继续满足持有待售条件。个人理解，供参考。","cat":"持有待售","kw":"","src":"财政部 企业会计准则解释公告"},{"id":"3788","q":"资产负债表日后期间发生重大火灾是否属于调整事项？","a":"资产负债表日后期间新发生的火灾属于非调整事项。因为火灾在资产负债表日并不存在，其损失反映的是日后新发生的情况。若损失重大，应在附注中披露该日后非调整事项的性质和影响金额。但若火灾暴露了资产负债表日已存在的安全隐患，则有关资产减值可能属于调整事项。个人理解，供参考。","cat":"资产负债表日后事项","kw":"","src":"中国证监会 会计监管工作通讯"},{"id":"3787","q":"资产负债表日后资产价格发生重大波动如何处理？","a":"资产负债表日后资产价格发生重大波动，如股票市价大跌、大宗商品价格暴跌等，属于非调整事项——因价格波动反映的是资产负债表日后新发生的情况。但当情况严重到可能影响持续经营假设时，可能引发对持续经营假设的重大疑虑，需在附注中披露。个人理解，供参考。","cat":"资产负债表日后事项","kw":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3786","q":"资产负债表日后发现的舞弊是否属于调整事项？","a":"若舞弊发生在资产负债表日或之前，属于前期差错，应作为资产负债表日后调整事项处理——追溯重述前期报表。若舞弊发生在资产负债表日后期间，属于当期事项。实务中关键是要确定舞弊行为的发生时间，从而判断是属于前期差错还是当期事项。个人理解，供参考。","cat":"资产负债表日后事项","kw":"","src":"中国证监会 会计监管工作通讯"},{"id":"3785","q":"资产负债表日后调整事项的判断标准？","a":"资产负债表日后调整事项需同时满足两个条件：①该事项在资产负债表日已经存在；②该事项在资产负债表日后取得新的或进一步的证据。例如：资产负债表日已存在的未决诉讼在日后判决，确认的赔偿金额与原估计不同——属于调整事项。若诉讼事项在资产负债表日后才发生，则属非调整事项。个人理解，供参考。","cat":"资产负债表日后事项","kw":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3784","q":"与合营企业和联营企业交易的披露要求？","a":"与合营企业和联营企业的交易需要按关联方交易披露：交易性质、交易金额、定价政策、未结算款项的金额和条款、坏账准备等。重点关注交易价格的公允性——若不公允，需披露差额及处理方式。这是证监会对上市公司关联交易关注的重点。个人理解，供参考。","cat":"关联方披露","kw":"","src":"中国证监会 会计监管工作通讯"},{"id":"3783","q":"关键管理人员薪酬的关联方披露范围？","a":"关键管理人员薪酬的披露应包括：①工资、奖金和津贴；②社会保险费和住房公积金；③股份支付或利润分享计划对应的费用；④辞退福利等。披露时通常按'董事、监事及高级管理人员'汇总披露，但高管与董事、监事的薪酬宜分开列示。个人理解，供参考。","cat":"关联方披露","kw":"","src":"中国证监会 会计监管工作通讯"},{"id":"3782","q":"母公司向子公司提供免费担保是否属于关联交易？","a":"母公司为子公司融资提供免费担保属于关联交易，需在附注中披露担保金额、期限、是否收取担保费等。合并层面该担保会被抵销，但个别报表层面应披露。若母公司收取担保费，子公司支付的担保费在合并层面需抵销。个人理解，供参考。","cat":"关联方披露","kw":"","src":"深圳证券交易所 会计监管动态"},{"id":"3781","q":"一致行动协议下是否存在关联方关系？","a":"一致行动协议本身可能导致协议各方构成关联方。若A公司与B公司控股股东签署一致行动协议，需按控股股东意思表示行使股东权利，表明A与B公司及其控股股东之间存在特殊关系。即使A仅持有7%股权且仅委派1名董事，仍可能因一致行动安排而与B构成关联方。个人理解，供参考。","cat":"关联方披露","kw":"","src":"深圳证券交易所 会计监管动态"},{"id":"3780","q":"关联方交易采用净额法时如何披露交易金额？","a":"关联方交易会计处理采用净额法的，交易金额仍按净额法认定和披露。但建议同时在披露表格下方以脚注方式披露交易流水全额，以提高透明度。实务中，关联方交易的披露要求比非关联交易更严格——即使按净额法核算，也应在附注中充分披露交易规模。个人理解，供参考。","cat":"关联方披露","kw":"","src":"中国证监会 会计监管工作通讯"},{"id":"3779","q":"永续债对每股收益计算的影响？","a":"归属于永续债持有人的净利润在计算每股收益时，应分别列报'归属于母公司普通股股东的每股收益'和'归属于其他权益工具持有者的每股收益'。永续债利息（税后）在计算基本每股收益时从净利润中扣除。两者不可合并为一个每股收益数字。个人理解，供参考。","cat":"每股收益","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3778","q":"限制性股票对每股收益计算的影响？","a":"限制性股票在计算基本每股收益时，应视为发行在外的普通股（因为一般享有分红权），纳入加权平均股数。在计算稀释每股收益时，若限制性股票的行权价低于平均市价，应将差额部分按'库存股法'调整：假设用行权价收到的资金按平均市价回购股份，净增股数=限制性股票数-回购股份数。个人理解，供参考。","cat":"每股收益","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3777","q":"合并报表与母公司个别报表的每股收益有何不同？","a":"母公司个别报表的每股收益仅基于母公司自身净利润计算。合并报表的每股收益应以合并净利润为基础，归属于母公司普通股股东的净利润为分子，母公司发行在外的普通股加权平均数为分母。合并层面的每股收益反映了集团整体为母公司股东创造的盈利。个人理解，供参考。","cat":"每股收益","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3776","q":"配股或股票股利对每股收益的重述？","a":"发行配股、股票股利或拆股后，在计算列报期间每股收益时，应按调整后的普通股股数重新计算各列报期间的每股收益。若这些事项发生在资产负债表日后、财务报表批准报出日前，应按调整后的股数计算当期和列报期间的每股收益，并在附注中披露该事实。个人理解，供参考。","cat":"每股收益","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3775","q":"可转换债券对每股收益计算的影响？","a":"对于可转换债券，在计算稀释每股收益时应采用'假设转换法'：①将可转债假设于期初或发行日转换为普通股；②将可转债负债部分当期已确认的利息费用（税后）加回归属于普通股股东的净利润；③增加的普通股股数为假设转换将发行的股数。若转换具有反稀释效应，则不应纳入稀释每股收益计算。个人理解，供参考。","cat":"每股收益","kw":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3774","q":"存在多项潜在普通股时稀释每股收益的计算顺序？","a":"计算稀释每股收益时，应按照各潜在普通股的稀释程度从大到小的顺序，逐步将其计入稀释每股收益的计算。稀释程度以'增量每股收益'（即假设转换所增加的归属于普通股股东的净利润除以增加的普通股股数）衡量。增量每股收益越小的潜在普通股，稀释程度越大，应优先纳入计算。个人理解，供参考。","cat":"每股收益","kw":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3773","q":"计算稀释每股收益时如何判断潜在普通股是否具有稀释性？","a":"潜在普通股是否具有稀释性，应按其'假设转换'对持续经营每股收益的影响来判断。假设转换后，若归属于普通股股东的持续经营净利润增加（或亏损减少）的，具有反稀释性；反之具有稀释性。计算时应分别考虑各项潜在普通股，而非汇总考虑。稀释性潜在普通股应按其稀释程度从大到小顺序计入稀释每股收益的计算。个人理解，供参考。","cat":"每股收益","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3772","q":"金融资产终止确认的'过手测试'条件？","a":"企业将金融资产转移给另一方，若要终止确认该金融资产，需满足'过手测试'：①企业从该资产收取现金流量的合同权利已转移；②企业已将金融资产所有权上几乎所有的风险和报酬转移；③企业既没有转移也没有保留几乎所有的风险和报酬，但未保留对金融资产的控制。个人理解，供参考。","cat":"金融工具","kw":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3771","q":"指定为FVOCI的权益工具投资能否重分类？","a":"指定为以公允价值计量且其变动计入其他综合收益的权益工具投资不得重分类。该指定是'一经作出，不得撤销'——无论后续被投资企业是否上市、性质是否变化。这是准则的硬性规定。个人理解，供参考。","cat":"金融工具","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3770","q":"融资性质下长期应付款的利息处理？","a":"融资性质的长期应付款应按实际利率法确认利息费用。若合同未明确约定利率，应按同期银行贷款利率或内含利率计算。利息费用在符合资本化条件时可计入相关资产成本（如资产建造期间），否则计入财务费用。个人理解，供参考。","cat":"金融工具","kw":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3769","q":"集团内公司之间无偿划转资产的入账价值？","a":"属于权益性交易，实务中通常按划出方原账面价值作为划入方入账价值（无需资产评估备案的情况）。若有条件允许且进行了评估、且被划转资产不构成业务的，划入方按评估值入账更合理。个人理解，供参考。","cat":"实务综合","kw":"","src":"中国证监会 会计监管工作通讯"},{"id":"3768","q":"生产季节性停工期间的土地使用权摊销计入哪类科目？","a":"参照四部委2022年年报工作通知（财会[2022]32号），厂区内土地使用权和厂房停工期间的折旧、摊销应直接计入营业成本，不区分开工/停工期间分别计入制造费用、管理费用。这是统一规范的做法。个人理解，供参考。","cat":"固定资产","kw":"","src":"中国证监会 会计监管工作通讯"},{"id":"3767","q":"外币双择期合同作为交易性金融资产处理？","a":"该交易若顺利执行可获利金额固定，应作为交易性金融资产处理。需进一步了解合同汇率与即期汇率的关系、交易目的，以判断是否为嵌入衍生工具或是否需要分拆处理。个人理解，供参考。","cat":"金融工具","kw":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3766","q":"供应商融资安排中应付账款的终止确认？","a":"需根据CAS 22金融负债终止确认的规定分析商业实质。若企业向供应商签发票据后，供应商向银行贴现，企业仍需承担付款义务的，不终止确认应付账款。若企业已与银行建立直接融资安排，应付账款可终止确认并确认银行借款。个人理解，供参考。","cat":"金融工具","kw":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3765","q":"自然人控股公司是否需要编制合并报表？","a":"公司之间若无股权关系，不存在母子公司关系，不能编制一般意义上的合并报表。管理上如有需求，可编制特殊基础的汇总报表，但需严格限制用途和分发范围，不能对外提供。个人理解，供参考。","cat":"报表列报","kw":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3764","q":"员工周末加班的外卖餐费如何入账？","a":"不符合业务招待费的定义，也不符合职工福利费的列支范围。建议计入'管理费用——其他'。实务中此类支出金额通常较小，简化处理即可，但不宜计入与业务性质不符的科目。个人理解，供参考。","cat":"职工薪酬","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3763","q":"过渡期亏损由资产购买方承担的处理？","a":"若被购买方构成业务，过渡期亏损表明取得的可辨认净资产减少，差额在购买日合并报表中确认为商誉。若不构成业务，差额分摊到各项可辨认资产的入账价值中，不确认商誉。关键前提是判断是否构成业务。个人理解，供参考。","cat":"企业合并","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3762","q":"以前年度已抵扣进项税因异常原因转出的处理？","a":"首先要判断是否属于前期差错：如属于应追溯重述前期报表。如不可抵扣的原因是后续发生的（如税务机关认定属于不可抵扣项目），则应确认为当期损失。实务中与税务机关的沟通非常重要。个人理解，供参考。","cat":"实务综合","kw":"","src":"上海证券交易所 会计监管动态"},{"id":"3761","q":"子公司有偿转让资产给母公司（同控）如何处理？","a":"同一控制下的资产转让，转让价格与账面价值的差额计入资本公积。合并层面该交易需完全抵销，资产继续按原账面价值列报。这是同一控制下交易权益性交易原则的体现——不确认损益。个人理解，供参考。","cat":"企业合并","kw":"","src":"深圳证券交易所 会计监管动态"},{"id":"3760","q":"关于质保期内违约金的性质认定？","a":"产品质量保证期内发生的违约金，如果系因产品质量问题导致的履约瑕疵赔偿，应作为营业成本或销售费用的组成部分。如果是因其他原因（如延迟交付等），可能需要单独分析。实务中关键是区分违约金的性质和产生原因。个人理解，供参考。","cat":"实务综合","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3759","q":"以商品房作为媒介进行三方债权债务抵消如何处理？","a":"需要区分以商品房为媒介的债务抵消的经济实质。如果商品房仅作为计算单位而不是真实交易的标的，不能按常规的资产购销处理，应还原为债权债务的清偿或重组。个人理解，供参考。","cat":"实务综合","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3758","q":"存货意外损毁与保险公司赔偿跨期的处理？","a":"存货损失在实际发生时计入营业外支出，次年收到保险赔偿时计入营业外收入，两者不需要配比。这是基于权责发生制——损失和赔偿是两个独立的事项。实务中不能因为预计会收到赔偿就不确认损失。个人理解，供参考。","cat":"实务综合","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3757","q":"厂房产权属于母公司而子公司收租金开票的处理？","a":"需考虑多个问题：子公司是否有权出租母公司房产（是否有转租权）、租金归属哪一方、开票方与收款方是否一致等。若子公司仅代收代付，作为代理人处理更合理。如果子公司是实质上的出租人，应确认租赁收入。个人理解，供参考。","cat":"租赁","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3756","q":"BOT无形资产管线更新替换的会计处理？","a":"PPP无形资产是运营收费权，不是基础设施资产本身，管线拆除等正常更新替换不影响无形资产账面价值。若管线拆除是因合同服务条款变更，需按变更后条款调整会计处理，包括终止确认部分无形资产。个人理解，供参考。","cat":"无形资产","kw":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3755","q":"VIP会员制产品在开通时的会计处理？","a":"会员权益开通时属于待执行合同，后续逐步提供服务。按履约进度确认收入，就未收到的款项部分确认应收账款或合同资产，同时确认增值税纳税义务（已取得无条件收款权时）。关键点是会员权益的转让属于在一段时间内履行的义务。个人理解，供参考。","cat":"收入准则","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3754","q":"代编分录服务是否违反审计独立性？","a":"若以审计调整建议方式提出，且经管理层签字认可并相应调整账务，不属于'会计和记账服务'，不违反独立性准则。关键是审计师不承担管理层职责、不负责批准和记账。个人理解，供参考。","cat":"实务综合","kw":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3753","q":"内控缺陷判断——流程审批结束前转固是否构成缺陷？","a":"流程结束前转固表明审批流程滞后于实际情况，理论上存在内控缺陷。实务中考虑谨慎性原则，应尽早及时确认成本费用（不推迟折旧成本的确认）。但对不影响损益或可能导致确认收益的事项，审慎程度可以适当降低。个人理解，供参考。","cat":"实务综合","kw":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3752","q":"银行存款利息收入的列报？","a":"银行存款利息收入应在利润表的'财务费用——利息收入'（作为财务费用的减项）或其他收益中列报，取决于该利息收入是否与日常活动相关。实务中一般企业的银行存款利息计入财务费用。个人理解，供参考。","cat":"实务综合","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3751","q":"信托资金的会计处理（为本公司融资设立or为其他方融资设立）？","a":"若信托是为B公司自身融资设立的，B公司将其纳入合并范围，个别报表确认为其他非流动资产按成本法核算。若信托是为母公司或其他子公司融资，B公司仅为出资，持有份额确认为以公允价值计量且其变动计入当期损益的金融资产。个人理解，供参考。","cat":"金融工具","kw":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3750","q":"新金融准则下应收账款坏账准备如何披露三阶段模型？","a":"15号编报规则是披露规则，不规范确认计量要求。CAS 22（2017）下，应收账款、应收租赁款等流动资产基本不使用三阶段模型测算坏账准备，附注中三阶段模型披露仅为备用，一般不会用到。按账龄法计提坏账准备符合准则简化要求。个人理解，供参考。","cat":"金融工具","kw":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3749","q":"可供出售金融资产处置时累计OCI如何结转？","a":"其他债权投资（FVOCI债务工具）处置时，累计在其他综合收益中的公允价值变动应转入当期损益（投资收益）。其他权益工具投资（FVOCI权益工具）处置时，累计OCI直接转入留存收益，不经过损益。两者处理原则不同。个人理解，供参考。","cat":"金融工具","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3748","q":"存在境外分支机构时的外币折算处理？","a":"境外代表处不属于独立经营实体，其记账本位币应与境内总公司一致。汇总报表时不应出现'其他综合收益——外币报表折算差额'。判断标准是境外机构是否构成境外经营：是否有自主经营权、是否独立产生和支出外币。个人理解，供参考。","cat":"实务综合","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3747","q":"外币报表折算中内部往来抵销的汇率差异处理？","a":"内部往来余额按期末汇率折算后余额应相等，可直接抵销干净，抵销分录中不会出现汇兑损益或OCI。各自报表中的汇兑损益和折算差额应予以保留，不互相抵销。这是合并层面的常规操作。个人理解，供参考。","cat":"实务综合","kw":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3746","q":"投资性房地产成本模式转公允模式的条件？","a":"新控股股东成为母公司后，子公司不可因此变更投资性房地产的计量模式。会计政策变更需要满足准则规定的条件（能提供更相关、可靠的信息），单纯因为控股股东变更为这一理由不足以支持模式变更。个人理解，供参考。","cat":"实务综合","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3745","q":"农村土地承包经营权能否作为投资性房地产？","a":"农村土地承包经营权只是经营收益权，法律上不构成对土地的所有权或使用权，不能确认为投资性房地产。即使长期取得经营权证、拥有经营收益和转租权利，也应当确认为使用权资产而非无形资产，转租也不能转为投资性房地产。个人理解，供参考。","cat":"实务综合","kw":"","src":"上海证券交易所 会计监管动态"},{"id":"3744","q":"子公司分红因诉讼未确定的处理？","a":"因诉讼事项决议将分红先用于补偿诉讼支出，这仅是分红的预授权，最终可分配金额不确定。建议先不确认投资收益和应收股利，到金额确定后再按实际获得分红金额处理。体现了谨慎性原则。个人理解，供参考。","cat":"长投","kw":"","src":"深圳证券交易所 会计监管动态"},{"id":"3743","q":"子公司回购股份的母公司合并报表处理？","a":"子公司回购股份在母公司合并报表层面等同于购买少数股权，按权益性交易处理。母公司应计算回购前后在子公司净资产中所享有份额的差额，与子公司支付的回购款比较，差额调整合并报表层面的权益。合并报表层面无库存股列报。个人理解，供参考。","cat":"企业合并","kw":"","src":"深圳证券交易所 会计监管动态"},{"id":"3742","q":"内部交易中已缴纳税款子公司不能抵扣的合并抵销？","a":"母公司在内部交易中缴纳的税款中子公司不能抵扣的部分，在合并报表层面直接计入损益（税金及附加）。内部交易损益按不含税金额计算，这是合并报表还原经济实质的体现。个人理解，供参考。","cat":"企业合并","kw":"","src":"上海证券交易所 会计监管动态"},{"id":"3741","q":"无形资产出资取得公司控制权（非同控）如何处理？","a":"母公司个别报表层面，长期股权投资按无形资产公允价值入账，公允价值与账面价值的差额计入资产处置损益。合并报表层面，无形资产一直在母公司控制范围内，账面价值保持不变，母公司个别报表确认的资产处置损益需抵销。个人理解，供参考。","cat":"企业合并","kw":"","src":"中国证监会 会计监管工作通讯"},{"id":"3740","q":"不动产权登记费是否资本化？","a":"通过对不动产进行权利登记可使权益获得更好保护，有助于通过出售等方式获取经济利益，符合资本化条件。但如果金额较小也可简化处理予以费用化。实务中体现了重要性原则的运用。个人理解，供参考。","cat":"固定资产","kw":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3739","q":"项目建设期管理人员工资是否计入在建工程？","a":"财务人员、党建人员等属于一般行政人员，建设期内和建成后的工作内容相同，与固定资产达到预定可使用状态无直接关系。应直接计入管理费用，不计入在建工程。参考《中审众环研究2020》问题1-1-29。个人理解，供参考。","cat":"固定资产","kw":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3738","q":"石化行业固定资产折旧年限能否比合作年限更长？","a":"需看在没有补充协议的情况下，能否合理确定5年期满后将继续合作至主要资产折旧期满。如有充分证据，可认可比合作年限更长的折旧年限。实务中需评估续约的确定性和可能性。个人理解，供参考。","cat":"固定资产","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3737","q":"处置下属孙公司的非经常性损益如何列报？","a":"仍放在'非流动资产处置损益'项目。合并报表中处置子公司和孙公司的会计处理原则一致，损益列报项目也应相同。不应因为被处置对象是孙公司就改变列报方式。个人理解，供参考。","cat":"报表列报","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3736","q":"合并层面计算非经常性损益时少数股东影响如何处理？","a":"非经常性损益是从合并报表层面计算的，但需区分归属于母公司股东和归属于少数股东的部分。少数股东享有的非经常性损益份额，在计算归属于母公司股东的非经常性损益时应予剔除。个人理解，供参考。","cat":"报表列报","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3735","q":"售后回租交易中支付租金义务何时产生？","a":"主要考虑以租赁期开始日为标志——即取得了主导已识别资产使用的权利。如尚未收到全部价款仅办理抵押手续，可说明尚未产生支付租金义务。实务中的关键时间节点是资产实际移交使用。个人理解，供参考。","cat":"租赁","kw":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3734","q":"未分配利润转增资本的投资者账务处理？","a":"未分配利润转增资本是被投资企业股东权益内部结构的调整，不影响投资者对该项投资的成本或公允价值，投资者无需进行账务处理。这与现金分红不同——现金分红需要确认投资收益。个人理解，供参考。","cat":"实务综合","kw":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3733","q":"资本公积的性质分类？","a":"资本公积分两部分：资本溢价和权益结算股份支付形成的部分属资本性投入（不能转留存收益）；其他资本公积中除股份支付外的部分更多是过渡性项目，类似其他综合收益，日后最终转入损益。这一分类对理解权益结构很重要。个人理解，供参考。","cat":"实务综合","kw":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3732","q":"母子公司票据贴现的合并抵销？","a":"合并报表层面基础交易已抵销，体现为获得融资。应将贴现款确认为短期借款，贴现息在贴现日至到期日间分摊确认为利息支出，到期支付视同还本付息。合并层面还原了经济实质——外部融资而非内部交易。个人理解，供参考。","cat":"实务综合","kw":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3731","q":"基金管理人是否纳入合并范围的判断？","a":"投资决策委员会不就管理人本身的财务经营事项进行决策，判断管理人是纳入合并时不考虑投委会。但判断管理人管理的基金是否纳入合并时，通常需考虑投委会的构成和决策机制。两者是不同的合并范围判断问题。个人理解，供参考。","cat":"实务综合","kw":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3730","q":"以前年度已抵扣进项税转出的处理？","a":"关注是否属于前期差错：如属于前期差错，应相应更正前期报表；不属于前期差错的，作为清算损失处理。实务中需要与税务专业人士沟通确认是否可以留抵退税或结转抵扣。个人理解，供参考。","cat":"实务综合","kw":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3729","q":"分公司注销往来挂账如何处理？","a":"总部应先对其他应收款计提坏账准备、确认信用减值损失，再进行坏账核销处理。不宜在注销时一次性将往来差额计入损益——应按照正常的会计程序分步处理。个人理解，供参考。","cat":"实务综合","kw":"","src":"上海证券交易所 会计监管动态"},{"id":"3728","q":"子公司注销债务由母公司承担的账务处理？","a":"母公司应在承接债务并注销子公司时，贷记负债科目，借记投资收益，作为清算子公司损益的一部分。实质上这是母公司作为股东收回剩余权益分配的过程。个人理解，供参考。","cat":"实务综合","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3727","q":"小企业会计准则下对赌条款的处理？","a":"小企业会计准则和企业会计制度中均无对赌条款的明确规定。建议在签订融资对赌条款时转换至企业会计准则——因为后续融资和资本运作不可避免，应尽早规范化。对赌条款的会计处理比较复杂，小准则确实力不从心。个人理解，供参考。","cat":"实务综合","kw":"","src":"上海证券交易所 会计监管动态"},{"id":"3726","q":"前期差错更正是否影响前期内控审计报告意见类型？","a":"重大前期差错更正表明前期财务报表相关内控存在重大缺陷。如果前期已出具了内控审计报告，应重新出具该期的内控审计报告。这是内控审计准则的明确要求。个人理解，供参考。","cat":"实务综合","kw":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3725","q":"公司自行开发ERP能否作为研发项目？","a":"ERP用于内部管理非企业对外销售的产品。小规模IT部门不可能起主导作用，更可能是外购软件安排（形成无形资产）而非研发项目。若公司确实主导开发并满足研发定义，可作为研发活动计入研发费用——但能否加计扣除和认定为高新是另一问题。个人理解，供参考。","cat":"无形资产","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3724","q":"异地搬迁老厂区固定资产减值后是否继续折旧？","a":"老厂区停产后资产虽已闲置，不符合持有待售条件，计提减值后仍需按减值后的账面价值在剩余使用寿命内计提折旧。除非资产符合持有待售条件或已报废清理。实务中不能因为计提了减值就停止折旧。个人理解，供参考。","cat":"实务综合","kw":"","src":"中国证监会 会计监管工作通讯"},{"id":"3723","q":"破产项目调账如何处理？","a":"债权已经法院和管理人确认、金额确定的，贷记其他应付款100万元。借方建议暂挂'待处理财产损溢'，到最终核查结果确定后再处理。破产程序中的账务处理应保持审慎，不宜过早确认收益。个人理解，供参考。","cat":"实务综合","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3722","q":"破产重整中信托受益权份额如何初始确认与后续计量？","a":"债权人原债权已全额计提坏账的，核销原债权，按信托受益权的公允价值确认金融资产（初始按公允价值计量）。公允价值可参考信托计划的现金流折现、同类资产市场价格等方式确定。个人理解，供参考。","cat":"实务综合","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3721","q":"认缴制下的债转股如何处理？","a":"母公司对子公司以未实缴出资情况下的往来借款进行债转股，应区分已实缴与未实缴部分的处理。已形成实缴出资义务的借款转增资本更合理，否则可能造成出资不实。实务中需关注是否符合公司法关于出资的规定。个人理解，供参考。","cat":"债务重组","kw":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3720","q":"法院判决解除租赁合同是债务重组还是租赁变更？","a":"法院判决解除租赁合同属于租赁变更，不是债务重组。应收租金差额应冲减租金收入，而非确认债务重组损益。债务重组准则是针对金融工具债权债务的重新安排，而租赁合同解除属于租赁准则的范畴。个人理解，供参考。","cat":"债务重组","kw":"","src":"财政部 企业会计准则解释公告"},{"id":"3719","q":"迪链现金折扣属于债务重组还是可变对价？","a":"若现金折扣不是原销售合同约定、无使用先例，对已持有的迪链申请贴现属于债务重组。若后续该模式成为常规操作、双方形成了结算预期，可逐步转化为可变对价处理。实务中需要看业务模式是否已经固化。个人理解，供参考。","cat":"债务重组","kw":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3718","q":"法院判决变更违约金是否属于债务重组？","a":"法院判决变更违约金条款属于债务重组。若原已按合同条款确认了9万违约金收入，可将减少的2万作为债务重组损失。若原未确认收入，可在收到执行款后按实际收到的金额确认为营业外收入。实务中关键是原已确认的债权金额是否恰当。个人理解，供参考。","cat":"债务重组","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3717","q":"债务重组中债务人分批次豁免的确认时点？","a":"同一合同分两批次豁免债务——第一批300万元为无条件豁免，应立即确认债务重组收益。第二批附条件再豁免300万元的，需在条件满足时才能确认债务重组收益，不能在条件满足前提前确认。个人理解，供参考。","cat":"债务重组","kw":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3716","q":"处置长期股权投资时的成本结转方法？","a":"会计和税务上均采用加权平均法确定处置股权的成本，不考虑先进先出法。每次取得股权的成本应单独核算，处置时按加权平均单价计算处置成本。实务中如果各批取得价格差异较大，加权平均法可以平滑处置损益。个人理解，供参考。","cat":"长投","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3715","q":"权益法下认缴未实缴的按认缴比例分红如何处理？","a":"未实缴出资的，权益法核算时仅按实际出资比例享有或承担被投资单位的损益。若章程约定按认缴比例分红，需在符合分红条件时按认缴比例确认投资收益，同时确认应收股利。未实缴部分对应的收益不调整长期股权投资账面价值。个人理解，供参考。","cat":"长投","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3714","q":"收购后协商减少收购款是否直接调整长投成本？","a":"属于购买日后补充的价格调整，不构成一揽子交易，不直接调整长期股权投资成本。应先对长投进行减值测试计提减值损失。若账面已确认尚未支付的收购款为负债，将该负债转入营业外收入。减值损失金额不应小于营业外收入金额。个人理解，供参考。","cat":"长投","kw":"","src":"上海证券交易所 会计监管动态"},{"id":"3713","q":"非上市公司换股合并的长投初始计量基础？","a":"合并成本应按合并日的股价（增发权益工具的公允价值）计量，不应直接按基准日股价。如果合并日与基准日之间股价发生重大变化，用基准日价格会严重高估或低估合并成本。实务中应获取合并日的交易价格或估值。个人理解，供参考。","cat":"长投","kw":"","src":"中国证监会 会计监管工作通讯"},{"id":"3712","q":"联营企业发生同控合并时投资收益如何处理？","a":"联营企业发生同一控制下企业合并时，投资方在权益法下应按享有联营企业净资产变动的份额确认投资收益。同控合并对联营企业属于权益性交易，投资方对应享有的部分也应作为权益性交易调整资本公积。个人理解，供参考。","cat":"长投","kw":"","src":"上海证券交易所 会计监管动态"},{"id":"3711","q":"权益法核算下被动稀释与超额亏损的处理顺序？","a":"参考《监管规则适用指引——会计类第3号》之3-2，应先按享有的被投资单位净资产变动份额确认相关投资损益、其他综合收益、资本公积，调整长投账面价值。再按当期应享有净资产变动净额与前期未确认投资净损失孰低的原则，确认前期未确认的投资净损失。未确认的投资净损失可由应享有的其他权益变动份额弥补。个人理解，供参考。","cat":"长投","kw":"","src":"中国证监会 会计监管工作通讯"},{"id":"3710","q":"接受股权捐赠如何处理？","a":"需先分析交易的经济实质（是否隐蔽关联方、捐赠目的等）。若捐赠协议约定捐赠前的未分配利润归原股东，表明该部分净资产不在受赠范围内。若接受方可控制被投资企业，合并报表中将归属原股东的权益确认为负债。个人理解，供参考。","cat":"长投","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3709","q":"属于权益的永续债在所有者权益变动表如何填列？","a":"归属于永续债持有人的净利润属于'归属于其他权益工具持有者的净利润'，与归属母公司股东净利润和少数股东损益三者并列，三者之和等于合并报表净利润。即使个别报表层面也有必要区分列示。个人理解，供参考。","cat":"报表列报","kw":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3708","q":"一年内到期的融资租赁保证金如何列报？","a":"该类保证金属于一年内到期的长期应收款，应列报为'一年内到期的非流动资产'。实务中融资租赁保证金通常与租期挂钩，租赁期超过一年的在长期资产列示，一年内到期的重分类至流动项目。个人理解，供参考。","cat":"报表列报","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3707","q":"固定资产清理期末能否有余额？","a":"'固定资产清理'期末可以有余额，在资产负债表中单列该项目。若企业报表格式无此项目，可自行添加，或余额较小时并入'固定资产'项目列示。实务中只要存在已转入清理但尚未完成处置的资产，就应有余额。个人理解，供参考。","cat":"报表列报","kw":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3706","q":"应收账款不同项目的应收款和预收款能否抵销列报？","a":"不同项目的应收账款和合同负债不应抵销列报，应按项目分别列示应收账款和合同负债，分别计提坏账准备（除非合同明确约定违约时可相互抵销）。应收账款账龄应按项目分别测算，避免抵销后账龄列报不合理。个人理解，供参考。","cat":"报表列报","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3705","q":"现金流净额列示条件是否需要三个条件同时满足？","a":"三个条件需同时满足才可按净额列报。'周转快、期限短'可参考企业正常营业周期判断——若资金代收代付间隔短、企业无法投入自身资金周转，符合净额列报标准。'金额大'指按总额列报会严重扭曲现金流量结构。该判断原则目前仍适用。个人理解，供参考。","cat":"报表列报","kw":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3704","q":"现金流量项目划分是否需考虑事项发生后的调整？","a":"现金流量项目的划分依据是现金流量发生之日的状况和交易目的。后续情况变化导致会计处理调整，但无现金流量实际发生的，无需调整原现金流量项目的分类。即'历史成本'原则在现金流量分类中的延伸应用。个人理解，供参考。","cat":"报表列报","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3703","q":"现金流量表附表固定资产折旧如何填列？","a":"根据本期计提折旧金额填列，不是期末余额减期初余额。需剔除资本化计入其他长期资产成本的折旧额（如计入在建工程的折旧）。无形资产摊销、长期待摊费用摊销、使用权资产折旧同理。实务中梳理附表项目时应与总账的本期计提数核对一致。个人理解，供参考。","cat":"报表列报","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3702","q":"员工激励奖金（4年期与累计EBIT挂钩）如何处理？","a":"该安排属于'其他长期职工福利'。因期限较短、最终发放金额仅受业绩影响，可简化为按考核期业绩预测确定计提数，在服务期内分摊。属于长期激励计划，需考虑折现影响——若折现影响不重大可简化处理。个人理解，供参考。","cat":"职工薪酬","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3701","q":"年终一次性奖金分摊的方案选择？","a":"年终奖计算依据是全年项目业绩，按实施人员全年工时在全年所有项目中分摊的方案更合理。不应将年终奖仅归属到年末的项目——这与权责发生制和配比原则相悖。实务中如果金额不重大，简化处理也可接受。个人理解，供参考。","cat":"职工薪酬","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3700","q":"离退休人员社会化费用如何确认？","a":"移交地方管理的离退休人员相关费用，移交时应按精算结果计提负债，拨付资金后结算该项负债。后续资金不足或结余与企业无关。但若企业仍需承担补足责任，移交后每年需重新精算调整负债余额，调整金额视情况计入管理费用或其他综合收益。个人理解，供参考。","cat":"职工薪酬","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3699","q":"通用软件的成本结转年限？","a":"300万元开发支出全部资本化前提下，产品生命周期3年，一般按3年摊销，即每年摊销100万元无形资产到营业成本。摊销年限应反映该软件预期带来经济利益的期间。若产品生命周期可能更短，应相应缩短摊销年限。个人理解，供参考。","cat":"无形资产","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3698","q":"财政部2025年无形资产准则实施问答的核心要点？","a":"已费用化的研发样机支出不得在以后期间销售时冲回转入存货或营业成本。关于国有研发样机出售是否需要进场交易：关键看样机用途——与正常商品一样用于出售的无需招投标；用于自用、展示的则需要。这体现了'一惯性'原则。个人理解，供参考。","cat":"无形资产","kw":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3697","q":"合作研发模式下子公司研发支出的处理？","a":"若母公司可主导研发成果整体商业化，子公司相当于为母公司提供研发外包服务。子公司应将研发支出通过'合同履约成本'归集转入营业成本，确认营业收入的同时确认一项收益分享权资产。子公司个别报表中不能确认研发支出——研发支出应在母公司报表层面确认。个人理解，供参考。","cat":"无形资产","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3696","q":"定制化产品研发支出如何处理？","a":"首先判断研发成果控制权归属。若企业可控制研发成果且适用于其他合同，相关支出可计入研发费用。若受托方可控制研发成果，按无形资产准则区分研究阶段和开发阶段——研究阶段支出费用化，不后续资本化也不计入营业成本。个人理解，供参考。","cat":"无形资产","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3695","q":"研发样件成本能否按预计售价确认入库冲减研发费用？","a":"不可以。应遵循《监管规则适用指引——会计类第3号》3-11，以正常设计生产能力下的必要合理支出为基础确认存货成本。转出金额不能超出累计资本化的开发支出总额。这一规定旨在防止企业通过将研发支出转入存货来虚增利润。个人理解，供参考。","cat":"无形资产","kw":"","src":"中国证监会 会计监管工作通讯"},{"id":"3694","q":"政府补助下土地使用权在建期间的摊销如何处理？","a":"在建工程期间，土地使用权的摊销计入在建工程成本。对应的政府补助暂停摊销，待工程完工后随固定资产折旧逐步转入其他收益。这种处理反映了配比原则——补助与对应的折旧费用在相同期间确认。个人理解，供参考。","cat":"政府补助","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3693","q":"政府补助是否与日常活动相关的判断？","a":"三项补助（招商经费、科技企业孵化器补助、科技计划课题补助）均属于与日常活动相关的政府补助，计入'其他收益'。判断依据是：补助所补偿的成本费用属于营业利润构成项目，或与日常经营行为密切相关。与日常活动无关的政府补助才计入营业外收入。个人理解，供参考。","cat":"政府补助","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3692","q":"与资产相关政府补助分期纳税是否需要审计调整？","a":"理论上需按税法规定的一次性纳税要求进行纳税调整。若被审计单位坚持不调整，可从影响大小（定性+定量）、当地是否有此类税务处理惯例等因素综合判断能否接受其现有处理。审计调整的金额如不重大，可接受不调整。个人理解，供参考。","cat":"政府补助","kw":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3691","q":"PPP项目中的政府拨付资金是否为政府补助？","a":"PPP项目中政府和企业是平等的商事主体。政府补助是政府以公共事务管理者身份无偿授予的资源，同一交易中不应同时兼具两种身份。该款项的实质可能是政府代付工程款，结算企业对政府的应收款或无形资产，不属于政府补助。个人理解，供参考。","cat":"政府补助","kw":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3690","q":"员工股权激励中员工承担股价下跌风险如何处理？","a":"不涉及单独确认衍生工具。基于谨慎原则，等待期内回购义务相关负债的账面价值保持原授予价格不变。若最终回购价低于授予价（员工承担了下跌损失），差额在实际回购时转入资本公积。这体现了对员工在企业服务中获得激励的实质判断。个人理解，供参考。","cat":"股份支付","kw":"","src":"中国证监会 会计监管工作通讯"},{"id":"3689","q":"股份支付与利润分享计划的核心区别？","a":"核心区别是激励对象能否通过正常退出途径享有或承担激励股权的公允价值变动收益或损失。若退出价格按原始出资加利息确定，员工无法享有股权增值收益，这属于利润分享计划而非股份支付。非上市公司股权公允价值难以确定的，可暂不按股份支付处理。个人理解，供参考。","cat":"股份支付","kw":"","src":"中国证监会 会计监管工作通讯"},{"id":"3688","q":"撤材料后股份支付的摊销期限是否需要调整？","a":"按新的IPO计划修改剩余摊销期限。若预计近期IPO无成功希望，可将前期已确认的股份支付费用冲回。再次提交申报时重新估计等待期。实务中这是IPO审慎处理股份支付的重要方面，关键是对IPO成功可能性的重新评估。个人理解，供参考。","cat":"股份支付","kw":"","src":"上海证券交易所 会计监管动态"},{"id":"3687","q":"员工持股计划中公司回购股份如何处理？","a":"员工持股计划由公司控制，应纳入合并报表范围。合并层面处理参照《企业会计准则解释第7号》第五条限售股回购义务的处理。未解锁份额收回不必然确认回购义务，需判断是否存在等待期。实务中关键是判断员工是否实质性享有了股权激励。个人理解，供参考。","cat":"股份支付","kw":"","src":"财政部 企业会计准则解释公告"},{"id":"3686","q":"股份支付二次授予能否冲销前次费用？","a":"第二次转让与前次转给实控人（无等待期）的股份支付交易无直接关系，不能冲销之前已确认的股份支付费用。第二次股份支付费用总额=第二次授予日公允价值-授予价格。两次股份支付应各自独立确认费用。个人理解，供参考。","cat":"股份支付","kw":"","src":"上海证券交易所 会计监管动态"},{"id":"3685","q":"实际控制人回购离职员工股权激励份额是否构成股份支付？","a":"股份最初来源为发行人向持股平台定向增发的，实际控制人收回股份后若无再次授予计划，构成新的股权激励，需要确认股份支付费用。实务中这是IPO审核的常见关注点，需关注实控人收回股份的价格与公允价值的关系。个人理解，供参考。","cat":"股份支付","kw":"","src":"上海证券交易所 会计监管动态"},{"id":"3684","q":"递延所得税资产确认是否需要以未来有足够应纳税所得额为前提？","a":"需要区分情况。一般可抵扣暂时性差异和可抵扣亏损，确认递延所得税资产需以很可能获得足够的未来应纳税所得额为限。但交易性金融资产公允价值变动相关的递延所得税负债，不需要以此为前提——因为其转回是确定的（出售或到期时）。个人理解，供参考。","cat":"所得税","kw":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3683","q":"化工生产线关停后如何确认递延所得税资产？","a":"若此前全额转入营业外支出属于前期差错，先更正。更正后资产账面价值为零，计税基础为原值，产生可抵扣暂时性差异。在预计可预见未来有足够应纳税所得额的前提下，确认递延所得税资产。已收到的预收款账面价值与计税基础相同，不涉及递延税影响。个人理解，供参考。","cat":"所得税","kw":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3682","q":"破产重整评估增值是否一定确认递延所得税负债？","a":"若评估增值是因债务豁免导致，被重整企业应将债务豁免计入债务重组收益，同时调整账面净资产至与评估值一致，计入当期应纳税所得额。调整后账面净资产与计税基础无差异，无需确认递延所得税负债。若企业存在可抵扣亏损，可基于未来盈利预测确认递延所得税资产。个人理解，供参考。","cat":"所得税","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3681","q":"递延所得税资产因税务局反馈不可抵扣如何处理？","a":"这个问题需要从两个层面来看：首先区分是否属于前期差错——如确认时存在对税法规定的误解或误用，属前期差错，按差错更正处理；如后续修法导致变为不可扣除，属会计估计变更。其次，确认为前期差错的，需追溯调整。个人理解，供参考。","cat":"所得税","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3680","q":"使用权资产与租赁负债初始确认差异的递延所得税如何处理？","a":"使用权资产≠租赁负债不等于满足初始确认豁免条件。应就两者初始计量金额中孰低者确认等额的递延所得税资产和负债。根据解释第16号，即使预计未来应纳税所得额为负，也应在已确认的递延所得税负债限度内确认与租赁负债相关的递延所得税资产。个人理解，供参考。","cat":"所得税","kw":"","src":"财政部 企业会计准则解释公告"},{"id":"3679","q":"工艺升级后原已资本化的研发支出如何处理？","a":"工艺升级改造需重新进行临床前研究，表明原有资本化金额已不再符合资产确认条件。建议全额计提减值，计入资产减值损失，不应将前期资本化支出转入研发费用。因为这是资产价值的减损，不是费用的当期发生。个人理解，供参考。","cat":"资产减值","kw":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3678","q":"长期股权投资——其他综合收益是否需要计提减值？","a":"长期股权投资作为一个整体进行减值测试，其他综合收益是其账面价值的组成部分。当存在减值迹象时，对联营企业投资整体按CAS 8进行减值测试，比较账面价值与可收回金额。其他综合收益中的项目不单独进行减值测试。个人理解，供参考。","cat":"资产减值","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3677","q":"存货跌价准备与应收款项坏账准备计提的区别？","a":"存货跌价本质上是对已发生损失的确认，即使按组合（如库龄）计提，所计提的跌价准备也可以对应到特定的单项存货——这是与应收款项组合计提坏账准备的重大区别。应收款项按组合计提时并不要求能追溯至特定债务人的信用损失。个人理解，供参考。","cat":"资产减值","kw":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3676","q":"老厂区停产后不可利旧的固定资产和无形资产如何处理？","a":"老厂区全面停产后成为闲置资产，不符合持有待售资产条件，计提减值后仍需按减值后的账面价值计提折旧或摊销。减值测试时需考虑土地市场状况、可预见未来收储或开发的可能性，合理判断可收回金额。实务中对停产厂区的资产减值测试需关注当地工业用地市场的实际状况。个人理解，供参考。","cat":"资产减值","kw":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3675","q":"已资本化研发项目研发失败后的如何处理？","a":"进入资本化阶段后研发失败或终止的，应先将截至失败前的所有研发支出确认为'研发支出——资本化支出'，再对该资本化支出计提减值准备，不应直接转入研发费用。计提减值后，若公司作出彻底停止研发项目的决策，可按公司资产减值核销制度核销相关资产和减值准备。个人理解，供参考。","cat":"资产减值","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3674","q":"账龄1年以内占99%以上如何计算预期信用损失率？","a":"实务中一般沿用原准则下的固定比例计提坏账准备，确保新准则下计提水平不低于原准则。也可细化账龄分段（如0-3个月、3-6个月等）计算迁徙率，前提是基础数据和内控能持续提供稳定可靠的数据。不宜机械套用公式而不考虑业务实际。个人理解，供参考。","cat":"资产减值","kw":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3673","q":"商誉减值测试中品牌、技术与商誉的测试顺序？","a":"根据企业会计准则第8号——资产减值第二十五条规定，应'先对不包含商誉的资产组进行减值测试，再对包含商誉的资产组进行测试'。先做品牌和技术减值测试，据此调整资产组账面金额，再确定商誉减值金额（先抵减商誉，再分摊给其他资产）。实务中这一顺序不可颠倒。个人理解，供参考。","cat":"资产减值","kw":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3672","q":"应收账款保理费用是否属于非经常性损益？","a":"若被保理的应收账款为正常经营活动产生，且保理融资是常规操作，保理费用属于正常融资费用，在未来会重复发生，不属于非经常性损益。实务中关键是看是否属于企业常规的资金管理方式。个人理解，供参考。","cat":"金融工具","kw":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3671","q":"其他权益工具投资是否需要计提减值？","a":"其他权益工具投资的公允价值变动不影响损益，因此不需要确认计入损益的减值损失。公允价值变动直接体现为其他综合收益的变动，公允价值下降本身就反映了价值减损。IASB认为对FVOCI权益工具另外计提减值会造成重复计算。个人理解，供参考。","cat":"金融工具","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3670","q":"不良资产包的会计处理？","a":"不良资产包因债务人信用问题，原合同条款对估计未来现金流量意义不大，一般分类为以公允价值计量且其变动计入当期损益的金融资产，列报为交易性金融资产或其他非流动资产。实际收到款项时冲抵金融资产账面价值，期末评估剩余可收回金额确认公允价值变动损益。个人理解，供参考。","cat":"金融工具","kw":"","src":"上海证券交易所 会计监管动态"},{"id":"3669","q":"内资股份公允价值如何确定？","a":"港股价格不能直接作为内资股份的公允价值（香港联交所并非主要市场）。可以港股价格为基础，考虑两地流通性差异、转让限制等因素，采用恰当的估值技术合理估计。实务中常用流动性折扣（DLOM）调整。个人理解，供参考。","cat":"金融工具","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3668","q":"可转债实际利率确定后能否调整？","a":"可转债负债部分属于以摊余成本计量的金融负债，实际利率确定后后续不再调整。摊余成本计量的结果不等于当前公允价值——这是摊余成本法的固有特征。即使市场利率发生大幅变化，也不应调整实际利率来反映市场变化。个人理解，供参考。","cat":"金融工具","kw":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3667","q":"处置FVOCI的所得税如何处理？","a":"处置其他权益工具投资（FVOCI）时，累计的公允价值变动由其他综合收益直接转入留存收益，不经过损益。对应的递延所得税也直接调整留存收益，不经过所得税费用。处置时的当期所得税费用需根据转让收益计算。这是准则对FVOCI权益工具的特殊规定。个人理解，供参考。","cat":"金融工具","kw":"","src":"上海证券交易所 会计监管动态"},{"id":"3666","q":"云信、建信融通等电子债权凭证如何列报？","a":"目前仍参照财会[2021]32号规定处理：云信、建信融通等不属于《票据法》规范的票据，不在'应收票据'项目列示，通常列报为应收款项融资或应收账款。实务中此类电子债权凭证越来越普遍，但准则层面尚无专门规定。个人理解，供参考。","cat":"金融工具","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3665","q":"供应链金融凭证如何分类列报？","a":"未贴现、未背书的供应链金融凭证，应分类为以公允价值计量且其变动计入其他综合收益的金融资产，重分类至应收款项融资。同一客户部分回款采用供应链金融的，剩余应收账款无需整体重分类。已收到的供应链金融凭证若为商业承兑汇票，对应收款项融资也应计提坏账。个人理解，供参考。","cat":"金融工具","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3664","q":"其他权益工具投资公允价值变动是否确认递延所得税？","a":"所得税准则第十二条仅对子公司、联营企业、合营企业投资有豁免规定，金融资产无此豁免。对金融资产的累计公允价值变动收益应足额确认递延所得税负债，不应考虑转回可能性。这是准则的硬性规定——除对子公司等投资外，所有应纳税暂时性差异都应确认递延所得税负债。个人理解，供参考。","cat":"金融工具","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3663","q":"协定存款的性质认定及列报？","a":"定期存款纳入存款监管、银行保证本金安全，与理财产品有本质区别，属于存款。函证时应包含被划走的协定存款+50万流动资金。列报上：未划走部分列报货币资金，划走部分列报交易性金融资产。实务中需依据具体的存款协议条款判断是否无条件随时支取。个人理解，供参考。","cat":"金融工具","kw":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3662","q":"买方票据贴现属于融资还是应付账款继续列报？","a":"需根据CAS 22金融负债终止确认规定分析商业实质。属于企业自身融资行为：融资方为银行或金融机构的列报'短期借款'（筹资活动现金流），融资方为非金融机构的列报'其他流动负债'。不属于自身融资行为则继续列报'应付账款'（经营活动现金流）。实务中常见争议在于供应商融资安排的终止确认。个人理解，供参考。","cat":"金融工具","kw":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3661","q":"大股东兜底式员工持股计划是否构成股份支付？","a":"大股东向员工授予卖出期权（兜底承诺），对上市公司而言属权益结算股份支付。费用应在等待期内确认，计量基础为卖出期权在授予日的公允价值。这个问题需要从两个层面来看：上市公司受益于大股东的安排获得了员工服务，故构成股份支付；大股东自身的期权授予不影响上市公司报表。个人理解，供参考。","cat":"金融工具","kw":"","src":"中国证监会 会计监管工作通讯"},{"id":"3660","q":"直租模式下的融资租赁vs经营租赁判断？","a":"需要对合同条款进行综合分析：若租赁期占资产使用寿命的绝大部分、租赁付款额现值相当于资产公允价值的绝大部分、资产具有专用性等，通常应分类为融资租赁。对于数据中心租电模式，需判断是否将土地使用、房屋租赁、电力供应打包为一揽子服务。个人理解，供参考。","cat":"租赁","kw":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3659","q":"售后租回交易何时产生支付租金义务？","a":"主要考虑以租赁期开始日为标志——即取得了主导已识别资产使用的权利时。若尚未收到全部价款仅办理了抵押手续，可说明'尚未产生支付租金义务'。实务中应在真正取得资产使用权时才确认租赁负债，而非在合同签署日。个人理解，供参考。","cat":"租赁","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3658","q":"售后回租中资产转让是否构成销售的判断关键？","a":"核心取决于运营期内标的资产使用由谁主导和控制——包括对外销售服务的价格条款、营销策略是否由本企业确定，风险盈亏由谁享有承担，租赁费用与运营期费用如何确定及是否关联等。如果企业实质上仍控制资产的使用，未转移控制权，则资产转让不构成销售。个人理解，供参考。","cat":"租赁","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3657","q":"无产权车位：应确认为无形资产还是使用权资产？","a":"使用权资产的确认前提是存在租赁，依据'租赁三要素'（特定已识别资产、特定租赁期限、对资产使用的控制权），人防车位使用权满足上述三要素，确认为使用权资产合理。不能因为无法取得产权证就将其排除在租赁准则之外。个人理解，供参考。","cat":"租赁","kw":"","src":"深圳证券交易所 会计监管动态"},{"id":"3656","q":"长期租赁未约定具体付款时间的如何处理？","a":"相当于承接了一笔贷款人可随时要求偿还的负债，此时实际利率为零。应按不折现的租金总额确认使用权资产和租赁负债，租赁负债无对应的利息支出。实务中这种情况较少见，若有明确的付款计划或惯例，应按实际利率法处理。个人理解，供参考。","cat":"租赁","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3655","q":"使用权资产内部租赁后合并层面如何抵销？","a":"理论上需抵消子公司B的使用权资产、租赁负债、递延所得税，同时抵消母公司A的其他业务收入、其他业务成本及双方往来。还需抵消B按使用权资产折旧确认的营业成本，按集团层面计提的折旧金额重新计算B的履约进度。若操作太复杂，可按重要性原则采用简化处理。个人理解，供参考。","cat":"租赁","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3654","q":"售后租回的现金流量如何列报？","a":"以所购车辆为抵押获取融资的，后续还款相当于还本付息，现金流量性质为筹资活动（支付其他与筹资活动有关的现金）。实务中需注意区分：真正的经营性售后回租的租金支付属于经营活动；以融资为目的的售后回租属于筹资活动。关键看资产转让是否构成销售。个人理解，供参考。","cat":"租赁","kw":"","src":"深圳证券交易所 会计监管动态"},{"id":"3653","q":"融资租赁购车业务如何处理？","a":"经济实质是以车辆为抵押获取融资，参照租赁准则第五十二条'售后租回资产转让不属于销售'处理。不确认使用权资产和租赁负债，支付给出租方的款项形成长期应付款，后续还款相当于还本付息。实务中汽车融资租赁大多属于此模式。个人理解，供参考。","cat":"租赁","kw":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3652","q":"自产品售后回租的账务处理？","a":"销售和租回更可能是一揽子交易，性质接近以设备为抵押的融资+租用配套设施。A产品控制权未转移，不应确认销售收入，应按租赁准则第五十二条售后租回中'资产转让不属于销售'的规定处理。需将整租租金拆分为抵押融资还本付息和真正租赁租金两部分。实务中需仔细分析交易实质。个人理解，供参考。","cat":"租赁","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3651","q":"飞机租赁中基于使用状况计算的租金是否纳入使用权资产？","a":"基于使用状况或效益计算的租金属于可变租赁付款额（非取决于指数或比例），不纳入使用权资产和租赁负债的初始计量。发生时直接计入当期成本费用。但需注意：是否存在事实上的最短飞行时间要求——这属于实质固定付款额，需纳入租赁负债计量。实务中航空公司租机协议经常存在最低使用量条款，应仔细甄别。个人理解，供参考。","cat":"租赁","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3650","q":"同一控制下吸收合并的长投及商誉如何处理？","a":"B公司按同一控制下吸收合并原则处理：被合并方资产、负债按在母公司合并报表中的账面价值入账。母公司合并报表中原有的商誉原值减减值准备后的金额，B公司个别报表无需体现商誉减值损失。吸收合并后原合并层面的商誉下沉到存续公司个别报表。个人理解，供参考。","cat":"企业合并","kw":"","src":"深圳证券交易所 会计监管动态"},{"id":"3649","q":"吸收合并中未实现内部交易损益如何处理？","a":"母公司吸收合并子公司不影响合并报表层面资产、负债的计量基础，内部交易未实现损益在合并报表层面仍未实现。个别报表层面则需区分顺流交易和逆流交易分别讨论。顺流交易：母公司账面的未实现利润在合并层面予以抵销；逆流交易：子公司账面的未实现利润在合并层面调整存货。个人理解，供参考。","cat":"企业合并","kw":"","src":"上海证券交易所 会计监管动态"},{"id":"3648","q":"子公司将孙公司股权无偿划转给母公司的合并处理？","a":"同一控制下无偿划转，差额计入资本公积。合并报表层面需还原原有未分配利润，保持合并报表未分配利润不变。实质上是集团内部权益架构调整，不影响合并报表的资产、负债总额。个别报表中划出方冲减权益、划入方按账面价值入账。个人理解，供参考。","cat":"企业合并","kw":"","src":"上海证券交易所 会计监管动态"},{"id":"3647","q":"母公司收购少数股东股权——少数股东未实缴如何处理？","a":"少数股东未实缴出资的，母公司收购其股权时需考虑：若少数股东从未实缴，其享有的权益份额可能为零。收购价格与享有净资产份额的差额按权益性交易原则处理，调整资本公积。若收购价格明显高于享有份额，需关注是否存在隐蔽的利益输送或薪酬安排。个人理解，供参考。","cat":"企业合并","kw":"","src":"上海证券交易所 会计监管动态"},{"id":"3646","q":"国有收购少数股东股权如何处理？","a":"国有企业按同期银行贷款利率4倍收购自然人股东股权，应计入长期股权投资成本，而非作为改革改制费用计入管理费用。收购少数股权属于权益性交易，收购价格与享有份额的差额调整资本公积。这是购买少数股权的标准处理，不应费用化。个人理解，供参考。","cat":"企业合并","kw":"","src":"中国证监会 会计监管工作通讯"},{"id":"3645","q":"非同一控制下合并的负商誉确认是否合理？","a":"风电场项目公司可通过集中度测试，若不构成业务，收购溢价或折价应调整'无形资产——特许经营权'，不确认商誉或负商誉。简化处理下，收购价格减去账面净资产的差额确认为无形资产，在预计经营年限内摊销。首先要判断被收购对象是否构成业务——不构成业务的收购按资产收购处理，不适用企业合并准则。个人理解，供参考。","cat":"企业合并","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3644","q":"母公司处置唯一子公司后次年半年报如何披露？","a":"2025年半年报报告期内已无子公司，不需编制合并报表。对前期比较数据，建议同时披露2024年上半年度的单体和合并利润表作为前期比较数据。实务中，报告期内处置全部子公司导致不再有子公司的，中期报告和年度报告均无需编制合并报表。个人理解，供参考。","cat":"企业合并","kw":"","src":"中国证监会 会计监管工作通讯"},{"id":"3643","q":"非同一控制下合并并表日被收购方其他综合收益怎么处理？","a":"收购日被收购方的其他综合收益在购买日合并报表中全部清零——即视同购买日重新开始计量。各类其他综合收益（重新计量设定受益计划、其他债权投资公允价值变动、现金流量套期、境外经营折算差额等）在购买日均不结转至损益，直接冲减被购买方期初留存收益。这是购买法的基本要求。个人理解，供参考。","cat":"企业合并","kw":"","src":"上海证券交易所 会计监管动态"},{"id":"3642","q":"孙公司变为子公司后商誉减值测试的资产组如何认定？","a":"合并报表范围内内部架构调整（B为SPV，将C股权转让给A）不影响资产组划分。仍应将整体商誉与从该次收购中获益的资产组关联进行减值测试。内部架构调整不应直接导致计提商誉减值准备。商誉的减值测试应基于原始收购形成的资产组或资产组组合，不能因内部法律架构变化而随意变更。个人理解，供参考。","cat":"企业合并","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3641","q":"同一控制下企业合并是否符合同控条件？","a":"对乙公司而言，甲公司设立乙公司后将子公司股权转入乙公司，参与合并的各方均处于同一最终控制方控制下且该控制非暂时性的，属于同一控制下合并。同控判断的两个核心条件：①合并前后均受同一方或相同多方最终控制；②该控制非暂时性（通常指合并前后均不少于一年）。个人理解，供参考。","cat":"企业合并","kw":"","src":"中国证监会 会计监管工作通讯"},{"id":"3640","q":"同控下无偿划拨冲减资本公积能只冲资本公积至负数吗？","a":"个别报表层面仅冲减资本公积的做法不恰当。资本公积不应出现负数，否则会侵蚀净资产、削弱对债权人的保障基础。会计准则对此有明确规定，不宜为操作方便而不遵循规定。当资本公积不足冲减时，应依次冲减盈余公积、未分配利润。这是维护资本保全原则的基本要求。个人理解，供参考。","cat":"企业合并","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3639","q":"反向购买中发行费用如何处理？","a":"站在购买方B公司合并报表层面，发行费用是特殊的非同一控制下合并交易费用，应直接计入管理费用。虽然在A（法律上母公司）个别报表中可计入对B的长投成本，但合并报表层面需按实质重于形式原则，还原到交易费用。因为反向购买实质上是B公司的原股东取得了对A公司的控制权。个人理解，供参考。","cat":"企业合并","kw":"","src":"深圳证券交易所 会计监管动态"},{"id":"3638","q":"交叉持股下同一控制企业合并如何处理？","a":"视同将此前作为金融资产核算期间确认的公允价值变动和其他综合收益冲回，恢复到最原始成本状态。再按分步交易实现同一控制下合并处理。A、B、C之间的互相投资均调整至成本模式后，再进行合并抵销。实务中交叉持股的合并处理较为复杂，核心是恢复各公司对对方的投资至原始成本。个人理解，供参考。","cat":"企业合并","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3637","q":"收购时的价格调整机制（对赌）对标的公司报表有何影响？","a":"若交易双方之间的事项不要求标的公司进行分配或补差，对标的公司自身个别报表无影响。坏账准备的计提应依据金融工具准则独立判断。若对赌调整只是新老股东之间调整交易作价的借口，标的公司自身无需跟进调整。实务中需严格区分：股东层面的对赌安排与标的公司自身报表的关系，两者是独立的。个人理解，供参考。","cat":"企业合并","kw":"","src":"深圳证券交易所 会计监管动态"},{"id":"3636","q":"未过户股权的投资是否应当并表？","a":"未完成工商变更不是未取得控制权的决定性因素。判断是否并表需综合考虑：是否拥有对被投资方的权力、是否通过参与被投资方相关活动享有可变回报、是否能够运用权力影响回报金额。工商登记仅是形式要件，实质性控制权的判断应基于经济实质。实务中以股权交割日而非工商变更日为并表基准日的做法较常见。个人理解，供参考。","cat":"企业合并","kw":"","src":"中国证监会 会计监管工作通讯"},{"id":"3635","q":"代持还原是否构成企业合并？","a":"如果实际控制人一直控制被投资企业，从隐名股东变为显名股东不属于会计上的企业合并，而是母公司对子公司的增资行为。以实缴出资额作为初始投资成本（后一种观点更合理）。实务中需注意：关键是判断变更登记前后实质控制关系是否发生了变化，如果实质控制关系从未改变，仅是法律形式变更，不构成企业合并。个人理解，供参考。","cat":"企业合并","kw":"","src":"上海证券交易所 会计监管动态"},{"id":"3634","q":"丧失控制权后逆流交易未实现损益如何处理？","a":"逆流交易下的未实现损益继续挂在存货（借：年初未分配利润 贷：存货）。'视同实现计入投资收益'仅针对顺流交易。这个问题需要从两个层面来看：顺流交易下，母公司作为出售方，处置子公司后相当于将对第三方的销售间接实现了；逆流交易下，子公司作为出售方，母公司丧失控制权并不意味着子公司存货已对外出售。个人理解，供参考。","cat":"企业合并","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3633","q":"订单未成立时向客户支付的补偿是冲减收入还是计入销售费用？","a":"首先要区分本企业的身份：若本企业为代理人，补偿款属于应付客户对价，理论上应冲减收入。如合同已成立后因本企业以外原因未履行，补偿冲减收入。如确实合同尚未成立即支付补偿，可计入销售费用。实务中应分析支付的商业实质，不宜一概而论。个人理解，供参考。","cat":"收入准则","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3632","q":"无书面合同情况下的收入确认如何处理？","a":"对'先干活后签合同'的情况，需根据历史经验和行业惯例判断双方是否已对价款和支付方式存在事实上的共识（满足CAS 14第五条'合同成立'条件）。满足后运用可变对价原则合理谨慎估计收入。后续实际结算金额与估计不一致的，按会计估计变更处理。客户赖账属于信用问题，全额计提坏账后核销。个人理解，供参考。","cat":"收入准则","kw":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3631","q":"广告资源互换如何确认收入？","a":"若双方都能单独出售对应服务且有公允价值，按收入准则分别确认收入和成本。若无法单独确定公允价值，按非货币性资产交换准则，以换出资产的公允价值为基础确认换入资产成本。实务中，广告互换常见于同行业企业，关键是要能确定各自服务的公允价值。若双方服务价值相当，可以采用简化处理（不确认损益）。个人理解，供参考。","cat":"收入准则","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3630","q":"收入准则下主要责任人与代理人身份如何确认？","a":"核心判断标准是企业在向客户转让商品前是否控制了该商品。控制的三个迹象：①企业承担向客户转让商品的首要责任；②企业在转让商品前承担存货风险；③企业有权自主决定商品价格。若同时满足上述条件，为主要责任人（总额法）；否则为代理人（净额法）。奶茶加盟店案例中，品牌方若承担向消费者提供产品服务的首要责任、自主定价，则为主要责任人。个人理解，供参考。","cat":"收入准则","kw":"","src":"上海证券交易所 会计监管动态"},{"id":"3629","q":"销售公司采用总额法还是净额法确认收入？","a":"若销售公司'以销定采'，存货数量不超过下游客户待履行订单数量、所有存货均有对应销售合同的，应采用净额法核算。若销售公司根据自身市场研判向生产企业订货，承担滞销积压、公允价值变动风险，有权自主决定销售价格、对象、时间的，应采用总额法核算。实务中关键是判断企业在向客户转让商品前是否控制了该商品。个人理解，供参考。","cat":"收入准则","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3628","q":"委托运营费收入在'对价很可能收回'条件不满足后如何处理？","a":"若'对价很可能收回'条件不再满足，后续无需再按原合同确认收入。已确认收入的应收款项应计提坏账准备。后续只有在已提供服务且已实际收到价款时，才能确认收入。这是新收入准则五大步骤中第一步'识别合同'的要求——若对价很可能收回的条件不再满足，则实质上合同已不满足准则定义的合同条件。个人理解，供参考。","cat":"收入准则","kw":"","src":"上海证券交易所 会计监管动态"},{"id":"3627","q":"点价模式销售大宗商品的公允价值变动损益是否属于非经常性损益？","a":"若点价模式是企业固有、成熟的业务模式，且已建立价格变动风险控制和对冲机制，由此产生的损益不属于非经常性损益。但若大宗商品价格短期大幅异动产生的公允价值变动损益，有可能被认定为非经常性损益。实务中需综合判断：关键是看该业务模式是否常规、是否可预期重复发生。个人理解，供参考。","cat":"收入准则","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3626","q":"经销商未达到销售目标而扣除保证金应冲减销售费用还是计入营业外收入？","a":"保证金扣除与代理费结算是同一交易的两个方面，两者密切相关。冲减'销售费用——代理费'更合理，不宜计入营业外收入。实务中需看保证金的具体用途：若保证金本质是履约保障金，达不到目标时的扣除是对代理服务的对价调整，应冲减代理费。个人理解，供参考。","cat":"收入准则","kw":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3625","q":"批发企业品牌推广协议支出应计入销售费用还是冲减收入？","a":"一般采用计入销售费用的观点。可参考《监管规则适用指引——会计类第2号》之'2-3 应付客户对价的判断'。若支付对象是经销商，需先判断经销商的代理人或主要责任人身份——该判断直接影响真正'客户'的认定及商品销售收入确认时点。如果向客户支付的对价并未取得可明确区分的商品或服务，应冲减收入；但品牌推广服务通常是可明确区分的。个人理解，供参考。","cat":"收入准则","kw":"","src":"中国证监会 会计监管工作通讯"},{"id":"3624","q":"合同履约成本中的运费如何处理？","a":"运费金额较小的可简化处理直接计入营业成本，或并入发出商品成本列示。一般商品销售交易中使用'合同履约成本'科目的情形较少。实务中，如果运费构成合同履约的必要成本且预计可收回，可作为合同履约成本确认为一项资产，在收入确认时转入营业成本。但大多数情况下金额不大，直接费用化更简便。个人理解，供参考。","cat":"收入准则","kw":"","src":"上海证券交易所 会计监管动态"},{"id":"3623","q":"因履约瑕疵导致客户不认可债权，应作为债务重组还是收入调整？","a":"这个问题需要从两个层面来看。若因本企业履约有瑕疵导致对方不认可债权，应作为收入调整冲减收入，不属于债务重组。债务重组应基于纯财务原因（如债务人财务困难），其他原因导致的债权变更应适用其他准则。实务中常见的判断标准：如果重新协商是因产品质量问题、延迟交货等履约瑕疵，冲减收入；如果纯粹因对方资金周转困难给予让步，属于债务重组。个人理解，供参考。","cat":"收入准则","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3622","q":"分期付款购买固定资产（试剂+设备捆绑销售）如何处理？","a":"设备控制权在期初已转移应确认收入，试剂随交付逐月确认。购买方应将总价折现，按设备与试剂的单独售价比例分摊给两项履约义务。实务中需注意：设备与试剂构成两项可明确区分的履约义务，各在商品控制权转移时点确认收入；合同对价中隐含的融资成分需折现处理。个人理解，供参考。","cat":"收入准则","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3621","q":"销售中外部单位承担回购责任，本企业如何确认收入？","a":"若本企业（甲公司）处于主导地位并承担滞销风险，外部单位（A公司）仅是资金提供者（代理人），本企业应按净额法确认收入。收入性质实际上为利息收入而非销售收入。首先要区分谁是主要责任人：看谁承担存货风险、谁决定定价、谁对客户承担首要责任。若外部单位仅提供资金但不参与经营决策，其实质是融资安排。个人理解，供参考。","cat":"收入准则","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3620","q":"贸易业务净额法下收入确认时点如何确定？","a":"净额法下企业相当于居间作用，应在下游客户取得商品控制权时确认收入——即获得客户接受商品的证据后。首先要区分本企业在交易中是主要责任人还是代理人：若企业从未取得商品控制权、不承担存货风险，则为代理人，按净额法确认收入。实务中常见误区是以为发货时即可确认收入，但代理人确认收入的时点应是客户签收确认。个人理解，供参考。","cat":"收入准则","kw":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3619","q":"免费期收入如何处理——咨询服务协议第一个月免费、后续119个月收费？","a":"第一个月免费是基于后续月份收费而给予的优惠，两者存在直接关联。由于各月服务内容类似，应将全部120个月的合同总价在120个月内按直线法分摊确认收入。不宜将免费期单独视为一项履约义务，也不宜在免费期确认零收入。这体现了新收入准则下'可变对价'应在合同期内系统分摊的原则。个人理解，供参考。","cat":"收入准则","kw":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3618","q":"固废处理合同同时确认应收款项和合同负债是否合理？","a":"按处理合同收取的款项符合'合同负债'定义。若接收废物后不论是否付费均有义务处理，则同时确认应收款项和合同负债是合理的。首先要区分合同负债的定义条件是否满足：企业已收或应收客户对价而应向客户转让商品的义务。实务中，固废处理企业接收废物后即承担了法定处理义务，此时应确认合同负债；对应的收款权应确认为应收款项。个人理解，供参考。","cat":"收入准则","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3617","q":"换货升级的处理：客户退回旧产品并支付差价换购新产品，属于合同变更还是新合同？","a":"换货升级是否属于合同变更或新合同，取决于旧产品退回时原合同是否已经终结。主要判断因素：（1）旧产品退回是否按合同约定（如质保期内换货）——是，则属于原合同的履约事项；（2）旧产品退回是新的独立交易——如果旧产品的退货权在老合同中已明确或按商业惯例退货期已过，此时换购新产品属于一项新合同；（3）中间地带——如果老合同对退货条款不明确，旧产品退回+差价换新的实质，既涉及老合同的终止（退货退款义务），又涉及新合同的成立（购买新产品）。建议分开拆分两个交易：先处理退货退款，再处理新品销售。个人理解，供参考。","cat":"实务综合","kw":"","src":"上海证券交易所 会计监管动态"},{"id":"3616","q":"公允价值计量的投资性房地产出租时，如何区分租金收入和物业费收入？","a":"投资性房地产以公允价值模式计量时，不计提折旧，公允价值变动计入公允价值变动损益。租金收入应按CAS 14规定的五步法处理：（1）每期租金按直线法（或其他系统方法）确认收入，除非其他方法更合理；（2）如果租金是不等额的，需要将合同总租金在租赁期内按直线法分摊。与租金捆绑的物业费、水电费等如果是代收代付性质（即企业不承担主要责任、不能主导定价），应按净额法确认收入（或冲减相关费用）。如果是企业的独立增值服务（如保安、保洁等），则构成单独的履约义务，应分摊交易价格并按各自的履约进度确认收入。个人理解，供参考。","cat":"实务综合","kw":"","src":"上海证券交易所 会计监管动态"},{"id":"3615","q":"在建工程包含哪些必要支出？试车费用如何处理？","a":"根据CAS 4，在建工程成本包括使固定资产达到预定可使用状态前发生的全部必要支出：（1）建筑工程支出（材料、人工、机械费用）；（2）安装工程支出（设备价款、安装费用）；（3）需要安装的设备（已到货尚未安装的设备）；（4）试车费用：负荷联合试车费减去试车产品收入后的净额；（5）符合资本化条件的借款费用；（6）其他直接相关费用（如设计费、勘查费等）。特别注意：试车期间产出的产品如可对外销售，应按收入准则确认销售收入，同时将试车净支出计入在建工程成本——即试车收入冲减在建工程成本，而不是直接计入营业收入。个人理解，供参考。","cat":"实务综合","kw":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3614","q":"民营企业之间类似BOT的业务如何进行会计处理？","a":"首先要明确，现行会计准则中BOT（建设-运营-移交）的规范主要针对「政府与社会资本」合作（PPP），不直接适用于民营企业之间的类似安排。民营企业之间的BOT模式需要具体分析交易实质：（1）如果建设方拥有资产的实质性控制权（如建成后自用），按CAS 4（固定资产）和CAS 17（借款费用）处理；（2）如果实质上是融资租赁（建设方建设、出租给使用方），按CAS 21（租赁）处理；（3）如果实质上是提供服务（如代建+运营管理），按CAS 14（收入准则）处理。核心是穿透法律形式看经济实质——资产的最终控制权在谁手里、风险的最终承担者是谁。个人理解，供参考。","cat":"实务综合","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3613","q":"研发奖金如何处理？是属于研发费用还是职工薪酬？","a":"研发奖金本质上是职工薪酬，应通过「应付职工薪酬」科目核算。但最终归属到哪些成本费用科目，取决于受益部门：（1）如果奖金是发放给从事具体研发项目的技术人员，应归属于研发费用（研究阶段→全部费用化，开发阶段且满足资本化条件的→资本化为开发支出）；（2）如果奖金是给研发管理部门或职能支持人员，可能归属到管理费用。关键是按研发项目的工时比例合理分配。实务中，企业应建立研发工时统计制度和项目成本核算体系，确保研发奖金的归集和分配有据可查。个人理解，供参考。","cat":"实务综合","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3612","q":"出租办公楼的佣金如何进行会计处理？","a":"这属于CAS 14下的合同取得成本。出租人支付给代理中介的佣金（用于寻找租户），属于不取得租赁合同就不会发生的增量成本，如果预期能够收回，应当确认为一项资产（合同取得成本或其他非流动资产）。该资产在租赁期内系统摊销，摊销额计入当期损益。如果租期较短或佣金金额不重大，可采用简化处理方法——在支付时直接计入费用。实务中，对于长期租约（如5年以上办公楼租赁），佣金可能金额较大，建议采用资本化处理以反映匹配原则。个人理解，供参考。","cat":"实务综合","kw":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3611","q":"投资性房地产转回自用后，折旧年限如何选择？","a":"根据CAS 3，投资性房地产转换为自用房地产时，转换日为「房地产达到自用状态、且企业有明确意图将之用于生产经营」的日期。转换后按照CAS 4（固定资产）进行后续计量。折旧年限的确定：以转换日资产的账面价值为基础，按固定资产预计剩余使用年限计提折旧。不能简单沿用原投资性房地产的折旧政策。例如，投资性房地产按50年折旧已过15年，账面剩余35年，转入自用时剩余使用年限可能不同（需重新评估）。实务中，转换时建议聘请工程部门重新评估资产的可使用年限，保留合理的书面证据。个人理解，供参考。","cat":"实务综合","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3610","q":"对于收款可能性不确定的合同，已发生的履约成本如何处理？","a":"根据CAS 14，在合同开始时如果对价的可收回性存在重大不确定性，需要谨慎判断是否满足合同存在的五个条件之一——「企业很可能收回因向客户转让商品或服务而有权获得的对价」。如果不满足，该安排不属于准则范围内的「合同」，此时已发生的履约成本应直接计入当期损益（主营业务成本），不应确认为资产（合同资产或存货）。因为此时没有可靠的收款基础，资本化条件不成立。只有在以后期间对价的可收回性得到合理保证后，后续发生的成本才按准则正常处理。个人理解，供参考。","cat":"实务综合","kw":"","src":"上海证券交易所 会计监管动态"},{"id":"3609","q":"用于送礼的客户礼品未送完被出售，如何处理账务？","a":"购入礼品时如已计入业务招待费，后续将未送出的礼品出售：可以以实际购入该批礼品的成本金额为限冲减当初的业务招待费，如果出售收入超出购入成本的部分，则计入营业外收入。实务中的账务处理步骤：先冲减原费用科目（借：银行存款/应收账款，贷：业务招待费），金额以原购入成本为限，超出部分计入营业外收入。这符合会计核算的实质重于形式原则——既然礼品未实际送出，当初计入招待费的假设就不成立，需要「拨回」原计入的额度。个人理解，供参考。","cat":"实务综合","kw":"","src":"中国证监会 会计监管工作通讯"},{"id":"3608","q":"未设立项目公司时合作经营项目的会计确认：双方共同出资建设并分享收益，如何入账？","a":"首先需要判断该安排属于「合营安排」还是「共同经营」。根据CAS 40，如果双方共同出资、共同控制且分享的是项目净资产而非直接的资产产出，则属于共同经营。共同经营的处理方法：各方按约定比例确认各自享有的资产、承担的负债、取得的收入和发生的费用（即比例合并法各项目）。如果未设立单独的项目公司，各方没有独立的法律主体来承载资产和负债，实务中通常是共同经营。关键判断依据：合同安排是否赋予各方对特定资产和负债的直接权利和义务。个人理解，供参考。","cat":"实务综合","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3607","q":"剥离事业部给子公司相关会计处理：资产划转和人员安置如何处理？","a":"事业部剥离给子公司属于集团内部的业务重组。关键步骤：（1）将事业部相关的可辨认资产和负债按其账面价值（或公允价值，视情况而定）划转至子公司；（2）如果涉及人员劳动合同从母公司转至子公司，相关的应付职工薪酬也需要一并转移；（3）母公司作为对子公司的长期股权投资增加处理。如果划转的净资产公允价值高于账面价值，母公司个别报表中差额计入资产处置损益。在合并报表中，该交易属于内部交易，差额应予以抵消，不产生损益。实务中还必须考虑业务重组的税务影响——增值税、企业所得税、土地增值税等方面的合规性。个人理解，供参考。","cat":"实务综合","kw":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3606","q":"处置固定资产时账面净值不确定（总价打包购置未分部件），如何确定账面净值？","a":"最佳方案是查阅历史账务资料确定实际成本及分部件金额。如果不可行，可以采用替代方法：（1）参照市场价格或行业工程定额标准确定重置成本；（2）聘请评估机构采用重置成本法进行评估；（3）如果金额不重大，可按处置收入作为账面净值简化处理（即确认零损益）。实务中，企业应当在固定资产卡片中尽可能细化到可独立处置的最小单元（如一条生产线至少拆分为各核心设备和辅助设备），以备将来处置时能合理确定账面净值。如果在工程竣工决算时没有分项，事后很难准确拆分。个人理解，供参考。","cat":"实务综合","kw":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3605","q":"同一产线中设备分批转固后，整条产线尚未投产时的折旧如何处理？","a":"这是固定资产会计中的特殊场景——部分设备已单项达到预定可使用状态，但整条产线还不能产出合格产品。此时，已转固设备的折旧应计入「营业成本」（而非管理费用或存货成本），原因在于该折旧是与生产准备活动相关的、不可避免的支出，应归属到生产线产品的成本中（尽管尚未产出产品）。待整条产线投产后，这部分先期折旧可能需要在产品批次中合理分摊。如果不分摊且金额重大，可能导致首批产品单位成本畸高。实务中建议在会计核算办法中事先明确此类情况的折旧处理原则，以保持一致性。个人理解，供参考。","cat":"实务综合","kw":"","src":"深圳证券交易所 会计监管动态"},{"id":"3604","q":"在产线设备分批到货验收转固时，是否应等整条产线联合测试后再转固？工艺验证费用如何处理？","a":"如果已验收的部分设备实际可以单独使用（即不需要依赖其他未到货设备就能发挥功能），应当分别转固——不需要等整条产线联合测试。已转固的设备在所服务的生产线整体投产前，其折旧应计入营业成本（而非管理费用或制造费用），因为该折旧是使该资产达到预定可使用状态的必然耗费。工艺验证费用属于一次性支出，应直接计入当期营业成本，不能计入存货成本。原因是：工艺验证的本质是「测试」——测试的是生产线的制备能力，验证通过前的费用不符合存货成本的构成定义。个人理解，供参考。","cat":"实务综合","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3603","q":"公司减资的会计处理：减资款尚未支付给股东时如何入账？","a":"首先要看减资的类型——是各股东同比例减资还是部分股东退出减资。减资方案经股东大会批准后，企业应将应付减资款确认为一项负债（应付账款或其他应付款），同时冲减实收资本（或股本）以及对应的资本公积和留存收益。如果减资对价低于或高于对应的净资产份额，差额的处理方式是核心：同比例减资下差额调整资本公积；部分股东退出减资下，可能涉及股东之间的权益再分配。实务中减资程序复杂，涉及工商变更、税务处理、债权人公告等多个环节，建议在股东大会批准减资决议日进行账务处理。个人理解，供参考。","cat":"实务综合","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3602","q":"持续经营假设在评估时有哪些关键迹象？出现重大疑问时如何处理？","a":"根据CAS 30（财务报表列报），管理层需要在编制财务报表时评估企业持续经营能力。关键负面迹象包括：（1）净流动负债或净负债状态持续恶化；（2）主要债务违约或即将到期且无明确的再融资计划；（3）核心经营业务持续大幅亏损；（4）关键经营许可证即将到期但无续期预期；（5）重大未决诉讼可能导致的巨额赔偿；（6）丧失主要市场、客户或供应商。如果出现重大疑问，管理层需要制定并评估缓解计划（如资产处置、债务重组、再融资方案），并在财务报表附注中充分披露相关不确定性和管理层的应对计划。如果缓解计划不可行，则不能采用持续经营假设。个人理解，供参考。","cat":"财务报表列报","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3601","q":"现金流量表中，定期存款和结构性存款如何列报？","a":"定期存款的列报取决于持有目的和期限：（1）持有至到期且期限在三个月以内（含三个月）的，可计入现金及现金等价物；（2）期限三个月以上且属于非质押的，计入「债权投资」或其他非流动资产；（3）已质押的定期存款，无论期限长短，均不能列入现金及现金等价物，应在其他流动资产或其他非流动资产中列报为「受限货币资金」。结构性存款的本金保本类型（保本型），如果期限短（三个月内），且流动性强，可视为现金等价物；非保本浮息的结构性存款应作为交易性金融资产列报。实务中需要在附注中充分披露现金及现金等价物的构成。个人理解，供参考。","cat":"财务报表列报","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3600","q":"资产负债表日后事项（调整事项与非调整事项）如何区分和处理？","a":"根据CAS 29，调整事项是资产负债表日已经存在的情况提供补充证据的事项——需要调整财务报表。例如：资产负债表日前的应收账款在日后期间实际被确认无法收回（提供了减值存在的补充证据）、日后期间法院判决证实了资产负债表日存在现时义务。非调整事项是表明资产负债表日后新发生情况的事项——只需披露不需调整。例如：日后期间发生的重大企业合并、发行新股、重大自然灾害等。关键判断标准：事由的根源是产生于资产负债表日之前还是之后。实务中的口诀：根源在「年前」——调整事项；根源在「年后」——非调整事项。个人理解，供参考。","cat":"财务报表列报","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3599","q":"投资性房地产与固定资产的判断：办公楼初始自用后被闲置并短期出租，如何分类？","a":"根据CAS 3，投资性房地产需满足：（1）为赚取租金或资本增值而持有；（2）能够单独计量和出售。短期出租办公楼不能据此重分类为投资性房地产。应当继续在「固定资产」科目下核算，折旧政策不变，租金收入计入其他业务收入。只有当管理层明确决定将该项房地产由自用转为「长期用于对外经营性租赁」，即持有目的发生根本性改变时，才能重分类为投资性房地产。转换日通常选择租赁期开始日或管理层正式变更用途的决议日。实务中短期闲置物业偶尔出租的情况非常多，不能因为几个月的出租就改变分类。个人理解，供参考。","cat":"财务报表列报","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3598","q":"固定资产折旧方法从双倍余额递减法变更为直线法属于什么变更？","a":"首先需要判断变更的原因。如果因为新技术出现使得资产消耗模式发生实质性变化，这属于会计估计变更（因为固定资产使用寿命内的经济利益预期实现方式发生了改变）。如果仅仅是管理层认为直线法「更简单」，而资产的消耗模式并未真正改变，就属于「无法支持的变更」，甚至可能被认为是滥用会计政策。实务中，企业变更折旧方法需要在财务报表附注中披露变更的原因、对当期利润的影响金额等。税务机关对折旧方法变更也高度关注，可能要求企业说明合理性。个人理解，供参考。","cat":"会计政策/估计变更","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3597","q":"PPP项目由金融资产模式转为政府每年签订采购服务合同的模式，属于会计政策变更还是会计估计变更？","a":"根据CAS的相关规定和分析，这种模式转换应作为会计估计变更，采用未来适用法进行衔接。原因是：模式的转换是由外部因素的重大变化驱动的（政府改变了PPP合同管理模式，从原固定支付安排变为每年签订采购服务合同），企业会计政策并未改变，改变的只有对合同现金流量的估计。因此，这不是企业主动选择的政策变更，而是外部环境变化导致的估计变更。未来适用法的含义是：不需要追溯调整以前年度，只需要自变更之日起按新模式进行会计处理即可。个人理解，供参考。","cat":"会计政策/估计变更","kw":"","src":"财政部 企业会计准则解释公告"},{"id":"3596","q":"会计政策变更、会计估计变更和前期差错更正如何区分？","a":"三者本质区别在于变更的对象和原因。会计政策变更：变更了计量基础、确认原则或报告框架（如存货发出从先进先出法变更为加权平均法）。会计估计变更：由于新信息或新情况的出现，调整了原有的估计（如坏账计提比例调整、固定资产使用寿命调整）。前期差错更正：发现以前期间的财务报告存在计算错误、应用会计政策错误、疏忽或曲解事实。处理方式不同：政策变更一般采用追溯调整法，估计变更采用未来适用法，前期差错更正采用追溯重述法。实务中最容易混淆的是「政策变更」与「估计变更」——如果变更同时涉及两者，应按估计变更处理。个人理解，供参考。","cat":"会计政策/估计变更","kw":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3595","q":"基本每股收益中是否包含终止经营净利润？","a":"根据CAS 34，基本每股收益应以归属于母公司普通股股东的合并净利润（包括持续经营净利润和终止经营净利润）为计算基础。因此，基本每股收益包含了终止经营净利润。同理，稀释每股收益也应包括。实务中的列示方式：在利润表中，分别列示「持续经营每股收益」和「终止经营每股收益」（即每股收益可以分解为两部分），也可以只列示综合数字。CPA教材中可能存在不同的表述方式，但实务处理以合并净利润总额（含终止经营）计算基本每股收益为妥。个人理解，供参考。","cat":"持有待售","kw":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3594","q":"终止经营的定义和列报要求是什么？与持有待售有何区别？","a":"根据CAS 42，终止经营是企业满足以下条件之一的组成部分：（1）该组成部分被处置或已被划分为持有待售类别；（2）该组成部分在报告期间内处置或终止。与持有待售的主要区别：（1）持有待售是资产的分类状态（着眼于「尚未处置」），终止经营是报告期的经营成果列报（着眼于「已处置或终止」的业务线）；（2）持有待售适用于个别资产或处置组，终止经营适用于构成主要业务线或经营地区的组成部分。终止经营需要在利润表中单独列示：终止经营净利润（税后）在持续经营净利润之后单独列示。个人理解，供参考。","cat":"持有待售","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3593","q":"持有待售资产的计量规则是什么？划分为持有待售后的减值如何处理？","a":"根据CAS 42，企业将非流动资产或处置组划分为持有待售类别后，应按「账面价值与公允价值减去出售费用后的净额孰低」进行计量。如果账面价值高于公允价值减去出售费用后的净额，计提减值准备，差额计入资产减值损失。持有待售资产不计提折旧或摊销。后续资产负债表日，如果公允价值回升，原已计提的减值准备可在原计提范围内转回。需要注意的是，划分为持有待售是一个「触发事件」——归类调整当日就需要按照孰低原则进行重新计量，之前年度未计提的减值损失不能在这一天集中确认。个人理解，供参考。","cat":"持有待售","kw":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3592","q":"持有待售资产的分类条件是什么？「当前状况下即可立即出售」如何理解？","a":"根据CAS 42，同时满足以下条件才能分类为持有待售资产：（1）根据类似交易中出售此类资产的惯例，在当前状况下即可立即出售；（2）出售极可能发生，即企业已就出售计划作出决议且获得确定的购买承诺，预计出售将在一年内完成。其中「当前状况下即可立即出售」是关键——如果还需要完成分红、清理往来、剥离资产等前置程序，则不满足条件。例如，准备出售的子公司需要先向母公司分红、清理内部往来，这些前置程序未完成前，不能将子公司划分为持有待售。实务中，持有待售的判断需要在资产负债表日后至财务报告批准报出日前持续关注进展情况。个人理解，供参考。","cat":"持有待售","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3591","q":"数据资产在现有准则框架下如何处理？企业自用数据能否确认为无形资产？","a":"根据《企业数据资源相关会计处理暂行规定》，企业使用的数据资源，符合CAS 6无形资产定义和确认条件的，应当确认为无形资产。确认条件包括：可辨认性（可分离或源自合同性权利）、控制、未来经济利益很可能流入、成本可靠计量。实务中的难点：（1）数据资源是否可辨认——如果是加密的、唯一的、且有明确权属的数据库，可能满足可辨认性；（2）成本计量——企业需要对数据采集、清洗、标注、脱敏等各环节成本进行精细化核算；（3）后续计量——数据资源的有效期高度不确定，如何确定合理的使用寿命和摊销方法是挑战。个人理解，供参考。","cat":"无形资产","kw":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3590","q":"在他人土地上建设厂房、设备的会计处理——如何分类和折旧？","a":"这是一个典型的资产与租赁土地的互动案例。在他人土地上建设的厂房，因为没有土地使用权，不能确认为固定资产（企业不拥有控制权），应当确认为长期待摊费用。摊销期限为房屋设计使用寿命和剩余土地租赁年限两者孰低。对于机器设备，虽然是安装在他人土地上的，但企业对其拥有控制权，可以正常确认为固定资产，按预计使用寿命计提折旧。如果租赁期满后机器设备需要拆除搬迁，折旧期限应以搬迁后的剩余使用寿命或土地租赁期孰短确定。个人理解，供参考。","cat":"无形资产","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3589","q":"音乐作品无形资产的摊销方法应该采用什么方式？能否用计划收入比例法？","a":"根据《企业会计准则解释第11号》，采用「计划收入比例法」摊销无形资产不恰当。建议采用年限平均法（直线法）进行摊销。计划收入比例法的问题是：（1）无形资产未来产生的经济利益与其在生命周期内的收入分配并不必然呈线性对应关系；（2）未来收入的预测本质上是不确定的，可能导致摊销金额的随意性。年限平均法则将成本在预计使用寿命内均匀摊销，避免了这种随意性。类似的，影视剧版权的摊销也不应采用「计划收入比例法」，应改按直线法。个人理解，供参考。","cat":"无形资产","kw":"","src":"财政部 企业会计准则解释公告"},{"id":"3588","q":"欧盟CE认证/仿制药一致性评价的费用能否资本化？","a":"这属于特殊的研发项目。对于仿制药一致性评价的费用处理，有两派观点：（1）费用化——评价实质是「检验」已有产品是否符合标准，不产生新的技术知识，属于质量控制成本；（2）资本化——评价是获取上市许可的必要步骤，类似于取得行政许可权的成本，与获取存在市场（即仿制药产品可上市销售）直接相关。实务中，如果通过评价能够获得新的市场准入并产生经济利益，符合无形资产的确认条件，可参考资本化处理。欧盟CE认证同理——属于医疗器械进入市场的必要步骤，相关费用可以资本化确认无形资产。个人理解，供参考。","cat":"无形资产","kw":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3587","q":"研发费用资本化的条件是什么？研究阶段和开发阶段如何划分？","a":"根据CAS 6，研究阶段的支出全部费用化，开发阶段的支出满足六项资本化条件时确认为无形资产。六个条件（全部必须满足）：（1）完成该无形资产使其能使用或出售在技术上可行；（2）具有完成该无形资产并使用或出售的意图；（3）无形资产产生经济利益的方式（包括证明存在市场或内部有用性）；（4）有足够的技术、财务资源和其他资源支持以完成开发并加以使用或出售；（5）归属于该无形资产开发阶段的支出能可靠计量。实务中，研究阶段与开发阶段的界限划分是最大难点——一般以是否完成「技术可行性论证」为界。个人理解，供参考。","cat":"无形资产","kw":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3586","q":"房地产企业开发商品房涉及的土地使用权出让金和建筑施工成本对应的借款利息，是否需要资本化？","a":"根据CAS 17，房地产开发企业开发的用于出售的房地产开发产品（商品房）属于符合资本化条件的资产（需要相当长时间才能达到可销售状态）。具体处理：（1）取得土地使用权出让金对应的借款利息：如果该借款属于专门为项目筹集的资金，或土地使用权阶段已满足资本化开始条件，相应的利息应资本化；（2）建筑施工成本对应的借款利息：在施工期内，占用的一般借款和专门借款的利息均应资本化；（3）资本化终点为商品房竣工备案并达到可交付状态时。实务中，房地产企业应建立分项目、分地块的借款费用台账进行精细化核算。个人理解，供参考。","cat":"借款费用","kw":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3585","q":"外币专门借款的汇兑差额能否资本化？","a":"根据CAS 17，外币专门借款本金及利息的汇兑差额，在资本化期间内可以资本化。但仅限于外币专门借款（而非一般借款）。资本化的汇兑差额是外币借款由于汇率变动产生的差额，其性质是借款费用的一部分。实务中需要注意：（1）同样是外币借款，如果是一般借款，其汇兑差额不能资本化，只能计入财务费用；（2）资本化金额应以「当期实际发生的汇兑差额」为限，不能预计；（3）如果专门借款有部分资金暂时闲置并产生汇兑收益，应冲减资本化金额。个人理解，供参考。","cat":"借款费用","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3584","q":"专门借款和一般借款的资本化计算方法有何不同？","a":"根据CAS 17，专门借款的资本化金额 = 专门借款当期实际发生的利息费用 - 暂时闲置资金的投资收益。即专门借款的利息全额资本化（扣除闲置资金收益）。一般借款的资本化金额 = 累计资产支出超过专门借款部分的加权平均数 × 一般借款的加权平均利率（资本化率）。资本化率 = 当期一般借款利息之和 ÷ 一般借款本金加权平均数。关键区别：专门借款不需要计算支出加权平均数和资本化率，全额资本化；一般借款需要按占用期间加权计算。实务中，一般借款资本化率的计算需要涵盖全部一般借款（包括长期借款和短期借款）。个人理解，供参考。","cat":"借款费用","kw":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3583","q":"借款费用资本化的条件是什么？开始、暂停和停止资本化的时点如何判断？","a":"根据CAS 17，借款费用资本化需同时满足三个条件：（1）资产支出已经发生；（2）借款费用已经发生；（3）使资产达到预定可使用或可销售状态所必要的购建或生产活动已经开始。资本化暂停：非正常中断连续超过3个月（如不可抗力、资金短缺等导致停工）。如果中断是使资产达到预定可使用状态的必要程序（如自然固化、陈酿），则不应暂停资本化。资本化停止：资产达到预定可使用或可销售状态时停止。实务中，「达到预定可使用状态」的标志需要结合资产性质和用途判断，包括物理完工、负荷调试成功、验收合格等。个人理解，供参考。","cat":"借款费用","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3582","q":"债转股（债务人发行权益工具清偿债务）的债务人如何处理？","a":"根据CAS 12，债务人初始确认权益工具时，应以权益工具的公允价值（优先使用）或所清偿债务的公允价值计量。两者差额计入当期损益（投资收益或营业外收入）。实务中，权益工具公允价值的确定是关键：（1）如果是上市公司股票，采用债务重组日的收盘价；（2）如果是非上市公司股权，需要进行估值评估；（3）如果债务和权益工具均无活跃市场公允价值，可采用估值技术。需要注意的是：债转股后，原债权人成为公司股东，企业需披露相关的股权结构变动情况。个人理解，供参考。","cat":"债务重组","kw":"","src":"中国证监会 会计监管工作通讯"},{"id":"3581","q":"破产重整中的债务豁免，控股股东按相同比例豁免的债权，是否属于权益性交易？","a":"这是一个高度有争议的问题。根据证监会公告[2009]34号文的精神：在破产重整中，如果控股股东以债权人身份、与其他非关联债权人按相同比例豁免债权，且控股股东不能主导债权人会议表决的，该部分债务豁免可以不认定为权益性交易，从而债务人可将这部分豁免金额计入损益。但实务中认可条件非常苛刻：（1）母公司及其关联方不能是主要债权人或不能主导债权人会议；（2）需证明非关联方债权人的豁免比例合理且与子公司的实际财务状况和清偿能力相适应。除此之外，母子公司的债务豁免全部认定为权益性交易。个人理解，供参考。","cat":"债务重组","kw":"","src":"中国证监会 会计监管工作通讯"},{"id":"3580","q":"以组合方式（资产+权益+修改条款）进行债务重组时，各部分的清偿顺序如何确定？","a":"根据CAS 12，债务人以多项资产或处置组清偿债务的，应按以下顺序进行分析：（1）首先确定所转让资产和所清偿债务的公允价值；（2）将债务账面价值与转让资产账面价值的差额计入损益。如果重组涉及修改其他条款，应将修改后的债务整体确认为一项新金融负债（按公允价值初始计量），与原债务账面价值的差额计入损益。实务中，组合方式债务重组的各组成部分相互关联，不能简单割裂。建议按照合同约定的清偿条款顺序逐层处理。如果合同没有明确顺序，按公允价值比例分配。个人理解，供参考。","cat":"债务重组","kw":"","src":"财政部 企业会计准则解释公告"},{"id":"3579","q":"债权人豁免部分债务，剩余部分展期，属于债务重组吗？","a":"这属于债务重组无疑。根据CAS 12，债务重组是不改变交易对手方的前提下，经协商对债务偿还时间、金额或方式进行重新安排。豁免部分本金直接减少了偿还金额，剩余展期改变了偿还时间，两者都满足债务重组的定义。具体处理：（1）债权人：重新计算剩余债权的实际利率，确认重组损失（终止确认原债权的账面价值，确认新债权的公允价值）；（2）债务人：终止确认原债务的账面价值，确认新债务的公允价值，两者差额计入投资收益（或营业外收入）。需要注意：如果重组涉及债务人发行权益工具作为对价，债务人需要按权益工具的公允价值与债务账面价值的差额确认利得。个人理解，供参考。","cat":"债务重组","kw":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3578","q":"债务重组中，以资产清偿债务的，债权人和债务人各如何处理？","a":"根据CAS 12，债权人方面：（1）按放弃债权的公允价值加上相关税费作为受让资产的初始确认金额；（2）放弃债权的公允价值与账面价值的差额计入当期损益。债务人方面：（1）终止确认相关债务；（2）所清偿债务账面价值与转让资产账面价值（或发行权益工具公允价值）的差额计入当期损益。实务中的关键：受让资产的公允价值确定。如果接收的是非现金资产（如存货、固定资产、金融资产等），需要逐项评估其公允价值，且相关税费需要资本化。个人理解，供参考。","cat":"债务重组","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3577","q":"专项应付款和联合申请单位拨款如何进行会计处理？","a":"专项应付款属于政府资本性投入，应区别于政府补助。根据相关规定，专项应付款在项目完成前作为长期负债列报；项目完成后形成长期资产的，转入资本公积；未形成长期资产的，经批准后核销。联合申请单位拨款的处理更为复杂：主申请单位收到各级政府拨款后拨付给联合申请单位，需要判断其身份是「转拨方」还是「代理方」。如果是转拨方，主申请单位应将自身可留用的部分确认为政府补助，拨出部分作为代收代付处理；如果主申请单位对项目成果有控制权，则可能需要将整个项目纳为己有。个人理解，供参考。","cat":"政府补助","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3576","q":"政府补助的总额法和净额法有何区别？选择后能否变更？","a":"根据CAS 16，企业可以选择总额法或净额法列报政府补助，但一经选择不得随意变更。总额法下，与资产相关的政府补助确认为递延收益，在资产使用期限内按系统方法转入当期损益（冲减折旧或单独列示其他收益）；与收益相关的政府补助计入当期其他收益。净额法下，政府补助直接冲减相关资产的账面价值或相关费用。实务中，大多数中国企业选择总额法，因为可以更清晰地反映政府补助的规模和构成，也有利于与同行业企业进行比较。少数企业采用净额法，一般是为了简化核算。个人理解，供参考。","cat":"政府补助","kw":"","src":"财政部 企业会计准则解释公告"},{"id":"3575","q":"政府补助是按收付实现制还是权责发生制确认？","a":"根据CAS 16，政府补助应在同时满足以下条件时按权责发生制确认：（1）企业能够满足补助所附条件；（2）企业能够收到补助。因此，原则上应采用权责发生制。但近年来因部分地方政府财政紧张，实际拨款进度缓慢，企业在按应收金额确认政府补助时应更加谨慎地评估可收回性。如果预计拨款时间存在重大不确定性，或地方财政状况已严重恶化，则不宜按应收金额确认，而应在实际收到款项时确认。实务中，政府补助的可收回性评估需要获取充分证据支持，如政府预算审批文件、拨款计划等。个人理解，供参考。","cat":"政府补助","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3574","q":"与资产相关的政府补助，递延收益如何摊销？设备不同部件使用不同折旧方法时如何处理？","a":"递延收益的摊销应当与相关资产折旧方法保持一致。具体而言：（1）分配到各资产的递延收益，摊销所依据的基础（年限、工作量等）应当与该资产计提折旧的基础一致；（2）如果某项部件选择了工作量法折旧，相应的递延收益也应按相同的工作量基数摊销；（3）如果后续发生大修改变了工作总量，递延收益的摊销基数应当与折旧保持一致——即或者都考虑大修，或者都不考虑。这种「相互匹配」的原则是为了确保收入与费用的配比不被不匹配的摊销方法扭曲。个人理解，供参考。","cat":"政府补助","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3573","q":"政府补助是与资产相关还是与收益相关？判断标准是什么？","a":"根据CAS 16，判断标准是补助对象——补助用于购建长期资产（形成固定资产、无形资产）的，为与资产相关的政府补助；补助用于补偿已发生或将要发生的费用或损失的，为与收益相关的政府补助。如果补助文件中未明确补助对象，需要综合判断。实务中的辅助判断因素：（1）补助申请条件是否与设备投资直接相关；（2）补助资金用途是否被限定；（3）补助金额与设备投资额的匹配程度。如果补助文件中既未明确补助对象，补助申请条件与设备投资也无直接关系，则宜认定为与收益相关的政府补助。个人理解，供参考。","cat":"政府补助","kw":"","src":"财政部 企业会计准则解释公告"},{"id":"3572","q":"股份支付修改可行权条件（如加速行权、变更业绩条件）如何会计处理？","a":"股份支付计划的修改需要区分「有利修改」和「不利修改」。有利修改（如缩短等待期、降低行权价）：（1）加速行权——将原应在剩余等待期内确认的费用提前一次性确认完毕；（2）降低行权价——增量公允价值作为额外的股份支付费用在剩余等待期内摊销。不利修改（如延长等待期、提高行权价）：不应减少已确认的费用总额（即不利修改「视同没有发生」）。如果取消股份支付计划，按加速行权处理，将剩余费用一次性确认。实务中，企业应注意保留董事会决议、股东大会决议等书面证据来支撑股份支付修改的商业合理性。个人理解，供参考。","cat":"股份支付","kw":"","src":"中国证监会 会计监管工作通讯"},{"id":"3571","q":"现金结算的股份支付（股票增值权、虚拟股权）如何处理？后续公允价值变动如何入账？","a":"根据CAS 11，以现金结算的股份支付，企业应确认一项负债（应付职工薪酬），金额按资产负债表日承担义务的公允价值计量：（1）授予日不做会计处理（因为义务尚未产生）；（2）每个资产负债表日，按最新公允价值重新计量负债；（3）公允价值变动计入当期公允价值变动损益。与权益结算的股份支付不同：权益结算的股份支付在授予日按公允价值计量且后续不再调整；现金结算的则需要每个报告日按最新公允价值「刷新」。实务中，股票增值权的估值通常采用Black-Scholes-Merton模型或蒙特卡洛模拟，关键参数包括股价、波动率、无风险利率、预计行权期等。个人理解，供参考。","cat":"股份支付","kw":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3570","q":"集团内股份支付——母公司以自身权益工具对子公司员工进行股权激励，各层级报表如何处理？","a":"根据CAS 11和《企业会计准则解释第4号》，需要分层处理。接受服务企业（子公司）层面：没有结算义务的，按照权益结算的股份支付处理，确认费用并相应增加资本公积。结算企业（母公司）层面：以自身权益工具结算的，按权益结算股份支付处理，确认对子公司的长期股权投资和资本公积。合并报表层面：两个资本公积最终抵消，留下股份支付费用的影响（费用+资本公积）。实务中第一层判断：谁接受了服务（子公司），谁是结算方（母公司）。子公司确认费用但无实际现金流出，母公司无费用但增加长投，合并后费用「归属」到接受服务的子公司经营层面。个人理解，供参考。","cat":"股份支付","kw":"","src":"财政部 企业会计准则解释公告"},{"id":"3569","q":"限制性股票的股份支付费用如何计算？授予价格与公允价值存在差异时如何处理？","a":"限制性股票的股份支付费用 =（授予日标的股票的公允价值 - 授予价格）× 预计可行权的股数。计算中需注意：（1）如果限制性股票有锁定期，授予日公允价值需要考虑流动性折扣（限售折扣）；（2）预计可行权的股数 = 授予总股数 - 预计不能行权的股数（基于离职率、业绩达标率等）；（3）每个资产负债表日重新评估预计可行权股数，调整累计股份支付费用。费用在等待期内按直线法（或其他适当方法）摊销。实务中，如果授予日没有活跃市场价格，需要聘请评估机构进行估值。流动性的限制对估值的影响可能很大（通常折扣率在10%-30%之间）。个人理解，供参考。","cat":"股份支付","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3568","q":"股份支付可行权条件中的业绩条件（市场条件与非市场条件）如何区分和会计处理？","a":"根据CAS 11，市场条件（如目标股价、股东总回报）与非市场条件（如利润增长率、收入目标）的会计处理不同：（1）市场条件在估计授予日公允价值时已经考虑（通过期权定价模型），后续不再因不满足市场条件而调整累计费用；（2）非市场条件在估计公允价值时不考虑，后续如果预期无法满足，需要冲回已确认的费用。核心逻辑：市场条件的不确定性已体现在授予日估值中，员工无法通过自身努力来影响市场条件；非市场条件取决于员工绩效，需要每期根据最新信息重新评估满足条件的员工人数。实务中，IPO企业常见的是「完成IPO + 业绩达标」的双重条件，需要拆分市场与非市场条件。个人理解，供参考。","cat":"股份支付","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3567","q":"股份支付中，股权激励平台成立时是否立即确认股份支付费用？","a":"股权激励平台（如员工持股合伙企业）成立时，即使该平台被明确定义为「股权激励平台」，但如果此时没有具体的激励对象和激励计划，不应确认股份支付费用。股份支付的确认时点是「授予日」——即企业与员工就股份支付的条款和条件达成一致的日期。平台成立和股份授予是两个独立的事项。只有在授予日，才能可靠计量所授予权益工具的公允价值，并开始摊销股份支付费用。实务中，不少企业在平台成立时过早确认了股份支付费用，导致费用确认期间与激励对象的服务期不匹配。应按「方案二」——平台成立时不确认，实际授予时再确认。个人理解，供参考。","cat":"股份支付","kw":"","src":"中国证监会 会计监管工作通讯"},{"id":"3566","q":"成本法转权益法时，剩余股权如何按公允价值重新计量？","a":"这是因处置部分股权导致丧失控制权的典型场景。处理步骤：（1）处置部分按处置对价与账面价值的差额，在个别报表和合并报表分别确认损益；（2）剩余股权按丧失控制权日的公允价值重新计量；（3）合并报表层面，剩余股权公允价值与按新持股比例计算的被投资方可辨认净资产份额的差额，确认为投资收益（如果存在评估增值等也需要一并处理）；（4）剩余股权自丧失控制权日起开始权益法核算，视同初始确认。实务中剩余股权的公允价值确定是难点——如果被投资方是上市公司，可用收盘价；如果是非上市企业，需要评估。个人理解，供参考。","cat":"长期股权投资","kw":"","src":"中国证监会 会计监管工作通讯"},{"id":"3565","q":"权益法下，投资方与被投资方发生内部交易，投资方在确认投资收益时如何处理？","a":"根据CAS 2，投资方在确认投资收益时，应当消除投资方与被投资方之间发生的未实现内部交易损益的影响。具体分为：（1）顺流交易（投资方向被投资方出售资产）——投资方按持股比例消除未实现内部交易损益，减少投资收益；（2）逆流交易（被投资方向投资方出售资产）——同样按持股比例消除未实现内部交易损益。内部交易损失如果是资产减值损失的，不进行抵消。实务中需要逐项识别投资方与被投资方之间的交易，梳理清楚是否存在未实现损益。如果被投资方还有其他投资者，抵消只涉及投资方的份额部分。个人理解，供参考。","cat":"长期股权投资","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3564","q":"新投资者单方增资导致股权被动稀释但仍保持权益法核算时，如何计算和处理？","a":"新投资者单方增资导致原股东的持股比例从36%降到30%，但仍保持重大影响，需继续按权益法核算。处理方法是：（1）比较增资前后享有的被投资方可辨认净资产份额的变动；（2）增资后的份额高于增资前的份额——差额确认为「视同处置利得」，计入投资收益；（3）增资后的份额低于增资前的份额——差额作为权益法下长期股权投资账面价值的减少，相应调整资本公积。实务中这个计算需要精确到增资前后各时点的被投资方净资产公允价值。如果评估增值较大，影响也较大。个人理解，供参考。","cat":"长期股权投资","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3563","q":"母公司对子公司的长期股权投资在个别报表和合并报表中的差异是什么？","a":"个别报表中，母公司对子公司的长期股权投资采用成本法核算（除宣告发放股利外不确认投资收益）。合并报表中，长期股权投资与子公司所有者权益中的母公司份额进行抵消，代之以子公司各项资产、负债、收入、费用的逐项合并。两者之间存在本质区别：个别报表反映的是母公司的投资行为（资产视角），合并报表反映的是企业集团的整体经营（业务视角）。实务中编制合并底稿时，首先要计算合并日（或购买日）商誉，其次确认评估增值的后续摊销，最后抵消母公司长投和子公司权益。个人理解，供参考。","cat":"长期股权投资","kw":"","src":"财政部 企业会计准则解释公告"},{"id":"3562","q":"合营安排的分类：共同经营与合营企业的区分标准是什么？合并报表如何处理？","a":"根据CAS 40，合营安排分为共同经营和合营企业。核心区分标准是：参与方对合营安排的权利义务是直接针对特定资产和负债（共同经营），还是对合营安排净资产的权利（合营企业）。共同经营中，参与方按其份额确认相关资产、负债、收入和费用（即直接合并其份额）。合营企业中，参与方采用权益法核算（在合并报表中以「一行」列报），不逐项合并资产和负债。实务判断依据：合营安排是否设立单独主体、该单独主体的法律形式是否赋予参与方对净资产而非特定资产的权利。个人理解，供参考。","cat":"长期股权投资","kw":"","src":"深圳证券交易所 会计监管动态"},{"id":"3561","q":"长期股权投资减值准备的计提和转回有何规定？与CAS 8资产减值的关系是什么？","a":"根据CAS 2，长期股权投资减值应按照CAS 8（资产减值）的规定处理。核心要点：（1）在每个资产负债表日评估是否存在减值迹象；（2）存在减值迹象的，进行减值测试；（3）可收回金额低于账面价值的差额计提减值准备；（4）长期股权投资减值准备一经确认，不得转回。实务中，长投减值的评估需要结合被投资方的经营状况、行业前景、市场估值等多维度信息。对于上市公司股权投资，如果股价持续低于账面价值，是减值的重要信号。对于非上市企业的股权投资，需要进行估值评估。个人理解，供参考。","cat":"长期股权投资","kw":"","src":"中国证监会 会计监管工作通讯"},{"id":"3560","q":"权益法下被投资方发生超额亏损，投资方如何处理？","a":"根据CAS 2，投资方确认被投资方净亏损以长期股权投资账面价值减记至零为限。但有三个例外：（1）投资方对被投资方负有承担额外损失义务的（如担保）——再冲减预计负债；（2）投资方账面上有其他实质上构成对被投资方净投资的长期权益（如长期应收款）——继续冲减这些长期权益；（3）章程或协议约定投资方有义务承担亏损的——按约定处理。以后被投资方恢复盈利时，先按照上述相反顺序恢复各项目的账面价值，再恢复长期股权投资。实务中，企业应逐项审查与被投资方的全部权益性往来，确定哪些实质上构成净投资。个人理解，供参考。","cat":"长期股权投资","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3559","q":"长期股权投资核算方法的转换——从金融资产到权益法如何衔接？","a":"这是分步取得重大影响的典型场景。处理步骤：（1）原持有的金融资产按转换日的公允价值重新计量；（2）公允价值与账面价值的差额计入当期投资收益；（3）原计入其他综合收益的累计公允价值变动，按金融工具准则的规定处理——如果是指定为FVOCI的权益工具，OCI转入留存收益；如果是FVOCI（债务工具），OCI转入投资收益；（4）新的初始投资成本=原持有金融资产的公允价值+新增投资成本。转换后按权益法进行后续计量。实务中，公允价值确定是关键环节，一般需要有独立评估或明确的市场价格支持。个人理解，供参考。","cat":"长期股权投资","kw":"","src":"中国证监会 会计监管工作通讯"},{"id":"3558","q":"使用权资产租金不确定如何确认？租赁付款额取决于未来销售量或使用量时如何处理？","a":"根据CAS 21，可变租赁付款额分为两类：（1）取决于指数或比率的付款额——计入租赁负债的初始计量和后续调整中；（2）其他可变租赁付款额（如取决于未来销售量、使用量）——在触发事件或条件发生的期间计入当期损益，不计入租赁负债。例如，商场租约中「按营业额的5%」计算的租金属于第（2）类，初始计量和后续计量均不计入租赁负债，在实际发生时确认为费用。实务中的难点是：部分租赁付款额是混合型的——一部分固定或与CPI挂钩（计入租赁负债），另一部分与营业额挂钩（发生时计入损益）。需要逐项拆分分析。个人理解，供参考。","cat":"租赁","kw":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3557","q":"租赁变更如何会计处理？租金减免是否属于租赁变更？缩短租赁期的处理？","a":"租赁变更指原合同条款之外的对租赁范围或租赁对价的变更。租金减免如果在租赁期开始日之后发生且非原合同条款约定，属于租赁变更。根据CAS 21，租赁变更生效日应：（1）重新评估租赁期；（2）按修订后的折现率重新计量租赁负债；（3）相应调整使用权资产。如果变更导致租赁范围缩小（如缩短租赁期）或完全终止部分租赁，则按比例转出部分使用权资产和租赁负债，差额计入损益。实务中，新冠疫情期间大量租金减免的处理引发了广泛讨论——是一次性计入当期损益还是作为租赁变更调整租赁负债。两种看法都有支持者，最终取决于减免条款与原合同的关系。个人理解，供参考。","cat":"租赁","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3556","q":"售后租回交易的会计处理：构成销售的售后租回和不构成销售的售后租回有何不同？","a":"根据CAS 21，需要先判断资产转让是否构成销售（控制权是否转移）。如果构成销售：（1）卖方-承租人：仅确认与转让给买方-出租人的权利相关的利得或损失；（2）买方-出租人：按购买资产和出租资产分别处理。使用权资产的计量按原账面价值中保留使用权的比例确定。如果不构成销售：（1）卖方-承租人：不终止确认资产，将收到的款项作为金融负债；（2）买方-出租人：不确认购入资产，将支付的款项作为金融资产。实务中，判断是否构成销售需要结合CAS 14收入准则关于控制权转移的判断标准。个人理解，供参考。","cat":"租赁","kw":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3555","q":"融资租赁和经营租赁在出租人报表中的处理有何区别？","a":"CAS 21对出租人保留了融资租赁和经营租赁的双重分类。融资租赁：出租人终止确认标的资产，同时确认应收融资租赁款（租赁投资净额），后续按实际利率法计算各期利息收入。经营租赁：出租人保留标的资产在资产负债表上，继续计提折旧，租金收入按直线法（或其他系统方法）在各租赁期内确认。判断融资租赁的标准（满足任一即属融资租赁）：（1）租赁期结束时所有权转移；（2）承租人有优惠购买选择权；（3）租赁期占资产经济寿命的大部分（一般75%以上）；（4）最低租赁收款额现值几乎相当于资产公允价值（一般90%以上）。个人理解，供参考。","cat":"租赁","kw":"","src":"深圳证券交易所 会计监管动态"},{"id":"3554","q":"短期租赁和低价值资产租赁的简化处理实务中如何应用？判断门槛是什么？","a":"CAS 21提供了两项简化处理豁免：（1）短期租赁——租赁期不超过12个月（不含续租选择权的影响）；（2）低价值资产租赁——单项租赁资产在全新状态下的绝对价值较低（一般5,000美元或等值人民币以下）。两项豁免可以分别独立应用。选择豁免后，租赁付款额在租赁期内按直线法确认费用，不确认使用权资产和租赁负债。实务中需要注意的是：低价值资产的判断是基于「全新单项资产」的价值，不是基于「企业自身资产总额」的比例。一台笔记本电脑即使是大型企业的租赁也符合低价值标准。但如果该资产与其他资产高度关联（如服务器集群），则不能分割评估。个人理解，供参考。","cat":"租赁","kw":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3553","q":"租赁激励（如园区赠送消费卡）如何处理？何时冲减使用权资产？","a":"租赁激励的处理需要区分收到时点和应归属期间。如果激励是在租赁期开始日即可确认的（如园区赠送消费卡），应在租赁期开始日将可获取消费卡的折现值确认为一项长期应收款，同时从使用权资产的初始计量金额中扣减。后续实际收到消费卡时，从长期应收款转入预付账款或其他相应科目。不能在收到时直接冲减使用权资产——这忽略了货币时间价值和权责发生制的要求。实务中，租赁激励的形式越来越多样化（装修补贴、免租期、设备赠送等），建议企业建立台账逐项追踪。个人理解，供参考。","cat":"租赁","kw":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3552","q":"新租赁准则下，使用权资产的折旧期限如何确定？如果租赁期包含续租选择权时如何处理？","a":"根据CAS 21，使用权资产的折旧期限为租赁期与标的资产剩余使用寿命两者中的较短者。但如果租赁期结束时标的资产所有权转移给承租人（如融资租赁），则折旧期限为标的资产的剩余使用寿命。租赁期的确定需要综合考虑：（1）合同约定的不可撤销租赁期；（2）承租人合理确定将行使续租选择权所涵盖的期间；（3）承租人合理确定将不行使终止租赁选择权所涵盖的期间。实务中的判断因素包括：标的资产对承租人的重要性、续租租金与市场租金的比较、装修投入和搬迁成本等。个人理解，供参考。","cat":"租赁","kw":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3551","q":"新租赁准则下，预付租金在租赁期开始日之前如何处理？现金流如何分类？","a":"租赁期开始日之前的预付租金属于「为取得租赁资产而支付的现金」，应当作为投资活动现金流列报。在财务报表的资产负债表中，该项预付应重分类至「其他非流动资产」中列报，而不计入使用权资产（因为租赁期尚未开始）。租赁期正式开始后，将预付租金转入使用权资产的初始计量金额中——作为「在租赁期开始日或之前支付的租赁付款额」的一部分。实务中需要注意，租赁开始日与租赁期开始日可能是两个不同的日期，前者是合同签订日，后者是取得资产使用权的日期。只有后者才确认使用权资产和租赁负债。个人理解，供参考。","cat":"租赁","kw":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3550","q":"研发费用加计扣除形成的差异属于永久性差异还是暂时性差异？对递延所得税的影响是什么？","a":"研发费用加计扣除属于永久性差异，不会产生递延所得税影响。原因是：加计扣除在计算当期应纳税所得额时发生，不改变各项资产或负债的计税基础，也不在以后期间转回。这与资产减值准备的「时间性差异」不同——减值准备在计提当期减少会计利润但不减少应纳税所得额（形成可抵扣暂时性差异），在以后期间实际发生损失时税前扣除（转回差异）。加计扣除仅一次性影响当期所得税费用（通过减少应纳税所得额），不涉及递延所得税资产的确认。个人理解，供参考。","cat":"所得税","kw":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3549","q":"关联方交易的转让定价调整对所得税的影响如何处理？","a":"首先，企业应当确保关联方交易遵循独立交易原则。如果税务机关在后续检查中对企业进行转让定价调整，该调整可以影响两个层面：（1）已申报的应纳税所得额；（2）关联方之间的应收应付款项。对于未决税务评估事项，企业应评估是否需要确认「应付税款（税务负债）」的最佳估计金额，在资产负债表中列报为「应交税费」或「预计负债」（取决于评估事项的阶段）。如果企业认为被调整的可能性较低，可在附注中披露为「或有负债」。实务中，大型跨国集团的转让定价争议通常涉及重大金额，需要充分披露并合理估计。个人理解，供参考。","cat":"所得税","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3548","q":"企业合并中，被购买方可辨认净资产的评估增值产生的递延所得税负债如何处理？","a":"在非同一控制下企业合并中，被购买方的可辨认资产在合并报表中按公允价值计量，而计税基础保持原账面价值。公允价值超过计税基础的部分形成应纳税暂时性差异，必须确认递延所得税负债。该递延所得税负债增加被购买方可辨认净资产的公允价值，从而影响商誉的计算。案例：固定资产评估增值1,000万元（税率25%），确认250万元递延所得税负债，可辨认净资产仅增加750万元（而非1,000万元）。实务中，购买日评估完成后，后续每个资产负债表日需要重新计量递延所得税负债（除非商誉后续发生减值）。个人理解，供参考。","cat":"所得税","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3547","q":"企业计提的资产减值准备何时确认递延所得税资产？所有减值准备都能确认吗？","a":"资产减值准备形成的可抵扣暂时性差异，只有在「很可能获得足够的应纳税所得额」时才确认递延所得税资产。并非所有减值准备都能确认递延所得税资产。例如，企业计提了大量应收账款坏账准备，但历史数据显示实际核销比例极低，那么未来实际发生坏账的可能性不足以支撑确认全部递延所得税资产。又如，企业计提的商誉减值准备，其计税基础与账面价值的差异属于CAS 18规定的「初始确认豁免」范围，一般不确认对应的递延所得税。实务中建议对各项减值准备分别评估其未来税前扣除的可能性和时间，分项判断确认条件。个人理解，供参考。","cat":"所得税","kw":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3546","q":"内部交易未实现利润的递延所得税如何处理？合并报表中如何调整？","a":"在合并报表层面，集团内部交易产生的未实现利润应当全额抵消。由于抵消导致了合并层面资产（如存货）的账面价值低于其在个别报表中的计税基础，产生了可抵扣暂时性差异，应确认递延所得税资产。简化案例：母公司以成本100元向子公司销售商品150元（毛利50元），子公司期末尚未对外出售。合并抵消后，存货账面价值为100元，计税基础为150元，产生50元的可抵扣暂时性差异。如果所得税税率25%，应确认12.5元的递延所得税资产。实务中，企业应注意在合并底稿中系统化地识别和追踪内部交易未实现利润及相关递延税影响。个人理解，供参考。","cat":"所得税","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3545","q":"同一控制下企业合并中，被合并方的可抵扣亏损能否确认递延所得税资产？","a":"这取决于合并后的企业主体是否有能力利用这些可抵扣亏损。根据CAS 18，被合并方原有的可抵扣亏损必须在满足条件的情况下才能确认递延所得税资产。关键条件是合并后的企业主体（合并纳税主体）很可能获得足够的应纳税所得额以利用该可抵扣亏损。如果合并前合并方本身盈利能力很强，被合并方的可抵扣亏损在合并后可以在集团层面抵扣，且有明确的税务规划支持，则可以确认。但如果被合并方长期亏损，合并方也无足够盈利来吸收该亏损，则不应确认。个人理解，供参考。","cat":"所得税","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3544","q":"企业亏损确认递延所得税资产后，以后年度仍未盈利，是否需要冲回？","a":"每个资产负债表日都需要重新评估递延所得税资产的账面价值。如果评估后发现未来很可能无法获得足够的应纳税所得额，应当减记递延所得税资产的账面价值。这种减记在以后期间，如果情况发生改变且又很可能获得足够的应纳税所得额时，可以转回。实务中，税务机关对亏损确认的递延所得税资产关注度极高，审计师也通常对此保持职业怀疑态度。建议企业建立详细的递延所得税资产跟踪台账，记录每个差异项目对应的预计转回期间和转回金额。个人理解，供参考。","cat":"所得税","kw":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3543","q":"递延所得税资产的确认条件是什么？如何判断「很可能获得足够的应纳税所得额」？","a":"根据CAS 18，递延所得税资产的确认条件是：很可能获得足够的应纳税所得额以利用可抵扣暂时性差异。判断「很可能」的核心方法：（1）查看是否存在足够的应纳税暂时性差异——应纳税暂时性差异转回时产生应纳税所得额，可用于抵扣；（2）评估未来的经营盈利预测——管理层批准的盈利预测是最主要的证据；（3）检查是否存在税务筹划机会。特别注意：持续亏损企业，需要有非常强有力的证据（如已签署的大额合同、扭亏计划的外部认可等）才能证明未来盈利的可能性。如果近三年持续发生重大亏损，一般不得确认递延所得税资产（除非存在上述强有力的证据）。个人理解，供参考。","cat":"所得税","kw":"","src":"财政部 企业会计准则解释公告"},{"id":"3542","q":"资产组内部分资产单独处置时，如何确定处置部分的账面净值？","a":"最理想的情况是查阅历史账务资料，确定实际购置成本及各组成部分的分摊金额。如果不可行，可以参照以下方法：（1）参照市场价格或工程定额标准确定重置成本；（2）聘请评估机构采用重置成本法进行评估；（3）如果金额不重大，可以按处置价值处理（即以处置收入作为账面净值来简化处理）。实务中，对于总价打包购置的资产组（如变电站整体、整条生产线），如果没有分部件报价，在部分处置时确定账面净值确实存在困难。建议企业建立固定资产卡片时尽量细化到可独立处置的最小单元，以备将来处置时的核算需要。个人理解，供参考。","cat":"资产减值","kw":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3541","q":"以0对价转让子公司全部股权时，是否需要对子公司计提减值准备？","a":"以0对价转让子公司，首先应评估在签约日之前或合约期间是否已存在减值迹象。如果在此之前子公司已经持续亏损、净资产为负且没有改善预期，应当对长期股权投资计提减值准备。计提减值后，账面价值为0，此时0对价转让不再产生额外的处置损益。如果之前未计提减值，表面上是0对价处置确认大额亏损，实际上是先前年份少计提了减值准备。实务中建议定期评估长投减值迹象，避免出现处置年度集中确认大额亏损的情况。审计师也会关注「0对价转让」背后的商业逻辑和减值测试的及时性。个人理解，供参考。","cat":"资产减值","kw":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3540","q":"长期资产（固定资产、无形资产）减值损失能否转回？与存货减值有何不同？","a":"根据CAS 8，已确认的长期资产（固定资产、无形资产、长期股权投资、商誉等）减值损失不得在以后期间转回。原因在于，长期资产的使用寿命较长，如果允许转回，可能被用作盈余管理的工具。相比之下，存货减值的处理不同（CAS 1）：存货跌价准备在影响因素消失且可变现净值回升时可以转回，因为存货一般在短期内出售或消耗，市场价格的波动更及时、更客观地反映在可变现净值中。实务中企业应当在资产负债表日重新复核存货可变现净值，及时转回不适当的跌价准备。个人理解，供参考。","cat":"资产减值","kw":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3539","q":"商誉减值测试的频率是多少？什么情况下可以在年中测试？","a":"根据CAS 8，企业合并形成的商誉，至少应当在每年年度终了进行减值测试。但出现以下情况时应在年中追加测试：（1）企业所处的经济、技术或法律环境在年度中间发生重大不利变化；（2）企业的实际经营成果显著低于或将要低于预算或预期；（3）企业计划处置或重组相关业务；（4）相关资产组或资产组组合的市价发生大幅下跌。实务中建议建立商誉减值的持续监控机制，在编制每季度或每半年财务报表时评估是否有减值迹象，不能只在年报时才做测试。个人理解，供参考。","cat":"资产减值","kw":"","src":"中国证监会 会计监管工作通讯"},{"id":"3538","q":"可收回金额如何确定？公允价值减处置费用与使用价值孰高是什么意思？","a":"根据CAS 8，可收回金额是资产或资产组的公允价值减去处置费用后的净额与其预计未来现金流量的现值（即使用价值）两者中的较高者。不需要每次都计算两者——如果其中任一指标已超过账面价值，就不必计算另一个。实务中，使用价值计算是难点，涉及以下关键参数：（1）未来现金流量——基于管理层批准的最远财务预算或预测（一般不超过5年）；（2）预测期后的永续增长率——应为稳定的或逐步下降的增长率，通常不应超过行业长期平均水平；（3）折现率——应反映当前市场对货币时间价值及资产特有风险的评估。个人理解，供参考。","cat":"资产减值","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3537","q":"资产减值迹象有哪些？如何进行资产减值的触发测试？","a":"根据CAS 8，企业应当在每个资产负债表日判断资产是否存在可能发生减值的迹象。减值迹象分为外部和内部两大类。外部迹象包括：（1）资产市价当期大幅下跌，跌幅明显高于因时间推移或正常使用而预计的下跌；（2）企业经营所处的经济、技术或法律环境等发生重大不利变化；（3）市场利率或投资回报率已提高，从而影响折现率。内部迹象包括：（4）资产陈旧过时或实体损坏；（5）资产使用或预计使用方式发生重大不利变化；（6）资产的经济绩效已低于或将要低于预期。实务中，触发测试应当系统化、制度化，不能等到「已经明显减值」再测试。个人理解，供参考。","cat":"资产减值","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3536","q":"企业持续亏损的情况下，是否可以就可抵扣暂时性差异确认递延所得税资产？","a":"首先要区分暂时性差异的来源。对于持续亏损企业，在尚未就可抵扣亏损足额确认递延所得税资产的情况下，不应就其他可抵扣暂时性差异确认递延所得税资产。原因在于：企业缺乏转让定价或税务筹划的空间（因为持续亏损本身表明未来难以获得足够的应纳税所得额）。例外情形是：与租赁负债对应的使用权资产产生的可抵扣暂时性差异，可能可以根据IAS 12（CAS 18）的初始确认豁免原则做特殊处理。这是持续亏损实务中唯一可能确认的可抵扣暂时性差异类型。个人理解，供参考。","cat":"资产减值","kw":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3535","q":"商誉减值测试中，资产组或资产组组合如何划分？总部资产如何分摊？","a":"根据CAS 8，商誉减值测试应以相关的资产组或资产组组合为单位进行。资产组划分的核心原则是：（1）独立产生现金流入的最小资产组合；（2）与企业管理层监控经营的方式一致；（3）与内部管理报告结构一致。总部资产（如总部大楼、管理信息系统等）不能单独产生独立现金流入，需要按照合理且一致的基础分摊至各资产组。分摊方法通常按资产组占用的资产规模或预期收益权重进行。实务中需要注意：资产组划分一旦确定，不应随意变更，避免通过「调整资产组边界」来回避减值。个人理解，供参考。","cat":"资产减值","kw":"","src":"深圳证券交易所 会计监管动态"},{"id":"3534","q":"子公司处置时，之前计入其他综合收益的金融资产公允价值变动如何处理？","a":"需要区分金融资产的分类。如果是指定为以公允价值计量且其变动计入其他综合收益的权益工具投资（FVOCI-权益），根据CAS 22，处置该投资时累积的其他综合收益不得转入当期损益，只能转入留存收益。但如果是因为处置子公司导致该投资整体转出，不是单独的金融资产处置，处理方式有所不同——按CAS 33，处置子公司时，与该子公司相关的其他综合收益应按照CAS 22的规定处理：FVOCI-权益的OCI转入留存收益，其他可重分类进损益的OCI转入当期投资收益。个人理解，供参考。","cat":"金融工具","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3533","q":"同一控制下股权转让，转让方个别报表是否确认投资收益？","a":"同一控制下，转让方可以正常确认投资收益，前提是交易价格公允且具有合理商业理由。不能基于「集团整体视角的处理」来否定个别报表层面的损益确认。具体而言，如果母公司将子公司股权按评估公允价值全部转让给另一子公司，母公司的个别报表中应将转让对价与长期股权投资账面价值的差额计入投资收益。但在合并报表层面，该内部交易需要全额抵消。所谓「权益性交易不确认收益」的观点存在片面性——个别报表和合并报表的处理原则本就不同，两者各行其道。个人理解，供参考。","cat":"金融工具","kw":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3532","q":"权益法核算中，潜在表决权（如可转换债券、认股权证）是否影响长期股权投资的确认？","a":"权益法核算只考虑目前实际持有的股权比例，不考虑潜在表决权的影响。具体而言，在未实际行权之前，企业不能基于假设行权后的持股比例进行权益法核算。例如：企业目前持有被投资方30%股权（具有重大影响），同时还持有可转换债券（转换后可获得额外5%股权），在转换前仍只能按30%的比例进行权益法核算。潜在表决权只在判断是否构成「控制」（CAS 33）时需要考虑（评估其是否属于「现时可执行的实质性权利」），权益法下不涉及此考量。个人理解，供参考。","cat":"金融工具","kw":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3531","q":"金融资产终止确认的条件是什么？应收账款保理（有无追索权）的处理有何不同？","a":"根据CAS 22，金融资产终止确认需要满足以下条件之一：（1）收取金融资产现金流量的合同权利终止；（2）企业已将金融资产所有权上几乎所有的风险和报酬转移给受让方。应收账款保理的核心区别在于有无追索权。无追索权保理：企业已将应收账款所有权上几乎所有的风险和报酬转移给银行，可以终止确认应收账款。有追索权保理：企业保留了信用风险，不能终止确认，应继续确认应收账款并按担保借款处理（确认短期借款）。实务中有时会采用「继续涉入法」处理部分转移风险的情形。个人理解，供参考。","cat":"金融工具","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3530","q":"可转债的发行方如何处理？负债成分和权益成分如何拆分计量？","a":"根据CAS 22和CAS 37，可转债属于复合金融工具。发行方应首先确定金融负债成分的公允价值——未来应付本金和利息的折现值（以同类不含转股权的债务工具的市场利率折现）。然后，将发行价格与负债成分公允价值的差额分配至权益成分（其他权益工具）。初始确认后：（1）负债成分按摊余成本后续计量，利息费用按实际利率法计入损益；（2）权益成分不再重新计量。转股时，将负债成分的账面价值与权益成分一并转出，相应增加股本和资本溢价。实务中的难点是折现率的确定——需要寻找或构建不含转股权的可比债务工具。个人理解，供参考。","cat":"金融工具","kw":"","src":"上海证券交易所 会计监管动态"},{"id":"3529","q":"企业持有的理财产品如何分类？银行的结构性存款如何列报？","a":"理财产品需要根据其合同现金流量特征（SPPI测试）和业务模式进行三分类。银行发行的保本保收益型结构性存款，其合同现金流量仅为本金加上与银行信用风险相关的基本借贷安排，一般可通过SPPI测试，如果业务模式为持有收取合同现金流量，可分类为按摊余成本计量的金融资产。非保本浮动收益型理财产品，其收益与投资标的（股票、债券、外汇等）的市场表现挂钩，不满足SPPI条件，应分类为FVTPL。实务中，资产负债表中通常将期限在一年以内的列报为「交易性金融资产」，一年以上的列报为「其他非流动金融资产」。个人理解，供参考。","cat":"金融工具","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3528","q":"金融负债和权益工具的区分：永续债在发行方报表中的处理？","a":"这个问题的核心是判断发行方是否拥有「无条件避免交付现金或其他金融资产」的权利。如果可以无条件避免（如发行方有自主决定权推迟付息且无累计义务），则分类为权益工具；否则为金融负债。实务中的判断维度：（1）是否存在不可避免的赎回义务——有则金融负债；（2）递延付息条款——如果递延付息是非累计的且没有经济约束，则可能支持权益分类；（3）清算时的清偿顺序——如果劣后于所有其他负债，支持权益分类。永续债的发行人应综合考虑这些因素进行判断，不能仅看名称。个人理解，供参考。","cat":"金融工具","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3527","q":"SPPI测试（合同现金流量特征测试）的实务应用，含有杠杆的结构化产品能否通过SPPI测试？","a":"SPPI测试的核心是判断金融资产的合同现金流量是否仅为对本金和未偿付本金金额之利息的支付。如果合同条款引入了与基本借贷安排无关的风险或波动性敞口（如权益价格、商品价格、汇率变动等），则不满足SPPI条件，应分类为FVTPL。含有杠杆的结构化产品，如果杠杆放大了利息与基础利率之间的关系，使得现金流量波动性显著增加，一般不能通过SPPI测试。实务中的判断要点：看合同中是否包含任何改变现金流时点或金额的条款，是否存在与被投资方经营业绩挂钩的收益分成等。个人理解，供参考。","cat":"金融工具","kw":"","src":"上海证券交易所 会计监管动态"},{"id":"3526","q":"预期信用损失模型（ECL）下，应收账款减值如何计提？三阶段模型的实务应用要点是什么？","a":"根据CAS 22，应收账款减值应按预期信用损失模型处理。对于不含重大融资成分的应收账款，可以采用简化方法（始终按整个存续期预期信用损失计提）。实务中常用的思路：（1）建立应收账款迁徙矩阵——分析历史回款数据，计算不同账龄的迁徙率和违约损失率；（2）结合前瞻性信息——经济环境变化、行业趋势等对信用风险进行调整；（3）单项重大评估与组合评估结合——金额重大的应收账款单独评估，其余按组合计提。第一阶段（信用风险未显著增加）：12个月ECL；第二阶段（信用风险显著增加）：整个存续期ECL；第三阶段（发生信用减值）：整个存续期ECL。个人理解，供参考。","cat":"金融工具","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3525","q":"支付方式变更（电汇变更为银承/信用证/商票/供应链金融）是否属于债务重组？","a":"判断的核心是：是否实质性改变了偿还金额、利息或期限。具体分析如下：（1）电汇变更为支票：一般无需作为债务重组，因为本金、利息、支付期限、信用风险均无明显差异。（2）电汇变更为银行承兑汇票或信用证：需具体分析。如果信用风险未明显增加但支付期限拉长，则属于债务重组；如果期限相同则不属于。（3）电汇变更为商业承兑汇票：关键看支付期限是否变化。如果为他人背书的商票，还需评估信用风险变化。（4）供应链金融：同理，需同时考虑信用风险和付款期限是否实质性变化。个人理解，供参考。","cat":"金融工具","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3524","q":"对有限合伙企业的出资，不具有控制和重大影响的，应计入哪个科目？","a":"对有限合伙企业的投资，如果不具有控制、共同控制或重大影响，应分类为以公允价值计量且其变动计入当期损益的金融资产（FVTPL）。根据流动性，列报为「交易性金融资产」或「其他非流动金融资产」。实务中有争议的是能否指定为以公允价值计量且其变动计入其他综合收益的金融资产（FVOCI-权益工具）。有限合伙企业的出资不具有CAS 22中所定义的「权益工具」特征（因为有限合伙份额通常赋予持有人按比例分配合伙企业净资产的权利，且满足「无条件的交付现金或其他金融资产的义务」的条件时，属于金融负债而非权益），因此不满足FVOCI权益工具的指定条件。个人理解，供参考。","cat":"金融工具","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3523","q":"明股实债的会计处理：投资方以约定收益加优先收购权加退出保障方式投资的，各层级报表如何处理？","a":"这是典型的明股实债安排，需要区分几个层面处理。首先判断本质上是股权还是债权：如果投资方享有固定或保底收益、有退出保障、回购权等安排，实质上更接近债权。在投资方报表层面，应分类为以公允价值计量且其变动计入当期损益的金融资产（FVTPL）。在被投资方报表层面，需要区分两种情形：（1）如果被投资方自身承担回购义务，则在个别报表中确认金融负债，初始确认相应冲减权益；（2）如果回购义务由其他方承担（如母公司担保），被投资方自身不确认负债。合并报表中，谁承担回购义务谁确认负债。个人理解，供参考。","cat":"金融工具","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3522","q":"收入确认 履约义务 积分如何处理？客户积分兑换率如何估算？","a":"客户积分属于向客户提供的一项重大权利（额外购买选择权），构成单项履约义务。积分对应的交易价格应当从总交易价格中分摊，确认为合同负债。分摊金额由两部分决定：（1）积分的单独售价（即客户可获得的折扣金额）；（2）积分的预期兑换率。预期兑换率基于历史数据和当前情况估计，需要定期更新。每个报告期末，根据最新兑换率和实际兑换情况调整合同负债金额。实务中估计兑换率时，如果历史数据充分，可以采用统计方法；数据不足时采用保守估计。个人理解，供参考。","cat":"收入准则","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3521","q":"新收入准则下，收入确认时点的判断——控制权转移的标志有哪些？","a":"根据CAS 14，在某一时点履行履约义务的企业，应当在客户取得相关商品控制权时确认收入。判断控制权转移的标志包括：（1）企业就该商品享有现时收款权利（即客户就该商品负有现时付款义务）；（2）企业已将该商品的法定所有权转移给客户；（3）企业已将该商品实物转移给客户；（4）企业已将该商品所有权上的主要风险和报酬转移给客户；（5）客户已接受该商品。这些标志应综合考量，不能孤立使用。实务中出口销售的收入确认时点判断最为复杂，需要结合具体的贸易术语（INCOTERMS）、合同条款综合判断。个人理解，供参考。","cat":"收入准则","kw":"","src":"上海证券交易所 会计监管动态"},{"id":"3520","q":"新收入准则下，合同履约成本资本化的条件是什么？","a":"根据CAS 14，合同履约成本应在同时满足以下条件时确认为资产：（1）该成本与一份当前或预期取得的合同直接相关；（2）该成本增加了企业未来用于履行履约义务的资源；（3）该成本预期能够收回。实务中常见的合同履约成本包括：直接材料（如施工合同中的建筑材料）、直接人工（如项目现场人员工资）、制造费用（如与合同相关的间接分配部分）。需要注意：合同履约成本的摊销期限不得长于相关合同的履约期。计提减值准备的条件是账面价值超过剩余对价扣除预计尚需成本后的净额。个人理解，供参考。","cat":"收入准则","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3519","q":"新收入准则下，企业为获取合同而发生的增量成本（如销售佣金）如何处理？","a":"根据CAS 14，企业为取得合同发生的增量成本（即不取得合同就不会发生的成本），预期能够收回的，应当作为合同取得成本确认为一项资产。该资产在确认相关收入的同时系统摊销。实务中常见的增量成本包括：销售佣金、渠道介绍费、投标保证金（不含可退回的）等。合同取得成本的资本化条件需要同时满足：（1）属于增量成本；（2）预期能收回。摊销期限一般不应超过合同期限。如果合同期限小于一年，可采用简化处理方法直接在发生时计入当期损益。个人理解，供参考。","cat":"收入准则","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3518","q":"客户支付的违约金和延期付款罚息如何会计处理？应计入主营业务收入还是营业外收入？","a":"需要区分两种情况。第一，违约金：如果属于合同变更带来的对价调整，应作为收入调整（含税）；如果不能明确与合同收入相关，则计入营业外收入。第二，延期付款利息：如果可以明确识别是客户延期付款的补偿，应当计入「财务费用——利息收入」；原因在于，这部分金额本质上是对客户占用企业资金的补偿，与企业主营业务无关，不应混入营业收入。VAR对价的估计需满足「极可能不会发生重大转回」的条件，因此一般对客户的违约补偿不宜事先预计。个人理解，供参考。","cat":"收入准则","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3517","q":"新收入准则下，销售返利（促销奖励）的确认时点是什么？年末尚未结算的返利如何处理？","a":"销售返利属于可变对价。根据CAS 14，企业应当在合同开始时估计交易价格时，将预期支付给客户的返利金额从交易价格中扣除。年末尚未结算的返利，应当按照预期价值法（即基于历史返利率或合同约定条件）估计期末应确认的返利负债。具体操作：（1）每个报告期末，重新评估预期返利金额；（2）将差异调整当期收入。实务中，如果返利金额重大且估计不确定性高，应当注意信息披露的充分性。特别注意：不能等到返利实际支付时才确认——这会低估当期收入且不符合权责发生制原则。个人理解，供参考。","cat":"收入准则","kw":"","src":"中国证监会 会计监管工作通讯"},{"id":"3516","q":"新收入准则下，客户未行权的权利（如过期积分）何时确认收入？","a":"根据CAS 14，客户未行使的权利（如会员积分、储值卡余额）是企业向客户收取的预收款。企业预期有权获得客户未行使权利对应的金额时，应当按照客户行使权利的模式，按比例将未行使权利对应的金额确认为收入。实务中需要建立客户行为模型，基于历史数据分析积分兑换率或储值卡使用率（预期价值法），按照该比例逐步确认收入。如果有证据表明剩余未行使权利金额的绝大部分（如超过97%）预期不会被行使，可以在确定该事实时一次性确认。个人理解，供参考。","cat":"收入准则","kw":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3515","q":"分期收款销售商品应如何处理？按有重大融资成分的销售还是融资租赁处理？","a":"两者在实践中效果相同，没有本质区别。从准则适用的角度看，如果企业销售商品但给予客户分期付款的融资安排，属于CAS 14收入准则的适用范围；如果融资成分重大，需要按折现值确认收入。从融资租赁的角度看（CAS 21），该项交易也可能满足「转移了资产所有权相关的几乎全部风险和报酬」的条件。但不管从哪个角度处理，最终的收入确认金额、利息收入的确认节奏基本一致。实务中行业惯例通常是按收入准则下的重大融资成分处理更为自然，但两种做法都不算错。个人理解，供参考。","cat":"收入准则","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3514","q":"境外销售佣金费用支出应在何时确认？合同规定佣金在收到全部回款后再支付，费用确认时点如何判断？","a":"佣金属于CAS 14下的合同取得成本。根据收入准则，合同取得成本应当在确认相关收入的同时计入损益，与付款时间无关。即使合同约定佣金在收到全部回款后才支付，这不改变「现时义务」的存在。公司已通过代理商获取了销售订单，代理商已完成其履约义务，企业在确认销售收入的同时，应当确认相应的佣金费用。付款条件尚未满足不影响义务的确认。实务中，对应的负债应入账在「应付账款」或「其他应付款」科目下，待实际支付时冲销。个人理解，供参考。","cat":"收入准则","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3513","q":"投入法确认合同履约进度时，分包商与监理的进度存在差异，应选择哪个作为依据？","a":"这个问题在施工行业非常常见。从理论上说，投入法应采用企业自身的投入证据来衡量履约进度，即应以企业内部掌握的工程量数据为依据（包括分包商的实际施工量）。监理认可的进度是第三方评估的结果，虽然有一定参考价值，但通常比较保守。因此理论上应采用企业内部证据（如35%）。超过监理认可部分的应收款应确认为合同资产。但有一个重要的前提：企业需要有完善的内控制度确保内部证据的可靠性。如果内控薄弱或存在虚报进度的风险，则需要审慎处理。实务中的最佳做法是要求分包商的进度数据有充分的支持性证据。个人理解，供参考。","cat":"收入准则","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3512","q":"集采降价导致的经销商补偿如何会计处理？以实物形式补偿客户的已购产品未来降价损失应如何处理？","a":"这属于典型的可变对价问题，但应认定为可变对价比额外购买选择权更合理。核心原因是：补偿是由卖方主动发起、客户被动接受的，客户并未拥有实质性权利去选择是否获取该补偿。因此，公司应将部分收入递延到后期补偿实际发生时确认。具体做法：在初次销售时，根据历史经验和市场预测估计未来需要补偿的金额（预期价值法），将这部分金额从初始交易价格中扣除，确认为合同负债，在实际发放补偿时转入收入。实务中，如果补偿金额重大且难以合理估计，需要充分的披露。个人理解，供参考。","cat":"收入准则","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3511","q":"应收账款/合同资产调减与合同变更如何区分？实务中如何判断属于哪种情况？","a":"这个问题的关键在于：调减的原因是什么？如果可以明确区分哪些调减是对已确认收入对应应收账款的信用风险调整，哪些是对未履行履约义务对应合同价款的减少，那么前者按金融工具准则下的债务重组处理，后者按收入准则下的合同变更处理。如果不能明确区分，则应从谨慎角度统一作为合同变更处理。实务中建议按照以下顺序判断：首先确定调整的性质——是客户信用问题导致的收款减少，还是合同条款变更导致的价款调整；其次考虑是否有充分证据支持区分。没有充分证据时，宜作为合同变更处理。个人理解，供参考。","cat":"收入准则","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3510","q":"如何判断有限合伙企业（有限合伙）是否应纳入合并报表范围？GP持股极小时是否一定不控制？","a":"首先要看GP是否是代理人。根据CAS 33，持股份额低、可变回报量级和可变性不重大的GP，通常被认定为代理人。GP如果是代理人，则不能合并有限合伙企业。判断的主要标准包括：（1）GP是否可被无条件罢免；（2）GP的决策权限范围是否受到严格限制；（3）GP享有的可变回报占总回报的比例是否显著。实务中，GP持股仅1%且收益分配顺序列后于LP的，通常是典型的代理人。但要构成控制，GP如果不是代理人，持股比例通常需至少达到30%以上，且享有大部分可变回报。个人理解，供参考。","cat":"合并报表","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3509","q":"母公司处置子公司部分股权但未丧失控制权，个别报表和合并报表分别如何处理？","a":"个别报表层面，按处置长期股权投资处理，处置对价与处置部分账面价值的差额计入投资收益。合并报表层面则完全不同：由于未丧失控制权，处置部分股权属于权益性交易，不确认投资收益。处置对价与处置部分对应的子公司净资产份额（含商誉）的差额，直接调整资本公积。两者的差异在合并工作底稿中通过抵销分录消除。实务中需要特别注意，处置部分子公司股权后，合并报表中商誉的账面价值不变，因为控制权未变。个人理解，供参考。","cat":"合并报表","kw":"","src":"中国证监会 会计监管工作通讯"},{"id":"3508","q":"合并报表中，少数股权收购（收购子公司少数股东权益）如何处理？是否产生商誉？","a":"根据CAS 33，母公司收购子公司少数股权属于权益性交易，不产生新的商誉。购买对价与应享有子公司净资产份额（按新持股比例计算）之间的差额，直接调整资本公积（资本溢价）；资本公积不足冲减的，依次冲减盈余公积和未分配利润。这与取得控制权的企业合并完全不同——后者会产生商誉或负商誉。实务中经常混淆的点是：如果母公司先购买少数股权再取得控制权，各阶段的处理方法是不同的——少数股权阶段是权益性交易，取得控制权阶段是企业合并。个人理解，供参考。","cat":"合并报表","kw":"","src":"中国证监会 会计监管工作通讯"},{"id":"3507","q":"合并报表中，委托经营协议（承包经营）是否导致对承包主体的合并？","a":"这个问题的核心是判断承包方（运营方）是否控制被承包主体。委托经营协议下，承包方通常有日常经营管理权，但需要看：（1）发包方是否保留了重大经营和财务决策权（如重大投资、融资、利润分配权）；（2）承包方是否可被无条件罢免。如果发包方保留了实质性权利且可无条件罢免承包方，则承包方是代理人，不合并被承包主体。反之，承包方可能构成控制。有一个实务中常用的判断方法：看承包期间经营决策的最终决定权在谁手里。如果利润分配、重大资产处置等核心权力仍归发包方，承包方只是按约定获取管理费或超额利润分成，则不构成控制。个人理解，供参考。","cat":"合并报表","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3506","q":"合并报表中如何判断一致行动协议是否导致控制？受托表决权是否形成控制？","a":"首先看一致行动协议。如果协议约定各方在股东大会表决时行权必须一致，且投资方在一致行动体中有主导地位（如拥有最终决策权或一票否决权），则可能构成控制。关键看权力是否「现时可执行的实质性权利」。再看受托表决权。如果受托人可自主行使表决权（即委托方没有保留实质性罢免权），则受托人可能拥有对被投资方的权力。但如果委托方可随时无条件罢免受托人，则受托人是代理人而非主要责任人。实务中的判断逻辑是：谁的罢免权、谁的决策权，就控制到谁的手里。不能仅看形式上的委托协议，更要关注实质上的行权能力和经济动因。个人理解，供参考。","cat":"合并报表","kw":"","src":"中国证监会 会计监管工作通讯"},{"id":"3505","q":"合并报表中，母子公司之间发生债务重组是否一定遵循权益性交易处理？是否有例外情况？","a":"理论上存在不按权益性交易处理的可能性，但实务中认可的例外情形非常有限。证监会公告[2009]34号文提及的破产债务重整中，控股股东等以债权人身份、与其他债权人相同比例进行的债务豁免，不属于权益性交易。但必须同时满足：（1）母公司及其关联方不能是主要债权人，不能主导债权人会议表决；（2）需证明非关联方债权人的豁免比例合理，与子公司实际财务状况和清偿能力相适应。除此之外，母子公司之间的债务豁免一般认定为权益性交易，冲减资本公积而非确认损益。个人理解，供参考。","cat":"合并报表","kw":"","src":"中国证监会 会计监管工作通讯"},{"id":"3504","q":"交叉持股的合并报表如何处理？子公司持有母公司股权的情形下库藏股如何抵消？","a":"子公司持有的母公司股份，在合并报表层面应当作为库藏股处理，不得确认为合并主体的资产。具体抵销分录为：借记「库存股」（母公司权益的减项），贷记「长期股权投资」（子公司资产）。库藏股按照子公司取得成本计量。如果子公司将该投资分类为金融资产并按公允价值计量，公允价值变动在合并报表层面应予以抵消。实务中交叉持股多见于集团内部股权重组，需要注意该安排对每股收益计算的影响——计算基本每股收益时应剔除库藏股的影响。个人理解，供参考。","cat":"合并报表","kw":"","src":"中国证监会 会计监管工作通讯"},{"id":"3503","q":"同一控制下三方债权债务转让及豁免：集团内三家公司的往来款如何会计处理？","a":"对于集团公司层面而言，集团内部的债权债务在合并报表层面本应全部抵消。但在个别报表层面，需要逐家公司进行账务处理。以典型场景为例：A公司将债权转让给集团母公司，集团母公司再将对该债务的豁免作为对B公司的资本性投入，借记「长期股权投资」，贷记「内部往来」。需要注意的是，母公司对子公司债务的豁免会导致长期股权投资成本增加，需要结合子公司的可收回金额审慎评估是否需要计提长期股权投资减值准备。实务中集团内债务豁免的交易结构需要仔细设计，既要考虑合并报表层面无影响的要求，也要防范税务风险。个人理解，供参考。","cat":"合并报表","kw":"","src":"深圳证券交易所 会计监管动态"},{"id":"3502","q":"合并报表中，母公司对子公司增资导致持股比例变动，专项储备如何计算归母部分？","a":"专项储备中归属于母公司的余额按期末母公司持股比例计算，而非按月平均或分段计算。如果增资导致持股比例在年度中间发生变化，利润表中归母净利润需要分段计算（按照增资前后的持股比例分别计算应享有的份额），但专项储备的归母余额直接以期末持股比例确定。利润表分段计算的结果与专项储备按期末比例计算的差异，应当调整资本公积（资本溢价）。实务中这是一个容易被忽略的处理细节，尤其是在采掘业、建筑业等专项储备金额较大的企业中应当特别注意。个人理解，供参考。","cat":"合并报表","kw":"","src":"中国证监会 会计监管工作通讯"},{"id":"3501","q":"子公司发生超额亏损，母公司合并报表如何处理？是否继续确认少数股东应分担的亏损？","a":"根据CAS 33，子公司发生超额亏损时，少数股东应分担的亏损份额应以少数股东对该子公司的权益账面价值为限。如果公司章程或协议约定少数股东有义务承担超额亏损，则超出部分也应由少数股东分担；否则，超额亏损全部归属于母公司股东。实务中，少数股东对子公司权益账面价值通常包括：少数股东初始投资成本和累积享有的留存收益份额。当亏损金额超过该金额时，少数股东分担以零为下限。后续子公司恢复盈利时，先要补回以前年度未分担的亏损部分。个人理解，供参考。","cat":"合并报表","kw":"","src":"深圳证券交易所 会计监管动态"},{"id":"3500","q":"合并报表中如何判断是否控制结构化主体？","a":"根据CAS 33，控制三要素模型同样适用于结构化主体：权力、可变回报、权力与回报的联系。但结构化主体的特殊性在于：表决权不是唯一的控制判断依据。实务中需要综合考虑：（1）结构化主体的设立目的和设计；（2）相关活动及对其有主导权的各方；（3）是否有决策权，包括合同安排赋予的特殊权利（如管理权、资产服务权）；（4）可变回报的量级和可变性，以及与其他方的比较。特别要注意：结构化主体的管理人往往以「代理人」身份行事，关键看其是否可被无条件罢免、决策范围是否受严格约束、可变回报是否足够重大等。个人理解，供参考。","cat":"合并报表","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3499","q":"合并报表中内部往来（应收应付）抵消的同时，是否需要抵消因汇率变动产生的汇兑损益？","a":"内部往来余额应当全额抵消，这一点毋庸置疑。但一方在个别报表中确认的汇兑损益，不能与另一方的汇兑损益或者外币报表折算差额在合并层面相互抵消。这是因为两方确认汇兑损益的币种视角不同：一方以本位币计量外币货币性项目（确认汇兑损益），另一方以不同本位币计量同一项目。两者的汇兑损益在性质上并不对等，贸然抵消会导致合并报表不能正确反映企业的外汇风险敞口。实务中常见的是母公司与境外子公司之间的外币内部往来，在合并层面需要保留各自的汇兑损益，不能简单相互抵消。个人理解，供参考。","cat":"合并报表","kw":"","src":"中国证监会 会计监管工作通讯"},{"id":"3498","q":"非同一控制下企业合并中，购买日与合并对价相关的或有对价如何处理？","a":"根据CAS 20，或有对价应按购买日的公允价值计入合并成本。后续处理取决于其分类：（1）如果或有对价被分类为金融资产或金融负债，后续公允价值变动计入当期损益；（2）如果被分类为权益工具，则后续不需重新计量。实务中常见的有业绩补偿承诺（对赌协议），需要判断其属于金融负债还是权益工具。关键在于看是否无法避免交付现金或金融资产。通常约定「如果业绩不达标，被购买方原股东需向购买方支付补偿」的情形中，购买方应确认一项以公允价值计量且其变动计入当期损益的金融资产。个人理解，供参考。","cat":"企业合并","kw":"","src":"财政部 企业会计准则解释公告"},{"id":"3497","q":"新设子公司时附有少数股东股权回购义务，母公司个别报表和合并报表分别如何处理？","a":"这个问题需要区分个别报表和合并报表两个层面。母公司个别报表层面，由于回购标的是子公司少数股权而非母公司自身权益工具，回购义务公允价值为零，无需确认金融负债。但合并报表层面就不一样了：少数股权在合并报表中属于合并层面的「自身权益工具」，根据CAS 37（金融工具列报），应当确认为一项金融负债。初始确认金额应为回购义务公允价值的现值，冲减资本公积；后续期间随着回购义务到期日临近，该金融负债的利息费用确认为财务费用。实务中这种情况在新设合资子公司时比较常见，初始确认时容易遗漏合并报表层面的负债确认。个人理解，供参考。","cat":"企业合并","kw":"","src":"深圳证券交易所 会计监管动态"},{"id":"3496","q":"被购买方在购买日之前的亏损产生的可抵扣暂时性差异，购买方在购买日如何处理？","a":"根据CAS 18，购买方在购买日应当评估被购买方原有的可抵扣暂时性差异（包括可抵扣亏损）是否符合递延所得税资产的确认条件。如果符合条件（即很可能获得足够的应纳税所得额以利用该可抵扣暂时性差异），应在购买日确认为递延所得税资产，相应减少商誉或增加负商誉。实务中，购买日对被购买方原有可抵扣亏损的评估需要特别注意：亏损企业本身处于困境，未来能否产生足够的应纳税所得额存在较大不确定性，因此需要审慎评估。个人理解，供参考。","cat":"企业合并","kw":"","src":"上海证券交易所 会计监管动态"},{"id":"3495","q":"非同一控制下企业合并中，被购买方可辨认净资产公允价值与账面价值的差额如何处理？是否需要确认递延所得税？","a":"在购买日的合并报表中，被购买方的可辨认资产和负债需要按购买日的公允价值进行计量。公允价值与账面价值之间的差额，应当调整相关资产或负债的账面价值。同时，由于合并报表层面调增（或调减）了资产账面价值，产生了新的暂时性差异，必须确认相应的递延所得税负债（或资产）。这一会计处理方法会增加被购买方可辨认净资产的公允价值，从而影响商誉的计算。实务中典型的场景包括：存货评估增值、固定资产评估增值、无形资产识别评估增值等。每一项评估增值都需要计算对应的递延所得税影响。个人理解，供参考。","cat":"企业合并","kw":"","src":"深圳证券交易所 会计监管动态"},{"id":"3494","q":"同一控制下企业合并中，支付对价超过被合并方净资产账面价值份额的差额计入哪个科目？","a":"根据CAS 20，同一控制下企业合并中，合并方支付的合并对价（包括现金、非现金资产、承担的负债、发行的权益工具等）与合并日取得被合并方净资产账面价值份额的差额，应当调整资本公积（资本溢价或股本溢价）。如果资本公积不足冲减的，依次冲减盈余公积和未分配利润。实务中需要注意的是：这个差额既可以是被合并方净资产的「贷差」（支付对价小于净资产份额），也可以是「借差」（支付对价大于净资产份额），贷差只能增加资本公积，绝对不能计入当期损益。这是权益结合法下防止利润操纵的核心约束。个人理解，供参考。","cat":"企业合并","kw":"","src":"财政部 企业会计准则解释公告"},{"id":"3493","q":"子公司处置时合并报表投资收益的计算：以0对价转让子公司100%股权，合并报表层面如何计算处置损益？","a":"合并报表层面确认的处置损益，应当等于处置对价减去处置日子公司净资产的账面价值（包括商誉中归属于该子公司的部分）。以0对价转让时，合并报表层面应确认处置损益为子公司净资产账面价值的负数。与个别报表投资收益的差异主要来自子公司自购买日或合并日以来形成的留存收益。个别报表层面仅按长期股权投资账面价值计算收益（或亏损），而合并报表层面需要将被处置子公司的全部可辨认净资产、商誉等一并转出。实务中要注意，如果子公司还含有其他综合收益，处置时应一并转入当期损益。个人理解，供参考。","cat":"企业合并","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3492","q":"同一控制下合并抵消分录中未分配利润如何处理？利润表抵消和资产负债表抵消如何互相配合？","a":"同一控制下企业合并编制合并报表时，利润表抵销分录中需要借记「年初未分配利润」等项目，以将被合并方自期初以来的利润表纳入合并范围；而资产负债表抵销分录中贷记「期末未分配利润」，体现被合并方期末留存收益。两笔分录叠加后整体是平衡的，但具体每个报表项目的抵消金额可能不同。核心逻辑是：合并利润表体现整个报告期内被合并方的经营成果，合并资产负债表体现合并日的权益结构，差额通过资本公积或留存收益来调整。实务中编制底稿时宜先做资产负债表抵消，再做利润表抵消，最后检查两部分是否衔接。个人理解，供参考。","cat":"企业合并","kw":"","src":"中国证监会 会计监管工作通讯"},{"id":"3491","q":"收购单一资产实体的会计处理：收购已进入破产程序的公司，如何判断是业务合并还是资产收购？","a":"这个问题需要从两个层面分析。根据CAS 20，企业合并的核心特征是被购买方构成「业务」，即一组能够为投资者带来回报的投入和实质性加工处理过程的集合。已进入破产程序的公司，如果其主要经营活动已停止、关键人员已流失、客户关系已丧失，那么通常不构成业务，此时取得该公司的各项可辨认资产和负债应视为资产收购，不需要确认商誉。但如果破产公司仍保留正常经营活动（如在重整期间仍持续经营），则需要进一步判断是否构成业务合并。实务中需要结合破产程序的具体阶段、实际经营状态等因素综合分析。个人理解，供参考。","cat":"企业合并","kw":"","src":"中国证监会 会计监管工作通讯"},{"id":"3490","q":"认缴与实缴比例不同时，合并报表中
