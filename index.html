⽅与被收购⽅商誉减值是否存在关联性","a":"商誉减值是在资产组或者资产组组合的层⾯上测试的，⽽不是针对某个法⼈或者被收购⽅整体。⽽基于资产组的定义和确定原则，在不同层⾯进⾏商誉减值测试时，资产组的划分⼤概率是具有逻辑⼀致性的，即，在本案例中，B公司合并层⾯发⽣商誉减值的资产组，⼤概率在A公司合并层⾯也是作为⼀个独⽴资产组进⾏商誉减值测试的（A合并B形成的商誉要按⼀定⽅式分配给该资产组）。同⼀资产组在同⼀基准⽇测算的可收回⾦额应当是⼀样的，因此A收购B所形成的商誉分摊给该资产组的⾦额在计⼊该资产组账⾯价值后，与该资产组的可收回⾦额相⽐较，也⼤概率会存在减值。 因此，主帖中所说的“果A公司商誉减值测试结果显示不需要减值，那么B公司计提的2000万元商誉减值应当在A公司合并报表层⾯转回”虽然理论上存在这种可能性，但实际中可能性并不⼤。 如前所述，同⼀资产组的划分和可收回⾦额确定，在不同层⾯的减值测试中应保持逻辑⼀致性，出现重⼤差异很可能是不合理的。因此，同⼀资产组在不同报表层⾯不应得出不同的可收回⾦额测算结果。个人理解，供参考。","cat":"企业合并","kw":"商誉,减值,合并,请教陈版,收购⽅与被收购⽅商誉减值是否存在关联性","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY1420","q":"⼦公司吸收合并⺟公司，原⺟公司合并层⾯对⼄公司的商誉如何处理","a":"⼦公司吸收合并原⺟公司，⼦公司的合并报表应延续原⺟公司合并报表层⾯的处理，即相当于将⺟公司的各项资产、负债（除了对作为吸收⽅的原⼦公司的⻓期股权投资以外）通过同⼀控制下合并的⽅式纳⼊⼦公司的财务报表。相应地，原先⺟公司A合并报表层⾯对于⼄的商誉应继续保留在甲公司的合并报表中。 即，⾸先第⼀步在甲同⼀控制下合并⼄时，按照《企业会计准则解释第6号》第⼆条规定，甲的合并报表层⾯对⼄的各项资产、负债按照以原购买⽇公允价值为基础持续计算的⾦额计量，此时 A合并报表层⾯对⼄的商誉已经体现在甲的合并报表中；后续⼄吸收合并甲时，应延续甲的合并报表层⾯的处理。 由于本案例具有特殊性，作为吸收⽅的⼄公司最初是⾮同⼀控制下合并的被合并⽅，所以后续⼄个别报表层⾯和合并报表层⾯对其⾃身资产、负债的计量基础会有差异，即个别报表层⾯沿⽤原账⾯价值基础，合并报表层⾯使⽤以最终控制⽅A合并报表层⾯的计量基础。个人理解，供参考。","cat":"企业合并","kw":"公允价值,商誉,合并,⼦公司吸收合并⺟公司,原⺟公司合并层⾯对⼄公司的商誉如何处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY1006","q":"请教陈⽼师关于同⼀控制下企业合并长投⾦额的确定问题","a":"根据《企业会计准则第2号——长期股权投资（2014年修订）》第五条规定，B公司对C公司长期股权投资的初始计量成本应为“被合并⽅所有者权益在最终控制⽅合并财务报表中的账⾯价值的份额”。这⾥的“账⾯价值”包含当初⾮同⼀控制下合并所形成商誉延续计算到当前合并⽇的账⾯价值在内。因此，既然该部分商誉在最终控制⽅合并报表中已全部减值，故其账⾯价值按零计⼊。 但是，在B公司的合并报表中，就同⼀控制下合并事项追溯重述前期合并报表的⽐较数据时，需体现出该部分商誉的减值损失对前期净利润和留存收益的影响。 上一页 陈版主（陈奕蔚老师）答疑历史文章（2024年10月） 下一页 陈版主（陈奕蔚老师）答疑历史文章（2024年12月） 粤ICP备18107660号 粤公网安备44060602000887号 关于网站 Copyright © 2021-2026 会计便利店 hjyweb.cn 【个人理解，供参考。","cat":"企业合并","kw":"商誉,减值,合并,请教陈⽼师关于同⼀控制下企业合并长投⾦额的确定问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并、《企业会计准则第2号——长期股权投资（2014年修订）》"},{"id":"CY0976","q":"股权处置问题","a":"A公司处置C公司55%股权给B公司，在处置价格公允的前提下，可以在个别报表和合并报表层⾯确认处置⼦公司的损益。其中，合并报表层⾯的处置损益按照《企业会计准则第33号——合并财务报表（2014年修订）》第五⼗条规定计算。 如果处置价格⾼于标的股权的公允价值，则处置价格超出标的股权公允价值的差额按权益性交易原则处理，计⼊资本公积；标的股权公允价值仍参与处置损益计算。 B公司取得C的55%股权并控制C，按同⼀控制下合并原则处理。其合并报表按《企业会计准则解释第6号》第⼆条规定编制。B的个别报表和合并报表层⾯仍体现原先C被纳⼊当前最终控制⽅控制范围时确认的100%股权对应的商誉。 提问⼈：Ada12345 时间：2024-11-25 18:12:47 陈版主，在集团合并层⾯A公司确认的投资收益和B公司调整的权益，是否还需要抵消恢复调整回答⼈：chenyiwei 需要。个人理解，供参考。","cat":"企业合并","kw":"公允价值,商誉,合并,股权处置问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并、《企业会计准则第33号——合并财务报表（2014年修订）》"},{"id":"CY0700","q":"换股的会计分录应该怎么做？","a":"对于发⾏⼈，应注意区分取得资产是否构成企业合并，如构成企业合并的，还需区分是同⼀控制下合并还是⾮同⼀控制下合并，据此确定换⼊资产的⼊账价值，以及贷记股本和资本公积的⾦额。 基本分录是：借：长期股权投资或者各项购⼊资产，贷：股本，贷：资本公积——股本溢价。 如果不是同⼀控制下合并，则上述分录中资产⼊账价值总额=股份的发⾏数量*发⾏价；如果是同⼀控制下合并， 则上述分录中资产⼊账价值总额=购⼊资产在最终控制⽅合并报表层⾯的账⾯价值。 提问⼈：bleblemig 时间：2024-09-03 13:54:26 陈⽼师，您讲的“对于发⾏⼈，应注意区分取得资产是否构成企业合并，如构成企业合并的，” ，构成“企业合并”的标准是什么？ 有明确的细则么？ 谢谢！ 回答⼈：chenyiwei 即，被收购的标的是否构成业务。根据《企业会计准则解释第13号》第⼆条标准判断。个人理解，供参考。","cat":"企业合并","kw":"合并,换股的会计分录应该怎么做","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0006","q":"⼦公司注销后商誉处理","a":"理论上，资产组内的资产（此处仅指⾮流动⾮⾦融资产，即《企业会计准则第8号——资产减值》规范的资产，下 同）处置时，应按⽐例分摊商誉予以转出，但实务中可能难以做到，尤其是难以区分正常的资产更新和资产处置的情况下。如果⼀个资产组内的资产是分散处置的，则更难以合理确定商誉的对应转出⾦额，故此时的做法⼀般是对该资产组对应的商誉计提减值，⽽不是直接转销商誉。到确定该资产组或资产组组合内的所有主要资产均已处置完毕，再将商誉予以转销处理。个人理解，供参考。","cat":"企业合并","kw":"商誉,减值,⼦公司注销后商誉处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并、《企业会计准则第8号——资产减值》"},{"id":"CY0853","q":"！经营权能否作为⽆形资产","a":"这类经营权⽇后如何实现经济资源流⼊？业务模式是什么？其价值是否公允。如采⽤收益法评估的，是否合理？ 该经营权⽇后是否向⾮关联⽅转让，转让价格是否公允？政府⽅是否与受让发之间有保证受让⽅获得保底收益（差额补⾜）等安排？ 此类交易的风险很⼤，建议谨慎对待。 提问⼈：zszs1993 时间：2024-10-16 18:04:51 回复陈版主：主要靠市场化运营来实现经济流⼊，没有任何保底收益安排，价值我觉得是不公允的（但是确实又出具了评估报告，按照收益法），该经营权以后不会向⾮关联⽅转让（顶多就是在县国资管辖的范围内进⾏⽆偿划 转）。 回答⼈：chenyiwei 理论上收益权也是⼀种特殊的⽆形资产（参照PPP⽆形资产模式），但此处的评估值不公允是很⼤的风险。该交易的实质是政府以不真实的资产向投资⼈或者⾦融机构借款，会导致隐性政府债务增加。个人理解，供参考。","cat":"实务综合","kw":"求助陈版,经营权能否作为⽆形资产","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0945","q":"关于永续债利率跳升的问题","a":"能发⾏永续债的企业，⼀般都有较⾼的信⽤评级，因此其从市场上获得债务融资的利率是⽐较低的。12%很可能已经明显⾼于“同期同⾏业同类型⼯具平均的利率⽔平”，尤其是在⽬前降息的⼤背景下。 如果有该项约定，则该永续债⼤概率不符合确认为权益⼯具的条件。提问⼈：gpqg 时间：2024-11-14 17:24:17 陈版，实务中这个利率上限该如何确定，才可能满⾜“未超过同期同⾏业同类型⼯具平均的利率⽔平”呢？ 回答⼈：chenyiwei 与发⾏企业通常的债务融资利率、通⾏的市场利率相对照。如果只进⾏⼀次利率跳升（⼀般为300bp），后续调息不再扩⼤与基准利率之间的利差，则可以认为满⾜该条件。 提问⼈：gpqg 时间：2024-11-17 09:52:15 陈版，还有两个问题向您请教：个人理解，供参考。","cat":"实务综合","kw":"请教陈版,关于永续债利率跳升的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0254","q":"关于可转债实际利率的问题。","a":"由于可转债的负债部分属于以摊余成本计量的⾦融负债，故⼀旦实际利率确定，后续就不再调整。摊余成本计量的结果不等于当前公允价值。个人理解，供参考。","cat":"金融工具","kw":"公允价值,求助陈版,关于可转债实际利率的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第37号——金融工具列报"},{"id":"CY0870","q":"应付债券摊到倒数第⼆期，利息调整为负数了，正常吗？","a":"不应出现这种情况。因为到期赎回是按照⾯值的113%，故最后⼀期需⽀付的利息⾦额相当于本⾦的16%（13%+第六年名义利率3%）。应将这部分赎回溢价计⼊该项可转债存续期内的现⾦流量中计算IRR，据此作为实际利率确认负债部分的利息费⽤。 虽然从形式上看，如果持有⼈选择转股，发⾏⽅就不需要⽀付该13%赎回溢价，但是，在持有⼈享有选择权的情况下，持有⼈选择转股，意味着投资⼈认为转股的收益更⾼，相应地，在转股情形下，发⾏⽅的财务成本是不低于到期赎回情况下的财务成本的。所以，即使对于已在持有期间或到期⽇转股的部分，也要模拟计算这部分赎回溢价， 将其计⼊持有期间的利息⽀出，然后以包含这部分赎回溢价的负债部分账⾯价值转为股本和资本公积（相当于减少留存收益、增加资本公积）。个人理解，供参考。","cat":"实务综合","kw":"应付债券摊到倒数第⼆期,利息调整为负数了,正常吗","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1083","q":"请教陈⽼师：","a":"判断是否构成⼀揽⼦交易，很重要的⼀点是关注整个交易要达到的商业⽬的，据此分析是否要所有步骤均完成才能达成这⼀⽬的；其次各步骤之间是否存在关联性，互为前提和条件。 就主帖案例⽽⾔，需关注：各步骤之间可能存在关联性，但为何每个步骤之间的间隔都要将近⼀年？按理关联⽅之间的股权重组交易⽆需间隔如此之⻓的时间？如果所有交易步骤的⽬的旨在实现⼄公司的分⽴（例如分⽴的对象是原先⼄公司的两项独⽴业务），以及甲、A公司各占其中⼀个公司的100%股权，那么构成⼀揽⼦交易是有可能的，但每个步骤的定价原则如何确定？如果某个步骤存在障碍⽆法完成，是否会影响到此前已完成的步骤的效⼒？ 如果各步骤不构成⼀揽⼦交易的，则2023年甲转让15%股权给A的收益计⼊其他综合收益就是不恰当的。个人理解，供参考。","cat":"实务综合","kw":"请教陈⽼师","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1893","q":"赎回条款中期满赎回可转债的价格⾼于票⾯⾦额之差额处理","a":"对于此类到期赎回价格⾼于⾯值的差额（例如主帖中按⾯值105%赎回的5%溢价部分）应作为在到期⽇⽀付的⼀笔额外利息，纳⼊可转债的负债部分实际利率的计算，并在存续期间内确认为可转债负债部分的利息⽀出，并相应增加负债部分（应付债券）的账⾯价值。如在到期⽇前转股，则该部分应计利息⼀并纳⼊转股负债的账⾯价值，最终转⼊资本公积（股本溢价）。 按照常理，投资⼈之所以选择转股⽽不是到期赎回，是因为他们认为转股的收益更⾼，⽽投资⼈的收益也就是发⾏⼈的融资成本，因此即使这部分溢价赎回款因投资⼈选择转股⽽⽆需⽀付， 发⾏⼈的融资成本仍⾼于负债部分的实际利率。也就是这部分应计利息虽然⽆需⽀付，但也构成了发⾏⼈应承担的融资成本的⼀部分，所以将其计⼊利息⽀出是合理的。个人理解，供参考。","cat":"实务综合","kw":"赎回条款中期满赎回可转债的价格⾼于票⾯⾦额之差额处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0309","q":"收⼊确认时点问题","a":"该事项属于⾦融⼯具准则的规范范围，不适⽤收⼊准则。如果该应收账款属于以摊余成本计量的⾦融资产，则其利息应在持有期间内，按实际利率法确认利息收⼊。个人理解，供参考。","cat":"金融工具","kw":"收⼊确认时点问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第37号——金融工具列报"},{"id":"CY0756","q":"海外建设运营移交项⽬是否应适⽤14号解释？","a":"对于在海外实施的基础设施建设和运营等项⽬，如果同样符合“双控制”“双特征”条件的，则同样适⽤《企业会计准则解释第14号》第⼀条规定。就主帖背景信息看很可能是满⾜的。 电站建设期间是否确认建造收⼊，取决于在建造过程中，本企业是否为主要责任⼈。提问⼈：huozhizhou 时间：2024-10-09 17:00:48 陈版：若均满⾜上述双控制、双特征，以及主要责任⼈的条件，满⾜⽆形资产模式。对于此类海外项⽬，建设期的收⼊⾦额该如何确认，是否有类似处理案例给予参考 回答⼈：chenyiwei ⼀般按照成本加合理⽑利的⽅式估计建造收⼊，对应确认⽆形资产。实务中也有按成本确认等额收⼊，即建造零⽑利的例⼦，但个⼈理解并不恰当。个人理解，供参考。","cat":"实务综合","kw":"海外建设运营移交项⽬是否应适⽤14号解释","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0459","q":"关于持股平台股份⽀付相关问题","a":"这个问题⾸先要考虑员⼯有⽆正常途径可以享受到所持股权的公允价值变动收益，即是否提供正常情况下按公允价值对外转让股份的通道。如果除了政府投资者和持股平台以外不能引⼊其他股东，持股平台内部的股权转让价格只能按照每股账⾯净资产，则员⼯在正常情况下不能享受到公司股权的公允价值增值收益，此时不涉及股份⽀付，⽽是利润分享计划，应由职⼯薪酬准则加以规范。从主帖信息来看，这种可能性很⼤。 如果作为利润分享计划，则在公司获得利润同时，应按照这些净利润中归属于持股平台股东的份额确认成本费⽤和资本公积（因为除了正常利润分配以外，公司⽆需直接将该增值⽀付给股东）。由此导致的结果就是将留存收益逐步转⼊资本公积。个人理解，供参考。","cat":"实务综合","kw":"公允价值,请教陈版,关于持股平台股份⽀付相关问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1507","q":"三级⼦公司吸收合并⼆级⼦公司的会计处理","a":"基本赞同你的理解。 但需注意：D吸收合并C属于同⼀控制下合并，其差额应调整的资本公积明细科⽬应为资本溢价，⽽不是其他资本公积。另外需考虑D的实收资本是否因本次吸收合并⽽增加，如增加的，则应按合并⽅案确定的实收资本增加⾦额贷记D公司的实收资本科⽬，差额借记或贷记“资本公积——资本溢价”科⽬。 上一页 陈版主（陈奕蔚老师）答疑历史文章（2025年05月） 下一页 陈版主（陈奕蔚老师）答疑历史文章（2025年07月） 粤ICP备18107660号 粤公网安备44060602000887号 关于网站 Copyright © 2021-2026 会计便利店 hjyweb.cn 【个人理解，供参考。","cat":"实务综合","kw":"合并,三级⼦公司吸收合并⼆级⼦公司的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0495","q":"请教盈余公积补亏的问题","a":"以弥补未分配利润⾄0为限。否则就是变相地将盈余公积冲回⽤于分红了。提问⼈：fanbaisy 时间：2024-06-28 13:48:44 感谢陈版主回复！因为公司法⾥没有具体的规定，请问这个限制有没有规定或出处呢，⿇烦陈版主再指导指导，⾮常感谢。 第⼆百⼀⼗四条 公司的公积⾦⽤于弥补公司的亏损、扩⼤公司⽣产经营或者转为增加公司注册资本。 公积⾦弥补公司亏损，应当先使⽤任意公积⾦和法定公积⾦；仍不能弥补的，可以按照规定使⽤资本公积⾦。回答⼈：chenyiwei 既然是“弥补亏损”，那就是以消除负数为限，不能超额转出。这是基于字⾯意思的理解，也符合⼀般惯例。个人理解，供参考。","cat":"实务综合","kw":"请教盈余公积补亏的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0956","q":"应收保理出表相关问题","a":"“⽆论基于何种原因公司需承担最终还款责任的50%”具体如何操作？是否事实上存在⼀项优先/劣后的安排，⽽本企业作为保理申请⼈，所承担的还款责任实际上是劣后级的兜底责任？ 如果是，则风险和报酬完全没有转移，不能终⽌确认被保理的应收账款，此时不适⽤继续涉⼊的相关规定。 还有⼀种可能性是满⾜《企业会计准则第23号——⾦融资产转移（2017年修订）》第四条中“该⾦融资产部分仅包括与该⾦融资产所产⽣的全部现⾦流量完全成⽐例的现⾦流量部分”的条件，即可以适⽤“将⾦融资产转移终⽌确认的判断标准运⽤于该⾦融资产部分”的条件，从⽽部分终⽌确认，但实务中这种可能性不⼤。个人理解，供参考。","cat":"实务综合","kw":"请教陈版,应收保理出表相关问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则、《企业会计准则第23号——⾦融资产转移（2017年修订）》"},{"id":"CY1270","q":"关于拍卖“股东未及时出资”的债权，如何进⾏账务处理","a":"该拍卖款项是否应归属于债务⼈，⼀并⽤于偿债？如果是，则鉴于该债权与股东出资相关，故债务⼈在取得该款项时应计⼊资本公积处理。提问⼈：财务知多少 时间：2025-04-18 17:43:35 ⾮常感谢陈版主的回答。我还有点疑问，计⼊资本公积，是直接“借：银⾏存款 5万；贷：资本公积 5万”这样处理吗？ 那如果后续拍卖的买受⼈向股东实现了追偿（这个时候，从股东⻆度， 已经完成了出资），债务⼈是否需要进⾏进⼀步的账务处理呢？ 回答⼈：chenyiwei 直接“借：银⾏存款 5万；贷：资本公积 5万。后续追偿得到进⼀步款项的，再视情况调整实收资本和资本公积。个人理解，供参考。","cat":"实务综合","kw":"关于拍卖“股东未及时出资”的债权,如何进⾏账务处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1341","q":"是否构成虚假出资","a":"建议如实描述相关事实即可，我们既不是监管机构也不是法院，不要轻易对某件事情定性。 ⽬前《公司法》和相关司法解释对于“虚假出资”均没有明确的判断标准。《公司法》第252条规定：“公司的发起⼈、股东虚假出资，未交付或者未按期交付作为出资的货币或者⾮货币财产的， 由公司登记机关责令改正，可以处以五万元以上⼆⼗万元以下的罚款；情节严重的，处以虚假出资或者未出资⾦额百分之五以上百分之⼗五以下的罚款；对直接负责的主管⼈员和其他直接责任⼈员处以⼀万元以上⼗万元以下的罚款。”如果从“未交付或者未按期交付作为出资的货币或者⾮货币财产”这⼀点来看，本案例并不符合。个人理解，供参考。","cat":"实务综合","kw":"是否构成虚假出资","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1442","q":"清产核资项⽬⽆法清查价值，报告如何处理？","a":"根据《国有企业清产核资办法》（国资委令第1号）第⼆条：本办法所称清产核资，是指国有资产监督管理机构根据国家专项⼯作要求或者企业特定经济⾏为需要，按照规定的⼯作程序、⽅法和政策，组织企业进⾏账务清理、财产清查，并依法认定企业的各项资产损溢，从⽽真实反映企业的资产价值和重新核定企业国有资本⾦的活动。第四条：企业清产核资包括账务清理、资产清查、价值重估、损溢认定、资⾦核实和完善制度等内容。 从本案例主帖来看，由于⽆账⾯价值、清查价值，只有实物盘点和清查资料，因此并不是完整的清产核资。不应称为清产核资报告，应称为资产盘点报告或者资产实物状态清查报告。个人理解，供参考。","cat":"实务综合","kw":"清产核资项⽬⽆法清查价值,报告如何处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0598","q":"企业购买不良债权但分期付款","a":"本案例中，⾸先应根据标的债权所有权上的主要风险和报酬的转移情况，谨慎判断原资产管理公司能否终⽌确认该项⾦融资产。即该交易的实质是分期付款购买⾦融资产，还是以该不良资产的还款现⾦流为质押向该资产管理公司提供融资。这⾥主要考虑的因素是：名义上是固定⾦额、固定利率的转让款，但如果后续回收情况不同于预期，则本企业需⽀付的价款⾦额和⽀付时间是否可以相应变化？ 另外，如果该不良债权仍由原资产管理公司负责催收，则其催收取得款项和向本企业⽀付款项之间，是否符合⾦融资产转移的“三不原则”？资产管理公司⽀付给本企业的现⾦与其收回不良资产的现⾦流能否对应？个人理解，供参考。","cat":"实务综合","kw":"企业购买不良债权但分期付款","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0190","q":"求助：累计亏损的有限责任公司以低于1元股的价格增资的账务处理及实缴到 位问题？","a":"出资价格不能低于每股⾯值，即1元/股。因此，本案例不能收到30万元出资却增加100万元实收资本，⽽只能增加 实收资本30万元。剩余的部分，由⽼股东零对价转让存量股份给激励对象实现，最终达到的⽬标是各激励对象的持股⽐例与假设新增100万股情况下的持股⽐例⼀致。需转让的存量股份数量应当是不到70万股。 本案例中的增资价格是按照每股净资产计算的，但每股净资产并不代表每股公允价值，因此存在股份⽀付的情况仍然是⼤概率事件。建议⾸先通过恰当的评估⽅法确定每股公允价值，与核⼼员⼯每股取得成本相⽐较，确定股份⽀付费⽤的计量⾦额。个人理解，供参考。","cat":"实务综合","kw":"公允价值,累计亏损的有限责任公司以低于1元股的价格增资的账务处理及实缴到,位问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1525","q":"关于商业银⾏逾期贷款利息收⼊确认及应税的问题请教","a":"以前在⾦融企业会计制度下，曾经规定：“发放贷款到期（含展期，下同）90天后尚未收回的，其应计利息停⽌计⼊当期利息收⼊，纳⼊表外核算；已计提的贷款应收利息，在贷款到期90天后仍未收回的，或在应收利息逾期90天后仍未收到的，冲 减原已计⼊损益的利息收⼊，转作表外核算”。但这⼀规定与⽬前⾦融⼯具会计准则下以实际利率法确认利息收⼊的要求是直接冲突 的。⾦融⼯具准则对三阶段的⾦融资产的利息收⼊确认和计量分别规定了不同的⽅式，应按照最新的规定执⾏，⽽不能沿⽤原制度下的规定。 税务问题建议咨询税务专业⼈⼠意⻅。个人理解，供参考。","cat":"实务综合","kw":"关于商业银⾏逾期贷款利息收⼊确认及应税的问题请教","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0318","q":"关于⾮经中的⾦融企业定义问题","a":"个⼈理解：新版⾮经常性损益的解释性公告中的⾮经常性损益列举项⽬，有两处提到“⾮⾦融企业”： （三）除同公司正常经营业务相关的有效套期保值业务外,⾮⾦融企业持有⾦融资产和⾦融负债产⽣的公允价值变动损益以及处置⾦融资产和⾦融负债产⽣的损益； （四）计⼊当期损益的对⾮⾦融企业收取的资⾦占⽤费； ⽬前的融资租赁、商业保理等类⾦融业务，从事此类经营活动的企业，正常情况下取得的应收租赁款、应收保理款等都是以摊余成本计量的⾦融资产，较少持有以公允价值计量且其变动计⼊损益的⾦融资产；同时这些企业也不可以吸收存款。因此，这类类⾦融企业取得上述（三）中的收益，应认定为⾮经常性损益；但取得（四）中的收益， 如果是来源于应收租赁款或者保理融资款，则不属于⾮经常性损益。个人理解，供参考。","cat":"金融工具","kw":"公允价值,租赁,关于⾮经中的⾦融企业定义问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第37号——金融工具列报"},{"id":"CY1782","q":"关于购买⽅为公司参股主体时，以股权转让⽅式出售电站资产确认营业收…","a":"虽有《案例解析2024》中案例6-31，但对于此类情况下以出售项⽬公司股权⽅式确认营业收⼊仍需很谨慎。从主帖所述情况看，将项⽬公司股权出售给合伙企业，并聘请本企业继续提供运维服务，很可能与此处所述的业务模式不同，⽽更多地是作为⼀种融资⼿段。其出售交易的对⼿（合伙企业）属于特殊⽬的实体，因此即使可以满⾜终⽌确认条件（此处要⾮常谨慎判断），也不属于收⼊准则所界定的“⽇常活动”，不应确认收⼊，最多只能确认资产处置损益。 这个问题不要过多纠缠于股权⽐例，⽽是要从交易的商业实质，以及是否属于⽇常活动来看。个人理解，供参考。","cat":"实务综合","kw":"请教陈版主,关于购买⽅为公司参股主体时,以股权转让⽅式出售电站资产确认营业收…","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0647","q":"有FVOCI的外币报表折算中的公允价值变动是否有勾稽关系","a":"会有这个问题。两者差额通过“其他综合收益——外币报表折算差额”来平衡。个人理解，供参考。","cat":"金融工具","kw":"公允价值,请教陈版有FVOCI的外币报表折算中的公允价值变动是否有勾稽关系","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第37号——金融工具列报"},{"id":"CY0820","q":"同⼀控制下⽆偿划转划出⽅单体报表处理适⽤长投准则还是权益性交易？","a":"同⼀控制下⽆偿划转划出⽅单体报表通常作为权益性交易处理。因为处置价格（零）远低于标的股权的公允价值， 该交易不具有商业实质，完全是基于划⼊划出双⽅之间的特殊关系才得以发⽣，是单⽅向的资源转移，故构成权益性交易。 上一页 陈版主（陈奕蔚老师）答疑历史文章（2024年08月） 下一页 陈版主（陈奕蔚老师）答疑历史文章（2024年10月） 粤ICP备18107660号 粤公网安备44060602000887号 关于网站 Copyright © 2021-2026 会计便利店 hjyweb.cn 【个人理解，供参考。","cat":"实务综合","kw":"公允价值,同⼀控制下⽆偿划转划出⽅单体报表处理适⽤长投准则还是权益性交易","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1676","q":"关于计提预期信⽤损失的问题","a":"事务所的观点更为合理，即基于预期信⽤损失模型，虽然尚未逾期，但仍应确认预期信⽤损失。 在没有历史数据、同⾏业数据可供参考的情况下，建议向谈判和审批该笔交易的业务⼈员和管理层了解对该笔业务中定价和结算条款在谈判中的主要考虑，以及对债务⼈信⽤⻛险的了解和评估情况（包括对⽅提供担保的情况），据此考虑坏账计提问题。 另⼀种考虑思路是：如果对未来5年、10年的收款情况⽆⾜够把握，则现在仅就⾸期收取的40%款项确认收⼊，但全部成本均需结转到营业成本，后续按照实际收回的款项确认收⼊（此时⽆对应成本）。个人理解，供参考。","cat":"实务综合","kw":"请教陈版,关于计提预期信⽤损失的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0819","q":"⽆偿划转的账务处理","a":"母公司⽆偿划转资产或股权给⼦公司，母公司个别报表借⽅是确认长投。其原理就是如你所述的，“该交易不是甲 公司与其⾃⾝的更上层母公司之间的交易，不能调整甲⾃⾝的资本公积。或母公司甲所控制的资源没有发⽣变化等理由”。 《规范“三去⼀降⼀补”有关业务的会计处理规定》（财会[2016]17号）第⼀条所规范的场景是“按照国有资产监管部门(以下简称国资监管部门)有关规定，对所属的⼦公司的股权进⾏集团之间的⽆偿划拨”，其关键点是“集团之间的 ⽆偿划拨”，因此并不适⽤于母公司划给⼦公司的交易。个人理解，供参考。","cat":"实务综合","kw":"⽆偿划转的账务处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0002","q":"合同核算","a":"该项⽬类似于BOT或者PPP，即A委托B建造空调及新风系统，并提供运维服务。假设该系统建成后的使⽤寿命远 ⼤于10年，则： A公司应将合同约定的每年40万元服务费采⽤系统、合理的⽅式分解为两部分：（1）每年的运维服务费；（2）剩余部分为设备的回购款。拆分的要求是：（1）部分应可涵盖B公司每年的付现运维成本，并可使其获得合理的利 润；（2）部分采⽤适当的利率折现后，折现值应基本等于所购建的空调及新风系统的公允价值。 在此基础上，A公司应按（2）部分的折现值确认⼀项固定资产，对应贷记长期应付款。后续每年⽀付款项时，将 相当于（2）的部分抵减长期应付款；将相当于（1）的部分确认为各该年度的成本费⽤。对该项固定资产，在其⾃ ⾝可使⽤年限内计提折旧计⼊相关成本费⽤；同时对长期应付款按实际利率法确认利息⽀出并增加负债的账⾯价值。个人理解，供参考。","cat":"收入准则","kw":"公允价值,固定资产,折旧,合同核算","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0003","q":"如何判断合同违约赔偿合同变更折扣？","a":"供应商愿意对剩余设备给予折扣的原因是因为其在交付过程中发⽣延迟，构成违约⾏为，因此事实上属于违约补偿。但其形式上体现为对剩余产品的价格给予折扣。对此问题的处理建议：个人理解，供参考。","cat":"收入准则","kw":"请教陈版,如何判断合同违约赔偿合同变更折扣","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0828","q":"权益法长投前期未实现内部交易损益合并报表会计处理","a":"对此问题可参考《监管规则适⽤指引——会计类第4号》之“4-5 权益法下顺流交易产⽣的未实现内部交易损益以处置或视同处置股权⽅式实现时的会计处理”。 原⽂： 权益法下，投资⽅计算确认应享有或分担被投资单位的净损益时，对于与被投资单位之间发⽣的未实现内部交易损益按照应享有的⽐例计算归属于投资⽅的部分，投资⽅在编制合并财务报表时，应当对顺流交易有关未实现的收 ⼊和成本或资产处置损益等中归属于投资⽅的部分予以抵销（投出或出售的资产构成业务的除外），在此基础上确认投资收益。 监管实践发现，部分公司对于与原联营企业、合营企业之间顺流交易产⽣的未实现内部交易损益以处置或视同处置联营企业、合营企业股权的⽅式得以实现时的会计处理，存在理解上的偏差和分歧。现就该事项的意见如下： 对于投资⽅与联营企业、合营企业之间发⽣顺流交易产⽣的未实现内部交易损益，因处置或视同处置联营企业、合营企业股权导致未实现内部交易损益得以实现，投资⽅应作为股权处置损益计⼊当期投资收益，前期在投资⽅合并财务报表中予以抵销的未实现内部交易相关收⼊、成本或资产处置损益等不予恢复。 对此解读如下： 当投资⽅与联营企业、合营企业发⽣顺流交易形成未实现内部交易损益，该内部交易损益在后续期间因对外出售实现或者因投资⽅对原联营企业、合营企业的投资终⽌权益法核算⽽视同实现时，应根据实现⽅式的不同，对原本抵销的内部交易损益进⾏相应的会计处理： 如形成联营企业、合营企业的存货或资产的顺流交易标的对外出售，则投资⽅合并财务报表层⾯应对原已抵销的收 ⼊、成本或资产处置损益进⾏恢复； 如投资⽅通过处置股权或视同处置股权（如投资⽅追加投资等原因使得原联营企业变为⼦公司）的⽅式实现或视同实现时，投资⽅合并财务报表层⾯应作为股权处置损益计⼊当期投资收益，原本已抵销的未实现的收⼊和成本或资产处置损益不应予以恢复。 结合具体案例分析如下： 【例3】权益法下顺流交易产⽣的未实现内部交易损益以处置或视同处置股权⽅式实现时的会计处理背景： A公司持有B公司20%有表决权股份，能够对B公司的财务和⽣产经营决策施加重⼤影响。2×21年12⽉31⽇，A公司对B公司长期股权投资账⾯价值为4,000万元。 2×22年，A公司将其账⾯价值为600万元的商品以1,000万元的价格出售给B公司。⾄2×22年资产负债表⽇，该批产品尚有50%未对外部第三⽅出售。假定A公司取得该项投资时，B公司各项可辨认资产、负债的公允价值与其账⾯价值相同，两者在以前期间未发⽣过内部交易。B公司2×22年净利润为2,000万元。 2×23年，可能出现以下情形（这些情形互斥）： 情形⼀，2×23年，A公司继续持有B公司20%有表决权股份，B公司2×23年净利润为2,000万元（含将上⼀年⾃A公司购买的商品的剩余50%对外部第三⽅出售形成的利润），两者在2×23年未发⽣内部交易。 情形⼆，2×23年1⽉1⽇，A公司与另⼀⾮关联公司签订协议，以6,000万元的价格出售所持B公司20%股权，当⽇收取全部股权转让价款并办理完成相关⼿续。 情形三，2×23年1⽉1⽇，A公司与另⼀⾮关联公司签订协议，以12,000万元的价格收购其所持B公司40%股权，当 ⽇A公司⽀付股权收购价款并办理完成相关⼿续，可以对B公司形成控制。2×23年1⽉1⽇（购买⽇或转换⽇），原持有的B公司20%股权的公允价值为6,000万元，B公司可辨认净资产公允价值为25,000万元。 假定不考虑所得税因素且A公司拥有若⼲家⼦公司，任⼀情形下均需要编制合并财务报表。问题： A公司2×22年度在编制个别财务报表及合并财务报表时应分别如何对持有B公司股权进⾏后续计量？ A公司2×23年度在编制个别财务报表及合并财务报表时，在不同情形下应分别进⾏会计处理？ 分析及处理： A公司2×22年的会计处理 ①个别财务报表层⾯ A公司在该项交易中实现利润400万元，其中的40万元（400×50%×20%）是针对本企业持有的对联营企业的权益份 额享有的未实现损益，在采⽤权益法计算确认投资损益时应予抵销，即A公司应当进⾏的账务处理为： 借：长期股权投资——损益调整 3,600,000 贷：投资收益 3,600,000[（20,000,000－4,000,000×50%）×20% ] ②合并财务报表层⾯ A公司在合并财务报表中对该未实现内部交易损益应在个别财务报表已确认投资损益的基础上进⾏以下调整： 借：营业收⼊ 1,000,000（10,000,000×50%×20%） 贷：营业成本 600,000（6,000,000×50%×20%） 投资收益 400,000 A公司2×23年的会计处理情形⼀： ①个别财务报表层⾯ 由于B公司在2×23年将该批商品剩余的50%全部对外出售，A公司在该项交易中对本企业持有的对联营企业的权益份额享有的前期未实现损益在本期得以实现，在采⽤权益法计算确认投资损益时应予以调整，A公司应当进⾏的账务处理为： 借：长期股权投资——损益调整 4,400,000 贷：投资收益 4,400,000[（20,000,000+4,000,000×50%）×20% ] ②合并财务报表层⾯ 前期顺流交易的未实现损益在本期得以实现，A公司在合并财务报表中应确认有关收⼊并结转成本，A公司应在个别财务报表已确认投资损益的基础上进⾏以下调整： 借：投资收益 400,000 营业成本 600,000（6,000,000×50%×20%） 贷：营业收⼊ 1,000,000（10,000,000×50%×20%） 情形⼀下，随着联营企业将内部交易的存货对外部第三⽅出售，原已抵销的内部交易损益得以实现，A公司作为投资⽅于合并财务报表中可以恢复确认原已抵销的未实现的收⼊和成本。 情形⼆： ①个别财务报表层⾯ A公司持有B公司的长期股权投资于2×22年12⽉31⽇的账⾯价值为4,360万元（2×21年12⽉31⽇账⾯价值4,000万元 +2×22年度损益调整增加360万元），A公司应将股权处置价款与账⾯价值的差额计⼊当期损益。即，2×23年1⽉1 ⽇，A公司应作出如下处理： 借：货币资⾦ 60,000,000 贷：长期股权投资 43,600,000 投资收益 16,400,000 同时，原股权投资因采⽤权益法核算⽽确认的其他综合收益（如有），应当在终⽌采⽤权益法核算时采⽤与被投资单位直接处置相关资产或负债相同的基础进⾏会计处理；原股权投资因被投资⽅除净损益、其他综合收益和利润分配以外的其他权益变动⽽确认的所有者权益（资本公积——其他资本公积）（如有），应当在处置该项投资时相应转⼊处置期间的当期损益。 ②合并财务报表层⾯ 由于处置前⼀刻，A合并财务报表层⾯对B公司长期股权投资的账⾯价值也是4,360万元，与个别财务报表层⾯⼀致，因此，合并财务报表层⾯⽆需作出任何调整。 情形⼆下，投资⽅通过处置持有原联营企业股权的⽅式实现原顺流交易未实现内部交易损益，投资⽅合并财务报表层⾯应作为股权处置损益计⼊当期投资收益，原本已抵销的未实现的收⼊和成本或资产处置损益不应予以恢复。这 ⼀处理原则，与母公司向⼦公司销售商品所产⽣的营业收⼊和营业成本在合并财务报表中抵销，后续处置⼦公司丧失控制权，并不会恢复以前年度抵销的营业收⼊和营业成本，⽽是作为股权处置损益转⼊当期投资收益的处理原则是⼀致的。 情形三： ①个别财务报表层⾯ 根据《企业会计准则第2号——长期股权投资》第⼗四条的规定“投资⽅因追加投资等原因能够对⾮同⼀控制下的被投资单位实施控制的，在编制个别财务报表时，应当按照原持有的股权投资账⾯价值加上新增投资成本之和，作为改按成本法核算的初始投资成本”，2×23年1⽉1⽇，A公司应作出如下处理： 借：长期股权投资——成本法 163,600,000 贷：货币资⾦ 120,000,000 长期股权投资——权益法 43,600,000 股权投资因采⽤权益法核算⽽确认的其他综合收益和因被投资⽅除净损益、其他综合收益和利润分配以外的其他权益变动⽽确认的所有者权益（资本公积——其他资本公积）暂不处理。 ②合并财务报表层⾯ 根据《企业会计准则第33号——合并财务报表》第四⼗⼋条的规定“企业因追加投资等原因能够对⾮同⼀控制下的 被投资⽅实施控制的，在合并财务报表中，对于购买⽇之前持有的被购买⽅的股权，应当按照该股权在购买⽇的公允价值进⾏重新计量，公允价值与其账⾯价值的差额计⼊当期投资收益”，A公司在合并财务报表层⾯应视同以公 允价值6,000万元处置原持有B公司的20%股权，并⽴即以该处置对价6,000万元+新增对价12,000万元，合计18,000 万元作为合并对价取得B公司60%股权。2×23年1⽉1⽇，A公司合并财务报表层⾯的处理结果为： 同时，原股权投资因采⽤权益法核算⽽确认的其他综合收益（如有），应当在终⽌采⽤权益法核算时采⽤与被投资单位直接处置相关资产或负债相同的基础进⾏会计处理；原股权投资因被投资⽅除净损益、其他综合收益和利润分配以外的其他权益变动⽽确认的所有者权益（资本公积——其他资本公积）（如有），应当在处置该项投资时相应转⼊处置期间的当期损益。 借：B公司可辨认净资产 250,000,000 商誉 30,000,000（180,000,000－250,000,000×60%） 贷：长期股权投资——成本法 180,000,000 少数股东权益 100,000,000（250,000,000×40%） 此时，在视同以公允价值处置原持有的B公司20%股权时，原持有股权在购买⽇会产⽣公允价值重估损益，与假定 实际处置（如情形⼆）的会计处理⼀致，由于该“公允价值”并未考虑此前是否存在内部交易未实现损益的因素，因此合并财务报表层⾯原先的顺流交易形成的未实现内部交易损益已经通过对股权投资在转换时计量基础调整为公允价值得以实现。 同样，投资⽅通过视同处置持有原联营企业股权的⽅式实现原顺流交易未实现内部交易损益，投资⽅合并财务报表层⾯应作为股权处置损益计⼊当期投资收益，原本已抵销的未实现的收⼊和成本或资产处置损益不应予以恢复。 需要提醒的是，情形⼆或情形三下，如果投资⽅与联营企业、合营企业的内部交易并⾮顺流交易，⽽是逆流交易， 即：相关存货为联营企业B公司销售给A公司时，由于A公司因处置或视同处置股权终⽌采⽤权益法核算对B公司股权时，原逆流交易内部未实现损益体现在A公司合并财务报表中的“存货”（在⼀些购售资产业务中体现为“固定资 产”等）项⽬中，标的“存货”在交易后依然在A公司合并财务报表中，并不涉及对存货价值重估的过程，因此并不 影响这些“存货”依然在A公司合并财务报表中以历史成本计量这⼀原则，相应的会计处理与顺流交易不同。即：在投资⽅因处置或视同处置股权终⽌对原联营企业、合营企业采⽤权益法核算时，原权益法下逆流交易形成的内部未实现损益并未实现，不应在终⽌权益法⽇对该等资产的计量进⾏特殊调整。 此前，证监会在《上市公司2022年年度财务报告会计监管报告》之“⼆、（七）合并财务报表范围变化时原未实现 内部交易损益的会计处理错误”中指出了两种长期股权投资转换的情形，⼀种是成本法转为权益法，⼀种是权益法 转为成本法，在这两种情形下，合并财务报表层⾯，⽆论是丧失控制权⽇后持有的将采⽤权益法核算的剩余股权投资，还是合并⽇前已经持有的采⽤权益法核算的股权投资，都需要按照公允价值进⾏重新计量，会计处理上应视同原未实现内部交易损益已经全部实现，上市公司投资⽅⽆需继续抵销。需要注意的是，该表述中虽未限定原未实现内部交易损益是产⽣于逆流交易还是顺流交易，但是，视同原未实现内部交易损益已经全部实现的原因是在该两种转换情形下，都涉及到原有股权投资公允价值重估。只有在顺流交易下，内部交易标的资产包含在被投资⽅财务报表中，随着原有股权公允价值重估得以实现原未实现内部交易损益；在逆流交易下，内部交易标的资产包含在投资 ⽅报表中，对原有股权公允价值重估并不涉及对内部交易标的资产的价值重估，因此，原未实现内部交易损益并未实现，投资⽅编制合并财务报表时仍需继续抵销，直⾄其对外部第三⽅出售或被消耗。对此，项⽬组可参考《中审众环研究•实务案例卷(2020) 》中“问题3-2-149（关于处置⼦公司涉及的内部交易未实现损益的处理）”。个人理解，供参考。","cat":"收入准则","kw":"控制权,公允价值,商誉,合并,少数股东,所得税,权益法,成本法,权益法长投前期未实现内部交易损益合并报表会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入、《企业会计准则第2号——长期股权投资》、《企业会计准则第33号——合并财务报表》"},{"id":"CY0816","q":"房地产企业某楼盘投资审计，完⼯后的利息费⽤是否算投资成本？","a":"这⾥⾸先要明确“投资成本审计”所依据的“标准”即报表编制原则是什么？如果不是企业会计准则，则有⽆确定、公认的依据？如果对此不清楚的，建议先与委托⽅确认并达成⼀致意见。 参考：《中国注册会计师鉴证业务基本准则（2022年1⽉5⽇修订）》： 第六章 标准 第⼆⼗四条 标准是指⽤于评价或计量鉴证对象的基准，当涉及列报时，还包括列报的基准。标准可以是正式的规定，如编制财务报表所使⽤的会计准则和相关会计制度；也可以是某些⾮正式的规定，如单位内部制定的⾏为准则或确定的绩效⽔平。 第⼆⼗五条 注册会计师在运⽤职业判断对鉴证对象作出合理⼀致的评价或计量时，需要有适当的标准。适当的标准应当具备下列所有特征： （⼀）相关性：相关的标准有助于得出结论，便于预期使⽤者作出决策； （⼆）完整性：完整的标准不应忽略业务环境中可能影响得出结论的相关因素，当涉及列报时，还包括列报的基准； （三）可靠性：可靠的标准能够使能⼒相近的注册会计师在相似的业务环境中，对鉴证对象作出合理⼀致的评价或计量； （四）中⽴性：中⽴的标准有助于得出⽆偏向的结论； （五）可理解性：可理解的标准有助于得出清晰、易于理解、不会产⽣重⼤歧义的结论。 注册会计师基于⾃⾝的预期、判断和个⼈经验对鉴证对象进⾏的评价和计量，不构成适当的标准。 第⼆⼗六条 注册会计师应当考虑运⽤于具体业务的标准是否具备本准则第⼆⼗五条所述的特征，以评价该标准对此项业务的适⽤性。在具体鉴证业务中，注册会计师评价标准各项特征的相对重要程度，需要运⽤职业判断。 标准可能是由法律法规规定的，或由政府主管部门或国家认可的专业团体依照公开、适当的程序发布的，也可能是专门制定的。采⽤标准的类型不同，注册会计师为评价该标准对于具体鉴证业务的适⽤性所需执⾏的⼯作也不同。 第⼆⼗七条 标准应当能够为预期使⽤者获取，以使预期使⽤者了解鉴证对象的评价或计量过程。标准可以通过下列⽅式供预期使⽤者获取： （⼀）公开发布； （⼆）在陈述鉴证对象信息时以明确的⽅式表述； （三）在鉴证报告中以明确的⽅式表述； （四）常识理解，如计量时间的标准是⼩时或分钟。 如果确定的标准仅能为特定的预期使⽤者获取，或仅与特定⽬的相关，鉴证报告的使⽤也应限于这些特定的预期使 ⽤者或特定⽬的。 该准则应⽤指南中的相关内容： 第六章 标准 本准则第六章（第⼆⼗四条⾄第⼆⼗七条），主要说明标准的定义、类型，适当的标准应当具备的特征，以及预期使⽤者获取标准的⽅式。 ⼀、标准的定义 本准则第⼆⼗四条第⼀款指出，标准是指⽤于评价或计量鉴证对象的基准，当涉及列报时，还包括列报的基准。在本准则和相关准则中，列报包括披露。 标准是鉴证业务中不可或缺的⼀项要素。运⽤职业判断对鉴证对象作出评价或计量，离不开适当的标准。如果没有适当的标准提供指引，任何个⼈的解释甚⾄误解都可能对结论产⽣影响，这样⼀来，结论必然缺乏可信性。也就是说，标准是对所要发表意见的鉴证对象进⾏”度量”的⼀把”尺⼦”，责任⽅和注册会计师可以根据这把”尺⼦”对鉴证对象进⾏”度量”。 需要指出的是，对同⼀鉴证对象进⾏评价或计量并不⼀定要选择同⼀个标准。例如，要评价消费者满意度这⼀鉴证对象，某些责任⽅或注册会计师可能会以消费者投诉的次数作为衡量标准；⽽另外的⼀些责任⽅或注册会计师可能会选择消费者在初始购买后的三个⽉内重复购买的数量作为衡量的标准。 ⼆、标准的类型 本准则第⼆⼗四条第⼆款指出，标准可以是正式的规定，如编制财务报表所使⽤的会计准则和相关会计制度；也可以是某些⾮正式的规定，如单位内部制定的⾏为准则或确定的绩效⽔平。 正式的规定通常是⼀些”既定的”标准，是由法律法规规定的，或是由政府主管部门或国家认可的专业团体依照公 开、适当的程序发布的。例如，编制财务报表时，其标准是权威机构发布的会计准则和相关会计制度；编制内部控制报告时，标准可能是已确⽴的内部控制规范或指引；编制遵循性报告时，标准可能是适⽤的法律、法规或者合 同。 ⾮正式的规定通常是⼀些”专门制定的”标准，是针对具体的业务项⽬”量⾝定做”的，包括企业内部制定的⾏为准则、确定的绩效⽔平或商定的⾏为要求，例如，某专门委员会在⼀年内开会的次数等。 标准的类型不同，注册会计师在评价标准是否适合于具体的鉴证业务时，所关注的重点也不同。三、适当的标准应当具备的特征 本准则第⼆⼗五条第⼀款规定，注册会计师在运⽤职业判断对鉴证对象作出合理⼀致的评价或计量时，需要有适当的标准。标准是否适当、是否适⽤于具体的鉴证业务同样离不开注册会计师的职业判断。 如果使⽤的标准不适当或不适⽤于具体业务，发表的鉴证结论便毫⽆意义。同样，如果没有适当的标准所提供的参考框架，任何结论都将是开放性的，⼈们可以根据⾃⼰的意愿做出解释，或者会被误解。适当的标准应当与特定业务及其环境相关，因此，同⼀个业务对象可能存在不同的业务标准。例如，某责任⽅可能会选择顾客投诉的处理数量作为顾客满意度这⼀对象事项的评价标准；⽽另⼀责任⽅则可能选择顾客在初次购买之后的三个⽉内重复购买的次数作为顾客满意度的评价标准。第⼆⼗五条第⼆款规定，适当的标准应当具备下列所有特征： 相关性：相关的标准有助于得出结论，便于预期使⽤者作出决策； 完整性：完整的标准不应忽略业务环境中可能影响得出结论的相关因素，当涉及列报时，还包括列报的基准； 可靠性：可靠的标准能够使能⼒相近的注册会计师在相似的业务环境中，对鉴证对象作出合理⼀致的评价或 计量； 中⽴性：中⽴的标准有助于得出⽆偏向的结论； 可理解性：可理解的标准有助于得出清晰、易于理解、不会产⽣重⼤歧义的结论。 本准则第⼆⼗五条第三款规定，注册会计师基于⾃⾝的预期、判断和个⼈经验对鉴证对象进⾏的评价和计量，不构成适当的标准。 四、评价标准的适当性 本准则第⼆⼗六条第⼀款规定，注册会计师应当考虑运⽤于具体业务的标准是否具备本准则第⼆⼗五条所述的特 征，以评价该标准对此项业务的适⽤性。在具体鉴证业务中，注册会计师在评价标准各项特征的相对重要程度时， 需要运⽤职业判断。 第⼆⼗六条第⼆款指出，标准可能是由法律法规规定的，或由政府主管部门或国家认可的专业团体依照公开、适当的程序发布的，也可能是专门制定的。采⽤标准的类型不同，注册会计师为评价该标准对于具体鉴证业务的适⽤性所需执⾏的⼯作也不同。 对于公开发布的标准，注册会计师通常不需要对标准的”适当性”进⾏评价，⽽只需评价该标准对具体业务的”适⽤ 性”。例如，在我国，会计标准由国家统⼀制定并强制执⾏。注册会计师⽆需评价会计标准是否适当，只需要判断 责任⽅采⽤的标准是否适⽤于被鉴证单位即可（如⼩企业可以采⽤《⼩企业会计制度》）。对于专门制定的标准， 注册会计师⾸先要对这些标准本⾝的”适当性”加以评价，否则，注册会计师连⾃⼰所⽤的”尺⼦”是否适当都⽆法判断，又如何⽤这把”尺⼦”去”度量”要发表意见的鉴证对象。 五、预期使⽤者获取标准的⽅式 本准则第⼆⼗七条第⼀款规定，标准应当能够为预期使⽤者获取，以使预期使⽤者了解鉴证对象的评价或计量过程。标准可以通过下列⽅式供预期使⽤者获取： 公开发布； 在陈述鉴证对象信息时以明确的⽅式表述； 在鉴证报告中以明确的⽅式表述； 常识理解，如计量时间的标准是⼩时或分钟。 第⼆⼗七条第⼆款规定，如果确定的标准仅能为特定的预期使⽤者获取，或仅与特定⽬的相关，如⾏业协会发布标准可能仅能为本⾏业内部的预期使⽤者获取，合同条款仅能为合同双⽅获取，且仅适⽤于合同约定事项，在这种情况下，鉴证报告的使⽤也应限于这些特定的预期使⽤者或特定⽬的。个人理解，供参考。","cat":"收入准则","kw":"房地产企业某楼盘投资审计,完⼯后的利息费⽤是否算投资成本","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY1458","q":"合同负债的账务处理","a":"https://bbs.esnai.com/forum.php?mod=viewthread tid=5492822 提问⼈：13916077517 时间：2025-06-13 17:38:25 《企业会计准则第14号——收⼊》应⽤指南（2024）中：“企业在向客户转让商品之前，客户已经⽀付了合同对价或企业已经取得了⽆条件收取合同对价权利的，企业应当在客户实际⽀付款 项与到期应⽀付款项孰早时点，按照该已收或应收的⾦额（不包含增值税部分），借记“银⾏存款”、“应收账款”、“应收票据”等科⽬，贷记本科⽬；企业向客户转让相关商品时，借记本科⽬， 贷记“主营业务收⼊”、“其他业务收⼊”等科⽬。涉及增值税的，还应进⾏相应的处理。”在什么情况下，会出现企业在转让商品前就取得了⽆条件收款权的情况的？⽐如在实务中，企业和客户在销售合同中约定收款节点，合同签订⽣效30天内⽀付30%，设备发货后⽀付60%，最终验收之后⽀付10%。除了最终验收之外，存在企业已取得⽆条件收款权的时点吗？若企业在终验前始终没有⽆条件收款权，那什么情况下会出现需要借记“应收账款”，贷记“合同负债”的情况？ 回答⼈：chenyiwei 实务中同步确认应收账款和合同负债的情况较为少⻅（为简化处理，此处不考虑增值税）。这种情况涉及与或有事项准则规范的“待执⾏合同”的区分。根据《企业会计准则第13号——或有事项》规定，待执⾏合同不应确认资产和负债，除⾮已构成亏损合同。其中，待执⾏合同是指合同各⽅尚未履⾏任何合同义务，或部分地履⾏了同等义务的合同。因此，在合同开始履⾏前的预收款尚未收到之前，是不应同时确认应收账款和合同负债的。 除考虑“待执⾏合同”的概念之外，《企业会计准则第14号——收⼊（2017年修订）》第四⼗⼀条明确：合同负债，是指企业已收或应收客户对价⽽应向客户转让商品的义务。如企业在转让承诺的商品之前已收取的款项。《〈企业会计准则第14号——收⼊〉应⽤指南（2018）》中对“合同负债”的核算范围界定为“本科⽬核算企业已收或应收客户对价⽽应向客户转让商品的义务”，并在主要账务处理中明确“企业在向客户转让商品之前，客户已经⽀付了合同对价或企业已经取得了⽆条件收取合同对价权利的，企业应当在客户实际⽀付款项与到期应⽀付款项孰早时点，按照该已收或应收的⾦额，借记“银⾏存款”“应收账款”“应收票据”等科⽬，贷记本科⽬……”。对于收⼊准则和应⽤指南中合同负债包含“应收客户对价”情形，《国际财务报告准则第15号——客户合同收⼊》结论基础部分的第BC325段对此明确有解释：在其他情况下，主体可能在履⾏履约义务之前便拥有获得对价的⽆条件权利。例如，主体可能订⽴⼀份不可撤销的合同，要求客户在主体提供商品或服务前的⼀个⽉⽀付相关对价。在这种情况下，主体在⽀付到期⽇拥有获得对价的⽆条件权利。即，只有基于“不可撤销的合同”，才应在企业在向客户转让商品前已有⽆条件的收款权但暂未收到时借记“应收款项”并同时贷记“合同负债”。 实务中，某些销售合同的标的商品是标准化产品，合同中可能并未明确约定违约条款，或商业惯例是客户⽅实际⽀付预付款后，供应⽅才会做出履⾏该合同业务相关安排。若客户⽅未按约定 ⽀付预付款，通常不会给供应⽅带来额外损失，合同约定或商业惯例表明客户⽅也⽆需向供应⽅⽀付额外的重⼤赔偿。这种情况下，在客户⽀付预付款之前，该合同是可撤销的合同，因此， 企业不应在客户未按合同约定⽀付预付款时借记“应收账款”并贷记“合同负债”。 但某些合同情况则不同。例如，某⼀份建筑⼯程总承包合同，在承包⼈通过招投标程序中标并与发包⼈签订合同后，该合同通常是不可撤销的。这种情况下，承包⼈可以在合同约定的发包⼈应付但未付预付款时，将⽆条件收取预付款的权利确认为⼀项“应收款项”，如果确认，则贷⽅只能计⼊“合同负债”和待转销项税。就本案例⽽⾔，我们理解附件合同属于这⼀情形的可能性较 ⼤，因此被审计单位在未履⾏履约义务时，就合同约定的预付款在未收到时同时确认“应收款项”和“合同负债”，我们认为符合准则要求。 但是该应收款项和合同负债⼀旦确认，由于应收款项属于⾦融资产，不属于收⼊准则规范的范围，因此不得将应收款项与合同负债抵销列报。证监会在《2020年上市公司年报会计监管报告》中也明确指出了抵销应收账款与合同负债属于错误。个人理解，供参考。","cat":"收入准则","kw":"履约义务,合同负债的账务处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入、《企业会计准则第14号——收⼊》、《企业会计准则第13号——或有事项》、《企业会计准则第14号——收⼊（2017年修订）》"},{"id":"CY0004","q":"⾮经损益认定","a":"对于政府补助界定为⾮经常性损益的情况，解释性公告1号的列举项⽬明确： （⼆）计⼊当期损益的政府补助，但与公司正常经营业务密切相关，符合国家政策规定、按照确定的标准享有、对公司损益产⽣持续影响的政府补助除外； 即，政府补助如不认定为⾮经常性损益的，则需同时满⾜此处所列的四项条件：与公司正常经营业务密切相关；符合国家政策规定；按照确定的标准享有；对公司损益产⽣持续影响。 对于其中可界定为经常性损益的“与公司正常经营业务密切相关，符合国家政策规定、按照确定的标准享有、对公司损益产⽣持续影响的政府补助”，在实务执⾏的过程则仍会有判断上的分歧。 对于此处“可不认定为⾮经常性损益的政府补助”应同时满⾜的四项条件的实务把握，我们建议： ①对于“符合国家政策规定”，在IPO项⽬中应由律师发表明确意见，我们应对此执⾏利⽤专家⼯作程序，必要时与提供该项补助的政府部门访谈。 ②“按照确定的标准享有”⼀般是指：该项补助所依据的应当是当地财政部门正式发布并按照《政府信息公开条例》的规定予以主动公开的财政扶持项⽬及其财政资⾦管理办法，且该管理办法应当是普惠性的（不论所有制和⾪属关系，任何符合规定条件的企业均可申请），⽽不是专门针对特定企业制定的，例如针对特定企业的“⼀事⼀议”性质的扶持不满⾜该条件。 ③“对公司损益产⽣持续影响”的标准，建议⾄少连续3年以上（含3年），即：与收益相关的政府补助⾄少保证可以连续取得3年以上；与资产相关的政府补助所形成的递延收益的摊销年限⾄少在3年以上。 ④如果因当地财⼒问题，⽆法保证按期⾜额拨付，只能按收付实现制原则确认收益的，则视为⽆法保证影响的持续性，应作为⾮经常性损益。 ⑤该项政府补助所计⼊的利润表项⽬不能是“营业外收⼊”，应当是“其他收益”或者冲减“营业利润”中的成本费⽤项 ⽬，否则⽆法证明其来源于“⽇常活动”。 上述原则同时适⽤于采⽤总额法和净额法核算的政府补助。个人理解，供参考。","cat":"收入准则","kw":"递延,摊销,⾮经损益认定","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY1098","q":"资产达到预定可使⽤状态后，按在“在建⼯程”科⽬中归集的实际成本（包括融资租赁公司代付的部分和本企业⾃⾏承担的部分）转⼊固定资产，正常计提折旧。","a":"⽬前专业的融资租赁或者⾦融租赁公司提供的租赁服务都是偏重于融资的，都是按照融资⾏为处理更多。融资租赁(直租)承租⼈适⽤租赁准则的前提是出租⼈曾经取得对租赁资产的控制权，租赁资产控制权由出租⼈直接转承租⼈ 提问⼈：流⾦岁⽉@ 时间：2025-03-17 18:49:35 补充请教，如果按以资产为抵押的⽅式融资处理，不按租赁准则确认使⽤权资产或负债，是否可以理解这样处理，税会上就不存在差异了，不需要确认递延所得税资产和负债？ 回答⼈：chenyiwei 基本可以这样理解。 提问⼈：reversal 时间：2025-03-20 13:14:54 融资租赁(直租)承租⼈适⽤租赁准则的前提是出租⼈曾经取得对租赁资产的控制权，租赁资产控制权由出租⼈直接转承租⼈ 请问陈版该如何实务中该如何认定出租⼈获取过租赁资产的控制权？我个⼈理解是只有融资租赁公司或⾦融租赁公司的经租业务（法律或业务⻆度认定，⾮会计⻆度）才能适⽤，融资租赁业务的话⼤部分都是承租⼈选取标的偏重融资的业务，即使是与⽣产⼚商合作的融资租赁业务，租赁资产选取也不在于租赁公司，很难认定为出租⼈具备租赁资产的控制权？ 回 答 ⼈ ：chenyiwei 可以这样理解。 提问⼈：yuanyang6 时间：2025-04-12 14:56:04 请教陈版主，直租情况下，假设设备的含税⾦额为113万，融资租赁公司直接⽀付供应商113万，供应商给融资租赁公司开具13%的发票，承租⼈此时没有取得进项税发票，假设三年，融资租赁利息为10万，后续根据承租⼈每期⽀付利息时开取得本⾦的进项税发票及利息的发票， 简化处理， ⼊账时为 借：固定资产 100万 应交税费-暂估进项税 13万 未实现融资费⽤ 10万 贷：⻓期应付款123万 疑问：1、此表报表层⾯是否认可暂估的进项税13万元 ，报表层⾯列示为：流动资产 13万元 ⻓期应付款113万元 回答⼈：chenyiwei 在实际取得进项发票前不建议暂估进项税额，保持固定资产和⻓期应付款按不含税⾦额计量。提问⼈：tree717 时间：2025-09-15 09:46:38 陈版主，还有个问题，融资租赁保证⾦为200万元，租赁期为3年，合同条款明确约定了保证⾦不计利息，那么保证⾦应该如何进⾏会计处理？可以直接借⻓期应收款200万元，不进⾏利息的确认吗？ 回答⼈：chenyiwei 参考《中审众环研究2020》之“问题4-2-14（涉及保证⾦及⼿续费的售后租回构成融资租赁交易的会计处理）”。提问⼈：tottijojo 时间：2025-09-23 14:52:18 我们⽬前就有这类直租业务。⼀个项⽬的资⾦投⼊⼀半是融资租赁公司直租，⼀半是公司⾃⼰承担投⼊，形成项⽬资产。 ⽬前的做法也是，直接计⼊在建⼯程，待项⽬完⼯后转固定资产。按此项⽬的合同年限来计提折旧，利息费⽤按融资年限来分摊。 由于合同年限⼤于融资年限，就会导致折旧年限和利息分摊年限是不⼀致的。在实操⽅⾯，这类情况应该也是合理的吧。因为正如⽼师所讲，我们不能说同⼀个项⽬的资产分成2部分来核算， 不能说⼀半⼊使⽤权资产，⼀半⼊固定资产呀。 回答⼈：chenyiwei 可以这样理解。你的做法基本合理。 提问⼈：wx_63bd2775d431 时间：2025-12-08 11:12:24 陈⽼师需要向您请教类似问题：⺟公司公司为了融资，以下⾯物业公司a作为借款主体向融资租赁公司b进⾏借款，签署了两个合同，⼀个是销售合同（a向b销售⼀批物业资产，如摄像头 扫地机等等），⼀个租赁合同（a作为承租⼈向b租这⼀批资产），在销售⽇收款2.75亿，再根据租赁合同按季度⽀付租⾦，租⾦总额⼤概在3亿元，同时2年租赁期到期后a公司有权以2500元的价格购买这批资产。但是物业公司在销售时实际账⾯是没有这⼀批资产的，我想不论是否构成销售都不满⾜售后租回这个业务实质，因为连最⼀开始销售的标的都没在账⾯上体现过。请问如何进⾏会计处理，望解惑 回答⼈：chenyiwei 本质上就是⼀个融资安排，有⽆租赁资产只不过是有⽆抵押物的问题，不影响属于融资交易的性质判断。个人理解，供参考。","cat":"收入准则","kw":"控制权,租赁,所得税,递延,固定资产,折旧,资产达到预定可使⽤状态后,按在“在建⼯程”科⽬中归集的实际成本,包括融资租赁公司代付的部分和本企业⾃⾏承担的部分,转⼊固定资产,正常计提折旧","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0771","q":"新收⼊准则的案例中丧失控制权的建筑物是否出表？","a":"因为”⼄公司在合同开始⽇即取得了该建筑物的控制权“，即对应地，甲公司在同⽇丧失对该建筑物的控制权。因 此，甲公司应在将该建筑物交付给⼄公司时，将其账⾯价值（60万元）全部转⼊营业成本，但可确认的收⼊仅限于很可能收到且⽆需返还的部分（在当⽇的估计是5万元），⽑利是-55万元。 后续，如果⼄公司又陆续⽀付了部分房款，则甲公司在收到时确认为收⼊。此时确认的收⼊没有成本与之配⽐。提问⼈：爬爬呀 时间：2024-09-15 18:17:10 这个我知道是准则当中原本的⼀个案例，不满⾜合同价款很可能收回的条件。根据收⼊确认的五步法条件中，不满 ⾜合同的成⽴条件。所以收到的5万元确认为⾦融负债，并未确认为收⼊。 回答⼈：chenyiwei 这只是对收⼊确认的限制。但丧失控制权的资产，应在丧失控制权时终⽌确认。提问⼈：爬爬呀 时间：2024-09-19 10:26:07 想追问下:只有当满⾜新准则所规定的合同成⽴的条件时，才能在转移商品控制权的时候确认收⼊。销售⽅⾸先应 评估其与客户的合同是否满⾜《企业会计准则第14号——收⼊》（2017年修订）第五条所规定的合同成⽴的条件， 其中“（五）企业因向客户转让商品⽽有权取得的对价很可能收回”要求销售⽅评估货款的可收回性。 如果不满⾜此项条件，就确认收⼊了，是否不合理呢？ 回答⼈：chenyiwei 这不符合准则规定，属于差错。但不影响对已丧失控制权的资产的终⽌确认。提问⼈：wufaxian 时间：2024-09-26 17:42:49 陈⽼师，这样写分录对吧？ 借 银⾏存款 50000 贷 预收款 50000 房屋过户完成 借 预收款 50000 贷 收 ⼊ 50000 借 房屋销售成本 60万 贷 固定资产-房屋 60万回答⼈：chenyiwei 可以这样理解。 提问⼈：爬爬呀 时间：2024-11-25 22:15:48 【例15-1】甲房地产开发公司与⼄公司签订合同，向其销售⼀栋建筑物，合同价款为100万元。该建筑物的成本为 60万元，⼄公司在合同开始⽇即取得了该建筑物的控制权。根据合同约定，⼄公司在合同开始⽇⽀付了5%的保证 ⾦5万元，并就剩余95%的价款与甲公司签订了不附追索权的长期融资协议，如果⼄公司违约，甲公司可重新拥有该建筑物，即使收回的建筑物不能涵盖所⽋款项的总额，甲公司也不能向⼄公司索取进⼀步的赔偿。 ⼄公司计划在该建筑物内开设⼀家餐馆，并以该餐馆的收益偿还甲公司的⽋款。但是，在该建筑物所在的地区，餐饮⾏业⾯临激烈的竞争，且⼄公司缺乏餐饮⾏业的经营经验。 本例中，⼄公司计划以该餐馆产⽣的收益偿还甲公司的⽋款，除此之外并⽆其他的经济来源，⼄公司也未对该笔⽋款设定任何担保。如果⼄公司违约，则甲公司可重新拥有该建筑物，但是，根据合同约定，即使收回的建筑物不能涵盖所⽋款项的总额，甲公司也不能向⼄公司索取进⼀步的赔偿。因此，甲公司对⼄公司还款的能⼒和意图存在疑虑，认为该合同不满⾜合同价款很可能收回的条件。甲公司应当将收到的5万元确认为⼀项负债。 上述例⼦为准则中的原⽂，个⼈理解：根据准则，只有满⾜五项条件时，才在控制权转移时确认收⼊。在合同最初签订时并不满⾜第五条规定，应当在企业只有在不再负有向客户转让商品的剩余义务，且已向客户收取的对价⽆需退回时，才能将已收取的对价确认为收⼊；否则，应当将已收取的对价作为负债进⾏会计处理。 烦请陈版主再指点⼀下，⾟苦陈版主了回答⼈：chenyiwei 在这种情况下，后续每个资产负债表⽇都要重新评估条件是否已满⾜。如果已满⾜（指不确定性消除，并不要求实际收到款项），则此时就可以在商品控制权已转移给客户后确认收⼊了，⽆需等到实际收到时。个人理解，供参考。","cat":"收入准则","kw":"控制权,固定资产,新收⼊准则的案例中丧失控制权的建筑物是否出表","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入、《企业会计准则第14号——收⼊》"},{"id":"CY0219","q":"【咨询陈版主】买⽅票据贴现的性质认定及列报⽅式","a":"当涉及供应商融资安排的时候，企业应付供应商款项的性质有可能发⽣了变化。企业需结合融资安排相关条款，分析其商业实质，根据CAS 22关于⾦融负债终⽌确认等相关规定，确定原应付账款是否应终⽌确认并重新确认⼀项对融资提供⽅的“借款”。对于其商业实质的判断，除了影响资产负债表列报项⽬以外，也会影响现⾦流量表的列报项⽬，如企业根据约定的条款认定属于买⽅融资，判断应付供应商款项应终⽌确认并转列报于短期借款，则企业还款时的现⾦流将不再属于经营活动现⾦流，⽽是筹资活动现⾦流。 关于融资提供⽅⽀付供应商款项后企业原应付供应商款项的具体列报项⽬，我们的倾向性观点为（假设期限均为⼀年以内）： 商业实质判断 融资提供⽅ 资产负债表列报 还款现⾦流量列报 属于企业⾃⾝的融资⾏为 银⾏或其他⾦融机构 短期借款 筹资活动现⾦流 ⾮⾦融机构 其他流动负债 不属于企业⾃⾝的融资⾏为 ⽆需区分 应付账款 经营活动现⾦流 注1：融资提供⽅向供应商⽀付款项的时候通常不会通过企业，当该⽀付现⾦流没有通过企业流转的时候，企业不应将其反映在现⾦流量表中。 注2：《附录—会计科⽬和主要账务处理》中关于短期借款的规定：“本科⽬核算企业向银⾏或其他⾦融机构等借⼊的期限在1年以下（含1年）的各种借款。” 关于⾦融负债的终⽌确认，CAS 22规定： 第⼗⼆条 ⾦融负债（或其⼀部分）的现时义务已经解除的，企业应当终⽌确认该⾦融负债（或该部分⾦融负债）。 第⼗三条 企业（借⼊⽅）与借出⽅之间签订协议，以承担新⾦融负债⽅式替换原⾦融负债，且新⾦融负债与原⾦融负债的合同条款实质上不同的，企业应当终⽌确认原⾦融负债，同时确认⼀项新⾦融负债。 企业对原⾦融负债（或其⼀部分）的合同条款做出实质性修改的，应当终⽌确认原⾦融负债，同时按照修改后的条款确认⼀项新⾦融负债。 第⼗四条 ⾦融负债（或其⼀部分）终⽌确认的，企业应当将其账⾯价值与⽀付的对价（包括转出的⾮现⾦资产或承担的负债）之间的差额，计⼊当期损益。 CAS 22应⽤指南中关于“实质上不同”的规定：其中，“实质上不同”是指按照新的合同条款，⾦融负债未来现⾦流量 （包括⽀付和收取的任何费⽤）现值与原⾦融负债的剩余期间现⾦流量现值之间的差异⾄少相差10%。有关现值的计算均采⽤原⾦融负债的实际利率。我们理解该规定主要是针对同⼀债务⼈负债前后数量上的变化。供应商融资安排由于融资提供⽅的存在，债务的性质很可能也发⽣了变化。 当企业根据供应商融资安排的条款判断融资提供⽅为企业⽀付的供应商款项属于其⾃⾝的融资⾏为时，我们理解该负债的条款在性质上与原应付供应商款项具有实质上的不同，应终⽌确认原应付账款，确认⼀项新的⾦融负债（如短期借款或其他流动负债）。 企业在判断供应商融资安排是否属于其⾃⾝融资⾏为时，通常主要从以下⼏个⽅⾯综合予以考虑： 实施供应商融资安排的⽬的是什么？ 供应商融资安排与商品或服务的采购是否为⼀揽⼦交易，即供应商是否在实施该融资安排的前提下才同意商务合同中约定的结算和价格条款？ 供应商融资安排是否修改了原与供应商的付款约定，如变更了企业的付款⽇期？ 与融资提供⽅的条款商议（如利率或折现率）由谁主导谈判？ 融资安排相关费⽤或利息由谁承担？ 企业是否向融资提供⽅提供了增信、交叉违约、由第三⽅承担连带责任，或提供其他形式的担保？ 企业是否获得了提前付款的现⾦折扣或商业折扣等优惠？ 款项到期时是否为融资提供⽅提供了直接从企业现有银⾏账户直接划款的权利？ 供应商融资安排是否占⽤企业在融资提供⽅的授信额度？个人理解，供参考。","cat":"收入准则","kw":"【咨询陈版主】买⽅票据贴现的性质认定及列报⽅式","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY1020","q":"求助陈⽼师及各位⽼师们关于⽆形资产原值如何确认的问题","a":"可参考：《上市公司执⾏企业会计准则案例解析2024》之“案例5-03 以收取提成费⽅式许可使⽤⽆形资产的会计处理”中被许可⽅A公司的处理⽅式：可以选择以下两种⽅法之⼀： ⽅法⼀：将可变对价包含于⽆形资产的初始确认⾦额中。 A公司通过该协议安排获得了甲公司特许使⽤的⽣产技术，除此之外，A公司还获得了甲公司未来提供技术援助及 培训服务的承诺。因为技术转移是以甲公司提供技术资料（纸质及光盘等为载体）的⽅式实现，在甲公司提供了技术资料后，即使没有后续的技术援助及培训，A公司仍能完成技术的转化与应⽤，所以技术许可事项应单独考虑。授权许可取得的⽣产技术应确认为⽆形资产；⽽技术援助及培训属千待执⾏合同，将在合同执⾏时确认相应的费 ⽤。 根据《企业会计准则第6号⼀—⽆形资产》的规定，投资者投⼊的⽆形资产应以投资合同或协议约定且公允的价值计量。在本案例中，可以认为该⽆形资产的初始确认⾦额为1.5亿元。 在本案例中，⽆形资产的对价⼀部分作为资本投⼊(1亿元），其余部分将千A公司在未来以提成费的形式⽀付。对千这部分提成费中归属于已转让的技术的部分，属于A公司预计很可能⽀付的现时义务，因⽽符合《企业会计准则第13号—-－或有事项》第四条所规定的预计负债的确认条件。A公司应根据协议期内合同产品的预计⽣产情况考 虑货币时间价值影响是否重⼤。如果货币时间价值影响不重⼤，则尤须考虑折现因素，此时，确认的预计负债⾦额为尤形资产⼊账价值与确认为资本投⼊⾦额的差额(5,000万元）；如果货币时间价值影响重⼤，则在确认预计负债时需考虑折现因素的影响，同时应注慈评估⽆形资产价值时是否也考虑了折现因素的影响。 当合同所述相关技术援助及培训实际提供时，A公司确认费⽤及相关负债。 确认的⽆形资产应根据《企业会计准则第6号⽆形资产》第⼗七条的规定，选择反映该⽆形资产预期未来经济利益的预计消耗⽅式的摊销⽅法，并⼀致地运⽤于不同会计期间。 ⽅法⼆：将可变对价排除千⽆形资产的初始确认⾦额外，待确定时计⼊损益。 此⽅法与⽅法⼀的区别在千，⽆形资产初始确认时不考虑可变对价的公允价值，⽽后续当合同产品实际⽣产并相应产⽣确定的⽀付义务时，根据⽣产量和每台应负担的使⽤权费确认负债并计⼊费⽤（或⽣产成本）。 其他⽅⾯的处理与⽅法⼀相同。 如前⽂所述，关千本案例中取得⽆形资产或固定资产的部分对价根据相关资产的未来使⽤情况确定的情况，准则制 定机构所关⼼的第⼀个问题也是可变对价在相关资产初始确认时是否应包含在资产成本中，并杻应地确认负债。应当注意的是，《企业会计准则第21号⼀—租赁》(2018年修订）指出，取决于指数或⽐率的可变租赁付款额包含千 使⽤权资产和相关租赁负债的初始确认⾦额中，《国际财务报告准则第16号——－租赁》(2016年修订）中也有类 似规定，但基于未来表现(Future Performance)或标的资产使⽤(Use of an Underlying Asset)的可变租赁付款额不包含千使⽤权资产和相关租赁负债的初始确认⾦额中。如果以此类推，本案例中取得⽆形资产的部分对价根据相关资产使⽤⽽确定，该部分对价可能不包含在⽆形资产初始确认⾦额中。 IASB对取得⽆形资产或固定资产的部分对价根据相关资产未来使⽤情况确定的情况尚⽆定论，在⽬前这种情况下，A公司这两种会计处理⽅法均可接受。个人理解，供参考。","cat":"收入准则","kw":"公允价值,租赁,预计负债,固定资产,摊销,求助陈⽼师及各位⽼师们关于⽆形资产原值如何确认的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0827","q":"判断新能源汽车充电服务商是主要责任⼈还是代理⼈","a":"虽然在新收⼊准则中没有明确提及，但是，鉴于“履约义务”是新收⼊准则下对收⼊进⾏确认和计量的基本会计单元，相应地，主要责任⼈/代理⼈的区分也应当是在履约义务层⾯上进⾏的。当⼀个合同包含多项履约义务时，有可能企业（销售⽅）在其中部分履约义务中是主要责任⼈，⽽在另⼀些履约义务中是代理⼈。因此，主要责任⼈/ 代理⼈区分的基础是恰当、合理地识别履约义务。 当与客户签订的合同同时涉及外购和⾃产的商品或服务时（例如系统集成、总分包、联合体等），对于外购部分应采⽤总额法还是净额法核算的问题，⾸先要判断外购部分是否构成⼀项单独的履约义务。如果外购部分单独构成⼀项履约义务，则由于系依据客户需求专门采购，相当于受托采购，依据上述分析，企业并不控制这些受托采购的外购商品，故应采⽤净额法核算该项履约义务相关的收⼊和成本。⽽如果外购部分不构成⼀项单独的履约义务，⽽是与⾃产部分组合为⼀项整体履约义务时（例如，将外购部分作为该项履约义务的投⼊，与⾃产部分整合为组合产出交付给客户；该外购产品系本企业根据客户需求专门定制化设计，委托制造商根据本企业提供的设计图纸⽣产；外购部分与⾃产部分之间因其他原因产⽣⾼度关联等），则负责提供整合服务的⼀⽅是该履约义务的主要责任⼈，应采⽤总额法确认与该项履约义务相关的收⼊和成本。 在证监会会计司组织编写的《上市公司执⾏企业会计准则案例解析2024》之“案例6-11 收⼊应该按照总额还是净额确认”的“相关案例之三：物流公司转包服务业务收⼊的确认”（见该书P393～394）中，该物流公司虽然将⼤部分运输服务外包，但其为客户提供的是⼀项综合服务，即把由各运输商分段提供的运输服务整合为⼀项联运服务提供给客户，以降低客户的物流成本。由于存在重⼤的整合因素，该合同整体上构成⼀项履约义务。在此情况下，物流公司作为整合服务的提供商，就该项履约义务整体向客户承担⾸要责任，是主要责任⼈，故可按总额法确认相关的收 ⼊和成本。如果背景信息有差异（例如物流公司将合同约定的运输服务整体转包给另⼀物流公司，⾃⾝未提供整合服务），则结果很可能不同。 按照上述提⽰，本案例中需要分析充电桩运营公司的外购电部分是否应按净额法确认收⼊，关键是⾸先确定“转售 外购电”是否构成⼀项单独的履约义务。⼀般情况下，外购电需经过充电桩运营公司提供的升降压等服务，通过充 电桩运营公司提供的专门设备（充电桩）才能充⼊客户的电动汽车电池中，在这⼀过程中，充电桩运营公司提供了重⼤的加⼯和整合服务，外购电⼒只是该项履约义务的⼀项投⼊，⾃⾝不构成⼀项单独的履约义务。即，只有⼀项整体性的履约义务——向客户提供充电服务，外购电的转售本⾝不构成⼀项单独的履约义务。相应地，作为该项履约义务的整合提供⽅，充电桩运营公司是该项履约义务整体上的主要责任⼈，其在将外购电⼒提供给客户之前控制这些外购电⼒。故满⾜按总额法确认收⼊和成本的条件。 但同时建议核查充电桩运营公司该项业务的成本构成，核实外购电⼒成本占总成本的⽐例。如果该占⽐较⼤，调压等加⼯过程较为简单，充电桩等设备折旧和电⼒损耗占总成本⽐重不⼤的，则可能表明这⼀过程中充电桩运营所提供的整合、加⼯服务是不重⼤的，这种情况下可能不满⾜采⽤总额法确认收⼊和成本的条件。个人理解，供参考。","cat":"收入准则","kw":"履约义务,折旧,请教陈版主,判断新能源汽车充电服务商是主要责任⼈还是代理⼈","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0011","q":"关于借款费⽤资本化问题","a":"由于“2018年11⽉与银⾏签订固定资产贷款合同，贷款仅限⽤于A项⽬”，但C部分⼀直处于停⼯状态，2019年B⼯程进⾏达到预计可使⽤状态，因此最多只能以取得贷款后⾄B部分预转固之⽇期间内B部分实际发⽣的⼯程⽀出为基 础，乘以该笔专门借款的利率确定该期间内可资本化的利息⾦额，且不超过该期间内该笔借款实际发⽣的利息总 额。超出部分的利息予以费⽤化处理。在该期间以外的期间内发⽣的利息⽀出也应当全部费⽤化。个人理解，供参考。","cat":"收入准则","kw":"固定资产,资本化,关于借款费⽤资本化问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0636","q":"机上流量产品销售适⽤总额法还是净额法","a":"虽然在《企业会计准则第14号——收⼊（2017年修订）》（以下简称新收⼊准则）中没有明确提及，但是，鉴 于“履约义务”是新收⼊准则下对收⼊进⾏确认和计量的基本会计单元，相应地，主要责任⼈/代理⼈的区分也应当 是在履约义务层⾯上进⾏的。当⼀个合同包含多项履约义务时，有可能企业（销售⽅）在其中部分履约义务中是主要责任⼈，⽽在另⼀些履约义务中是代理⼈。因此，主要责任⼈/代理⼈区分的基础是恰当、合理地识别履约义 务。 根据新收⼊准则第⼗条规定，识别履约义务的两个要素是“商品可明确区分”和“承诺可明确区分”。其中，下列情形通常表明企业向客户转让该商品的承诺与合同中其他承诺不可单独区分：1．企业需提供重⼤的服务以将该商品与合同中承诺的其他商品整合成合同约定的组合产出转让给客户；2．该商品将对合同中承诺的其他商品予以重⼤修改或定制；3．该商品与合同中承诺的其他商品具有⾼度关联性。 收⼊准则应⽤指南作了进⼀步解释： ⼀是，企业需提供重⼤的服务以将该商品与合同中承诺的其他商品进⾏整合，形成合同约定的某个或某些组合产出转让给客户。换⾔之，企业以该商品作为投⼊，⽣产或向客户交付其所要求的组合产出。因此，企业应当评估其在合同中承诺的每⼀单项商品本⾝就是合同约定的各项产出，还是仅为⼀个或多个组合产出的投⼊。 ⼆是，该商品将对合同中承诺的其他商品予以重⼤修改或定制。如果某项商品将对合同中的其他商品作出重⼤修改或定制，实质上每⼀项商品将被整合在⼀起（即作为投⼊）以⽣产合同约定的组合产出。例如，企业承诺向客户提供其开发的⼀款现有软件，并提供安装服务，虽然该软件⽆需更新或技术⽀持也可直接使⽤，但是企业在安装过程中需要在该软件现有基础上对其进⾏定制化的重⼤修改，为该软件增加重要的新功能，以使其能够与客户现有的信息系统相兼容。在这种情况下，转让软件的承诺与提供定制化重⼤修改的承诺在合同层⾯是不可明确区分的。 三是，该商品与合同中承诺的其他商品具有⾼度关联性。也就是说，合同中承诺的每⼀单项商品均受到合同中其他商品的重⼤影响。合同中包含多项商品时，如果企业⽆法通过单独交付其中的某⼀单项商品⽽履⾏其合同承诺，可能表明合同中的这些商品会受到彼此的重⼤影响。例如，企业承诺为客户设计⼀种实验性的新产品并负责⽣产 10 个样品，企业在⽣产和测试样品的过程中需要对产品的设计进⾏不断的修正，导致已⽣产的样品均可能需要进⾏不同程度的返⼯。当企业预计由于设计的不断修正，⼤部分或全部拟⽣产的样品均可能需要进⾏⼀些返⼯时，在不对 ⽣产造成重⼤影响的情况下，由于提供设计服务与提供样品⽣产服务产⽣的风险不可分割，客户没有办法选择仅购买设计服务或者仅购买样品⽣产服务，因此，企业提供的设计服务和⽣产样品的服务是不断交替反复进⾏的，两者 ⾼度关联，在合同层⾯是不可明确区分的。 据此，本案例⾸先需要分析B公司⾃⾏提供的部分和⾃C公司采购的部分能否分别识别为两项履约义务；以及如果因为两者之间存在组合产出的关系⽽合并为⼀项履约义务，则由B和C中的哪⼀⽅负责提供整合服务。 综合来看，B公司⾃⾏提供的部分和⾃C公司采购的部分需整合为⼀项履约义务的可能性更⼤，⽽整合服务的提供 ⽅很可能是C，故此时B应采⽤净额法。个人理解，供参考。","cat":"收入准则","kw":"合并,履约义务,机上流量产品销售适⽤总额法还是净额法","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入、《企业会计准则第14号——收⼊（2017年修订）》"},{"id":"CY0016","q":"委托代销能否扣除佣⾦后确认净额确认收⼊","a":"从会计技术⾓度，如果确认本企业是主要责任⼈，则本企业应以最终客户⽀付或应付的价款计量收⼊，同时将⽀付给代销商的佣⾦确认为销售费⽤。 以扣除⼿续费后的净额确认销售收⼊难度较⼤，除⾮是此类⼿续费⾦额不重⼤，基于重要性原则予以接受（但即使 ⾦额较⼩，鉴于此类事项较为敏感和风险较⾼，审计中仍需关注）。如果是IPO前的财务规范，还是建议尽可能通过规范的途径获得⼿续费和佣⾦的发票进⾏税前扣除。个人理解，供参考。","cat":"收入准则","kw":"请教陈版,委托代销能否扣除佣⾦后确认净额确认收⼊","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY1201","q":"计划⻓期持有的不具有重⼤影响的股权投资的处理？","a":"请参阅《监管规则适⽤指引——会计类第1号》之“1-1 特殊股权投资的确认与分类”： ⼀、附回售条款的股权投资 对于附回售条款的股权投资，投资⽅除拥有与普通股股东⼀致的投票权及分红权等权利之外，还拥有⼀项回售权，例如投资⽅与被投资⽅约定，若被投资⽅未能满⾜特定⽬标，投资⽅有权要求按投资成本加年化10%收益（假设代表被投资⽅在市场上的借款利率⽔平）的对价将该股权回售给被投资⽅。该回售条款导致被投资⽅存在⽆法避免向投资⽅交付现⾦的合同义务。基于投资⽅对被投资⽅的持股⽐例和影响程度不同，区分为以下两种情形： 情形1：投资⽅持有被投资⽅股权⽐例为3%，对被投资⽅没有重⼤影响； 情形2：投资⽅持有被投资⽅股权⽐例为30%，对被投资⽅有重⼤影响。现就上述两种情形下被投资⽅和投资⽅的会计处理意⻅如下： 情形1： 从被投资⽅⻆度看，由于被投资⽅存在⽆法避免的向投资⽅交付现⾦的合同义务，应分类为⾦融负债进⾏会计处理。 从投资⽅⻆度看，投资⽅对被投资⽅没有重⼤影响，该项投资应适⽤⾦融⼯具准则。因该项投资不满⾜权益⼯具定义，合同现⾦流量特征不满⾜仅为对本⾦和以未偿付本⾦⾦额为基础的利息的⽀付，应分类为以公允价值计量且其变动计⼊当期损益的⾦融资产。 情形2： 被投资⽅的会计处理同情形1。 从投资⽅⻆度看，⻓期股权投资准则所规范的投资为权益性投资，因该准则中并没有对权益性投资进⾏定义，企业需要遵照实质重于形式的原则，结合相关事实和情况进⾏分析和判断。投资⽅应考虑该特殊股权投资附带的回售权以及回售权需满⾜的特定⽬标是否表明其⻛险和报酬特征明显不同于普通股。如果投资⽅实质上承担的⻛险和报酬与普通股股东明显不同，该项投资应当整体作为⾦融⼯具核算，相关会计处理同情形1。如果投资⽅承担的⻛险和报酬与普通股股东实质相同，因对被投资⽅具有重⼤影响，应分类为⻓期股权投资，回售权应视为⼀项嵌⼊衍⽣ ⼯具，并进⾏分拆处理。对投资⽅⽽⾔，持有上述附回售条款的股权投资期间所获得的股利，应按该股权投资的分类，适⽤具体会计准则规定进⾏处理。 需注意：回购义务是由被投资企业本身还是被投资企业的其他股东承担？如果是由其他股东承担，则本企业所持有的回售权应单独确认为⼀项以公允价值计量且其变动计⼊损益的⾦融资产； 如果由被投资企业本身承担，则回售权和股权投资可以合并为⼀项⾦融资产确认。 提问⼈：⼤呆呆 时间：2025-05-16 16:34:14 请教陈⽼师“如果由被投资企业本身承担，则回售权和股权投资可以合并为⼀项⾦融资产确认。”这是为什么？具有重⼤影响的⻓投因素 为什么不考虑了？ 回答⼈：chenyiwei 这样做的前提还是将投资本身确认为⼀项⾦融资产⽽不是⻓期股权投资。如果对被投资企业具有重⼤影响故作为⻓期股权投资核算的，则不能合并为⼀项资产。提问⼈：爬爬呀 时间：2025-05-19 16:07:50 继续追问下“如果由被投资企业本身承担，则回售权和股权投资可以合并为⼀项⾦融资产确认。”那么针对这项⾦融资产的公允价值变动如何考虑呢？ 回答⼈：chenyiwei 两者作为⼀个整体的公允价值合计数应为约定回售价格的折现值和标的股权评估值两者中的较⾼者。个人理解，供参考。","cat":"收入准则","kw":"公允价值,合并,请教陈⽼师,计划⻓期持有的不具有重⼤影响的股权投资的处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY1363","q":"这部分公允价值变动属于资产的后续计量范畴，不是初始确认，因此不适⽤“初始确认豁免”。提问⼈：爬爬呀 时间：2025-05-07 144202","a":"并不是直接抵减应交税费。 针对其他权益⼯具投资的公允价值变动，确认递延所得税负债时：借：其他综合收益，贷：递延所得税负债。 同期确认应交税费——所得税时（假设本期⽆其他综合收益项⽬需计⼊应纳税所得额的情况）：借：所得税费⽤——当期所得税费⽤，贷：应交税费——企业所得税。所以本期的其他综合收益仍然是税后⾦额，不同于税前⾦额。 提问⼈：爬爬呀 时间：2025-05-12 10:44:08 是不是这样理解：针对本期其他权益⼯具投资变动，本期已经纳税调减了，所以计算企业所得税时，借：所得税费⽤ 贷： 应交税费-企业所得税？ 回答⼈：chenyiwei 是，本期应交所得税均由应体现在利润表的净利润中的交易或事项所导致，所以全部计⼊所得税费⽤。提问⼈：爬爬呀 时间：2025-05-19 08:09:01 继续追问下，想多听听陈版主知道。如果这部⻔其他权益⼯具投资是公允价值变动损失，纳税会调整，那么在报告附注披露时如何填列呢？这部分的当期企业所得税，是否计⼊其他综合收益？由于同时确认递延所得锐，是否不存在税费的影响了？ 回答⼈：chenyiwei 因为公允价值变动计⼊其他综合收益，对净利润⽆影响，所以不需要纳税调整。提问⼈：爬爬呀 时间：2025-05-22 22:07:38 继续追问下，⾟苦陈版主多指导了。是不是发⽣时若不影响净利润，则不会进⾏纳税调整？像有些权益性交易这块计算企业所得税，是不是也不需要进⾏纳税调整？ 回答⼈：chenyiwei 纳税调整是针对对净利润和应纳税所得额的影响⽅向、⾦额不同的项⽬。并不是说不影响净利润就不需要纳税调整。只有对利润总额和应纳税所得额的影响⽅向、⾦额不同的项⽬才需要调整。 提问⼈：xuanfeibj 时间：2025-05-08 19:01:54 公司主营英语分级AI课程，⽤户通过⾃营平台或代理平台购买产品，⽐如1880元100节课的课程包，但⽆使⽤有效期的限制，有7天⽆理由退款，7天后退款的情况⽐较少，课程必须在APP上观看，100节课可以随时、多次观看，后期没有课程更新，这种情况下能否在收到款，并经过7天退款期后，⽤户已经开通学习账号，⼀次性确认收⼊。因为这种没有使⽤期限的课程，⽤户消课并不及时，也会出现⼤量课时最终不消也不退款的情况，如果按消课确认收⼊，从⽇常核算来看不均衡，另外⼤量未消课时不能及时确认收⼊，或再通过确定经验值确认收⼊也不经济或准确。 还请陈版主给⼀些建议。谢谢！ 回答⼈：chenyiwei 由于课程必须在APP上联⽹观看，因此公司实际上承担了随时保证⽹络连接通畅的合同义务，该项合同义务与课程内容的提供不可分割，构成⼀项整体的履约义务。该项履约义务满⾜“客户在企业履约的同时即取得并消耗企业履约所带来的经济利益”的条件，故属于在⼀段时间内履约的履约义务。公司应在收到款项时确认为合同负债，在合理的期限内摊销确认收⼊。 如果⽤户可以将课程内容下载到本地，后续不联⽹也可以⽆限次观看，则可以按照主帖所述⽅式处理。提问⼈：爬爬呀 时间：2025-05-12 15:37:23 谢谢陈版主的很多耐⼼指导，感恩。请教陈版主：个人理解，供参考。","cat":"收入准则","kw":"公允价值,履约义务,所得税,递延,摊销,这部分公允价值变动属于资产的后续计量范畴,不是初始确认,因此不适⽤“初始确认豁免”,提问⼈,爬爬呀,2025-05-07,144202","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0681","q":"在判定是否属于业务时，引⼊集中度测试的底层逻辑是什么？","a":"这⾥所依据的交易，应当是在双⽅⾃愿、公平且熟悉相关情况的基础上达成的，并⾮强制或受迫交易。在这种情况下，不应出现“该企业有员⼯，有独⽴销售团队，有特定客户群体，成熟的供应链……这些都忽略了”的情况，即， 在公平合理的市场交易中，被收购⽅所拥有的任何有形或⽆形的、可辨认或不可辨认的资产都是应当予以合理估值的。最终成交价格应当是接近或者相等于被收购⽅所拥有的任何有形或⽆形的、可辨认或不可辨认的资产的公允价值之和减去其所承担的负债的公允价值之和。 提问⼈：wufaxian 时间：2024-08-17 08:41:25 谢谢陈⽼师的讲解。 请问实务中会计师如何判定“ 最终成交价格应当是接近或者相等于被收购⽅所拥有的任何有形或⽆形的、可辨认或不可辨认的资产的公允价值之和减去其所承担的负债的公允价值之和”，因为⽆形资产的公允价值区间应该是⽐较 ⼤的吧？ 然后外审如何判定会计师的集中度测试结论是否正确呢。⽐如审计和会计对⽆形资产公允价值产⽣分歧呢？ 回答⼈：chenyiwei 在实际操作中，我⼀般的做法就是利⽤“集中度测试”直接判断“单⼀资产实体”不构成业务。 所谓“单⼀资产实体”（single asset entity）是指某⼀实体的总资产额中，占据绝对⽐重的是⼀项具有不可替代性的特定可辨认资产的价值，除此以外的其他资产、负债的价值都是显著不重⼤的。相应地，该实体的未来现⾦流量也⾼度依赖于该项特定的可辨认资产。常见的“单⼀资产实体”的例⼦是为了特定的房地产开发项⽬、特定的投资性房地产或者特定区域、矿种的开采等⽽设⽴的项⽬公司。 就“单⼀资产实体”⽽⾔，其股权实质上全部公允价值集中于其所拥有的⼟地开发权、矿权等核⼼的可辨认资产，故满⾜集中度测试，可直接判定不构成业务，故⽆需进⼀步的分析评价。 需要说明的是：在实务中有可能出现这样的情况：某项资产组合可以通过“集中度测试”，因⽽在选择进⾏集中度测试的情况下直接被判定为不构成“业务”，⽽另⼀⽅⾯，同样的资产组合如果不进⾏集中度测试，⽽是按照《企业会计准则解释第13号》第⼆条之（⼆）中的标准去分析，又会被认为构成“业务”。即，是否选择进⾏集中度测试，不仅会影响分析和判断过程，还可能影响到判断结果。由于集中度测试的“可选择性”，这可能会带来潜在的财务操纵风险。为了简化会计处理，同时压缩财务操纵空间，我们建议按以下⽅法处理： 对于明显属于“单⼀资产实体”的被收购⽅，如房地产、矿业、光伏发电、PPP等领域的项⽬公司，直接依据“集中度测试选择权”认定其不构成“业务”； 其他情况下，如果⽆需复杂计算即可直接认定“购买⽅取得的总资产的公允价值⼏乎相当于其中某⼀单独可辨认资产或⼀组类似可辨认资产的公允价值”，则也按照“集中度测试选择权”认定其不构成“业务”。 直接将“单⼀资产实体”认定构成业务，有⼀个基于现实的考虑：此类核⼼资产产⽣未来现⾦流⼊的能⼒总有耗尽的 ⼀天，此时如果将其认定为业务，则形成的商誉价值将很难处理。个人理解，供参考。","cat":"收入准则","kw":"公允价值,商誉,在判定是否属于业务时,引⼊集中度测试的底层逻辑是什么","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY1605","q":"对截⽌⽇资产负债审计时，对于管理⼈已审核确认的债权，有法院的判决书，应付B单位100万，依据就是A公司盖章的收据，第⼀种，是有查到汇给某个⼈账户，该⼈⼀般是公司员⼯，经调查这笔款是为公司使⽤的，但具体怎么⽤的，⽆资料可查，此时审计调整增加这笔债务时，贷⽅做预计负债，还是其他应付款？借⽅是挂账其他应收款—未知，还是待处理财产损溢，还是未分配利润好呢？或者我们是否需要按照破产债权审核确认数调整截⽌⽇的公司账⾯负债？","a":"由于债权已经过法院和管理⼈确认，⾦额是确定的，故贷记其他应付款100万元。借⽅科⽬建议暂挂待处理财产损溢，到最终核查结果确定后再处理。 提问⼈：wangxiny 时间：2025-08-14 21:16:25 陈版主您好，关于⽆书⾯合同情况下的收⼊确认及后续收款问题向您请教： 被审计单位属于软件开发企业，部分运维业务是基于前期开发的系统进⾏运维服务，因客户多数为党政机关，有严格的预算限制，从⽽导致公司存在较多在正式合同签订前即开始提供运维服务的项⽬。 据公司⼈员介绍，在与客户接洽运维服务时会向客户提交报价单和预算申请表，由于运维服务的定价标准较为明确，所以⼤部分项⽬在合同正式签订前即可合理预计未来的合同⾦额，且后续签订的合同⾦额与预计⾦额差异不⼤。较少的客户会存在以下三种特殊情况：1、客户削减预算导致正式合同⾦额低于预计⾦额；2、客户要求延⻓服务期，如接洽时确认的服务期为1年， 后续签订合同时客户要求在合同签订⽇起再提供1年的运维服务；3、服务提供完成后客户赖账，由于未订⽴书⾯合同，客户拒绝付款（极个别情况）。 项⽬组认为：针对1和2，在公司开始向客服提供运维服务时即根据预计的合同⾦额和服务期间确认收⼊，后续签订合同时如交易价格或服务期限出现变化的，按照合同变更，原合同终⽌和新合同成⽴⽅式处理。针对问题3，客户拒绝付款与公司履约质量⽆关，不应冲减收⼊⾦额。是否属于债务重组？是否应在全额计提坏账准备后进⾏核销？ 请问，上述做法是否正确，谢谢陈版主。回答⼈：chenyiwei 对此类“先⼲活后签订合同”的情况，应根据以往历史经验和⾏业惯例等，判断交易双⽅是否已对合同价款⾦额和⽀付⽅式、⽀付条件等事实上已有共识，以确定是否实质上满⾜收⼊准则第五条关于“合同成⽴”的条件。在满⾜“合同成⽴”条件的前提下，运⽤可变对价原则对合同收⼊⾦额进⾏合理、谨慎的估计（包括遵循“极可能不会发⽣重⼤转回”的限制条件），在服务提供期间或者提供完毕后确认收⼊。后续实际结算⾦额与原估计价款⾦额不⼀致的，按可变对价的会计估计变更处理。 对于问题3，属于客户信⽤问题导致的⽆法收回款项，应在全额计提坏账准备后进⾏核销。提问⼈：亲爱的你好 时间：2025-12-15 15:49:21 项⽬建设期的财务⼈员、党建⼈员、⾼级管理⼈员⼈⼒资源⼈员的⼯资是否可以计⼊在建⼯程， 与在建⼯程直接相关的⼈员包含哪些： 回答⼈：chenyiwei 这些⼈员都属于⼀般⾏政⼈员，其在建设期内和建成后所提供服务的⼯作内容都是⼀样的，都是为了维持企业这⼀法⼈的运转，⽽与固定资产达到预定可使⽤状态⽆关，故这些⼈员在建设期内的⼈⼯成本也不应计⼊在建⼯程成本，⽽应直接计⼊管理费⽤。 参⻅：《中审众环研究2020》之“问题1-1-29（开办期发⽣费⽤的处理）”。个人理解，供参考。","cat":"收入准则","kw":"债务重组,预计负债,固定资产,对截⽌⽇资产负债审计时,对于管理⼈已审核确认的债权,有法院的判决书,应付B单位100万,依据就是A公司盖章的收据,第⼀种,是有查到汇给某个⼈账户,该⼈⼀般是公司员⼯,经调查这笔款是为公司使⽤的,但具体怎么⽤的,⽆资料可查,此时审计调整增加这笔债务时,贷⽅做预计负债,还是其他应付款,借⽅是挂账其他应收款—未知,还是待处理财产损溢,还是未分配利润好呢,或者我们是否需要按照破产债权审核确认数调整截⽌⽇的公司账⾯负债","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY1615","q":"请教，研发样件成本能否按照预计售价确认⼊库冲减研发费⽤","a":"不可以。研发样机、样件的成本结转问题，应遵循《监管规则适⽤指引——会计类第3号》之“3-11 固定资产达到预定可使⽤状态前试运⾏产品的会计处理”： 存货成本包括直接材料、直接⼈⼯以及按照⼀定⽅法分配的制造费⽤，是企业正常设计⽣产能⼒下的必要合理⽀出。固定资产达到预定可使⽤状态前试⽣产的存货，应以正常设计⽣产能⼒下的必要合理⽀出为基础，确认相关存货成本，试运⾏期间实际投⼊⾦额超出存货成本的部分计⼊在建⼯程。正常设计⽣产能⼒下的必要合理⽀出，应结合固定资产达到预定可使⽤状态后的正常设计产能、产品正常⽣产投⼊产出⽐等因素考虑。 即，此时试⽣产的样机、样件的成本，应根据“正常设计⽣产能⼒下的必要合理⽀出为基础，确认相关存货成本”。同时，依据财政部会计司发布的《⽆形资产准则实施问答》：“按照《企业会计准则第6号——⽆形资产》（财会〔2006〕3号，以下简称⽆形资产准则）并参考应⽤指南，内部开发⽆形资产的成本仅包括在满⾜资本化条件的时点⾄⽆形资产达到预定⽤途前发⽣的⽀出总额，对于同⼀项⽆形资产在开发过程中达到资本化条件之前已经费⽤化计⼊损益的⽀出不再进⾏调整。企业应当按照⽆形资产准则中开发阶段有关⽀出资本化的条件进⾏判断，将有关⽀出在满⾜资本化条件时确认为⽆形资产。按照《企业会计准则解释第15号》（财会〔2021〕35号），企业研发过程中产出的有关产品或副产品在对外销售前，符合《企业会计准则第1号——存货》（财会〔2006〕3号）规定的应当确认为存货，符合其他相关企业会计准则中有关资产确认条件的应当确认为相关资产。本问题中的甲公司已经按照⽆形资产准则、《企业会计准则解释第15号》等规定，判断当期研发⽀出不满⾜⽆形资产、存货等资产的确认条件，将研发⽀出（包括研发样机的相关⽀出）全部作费⽤化处理，并计⼊了当期研发费⽤，不应在以后期间签订销售合同或者销售研发样机时，将以前期间已费⽤化的研发样机⽀出⾦额从本期研发费⽤中冲回后再转⼊存货或营业成本等。”即转⼊研发样机、样件成本的⾦额不能超出该项⽬累计资本化的开发⽀出总额。 提问⼈：a2285000 时间：2025-08-07 19:52:14 公司主要是⾦属制品⾏业，主要原材料是钢材，前期研发过程中由于研发流程管控问题和研发bom管理不当，导致⽆法追溯获得研发样件的具体投料明细，但是企业有研发样件的收发存数量，若按照样件后续量产时的产品成本或者按照样件理论重量*钢材平均出库单价确定研发样件成本并冲减研发费⽤是否合适？ 回答⼈：chenyiwei 看这些证据本身的可靠性，以及按照这些证据测算的样品成本是否与类似商业化产品的成本差异不重⼤。个人理解，供参考。","cat":"收入准则","kw":"固定资产,资本化,研发样件成本能否按照预计售价确认⼊库冲减研发费⽤","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入、《企业会计准则第6号——⽆形资产》、《企业会计准则第1号——存货》"},{"id":"CY1545","q":"同⼀控制下吸收合并账务处理","a":"A公司原先持有B公司40%股权，相当于从⾃然⼈甲⼄购⼊剩余的B公司60%股权后，再对其进⾏吸收合并，可以理解为⼀项分步交易实现的同⼀控制下企业合并。会计处理参照《应⽤指南汇编2024》P61～63“企业通过多次交易分步取得同⼀控制下被投资单位的股权，最终形成企业合并”的会计处理原则并结合《企业会计准则解释第7号》第四条规定进⾏处理。最终B公司各项资产、负债按其在B公司的原账⾯价值纳⼊A公司报表。 提问⼈：苹果宝⻉007 时间：2025-07-16 09:08:53 谢谢⽹友热⼼回复，甲⼄是夫妻，甲占绝⼤多数⽐例，妻⼦⼄只⼩⽐例，可认定为⼀致⾏动⼈。因此，我理解符合同⼀控制条件。 是否可以这么理解，先购买少数股东股份，再吸收合并全资⼦公司啊？ 回答⼈：chenyiwei 可以这样理解。 提问⼈：苹果宝⻉007 时间：2025-07-16 09:08:53 求助陈版及各位⼤拿： A公司因业务需要，吸收合并⾮全资⼦公司B，吸收合并完成后，A公司将100%持有B公司股权。现有股权结构如图所示： 我的疑问是，AB均受⾃然⼈甲⼄控制，因此为同⼀控制下企业合并，账务处理怎么操作呢？若股权收购⽐例、股份⽀付⽐例均如何59、109号⽂的情况下，能否享受特殊税务处理？ file:///C:/Users/dolly/Desktop/微信图⽚_20250710152244.png 微信图⽚_20250710152244.png (14.75 KB, 下载次数: 86) 下载附件 2025-7-13 15:47 上传 回答⼈：chenyiwei https://bbs.esnai.com/thread-5493165-1-1.html 提问⼈：苹果宝⻉007 时间：2025-07-18 09:36:17 感谢陈版主解答，3个问题劳烦陈版过⽬，感谢了！ 甲⼄⼆⼈是夫妻，这是同⼀控制下企业合并？我认为是。 股权⽀付⽐例为100%，适⽤特殊性税务处理？我认为是。 账务处理：假设B公司账⾯资产总额为1000万，负债为500万，净资产为500万元，购买少数股东股权⽀付对价100%为股权，那么A公司账务处理如下是否恰当？ 借：资产1000万 贷：负债500万 贷：银⾏存款50万贷：实收资本—甲⼄贷：资本公积—倒挤 账务处理是否恰当？ A公司为⾮上市公司，拟上市公司，⽀付股份对价⽆公允价，是否应当对A公司进⾏评估，才能确定⽀付的股份价格，进⽽确定其资本公积⾦额？整个吸收合并过程中，并不涉及B公司公允价值，只涉及账⾯价值，是否不需要评估？ 回答⼈：chenyiwei个人理解，供参考。","cat":"收入准则","kw":"公允价值,合并,少数股东,同⼀控制下吸收合并账务处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY1858","q":"投资性房地产相关","a":"由于最终⽬的还是出售，出租仅仅是短期性、过渡性的，不是房地产成本和其中所包含的经济利益的主要回收⽅式，故不应确认为投资性房地产，应继续在开发产品中核算。但在出租期间， 应对其成本进⾏摊销，计⼊其他业务成本，与租⾦收⼊（其他业务收⼊）相配⽐。 早期2004年发布的“财会[2004]3号”（“问题解答四”）中给出了出租开发产品的核算⽅法，可作参考。提问⼈：ytt同学 时间：2025-12-04 08:21:05 财会[2004]3号 财政部《关于执⾏和相关会计准则有关问题解答(四)》 九、问：房地产开发企业⾃⾏开发的房地产⽤于对外出租，应当如何进⾏会计处理?如何在会计报表上列示? 答：房地产开发企业⾃⾏开发的房地产⽤于对外出租的，应当设置“出租开发产品”科⽬，并在“出租开发产品”科⽬下设置“出租产品”和“出租产品摊销”⼆个明细科⽬，核算企业开发完成⽤于出租经营的⼟地和房屋的实际成本以及出租产品摊销的价值。 企业开发完成⽤于出租的⼟地和房屋，应于签订出租合同、协议后，按⼟地和房屋的实际成本，借记“出租开发产品⼀⼀出租产品”科⽬，贷记“库存商品”科⽬。出租开发产品所取得的租赁收⼊，借记“应收账款”等科⽬，贷记“主营业务收⼊”或“其他业务收⼊”科⽬;按期摊销出租产品的成本，借记“主营业务成本”或“其他业务⽀出”科⽬，贷记“出租开发产品⼀⼀出租产品摊销”科⽬;发 ⽣的出租开发产品的维修费⽤，借记“主营业务成本”或“其他业务⽀出”科⽬，贷记有关科⽬。 企业改变出租产品⽤途，将其作为商品对外销售，应于销售实现时，按售价，借记“应收账款”、“银⾏存款”等科⽬，贷记“主营业务收⼊”科⽬。按出租开发产品的账⾯余额，借记“主营业务成本”科⽬，按出租产品累计摊销额，借记“出租开发产品⼀⼀出租产品摊销”科⽬，按出租产品原价，贷记“出租开发产品⼀⼀出租产品”科⽬。企业如已对出租开发产品计提减值准备的，应同时结转已计提的减值准备。 期末，对于意图出售⽽暂时出租的开发产品的账⾯价值，应在资产负债表的“存货”项⽬内列示;对于以出租为⽬的的出租开发产品的账⾯价值，在资产负债表的“其他⻓期资产”项⽬中列示。同时，在会计报表附注中披露出租房地产的成本、租赁合同主要条款等内容。 房地产开发企业对于本问题解答发布之前对外出租的⾃⾏开发房地产，未按照本规定原则进⾏处理的，应进⾏追溯调整。该解答是否适⽤新准则？ 回答⼈：chenyiwei 不属于新准则体系下的⽂件，但⼀定程度上可以参照，尤其是针对以出售为⽬的但在出售前短期出租的房地产。个人理解，供参考。","cat":"收入准则","kw":"减值,租赁,摊销,投资性房地产相关","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY1480","q":"及各位⼤神，关于关于政府控股公司的问题","a":"参考： https://bbs.esnai.com/thread-5492925-1-1.html 提问⼈：453021373 时间：2025-06-21 08:23:16 陈版主及各位⼤神好，现在有⼀个⽐较棘⼿的问题想请教，⼀家房地产开发公司是由区财政局全资控股的公司，主要是负责建设安置回迁户的⼩区，楼盘的地块、建设楼盘的资⾦以及公司的办公经费全是由政府划拨（⽆偿还义务），收取房款的途径主要是回迁户的增购款和部分⾮回迁户的房款，收取完⼏乎全额上交财政局，该公司财务⼈员和⾼管认为公司实质上是为财政局代建⼯程。 我的问题是：公司就收到建设楼盘的资⾦和办公经费直接计⼊“其他应付款-财政局”，发⽣的⼯程开⽀全部计⼊“开发成本-某某楼盘”，等到楼盘主体竣⼯验收后，互相冲减，是否不合适？就收到建设楼盘的资⾦和办公经费应该计⼊哪个科⽬？以及开发成本在验收后应该计⼊哪个科⽬？ 回答⼈：chenyiwei 参 考 ： https://bbs.esnai.com/thread-5492925-1-1.html 回答⼈：chenyiwei 判断是否属于代建⼯程，主要是看该公司在建设期间内对开发项⽬是否具有控制权，即能否⾃主决定和调整开发项⽬的关键设计要素、销售对象和销售价格等。如果能够决定的，则不是代建，⽽是⾃⾏开发和销售房地产；如果不能决定的，则属于提供代建服务。 如果是受政府委托建设回迁房⼩区，建设规模、主要设计、房型和套数等均由政府⽅⾯决定，建成后按政府规定价格销售给政府指定的回迁户，则属于提供代建服务。此时需进⼀步分析代建服务的收⼊确认应采⽤总额法还是净额法。在⽬前的实务中，如果设计、建设⼯程全部外包，则⼤概率采⽤净额法，此时主帖所说的会计处理⽅法“公司就收到建设楼盘的资⾦和办公经费直接计⼊“其他应付款-财政局”，发⽣的⼯程开⽀全部计⼊“开发成本-某某楼盘”，等到楼盘主体竣⼯验收后，互相冲减”是基本合理的，即仅就最终结余的资⾦差额确认代建服务收⼊。由于在该情况下公司并不控制该开发项⽬，故开发项⽬不应确认为公司的存货。 提问⼈：453021373 时间：2025-06-30 14:57:03 谢谢陈版主，⼤概思路我了解了，他确实不满⾜对开发项⽬具有控制权，开发项⽬不应该确认为存货，那么他的项⽬开发成本应该在哪⼀个科⽬上列⽀呢？收到财政局的款项放在“其他应付款”应该可以吧？ 回答⼈：chenyiwei 此时⼀般通过往来科⽬核算。个人理解，供参考。","cat":"收入准则","kw":"控制权,求助陈版主及各位⼤神,关于关于政府控股公司的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY1864","q":"托管期间，合并从哪天开始","a":"这⾥⾸先建议考虑的问题是：在2024年8⽉开始的新⼀轮5年期托管中，A是否取得了对B、C的控制权。参照《监管规则适⽤指引——会计类第1号》之“1-9 控制的判断”： ⼀、委托、受托经营业务 公司在判断对受托经营的业务（即标的公司）是否拥有控制时，需重点关注以下问题： ⼀是关于对标的公司拥有权⼒的认定。在判断是否对标的公司拥有权⼒时，除⽇常运营活动相关的权⼒外，还应当考虑是否拥有主导对标的公司价值产⽣重⼤影响的决策事项的能⼒和权 ⼒。例如，部分委托经营协议中约定，标的公司进⾏重⼤资产购建、处置、重⼤投融资⾏为等可能对标的公司价值具有重⼤影响的决策时，需经委托⽅同意。这种情况下，受托⽅不具有主导对标的公司价值产⽣重⼤影响的活动的权⼒，不应认定受托⽅对标的公司拥有权⼒。⼜如，部分委托受托经营业务中，委托⽅或双⽅并⽆⻓期保持委托关系的意图，部分委托协议中赋予当事 ⼀⽅随时终⽌委托关系的权⼒等。前述情况下，受托⽅仅能在较短或不确定的期间内对标的公司施加影响，不应认定受托⽅对标的公司拥有权⼒。 ⼆是关于享有可变回报的认定。从标的公司获得的可变回报，不仅包括分享的基于受托经营期间损益分配的回报，还应考虑所分享和承担的标的公司整体价值变动的报酬和⻛险。例如，部分委托经营协议中虽然约定委托期间标的公司损益的绝⼤部分⽐例由受托⽅享有或承担，但若标的公司经营状况恶化则受托⽅到期不再续约，这表明受托⽅实际上并不承担标的公司价值变动的主要报酬或⻛险，不应认为受托⽅享有标的公司的重⼤可变回报。⼜如，部分委托经营协议中虽然约定受托⽅享有标的公司的可变回报，但回报的具体计量⽅式、给付⽅式等并未作明确约定，有关回报能否实际给付存在不确定性，根据实质重于形式的原则，也不应认定受托⽅享有可变回报。 本案例中，鉴于委托期限为5年，很可能⽆法满⾜“具有主导对标的公司价值产⽣重⼤影响的活动的权⼒”和“分享和承担标的公司整体价值变动的报酬和⻛险”的条件，因此很可能不能纳⼊A的合并报表范围。 如果在少数情况下，A确实取得了对B、C的控制权（如前所述，这种可能性很⼩），则鉴于A与B、C之间此前⽆关联⽅关系，故属于⾮同⼀控制下合并，此时应将B、C⾃8⽉1⽇起纳⼊合并范围。个人理解，供参考。","cat":"收入准则","kw":"控制权,合并,托管期间,合并从哪天开始","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0545","q":"购买股权","a":"持股平台对被投资的上市公司多数是不具有重⼤影响的，即持股平台对所持有的上市公司股份应作为⾦融资产核算 （⼀般是以公允价值计量且其变动计⼊损益，列报为其他⾮流动⾦融资产）。相应地，C公司收购持股平台LP的股份后，对上市公司也不会有重⼤影响，也作为⾦融资产核算。 根据《企业会计准则第22号——⾦融⼯具确认和计量（2017年修订）》第三⼗三条、第三⼗四条规定： 第三⼗三条 企业初始确认⾦融资产或⾦融负债，应当按照公允价值计量。对于以公允价值计量且其变动计⼊当期损益的⾦融资产和⾦融负债，相关交易费⽤应当直接计⼊当期损益；对于其他类别的⾦融资产或⾦融负债，相关交易费⽤应当计⼊初始确认⾦额。但是，企业初始确认的应收账款未包含《企业会计准则第14号——收⼊》所定义的重⼤融资成分或根据《企业会计准则第14号——收⼊》规定不考虑不超过⼀年的合同中的融资成分的，应当按照该准则定义的交易价格进⾏初始计量。 交易费⽤，是指可直接归属于购买、发⾏或处置⾦融⼯具的增量费⽤。增量费⽤是指企业没有发⽣购买、发⾏或处置相关⾦融⼯具的情形就不会发⽣的费⽤，包括⽀付给代理机构、咨询公司、券商、证券交易所、政府有关部门等的⼿续费、佣⾦、相关税费以及其他必要⽀出，不包括债券溢价、折价、融资费⽤、内部管理成本和持有成本等与交易不直接相关的费⽤。 第三⼗四条 企业应当根据《企业会计准则第39号——公允价值计量》的规定，确定⾦融资产和⾦融负债在初始确认时的公允价值。公允价值通常为相关⾦融资产或⾦融负债的交易价格。⾦融资产或⾦融负债公允价值与交易价格存在差异的，企业应当区别下列情况进⾏处理： （⼀）在初始确认时，⾦融资产或⾦融负债的公允价值依据相同资产或负债在活跃市场上的报价或者以仅使⽤可观察市场数据的估值技术确定的，企业应当将该公允价值与交易价格之间的差额确认为⼀项利得或损失。 （⼆）在初始确认时，⾦融资产或⾦融负债的公允价值以其他⽅式确定的，企业应当将该公允价值与交易价格之间的差额递延。初始确认后，企业应当根据某⼀因素在相应会计期间的变动程度将该递延差额确认为相应会计期间的利得或损失。该因素应当仅限于市场参与者对该⾦融⼯具定价时将予考虑的因素，包括时间等。个人理解，供参考。","cat":"收入准则","kw":"公允价值,递延,购买股权","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入、《企业会计准则第22号——⾦融⼯具确认和计量（2017年修订）》、《企业会计准则第14号——收⼊》、《企业会计准则第39号——公允价值计量》"},{"id":"CY1744","q":"处置部分股权且未丧失控制权时，存在逆流未实现内部损益的会计处理","a":"https://bbs.esnai.com/thread-5494201-1-1.html 提问⼈：threespring 时间：2025-09-24 21:15:45 请教陈版处置部分股权且未丧失控制权时，存在逆流未实现内部损益的会计处理 案例：2021.1.1A公司出资9000万，持有C公司90%股权，B公司出资1000万设⽴C公司，持有C公司10%股权。2021.06.01年B公司将成本700万的存货，出售给A公司1000万，⽆其他业务。 2022.06.30，A公司出售10%股权取得2000万元，剩余80%，截⽌当⽇A公司的存货仍未对外出售。不考虑相关税费。 问题1，未实现内部交易中归属于处置部分股权的是否视同已经实现，有没有理论依据或者实务中的⼀般做法。问题2，处置⽇合并层⾯存货的列示⾦额，少数股东权益的列示⾦额。 问题3，下⾯处理如何修正：（主要是红⾊部分如何处理） 2021.12.31合并报表： 抵消⻓投： 借：实收资本-10000 贷：⻓期股权投资-9000 少数股东损益-1000 抵消内部交易： 借：营业收⼊-1000 贷：营业成本-700 存货-300 确认归属少数股东部分： 借：少数股东权益-30 贷：少数股东损益-30 2022.06.30 个别报表： 借：银⾏存款-2000 贷：⻓期股权投资-1000 投资收益-1000 合并报表： 抵消个别报表处理： 借：⻓期股权投资-1000 投资收益-1000 贷：少数股东损益-1000 资本公积-1000 抵消⻓投： 借：实收资本-10000 贷：⻓期股权投资-9000 少数股东损益-1000 连续编制以前年度抵消内部交易： 借：年初未分配利润-300 贷：存货-300 借：少数股东权益-30 贷：年初未分配利润-30 未实现内部交损益归属于已处置10%股权部分视同已经实现： 借：存货-30 贷：资本公积-30 确认归属少数股东部分： 借：资本公积-3 贷：少数股东权益-3 ⾄此合并报表存货⾦额为1000-300+30=730，资本公积为1000+30-3=1027，少数股东权益为2000-30+3=1973 回答⼈：chenyiwei个人理解，供参考。","cat":"收入准则","kw":"控制权,合并,少数股东,请教陈版处置部分股权且未丧失控制权时,存在逆流未实现内部损益的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY1449","q":"商业承兑汇票贴现的处理","a":"虽然“C公司另出具承诺书，承诺如票据到期出现拒付的情况，C公司将直接向B公司追索直⾄其偿还完毕”，但如果C公司后续将该票据进⾏再贴现，则“不向A追索‘的约定是否适⽤于再贴现的银⾏？如果不能获得该项保证，则鉴于贴现标的的商业承兑汇票，故A仍不能将其终⽌确认。 另外，“贴现协议中约定C保留了追索权”与“C公司另出具承诺书，承诺如票据到期出现拒付的情况，C公司将直接向B公司追索直⾄其偿还完毕”存在⽭盾，以哪⼀项为准，也需要关注，在未消除⽭盾的情况下，基于谨慎考虑，也不能终⽌确认。个人理解，供参考。","cat":"实务综合","kw":"商业承兑汇票贴现的处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1178","q":"股改后发现前期会计差错如何处理？","a":"如果股改后，直⾄发现并更正该错误时为⽌，股份有限公司尚未引⼊新股东，各股东的持股⽐例和份额均未发⽣变化，则可以作为⼀般的⾮重⼤差错处理，直接冲减当期的⻓期股权投资和资本公积。（前提是该⾦额明显低于重要性⽔平，且股改后的股份有限公司有⾜够的资本公积可供冲减。） 如果在此期间已经引⼊了新股东，则鉴于该错报可能影响新股东的⼊股价格和股权份额，故虽然在会计上仍可以将其作为⾮重⼤差错，采⽤当期更正法的简单处理，但同时需就该事项可能对新股东利益的影响问题，与新股东协商并达成⼀致意⻅。个人理解，供参考。","cat":"实务综合","kw":"请教陈版,股改后发现前期会计差错如何处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1673","q":"关于附公允价值回购的⼦公司股权增资的会计处理","a":"⾸先要关注：由于此处并未约定届时采⽤的评估⽅法，能否保证作为作价基础的“评估值”恰当代表了届时标的股权的公允价值？不排除实际上是“本⾦+利息”的翻版。对此需注意了解商业安排的合理性，例如，如果外部投资⼈⼊股时实质上是基于“明股实债投资”的意图，或者确实是基于标的公司⽇后会上市的预期，则回购价格的确定⽅式和逻辑就应当是不同的。如果⼊股时溢价较 ⾼，则届时按照净资产评估值收购，投资⽅必然会有损失，此时为何会接受该安排？ 假设届时的回购价格确实代表了届时标的股权的公允价值，则：个人理解，供参考。","cat":"实务综合","kw":"公允价值,请教陈⽼师,关于附公允价值回购的⼦公司股权增资的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0733","q":"企业建设的学校和医院能否作为企业⾃持资产？","a":"相关地块的⽤途是否明确为教育、医疗⽤地？如果是，估计该甲公司实际上是政府融资平台公司，根据政府指令取得法律上的⼟地使⽤权，然后为政府代建公益性项⽬？学校的超市、⾷堂，医院的超市、⾷堂、停车场的经营收⼊是否显著不重⼤？主要依靠收取“租⾦”收回⼟地取得成本和建设投资？ 如果是，则从经济实质考虑，该交易事实上相当于是政府向平台公司借款建设公益性资产，⽇后⽀付的租⾦相当于借款的还本付息；授予超市、⾷堂、停车场的经营权可能有⼀定经济利益，但不重⼤，不是该交易的主要考量因 素。个人理解，供参考。","cat":"实务综合","kw":"请教陈⽼师,企业建设的学校和医院能否作为企业⾃持资产","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1408","q":"有关剥离⼦公司的时候⺟公司的会计处理","a":"如果B公司要冲减实收资本，则必须按照《公司法》规定履⾏减资程序。在履⾏减资程序后，可根据减资⽅案冲减相应⾦额的实收资本。不能仅仅根据A公司下达的划转指令冲减实收资本。提问⼈：hahlee 时间：2025-05-27 15:32:54 另外还想请教陈版主，因为这种剥离冲减资本公积和留存收益，其中未分配利润从正数冲减为负数，是否不符合会计准则的规定呢？ 回答⼈：chenyiwei 在因权益***易⽽冲减权益时，未分配利润是最后冲减的项⽬，因此不受“冲减⾄零为限”的限制。个人理解，供参考。","cat":"实务综合","kw":"求助陈版主,有关剥离⼦公司的时候⺟公司的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1533","q":"B公司按同⼀控制下吸收合并在个别报表层⾯的原则处理。（《应⽤指南汇编2024》P598～600）。提问⼈：willingo 时间：2025-07-15 163300","a":"B公司个别报表层⾯只是从吸收合并⽇开始将A的各项资产、负债纳⼊，此前B的利润表不并⼊A的个别报表。提问⼈：willingo 时间：2025-07-15 17:49:50 第2条，可否这样理解：⺟公司以对A公司的股权为对价置换了B公司的股权，这样需在账⾯减记对A公司的⻓投，按B公司增资的⾦额确认对B公司的⻓投，差额部分计⼊资本公积。这样处理是否正确？请陈版解惑，谢谢！ 回答⼈：chenyiwei 可以理解为股权置换，但差额不应调整⺟公司⾃身个别报表层⾯的资本公积。个人理解，供参考。","cat":"实务综合","kw":"合并,B公司按同⼀控制下吸收合并在个别报表层⾯的原则处理,《应⽤指南汇编2024》P598～600,提问⼈,willingo,2025-07-15,163300","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0763","q":"出售电梯之后的⼀定期间的⽆偿维保是否属于“保证类质量保证”","a":"请参阅： https://bbs.esnai.com/thread-5488964-1-1.html 提问⼈：yahmm 时间：2024-09-14 10:03:19 请问：出售电梯提供⼀定期限的⽆偿维保服务，在维保期内对需要更换的易损件提供免费更换服务。是否属于《应 ⽤指南2024》中提到的“保证类质量保证”。 回答⼈：chenyiwei 这种维保的⽬的是保证电梯的持续安全运⾏，并不仅仅是对质量缺陷的弥补。且这种维保服务事实上要持续整个寿命周期。因此更倾向于作为服务性质保处理，前期的若⼲次免费维保的价格已包含在电梯的售价中。 提问⼈：Chai123456 时间：2024-09-26 10:46:50 由于前期若⼲次免费维保服务价格已包含在电梯售价中，故⽆偿维保服务更倾向于服务型质保，这个理解，但是陈版，针对质保期内⽆偿维保服务时另外免费更换的相关部件，是没有在售价中包含的，且销售电梯的公司针对这部分质保期内免费更换的相关零部件，在确认电梯收⼊时，确认了预计负债，之后年度质保期内更换零部件时冲销预计负债，请问陈版此项计提的预计负债是否属于《应⽤指南2024》中提到的“保证类质量保证”？ 回答⼈：chenyiwei 不是预计负债，⽽是合同负债。除⾮是原品质量缺陷导致，否则正常更换寿命到期的部件不属于保证性质保，⽽是服务性质保。 提问⼈：Chai123456 时间：2024-10-08 16:00:38 谢谢陈版，在上述您回答的基础上再次追问⼀下，企业合同中质量保证条款：“电梯在需⽅合理正常的保管和使⽤ 下，产品质量保证期为政府主管部门验收合格之⽇起的**个⽉，……在产品质量保证期内，如产品发⽣制造质量问题，供⽅应负责免费修理或免费更换零部件，更换下的零部件归供⽅所有，但需⽅或相关⼈员不正确使⽤⽽造成损坏的除外。”请问陈版，根据上述合同条款，企业将收⼊确认后预计期后免费更换零部件计⼊“预计负债”是否有歧 义，该类质量保证是否属于《应⽤指南2024》中提到的“保证类质量保证”？ 回答⼈：chenyiwei 因为针对的是“产品的制造质量问题”，所以是保证性质保。后续的服务性质保是指常规的定期维保服务。个人理解，供参考。","cat":"收入准则","kw":"预计负债,出售电梯之后的⼀定期间的⽆偿维保是否属于“保证类质量保证”","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0018","q":"同控下企业合并并表相关问题","a":"虽然约定“23年1-3⽉的利润是归购买⽅所有”，但卖⽅直到2023年3⽉底才丧失对⼦公司的控制权，故需合并到处置 ⽇。但主帖中的“⽅案⼀”也是有问题的。正确做法应当是：该标的公司在过渡期内的损益仍正常纳⼊卖⽅合并报 表，相应调整卖⽅的权益（⽽不是计⼊其他应付款）和该⼦公司的净资产在合并报表层⾯的账⾯价值。在处置⽇， 由于以同样的价格处置了较基准⽇更多（或更少）的净资产，故与基准⽇相⽐，相应减少（或增加）丧失对⼦公司控制权的损益。个人理解，供参考。","cat":"收入准则","kw":"控制权,合并,同控下企业合并并表相关问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0199","q":"投资性房地产公允价值计量问题？","a":"可以这样理解。这种情况不属于从其他房地产转换为投资性房地产。 《讲解2010》第四章：“采⽤公允价值模式对投资性房地产进⾏后续计量的企业，对于在建投资性房地产（包括企 业⾸次取得的在建投资性房地产），如果其公允价值⽆法可靠确定但预期该房地产完⼯后的公允价值能够持续可靠取得的，应当以成本计量该在建投资性房地产，其公允价值能够可靠计量时或完⼯后（两者孰早），再以公允价值计量。”此时⾸次公允价值计量时确定的公允价值与原成本之间的差额是可以确认为公允价值变动收益的。个人理解，供参考。","cat":"投资性房地产","kw":"公允价值,投资性房地产公允价值计量问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第3号——投资性房地产"},{"id":"CY0228","q":"企业从个⼈受让农村⼟地承包经营权是否应当作为投资性房地产核算","a":"农村⼟地承包经营权只是在农村⼟地“三权分置”背景下获得的⼀项经营收益权，法律上不构成对⼟地的所有权或者使⽤权，并不是对该项⼟地的完整权利。因此不能确认为投资性房地产。 提问⼈：asongwang 时间：2024-04-09 11:07:23 陈版主，如果是取得的⼟地经营权是长期⽐如20-30年，且取得了⼟地经营权证，拥有⼟地的经营、收益和转租的权利，是否可以视为是⼀种完整的使⽤权作为投资性房地产核算呢 回答⼈：chenyiwei 也不可以。个人理解，供参考。","cat":"投资性房地产","kw":"企业从个⼈受让农村⼟地承包经营权是否应当作为投资性房地产核算","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第3号——投资性房地产"},{"id":"CY0226","q":"公司⾃⾏开发ERP项⽬能作为研发项⽬吗","a":"ERP是⽤于内部管理的，并⾮本企业的产品或者在⽣产中使⽤的技术。并且，ERP开发需⼤量⼈⼒和其他资源投 ⼊，⽽主帖中所述的“有两三个同事，其中⼀两个具备⼀定的写代码开发能⼒”的⼩规模IT部门很明显不可能在该开发项⽬中起到主导作⽤，更多地是作为业务需求⽅与开发团队之间的沟通桥梁，明确需求，配合进⾏测试验收等。 ⽽且这类定制化系统的开发后续也很难商业化。因此该项⽬更⼤可能是作为⼀项外购软件的安排（形成⽆形资产），⽽不是研发项⽬。 提问⼈：法海 时间：2024-04-08 16:48:15 陈版，如果公司确实是这⼏个⼈主导开发ERP，外部单位只是辅助作⽤，是否可以认定为研发活动。 另外，根据企业会计准则的定义“研究是指为获取并理解新的科学或技术知识⽽进⾏的独创性的有计划的调查。开 发是指在进⾏商业性⽣产或使⽤前，将研究成果或其他知识应⽤于某项计划或设计，以⽣产出新的或具有实质性改进的材料、装置、产品等”。是不是可以这么理解，研发活动：1）得和主业相关，ERP属于辅助性的⼯作和主业并 ⽆关联。2）研发活动的⽬的是产⽣与主业相关的新产品、新技术、新⼯艺，如果研发活动的结果与此⽬标相违背，就不能考虑作为研发活动。 回答⼈：chenyiwei 可以作为研发活动，相关⽀出计⼊研发费⽤，但能否加计扣除和认定⾼新就是另⼀个问题了。个人理解，供参考。","cat":"无形资产","kw":"公司⾃⾏开发ERP项⽬能作为研发项⽬吗","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第6号——无形资产"},{"id":"CY0005","q":"⾏政罚款属于⾮经常性损益吗","a":"如果是由本企业⾃⾝的⾏为导致的⾏政罚款，且具有偶发性的，则属于⾮经常性损益。 如果是某些特殊情况（例如为了取得某项资产，⽽代该资产的原所有者或使⽤⼈缴纳其所⽋的罚款和税费，以完成 资产过户），则这种情况下的罚款可能构成资产取得成本并⼊资产价值，后续通过折旧或摊销⽅式计⼊成本费⽤， 此时就不是⾮经常性损益了。个人理解，供参考。","cat":"无形资产","kw":"折旧,摊销,⾏政罚款属于⾮经常性损益吗","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第6号——无形资产"},{"id":"CY1497","q":"处置⼤额亏损的⾦融资产的会计处理","a":"⽬前在执⾏新的2017年版⾦融⼯具准则后，不再强制性要求在处置⾦融资产时将累计的公允价值变动损益转⼊投资收益。但也不禁⽌这样做。如果编制分录2，也不算错。 该做法的优点是在处置⽇所属期间的利润表中，可以直观地在“投资收益”项⽬中看出该项⾦融资产⾃取得以来的累计已实现收益，即20-800=-780，相当于220-1000。但缺点是“公允价值变动损益”项⽬中包含了前期累计公允价值变动的转出数（800），从⽽缺乏实际意义，但利润表项⽬之间的重分类并不是原则性问题。个人理解，供参考。","cat":"实务综合","kw":"公允价值,请教陈版主,处置⼤额亏损的⾦融资产的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1698","q":"关于使⽤权资产的实务疑惑","a":"如果资产负债表⽇后⼀年内没有到期应付的租⾦，则租赁负债的账⾯价值在未来1年内是增加⽽不是减少的。⽽”⼀年内到期的⾮流动负债“反映的是未来1年内⾮流动负债账⾯价值将减少的⾦额，故在主帖所述情况下，”⼀年内到期的⾮流动负债“应为零，否则填列负数是不合理的。 提问⼈：阿⾥萨For 时间：2025-09-18 15:04:19 陈版主，您好，是这样可能主贴没有表述清楚。在⼀年内没有要⽀付的租⾦，但是在⼀年以后有，租赁本质上没到期。⽐如约定租赁期是4年，每2年⽀付1次，⽀付时间为每2年年初，所以这种情况会导致在某个资产负债表期间内只存在未确认融资费⽤，这时候如果确认⼀年内到期的⾮流动负债就是负数了，按照陈版主的说法，如果是这样的情况就不⽤确认⼀年内到期的⾮流动负债了？ 回答⼈：chenyiwei 是。个人理解，供参考。","cat":"租赁","kw":"租赁,关于使⽤权资产的实务疑惑","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁"},{"id":"CY0522","q":"对2021年内的处理，可以这样理解。2021年末由于尚未就租赁变更达成协议，但很可能已存在减值迹象，故需对其计提减值准备。","a":"⼀般需将使⽤权资产和对应的租赁负债纳⼊相关资产组⼀并进⾏减值测试。即测算包含租⾦在内的该资产组未来现 ⾦流量，据此确定资产组的可收回⾦额，与调整后的账⾯价值相⽐较。 提问⼈：Ryan_q 时间：2024-07-08 09:55:04 @chenyiwei，感谢陈版主再次回复，在此想补充⼀个问题： ⼀般需将使⽤权资产和对应的租赁负债纳⼊相关资产组⼀并进⾏减值测试。 上述减值的结果应当如何账务处理？ 如：使⽤权资产进⾏减值测试后，计⼊资产减值损失以及资产减值准备备抵项⽬。对应的租赁负债也进⾏冲减，即：借：租赁负债 贷：资产减值损失 上述差异结果在资产减值损失体现。 上述处理⽅式是否合理？望陈版主指导！ 回答⼈：chenyiwei 租赁负债不会因为对应的使⽤权资产计提减值准备⽽被冲减。个人理解，供参考。","cat":"租赁","kw":"减值,租赁,对2021年内的处理,可以这样理解,2021年末由于尚未就租赁变更达成协议,但很可能已存在减值迹象,故需对其计提减值准备","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁"},{"id":"CY1564","q":"如果A公司与B公司补充签订租赁协议，B公司2年后向A⽀付租⾦，则A可以根据该租赁协议约定确认对B的⼀项⻓期应收款。提问⼈：15855161732 时间：2025-07-24 093142","a":"我理解是净额更合理。 提问⼈：15855161732 时间：2025-08-06 16:03:48 想再请教⼀下陈版主，⽅案2下，现⾦流该怎么列示呢？ ①⻓期应付融资租赁款：虽然企业不实际产⽣银⾏现⾦流⼊，但应该按交易实质计⼊“取得借款所收到的现⾦”，是否正确？ ②⻓期应收款：同样没有实际现⾦流出，是否应该计⼊“投资所⽀付的现⾦”？还是计⼊“⽀付的其他与经营活动有关的现⾦”呢？ ③后续收到B公司⽀付的租⾦，本⾦部分计⼊“ 收到的其他与投资活动有关的现⾦”还是“收到的其他与经营活动有关的现⾦”。收到租⾦中的利息部分计⼊“销售商品,提供劳务收到的现⾦”还是“收到的其他与经营活动有关的现⾦”？ 期待陈版主的解答，⾮常感谢陈版主的耐⼼指导。@chenyiwei 回答⼈：chenyiwei个人理解，供参考。","cat":"租赁","kw":"租赁,如果A公司与B公司补充签订租赁协议,B公司2年后向A⽀付租⾦,则A可以根据该租赁协议约定确认对B的⼀项⻓期应收款,提问⼈,15855161732,2025-07-24,093142","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁"},{"id":"CY0032","q":"收购少数股权形成的资本公积后续处理问题？","a":"“后续A公司也进⾏注销或者处置出表”，则A公司⾃⾝的会计核算就要改⽤清算基础，遵循《企业破产清算有关会计处理规定》（财会[2016]23号），⽽不再遵循企业会计准则了。 但即使在这种情况下，A公司的更上级母公司在其合并报表中，仍需继续体现和保留该项资本公积。个人理解，供参考。","cat":"合并报表","kw":"合并,收购少数股权形成的资本公积后续处理问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY1277","q":"取得划拨⼟地上房产的⼊账价值确认","a":"该合作酒店是否为历史上设⽴的中外合作经营企业？ 从现在企业会计准则的观点来看，相当于甲⽅出租⼟地给⼄⽅，⼄⽅出资建设酒店并负责经营管理，甲⽅的租⾦包括每年约定的固定回报（⼄⽅⽂付甲⽅固定利润2002年⾄2006年为7万美元；2007年⾄2011年为10万美元；2012年⾄2025年为20万美元）以及合作期满后收回酒店房屋的届时价值。 甲⽅对此问题的会计处理可以参考《上市公司执⾏企业会计准则案例解析2024》之“案例5-04 出租⼟地建造建筑物的核算”。个人理解，供参考。","cat":"实务综合","kw":"请教陈⽼师,取得划拨⼟地上房产的⼊账价值确认","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1786","q":"_该事项是否属于期后调整事项？","a":"需要考虑：在2024年末时点，依据该时点可获取的信息判断，能否合理估计B公司具有全额付款能⼒，即款项的回收不具有重⼤不确定性。 如果依据当时信息可以合理估计的，则期后实际已付清全部款项的事实可以作为资产负债表⽇已存在状态或情况的进⼀步佐证，作为资产负债表⽇后调整事项处理。 鉴于实际付清是在2025年1⽉，距离2024年末资产负债表⽇较近，在该时间间隔内发⽣对B公司的财务状况和偿债能⼒产⽣重⼤影响的事项的可能性较⼩，故相对⽽⾔属于调整事项的可能性较⼤。个人理解，供参考。","cat":"实务综合","kw":"求助陈版_该事项是否属于期后调整事项","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1173","q":"关于⾮同控企业合并被收购公司在购买⽇的处理","a":"主帖中引述的年审事务所的做法不符合准则规定。 企业合并或者其他企业会计准则的正⽂中均未允许这样处理。在《应⽤指南汇编2024》P618中提及：“⾮同⼀控制下的企业合并中，购买⽅通过企业合并取得被购买⽅100 ％股权的，被购买 ⽅可以按照合并中确定的可辨认资产、负债的公允价值确认其账⾯价值。除此之外，其他情况下被购买⽅不应因企业合并改记有关资产、负债的账⾯价值。” 即，即使从准则应⽤指南的⼝径⽽⾔，也是只有在“⾮同⼀控制下的企业合并中，购买⽅通过企业合并取得被购买⽅100％股权”的情况下，才可以选择（⽽不是必须）按评估值调整被购买⽅资产、负债的账⾯价值。 另外，该做法虽然可以简化合并报表编制时的调整，但由于被购买⽅⾃身的各项资产、负债的计税基础并未发⽣变化，所以在进⾏该项账务调整后，后续还需要在被购买⽅申报纳税时进⾏调整，⼯作量并⽆明显减少。个人理解，供参考。","cat":"企业合并","kw":"公允价值,合并,求助陈版主,关于⾮同控企业合并被收购公司在购买⽇的处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY1054","q":"国家拨付专款进⾏项⽬建设，实务中应如何处理？","a":"对此类问题的会计处理，前提是要有⼀个确定的协议或者指令⽂件安排。但根据主帖表述，⽬前对国家投资款是否要返还、⽇后形成资产的所有权归属、所产⽣收益的分配⽐例等均未确定， 故基于谨慎原则，收到的国家拨款建议作为专项应付款处理，不计⼊资本公积。所发⽣的⼯程投⼊暂时在其他⾮流动资产挂账。到上述问题后续明确后，再根据明确的处理结果对会计处理进 ⾏变更。 具体负责该项⽬建设和运营的分⽀机构，在⽬前情况下应纳⼊合并汇总报表的范围，不应排除在汇总范围之外。个人理解，供参考。","cat":"实务综合","kw":"合并,国家拨付专款进⾏项⽬建设,实务中应如何处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0688","q":"求问陈版，关于应付债券计量模式","a":"不可以。⾦融负债在其存续期间不得进⾏重分类。 根据CAS 22第⼆⼗⼆条规定，在初始确认时，为了提供更相关的会计信息，企业可以将⾦融负债指定为以公允价值计量且其变动计⼊当期损益的⾦融负债，但该指定必须满⾜特定条件，且只能在初始确认时进⾏。主帖所述情况明显不符合指定的条件。 提问⼈：dearzrx 时间：2024-08-30 16:32:09 求问陈版，如果公司与债权⼈签订重组协议，重新发⾏⼀批债券来替换旧的债券。假如存续的债券⾦额是10亿个人理解，供参考。","cat":"实务综合","kw":"公允价值,求问陈版,关于应付债券计量模式","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0925","q":"云信通业务核算疑问","a":"此类供应链债权凭证，在转让或贴现时能否终⽌确认，与其是否可被确认为应收票据⽆关。 ⼀般理解，此类供应链债权凭证，如果是基于集团核⼼企业的信⽤以及银⾏授予的信⽤额度来保证到期兑付，并且只能依据特定平台的业务规则在该平台的会员之间流通转让，由“6+9”银⾏提供授信或者承担担保付款的责任（且 对转出⽅⽆追索权），则⼀般认为可以满⾜在贴现或背书时终⽌确认要求。但同时还要关注是否不存在《计学精要2021》中所指出的不能终⽌确认被保理应收账款的情形。个人理解，供参考。","cat":"实务综合","kw":"云信通业务核算疑问","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1811","q":"其他收益政府补助是否需要计提？","a":"参照《监管规则适⽤指引——会计类第1号》之“1-23 政府补贴收⼊的性质和确认条件”： 政府补助通常在企业能够满⾜政府补助所附条件以及企业能够收到政府补助时才能予以确认。判断企业能够收到政府补助，应着眼于分析和落实企业能够符合财政扶持政策规定的相关条件且预计能够收到财政扶持资⾦的”确凿证据”，例如，关注政府补助的发放主体是否具备相应的权⼒和资质，补助⽂件中索引的政策依据是否适⽤，申请政府补助的流程是否合法合规，是否已经履⾏完毕补助⽂件中的要求，实际收取资⾦前是否需要政府部⻔的实质性审核，同类型政府补助过往实际发放情况，补助⽂件是否有明确的⽀付时间，政府是否具备履⾏⽀付义务的能⼒等因素。 近年来，由于总体经济形势影响，各地政府普遍财政紧张，拖⽋应付款项的情况较多⻅，为此，在按应收⾦额确认政府补助时，应⽐往年更加谨慎地评估其可收回性。个人理解，供参考。","cat":"政府补助","kw":"其他收益政府补助是否需要计提","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第16号——政府补助"},{"id":"CY0025","q":"【转】政府补助相关问题","a":"如果⽇后通过A、B公司之间的协议，B公司可将其与政府签订的搬迁补偿协议中约定应由B公司承担的权利和义务均转移给A公司，相当于B作为A的代理⼈与政府协商搬迁补偿事宜，B⾃⾝不从中获利或者承担损失，则A对该事项应参照《监管规则适⽤指引——会计类第3号》之“3-10 搬迁补偿事项的会计处理”所述原则处理： 对于企业收到的不满⾜专项应付款确认条件（“因公共利益进⾏搬迁”以及”政府从财政预算直接拨付”）的搬迁补偿款，⼀般情况下认为，在满⾜市场化原则、补偿价格公允的前提下，该款项实质上是政府为取得⼟地使⽤权等资产向企业⽀付的交易对价。对于实践中存在的各类搬迁补偿名⽬，企业通常应当将其整体作为资产处置对价进⾏会计处理，除⾮有确凿证据表明搬迁补偿款存在政府补助成分（如提前搬迁奖励款等附带额外政策条件和使⽤条件的奖励），且政府补助与资产处置部分能够明确区分，则对于政府补助部分，企业应当按照政府补助准则相关规定进 ⾏会计处理。 对于企业为履⾏上述资产处置交易⽽发⽣的房屋及其他附属物拆除损失、搬迁费⽤、停产停业期间⽀付的职⼯薪酬等费⽤，如果预计能够通过未来资产处置对价予以补偿的，企业可以按照流动性将其暂时计⼊其他流动资产或其他⾮流动资产，在处置资产终⽌确认时转⼊损益，否则应当在相关费⽤发⽣时计⼊损益。个人理解，供参考。","cat":"政府补助","kw":"【转】政府补助相关问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第16号——政府补助"},{"id":"CY1707","q":"⾮同控控获取的⼦公司，多年后将其⽆偿划转⾄另外的⼦公司","a":"该事项对于划⼊⽅B⽽⾔属于同⼀控制下合并。 根据《企业会计准则第2号——⻓期股权投资（2014年修订）》第五条（⼀）：同⼀控制下的企业合并，合并⽅以⽀付现⾦、转让⾮现⾦资产或承担债务⽅式作为合并对价的，应当在合并⽇按照被合并⽅所有者权益在最终控制⽅合并财务报表中的账⾯价值的份额作为⻓期股权投资的初始投资成本。⻓期股权投资初始投资成本与⽀付的现⾦、转让的⾮现⾦资产以及所承担债务账 ⾯价值之间的差额，应当调整资本公积；资本公积不⾜冲减的，调整留存收益。 根据《企业会计准则解释第6号》第⼆条：同⼀控制下的企业合并，是指参与合并的企业在合并前后均受同⼀⽅或相同的多⽅最终控制，且该控制不是暂时性的。从最终控制⽅的⻆度看，其在合并前后实际控制的经济资源并没有发⽣变化，因此有关交易事项不应视为购买。合并⽅编制财务报表时，在被合并⽅是最终控制⽅以前年度从第三⽅收购来的情况下，应视同合并后形成的报告主体⾃最终控制⽅开始实施控制时起，⼀直是⼀体化存续下来的，应以被合并⽅的资产、负债(包括最终控制⽅收购被合并⽅⽽形成的商誉)在最终控制⽅财务报表中的账⾯价值为基础，进 ⾏相关会计处理。合并⽅的财务报表⽐较数据追溯调整的期间应不早于双⽅处于最终控制⽅的控制之下孰晚的时间。本解释发布前同⼀控制下的企业合并未按照上述规定处理的，应当进⾏追溯调整，追溯调整不切实可⾏的除外。 因此，⽆论是在B的个别报表还是合并报表层⾯，其会计处理的基础都是”被合并⽅的资产、负债(包括最终控制⽅收购被合并⽅⽽形成的商誉)在最终控制⽅财务报表中的账⾯价值“（即以原购买⽇公允价值为基础持续计算到当前合并⽇的账⾯价值），⽽不是被合并⽅（甲公司）⾃身报表中的账⾯价值。因此： B公司个别报表层⾯对甲公司的⻓投成本=甲公司的资产、负债(包括A公司收购甲公司⽽形成的商誉)在A公司合并财务报表中的账⾯价值（含商誉）*51%，对应贷记资本公积 B公司合并报表层⾯，应⾃A公司通过⾮同⼀控制下合并取得对甲公司控制权的购买⽇起，将甲公司纳⼊合并报表范围，据此追溯重述合并报表的前期⽐较数据，即直接将A公司合并报表层⾯对甲公司的合并结果”下推“到B公司的合并报表中。个人理解，供参考。","cat":"收入准则","kw":"控制权,公允价值,商誉,合并,⾮同控控获取的⼦公司,多年后将其⽆偿划转⾄另外的⼦公司","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入、《企业会计准则第2号——⻓期股权投资（2014年修订）》"},{"id":"CY1227","q":"⻓期股权投资后续计量⽅法转换","a":"按照题⽬原⽂，⼄公司增资前后甲公司在其可辨认净资产中的份额变动应为-320，即： 增资前净资产份额=（4500+2500）*60%=4200 增资后净资产份额=（4500+2500+2700） 40%=3880 两者差异=3880-4200=-320 由于当初甲公司⼊股⼄公司时，⼊股价格中包含内含商誉3000-450060%=300（当时⼄公司在甲公司⼊股后的整体估值是5000万元），⽽后续丙公司⼊股时是按照整体估值1.35亿元 （=2700/20%）计算的，因⽽⼄公司的整体估值在该期间内是上升的，这也与⼄公司在这段时间⾥盈利的设定相符。不能只看在⼄公司的可辨认净资产份额中的减少，也要考虑内含商誉的变动。这⼀点在合并报表层⾯（如甲公司有其他⼦公司，需编制合并报表）看得更清楚。甲公司所持⼄公司股权在丧失控制权之前的账⾯价值是3000+250060%=4500，丧失控制权后的公允价值是13500 40%=5400，合并报表层⾯可确认投资收益900（=5400-4500），⼀⽅⾯是可辨认净资产份额减少了320，另⼀⽅⾯内含商誉份额从300增加到5400-3880=1520，增加了1220。两者相抵⻓期股权投资账⾯价值净增加900（1220-300），这也就是合并报表层⾯确认投资收益900的构成。 提问⼈：ad0896 时间：2025-04-02 14:55:09 ⾮常感谢陈⽼师的回复，从公允价的⻆度来看是合理的商业逻辑。另您的计算过程： 按照题⽬原⽂，⼄公司增资前后甲公司在其可辨认净资产中的份额变动应为-320，即： 增资前净资产份额=（4500+2500）*60%=4200 增资后净资产份额=（4500+2500+2700）*40%=3880 两者差异=3880-4200=-320 您计算时⽤2500的利润额应该是⼄公司全年数据吧，因通过案例中的计算过程来看，全年是2500，1-9⽉是2000吧，为什么⽤全年数据计算增资时的差异呢？ 回答⼈：chenyiwei 抱歉，可能没注意细节。如果是在9⽉末增资，则按2000计算年初⾄增资⽇被投资企业净利润。个人理解，供参考。","cat":"收入准则","kw":"控制权,公允价值,商誉,合并,⻓期股权投资后续计量⽅法转换","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0021","q":"和各位⼤侠，应收款项融资的减值是否属于公允价值变动","a":"⾸先需要注意：根据《监管规则适⽤指引——会计类第2号》之“2-10 ⾦融资产管理业务模式中”出售”的判断标 准”：“如果⼀项⾦融资产对外”出售”但并未终⽌确认，意味着企业仍将通过收取该⾦融资产存续期内合同现⾦流量的⽅式实现经济利益，该种业务模式不满⾜”通过持有并出售⾦融资产产⽣整体回报”的情形。因此，⾦融资产管理业务模式中”出售”，应当是满⾜会计终⽌确认条件下的⾦融资产出售⾏为。”据此，在⽬前的实务中，商业承兑汇 票和财务公司承兑汇票可被分类为“应收款项融资”的情况是很少见的。 其次，应收款项融资的明细科⽬设置较为特殊。没有单独针对应收款项融资设置的“减值准备”科⽬（⽆论是⼀级科 ⽬还是明细科⽬）。其账务处理，⾸先是根据实际利率法确认利息收⼊，确定摊余成本；其次将摊余成本和期末公允价值之间的差额确认为公允价值变动，并调整其他综合收益；第三步是将预期信⽤损失计⼊损益并贷记其他综合收益，这样其他综合收益的净发⽣额仅代表由债务⼈信⽤风险以外的其他原因（如市场利率变动）对该项⾦融资产公允价值的影响。确认信⽤减值损失是借记“信⽤减值损失”，贷记“其他综合收益——信⽤减值损失”，即这⼀步是不影响⾦融资产账⾯价值的，因为前⼀步已将⾦融资产的账⾯价值调整为公允价值，所以后续不能再调整了。 应收款项融资的公允价值变动是多⽅⾯因素影响的结果，既包括⾦融市场上的利率等宏观参数，也包括债务⼈信⽤风险的影响，只不过对该类⾦融资产⽽⾔，因债务⼈信⽤风险因素对公允价值计量的影响需单列出来并体现在损益中，使得该类⾦融资产对持有⼈利润表的影响与以摊余成本计量的⾦融资产相同。个人理解，供参考。","cat":"收入准则","kw":"公允价值,减值,请教陈版和各位⼤侠,应收款项融资的减值是否属于公允价值变动","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0832","q":"购买客户清单是否构成商誉","a":"⼀般理解，客户清单为可辨认的⽆形资产，符合《企业会计准则解释第5号》第⼀条和IFRS 3中关于⾮同⼀控制下企业合并取得被购买⽅⽆形资产的可辨认性标准，故应按其公允价值确认为⽆形资产。不应并⼊商誉。 但是，如果该会计主体是境内上市或者IPO公司，则确认⽆形资产的条件更为严格。 参照《监管规则适⽤指引——发⾏类第5号》之“5-3 客户资源或客户关系及企业合并涉及⽆形资产的判断”：“客户资源或客户关系，只有源⾃合同性权利或其他法定权利且确保能在较长时期内获得稳定收益，才能确认为⽆形资 产。发⾏⼈⽆法控制客户资源或客户关系带来的未来经济利益的，不应确认⽆形资产。发⾏⼈开拓市场过程中⽀付的营销费⽤，或仅购买相关客户资料，⽽客户并未与出售⽅签订独家或长期买卖合同，有关”客户资源”或”客户关 系”⽀出通常应为发⾏⼈获取客户渠道的费⽤。 发⾏⼈已将客户资源或客户关系确认为⽆形资产的，应详细说明确认的依据，是否符合⽆形资产的确认条件。发 ⾏⼈应在资产负债表⽇判断是否存在可能发⽣减值的迹象，如考虑上述⽆形资产对应合同的实际履⾏情况与确认时设定的相关参数是否存在明显差异等。保荐机构及申报会计师应针对上述事项发表明确意见。”。 参照《北京证券交易所向不特定合格投资者公开发⾏股票并上市业务规则适⽤指引第2号》：“客户资源或客户关 系，只有源⾃合同性权利或其他法定权利且确保能在较长时期内获得稳定收益，才能确认为⽆形资产。发⾏⼈⽆法控制客户资源或客户关系带来的未来经济利益的，不应确认⽆形资产。发⾏⼈开拓市场过程中⽀付的营销费⽤，或仅购买相关客户资料，⽽客户并未与出售⽅签订独家或长期买卖合同，有关”客户资源”或”客户关系”⽀出通常应为发⾏⼈获取客户渠道的费⽤。 发⾏⼈已将客户资源或客户关系确认为⽆形资产的，应详细说明确认的依据，是否符合⽆形资产的确认条件。发 ⾏⼈应在资产负债表⽇判断是否存在可能发⽣减值的迹象，如考虑上述⽆形资产对应合同的实际履⾏情况与确认时设定的相关参数是否存在明显差异等。保荐机构及申报会计师应针对上述事项发表明确意见。”。个人理解，供参考。","cat":"收入准则","kw":"公允价值,商誉,减值,合并,购买客户清单是否构成商誉","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY1587","q":"分2期解决的限制性股票如何冲销及补提费⽤？","a":"根据《监管规则适⽤指引——会计类第1号》之”1-13 ⼀次授予、分期⾏权的股份⽀付计划“： “⼀次授予、分期⾏权”，即在授予⽇⼀次授予给员⼯若⼲权益⼯具，之后每年分批达到可⾏权条件。每个批次是否可⾏权的结果通常是相对独⽴的，即每⼀期是否达到可⾏权条件并不会直接影响其他⼏期是否能够达到可⾏权条件。在会计处理时应将其作为同时授予的⼏个独⽴的股份⽀付计划。例如，在⼀次授予、分三年⾏权的股份⽀付计划中，应当将其视同为三个独⽴的股份⽀付计划，分别确定每个计划的等待期。公司应根据每个计划在授予⽇的公允价值估计股份⽀付费⽤，在其相应的等待期内，按照各计划在某会计期间内等待期⻓度占整个等待期⻓度的⽐例进 ⾏分摊。 另外根据”1-24 区分会计估计变更和差错更正“： 企业不应简单将会计估计与实际结果对⽐认定存在差错。如果企业前期作出会计估计时，未能合理使⽤报表编报时已经存在且能够取得的可靠信息，导致前期会计估计结果未恰当反映当时情况，则应属于前期差错，应当适⽤前期差错更正的会计处理⽅法；反之，如果企业前期的会计估计是以当时存在且预期能够取得的可靠信息为基础作出的，随后因资产和负债的当前状况及预期经济利益和义务发⽣了变化⽽变更会计估计的，则属于会计估计变更，应当适⽤会计估计变更的会计处理⽅法。 据此，对于两个批次的解锁条件相互独⽴的分期解锁股份⽀付计划，不应仅仅因为第⼀期的可⾏权条件未满⾜⽽不确认下⼀批次的费⽤。如果确实依据第⼀年末可获得的信息，认为第⼆批次的可⾏权条件也很可能⽆法达成，故不确认第⼆批次的费⽤，则在后续因情况发⽣变化，第⼆批次的业绩条件达成时，应将第⼆批次对应的股份⽀付费⽤均确认在第⼆年，但前提是第⼀年末对于能否达成第⼆批次可⾏权条件的估计不存在前期差错。 如果最初预计两个批次均可解锁，但后续在第⼀批次解锁后，第⼆批次的解锁条件未能满⾜的，则在第⼆年，在排除前期差错的前提下，应在第⼆年冲回第⼀年确认的对应于第⼆批次的股份 ⽀付费⽤。个人理解，供参考。","cat":"股份支付","kw":"公允价值,分2期解决的限制性股票如何冲销及补提费⽤","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第11号——股份支付"},{"id":"CY1145","q":"关于等待期延⻓的问题","a":"解锁条件（上市后可转让）并未发⽣变化，只是由于内外部情况变化导致对企业何时实现上市的预期发⽣变化，故不是“条款和条件的修改”，⽽是对等待期⻓度这⼀会计估计的修正（变更）。应将剩余的股份⽀付费⽤在变更后的等待期内摊销处理。 如果在可预⻅的未来都难以实现上市的，则可以暂不确认股份⽀付费⽤（并冲回前期已确认的股份⽀付费⽤），到后续重启IPO计划时，根据届时的情况对等待其进⾏估计并据此摊销股份⽀付费⽤，但股份⽀付费⽤的计量基础仍是原等待期的公允价值。 提问⼈：Lsyb 时间：2025-03-11 10:27:55 请教下陈版主，企业在做股权激励计划的时候，约定如下：“从授予⽇起，分四年，每年归属25%，同时如果员⼯在IPO完成之前离职，则需将全部股份（包含已归属部分）归还，公司按⼀定年化利率回购”，这种约定情况下，等待期如何确定？按4年计算？还是估算IPO的情况？ 回答⼈：chenyiwei 按照4个批次作出“⼀次授予分期解锁”的处理（⻅《监管规则适⽤指引——会计类第1号》之1-13）。但如果预计上市所需时间超过某批次的解锁年限，则该批次的等待期相应延⻓到预计上市时点。个人理解，供参考。","cat":"股份支付","kw":"公允价值,摊销,请教陈版,关于等待期延⻓的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第11号——股份支付"},{"id":"CY1386","q":"优先股转换成普通股的处理","a":"由于优先股和普通股的条款有实质差异，因此优先股转为普通股时，应视为原优先股投资的终⽌确认和⼀项新的普通股投资的初始确认，即原优先股投资终⽌确认（按转换⽇公允价值与原账 ⾯价值之间的差额计⼊投资收益），同时按公允价值初始确认⼀项普通股投资，该项普通股投资如满⾜⾮交易性权益⼯具投资条件的，可在初始确认⽇（即转换⽇）作出该项指定。该指定不可撤销。 不论是否作出该项指定，原优先股于转换⽇的公允价值与普通股初始计量⾦额之间的差额均计⼊投资收益处理。个人理解，供参考。","cat":"实务综合","kw":"公允价值,优先股转换成普通股的处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1447","q":"关于以发⾏股份的形式吸收合并同⼀控制下企业的会计处理","a":"由于同时涉及收购少数股权，故应对A的股价（如果A是⾮上市公司）和B、C的净资产进⾏评估，据此确定换股⽐例和需发⾏股份的数量，即以各⽅评估值为基础确定交易价格，但同时需遵守《关于做好公司合并分⽴登记⽀持企业兼并重组的意⻅》（⼯商企字[2011]226号）中“因合并⽽存续或者新设的公司，其注册资本、实收资本数额由合并协议约定，但不得⾼于合并前各公 司的注册资本之和、实收资本之和。合并各⽅之间存在投资关系的，计算合并前各公司的注册资本之和、实收资本之和时，应当扣除投资所对应的注册资本、实收资本数额”的规定。合并完成后，仅剩⼀个法⼈主体，即不存在合并报表，此时在A的个别报表中，取得B、C的净资产账⾯价值与发⾏股份⾯值之间的差额调整资本公积处理。 提问⼈：lhjhtim 时间：2025-06-19 16:50:49 谢谢陈版主！还有个疑问，看了《企业会计准则应⽤指南指南汇编2024》案例20-5，B，C资产，负债以账⾯价值确认进来，净资产账⾯价值和发⾏股份⾯值的差额进资本公积，那最终A的个别报表⾥是不体现原B和C的未分配利润，盈余公积，⼀般⻛险准备了？ 回答⼈：chenyiwei 是，合并⽅个别报表层⾯不体现被合并⽅的留存收益项⽬。个人理解，供参考。","cat":"合并报表","kw":"合并,关于以发⾏股份的形式吸收合并同⼀控制下企业的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY1203","q":"集团内股权交易的处理","a":"该交易的两个交易当事⽅（B和C）都是A合并范围内的⼦公司，没有A公司合并范围以外的交易对⼿。因此，虽然处置标的是⼦公司的股权，但实际会计处理就和合并集团内部的资产交易⼀样处理，应完全抵销该交易的影响，在交易完成时点，视同该项内部交易没有发⽣过。 根据《企业会计准则第33号——合并财务报表（2014年修订）》第三⼗六条规定：“⼦公司之间出售资产所发⽣的未实现内部交易损益，应当按照⺟公司对出售⽅⼦公司的分配⽐例在“归属于 ⺟公司所有者的净利润”和“少数股东损益”之间分配抵销。”。因此，本案例中的内部交易损益（B公司确认的投资收益——股权处置损益）在A的合并报表中应完全抵销，抵销影响按照B的股权结构（⺟公司70%、少数股权30%）在⺟公司股东和少数股东之间分配。 后续，因为D变为C的⼦公司，故C的损益和其他权益变动的后续分享⽐例会有变化，但在交易完成时点上不涉及这个问题，所以对交易完成时点上A的合并报表是完全没有影响的。提问⼈：⼤呆呆 时间：2025-05-16 16:29:35 请问⼀下⽼师，这种情况下少数股东权益的变化⾦额对应是不是资本公积？ 回答⼈：chenyiwei 是。个人理解，供参考。","cat":"合并报表","kw":"合并,少数股东,集团内股权交易的处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表、《企业会计准则第33号——合并财务报表（2014年修订）》"},{"id":"CY1503","q":"关于业绩对赌后进⾏业绩补偿的会计处理","a":"本企业个别报表和合并报表层⾯均应作为或有对价处理。根据《监管规则适⽤指引——会计类第1号》之“1-7 ⾮同⼀控制下企业合并的或有对价”： 三、以标的公司少数股权结算的或有对价 以标的公司少数股权结算的或有对价，在合并报表层⾯，同样适⽤上述会计处理原则。具体⽽⾔，当标的公司实际业绩确定时，将因或有对价确认的⾦融资产重分类为权益⼯具（其他权益 ⼯具），不再核算相关股份的后续公允价值变动；当购买⽅实际收到业绩承诺⼈补偿的标的公司少数股权时，应作为收购少数股东权益处理，即终⽌确认上述其他权益⼯具，并相应冲减少数股东权益，差额计⼊资本公积，资本公积不⾜冲减的，则冲减留存收益。 即，只有在需作为补偿取得的⼦公司股权的⽐例和份额确定后，才体现为权益性交易，此前按照普通的或有对价处理，确认为⼀项以公允价值计量且其变动计⼊损益的⾦融资产。个人理解，供参考。","cat":"企业合并","kw":"公允价值,合并,少数股东,关于业绩对赌后进⾏业绩补偿的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0730","q":"被收购业务出现重⼤变化时的商誉减值问题","a":"这个案例的特殊性在于：导致资产组发⽣重⼤变化的事项是2012年铁道部对杂志摆放权的重新招标，重新招标的条件截⾄2012年末都是已知的，即，截⾄2012年末，已经知道“如果B 公司成功竞标， B 公司每年⾄少需额外⽀付2,450 万元渠道费，其铁道媒体业务（即A 公司） 存在亏损的风险；如果公司不参加公开招标，或未能中标，则其出版的杂志将⽆法在旅客列车上摆放，在这种情况下， 公司现有铁道媒体业务可能需要另觅途径分销其出版的杂志，或将停⽌刊印。”即，⽆论什么结果都会发⽣亏损。在此情况下，2013年初管理层作出不参与竞标的决定，是 基于资产负债表⽇已知的条件和信息作出的，且决策做出⽇期（2013.1.18）距离资产负债表⽇很近，故可以看作资产负债表⽇后调整事项。个人理解，供参考。","cat":"企业合并","kw":"商誉,减值,被收购业务出现重⼤变化时的商誉减值问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0110","q":"求助，处置失败的研发项⽬","a":"将处置价款与对应资产（资本化开发⽀出）账⾯价值（可能为零）之间的差额确认为资产处置损益。 如果以前年度已将开发⽀出资本化，则在本年度确定项⽬失败时，应对前期已资本化的开发⽀出先计提减值准备， 再进⾏核销处理，不应直接费⽤化。 上一页 陈版主（陈奕蔚老师）答疑历史文章（2024年01月） 下一页 陈版主（陈奕蔚老师）答疑历史文章（2024年03月） 粤ICP备18107660号 粤公网安备44060602000887号 关于网站 Copyright © 2021-2026 会计便利店 hjyweb.cn 【个人理解，供参考。","cat":"资产减值","kw":"减值,资本化,处置失败的研发项⽬","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第8号——资产减值"},{"id":"CY0009","q":"同⼀控制下⾮国有企业能够像国企⼀样进⾏不同⼦公司的资产划拨或者兼并？","a":"法律上并不禁⽌，理论上也是可以的，但需关注可能产⽣的税务风险和对债权⼈利益的潜在损害。建议先咨询律师和税务专业⼈⼠。个人理解，供参考。","cat":"实务综合","kw":"同⼀控制下⾮国有企业能够像国企⼀样进⾏不同⼦公司的资产划拨或者兼并","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0278","q":"合并报表","a":"因为是同⼀控制下合并，所以合并报表的前期⽐较数据需要追溯，视同在最早报告期期初已持有合并⽇的股权⽐例。原先A个别报表层⾯对C的长期股权投资和相关的投资收益等应予以抵销。 在对价⽀付⽅⾯，对应于此前A已持有C的股权⽐例部分的对价（A最初取得C股权的原成本）应视为在最早期间期初已经⽀付，在合并⽇将追加收购部分的收购价款冲减权益。最终合并结果中合并⽇前后的留存收益仍然是延续 的。 合并⽇前的抵销分录涉及抵销原长期股权投资和投资收益、将被合并⽅净利润和留存收益中对应于合并⽇后持股⽐例的部分转⼊留存收益、按照原持股部分的投资成本冲减权益、将本次追加购⼊部分对应的实收资本和资本公积转 ⼊权益等事项。 提问⼈：sunli1987 时间：2024-11-01 20:30:38 陈⽼师，您好，想跟您请教⼀个持股⽐例50%未纳⼊合并报表的事项，希望得到您的帮助和回复，谢谢！案例如下： 2019年6⽉公司A投资基⾦C 4亿元，并与基⾦C签订合作协议，补充协议及⼀致⾏动⼈，约定基⾦C在18个⽉返投B 公司（A公司的2019年12⽉之前持有B公司股权⽐例100%）3亿元，在返投B项⽬前A与基⾦C属于⼀致⾏动 ⼈，2019年12⽉A公司转让50%的股权给4家公司，其中包括私募投资基⾦C，转让⽐例为15%，转让价款3亿，转 让完成后基⾦C为B公司第⼆⼤股东。B公司的公司章程约定：股东⼤会按照出资⽐例⾏使表决权；董事会由3⼈组成，A公司为董事长，基⾦C派⼀名董事，另⼀⽅股东派出⼀名董事，董事会的职权包括：聘任及决定总经理的报酬；根据总经理的提名聘任财务总监决定其报酬。2020-2021年B公司⾼管团队的绩效考核由A公司进⾏，2020年年终奖按照8折进⾏发放；财务总监由A公司委派，劳动关系也在A公司。⽇常经营事项的讨论由⼀个⼯作⼩组讨论 （成员构成4⼈为A公司的⾼管和中层管理者，另4⼈为B公司⾼管）。请问陈⽼师： 公司A持有B公司的股权⽐例是否需要穿透计算基⾦C持有B公司的股权⽐例； A公司对B公司是否具有控制权。回答⼈：chenyiwei个人理解，供参考。","cat":"收入准则","kw":"控制权,合并,合并报表","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0399","q":"定期存款质押从银⾏取得外币借款","a":"这种情况要考虑⾦融资产和⾦融负债是否分别均满⾜终⽌确认条件，即收款权利（针对保证⾦）和付款义务（针对借款本息）是否均已消除⽽不存在。这⾥需要关注：“确约定净额结算，⾃从存了保证⾦开始，后续企业就没⽆任 何权限动⽤这笔保证⾦及也不⽤偿还借款。锁定只能拿到固定收益”的条款，是否后续不论发⽣何种情况都是如 此？还是说某些情况（尽管可能少见）可能导致最终不能净额结算，仍保留付款义务和收款权利，且收款权利能否实现仍会受到对⽅信⽤风险等因素影响？个人理解，供参考。","cat":"实务综合","kw":"定期存款质押从银⾏取得外币借款","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0161","q":"⾮⾦融企业持有理财产品或股票产⽣的投资收益、公允价值变动损益","a":"⼀般不可以。 虽然这可能是“企业管理闲置资⾦的⼀贯模式”，但仍属于与正常经营业务⽆关的，且此类收益的波动性也不利于对企业未来通过正常经营业务盈利能⼒的判断和估计。因此不属于经常性损益。 在《监管规则适⽤指引——会计类第1号》之“1-26 ⾮经常性损益的认定”中，也只是提及“募集资⾦使⽤之前产⽣的 定期存款利息”不作为⾮经常性损益。如果是购买结构性存款等理财产品，或者其资⾦来源不是暂时闲置的募集资 ⾦，则相关受益仍属于⾮经常性损益。个人理解，供参考。","cat":"实务综合","kw":"公允价值,⾮⾦融企业持有理财产品或股票产⽣的投资收益,公允价值变动损益","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0516","q":"由于投资企业以其他权益⼯具投资核算，其现⾦补偿后续计量应当不影响当期损益，⽽计⼊OCI的⽅式，即业绩补偿计⼊其他综合收益。","a":"应采⽤第⼀种⽅式。该现⾦补偿的义务⼈是被投资公司股东，因此应将补偿索取权确认为⼀项单独的⾦融资产，属于衍⽣⼯具，并⾮权益⼯具，故只能分类为以公允价值计量且其变动计⼊损益的⾦融资产，不能指定为以公允价值计量且其变动计⼊其他综合收益的权益⼯具投资。 提问⼈：sunday_311 时间：2024-07-10 17:26:23 那我贷⽅应该做什么的？ 投资收益？还是营业外收⼊？ 回答⼈：chenyiwei 严格来说应该是公允价值变动损益。个人理解，供参考。","cat":"实务综合","kw":"公允价值,由于投资企业以其他权益⼯具投资核算,其现⾦补偿后续计量应当不影响当期损益,⽽计⼊OCI的⽅式,即业绩补偿计⼊其他综合收益","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0768","q":"关于质保⾦","a":"可以这样理解。 提问⼈：殿chen4828 时间：2024-10-12 14:20:48 那请问陈版，如果从销售费转成本，我们成本科⽬有辅助核算（区分不同项⽬），需要将预提的售后费准确分配⾄每个项⽬？还是回头按照收⼊⽐例分配⼀下即可，主要现在我们没有资料及其他依据每个项⽬是否发⽣售后 回答⼈：chenyiwei 可以明确对应的，仍需对应到项⽬；其他⽆法对应的部分（预计应当少见）可按各项⽬的收⼊⽐例等合理的基础进 ⾏分配。个人理解，供参考。","cat":"实务综合","kw":"关于质保⾦","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1077","q":"试运⾏期间产⽣废品的处理","a":"如果是在现有的⽣产技术和⼯艺下不可避免地会出现⼀定⽐例的废品，则废品按残料价值⼊账，其成本在扣除残料回收价值后的剩余部分由合格产品承担。但主帖中所指的是在试运⾏期间产出的⼤量废品，这不属于正常情况。如果是在⽣产设备调试过程中产⽣的，可能更合适的做法是将废品成本扣减残料价值后计⼊在建⼯程成本处理。 ⼀般理解，地板⾏业的原材料成本占⽐较⼤，且为开⼯时⼀次性投⼊，因此对其废品（尤其是⾮正常废品）完全不核算成本的做法并不合理。个人理解，供参考。","cat":"实务综合","kw":"试运⾏期间产⽣废品的处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0168","q":"有限责任公司涉及限制性股权的问题。","a":"有限责任公司如果可以授予员⼯限制性股权（具体的法律问题请咨询律师和其他法律专业⼈⼠），则其会计处理取决于授予条款。如果仿照股份有限公司的处理⽅式进⾏授予，则会计处理也类似。 如果通过设⽴持股平台持有该有限责任公司股份的处理⽅式，后续未能解锁的股权在持股平台的其他合伙⼈之间分配，公司不回购，则对公司⽽⾔⽆需确认回购义务，⽆其他特殊处理。如果公司需回购，则公司仍需确认库存股 （但不使⽤“库存股”科⽬，⽽是冲减资本公积）。个人理解，供参考。","cat":"实务综合","kw":"请教陈版,有限责任公司涉及限制性股权的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0171","q":"关于农村集体合作开发","a":"村社作为⼟地出租⽅，这种合作模式中将于合作期满时收回的房产价值也是合作期内租⾦收益的⼀部分。理论上应合理估计该房屋于收回时的公允价值，将其在合作期内（即⼟地出租期限内）分摊确认各期租⾦收益。但如果难以合理确定其届时公允价值的，也可以简化处理，即在合作期内仅确认各期的货币租⾦收⼊，到收回房屋时对其评 估，按评估值⼊账，对应贷记租⾦收⼊。 租⾦收⼊所列的会计科⽬，根据《农村集体经济组织会计制度》，应属于“经营收⼊”。个人理解，供参考。","cat":"实务综合","kw":"公允价值,关于农村集体合作开发","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1856","q":"⼦公司净资产为负数⺟公司⻓期股权投资的处理","a":"⻓期股权投资的账⾯价值不能为负数。因此划⼊净资产为负数的⼦公司，⻓期股权投资成本为零。如果划⼊⽅奥对被划⼊企业⽆⼒偿还的负债予以全部或部分兜底的，则按照或有事项准则规定确认预计负债并冲减资本公积。个人理解，供参考。","cat":"或有事项","kw":"预计负债,请教陈版⼦公司净资产为负数⺟公司⻓期股权投资的处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第13号——或有事项"},{"id":"CY0077","q":"关于对外担保","a":"此前，新⾦融⼯具准则实施前，按照或有事项准则，如果确有证据表明导致经济利益流出企业的可能性不⾜50%， 则可以不计提预计负债。 但在新⾦融⼯具准则实施后，此类担保损失虽然仍在预计负债列报，但其适⽤的会计准则是⾦融⼯具准则，适⽤预期信⽤损失模型确认坏账损失和计提准备。在此情况下，需考虑损失概率和期望值，⽽不再适⽤此前预计负债的规定，所以仍可能需计提预计负债。个人理解，供参考。","cat":"或有事项","kw":"预计负债,关于对外担保","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第13号——或有事项"},{"id":"CY1575","q":"矿⼭企业弃置费-资产处置","a":"矿⼭企业的弃置费⽤主要是针对采矿相关的矿坑、井巷等设施，⼀般机器设备和房屋建筑物不涉及计提弃置费⽤问题。因此房产、设备的拆除和处置应不涉及弃置费⽤相关预计负债的变动。个人理解，供参考。","cat":"或有事项","kw":"预计负债,矿⼭企业弃置费-资产处置","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第13号——或有事项"},{"id":"CY0622","q":"及各位⽼师，关于弃置费⽤的使⽤问题","a":"如果确定这些⽀出确实属于弃置费⽤的开⽀范围内的，则可以从相应的预计负债中列⽀，借：预计负债，贷：银⾏存款等。 同时，根据最新情况变化，对预计负债的应有余额进⾏重新评价测算，对其相关调整按照《企业会计准则解释第6 号》第⼀条规定处理。个人理解，供参考。","cat":"或有事项","kw":"预计负债,请教陈版及各位⽼师,关于弃置费⽤的使⽤问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第13号——或有事项"},{"id":"CY0159","q":"外币折算影响在报表附注中的披露","a":"凡是附注中需要披露增减变动情况的资产、负债项⽬，涉及外币折算时，都要增设⼀列“外币折算影响”作为平衡数。 ⼀般情况下，此类项⽬附注披露的基本范式是：期初余额+本期增加-本期减少=期末余额。这个公式在境外经营⼦ 公司⽤其本位币编制的报表附注中必然是成⽴的。但在将其折算到⼈民币时，期初余额是按期初即期汇率折合的， 期末余额是按期末即期汇率折合的，本期增加、减少数是采⽤与利润表相同的折算汇率（即本期平均汇率）折合的 （这是为了保证折算后的本期增减变动⾦额与利润表项⽬发⽣额之间存在勾稽关系）。因此简单地将折算后的期初余额+本期增加-本期减少，并不等于折算后的期末余额。此时就需要增设⼀个“外币折算影响”列作为平衡数。此时外币折算影响额=折算后期初余额+折算后本期增加数-折算后本期减少数。个人理解，供参考。","cat":"外币折算","kw":"外币折算影响在报表附注中的披露","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第19号——外币折算"},{"id":"CY0881","q":"变更本位币的总结","a":"准则的规定只是对⼤类项⽬的原则性规定，这⼀点在权益类中更明显。在财务报表中，特别是个别报表中，权益类项⽬的确认和计量在相当程度上是法律问题，即受到《公司法》等相关法律法规规定的限制。如果严格按照会计准则的处理结果与法律法规的规定冲突，则可作出⼀定的 调整以符合法律法规规定。最典型的就是实收资本科⽬的处理。 如此前回复所述，我们认为，在变更记账本位币时点上，按照变更后的本位币编制的第⼀张报表，应当是资产、负债项⽬按当⽇汇率折算⾄新本位币，权益类项⽬按发⽣⽇历史汇率折算到新本位币，差额体现在“其他综合收益 ——外币报表折算差额”中，但该项⽬不会再有新的发⽣额。个人理解，供参考。","cat":"外币折算","kw":"变更本位币的总结","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第19号——外币折算"},{"id":"CY1758","q":"记账本位币变更问题","a":"存在⼀定的变更记账本位币的合理性。 对照《企业会计准则第19号——外币折算》第五条、第六条关于确定记账本位币应考虑因素的规定来看，由于该公司是投资平台，第五条（⼀）（⼆）不适⽤，应主要考虑第五条（三）和第六条所列各项因素。由于委托贷款、⻓期借款的币种主要为欧元，相应的利息收⼊为欧元；同时⻓期股权投资和相应的股利收⼊币种为美元。与上年度相⽐，主要变化是逐步将美元借款置换为⼈⺠币借款。在此情况下，美元已不再是所处主要经济环境中的币种，投资活动的主要币种是欧元，更换记账本位币为欧元具有⼀定合理性。个人理解，供参考。","cat":"外币折算","kw":"记账本位币变更问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第19号——外币折算、《企业会计准则第19号——外币折算》"},{"id":"CY1309","q":"请问减资发⽣的实收资本是采⽤历史汇率还是即期汇率？","a":"在减资中，所减少的实收资本应按照当初其形成时的历史汇率折算；不能识别当前所减少的实收资本系对应于当初哪⼀天或哪⼏天新增的实收资本的，则按照历次出资和增资形成的加权平均汇率来折算。 如果采⽤当前减资⽇的即期汇率，则在当前的即期汇率和当初出资时的历史汇率差异很⼤的情况下，会导致剩余实收资本对应的折算汇率很怪异，既不代表当初出资时的历史汇率，也不代表当前的现时即期汇率。因此不建议采⽤该⽅法。个人理解，供参考。","cat":"外币折算","kw":"请教陈版主,请问减资发⽣的实收资本是采⽤历史汇率还是即期汇率","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第19号——外币折算"},{"id":"CY0964","q":"同⼀控制下吸收合并exchang reserve (权益类）的处理","a":"吸收合并后，A、B是否仍然各⾃独⽴运营？B公司原有业务经营所处的经济环境是否发⽣重⼤变化？ 如果仍独⽴运营，各⾃业务所处的主要经济环境不发⽣重⼤变化，则两部分各⾃保留原先的记账本位币，折算差额和汇兑损益⽆需特殊处理；如果B公司原有业务所处主要经济环境发⽣重⼤变化，则其记账本位币发⽣变化，对此前累积的其他综合收益（外币折算差额）继续保留，但不会再有新的发⽣额。个人理解，供参考。","cat":"外币折算","kw":"合并,同⼀控制下吸收合并exchang,reserve,权益类,的处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第19号——外币折算"},{"id":"CY0398","q":"《新冠肺炎疫情相关租⾦减让会计处理规定》简化处理⽅法","a":"⼀般理解，⾃2023年1⽉新冠实⾏“⼄类⼄管”起，该租⾦减让特别规定就不应继续执⾏。因此，针对2023年度的租 ⾦减让不适⽤该简化处理办法。 对于2023年内申请并获批的2022年度租⾦减免，由于是在2022年度财务报表批准报出后获批的，所以不属于2022年度的资产负债表⽇后事项。在此情况下，由于该简化处理规定的本意是将租⾦减让的损益影响直接体现在被减免当期的损益中（⽽不是通过调整使⽤权资产折旧的⽅式体现在本期及后期的成本中），⽽如果直接冲减2023年度的租 ⾦⽀出，显然也不是该简化处理⽅法的本意，因此也不建议简化处理，建议按照常规⽅法下的租赁变更原则处理， 即把减免的租⾦分别冲减使⽤权资产和租赁负债，相应调整使⽤权资产的后续折旧额和租赁负债的后续利息费⽤⾦额。个人理解，供参考。","cat":"租赁","kw":"租赁,折旧,《新冠肺炎疫情相关租⾦减让会计处理规定》简化处理⽅法","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁"},{"id":"CY0864","q":"PPP项⽬建设期收到政府补助应该如何处理？","a":"如果项⽬前期费⽤应当计⼊PPP项⽬的建设成本的，则对项⽬前期费⽤的补助，其补助对象实际上是该PPP项⽬建 设期间的营业成本。如果在收到补助款时相应的项⽬前期费⽤已发⽣完毕，且已全部结转⾄营业成本，则收到国内政府给予的补助款时，直接计⼊其他收益或者冲减营业成本；反之则应予以递延，到作为补偿对象的项⽬前期费⽤实际发⽣时计⼊其他收益或者冲减营业成本。 提问⼈：liqi15624980992 时间：2024-10-29 16:37:10 感谢陈版主的耐⼼回复。是否也可以从另⼀个⾓度理解，就是PPP项⽬实质上是政府购买服务，我们最终获得的特许经营权，实质上是政府⽅以⾮现⾦形式进⾏的结算，所以是⼀种收⼊回收的⽅式，⽽不是⽬的，所以认定为与收益相关更合理。 回答⼈：chenyiwei 不建议如此理解。个人理解，供参考。","cat":"政府补助","kw":"递延,PPP项⽬建设期收到政府补助应该如何处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第16号——政府补助"},{"id":"CY0346","q":"新公司法下资本公积弥补亏损的处理","a":"根据新公司法第214条：“公积⾦弥补公司亏损，应当先使⽤任意公积⾦和法定公积⾦；仍不能弥补的，可以按照规定使⽤资本公积⾦”。 即，资本公积的补亏需“按照规定”进⾏。⽽对应的规定（操作细则或者其他形式的细化规定）尚未出台。在此情况下，⽬前⽆法判断应如何处理。建议等待财政部（或者国务院）对此发布具体细则，在细则出台前不要进⾏补亏操作、 另外，新公司法是⾃2024年7⽉1⽇起实施，在此前资本公积补亏仍属于禁⽌⾏为。个人理解，供参考。","cat":"实务综合","kw":"新公司法下资本公积弥补亏损的处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0014","q":"和各位⽼师：企业调整业务后安全⽣产费结转的问题","a":"理论上应冲减当初计提时所计⼊的成本费⽤科⽬（即贷记销售成本）。如果本期已⽆销售成本，则贷记管理费⽤或者营业外收⼊也可以接受。个人理解，供参考。","cat":"实务综合","kw":"请教陈版主和各位⽼师,企业调整业务后安全⽣产费结转的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0339","q":"⽆追索权的商业承兑汇票是否终⽌确认","a":"仅仅约定”⽆追索权“不能认定满⾜终⽌确认条件。虽然形式上”⽆追索权“，但实质上仍保留风险和报酬的情况，在实务中是很多见的。 上一页 陈版主（陈奕蔚老师）答疑历史文章（2024年03月） 下一页 陈版主（陈奕蔚老师）答疑历史文章（2024年05月） 粤ICP备18107660号 粤公网安备44060602000887号 关于网站 Copyright © 2021-2026 会计便利店 hjyweb.cn 【个人理解，供参考。","cat":"实务综合","kw":"⽆追索权的商业承兑汇票是否终⽌确认","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0754","q":"少数股东出售少数股权对商誉的影响","a":"要考虑本次少数股东向第三⽅出售其股权的背后原因和定价逻辑，例如交易对⼿⽅与该少数股东之间是否为隐蔽的关联⽅关系、按净资产作价出售的原因等。另外，也要考虑A公司作为B的另⼀股东为何放弃优先购买权。 由于资产减值中的可收回⾦额是“两者孰⾼”的概念，因此仅仅依据⾮控股股权出售价格低于原长投账⾯价值的相应 ⽐例，不能认为母公司持有的控股股权已发⽣减值，例如，在测算未来现⾦流量现值时，A作为B的控股股东是否可以享有协同效应的影响。 若商誉减值测试时，测算的资产组可回收⾦额仍然⾼于包含商誉的资产组账⾯价值。可能会与少数股东的平价转让股权⾏为有冲突。所以还是需要了解少数股东低价出售是否有特殊的理由，以及控股股东所享有的协同效应是否仍存在。个人理解，供参考。","cat":"企业合并","kw":"商誉,减值,少数股东,请教陈版主,少数股东出售少数股权对商誉的影响","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY1444","q":"专项应付款中的财政预算直接拨付款","a":"应要求从财政专户直接拨款到被拆迁企业的银⾏账户，不能通过施⼯单位、⼟储中⼼、征收单位等“过⼿”，否则不能视为“直接拨付”。 由于拆迁征收政策以及财政预算管理政策的变化，⽬前实务中满⾜“由财政预算直接拨付”的情况已经很少⻅，基本上都是作为资产处置进⾏会计处理，确认资产处置损益。相关的⽐较完整的会计处理原则表述可参阅证监会发布的《监管规则适⽤指引——会计类第3号》之“3-10 搬迁补偿事项的会计处理”。个人理解，供参考。","cat":"实务综合","kw":"专项应付款中的财政预算直接拨付款","src":"陈奕蔚 会计视野论坛答
