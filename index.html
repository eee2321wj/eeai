<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>AI准则顾问</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--orange:#F97316;--orange-dark:#EA580C;--bg:#F9F8F6;--white:#FFF;--text:#1C1C1E;--secondary:#8E8E93;--border:#EEECEA;--radius:16px}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:800px;margin:0 auto;padding:20px}
.header{padding:30px 0 20px}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.logo-icon{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--orange),var(--orange-dark));display:flex;align-items:center;justify-content:center;color:var(--white);font-size:16px;font-weight:700}
.logo-text{font-size:14px;font-weight:600;color:var(--secondary);letter-spacing:.5px}
h1{font-size:36px;font-weight:800;margin-bottom:6px;letter-spacing:-0.5px}
h1 em{font-style:normal;color:var(--orange)}
.subtitle{font-size:14px;color:var(--secondary);margin-bottom:24px}
.stats{display:flex;gap:32px;margin-bottom:32px}
.stat-item{display:flex;flex-direction:column}
.stat-num{font-size:26px;font-weight:700;color:var(--text)}
.stat-label{font-size:12px;color:var(--secondary);margin-top:2px}
.tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:24px}
.tab{padding:14px 28px;font-size:15px;font-weight:600;color:#B0B0B6;cursor:pointer;border:0;background:none;position:relative;transition:color .2s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--text)}
.tab.active::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:3px;background:var(--orange);border-radius:2px 2px 0 0}
.panel{display:none}
.panel.active{display:block}
textarea{width:100%;padding:16px;font-size:16px;line-height:1.6;border:2px solid var(--border);border-radius:var(--radius);background:var(--white);color:var(--text);outline:0;font-family:inherit;resize:vertical;min-height:120px;margin-bottom:14px;transition:border-color .2s,box-shadow .2s}
textarea:focus{border-color:var(--orange);box-shadow:0 0 0 4px rgba(249,115,22,.08)}
textarea::placeholder{color:#C5C5C9}
.btn{width:100%;height:56px;border:0;border-radius:var(--radius);background:linear-gradient(135deg,var(--orange),var(--orange-dark));color:var(--white);font-size:18px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .2s,transform .1s;letter-spacing:.3px}
.btn:hover{opacity:.92}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.loading{display:none;align-items:center;justify-content:center;gap:10px;padding:20px;color:var(--secondary);font-size:14px}
.loading.show{display:flex}
.spinner{width:20px;height:20px;border:3px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.result{display:none;background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-top:16px;animation:fadeIn .3s}
.result.show{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.result-header{display:flex;align-items:center;gap:12px;margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.answer{font-size:15px;line-height:2;white-space:pre-wrap;word-break:break-word}
.sources{margin-top:22px;padding-top:20px;border-top:1px solid var(--border)}
.sources-title{font-size:13px;color:var(--secondary);margin-bottom:12px;font-weight:700;letter-spacing:.3px}
.source-item{padding:10px 14px;margin:8px 0;background:#FAFAF9;border-radius:10px;font-size:13px;line-height:1.6;cursor:pointer;transition:background .15s,box-shadow .15s;position:relative;border:1px solid transparent}
.source-item:hover{background:#F5F3F0;border-color:#E8E5E0;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.source-item.expanded{background:#FFF;border-color:var(--orange);box-shadow:0 2px 12px rgba(249,115,22,.1)}
.source-header{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.source-expand-icon{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:var(--border);color:var(--secondary);font-size:11px;font-weight:700;flex-shrink:0;transition:all .2s}
.source-item.expanded .source-expand-icon{background:var(--orange);color:#FFF;transform:rotate(45deg)}
.source-score{color:var(--orange);font-weight:700;font-size:12px;flex-shrink:0}
.source-content{color:var(--text);font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis}
.source-cat{font-size:10px;padding:2px 8px;border-radius:10px;background:#FFF7ED;color:var(--orange);font-weight:600;flex-shrink:0;white-space:nowrap}
.source-badge-qa{background:#FFF7ED;color:var(--orange)}
.source-badge-std{background:#EFF6FF;color:#3B82F6}
.source-detail{display:none;margin-top:12px;padding:16px;background:#FFF;border:1px solid var(--border);border-radius:10px;animation:fadeIn .25s}
.source-item.expanded .source-detail{display:block}
.source-detail-q{font-size:14px;font-weight:700;color:var(--text);margin-bottom:10px;line-height:1.7;padding-bottom:10px;border-bottom:1px dashed var(--border)}
.source-detail-q::before{content:'Q: ';color:var(--orange);font-size:16px}
.source-detail-a{font-size:13px;line-height:1.9;color:var(--text);white-space:pre-wrap}
.source-detail-a::before{content:'A: ';color:var(--orange);font-size:16px;font-weight:700}
.source-detail-meta{display:flex;gap:10px;margin-top:12px;padding-top:10px;border-top:1px solid var(--border);font-size:11px;color:var(--secondary);flex-wrap:wrap}
.source-detail-meta span{display:inline-flex;align-items:center;gap:3px}
.source-detail-meta .meta-label{color:#B0B0B6}
.source-detail-actions{margin-top:10px;display:flex;gap:8px}
.source-btn-copy{padding:4px 12px;border:1px solid var(--border);border-radius:6px;background:var(--white);color:var(--secondary);font-size:11px;cursor:pointer;transition:all .15s}
.source-btn-copy:hover{background:var(--orange);color:#FFF;border-color:var(--orange)}
.source-detail-source{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-size:11px;color:#6B7280;display:flex;align-items:center;gap:4px}
.source-detail-source .source-label{color:#B0B0B6;font-weight:600}
.source-detail-source a{color:var(--orange);text-decoration:none}
.source-detail-source a:hover{text-decoration:underline}
.source-hint{font-size:11px;color:#B0B0B6;margin-top:6px}
.source-hint kbd{display:inline-block;padding:1px 6px;background:#EFEFEF;border-radius:4px;font-family:inherit;font-size:11px;border:1px solid #D5D5D5}
.compare-result{display:none;gap:20px;margin-top:16px}
.compare-result.show{display:grid;grid-template-columns:1fr 1fr}
.compare-col{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:22px;animation:fadeIn .3s}
.compare-label{font-size:12px;font-weight:700;padding:5px 14px;border-radius:20px;display:inline-block;margin-bottom:14px}
.compare-label.expert{background:#FFF7ED;color:var(--orange)}
.compare-label.generic{background:#F5F5F7;color:var(--secondary)}
.error{display:none;background:#FEF2F2;border:1px solid #FECACA;border-radius:12px;padding:14px 18px;margin-top:16px;color:#991B1B;font-size:14px;line-height:1.6}
.error.show{display:block}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;background:#D1D5DB}
.status-dot.online{background:#22C55E}
.status-dot.offline{background:#EF4444}
.footer{text-align:center;padding:40px 20px 36px;font-size:12px;color:#B0B0B6}
.answer h1,.answer h2,.answer h3,.answer h4{font-weight:700;margin:20px 0 10px;line-height:1.3}
.answer h1{font-size:22px;border-bottom:2px solid var(--border);padding-bottom:8px}
.answer h2{font-size:18px;border-bottom:1px solid var(--border);padding-bottom:6px}
.answer h3{font-size:16px}
.answer h4{font-size:15px;color:var(--secondary)}
.answer p{margin:10px 0}
.answer ul,.answer ol{padding-left:24px;margin:10px 0}
.answer li{margin:4px 0;line-height:1.8}
.answer strong{font-weight:700;color:var(--text)}
.answer em{font-style:italic;color:var(--orange)}
.answer blockquote{border-left:4px solid var(--orange);padding:10px 16px;margin:14px 0;background:#FFF7ED;border-radius:0 8px 8px 0;color:#9A3412;font-size:14px}
.answer code{font-family:"SF Mono","Fira Code","Consolas",monospace;font-size:13px;background:#F3F4F6;padding:2px 6px;border-radius:4px;color:#DC2626}
.answer pre{background:#1C1C1E;color:#E5E7EB;padding:16px 20px;border-radius:12px;overflow-x:auto;margin:14px 0;font-size:13px;line-height:1.7}
.answer pre code{background:none;color:inherit;padding:0;font-size:inherit}
.answer table{width:100%;border-collapse:collapse;margin:14px 0;font-size:13px}
.answer th{background:#F9F8F6;padding:10px 14px;text-align:left;font-weight:700;border-bottom:2px solid var(--border)}
.answer td{padding:10px 14px;border-bottom:1px solid var(--border)}
.answer tr:hover td{background:#FAFAF9}
.answer a{color:var(--orange);text-decoration:underline}
.answer hr{border:0;height:1px;background:var(--border);margin:20px 0}
.answer img{max-width:100%;border-radius:8px}
/* 关联依据高亮样式 */
.std-ref-badge{display:flex;align-items:flex-start;gap:8px;padding:14px 18px;margin-bottom:18px;background:linear-gradient(135deg,#EFF6FF,#F0F9FF);border:1px solid #BFDBFE;border-radius:10px;font-size:13px;line-height:1.8;color:#1E40AF;animation:highlightPulse .6s}
.std-ref-badge .std-ref-icon{font-size:18px;flex-shrink:0;line-height:1.8}
.std-ref-badge .std-ref-text{font-weight:600}
.std-ref-badge .std-ref-list{color:#3B5998}
@keyframes highlightPulse{from{background:#DBEAFE;transform:scale(1.01)}to{background:linear-gradient(135deg,#EFF6FF,#F0F9FF);transform:scale(1)}}
@media(max-width:640px){
  .container{padding:16px}
  h1{font-size:28px}
  .stats{gap:20px}
  .tab{padding:12px 18px;font-size:14px}
  .compare-result.show{grid-template-columns:1fr 1fr;gap:10px}
  textarea{min-height:100px}
  .answer h1{font-size:19px}.answer h2{font-size:16px}.answer h3{font-size:15px}
  .answer pre{font-size:12px;padding:12px 14px}
}
</style>
</head>
<body>
<div class="container">
<div class="header">
  <div class="logo"><div class="logo-icon">AI</div><span class="logo-text">准则AI顾问 <span class="status-dot" id="status-dot"></span></span></div>
  <h1>智能准则<em>答疑</em></h1>
  <p class="subtitle">基于资深技术合伙人知识库，24h在线解答会计准则疑难</p>
  <div class="stats">
    <div class="stat-item"><span class="stat-num" id="kb-count">--</span><span class="stat-label">知识条目</span></div>
    <div class="stat-item"><span class="stat-num" id="kb-queries">24</span><span class="stat-label">在线答疑</span></div>
    <div class="stat-item"><span class="stat-num">可追溯</span><span class="stat-label">引用来源</span></div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('ask',this)">提问答疑</button>
  <button class="tab" onclick="switchTab('compare',this)">风格对比</button>
</div>

<div id="panel-ask" class="panel active">
  <textarea id="input-ask" placeholder="输入你的会计准则问题...&#10;例如：合同资产和应收账款怎么区分？"></textarea>
  <button class="btn" id="btn-ask" onclick="doAsk()">开始查询</button>
  <div class="loading" id="loading-ask"><div class="spinner"></div><span>AI 正在分析中，请稍候...</span></div>
  <div class="error" id="error-ask"></div>
  <div class="result" id="result-ask">
    <div class="result-header">
      <span style="font-size:12px;color:var(--secondary)">匹配知识条目：<span id="match-count-ask">0</span> 条</span>
    </div>
    <div class="answer" id="answer-ask"></div>
    <div class="sources" id="sources-ask"></div>
  </div>
</div>

<div id="panel-compare" class="panel">
  <textarea id="input-compare" placeholder="输入问题，对比专家风格与通用风格的回答差异..."></textarea>
  <button class="btn" id="btn-compare" onclick="doCompare()">开始对比</button>
  <div class="loading" id="loading-compare"><div class="spinner"></div><span>AI 正在进行风格对比，请稍候...</span></div>
  <div class="error" id="error-compare"></div>
  <div class="compare-result" id="result-compare">
    <div class="compare-col">
      <div class="compare-label expert">专家风格</div>
      <div class="answer" id="answer-expert"></div>
    </div>
    <div class="compare-col">
      <div class="compare-label generic">通用风格</div>
      <div class="answer" id="answer-generic"></div>
    </div>
  </div>
</div>

<div class="footer">准则AI顾问 v4.5 - 内置779条知识库 | 多元可信来源 | 关联准则依据 | Powered by DeepSeek</div>
</div>

var KB = {"qa_count":709,"std_count":70,"entries":[{"id":"4043","q":"控股股东替子公司承担股份支付费用的处理？\"","a":"控股股东（母公司）替子公司承担股份支付费用时的处理：①子公司单体报表——该费用按CAS 11在受益期内确认，同时确认一项权益（资本公积），但该权益的对方是母公司的资本注入（母公司替其支付）；②母公司单体报表——确认\"对子公司的长期股权投资\"的增加（借方）和权益（贷方），因母公司替子公司\"付账\"属于资本投入；③合并层面——最终表现为费用化+资本公积（权益的\"来源\"在母公司单体已确认）。此处理体现了实质重于形式原则。个人理解，供参考。\"","cat":"股份支付\"","kw":"","std_ref":"","src":"中国注册会计师协会 专业技术指导"},{"id":"4042","q":"企业回购库存股（Treasury Stock）对每股收益的影响？\"","a":"企业回购库存股的EPS处理：①库存股属于权益的减项（不享有股息和表决权）——因此回购后发行在外普通股加权平均数=总发行股数-回购的库存股加权平均数；②回购时点按时间加权计算平均库存股数量；③回购持有的库存股不参与计算基本EPS，但如库存股重新发行则自发行日起加权计入分母；④企业持有的库存股在\"稀释EPS\"算法中不作为潜在普通股处理。如果企业用借款大量回购股份->EPS可能因分母减少而提升，但同时增加了财务风险。个人理解，供参考。\"","cat":"每股收益\"","kw":"","std_ref":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"4041","q":"本期发生股票股利和股票分拆对每股收益的重述？\"","a":"本期发生股票股利、资本公积转增股本、股票分拆，EPS计算需进行如下调整：①基本EPS——对比较期（所有列报期间）的发行在外普通股加权平均数进行追溯调整（假设该资本变动在最早列报期初已发生）；②稀释EPS——同理对所有比较期的分母进行重述。原因是此类资本变动不改变企业的资源总量（仅改变股份数量），追溯调整保证前后各期的EPS可比。现金增资和新股发行的EPS不需追溯调整。个人理解，供参考。\"","cat":"每股收益\"","kw":"","std_ref":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"4040","q":"可转换债券对基本每股收益和稀释每股收益的影响？\"","a":"可转换债券对EPS的影响仅在稀释计算中考虑：①基本每股收益——不考虑可转债的潜在稀释效应（以已发行的普通股为分母）；②稀释每股收益——将可转债视为在期初（或发行日）已转换为普通股：分子调整（加回税后的可转债利息），分母增加假设转换的股份数。判断是否稀释：计算增量每股收益=可转债利息（税后）/假设转换股数——若低于基本EPS则为稀释性（纳入），高于则为反稀释（不纳入）。个人理解，供参考。\"","cat":"每股收益\"","kw":"","std_ref":"","src":"上海证券交易所 会计监管动态"},{"id":"4039","q":"合并现金流量表中少数股东权益变动的处理？\"","a":"合并现金流量表中的少数股东变动处理：①购买少数股东权益——筹资活动现金流出（母公司作为收购方）；②出售子公司部分股权但不丧失控制权——筹资活动现金流入（属于权益交易而非处置）；③子公司向少数股东分配股利——筹资活动现金流出；④分步实现非同一控制下企业合并取得子公司——原持有权益的重新计量不影响现金流量（仅影响合并成本），但实际支付的新增对价属于投资活动现金流出。重要：现金及现金等价物=合并日子公司持有的余额需单独列示。个人理解，供参考。\"","cat":"现金流量表\"","kw":"","std_ref":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"4038","q":"现金流量表补充资料——净利润调整为经营活动现金流量的过程？\"","a":"间接法下将净利润调整为经营活动现金净流量的调节项目：①加回：不需支付现金的费用（折旧、摊销、资产减值损失、信用减值损失）；②加回/减去：非经营损益（处置固定资产损失/收益、公允价值变动损益、投资收益）；③减去：经营性应收项目的增加（如应收账款余额上涨减少了现金流量）；④加回：经营性应付项目的增加（如应付账款余额上涨增加了现金流量）；⑤加上：递延所得税资产减少或负债增加。核心原则：将权责发生制下的净利润调整为收付实现制下的经营现金净流量。个人理解，供参考。\"","cat":"现金流量表\"","kw":"","std_ref":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"4037","q":"银行承兑汇票和商业汇票的现金流量列报？\"","a":"银行承兑汇票和商业汇票的现金流量处理：①收到银行承兑汇票->不产生现金流入（不涉及现金及现金等价物）->在附注中披露；②到期收到票款或贴现（贴现不终止确认）->经营活动现金流入；③开具银行承兑汇票支付货款->不产生现金流出（在附注中披露），到期兑付用于支付的票款->经营活动现金流出；④商业汇票贴现且终止确认->经营活动/筹资活动现金流入（取决于贴现的目的是结算货款还是融资）。个人理解，供参考。\"","cat":"现金流量表\"","kw":"","std_ref":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"4036","q":"租赁相关的现金流量如何列报？\"","a":"新租赁准则下承租人的现金流量列报：①偿还租赁负债的本金——筹资活动现金流出；②偿还租赁负债的利息——属于筹资活动（但也可按会计政策一致性选择为经营活动）；③短期租赁和低价值资产租赁的付款——经营活动现金流出；④可变租赁付款额（不纳入租赁负债的部分）——经营活动现金流出。关键变化：原准则下所有经营租赁付款均在经营活动->新准则下本金部分移入筹资活动，导致经营活动现金流出减少、筹资活动现金流出增加。个人理解，供参考。\"","cat":"现金流量表\"","kw":"","std_ref":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"4035","q":"现金流量表中经营活动与投资活动现金流如何区分？\"","a":"区分经营活动和投资活动现金流量的一般原则：①经营活动——与日常主营活动相关的现金流量（如销售商品收到的现金、购买原材料支付的现金、支付员工薪酬）；②投资活动——与长期资产购置和处置、对外投资相关的现金流（如购建固定资产、取得子公司、理财产品的购买与赎回）。特殊情形：①银行活期存款利息——经营活动；②定期存款利息——投资活动（因定期存款本质上为短期投资）；③三个月内到期的高流动性理财产品——等价现金而非投资。个人理解，供参考。\"","cat":"现金流量表\"","kw":"","std_ref":"","src":"中国注册会计师协会 专业技术指导"},{"id":"4034","q":"破产重整中债务重组的特殊会计处理？\"","a":"破产重整中的债务重组（法院裁定批准的重整计划）：①重整计划经法院批准且企业进入重整执行期后->按重整计划裁定的债务清偿方案确认债务重组损益；②重整期间的会计处理依据仍为CAS 12债务重组准则；③重整企业通常处于非持续经营状态（以清算基础计量），重整成功后可能恢复持续经营假设。特殊点：重整计划中可能涉及\"债转股+延期+减息\"的组合方式，需逐项拆分核算。上市公司重整须同时符合证监会的披露要求。个人理解，供参考。\"","cat":"债务重组\"","kw":"","std_ref":"","src":"中国证监会 会计监管工作通讯"},{"id":"4033","q":"属于同一控制下企业合并的债务豁免处理？\"","a":"集团内部债务豁免（母公司豁免子公司债务、或同一集团内兄弟公司之间的债务豁免）通常属于权益性交易：①债务人（子公司）——债务豁免差额计入资本公积（而非损益），因为这是母公司作为股东的资本投入；②债权人（母公司或兄弟公司）——豁免金额作为长期股权投资的投资成本追加（母公司）或权益分配（兄弟公司）。非同一集团内的非关联方之间的债务豁免则计入当期损益。判断的关键是交易是否具有\"资本投入\"的实质。个人理解，供参考。\"","cat":"债务重组\"","kw":"","std_ref":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"4032","q":"债务转为资本（债转股）的会计处理和注意事项？\"","a":"债务转为资本的会计处理要点：①债务人确认权益工具的公允价值（如合同约定转股数则以合同价计量，否则以股份公允价值或债务公允价值中更可靠的计量）；②债务账面价值与权益工具公允价值的差额计入当期损益（投资收益或其他收益——以其他权益工具投资清偿的计入投资收益）；③所确认的权益工具不能指定为FVOCI（已发行股份）；④债权人取得股权按放弃债权公允价值+相关税费确认。市场化的债转股与政策性的债转股处理可能不同（后者可能涉及资本公积）。个人理解，供参考。\"","cat":"债务重组\"","kw":"","std_ref":"","src":"财政部 企业会计准则解释公告"},{"id":"4031","q":"债务重组中债权人的坏账准备如何处理？\"","a":"债权人已对重组债权计提了坏账准备的，应先冲减已计提的坏账准备：①重组债权公允价值-账面余额=重组损益；②处置过程中如有坏账准备的转入——借：坏账准备，贷：信用减值损失（冲回）。重组后确认的新债权（如修改条款后）按CAS 22以摊余成本或公允价值进行后续计量，重新评估预期信用损失。注意：重组并非自动触发终止确认——需判断债权条款的修改是否\"实质性\"。个人理解，供参考。\"","cat":"债务重组\"","kw":"","std_ref":"企业会计准则第22号——金融工具确认和计量","src":"财政部 企业会计准则解释公告"},{"id":"4030","q":"债务重组的主要方式及各自的会计处理特点？\"","a":"CAS 12规定的债务重组方式包括：①以资产清偿债务——债务人确认资产处置损益+债务重组损益（差额入其他收益/投资收益），债权人按放弃债权的公允价值+相关税费确认取得资产的成本，差额计入当期损益；②债务转为权益工具（债转股）——债务人初始确认权益工具按公允价值计量，差额入当期损益；③修改其他债务条款——如延期、减息、免息，按修改后现金流量的现值重新计量新金融负债。注意：非关联方之间的债务豁免通常属于权益性交易（计入资本公积）。个人理解，供参考。\"","cat":"债务重组\"","kw":"","std_ref":"","src":"会计准则委员会 准则实施问答"},{"id":"4029","q":"清算联营企业的会计处理？\"","a":"联营企业进入清算程序时，投资方的会计处理原则：①权益法仍然适用，但被投资方已改按非持续经营基础编制财务报表->投资方应相应调整；②投资降至可收回金额->如可收回金额<账面价值，计提减值准备；③清算期间通常不确认投资收益（因无盈利）仅确认清算费用和资产变现的损失/收益；④最终取得清算分配时->与剩余投资成本比较，差额计入投资收益或损失。注意：清算可能触发的税务后果（如处置损益的纳税义务）。个人理解，供参考。\"","cat":"长期股权投资\"","kw":"","std_ref":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"4028","q":"权益法下年度中间购入联营企业股权的处理？\"","a":"权益法核算需自取得重大影响的日期开始对净利润及其OCI进行调整。如5月购买股权（取得重大影响日），以下5-12月期间按持股比例计算投资收益。调整分录：①取得日至资产负表日净值变动（净利润+OCI）×持股比例；②该期间发生的内部交易未实现损益按持股比例消除。注意：购买日与取得重大影响日可能不同——取得股权登记日和实质影响力的取得日是认定的关键。权利产生（如工商变更完成、董事会改组完成）是取得影响力日的常见认定时点。个人理解，供参考。\"","cat":"长期股权投资\"","kw":"","std_ref":"","src":"深圳证券交易所 会计监管动态"},{"id":"4027","q":"长期股权投资初始成本中发行权益工具的费用处理？\"","a":"为取得长投而发行权益工具（如股票）所发生的发行成本（承销费、法律费、印刷费）：①同一控制下企业合并->冲减资本公积（溢价），不足->冲减留存收益；②非同一控制下企业合并->同样冲减资本公积（溢价），不计入合并成本或当期损益。这与以现金收购不同：现金收购的中介费计入当期损益（费用化）。但发行债务工具的费用需计入债务工具的初始成本并影响实际利率。区分不同工具类型的费用是正确核算的前提。个人理解，供参考。\"","cat":"长期股权投资\"","kw":"","std_ref":"","src":"上海证券交易所 会计监管动态"},{"id":"4026","q":"持股比例不变但影响力变化（如董事席位变化）的处理？\"","a":"影响力变化（如委派董事的权利取得或失去）可导致核算方法变更：①成本法->权益法（取得重大影响）->自取得日起按持股比例对净利润和其他综合收益进行权益法调整（相当于模拟自取得日法）；②权益法->成本法（丧失重大影响）->剩余股权按公允价值重新计量，差额计入当期损益。影响力变化的原因多样：被投资方章程修改导致无法委派董事、被动增持或减持等非自主因素。个人理解，供参考。\"","cat":"长期股权投资\"","kw":"","std_ref":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"4025","q":"联营企业变为子公司（从权益法->合并）的购买日处理？\"","a":"属于分步实现企业合并：①原联营权益在购买日按公允价值重新计量，差额计入投资收益；②原权益法下与该联营企业相关的OCI->按处置基础转入当期损益（可重分类的）或留存收益（不能重分类的）；③购买日合并对价=原权益公允价值+新增对价；④被购买方净资产按购买日公允价值纳入合并报表（而非延续原账面值）；⑤产生商誉。个人理解，供参考。\"","cat":"长期股权投资\"","kw":"","std_ref":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"4024","q":"长期股权投资减值准备的确认和测试？\"","a":"CAS 2规定长期股权投资需进行减值测试（与一般长期资产相同）：①有减值迹象时->比较账面价值和可收回金额（FVLCD与VIU较高者）；②减值损失确认后不得转回（与固定资产规则一致）。商誉测试的特殊性：当合并对价中包含高额商誉时，需评估长投中包含的商誉是否应进行减值测试。测试方法：比较包含商誉的该投资整体与可收回金额——而非单独测试商誉。个人理解，供参考。\"","cat":"长期股权投资\"","kw":"","std_ref":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"4023","q":"权益法核算下被投资方其他综合收益变动的处理？\"","a":"被投资方的OCI变动（如FVOCI权益工具的公允价值变动），投资方应按持股比例逐项确认：①被投资方\"不能重分类进损益的OCI\"（如其他权益工具投资公允价值变动）->投资方相应地确认为\"不能重分类进损益的OCI\"；②被投资方\"可重分类进损益的OCI\"（如外币折算差额）->投资方相应地确认为\"可重分类进损益的OCI\"。投资方处置时按各自规则结转（不能重分类的->转入留存收益；可重分类的->转入损益）。个人理解，供参考。\"","cat":"长期股权投资\"","kw":"","std_ref":"","src":"中国证监会 会计监管工作通讯"},{"id":"4022","q":"合营安排中共同经营和合营企业的区分处理？\"","a":"CAS 40将合营安排分为两类：①共同经营——各参与方独自享有资产权利、承担负债义务->按持股比例确认各自份额的资产和负债（不单独确认长投）；②合营企业——合营方对合营安排的净资产享有权利->按权益法确认为长期股权投资。区分的关键：安排的结构和法律形式——如在单独主体（法人企业）中->通常是合营企业（用权益法）；如无单独主体->通常是共同经营（用比例法）。石油勘探的联合作业协议（Joint Operating Agreement）是典型的共同经营。个人理解，供参考。\"","cat":"长期股权投资\"","kw":"","std_ref":"","src":"中国证监会 会计监管工作通讯"},{"id":"4021","q":"长期股权投资成本法和权益法转换的临界点？\"","a":"长投方法的转换以\"重大影响\"为临界点：①持股比例20%以下（且无明显重大影响的证据）->成本法（但满足CAS 22的作为金融资产处理）；②20%-50%（或虽不到20%但有董事席位、参与决策等证据）->权益法（有重大影响）；③超过50%（或有控制的其他证据）->纳入合并范围。重大影响的判断是实务的核心：即使持股不足20%，如果投资方委派了董事、提供了关键技术许可或派出了关键管理人员，仍可能被认为具有重大影响。个人理解，供参考。\"","cat":"长期股权投资\"","kw":"","std_ref":"","src":"上海证券交易所 会计监管动态"},{"id":"4020","q":"权益法下未实现内部交易损益的消除（逆流交易）？\"","a":"权益法下逆流交易（被投资方向投资方销售）产生的未实现内部交易损益，投资方应按持股比例将归属于自身的份额消除——从投资收益中扣除。分录为：借\"投资收益\"、贷\"长期股权投资——损益调整\"（影响投资方单体报表和合并报表的金额相同）。后续在该项资产对外部处置或计提折旧时再按比例加回已消除部分。基本原则：在投资方和联营企业之间，未实现损益的消除仅按持股比例（不是全额），这与子公司合并报表中全额消除母子公司间内部交易有本质区别。个人理解，供参考。\"","cat":"长期股权投资\"","kw":"","std_ref":"","src":"深圳证券交易所 会计监管动态"},{"id":"4019","q":"负债的账面价值与计税基础的差异示例？\"","a":"负债的暂时性差异来源示例：①预提费用的账面价值>计税基础（税务在实际发生时扣除）->产生可抵扣暂时性差异（确认递延所得税资产）；②预计负债（如保修义务、环境修复义务）的账面价值>计税基础->同上；③已收预付款的计税基础已在收到时纳税，而会计在履约时确认收入->产生应纳税暂时性差异（确认递延所得税负债）。基本原则：任何导致未来应纳税所得额增加或减少的资产/负债差异均可能产生递延所得税影响。个人理解，供参考。\"","cat":"所得税\"","kw":"","std_ref":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"4018","q":"递延所得税资产减值（估值准备）的评估？\"","a":"每个资产负债表日需对递延所得税资产的账面价值进行评估——当不再很可能获得足够的应纳税所得额以利用可抵扣差异时，需将已确认的资产减记。减值可能在后续期间转回——当未来盈利能力恢复且重新满足\"很可能\"条件时。转回的上限为假设未发生减值的账面价值（即原来的确认金额）。减值评估需考虑：未来收入预测、成本控制计划、新业务的开展计划、税务筹划的可行性等内部因素和外部市场预测。个人理解，供参考。\"","cat":"所得税\"","kw":"","std_ref":"","src":"会计准则委员会 准则实施问答"},{"id":"4017","q":"所得税在财务报表中的列报位置？\"","a":"所得税费用在利润表中的列报分三部分：①当期所得税费用——本期应缴或应退税额；②递延所得税费用——暂时性差异的本期变动合计；③所得税费用合计=①+②。在资产负债表中：递延所得税资产与递延所得税负债不抵销（除非有法定抵销权且意图以净额结算）。其他综合收益和权益变动中也可能涉及所得税影响（如其他权益工具投资的公允价值变动对应的OCI税后净额）。个人理解，供参考。\"","cat":"所得税\"","kw":"","std_ref":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"4016","q":"同一控制下企业合并涉及递延所得税的处理？\"","a":"同一控制下企业合并的递延所得税处理与非同控有所不同：①以被合并方账面价值为基础——不重新计量资产/负债的公允价值（与非同控不同），因此一般无新的暂时性差异产生；②被合并方原有的递延所得税资产/负债->一并结转至合并报表（按其原有的计量基础）；③无需在合并日确认商誉递延所得税（因同控不产生商誉）。但需注意：收购过程中产生的交易费用产生的税款差异需处理。个人理解，供参考。\"","cat":"所得税\"","kw":"","std_ref":"","src":"财政部 企业会计准则解释公告"},{"id":"4015","q":"企业境外所得税抵免和递延处理的差异？\"","a":"企业境外所得税抵免的会计处理：①境外子公司在当地已缴纳所得税->以税收抵免凭证（国外纳税证明）为依据申请国内税收抵免；②限额抵免制——境外所得税抵免额不超过该境外所得按中国税率计算的税额（即25%为上限）；③超过抵免限额的部分可向后结转5年；④在合并层面确认境内外所得税费用，分别列示。递延所得税的处理同理——境外暂时性差异与境内相同，但需按当地适用税率计量。个人理解，供参考。\"","cat":"所得税\"","kw":"","std_ref":"","src":"财政部 企业会计准则解释公告"},{"id":"4014","q":"企业所得税汇算清缴后的调整和会计处理？\"","a":"年度企业所得税汇算清缴后发现的差异分两类：①汇算清缴期内（5月31日前）->发现的申报差异调整应纳税所得额并补/退税，会计上确认应收/应付税款；②汇算清缴期后->需判断是否为前期差错。若为前期差错（计算错误、遗漏扣除等），按追溯调整法更正前期所得税费用和应交税费；若为新发现的事实变化（如新税收政策解释）->按当期调整。此外，税务稽查补税及滞纳金->履行纳税义务时确认（计营业外支出或调整前期税款）。个人理解，供参考。\"","cat":"所得税\"","kw":"","std_ref":"","src":"财政部 企业会计准则解释公告"},{"id":"4013","q":"递延所得税的计量所采用的税率？\"","a":"递延所得税应以预期暂时性差异转回期间的适用税率计量：①已立法或实质上已立法的税率；②考虑未来的税率变更（如已知的税率下降/上升）；③不可使用资产负债表日的税率（若预计转回期间税率不同）。例如：中国内地目前所得税率25%，但高新技术企业享受15%优惠税率——如企业预计未来几年可保持高企资格，则递延所得税以15%计量。不同税率下的递延所得税应分别计算、分别列示。个人理解，供参考。\"","cat":"所得税\"","kw":"","std_ref":"","src":"会计准则委员会 准则实施问答"},{"id":"4012","q":"与子公司、联营企业、合营企业投资相关的递延所得税？\"","a":"与子公司/联营/合营投资相关的暂时性差异分情况确认：①母公司能控制差异转回的时间且该差异在可预见的未来很可能不会转回->不确认递延所得税负债（如未分配的子公司盈余）；②反之->确认递延所得税负债。确认时需考虑：公司是否有明确利润分配计划？是否受资金管制限制？股息预提税税率多少？可抵扣差异仅在很可能转回且能产生抵扣时才确认资产。个人理解，供参考。\"","cat":"所得税\"","kw":"","std_ref":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"4011","q":"企业未弥补亏损的递延所得税处理？\"","a":"未弥补亏损（税务亏损结转）可产生可抵扣暂时性差异：①可在未来5年（高新技术企业10年）内抵扣应纳税所得额->确认递延所得税资产；②但确认前需评估：企业是否有足够的未来应纳税所得额可利用该亏损？是否有具体扭转计划（如业务重组、新增盈利业务）？③每个资产负债表日重新评估——预计不能利用的部分转入减值损失。此外，税法允许弥补的亏损有年度限制——超出法定年限未能抵扣的部分自动失效。个人理解，供参考。\"","cat":"所得税\"","kw":"","std_ref":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"4010","q":"递延所得税资产的确认条件和上限？\"","a":"递延所得税资产的确认需满足\"很可能\"（>50%概率）获得未来应纳税所得额以抵扣可抵扣暂时性差异和可抵扣亏损的条件。实务中：①对未来盈利的预测需经董事会批准、有合理依据、一定期间（通常不超过5年）；②长期亏损企业一般不能确认递延所得税资产（除非有具体反转计划且可证明）；③每个资产负债表日重新评估——不满足条件的分期转回。注意：确认的上限不应超过企业未确认递延所得税负债的同期和同等金额（即两者的匹配性）。个人理解，供参考。\"","cat":"所得税\"","kw":"","std_ref":"","src":"会计准则委员会 准则实施问答"},{"id":"4009","q":"固定资产使用方式的重大变化是否需要减值测试？\"","a":"固定资产的使用意图或方式发生重大变化（如闲置、提前处置计划、用途改变）通常构成减值迹象，需进行减值测试。测试步骤：①对已闲置/待处置资产——可收回金额=公允价值减处置费用（不再计算VIU，因不产生未来经营现金流）；②对用途改变资产（如工厂改为仓库）——按新用途估计未来现金流；③重估日可收回金额与其账面价值的差异确认减值损失或终止确认。注意：临时闲置（不超过一年的正常维修）不构成减值迹象。个人理解，供参考。\"","cat":"资产减值\"","kw":"","std_ref":"","src":"会计准则委员会 准则实施问答"},{"id":"4008","q":"包含商誉的资产组组合的减值测试频率？\"","a":"CAS 8对商誉要求每年进行减值测试——无论是否存在减值迹象。包含商誉的资产组或资产组组合应在每年相同的时间进行测试。如果商誉在并购当年不能全部分摊至期末资产组->则必须在购买日至第一个资产负债表日之间的任何减值迹象出现时进行测试。实务中，大多数企业选择在年末进行商誉减值测试，使用经批准的预算/预测数据。中期发生在任何减值迹象时也需测试。个人理解，供参考。\"","cat":"资产减值\"","kw":"","std_ref":"企业会计准则第8号——资产减值","src":"中国注册会计师协会 专业技术指导"},{"id":"4007","q":"资产组（CGU）的可收回金额与账面价值的比较？\"","a":"当资产组的可收回金额低于其账面价值时需确认减值损失。其分摊顺序：①先抵减该资产组或资产组组合中分摊的商誉账面价值（商誉\"先受伤\"）；②然后按其他各项资产的账面价值所占比例分摊剩余的减值损失（但每项资产不得低于其自身FVLCD、VIU或零中的最高值）；③分摊后单项资产的账面价值低于零或FVLCD的差额应重新分配至其他资产。这种分层分摊机制体现了商誉作为\"第一道防线\"的性质。个人理解，供参考。\"","cat":"资产减值\"","kw":"","std_ref":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"4006","q":"在建工程是否需要进行减值测试？\"","a":"在建工程属于长期资产范畴，需在出现减值迹象时进行减值测试。减值迹象包括：①项目长期停建或明显延期；②技术过时或市场需求消失；③建造成本明显超过预算且预计不能收回。测试方法：对在建工程单独测试有困难时可纳入其未来所属的资产组/资产组组合进行测试。在建工程减值确认后同样不得转回，因此初期预算和技术评估应审慎以确保工程完成后能产生足够现金流。个人理解，供参考。\"","cat":"资产减值\"","kw":"","std_ref":"","src":"深圳证券交易所 会计监管动态"},{"id":"4005","q":"长期资产减值损失确认后可否转回？\"","a":"CAS 8对长期资产（固定资产、无形资产、商誉）减值损失的处理：①固定资产、无形资产——减值损失一经确认，后续不得转回（与存货不同）；②商誉——确认后同样不得转回；③仅持有待售的长期资产在满足特定条件下可以转回（最多转至假定未发生减值的账面价值）。核心原则：国际财务报告准则（IFRS）亦然——固定资产/无形资产减值不允许转回。这体现了稳健性原则——防止企业利用减值转回操纵利润。个人理解，供参考。\"","cat":"资产减值\"","kw":"","std_ref":"","src":"会计准则委员会 准则实施问答"},{"id":"4004","q":"长期资产减值测试中折现率如何确定？\"","a":"使用价值（VIU）计算中的折现率应为反映当前市场对货币时间价值和该资产特定风险的税前折现率。实务方法：①优先使用企业的加权平均资本成本（WACC）作为起点，并调整以反映该资产组比整个企业更高的或更低的风险水平；②WACC应为基于市场数据的税前折现率（即除以(1-所得税率)）。多个资产组或CGU的折现率应反映不同的风险水平——不能对所有资产组用同一折现率。个人理解，供参考。\"","cat":"资产减值\"","kw":"","std_ref":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"4003","q":"资产可收回金额的两种计量方法及优先顺序？\"","a":"可收回金额取下列两者的较高者：①公允价值减去处置费用的净额（FVLCD）——假设有序交易中资产或资产组可及时获取的金额（优先使用活跃市场报价、次为估值技术）；②使用价值（VIU）——基于估计未来现金流折现的内在价值。实务中优先选择FVLCD，因为：①较多资产有市场交易数据可参考；②采用VIU涉及多项主观假设（折现率、增长预测）更容易引起监管关注。当FVLCD明确高于账面值时无需计算VIU。个人理解，供参考。\"","cat":"资产减值\"","kw":"","std_ref":"","src":"中国证监会 会计监管工作通讯"},{"id":"4002","q":"使用寿命不确定的无形资产减值测试频率？\"","a":"使用寿命不确定的无形资产（如无限期商标、特许权）应每年进行减值测试，无论是否有减值迹象。这与有使用寿命的无形资产不同——后者仅在存在减值迹象时才需测试。减值测试可用单个资产的可收回金额：取公允价值减处置费用的净额与使用价值的较高者。一旦确定使用寿命变为有限，需转为摊销+减值测试的常规模式。无限期资产的贬值将在减值测试日一次性确认损失——一次性损失是其主要风险。个人理解，供参考。\"","cat":"资产减值\"","kw":"","std_ref":"","src":"中国证监会 会计监管工作通讯"},{"id":"4001","q":"商誉减值测试中资产组（或资产组组合）的确定？\"","a":"商誉减值测试的资产组或资产组组合应为能从企业合并协同效应中受益的、最小的一组资产组。确定原则：①不应当大于按照CAS 35所确定的报告分部（segment）；②应反映企业管理层对商誉的监控方式（如按业务条线或区域）；③后续组织架构变化需调整资产组划分（但在测试日沿用原划分）。实务中难点：当同一收购的商誉与多业务单元相关时，需将商誉分摊到预期受益的各资产组。个人理解，供参考。\"","cat":"资产减值\"","kw":"","std_ref":"企业会计准则第8号——资产减值","src":"中国注册会计师协会 专业技术指导"},{"id":"4000","q":"总部资产在资产减值测试中的分摊方法？\"","a":"总部资产不能单独产生现金流入，需分摊至能独立产生现金流的各资产组或资产组组合。分摊方法：①按各资产组使用该总部资产的占用比例（如建筑面积、产能、收入）分摊；②分摊后资产组的账面价值不得超过其可收回金额；③如部分总部资产无法合理分摊（如全面管理职能的总部资产）->构建包含全部受影响的资产组组合（最小资产组组合）进行整体减值测试。系统分摊的基本原则：合理一致且分摊基础反映总部资产对资产组的贡献。个人理解，供参考。\"","cat":"资产减值\"","kw":"","std_ref":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3999","q":"母子公司会计政策不一致时的调整方法？\"","a":"合并报表编制中，母子公司应采用统一的会计政策。若政策不一致（如母公司采用CR折旧、子公司采用SL折旧），合并报表需将子公司政策调整为与母公司一致，调整分录在合并工作底稿中体现而非修改子公司单体账。常见不一致之处：同一类固定资产折旧方法、存货计价方法、收入确认时点、预计负债估计方法等。非重大差异的门槛：如子公司影响金额对合并报表不重大，可不予调整（但需在会计政策附注中说明）。个人理解，供参考。\"","cat":"实务综合\"","kw":"","std_ref":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3998","q":"审计调整与前三大差异的汇总分析？\"","a":"审计过程中发现的调整事项通常分三类：①重大差错更正——追溯调整前期比较数据，披露差错原因和影响；②会计估计变更——未来适用法（不追溯），披露估计变更内容；③审计差异调整——在审计调整分录中汇总体现。如果审计差异合计金额占净利润或净资产的一定比例以上，需在审计报告和会计附注中详细说明。差异汇总分析也是审计委员会关注的重点：哪些属于准则解释分歧？哪些属于管理层判断的合理范围？个人理解，供参考。\"","cat":"实务综合\"","kw":"","std_ref":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3997","q":"资产负债表日后发生的重大诉讼判决的处理？\"","a":"资产负债表日后发生的期后事项分两类：①调整事项——在资产负债表日已存在但后续才确认（如已存在的诉讼在日后结案）->调整报表数据；②非调整事项——在资产负债表日后才发生的事件（如新发生的重大诉讼、自然灾害）->不调整报表但需附注披露。重要的非调整事项应在附注中说明其性质及其对财务状况影响的估计。实务中，期后事项的判断有时极其困难——关键是确定导致该事项的条件是否在资产负债日已存在。个人理解，供参考。\"","cat":"资产负债表日后事项\"","kw":"","std_ref":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3996","q":"企业利润分配中的盈余公积提取？\"","a":"法定盈余公积提取规则：①公司盈利时按当期净利润的10%提取（累计达注册资本50%后可不再提取）；②任意盈余公积由股东会决议提取；③发放股票股利时股份面值不超过未分配利润+盈余公积之和；④上市公司现金分红->扣除盈余公积后按可供分配利润发放。提取盈余公积的同时不影响企业可用现金，仅影响可分配额。净利润分配次序：补亏->提法定公积->提任意公积->向股东分配。个人理解，供参考。\"","cat":"实务综合\"","kw":"","std_ref":"","src":"中国证监会 会计监管工作通讯"},{"id":"3995","q":"企业清算注销阶段的财务处理？\"","a":"企业进入清算阶段应改用清算基础编制财务报表（非持续经营假设）：①资产按预计可变现净值或公允价值计量（非历史成本）；②负债按预计需清偿的金额确认（包括或有负债预计发生部分）；③停止计提折旧/摊销；④清算费用在发生时计入当期损益；⑤清算期间财务报告格式无统一规定但应充分披露清算基础和重要假设。上市公司注销要逐次履行公告手续，披露清算进展。个人理解，供参考。\"","cat":"实务综合\"","kw":"","std_ref":"","src":"中国证监会 会计监管工作通讯"},{"id":"3994","q":"企业资产重组中的税务与会计差异？\"","a":"资产重组中的常见税会差异：①同一控制下无偿划转——财务会计不确认损益但税务可能视同销售（须特别关注是否符合特殊性税务处理条件）；②非同一控制下合并——公允价值调整在税务层面可能不被认可（因税务以原账面值为基础），导致递延所得税负债增加和商誉增加；③财税处理错配可能导致严重的税务风险，需在重组前做税务筹划并获取税务意见书。个人理解，供参考。\"","cat":"实务综合\"","kw":"","std_ref":"","src":"财政部 企业会计准则解释公告"},{"id":"3993","q":"企业会计准则和税法差异导致的递延纳税影响？\"","a":"准则与税法差异产生两种差异：①永久性差异——如行政罚款（税务不允扣、会计计入费用）、免税收入（会计算收益但税务免税）——不确认递延所得税；②暂时性差异——如折旧方法差异、资产减值准备、预提费用（税务在实际发生时扣）——确认递延所得税资产/负债。暂时性差异转回时相反记录调整所得税费用。特殊项目：商誉初始确认的暂时性差异不确认递延所得税负债（因会产生循环计算）。个人理解，供参考。\"","cat":"所得税\"","kw":"","std_ref":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3992","q":"停工损失和季节性停产的会计处理差异？\"","a":"停工损失分情况处理：①正常的生产停工（如季节性停工、年度检修）->停工期间的固定制造费用按正常生产能力分配计入存货成本或当期费用；②非正常停工（如安全事故、自然灾害、订单断档）->停工损失全部计入当期损益（营业外支出/管理费用），不计入存货成本。金额较大时还应单独披露。区别的关键：停工是否属于企业生产的\"正常休整\"周期的一部分。个人理解，供参考。\"","cat":"实务综合\"","kw":"","std_ref":"","src":"深圳证券交易所 会计监管动态"},{"id":"3991","q":"政府补助的分类和确认时点？\"","a":"政府补助分为两类：①与资产相关->用于购建长期资产（如厂房补贴、设备补贴）——确认为递延收益，在相关资产使用寿命内分期计入损益（总额法）或冲减资产成本（净额法）；②与收益相关->用于补偿已发生费用或损失的->在收到时或在能够满足补助条件的期间计入当期损益。确认时点为：①企业能够满足补助所附条件；②企业能够收到补助款项。个人理解，供参考。\"","cat":"政府补助\"","kw":"","std_ref":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3990","q":"关联方资金往来的合规和披露要求？\"","a":"关联方资金拆借在IPO和上市公司层面的关注要点：①上市公司不得直接或间接将资金拆借给控股股东及关联方（除正常经营性往来外）->构成违规占用资金；②正常经营性往来（如应收账款、预付账款）需按市场公平交易原则并签订合同；③关联方临时周转资金须经独立董事和股东大会审批、计收合理利息；④定期报告中详细披露关联方资金往来的期末余额、发生额、利率和还款计划。个人理解，供参考。\"","cat":"关联方披露\"","kw":"","std_ref":"","src":"中国证监会 会计监管工作通讯"},{"id":"3989","q":"IPO申报期间研发费用资本化的合规要求？\"","a":"IPO审核中对研发费用资本化持审慎态度：①需分研究阶段（费用化）和开发阶段（符合条件可资本化）；②资本化五个条件必须全部满足（特别是\"可使用或出售的意图\"+技术可行性+资源和能力）；③内控要求严格——需建立研发项目台账和节点审批制度；④申报期间资本化率与同行可比公司应基本相当，差异过大会引起关注。实务建议：如把握不准的阶段建议费用化。个人理解，供参考。\"","cat":"实务综合\"","kw":"","std_ref":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3988","q":"IPO申报期间股份支付费用的确认要点？\"","a":"IPO申报期间股份支付的确认要点：①权益工具授予日的公允价值需由独立评估师评估（通常采用Black-Scholes或二叉树模型）；②授予后立即可行权的->在授予日一次性确认费用；③有服务期条件的->在服务期内分期确认；④IPO前低价授予员工的股份（价格低于外部融资价格）->差额构成股份支付费用，按CAS 11确认。需特别关注：控股股东或实际控制人低价转让股份->构成股份支付（基于实质重于形式原则）。个人理解，供参考。\"","cat":"股份支付\"","kw":"","std_ref":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3987","q":"新租赁准则对承租人财务报表的关键影响？\"","a":"新租赁准则（CAS 21.2018）对承租人的影响远大于旧准则：①几乎所有重大租赁全部入表——使用权资产和租赁负债双方膨胀（资产负债率升高）；②财务费用前轻后重——利息费用在租赁前期较高（因租赁负债本金余额大），导致利润表前期净利低、后期净利高；③EBITDA增加（租金拆分后部分入利息不再是EBITDA扣减）；④经营活动现金流出减少（本金偿还归入筹资活动）。这些变化对企业的债务合同、业绩考核指标有深远影响。个人理解，供参考。\"","cat":"租赁\"","kw":"","std_ref":"企业会计准则第21号——租赁","src":"财政部会计司 企业会计准则应用指南"},{"id":"3986","q":"在建租赁资产（租赁期开始前发生的成本）？\"","a":"租赁期开始前发生的与租赁相关的成本（如法律费、设计费、场地准备费）分三种处理：①增量可归属成本->计入使用权资产成本；②非增量成本->当期费用化；③租赁期开始前收到的租赁激励（如免租金的装修期间）->在租赁期开始日按公允价值调整使用权资产成本。注意：租赁期开始日与实际进场日期可能不一致——以租赁合同中约定的\"起租日\"为准。个人理解，供参考。\"","cat":"租赁\"","kw":"","std_ref":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3985","q":"租赁期末使用权资产的处置及预期复原义务？\"","a":"租赁期末使用权资产的处置：①租赁期满交还租赁资产->使用权资产折旧完毕，按租赁合同约定的资产交还状态是否满足复原义务->如未履行复原义务须补提预计负债；②提前终止租赁->终止确认使用权资产和对应租赁负债，差额计入当期损益。预先计提的复原义务（如拆除装修、修复场地）按CAS 13处理：初始按折现值确认并增加使用权资产成本，后续调整利息费用。个人理解，供参考。\"","cat":"租赁\"","kw":"","std_ref":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3984","q":"租赁合同初始直接费用的资本化条件？\"","a":"为获得租赁所发生的增量成本（incremental costs）如法律费、佣金等，属于可直接归属的合同成本->计入使用权资产初始成本。但内部管理费用（如寻找场地的人工成本、评估方案的内部讨论时间）不属于增量成本，应费用化。这与企业合并费用处理逻辑一致——仅增量直接成本资本化。注意：初始直接费用需与租赁期紧密相关（短期租赁的初始直接费用通常直接费用化）。个人理解，供参考。\"","cat":"租赁\"","kw":"","std_ref":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3983","q":"与关联方之间的租赁如何确认？\"","a":"关联方租赁同样适用CAS 21，差异在于：①认定的租赁付款额应基于合同条款而非市场条件——但不能以合同条款大幅偏离市场条件为由不予确认；②合同条款与市场条件不匹配->需按公允价值调整租赁负债和使用权资产（差额作为权益投入或分配）；③判定短期租赁豁免时需考虑关联交易实质。母公司向子公司提供象征性租金的租赁仍需按准则确认——这是避免账外负债的重要举措。个人理解，供参考。\"","cat":"租赁\"","kw":"","std_ref":"企业会计准则第21号——租赁","src":"会计准则委员会 准则实施问答"},{"id":"3982","q":"已存在的租赁合同适用新租赁准则的衔接处理？\"","a":"首次执行日采用简化追溯法（不重述比较期）：对存量租赁①以执行日的增量借款利率折现剩余租赁付款额确认租赁负债（等于执行日使用权资产初始金额）；②按执行日的租赁负债等额确认使用权资产，无需调整前期数据。企业还可选择对所有短期租赁和低价值资产租赁适用豁免。重要提示：对重大租赁（如办公场地、大型设备租赁）应提前做好衔接准备——需在首次执行日前梳理全部租赁合同。个人理解，供参考。\"","cat":"租赁\"","kw":"","std_ref":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3981","q":"租赁装修（承租人改良）的会计处理？\"","a":"承租人装修支出属于长期待摊费用，按租赁期与资产使用寿命孰短的原则摊销。具体分情况：①装修可由承租人拆除带走->确认固定资产，按使用寿命折旧；②装修不可拆除->确认为长期待摊费用（使用权资产改良），按租赁期摊销（除非公司合理确定将续租，则摊销期可延长至续租期内）。装修拆除恢复义务（复原义务）按CAS 13作为预计负债处理。个人理解，供参考。\"","cat":"租赁\"","kw":"","std_ref":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3980","q":"租赁负债的列报位置？\"","a":"资产负债表中的租赁负债分为：①流动部分（未来12个月内的付款义务）->列入\"一年内到期的非流动负债\"项目；②非流动部分->列入\"租赁负债\"项目。使用权资产通常在\"使用权资产\"或合并在\"固定资产\"中单独列示。现金流量表：偿还租赁负债本金->筹资活动；支付的租赁利息->属于筹资活动（也可分类为经营活动，取决于会计政策一致性）。个人理解，供参考。\"","cat":"租赁\"","kw":"","std_ref":"","src":"深圳证券交易所 会计监管动态"},{"id":"3979","q":"承租人增量借款利率的确定方法？\"","a":"增量借款利率是指承租人在类似的经济环境下借入类似期限、类似担保借入类似资金所须支付的利率。实务中确定方法：①优先使用承租人自身的近期借款利率（类似期限+币种+担保条件）；②无自身借款的可参照同行业同评级企业的债券收益率曲线；③对无公开评级的采用基准利率+特定信用利差的模型。增量借款利率要求在每个资产负债表日评估——首次采用日可适当简化处理。个人理解，供参考。\"","cat":"租赁\"","kw":"","std_ref":"","src":"会计准则委员会 准则实施问答"},{"id":"3978","q":"租赁合同中的可变租赁付款额如何处理？\"","a":"可变租赁付款额的分两类处理：①取决于指数或利率的（如CPI调整、LPR浮动）->初始确认时即纳入租赁负债的计量，后续指数/利率变化时重新计量租赁负债；②取决于业绩或使用的（如按销售额百分比计算）->不在租赁负债中确认，在触发当期计入当期损益。实务中，零售门店租赁的营业额租金具\"取决于业绩\"的特征，不计入租赁负债。个人理解，供参考。\"","cat":"租赁\"","kw":"","std_ref":"","src":"会计准则委员会 准则实施问答"},{"id":"3977","q":"租赁期中行使购买选择权的影响？\"","a":"在租赁期初未合理确定将行使购买选择权，后续变化需修改租赁期时：①将购买价格纳入租赁付款额中；②重新计算租赁负债（使用修订后的折现率）；③租赁负债的变动调整使用权资产（直至使用权资产账面价值减至零）；④超出部分的差额计入当期损益。行使购买选择权后，租赁性质变化->原承租人变为资产所有者，按固定资产/投资性房地产准则进行后续计量。个人理解，供参考。\"","cat":"租赁\"","kw":"","std_ref":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3976","q":"租赁变更（如扩租、缩租、提前终止）的处理？\"","a":"租赁变更分四种情况：①追加租赁（如增加面积）且价格反映单独租赁->单独确认；②减少面积且价格不调整->重新计量租赁负债、调整使用权资产（差额计入当期损益）；③变更后续租金在变更生效日按修订后折现率重新计量；④变更导致租赁期缩短->终止确认部分使用权资产和租赁负债（差额计入当期损益）。租赁变更导致租赁分类变更的，需自变更生效日起重新评估。个人理解，供参考。\"","cat":"租赁\"","kw":"","std_ref":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3975","q":"转租赁安排下的会计处理？\"","a":"转租赁的分类原则：以原租赁的使用权资产为标的资产，而非以标的资产的实物本身：①转租赁是否构成融资租赁——判断转租赁的租赁期是否覆盖了原租赁租赁期的绝大部分；②转租赁构成融资租赁->出租使用权的权利（按融资租赁出租人处理），保留原租赁负债不变；③转租赁构成经营租赁->承租人/出租人分别核算原租赁和转租赁。转租赁下承租人作为\"中间人\"，其核算比单纯承租人或单纯出租人更复杂。个人理解，供参考。\"","cat":"租赁\"","kw":"","std_ref":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3974","q":"售后租回交易的会计处理？\"","a":"售后租回交易分两步骤：①判断资产转让是否构成销售——该转让满足CAS 14收入确认条件->构成销售；②转让构成销售->确认处置损益（仅确认归属于购买方的份额）、按租赁负债确认租回部分；③转让不构成销售->按融资安排处理——不终止确认资产，收到的现金作为金融负债。新准则下，售后租回的交易价格需按公允价值调整后确认，防止虚增资产处置收益。个人理解，供参考。\"","cat":"租赁\"","kw":"","std_ref":"","src":"会计准则委员会 准则实施问答"},{"id":"3973","q":"新租赁准则下短期租赁和低价值资产租赁的豁免条件？\"","a":"CAS 21（2018）允许两项简化豁免：①短期租赁——租赁期不超过12个月（含续租选择权的影响）->租金在租赁期内按直线法计入当期损益；②低价值资产租赁——全新资产价值较低的租赁（如IT设备、办公家具）->同上处理。豁免条件的注意事项：短期租赁不含购买选择权、低价值按资产全新价值判断（每个资产绝对值而非租赁资产组总价值）。存在关联方租赁时，需格外关注豁免条件的适用合理性。个人理解，供参考。\"","cat":"租赁\"","kw":"","std_ref":"企业会计准则第21号——租赁","src":"财政部会计司 企业会计准则应用指南"},{"id":"3972","q":"合并报表层面积压未分配利润的处理？\"","a":"①子公司设立后盈余->归母部分计入合并报表\"归属于母公司股东权益\"的留存收益，少数部分计入\"少数股东权益\"；②购买日前的子公司的盈余->在合并报表中属于购买法下重估值后的组成部分，不予保留为留存收益（被购买日公允价值吞没）；③子公司期后提取盈余公积->合并层面保留盈余公积（归母部分）。特殊关注：同一控制下合并需将合并前子公司盈余追溯至比较期报表中。个人理解，供参考。\"","cat":"合并报表\"","kw":"","std_ref":"","src":"深圳证券交易所 会计监管动态"},{"id":"3971","q":"合并报表与单体报表中同一控制下长投计量的差异？\"","a":"同一控制下企业合并的长投计量在单体/合并报表中的差异：①单体报表——长投初始成本=合并日被合并方净资产账面价值×合并比例（不确认商誉）；②合并报表——合并对价与净资产账面价值的差额调整资本公积。差异在于：单体报表仅限于长投本身，合并报表需要将差额处理至权益。本质上两者都不产生损益，但单体报表和合并报表的呈现方式不同。个人理解，供参考。\"","cat":"合并报表\"","kw":"","std_ref":"","src":"上海证券交易所 会计监管动态"},{"id":"3970","q":"被动稀释（子公司增资而丧失控制权）处理？\"","a":"子公司其他股东增资导致母公司持股比例下降而丧失控制权的处理：①属于权益交易（母公司作为被动方）；②收到的增资款分配给母公司的份额是否构成处置对价——如增资所得归子公司（控股）则不构成处置对价；③母公司剩余权益按丧失控制权日公允价值重新计量；④差额计入投资收益。若未丧失控制权（仍持有50%以上），则差额调整资本公积。个人理解，供参考。\"","cat":"合并报表\"","kw":"","std_ref":"","src":"中国证监会 会计监管工作通讯"},{"id":"3969","q":"合并报表中少数股东损益的列报位置和计算？\"","a":"合并利润表中\"少数股东损益\"是净利润的组成部分（不在\"净利润\"之上单独列示），归属于母公司股东的净利润=合并净利润-少数股东损益。计算少数股东损益时需注意：①子公司在当期确认的净利润×少数股东比例；②调整：逆流交易未实现损益的少数股东份额（先计算抵销后净额再分）；③优先股股利（如子公司发行了列为权益的优先股）应扣除后再计算。个人理解，供参考。\"","cat":"合并报表\"","kw":"","std_ref":"","src":"上海证券交易所 会计监管动态"},{"id":"3968","q":"合并报表层面公允价值调整的递延所得税影响？\"","a":"购买日公允价值调整（如固定资产增值、无形资产确认等）产生应纳税暂时性差异或可抵扣暂时性差异，需确认递延所得税负债或资产。此类递延所得税的对方科目是商誉或廉价购买损益——即通过影响商誉来反映。后续公允价值调整的摊销/折旧会转回暂时性差异，同时调整递延所得税和所得税费用。这形成了一个连锁反应：公允价值调整->递延所得税->商誉->所得税费用。个人理解，供参考。\"","cat":"合并报表\"","kw":"","std_ref":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3967","q":"合并报表中的未实现内部交易损益抵销原则？\"","a":"内部交易抵销的一般原则：①逆流交易（子公司向母公司销售）->未实现损益归少数股东的部分需减少少数股东权益和少数股东损益；②顺流交易（母公司向子公司销售）->未实现损益100%归母公司（不涉及少数股东）；③侧流交易（子公司之间）->类似逆流交易处理。抵销的总原则是消除内部交易对合并报表的影响，还原为单体层面各独立实体对外部交易的实质。个人理解，供参考。\"","cat":"合并报表\"","kw":"","std_ref":"","src":"深圳证券交易所 会计监管动态"},{"id":"3966","q":"出售部分子公司股权但不丧失控制权的影响？\"","a":"出售部分子公司股权但不丧失控制权（如从80%减至60%）的处理：①处置价款与按处置比例计算的子公司净资产账面价值的差额->调整资本公积；②不确认投资收益（属于权益交易而非处置）；③合并报表中不重新计量剩余权益；④利润表中不产生处置损益。这一点与出售+丧失控制权的处理有本质不同，后者需确认投资收益。个人理解，供参考。\"","cat":"合并报表\"","kw":"","std_ref":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3965","q":"购买少数股东权益（增持）的会计处理？\"","a":"母公司向少数股东购买子公司股权（增持不改变控制状态）属于权益交易：①支付对价与按新增比例计算的子公司净资产份额的差额->调整资本公积（不足->调整留存收益）；②不确认商誉或损益；③合并报表中不重新计量子公司资产/负债。这是因为企业合并已在取得控制权日完成，后续增持仅是权益的内部转移，不影响企业合并完成的认定。个人理解，供参考。\"","cat":"合并报表\"","kw":"","std_ref":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3964","q":"少数股东权益的初始计量方法及选择？\"","a":"非同一控制下的少数股东权益计量有两种方法：①部分商誉法——少数股东权益=被购买方可辨认净资产公允价值×少数股东持股比例（不确认少数股东的商誉）；②完全商誉法——少数股东权益按公允价值计量（商誉含少数股东份额）。两种方法的选择属于准则允许的会计政策选择，影响初始确认商誉的大小和后续少数股东权益的金额。实务中多数中国企业采用部分商誉法。个人理解，供参考。\"","cat":"合并报表\"","kw":"","std_ref":"","src":"深圳证券交易所 会计监管动态"},{"id":"3963","q":"联营企业变为子公司（获得控制权）——分步合并的处理？\"","a":"联营企业变为子公司属于分步实现的企业合并：①原联营权益按购买日公允价值重新计量，差额计入投资收益；②先前以权益法核算联营企业期间计入OCI的份额->转入当期损益（按处置基础）；③购买日合并对价=原权益公允价值+新增对价，合并报表自购买日起纳入子公司；④确认商誉。个人理解，供参考。\"","cat":"合并报表\"","kw":"","std_ref":"","src":"中国证监会 会计监管工作通讯"},{"id":"3962","q":"子公司变为合营企业（从合并->合营）的会计处理？\"","a":"子公司变为合营企业属于丧失控制权情形，处理同上述\"子公司->联营企业\"：①剩余股权（合营权益）按丧失控制权日公允价值重新计量，差额计入投资收益；②终止确认子公司全部资产负债和商誉；③原OCI按模拟处置法处理。差异在于：丧失控制权后对合营企业按权益法或比例合并法核算（视会计政策）。个人理解，供参考。\"","cat":"合并报表\"","kw":"","std_ref":"","src":"财政部 企业会计准则解释公告"},{"id":"3961","q":"子公司变为联营企业（丧失控制权）的会计处理？\"","a":"母公司丧失对子公司的控制权（由合并->不合并）的处理步骤：①剩余股权按丧失控制权日的公允价值重新计量，差额计入投资收益；②终止确认该子公司的全部资产、负债、商誉和少数股东权益（原权益法下处置时需按比例转出相关部分）；③与该子公司相关的其他综合收益按\"模拟处置\"方式结转（转入损益或留存收益）。处置对价+剩余股权公允价值-原账面份额->投资收益。个人理解，供参考。\"","cat":"合并报表\"","kw":"","std_ref":"","src":"中国证监会 会计监管工作通讯"},{"id":"3960","q":"持股比例超过50%但不纳入合并范围的情形？\"","a":"持股比例（表决权）超过50%但存在下列情形时可能不纳入合并：①被投资方处于法定重组或破产程序中且由政府或法院接管；②公司章程规定特定重大事项需全体股东一致同意（实质上对重大决策无控制权）；③有明确证据表明其他方对被投资方有控制权（如实质代理人安排）；④投资方仅为代理人而非主要责任人。控制强调的是实质而非形式，持股过半仅是参考指标之一。个人理解，供参考。\"","cat":"合并报表\"","kw":"","std_ref":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3959","q":"投资性主体（如私募基金）的合并豁免条件？\"","a":"CAS 33对符合\"投资性主体\"条件的母公司给予合并豁免：①向投资者提供投资管理服务；②以公允价值为基础计量和评价其投资；③唯一经营目的是通过资本增值、投资收益或两者兼有获取回报。符合条件的投资性主体——其所有子公司（除提供管理服务的子公司外）均按FVTPL计量而非纳入合并范围。不符合任一条件即不能再享受豁免。个人理解，供参考。\"","cat":"合并报表\"","kw":"","std_ref":"","src":"中国证监会 会计监管工作通讯"},{"id":"3958","q":"结构化主体（如资产支持证券）是否纳入合并范围？\"","a":"CAS 33要求基于控制的三要素判断：①权力——投资方是否拥有对被投资方的权力（如发起人或服务商拥有多数表决权或罢免权）；②可变回报——是否享有被投资方的可变回报（如管理费、超额收益、剩余利益）；③权力影响回报——是否能运用权力影响回报（是否为主要责任人）。对于资产支持证券（ABS），发起行通常因担任服务商且持有次级份额而需要合并。个人理解，供参考。\"","cat":"合并报表\"","kw":"","std_ref":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3957","q":"企业合并后购买方和出售方的过渡期损益归属？\"","a":"过渡期损益（购买日与协议签订日之间的损益）的归属由合并协议约定，会计处理取决于实质：①过渡期损益归购买方->调整合并成本（减少对价->新增廉价购买或减少商誉；增加对价->增加商誉）；②过渡期损益归出售方->不影响合并成本，购买日合并报表只需反映购买日的净资产。两者对合并成本和商誉的影响完全不同，需在尽职调查阶段明确约定。个人理解，供参考。\"","cat":"企业合并\"","kw":"","std_ref":"","src":"中国证监会 会计监管工作通讯"},{"id":"3956","q":"企业合并中获得的递延所得税资产如何处理？\"","a":"购买日确认递延所得税资产的条件：①被购买方有可抵扣暂时性差异或可抵扣亏损且很可能获得未来应纳税所得额；②购买方在购买日重新评估确认条件的满足情况（而非沿用被购买方原判断）。在计量期内（12个月）获得的新信息导致确认的可抵扣亏损价值低于原估->同时增加商誉。这体现了购买日公允价值计量的原则——而非照搬被购买方原有账务。个人理解，供参考。\"","cat":"企业合并\"","kw":"","std_ref":"","src":"中国证监会 会计监管工作通讯"},{"id":"3955","q":"企业合并相关费用的会计处理差异？\"","a":"企业合并直接相关费用（如法律、评估、咨询等中介费用）的处理差异显著：①非同一控制下企业合并->费用化，计入当期损益（管理费用）；②同一控制下企业合并->费用化（同样不计入合并成本）。但请注意：发行权益工具的发行费用->冲减资本公积；发行债务的发行费用->调整债务初始成本（计入摊余成本）。这是很多企业容易混淆的知识点。个人理解，供参考。\"","cat":"企业合并\"","kw":"","std_ref":"","src":"上海证券交易所 会计监管动态"},{"id":"3954","q":"购买日前持有的被购买方权益的计量？\"","a":"分步实现合并时，购买日前持有的权益按购买日公允价值重新计量：①先前作为FVOCI权益工具->累计OCI转入留存收益（不转入损益）；②先前作为长投权益法核算->投资收益=购买日公允价值-原账面价值，之前计入OCI的权益法变动按处置基础处理；③先前作为交易性金融资产->投资收益=购买日公允价值-最近资产负债表日公允价值。购买日前的其他综合收益处理取决于之前权益的分类。个人理解，供参考。\"","cat":"企业合并\"","kw":"","std_ref":"","src":"深圳证券交易所 会计监管动态"},{"id":"3953","q":"不构成业务的反向收购的会计处理？\"","a":"企业合并的定义以是否构成\"业务\"为前提。若被购买方不构成业务（仅为空壳或资产组，无投入+过程+产出的完整组合）：①不属于企业合并，不确认商誉和廉价购买损益；②按购买资产处理——以对价公允价值在各可辨认资产/负债间分摊（按相对公允价值比例）；③无商誉产生。此点在美国SPAC合并上市中尤其重要：若目标公司不构成业务，则按资产收购处理。个人理解，供参考。\"","cat":"企业合并\"","kw":"","std_ref":"","src":"中国证监会 会计监管工作通讯"},{"id":"3952","q":"被购买方原有商誉的处理？\"","a":"非同一控制下企业合并中，被购买方账面的原有商誉不确认为可辨认资产（因为商誉不可辨认），因此不计入取得净资产公允价值中。换言之，被购买方原有商誉不结转至合并报表，而是随被购买方净资产一同重新计量。合并后新产生的商誉=合并成本-（可辨认净资产公允价值+单独确认的无形资产等）×取得比例。个人理解，供参考。\"","cat":"企业合并\"","kw":"","std_ref":"","src":"中国证监会 会计监管工作通讯"},{"id":"3951","q":"吸收合并和新设合并的会计处理区别？\"","a":"吸收合并（A+B=A'）：被合并方（B）注销法人资格，合并方（A）接收其全部资产负债，合并报表继续编制；新设合并（A+B=C）：双方均注销法人资格，新设公司C承接全部资产负债。会计处理上：①吸收合并——合并方按购买法或权益结合法（同控下）处理，被合并方清算；②新设合并——类似反向收购思路，确定\"会计上的购买方\"按购买法处理。注意税务影响，特别是享受税收优惠的条件差异。个人理解，供参考。\"","cat":"企业合并\"","kw":"","std_ref":"","src":"中国证监会 会计监管工作通讯"},{"id":"3950","q":"企业合并中购买日与交割日不一致的处理？\"","a":"购买日是企业获取对被购买方控制权的日期（通常为工商变更、董事会改组等控制权转移日），交割日是支付对价的日期。购买日与被购买方可辨认净资产公允价值的计量以购买日为基准，不受交割日影响。如果购买日至交割日间较长的，购买对价需折现。实务中：股权的\"付款日\"与\"控制权转移日\"往往不同步，以控制权转移日为购买日。个人理解，供参考。\"","cat":"企业合并\"","kw":"","std_ref":"","src":"中国证监会 会计监管工作通讯"},{"id":"3949","q":"同一控制下企业合并的合并对价差额处理？\"","a":"同一控制下企业合并（下称\"同控合并\"）的合并对价与取得净资产账面价值的差额依次调整：①资本公积（资本溢价或股本溢价）；②资本公积不足冲减->冲减留存收益。不能在利润表中确认损益（这与非同控合并截然不同，后者可将廉价购买差额计入损益）。注意：同控合并需追溯调整比较期报表，视同合并后主体一直存在。个人理解，供参考。\"","cat":"企业合并\"","kw":"","std_ref":"","src":"中国证监会 会计监管工作通讯"},{"id":"3948","q":"购买日后12个月内获得新信息的调整（计量期调整）？\"","a":"购买日后12个月内（计量期），如获得关于购买日已存在情况的新信息，可追溯调整购买日确认的金额：包括资产/负债公允价值、或有对价、商誉等。12个月后仅可更正错误（按前期差错处理），不再按计量期调整。重要体会：企业需在购买日后积极收集信息，如评估报告延迟、诉讼结果等，确保及时获得完整准确数据。时效性要求严格，12个月后调整空间很小。个人理解，供参考。\"","cat":"企业合并\"","kw":"","std_ref":"","src":"深圳证券交易所 会计监管动态"},{"id":"3947","q":"企业合并中取得的无形资产如何单独确认？\"","a":"购买方应单独确认符合可辨认性标准（合同-法律标准或可分离标准）的无形资产，即使被购买方未在账面确认。常见可单独确认的无形资产：商标、客户关系、非竞争协议、技术专利、订购合同、特许经营权等。估值方法：超额收益法（如对客户关系）、免版税费法（如对商标）。无法可靠计量的无形资产不应单独确认而并入商誉。个人理解，供参考。\"","cat":"企业合并\"","kw":"","std_ref":"","src":"中国证监会 会计监管工作通讯"},{"id":"3946","q":"廉价购买（负商誉）的确认和计量？\"","a":"合并成本小于取得的可辨认净资产公允价值份额时产生廉价购买（负商誉）：①需首先重新评估是否遗漏了可辨认资产/负债；②再次确认购买对价和公允价值计量是否准确；③复核后差额仍存在->直接计入当期损益（营业外收入）。产生廉价购买的情形：困境企业收购、有重大瑕疵的资产组购买、卖方急于出售等。需特别谨慎：不可人为压低公允价值来制造廉价购买的假象。个人理解，供参考。\"","cat":"企业合并\"","kw":"","std_ref":"","src":"深圳证券交易所 会计监管动态"},{"id":"3945","q":"企业合并中的或有对价如何处理？\"","a":"购买方应将或有对价按购买日公允价值计入合并成本（而非待确定后再确认）。后续计量分四类：①分类为权益工具->不重新计量，结算时调整权益；②分类为金融资产/负债（满足金融工具定义）->按公允价值重新计量，变动计入损益；③属于职工薪酬->按CAS 9处理；④不属于以上三类->作为或有事项处理。实务中，业绩补偿承诺（Earn-out）是最常见的或有对价形式，通常归类为金融负债并按公允价值计量。个人理解，供参考。\"","cat":"企业合并\"","kw":"","std_ref":"","src":"深圳证券交易所 会计监管动态"},{"id":"3944","q":"反向购买的会计处理要点？\"","a":"反向购买（又称反向并购）的会计处理要点：①法律上母公司为会计上被购买方，法律上子公司为会计上购买方；②合并成本=法律上母公司为取得法律上子公司控制权而发行的权益工具在购买日的公允价值；③合并报表中资产、负债=法律上子公司（会计购买方）的账面价值+法律上母公司（会计被购买方）可辨认资产/负债的公允价值；④权益结构反映会计上购买方（法律子公司）的权益。反向购买下不确认商誉（除非法律母公司构成业务）。个人理解，供参考。\"","cat":"企业合并\"","kw":"","std_ref":"","src":"深圳证券交易所 会计监管动态"},{"id":"3943","q":"分步实现非同一控制下企业合并的会计处理？\"","a":"分步购买实现合并分两步处理：①购买日之前持有的被购买方股权按购买日公允价值重新计量，差额计入当期损益；②之前持有的OCI（如其他权益工具投资的累计变动）转入当期损益；③购买日对价=原持有份额公允价值+新增对价；④商誉=合并对价+少数股东权益-可辨认净资产公允价值份额。注意：购买日之前对被购买方有重大影响时适用长期股权投资权益法者，先终止确认长投再重新计量。个人理解，供参考。\"","cat":"企业合并\"","kw":"","std_ref":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3942","q":"可回售工具（如开放式基金份额）的分类？\"","a":"CAS 37对可回售工具的分类有特殊规定：虽然持有人有权回售（形式上属于金融负债），但如同时满足下列条件可分类为权益：①持有人按比例享有净资产；②该工具从属于所有其他工具类别；③所有工具具有相同特征；④现金流量仅基于净利润或净资产变动。开放式基金的基金份额即典型例子——持有人可随时赎回，但符合条件的可以作为权益工具。个人理解，供参考。\"","cat":"金融工具\"","kw":"","std_ref":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3941","q":"金融工具的列报——流动性与偿付能力的区分？\"","a":"资产负债表中的流动性判断依据：①预期在资产负债表日后12个月内结算->流动；②反之->非流动。但对衍生金融工具：作为交易性资产/负债通常列为流动。特定情形：企业可否在12个月后将负债展期取决于是否有自行决定的延期权——有则列为非流动，无则流动。此外，资产负债表日后发生的再融资、债务展期不影响资产负债表日的分类。个人理解，供参考。\"","cat":"金融工具\"","kw":"","std_ref":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3940","q":"债券投资的折价/溢价摊销使用实际利率法的步骤？\"","a":"实际利率法的步骤：①确定金融资产的各期预计现金流量（包括本金和利息）；②计算使未来现金流量现值等于初始账面价值的折现率（即实际利率）；③每期利息收入=期初摊余成本×实际利率；④每期摊销额=实际利息-名义利息（分期付息时）或=实际利息（到期一次还本付息时）。注意：如果发生预期信用损失，阶段三资产的利息基数从账面余额改为摊余成本。个人理解，供参考。\"","cat":"金融工具\"","kw":"","std_ref":"企业会计准则第22号——金融工具确认和计量","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3939","q":"财务担保合同的会计处理？\"","a":"CAS 22规定财务担保合同的初始确认按公允价值计量，后续计量取下述两者孰高：①按CAS 22计提减值（ECL）；②初始确认金额减去按CAS 14累计摊销的金额。如企业为关联方提供担保，通常因无市场对价需以ECL计量，可能产生大额信用减值损失。此外，财务担保合同可能构成或有负债（CAS 13），需同时在报表附注中披露。个人理解，供参考。\"","cat":"金融工具\"","kw":"","std_ref":"企业会计准则第13号——或有事项","src":"会计准则委员会 准则实施问答"},{"id":"3938","q":"金融工具的初始计量——交易费用如何处理？\"","a":"金融工具的初始计量原则：①以公允价值计量且其变动计入当期损益的金融资产/负债——交易费用直接计入当期损益；②其他类金融资产/负债（AC、FVOCI）——交易费用计入初始成本。权益工具投资的交易费用计入初始成本（包括被指定为FVOCI的）。但内部管理过程中产生的费用（如内部分析、差旅等）不属于可直接归属的交易费用，应费用化。个人理解，供参考。\"","cat":"金融工具\"","kw":"","std_ref":"","src":"上海证券交易所 会计监管动态"},{"id":"3937","q":"以摊余成本计量的金融资产减值后如何转回？\"","a":"AC类金融资产确认的信用减值损失可以转回，但转回后账面价值不得超过未计提减值时的摊销成本（即按实际利率计算的摊余成本上限）。转回计入当期损益。同样，FVOCI债务工具的减值转回也计入当期损益（FVOCI权益工具不涉及减值）。而FVTPL类不需单独计提减值（公允价值变动已包含减值影响）。个人理解，供参考。\"","cat":"金融工具\"","kw":"","std_ref":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3936","q":"企业集团内资金池的会计处理？\"","a":"集团内资金池（cash pooling）的会计处理取决于法律形式和实质：①委托贷款模式——集团内成员间形成独立债权债务关系，按金融工具准则分别确认；②账户归集模式——零余额账户（自动归集至主账户）——成员账面显示为对资金中心的应收/应付款项，合并层面内部抵销。实务中需关注：跨境的资金池可能触发外汇管制、转让定价等合规问题。个人理解，供参考。\"","cat":"金融工具\"","kw":"","std_ref":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3935","q":"利率互换套期的会计处理？\"","a":"利率互换的套期会计（公允价值套期）：①被套期项目以摊余成本计量时，将套期工具的公允价值变动即期部分计入当期损益；②对已存在的固定利率负债进行公允价值套期时，将套期工具有效部分的公允价值变动调整被套期负债的账面价值（净额结算），无效部分计入当期损益。采用套期会计需满足指定、文档化、有效性评估等严格条件。现金流量套期下，套期工具有效部分计入其他综合收益。个人理解，供参考。\"","cat":"金融工具\"","kw":"","std_ref":"","src":"会计准则委员会 准则实施问答"},{"id":"3934","q":"财务报表中交易性金融资产和其他权益工具投资如何列报？\"","a":"资产负债表列报差异：①交易性金融资产——列示在流动资产或非流动资产项下（根据预期持有期限）；②其他权益工具投资（FVOCI）——通常列为非流动资产（长期战略投资）。损益表差异：①交易性金融资产的公允价值变动计入当期损益；②其他权益工具投资的公允价值变动计入其他综合收益、股利收入计入投资收益。投资者关系实务常将\"其他权益工具投资\"称为\"FVTOCI权益\"。个人理解，供参考。\"","cat":"金融工具\"","kw":"","std_ref":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3933","q":"已发生信用减值的金融资产的利息收入如何计算？\"","a":"已发生信用减值（阶段三）的金融资产，利息收入=摊余成本×实际利率（而非账面余额×实际利率）。摊余成本=账面余额-累计计提的信用减值准备。这意味着减值准备会减少利息收入的基数，而阶段一和阶段二的利息收入则仍按账面余额计算。这个差异会导致损益表中利息收入在阶段转换时出现\"断崖\"。个人理解，供参考。\"","cat":"金融工具\"","kw":"","std_ref":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3932","q":"与权益挂钩的衍生工具的会计处理？\"","a":"以自身权益工具结算的衍生工具分类：①总是以固定数量换固定金额（固定换固定）->权益；②涉及可变数量->金融资产或金融负债（FVTPL）。如认股权证（warrants）在特定条件满足前不确定是否为\"固定换固定\"->先在FVTPL列示，待条件明确后再判断。实务中，对赌协议（VAM）中的业绩补偿条款往往导致衍生金融工具分类。个人理解，供参考。\"","cat":"金融工具\"","kw":"","std_ref":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3931","q":"永续债和优先股的会计分类？\"","a":"永续债和优先股的分类核心是判断是否形成交付现金的义务：①无固定到期日且发行人可无限期递延付息、无强制赎回条款->权益工具；②有固定到期日或强制付息条款->金融负债；③发行人拥有不可撤销的递延付息权且不累积->权益工具。实务中，金融负债和权益工具区分需审阅合同所有条款，包括结算选择权、交叉违约条款、银行担保等交叉条款的影响。个人理解，供参考。\"","cat":"金融工具\"","kw":"","std_ref":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3930","q":"合同现金流量特征（SPPI）测试的具体判断标准？\"","a":"SPPI测试的核心：合同现金流量是否仅代表\"本金+未偿付本金的利息\"。利息需反映基本借贷安排的对价（货币时间价值+信用风险+其他基本借贷风险+合理利润率）。不通过SPPI的情形：合同约定收益率与某种指数挂钩（非基准利率+利差）、包含杠杆特征、包含\"双轨利率\"（最低收益保证）。需要通过SPPI是划分为AC或FVOCI的前提条件。个人理解，供参考。\"","cat":"金融工具\"","kw":"","std_ref":"","src":"会计准则委员会 准则实施问答"},{"id":"3929","q":"债务工具投资重分类条件及影响？\"","a":"CAS 22仅在企业改变管理金融资产的业务模式时才允许重分类（极少发生），会计处理采用未来适用法——自重分类日起按新类别处理，不追溯前期。分为6种重分类情形：AC->FVTPL、FVOCI->AC等，每种情形下的差额处理不同（或转入损益或转入OCI或调整账面价值）。值得注意的是，权益工具投资指定为FVOCI后不得重分类。个人理解，供参考。\"","cat":"金融工具\"","kw":"","std_ref":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3928","q":"预期信用损失模型下应收账款的简化方法？\"","a":"CAS 22允许对不含重大融资成分的应收账款采用简化方法：始终按整个存续期预期信用损失计量损失准备。实务中常用的应收账款减值矩阵法：①按账龄分组（未逾期、逾期1-30天、30-60天、60-90天、>90天等）；②统计各账龄组的历史迁徙率和损失率；③加入前瞻性信息调整；④将调整后的损失率乘以各组余额得到ECL。此方法简便有效，已为大量企业采用。个人理解，供参考。\"","cat":"金融工具\"","kw":"","std_ref":"企业会计准则第22号——金融工具确认和计量","src":"中国注册会计师协会 专业技术指导"},{"id":"3927","q":"企业购买理财产品的会计处理和分类？\"","a":"理财产品分类取决于合同条款和投资性质：①保本固定收益型（合同现金流量SPPI测试通过）->以摊余成本计量或FVOCI；②非保本浮动收益型（SPPI测试不通过）->FVTPL；③结构性存款（嵌入衍生工具且与主合同不紧密相关）->通常整体作为FVTPL处理（但保本保最低收益的结构性存款可能拆分为AC+衍生工具）。期限在三个月以内的高流动性理财产品可列入\"交易性金融资产\"或根据业务模式列入其他类别。个人理解，供参考。\"","cat":"金融工具\"","kw":"","std_ref":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3926","q":"金融负债和权益工具的区分标准？\"","a":"CAS 37规定了\"固定换固定\"原则：①必须以交付固定数量的自身权益工具结算的合同（无交付现金义务）->权益工具；②必须交付可变数量自身权益工具或包含交付现金义务->金融负债。实务中常见的争议：对赌协议（或有结算条款）、永续债的分类、合伙人份额约定等。应以合同条款实质而非法律形式判断。个人理解，供参考。\"","cat":"金融工具\"","kw":"","std_ref":"","src":"上海证券交易所 会计监管动态"},{"id":"3925","q":"其他权益工具投资（FVOCI-权益）的后续计量特点？\"","a":"指定为FVOCI的权益工具投资（不可撤销选择）的后续计量：①公允价值变动计入其他综合收益，不影响当期损益；②持有期间股利收入（清算性股利除外）计入当期损益；③处置时不得将OCI中的累计公允价值变动转入当期损益，而是直接转入留存收益；④无需计提减值。这种处理的目的在于避免企业通过选择处置时点来操纵利润。个人理解，供参考。\"","cat":"金融工具\"","kw":"","std_ref":"","src":"上海证券交易所 会计监管动态"},{"id":"3924","q":"可转换公司债券的会计分拆处理？\"","a":"可转债包含负债成分和权益成分（转股权）——需在初始确认时进行分拆：①确定负债成分的公允价值（未来现金流按不含转股权的类似债券的市场利率折现）；②发行价格减去负债成分公允价值=权益成分（计入其他权益工具）；③发行费用按负债和权益的公允价值比例分摊。后续计量：负债成分按摊余成本核算，权益成分不变。转换时终止确认负债成分并转入权益。个人理解，供参考。\"","cat":"金融工具\"","kw":"","std_ref":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3923","q":"金融资产转移（应收账款保理）终止确认的判断？\"","a":"应收账款保理是否终止确认的判断：①企业转移了几乎所有风险和报酬（无追索权保理）->终止确认；②企业保留了几乎所有风险和报酬（有追索权保理）->继续确认全部资产，收到的对价作为借款；③既未转移也未保留->判断是否放弃控制，放弃->终止确认；未放弃->按继续涉入程度确认相关资产和负债。实务中\"无追索权\"需经严格法律审查。个人理解，供参考。\"","cat":"金融工具\"","kw":"","std_ref":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3922","q":"应收款项融资和应收账款在报表中如何区分？\"","a":"\"应收款项融资\"项目列报的是既以收取合同现金流量又以出售为目的的应收票据及应收账款（FVOCI类）。\"应收账款\"列报的是仅以收取合同现金流量为目的的（AC类）。判断关键：企业管理应收票据的业务模式——如果经常贴现、背书且不终止确认->FVOCI->列入\"应收款项融资\"；如果持有至到期->AC->列入\"应收票据\"或\"应收账款\"。个人理解，供参考。\"","cat":"金融工具\"","kw":"","std_ref":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3921","q":"预期信用损失率的估计方法和数据来源？\"","a":"ECL的估计需结合：①历史损失经验（按账龄分组统计）；②当前经济状况调整；③前瞻性信息（GDP增速、行业指数等宏观经济预测）。实务方法包括：迁徙率法（滚动率模型）、马尔可夫链法、损失率模型（区分重组的和非重组的）。企业需选择与业务规模匹配的方法，不得仅以\"未发生损失\"为由不计提ECL。个人理解，供参考。\"","cat":"金融工具\"","kw":"","std_ref":"企业会计准则第22号——金融工具确认和计量","src":"财政部会计司 企业会计准则应用指南"},{"id":"3920","q":"预期信用损失模型（ECL）的三阶段法是什么？\"","a":"CAS 22引入预期信用损失模型取代原已发生损失模型，三阶段为：①阶段一（信用风险未显著增加）->按12个月ECL计提，利息收入按账面余额计算；②阶段二（信用风险显著增加但未减值）->按整个存续期ECL计提，利息收入仍按账面余额计算；③阶段三（已发生信用减值）->按整个存续期ECL计提，利息收入按摊余成本（扣减值后）计算。判断\"信用风险显著增加\"通常采用逾期30天作为可推翻的假设。个人理解，供参考。\"","cat":"金融工具\"","kw":"","std_ref":"企业会计准则第22号——金融工具确认和计量","src":"会计准则委员会 准则实施问答"},{"id":"3919","q":"新金融工具准则下金融资产三分类的判断流程？\"","a":"CAS 22（2017）将金融资产从四分类简化为三分类，判断流程为：①合同现金流量是否仅为本金+利息（SPPI测试）->是则进入第②步，否则->以公允价值计量且其变动计入当期损益（FVTPL）；②业务模式是收取合同现金流量还是兼有出售（业务模式测试）->收取->以摊余成本计量（AC）；兼有->以公允价值计量且其变动计入其他综合收益（FVOCI）；其他->FVTPL。权益工具可指定为FVOCI（不可撤销，股利计入损益、处置不转入损益）。个人理解，供参考。\"","cat":"金融工具\"","kw":"","std_ref":"企业会计准则第22号——金融工具确认和计量","src":"财政部会计司 企业会计准则应用指南"},{"id":"3918","q":"合同中重大判断的改变是否影响收入确认？\"","a":"合同签订时的重大判断（如识别履约义务、确定单独售价、估计可变对价）属于会计估计范畴，后续获得新信息需变更判断时，应采用未来适用法调整——不追溯调前期。例如：预期退货率从8%调至5%->调整当期及以后收入，不调整已结账的以前期间。只有合同变更（非估计变更）才考虑追溯调整。个人理解，供参考。\"","cat":"收入准则\"","kw":"","std_ref":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3917","q":"新收入准则下履约义务识别与传统准则有何不同？\"","a":"CAS 14的履约义务识别更细：①需判断商品或服务是否可明确区分——即客户能否从该商品本身获得利益、合同中是否独立于其他承诺；②不可明确区分的商品需合并为单一履约义务（如建造服务+材料、安装+设备）；③系列相同转移模式的特定商品可作为一个履约义务。老准则没有如此详细的拆分要求，导致实务处理差异显著。个人理解，供参考。\"","cat":"收入准则\"","kw":"","std_ref":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3916","q":"客户已接受但尚未付款的商品的收入确认？\"","a":"已交付且客户已接受的商品通常满足控制权转移条件，可确认收入——即使尚未收款。应确认应收账款而非合同资产（此时收款权仅取决于时间流逝）。但应注意：如果合同中包含价格保护条款（如后续降价需退款），则属于可变对价，需估计并约束收入上限。个人理解，供参考。\"","cat":"收入准则\"","kw":"","std_ref":"","src":"会计准则委员会 准则实施问答"},{"id":"3915","q":"新收入准则对完工百分比法的继承与变化？\"","a":"新准则用\"履约进度\"概念替代了原\"完工百分比\"表述，理念相似但有如下变化：①适用范围扩大至更多行业（不仅是建造业）；②履约进度的计量方法统一为产出法和投入法两种；③对无法合理确定进度的情况规定更严——只能按已发生成本确认收入（且限于预计可收回部分）；④新增了对不可替代商品按时段确认的条件。个人理解，供参考。\"","cat":"收入准则\"","kw":"","std_ref":"","src":"财政部 企业会计准则解释公告"},{"id":"3914","q":"附有回购义务的销售如何处理？\"","a":"回购安排分三种：①远期回购（企业有义务回购）->不确认收入，作为融资安排处理（商品不终止确认）；②看跌期权（客户有权要求企业回购）->判断客户是否有重大经济动因行使权利：有->融资安排，无->按附退回条款的销售处理；③看涨期权（企业有权回购）->同上。实务中关注：回购价格与市场价的比较、期权是否深度亏损。个人理解，供参考。\"","cat":"收入准则\"","kw":"","std_ref":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3913","q":"总额法确认收入的灰色地带——旅行社的包团服务？\"","a":"旅行社的包团服务收入确认需分情况：①旅行社利用自有资源（自营酒店、自营车队）->主要责任人（总额法）；②旅行社采购第三方服务再打包销售->需判断是否取得控制权。关键在于：旅行社对第三方服务是否有自主定价权、是否承担服务未提供时的赔偿义务。大多数OTA平台为代理人（净额法）。个人理解，供参考。\"","cat":"收入准则\"","kw":"","std_ref":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3912","q":"合同合并的条件及影响？\"","a":"CAS 14规定同时满足以下条件时应将多份合同合并为一份：①基于同一商业目的以一揽子方式签订；②其中一份合同的对价取决于另一份合同；③合同承诺的商品构成单一履约义务。合同合并影响的方面：交易价格确定、履约义务识别、收入确认模式。实务中需判断：多份合同是否实质上构成同一交易的不可分割部分。个人理解，供参考。\"","cat":"收入准则\"","kw":"","std_ref":"","src":"上海证券交易所 会计监管动态"},{"id":"3911","q":"合同中同时包含多项履约义务时交易价格如何分摊？\"","a":"交易价格的分摊步骤：①识别合同中的所有履约义务；②确定各项履约义务的单独售价（优先使用可观察价格，无则采用市场评估法、预期成本加利润法或余值法估计）；③按单独售价的相对比例分摊交易价格；④分摊折扣（除非有证据表明折扣仅与某项特定义务相关）。特定情形下可变对价可能仅与某项履约义务相关。个人理解，供参考。\"","cat":"收入准则\"","kw":"","std_ref":"","src":"会计准则委员会 准则实施问答"},{"id":"3910","q":"PPP项目中建造方角色的收入确认？\"","a":"在PPP（政府和社会资本合作）项目中的会计处理分两种情况：①社会资本方建造基础设施（如道路、污水处理厂）->根据CAS 14确认建造收入（通常按时段确认）；②社会资本方提供运营服务->按服务期确认运营收入。实务中需关注：BOT安排中建造对价的形式（现金、金融资产、无形资产）、运营期维护义务是否构成单独履约义务。个人理解，供参考。\"","cat":"收入准则\"","kw":"","std_ref":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3909","q":"房地产企业预售业务的收入确认要点？\"","a":"新收入准则对房地产企业影响显著：①满足时段履约条件->在建造过程中按进度确认收入（需要客户可控制在建物业或不可替代且有权就已完成部分收款）；②不满足时段条件->在竣工交付时点确认收入。实务中多数住宅开发项目为时点确认，因为客户通常不能在建造中控制物业，且合同中往往允许客户在交付前仅收取违约金而非支付已完成部分价款。个人理解，供参考。\"","cat":"收入准则\"","kw":"","std_ref":"","src":"上海证券交易所 会计监管动态"},{"id":"3908","q":"新收入准则下运输服务是否构成单独履约义务？\"","a":"运输服务是否构成单独履约义务的判断：①运输发生在商品控制权转移给客户之前->运输是履约活动而非单独履约义务，运输成本计入合同履约成本；②运输发生在控制权转移之后->运输构成单独履约义务，分摊交易价格单独确认收入。关键的判断点是控制权转移的时间节点。FOB交货方式下运输在控制权转移后，CIF下运输通常在控制权转移前。个人理解，供参考。\"","cat":"收入准则\"","kw":"","std_ref":"","src":"会计准则委员会 准则实施问答"},{"id":"3907","q":"合同履约成本和合同取得成本如何核算？\"","a":"CAS 14规定了合同成本的资本化条件：①合同取得成本（如销售佣金）——预期可通过相关收入收回且不适用其他准则->确认为资产并按履约进度摊销；②合同履约成本——与合同直接相关、增加未来履约资源、预期可收回->确认为资产摊销。便利操作：合同取得成本摊销期不超过一年的，可在发生时费用化。长期合同（如保险、工程）需特别关注资本化金额的减值测试。个人理解，供参考。\"","cat":"收入准则\"","kw":"","std_ref":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3906","q":"委托代销（寄售）安排下的收入确认？\"","a":"委托代销（寄售）的判断标准：产品交付给经销商但企业仍保留控制权——不能确认收入。控制权转移的标志：①经销商向最终客户销售；②一定期间后未售出可退回。实务中关注：经销商是否承担存货滞销风险、是否有强制购买义务、定价限制的实质。原收入准则下的\"风险报酬转移\"概念基本上与新准则下的\"控制权转移\"重合。个人理解，供参考。\"","cat":"收入准则\"","kw":"","std_ref":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3905","q":"合同中存在重大融资成分的处理？\"","a":"CAS 14要求，当合同对价中包含重大融资成分时，应以现金售价折现的金额确认收入。简化处理：①预收款到交货间隔不超过一年->忽略；②先交货后收款时间超过一年->按折现确认，差额确认为利息收入。判断是否\"重大\"应考虑：承诺对价与现售价格的差异、合同付款时间表的长短、合同中隐含的利率水平。个人理解，供参考。\"","cat":"收入准则\"","kw":"","std_ref":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3904","q":"不同业务类型软件服务收入的确认差异？\"","a":"软件行业常见的收入模式：①永久许可+维护——许可证按时点确认，维护费按服务期分摊；②SaaS订阅——按服务期按月确认；③定制开发——按时段（投入法或产出法）确认；④混合模式——先识别各项履约义务，分别确认。关键的判断标准：客户是否能够控制软件运行并从中获益、是否需要持续更新。个人理解，供参考。\"","cat":"收入准则\"","kw":"","std_ref":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3903","q":"总额法与净额法在电商平台场景下的应用？\"","a":"电商平台模式下主要责任人与代理人的判断要点：①商品交付前平台是否取得控制权（存货风险、定价权）；②平台是否承担主要履约责任（退换货、质量问题）；③平台是否承担信用风险（客户不付款时是否需向供应商付款）。平台通常满足\"控制->总额法\"，不满足->净额法。不同品类可能适用不同方法。个人理解，供参考。\"","cat":"收入准则\"","kw":"","std_ref":"","src":"财政部 企业会计准则解释公告"},{"id":"3902","q":"附有客户额外购买选择权的销售（如积分奖励）？\"","a":"客户忠诚度计划中的积分、折扣券等属于重大权利时，应作为单独履约义务分摊交易价格。分摊方法：基于积分或折扣券的单独售价与已售商品的单独售价的相对比例。积分兑换时确认递延收入。未被兑换的积分（breakage）按客户行使的模式按比例确认收入。注意：普通的市场营销优惠不属于重大权利，无需单独分摊。个人理解，供参考。\"","cat":"收入准则\"","kw":"","std_ref":"","src":"会计准则委员会 准则实施问答"},{"id":"3901","q":"合同变更的三种类型及会计处理？\"","a":"CAS 14将合同变更分为三类：①作为单独合同（新增商品价格反映单独售价）->原合同不受影响，新合同独立核算；②原合同终止+新合同产生（新增商品不可分、价格不反映单独售价）->剩余商品与新增商品合并为新合同；③合同变更部分（新增商品与原商品可区分且价格反映单独售价但不可分）->作为原合同组成部分，追溯调整累计收入。个人理解，供参考。\"","cat":"收入准则\"","kw":"","std_ref":"","src":"会计准则委员会 准则实施问答"},{"id":"3900","q":"工程建造合同中可变对价的处理方法？\"","a":"可变对价（如业绩奖励、按时完工奖金、处罚扣款）应按期望值或最可能金额中的更可靠者估计，计入交易价格。重要约束：累计已确认收入不能超过极可能不会发生重大转回的金额（收入上限）。每个资产负债表日应重新估计。实务中，新收入准则下建造合同的奖金/罚款条款对利润波动影响显著。个人理解，供参考。\"","cat":"收入准则\"","kw":"","std_ref":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3899","q":"知识产权许可的收入确认——按时点还是时段？\"","a":"CAS 14对知识产权许可区分两类处理：①承诺在许可有效期内持续从事对该知识产权产生重大影响的活动（如品牌持续推广）->在一段时间内确认收入；②许可期内无需持续介入->在时点确认。具体判断需考虑：许可性质（功能性vs象征性）、合同中是否包含持续支持义务、客户是否合理预期企业将进行重大影响的活动。软件许可通常是时点确认，品牌许可可能需要时段确认。个人理解，供参考。\"","cat":"收入准则\"","kw":"","std_ref":"","src":"财政部 企业会计准则解释公告"},{"id":"3898","q":"附有销售退回条款的销售如何确认收入？\"","a":"CAS 14要求采用期望值法估计退货率：①确认收入时不包含预期退回商品对应的金额；②确认预计负债（退款义务）和应收退货成本（收回商品的权利）；③每个资产负债表日重新估计退货率并调整收入。实务中，历史退货率、行业惯例、季节性因素均应纳入估计模型。个人理解，供参考。\"","cat":"收入准则\"","kw":"","std_ref":"","src":"会计准则委员会 准则实施问答"},{"id":"3897","q":"合同资产和应收账款的区别及列报？\"","a":"两者核心区别在于收款权利的条件：①应收账款——仅随时间流逝即可收款（无条件收款权）；②合同资产——收款权取决于企业是否完成其他履约义务（有条件收款权）。报表列报：合同资产需单独列示，并按照CAS 22进行减值测试。典型场景：已完工但未结算的建造合同款项、分期交付中已完成但待后续交付后才可收款的款项。个人理解，供参考。\"","cat":"收入准则\"","kw":"","std_ref":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3896","q":"客户未行使的权利（储值卡余额）如何处理？\"","a":"CAS 14规定，企业收取的预收款应确认为合同负债。客户未行使的权利（如过期储值卡余额）：①如企业预期有权获得该金额->按客户行使权利的模式按比例确认收入；②否则，仅在客户要求履约的可能性极低时确认收入。实务中需关注：预收款是否可退还、法定时效规定、历史核销比例。个人理解，供参考。\"","cat":"收入准则\"","kw":"","std_ref":"","src":"会计准则委员会 准则实施问答"},{"id":"3895","q":"附有质量保证条款的销售如何区分服务型质保和保证型质保？\"","a":"CAS 14将质量保证分为两类：①保证型质保——保证产品符合约定标准（如三包期内免费维修），作为预计负债处理（CAS 13）；②服务型质保——提供额外服务（如延保、增值服务），作为单独履约义务分摊交易价格并递延确认收入。判断标准：质保是否由法律规定、质保期限长短、企业是否承诺超出行业惯例的保障。个人理解，供参考。\"","cat":"收入准则\"","kw":"","std_ref":"企业会计准则第13号——或有事项","src":"财政部会计司 企业会计准则应用指南"},{"id":"3894","q":"新收入准则下主要责任人和代理人的判断标准？\"","a":"CAS 14规定，企业应根据在向客户转让商品前是否拥有对该商品的控制权来判断其身份：拥有控制权->主要责任人（总额确认收入）；无控制权->代理人（净额确认收入）。控制权的判断应综合考虑：①对商品承担主要责任；②承担存货风险；③有权自主决定价格。实务中，电商平台、旅行社、贸易代理等需逐合同分析。个人理解，供参考。\"","cat":"收入准则\"","kw":"","std_ref":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3893","q":"资产负债表日后宣告分配的股利如何处理？","a":"企业在资产负债表日后、财务报告批准报出日前宣告分配的现金股利或利润，不属于资产负债表日后调整事项——资产负债表日不存在分配义务。因此不应在资产负债表日确认负债，只能在附注中披露。股票股利也同样处理——不调整报表金额，仅在附注披露。注意：这与证监会要求的'利润分配预案'披露要求是两个层面的问题。个人理解，供参考。","cat":"期后事项","kw":"","src":"中国证监会 会计监管工作通讯"},{"id":"3892","q":"可转换债券对稀释每股收益的影响？","a":"计算稀释每股收益时，对可转换债券采用'假设转换法'：①假定可转债在期初（或发行日孰晚）已转换为普通股——增加分母（潜在普通股数量）；②将可转债的税后利息费用加回分子（归属于普通股股东的净利润）。若转换为反稀释（EPS反而增加），则不纳入计算。注意：转换价格低于平均市价时才具有稀释效应。个人理解，供参考。","cat":"每股收益","kw":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3891","q":"前期差错更正的追溯重述法？","a":"重要的前期差错应采用追溯重述法更正——视同该差错从未发生，重新列报前期比较财务报表。调整内容：①追溯重述差错发生期间的留存收益期初余额（及相关资产、负债项目）；②重述列报前期最早期初的留存收益。不重要的前期差错可直接调整发现当期损益。个人理解，供参考。","cat":"前期差错更正","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3890","q":"新保险合同准则下保险合同如何分类？","a":"CAS 25（2020）改变了原来的分类方式：不再简单划分为寿险/非寿险。现在根据保险合同的特征和评估方法分为：①通用模型（BBA）—适用于大部分寿险合同；②保费分配法（PAA）—适用于保险期间不超过一年的短期合同或符合条件的简化处理；③浮动收费法（VFA）—适用于具有直接参与分红特征的合同。企业需按合同持有目的和分组评估适用方法。个人理解，供参考。","cat":"保险合同","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3889","q":"中期财务报告中季节性收入的确认？","a":"中期财务报告采用'独立观'（discrete view），将每个中期视为独立的报告期间。季节性、周期性或偶然性收入不应在年度内预提或递延——即不应在淡季估计旺季收入。特殊情形：如企业每年收到一笔年度服务费，应按服务履约进度在各中期分摊确认，而非在收到时一次确认。个人理解，供参考。","cat":"中期财务报告","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3888","q":"经营分部如何确定？","a":"CAS 35要求以内部组织结构为基础确定经营分部——即企业定期向经营决策者报告、以分配资源和评价业绩的内部单位。确定经营分部的关键因素：①从事的经营活动能赚取收入和发生费用；②经营成果由经营决策者定期审阅；③有独立可获取的财务信息。如果公司按业务线和地区线两条维度管理，需选择其中一个作为分部基础。个人理解，供参考。","cat":"分部报告","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3887","q":"房地产企业新收入准则下可在一段时间内确认收入的条件？","a":"CAS 14规定，满足以下任一条件方可在一段时间内确认收入：①客户在企业履约的同时即取得并消耗履约利益；②客户能够控制履约过程中的在建商品；③产出的商品不可替代且企业有权就迄今已完成部分收取款项。房地产企业需逐项目分析：如客户按进度付款且合同规定不可替代→可按时段确认，否则在交付时点确认。个人理解，供参考。","cat":"收入准则","kw":"","src":"财政部 企业会计准则解释公告"},{"id":"3886","q":"新收入准则下建造合同是否还适用完工百分比法？","a":"新收入准则统一了原建造合同准则和收入准则，建造合同应根据履约义务的性质判断收入确认方法：①客户可控制在建商品→在一段时间内确认收入，按产出法或投入法计量履约进度（本质上仍是完工百分比思路）；②其他情形→在控制权转移时点确认收入。因此完工百分比法的理念仍在，但应用面更宽。个人理解，供参考。","cat":"收入准则","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3885","q":"投资性房地产成本模式转公允价值模式如何处理？","a":"投资性房地产从成本模式变更为公允价值模式属于会计政策变更，应采用追溯调整法——调整期初留存收益。变更导致资产价值增加的部分应增加期初留存收益。变更后不得再转回成本模式。实务中需注意：企业应对全部投资性房地产统一采用一种模式，不得对不同项目采用不同模式。个人理解，供参考。","cat":"投资性房地产","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3884","q":"自用房地产转为投资性房地产的会计处理？","a":"自用房地产或存货转换为采用公允价值模式计量的投资性房地产，转换日公允价值大于原账面价值的差额计入其他综合收益（不影响当期损益），待处置时转入当期损益。公允价值小于原账面价值的差额计入公允价值变动损益。这是公允价值模式下防止企业利用转换操纵利润的特殊处理。个人理解，供参考。","cat":"投资性房地产","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3883","q":"无形资产使用寿命的确定？","a":"无形资产分为使用寿命有限和使用寿命不确定两类。使用寿命有限的按合同性权利或法定权利期限与预期使用年限孰短摊销。无法预见为企业带来经济利益期限的，属于使用寿命不确定的无形资产——不摊销，每年必须进行减值测试。实务中多数无形资产使用寿命有限。个人理解，供参考。","cat":"无形资产","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3882","q":"如何判断开发支出资本化的条件？","a":"研究阶段支出全部费用化；开发阶段支出同时满足以下五个条件方可资本化：①技术可行性；②有使用或出售意图；③能产生未来经济利益（有市场或内部有用）；④有足够资源支持开发；⑤开发支出能可靠计量。其中技术可行性和经济利益是最关键的判断点。个人理解，供参考。","cat":"无形资产","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3881","q":"合同能源管理（EMC）业务的会计处理？","a":"合同能源管理业务中，节能服务公司（ESCO）的会计处理主要有两种观点：①自建固定资产模式——将节能设备确认为固定资产，收入为向客户收取的效益分享款；②金融资产模式——将投资额确认为长期应收款，按实际利率法确认收益。证监会倾向于第一种观点（自建固定资产），但实务中两种模式均存在。个人理解，供参考。","cat":"实务综合","kw":"","src":"中国证监会 会计监管工作通讯"},{"id":"3880","q":"租赁期的确定原则？","a":"租赁期应涵盖不可撤销的租赁期加上：①合理确定将行使续租选择权的期间；②合理确定将不行使终止租赁选择权的期间。确定租赁期时需考虑：续租租金与市场租金的比较、装修投入、资产对承租人的重要性、终止或续租的违约成本等因素。个人理解，供参考。","cat":"租赁","kw":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3879","q":"短期租赁和低价值租赁的简化处理？","a":"短期租赁（租赁期不超过12个月）和低价值资产租赁（单项全新资产价值较低，如5万元以下）可选择不确认使用权资产和租赁负债，将租赁付款额在租赁期内按直线法计入相关成本费用。该选择权按资产类别逐类作出——同类别资产应保持一致的会计政策。个人理解，供参考。","cat":"租赁","kw":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3878","q":"售后回租中资产转让属于销售的会计处理？","a":"售后回租中资产转让属于销售的：①卖方兼承租人按原资产账面价值中与租回获得使用权相关的部分，确认使用权资产；②将转让总收益中与转让至买方兼出租人的权利相关的部分，确认收益；③使用权资产和租赁负债按CAS 21后续计量。实务中关键判断是控制权是否真正转移。个人理解，供参考。","cat":"租赁","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3877","q":"合并层面固定资产内部交易的抵销？","a":"母公司将设备出售给子公司作为固定资产使用时，合并层面需抵销：①内部销售收入和成本；②内部交易未实现利润；③设备在子公司个别报表多计提的折旧。抵销分录：借：营业收入（母公司），贷：营业成本（母公司），贷：固定资产——原值（未实现利润），同时借：固定资产——累计折旧，贷：管理费用（多提折旧）。个人理解，供参考。","cat":"合并报表","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3876","q":"权益法下被投资单位发生超额亏损的处理？","a":"投资企业确认被投资单位净亏损，以长期股权投资的账面价值及其他实质上构成对被投资单位净投资的长期权益减记至零为限。超额亏损在备查簿中登记。若被投资单位后续盈利，应在备查簿中未确认的亏损分担额得到弥补后，再恢复确认投资收益。个人理解，供参考。","cat":"长投","kw":"","src":"中国证监会 会计监管工作通讯"},{"id":"3875","q":"重大影响的判断因素？","a":"通常直接或间接持有20%以上50%以下表决权即推定有重大影响（可推翻）。若持股不足20%但存在以下情形之一也可能有重大影响：①在被投资单位董事会等权力机构派有代表；②参与财务和经营政策制定过程；③与被投资单位之间有重要交易；④向被投资单位派出管理人员。个人理解，供参考。","cat":"长投","kw":"","src":"中国证监会 会计监管工作通讯"},{"id":"3874","q":"接受母公司无偿划入资产的会计处理？","a":"子公司接受母公司无偿划入资产属于权益性交易。子公司按划入资产的公允价值或原账面价值（视是否有商业实质）入账，同时贷记资本公积——资本溢价。该交易不影响损益，直接计入所有者权益。实务中同一控制下的资产划转均按此原则处理。个人理解，供参考。","cat":"企业合并","kw":"","src":"深圳证券交易所 会计监管动态"},{"id":"3873","q":"理财产品如何分类和列报？","a":"理财产品的分类取决于其现金流量特征和业务模式：①保本保收益型→以摊余成本计量（债权投资）；②非保本但SPPI测试通过→以FVOCI计量（其他债权投资）；③其他→以FVTPL计量（交易性金融资产）。列报上：期限在一年内的列报为其他流动资产/交易性金融资产，一年以上的列报为其他非流动资产。个人理解，供参考。","cat":"金融工具","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3872","q":"金融资产终止确认的'继续涉入'概念？","a":"企业既未转移也未保留金融资产所有权上几乎所有的风险和报酬，且保留了对该金融资产控制的，应按继续涉入程度确认相关资产和负债。典型情形：附有信用增级的应收账款证券化——企业提供了部分担保，按担保金额确认继续涉入负债。个人理解，供参考。","cat":"金融工具","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3871","q":"应收账款保理不附追索权的会计处理？","a":"不附追索权的应收账款保理：若已将应收账款所有权上几乎所有的风险和报酬转移给保理商的，应终止确认应收账款。收到保理款与应收账款账面价值的差额计入当期损益（投资收益或财务费用）。若保理费用较大，可确认为当期财务费用。个人理解，供参考。","cat":"金融工具","kw":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3870","q":"PPP项目合同中金融资产模式与无形资产模式的区别？","a":"金融资产模式（政府保底）：政府保证无条件支付确定金额，企业确认金融资产（长期应收款）。无形资产模式（使用者付费）：企业承担需求风险，确认无形资产（特许经营权）。混合模式：政府保底一部分+使用者付费一部分——分别确认金融资产和无形资产。个人理解，供参考。","cat":"政府补助","kw":"","src":"财政部 企业会计准则解释公告"},{"id":"3869","q":"与资产相关的政府补助总额法与净额法选择？","a":"与资产相关的政府补助可选择总额法（递延收益法）或净额法（直接冲减资产成本）。选择权在首次确认时行使，一经选择，对同类政府补助应保持一致。总额法下递延收益随资产折旧摊销转入其他收益；净额法下资产以扣除补助后的净额列报，折旧减少。个人理解，供参考。","cat":"政府补助","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3868","q":"总额法与净额法转换的会计处理？","a":"企业因业务模式变化导致在主要责任人和代理人身份间转换的，属于会计估计变更（因为交易的实质变化），采用未来适用法——仅对未来交易采用新方法处理，不追溯调整前期交易。实务中，企业应持续评估其在不同合同中的身份，确保会计处理反映交易的实质。个人理解，供参考。","cat":"收入准则","kw":"","src":"上海证券交易所 会计监管动态"},{"id":"3867","q":"房地产企业预售房款何时确认收入？","a":"房地产开发企业的期房预售款在房屋交付前不符合收入确认条件——因为商品控制权尚未转移给客户。预售款应确认为合同负债。在房屋竣工验收并交付客户时，控制权转移，此时方能将累积的合同负债一次性转为收入。这是新收入准则下房地产行业最重大的变化之一。个人理解，供参考。","cat":"收入准则","kw":"","src":"财政部 企业会计准则解释公告"},{"id":"3866","q":"知识产权许可的收入确认时点or时段？","a":"企业向客户授予知识产权许可，若属于'在一段时间内履行'（许可方的行为会显著影响知识产权的商业价值），按时间段确认收入。若属于'在某一时点履行'（许可方无重大持续影响），在控制权转移时点确认收入。品牌授权通常属于时段义务——授权方的品牌维护行为持续影响品牌价值。个人理解，供参考。","cat":"收入准则","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3865","q":"客户未行使权利的合同负债（如预付卡余额）如何处理？","a":"客户未行使权利的部分（'breakage'），应按客户行使权利的模式按比例确认为收入——即根据历史经验和统计估计不会被行使的比例。若不满足估计条件的，只能在客户行使权利的可能性极低时才能确认收入。实务中商业预付卡、积分计划等均属此类。个人理解，供参考。","cat":"收入准则","kw":"","src":"上海证券交易所 会计监管动态"},{"id":"3864","q":"限制性股票的股份支付费用计算？","a":"限制性股票的股份支付费用=授予日标的股票的公允价值-授予价格（如有）。如果限制性股票无回购条款且授予后即享有分红权，授予日公允价值通常参照近期PE/VC投资价格或评估价值。等待期内的分红：若可撤销则调整费用，若不可撤销则计入当期损益（不调整费用）。个人理解，供参考。","cat":"股份支付","kw":"","src":"上海证券交易所 会计监管动态"},{"id":"3863","q":"以权益结算的股份支付确认费用的税务处理？","a":"以权益结算的股份支付在会计上确认为费用，但在企业所得税上需等到实际行权或解锁时才能税前扣除。因此会产生可抵扣暂时性差异——在预计未来有足够应纳税所得额时确认递延所得税资产。注意：确认的递延所得税资产对应科目是所得税费用还是资本公积，取决于相关规定。个人理解，供参考。","cat":"股份支付","kw":"","src":"财政部 企业会计准则解释公告"},{"id":"3862","q":"权益法下联营企业的顺流交易未实现损益？","a":"投资企业向联营企业出售资产（顺流交易），未实现内部交易损益应按投资企业持股比例抵销——调减投资收益和长期股权投资。这与逆流交易相对应的处理原则一致。处置联营企业股权时，未实现损益不再归属投资方，应转入投资收益。个人理解，供参考。","cat":"长投","kw":"","src":"中国证监会 会计监管工作通讯"},{"id":"3861","q":"母公司为子公司担保的外部借款合并处理？","a":"合并报表层面，子公司从银行取得的借款在合并层面仍为外部借款，母公司的担保在合并层面无意义（自己为自己担保），只需列报银行借款。子公司支付的担保费（付给母公司）在合并层面需抵销，合并层面仅体现对银行的利息费用。个人理解，供参考。","cat":"合并报表","kw":"","src":"财政部 企业会计准则解释公告"},{"id":"3860","q":"集团内部债权债务的合并抵销处理？","a":"合并报表中，母子公司之间、子子公司之间的债权债务应全额抵销，同时抵销对应的坏账准备。抵销后合并层面不体现内部债权债务。但若内部应收款已向外部第三方贴现且终止确认，合并层面应将其还原为外部借款。个人理解，供参考。","cat":"合并报表","kw":"","src":"深圳证券交易所 会计监管动态"},{"id":"3859","q":"合并过程中产生的审计、评估、法律费用如何处理？","a":"企业合并中发生的审计、法律、评估咨询等中介费用，于发生时计入当期管理费用。这是CAS 20的明确规定——无论同一控制还是非同一控制下的合并，相关直接费用均费用化。但发行股份或债券的手续费直接冲减资本公积或计入相关负债初始计量。个人理解，供参考。","cat":"企业合并","kw":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3858","q":"同一控制下合并取得的商誉怎么处理？","a":"同一控制下企业合并不产生新商誉。被合并方在最终控制方合并报表中已有的商誉，随合并事项转入合并方合并报表——按原值减累计减值准备后的金额入账。合并方个别报表层面的长期股权投资成本不含商誉（以被合并方账面净资产为基础）。个人理解，供参考。","cat":"企业合并","kw":"","src":"中国证监会 会计监管工作通讯"},{"id":"3857","q":"新准则下商誉是否摊销？","a":"根据CAS 8，商誉不进行摊销，但每年必须进行减值测试（无论是否有减值迹象）。特殊情况：被购买方不构成业务的，购买溢价或折价不确认商誉或负商誉，直接分摊到各项可辨认资产。商誉减值测试以'最低可辨认现金产出单元（或资产组组合）'为测试对象。个人理解，供参考。","cat":"资产减值","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3856","q":"总分公司与母子公司的关键区别？","a":"分公司不具有法人资格，民事责任由总公司承担。子公司具有独立法人资格，独立承担民事责任。会计核算上：分公司无实收资本，通过'上级拨入资金'核算总部拨付的资金；子公司有独立实收资本。纳税上：分公司与总公司合并缴纳企业所得税，子公司独立纳税。个人理解，供参考。","cat":"实务综合","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3855","q":"商品售后服务费作为单项履约义务的处理？","a":"新收入准则下，如果商品销售和售后服务构成两项可明确区分的履约义务，应将交易价格按单独售价比例分摊。售后服务作为在一段时间内履行的履约义务，按履约进度确认收入。实务中多数企业的延长保修服务属于此情形。个人理解，供参考。","cat":"收入准则","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3854","q":"生物资产的计量模式？","a":"生物资产一般采用成本模式计量。若有活跃市场、公允价值能可靠取得的，可采用公允价值模式。但对消耗性生物资产，初始计量采用成本，后续不允许转为公允价值计量。成熟的生产性生物资产按成本减累计折旧和减值计量。个人理解，供参考。","cat":"生物资产","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3853","q":"消耗性生物资产与生产性生物资产的区分？","a":"消耗性生物资产是指为出售或在将来收获农产品而持有的生物资产（如肉牛、用材林、养殖的鱼）。生产性生物资产是指为产出农产品、提供劳务或出租而持有的生物资产（如奶牛、果树、产畜）。两者的根本区别在于持有目的：前者用于一次性消耗，后者长期反复产出。个人理解，供参考。","cat":"生物资产","kw":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3852","q":"不涉及现金的重大投资和筹资活动如何披露？","a":"不涉及当期现金收支、但对企业财务状况和未来现金流量有重大影响的投资和筹资活动，应在现金流量表附注中披露。例如：债务转为资本、融资租赁固定资产、以发行股份方式收购子公司等。这些信息帮助报表使用者全面了解企业的投融资活动。个人理解，供参考。","cat":"现金流量表","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3851","q":"外币现金流量如何折算？","a":"外币现金流量采用现金流量发生日的即期汇率（或近似汇率）折算为记账本位币。汇率变动对现金的影响作为单独的调节项目列示。注意：外币报表折算时，资产负债表项目按期末汇率、损益表项目按近似汇率，产生的折算差额计入其他综合收益。个人理解，供参考。","cat":"现金流量表","kw":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3850","q":"将净利润调节为经营活动现金流量的方法？","a":"间接法下，从净利润出发，调整：①不影响现金流量的项目（折旧摊销、减值准备等）；②不属于经营活动的损益（投资收益、财务费用等）；③经营性应收应付项目的变动（应收账款增减、存货增减、应付账款增减等）；④递延所得税资产/负债变动。实务中按准则附录格式逐项填列。个人理解，供参考。","cat":"现金流量表","kw":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3849","q":"借款费用停止资本化的时点？","a":"购建或生产符合资本化条件的资产达到预定可使用或可销售状态时，借款费用即应停止资本化。实务中需逐项判断：实体建造已基本完成、所购建的资产与设计要求/合同要求/生产要求基本相符、后续支出很少。如果所购建资产各部分分别完工且可独立使用，应分别停止资本化。个人理解，供参考。","cat":"借款费用","kw":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3848","q":"暂停资本化的条件？","a":"购建或生产活动发生非正常中断且中断时间连续超过3个月的，应暂停借款费用资本化，将中断期间的借款费用计入当期损益。正常中断（如季节性停工、例行检修等）无需暂停资本化。判断正常还是非正常的关键：看中断是否是购建资产达到预定可使用状态的必经程序。个人理解，供参考。","cat":"借款费用","kw":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3847","q":"重组义务的确认条件？","a":"企业因重组而承担的重组义务，在同时满足以下条件时确认为预计负债：①有详细、正式的重组计划；②该重组计划已对外公告（使相关方形成合理预期）。重组义务的金额应仅包括与重组直接相关的支出（如员工遣散费、合同终止违约费），不包括与未来经营活动相关的支出。个人理解，供参考。","cat":"或有事项","kw":"","src":"财政部 企业会计准则解释公告"},{"id":"3846","q":"亏损合同的确认？","a":"亏损合同是指履行合同义务不可避免发生的成本超过预期经济利益的合同。当合同变为亏损合同时，应确认预计负债，金额为履行合同的不可避免成本（履约成本与违约罚款孰低）与预期经济利益的差额。注意：在确认亏损合同前应先对相关资产进行减值测试。个人理解，供参考。","cat":"或有事项","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3845","q":"推定义务与法定义务的区别？","a":"法定义务是因合同、法律法规等产生的义务。推定义务是因企业的行为（如公开承诺、过去的惯例、行业惯例等）使其他方建立了合理预期、企业将履行该义务。实务中，产品质量保证同时包含法定义务（法律规定）和推定义务（企业主动提供的质保服务）。个人理解，供参考。","cat":"或有事项","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3844","q":"预计负债的确认条件？","a":"预计负债需同时满足：①企业承担现时义务（法定义务或推定义务）；②履行该义务很可能（概率大于50%但未达到基本确定）导致经济利益流出企业；③该义务的金额能够可靠地计量。不满足任一条件，只需在附注中披露为或有负债。个人理解，供参考。","cat":"或有事项","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3843","q":"恶性通货膨胀经济下境外经营的会计处理？","a":"境外经营处于恶性通货膨胀经济中的，其财务报表应按照CAS 19的要求进行重述——首先按资产负债表日的计量单位表述（消除通货膨胀影响），然后再按资产负债表日即期汇率折算。实务中按国际惯例通常以三年累计通胀率接近或超过100%作为恶性通货膨胀的判断指标。个人理解，供参考。","cat":"外币折算","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3842","q":"实质上构成对境外经营净投资的货币性项目？","a":"如果企业对境外经营存在长期应收款，且该应收款在可预见的未来没有计划收回或不打算收回，则实质上是企业对境外经营的净投资。该应收款产生的汇兑差额在个别报表中计入财务费用，但在合并报表中应计入其他综合收益（外币报表折算差额）。个人理解，供参考。","cat":"外币折算","kw":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3841","q":"境外经营的处置时累计折算差额如何处理？","a":"境外经营处置时（包括出售、清算、返还资本等），与该境外经营相关的外币报表折算差额应从所有者权益转入当期损益。如果是部分处置（如出售比例不是100%），应按处置比例结转。这一处理确保了在处置时点之前累计在其他综合收益中的折算差额得以实现。个人理解，供参考。","cat":"外币折算","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3840","q":"外币货币性项目的期末折算？","a":"外币货币性项目（如应收账款、应付账款、借款等）在资产负债表日应按期末即期汇率折算为记账本位币。因汇率变动产生的汇兑差额一般计入当期财务费用。但需注意：与购建固定资产相关的外币专门借款产生的汇兑差额，在资本化期间内可予资本化。个人理解，供参考。","cat":"外币折算","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3839","q":"境外子公司记账本位币如何确定？","a":"CAS 19要求根据境外经营所处的主要经济环境中的货币来确定记账本位币。主要判断因素：①销售商品和服务的计价和结算货币；②主要成本费用的计价和结算货币；③融资活动产生的资金是哪种货币；④是否自主经营还是仅作为集团的延伸。实务中境外子公司如主要用当地货币交易、自主经营，则以当地货币为记账本位币。个人理解，供参考。","cat":"外币折算","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3838","q":"售后回租构成融资时CAS与IFRS处理差异？","a":"CAS 21和IFRS 16在售后回租构成融资的处理上基本一致——不确认销售收入，视为抵押融资处理。差异主要在计量细节：IFRS 16对租赁负债的计量更强调折现率的运用。CAS层面，如果资产转让不构成销售，按CAS 21第五十二条处理。个人理解，供参考。","cat":"租赁","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3837","q":"科技财政经费收到与支出的会计处理？","a":"收到财政科技经费时：借记'银行存款'，贷记'递延收益'。发生研发费用时：借记'研发支出'（区分财政拨付与自筹部分），贷记相关科目。期末按符合条件的支出，将递延收益结转至其他收益或冲减研发费用。自筹部分支出计入当期损益或资本化。个人理解，供参考。","cat":"政府补助","kw":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3836","q":"PPP项目自建工程的合并抵销？","a":"合并范围内将PPP项目发包给内部承包方的，编制合并报表时：若发包方是主要责任人，需抵销内部建造收入和成本；若发包方是代理人，无需抵销。非政府方的类PPP项目可参照上述原则，也可以参考合同能源管理业务的处理——证监会倾向'自建固定资产并为客户提供服务'的观点。个人理解，供参考。","cat":"实务综合","kw":"","src":"中国证监会 会计监管工作通讯"},{"id":"3835","q":"竣工结算后发现漏记场地平整费的处理？","a":"漏记的土地平整费应作为前期差错更正补记入账。需判断支出与土地使用权还是房屋建筑物更相关：一次性发生且后续不重复的计入土地使用权成本；与房屋设计建造相关且后续会重复发生的计入固定资产。按已平整土地面积比例进行分配。个人理解，供参考。","cat":"实务综合","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3834","q":"国资兼并中评估基准日后新增资产的处理？","a":"评估报告有效期自基准日起一年，即假设一年内公允价值不会发生重大变化。基准日后但仍在评估有效期内的新增资产，若公允价值与账面价值差异不大（尤其采用成本法评估的情况），一般无需重新评估，但需与交易对方确认。重大新增资产仍建议补充评估。个人理解，供参考。","cat":"实务综合","kw":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3833","q":"母子公司间委托加工并销售的会计处理？","a":"母公司委托子公司加工产品并销售的模式下，需分析哪一方是主要责任人：若子公司仅提供加工服务、不承担存货风险、不参与定价，子公司为代理人，净额法确认加工费收入。母公司为产品的主要责任人，总额法确认销售收入。合并层面内部交易需全额抵销。个人理解，供参考。","cat":"企业合并","kw":"","src":"财政部 企业会计准则解释公告"},{"id":"3832","q":"分公司审计的特殊考虑？","a":"分公司非独立法人，会计处理特点：无实收资本（用'上级拨入资金'），一般无资本公积、盈余公积科目，仅设未分配利润。分公司独立缴纳流转税但不是独立所得税纳税主体。审计报告需遵循《中国注册会计师审计准则第1601号》，明确报告目的、分发范围和使用限制。个人理解，供参考。","cat":"实务综合","kw":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3831","q":"股东撤资时退股款差额如何处理？","a":"股东撤资支付的退股款超出所减少的实收资本的差额部分，依次冲减资本公积（资本溢价）、盈余公积、未分配利润。即应采用'差额依次冲减权益项目'的做法，而非直接将差额计入未分配利润。这是保护债权人利益的资本保全原则的体现。个人理解，供参考。","cat":"实务综合","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3830","q":"私有化退市后股权激励的置换处理？","a":"私有化退市置换原股权激励计划时，需分析新计划与原计划是否存在实质差异：若仅因上市地变更而调整，实质性条款未变的，可视为对原计划的修改，按修改日重新计量。若新计划是全新安排，且原计划已取消，则按新计划处理——原计划未确认的费用不再确认，新计划按授予日计量。个人理解，供参考。","cat":"股份支付","kw":"","src":"上海证券交易所 会计监管动态"},{"id":"3829","q":"租赁资产相关支出的现金流量指定？","a":"出租方受承租方委托代建租赁资产部分工程，支出由承租方承担的，属于代收代付性质。应确认为经营活动现金流量（收到/支付其他与经营活动有关的现金），若满足条件可按净额抵销列报。同时需判断该代建业务是否应按净额法确认收入和成本。个人理解，供参考。","cat":"租赁","kw":"","src":"深圳证券交易所 会计监管动态"},{"id":"3828","q":"租赁协议中按营收/净利分红的处理？","a":"租赁协议约定'按营收比例1%或净利20%（孰高）向A公司分红'，属于可变租赁付款额，且并非取决于指数或比率。在金额确定后纳入当期租金成本，与使用权资产折旧计入相同的成本费用科目。此类付款额不纳入租赁负债初始计量。个人理解，供参考。","cat":"租赁","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3827","q":"与采购额挂钩的佣金能否计入存货成本？","a":"支付给平台与采购额挂钩的佣金（采购额的5%），与采购存货使其达到当前状态和场所直接相关，可计入存货成本。支付给平台的每月固定支出，不与具体采购订单挂钩的，不计入存货采购成本，计入管理费用。关键区别是佣金是否与具体采购订单相关。个人理解，供参考。","cat":"实务综合","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3826","q":"新旧仓库置换是否具有商业实质的判断？","a":"需关注新旧仓库在房屋结构、剩余使用年限、可使用面积、仓储条件、运行成本等方面是否存在实质性差异。存在实质性差异则具有商业实质，以公允价值为基础核算换入资产。换入资产的入账价值为不含增值税金额，应比较项目决算金额与评估值的差异，选择更可靠的信息入账。个人理解，供参考。","cat":"固定资产","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3825","q":"投资性房地产经营权出售的实质？","a":"A公司将投资性房地产15年经营权出售给B公司，同时约定每年上缴固定收益、不足由A差额补足的，实质为融资行为。A个别报表层面出售时确认收入，合并层面应冲回收入，将收到的资金计入长期应付款，每年支付的固定收益拆分为归还本金和利息分别处理。个人理解，供参考。","cat":"实务综合","kw":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3824","q":"清产核资无法清查价值时如何处理？","a":"根据《国有企业清产核资办法》，清产核资需包含账务清理、资产清查、价值重估、损益认定、资金核实等完整内容。若仅能进行实物清点、无账面价值和清查价值，不属于完整的清产核资，不应出具清产核资报告，应出具资产盘点报告或资产实物状态清查报告。个人理解，供参考。","cat":"实务综合","kw":"","src":"中国注册会计师协会 专业技术指导"},{"id":"3823","q":"合并内子公司转卖政府补助资产如何抵销？","a":"若资产内部转售不会导致不再满足享受政府补助的条件，合并报表层面应恢复已在卖方终止确认的递延收益，继续在原剩余年限内摊销。编制合并报表时需补充编制递延收益摊销的分录。这体现了合并层面还原经济实质的原则。个人理解，供参考。","cat":"政府补助","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3822","q":"政策性拆迁中'财政预算直接拨付'的含义？","a":"要求从财政专户直接拨款到被拆迁企业银行账户，不得通过施工单位、土储中心等过手。目前实务中满足该条件的情形较少，基本按资产处置处理（确认资产处置损益），参照《监管规则适用指引——会计类第3号》3-10。不符合条件的拆迁补偿按政府补助准则处理。个人理解，供参考。","cat":"政府补助","kw":"","src":"中国证监会 会计监管工作通讯"},{"id":"3821","q":"与资产相关政府补助的递延收益何时开始摊销？","a":"递延收益开始摊销的前提是对应资产已开始计提折旧或摊销。在资产剩余使用年限内采用系统合理的方法摊销，以实现与对应成本费用的配比。注意：政府补助的确认条件（收到或可收到补助）与递延收益开始摊销的条件（资产开始折旧）是两个不同的问题。个人理解，供参考。","cat":"政府补助","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3820","q":"涉及红包/优惠券的会计处理？","a":"广告平台向用户提供可抵扣订单金额的红包/优惠券，应作为平台的销售费用处理。即使平台同时是交易成交平台并向商户收取佣金，该处理结论也不受影响。可参考《上市公司执行企业会计准则案例解析2024》案例6-09。个人理解，供参考。","cat":"金融工具","kw":"","src":"中国证监会 会计监管工作通讯"},{"id":"3819","q":"合并范围内往来产生的汇兑损益是否可以抵销？","a":"合并范围内外币往来款产生的汇兑损益，在合并报表层面应继续保留，不能与其他综合收益抵消。例外情况：若该应收款项满足'实质上构成对境外经营净投资的外币货币性项目'定义，其汇兑损益可计入其他综合收益（外币报表折算差额）。个人理解，供参考。","cat":"金融工具","kw":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3818","q":"看跌期权与看涨期权的区分？","a":"看涨期权是持有人有权买入标的资产；看跌期权是持有人有权卖出标的资产。要区分的是谁持有期权、谁签出期权。卖方持有看涨期权时，在商品价格上涨时按固定价格回购更有利；卖方持有看跌期权时，在商品价格下跌时按固定价格卖出更有利。实务中不少人对方向判断混淆。个人理解，供参考。","cat":"金融工具","kw":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3817","q":"商业承兑汇票在集团财务公司贴现能否终止确认？","a":"集团内A公司收到B公司的商业承兑汇票后向集团财务公司C贴现的，即使C出具承诺书承诺直接向B追索，若C后续可能将票据再贴现，原'不向A追索'的约定可能不适用。基于谨慎原则，A公司不能终止确认该商业承兑汇票。终止确认需满足将所有风险和报酬转移给转入方。个人理解，供参考。","cat":"金融工具","kw":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3816","q":"客户索赔（质量保证）的会计处理？","a":"客户索赔若为保证类质量保证，不涉及退货的赔偿款，按可变对价原则处理：在原已确认的收入范围内冲减当期收入；超出部分计入营业外支出。若需回购相关产品，回购产品的入账价值为其可变现净值，回购款与入账价值的差额按上述原则处理。个人理解，供参考。","cat":"收入准则","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3815","q":"合同负债与应收账款能否抵销列报？","a":"两者不可抵销列报。证监会在《2020年上市公司年报会计监管报告》中明确该抵销属于错误。仅在合同不可撤销、企业在转让商品前已取得无条件收款权时，才可同时确认应收账款和合同负债（如不可撤销的工程总承包合同）。实务中这类情形较少。个人理解，供参考。","cat":"收入准则","kw":"","src":"中国证监会 会计监管工作通讯"},{"id":"3814","q":"向客户收取的贴现利息是否属于可变对价？","a":"若销售合同中已明确约定由客户承担贴现利息，或虽无约定但已形成稳定商业惯例的，该贴现利息应按可变对价处理——在确认收入时作为交易价格的调整项。若仅是一次性安排且无先例，则可能作为债务重组处理。个人理解，供参考。","cat":"收入准则","kw":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3813","q":"逾期利息与现金折扣的区别？","a":"两者本质差异并非是否违约：现金折扣是为鼓励客户提前回款给予的价格折让，属于可变对价，应冲减收入。应收账款逾期利息属于资金占用费，非金融企业取得的该类收入应计入投资收益，不确认为营业收入。这是收入准则与金融工具准则的边界问题。个人理解，供参考。","cat":"收入准则","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3812","q":"不能预估退货率的销售能否确认收入？","a":"新收入准则下，若退货率无法合理估计，企业不应在客户签收时确认收入。应将已收到的款项确认为合同负债，将发出的商品确认为发出商品。待退货可能性极低或不存在的时点再确认收入。实务中新产品、新市场等情况下退货率无法合理估计是常见的。个人理解，供参考。","cat":"收入准则","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3811","q":"处置少数股权而缴纳的所得税在合并报表中的列报？","a":"处置少数股权未丧失控制权的，合并报表层面所得税应区分两部分：①与股权持有期间利润相关的所得税计入损益；②与股权增值所得部分对应的所得税冲减资本公积。这参照了《监管规则适用指引——会计类第1号》同控下合并股权置换所得税的处理原则。个人理解，供参考。","cat":"企业合并","kw":"","src":"中国证监会 会计监管工作通讯"},{"id":"3810","q":"非同一控制合并中会计估计差异导致往来不一致？","a":"A公司收购C公司股权不构成业务的，不属于企业合并，应按购买资产处理。倒算存货入账价值=取得股权的成本+取得负债的公允价值-取得其他资产的公允价值。若构成业务，通常仍按不构成业务处理的可能性更大。实务中对'项目公司'是否构成业务的判断至关重要。个人理解，供参考。","cat":"企业合并","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3809","q":"一致行动协议下能否将持股较少的主体纳入合并？","a":"A公司仅持有C公司7%股权，但与持有16%股权的B合伙企业签署一致行动协议，若A可接受B的股东权利委托（仅让渡表决权，不让渡财产权利），则A可控制C公司51%股权对应的表决权，取得C的控制权。此时商誉计算时，B持有的16%权益仍作为少数股东权益。个人理解，供参考。","cat":"企业合并","kw":"","src":"财政部 企业会计准则解释公告"},{"id":"3808","q":"同一控制下吸收合并的个别报表处理？","a":"A发行股份吸收合并B、C（同受D控制），合并完成后仅剩A一个法人主体，无需编制合并报表。A个别报表中，取得的B、C净资产账面价值与发行股份面值之间的差额调整资本公积。A个别报表层面不体现原B、C的留存收益。这是同一控制下吸收合并的特殊性——个别报表即为最终报表。个人理解，供参考。","cat":"企业合并","kw":"","src":"上海证券交易所 会计监管动态"},{"id":"3807","q":"一揽子交易下分步处置子公司如何处理？","a":"出售子公司股权属于一揽子交易的，需等到全部交易完成后才视同丧失控制权。第一步处置部分股权时，若控制权尚未丧失且交易不可逆的可能性很小，处置价款与对应享有子公司净资产份额的差额确认为其他综合收益，丧失控制权时转入当期损益。若不满足前述条件，收到的款项计入其他应付款。个人理解，供参考。","cat":"企业合并","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3806","q":"公允价值减出售费用的含义？","a":"公允价值减去出售费用后的净额（FVLCD）是资产减值测试中的关键概念。公允价值是市场参与者在有序交易中出售资产可收到的价格。出售费用是直接归属于资产处置的增量成本（如法律费用、印花税、搬运费等），不包括财务费用和所得税费用。个人理解，供参考。","cat":"公允价值计量","kw":"","src":"财政部 企业会计准则解释公告"},{"id":"3805","q":"非活跃市场的公允价值如何确定？","a":"非活跃市场下，企业应使用估值技术确定公允价值。常用的估值技术：市场法（参考可比公司或交易）、收益法（现金流折现）、成本法（重置成本）。选择估值技术时应最大化使用可观察输入值、最小化使用不可观察输入值。同一资产可能有多个估值结果，应选择最具代表性的。个人理解，供参考。","cat":"公允价值计量","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3804","q":"公允价值计量的三个层次如何区分？","a":"第一层次：相同资产或负债在活跃市场未经调整的报价（最可靠）。第二层次：直接或间接可观察的、除第一层次外的输入值——如类似资产在活跃市场的报价、相同资产在非活跃市场的报价等。第三层次：不可观察输入值——企业基于最佳可得信息的主观判断和假设。三个层次按输入值的可靠性排序。个人理解，供参考。","cat":"公允价值计量","kw":"","src":"财政部 企业会计准则解释公告"},{"id":"3803","q":"固定资产折旧年限变更属于政策变更还是估计变更？","a":"固定资产折旧年限变更属于会计估计变更。折旧年限是基于对资产预期经济利益的估计，随着使用情况和新信息的出现，需要对原有估计进行修正——这是典型的估计变更。应采用未来适用法，不追溯调整前期报表。实务中容易混淆的是：改变折旧方法是政策变更，改变折旧年限是估计变更。个人理解，供参考。","cat":"政策/估计变更","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3802","q":"前期差错更正的追溯调整如何处理？","a":"重要的前期差错应采用追溯重述法更正：调整发现当期的期初留存收益，并调整前期比较数据。不重要的前期差错可直接调整发现当期的相关项目。在确定重要性时，既要考虑金额大小，也要考虑差错的性质——例如：虚构收入的差错即使金额不重大，性质上也是重大的。个人理解，供参考。","cat":"政策/估计变更","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3801","q":"会计政策变更与会计估计变更的区别？","a":"会计政策变更是指企业对相同交易或事项由原采用的会计政策改用另一会计政策。会计估计变更是指由于资产和负债的当前状况及预期经济利益和义务发生了变化，对资产或负债的账面价值或资产的定期消耗金额进行调整。核心区别：政策变更是对'确认、计量、列报基础'的改变，估计变更是基于最新信息对'金额'的修正。个人理解，供参考。","cat":"政策/估计变更","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3800","q":"以账面价值计量的非货币性资产交换？","a":"不具有商业实质或换入和换出资产的公允价值均不能可靠计量的，以换出资产的账面价值为基础确定换入资产成本，不确认损益。涉及补价的：收到补价方按比例确认收益，支付补价方增加资产成本。实务中大多数无商业实质的交换属于此类。个人理解，供参考。","cat":"非货币性资产交换","kw":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3799","q":"非货币性资产交换以公允价值计量时的处理？","a":"具有商业实质且换入或换出资产的公允价值能可靠计量的，应以换出资产的公允价值为基础确定换入资产的成本（除非有确凿证据表明换入资产公允价值更可靠）。换出资产公允价值与账面价值的差额计入当期损益。涉及补价的：收到补价方确认收益，支付补价方增加资产成本。个人理解，供参考。","cat":"非货币性资产交换","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3798","q":"非货币性资产交换具有商业实质的判断？","a":"判断是否具有商业实质，需关注换入资产与换出资产的未来现金流量在风险、时间、金额方面是否存在显著不同。若存在显著不同，则具有商业实质，以公允价值为基础核算。例如新旧仓库置换：若两者在房屋结构、剩余使用年限、可使用面积、仓储条件等方面存在实质性差异，则具有商业实质。个人理解，供参考。","cat":"非货币性资产交换","kw":"","src":"陈奕蔚 会计视野论坛答疑"},{"id":"3797","q":"多个项目共用专门借款时利息如何分配？","a":"专门借款用于多个项目的，应按各项目占用的专门借款金额比例、占用时间分配利息资本化金额。未使用的专门借款暂时投资产生的收益，应从资本化利息中扣除——但不能将投资收益直接冲减在建工程成本，而是作为借款费用净额的减项。个人理解，供参考。","cat":"借款费用","kw":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3796","q":"外币借款的汇兑差额能否资本化？","a":"外币专门借款的汇兑差额，在资本化期间内可予资本化（相当于借款费用的调整），计入相关资产成本。但需注意：①仅限专门借款的汇兑差额；②非资本化期间的汇兑差额计入财务费用；③一般借款的汇兑差额一律不计入资产成本。个人理解，供参考。","cat":"借款费用","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3795","q":"借款辅助费用（如银团费用）的资本化处理？","a":"银团贷款属于专门借款的前提下，银团费用属于借款辅助费用，应纳入实际利率计算。根据实际利率法，计算资本化期间内应计入利息的银团费用，随专门借款利息一并资本化。其他期间计入利息支出的银团费用予以费用化。处理依据优先按照借款费用准则应用指南的要求执行。个人理解，供参考。","cat":"借款费用","kw":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3794","q":"一般借款的利息资本化如何处理？","a":"一般借款利息资本化金额=累计资产支出超过专门借款部分的加权平均数×一般借款加权平均利率。累计资产支出加权平均数=∑（每笔资产支出金额×该笔支出占用的天数/当期天数）。一般借款的资本化金额不能超过当期实际发生的利息金额——这是上限。个人理解，供参考。","cat":"借款费用","kw":"","src":"会计准则委员会 准则实施问答"},{"id":"3793","q":"专门借款的利息资本化条件？","a":"专门借款的利息资本化需同时满足：①资产支出已经发生；②借款费用已经发生；③为使资产达到预定可使用或可销售状态所必要的购建或生产活动已经开始。三个条件缺一不可。资本化期间为满足上述条件至资产达到预定可使用状态之间。非正常中断超过3个月的应暂停资本化。个人理解，供参考。","cat":"借款费用","kw":"","src":"财政部会计司 企业会计准则应用指南"},{"id":"3792","q":"持有待售资产的减值测试？","a":"持有待售资产的减值测试方法：将其账面价值与公允价值减去出售费用后的净额比较，确认减值损失。若后续公允价值减去出售费用回升，在原已确认的减值损失范围内可予转回。注意：划分为持有待售前已确认的减值损失，在持有待售期间资产价值回升时是
