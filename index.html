的利息费⽤的确认，新会计准则规定采⽤实际利率法进⾏计算确定。实际利率 法，是指将⾦融资产或⾦融负债在预期存续期间或适⽤的更短期间内的未来现⾦流量，折现为该⾦融资产或⾦融负债当前账⾯价值，从⽽得出该⾦融资产或⾦融负债的实际利率（折现率），并按实际利率计算各期利息收⼊或利息费⽤的⽅法。考虑到实际利率法的处理结果与现⾏税法规定的名义利率法（合同利率法）差异较⼩，且能够反映有关资产的真实报酬率。所以，税法也认同企业采⽤实际利率法来确认利息收⼊的⾦额。个人理解，供参考。","cat":"收入准则","kw":"所得税,⼤额存单利息收⼊的纳税调整","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0696","q":"Reits原始权益⼈选择并表后，资产负债表右侧确认为负债是基于什么会计理 论？","a":"“只要有利润就必须分配”是会计上认定为负债的主要依据，因为现⾦分红（且设定了最低分红⽐例）是⼀项导致交付⾦融资产的合同义务，⽽“只要有利润就必须分配”的约定将会导致该项⽀付现⾦的义务⽆法通过发⾏主体⾃⾝的 ⾏为加以避免，这是符合⾦融负债定义的。 前期，证监会为了扫除REITs发展的障碍，在《监管规则适⽤指引——会计类第4号》之“4-1 并表原始权益⼈合并财务报表层⾯关于基础设施REITs其他⽅持有份额的列报”中明确“并表原始权益⼈合并财务报表层⾯对于基础设施REITs其他⽅持有的份额，列报为负债还是权益，主要取决于原始权益⼈是否存在⽆条件避免交付现⾦或其他⾦融资产的义务，具体考虑以下两⽅⾯因素：⼀是基础设施REITs是否可以避免现⾦分配义务。根据证监会、交易所等相关监管要求，若基础设施REITs产品连续两年未按照相关规定将不低于基⾦年度可供分配⾦额的90%进⾏收益分 配的，相关基⾦产品将按规定被交易所终⽌上市。据此，发⾏⼈有权选择在交易所终⽌上市以避免前述规定要求的现⾦分配义务。⼆是基础设施REITs是否可以避免到期强制清算义务。基础设施REITs虽然成⽴时设置了初始期 限，但其可通过扩募购⼊新的基础设施资产延长合同期限。因此，如发⾏⼈已依照相关规定要求说明前述分配、终 ⽌上市和扩募延期安排，且不存在其他可能导致判断为⾦融负债的约定，则发⾏⼈不存在不可避免的⽀付义务，并表原始权益⼈在合并财务报表层⾯应将基础设施REITs其他⽅持有的份额列报为权益。从基础设施REITs其他投资 ⽅的会计处理⾓度看，其持有的份额在性质上属于权益⼯具投资。”但这个问题在IFRS和⾹港准则下仍⽆定论，仍然是存在争议的。个人理解，供参考。","cat":"收入准则","kw":"合并,Reits原始权益⼈选择并表后,资产负债表右侧确认为负债是基于什么会计理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0256","q":"关于受托开发，成本及研发的会计处理","a":"此问题⾸先应确定对研发成果的控制权归属。例如，合同约定“研究开发成果的所有权归受托⽅所有，且受托⽅可将此研发成果⽤于对其他第三⽅⽣产、销售”，但实际操作中受托⽅⾃主使⽤研发成果制造产品并向第三⽅销售的可能性有多⼤？预计收⼊和利润与向委托⽅销售相⽐，是否重⼤？ 参照《监管规则适⽤指引——会计类第2号》之“2-8 定制化产品相关研发⽀出的会计处理”：“企业与客户签订合 同，为客户研发、⽣产定制化产品。客户向企业提出产品研发需求，企业按照客户需求进⾏产品设计与研发。产品研发成功后，企业按合同约定采购量为客户⽣产定制化产品。对于履⾏前述定制化产品客户合同过程中发⽣的研发 ⽀出，若企业⽆法控制相关研发成果，如研发成果仅可⽤于该合同、⽆法⽤于其他合同，企业应按照收⼊准则中合同履约成本的规定进⾏处理，最终计⼊营业成本。若综合考虑历史经验、⾏业惯例、法律法规等因素后，企业有充分证据表明能够控制相关研发成果，并且预期能够带来经济利益流⼊，企业应按照⽆形资产准则相关规定将符合条件的研发⽀出予以资本化。” 在本案例中，如果研发成果控制权归属于委托⽅，则应按受托提供研发劳务处理，但仅仅依据“委托⽅⽀付委托费 ⽤，若研究失败，⽆需返还已⽀付研究款项”⽆法得出该项履约义务属于在⼀段时间内履⾏的结论。⼀般理解更多可能性是⼀个时点（研发成果获得委托⽅验收确认时）确认收⼊。 如果由受托⽅控制研发成果，则后续授权委托⽅使⽤研发成果时，由于委托⽅只能通过购买受托制造的产品才能获取经济利益，故此时不单独确认受托研发的收⼊，⽽是将其并⼊产品销售收⼊中。此时不单独确认知识产权许可收 ⼊，不应出现主帖中所述的⽑利率为100%的情形。个人理解，供参考。","cat":"收入准则","kw":"控制权,履约义务,资本化,关于受托开发,成本及研发的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0422","q":"利息费⽤资本化","a":"采⽤债债权证明（云信）⽅式结算，是A和B最初⼯程承包合同中就确定的？还是后续补充约定的？为何采⽤买⽅承担保理融资利息的⽅式为B公司提供融资？ 如果最初⼯程承包合同中未约定该结算⽅式，是后续⼯程款结算过程中双⽅通过补充协议约定的，则该保理事项更多地是实现延期结算的⼀种⽅式，与专门借款存在区别，故保理融资利息不能资本化。 如果这是在最初的⼯程承包合同中就约定的结算⽅式，与⼯程建设互为前提，且通过该结算⽅式，A公司本⾝也获得了延迟⽀付款项的融资便利（实际⽀付款项的时间晚于此类合同的通常惯例），则可以将该保理安排视作⼀项专门借款，A公司承担的保理融资利息可以资本化计⼊在建⼯程成本。在这种情况下，A公司承担的平台⼿续费可作 为利息的⼀部分予以资本化（需注意按实际利率法分期确认为各期利息⽀出）。 提问⼈：Mark0507 时间：2024-06-27 07:12:47 陈⽼师，您好，⼯程承包协议和保理协议是分别签订的，承包合同中的结算⽅式是正常的按进度付款，那我理解应该是您说的前⾯那种情况，保理融资是延期结算，⽽⾮专门借款，还有个问题是，那算不算⼀般借款？。另外，按道理得到融资款的是卖⽅，所以卖⽅承担利息容易理解，买⽅就不涉及资本化问题，但是如果是买⽅承担利息，这 ⾥就有点混淆视听了，我了解买⽅成承担利息的主要原因也就是，因为银⾏提前给到卖⽅的这笔钱，实质使⽤了买 ⽅在银⾏的信⽤额度，视同买⽅的借款。所以银⾏向买⽅收利息，这样操作，是为了利息低，银⾏如果直接放款给企业，利率⾼，⽽且⾦额不像保理融资这么来的灵活。感谢陈⽼师！ 回答⼈：chenyiwei 可以看作⼀般借款。但不建议利息资本化。个人理解，供参考。","cat":"收入准则","kw":"资本化,利息费⽤资本化","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY1431","q":"对于看跌期权与看涨期权如何区分呢？这两者是否并⾮对应呢？ 回答⼈：chenyiwei","a":"i\" tabindex=\"-1\"> 对于看跌期权与看涨期权如何区分呢？这两者是否并⾮对应呢？ 回答⼈：chenyiwei 2、对于看跌期权与看涨期权如何区分呢？这两者是否并⾮对应呢？ 回答⼈：chenyiwei 这些概念在⾦融⼯具准则中都有定义，实务中可能需要结合具体的案例背景来具体讨论。 ⼀般⽽⾔，对于问题1，主要是看合同的未来现⾦流量是否会因汇率、利率、⼤宗商品价格等合同各⽅均⽆法控制的因素⽽发⽣变化，⽽⽆需导致合同成本的重⼤变动。对于问题2，主要是看选择权的⽅向（对持有⼈⽽⾔）是买⼊还是卖出，例如保证⾏权时可流⼊的最低⾦额现⾦的，则为卖出期权；对⾏权时需流出的现⾦加以最⾼额限制的，则为买⼊期权。 提问⼈：爬爬呀 时间：2025-06-08 21:27:48 针对第1点，确认衍⽣⼯具的关键是否看存在各⽅均⽆法控制的因素呢？ 回答⼈：chenyiwei 这只是确认时需考虑的因素之⼀。 提问⼈：爬爬呀 时间：2025-08-17 20:59:47 继续追问下，像国际准则中客户合同收⼊中有这样⼀段话， 回购协议是指主体出售⼀项资产并同时 （在同⼀合同或其他合同中） 承诺回购或拥有回购这项资产选择权的合同。回购的资产可以是原先向客户出售的资产、⼏乎与该资产相同的资产、或原先出售的资产为其组成部分的另⼀项资产。 回购协议通常采⽤三种形式： （１） 主体回购该资产的义务 （远期合同）； （２） 主体回购该资产的权利 （看涨期权）；以及 （３） 主体应客户要求回购该资产的义务 （看跌期权）。 疑问：1、为何将“主体回购该资产的权利 ”视为⼀项看涨期权呢？个人理解，供参考。","cat":"收入准则","kw":"对于看跌期权与看涨期权如何区分呢,这两者是否并⾮对应呢,回答⼈,chenyiwei","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY1355","q":"请陈⽼师解惑","a":"参照《上市公司执⾏企业会计准则案例解析2024》案例6-01，合同能源管理业务中的节能服务公司按照节能量收取服务费的，可将该项交易作为经营租赁处理，节能服务公司出资建造的节能设施（即此处的光伏电站）确认为节能服务公司的固定资产。该项固定资产的折旧年限为其⾃身设计使⽤寿命和合同约定的收益分享年限两者中的较短年限。 提问⼈：zsmj 时间：2025-06-18 16:13:13 陈⽼师 为什么认定为经营租赁⽽不是融资租赁，依据是什么？到期后资产⽆偿移交是否应认定为融资租赁呢 麻烦陈⽼师再给指导⼀下谢谢回答⼈：chenyiwei 可获得的租⾦与节能效益挂钩，说明节能设备所有权上的主要⻛险和报酬并未转移给⽤能单位（承租⼈）。所以根据两类租赁的定义，应认定为经营租赁。提问⼈：zsmj 时间：2025-10-27 15:08:21 公司主要业务为开发户⽤光伏电站并对外出售，公司将建好的户⽤光伏电站在存货核算，但是电站已建好且并⽹发电尚未完成对外销售。请问：已建好且并⽹发电的电站是否应转固定资产核算，并计提折旧摊销；问题 1、如果转固定资产核算，在对外完成销售时是计⼊营业收⼊还是资产处置损益？问题2、如果不转固定资产继续在存货核算，这就摊销如何计提。 回答⼈：chenyiwei 已建好且并⽹发电的电站，如预计短期内不能实现销售的，则应转为固定资产核算。后续实现销售时，按处置固定资产处理，确认资产处置损益，⽽不能再转回存货确认收⼊成本。 这类情况下的电站资产不同于房地产开发企业⽤于短期出租的开发产品，不能继续留在存货中核算，否则难以处理其成本的摊销问题。个人理解，供参考。","cat":"收入准则","kw":"租赁,固定资产,折旧,摊销,请陈⽼师解惑","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0727","q":"如果是同⼀控制，最早追溯到控制权变更⽇2022-1-1？还是B的成⽴⽇2020年？ 回答⼈：chenyiwei","a":"i\" tabindex=\"-1\"> 如果是同⼀控制，最早追溯到控制权变更⽇2022-1-1？还是B的成⽴⽇2020年？ 回答⼈：chenyiwei 3、如果是同⼀控制，最早追溯到控制权变更⽇2022-1-1？还是B的成⽴⽇2020年？ 回答⼈：chenyiwei “⼄于2022-1-1先取得上市公司A的控制权，同时提出预案A拟发⾏股份收购B100%股权”是否表明⼄取得A的控制权和将B装⼊A这两者并不是互为前提和条件的⼀揽⼦交易，尤其是后⼀项交易还需等待监管机构批准，能否实施的不确定性较⼤的情况下？如是，则这两者不构成⼀揽⼦交易的可能性较⼤。 将B装⼊A的交易是在实控⼈⼄的主导下筹划和实施的，且以A、B均受到⼄最终控制为前提，故A控制B属于同⼀控制下合并。在A的合并报表中，最早追溯到A、B均受⼄最终控制的最早期间，即2022-1-1。 提问⼈：star130 时间：2024-09-21 20:26:35 陈⽼师：根据财政部实施问答，假定在新设公司层⾯该交易构成同⼀控制下企业合并，新设公司需要编制合并财务报表。如果该新设公司的成⽴⽇晚于被注⼊的其他⼦公司或业务的成⽴⽇，该新设公司应当追溯⾄⾃⽐较期最早期初开始编制合并财务报表，即使⽐较期最早期初早于该新设公司的成⽴⽇，但应不早于被注⼊的其他⼦公司或业务处于最终控制⽅控制的时点。该新设公司的个别报表期初⽇为其成⽴⽇。 我认为上述问题应该最早追溯到2020-1- 1吧。 回答⼈：chenyiwei 在2022-1-1之前，上市公司A还不受到当前的实控⼈控制，因此不能再往2022-1-1之前追溯。个人理解，供参考。","cat":"收入准则","kw":"控制权,合并,如果是同⼀控制,最早追溯到控制权变更⽇2022-1-1,还是B的成⽴⽇2020年,回答⼈,chenyiwei","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY1718","q":"关于“试⽤设备”后续销售或者不销售的会计处理","a":"从主帖信息来看，只有两种可能的结果：客户⽀付9折价款购买；客户⽀付30%价款作为6个⽉使⽤费。因为⽆法合理估计这两种可能性，故应遵循可变对价的处理原则，即确保“极可能不会发 ⽣重⼤转回”。即先假设客户最后不会按9折购买，先将确定可取得的30%价款在6个⽉租赁期内按租赁准则规定确认收⼊，后续如果客户期满时选择购买，则再确认剩余60%的收⼊。 对于成本结转，在6个⽉使⽤期间，作为经营租赁，按照产品的正常使⽤寿命计算折旧，计⼊其他业务成本与租⾦收⼊配⽐；到确定向客户销售时，再结转剩余成本到销售成本。提问⼈：qingzhouygwcs 时间：2025-09-24 08:11:28 请教陈⽼师，在该情况下，试⽤期内设备是继续作为存货核算？如果作为存货，按折旧计算⾦额结转部分存货⾄营业成本准则依据是什么？是否与存货以历史成本计价⽭盾？如果试⽤期内转为固定资产，那使⽤期后客户购买时，可以固定资产转为存货吗？现⾏准则似乎没有相关规定固定资产可以再转存货。 回答⼈：chenyiwei 是，继续作为存货核算，此期间内计提折旧是参照房地产⾏业的出租开发产品。这样做也是因为避免⽇后销售时只能作为固定资产处置，导致⽆法确认收⼊。提问⼈：wx_604817add8f3 时间：2025-09-26 11:17:27 陈版主，我司有类似情况，只不过是借⽤是⽆偿的，试⽤后可能买可能不买。类似这种原则，是不是可以借⽤期间的折旧计⼊销售费⽤，到期如果买，按照购买价格记收⼊，折旧后剩余⾦额记成本呢 回答⼈：chenyiwei 这种情况可以将⽆偿使⽤期间的折旧作为销售费⽤。个人理解，供参考。","cat":"收入准则","kw":"租赁,固定资产,折旧,求助陈版关于“试⽤设备”后续销售或者不销售的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0179","q":"部分⾦额背书的应收票据是否可以终⽌确认？","a":"这种情况⾸先是确定是将⾦融资产终⽌确认的原则应⽤于⾦融资产整体还是特定部分。根据《企业会计准则第23号 ——⾦融资产转移（2017年修订）》第四条规定：⾦融资产的⼀部分满⾜下列条件之⼀的，企业应当将终⽌确认的规定适⽤于该⾦融资产部分，除此之外，企业应当将终⽌确认的规定适⽤于该⾦融资产整体： （⼀）该⾦融资产部分仅包括⾦融资产所产⽣的特定可辨认现⾦流量。如企业就某债务⼯具与转⼊⽅签订⼀项利息剥离合同，合同规定转⼊⽅有权获得该债务⼯具利息现⾦流量，但⽆权获得该债务⼯具本⾦现⾦流量，终⽌确认的规定适⽤于该债务⼯具的利息现⾦流量。 （⼆）该⾦融资产部分仅包括与该⾦融资产所产⽣的全部现⾦流量完全成⽐例的现⾦流量部分。如企业就某债务 ⼯具与转⼊⽅签订转让合同，合同规定转⼊⽅拥有获得该债务⼯具全部现⾦流量⼀定⽐例的权利，终⽌确认的规定适⽤于该债务⼯具全部现⾦流量⼀定⽐例的部分。 （三）该⾦融资产部分仅包括与该⾦融资产所产⽣的特定可辨认现⾦流量完全成⽐例的现⾦流量部分。如企业就某债务⼯具与转⼊⽅签订转让合同，合同规定转⼊⽅拥有获得该债务⼯具利息现⾦流量⼀定⽐例的权利，终⽌确认的规定适⽤于该债务⼯具利息现⾦流量⼀定⽐例的部分。 企业发⽣满⾜本条（⼆）或（三）条件的⾦融资产转移，且存在⼀个以上转⼊⽅的，只要企业转移的份额与⾦融资产全部现⾦流量或特定可辨认现⾦流量完全成⽐例即可，不要求每个转⼊⽅均持有成⽐例的份额。 建议关注：后续收到票据款时，是否严格地按50：50的⽐例在本企业和受让⽅之间分配从该票据收回的现⾦流量。个人理解，供参考。","cat":"收入准则","kw":"【请教陈版】部分⾦额背书的应收票据是否可以终⽌确认","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0048","q":"授权经营不动产出租是否可以确认为投资性房地产","a":"不可以。 根据《讲解2010》第四章中对于“已出租的建筑物”的解释： （三）已出租的建筑物 已出租的建筑物是指企业拥有产权的、以经营租赁⽅式出租的建筑物，包括⾃⾏建造或开发活动完成后⽤于出租的建筑物以及正在建造或开发过程中将来⽤于出租的建筑物。例如，甲公司将其拥有的某栋⼚房整体出租给⼄公司， 租赁期2年。对于甲公司⽽⾔，⾃租赁期开始⽇起，该栋⼚房属于投资性房地产。企业在判断和确认已出租的建筑 物时，应当把握以下要点: 1.⽤于出租的建筑物是指企业拥有产权的建筑物。企业以经营租赁⽅式租⼊再转租的建筑物不属于投资性房地产。例如，甲企业与⼄企业签订了⼀项经营租赁合同，⼄企业将其持有产权的⼀栋办公楼出租给甲企业，为期5年。甲企业⼀开始将该办公装后⽤于⾃⾏经营餐馆。2年后，由于连续亏损，甲企业将餐馆转租给丙公司，以赚取租⾦差价。这种情况下，对于甲企业⽽⾔，该栋楼不属于其投资性房地产。对于⼄企业⽽⾔，则属于其投资性房地产。 ……个人理解，供参考。","cat":"收入准则","kw":"租赁,授权经营不动产出租是否可以确认为投资性房地产","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0259","q":"会计科⽬","a":"资本公积分为两部分，资本溢价（或股本溢价，下同）以及其他资本公积中的由权益结算股份⽀付形成的部分属于资本性投⼊，⽽其他资本公积（权益结算股份⽀付形成的除外）更多地是⼀项过渡性项⽬，更类似于其他综合收 益，⽇后最终将转⼊损益。个人理解，供参考。","cat":"实务综合","kw":"会计科⽬","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0274","q":"公允价值第⼏层次","a":"虽然“重要参数包括⾮流动性折扣⽐例、控股权溢价⽐例，属于通过分析市场交易案例获取”，但该类股权交易在市场上可作为参考的可⽐同类或类似交易较少，难免在模型中⽤到不能直接从市场交易中观察到的参数。因此，此处的“公允价值减去处置费⽤”⼤概率仍属于第三层次。个人理解，供参考。","cat":"实务综合","kw":"公允价值,公允价值第⼏层次","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0288","q":"补充协议导致发⾏⼈义务变化","a":"中的权益项⽬，⼀般是借记“资本公积——资本溢价或股本溢价”，即使这样会导致该明细科⽬的余额出现负数。 ⼀般也是“资本公积——资本溢价或股本溢价”，即把（1）中冲减的资本公积补回（实际计⼊资本公积的⾦额要⼤于（1）中冲减资本公积的⾦额，因为包含就上述负债计提的利息）。个人理解，供参考。","cat":"实务综合","kw":"补充协议导致发⾏⼈义务变化","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0096","q":"时点法确认收⼊依据","a":"此问题应当逐条对照新收⼊准则第⼗⼀条规定的应使⽤时段法的三种情形，说明为何都不符合。例如：个人理解，供参考。","cat":"实务综合","kw":"时点法确认收⼊依据","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0099","q":"请问陈⽼师关于现⾦结算的股份⽀付取消会计处理。","a":"现⾦结算股份⽀付中累积计⼊成本费⽤的⾦额等于最终结算给激励对象的现⾦。因此，如果现⾦结算股份⽀付在可 ⾏权⽇未达到可⾏权条件中市场条件⽽取消结算，则冲回前期确认的负债，对应冲减股份⽀付费⽤。 提问⼈：v724292421 时间：2024-03-04 21:20:30 请教陈⽼师，现⾦结算股权⽀付： 1，关于准则说，只要满⾜可⾏权条件⾮市场条件，企业就应当确认相应的成本费⽤（则不能冲销）？ 2，结合1，如果我说的没错，那么企业跟激励对象约定了可⾏权条件中市场业绩，但是激励对象确实没有实现可⾏权条件中市场业绩（⽽满⾜⾮市场条件），企业确认相应的成本费⽤和应付职⼯薪酬，如果按约定条款，企业不能 ⽀付给激励对象，那么应付职⼯薪酬不就是长期挂账了（因不能冲销）？还是仍需当做员⼯投⼊（转⼊资本公积） 呢？ 回答⼈：chenyiwei个人理解，供参考。","cat":"实务综合","kw":"请问陈⽼师关于现⾦结算的股份⽀付取消会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0290","q":"监事能否对被投资单位构成重⼤影响","a":"监事会的职权主要是监督，⽽不是积极参与财务和经营决策。在重⼤影响的判断⽅⾯，派驻董事和⾼管远⽐派驻监事更为重要。仅仅派驻监事⽽不派驻董事和⾼管，通常认为⽆重⼤影响。个人理解，供参考。","cat":"实务综合","kw":"监事能否对被投资单位构成重⼤影响","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0100","q":"职⼯福利费的计提与发放","a":"根据《财政部关于企业加强职⼯福利费财务管理的通知》（财企[2009]242号）规定：“企业给职⼯发放的节⽇补 助、未统⼀供餐⽽按⽉发放的午餐费补贴，应当纳⼊⼯资总额管理”。因此，将过节费作为职⼯福利费列⽀是不恰当的。 该项过节费应在实际发放时计⼊相关成本费⽤。个人理解，供参考。","cat":"实务综合","kw":"职⼯福利费的计提与发放","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0305","q":"现⾦流量表⼯程领⽤原材料","a":"不需要进⾏现⾦流量项⽬的调整处理，除⾮在最初购⼊时就可以明确划分将⽤作⼯程物资的⾦额（此时资产负债表中应直接确认⼯程物资，对应的现⾦流量分类为投资活动）。如果购⼊时⽆法区分，后续⼯程领⽤的，则现⾦流量表⽆需调整。个人理解，供参考。","cat":"实务综合","kw":"现⾦流量表⼯程领⽤原材料","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0306","q":"股东减资价格低于评估值，如何处理","a":"根据主帖信息，后续评估值⾼于原协议约定减资额的差额，B公司（被减资企业）⽆需进⾏账务处理。个人理解，供参考。","cat":"实务综合","kw":"股东减资价格低于评估值,如何处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0101","q":"⽣产过程中的成品抽检成本如何计算？","a":"由于抽检是必须的流程，因此⽤于抽检的样品的成本应由最终实现销售的产品数量负担，相应增加其单位成本。即本案例中计算最终的单位⽣产成本时，分母为90件。个人理解，供参考。","cat":"实务综合","kw":"⽣产过程中的成品抽检成本如何计算","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0307","q":"被合并⽅盈利能否弥补合并⽅的亏损？","a":"如果是吸收合并，或许有这种可能性；控股合并就不可以了。个人理解，供参考。","cat":"实务综合","kw":"合并,被合并⽅盈利能否弥补合并⽅的亏损","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0312","q":"终⽌⽣产的产品⼈⼯费⽤如何处理","a":"应当合理确定花费在产品B上的⼈⼯和制造费⽤成本（个⼈理解，⽆法合理确定的可能性很⼩，尤其是在两个同类产品同时⽣产的情况下），将这部分成本在确定产品B终⽌时计⼊损益（营业成本）处理。个人理解，供参考。","cat":"实务综合","kw":"终⽌⽣产的产品⼈⼯费⽤如何处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0316","q":"母⼦公司应收账款保理业务","a":"母公司个别报表层⾯的现⾦流量是会发⽣错配的，但因为后续⼦公司（债务⼈）直接向银⾏还款，现⾦流不通过母公司（债权⼈），⽽现⾦流量表正表只能以特定会计主体真实发⽣的现⾦流动为依据编制，所以这部分错配问题在 ⽬前的现⾦流量表模型下⽆法解决，只能通过加强披露来部分弥补。个人理解，供参考。","cat":"实务综合","kw":"母⼦公司应收账款保理业务","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0106","q":"请教或有对价会计处理","a":"⼀般情形下，或有对价资产属于以公允价值计量且其变动计⼊损益的⾦融资产或⾦融负债，在最终结算⾦额（或⾃ ⾝权益⼯具数量）最终确定之前的每个资产负债表⽇都应重新计量其公允价值，并确认公允价值变动损益。 不清楚你看到的信息的出处是什么，也可能是你的理解有误。个人理解，供参考。","cat":"实务综合","kw":"公允价值,请教或有对价会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0109","q":"证监会会计类1号","a":"“该项投资不满⾜权益⼯具定义”的原因是：该项投资附有回售条件，且直接以被投资企业作为回购义务⼈，因此被投资企业在接受投资款的同时即承担了导致经济利益流出企业的现时义务，故不符合权益⼯具定义，应确认⾦融负债。“投资⽅拥有与普通股股东⼀致的投票权及分红权等权利”的事实不影响该项判断。个人理解，供参考。","cat":"实务综合","kw":"证监会会计类1号","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0325","q":"拆迁成本","a":"可参考《上市公司执⾏企业会计准则案例解析（2024）》之“案例6-16 回迁房的收⼊确认”。如回迁房满⾜收⼊确认条件，则应在接收被拆迁旧房时作如你所说的会计处理。个人理解，供参考。","cat":"实务综合","kw":"拆迁成本","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0329","q":"全资⼦公司注销，未分配利润为负数的会计处理？","a":"在法律上，公司不可能将亏损分配给股东。 你所问的可能是税务⽅⾯的问题，即⼦公司的税务亏损能否转⼊母公司继续弥补。对此问题建议咨询税务专业⼈ ⼠，包括事先合理筹划，设计⼦公司的注销⽅案，以实现税收利益。个人理解，供参考。","cat":"实务综合","kw":"全资⼦公司注销,未分配利润为负数的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0332","q":"同⼀控制下⽆偿划转划出⽅的会计处理","a":"⽆偿划转时，划出⽅冲减资本公积的规定，最初是从《企业会计制度》中延续下来的（在该制度的“资本公积”科⽬使⽤说明中有此规定）。在企业会计准则下，该处理符合权益性交易的基本原理，故仍得以保留。个人理解，供参考。","cat":"实务综合","kw":"同⼀控制下⽆偿划转划出⽅的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0333","q":"请教陈⽼师：关于PE⼊股股份回购义务会计处理","a":"后续基于回购款本⾦计提的利息不能冲减资本公积，应正常确认为“财务费⽤——利息⽀出”。其他基本合理。个人理解，供参考。","cat":"实务综合","kw":"请教陈⽼师,关于PE⼊股股份回购义务会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0134","q":"本年发现的前期舞弊，是否需要调整前期内控审计报告意见类型","a":"重⼤前期差错更正表明在前期财务报表相关内控存在重⼤缺陷，个⼈理解此时应重新出具前期内控审计报告。个人理解，供参考。","cat":"会计政策/估计变更","kw":"本年发现的前期舞弊,是否需要调整前期内控审计报告意见类型","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第28号——会计政策、会计估计变更和差错更正"},{"id":"CY0248","q":"并购价格调整机制对被并购标的公司的影响","a":"这是交易双⽅之间的事项，如果不要求标的公司对交易双⽅或⼀⽅进⾏分配，或者交易双⽅或⼀⽅也不会向标的公司进⾏补⾜差额等资本性投⼊，则这些约定对标的公司⾃⾝报表⽆影响。 坏账准备的计提应依据⾦融⼯具准则规定，基于对应收款项的预期信⽤损失的评估确定，属于会计估计范畴，如果出现了“标的公司原来计提了应收款坏账准备，买卖双⽅予以调整为不计提坏账准备”的情况，则标的公司应⾸先核对该项调整是否确实表明⾃⾝以往的坏账准备会计估计存在差错，如果确定不存在差错的（例如坏账准备调整只是新⽼股东调整交易作价⾦额的⼀个借⼜），则标的公司⾃⾝⽆需进⾏账务调整。 提问⼈：随风999aaa 时间：2024-07-25 22:26:20 感谢陈⽼师详细解答！还想进⼀步问下，如果只是交易双⽅之间的事项，⽽未与标的公司达成协议或者约定，那么是否标的公司⽆需调整，也⽆需确认资本性投⼊（母公司投⼊）？ 回答⼈：chenyiwei ⼀般是这样。 提问⼈：随风999aaa 时间：2024-07-25 22:51:48 还想请教陈⽼师，”交易双⽅或⼀⽅也不会向标的公司进⾏补⾜差额等资本性投⼊“具体需要什么⽀持性证据或者⽂件作为⽀撑吗？怎么判断？感谢！ 回答⼈：chenyiwei 交易⽂件中没有约定，就默认交易双⽅或⼀⽅没有向标的公司⽀付补差款的义务。个人理解，供参考。","cat":"会计政策/估计变更","kw":"并购价格调整机制对被并购标的公司的影响","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第28号——会计政策、会计估计变更和差错更正"},{"id":"CY1639","q":"项⽬竣⼯结算后发现场地平整费漏记问题","a":"⾸先，漏记的⼟地平整费应补记⼊账，作为前期差错更正处理。 其次，考虑⼟地平整费计⼊什么科⽬，以及是否需在各期⼯程占地之间分配。参考《中审众环研究2020》之“问题1-1-20（相关⽀出在⼟地使⽤权和房屋建筑物成本之间的归属划分，以及陆续发⽣时的归集⽅法）”，“在实务中，判断某项⽀出是与取得⼟地使⽤权更为相关，还是与房屋建筑物的设计和建造更为相关，⼀个可使⽤的参考标准就是：在未来该房屋建筑物使⽤年限届满 拆除，在原址上再建造新的建筑物时，这些⽀出是否还会再发⽣。凡是在取得⼟地使⽤权时⼀次性发⽣，以后在该⼟地上建造新的房屋建筑物时不会重复发⽣的⽀出，例如⼟地出让⾦及拆迁补偿⾦，以及某些⼭区的⼟地平整费等，可以认为更多地与⼟地使⽤权的取得相关，其受益期涵盖了整个⼟地使⽤权的有效期间，这部分⽀出应当计⼊“⽆形资产——⼟地使⽤权”；凡是与房屋建筑物的设计和建造相关的⽀出，后续建造新的建筑物时还会再发⽣，其受益期等于房屋建筑物的折旧年限，应作为房屋建筑物成本计⼊固定资产价值。” 在考虑⼟地平整费是否需在各期占地（或各期在建⼯程）之间分配时，需考虑⽬前已平整的⼟地分别有多少⾯积对应于不同期次的⼯程项⽬，即按已平整的⼟地⾯积中各期所占⽐例为权数进 ⾏分配。个人理解，供参考。","cat":"会计政策/估计变更","kw":"固定资产,折旧,求助陈版主项⽬竣⼯结算后发现场地平整费漏记问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第28号——会计政策、会计估计变更和差错更正"},{"id":"CY0823","q":"实务中如果预计⼀年内能完成出售，则作为持有待售的可能性更⼤。抵债房产除⾮⽤于出租，⼀般不确认为投资性房地产。2、没有明确的定量指引，⼀般建议1年以内，最多不超过5年。","a":"这⾥的讨论分别针对投资性房地产和持有待售资产，两者适⽤不同的准则，不能混淆。个人理解，供参考。","cat":"持有待售","kw":"持有待售,实务中如果预计⼀年内能完成出售,则作为持有待售的可能性更⼤,抵债房产除⾮⽤于出租,⼀般不确认为投资性房地产,没有明确的定量指引,⼀般建议1年以内,最多不超过5年","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第42号——持有待售的非流动资产、处置组和终止经营"},{"id":"CY0336","q":"⼤股东债务豁免IFRS规定","a":"IFRS下对权益性交易没有具体的规定，但⼀般实务中同样认可权益性交易的处理规则，因此最终处理结果与中国企业会计准则下的处理结果⽆重⼤差异。个人理解，供参考。","cat":"实务综合","kw":"⼤股东债务豁免IFRS规定","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0347","q":"已核销的应收款项后期收回的，收回时算不算⾮经常性损益？","a":"已核销的应收款项的收回本⾝是偶发性的事项，且通常情况下应收款项在被核销前都已按个别认定原则进⾏个案审核，确定其基本回收⽆望，才能进⾏核销，故相当于已按个别认定法计提过坏账准备的应收款项。因此，该类应收款项收回的损益影响应属于⾮经常性损益。个人理解，供参考。","cat":"实务综合","kw":"已核销的应收款项后期收回的,收回时算不算⾮经常性损益","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0823","q":"实务中如果预计⼀年内能完成出售，则作为持有待售的可能性更⼤。抵债房产除⾮⽤于出租，⼀般不确认为投资性房地产。2、没有明确的定量指引，⼀般建议1年以内，最多不超过5年。","a":"这⾥的讨论分别针对投资性房地产和持有待售资产，两者适⽤不同的准则，不能混淆。个人理解，供参考。","cat":"持有待售","kw":"持有待售,实务中如果预计⼀年内能完成出售,则作为持有待售的可能性更⼤,抵债房产除⾮⽤于出租,⼀般不确认为投资性房地产,没有明确的定量指引,⼀般建议1年以内,最多不超过5年","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第42号——持有待售的非流动资产、处置组和终止经营"},{"id":"CY0969","q":"投资性房地产核算问题","a":"如果确定是该⼟地是⽤于建造⽤于出租的房地产，则在该房产的实体建造开⼯时，将“⽆形资产——⼟地使⽤权”转 ⼊“投资性房地产——在建”，其在房屋建设期间计提的摊销计⼊“投资性房地产——房屋建筑物”的成本。 提问⼈：yh1215⼩薯条 时间：2024-11-25 14:35:32 感谢陈版回复。追问如下： ⼟地和房屋是分开两项资产，分别计⼊：投资性房地产-⼟地使⽤权、投资性房地产-房屋建筑物吗？ 为什么不是实体建造开⼯时将“⽆形资产——⼟地使⽤权”这部分直接转⼊“投资性房地产-⼟地使⽤权”，在建主体先进“投资性房地产-在建”，建造期间“投资性房地产-⼟地使⽤权”摊销⾦额计⼊“投资性房地产-在建”，待竣⼯结算时转⼊“投资性房地产-房屋建筑物”？ 回答⼈：chenyiwei个人理解，供参考。","cat":"无形资产","kw":"摊销,投资性房地产核算问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第6号——无形资产"},{"id":"CY0081","q":"研发产出物⽤于⽣产的会计和税务处理","a":"本案例中，研发领料在经过研发过程后，其可变现净值会明显减少。因此，研发产出物（废板及废料）应根据其可变现净值⼊账并确认为存货，相应冲减研发⽀出。即，把研发领料在经过研发环节后的价值降低额作为研发⽀出的组成部分。个人理解，供参考。","cat":"无形资产","kw":"研发产出物⽤于⽣产的会计和税务处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第6号——无形资产"},{"id":"CY1391","q":"⼚房建设期间⼟地使⽤权摊销相关事项","a":"⾸先，整个地块的⼟地使⽤权价值应按各栋房屋占地⾯积的⽐例分摊到各栋房屋，在各该房屋完⼯后，对应的⼟地使⽤权摊销即不再资本化，应费⽤化处理。 其次，对于4号⼚房对应的⼟地使⽤权，如果公司的规划⼀开始就是要建到9层，且该9层必须整体投⼊使⽤（已建成的5层不能单独使⽤），则实体建造期间的⼟地使⽤权摊销可以资本化。但对于5层建成后⾄6-9层续建开⼯之前期间，实际上4号⼚房是处于停⼯状态的，该期间内的⼟地使⽤权摊销应计⼊管理费⽤处理。 提问⼈：phbing3777 时间：2025-05-20 11:16:58 陈⽼师！1、如果每栋楼按占地⾯积分摊的话，那空地部分如何处理？2、加建申请政府部⻔批复期间导致停⼯，是否属于正常停⼯？ 回答⼈：chenyiwei个人理解，供参考。","cat":"无形资产","kw":"资本化,摊销,⼚房建设期间⼟地使⽤权摊销相关事项","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第6号——无形资产"},{"id":"CY1817","q":"关于撤回IPO申报材料对股份⽀付等待期重估的问题","a":"可以“根据最新计划将等待期延⻓⾄2026年6⽉末，并将股份⽀付费⽤在原授予⽇⾄预计上市⽇2027年6⽉末之间进⾏摊销”，但不能冲销前期多摊销的费⽤，即应基于截⾄2024年6⽉的剩余未摊销费⽤，在延⻓的股份⽀付等待期内摊销。 提问⼈：我就不减速 时间：2025-12-08 09:17:53 请教陈版主，“不能冲销前期多摊销的费⽤，即应基于截⾄2024年6⽉的剩余未摊销费⽤”是不是跟《股份⽀付准则应⽤案例——以⾸次公开募股成功为可⾏权条件》所讲的原则冲突，请教如何理解。 回答⼈：chenyiwei 类似于折旧年限的调整，这类会计估计变更都是不调整前期已确认的累积费⽤，⽽是将剩余的需摊销费⽤在重新确定的剩余等待期内摊销。个人理解，供参考。","cat":"无形资产","kw":"折旧,摊销,关于撤回IPO申报材料对股份⽀付等待期重估的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第6号——无形资产"},{"id":"CY0394","q":"辅助费⽤资本化的变化","a":"我理解这是为了与新⾦融⼯具准则对于“交易费⽤”会计处理的规定相⼀致。根据CAS 22（2017）第三⼗三条规 定：“企业初始确认⾦融资产或⾦融负债，应当按照公允价值计量。对于以公允价值计量且其变动计⼊当期损益的 ⾦融资产和⾦融负债，相关交易费⽤应当直接计⼊当期损益；对于其他类别的⾦融资产或⾦融负债，相关交易费⽤应当计⼊初始确认⾦额”；第三⼗九条规定：“企业应当按照实际利率法确认利息收⼊。利息收⼊应当根据⾦融资产 账⾯余额乘以实际利率计算确定”。 即，计⼊⾦融负债初始计量⾦额的辅助费⽤（初始直接费⽤）后续的摊销构成其利息费⽤的⼀部分，因此资本化的处理原则与该利息的其他组成部分⼀致。个人理解，供参考。","cat":"无形资产","kw":"公允价值,资本化,摊销,辅助费⽤资本化的变化","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第6号——无形资产"},{"id":"CY0349","q":"⼟地收益⾦应如何会计处理呢？","a":"如果该⼟地收益⾦为出租收⼊的⼀定⽐例，则建议作为出租业务的成本处理，例如计⼊其他业务成本，与租⾦收⼊ （如其他业务收⼊）配⽐。个人理解，供参考。","cat":"实务综合","kw":"⼟地收益⾦应如何会计处理呢","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0350","q":"履⾏回购义务形成的资本公积负数相关问题","a":"根据主帖和2楼的信息，该项资本公积出现负数是不恰当的，应将该负数继续冲减盈余公积和未分配利润。个人理解，供参考。","cat":"实务综合","kw":"请教陈版主,履⾏回购义务形成的资本公积负数相关问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0356","q":"前瞻性调整","a":"⼀般不建议这样处理，尤其是在⽬前经济下⾏趋势明显，市场情绪不乐观的情况下，得出前瞻性调整影响⾦额为负数在逻辑上很可能并不合理。个人理解，供参考。","cat":"实务综合","kw":"前瞻性调整","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0357","q":"基本建设财务规则","a":"国有企业的建设项⽬，不论资⾦来源是否为财政资⾦，在会计核算上都遵循企业会计准则，没有实质性差异。但在财务管理、概算决算和相关监管中，对其中使⽤财政资⾦的部分，需遵循《基本建设财务规则》及其配套规则。这是两个不同的核算和管理⼜径，在可计⼊资产成本的项⽬范围和限额、借款费⽤和利息收⼊处理等⽅⾯均有差异。个人理解，供参考。","cat":"实务综合","kw":"基本建设财务规则","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0367","q":"如果本企业可以终⽌确认被贴现的银⾏承兑汇票，则作为“销售商品、提供劳务收到的现⾦”；如果不能终⽌确认，则作为筹资活动中借款收到的现⾦。","a":"如果确定是买⽅获得融资（例如延长了付款期限），则买⽅应调整到短期借款，相应地保证⾦可以作为筹资活动现 ⾦流出。个人理解，供参考。","cat":"实务综合","kw":"如果本企业可以终⽌确认被贴现的银⾏承兑汇票,则作为“销售商品,提供劳务收到的现⾦”,如果不能终⽌确认,则作为筹资活动中借款收到的现⾦","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0392","q":"关于应付账款的核销（希望有事务所经验的⽼师帮忙解答）","a":"https://bbs.esnai.com/thread-5487172-1-1.html个人理解，供参考。","cat":"实务综合","kw":"关于应付账款的核销,希望有事务所经验的⽼师帮忙解答","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0395","q":"⾼速公路养护⽀出的会计处理","a":"该⽂件的制定依据是“《公路法》《政府会计准则制度解释第4号》及公路养护⼯程管理有关规定”，因此主要是对政府会计体系下的此类⽀出具有规范作⽤。对于企业⽽⾔，可以作为参考但不是强制执⾏。个人理解，供参考。","cat":"实务综合","kw":"⾼速公路养护⽀出的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0411","q":"公司为应收账款购买了国内贸易信⽤保险，还需要计提坏账准备 么","a":"投保信⽤保险，属于购买了信⽤风险缓释⼯具，这是⼀项独⽴的⾦融⼯具，并不代表投保的应收账款不需要计提坏账准备。对投保信⽤保险的应收账款应照常计提坏账准备，在测算可收回⾦额时不考虑投保因素。 参考：《中审众环研究2020》之“问题4-1-80（应收账款由第三⽅提供保证的，坏账准备如何计提）”中的情形2。个人理解，供参考。","cat":"实务综合","kw":"求助陈版主,公司为应收账款购买了国内贸易信⽤保险,还需要计提坏账准备","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0417","q":"关于⼟地复垦保证⾦是否需要作为现⾦流⽀出？","a":"如果直接从该存款专户中列⽀的，则相应⽀出不再重复反映为现⾦流出。个人理解，供参考。","cat":"实务综合","kw":"关于⼟地复垦保证⾦是否需要作为现⾦流⽀出","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0980","q":"政府补助：园区税费返还通过固定资产的形式","a":"⾸先要确定：A企业购买房产是否出于其⽣产经营的正常需要？购买价格是否为公允价值，是否存在⾼于或低于公允价值的情况？ 如果此处的房产购买是具有商业实质的，且购买价格基本等于公允价值，则可以认为是由于园区⽅资⾦紧张，实质上以房抵补助款，该结算⽅式的变化不改变补助的性质，即仍属于与收益相关的政府补助，可在收到补助款时确认收益。 如果房屋交易价格低于公允价值，则交易价格低于公允价值的部分作为与资产相关的政府补助处理。个人理解，供参考。","cat":"政府补助","kw":"公允价值,固定资产,政府补助,园区税费返还通过固定资产的形式","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第16号——政府补助"},{"id":"CY1388","q":"研发补助会计差异引发的加计扣除差异","a":"可以这样理解。 《国家税务总局关于研发费⽤税前加计扣除归集范围有关问题的公告》（国家税务总局公告[2017]40号）第七条中有规定：“企业取得的政府补助，会计处理时采⽤直接冲减研发费⽤⽅法且税务处理时未将其确认为应税收⼊的，应按冲减后的余额计算加计扣除⾦额。” 另外需注意：研发⽀出补贴应计⼊其他收益（与⽇常活动有关），⽽不是计⼊营业外收⼊。个人理解，供参考。","cat":"政府补助","kw":"研发补助会计差异引发的加计扣除差异","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第16号——政府补助"},{"id":"CY0321","q":"与增资扩能有关的政府补助是否与⽇常活动⽆关？","a":"实务中政府补助“与⽇常活动相关”的界定是⽐较宽泛的。像这类情况也属于与⽇常活动相关，最终计⼊其他收益。个人理解，供参考。","cat":"政府补助","kw":"与增资扩能有关的政府补助是否与⽇常活动⽆关","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第16号——政府补助"},{"id":"CY1252","q":"关于外汇政府补助的问题","a":"政府补助的会计处理本身不涉及汇兑损益调整。即使计⼊递延收益，递延收益也不是外币货币性项⽬。 其他收益的确认，直接在收到补助款时（如果收到时⼀次性计⼊损益）的即期汇率折算；如确认为递延收益的，则按照收到补助款当⽇即期汇率折算，后续对递延收益不再进⾏汇率调整，按初次折算后的⾦额进⾏摊销计⼊各年度其他收益。个人理解，供参考。","cat":"政府补助","kw":"递延,摊销,求助陈版主,关于外汇政府补助的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第16号——政府补助"},{"id":"CY1367","q":"求助陈⽼师，企业收到超⻓期国债的账务处理","a":"只有在合理排除需要偿还的可能性后，才能确认为政府补助。 在⽬前情况下，建议先挂账其他应付款，同时与授予该拨款的财政部⻔沟通确认是否需偿还等事宜。待明确后，再考虑是否需调整处理。另外，对于需要偿还的情形，还需要明确⽇后利息的⽀付责任是否由本企业承担，如需由本企业⽀付利息的，还应计提确认利息⽀出。个人理解，供参考。","cat":"政府补助","kw":"求助陈⽼师,企业收到超⻓期国债的账务处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第16号——政府补助"},{"id":"CY1351","q":"投资可转债的后续处理","a":"虽然可转债投资整体上是作为⼀项以公允价值计量且其变动且其变动计⼊损益的⾦融资产核算的，但按名义本⾦和票⾯利率计算的利息收⼊仍确认为“投资收益——利息收⼊”，不计⼊公允价值变动损益。尤其是当债券系以不含应计利息的净价进⾏交易时。 可转债如果可以上市交易且有活跃市场的，则以市场价格作为公允价值；没有活跃市场的，则应将其拆分为⼀项普通债券和⼀项买⼊期权，前者按现⾦流量折现模型进⾏估值（预计未来现⾦流量按当前市场利率折现），后者应使⽤期权定价模型进⾏估值。具体可咨询⾦融⼯具估值领域内的专业⼈⼠意⻅。个人理解，供参考。","cat":"股份支付","kw":"公允价值,投资可转债的后续处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第11号——股份支付"},{"id":"CY1903","q":"股权激励提前终⽌问题","a":"股份⽀付形成的等待期内的“资本公积——其他资本公积”性质上属于股东（激励对象）以提供商品或服务的形式对企业进⾏的资本性投⼊，也属于权益性交易范畴。只不过在等待期未满时，仍存在被冲回的可能性，故在“其他资本公积”中暂挂。到等待期结束时，⽆论最终是否取消、激励对象是否⾏权，这部分费⽤和资本公积是不会再冲回了，所以可以作为永久性的资本公积转 ⼊“资本溢价或股本溢价”。 实际上，股份⽀付所形成的资本公积在等待期结束时既可以转⼊“资本溢价或股本溢价”，与激励对象是否⾏权、股份⽀付是否被取消⽆关。个人理解，供参考。","cat":"股份支付","kw":"股权激励提前终⽌问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第11号——股份支付"},{"id":"CY0972","q":"员⼯因处分被收回股权激励如何处理","a":"需要确定：这⾥的“受到处分”是否导致该员⼯不再符合服务期限条件或⾮市场业绩条件？ 如果受到处分的原因并不是其提前离职或者业绩不达标，则表明激励对象并未违反服务期限条件和业绩条件，此时取消其股权激励（收回激励股权），应按加速可⾏权处理。 提问⼈：877046713 时间：2024-11-26 08:23:12 是因为违纪收到⾏政处分 回答⼈：chenyiwei 因违纪受到⾏政处分不属于服务期限条件和业绩条件未满⾜的情况，所以股份⽀付费⽤应正常确认，还需考虑加速可⾏权问题。个人理解，供参考。","cat":"股份支付","kw":"请教陈⽼师,员⼯因处分被收回股权激励如何处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第11号——股份支付"},{"id":"CY0027","q":"对股东每股净资产的补偿","a":"请说明具体背景？补偿是由被收购⽅的原股东给予的，还是由其他⽅给予的？补偿款是否来源于收购⽅的关联⽅？ 另外，补偿款是⽀付给收购⽅，还是⽀付给标的企业？ 提问⼈：桂红艳 时间：2024-02-23 09:09:04 您好，陈⽼师，感谢您回复。补偿主要是甲公司（原始股东）最初按照10元/股购⼊⼄公司股份，三年后实际公司 每股净资产为5元/股未能达到10元/股，出于甲公司（原始股东）的补偿，⼄公司将差额部分每股净资产5元⽀付给甲公司（原始股东）作为罪每股净资产的补偿，甲公司（原始股东）对⼄公司持股⽐例未发⽣变化，每股净资产由10元每股减为5元每股。现甲公司（原始股东）收到该笔款项该如何进⾏账务处理？ 回答⼈：chenyiwei 该补偿款应当是由⼄公司⼤股东（⽽不是⼄公司）⽀付给甲公司的？如果由⼄公司（被投资企业）⽀付给甲公司 （股东），则没有意义，⼄公司的净资产进⼀步减少，起不到补偿作⽤？ 如果该补偿安排是与甲公司购⼊⼄公司股份同时达成的，则视为⼄公司股东授予甲公司⼀项卖出期权，即甲公司可在投资满3年后将标的股份按原始价格（10元/股）卖给⼄公司的⼤股东。甲公司应将该项卖出期权作为⼀项单独的衍⽣⾦融资产进⾏会计处理，确认为其他⾮流动⾦融资产。其核算独⽴于取得的⼄公司股份。具体可参考《监管规则适⽤指引——会计类第1号》之“1-1 特殊股权投资的确认与分类”中“⼀、附回售条款的股权投资”。个人理解，供参考。","cat":"股份支付","kw":"对股东每股净资产的补偿","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第11号——股份支付"},{"id":"CY0155","q":"关于实际控制⼈回购离职员⼯股权激励份额是否构成股份⽀付的问","a":"该股份的最初来源是发⾏⼈向持股平台定向增发的情况下，实际控制⼈收回上述股份的⾏为，因⽆后续再授予的计划，故同样构成新的股权激励，需要确认股份⽀付费⽤。个人理解，供参考。","cat":"股份支付","kw":"请教陈版主关于实际控制⼈回购离职员⼯股权激励份额是否构成股份⽀付的问","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第11号——股份支付"},{"id":"CY1586","q":"限制性股票不属于公司的为什么计⼊库存股，计⼊资本公积是不是更合适？","a":"限制性股票不仅是流通受到暂时限制，在其他股东权利⽅⾯也是受到限制的，可能只有有限的分红权（在现⾦股利不可撤销的情况下），因此事实上并不是已发⾏在外的股份，列作库存股更为恰当。 在其他⼀些情况下，例如公司接受私募基⾦的Pre-IPO投资，承诺若⼲年内未实现IPO则回购股份，此时投资者的股东权利是完整的，回购权只是给其提供额外的利益保障，这种情况下是可以确认为实收资本或股本的，同时将回购义务相关负债的初始确认⾦额冲减资本公积。个人理解，供参考。","cat":"股份支付","kw":"限制性股票不属于公司的为什么计⼊库存股,计⼊资本公积是不是更合适","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第11号——股份支付"},{"id":"CY1028","q":"关于联营企业永续债，投资⽅权益法核算问题","a":"权益法核算的基础是投资⽅在被投资⽅的“归属普通股股东的净利润”和“归属普通股股东的净资产”中所占的份额。因为发⾏永续债，在投资⽅是单独确认为⼀项“其他权益⼯具”，是归属于其持有⼈⽽不是普通股股东的权益，因此在发⾏时，本企业作为其普通股股东⽆需进⾏账务处理。 后续在权益法下确认在该联营企业的净利润中所占份额时，应将归属于永续债持有⼈的净利润从其净利润中扣除，得到归属普通股股东的净利润，将其乘以持股⽐例确认投资收益。其中，如果该永续债的利息是⾮累积的，则归属于永续债持有⼈的净利润等于本期实际宣告⽀付的永续债利息；如果该永续债的利息是累积的，则归属于永续债持有⼈的净利润等于永续债的本⾦和票 ⾯利率的乘积，⽆论是否递延⽀付。个人理解，供参考。","cat":"长期股权投资","kw":"递延,权益法,请教陈版,关于联营企业永续债,投资⽅权益法核算问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"CY0188","q":"新公司法认缴制下长期股权投资的确认","a":"严格来说，新旧公司法在出资⽅⾯的规定差异并不影响相关的会计处理原则。即使在现⾏的公司法下，股东也是以认缴出资额为限对公司承担责任。因此对于尚未实缴的出资，股东也需要在每期末考虑是否有必要确认预计负债并计⼊损益（投资收益）。只不过由于新公司法下加速到期的条件可能较以往宽松很多，因此股东需确认预计负债 （或其他情况下的应付出资款）的可能性较以往更⼤。但基本的会计处理原则还是⼀样的。个人理解，供参考。","cat":"长期股权投资","kw":"预计负债,新公司法认缴制下长期股权投资的确认","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"CY0193","q":"陈⽼师，请教下联营企业初始投资成本确定","a":"z这⾥的直接相关费⽤及其他必要⽀出，可类⽐为⾦融⼯具准则（新CAS 22）第三⼗三条中的”交易费⽤“，即：交易费⽤，是指可直接归属于购买、发⾏或处置⾦融⼯具的增量费⽤。增量费⽤是指企业没有发⽣购买、发⾏或处置相关⾦融⼯具的情形就不会发⽣的费⽤，包括⽀付给代理机构、咨询公司、券商、证券交易所、政府有关部门等的 ⼿续费、佣⾦、相关税费以及其他必要⽀出，不包括债券溢价、折价、融资费⽤、内部管理成本和持有成本等与交易不直接相关的费⽤。 审计费⽤，法律顾问费⽤，尽职调查费⽤均属于在交易前发⽣的⽀出，即使最终未完成交易，这些已⽀付的费⽤也不能收回，故不符合”增量费⽤“的定义，故应直接费⽤化⽽不能计⼊长期股权投资成本。个人理解，供参考。","cat":"长期股权投资","kw":"陈⽼师,请教下联营企业初始投资成本确定","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"CY1501","q":"请问联营企业净资产增加，为何投资企业⻓投没有按股权被动稀释？谢谢","a":"联营企业向其员⼯发⾏限制性股票，因存在业绩条件不满⾜或者提前离职等情形下的回购义务，因此需按照授予价格确认等额的库存股（⻅《企业会计准则解释第7号》第五条），其净资产并未因发⾏限制性股票⽽增加；同时，该部分限制性股票在解锁前被列作库存股，不属于发⾏在外股份，故被投资企业发⾏在外股份数量，以及本企业所持股份占⽐均⽆变化。相应地，本企业在被投资企业的净资产中所占份额⽆变化，故⽆需在被投资企业的授予⽇的权益法核算中体现出限制性股票发⾏的影响。 后续如满⾜解锁条件的，则在实际解锁时，应根据届时的净资产状况进⾏股权被动稀释的会计处理。即股权被动稀释的会计处理是在解锁⽇⽽不是授予⽇。个人理解，供参考。","cat":"长期股权投资","kw":"权益法,请问联营企业净资产增加,为何投资企业⻓投没有按股权被动稀释","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"CY1808","q":"处置固定资产不确定账⾯净值","a":"此时对于被处置部件的原账⾯价值，可以通过查阅历史账务资料确定其实际成本（最为准确）。如果该做法不切实可⾏的，也可以参照同类部件或同⾏业的市场价格，或者依据⼯程定额标准确定其实际成本、向设备制造商询问等。如果仍不可⾏的，也可以聘请评估机构采⽤重置成本法进⾏评估确定。 提问⼈：huangjiayong 时间：2025-11-10 15:31:07 陈版主您好，想追问⼀下： 如果上述⽅法均不可⾏或者没有办法获取，在这种情况下我们是否可以以该设备的处置价值作为固定资产清理的⾦额回答⼈：chenyiwei 如果⾦额不重⼤，或者处置时间距离最初取得时间较近，则也可以这样处理。个人理解，供参考。","cat":"长期股权投资","kw":"成本法,固定资产,处置固定资产不确定账⾯净值","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"CY1282","q":"⻓投成本法转权益法报表列示","a":"《应⽤指南汇编2024》P82已明确⽆需调整前期⽐较数据，相关原⽂如下： 上述转换时需要调整的留存收益在报表所有者权益变动表中列示千”上年年末余额”到“本年年初余额”之间的“其他”项⽬中，从⽽对本年年初的留存收益进⾏调整，⽆需追溯调整⽐较期间数据。提问⼈：satanweijia 时间：2025-04-22 17:35:28 陈⽼师，意思是连资产负债表的期初的⻓期股权投资也不需要修改了是吗。 只需要在报表所有者权益变动表中”上年年末余额”到“本年年初余额”之间的“其他”项⽬中列示变动情况。回答⼈：chenyiwei 是。（仅指个别报表层⾯）个人理解，供参考。","cat":"长期股权投资","kw":"权益法,成本法,求助陈版主,⻓投成本法转权益法报表列示","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"CY0218","q":"投房成本法改为公允价值计量","a":"是。追溯调整是将2022年1⽉1⽇的公允价值与账⾯价值的差额调整2022年期初留存收益。同时还需要调整报表的前期⽐较数据，视同在⽐较期间内已执⾏变更后的会计政策。个人理解，供参考。","cat":"长期股权投资","kw":"公允价值,成本法,投房成本法改为公允价值计量","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"CY0506","q":"公司投资的公司放⼊其他权益⼯具投资后增资可否改变计量","a":"是否因持股⽐例提升1%并派驻董事就具有重⼤影响，可参考《监管规则适⽤指引——会计类第1号》之“1-2 重⼤影响的判断”。 ⼀般理解，持股⽐例从12%提升到13%并不是⼀个很重⼤的变化，且仍未超过20%。在此情况下仅依据派驻⼀名董事即认定具有重⼤影响，还是要⾮常谨慎的。 如果确定具有重⼤影响，则长期股权投资的初始成本为转换⽇（开始具有重⼤影响之⽇）的公允价值，可参照最近 ⼀次增资价格确定、原持有的12%股权于转换⽇的公允价值与原账⾯价值之间的差额计⼊其他综合收益，并随后连同此前的其他综合收益余额⼀起转⼊留存收益。个人理解，供参考。","cat":"长期股权投资","kw":"公允价值,公司投资的公司放⼊其他权益⼯具投资后增资可否改变计量","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"CY0514","q":"租赁准则分期利率计算是按照复利还是单利","a":"理论上应按照年度的实际利率换算为⽉度的实际利率，即【（1+年利率）^(1/12)-1】，据此计算各⽉的实际利息⽀出。实务中如果影响较⼩的，也可以在算出年度的实际利息后，按⽉均摊。 上一页 陈版主（陈奕蔚老师）答疑历史文章（2024年05月） 下一页 陈版主（陈奕蔚老师）答疑历史文章（2024年07月） 粤ICP备18107660号 粤公网安备44060602000887号 关于网站 Copyright © 2021-2026 会计便利店 hjyweb.cn 【个人理解，供参考。","cat":"租赁","kw":"租赁,租赁准则分期利率计算是按照复利还是单利","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁"},{"id":"CY0295","q":"分公司合作核算问题","a":"由于是以A集团分公司的名义合作，即合作运营主体在A的体内，所以A应将该分公司的各项资产、负债和损益完整纳⼊其⾃⾝报表。 A取得B的投资款（装修费）时，应确认为⼀项负债（其他⾮流动负债）。相关装修⽀出正常形成分公司的长期待摊费⽤，在租赁期和合作期限孰短的年限内摊销。 每年末根据该分公司的盈亏状况，根据合作协议约定，计算确定应分给B的收益⾦额，或者应由B补⾜的亏损⾦额，并由双⽅共同确认。A据此调整上述其他⾮流动负债的账⾯价值，并对应计⼊损益。个人理解，供参考。","cat":"租赁","kw":"租赁,摊销,分公司合作核算问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁"},{"id":"CY0455","q":"可抵扣暂时性差异确认递延所得税资产是否有优先级？","a":"在主帖所述情形下，在已确认的递延所得税负债的限度内，⾸先确认与可抵扣亏损相关的递延所得税资产。当可抵扣亏损已⾜额确认递延所得税资产后，剩余还有可确认递延所得税资产的额度，则该额度应依据“转回时间早的优 先、转回不确定性⼩的优先”的原则，在各项可抵扣暂时性之间分配。 根据主帖所述的背景信息，如果对资产减值准备⽇后转回的可能性有疑虑的（例如⽇后转变为事实损失时，能否提交出充分的税前扣除证据），则可以优先考虑确认与租赁负债相关的递延所得税资产。个人理解，供参考。","cat":"租赁","kw":"减值,租赁,所得税,递延,可抵扣暂时性差异确认递延所得税资产是否有优先级","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁"},{"id":"CY1589","q":"⻓期亏损企业租赁递延所得税资产负债的后续处理","a":"对于⻓期亏损（此处的亏损，均指税务⼝径的应纳税所得额为负数，下同），且预计在租赁期内将持续亏损的承租⼈，在确认与使⽤权资产相关的递延所得税负债后，以已确认的递延所得税负债为限确认的递延所得税资产，实际上是针对可抵扣亏损的，后续也与该项递延所得税负债同步转回（因为上述递延所得税负债转回时并不会导致实际的纳税义务，说明前期的可抵扣亏损被利⽤了）。这样，不应存在”在以后年度由于租赁产⽣的递延所得税资产和负债转回并不同步“的问题。个人理解，供参考。","cat":"租赁","kw":"租赁,所得税,递延,⻓期亏损企业租赁递延所得税资产负债的后续处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁"},{"id":"CY0214","q":"收⼊是属于时点收⼊还是时段收⼊？","a":"出租商铺的租⾦，适⽤《企业会计准则第21号——租赁（2018年修订）》中关于出租⼈对经营租赁会计处理的规 定。根据该准则第四⼗五条规定：“在租赁期内各个期间，出租⼈应当采⽤直线法或其他系统合理的⽅法，将经营 租赁的租赁收款额确认为租⾦收⼊。其他系统合理的⽅法能够更好地反映因使⽤租赁资产所产⽣经济利益的消耗模式的，出租⼈应当采⽤该⽅法”。因此，租⾦收⼊应采⽤直线法或者其他系统合理的⽅法在租赁期内分摊确认收 ⼊。个人理解，供参考。","cat":"租赁","kw":"租赁,收⼊是属于时点收⼊还是时段收⼊","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁、《企业会计准则第21号——租赁（2018年修订）》"},{"id":"CY1678","q":"关于递延所得税资产的确认","a":"你的理解基本合理。该企业的做法不合理。即在尚未就可抵扣亏损⾜额确认递延所得税资产的情况下，不应就可抵扣暂时性差异确认递延所得税资产。 除了租赁负债对应的递延所得税资产可以在亏损企业情况下确认，没有其他类型的可抵扣暂时性差异即便在持续亏损的情况下也可以确认。事实上，在持续亏损的情况下，也是应在已确认的递延所得税负债的限度内确认与可抵扣亏损相关的递延所得税资产，后续递延所得税资产的转回与递延所得税负债的转回同步。个人理解，供参考。","cat":"租赁","kw":"租赁,所得税,递延,关于递延所得税资产的确认","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁"},{"id":"CY0605","q":"计提2024年1-6⽉折旧","a":"在租赁费已经于租赁期开始⽇（或更早）⼀次性付清的情况下，租赁负债的账⾯价值和计税基础均为零；使⽤权资产的账⾯价值和预付租⾦的计税基础均为租⾦总额，故不存在暂时性差异，⽆需确认递延所得税资产和负债。 主帖中的最后⼀笔分录是不需要的。 提问⼈：wx_5abe02573bf7 时间：2024-07-26 09:17:26 感谢陈⽼师这么晚还在回复我的问题，那我还想和您确认⼀下下⾯的分录我都不⽤确认了是吧？个人理解，供参考。","cat":"租赁","kw":"租赁,所得税,递延,折旧,计提2024年1-6⽉折旧","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁"},{"id":"CY1107","q":"共享办公室租赁","a":"⾸先要判断此处的“共享办公区”安排是否构成租赁或者包含租赁。 这⾥的“共享办公”是否明确界定了4家公司各⾃独占的办公区域的具体范围？即，特定的办公区域能否认定为已识别资产？如果是，则存在租赁。如果4家公司可使⽤的办公区域并不固定，则不属于已识别资产，也就不包含转租赁。 如果包含租赁的，则由于出租期限与原租赁的租赁期相同，故转租赁构成融资租赁。如果不包含租赁的，则将每期收取的使⽤费确认为营业收⼊处理。个人理解，供参考。","cat":"租赁","kw":"租赁,共享办公室租赁","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁"},{"id":"CY0250","q":"其他权益⼯具投资公允价值变动会产⽣暂时性差异吗？","a":"从所得税准则的规定来看，其第⼗⼆条仅对“与⼦公司、联营企业及合营企业投资相关的应纳税暂时性差异”确认递延所得税负债有特殊规定，即如果“投资企业能够控制暂时性差异转回的时间”且“该暂时性差异在可预见的未来很 可能不会转回”，则递延所得税负债不确认。对⾦融资产，并⽆这⽅⾯的豁免规定（包括此前对于原准则下的可供出售⾦融资产也没有这种豁免）。 基于谨慎考虑，对于⾦融资产的累计公允价值变动收益（⽆论是计⼊损益还是其他综合收益），为了⾜额确认递延所得税负债，在准则未明⽂规定豁免的情况下，应确保对应纳税暂时性差异⾜额确认递延所得税负债，⽽不考虑其转回可能性，以及预计转回时有⽆⾜够多的应纳税所得额。个人理解，供参考。","cat":"所得税","kw":"公允价值,所得税,递延,其他权益⼯具投资公允价值变动会产⽣暂时性差异吗","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第18号——所得税"},{"id":"CY1167","q":"！关于未确认递延所得税资产的可抵扣亏损","a":"是，由于A本身的亏损在可预⻅的未来⽆法获得抵扣，即不满⾜确认递延所得税资产的条件，故应列⼊“未确认递延所得税资产的可抵扣亏损”的披露。提问⼈：DDDJX 时间：2025-03-21 05:11:06 感谢陈版主的回复。准则对于未确认递延所得税的可抵扣亏损好像没有明确规定，如果公司认为由于⼀直没有业务，这些累计亏损即使是没有确认递延所得税资产，也⽆法认定为可抵扣的亏损，那是否可以不包含在“未确认的可抵扣亏损”⾥呢？ 回答⼈：chenyiwei 可抵扣是⼀项权利。不能因为“由于⼀直没有业务，这些累计亏损即使是没有确认递延所得税资产”⽽不认为其属于“可抵扣亏损”。个人理解，供参考。","cat":"所得税","kw":"所得税,递延,求助陈版主,关于未确认递延所得税资产的可抵扣亏损","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第18号——所得税"},{"id":"CY0599","q":"资产评估增值部分，如果企业亏损，是否确认递延所得税负债","a":"根据“⾜额确认递延所得税负债，谨慎确认递延所得税资产”的原则，除了准则明确规定不确认递延所得税负债的情形（例如某些与对⼦公司、合营企业、联营企业的股权投资相关的应纳税暂时性差异，以及初始确认豁免的情形） 以外，所有应纳税暂时性差异都应确认递延所得税负债。 如果该企业在可预见的未来，应纳税所得额将⼀直为负数，即递延所得税负债转回时不会导致实际的纳税义务，则表明将有可抵扣亏损被利⽤。故此时可在已确认递延所得税负债的限度内，就可抵扣亏损确认相应的递延所得税资产，并贷记“所得税费⽤——递延所得税费⽤”。该部分递延所得税资产将随着递延所得税负债的转回同步转回。个人理解，供参考。","cat":"所得税","kw":"所得税,递延,资产评估增值部分,如果企业亏损,是否确认递延所得税负债","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第18号——所得税"},{"id":"CY0263","q":"⼩企业会计准则适⽤性问题咨询","a":"⼩企业会计准则的设计，就是针对规模⼩、业务简单、没有对外投融资需求、会计⼈员数量少和专业⽔平较低、会计核算以报税和其他合规性申报为主要⽬的的企业。该准则对涉及⾦融资产、⾦融负债的相关规定并不完善，并且在较多⽅⾯（例如资产损失的确认和处理）采⽤了尽可能与企业所得税税务规定保持⼀致的处理⽅式。这些特点就决定了⼩企业会计准则并不适⽤于⾦融、投资类企业。 公募的证券投资基⾦应适⽤中国基⾦业协会发布的有关证券投资基⾦的会计核算规定。私募基⾦也可以参照财政部发布的理财产品会计核算相关规定（如《资产管理产品相关会计处理规定》）建⽴其会计核算和报表体系。个人理解，供参考。","cat":"所得税","kw":"所得税,⼩企业会计准则适⽤性问题咨询","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第18号——所得税"},{"id":"CY0060","q":"【求助陈版主】加计抵减政策到期原来结余的加计抵减额怎么处理","a":"参照财政部会计司2019年4⽉发布的“关于《关于深化增值税改⾰有关政策的公告》适⽤《增值税会计处理规定》有关问题的解读”：（ http://kjs.mof.gov.cn/zhengcejiedu/201904/t20190418_3227486.htm） ⽣产、⽣活性服务业纳税⼈取得资产或接受劳务时，应当按照《增值税会计处理规定》的相关规定对增值税相关业务进⾏会计处理；实际缴纳增值税时，按应纳税额借记“应交税费——未交增值税”等科⽬，按实际纳税⾦额贷 记“银⾏存款”科⽬，按加计抵减的⾦额贷记“其他收益”科⽬。 即，会计处理原则是在实际缴纳增值税时确认其他收益，类似于收付实现制，⽽不是权责发⽣制。在这种情况下， 留待以后年度享受的抵减额可以在帐外备查登记，但不会出现在账⾯上。也就是⼀般情况下不应出现“账⾯结余的 加计抵减额（涉及之前年度）”。建议检查此前的会计处理是否符合上述规定，如不符合的，则应进⾏差错更正处 理。个人理解，供参考。","cat":"所得税","kw":"【求助陈版主】加计抵减政策到期原来结余的加计抵减额怎么处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第18号——所得税"},{"id":"CY0069","q":"退回以前年度多缴纳税款","a":"以前年度多交税款是如何形成的？是否表明存在前期差错？⾸先要明确这个问题，才能判断收到的款项是冲减本年度的所得税费⽤、调整以前年度损益还是其他处理。个人理解，供参考。","cat":"所得税","kw":"所得税,退回以前年度多缴纳税款","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第18号——所得税"},{"id":"CY1543","q":"应收款项融资减值损失","a":"应收款项融资的后续计量模式是公允价值，若其账⾯价值（公允价值）不同于其计税基础（原始成本。或者原始成本+已纳税的累计利息收⼊），则需就其差额确认递延所得税资产或负债。 其中，对应于坏账准备的（会计处理为借：信⽤减值损失，贷：其他综合收益），不直接导致暂时性差异，故不直接确认递延所得税资产，但需将此前确认递延所得税资产时对应确认的其他综合收益，按照此处确认信⽤减值损失的⾦额乘以适⽤税率的乘积，从其他综合收益转⼊所得税费⽤。（即：借：其他综合收益——应收款项融资公允价值变动，贷：所得税费⽤——递延所得税费⽤）。个人理解，供参考。","cat":"所得税","kw":"公允价值,减值,所得税,递延,应收款项融资减值损失","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第18号——所得税"},{"id":"CY0105","q":"符合⼩型微利企业所得税税收优惠情况下，递延所得税资产负债的税率选择","a":"根据《企业会计准则第18号——所得税》第⼗七条：“资产负债表⽇，对于递延所得税资产和递延所得税负债，应当根据税法规定，按照预期收回该资产或清偿该负债期间的适⽤税率计量。” 在享受税收优惠后，相当于应纳所得税额=应纳税所得额*5%，即实际有效税率为5%。相应地，如果预计可预见的未来将可以持续享受该优惠税率的，则以5%税率计量递延所得税资产或负债。 本年期末如果预计接下来应纳税所得额将超过300万⽽不满⾜⼩型微利企业所得税税收优惠要求，则递延所得税资产和递延所得税负债采⽤25%税率。个人理解，供参考。","cat":"所得税","kw":"所得税,递延,符合⼩型微利企业所得税税收优惠情况下,递延所得税资产负债的税率选择","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第18号——所得税、《企业会计准则第18号——所得税》"},{"id":"CY1223","q":"求助企业分⽴，新设分⽴的企业报表坏账准备、存货跌价准备和累计折旧披露问题","a":"B企业作为新设⽴的企业，在其⾃身报表中，各项资产都是新取得的，即在设⽴⽇（分⽴⽇）进⾏初始计量，⽽累计折旧、减值等备抵项⽬都属于后续计量范畴，因此严格来说应收账款、存货和固定资产是按照原值+坏账/跌价/累计折旧备抵后的净值⼊账。 在实务中，为了简化⽇常账务处理，在⽇常账务处理中也可以按照原值和备抵科⽬分别⼊账。但在编制报表和报表附注时，对于设⽴时取得的各项资产，应按【设⽴⽇⼊账价值（净额）-设⽴ ⽇后计提的累计折旧和减值准备】进⾏披露。个人理解，供参考。","cat":"资产减值","kw":"减值,存货跌价,固定资产,折旧,求助企业分⽴,新设分⽴的企业报表坏账准备,存货跌价准备和累计折旧披露问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第8号——资产减值"},{"id":"CY0940","q":"有关停产⼯⼚减值的问题","a":"虽然⼟地可能存在升值，但如果打包出售，购买⽅愿意接受的价格上限仍然是该项资产未来产⽣现⾦流的能⼒，即未来现⾦流量现值。不能仅以其中单项资产的可能增值作为论据，证明整个资产组没有发⽣减值。 另外，如果考虑将地上建筑物全部拆除后按“裸地”出售，也要考虑到在⽬前情况下，⼟地市场是被⾼度管制的市 场，这种出售究竟有多少可能性，以及能否按照周边近期类似⼟地的报价出售，这些不确定性也要充分考虑，不能直接将周边近期类似⼟地的报价作为其公允价值。个人理解，供参考。","cat":"资产减值","kw":"公允价值,减值,请教陈版主有关停产⼯⼚减值的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第8号——资产减值"},{"id":"CY1569","q":"关于⼦公司注销，⺟公司是否可以超过出资额承担亏损","a":"既然C公司有对集团公司A的负债，则集团公司A的个别报表层⾯应该会有对C的应收款项，此时⼀般做法是⾸先对该项债权计提坏账准备（将债权、股权投资作为⼀个整体，按照《企业会计准则第8号——资产减值》的规定进⾏减值测试，测算可收回⾦额，确定应计提减值⾦额。在确定应计提的减值⾦额后，优先确认为⻓期股权投资的减值损失，剩余部分（如有）确认为债权的坏账损失），即，超出部分的损失是体现在对C公司借款的坏账损失中的。个人理解，供参考。","cat":"资产减值","kw":"减值,关于⼦公司注销,⺟公司是否可以超过出资额承担亏损","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第8号——资产减值、《企业会计准则第8号——资产减值》"},{"id":"CY1868","q":"抵账的会计处理","a":"该交易的实质是否为：B⽋A1000万元，将其中的700万元通过B的⼦公司C和D以600万元结算，A承担100万元的债务重组损失？ 如果是，则主帖所述的处理基本可以接受。 提问⼈：爬爬呀 时间：2025-12-09 15:34:29 是否计⼊信⽤减值损失更为合适呢？ 回答⼈：chenyiwei 计⼊投资收益或信⽤减值损失⽆根本区别，差异在于判断导致接受该⽅案的原因是否为债务⼈信⽤状况和偿债能⼒的恶化。个人理解，供参考。","cat":"资产减值","kw":"减值,债务重组,求助陈版主,抵账的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第8号——资产减值"},{"id":"CY0139","q":"-长期股权投资初始成本变动处理","a":"该情况属于在购买⽇后补充约定的价格调整安排，与当初的股权收购不构成⼀揽⼦交易，但也不能直接按照豁免的价款对长期股权投资成本进⾏调整，⽽是应当参照或有对价的处理⽅式，⾸先对现有的长期股权投资进⾏减值测试并计提减值准备，确认减值损失；其次，如果账⾯上已将尚未⽀付的收购款21万元确认为负债的，则将该负债转⼊营业外收⼊。理论上，前述减值损失⾦额不应⼩于营业外收⼊⾦额。个人理解，供参考。","cat":"资产减值","kw":"减值,求助陈版-长期股权投资初始成本变动处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第8号——资产减值"},{"id":"CY0183","q":"存货减值 是否可依赖评估报告","a":"在减值测试中将评估结果作为参考是常见的情况，关键是该评估的⽬的、⽅法、参数等是否与委托⽬的（进⾏资产减值测试）相适应。另外，在“存货近期⽆消息，⽆法确认可变现净值”的情况下，为何评估机构能够通过某些⽅法确定可收回⾦额？这种情形下确定的可变现净值是否可靠和可依赖？这些都是需要关注的问题。 尤其要注意：不能以资产基础法（成本法）的评估结果作为减值依据。对于存货，减值评估应采⽤市场法。个人理解，供参考。","cat":"资产减值","kw":"减值,成本法,存货减值,是否可依赖评估报告","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第8号——资产减值"},{"id":"CY1756","q":"物资、资产涉及资产减值","a":"建议与当初出具评估报告的评估机构沟通，确定截⾄⽬前，该评估报告所使⽤的评估⽅法、参数和相应的评估结果与近期市场信息相⽐，是否没有重⼤变化，且本企业对这些资产的持有⽬的和意图并未发⽣变化。如是，则可以依据当初的评估报告中的评估结果作为计提减值的参考依据，反之则需以其他⽅式确定截⾄930的可变现净值。 另外需考虑：为何2024年末未对这些资产计提减值，是否属于前期差错需追溯调整2024年度报表。个人理解，供参考。","cat":"资产减值","kw":"减值,资产涉及资产减值","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第8号——资产减值"},{"id":"CY1195","q":"⼯程项⽬诉讼相关费⽤资本化及减值的确认","a":"此类鉴定费等法律服务费应⼀次性计⼊损益处理。其主要考虑是：这类⽀出是接受法律专业服务的对价，其本身的发⽣是因为意外事项，并不是使得在建⼯程达到预定可使⽤状态的必要、合理⽀出，故不符合固定资产成本的构成条件。 如果⽇后胜诉，从对⽅收回了鉴定费等，则收回时冲减管理费⽤或者确认为营业外收⼊。不应先确认为应收款再计提坏账准备，因为导致其可收回性问题的并不是任何⼀⽅的信⽤⻛险。个人理解，供参考。","cat":"资产减值","kw":"减值,固定资产,资本化,⼯程项⽬诉讼相关费⽤资本化及减值的确认","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第8号——资产减值"},{"id":"CY1337","q":"掉期业务截⽌报表⽇公允价值重估问题","a":"此类交易的近端和远端是⼀个整体交易的两个步骤，因此在对该项⾦融⼯具估值时应作为⼀个整体予以考虑，远端和近端应同时进⾏公允价值重估。 从主帖信息来看，也有另⼀种可能性，即如果两笔交易的美元⾦额相同，则该安排实际上是以⼀定的美元为质押，取得三个⽉期的⼈⺠币借款，其交易⽬的并不是为了缓解美元的汇率⻛险。如果是，则也可以采⽤简化处理，在⽬前只有承诺⽽未实际发⽣交易的情况下，⽆需进⾏会计处理。个人理解，供参考。","cat":"金融工具","kw":"公允价值,陈版主,掉期业务截⽌报表⽇公允价值重估问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第37号——金融工具列报"},{"id":"CY0429","q":"供应链票据的列⽰","a":"理论上应该是如你所理解。但⽬前为⽌因当初联合发布通知的四部委对此均⽆进⼀步说法，故暂时维持原状，待有进⼀步的官⽅意见后再作变更处理。个人理解，供参考。","cat":"实务综合","kw":"供应链票据的列⽰","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0430","q":"求助：关于交易性⾦融资产⽆偿划转","a":"将资产⽆偿划出（划⼊⽅不是本企业的⼦公司或者其他被投资企业）时，⾸先将该项资产按其原先的计量模式核算到划转⽇（例如，该资产原先是作为交易性⾦融资产核算的，则应按公允价值计量到划出⽇，并确认公允价值变动损益），然后按照划出⽇的账⾯价值，依次冲减资本公积（资本溢价或股本溢价）、盈余公积、未分配利润即可。个人理解，供参考。","cat":"实务综合","kw":"公允价值,关于交易性⾦融资产⽆偿划转","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1382","q":"求助陈⽼师！外汇掉期业务会计处理","a":"我理解，假设公司的本位币不是美元，则该安排并不能转移或者化解美元的汇率⻛险，因为在交易前后，公司所持有的5000万美元都不会发⽣变化。该交易更接近于以5000万美元为质押借⼊ ⼈⺠币和⽇元（如主帖所述“提⾼美元资⾦的收益”）。因此不涉及运⽤套期会计⽅法。个人理解，供参考。","cat":"金融工具","kw":"求助陈⽼师,外汇掉期业务会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第37号——金融工具列报"},{"id":"CY0450","q":"母公司购买资产出售给⼦公司如何进⾏账务处理","a":"不建议采⽤“母公司确认⽆形资产，同时确认对⼦公司的收⼊”的处理，主要考虑：个人理解，供参考。","cat":"实务综合","kw":"母公司购买资产出售给⼦公司如何进⾏账务处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0452","q":"新版指南1130页例29-13的疑问","a":"2楼的解释是合理的，这个例⼦中没有提到前期⽐较数据的修改问题。个人理解，供参考。","cat":"实务综合","kw":"新版指南1130页例29-13的疑问","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0462","q":"公司成⽴早期净资产为负，⽆外部投资者，股份⽀付公允价值如何 认定？","a":"根据主帖所述情况，可以考虑的思路包括：个人理解，供参考。","cat":"实务综合","kw":"公允价值,求助陈版,公司成⽴早期净资产为负,⽆外部投资者,股份⽀付公允价值如何","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0466","q":"股权回购利息部分的会计处理","a":"回购款的利息应逐年计提，计⼊各年度的财务费⽤。主帖所描述的公司财务的处理是合理的。是否要开具发票属于税务处理问题，建议咨询税务专业⼈⼠意见。个人理解，供参考。","cat":"实务综合","kw":"股权回购利息部分的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0468","q":"关于长期应收款折现率的确定问题","a":"这两个利率都不合适，理论上应采⽤的折现率是本企业在类似期限和借款条件下，从商业银⾏按市场条件借⼊贷款时的资⾦成本率。不应采⽤银⾏理财产品收益率或者向其他企业拆借资⾦的利率，更不应简单套⽤LPR。个人理解，供参考。","cat":"实务综合","kw":"求助陈版主,关于长期应收款折现率的确定问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0472","q":"失控发票进项税额转出的会计分录怎么处理？","a":"失控发票在很多情况下并不是企业主观或者主动的⾏为，也是在被税务告知后才知道失控的。因此更多地是意外的、偶发性的损失。个⼈更倾向于计⼊营业外⽀出。个人理解，供参考。","cat":"实务综合","kw":"失控发票进项税额转出的会计分录怎么处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1486","q":"项⽬投资款及分红的账务处理","a":"这类交易中，作为接受投资⽅，因为分红与项⽬收益挂钩，并⾮固定收益，因此就取得投资款和投资⽅在该项⽬中的权益所确认的负债不属于以摊余成本计量的⾦融负债，相应地分配给投资 ⽅的收益不能视为利息，该分配额计⼊营业成本更合理。个人理解，供参考。","cat":"金融工具","kw":"项⽬投资款及分红的账务处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第37号——金融工具列报"},{"id":"CY1665","q":"处置投资业务收到的现⾦，现⾦流量表中如何列报？","a":"采⽤⽅案⼀，全部作为“收回投资收到的现⾦”。依据：《应⽤指南汇编2024》P1227： (1 ) 收回投资收到的现⾦。 本项⽬反映企业出售、转让或到期收回除现⾦等价物以外的分类为以公允价值计批且其变动计⼊当期损益的⾦融资产（以下简称交易性⾦融资产） 、分类为以摊余成本计量的⾦融资产（以下简称债权投资）、分类为以公允价值计量且其变动计⼊其他综合收益的⾦融资产（以下简称其他债权投资）、指定为以公允价值计量且其变动计⼊其他综合收益的⾦融资产（ 以下简称其他权益⼯具投资）、⻓期股权投资等⽽收到的现⾦，但不包括侦权性投资收回的利息、收回的⾮现⾦资产，以及处置⼦公司及其他营业单位收到的现⾦净额。债权性投资收回的本⾦，在本项⽬反映，债权性投资收回的利息，不在本项⽬中反映，⽽在“ 取得投资收益收到的现⾦” 项⽬中反映。处置⼦公司及其他营业单位收到的现⾦净额单设项⽬反映。本项⽬可以根据“交易性⾦融资 产”、 ＂债权投资”、“其他债权投资” 、“其他权益丁具投资” 、“⻓期股权投资”、“库存现⾦”、“银⾏存款”等科⽬的记录分析填列。个人理解，供参考。","cat":"金融工具","kw":"公允价值,请教陈版主,处置投资业务收到的现⾦,现⾦流量表中如何列报","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第37号——金融工具列报"},{"id":"CY0056","q":"亏损合同中标的资产的概念.","a":"为该项⽬预付的材料设备款项属于亏损合同中的标的资产，应对其计提减值准备。但不能将全部预计合同亏损都通过对这些资产计提减值来体现。对这些资产计提的减值准备不能超出其账⾯价值与预计亏损率（负⽑利率）的乘 积。合同预计亏损超出可针对该合同相关资产计提的减值准备的部分，确认为亏损合同相关预计负债。个人理解，供参考。","cat":"收入准则","kw":"减值,预计负债,求助陈版主亏损合同中标的资产的概念","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0453","q":"关于平台服务费是否需要分期确认收⼊","a":"⾸先要考虑其中的硬件销售和平台服务是否构成两项履约义务。主要考虑是两者是否具有⾼度关联性，例如该硬件的使⽤是否必须通过平台（在使⽤时是否必须始终与平台联⽹），能否⽤于接受其他供应商提供的类似平台服务； 以及本公司的平台服务是否必须通过该硬件来实现。 如果这两者具有⾼度关联性的，即硬件实际上是平台服务的载体，脱离了平台的硬件本⾝对客户并⽆独⽴的商业价值和⽤途，则硬件销售和平台服务这两者整体上构成⼀项履约义务，此时即使名义上收取硬件价款，也不能单独确认硬件的销售收⼊，⽽应当将全部价款确认为合同负债予以递延，在后续服务期内均摊确认收⼊；提供给客户的硬件成本转⼊合同履约成本，在服务期内分摊转⼊营业成本。 如果这两者互相独⽴，可分别构成⼀项独⽴的履约义务的，则应将合同总价在这两个履约义务之间按单独售价⽐例进⾏分摊，属于硬件价款的部分在将硬件交付给客户时确认收⼊，平台服务费则在胡须服务期间内分摊确认收⼊。 提问⼈：上班好烦呐 时间：2024-06-17 10:15:35 感谢陈版主回复，补充⼀些信息，该硬件的使⽤不是必须通过平台，平台服务相当于辅助服务，可以通过平台来进 ⾏硬件的实时监测，由于硬件内的设计及平台为⾃主开发，客户并不能接收其他供应商提供的类似平台服务。该公司的平台服务依托于硬件来实现，即只有客户购买了硬件才能够通过硬件数据采集到云端在平台上实现监测。 个⼈认为平台服务⾼度依托于硬件的销售与使⽤，平台服务与硬件销售为同⼀履约义务。回答⼈：chenyiwei 有可能是这种情况。个人理解，供参考。","cat":"收入准则","kw":"履约义务,递延,求助陈版主,关于平台服务费是否需要分期确认收⼊","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0058","q":"关于新公司法下，长期股权投资的确认问题","a":"如果各⽅股东约定按实缴出资⽐例享有股东权利的，则不论是否约定了出资期限，各股东均⽆需将⾃⾝尚未实缴的出资确认为对被投资企业的投资成本和应付投资款。因为这属于待执⾏合同。根据或有事项准则规定，待执⾏合同除⾮变为亏损合同，否则⽆需确认资产和负债。 如果按照认缴⽐例享有权益，则认缴⽐例⼤于实缴⽐例的股东相当于接受了其他股东让渡的利益，此时应确认对其他股东（让出利益的股东）的负债，对应确认为长期股权投资。但此时的负债是对其他股东的，⽽不是对被投资企业的。个人理解，供参考。","cat":"收入准则","kw":"求助陈版主关于新公司法下,长期股权投资的确认问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0520","q":"这是代理⼈⾃主决定的事项，故应调整代理⼈本⾝的营业收⼊。2、也可以认可这种例外情况。3、对购买⽅⽽","a":"销售⽅直接执⾏新收⼊准则第⼗六条对可变对价的规定，在收⼊确认时就应对可变对价作出合理、谨慎的估计，同时确保遵循“极可能不会发⽣重⼤转回”的限制条件。后续每个资产负债表⽇对该项会计估计进⾏修正。 提问⼈：爬爬呀 时间：2024-11-11 19:21:01 ⾟苦陈版主了，针对第2点还想继续问下，⽣产线的⼟建⼯程改造，对应的⼟地使⽤权摊销为何不能资本化呢？ 回答⼈：chenyiwei ⼟地使⽤权的摊销主要影响房屋的建造成本。现在只是⽣产线改造，⼚房并未转⼊在建⼯程。提问⼈：lcx711 时间：2024-07-10 00:57:46 股权激励公允价值确认相关问题 公司评估报告估值30亿元，现在以此为依据，进⾏员⼯股权激励，原注册资本600万元，现在以1元/每元注册资本的价格，授予员⼯共计40万元注册资本，（⾏权条件为上年净利润xxx万，已达标）则应确认⾄ 管理费⽤-股份⽀付⾦额多少万元？ 1）（30亿/600万-1）*40万=19960万元；（直接以估值计算每股价格，做为公允价格） 2）【（30亿+40万1）/（600万+40万）-1】40万=18712.5万元（考虑公司增资后，稀释了原每股公允价格，确认股份⽀付⾦额） 请问陈版，上述按哪个逻辑进⾏计算？ 回答⼈：chenyiwei 应采⽤第⼀种⽅式，即以增资前的每股公允价值减去增资价格，作为计量股份⽀付费⽤的基础。第⼆种做法的问题在于没有考虑股份⽀付的⼊股价格中是包含了相关服务的公允价值的，因此错误地稀释了每股公允价值。个人理解，供参考。","cat":"收入准则","kw":"公允价值,资本化,摊销,这是代理⼈⾃主决定的事项,故应调整代理⼈本⾝的营业收⼊,也可以认可这种例外情况,对购买⽅⽽","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0059","q":"买断式订阅收⼊如何确认","a":"履约义务的内容仍然是依托本企业所搭建的⽹络环境向客户提供包含各项软件功能的服务。应当可以满⾜“客户在企业履约的同时即取得并消耗企业履约所带来的经济利益”的条件，因此属于时段履约，合同总价款应在服务期内采⽤系统、合理的⽅式分摊确认收⼊。 提问⼈：7847748 时间：2024-06-26 11:31:23 您好陈⽼师，这个问题就在于合同签订为买断式，⽆服务期间，平台永久使⽤。后续⽀付年运营维护费，如果客户需要版本更新迭代也需再⽀付费⽤。这种永久卖断平台使⽤权，可以⼀次确认收⼊吗？还是需要考虑客户的⽣命周期，在产品声明周期内分期确认，这种预估服务期间依据不好提供，这个收⼊确认是按时点法还是按时段法？依据是什么呢？ 回答⼈：chenyiwei 理论上考虑⽣命周期。实务中⼀般按不短于10年。个人理解，供参考。","cat":"收入准则","kw":"履约义务,买断式订阅收⼊如何确认","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0426","q":"A公司财务报表是否应就该股权回购义务确认为⼀项⾦融负债，如长期应付款，并按照实际利率折现并按期分 摊融资费⽤，确认回购义务的同时对⼴告投放服务提供当年相应确认销售费⽤，账务处理如下：股权完成过户时， 确认回购义务","a":"鉴于“服务期限届满后，B公司有权要求A公司或P公司以不低于2.5亿的价格回购该5%股权，在B公司持有该项股权期间，享有对A公司财务报表查阅权、经营⽅向的知情权及对应⽐例的股权分红（需从后续回购价款中扣除）”， 且该⾦额与⼴告合同的预计结算⾦额相同，故可以确定B公司实际并不享有或承担作为A公司股东的风险和收益， ⽽是将A公司5%的股权作为⽀付服务费的质押担保。 A公司⽆需确认“其他⾮流动资产”和长期应付款”分别挂账，只需在确实丧失回购权时将⽆需回购的股份视同发⾏在外，转⼊实收资本。 ⼴告服务费按接受服务的进度确认销售费⽤和应付账款。如果到期后才结算，则结算时借记应付账款，贷记银⾏存款（将法律形式上的回购视为⽀付⼴告款）。 提问⼈：mieer1012 时间：2024-06-19 14:28:25 感谢陈版的耐⼼解答 我还有⼀个疑问：如果按服务进度确认费⽤及应付账款，如何体现该交易事项的融资性质呢？因为按照合同约 定，A公司在接受服务当年是不承担现时⽀付义务的，也就是说A公司承担的⽀付义务是⼀个远期义务，是否需要考虑对该义务进⾏折现呢？ 还是说该交易实际并不具有融资性质，只视作服务采购⽅为应付账款这项负债额外提供了⼀项担保资产？ 还请陈版解惑 回答⼈：chenyiwei 由于服务费集中于服务结束时（5年后）⼀次性⽀付，所以是具有融资性质的。假设5年内每年确认的收⼊相同，可以将最终需⽀付的价款除以年⾦终值系数，确定每年可确认的⼴告服务收⼊⾦额。确认收⼊对应于长期应收款。个人理解，供参考。","cat":"收入准则","kw":"A公司财务报表是否应就该股权回购义务确认为⼀项⾦融负债,如长期应付款,并按照实际利率折现并按期分,摊融资费⽤,确认回购义务的同时对⼴告投放服务提供当年相应确认销售费⽤,账务处理如下,股权完成过户时,确认回购义务","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY1567","q":"管理层在租赁合同届满时才决定减免以前期间房租，是否追溯作为租赁变更处理。","a":"由于租赁变更事项是在2025年7⽉签约的，故不能追溯到2024年末，这不是前期差错。 补充协议明确作为对原合同租⾦减免时，按照抵减的⾦额，借记租赁负债，贷记应收利息（假设前期已就该借款确认利息收⼊）。提问⼈：baibingbing132y 时间：2025-08-11 16:18:11 陈版您好，前期未就该借款确认利息收⼊，账上做的⽆息往来款，这种情况下贷记什么呢？ 回答⼈：chenyiwei 这个问题可在⼀定程度上参照《监管规则适⽤指引——会计类第5号》之“5-3 履约完毕后减让合同对价的会计处理”： 公司履约完毕、确认应收款项并按规定恰当计量预期信⽤损失后，再与客户约定调减合同对价，导致已确认的应收款项余额减少的情形下，若合同对价减让与公司转让商品等具体履约活动相关（例如因附有销售退回条款、履约瑕疵、合同标的市场价格⼤幅波动等原因调减合同对价），或合同对价减让符合⾏业惯例或公司以往的习惯做法，应进⼀步结合合同具体约定将其作为销售合同变更或可变对价重新估计进⾏会计处理。若双⽅因履约活动之外的原因调整合同对价，且相关合同对价减让符合债务重组定义，则应作为债务重组进⾏会计处理。 如果前期出租⼈对租赁合同的履⾏没有瑕疵，减免的原因是债务⼈财务状况不佳，⽆⼒⽀付租⾦，则此时的租⾦减免应作为债务重组处理，承租⼈应将减免的租赁付款额从租赁负债转⼊投资收益。如果是因为出租⼈此前存在履约瑕疵⽽减免租⾦，则按租赁变更处理，但也不能追溯到前期。个人理解，供参考。","cat":"收入准则","kw":"租赁,债务重组,管理层在租赁合同届满时才决定减免以前期间房租,是否追溯作为租赁变更处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY1473","q":"SAP云服务使⽤费","a":"云服务的标的是对⽅提供的⼀定存储空间或者服务能⼒，没有明确的已识别资产，故不构成租赁，不适⽤租赁准则。已⽀付的云服务⻓期租赁费确认为⻓期待摊费⽤。 SAP软件开发尚未完成的，建议先列报为其他⾮流动资产。提问⼈：frankmylove 时间：2025-06-28 23:33:54 陈版主，关于不构成“租赁资产”，是否因为=SAP公有云服务通常不符合此条件，即“若合同明确指定专属物理服务器（如特定数据中⼼机柜）”，⼀般都是提供对SAP软件访问权限（如标准功能模块、定期更新），⽽⾮控制特定硬件或底层服务器 回答⼈：chenyiwei 若合同明确指定专属物理服务器（如特定数据中⼼机柜），也不⼀定能满⾜这个要求，除⾮提供的完全是私域的访问服务，与公域服务以及对其他类似客户的服务完全隔离，即硬件、软件和数据都是完全隔离的。 提问⼈：Mark0507 时间：2025-11-04 09:55:05 陈⽼师，您好，续上⾯的问题，如果按照⻓期待摊费⽤处理，那⼀般SAP都是⻓期合同，那我在⼊账时，对⻓期待摊费⽤是按现值⼊账，还是按照实际⽀付⾦额⼊账，实际账务处理中，应该怎么做，⽐如，每年10万元租费，⼀共租5年，50万，分录我怎么做？ 回答⼈：chenyiwei 如果预计将使⽤5年，只是费⽤每年⽀付，则按折现值确认⻓期待摊费⽤。借：⻓期待摊费⽤，借：未确认融资费⽤，贷：⻓期应付款。个人理解，供参考。","cat":"收入准则","kw":"租赁,SAP云服务使⽤费","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY1120","q":"资产负债表⽇后事项","a":"因为政策是在2025年内发布的，并不代表2024年末资产负债表⽇已存在的状态，故理论上不能据此在2024年度内对相关资产计提减值准备。 但是，该项政策影响重⼤，⼀般理解事先应经过较⻓时间的酝酿，媒体上也会有⻛声放出。如果有证据表明，在2024年末，该项政策事实上已经⼴为⼈知，业内已普遍形成该政策将于近期内出台的预期，则2024年末将其视为资产负债表⽇后调整事项，将减值准备计提在2024年度，可能也可以接受。建议关注同⾏业上市公司2024年度对此事项的处理和信息披露，例如是否已有上市公司对此发布2024年度预亏公告。 提问⼈：wx_5acf1ca80787 时间：2025-11-01 16:30:22 @chenyiwei 陈版好， 关于收⼊的调整是否属于资产负债表⽇后调整事项，有所疑惑。 概况是，公司当年对外销售，合同内未约定退回条款，同时公司根据补充协议执⾏商业折扣10%，公司正常收款，客户正常验收。但是到了第⼆年，客户提出他们的产品有⼀部分不良品（不能区分哪⼀⽅的责任），所以想让公司给与⼀定的实物补货。（这个事项是第⼆年公司才知道的），基于维护客户的考量，公司答应了这个要求。 请问陈版，这种情况，在第⼆年出具报告之前发⽣，是否应当作为第⼀年的⽇后调整事项处理呢？如果是的话，是否要在第⼀年末做预计负债回答⼈：chenyiwei个人理解，供参考。","cat":"收入准则","kw":"减值,预计负债,资产负债表⽇后事项","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0065","q":"再请教陈版，关于融资租赁模式下承租⼈会计处理的问题","a":"这种“以租代买”交易，⽆需确认使⽤权资产和租赁负债，就按照分期付款购买设备处理即可。 我们理解，这种融资租赁协议，名为直租，实际上融资租赁公司仅提供融资，租赁资产的控制权由供应商直接转移给承租⼈，出租⼈实质上是以租赁物为抵押，以代付资产购建款项的形式向承租⼈提供融资。因此，对于此类租 赁，可以参照原租赁准则下的“售后回租构成融资租赁”或者新租赁准则下的“售后租回中的资产出售不构成销售”进 ⾏会计处理，不使⽤“使⽤权资产”和“租赁负债”科⽬。即承租⼈的处理要点为：个人理解，供参考。","cat":"收入准则","kw":"控制权,租赁,再请教陈版,关于融资租赁模式下承租⼈会计处理的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0728","q":"时间减少，减少的肯定是最后⼏年的时间。","a":"这种情形属于“租赁变更不构成单独租赁”的情形。应重新测算年限缩短后剩余租赁负债的账⾯价值，据此对租赁负债的账⾯价值进⾏相应调减，再按照与租赁负债调减⾦额相同的⾦额，对使⽤权资产账⾯价值进⾏相应调减。 提问⼈：Norger张2021 时间：2024-09-26 12:11:23 这⾥有个疑问⽼师，有时候我们在调减租赁负债时是直接根据缩短的部分占变动前的⽐例确定租赁负债⾦额，同步调减使⽤权资产，还是说根据剩余的部分计算租赁负债同步确认剩余的使⽤权资产，再依据调整后和调整前的⽐较确认调整额，前者调整时特别是调减时不会出现差额，后者调减时租赁负债和使⽤权资产的调整⾦额不⼀定相等有时出现差异，有差异计⼊当期损益也就是资产处置损益；我的理解在判断是否会存在差异主要看折现率是否变动， 如果折现率未变动不管是调增还是调减都不会存在差额，如果折现率变动则会出现差计⼊资产处置损益，这个理解对吗 回答⼈：chenyiwei 应当是前者。即使折现率变动，也不应导致出现损益影响。提问⼈：Fondens 时间：2024-10-11 11:50:13 谢谢。 那就是按照新的年限，其他参数都是⽼合同的⽅式对租赁负债做模拟计算后，调整租赁负债和使⽤权资产的⾦额。回答⼈：chenyiwei 折现率也需要按照变更⽇的情况调整，不再使⽤原先的折现率。个人理解，供参考。","cat":"收入准则","kw":"租赁,时间减少,减少的肯定是最后⼏年的时间","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0066","q":"供销商的保理合同计⼊短期借款还是其他流动负债？","a":"此问题可以结合《企业会计准则解释第17号》第⼆条对供应商融资安排披露的规定来理解。 当涉及供应商融资安排的时候，企业应付供应商款项的性质有可能发⽣了变化。企业需结合融资安排相关条款，分析其商业实质，根据CAS 22关于⾦融负债终⽌确认等相关规定，确定原应付账款是否应终⽌确认并重新确认⼀项对融资提供⽅的“借款”。对于其商业实质的判断，除了影响资产负债表列报项⽬以外，也会影响现⾦流量表的列报项⽬，如企业根据约定的条款认定属于买⽅融资，判断应付供应商款项应终⽌确认并转列报于短期借款，则企业还款时的现⾦流将不再属于经营活动现⾦流，⽽是筹资活动现⾦流。 关于融资提供⽅⽀付供应商款项后企业原应付供应商款项的具体列报项⽬，我们的倾向性观点为（假设期限均为⼀年以内）： 商业实质判断 融资提供⽅ 资产负债表列报 还款现⾦流量列报 属于企业⾃⾝的融资⾏为 银⾏或其他⾦融机构 短期借款 筹资活动现⾦流 ⾮⾦融机构 其他流动负债 不属于企业⾃⾝的融资⾏为 ⽆需区分 应付账款 经营活动现⾦流 注1：融资提供⽅向供应商⽀付款项的时候通常不会通过企业，当该⽀付现⾦流没有通过企业流转的时候，企业不应将其反映在现⾦流量表中。 注2：《附录—会计科⽬和主要账务处理》中关于短期借款的规定：“本科⽬核算企业向银⾏或其他⾦融机构等借⼊的期限在1年以下（含1年）的各种借款。” 关于⾦融负债的终⽌确认，CAS 22规定： 第⼗⼆条 ⾦融负债（或其⼀部分）的现时义务已经解除的，企业应当终⽌确认该⾦融负债（或该部分⾦融负债）。 第⼗三条 企业（借⼊⽅）与借出⽅之间签订协议，以承担新⾦融负债⽅式替换原⾦融负债，且新⾦融负债与原⾦融负债的合同条款实质上不同的，企业应当终⽌确认原⾦融负债，同时确认⼀项新⾦融负债。 企业对原⾦融负债（或其⼀部分）的合同条款做出实质性修改的，应当终⽌确认原⾦融负债，同时按照修改后的条款确认⼀项新⾦融负债。 第⼗四条 ⾦融负债（或其⼀部分）终⽌确认的，企业应当将其账⾯价值与⽀付的对价（包括转出的⾮现⾦资产或承担的负债）之间的差额，计⼊当期损益。 CAS 22应⽤指南中关于“实质上不同”的规定：其中，“实质上不同”是指按照新的合同条款，⾦融负债未来现⾦流量 （包括⽀付和收取的任何费⽤）现值与原⾦融负债的剩余期间现⾦流量现值之间的差异⾄少相差10%。有关现值的计算均采⽤原⾦融负债的实际利率。我们理解该规定主要是针对同⼀债务⼈负债前后数量上的变化。供应商融资安排由于融资提供⽅的存在，债务的性质很可能也发⽣了变化。 当企业根据供应商融资安排的条款判断融资提供⽅为企业⽀付的供应商款项属于其⾃⾝的融资⾏为时，我们理解该负债的条款在性质上与原应付供应商款项具有实质上的不同，应终⽌确认原应付账款，确认⼀项新的⾦融负债（如短期借款或其他流动负债）。 企业在判断供应商融资安排是否属于其⾃⾝融资⾏为时，通常主要从以下⼏个⽅⾯综合予以考虑： 实施供应商融资安排的⽬的是什么？ 供应商融资安排与商品或服务的采购是否为⼀揽⼦交易，即供应商是否在实施该融资安排的前提下才同意商务合同中约定的结算和价格条款？ 供应商融资安排是否修改了原与供应商的付款约定，如变更了企业的付款⽇期？ 与融资提供⽅的条款商议（如利率或折现率）由谁主导谈判？ 融资安排相关费⽤或利息由谁承担？ 企业是否向融资提供⽅提供了增信、交叉违约、由第三⽅承担连带责任，或提供其他形式的担保？ 企业是否获得了提前付款的现⾦折扣或商业折扣等优惠？ 款项到期时是否为融资提供⽅提供了直接从企业现有银⾏账户直接划款的权利？ 供应商融资安排是否占⽤企业在融资提供⽅的授信额度？ 从本案例来看，从中获得融资利益的主要是N公司（供应商），假设Y公司未获得其他利益。如果该保理占⽤的是 Y在Z银⾏的信⽤额度，则Y公司可能确认为短期借款更合理；如果占⽤的是N公司⾃⾝的授信额度，则Y公司应保 持原科⽬（应付账款）不变。个人理解，供参考。","cat":"收入准则","kw":"供销商的保理合同计⼊短期借款还是其他流动负债","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0033","q":"关于购买少数股东权益时，少数股东损益的确认","a":"可以这样理解。 由此导致少数股东权益有⼀项调整额（为了确保期初少数股权+本期少数股东损益等于期末少数股东权益，⽽加上的⼀项调整⾦额，对应于归母权益中的资本公积变动），应作为“所有者投⼊和减少资本——其他”列报于合并权益变动表中。个人理解，供参考。","cat":"合并报表","kw":"合并,少数股东,求助陈版主关于购买少数股东权益时,少数股东损益的确认","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY0475","q":"关于国有企业⽆偿划转账务处理问题","a":"划出⽅按照被划出的分公司净资产账⾯价值，依次冲减资本公积、盈余公积、未分配利润。 划⼊⽅是划出⽅的母公司，相当于收回投资，对划⼊资产应按其原账⾯价值⼊账，同时冲减对划出⽅的长期股权投资账⾯价值。 提问⼈：凌晨四点半。 时间：2024-06-25 17:41:34 陈版主：现在就是母公司长期股权投资不够冲减，母公司这边可以增加资本公积吗？ 回答⼈：chenyiwei 不够冲减的部分，理论上应在母公司个别报表中列⼊投资收益。这不是母公司与更上级的母公司之间的权益性交易，⽽是⼦公司对母公司的分配，类似于股利。 提问⼈：凌晨四点半。 时间：2024-06-28 00:31:57 能按国有企业⽆偿划转⾛吗，也就是母公司增加资本公积回答⼈：chenyiwei 即使是⽆偿划转，母公司⾃⾝报表中也不能增加资本公积。提问⼈：凌晨四点半。 时间：2024-07-05 18:23:19 长期股权投资不够冲减，那增加母公司的投资收益吗？ 回答⼈：chenyiwei 是。合并报表时抵销该项投资收益和⼦公司的权益冲减额。个人理解，供参考。","cat":"合并报表","kw":"合并,请教陈版,关于国有企业⽆偿划转账务处理问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY1116","q":"新公司法资本公积弥补亏损合并报表的处理","a":"⾸先，⽬前以资本公积补亏的操作规则还在征求意⻅阶段，⽬前以资本公积补亏实际上是时机不成熟的，此前已有上市公司发布以资本公积补亏的预案⼜撤回的案例。 其次，假设不考虑资本公积补亏本身的合规性，在⺟公司合并报表层⾯，⼀般理解应冲回⼦公司权益内部的该项重分类处理，恢复到其原始来源，即合并报表层⾯不体现⼦公司以资本公积补亏的影响。 提问⼈：songlanK 时间：2025-10-13 08:40:30 请问陈版主⽬前6⽉底2025年6⽉27⽇101号⽂正式发布后，在合并报表层⾯还需要冲回⺟公司层⾯的处理？如举例：上市公司⺟公司利⽤前期形成的资本公积-股本溢价进⾏弥补亏损，但合并层⾯曾经存在同控收购，在合并层⾯存在⼤额冲减资本公积-股本溢价的情况，如果使⽤⺟公司⼝径的资本公积-股本溢价会造成合并层⾯资本公积-股本溢价出现负数，请问：1、这样的情况下，是否应以⺟公司或合并层⾯资本公积-股本溢价孰低为限转增（⾄0）？2、如否，合并层⾯负数的资本公积-股本溢价如何处理更合适呢？ 回答⼈：chenyiwei个人理解，供参考。","cat":"合并报表","kw":"合并,新公司法资本公积弥补亏损合并报表的处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY0040","q":"母⼦颠倒式重组合并会计处理？","a":"A公司个别报表层⾯，按照其对B的长期股权投资的原账⾯价值，依次冲减资本公积（资本溢价）、盈余公积、未分配利润。 B公司取得A公司股权按同⼀控制下合并处理，以合并⽇（划⼊⽇）A公司账⾯净资产（如A公司有其他⼦公司的， 则按合并报表中的归母净资产⼜径）的90%作为长期股权投资成本，对应贷记资本公积。个人理解，供参考。","cat":"合并报表","kw":"合并,求助陈版主,母⼦颠倒式重组合并会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY1504","q":"【请教陈版主】案例解析2024_案例12-14","a":"案例12-14中A公司的会计处理主要涉及以下两个事项：⼀是交易实质的判断，⼆是以⾮货币性资产作为对价购买⼦公司少数股权时所⽀付对价的公允价值与其账⾯价值的差额应该计⼊损益还是权益。 本次分⽴交易可以理解为：B公司先分⽴，A公司分别持有B1公司和B2公司80%的股权，然后A公司以其持有的B2公司的80%股权换取了B1公司20%的股权。因此，在个别报表和合并报表层 ⾯可确认损益的仅仅是上述第⼆步，即“A公司以其持有的B2公司的80%股权换取了B1公司20%的股权”。在A公司的合并报表层⾯，可将换⼊的B1公司20%股权的公允价值与换出的对B2公司 80%股权投资的原账⾯价值之间的差额确认为投资收益。 为此，在B公司分⽴环节，A公司应将其原先对B公司的股权投资账⾯价值采⽤合理的基础分拆为对B1、B2两个公司的⻓期股权投资成本（通常建议按照B1、B2两个公司股权的公允价值的相对⽐例来拆分），再将对B2公司的⻓期股权投资的账⾯价值与取得B1公司20%股权⼊账价值（公允价值）之间的差额确认为投资收益。个人理解，供参考。","cat":"合并报表","kw":"公允价值,合并,【请教陈版主】案例解析2024_案例12-14","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY1915","q":"同⼀控制下已费⽤化的专利转让，是否需要确认为⽆形资产？","a":"⾸先明确讨论前提：假设虽然上述交易是集团内部的资源整合和业务重组导致，但整体上是公允的，不考虑权益性交易因素。则在此前提下： 参照《监管规则适⽤指引——会计类第4号》之“4-3 外购研发项⽬的会计处理”：外购研发项⽬并后续⽤于⾃⾏研发的相关⽀出，其会计处理应遵守企业内部⾃⾏研发⽀出的资本化政策。若该外购研发项⽬⽤于公司⾃身研究阶段或尚未达到资本化时点的开发阶段，则公司应将其相关⽀出予以费⽤化，除⾮有确凿证据表明可通过将其对外出售等⽅式，在未来期间很可能给公司带来经济利益流⼊。 如果这些研发项⽬或专利权在⼦公司A、B、C之间转移时，相关研发⽬标尚未达到，还需要进⾏进⼀步的研发投⼊，则需根据该研发项⽬是否已进⼊资本化阶段，作出不同的处理：如果仍处于费⽤化阶段，则购买⽅⽀付的价款应全部费⽤化（计⼊研发费⽤）；反之则可以资本化（计⼊开发⽀出——资本化⽀出）。 ⽆论涉及各⽅的个别报表层⾯如何处理，合并报表层⾯均应保持会计处理的延续性，不应因同⼀项资产在不同⼦公司之间的转移⽽改变其确认和计量的结果。个人理解，供参考。","cat":"合并报表","kw":"合并,资本化,同⼀控制下已费⽤化的专利转让,是否需要确认为⽆形资产","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY1654","q":"收⼊确认和权益性交易的会计处理","a":"既然是代建项⽬，为何⼜是“代建项⽬资产归A公司所有和使⽤”？这是否⽭盾？ 如果代建项⽬符合确认为A公司的固定资产的条件，则在A公司个别报表层⾯和合并报表层⾯，均应按照⾃建固定资产处理，不能确认建造收⼊和成本（⼦公司B确认的建造收⼊和成本在A的合并报表层⾯需抵销，包括抵销未实现的逆流交易损益）。即需增补抵销分录：借；营业收⼊，贷：在建⼯程，贷：营业成本。 提问⼈：lijiaan 时间：2025 09-03 23:58:13 陈版，补充下业务背景，A为公⽤事业集团，主营供⽔、供热业务，所建X⼯程为换热站项⽬，因项⽬为A集团主营业务使⽤，建成完成竣⼯审计后，政府会出⽂作为将资产划⼊A集团。同时，每年年末，政府会向A出具代建项⽬结算确认单，根据监理单位确认的成本加成后的⾦额确认应⽀付的代建费⽤。 回答⼈：chenyiwei 因为最终是A⾃⼰使⽤的固定资产，所以按⾃建固定资产处理。不确认收⼊和成本。与政府结算获得的款项根据具体交易实质，作为政府补助或者政府资本性投⼊处理，个人理解，供参考。","cat":"合并报表","kw":"合并,固定资产,请教陈版,收⼊确认和权益性交易的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY1775","q":"认缴与实缴⽐例不同如何合并报表","a":"此时合并报表层⾯对于实际分配到的股利⾼于原先计算的归⺟净利润的部分，按权益性交易原则处理，即计⼊资本公积，作为少数股东让渡给⺟公司股东的⼀项权益。提问⼈：zhuzlcn6 时间：2025 10-23 13:39:10 谢谢陈版的解答，想再补充个问题，如果⼦公司亏损，⺟公司对⼦公司的实缴⽐例⾼于认缴⽐例，章程或协议⾥股东间没有约定收益分配⽐例，个⼈认为⼩股东应该是以认缴出资为限承担亏损的，所以在没有约定的情况下⺟公司能否按认缴⽐例（低⽐例）确认亏损？ 另外，如果按谨慎性原则，收益按低⽐例确认，亏损按⾼⽐例确认，假如⼦公司利润⼀个⽉亏损⼀个⽉盈利的情况下，是要每个⽉按不同⽐例确认吗？还是说⼦公司未分配利润累计是正数按低⽐例，累计是负数按⾼⽐例？如果⼦公司刚开始累计未分配利润是正数，按低⽐例确认半年后，因⼦公司盈利变差，累计未分配利润变成了负数，那是不是要从变成负数的⽉份开始再按⾼ ⽐例确认亏损，之前已按低⽐例确认的收益部分是否需要调整？ 回答⼈：chenyiwei个人理解，供参考。","cat":"合并报表","kw":"合并,少数股东,认缴与实缴⽐例不同如何合并报表","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY0537","q":"合并报表中对联营企业的顺流交易产⽣的未实现内部交易损益于后续期间实现 了该如何处理","a":"此问题在《应⽤指南汇编2024》中未提及，但在2024年度的CPA考试会计科⽬辅导教材中是有的，即要求在以后年度联营企业实现对外销售时，按照当初合并报表层⾯被抵销的⾦额，借记投资收益，借记营业成本，贷记营业收 ⼊。即主帖中的第⼀种观点。 针对这⼀问题，证监会在《监管规则适⽤指引——会计类第4号》之“4-5 权益法下顺流交易产⽣的未实现内部交易损益以处置或视同处置股权⽅式实现时的会计处理”中特别要求：“对于投资⽅与联营企业、合营企业之间发⽣顺流交易产⽣的未实现内部交易损益，因处置或视同处置联营企业、合营企业股权导致未实现内部交易损益得以实现， 投资⽅应作为股权处置损益计⼊当期投资收益，前期在投资⽅合并财务报表中予以抵销的未实现内部交易相关收 ⼊、成本或资产处置损益等不予恢复。”。即，顺流交易损益后续通过处置联营企业实现的（⽽不是通过联营企业 将标的商品出售实现），在合并报表中⽆需编制上述恢复收⼊、成本的分录，⽽是将相关影响并⼊处置联营企业的投资收益中。个人理解，供参考。","cat":"合并报表","kw":"合并,权益法,合并报表中对联营企业的顺流交易产⽣的未实现内部交易损益于后续期间实现,了该如何处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY1529","q":"公司回购股份⽤于员⼯持股计划会计处理","a":"在主帖案例中，该持股计划是由公司控制的结构化主体，应纳⼊上市公司的合并报表范围。在上市公司合并报表层⾯所呈现的处理效果，与《企业会计准则解释第7号》第五条关于限售股回购义务的处理类似，因此个⼈更赞同主帖的⽅案⼆。 提问⼈：爬爬呀 时间：2025-07-14 09:21:08 也请问⼀下，陈版主是否有关于员⼯持股计划纳⼊合并范围的案例呢，想多学习下。回答⼈：chenyiwei 前⼏年监管机构在技术层⾯组织过相关讨论。有⽆实际案例可以根据公开信息查询下。提问⼈：wfkappa 时间：2025-09-05 15:43:04 我想继续请教⼀下，如果协议约定：未达到解锁条件的份额由管理委员会收回，出售份额的款项留在持股计划，由持股计划⽀配。实际是不是⽴即可⾏权的股份⽀付，在持股计划向上市公司缴款的时候：借银⾏存款，贷库存股，差额计⼊资本公积？ 回答⼈：chenyiwei 这最多是说明可能没有回购义务，不需要确认回购义务相关负债。但并不表明⽆等待期。个人理解，供参考。","cat":"合并报表","kw":"合并,公司回购股份⽤于员⼯持股计划会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY0054","q":"及各位⼤神，对印尼联合体的核算⽅式","a":"从主帖信息来看，设⽴联合体很可能仅是为了满⾜印尼2010年总统令中的形式要求，即外国建筑公司必须与本国建筑公司组成联合体才能承接印尼国内的建筑项⽬。该联合体完全由中国公司A控制，应作为其控制的主体纳⼊A公 司报表。鉴于联合体⽆法⼈资格，不存在⼀般意义上的母⼦公司关系，故联合体财务数据直接视同A的分公司并⼊ A的个别报表。 由于印尼B公司不出资，因此初始的少数股东权益为零。按约定分配给B公司的收益在合并报表中确认为成本费 ⽤。个人理解，供参考。","cat":"合并报表","kw":"合并,少数股东,求助陈版主及各位⼤神,对印尼联合体的核算⽅式","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY0931","q":"关于控制并表的问题","a":"这种只转移股东表决权和提名董事、监事的权利，不转移股东权利中的财产性权利，且受托⽅不持有标的企业股份的安排，是基于何种⽬的和考虑？如何证明受托⽅可以获取可变回报，以及通过⾏使表决权影响可变回报？ 该安排多数可能性是不具有商业实质；即使具有商业实质，⼤概率也是B委托D提供管理服务（免费），因此很可能D只是B的代理⼈，不改变由B作为⼤股东并表的处理。 提问⼈：⼩乐安1314 时间：2024-11-20 10:25:26 陈版，因为B公司和D公司同属⼀个集团，B公司为集团内部的融资平台，有较强现⾦流，实质是B公司为D公司购买A公司股权，后期集团内部进⾏股权划转，D公司与A公司为同⼀业务条线企业，所有才会有这样的安排 回答⼈：chenyiwei 参照《监管规则适⽤指引——会计类第1号》之1-9、《企业会计准则应⽤指南汇编2024》的【例34-9】关于委托、受托经营能否并表的分析。你说的情况，除⾮股权⼀并转移，否则D不能并A的可能性更⼤。个人理解，供参考。","cat":"合并报表","kw":"请教陈版,关于控制并表的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY1169","q":"关于⾮同⼀控制下企业合并列报问题","a":"理论上你在主帖中的理解是合理的，即：“在⾮同⼀控制下企业合并的购买⽇，不会将单体报表的减值准备、累计折旧等科⽬带进来，⽽是均为原值”。 但在实务操作中，尤其是在按组合计提坏账准备，或者购买⽇⾄年末期间变动频繁的情况下，期末可能难以区分某⼀组合中的应收账款中有多少是购买⽇带进来的被购买⽅应收账款，哪些是本集团经营中源⽣的，因此期末对购买⽇带进来的应收账款按净额列报的要求可能存在操作难度。此时可能也只有接受简化处理⽅案了，特别是在影响不重⼤的情况下。个人理解，供参考。","cat":"企业合并","kw":"减值,合并,折旧,关于⾮同⼀控制下企业合并列报问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY1133","q":"可辨认净资产是否包含递延所得税资产和负债","a":"递延所得税资产和负债也是由可辨认净资产的账⾯价值和计税基础之间的暂时性差异导致的，因此也可以算作可辨认净资产的组成部分。你说的递延收益不纳⼊，是因为递延收益并⾮真正的负债，其在购买⽇的公允价值通常为零。 你说的递延所得税资产、负债不纳⼊，可能是指被购买⽅⾃身原有的递延所得税资产、负债不纳⼊商誉计算。这个做法是合理的，因为在购买⽅合并报表层⾯需重新计算递延所得税和商誉， 被购买⽅⾃身报表中原有的递延所得税和商誉是视同不存在，不纳⼊考虑的。个人理解，供参考。","cat":"企业合并","kw":"公允价值,商誉,合并,所得税,递延,可辨认净资产是否包含递延所得税资产和负债","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY1798","q":"⼀个同⼀控制下企业合并⼩⽩问题","a":"同⼀控制下合并的合并报表是要求将被合并⽅的利润表也纳⼊合并范围的，⽽习惯上利润表项⽬的抵销分录是：借：投资收益，借：年初未分配利润，借：少数股东损益，贷：利润分配（提取盈余公积、分配股利等），贷：期末未分配利润。这个贷记期末未分配利润也是不做直接抵销的。将该笔抵销分录与资产负债表抵销分录结合起来看，两者抵销分录中均各⾃有⼀个“未分配利润”项⽬不是直接抵销的，且这两个项⽬⾦额相同，借贷⽅向相反，所以叠加这两笔分录后，恰好整体上仍是平衡的。个人理解，供参考。","cat":"企业合并","kw":"合并,少数股东,⼀个同⼀控制下企业合并⼩⽩问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY1751","q":"关于⼦公司购买另⼀⼦公司少数股权的问题","a":"⾸先要明确：B作为甲的⼦公司和A的关联⽅，其是否真正对C具有重⼤影响（虽然持股49%）？个⼈理解这种情况下不具有重⼤影响，应按⾦融资产模式核算的可能性更⼤。 如果确定B对C具有重⼤影响的，则在B的⾃身报表中，在初始确认对C的49%股权为⻓期股权投资时，需按照准则规定确认负商誉计⼊营业外收⼊。但在甲集团的合并报表层⾯，该交易等同于购买少数股权，差额调整资本公积，不确认为营业外收⼊，因此在合并报表层⾯需进⾏相应的视⻆差异调整。个人理解，供参考。","cat":"企业合并","kw":"商誉,合并,请教陈版,关于⼦公司购买另⼀⼦公司少数股权的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY1165","q":"及各位⼤神，在审计实务中遇到如下问题，⺟公司个别报表层⾯应如何处理：","a":"⾸先，观点3是不合理的，因为对投资⽅⽽⾔这是⼀项企业合并交易，⽽不是权益性交易。 其次，在该项以股权出资控股被投资公司的交易中，在确保该交易具有商业实质的前提下（以B的40%权益换取C 40%权益，⼀般理解总是具有商业实质的），个⼈倾向于采⽤观点1，即仅就放弃的B公司权益确认处置收益。 类似案例可参考：《中审众环研究2020》之“问题3-2-84（以⼦公司控股股权对被购买⽅增资实现对被购买⽅⾮同⼀控制下合并的处理）”。个人理解，供参考。","cat":"企业合并","kw":"合并,求助陈版及各位⼤神,在审计实务中遇到如下问题,⺟公司个别报表层⾯应如何处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0164","q":"关于合伙企业中GP作为合并⽅收购中的商誉问题","a":"⾸先要明确⼀点：合并报表层⾯确认商誉的⽐例并不是穿透的，⽽是依据直接收购被购买⽅的股权⽐例⽽定。 在本案例中，A虽然只持有C的10%权益，但C收购D的股权⽐例是100%，所以C的合并报表中确认D的商誉是针对100%股权。相应地，在A的合并报表层⾯，也是100%反映来源于D的商誉，并不是仅仅按照穿透后享有的权益⽐例确认10%的商誉。 所以，利⽤主帖中所述的⽅法并不能达到减少最终控制⽅（A）合并报表层⾯少确认商誉（将应确认为商誉的⾦额冲减资本公积）的⽬的。个人理解，供参考。","cat":"企业合并","kw":"商誉,合并,关于合伙企业中GP作为合并⽅收购中的商誉问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0749","q":"及各位坛友，关于⽆形资产及商誉的减值问题。","a":"“上年评估值，⽆形资产单项为1300W，资产组为1500W”的原因是什么？从这⼀点来看，资产组的未来现⾦流⼊除了来源于该项使⽤寿命不确定的⽆形资产以外，还来源于其他因素（包含在商誉中），这与该项⽆形资产与商誉完全绑定的判定不⼀致？ 事实上，很多资产组内的资产没有活跃市场，难以确定其公允价值，因此对资产组内资产单独测算不含商誉的可收回⾦额是有难度的。建议关注主帖案例中该项⽆形资产本⾝的可收回⾦额是如何确定的，是否合理。个人理解，供参考。","cat":"企业合并","kw":"公允价值,商誉,减值,请教陈版及各位坛友,关于⽆形资产及商誉的减值问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY1368","q":"处置⼦公司计算投资收益的疑问","a":"合并层⾯的处置⼦公司损益的计算公式需根据合并报表准则第五⼗条规定确定，其中最主要的两个因素是：（1）处置对价款；（2）处置时点原享有的⼦公司净资产在合并报表层⾯的账⾯价值（含商誉）。 在主帖案例中，（1）为7亿元，（2）为6亿元（即2022年其他股东增资增加的⼦公司净资产按稀释后的股权⽐例计算的归⺟公司份额），因此处置损益为1亿元。权益性交易形成的资本公积⼀旦形成即应始终保留在合并报表的资本公积中，不能再转⼊损益。个人理解，供参考。","cat":"企业合并","kw":"商誉,合并,求助陈版主,处置⼦公司计算投资收益的疑问","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY1530","q":"关于⾮同⼀控制企业合并中收购形成的负商誉确认合理性问题","a":"⻛电场项⽬公司可以通过集中度测试，因⽽不构成业务，相应地，收购溢价或折价在收购⽅合并报表层⾯调整“⽆形资产——特许经营权”（即⻛电场所在地的⻛能开发权和收益权），不应确认商誉和负商誉。 实务中，基于简化处理考虑，收购价格减去被收购⽅账⾯净资产后的差额（如有）确认为⽆形资产，在其预计经营年限内摊销，计⼊各期营业成本，不确认商誉或负商誉。后续如⻛电场的收益低于预期，则需对其各项资产进⾏减值测试，必要时计提减值准备。个人理解，供参考。","cat":"企业合并","kw":"商誉,减值,合并,摊销,关于⾮同⼀控制企业合并中收购形成的负商誉确认合理性问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY1211","q":"如何理解参与合并的企业在合并前后均受相同的多⽅最终控制","a":"相同的多⽅，通常是指根据投资者之间的协议约定，在对被投资单位的⽣产经营决策⾏使表决权时发表⼀致意⻅的两个或两个以上的投资者。即，需要签订⼀致⾏动协议。判断是否构成同⼀控制下的合并，关键的⼀点是参与各⽅的最终控制⽅相同，治理结构相同。 虽然股东相同，但如果股东之间不签订⼀致⾏动协议，则甲公司此前由A控制，⼄公司此前由B控制，两者的最终控制⽅不同，所以A合并B不能作为同⼀控制下的企业合并。个人理解，供参考。","cat":"企业合并","kw":"合并,如何理解参与合并的企业在合并前后均受相同的多⽅最终控制","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0165","q":"递延所得税负债产⽣的商誉","a":"“公司购买了⼀个空壳公司（公司有⼀块⼟地）”，则此时被收购⽅不构成业务，应按资产购买处理，⽆需确认商誉和递延所得税负债、参阅：《中审众环研究2020》之“问题2-3-8（由确认⼀组不构成业务的资产或净资产所产⽣的暂时性差异，能否确认递延所得税负债或递延所得税资产）”。 如果该被收购⽅确实构成“业务”，由此需确认与该⼟地的增值相关的递延所得税负债对应确认商誉的，则请参考证监会会计部组织编写的《上市公司执⾏企业会计准则案例解析（2020）》之“案例5-11 因收购时资产评估增值确认递延所得税负债产⽣的商誉及其减值问题”。个人理解，供参考。","cat":"企业合并","kw":"商誉,减值,所得税,递延,递延所得税负债产⽣的商誉","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0709","q":"求助！！！","a":"如果是属于⽆需⽀付的或有对价（因标的企业在业绩承诺期内不达标），则这部分⽆需⽀付的对价应确认为⾦融负债的公允价值变动损益（实务中也有确认为营业外收⼊的，但其实并不规范）。 同时，因业绩不如预期，表明存在减值迹象，购买⽅在个别报表层⾯对长期股权投资进⾏减值测试，以及合并报表层⾯对包含商誉的资产组进⾏减值测试时，都应从严把握。原则上确认的减值损失不应⼩于就或有对价确认的公允价值变动收益。个人理解，供参考。","cat":"企业合并","kw":"公允价值,商誉,减值,合并","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0476","q":"请教各⼤神：控股母公司与⼦公司劳务派遣⽅⾯的问题","a":"由于C在B担任⾼管，故C应视为B的“职⼯”，B承担C的⼯资和社保应通过“应付职⼯薪酬”科⽬核算。因此B的账务处理是合理的。是否开具发票属于税务专业问题，建议与主管税务机关沟通确认。个人理解，供参考。","cat":"实务综合","kw":"请教各⼤神,控股母公司与⼦公司劳务派遣⽅⾯的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0212","q":"企业会计⼈员对“重要性”有判断标准吗？","a":"2023年12⽉证监会修订发布的《公开发⾏证券的公司信息披露编报规则第15号——财务报告的⼀般规定（2023年修订）》（证监会公告[2023]64号）第四条规定：“公司在编制和披露财务报告时应遵循重要性原则，披露事项涉及 重要性标准判断的，应披露重要性标准确定⽅法和选择依据。”证券交易所发布的2023年财务报表附注模板在“重要会计政策和会计估计”下增加了“重要性标准确定⽅法和选择依据”的披露。因此上市公司在2023年年报中都是对重 要性⽔平有相应披露的。你可以看下已公告的上市公司2023年年报。 该项披露是针对在财务报表附注中财务报表列报项⽬的说明、会计准则要求披露的事项（如或有和承诺事项等）涉及重要项⽬的说明时，如何选择重要性标准确定⽅法和选择依据。例如，在“合并财务报表项⽬注释-应收账款”下 需披露重要的单项计提坏账准备的应收款项，对此，被审计单位管理层需要明确如何确定单项计提坏账准备的应收款项中“重要的”标准的确定⽅法和选择依据，并在财务报表附注“重要会计政策和会计估计-重要性标准确定⽅法和选择依据”下予以披露。 我们认为，该项披露应遵循以下⼏个参考原则：个人理解，供参考。","cat":"会计政策/估计变更","kw":"合并,企业会计⼈员对“重要性”有判断标准吗","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第28号——会计政策、会计估计变更和差错更正"},{"id":"CY0451","q":"母⼦公司共同投资参股公司的合并报表列⽰","a":"⼀般情况下，在A的合并报表中，需将B、C持有的D公司2%股权调整为权益法核算的长期股权投资。但也可能存在例外情况。 根据《企业会计准则第2号——长期股权投资（2014年修订）》第九条规定：“投资⽅对联营企业的权益性投资，其中⼀部分通过风险投资机构、共同基⾦、信托公司或包括投连险基⾦在内的类似主体间接持有的，⽆论以上主体是否对这部分投资具有重⼤影响，投资⽅都可以按照《企业会计准则第22号——⾦融⼯具确认和计量》的有关规定， 对间接持有的该部分投资选择以公允价值计量且其变动计⼊损益，并对其余部分采⽤权益法核算。”。据此，如果 本案例中的B、C公司属于“风险投资机构、共同基⾦、信托公司或包括投连险基⾦在内的类似主体”，则在A的合并报表中，对B、C所持有的这部分D公司股权可继续保持作为以公允价值计量且其变动计⼊损益的⾦融资产核算。 但这个选项是“可以”⽽不是“必须”，即A公司有是否这样做的选择权。个人理解，供参考。","cat":"合并报表","kw":"公允价值,合并,权益法,母⼦公司共同投资参股公司的合并报表列⽰","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表、《企业会计准则第2号——长期股权投资（2014年修订）》、《企业会计准则第22号——⾦融⼯具确认和计量》"},{"id":"CY1607","q":"B 公司还未回购的股份（计划⽀出1.5-2亿）是否在2024年全部考虑进来，⼀揽⼦交易，按计划考虑全部回购，确认资本公积，后续每年实际真实回购的时候，在调整资本公积呢？ 2024年还是就考虑当年实际回购的50万股对资本公积的影响？","a":"⼦公司回购股份，在⺟公司合并报表层⾯的会计处理，等同于购买少数股权，按权益性交易处理。这⾥唯⼀的区别是回购款由⺟公司还是⼦公司⽀付，但因为⺟公司和⼦公司在合并报表中同属于⼀个会计主体，故该差异对合并报表的反映没有影响。 ⺟公司应计算回购前后在⼦公司的净资产中所享有份额的差额，将其与⼦公司所⽀付的回购款相⽐较，差额调整合并报表层⾯的权益。 ⼦公司的库存股并⾮发⾏在外股份，因此⼦公司回购将导致其发⾏在外股份数量减少，相应地⺟公司在该⼦公司的股权⽐例上升，其效果等同于收购少数股权。由于回购的标的并⾮⺟公司⾃身股份，故⺟公司合并报表层⾯⽆库存股列报。 提问⼈：爬爬呀 时间：2025-08-18 10:18:54 针对第⼀个问题，继续追问下，确认少数股东权益的⾦额是否应该为B公司净资产*（60.75-60%），资本公积为最终倒侪。回答⼈：chenyiwei 该做法更合理，资本公积为倒挤数。个人理解，供参考。","cat":"合并报表","kw":"合并,少数股东,公司还未回购的股份,计划⽀出1,5-2亿,是否在2024年全部考虑进来,⼀揽⼦交易,按计划考虑全部回购,确认资本公积,后续每年实际真实回购的时候,在调整资本公积呢,2024年还是就考虑当年实际回购的50万股对资本公积的影响","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY0971","q":"⾮同⼀控制下股权⽆偿划转的会计处理","a":"⾮同⼀控制下，不同国有企业集团之间的股权⽆偿划转，并⾮双⽅在⾃愿、平等基础上达成的具有商业实质的交易，⽽是为了实现国有资产布局调整等，⽽由各⽅共同所属的上级国资委或者上级政府主导实施的，交易对价 （零）不同于标的股权的公允价值，故不能适⽤⼀般的⾮同⼀控制下企业合并的会计处理规定，⼀般理解应适⽤财政部于2016年发布的《关于印发的通知》（财会[2016]17号）第⼀条规定处理。个人理解，供参考。","cat":"企业合并","kw":"公允价值,合并,⾮同⼀控制下股权⽆偿划转的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY1202","q":"⽆偿取得政府划⼊的经营权⼊账问题","a":"根据主帖信息，“A公司已实际运营该收费权多年，但尚未⼊账”，则现在的划⼊，是否只是为了完善相应的法律程序，解决资产权属瑕疵问题？此前的权属瑕疵是否不影响经营权的实际运作和经济利益的获取？ 如果是，则A公司在接受划⼊时⽆需进⾏账务处理。 特别是，如果该对应的基础设施资产最初就是由A公司出资建造的情况下。提问⼈：⼤呆呆 时间：2025-05-16 14:39:09 陈⽼师，能解释⼀下⽆需进⾏账务处理的原因吗？ 回答⼈：chenyiwei 在前⾯回帖讨论的前提下，⽆偿划⼊该项收费权仅仅是为了完善相关权属⼿续，不具有实际的商业实质，且成本为零，故⽆需进⾏账务处理，仅需附注披露即可。提问⼈：⼤呆呆 时间：2025-05-20 13:54:11 陈⽼师，我觉得⼊账时应该做前期差错更正。虽然现在是完善权属⼿续，⽆实质交易，但是以前⽆偿划⼊的运营收费权不应该不进⾏账务处理。请教⼀下陈⽼师对这个问题的看法。谢谢！ 回答⼈：chenyiwei 这个问题另外再考虑，有可能需作为前期差错更正。个人理解，供参考。","cat":"会计政策/估计变更","kw":"⽆偿取得政府划⼊的经营权⼊账问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第28号——会计政策、会计估计变更和差错更正"},{"id":"CY0671","q":"新⾦融⼯具准则下，担保⼈是否应将原预计负债调整为应计负债？","a":"是。法院判决担保⼈承担担保责任后（且担保⼈确认），则担保⽅应将原预计负债调整为应计负债。这与是否执⾏新⾦融⼯具准则⽆关。个人理解，供参考。","cat":"或有事项","kw":"预计负债,新⾦融⼯具准则下,担保⼈是否应将原预计负债调整为应计负债","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第13号——或有事项"},{"id":"CY1015","q":"矿⼭复垦义务增加，原确认的预计负债应当如何处理？","a":"此问题中，针对原已确认复垦义务的开采⾯积重新编制复垦⽅案，由此导致预计负债需重新测算，可按照《企业会计准则解释第6号》第⼀条规定处理。 ⼀、企业因固定资产弃置费⽤确认的预计负债发⽣变动的，应当如何进⾏会计处理？ 答：企业应当进⼀步规范关于固定资产弃置费⽤的会计核算，根据《企业会计准则第4号——固定资产》应⽤指南的规定，对固定资产的弃置费⽤进⾏会计处理。 本解释所称的弃置费⽤形成的预计负债在确认后，按照实际利率法计算的利息费⽤应当确认为财务费⽤；由于技术进步、法律要求或市场环境变化等原因，特定固定资产的履⾏弃置义务可能发⽣⽀出⾦额、预计弃置时点、折现率等变动⽽引起的预计负债变动，应按照以下原则调整该固定资产的成本： 对于预计负债的减少，以该固定资产账⾯价值为限扣减固定资产成本。如果预计负债的减少额超过该固定资产账⾯价值，超出部分确认为当期损益。 对于预计负债的增加，增加该固定资产的成本。 按照上述原则调整的固定资产，在资产剩余使⽤年限内计提折旧。⼀旦该固定资产的使⽤寿命结束，预计负债的所有后续变动应在发⽣时确认为损益。个人理解，供参考。","cat":"或有事项","kw":"预计负债,固定资产,折旧,矿⼭复垦义务增加,原确认的预计负债应当如何处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第13号——或有事项、《企业会计准则第4号——固定资产》"},{"id":"CY0484","q":"关于电费计⼊直接⽣产成本的讨论","a":"可以这样理解。成本要素凡是能够可以确定可直接归属于单个成本核算对象的，均应优先考虑作为直接成本计⼊该 成本核算对象。这⼀⽅⾯准确性更⾼，另⼀⽅⾯也可以简化核算，符合成本效益原则。个人理解，供参考。","cat":"实务综合","kw":"请教陈版,关于电费计⼊直接⽣产成本的讨论","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0471","q":"股份⽀付确认时点","a":"是，主帖情况下股份⽀付费⽤应确认在2023年，因为授予⽇（企业和职⼯就股份⽀付的条款和条件达成⼀致并获得批准的⽇期）是在2023年。 授予⽇后，激励对象是否按时缴款会影响其能否获得激励股份，但这只是⾮可⾏权条件，故不影响股份⽀付费⽤的确认。这种情况相当于企业授予员⼯的期权在可⾏权⽇后员⼯放弃⾏权，但相应的权益⼯具（期权）已经授予了， 故对应的股份⽀付费⽤仍需确认。个人理解，供参考。","cat":"股份支付","kw":"股份⽀付确认时点","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第11号——股份支付"},{"id":"CY0489","q":"股票买卖账务处理，真实案例，以简化便于理解，求解？","a":"习惯上对于可税前扣除的投资成本按加权平均法计算，即此前历次投资单位成本的加权平均。个人理解，供参考。","cat":"实务综合","kw":"股票买卖账务处理,真实案例,以简化便于理解","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0497","q":"出售其他权益⼯具","a":"参照《企业会计准则解释第7号》第⼆条规定，应当是仅结转⾄未分配利润。“影响盈余公积”的情况并不多见，因为这类其他综合收益本⾝是不能结转损益的，因此不影响盈余公积的计提基数。个人理解，供参考。","cat":"实务综合","kw":"出售其他权益⼯具","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1781","q":"⾮同控收购，⾼管股权分批释放适⽤或有对价还是股份⽀付","a":"建议先了解该安排的详细背景，以确定为何不在B公司继续任职的股东可以⽴即取得全额股权转让对价，⽽继续担任⾼管的原股东却要以部分股权对价作为质押。建议关注B公司的真实股权价值是多少，B公司的各位原股东之间有⽆利益让渡的安排、具有原股东身份的⾼管在该3年内的薪酬安排等。 总体来看，因为原股东提前离职时⽆法取得的股份数量和价值与标的公司股权的后续公允价值变动关系不⼤，更多地是与这些担任⾼管的原股东的持续任职有关，故认定为职⼯薪酬的可能性更⼤。但需要进⼀步分析其合理性和背后的商业逻辑。个人理解，供参考。","cat":"职工薪酬","kw":"公允价值,求助陈版主,⾮同控收购,⾼管股权分批释放适⽤或有对价还是股份⽀付","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第9号——职工薪酬"},{"id":"CY0630","q":"对于正常离职的员⼯给予⼀次性补贴属于辞退福利吗","a":"如果这是公司政策明确规定的，据此员⼯可以合理预期在正常离职情况下可获得补偿⾦，则这种补偿⾦应属于离职后福利⽽不是辞退福利，其属于为取得职⼯服务所⽀付的对价，故应在员⼯任职期间内确认，⽽不是实际离职时确认。在计提时，根据员⼯的任职岗位和部门分别计⼊对应的成本费⽤项⽬，⽽不是⼀律计⼊管理费⽤。 其中，如果不论任职年限多长，补偿⾦的⾦额是⼀样的，则在⼊职当期即应全额计提该补偿⾦；如果补偿⾦的⾦额随着任职年限延长⽽相应增加，则在该员⼯任职期间逐年计提该补偿⾦。个人理解，供参考。","cat":"职工薪酬","kw":"对于正常离职的员⼯给予⼀次性补贴属于辞退福利吗","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第9号——职工薪酬"},{"id":"CY1213","q":"⻓投权益法核算问题","a":"⾸先明确讨论前提：此处不涉及与⼤股东之间的权益性交易，后续的股权⽐例调整有合理商业理由，且本企业确实对被投资企业具有重⼤影响（注：因为该企业由本企业的⼤股东控股，故不能仅仅依据本企业派驻董事即认为本企业对该被投资企业具有重⼤影响。） 在此前提下，根据主帖信息，后续本企业不再出资，导致持股⽐例下降，这种情况下应作为被投资企业因损益和其他综合收益以外的原因导致的权益变动处理，本企业在该被投资企业净资产中所享有份额的变动应作为“其他权益变动”调整资本公积，不应转回损益调整和确认投资收益。个人理解，供参考。","cat":"长期股权投资","kw":"权益法,请教陈版,⻓投权益法核算问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"CY0229","q":"收购合营企业所⽀付的款项，现⾦流量表如何列报","a":"因为收购标的是合营企业股权，在收购⽅报表中确认为长期股权投资，故应作为“投资⽀付的现⾦”列⽰。个人理解，供参考。","cat":"长期股权投资","kw":"收购合营企业所⽀付的款项,现⾦流量表如何列报","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"CY0685","q":"请⽰陈总，并购事项是否判定为⾼溢价收购。","a":"“⾼溢价收购”并没有严格的界定，个⼈理解是以⾼于标的股权或资产收益法评估值的价格进⾏的收购。 如果有证据表明本案例中标的股权的收益法评估值6亿元是合理的，则因为实际收购价格并未⾼于标的股权的收益法评估值，故不应认定为⾼溢价收购，但其未将收益法评估值向国资委备案的做法构成程序瑕疵，应补充办理备 案。 另外可以作为补充证据的是：考虑近期周边类似光伏项⽬的“路条”价值，即收购价格是否接近于标的公司净资产的成本法评估值+路条价值。个人理解，供参考。","cat":"长期股权投资","kw":"成本法,请⽰陈总,并购事项是否判定为⾼溢价收购","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"CY0160","q":"关于⼚房装修期间，租赁费⽤是否可以计⼊在建⼯程转⼊长摊核算？","a":"可以。参阅《中审众环研究2020》之“问题1-1-7（租赁的相关成本是否应当计⼊房屋建筑物的建造成本中）”。个人理解，供参考。","cat":"租赁","kw":"租赁,关于⼚房装修期间,租赁费⽤是否可以计⼊在建⼯程转⼊长摊核算","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁"},{"id":"CY0500","q":"出租资产后免费收到承租⽅赠送的电梯","a":"⾸先要考虑：由承租⼈出资安装电梯，在租赁期结束后归出租⼈所有，这⼀条是否在最初的租赁协议中就已经约定？如果是，则应将租赁期满时收到电梯的价值分摊到租赁期内，确认为⾮货币形式的租⾦收⼊。 例如，假设该租赁为经营租赁，租赁期3年，电梯的安装成本为100万元，预计可⽤10年。则租赁期满时电梯的价值为70万元，将该70万元分摊到3年租赁期，每年确认租⾦收⼊23.33万元。 账务处理：个人理解，供参考。","cat":"租赁","kw":"租赁,出租资产后免费收到承租⽅赠送的电梯","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁"},{"id":"CY0626","q":"租赁企业溢缴费⽤与保证⾦处置","a":"此种情况“溢缴1个⽉的租⾦及2个⽉保证⾦押⾦”的罚没，并不是因为出租⼈在此期间内将房屋出租给承租⼈，⽽是承租⼈的违约给出租⼈造成了损失，故出租⼈要求承租⼈赔偿。因此，此类赔款⾸先应冲抵出租⼈因承租⼈本次违约⽽已承担的损失；其次可能为未来可能发⽣的损失作出预留（挂递延收益）；只有当赔款总额超出了已发⽣或预期将发⽣的损失后，超出部分可以确认为营业外收⼊，⽽也不能确认为营业收⼊。个人理解，供参考。","cat":"租赁","kw":"租赁,递延,租赁企业溢缴费⽤与保证⾦处置","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁"},{"id":"CY0984","q":"竣⼯决算⼯程转固问题","a":"根据《企业会计准则第4号——固定资产》第五条：“固定资产的各组成部分具有不同使⽤寿命或者以不同⽅式为企业提供经济利益，适⽤不同折旧率或折旧⽅法的，应当分别将各组成部分确认为单项固定资产。”。 因此，附属于房屋建筑物（此处的房屋建筑物是指本企业⾃有产权的房屋建筑物，下同），但使⽤年限短于房屋主体结构，在整个房屋使⽤寿命内需对其进⾏多次替换更新的附属设备，应单独确认为⼀项固定资产，在其⾃⾝的使 ⽤寿命内计提折旧。 该做法与房产税和企业所得税的规定不⼀致，应注意进⾏纳税调整。个人理解，供参考。","cat":"所得税","kw":"所得税,固定资产,折旧,竣⼯决算⼯程转固问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第18号——所得税、《企业会计准则第4号——固定资产》"},{"id":"CY0781","q":"合伙企业净资产份额的确认","a":"根据《企业会计准则第8号——资产减值》第⼗⼆条规定：“预计资产的未来现⾦流量也不应当包括筹资活动产⽣的现⾦流⼊或者流出以及与所得税收付有关的现⾦流量”；第⼗三条规定：“折现率是反映当前市场货币时间价值和资产特定风险的税前利率。该折现率是企业在购置或者投资资产时所要求的必要报酬率”。另⼀⽅⾯，公允价值的定 义也是所得税前的⾦额。 因此，基于⼜径⼀致性的考虑，与所得税有关的资产和负债（包括递延所得税资产和负债）都不纳⼊资产组账⾯价值。个人理解，供参考。","cat":"所得税","kw":"公允价值,减值,所得税,递延,合伙企业净资产份额的确认","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第18号——所得税、《企业会计准则第8号——资产减值》"},{"id":"CY1274","q":"股权处置税会差异导致的可抵扣亏损形成的递延所得税费⽤是否属于⾮经常性损益？","a":"这部分由于股权转让税会差异形成的可抵扣亏损计提的递延所得税费⽤（预计未来可以取得⾜够的应纳税所得额），本身不是⾮经常性损益项⽬，但应体现在“⾮经常性损益的所得税影响 数”中。即，如果没有此次股权处置的⾮经常性损益，也就不会产⽣可抵扣亏损，相应地也就不会确认该项递延所得税资产。因此，与确认该项递延所得税资产相对应的所得税费⽤属于⾮经常性损益的所得税影响数。 未来这部分可抵扣亏损确认的递延所得税转回的影响不属于⾮经常性损益。个人理解，供参考。","cat":"所得税","kw":"所得税,递延,股权处置税会差异导致的可抵扣亏损形成的递延所得税费⽤是否属于⾮经常性损益","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第18号——所得税"},{"id":"CY0591","q":"长投确认递延的疑问","a":"参考《中审众环研究2020》之“问题2-3-1（就计提资产减值准备所导致的暂时性差异确认递延所得税资产时应考虑的因素）”。 针对成本法及权益法长投计提的减值，是否需确认递延所得税资产，主要考虑是：1、有⽆在可预见的未来处置或清算被投资企业的计划；2、预计后续处置被投资企业股权或者清算被投资企业时，税务上是否允许在税前扣除实际收回价款⼩于投资计税基础的差额损失；3、预计后续处置或清算年度，预计有⽆⾜够多的应纳税所得额。个人理解，供参考。","cat":"所得税","kw":"减值,所得税,递延,权益法,成本法,求助陈版主,长投确认递延的疑问","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第18号——所得税"},{"id":"CY0912","q":"⽣产线减值问题","a":"资产减值测试中的可收回⾦额是“公允价值减去处置费⽤”和“未来现⾦流量现值”两者中的较⾼者。⽽未来现⾦流量现值的估计需结合个案情况分析。从主帖案例来看，虽然⼦公司B何时达到稳定⽣产尚有⼀定的不确定性，但提前关停A⼦公司的该⽣产线是⼤概率事件，在2024年末即可合理预见，故在2024年末就应当对将提前关停的A公司⽣产线计提减值，⽽不能到实际被关停时才确认损失。个人理解，供参考。","cat":"资产减值","kw":"公允价值,减值,⽣产线减值问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第8号——资产减值"},{"id":"CY1404","q":"⺟⼦公司之间⽆偿划转股权的账务处理","a":"应采⽤第⼀种⽅法，即A将其对B的⻓期股权投资账⾯价值转为对C公司的投资成本，不能冲减A本身的资本公积。 但需关注：因为B的净资产⼩于实收资本，表明该项⻓投很可能存在减值，针对该减值迹象，A应⾸先对该项⻓期股权投资进⾏减值测试，必要时计提减值准备并计⼊资产减值损失。再以计提减值准备后的对B公司⻓投账⾯价值转为对C公司的⻓投成本。个人理解，供参考。","cat":"资产减值","kw":"减值,⺟⼦公司之间⽆偿划转股权的账务处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第8号——资产减值"},{"id":"CY0615","q":"求助，外币应收账款计提坏账后续汇率变动会计处理","a":"该应收款项账⾯价值折合⼈民币（本位币）⾦额的变化，并⾮由于债务⼈信⽤风险的变动所导致，⽽是汇率变动的影响。所以此时坏账准备科⽬折合⼈民币余额的变动，对应的损益科⽬应当是“财务费⽤——汇兑差额”，⽽不 是“信⽤减值损失”。 如果是对该应收款项按其原币⾦额计算的可收回⾦额变化的影响，才是反映在“信⽤减值损失”科⽬中。个人理解，供参考。","cat":"资产减值","kw":"减值,外币应收账款计提坏账后续汇率变动会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第8号——资产减值"},{"id":"CY0201","q":"同⼀控制企业下股权转让处理","a":"⾸先要确定：为何B、C的净资产是⼤额负数，但转让价格较⾼？尤其是C的账⾯净资产-500万，但仍按1000万转让？这是否涉及B的个别报表层⾯对C未恰当计提减值准备的问题？ 如果不考虑交易公允性问题（即A将B、C股权转让给E不属于权益性交易），并且假设这两步交易不是⼀揽⼦交易，则：个人理解，供参考。","cat":"资产减值","kw":"减值,同⼀控制企业下股权转让处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第8号——资产减值"},{"id":"CY0507","q":"驻外项⽬部⼈员房租与⽔电费，怎么核算 ？","a":"如果是公司将员⼯派驻到异地，则公司有责任为外派员⼯解决租房问题，这不是公司提供给员⼯的福利，⽽是基本 ⼯作条件。因此不应作为福利费核算，作为差旅费或办公费等更恰当。另外对于直接为特定项⽬服务的员⼯，此类费⽤应计⼊项⽬成本。个人理解，供参考。","cat":"实务综合","kw":"驻外项⽬部⼈员房租与⽔电费,怎么核算","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0515","q":"关于佣⾦的问题","a":"A公司账⾯销售收⼊应按照最终销售价格80元计⼊营业收⼊，差额30元计⼊销售费⽤-佣⾦。个人理解，供参考。","cat":"实务综合","kw":"求助陈版主关于佣⾦的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0533","q":"资本公积可以转⼊实收资本科⽬吗","a":"资本公积中的“资本溢价（或股本溢价）”项⽬可以转增资本，⽆特殊的条件要求。该公司的董事会制定转增⽅案， 股东会通过决议即可操作。“其他资本公积”项⽬不能转增资本。个人理解，供参考。","cat":"实务综合","kw":"资本公积可以转⼊实收资本科⽬吗","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1914","q":"若不属于债务重组的话，那么关于利息及滞纳⾦ 0.5 亿，A公司能否确认相关的利息收⼊呢？对于担保债权，A 公司能否确认为其他应收款进⾏核算，⽽对于普通债权转为股权，作为其他权益⼯具投资是否恰当呢？","a":"此类债务偿还安排是债务⼈重整的整体安排的⼀部分，实务中⼀般将其作为债务重组处理（虽然引⼊了投资⼈，但投资⼈并不直接向债权⼈偿还债务，偿还债务仍是债权⼈和债务⼈双⽅之间的安排，重整投资⼈的回购只是补充保障）。⽬前很多上市公司的破产重整都是此类业务模式。 即使考虑到重整投资⼈的介⼊，不认为这是严格意义上的债务重组，但会计处理结果仍然是不受影响的。债务重组准则本来就是建⽴在⾦融⼯具准则基础上的，即使没有债务重组准则，按照 ⾦融⼯具相关准则的规定和原则也可以得出相同的处理结果。 对于利息和滞纳⾦能否确认，应谨慎评估引⼊投资⼈后债务⼈还款能⼒的改善情况，如果有实质性改善的，则可以转回此前计提的部分坏账准备（按最新的预计可收回⾦额折现值调整），相应增加利息收⼊的计算基数。 对于担保债权，还款⾦额能够合理估计的，可继续作为以摊余成本计量的⾦融资产（如债权投资、其他流动/⾮流动资产等）核算及列报；对于转股取得的股权，如果拟⻓期持有的，可指定为其他权益⼯具投资，否则应分类为以公允价值计量且其变动计⼊损益的⾦融资产，列报为其他⾮流动⾦融资产。 提问⼈：gpqg 时间：2025-12-17 15:45:18 请教陈版，如果作为其他权益⼯具投资来核算，其公允价值能否按照： 1 亿/51%，计算出 100%股权的公允价值。然后再乘以 3%，作为其他权益⼯具投资的⼊账价值呢？ 谢谢陈版！ 回答⼈：chenyiwei 重整投资⼈愿意出1亿元取得51%股权并控股，可能有其他特殊考虑，不能据此按⽐例测算取得的3%股权公允价值。建议单独评估。个人理解，供参考。","cat":"金融工具","kw":"公允价值,债务重组,若不属于债务重组的话,那么关于利息及滞纳⾦,A公司能否确认相关的利息收⼊呢,对于担保债权,公司能否确认为其他应收款进⾏核算,⽽对于普通债权转为股权,作为其他权益⼯具投资是否恰当呢","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第37号——金融工具列报"},{"id":"CY0540","q":"国企⽬前净资产为负，股东增资，资⾦可以⽤来增加资本公积吗？","a":"理论上是否增加本公司的注册资本和实收资本，可由股东⾃⾏确定，因此增资额全部计⼊资本公积也是可以的，但需要注意：虽然全部计⼊资本公积，但仍不能随意抽回这部分出资。个人理解，供参考。","cat":"实务综合","kw":"国企⽬前净资产为负,股东增资,资⾦可以⽤来增加资本公积吗","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0439","q":"关于设备租赁相关问题","a":"租赁成⽴的要素之⼀就是存在特定的“已识别资产”，即指明特定的服务器或芯⽚，⽽不是与其他⽅共享其算⼒。因此，第⼆种模式“按算⼒规模租赁”不是租赁⽽是接受服务。第⼀种和第三种模式均涉及已识别资产，以及的特定期限内主导（控制）其使⽤，因此包含租赁。但鉴于本企业还负责机房维护，故理论上需要将合同总价分拆到租赁和服务，分别处理。 第⼀、三种模式，站在出租⼈⾓度应作为经营租赁，在租赁期内按直线法或其他系统、合理的⽅式确认收⼊。这时租赁收⼊确认的模式很可能与服务收⼊是类似的。因此虽然理论上要将同⼀合同下的租赁和服务区分开，但事实上也可以不拆分，但如果不拆分则会导致附注披露的⿇烦，因为在附注中租赁收⼊和服务收⼊是分开披露的，对租赁还有进⼀步的特殊披露要求。 第⼆种模式按提供服务处理，不涉及单独确认和披露租赁收⼊。提问⼈：流⾦岁⽉@ 时间：2024-06-17 15:54:41 谢谢陈版，追问⼀下，毕竟从租赁期价款及租赁期限来看，已符合了融资租赁的判断条件。企业按经营租赁，应该从哪些依据来理解呢？ 回答⼈：chenyiwei 如可以长期稳定租赁，租赁期相当于寿命的绝⼤部分，且租⾦折现值基本相当于设备公允价值的，则可以作为融资租赁。其他较短期的（包括合同租赁期较长但经常提前退租的），或者租⾦取决于资产使⽤效益的，是经营租赁。个人理解，供参考。","cat":"收入准则","kw":"公允价值,租赁,请教陈版主关于设备租赁相关问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY1232","q":"关于护理服务如何确认收⼊的问题","a":"激活失败的权益，在激活期限结束时确认收⼊。 已激活的权益，因为其对应的就是⼀次护理服务，所以在该次护理服务提供完毕时确认收⼊（如该次护理服务本身符合在⼀段时间内确认收⼊的条件的，则在服务提供期间内确认收⼊），⽽不是在12个⽉内分摊确认收⼊。如果激活后12个⽉内未申请服务导致权益失效的，则在权益失效时确认收⼊。 提问⼈：gpqg 时间：2025-03-27 09:25:51 陈版，如果在 12 个⽉内提供的是 2 次护理服务呢？那么此时也是在实际提供服务的时候确认对应的收⼊吗？ 回答⼈：chenyiwei 是。 提问⼈：gpqg 时间：2025-07-28 17:12:04 陈版，对于这种权益卡，如果甲公司把该权益卡卖给中间商，⽐如保险公司之类的，然后保险公司最终再找客户。此时如果甲公司再把权益卡卖给中间商时，如果此时控制权已经转移给中间商了，但是此时还没有向最终客户提供服务。但是如果将来客户找甲公司提供服务，如果出现服务的质量等⼀系列问题，客户只能去找中间商，⽽不能找甲公司的麻烦。我想问⼀下，甲公司在把权益卡出售给中间商时，能否确认收⼊？谢谢陈版！ 回答⼈：chenyiwei 出售给中间商的价款确认为合同负债，因为中间商并⾮真正的客户。到中间商将卡券交付给其客户，其客户据此要求公司提供服务时，再确认收⼊。个人理解，供参考。","cat":"收入准则","kw":"控制权,请教陈版,关于护理服务如何确认收⼊的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY1616","q":"定制化产品的相关研发⽀出","a":"A、是。 B、如果受托⽅可控制研发成果，则按照⽆形资产准则的“企业内部研究开发项⽬”模式进⾏核算，对研发⽀出应区分研究阶段和开发阶段，以及对开发阶段进⼀步区分是否满⾜资本化条件，据此进⾏会计处理，因此也存在研发⽀出直接费⽤化计⼊研发费⽤的情况。这部分研发⽀出，即使后续该项⽬研发成功，也不能再重新资本化，因此这部分在发⽣时即被费⽤化的研发⽀出最终是不会计⼊营业成本的。 提问⼈：Ryan_q 时间：2025-08-12 11:24:17 @chenyiwei，谢谢陈版主的回复，还想补充问题，关于回复：1、可以控制研发成果，2、不仅适⽤于该合同，未来可以适⽤其他合同，其中特别是第2、能适⽤其他合同，在⽆形资产定义中，研究阶段以及开发阶段进⾏区分，其中开发阶段满⾜资本化条件包括（⼀）技术具有可⾏性（⼆）具有完成该⽆形资产并使⽤或出售的意图（三）证明其有⽤性（四）⾜够资源⽀持以完成开发（五）可靠计量，第2、的定义从某种意义上与开发阶段的资本化定义是能够契合的。 ⽬前，对于医药⾏业在研新的药品⽬前有⽐较成熟的区分阶段（如：临床三期），但对于很多其他⾏业，例如：软件⾏业，其在开发阶段就已经认为该技术⼗分成熟，已满⾜资本化条件，⽆法区分研究或者开发阶段区分，根据该定义会出现⽐较容易会计操作的环节： 问题：个人理解，供参考。","cat":"收入准则","kw":"资本化,定制化产品的相关研发⽀出","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0068","q":"关于研发收⼊确认问题","a":"从主帖信息来看，约定了三个付款节点，除了第⼀个节点（预付款）之外，后两个节点⾖显著滞后于受托⽅的实际履约进度，且未见“在整个合同期间内有权就累计⾄今已完成的履约部分收取款项”（即“合格收款权”）⽅⾯的约 定。虽然未约定已⽀付的报酬返还情况，但仍不属于在⼀段时间内履约。⽐较合理的做法是在完成研究并完成项⽬报告及现场验收后确认收⼊并结转成本。个人理解，供参考。","cat":"收入准则","kw":"求助陈版,关于研发收⼊确认问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0898","q":"租赁合同⼀年⼀签订，使⽤权资产确认？","a":"可参考： http://kjs.mof.gov.cn/zt/kjzzss/ … 0210610_3717408.htm 根据租赁准则第⼗五条并参考相关应⽤指南，租赁期是指承租⼈有权使⽤租赁资产且不可撤销的期间，同时还应包括合理确定承租⼈将⾏使续租选择权的期间和不⾏使终⽌租赁选择权的期间。在租赁期开始⽇，企业应当考虑对承租⼈⾏使续租选择权或不⾏使终⽌租赁选择权带来经济利益的所有相关事实和情况，包括⾃租赁期开始⽇⾄选择权 ⾏使⽇之间的事实和情况的预期变化。例如，承租⼈进⾏或预期进⾏的重⼤租赁资产改良在可⾏使相关选择权时预期能为承租⼈带来的重⼤经济利益、租赁资产对承租⼈运营的重要程度、与终⽌租赁相关的成本等。 因此，当承租⼈与出租⼈签订租赁期为1年的租赁合同时，不能简单认为该租赁的租赁期为1年，⽽应当基于所有相关事实和情况判断可强制执⾏合同的期间以及是否存在实质续租、终⽌等选择权以合理确定租赁期。如果历史上承租⼈与出租⼈之间存在逐年续签的惯例，或者承租⼈与出租⼈互为关联⽅，尤其应当谨慎确定租赁期。 企业在考虑所有相关事实和情况后确定租赁期为1年的，其他会计估计应与此⼀致。例如，与该租赁相关的租赁资产改良⽀出、初始直接费⽤等应当在1年内以直线法或其他系统合理的⽅法进⾏摊销。个人理解，供参考。","cat":"收入准则","kw":"租赁,摊销,请教陈⽼师,租赁合同⼀年⼀签订,使⽤权资产确认","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0918","q":"关于合并层⾯投资收益是否抵消的问题？","a":"这个问题取决于对联营企业的长期股权投资本⾝是否构成“业务”的判断。如果构成业务则⽆需抵销此次交易损益； 如果不构成业务则需抵销。 参照2017年证监会会计部发布的《中国证监会会计部2017年会计监管协调会——具体会计问题监管⼜径》：“被购 买⽅仅持有⼀项对联营公司投资时，是否构成业务，需要判断其所持有的联营公司本⾝是否构成业务。如果联营公司本⾝只持有现⾦、以公允价值计量的⾦融资产等，并不构成业务，则被购买⽅持有的相应长期股权投资也不构成业务；如果联营公司本⾝构成业务，则被购买⽅持有的长期股权投资也构成业务。也即，被购买⽅主要资产为联营公司股权时，对其是否构成业务的判断，应穿透⾄联营公司层⾯确定。” 据此，建议对照上述指引，分析A公司本⾝是否构成“业务”，据此判断S公司是否需将处置A的25%股权给B的交易构成⼀项与联营企业之间的顺流交易，是否需抵销相应的内部交易损益。个人理解，供参考。","cat":"合并报表","kw":"公允价值,合并,关于合并层⾯投资收益是否抵消的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY0513","q":"各位⼤佬，国有企业控股不并表怎么操作","a":"股权⽐例不变，利润分配和亏损分担的原则不变，在这种情况下仅仅变更董事会席位⽐例和表决规则，是缺乏商业合理性的，很难得到认可。 参考《监管规则适⽤指引——会计类第1号》之“1-2 重⼤影响的判断”：“⼀般⽽⾔，在被投资单位的股权结构以及投资⽅的持股⽐例等未发⽣实质变化的情况下，投资⽅不应在不同的会计期间，就是否对被投资单位具有重⼤影响，作出不同的会计判断。”。四部委2021年年报⼯作通知：“企业应当按照《企业会计准则第2号——长期股权投资》（财会〔2014〕14号，以下简称长期股权投资准则）、《企业会计准则第40号——合营安排》（财会 〔2014〕11号）的相关规定，判断是否对被投资单位具有重⼤影响或共同控制，并进⾏相应会计处理和披露。企业应当综合考虑所有事实和情况来作出恰当的判断，不应仅以撤回或新委派董事、增加或减少持有被投资单位的股份等个别事实为依据作出判断。”个人理解，供参考。","cat":"合并报表","kw":"各位⼤佬,国有企业控股不并表怎么操作","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表、《企业会计准则第2号——长期股权投资》、《企业会计准则第40号——合营安排》"},{"id":"CY0393","q":"⼦公司回购库存股 还没注销 对母公司合并权益表的影响","a":"这部分等同于回购少数股权，在回购⽇即应按购买少数股权进⾏处理（按⽀付的对价与所减少的少数股权账⾯价值之间的差额调整资本公积）。后续实际注销所回购的股份时，只是⼦公司权益项⽬的内部变动，⽽⼦公司权益总额不变，故注销股份时对合并资产负债表和合并权益变动表均⽆影响。 提问⼈：gxy1993 时间：2024-06-18 11:47:52 这个回购是在4⽉，变动后就没有少数股东了 ；⽤模拟权益法调整的时候 这个时候我做的是把库存股的变动⽤变 动前的⽐例进⾏模拟权益法；然后少数股东和资本公积调整的⾦额就正好是少数股东⽐例变动减少的价值；这样对吗；其实少数股东回购 应该是母公司出资 ⽽不是这个公司⾃⼰回购⾃⼰的少数股东； 回答⼈：chenyiwei 可以这样理解。在合并报表层⾯，只要是提升了母公司的持股⽐例的，都按照购买少数股权处理，与收购价款由谁承担⽆关。个人理解，供参考。","cat":"合并报表","kw":"合并,少数股东,权益法,⼦公司回购库存股,还没注销,对母公司合并权益表的影响","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY1186","q":"关于⼦公司吸收合并⺟公司","a":"吸收合并中，存续企业注册资本和实收资本⾦额的确定更多地是⼀个法律问题。 根据原国家⼯商⾏政管理总局《关于做好公司合并分⽴登记⽀持企业兼并重组的意⻅》（⼯商企字[2011]226号）第⼆条：“(五)⽀持公司⾃主约定注册资本数额。因合并⽽存续或者新设的公司，其注册资本、实收资本数额由合并协议约定，但不得⾼于合并前各公司的注册资本之和、实收资本之和。合并各⽅之间存在投资关系的，计算合并前各公司的注册资本之和、实收资本之和时，应当扣除投资所对应的注册资本、实收资本数额。” 即，⺟⼦公司之间吸收合并后，存续企业（⼦公司）的注册资本上限可以是：吸收合并前⺟⼦公司注册资本合计-⺟公司对⼦公司投资对应的⼦公司注册资本额，即理论上可以保留⺟公司的注册资本+少数股东对原⼦公司投资形成的注册资本。这与吸收合并中进⼊的净资产是否为负数⽆关。个人理解，供参考。","cat":"合并报表","kw":"合并,少数股东,请教陈版,关于⼦公司吸收合并⺟公司","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY1246","q":"托管企业的核算问题","a":"“集团根据管理建议压缩层级，B将C公司股权⽆偿转让给集团，但是集团和B签订托管协议，将⼀切的表决权、收益权全部托管给B”：这种情况下，C的股东权利仍实质上归属于B，可以认为这种划转只是形式上的，实质上没有重⼤改变，故维持原有的合并报表编制模式，即C仍先纳⼊合并范围（视同未进⾏过该次划转）。 严格来说，虽然形式上C的股权划转给了A，但A不能将C的股权确认为⾃身资产，另外即使要确认为A的资产，对应也是贷记“⻓期股权投资——B”⽽不是资本公积（相当于收回对⼦公司B的部分投资）。 提问⼈：yuanmohai 时间：2025-03-31 14:40:24 陈版主，如果集团对B的⻓投是投资设⽴的，B对C的⻓投是购买的，这样冲减后集团对B的出资就少了⼀块回答⼈：chenyiwei 是的，但这个变化是可以合理解释的。个人理解，供参考。","cat":"合并报表","kw":"合并,托管企业的核算问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY0650","q":"⾮同控合并合并成本","a":"企业合并准则的正⽂⾃2006年颁布以来没有修改过，但各类解释、讲解、应⽤指南、实施问答等很多，因此要将各项相关规定结合起来看，⽬前的《应⽤指南汇编2024》的“企业合并”⼀章已经汇总整理了此后相关补充规定的影 响。 关于分次交易实现的⾮同⼀控制下企业合并的成本，应以《企业会计准则解释第4号》第⼀条和《企业会计准则第 33号——合并财务报表（2014年修订）》第四⼗⼋条为准。个人理解，供参考。","cat":"企业合并","kw":"合并,⾮同控合并合并成本","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0805","q":"甲集团全资⼦公司A购买甲集团控股⼦公司B的少数股东股权的账 务处理？","a":"A公司个别报表层⾯，如主帖所述，长期股权投资成本适⽤“企业合并以外的其他原因形成的长期股权投资”，按实际⽀付的货币资⾦加上相关费⽤作为初始计量的⾦额。 甲集团合并报表层⾯：按照购买少数股权处理，收购对价与对应的少数股东权益之间的差额调整合并报表层⾯的归母权益。⼀般是先调整资本公积（资本溢价或股本溢价），资本公积（资本溢价或股本溢价）不⾜冲减的，调整留 存收益。个人理解，供参考。","cat":"企业合并","kw":"合并,少数股东,求助陈版,甲集团全资⼦公司A购买甲集团控股⼦公司B的少数股东股权的账,务处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY1726","q":"关于企业合并的问题","a":"因为第⼀次划转是在国资委主导下，在同⼀国资委管辖范围内的划转；第⼆次划转是在划⼊⽅主导下在划⼊⽅集团内部的划转，两次划转后最终控制⽅均不变，且符合⾮暂时性条件，故两次划转均作为同⼀控制下合并处理。 根据同⼀控制下合并的会计处理要求，上市公司D应⾃C公司最早被纳⼊最终控制⽅（该国资委）控制时点起将C公司纳⼊合并报表范围，并相应追溯重述合并报表层⾯的前期⽐较数据。个人理解，供参考。","cat":"企业合并","kw":"合并,请教陈版主,关于企业合并的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0251","q":"关于⾮上市公司换股合并的长投初始计量","a":"合并成本应按合并⽇的股价（增发权益⼯具的公允价值）计量。即2023年6⽉股价*200万股。不应直接按基准⽇的股价。个人理解，供参考。","cat":"企业合并","kw":"公允价值,合并,关于⾮上市公司换股合并的长投初始计量","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY1429","q":"诚⼼请教商誉计算与递延所得税的相关问题","a":"如果收购的股权⽐例是100%，⽆少数股权，则这样的结果是合理的。 上一页 陈版主（陈奕蔚老师）答疑历史文章（2025年04月） 下一页 陈版主（陈奕蔚老师）答疑历史文章（2025年06月） 粤ICP备18107660号 粤公网安备44060602000887号 关于网站 Copyright © 2021-2026 会计便利店 hjyweb.cn 【个人理解，供参考。","cat":"企业合并","kw":"商誉,所得税,递延,诚⼼请教商誉计算与递延所得税的相关问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0371","q":"企业收到培训费补贴","a":"属于政府补助（通常理解是与费⽤相关，其补贴对象是前期对职⼯教育经费的计提额）。由于职⼯教育经费的计提 ⾦额是计⼊营业利润中的各个成本费⽤项⽬，所以该项政府补助与⽇常活动相关，可以计⼊其他收益。个人理解，供参考。","cat":"政府补助","kw":"企业收到培训费补贴","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第16号——政府补助"},{"id":"CY0542","q":"业绩对赌原控股股东会计处理的疑问","a":"C公司向A公司⽀付5000万元，对C公司⽽⾔属于或有对价相关⾦融负债的公允价值变动，应确认为公允价值变动 损益，⽽且理论上应在业绩对赌期内的较早年度就应当确认该项损失，除⾮导致第三年B公司业绩下滑的原因是第三年新出现且此前⽆法合理预见的。如果是第三年内新确认的损失，也可以直接借记投资收益。个人理解，供参考。","cat":"实务综合","kw":"公允价值,求助陈版主,业绩对赌原控股股东会计处理的疑问","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0543","q":"业绩对赌期间处置公司","a":"对赌期间处置⼦公司，以及对赌期间未结束情况下就已实现业绩低于同期累计承诺业绩的补偿，都涉及对原先的收购协议和业绩补偿协议的修改问题。建议咨询律师和监管机构意见，并尽早与原交易对⼿⽅启动协商。你的意见都可能有⼀定的合理性，但关键是要通过补充协议明确下来。个人理解，供参考。","cat":"实务综合","kw":"业绩对赌期间处置公司","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1033","q":"⾮持续经营编制基础转持续经营编制基础","a":"如果本期采⽤持续经营基础编制是恰当的，且未经过重组等重⼤事项，完全是由市场形势重⼤变化等事先⽆法预⻅的外部因素变化所导致，则这种情况涉及对报表编制基础的改变，建议对上年度以⾮持续经营基础编制的报表进⾏追溯重述，使得整个报表（含⽐较数据）持续按持续经营基础编制，并保持此前的历史成本计量基础。 附注中需对编制基础发⽣重⼤改变的原因和具体调整情况作出说明。提问⼈：zixun2022 时间：2025-03-10 23:42:53 陈⽼师，这种情况下的变更为持续经营基础的理论基础属于会计政策变更吗（需要追溯调整）。即：理由是什么呢回答⼈：chenyiwei 这既不是会计政策变更也不是会计估计变更，⽽是会计基础的变更。只不过此前对会计变更的讨论都是在持续经营⼤前提下，所以没有涉及此类会计基础变更问题。个人理解，供参考。","cat":"会计政策/估计变更","kw":"⾮持续经营编制基础转持续经营编制基础","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第28号——会计政策、会计估计变更和差错更正"},{"id":"CY0544","q":"⽣育津贴何时暂估","a":"要考虑公司有⽆这⽅⾯的明确政策或者惯例，从⽽使得员⼯形成了将从公司收到该笔补差款的预期。如果是，则即使员⼯未来报销该笔费⽤，也应在员⼯休产假期间逐⽉计提确认相关负债和职⼯薪酬费⽤。个人理解，供参考。","cat":"实务综合","kw":"⽣育津贴何时暂估","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0999","q":"拟上市公司对⾼管及员⼯授予限制性股权能否⼀次性确认股份⽀付费⽤？","a":"仅仅“基于2位⾼管在授予时按照1元总价获得公司10%的股权，在触发回购条款时，回购价格按照与实控⼈协商为 准”不能判断该2位⾼管的股份授予⽆等待期。因为不能证明该2位⾼管在授予⽇即完整享有与被授予的激励股份相 关的公允价值变动的收益和风险。协商确定的转让价格不⼀定能够代表届时的公允价值。“若2位⾼管离职创业或因其他安排离开公司时，即使公司尚未上市，或股票尚未解禁，也可按照公允价值与⽼板协商回购”的判断不成⽴。个人理解，供参考。","cat":"职工薪酬","kw
