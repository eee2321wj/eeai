交易往往伴随定价不公允，相关企业可能面临补税、财务信息更正等严重后果。","cat":"关联方披露","kw":"关联方披露,CAS 36,关联方,关联交易,披露,资本公积,监管","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第36号——关联方披露"},{"id":"CY0070","q":"⽆合同客户回款会计处理","a":"⾸先建议聘请律师了解这些流失客户的当前状况（例如是否已破产或者注销），以及依据相关合同和法律法规规 定，谨慎判断客户要求索回款项或者继续提供服务的可能性有多⼤。如果确定客户要求索回款项或者继续提供服务的可能性极⼩，则可以在履⾏必要的内部决策程序的基础上，将这些合同负债转为营业收⼊。 所需的外部证据参照应收、预付款项坏账核销所需证据，具体可参阅《关于建⽴健全企业应收款项管理制度的通知》（财企[2002]513号）、《关于印发中央企业资产减值准备财务核销⼯作规则的通知》（国资发评价[2005]67 号）、《企业资产损失所得税税前扣除管理办法》（国家税务总局公告[2011]25号）等。 提问⼈：7847748 时间：2024-03-07 21:38:25 您好陈⽼师，公司该批预收款项未找到合同资料及前期提供过服务的证明，仅有银⾏回单证据，⼤部分回单有汇款 ⼈名称及附⾔“服务费、续费、合同款”，那预收款项核销可以结转营业收⼊吗？查了很多案例都是结转营业外收⼊的，但是这家公司的回单注明了服务费或合同款，是不是结转营业收⼊更合适呢，按⾮经常性损益披露。请陈⽼师指教！ 回答⼈：chenyiwei 在新收⼊准则下，确认为营业收⼊似乎更合理，见新收⼊准则第三⼗九条。个人理解，供参考。","cat":"收入准则","kw":"减值,所得税","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3414","q":"经营租赁转融资租赁（作为出租人）如何处理？","a":"根据CAS 21第六十七条，原经营租赁转融资租赁（即修改或变更导致重新分类），出租人应自变更生效日起按融资租赁处理：\n\n（1）终止确认经营租赁相关的资产（即原固定资产或投资性房地产）；\n（2）确认应收融资租赁款（= 租赁收款额的现值 + 未担保余值现值）；\n（3）差额（应收融资租赁款 - 资产账面价值）计入当期损益。\n\n与承租人角度不同，出租人的经营租赁转融资租赁会计处理相对简单——相当于先按账面价值处置资产，再确认一项新的融资租赁应收款。资产处置损益（借贷差）一次性确认，不涉及递延。\n\n实务提醒：出租人在租赁变更日应取得内部审批和修改文件，同时更新合同台账和资产管理系统，确保税务处理和会计处理一致。\n\n另外，出租人在判断融资租赁转经营租赁时（相反的变更），处理逻辑是对称的：终止确认应收融资租赁款，确认原租赁资产。","cat":"租赁","kw":"租赁,CAS 21,使用权资产,租赁负债,经营租赁,融资租赁,账面价值,终止确认","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第21号——租赁"},{"id":"3413","q":"投资性房地产采用公允价值模式和成本模式的差异和选择？","a":"根据CAS 3（投资性房地产），企业可选择成本模式或公允价值模式（在公允价值能持续可靠取得时）。\n\n成本模式（类似固定资产）：按期计提折旧/摊销，进行减值测试，不确认公允价值变动。\n\n公允价值模式：不折旧/不摊销，每期末按公允价值重新计量，变动计入当期损益（公允价值变动损益）。\n\n重要限制：同一企业只能对所有投资性房地产采用一种模式（不能部分成本、部分公允）；且一旦选公允价值模式就不能转回成本模式。\n\n实务选择考量：\n- 公允价值模式：利润表波动大（公允价值涨跌直接影响损益），但资产负债表中资产价值更反映市场实际；\n- 成本模式：利润表稳定，但资产价值可能严重偏离市价；\n- 公司估值和财务指标影响：选择公允价值模式的企业，资产周转率、资产负债率指标的计算依赖市场估值，稳定性较差。\n\n绝大多数A股公司采用成本模式，因为公允价值可靠取得困难，且波动性过大影响业绩稳定性。","cat":"公允价值计量","kw":"公允价值,CAS 39,估值技术,输入值,市场法,CAS 3,公允价值变动损益,摊销,折旧,减值测试","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第39号——公允价值计量、企业会计准则第3号——投资性房地产"},{"id":"3412","q":"前期差错的更正（追溯重述）具体怎么操作？涉及哪些报表调整？","a":"根据CAS 28第十二条，重要的前期差错应当采用追溯重述法进行更正。\n\n操作步骤：\n（1）重塑前期财务报表，如同差错从未发生过——调整差错发生期间的留存收益和相关项目的期初余额；\n（2）在发现差错的当期财务报表附注中披露前期差错的详细性质、受影响的前期各期报表项目及更正金额。\n\n具体调整：\n- 差错影响损益的：调整期初留存收益；\n- 差错影响资产负债表的：调整资产/负债的期初余额；\n- 差错影响比较报表的：调整各比较期间的相关项目。\n\n不重要的前期差错：可直接调整发现当期的相关项目，无需追溯重述。\n\n重要提醒：\n- 在会计政策变更和前期差错更正之间不能混淆——会计政策变更是合法地改变计量方法；而前期差错是纠正之前的错误使用\n- 如果之前年度审计报告已出具，差错更正需要对已审计财务报表进行修正，影响重大时应重述签报告。","cat":"会计政策/估计变更","kw":"会计政策变更,会计估计变更,CAS 28,追溯调整,未来适用法,前期差错,追溯,留存收益,审计,审计报告,会计政策,比较报表","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第28号——会计政策、会计估计变更和差错更正"},{"id":"3411","q":"会计政策变更和会计估计变更的本质区别是什么？区分的实务意义？","a":"根据CAS 28：\n\n会计政策变更——指企业对于相同的交易或事项由原来采用的会计政策改为另一种会计政策。例如：存货计价方法由先进先出法改为加权平均法、投资性房地产由成本模式转为公允价值模式。\n\n会计估计变更——由于资产和负债的当前状况及预期未来经济利益和义务发生了变化，从而对资产负债账面价值和各期消耗金额的调整。例如：坏账计提比例的调整、固定资产折旧年限的变更。\n\n区分的关键：变更是因为'新信息、新发展'（估计变更）还是'选择不同的准则允许的方法'（政策变更）。\n\n实务意义：\n（1）政策变更一般需追溯调整（除准则有特殊规定外），而估计变更采用未来适用法（不追溯）；\n（2）政策变更必须充分披露变更原因、影响金额；\n（3）误将政策变更作为估计变更处理属于会计差错，可能导致财务报表的重大错报。\n\n常见灰色地带：存货跌价准备计提方法的调整、建造合同完工百分比的估计变更——容易混淆，需要审慎判断。","cat":"会计政策/估计变更","kw":"会计政策变更,会计估计变更,CAS 28,追溯调整,未来适用法,会计估计,会计政策,公允价值,账面价值,坏账,折旧,追溯","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第28号——会计政策、会计估计变更和差错更正"},{"id":"3410","q":"债转股涉及哪些会计处理要点？债务人应如何确认权益？","a":"债转股（将债务转为权益工具）：\n\n债务人：（1）终止确认债务的账面价值；（2）确认权益工具（实收资本/股本和资本公积），按权益工具的公允价值计量（如能可靠取得）；（3）债务账面价值和权益工具入账价值的差额计入投资收益。\n\n债权人：（1）终止确认债权的账面价值；（2）确认取得权益工具投资（长投或金融资产），按放弃债权的公允价值加相关税费作为初始确认成本；（3）放弃债权公允价值和账面价值的差额计入投资收益。\n\n操作要点：\n- 债务人确认的权益工具公允价值优先采用评估值；\n- 债权人取得的股权如达到控制/共同控制/重大影响则按长投核算，否则按金融资产处理；\n- 债转股后债务人资产负债率改善，应充分披露重组目的、金额及对财务结构的影响。\n\n注意区分：债转股与可转债转股不是同一回事——后者按原嵌入衍生工具的条款处理，不能简单套用债务重组规则。","cat":"债务重组","kw":"债务重组,CAS 12,债转股,公允价值,重组损益,账面价值,投资收益,资本公积,控制,共同控制,重大影响,终止确认,衍生工具","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第12号——债务重组"},{"id":"CY0369","q":"关联⽅代偿是否构成债务重组？","a":"该事项对A⽽谈仍属于债务重组（B与C互为关联⽅，应作为⼀个整体看待）；但对于B⽽⾔则属于权益性交易。个人理解，供参考。","cat":"债务重组","kw":"债务重组","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3408","q":"贴息贷款的政府补助如何处理？政策性优惠贷款贴息和一般贴息有何不同？","a":"根据CAS 16第十四条：\n\n政策性优惠贷款贴息（财政部门直接将贴息拨付给银行，银行以优惠利率放贷给企业）：企业有两种选择：（1）以实际利率（优惠利率）计量借款，不单独确认贴息；（2）以公允价值计量借款（按同类非贴息贷款的利率折现），差额确认为政府补助（递延收益，在借款期内摊销）。\n\n一般贴息（企业先按正常利率付息，政府将贴息拨付给企业）：直接按实际收到的贴息确认为当期收益（若与补偿当期费用相关）或递延收益（若与借款购置的资产相关）。\n\n实务中多数企业选择方法（1）处理政策性优惠贷款，简单明了。方法（2）要求更高，适合精准核算的场景。","cat":"政府补助","kw":"政府补助,CAS 16,递延收益,总额法,净额法,公允价值,摊销","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第16号——政府补助"},{"id":"3407","q":"政府补助采用总额法和净额法的区别？选择有何限制？","a":"根据CAS 16第十条，与资产相关的政府补助可以选用总额法或净额法，但一经选定不得随意变更。\n\n总额法：（1）收到补助时确认为递延收益；（2）资产使用寿命内分期转入其他收益（或营业外收入）；（3）资产负债表体现资产原值和递延收益。优势是反映资产的完整成本规模和补助金额。\n\n净额法：（1）收到补助时直接冲减资产账面价值；（2）按冲减后的账面价值计提折旧；（3）资产负债表不单独列示补助金额。优势是简化处理，缺点是无法单独看到资产原始规模。\n\n选择限制：\n（1）与收益相关的政府补助只能采用总额法；\n（2）与资产相关的可选择，但同一类补助需采用一致的会计政策；\n（3）实务中，大多数企业（包括上市公司）倾向采用总额法以完整反映资产规模。\n\n另外注意：政府补助确认为收益的期间必须与相关费用配比，不能一次性全部计入当期。","cat":"政府补助","kw":"政府补助,CAS 16,递延收益,总额法,净额法,账面价值,营业外收入,其他收益,上市公司,会计政策,折旧","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第16号——政府补助"},{"id":"3406","q":"集团股份支付（母公司给子公司高管股权）在个别报表和合并报表层面如何处理？","a":"集团股份支付涉及三个层面：\n\n1. 母公司个别报表：按结算方式处理。如果是母公司用自己的权益工具结算（母公司承担费用），母公司确认为对子公司的长期股权投资增加，同时确认资本公积。\n\n2. 子公司个别报表：确认为股份支付费用（管理费用），同时确认资本公积（视为母公司作为股东的资本性投入）。\n\n3. 合并报表层面：合并抵销母公司的长期股权投资和子公司的资本公积，最终体现为：管理费用（借方）= 资本公积（贷方），金额为授予日的公允价值在服务期内的摊销额。\n\n实务常见错误：子公司个别报表中不确认股份支付费用，全部在母公司层面确认——这是错误的！子公司拿到了职工的服务，就应当在自己的报表中确认费用。\n\n另外注意：如果是用子公司自身权益工具结算，那就不是集团股份支付，按常规CAS 11处理即可。","cat":"股份支付","kw":"股份支付,CAS 11,权益结算,现金结算,等待期,合并,子公司,母公司,公允价值,资本公积,摊销","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第11号——股份支付"},{"id":"CY0216","q":"⼤股东兜底式员⼯持股计划","a":"“⼤股东兜底式”持股计划，相当于⼤股东向参与该计划的员⼯授予卖出期权，在特定时间如公司股价低于约定价 格，则员⼯有权将其所获得的激励股份按约定价格出售给⼤股东。所以该计划对上市公司⽽⾔属于权益结算股份⽀付，其股份⽀付费⽤应在等待期内确认，⽽不能到⼤股东实际承担兜底义务时才确认。 上述权益结算股份⽀付费⽤的计量基础为该项卖出期权在授予⽇的公允价值。个人理解，供参考。","cat":"股份支付","kw":"公允价值","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3404","q":"研发支出加计扣除在会计处理和税务处理上的差异和递延所得税影响？","a":"根据CAS 18，研发支出有资本化和费用化两种会计处理，而税法上可享受加计扣除政策（制造业企业为100%，其他企业为75%）。\n\n两种情况分析：\n\n情况一（会计费用化，税法加计扣除）：\n如果当期费用化的研发支出在汇算清缴时享受加计扣除，未来没有扣除机会——属于永久性差异，不产生递延所得税。\n\n情况二（会计资本化，税法加计扣除）：\n内部研发形成的无形资产，会计上按账面价值摊销；税法上按加计后的计税基础摊销。会计摊销额小于税务摊销额，形成可抵扣暂时性差异（理论上）。但CAS 18第二十二条规定，如果无形资产初始确认时既不影响会计利润也不影响应纳税所得额，则不确认递延所得税——这适用于内部研发形成的无形资产。\n\n实务结论：研发加计扣除大多属于影响当期所得税的优惠（非暂时性差异）而非递延所得税事项。","cat":"所得税","kw":"所得税,CAS 18,递延所得税,应纳税所得额,暂时性差异,账面价值,摊销,资本化,费用化","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第18号——所得税、企业会计准则第17号——借款费用"},{"id":"3403","q":"合并报表中内部交易抵销产生的递延所得税如何处理？","a":"合并报表中的内部交易抵销会形成暂时性差异，因为：合并层面已抵销未实现利润，但税法以各法人主体为单位纳税，仍按原始交易价格计税。\n\n典型场景：\n\n1. 内部存货交易：合并抵销存货未实现利润→存货账面价值低于计税基础→确认递延所得税资产。后续存货对外售出时转回。\n\n2. 内部固定资产交易：合并抵销未实现利润并调整折旧→固定资产账面价值低于计税基础→确认递延所得税资产。后续逐年转回。\n\n3. 内部债权债务抵销对应坏账准备转回：减少递延所得税资产。\n\n税率选择：按购买方（持有资产方）的适用税率计算递延所得税。\n\n实务常见问题：合并报表编制人员遗漏内部交易对应的递延税影响，导致合并资产负债表和合并利润表的勾稽关系断裂。","cat":"所得税","kw":"所得税,CAS 18,递延所得税,应纳税所得额,暂时性差异,递延所得税资产,合并,账面价值,坏账,折旧","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第18号——所得税、企业会计准则第22号——金融工具确认和计量"},{"id":"3402","q":"资产减值准备的递延所得税如何确认？什么情况下不能确认？","a":"资产减值准备（如坏账准备、存货跌价准备、固定/无形/长投减值准备）属于可抵扣暂时性差异，因为会计上已确认损失但税法在实际发生损失前不允许税前扣除。\n\n确认递延所得税资产的条件（CAS 18第十二条）：企业未来很可能取得足够的应纳税所得额来抵扣暂时性差异。'很可能'通常理解为概率超过50%。\n\n不能确认递延所得税资产的情形：\n（1）企业长期亏损，无法合理预期未来有足够应纳税所得额；\n（2）持续经营存在重大不确定性；\n（3）减值对应商誉——商誉的初始确认不产生暂时性差异。\n\n实务要点：（1）确认递延所得税资产必须有盈利预测支持，不能仅凭管理层乐观估计；（2）每期期末重新评估未来应纳税所得额的充足性，不足时转回；（3）税法对各项准备金扣除的具体规定有差异，需逐项分析。","cat":"所得税","kw":"所得税,CAS 18,递延所得税,应纳税所得额,暂时性差异,递延所得税资产,坏账,商誉","src":"财政部 企业会计准则解释公告","std_ref":"企业会计准则第18号——所得税、企业会计准则第22号——金融工具确认和计量"},{"id":"3401","q":"售后回租交易的会计处理三步法是什么？","a":"根据CAS 21第五十条至第五十二条，售后回租交易需要判断是否属于销售。\n\n属于销售的（卖方-承租人角度）：\n（1）终止确认标的资产，确认资产处置损益（仅就转让给买方-出租人的部分确认损益）；\n（2）按回租部分的公允价值比例，确认使用权资产（即回租对应的原账面价值）；\n（3）确认租赁负债（应付租金折现）。\n\n不属于销售的（实质是融资）：\n（1）不终止确认资产，将收到的款项确认为金融负债（如长期应付款）；\n（2）后续按金融负债摊余成本计量。\n\n实务关键点：如何判断是否属于销售——参考CAS 14收入确认'控制权转移'的标准，即买方是否取得了对资产的控制权并能主导使用和获益。许多售后回租交易的买断式回购条款使得整个交易实质上是抵押借款，不应确认处置损益。","cat":"租赁","kw":"租赁,CAS 21,使用权资产,租赁负债,CAS 14,售后回租,公允价值,账面价值,摊余成本,控制,终止确认","src":"深圳证券交易所 会计监管动态","std_ref":"企业会计准则第21号——租赁、企业会计准则第14号——收入"},{"id":"3400","q":"租赁变更（如缩减租赁面积、延长租期）如何进行会计处理？","a":"根据CAS 21第二十八条，租赁变更作为一项单独租赁处理需同时满足：（1）增加一项或多项租赁资产的使用权（扩大租赁范围）；（2）增加的对价与新增范围的单独价格相当。\n\n不满足单独租赁条件的：\n\n缩减租赁面积：按比例减少使用权资产和租赁负债的账面价值，差额计入当期损益（资产处置收益）。\n\n延长租期：重新计量租赁负债（按新租期和修改后付款额折现），相应调整使用权资产。\n\n租金调整（不涉及范围或期限）：重新计量租赁负债并按变动期间计入当期损益或调整使用权资产（取决于是否属于实质固定付款额变动）。\n\n实务中租金调整（如疫情期间减租）的会计处理是近年来的热点问题，重点在于判断是临时的让步（作为可变租赁付款额计入当期损益）还是永久的缩减（重新计量租赁负债）。","cat":"租赁","kw":"租赁,CAS 21,使用权资产,租赁负债,账面价值","src":"深圳证券交易所 会计监管动态","std_ref":"企业会计准则第21号——租赁"},{"id":"3399","q":"新租赁准则下，低价值资产租赁的判断标准是什么？实务中如何操作？","a":"根据CAS 21，低价值资产租赁指单项租赁资产在全新状态下的绝对价值较低的租赁。CAS 21应用指南给出的参考值为不超过人民币40,000元（或美元5,000元）。\n\n判断要点：（1）以全新价值判断，不是按使用过的资产价值；（2）不能基于重要性量化判断——即使租赁资产的总价值很大，只要单件价值低即可；（3）母子公司各自判断，合并层面不能按汇总价值。\n\n典型低价值资产：笔记本电脑、平板电脑、办公桌椅、一般办公电话。\n\n不属于低价值资产的：汽车（因为全新状态下通常超过4万元）、大型复印机、专用设备。\n\n实务提示：低价值资产租赁豁免只是选择权，企业仍可选择按准则要求确认使用权资产，但通常会采用豁免以简化处理。","cat":"租赁","kw":"租赁,CAS 21,使用权资产,租赁负债,合并,子公司","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第21号——租赁"},{"id":"3398","q":"在建工程长期停工或暂停建设，是否需要计提减值准备？","a":"在建工程长期停工属于典型的减值迹象。根据CAS 8，企业应评估可收回金额。判断需要分两个维度：\n\n维度一：是否永久性停工（如项目取消）——立即按全额计提减值（或在回收价值范围内的部分冲减）。\n\n维度二：是否临时性停工——估算复工后的收益前景是否足以弥补停工期间的持有成本和潜在贬值。具体评估方法是：（1）预测复工后预计净现金流入；（2）将停工期延长导致的技术落后等影响纳入考虑；（3）折现率应反映时间价值和停工风险。\n\n实务要点：\n- 停工超过一年的在建工程必须重点关注减值迹象；\n- 不能以'管理层计划继续建设'为由简单通过减值测试，必须有具体可执行的复工计划和资金保障；\n- 减值损失的计量要区分可收回金额与账面价值的差额，不是简单按停工时间比例计算。","cat":"资产减值","kw":"资产减值,CAS 8,可收回金额,减值测试,资产组,账面价值","src":"深圳证券交易所 会计监管动态","std_ref":"企业会计准则第8号——资产减值"},{"id":"3397","q":"固定资产减值测试的频率和触发条件是什么？","a":"根据CAS 8，企业应当在每个资产负债表日判断资产是否存在减值迹象。存在下列迹象的，应估计可收回金额：\n\n外部迹象：（1）资产的市价在当期大幅下跌；（2）企业经营的经济、技术或法律环境发生重大不利变化；（3）市场利率提高导致折现率上升；（4）企业净资产账面价值高于市值。\n\n内部迹象：（1）资产陈旧过时或实体损坏；（2）资产已或将被闲置、终止使用或提前处置；（3）内部报告显示资产经济绩效低于预期。\n\n注意：无论是否存在减值迹象，企业合并形成的商誉和尚未达到可使用状态的无形资产每年必须进行减值测试。\n\n实务建议：建立减值迹象检查清单和定期评估机制，不要等到年终审计才做。","cat":"资产减值","kw":"资产减值,CAS 8,可收回金额,减值测试,资产组,账面价值,审计,合并,商誉","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第8号——资产减值"},{"id":"3396","q":"商誉减值测试中的资产组（CGU）如何划分？常见误区有哪些？","a":"根据CAS 8第二十三条，商誉应当自购买日起分摊至相关的资产组或资产组组合进行减值测试。资产组的认定应以'能够独立产生现金流入'为基本原则。\n\n实务划分要点：\n（1）资产组不能大于报告分部（按CAS 35经营分部口径）；\n（2）如果企业管理层按生产线、业务类型或地理区域等维度监控经营活动，则通常按该维度划分CGU；\n（3）商誉分摊后不能随意变更，除非有合理的重组或处置。\n\n常见误区：\n- 误区一：将整个子公司作为一个CGU——太粗放，不能反映真实减值风险\n- 误区二：将商誉分摊至不能独立产生现金流的辅助资产组\n- 误区三：每年简单的以子公司整体进行减值测试，掩蔽了深层减值信号\n\n合理做法：按协同效应受益范围将商誉分摊至能够受益的各资产组，分别测试。","cat":"资产减值","kw":"资产减值,CAS 8,可收回金额,减值测试,资产组,CAS 35,商誉,CGU,子公司","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第8号——资产减值、企业会计准则第35号——分部报告"},{"id":"3395","q":"合营企业与联营企业的区别是什么？分类判断的要点有哪些？","a":"根据CAS 40（合营安排），合营安排分为共同经营和合营企业。联营企业则按CAS 2的定义——投资方能够对被投资方施加重大影响但不能控制或共同控制。\n\n核心区别：\n- 合营企业：投资方与其他合营方共同控制该主体，对该主体的净资产享有权利。必须存在集体控制+一致同意机制。\n- 共同经营：各参与方对合营安排的资产享有权利、对负债承担义务（不形成独立主体时尤其常见）。\n- 联营企业：仅具有重大影响（通常持股20%-50%，或通过派董事等方式具有参与决策权但无控制）。\n\n判断要点：（1）是共同控制还是重大影响？关键看否决权的存在；（2）如为共同控制，是共同经营还是合营企业？关键看权利对应的是净资产还是特定资产负债。\n\n实务建议：持股比例只是初步信号，最终判断要结合公司章程、股东协议、董事会构成等实质因素。","cat":"长期股权投资","kw":"长期股权投资,CAS 2,权益法,成本法,重大影响,CAS 40,合营,联营,控制,共同控制","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第2号——长期股权投资、企业会计准则第40号——合营安排"},{"id":"3394","q":"长期股权投资减值测试中，可收回金额如何确定？","a":"根据CAS 8（资产减值），长期股权投资的可收回金额为公允价值减去处置费用后的净额与预计未来现金流量现值两者中的较高者。\n\n公允价值减去处置费用：优先使用市场法（可比公司、可比交易），其次是收益法估值。\n\n预计未来现金流量现值（使用价值）的计算要点：（1）现金流量预测基于管理层批准的最长5年期的最近财务预算；（2）超过5年的采用递减或稳定的增长率（不超过长期平均增长率）；（3）折现率采用税前折现率，反映当前市场货币时间价值和资产特定风险的评估。\n\n实务常见问题：（1）预测期过长导致减值测试流于形式；（2）折现率选择偏低，导致即使被投资方持续亏损也能通过减值测试；（3）忽略控制权溢价或少数股权折价对公允价值的影响。\n\n特别重要：长投减值一旦计提，不可在以后期间转回。","cat":"长期股权投资","kw":"长期股权投资,CAS 2,权益法,成本法,重大影响,CAS 8,减值测试,公允价值,控制","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第2号——长期股权投资、企业会计准则第8号——资产减值"},{"id":"3393","q":"长期股权投资核算方法转换（金融资产→权益法→成本法）如何进行会计处理？","a":"长期股权投资核算方法转换的基本规则：\n\n1. 金融资产→权益法（如5%→20%）：原金融资产公允价值加新增投资成本之和作为初始投资成本。原计入其他综合收益的累计公允价变动转入投资收益。\n\n2. 权益法→成本法（如20%→60%，分步交易实现企业合并）：见前述'分步交易'的解答——原权益法下账面价值按购买日公允价值重新计量，差额计入投资收益。\n\n3. 成本法→权益法（如60%→20%，处置子公司丧失控制权）：剩余股权按处置日公允价值重新计量，差额计入投资收益。\n\n4. 金融资产→成本法（直接一次取得控制权）：合并成本按支付对价公允价计量。\n\n关键要点：所有跨类别转换都涉及公允价值的重新计量，这是理解长投核算方法转换的核心。","cat":"长期股权投资","kw":"长期股权投资,CAS 2,权益法,成本法,重大影响,其他综合收益,公允价值,账面价值,投资收益,合并,子公司,控制","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"CY0292","q":"处置⼦公司股权资本公积","a":"母公司（甲）将⼀个⼦公司（⼄）的股权零对价转移给另⼀⼦公司（丙），属于以⼄的股权对丙进⾏资本性投⼊的交易，不能减少甲⾃⾝的资本公积，应将对⼄的长期股权投资成本转⼊对丙的长期股权投资成本。会计分录为： 借：长期股权投资——丙，贷：长期股权投资——⼄。 因此，在这个交易中，不存在“之前母公司形成的资本公积要转⼊投资收益吗”这⼀问题。个人理解，供参考。","cat":"长期股权投资","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3391","q":"永续债作为发行方，应分类为金融负债还是权益工具？","a":"根据CAS 37（金融工具列报），永续债（含可续期公司债、永续中票）的分类关键看是否满足'权益工具'的两个条件：（1）不存在向其他方交付现金或其他金融资产的合同义务；（2）不存在在潜在不利条件下与对手方交换金融资产或负债的合同义务。\n\n核心判断点：是否有付息义务？利率跳升机制是否形成经济上的强制付息？是否有赎回义务？投资人是否有回售权？发行人是否有必须赎回的义务？是否有清算优先权？是否有或有结算条款？\n\n实务中，大多数永续债被分类为金融负债，因为利率跳升机制使得发行人在经济实质上被迫赎回/付息。只有真正'永续''无任何潜在付息赎回义务'的永续债才能分类为权益工具。\n\n注意：永续债会计分类与税法上的税前扣除属性是两个独立问题，不可混淆。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,CAS 37","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"3390","q":"什么是'业务模式测试'和'SPPI测试'？两者关系如何？","a":"CAS 22对金融资产的分类要求双重测试：\n\n业务模式测试（宏观）：评估企业管理金融资产的方式——是仅仅收取合同现金流量（AC模式）、还是既收取合同现金流量又出售（FVOCI模式）、还是其他（FVTPL模式）。评估以组合层面进行，管理层意图很关键。\n\nSPPI测试（微观）：判断合同现金流量是否'仅为本金和利息的支付'。本金是初始确认时的公允价值，利息包括资金时间价值、信用风险、其他基本借贷风险以及合理利润率。\n\n两者关系：先做SPPI测试——不过则直接FVTPL；通过SPPI测试的，再根据业务模式分为AC或FVOCI。注意，SPPI测试中'利息'不包括权益风险回报，所以纯股权工具（如普通股）不能通过SPPI测试。\n\n实务中非标债务工具（如含减记条款的银行二级资本债、永续债）的SPPI测试非常考验专业判断。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"3389","q":"以公允价值计量的金融资产，如何确定公允价值层级（第一/二/三层级）？","a":"根据CAS 39，公允价值计量分为三个层级，按输入值的最低层级确定：\n\n第一层级：相同资产在活跃市场上未经调整的报价（如上市公司股票收盘价）。\n\n第二层级：除第一层级外的可观察输入值，包括：（1）类似资产在活跃市场的报价；（2）相同或类似资产在非活跃市场的报价；（3）除报价外的可观察输入值（如利率、收益率曲线）；（4）通过市场证实的输入值。\n\n第三层级：不可观察输入值（如私募股权、非上市期权），需要使用估值技术并依赖不可观察的参数。\n\n层级判断的影响：第三层级资产的公允价值变动需在附注中单独披露其估值技术和输入值的敏感性分析；层级之间的转移需按准则要求披露。\n\n实务中，大量非上市公司股权投资、结构化理财产品属于第三层级，估值的可靠性是审计重点。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,CAS 39,审计,上市公司,期权","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报、企业会计准则第39号——公允价值计量"},{"id":"3388","q":"结构性存款和理财产品的分类与计量是怎样的？","a":"结构性存款和理财产品属于混合合同或金融资产。根据CAS 22，首先应根据合同现金流量特征（SPPI测试）和业务模式进行分类：\n\n（1）保本型结构性存款：如果合同现金流量仅为对本金和利息的支付（通过SPPI测试），且业务模式为收取合同现金流，可分类为以摊余成本计量（类似定期存款）。\n\n（2）非保本理财/衍生性质的结构性存款：未通过SPPI测试的，必须按公允价值计量且变动计入当期损益（FVTPL）。\n\n实务重要提醒：（1）不能以'理财'两个字的表面名称来判断，必须穿透分析底层资产和合同条款；（2）非保本理财产品产生的损益计入公允价值变动收益而非投资收益——个别企业计入投资收益以规避监管指标是不可取的；（3）在附注中应单独披露结构性存款和理财产品的主要条款和风险。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,投资收益,监管","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"3387","q":"预期信用损失（ECL）模型下，应收账款坏账准备如何计算？","a":"根据CAS 22第四十七条，企业应采用预期信用损失模型对应收账款计提坏账准备。简化方法（常用于应收账款）：按整个存续期预期信用损失计提。\n\n实操三步法：（1）分组——按逾期账龄划分组合（如未逾期、逾期1-30天、31-90天、91-180天、181天-1年、1年以上）；（2）确定各组的预期损失率——基于历史实际损失数据，并考虑前瞻性调整（经济环境变化等）；（3）计算坏账金额 = 各组应收账款余额 × 对应预期损失率。\n\n关键差异：旧准则的已发生损失模型是根据已发生的客观证据计提，新准则的预期信用损失模型是前瞻性的，即使尚未出现减值迹象，也需要根据预期计提。企业应建立并持续更新历史损失数据库，不能随意确定损失率。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,预期信用损失,坏账,信用损失,ECL","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"3386","q":"PPP/BOT项目收入如何分别确认建造服务和运营服务收入？","a":"PPP/BOT项目（含BOT、TOT、ROT等变体）的会计处理是基础设施领域的常见难题。根据解释第2号和CAS 14：\n\n建造阶段的收入确认：（1）金融资产模式——政府提供无条件付款承诺，按公允价值确认长期应收款，同时按建造服务的履约进度确认建造收入；（2）无形资产模式——企业获得收费权，按建造服务的履约进度确认建造收入，同时确认无形资产；（3）混合模式——部分金融资产+部分无形资产。\n\n运营阶段的收入确认：按照运营服务的履约义务确认收入。\n\n实务关键点：（1）正确识别特许经营权的性质是整个会计处理的基础；（2）建造期间的预计总成本需包含可预见的运营期间大修费用；（3）折现率的选择对金融资产和无形资产价值影响显著，需要合理确定。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14,PPP,BOT,公允价值","src":"财政部 企业会计准则解释公告","std_ref":"企业会计准则第14号——收入"},{"id":"3385","q":"附带退货权的销售收入如何确认？退货率如何估计？","a":"根据CAS 14第三十二条，对于附有销售退回条款的销售，企业应当在客户取得相关商品控制权时，按照预期有权收取的对价金额确认收入（即预期不会退回的部分）。预期退回部分确认为'预计负债——应付退货款'，同时按照账面价值减去收回费用后的余额确认'应收退货成本'。\n\n退货率的估计方法：（1）基于历史退货数据（最常用）；（2）同行业可比数据；（3）统计模型（如大量同质化交易）。每一资产负债表日应重新评估退货率并调整。\n\n实务中的难点：新产品、新市场缺乏历史数据时的估计；季节性波动大的行业的处理；以及退货率估计变更属于会计估计变更，应按照CAS 28处理，不能追溯调整。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14,CAS 28,账面价值,预计负债,会计估计,追溯调整,控制,追溯","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第14号——收入、企业会计准则第28号——会计政策、会计估计变更和差错更正"},{"id":"3384","q":"总额法和净额法的判断（主要责任人vs代理人）有哪些核心指标？","a":"根据CAS 14第三十四条，企业应当根据其在向客户转让商品前是否拥有对该商品的控制权，来判断是主要责任人还是代理人。\n\n主要责任人（总额法确认收入）的迹象：（1）承担向客户转让商品的主要责任；（2）在转让商品前承担存货风险；（3）有权自主决定交易价格；（4）承担客户信用风险。\n\n代理人（净额法确认收入）的迹象：不承担上述责任和风险，按约定收取佣金或手续费。\n\n实务中最常见的问题是：电商平台、代理商、贸易商的身份判断。必须基于实质而不是法律形式来判断。如果企业在把商品交付给客户之前已经取得了对商品的实质性控制（如承担存货风险、价格决定权），就应该用总额法，反之净额法。\n\n特别提示：总额法和净额法对营业收入规模影响巨大，监管部门对此高度关注。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14,监管,控制","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第14号——收入"},{"id":"3383","q":"合同变更有哪几种类型？各自的会计处理有什么区别？","a":"CAS 14第八条将合同变更分为三种情形：\n\n类型一（新增可明确区分+单独售价）：作为新合同单独处理。例如在原建筑工程合同基础上新增一栋楼的施工且价格公允。\n\n类型二（新增不可明确区分或售价不单独）：将原合同未履约部分与变更部分合并作为新合同，按变更日重新计算履约进度。\n\n类型三（两者兼有）：实际上实务中常见的混合情形，需要综合判断。\n\n合同变更处理的关键在于判断新增的商品或服务是否与原合同已履约部分可明确区分，以及定价是否反映其单独售价。这是新收入准则相比旧准则变化最大的部分之一。\n\n执业中应特别关注：施工合同、软件开发合同中的变更管理记录是否充分支持会计判断。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14,合并","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第14号——收入"},{"id":"CY0071","q":"通过持股平台进⾏集团股份⽀付的会计处理","a":"该事项相当于A的⼤股东代A、B承担了股份⽀付费⽤，所以A在个别报表和合并报表层⾯也需要就⼤股东代为承担全资⼦公司B的股份⽀付费⽤，确认对全资⼦公司B的长期股权投资和资本公积，即借记“长期股权投资——A”，贷记资本公积。在A的合并报表层⾯，A、B员⼯的股权激励费⽤均计⼊管理费⽤等成本费⽤项⽬。 提问⼈：青砖作尘 时间：2024-04-03 17:38:33 陈⽼师您好，补充请教个问题，单体报表上是根据员⼯劳动合同签署主体在母公司A或⼦公司B确认股份⽀付，还 是根据员⼯实际⼯作内容来确认呢？（例如由于社保公积⾦等因素导致员⼯在母公司签署劳动合同、发⼯资，实际在⼦公司履职） 回答⼈：chenyiwei 按实际⼯作内容，并不是与谁签订劳动合同。个人理解，供参考。","cat":"收入准则","kw":"合并","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3381","q":"处置子公司部分股权但仍保持控制权的，合并报表如何处理？","a":"母公司处置子公司部分股权但未丧失控制权，属于权益性交易。根据CAS 33第四十九条：\n\n个别报表：处置价款与处置部分长期股权投资账面价值差额计入投资收益。\n\n合并报表：处置价款与处置日按持股比例计算的子公司净资产份额的差额，调整资本公积（资本溢价不足冲减的，调整留存收益）。——注意，不是计入投资收益！\n\n这是因为控制权未变，合并报表层面视为与少数股东之间的权益交易，不确认损益。同样，购买少数股权也按此原则处理。这是合并报表中容易出错的知识点，务必区分控制权变与不变的差异。","cat":"合并报表","kw":"合并报表,CAS 33,抵销,少数股东,控制权,合并,子公司,控制,账面价值,投资收益,资本公积,留存收益,母公司","src":"深圳证券交易所 会计监管动态","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"3380","q":"少数股东权益为负数时如何处理？后续恢复如何操作？","a":"少数股东权益为负数的情形：子公司超额亏损导致净资产为负，按持股比例计算的少数股东权益相应为负。\n\n根据CAS 33及财政部解释：（1）如果少数股东有义务承担超额亏损（如投资协议约定），应将超额亏损分摊给少数股东，形成'少数股东权益'的借方余额；（2）如果少数股东没有义务承担超额亏损，超额亏损全部由母公司承担，少数股东权益以零为限。\n\n后续子公司扭亏为盈时：应先以利润弥补母公司此前承担的超额亏损部分，再恢复少数股东权益的账面余额。实务中建议在附注中清晰披露少数股东权益为负的原因以及恢复机制，避免报表使用者误解。","cat":"合并报表","kw":"合并报表,CAS 33,抵销,少数股东,控制权,子公司,母公司","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"3379","q":"结构化主体（SPV/信托计划/资管计划）何时应纳入合并报表范围？","a":"结构化主体纳入合并范围的判断依据是CAS 33中的'控制'三要素：（1）拥有对被投资方的权力；（2）通过参与被投资方活动享有可变回报；（3）有能力运用权力影响回报金额。\n\n对于结构化主体（如资产支持专项计划、信托计划、有限合伙基金），实务判断重点：\n- 谁是该主体的主要责任人（发起人、管理人还是投资者）？\n- 决策权的实质范围有多大（是否有实质性罢免权）？\n- 可变回报的量级是否足够大（通常参考20%以上为重要）？\n- 是否存在代理人/委托人的判断问题？\n\n关键：不能仅以持股比例或表决权比例作为判断依据。结构化主体的合并判断需要综合分析权力、回报及其关联关系。这是监管检查的高频问题，必须留存完整的判断底稿。","cat":"合并报表","kw":"合并报表,CAS 33,抵销,少数股东,控制权,合并,监管,控制","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"3378","q":"母公司对子公司长期股权投资成本法和合并报表中的调整逻辑是怎样的？","a":"根据CAS 2，母公司个别报表中对子公司长期股权投资采用成本法核算。但在合并报表中，需要按权益法进行调整，这是两个层次的不同处理：\n\n个别报表（成本法）：只确认实际收到的现金股利作为投资收益，不确认子公司留存收益变动。\n\n合并报表调整步骤：（1）将成本法调整为权益法——按持股比例确认子公司当年净损益份额和其他综合收益份额；（2）抵销母公司长期股权投资和子公司所有者权益；（3）确认少数股东权益和少数股东损益。\n\n实务中注意：成本法转权益法的调整必须完整，包括子公司实现净利润、分配股利、其他综合收益变动、其他权益变动等所有影响子公司净资产变动的因素。许多企业的合并附表中调整不完整，导致少数股东权益计算错误。","cat":"合并报表","kw":"合并报表,CAS 33,抵销,少数股东,控制权,CAS 2,其他综合收益,合并,子公司,母公司,投资收益,留存收益,股利","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第33号——合并财务报表、企业会计准则第2号——长期股权投资"},{"id":"3377","q":"连续编制合并报表时，以前年度内部交易如何持续抵销？","a":"连续编制合并报表时的内部交易抵销需要区分交易类型：\n\n一、存货内部交易：以前年度未实现利润在本期实现时，应做调整分录——借记'年初未分配利润'，贷记'营业成本'。同时抵销本期新发生的内部交易。\n\n二、固定资产内部交易：内部交易的固定资产在处置前，逐年抵销折旧中对应的未实现内部交易损益。处置当年，将剩余未实现损益转入资产处置收益。\n\n三、债权债务：应收账款和应付账款每期都需抵销，信用减值损失也需要抵销（以及递延所得税）。\n\n关键原则：合并报表的连续编制不是简单的重复抵销，而是要正确处理以前年度未实现损益的跨期转回。这是合并报表实务中出错率最高的环节之一。","cat":"合并报表","kw":"合并报表,CAS 33,抵销,少数股东,控制权,信用减值损失,合并,折旧,所得税,未分配利润","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第33号——合并财务报表、企业会计准则第18号——所得税、企业会计准则第22号——金融工具确认和计量"},{"id":"3376","q":"企业合并涉及或有对价的，如何进行初始确认和后续计量？","a":"根据CAS 20第十一条，购买方应当将合并协议中约定的或有对价按其购买日的公允价值计入合并成本。后续计量根据其分类不同处理：\n\n（1）分类为金融资产的：按CAS 22以公允价值计量，变动计入当期损益或其他综合收益；\n（2）分类为权益工具的：无需重新计量，后续结算在权益内部结转；\n（3）属于职工薪酬的：按CAS 9处理。\n\n实务中常见误区：将业绩补偿承诺（Earn-out）在购买日不确认，等到实际支付时才确认合并成本调整——这是错误的！必须在购买日按公允价值充分估计并确认。后续计量中，即使是对赌条件未达成也不必调减合并成本（除非属于计量期间调整）。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,CAS 22,CAS 9,其他综合收益,Earn-out,合并,公允价值,业绩补偿,对赌,职工薪酬","src":"深圳证券交易所 会计监管动态","std_ref":"企业会计准则第20号——企业合并、企业会计准则第22号——金融工具确认和计量、企业会计准则第9号——职工薪酬"},{"id":"3375","q":"商誉为负值（廉价购买）时如何进行会计处理和披露？","a":"商誉为负值即合并成本小于可辨认净资产公允价值份额的情况。根据CAS 20第十三条，购买方应当首先对被购买方可辨认资产、负债及或有负债的公允价值重新评估；重新评估后仍为负值的，确认为当期损益（营业外收入）。\n\n实务要点：（1）必须执行重新评估程序，不能直接确认收益——这是准则的硬性规定；（2）在附注中披露廉价购买的原因、重新评估的具体情况、确认的收益金额；（3）不应为了规避负商誉而人为提高可辨认净资产公允价值或压缩合并成本。监管机构对廉价购买的关注度很高，务必留存充分的审计证据。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,商誉,公允价值,营业外收入,审计,监管,合并","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第20号——企业合并"},{"id":"3374","q":"反向购买中合并成本的确定和合并报表编制要点有哪些？","a":"反向购买是CAS 20中较为复杂的情形。根据准则，法律上的子公司（实质上的购买方）通过发行权益证券换取法律上母公司的控制权。\n\n合并成本：应按照法律上的子公司（会计购买方）为获取法律上母公司的控制权而向法律上母公司的原股东发行的权益性证券的公允价值来确定。\n\n合并报表编制要点：（1）合并报表以法律上子公司的名义出具，但实际反映法律上母公司的财务信息；（2）法律上母公司的资产和负债按合并时的公允价值并入；（3）商誉计算以虚拟发行股份的公允价值减去被购买方可辨认净资产公允价值份额；（4）合并报表的权益结构反映的是法律上母公司的权益结构。\n\n实务中反向购买常见于借壳上市场景，必须严格按照准则规定处理，不得随意简化。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,合并,反向购买,公允价值,子公司,母公司,控制,借壳上市,商誉","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第20号——企业合并"},{"id":"3373","q":"企业合并中购买日的确定依据是什么？实务中如何把握？","a":"根据CAS 20第十条，购买日是购买方获得对被购买方控制权的日期。控制权转移的标志包括：（1）合并协议已获股东大会通过；（2）已办理必要的财产权交接手续；（3）购买方已支付合并价款的大部分并有权控制被购买方；（4）购买方实际上已控制被购买方的财务和经营政策并享有利益和承担风险。\n\n实务中常见问题：工商变更是否完成不是必要条件——实质控制权转移时即可确定为购买日。但也需要审慎判断，不能仅凭一纸协议就认定控制权转移。尤其是涉及审批机关的行业（如金融、能源），审批是控制权转移的必要前置条件。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,合并,控制","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第20号——企业合并"},{"id":"3372","q":"什么是'一揽子交易'？合并报表如何处理？","a":"'一揽子交易'是指多次交易虽然形式上是分步实施的，但从整体商业目的、定价机制、交易条件等方面来看，各次交易之间是互为前提、互相依存的，应当作为一个整体交易来处理。\n\n根据CAS 33应用指南，判断一揽子交易的参考因素包括：（1）各项交易是否同时签订或在彼此影响下签订；（2）各项交易是否构成一个整体才能达到商业目的；（3）前次交易是否依赖于后次交易的发生；（4）交易价格是否考虑了后续交易的影响。\n\n合并报表处理：若属于一揽子交易，母公司应将所有步骤作为一项企业合并处理，购买日应从取得控制权之日起确定，多次支付的对价应合计作为合并成本。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,CAS 33,合并,一揽子交易,母公司,控制","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第20号——企业合并、企业会计准则第33号——合并财务报表"},{"id":"3371","q":"分步交易实现企业合并，购买日之前持有的股权如何进行会计处理？","a":"根据CAS 20第四十七条，分步交易实现企业合并的，购买方在购买日对之前持有的被购买方权益，应按购买日公允价值重新计量，公允价值和账面价值的差额计入当期投资收益。\n\n实务要点：（1）此前作为金融资产核算的，先将其他综合收益转入投资收益，再按购买日公允价值重新计量；（2）此前作为长期股权投资权益法核算的，处置前先将其他综合收益按处置比例结转，再重新计量。\n\n但要注意，如果分步交易属于'一揽子交易'，则应按CAS 33的规定整体作为一项交易处理，不能分步确认损益。是否属于一揽子交易，应综合考量合同条款、定价逻辑、商业目的等因素综合判断。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,CAS 33,其他综合收益,合并,公允价值,账面价值,投资收益,一揽子交易","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第20号——企业合并、企业会计准则第33号——合并财务报表、企业会计准则第2号——长期股权投资"},{"id":"3370","q":"前期差错更正的追溯重述法如何操作？","a":"根据CAS28（会计政策、会计估计变更和差错更正准则），对于重要的前期差错，应采用追溯重述法进行更正。\n\n操作步骤：\n\n第一，确定前期差错的影响金额及影响的科目。对差错进行全面分析，确定影响期间和受影响科目。\n\n第二，调整发现当期（列报前期）最早期的期初留存收益。在调账分录中涉及损益项目的，使用\"以前年度损益调整\"科目过渡，最终转入留存收益。\n\n第三，重述比较数据。如果差错发生在上一报告期，应重述比较期间（上年同期）的财务报表数据。如果差错发生在更早期，比较数据可能也需要调整。\n\n第四，附注披露：应披露前期差错的性质、受影响的项目名称和更正金额、无法追溯重述的原因等。\n\n实务中常见难点：如果差错涉及多年累积，需要逐年计算并调整；如果前期数据不完整或无法获取，至少应尽可能更正可追溯的期间，并披露原因；税务影响：更正差错可能导致需要重新申报以前年度的所得税。","cat":"会计政策/估计变更","kw":"会计政策变更,会计估计变更,CAS 28,追溯调整,未来适用法,前期差错,追溯,留存收益,会计估计,会计政策,所得税","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第28号——会计政策、会计估计变更和差错更正"},{"id":"3369","q":"资产负债表日后调整事项和非调整事项的区别是什么？","a":"根据CAS29（资产负债表日后事项准则）：\n\n调整事项：对资产负债表日已经存在的情况提供了新的或进一步证据的事项。\n- 典型例子：日后期间收回一笔已被作为坏账核销的应收款项（证明资产负债表日该项应收款的可收回性判断有误）；\n- 诉讼案件在日后期间结案，证实资产负债表日存在现时义务且金额可以确定；\n- 日后期间发现财务报表存在重大错报。\n\n非调整事项：表明资产负债表日后发生的情况的事项。\n- 典型例子：日后期间发生重大火灾导致存货毁损（火灾发生在资产负债表日之后）；\n- 日后期间发行股票或债券；\n- 日后期间发生企业合并或处置子公司。\n\n处理上的区别：\n- 调整事项 → 调整财务报表相关数据；\n- 非调整事项 → 不调整报表，但性质重大的应在附注中披露事项的性质、内容及对财务状况和经营成果的影响估计。\n\n实务中关键判断点：导致该事项的根本原因在资产负债表日是否已经存在。个人理解，供参考。","cat":"资产负债表日后事项","kw":"期后事项,CAS 29,调整事项,非调整事项,合并,子公司,坏账","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第29号——资产负债表日后事项"},{"id":"3368","q":"现金流量表的编制方法和直接法间接法的区别？","a":"根据CAS31（现金流量表准则），企业应当采用直接法列报经营活动现金流量。同时，附注中应提供将净利润调节为经营活动现金流量的信息（间接法）。\n\n直接法：直接列示经营活动现金流入和流出的主要类别。\n- 销售商品提供劳务收到的现金\n- 收到的税费返还\n- 购买商品接受劳务支付的现金\n- 支付给职工及为职工支付的现金\n- 支付的各项税费等\n\n间接法：从净利润出发，通过调整不涉及现金的项目及经营性应收应付项目变动，倒算出经营活动净现金流量。\n- 调整项包括：资产减值准备、折旧摊销、处置资产损益、公允价值变动、财务费用、存货增减、经营性应收应付增减等。\n\n实务中，直接法的各项目数据需从会计分录中系统性地提取，不能简单通过资产负债表的期初期末差推算。建议设置现金流量辅助核算项目或使用现金流量表编制软件提高效率和准确性。","cat":"现金流量表","kw":"现金流量表,CAS 31,经营活动,投资活动,筹资活动,公允价值,摊销,折旧","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第31号——现金流量表"},{"id":"CY0671","q":"新⾦融⼯具准则下，担保⼈是否应将原预计负债调整为应计负债？","a":"是。法院判决担保⼈承担担保责任后（且担保⼈确认），则担保⽅应将原预计负债调整为应计负债。这与是否执⾏新⾦融⼯具准则⽆关。个人理解，供参考。","cat":"或有事项","kw":"预计负债","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0675","q":"关于员⼯离职补偿管理费⽤⼆级科⽬设置。","a":"如果确定在会计上属于辞退福利的，则在主帖所述的费⽤明细分类下，建议并⼊“管理费⽤”下的“职⼯薪酬”明细。个人理解，供参考。","cat":"职工薪酬","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3365","q":"会计政策变更和会计估计变更怎么区分？追溯调整的适用条件？","a":"会计政策变更（CAS28）：指企业对相同的交易或事项由原来采用的会计政策改用另一会计政策。例如：存货发出计价由先进先出法改为加权平均法。\n\n会计估计变更：指由于资产和负债的当前状况及预期未来经济利益和义务发生了变化，从而对资产或负债的账面价值或资产的定期消耗金额进行的调整。例如：固定资产折旧年限由10年改为8年。\n\n核心区别：政策变更是「选择」的改变（有多个准则允许的方法可选）；估计变更是「判断」的改变（基于情况变化的重新评估）。\n\n追溯调整法适用于会计政策变更（除非无法合理确定累积影响数），将变更累积影响数调整列报前期最早期初留存收益，比较报表也按新政策重述。\n\n未来适用法适用于会计估计变更，变更影响在当期及未来期间确认，不调整比较数据。\n\n如果确实无法区分是政策变更还是估计变更，应作为会计估计变更处理（未来适用法）。","cat":"会计政策/估计变更","kw":"会计政策变更,会计估计变更,CAS 28,追溯调整,未来适用法,会计估计,会计政策,追溯,账面价值,留存收益,折旧,比较报表","src":"财政部 企业会计准则解释公告","std_ref":"企业会计准则第28号——会计政策、会计估计变更和差错更正"},{"id":"3364","q":"非货币性资产交换是否具有商业实质的判断标准？","a":"根据CAS7（非货币性资产交换准则），商业实质的判断基于以下两个条件：\n\n条件一：换入资产的未来现金流量在风险、时间分布或金额方面与换出资产显著不同。例如用存货换入固定资产，两者的现金流量模式显然不同，具有商业实质。\n\n条件二：换入资产与换出资产的预计未来现金流量现值不同，且差额与换出资产的公允价值相比是重大的。需要通过折现计算来定量判断。\n\n具有商业实质的交换：以公允价值为基础计量换入资产成本，差额确认损益。\n\n不具有商业实质的交换：以换出资产的账面价值为基础计量换入资产成本，不确认损益。\n\n实务中需要特别注意关联方之间的非货币性资产交换——这类交易可能存在利润操纵的动机，应审慎判断商业实质并充分披露。","cat":"非货币性资产交换","kw":"非货币性资产交换,CAS 7,商业实质,公允价值,账面价值,关联方","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第7号——非货币性资产交换"},{"id":"3363","q":"持有待售非流动资产的确认条件和计量规则？","a":"根据CAS42（持有待售非流动资产、处置组和终止经营准则），确认持有待售需同时满足以下条件：\n\n（1）在当前状况下可立即出售：资产已经处于可出售状态，不需要进行重大整治清理工作。\n（2）出售极可能发生：企业已经就一项出售计划作出决议（董事会或类似机构），且已获得确定的购买承诺（签订了具有法律约束力的出售协议）。通常预计在一年内完成出售。\n\n计量规则：\n持有待售的非流动资产按「账面价值与公允价值减去出售费用后的净额孰低」计量。如果账面价值高于（公允价值-出售费用），差额确认为资产减值损失。\n\n停止计提折旧或摊销。\n\n如果分类为持有待售后，公允价值减去出售费用后的净额增加的，原确认的减值损失可以转回（商誉除外），但转回金额不得超过原确认的减值损失。\n\n特别注意：如果一年内未完成出售，需评估是否继续满足持有待售条件；如不再满足，应转回正常资产列报。个人理解，供参考。","cat":"持有待售","kw":"持有待售,CAS 42,处置组,终止经营,停止折旧,资产减值损失,公允价值,账面价值,摊销,折旧,商誉","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第42号——持有待售的非流动资产、处置组和终止经营"},{"id":"3362","q":"公允价值的三个层次如何划分？什么是第三层次公允价值？","a":"根据CAS39（公允价值计量准则），公允价值输入值分为三个层次：\n\n第一层次：相同资产或负债在活跃市场上的未经调整的报价。如上市股票收盘价。最可靠，优先使用。\n\n第二层次：除第一层次外可直接或间接观察到的输入值。包括：活跃市场中类似资产或负债的报价；非活跃市场中相同或类似资产或负债的报价；除报价外可观察的输入值（如利率收益率曲线、隐含波动率）；市场验证的输入值。\n\n第三层次：不可观察的输入值。仅在相关可观察输入值无法获得时使用。典型场景：未上市股权投资（没有市场报价，也没有类似可比公司）；客户关系、自创专利等无形资产；缺乏流动性的结构化产品。\n\n第三层次公允价值需要自行开发估值模型并使用大量不可观察的参数，因此需要在附注中详细披露估值技术、关键假设、敏感性分析等信息。审计时应重点核查模型合理性和参数的客观性。","cat":"公允价值计量","kw":"公允价值,CAS 39,估值技术,输入值,市场法,审计","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第39号——公允价值计量"},{"id":"3361","q":"债务重组中债权人和债务人的会计处理要点？","a":"根据CAS12（债务重组准则），2019年修订后债务重组的定义扩大到「不改变交易对手方」的情形，核心变化如下：\n\n债权人角度：\n（1）受让金融资产以外的资产：按放弃债权的公允价值作为受让资产的初始成本。放弃债权公允价值与账面价值的差额计入当期损益。\n（2）受让金融资产：按公允价值初始确认，公允价值与放弃债权账面价值的差额计入投资收益。\n（3）转为权益工具（债转股）：取得的权益工具按公允价值初始计量，差额计入投资收益。\n\n债务人角度：\n（1）以资产清偿债务：所清偿债务账面价值与转让资产账面价值的差额计入当期损益（其他收益-债务重组收益）。\n（2）转为权益工具（债转股）：所清偿债务账面价值与权益工具公允价值的差额计入当期损益。\n\n特别注意：新准则下不再使用「营业外收入/支出」科目，改为「其他收益」或「投资收益」。","cat":"债务重组","kw":"债务重组,CAS 12,债转股,公允价值,重组损益,账面价值,投资收益,营业外收入,其他收益","src":"财政部 企业会计准则解释公告","std_ref":"企业会计准则第12号——债务重组"},{"id":"3360","q":"关联方的认定标准和范围是什么？","a":"CAS36（关联方披露准则）从控制、共同控制、重大影响三个维度定义关联方。\n\n构成关联方的主要情形：\n（1）该企业的母公司、子公司、与该企业受同一母公司控制的其他企业；\n（2）对该企业实施共同控制或重大影响的投资方；\n（3）该企业的合营企业和联营企业；\n（4）该企业的主要投资者个人及与其关系密切的家庭成员；\n（5）该企业的关键管理人员及与其关系密切的家庭成员；\n（6）上述（4）（5）中个人控制、共同控制或重大影响的其他企业。\n\n不构成关联方的情形：\n- 仅与企业发生日常交易关系的资金提供者、公用事业部门、政府部门和机构；\n- 仅与企业发生大量交易的经济依存关系的供应商、客户；\n- 共同控制合营企业的合营者之间（仅仅是共同投资关系，不单独构成关联方）。\n\n实务中需要建立完整的关联方清单，定期更新，并在财务报表附注中全面披露关联方关系和交易。","cat":"关联方披露","kw":"关联方披露,CAS 36,关联方,关联交易,披露,关键管理人员,子公司,母公司,控制,共同控制,重大影响,合营,联营","src":"深圳证券交易所 会计监管动态","std_ref":"企业会计准则第36号——关联方披露"},{"id":"3359","q":"企业亏损产生的可抵扣暂时性差异何时确认递延所得税资产？","a":"根据CAS18第十五条，企业对能够结转以后年度的可抵扣亏损和税款抵减，应以很可能获得用来抵扣的应纳税所得额为限，确认DTA。\n\n判断'很可能获得'需考虑的因素：\n\n（1）亏损原因：是暂时性因素（如一次性资产减值）还是结构性因素（如行业衰退）？暂时性原因更容易支持DTA确认。\n\n（2）未来盈利预测的可信度：是否有经批准的盈利预测？过往预测的准确性如何？\n\n（3）可抵扣亏损的到期年限：如果只有短短几年就过期，需要有更充分的盈利证据。目前企业所得税亏损弥补期一般为5年，高新技术企业和科技型中小企业为10年。\n\n（4）是否存在税务筹划机会：企业是否可以通过某些安排（如资产处置、业务重组）创造应纳税所得额？\n\n如果缺乏有力证据，应保守处理——不确认或部分确认DTA。实务中不少上市公司的DTA确认过于乐观，后来发生减记。审计时应严格求证盈利预测的合理性和可实现性。个人理解，供参考。","cat":"所得税","kw":"所得税,CAS 18,递延所得税,应纳税所得额,暂时性差异,递延所得税资产,审计,上市公司","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第18号——所得税"},{"id":"CY0086","q":"求助，公司回购⾃⼰公司股票，持有⽬的是⼀年后再出售，该如何进⾏会计处 理","a":"上市公司回购⾃⾝股份，不论是出于何种⽬的，均作为回购⾃⾝权益⼯具处理，按实际回购成本确认为库存股。持有期间，不确认其公允价值变动。后续再出售时，视为库存股重新对外发⾏，将重新出售所得款项净额与库存股成本之间的差额调整资本公积。个人理解，供参考。","cat":"所得税","kw":"公允价值","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3357","q":"股份支付中可行权条件和非可行权条件的区别？","a":"CAS11将股份支付的授予条件分为可行权条件和非可行权条件。\n\n可行权条件：\n- 服务条件：要求职工完成一段特定期间的服务（如三年内不得离职）；\n- 业绩条件：\n  * 市场条件：与权益工具市场价格相关（如股价涨幅超过指数20%），在估计授予日公允价值时即应考虑，后续不调整；\n  * 非市场条件：其他业绩指标（如净利润增长率≥15%），在估计授予日公允价值时暂不考虑，但在等待期每个资产负债表日根据最新可行权数估计调整确认金额。\n\n非可行权条件：\n- 不是获取权益工具的必要条件，而是其他要求（如规定职工必须自己出资购买一定股票）。\n- 在确定授予日公允价值时即予以考虑，后续不再调整。\n\n实务建议：在合同签署前仔细梳理各类条件的性质并分类记录，一旦分类错误将导致整个等待期的计量出错。个人理解，供参考。","cat":"股份支付","kw":"股份支付,CAS 11,权益结算,现金结算,等待期,公允价值","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第11号——股份支付"},{"id":"3356","q":"股份支付的权益结算和现金结算有什么区别？","a":"CAS11（股份支付准则）将股份支付分为两大类：\n\n权益结算的股份支付：\n- 最终以权益工具（自己公司的股票或股票期权）结算；\n- 授予日按公允价值计量，后续不再重新计量公允价值变动；\n- 借方：成本/费用，贷方：资本公积-其他资本公积；\n- 等待期内每一个资产负债表日确认的金额=预计可行权数量×授予日公允价值÷等待期×已过期间。\n\n现金结算的股份支付：\n- 最终以现金支付（如模拟股票、现金股票增值权）；\n- 在每一个资产负债表日和结算日按公允价值重新计量，变动计入当期损益；\n- 借方：成本/费用，贷方：应付职工薪酬（负债）；\n- 负债的公允价值变动计入公允价值变动损益。\n\n实务中关键区别点：看最终结算义务的内容——付股票还是付现金。有些安排看似付现金但金额按股价计算，仍是现金结算。","cat":"股份支付","kw":"股份支付,CAS 11,权益结算,现金结算,等待期,公允价值变动损益,公允价值,资本公积,期权,职工薪酬","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第11号——股份支付"},{"id":"3355","q":"政府补助的会计处理方法有哪些？如何判断采用哪种方法？","a":"根据CAS16（政府补助准则），政府补助分为与资产相关的政府补助和与收益相关的政府补助。\n\n与资产相关的政府补助（用于购建长期资产）：\n（1）总额法：确认为递延收益，在资产使用寿命内按合理、系统的方法分期计入损益；\n（2）净额法：直接冲减相关资产的账面价值，在报表附注中披露。\n\n与收益相关的政府补助（补偿已发生或未来期间的费用/损失）：\n（1）补偿已发生的费用或损失：直接计入当期损益或冲减成本；\n（2）补偿未来的费用或损失：确认为递延收益，在确认相关费用的期间计入损益。\n\n企业可选择总额法或净额法，但同一类政府补助应采用一致的方法。实务中大多数企业选择总额法，因为能更清晰地反映资产的原始价值和政府补助的财务影响。","cat":"政府补助","kw":"政府补助,CAS 16,递延收益,总额法,净额法,账面价值","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第16号——政府补助"},{"id":"3354","q":"资产组（CGU）的确定方法和实务考虑？","a":"根据CAS8，资产组是指企业可以认定的最小资产组合，其产生的现金流入应当基本上独立于其他资产或资产组产生的现金流入。\n\n实务中确定CGU的核心原则：\n\n第一，以「独立产生现金流入」为判断基石。如果一项资产或一条生产线的产品和销售渠道独立于其他资产，一般可单独作为CGU。\n\n第二，考虑管理层监控经营的方式。如果企业按业务线或区域管理业绩，CGU的划分通常与之保持一致。\n\n第三，如果几项资产必须一起使用才能产生独立的现金流入，应组合成一个CGU。例如一个工厂的生产线、配套仓库和环保设施通常构成一个CGU。\n\n第四，CGU的认定在后续期间一般保持一致，不能随意变更。如果资产组的构成发生变化（如处置了某条生产线），需在附注中披露变更原因。\n\n商誉减值测试时，CGU应当是能够从企业合并协同效应中受益的最小资产组组合。","cat":"资产减值","kw":"资产减值,CAS 8,可收回金额,减值测试,资产组,CGU,合并,商誉","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第8号——资产减值"},{"id":"3353","q":"资产减值迹象有哪些？出现减值迹象后该如何测试？","a":"根据CAS8（资产减值准则）第五条，企业应当在资产负债表日判断资产是否存在可能发生减值的迹象。\n\n外部迹象：\n（1）资产的市场价格在当期大幅下跌，跌幅明显高于时间推移或正常使用预期的下跌；\n（2）企业经营所处的经济、技术或法律环境以及资产所处的市场在当期或近期发生重大不利变化；\n（3）市场利率或其他市场投资回报率的提高影响企业计算资产可收回金额的折现率。\n\n内部迹象：\n（4）有证据表明资产已陈旧过时或实体已损坏；\n（5）资产已或将被闲置、终止使用或提前处置；\n（6）内部报告表明资产的经济绩效已低于或将低于预期。\n\n如果出现上述任何迹象，应估计该项资产的可收回金额。可收回金额=Max(公允价值-处置费用, 预计未来现金流现值)。\n\n需要注意：商誉和使用寿命不确定的无形资产无论是否有减值迹象，至少每年进行一次减值测试。","cat":"资产减值","kw":"资产减值,CAS 8,可收回金额,减值测试,资产组,公允价值,商誉","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第8号——资产减值"},{"id":"CY0166","q":"房地产开发企业预交⼟征税事项","a":"根据《增值税会计处理规定》（财会[2016]22号），企业应在“应交税费”科⽬下设置“预交增值税”明细科⽬，核算 ⼀般纳税⼈转让不动产、提供不动产经营租赁服务、提供建筑服务、采⽤预收款⽅式销售⾃⾏开发的房地产项⽬ 等，以及其他按现⾏增值税制度规定应预缴的增值税额。预缴增值税的账务处理为：企业预缴增值税时，借记“应交税费——预交增值税”科⽬，贷记“银⾏存款”科⽬。⽉末，企业应将“预交增值税”明细科⽬余额转⼊“未交增值 税”明细科⽬，借记“应交税费——未交增值税”科⽬，贷记“应交税费——预交增值税”科⽬。房地产开发企业等在 预缴增值税后，应直⾄纳税义务发⽣时⽅可从“应交税费——预交增值税”科⽬结转⾄“应交税费——未交增值税”科 ⽬。 理论上，对这类纳税义务已发⽣但尚未实际缴纳的预缴税费，应同时确认⼀项资产和负债，以完整反映税款缴纳义务。但⽬前实务中的常见做法是仅作账外备查登记，⽽不作该账务处理。个人理解，供参考。","cat":"租赁","kw":"租赁","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"3351","q":"新租赁准则下，承租人会计处理的核心变化是什么？对财务报表有什么影响？","a":"CAS21（新租赁准则）对承租人最大的改变是取消了融资租赁和经营租赁的分类，对几乎所有租赁都要求确认使用权资产和租赁负债。\n\n核心变化：\n（1）资产负债表：原经营租赁的表外资产和负债现在入表，对资产负债率有显著影响，尤其是零售、航空、物流等高租赁密度行业。\n（2）利润表：原经营租赁下直线法确认费用，新准则下前期费用较高（利息费用前大后小+使用权资产折旧），后期费用较低。\n（3）现金流量表：原经营租赁全部计入经营活动；新准则下偿还租赁负债本金部分计入筹资活动。\n\n两项简化处理（豁免）：（1）短期租赁（租赁期不超过12个月）；（2）低价值资产租赁（单项全新价值通常≤5,000美元）。\n\n折现率的确定是关键：优先使用租赁内含利率，通常不可取得时使用承租人增量借款利率。","cat":"租赁","kw":"租赁,CAS 21,使用权资产,租赁负债,折旧,经营租赁,融资租赁","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第21号——租赁"},{"id":"3350","q":"预期信用损失模型中'前瞻性信息'如何量化？","a":"根据CAS22，预期信用损失的计量应当反映通过评价一系列可能的结果而确定的无偏概率加权平均金额，以及货币时间价值。\n\n前瞻性信息的量化实务方法：\n\n第一，识别关键经济变量：GDP增长率、行业景气指数、M2增速、利率水平、失业率等。选择与客户信用风险最相关的指标。\n\n第二，设计至少三种情景：基准情景（最可能发生）、乐观情景、悲观情景。每种情景赋予发生概率。\n\n第三，将经济变量的预测值映射到违约概率或损失率的调整系数上。例如可以通过回归分析建立历史数据中经济变量与坏账率的关系模型。\n\n第四，计算加权预期损失率 = Σ(各情景损失率 × 发生概率)。\n\n实务中如果数据积累不足，也可采用简化调整：在历史损失率基础上加3-5个百分点的前瞻性调整因子，但需要在底稿中说明依据。不宜仅凭经验「拍板」。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,预期信用损失,信用损失,坏账","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"3349","q":"金融资产的三种分类（FVTPL、FVOCI、AC）如何判断？","a":"CAS22基于两个维度对金融资产进行分类：\n\n第一维度：企业管理金融资产的业务模式。\n- 收取合同现金流量为目标 → AC（摊余成本）或FVOCI（具体看第二维度）\n- 既收取合同现金流量又出售 → FVOCI\n- 其他业务模式（包括交易目的） → FVTPL\n\n第二维度：金融资产的合同现金流量特征（SPPI测试）。\n- 合同现金流量仅为对本金和未偿付本金的利息支付 → 通过SPPI测试，可能是AC或FVOCI\n- 不满足SPPI条件 → 强制分类为FVTPL\n\n实务判断流程：先看SPPI——不通过则直接FVTPL；通过SPPI再看业务模式。\n\n特殊选项：初始确认时如果可消除或显著减少会计错配，可将金融资产不可撤销地指定为FVTPL。权益工具投资可选择指定为FVOCI（不可撤销），但其股利仍计入损益。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,股利","src":"财政部会计司 企业会计准则应用指南","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"3348","q":"金融工具准则下，应收账款的预期信用损失（ECL）怎么计提？有没有比较简洁实用的方法？","a":"CAS22（金融工具准则）对应收账款采用预期信用损失模型，区别于原准则的已发生损失模型。\n\n实务中常用的简化方式是「迁徙率矩阵法」。操作步骤：\n\n（1）先按账龄分组（0-6月、6-12月、1-2年、2-3年、3年以上等）；\n（2）计算各账龄组的「迁徙率」，即从当前阶段「迁徙」到更差阶段的概率。取过往3-5年的历史数据；\n（3）根据迁徙率推导历史损失率，再结合前瞻性信息（如宏观经济走势、行业景气度等）进行调整；\n（4）对每一账龄组，用应收账款余额×该组的预期损失率=应计提的减值准备。\n\n对于金额重大的单项应收账款，宜单独评估其预期信用损失。前瞻性信息的调整不能走过场，建议在底稿中明确记录调整依据和数据来源。","cat":"金融工具","kw":"金融工具,CAS 22,公允价值,摊余成本,减值,预期信用损失,信用损失,ECL,迁徙率","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"3347","q":"并购产生的商誉如何进行减值测试？","a":"根据CAS8（资产减值准则），企业合并形成的商誉至少应当在每年年度终了进行减值测试。\n\n减值测试基本流程：\n第一，将商誉分配至相关的资产组或资产组组合（CGU），该资产组应当能够从企业合并的协同效应中受益。分配时以购买日公允价值为基础确定分摊比例。\n\n第二，计算资产组（含商誉）的可收回金额，取公允价值减去处置费用后的净额与预计未来现金流量现值两者中的较高者。\n\n第三，将可收回金额与资产组账面价值（含商誉）比较，如果可收回金额小于账面价值，差额确认为商誉减值损失。\n\n实务特别注意：（1）减值损失首先抵减商誉账面价值，超额部分再按比例分摊到资产组的其他资产；（2）商誉减值损失一经确认不得在以后期间转回；（3）需要关注折现率的选择、预测期增长率等关键参数，底稿中应有充分记录。","cat":"合并报表","kw":"合并报表,CAS 33,抵销,少数股东,控制权,CAS 8,并购,商誉,减值测试,公允价值,账面价值,合并,CGU,资产组","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第33号——合并财务报表、企业会计准则第8号——资产减值"},{"id":"3346","q":"合并报表中少数股东权益和少数股东损益的计算口径？","a":"根据CAS33，少数股东权益是指子公司的所有者权益中不属于母公司直接或间接享有的份额。\n\n计算要点：\n第一，少数股东权益 = 子公司净资产 × 少数股东持股比例。子公司净资产包括股本、资本公积、盈余公积、未分配利润、其他综合收益等。\n\n第二，少数股东损益 = 子公司当期净利润 × 少数股东持股比例。需要特别注意：如果母子公司之间有逆流内部交易未实现利润，应将未实现利润中归属于少数股东的部分从少数股东损益中转出。\n\n第三，合并抵销分录中少数股东权益的变动：当子公司分配股利、其他综合收益变动、追加投资导致持股比例变动时，少数股东权益也应相应调整。\n\n实务中建议在合并工作底稿中单独列一栏跟踪少数股东的权益变动轨迹，便于审计复核。个人理解，供参考。","cat":"合并报表","kw":"合并报表,CAS 33,抵销,少数股东,控制权,其他综合收益,合并,资本公积,审计,子公司,母公司,股利,未分配利润","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"3345","q":"合并报表中母子公司之间的内部交易抵消怎么做？尤其是涉及存货未实现利润的情况。","a":"合并报表内部交易抵消的基本原则在CAS33（合并财务报表准则）中有明确规定。实务操作的核心思路分三步走：\n\n第一步，抵消内部交易收入与成本。期末对母子公司之间发生的内部交易，先全额抵消营业收入和营业成本：借：营业收入，贷：营业成本。\n\n第二步，抵消期末存货中包含的未实现内部销售利润。即期末仍未对外出售的存货中，包含了内部交易的毛利部分，需要抵消：借：营业成本，贷：存货。\n\n第三步，如果之前期间也发生过同类内部交易，年初存货也可能包含上期未实现利润，需要做递延处理。\n\n实务中容易出错的地方：（1）未区分顺流交易和逆流交易——逆流交易还要分少数股东的那部分损益；（2）存货减值准备的连带影响——抵消了未实现利润后，对应的存货跌价准备也可能需要调整。","cat":"合并报表","kw":"合并报表,CAS 33,抵销,少数股东,控制权,合并,子公司","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"3344","q":"如何判断是否对被投资单位具有'重大影响'？","a":"根据CAS2第二条，重大影响是指投资方对被投资单位的财务和经营政策有参与决策的权力，但不能够控制或者与其他方一起共同控制这些政策的制定。\n\n实务判断标准（存在下列情形之一通常表明具有重大影响）：\n（1）在被投资单位的董事会或类似权力机构中派有代表；\n（2）参与被投资单位的财务和经营政策制定过程；\n（3）与被投资单位之间发生重要交易；\n（4）向被投资单位派出管理人员；\n（5）向被投资单位提供关键技术资料。\n\n持股比例通常是一个重要参考：直接或间接持有20%以上但低于50%的表决权，一般认为具有重大影响。但比例不是绝对的——如能证明无法参与决策，即使持股20%也可能不构成重大影响。","cat":"长期股权投资","kw":"长期股权投资,CAS 2,权益法,成本法,重大影响,控制,共同控制","src":"深圳证券交易所 会计监管动态","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"3343","q":"长期股权投资成本法和权益法的转换时点及会计处理？","a":"这是一个涉及CAS2和合并报表准则交织的问题。分三种场景：\n\n场景一：公允价值计量→权益法（如追加投资达到重大影响）。在转换日，原持有的股权投资按公允价值重新计量，公允价值与账面价值的差额计入当期损益或留存收益。\n\n场景二：权益法→成本法（如追加投资取得控制权，形成非同一控制下合并）。原持有的股权投资按购买日公允价值重新计量，差额计入投资收益。同时原计入其他综合收益的金额转入当期损益。\n\n场景三：成本法→权益法（如处置部分股权丧失控制权但仍具有重大影响）。剩余股权在丧失控制权日按公允价值重新计量，差额计入投资收益。之后按权益法进行后续计量并追溯调整。\n\n实务中需要特别注意转换日的确定——通常是实际交割日或完成工商变更登记日，要有充足的审计证据支持。个人理解，供参考。","cat":"长期股权投资","kw":"长期股权投资,CAS 2,权益法,成本法,重大影响,其他综合收益,公允价值,账面价值,投资收益,留存收益,审计,追溯调整,合并,控制,追溯","src":"中国注册会计师协会 专业技术指导","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"3342","q":"长期股权投资权益法下，被投资单位其他综合收益变动，投资方如何处理？","a":"根据CAS2（长期股权投资准则）第十二条：投资方在确认应享有被投资单位净损益的份额时，应当以取得投资时被投资单位各项可辨认资产等的公允价值为基础，对被投资单位的净利润进行调整后确认。\n\n对于被投资单位其他综合收益的变动，投资方应当按照应享有的份额，调整长期股权投资的账面价值，同时计入其他综合收益。\n\n具体分录为：借：长期股权投资-其他综合收益，贷：其他综合收益（或相反分录）。\n\n需要特别注意的是：（1）该其他综合收益在以后期间能否重分类进损益，取决于被投资单位对其的分类；（2）如果投资方处置了该项长期股权投资，原计入其他综合收益的金额应当转入投资收益。","cat":"长期股权投资","kw":"长期股权投资,CAS 2,权益法,成本法,重大影响,其他综合收益,公允价值,账面价值,投资收益","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"3341","q":"履约义务在一段时间内履行的三个条件怎么应用？","a":"CAS14第十一条规定，满足下列任一条件即属于在一段时间内履行履约义务，应按履约进度确认收入：\n\n条件一：客户在企业履约的同时即取得并消耗企业履约所带来的经济利益。典型场景：运输服务、保洁服务。\n\n条件二：客户能够控制企业履约过程中的在建商品。典型场景：在客户场地上建造资产。\n\n条件三：企业履约过程中所产出的商品具有不可替代用途，且企业在整个合同期间内有权就累计至今已完成的履约部分收取款项。这是一个联合条件，两个子条件必须同时满足。\n\n三个条件都不满足的，属于在某一时点履行履约义务，商品控制权转移给客户时一次性确认收入。实务中定制化设备制造适用条件三的场景较多，但「不可替代」和「有权收款」都需要充分证据支撑。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14,控制","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第14号——收入"},{"id":"3340","q":"附有质量保证条款的销售如何区分保证型质保和服务型质保？","a":"根据CAS14第三十三条，需要判断质保是否向客户提供了一项「额外服务」。\n\n第一，保证型质保：为向客户保证所销售的商品符合既定标准而提供的质保，属于一项保证，仍按原收入准则处理——确认预计负债。该质保不会产生单独的履约义务。\n\n第二，服务型质保：向客户提供除商品质量保证之外的额外服务（如延长保修、定期维护），构成单项履约义务。收入应在质保服务期间内分摊确认。\n\n判断实务要点：（1）质保是否为法定要求——法定质保通常是保证型；（2）客户是否可以单独购买该质保——如果可以，是服务型的强信号；（3）质保期限是否明显长于行业惯例。\n\n个人理解，供参考。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14,预计负债","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第14号——收入"},{"id":"3339","q":"主要责任人和代理人的判断标准是什么？对收入确认有什么影响？","a":"根据CAS14第三十四条，企业在向客户转让商品前是否拥有对该商品的控制权，是判断主要责任人还是代理人的核心标准。\n\n三项具体判断指标：\n（1）企业是否承担向客户转让商品的主要责任；\n（2）企业是否在转让商品之前或之后承担了该商品的存货风险；\n（3）企业是否有权自主决定所交易商品的价格。\n\n如果满足上述三个条件中的任意一项，通常表明企业是主要责任人，应按总额法确认收入（按已收或应收对价总额）。如果三项都不满足，则为代理人，应按净额法确认收入。\n\n实务中电商平台、贸易中间商等需要特别分析。关键看谁对客户「负责」，谁承担存货风险，谁有定价权。个人理解，供参考。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14,控制","src":"会计准则委员会 准则实施问答","std_ref":"企业会计准则第14号——收入"},{"id":"3338","q":"新收入准则下，合同资产和应收账款到底应该怎么区分？实务必操上有什么判断要点？","a":"这个问题需要从两个层面来看。\n\n第一，理论层面。根据CAS14（收入准则）第三十四条：合同资产是企业已向客户转让商品而有权收取对价的权利，该权利取决于时间流逝之外的其他因素。应收账款是企业无条件收取对价的权利，仅取决于时间流逝。\n\n关键区别在于「是否还有未履行的义务」。合同资产通常对应已发货但质保或其他履约义务尚未完成的情形；应收账款则是所有履约义务均已完成。\n\n第二，实务判断要点：（1）看合同条款——如果收款权附有除信用风险之外的条件，就是合同资产；（2）看履约进度——未完工部分的应收款应为合同资产；（3）看质保条款——质保期内的应收款需判断是保证型还是服务型。\n\n实务中常见误区是把所有已开票未收款都归为应收账款。宜逐笔分析合同条款中的收款条件。","cat":"收入准则","kw":"收入确认,履约义务,交易价格,控制权,CAS 14","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第14号——收入"},{"id":"3337","q":"购买日可辨认净资产公允价值如何确定？尤其是无形资产评估部分。","a":"根据CAS20第十三条，购买方在购买日应当对合并成本进行分配，确认被购买方各项可辨认资产、负债及或有负债的公允价值。\n\n可辨认无形资产的识别是实务中的重点和难点：\n\n第一，无论被购买方账面是否确认，只要满足「可辨认性标准」（可分离或源自合同性权利），都应在购买日按公允价值单独确认。常见的有：客户关系、未完成订单、技术专利、商标、非竞争协议等。\n\n第二，公允价值的确定方法：优先使用活跃市场报价（通常不适用）；其次采用估值技术，如多期超额收益法（MPEEM）评估客户关系、收益提成法（Relief-from-Royalty）评估商标和专利。\n\n第三，评估参数的选择需合理且有依据，包括折现率、预期使用寿命、客户流失率等，建议在底稿中详细记录。\n\n个人理解，供参考。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,公允价值,合并","src":"中国证监会 会计监管工作通讯","std_ref":"企业会计准则第20号——企业合并"},{"id":"3336","q":"同一控制下企业合并在合并报表中如何追溯调整比较期数据？","a":"CAS20规定同一控制下企业合并采用权益结合法，视同合并后的报告主体自最终控制方开始控制时点起一直存在。\n\n合并报表编制要点：\n第一，合并资产负债表：被合并方的资产、负债按原账面价值计量，不产生新的商誉。合并对价与被合并方净资产账面价值的差额，调整资本公积或留存收益。\n\n第二，合并利润表：应当包含被合并方自合并当期期初至合并日的损益，同时追溯调整前期比较数据。\n\n第三，合并现金流量表：同样追溯调整比较期数据。\n\n实务中常见问题：如果被合并方在合并前与最终控制方的其他子公司发生过交易，需要特别注意内部交易的抵消处理。个人理解，供参考。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,追溯调整,合并,控制,追溯,账面价值,资本公积,留存收益,子公司,商誉","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第20号——企业合并"},{"id":"3335","q":"非同一控制下企业合并中，被购买方原来确认的商誉在合并报表中如何处理？","a":"首先要区分被购买方原已确认的商誉的性质。如果是被购买方通过自身之前的并购形成的商誉，在购买方的合并报表中不予确认。\n\n根据CAS20（企业合并准则），非同一控制下企业合并采用购买法。购买方在购买日对被购买方的各项可辨认资产、负债按照公允价值进行计量，购买对价超过被购买方可辨认净资产公允价值份额的差额，确认为本次合并的商誉。\n\n实务中需要特别注意：被购买方原有商誉不属于可辨认资产，因此不单独计量，其价值已包含在本次合并产生的商誉中。个人理解，供参考。","cat":"企业合并","kw":"企业合并,购买法,权益结合法,合并成本,CAS 20,合并,控制,商誉,公允价值,并购","src":"上海证券交易所 会计监管动态","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0075","q":"关于医药⾏业市场推⼴费的会计处理","a":"⾸先要明确经销商的地位是主要责任⼈还是代理⼈。如果是代理⼈的，则应按终端销售实现情况计提，确认为销售费⽤。 如果经销商是主要责任⼈的，则除了计提时点以外，还需要解决的问题是将计提⾦额确认为销售费⽤还是冲减收 ⼊。相关的会计处理依据是：（1）新收⼊准则第⼗九条关于“应付客户对价”的规定；（2）《监管规则适⽤指引 ——会计类第2号》之“2-3 应付客户对价的判断”；（3）《上海证券交易所会计监管动态2023年合辑》之“问题 17【市场推⼴服务费的会计处理】：经销商提供市场推⼴服务，相关费⽤应冲减营业收⼊还是计⼊销售费 ⽤？”等。 在这种情况下（经销商是主要责任⼈），基于经销商最终总要将购⼊的产品销售出去，故基于配⽐考虑，建议的处理原则：（1）应付客户对价属于应确认为销售费⽤的，则根据接受经销商提供营销服务的进度确认，与收⼊之间 不考虑配⽐；（2）应付客户对价属于应冲减收⼊的，则考虑与收⼊的配⽐原则，在收⼊确认时同步冲减收⼊，作 为对收⼊的调减处理。可根据以往历史经验合理估计经销商的退货等最终不能实现对外销售的⽐例，依据【对经销商确认的销售收⼊（1-预计退货率）返利⽐率】预计该部分⾦额。个人理解，供参考。","cat":"收入准则","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0078","q":"请教如何确认模具收⼊？","a":"⾸先明确讨论前提：（1）参照《监管规则适⽤指引——会计类第2号》之“2-1 识别履约义务时商品或服务是否具有 ⾼度关联性的判断”，认定模具设计制造与后续产品制造之间不存在⾼度关联性，故将这两者分解为两项履约义务；（2）由于模具制造为外包，故对于前⼀履约义务的收⼊确认采⽤净额法。 在上述前提下：个人理解，供参考。","cat":"收入准则","kw":"履约义务","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0082","q":"评估基准⽇⾄购买⽇期间发⽣的交易","a":"⾸先明确讨论前提：“2021年7⽉6⽇A公司将在6⽉份⽣产的产成品销售给甲公司”与甲公司取得A公司控制权的交易 ⽆关，且该交易本⾝是公允的、具有合理商业理由。 在此前提下，虽然该交易是逆流交易，甲公司购买的存货2021年末还有60%未对外销售，但该销售交易发⽣于购买 ⽇前，此时A公司并不是甲公司合并集团的组成部分，因此⽆需进⾏抵销处理。 但如果在购买⽇前，A公司是甲公司的联营企业，在逆流交易发⽣时按⽐例抵销了未实现损益的，则在购买⽇后， 该笔按⽐例抵销的分录仍需在合并报表层⾯延续（甲公司个别报表层⾯因已转为成本法，故⽆需延续该笔抵销分录），并随着甲公司将原逆流交易标的存货逐步消耗或对外销售⽽实现。个人理解，供参考。","cat":"收入准则","kw":"控制权,合并,成本法","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0083","q":"关于实际折现率的选择问题？","a":"理论上应根据合同中的还款计划表，采⽤XIRR()函数测算实际利率，以该实际利率进⾏折现。由于存在提前收回本⾦、发⽣各类税费等情况，因此实际利率⾼于合同约定的利率是正常情况。个人理解，供参考。","cat":"收入准则","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0084","q":"关于续租确认使⽤权资产","a":"取决于你的续租合同是签订在第⼀笔租赁的租赁期结束⽇之前还是之后。如果是之后签订，则与第⼀项租赁⽆关； 如果是之前签订，则应在签订⽇作为对原租赁的变更处理。个人理解，供参考。","cat":"收入准则","kw":"租赁","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0085","q":"请教陈版：集团合并报表的处理","a":"如果母公司在其个别报表中作为主要责任⼈按总额法核算，则该项内部交易的抵销不应影响母公司对外交易确认的收⼊。此时的抵销应达到的要求是：将合并报表层⾯的营业成本调整为按照母⼦公司各⾃的实际成本⾦额计量，抵销内部⽑利，同时对于计⼊营业成本/合同履约成本的⼜径与母公司层⾯的收⼊确认政策⼀致，即根据母公司总体 采⽤时段法/时点法⽽作相应调整；如采⽤时段法的，则还需根据母公司的履约进度确定⽅法进⾏相应调整。 具体抵销时，⾸先将母⼦公司两者的计算⼜径调整⼀致，消除时间性差异（例如均调整为时段法，以母公司按时段法确认的成本模拟⼦公司的收⼊，同时将⼦公司的⽣产成本按该履约进度模拟结转营业成本），然后再抵销母公司的成本和⼦公司的收⼊。个人理解，供参考。","cat":"收入准则","kw":"合并","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0088","q":"如何理解审阅准则中期财务信息审阅业务","a":"原有的2101号审阅准则是将审阅视作⼀项独⽴业务，因此CPA需执⾏从了解客户开始的全套程序。⽽中期财务报表审阅（初次接受委托时的审阅除外）是对原有客户业务的续约，可以利⽤以前执⾏年度审计中对被审计单位业务、财务的了解，只需关注前次年度审计后是否有重⼤变化即可。 由于⽬前A股对于中期审阅并⽆法定要求，因此对于中期报表审阅⽬前暂时不需要制定单独的准则，⽬前中国审计准则体系下将其附属于2101号审阅准则，作为应⽤指南的附录收录，既保持了准则趋同，又⽐较符合现时国内的执业需求，是⼀种⽐较合理的处理。个人理解，供参考。","cat":"收入准则","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0093","q":"求助陈版！","a":"这种整体外包，虽然名义上A公司是主要责任⼈，但按照常理，A公司在选择分包供应商时，应会对对⽅的声誉、 专业胜任能⼒、财务实⼒等因素进⾏过考察，以确保分包商具备承担相应责任的能⼒。因此，当分包商出现履约瑕疵时，本企业是可以有把握将责任转嫁给该分包商的。在此情况下，整体分包并不表明本企业可以控制相关的商品或服务，故应采⽤净额法确认收⼊和成本。个人理解，供参考。","cat":"收入准则","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0095","q":"请教陈版主，合同资产","a":"“客户通过……评级”要满⾜哪些条件？其中哪些条件与本企业向客户提供的商品或服务相关？ 通过评级的可能性⼤⼩如何？是否基本确定会通过？还是说存在不确定性？个人理解，供参考。","cat":"收入准则","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0098","q":"急急急 陈版主看过来","a":"⼄公司在单体和合并报表层⾯的处理原则不变，即在个别报表层⾯确认衍⽣⾦融负债，⽽合并报表层⾯需同时确认少数股东权益和回购⾃⾝权益⼯具的完整合同义务（本⾦+累计利息）。可参见《监管规则适⽤指引——会计类第 3号》之“3-5 对少数股权远期收购义务的会计处理”。 对甲公司IPO成功可能性的估计发⽣变化，在⼄公司个别报表层⾯将导致相关衍⽣⾦融负债的公允价值增加，对应需确认公允价值变动损失；⽽在⼄公司的合并报表中，在回购义务被实际触发之前，只需对回购义务负债按约定的利率计提利息⽀出并增加回购业务相关负债的账⾯价值即可。 提问⼈：爬爬呀 时间：2024-10-08 15:35:30 继续追问⼀下，由于对甲公司IPO成功可能性的估计发⽣变化，⼄公司个别报告以及合并报表处理思路如下：个别报表层⾯确认的公允价值变动损失，应当考虑递延所得税负债的影响。同时合并报告应个别报告层⾯确认的公允价值变动损失，以及递延所得税负债应当全部冲回。 已经回购时：⼄公司个别报表层⾯按付出对价的公允计⼊长期股权投资，同时将原确认的衍⽣⾦融负债需要全部转销，计⼊投资收益；合并报表层⾯视为购买少数股权，原先所确认的负债⾦额与⾏权时实付⾦额如存在差异的，该差异应进⼀步作为对权益项⽬的调整，即调整资本公积-资本溢价。 不知我的思路是否正确，⿇烦陈版主再指导⼀下，⾟苦了回答⼈：chenyiwei 基本可以这样理解。个人理解，供参考。","cat":"收入准则","kw":"公允价值,合并,少数股东,所得税,递延","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0103","q":"请教陈版主，待执⾏亏损合同执⾏中预计负债的结转问题","a":"是。如果⼀个亏损合同，计提时⽆标的资产，计提了预计负债，后项⽬开始⽣产，产⽣了在产品，那么需要将预计负债转为存货跌价准备。 严格来说，是在每年末根据与该合同相关的存货情况以及合同收⼊、成本的确认情况，重新计量与该合同相关的亏损合同预计负债和存货跌价准备。这两者之和，随着合同收⼊的逐步确认，相应成本逐步结转，应当会逐渐减少。个人理解，供参考。","cat":"收入准则","kw":"预计负债,存货跌价","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0104","q":"请教陈版：净额法确认收⼊涉及相关科⽬列报问题","a":"在净额法下，因为本企业不控制提供给最终客户的商品或服务，所以不应将其确认为存货，⽽应通过往来科⽬（如其他应收款、其他应付款、其他流动资产、其他流动负债等）反映。 按照⼀般的账务处理流程，预付账款应转⼊存货，最后转⼊营业成本，⽽净额法下显然不是这样，所以预付给上游的款项应理解为为下游垫资，故确认为其他应收款或其他流动资产更恰当。 提问⼈：沉默羔⽺ 时间：2024-03-07 18:18:17 请教陈⽼师，⼤华原来的这种观点应该怎么理解？ “4. 业务实质与部分会计处理的“错位”是合理的 对于合同形式和业务实质相⼀致的委托加⼯业务，受托⽅并不需要将受托原材料进⾏报表列报，也不存在加⼯费之外的款项往来。上述案例中，尽管将购销交易的业务实质认定为委托加⼯，但会计处理上并没有改变购销合同下所形成的存货、债权和债务关系的列报。这种 “错位”是合理的，因为法定的债权和债务关系是真实存在的，债务关 系对应的存货资产也应该是存在的。” 回答⼈：chenyiwei 这种做法存在内在的逻辑⽭盾，个⼈对此不赞同。个人理解，供参考。","cat":"收入准则","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0111","q":"求助陈版主和各位⼤佬","a":"⼀般采⽤观点2。具体可参阅《监管规则适⽤指引——会计类第2号》之“2-3 应付客户对价的判断”。 另外，像主帖这种情况，很可能此处所指的“客户”是经销商，此时应关注该等“客户”的地位是否为代理⼈，这个问题会直接影响到谁是本企业真正“客户”的判断，以及何时确认商品销售收⼊。个人理解，供参考。","cat":"收入准则","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0113","q":"请教陈版主，新⾦融准则下，购⼊不良资产包的会计处理","a":"虽然实务中有些基础资产的合同条款是满⾜“本⾦+利息”的基本借贷安排的，但由于债务⼈的信⽤存在问题，可能 ⽆法合理估计其实际可还款⾦额和时间，原合同条款对于估计未来现⾦流量的发⽣⾦额和时间已经没有多少意义。因此，⼀般分类为以公允价值计量且其变动计⼊损益的⾦融资产，列报为交易性⾦融资产或者其他⾮流动⾦融资 产。从中实际收到款项时，冲抵该⾦融资产的账⾯价值；期末对剩余款项的可收回⾦额进⾏谨慎的评估，据此确认 ⾦融资产的公允价值变动损益。个人理解，供参考。","cat":"收入准则","kw":"公允价值","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0118","q":"【求助陈版主】使⽤权资产内部租赁后的抵消问题","a":"理论上确实是“抵消B公司单体报表根据使⽤权资产折旧产⽣的营业成本、收⼊、合同资产，然后根据A集团计提折旧的⾦额200万元，当做施⼯成本投⼊，重新算B的履约进度，确认新的收⼊、成本、合同资产”。 如果做的⽐较精细，则应根据内部交易损益的抵销情况，重新测算B对外的合同预计总成本和履约进度，据此调整按履约进度确认的对外收⼊和成本。但这样操作⽐较复杂，实务中可能不⼀定会做到如此精细，可以考虑按重要性原则考虑能否接受相对简化的处理。个人理解，供参考。","cat":"收入准则","kw":"租赁","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0124","q":"关于境外母公司向其境内客户发保内维修配件的账务处理","a":"该项账务处理不合理。该安排的实质是境外母公司为本企业承担了保修服务中的配件成本。 如果能够确定收到的配件不会再退回，⽇后母公司也不会向本企业收款的，则本企业在收到此类维修备件时，应按其公允价值，借记“存货——维修备件”，贷记资本公积。 后续领⽤备件⽤于维修服务时：个人理解，供参考。","cat":"收入准则","kw":"公允价值","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0125","q":"[求助陈版]产品收⼊确认时点问题","a":"这种情况下，在客户签收产品时，可以认为控制权已转移（客户后续如何使⽤该产品，完全由客户⾃⾏确定，本公司不⼲预）。但有可能提出退换要求。此时应作为“附有销售退回条款的销售”，按新收⼊准则第三⼗⼆条规定处 理，即仅可确认预计不会退回部分的收⼊和成本。对于预计要退回的部分，应确认预计负债和应收退货成本。 如果因该产品成熟度不⾼，退货可能性⽆法合理估计，则客户签收时作为发出商品处理，收到客户款项计⼊合同负债。同时，企业应合理确定⼀项标志，确保在该标志时点上再发⽣退换货的可能性极低，则可以在该时点上确认收 ⼊和成本。个人理解，供参考。","cat":"收入准则","kw":"控制权,预计负债","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0126","q":"请教陈版主ppp项⽬下该笔业务是否为政府补助","a":"PPP项⽬是政府与企业作为平等的商事合同主体，企业向政府（及其所代表的当地公众）提供基础设施的建设、运维服务并获取合理报酬。⽽政府补助是政府基于“社会公共事务管理者”的⾝份⽆偿地将经济资源授予企业。因此， 这两者在同⼀交易或事项中是不应同时发⽣的（收到并⾮合同⼀⽅的上级政府拨付的款项除外）。 从此处主帖信息看，该款项可能是政府以代付⼯程款的形式结算本企业（社会资本⽅）对其形成的应收款或者⽆形资产，最终减少了PPP项⽬完⼯时社会资本⽅就该项⽬确认的⾦融资产或者⽆形资产。如果原PPP合同未对此作出 约定的，则应考虑签订补充协议对此予以明确。个人理解，供参考。","cat":"收入准则","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0130","q":"关于当期处置⼦公司顺流交易抵消问题","a":"如果该笔顺流交易与后续处置⼦公司股权的交易不构成⼀揽⼦交易，则鉴于该项顺流交易系发⽣于母公司丧失对⼦公司控制权之前，故仍需进⾏合并抵销处理。你的理解基本合理。 参考：《监管规则适⽤指引——会计类第3号》之“4-5 权益法下顺流交易产⽣的未实现内部交易损益以处置或视同处置股权⽅式实现时的会计处理”。 提问⼈：蜀⼭penguin 时间：2024-04-12 16:29:14 请教陈版，同⼀集团下⼦公司A 卖了⼀批设备给⼦公司B（设备增值1000万），⼦公司A 有个固定资产处置收益 1000万，在合并层跟B 账上的固定资产做了抵消。 翻过第⼆年，⼦公司B 变成了合营企业（50%）。 请问合并层的抵消分录要怎么处理呢？ 原来合并层挂着， 借:期初未分配利润 1000万 贷：固定资产 1000万 是不是将未实现损益确认50%，剩余的按照B 摊销的进度调整分占损益。个人理解，供参考。","cat":"收入准则","kw":"控制权,合并,权益法,固定资产","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0138","q":"销售公司总额法净额法确认收⼊","a":"站在销售公司⽴场，主要考虑的问题是：其是否“以销定采”，即根据下游客户的订单向上游⽣产企业订货，从⽽确保其持有的存货数量⼩于或等于同⼀时点持有的下游客户待履⾏订单的数量，即所有存货均有对应的销售合同。如果是，则该销售公司应采⽤净额法核算；反之，如果该销售公司系根据⾃⾝对市场的研判向⽣产企业订货，从⽽在持有存货期间承担了滞销积压、商品公允价值变动等风险的（换⾔之，该销售公司有权⾃⾏决定在何时、以什么价格卖给谁），则应采⽤总额法核算。个人理解，供参考。","cat":"收入准则","kw":"公允价值","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0143","q":"应收账款按照项⽬核算的应收款和预收款的列报","a":"赞同主帖中的处理意见。不同项⽬的应收账款和合同负债不应抵销列报。相应地，在对应收账款计提坏账准备时， 通常不应考虑对同⼀客户或者其关联⽅在不同项⽬下的合同负债的抵销影响，除⾮合同中对客户违约情况下的救济措施有特别约定，即在客户违约等特定场合下允许被审计单位⾃⾏将两者相抵。个人理解，供参考。","cat":"收入准则","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0144","q":"母公司为⼦公司办理应收账款保理业务如何处理？","a":"此问题与《企业会计准则解释第17号》第⼆条供应商融资安排的披露问题相关。 如果抛开母⼦公司关系，就视同普通的⾮关联⽅债权债务的保理，则相关帐务处理（特别是在债权⼈终⽌确认的情况下，债务⼈的负债项⽬是否需调整到短期借款），当涉及供应商融资安排的时候，企业应付供应商款项的性质有可能发⽣了变化。企业需结合融资安排相关条款，分析其商业实质，根据CAS 22关于⾦融负债终⽌确认等相关规定，确定原应付账款是否应终⽌确认并重新确认⼀项对融资提供⽅的“借款”。对于其商业实质的判断，除了影响资产负债表列报项⽬以外，也会影响现⾦流量表的列报项⽬，如企业根据约定的条款认定属于买⽅融资，判断应付供应商款项应终⽌确认并转列报于短期借款，则企业还款时的现⾦流将不再属于经营活动现⾦流，⽽是筹资活动现⾦流。 关于融资提供⽅⽀付供应商款项后企业原应付供应商款项的具体列报项⽬，我们的倾向性观点为（假设期限均为⼀年以内）： 商业实质判断 融资提供⽅ 资产负债表列报 还款现⾦流量列报 属于企业⾃⾝的融资⾏为 银⾏或其他⾦融机构 短期借款 筹资活动现⾦流 ⾮⾦融机构 其他流动负债 不属于企业⾃⾝的融资⾏为 ⽆需区分 应付账款 经营活动现⾦流 注1：融资提供⽅向供应商⽀付款项的时候通常不会通过企业，当该⽀付现⾦流没有通过企业流转的时候，企业不应将其反映在现⾦流量表中。 注2：《附录—会计科⽬和主要账务处理》中关于短期借款的规定：“本科⽬核算企业向银⾏或其他⾦融机构等借⼊的期限在1年以下（含1年）的各种借款。” 关于⾦融负债的终⽌确认，CAS 22规定： 第⼗⼆条 ⾦融负债（或其⼀部分）的现时义务已经解除的，企业应当终⽌确认该⾦融负债（或该部分⾦融负债）。 第⼗三条 企业（借⼊⽅）与借出⽅之间签订协议，以承担新⾦融负债⽅式替换原⾦融负债，且新⾦融负债与原⾦融负债的合同条款实质上不同的，企业应当终⽌确认原⾦融负债，同时确认⼀项新⾦融负债。 企业对原⾦融负债（或其⼀部分）的合同条款做出实质性修改的，应当终⽌确认原⾦融负债，同时按照修改后的条款确认⼀项新⾦融负债。 第⼗四条 ⾦融负债（或其⼀部分）终⽌确认的，企业应当将其账⾯价值与⽀付的对价（包括转出的⾮现⾦资产或承担的负债）之间的差额，计⼊当期损益。 CAS 22应⽤指南中关于“实质上不同”的规定：其中，“实质上不同”是指按照新的合同条款，⾦融负债未来现⾦流量 （包括⽀付和收取的任何费⽤）现值与原⾦融负债的剩余期间现⾦流量现值之间的差异⾄少相差10%。有关现值的计算均采⽤原⾦融负债的实际利率。我们理解该规定主要是针对同⼀债务⼈负债前后数量上的变化。供应商融资安排由于融资提供⽅的存在，债务的性质很可能也发⽣了变化。 当企业根据供应商融资安排的条款判断融资提供⽅为企业⽀付的供应商款项属于其⾃⾝的融资⾏为时，我们理解该负债的条款在性质上与原应付供应商款项具有实质上的不同，应终⽌确认原应付账款，确认⼀项新的⾦融负债（如短期借款或其他流动负债）。 企业在判断供应商融资安排是否属于其⾃⾝融资⾏为时，通常主要从以下⼏个⽅⾯综合予以考虑： 实施供应商融资安排的⽬的是什么？ 供应商融资安排与商品或服务的采购是否为⼀揽⼦交易，即供应商是否在实施该融资安排的前提下才同意商务合同中约定的结算和价格条款？ 供应商融资安排是否修改了原与供应商的付款约定，如变更了企业的付款⽇期？ 与融资提供⽅的条款商议（如利率或折现率）由谁主导谈判？ 融资安排相关费⽤或利息由谁承担？ 企业是否向融资提供⽅提供了增信、交叉违约、由第三⽅承担连带责任，或提供其他形式的担保？ 企业是否获得了提前付款的现⾦折扣或商业折扣等优惠？ 款项到期时是否为融资提供⽅提供了直接从企业现有银⾏账户直接划款的权利？ 供应商融资安排是否占⽤企业在融资提供⽅的授信额度？个人理解，供参考。","cat":"收入准则","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0146","q":"请教陈版租赁收⼊跨期问题","a":"这种情况，要站在2022年12⽉31⽇（上年年末）的⽴场，考虑基于当时已存在的情况和可合理获取的信息，是否可以认为事实上已存在租赁合同，以及能否对租⾦作出合理估计。如果是，则该公司应在2022年末，参照新收⼊准则下关于可变对价的原则合理、谨慎地估计2022年度内可确认的租⾦收⼊。 如果确实符合上述条件，但2022年末未确认租⾦收⼊的，则属于前期差错，应予以更正。 按照常理分析，如果该部分仓库确实已在2022年初移交给B公司使⽤，则⼤概率双⽅是已对租赁问题做出了安排 的，因此完全不存在任何租约的可能性很⼩。建议对整个安排的全过程和其中的重要节点进⾏谨慎梳理，并向双⽅了解为何在租赁期结束后才补签合同。个人理解，供参考。","cat":"收入准则","kw":"租赁","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0148","q":"⽆形资产投资取得公司控制权","a":"在合并报表层⾯，该项⽆形资产⼀直在甲公司的控制范围以内，故合并报表层⾯其账⾯价值应保持不变，母公司个别报表中的资产处置损益和⼦公司报表中对应的⽆形资产增值部分应作抵销处理。这也是⼀种特殊形式的顺流交易 （母公司出售资产给⼦公司，⼦公司以⾃⾝权益⼯具作为⽀付对价），所以上述顺流交易抵销的影响应全部归属于母公司股东，不分摊给少数股东。个人理解，供参考。","cat":"收入准则","kw":"控制权,合并,少数股东","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0156","q":"如何确认递延所得税资产","a":"⾸先要考虑：此前全额转⼊营业外⽀出，后续签订拆除协议实际上可收回3750万元，这是否属于⼀项前期差错？ 如果属于前期差错的，则⾸先进⾏更正处理，再以更正后的数据为基础考虑下⼀步处理。 如果不属于前期差错的，则该项资产的账⾯价值为零（以前年度已全额计提准备，且该准备不得转回），计税基础为计提减值准备前的账⾯价值（4800万元），故可抵扣暂时性差异为4800万元。在该拆除变卖已有明确时间表，且预计可预见的未来可获得⾜够多的应纳税所得额的前提下，可针对该项可抵扣暂时性差异4800万元确认递延所得税资产1200万元。已收到的750万元的账⾯价值和计税基础相同，不涉及递延所得税确认问题。 提问⼈：XK2410 时间：2024-07-04 16:34:01 谢谢陈版！但是收到的750万预收款项（包括未收到的合同价款3000万），在未来期间固资拆除时，实际上税务能 可扣除损失是（4800－3750＝1050万元）；这才是未来期间能减少的应纳税所得额1050万，⽽不是未来可减少4800 万应纳税所得额，所以现在按4800万确认递延所得税资产是⾼估资产虚增利润，也不符合公司未来的实际。因⽽应统筹考虑按1050万元确认递延所得税资产。@chenyiwei 这样理解有问题吗？ 回答⼈：chenyiwei 我上⾯的表述应⽆问题，因为处置收益在会计和税法上都没有确认，暂时性差异仅针对此前会计上计提的减值准备。后续实际完成清理时，会计和税务上同时将处置价款计⼊损益，相应抵减处置损失。个人理解，供参考。","cat":"收入准则","kw":"减值,所得税,递延","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"QA0026","q":"新金融工具准则下金融资产三分类的判断流程?","a":"CAS 22(2017)将金融资产从四分类简化为三分类,判断流程为:(1)合同现金流量是否仅为本金加利息(SPPI测试)--是则进入第(2)步,否则以公允价值计量且其变动计入当期损益(FVTPL);(2)业务模式是收取合同现金流量还是兼有出售(业务模式测试)--收取则以摊余成本计量(AC);兼有则以公允价值计量且其变动计入其他综合收益(FVOCI);其他以FVTPL。权益工具可指定为FVOCI(不可撤销,股利计入损益、处置不转入损益)。个人理解,供参考。","cat":"金融工具","kw":"三分类,SPPI,业务模式,摊余成本,FVOCI,FVTPL","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"QA0027","q":"预期信用损失模型(ECL)的三阶段法是什么?","a":"CAS 22引入预期信用损失模型取代原已发生损失模型,三阶段为:(1)阶段一(信用风险未显著增加)--按12个月ECL计提,利息收入按账面余额计算;(2)阶段二(信用风险显著增加但未减值)--按整个存续期ECL计提,利息收入仍按账面余额计算;(3)阶段三(已发生信用减值)--按整个存续期ECL计提,利息收入按摊余成本(扣减值后)计算。判断信用风险显著增加通常采用逾期30天作为可推翻的假设。个人理解,供参考。","cat":"金融工具","kw":"预期信用损失,ECL,三阶段,12个月,存续期,信用减值","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"QA0028","q":"预期信用损失率的估计方法和数据来源?","a":"ECL的估计需结合:(1)历史损失经验(按账龄分组统计);(2)当前经济状况调整;(3)前瞻性信息(GDP增速、行业指数等宏观经济预测)。实务方法包括:迁徙率法(滚动率模型)、马尔可夫链法、损失率模型。企业需选择与业务规模匹配的方法,不得仅以未发生损失为由不计提ECL。个人理解,供参考。","cat":"金融工具","kw":"ECL估计,迁徙率,历史损失率,前瞻性,马尔可夫链","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"QA0029","q":"应收款项融资和应收账款在报表中如何区分?","a":"应收款项融资项目列报的是既以收取合同现金流量又以出售为目的的应收票据及应收账款(FVOCI类)。应收账款列报的是仅以收取合同现金流量为目的的(AC类)。判断关键:企业管理应收票据的业务模式--如果经常贴现、背书且不终止确认则FVOCI列入应收款项融资;如果持有至到期则AC列入应收票据或应收账款。个人理解,供参考。","cat":"金融工具","kw":"应收款项融资,FVOCI,应收账款,应收票据,业务模式,列报","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"QA0030","q":"金融资产转移(应收账款保理)终止确认的判断?","a":"应收账款保理是否终止确认的判断:(1)企业转移了几乎所有风险和报酬(无追索权保理)--终止确认;(2)企业保留了几乎所有风险和报酬(有追索权保理)--继续确认全部资产,收到的对价作为借款;(3)既未转移也未保留--判断是否放弃控制,放弃则终止确认;未放弃则按继续涉入程度确认相关资产和负债。实务中无追索权需经严格法律审查。个人理解,供参考。","cat":"金融工具","kw":"保理,终止确认,追索权,风险和报酬,继续涉入","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"QA0031","q":"可转换公司债券的会计分拆处理?","a":"可转债包含负债成分和权益成分(转股权)--需在初始确认时进行分拆:(1)确定负债成分的公允价值(未来现金流按不含转股权的类似债券的市场利率折现);(2)发行价格减去负债成分公允价值等于权益成分(计入其他权益工具);(3)发行费用按负债和权益的公允价值比例分摊。后续计量:负债成分按摊余成本核算,权益成分不变。转换时终止确认负债成分并转入权益。个人理解,供参考。","cat":"金融工具","kw":"可转债,分拆,负债成分,权益成分,其他权益工具,摊余成本","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"QA0032","q":"其他权益工具投资(FVOCI-权益)的后续计量特点?","a":"指定为FVOCI的权益工具投资(不可撤销选择)的后续计量:(1)公允价值变动计入其他综合收益,不影响当期损益;(2)持有期间股利收入(清算性股利除外)计入当期损益;(3)处置时不得将OCI中的累计公允价值变动转入当期损益,而是直接转入留存收益;(4)无需计提减值。这种处理的目的在于避免企业通过选择处置时点来操纵利润。个人理解,供参考。","cat":"金融工具","kw":"其他权益工具,FVOCI,其他综合收益,股利收入,处置,留存收益","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"QA0033","q":"金融负债和权益工具的区分标准?","a":"CAS 37规定了固定换固定原则:(1)必须以交付固定数量的自身权益工具结算的合同(无交付现金义务)--权益工具;(2)必须交付可变数量自身权益工具或包含交付现金义务--金融负债。实务中常见的争议:对赌协议(或有结算条款)、永续债的分类、合伙人份额约定等。应以合同条款实质而非法律形式判断。个人理解,供参考。","cat":"金融工具","kw":"金融负债,权益工具,固定换固定,自身权益工具,永续债,对赌协议","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报、企业会计准则第20号——企业合并"},{"id":"QA0034","q":"企业购买理财产品的会计处理和分类?","a":"理财产品分类取决于合同条款和投资性质:(1)保本固定收益型(合同现金流量SPPI测试通过)--以摊余成本计量或FVOCI;(2)非保本浮动收益型(SPPI测试不通过)--FVTPL;(3)结构性存款(嵌入衍生工具且与主合同不紧密相关)--通常整体作为FVTPL处理(但保本保最低收益的结构性存款可能拆分为AC加衍生工具)。期限在三个月以内的高流动性理财产品可列入交易性金融资产或根据业务模式列入其他类别。个人理解,供参考。","cat":"金融工具","kw":"理财产品,结构性存款,SPPI,分类,保本,非保本,FVTPL","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"QA0035","q":"预期信用损失模型下应收账款的简化方法?","a":"CAS 22允许对不含重大融资成分的应收账款采用简化方法:始终按整个存续期预期信用损失计量损失准备。实务中常用的应收账款减值矩阵法:(1)按账龄分组(未逾期、逾期1-30天、30-60天、60-90天、>90天等);(2)统计各账龄组的历史迁徙率和损失率;(3)加入前瞻性信息调整;(4)将调整后的损失率乘以各组余额得到ECL。此方法简便有效,已为大量企业采用。个人理解,供参考。","cat":"金融工具","kw":"应收账款,简化方法,减值矩阵,账龄,迁徙率,整个存续期","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"QA0036","q":"债务工具投资重分类条件及影响?","a":"CAS 22仅在企业改变管理金融资产的业务模式时才允许重分类(极少发生),会计处理采用未来适用法--自重分类日起按新类别处理,不追溯前期。分为6种重分类情形:AC到FVTPL、FVOCI到AC等,每种情形下的差额处理不同(或转入损益或转入OCI或调整账面价值)。值得注意的是,权益工具投资指定为FVOCI后不得重分类。个人理解,供参考。","cat":"金融工具","kw":"重分类,业务模式,未来适用法,AC,FVOCI,FVTPL,权益工具","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"QA0037","q":"合同现金流量特征(SPPI)测试的具体判断标准?","a":"SPPI测试的核心:合同现金流量是否仅代表本金加未偿付本金的利息。利息需反映基本借贷安排的对价(货币时间价值加信用风险加其他基本借贷风险加合理利润率)。不通过SPPI的情形:合同约定收益率与某种指数挂钩(非基准利率加利差)、包含杠杆特征、包含双轨利率(最低收益保证)。需要通过SPPI是划分为AC或FVOCI的前提条件。个人理解,供参考。","cat":"金融工具","kw":"SPPI测试,本金,利息,基准利率,杠杆,双轨利率","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"QA0039","q":"与权益挂钩的衍生工具的会计处理?","a":"以自身权益工具结算的衍生工具分类:(1)总是以固定数量换固定金额(固定换固定)--权益;(2)涉及可变数量--金融资产或金融负债(FVTPL)。如认股权证(warrants)在特定条件满足前不确定是否为固定换固定--先在FVTPL列示,待条件明确后再判断。实务中,对赌协议(VAM)中的业绩补偿条款往往导致衍生金融工具分类。个人理解,供参考。","cat":"金融工具","kw":"衍生工具,自身权益工具,固定换固定,认股权证,对赌协议,VAM","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报、企业会计准则第20号——企业合并"},{"id":"QA0040","q":"已发生信用减值的金融资产的利息收入如何计算?","a":"已发生信用减值(阶段三)的金融资产,利息收入等于摊余成本乘以实际利率(而非账面余额乘以实际利率)。摊余成本等于账面余额减累计计提的信用减值准备。这意味着减值准备会减少利息收入的基数,而阶段一和阶段二的利息收入则仍按账面余额计算。这个差异会导致损益表中利息收入在阶段转换时出现断崖效应。个人理解,供参考。","cat":"金融工具","kw":"阶段三,利息收入,摊余成本,减值准备,账面余额,实际利率","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"QA0041","q":"财务报表中交易性金融资产和其他权益工具投资如何列报?","a":"资产负债表列报差异:(1)交易性金融资产--列示在流动资产或非流动资产项下(根据预期持有期限);(2)其他权益工具投资(FVOCI)--通常列为非流动资产(长期战略投资)。损益表差异:(1)交易性金融资产的公允价值变动计入当期损益;(2)其他权益工具投资的公允价值变动计入其他综合收益、股利收入计入投资收益。个人理解,供参考。","cat":"金融工具","kw":"交易性金融资产,其他权益工具投资,列报,公允价值变动,投资收益","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"QA0042","q":"利率互换套期的会计处理?","a":"利率互换的套期会计(公允价值套期):(1)被套期项目以摊余成本计量时将套期工具的公允价值变动即期部分计入当期损益;(2)对已存在的固定利率负债进行公允价值套期时将套期工具有效部分的公允价值变动调整被套期负债的账面价值(净额结算),无效部分计入当期损益。采用套期会计需满足指定、文档化、有效性评估等严格条件。现金流量套期下,套期工具有效部分计入其他综合收益。个人理解,供参考。","cat":"金融工具","kw":"利率互换,公允价值套期,现金流量套期,被套期项目,有效性,OCI","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"QA0043","q":"企业集团内资金池的会计处理?","a":"集团内资金池(cash pooling)的会计处理取决于法律形式和实质:(1)委托贷款模式--集团内成员间形成独立债权债务关系,按金融工具准则分别确认;(2)账户归集模式--零余额账户(自动归集至主账户)--成员账面显示为对资金中心的应收/应付款项,合并层面内部抵销。实务中需关注:跨境的资金池可能触发外汇管制、转让定价等合规问题。个人理解,供参考。","cat":"金融工具","kw":"资金池,委托贷款,归集,合并抵销,跨境,外汇管制","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"QA0045","q":"金融工具的初始计量--交易费用如何处理?","a":"金融工具的初始计量原则:(1)以公允价值计量且其变动计入当期损益的金融资产/负债--交易费用直接计入当期损益;(2)其他类金融资产/负债(AC、FVOCI)--交易费用计入初始成本。权益工具投资的交易费用计入初始成本(包括被指定为FVOCI的)。但内部管理过程中产生的费用(如内部分析、差旅等)不属于可直接归属的交易费用,应费用化。个人理解,供参考。","cat":"金融工具","kw":"初始计量,交易费用,FVTPL,AC,FVOCI,初始成本,费用化","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"QA0046","q":"财务担保合同的会计处理?","a":"CAS 22规定财务担保合同的初始确认按公允价值计量,后续计量取下述两者孰高:(1)按CAS 22计提减值(ECL);(2)初始确认金额减去按CAS 14累计摊销的金额。如企业为关联方提供担保,通常因无市场对价需以ECL计量,可能产生大额信用减值损失。此外,财务担保合同可能构成或有负债(CAS 13),需同时在报表附注中披露。个人理解,供参考。","cat":"金融工具","kw":"财务担保,ECL,初始确认,摊销,或有负债,关联方担保","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报、企业会计准则第14号——收入、企业会计准则第13号——或有事项"},{"id":"QA0047","q":"债券投资的折价/溢价摊销使用实际利率法的步骤?","a":"实际利率法的步骤:(1)确定金融资产的各期预计现金流量(包括本金和利息);(2)计算使未来现金流量现值等于初始账面价值的折现率(即实际利率);(3)每期利息收入等于期初摊余成本乘以实际利率;(4)每期摊销额等于实际利息减名义利息(分期付息时)或等于实际利息(到期一次还本付息时)。注意:如果发生预期信用损失,阶段三资产的利息基数从账面余额改为摊余成本。个人理解,供参考。","cat":"金融工具","kw":"实际利率法,折价摊销,溢价摊销,摊余成本,现金流量,阶段三","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"QA0048","q":"金融工具的列报--流动性与偿付能力的区分?","a":"资产负债表中的流动性判断依据:(1)预期在资产负债表日后12个月内结算--流动;(2)反之--非流动。但对衍生金融工具:作为交易性资产/负债通常列为流动。特定情形:企业可否在12个月后将负债展期取决于是否有自行决定的延期权--有则列为非流动,无则流动。此外,资产负债表日后发生的再融资、债务展期不影响资产负债表日的分类。个人理解,供参考。","cat":"金融工具","kw":"流动性,流动/非流动,衍生工具,展期,再融资,自行决定权","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"QA0049","q":"可回售工具(如开放式基金份额)的分类?","a":"CAS 37对可回售工具的分类有特殊规定:虽然持有人有权回售(形式上属于金融负债),但如同时满足下列条件可分类为权益:(1)持有人按比例享有净资产;(2)该工具从属于所有其他工具类别;(3)所有工具具有相同特征;(4)现金流量仅基于净利润或净资产变动。开放式基金的基金份额即典型例子--持有人可随时赎回,但符合条件的可以作为权益工具。个人理解,供参考。","cat":"金融工具","kw":"可回售工具,开放式基金,权益工具,按比例,从属,净资产","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第22号——金融工具确认和计量、企业会计准则第23号——金融资产转移、企业会计准则第37号——金融工具列报"},{"id":"CY0260","q":"联营企业发⽣同⼀控制企业合并时投资收益处理","a":"如果联营企业发⽣同⼀控制下合并，但不涉及本企业在该联营企业中的股权⽐例被稀释（例如联营企业以现⾦对价 ⽅式收购股权实现同⼀控制下合并），则不涉及分段计算问题，但“投资⽅不应当调整财务报表的⽐较信息”这⼀原则在此时仍然是适⽤的，即：投资⽅需对被投资⽅的合并报表进⾏必要的模拟调整，剔除因联营企业同⼀控制下合并对合并⽇前报表进⾏模拟调整的影响，将被合并⽅⾃合并⽇起才纳⼊该联营企业的合并报表，以该模拟调整后的合并报表所显⽰的联营企业归母净资产、净利润为基础进⾏权益法核算。个人理解，供参考。","cat":"企业合并","kw":"合并,权益法","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0265","q":"区分核⼼商誉的会计处理","a":"此问题在实务中有争议，可能要重新考虑。但核⼼商誉和⾮核⼼商誉的区分是写进了IFRS 3的结论基础的，仍有⼀定参考意义。个人理解，供参考。","cat":"企业合并","kw":"商誉","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0281","q":"所有者权益变动表年初调整中的其他填什么？","a":"“其他”项是指除了会计政策变更、前期差错更正以外的其他原因对期初留存收益的调整，例如同⼀控制下的企业合并、长期股权投资成本法转权益法的差额等。 例如，在《企业会计准则应⽤指南汇编2024》的“长期股权投资”⼀章中（原书P82），已经明确： （成本法转为权益法时）上述转换时需要调整的留存收益在报表所有者权益变动表中列⽰年末余额”到“本年年初余额”之间的“其他”项⽬中，从⽽对本年年初的留存收益进⾏调整，⽆需追溯调整⽐较期间数据。个人理解，供参考。","cat":"企业合并","kw":"合并,权益法,成本法","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0285","q":"求助陈版，企业价值评估增值，合并报表如何处理。","a":"应以购买⽇为基准⽇，进⾏以“购买对价分摊”为⽬的的评估，据此确定各单项可辨认净资产的公允价值（包括根据 《企业会计准则解释第5号》第⼀条规定识别和计量符合“可辨认性标准”的⽆形资产），剩余部分作为商誉。个人理解，供参考。","cat":"企业合并","kw":"公允价值,商誉,合并","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0338","q":"关于弃置费⽤确认递延所得税资产的问题","a":"⾸先，弃置费⽤等项⽬确认递延所得税资产和负债的前提是“不是企业合并、交易发⽣时既不影响会计利润也不影 响应纳税所得额（或可抵扣亏损）、且初始确认的资产和负债导致产⽣等额应纳税暂时性差异和可抵扣暂时性差异的单项交易”，即在固定资产初始确认时就弃置费⽤确认预计负债并增加固定资产账⾯价值。⽽实务中煤矿的弃置 费⽤多数是随着开采⽽逐步计提的，直接计⼊营业成本，这种情况下虽然也要确认递延所得税资产，但不属于解释16号的规范范围。 其次，对于属于解释16号适⽤范围的情形，由于在固定资产和预计负债（弃置费⽤）初始确认时同步确认了等额的递延所得税资产和负债，⽽递延所得税负债转回时将导致增加应纳税所得额，因⽽即使该企业⾃⾝没有⾜够多的应纳税所得额，但由应纳税暂时性差异转回形成的应纳税所得额总可以获得利⽤，因此也符合递延所得税资产的确认条件。 参考：《监管规则适⽤指引——会计类第4号》之“4-8 关于租赁负债相关递延所得税资产的确认”： 公司在确认递延所得税资产时，应当考虑公司当前应纳税暂时性差异在未来期间转回时将产⽣的可⽤来抵扣可抵扣暂时性差异的所得税影响。对于租赁交易，即使预计未来期间公司根据相关税法规定确定的应纳税所得额整体为负数，公司应当考虑预计未来期间转回的使⽤权资产等所产⽣的应纳税暂时性差异，确认与租赁负债相关的可抵扣暂时性差异产⽣的递延所得税资产。个人理解，供参考。","cat":"企业合并","kw":"合并,租赁,所得税,递延,预计负债,固定资产","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0352","q":"请教陈版主增资导致企业股权被动稀释仍按权益法核算","a":"参考《监管规则适⽤指引——会计类第1号》之“1-3 特殊事项下权益法的应⽤”： ⼆、因被动稀释导致持股⽐例下降时，“内含商誉”的结转 因其他投资⽅对被投资单位增资⽽导致投资⽅的持股⽐例被稀释，且稀释后投资⽅仍对被投资单位采⽤权益法核算的情况下，投资⽅在调整相关长期股权投资的账⾯价值时，⾯临是否应当按⽐例结转初始投资时形成的”内含商 誉”问题。其中，“内含商誉”是指长期股权投资的初始投资成本⼤于投资时享有的被投资单位可辨认净资产公允价 值份额的差额。投资⽅因股权⽐例被动稀释⽽”间接”处置长期股权投资的情况下，相关”内含商誉”的结转应当⽐照投资⽅直接处置长期股权投资处理，即应当按⽐例结转初始投资时形成的”内含商誉”，并将相关股权稀释影响计⼊资本公积（其他资本公积）。 据此，因被投资⽅接受其他股东增资，导致本企业所持股权被被动稀释，应转⼊“资本公积——其他资本公积”的⾦额=（被动稀释后被投资企业净资产稀释后本企业持股⽐例-被动稀释前被投资企业净资产稀释前本企业持股⽐ 例）-应结转的内含商誉⾦额。 其中：被动稀释后被投资企业净资产=被动稀释前被投资企业净资产+本次外部股东对被投资企业增资额。个人理解，供参考。","cat":"企业合并","kw":"商誉,权益法","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0361","q":"购买⼦公司少数股东股权","a":"参照《监管规则适⽤指引——会计类第1号》之“1-6 同⼀控制下企业合并的会计处理”：“在同⼀控制下企业合并同时购买少数股东权益的交易中，对于少数股东作出的业绩承诺，在合并⽇的合并财务报表中，应当以公允价值进⾏初始确认并将其作为少数股东权益购买对价的⼀部分；在后续资产负债表⽇的合并财务报表中，若该或有对价属于 ⼀项⾦融⼯具，则应根据⾦融⼯具准则的相关规定，将其公允价值的后续变动计⼊当期损益。”。 据此：个人理解，供参考。","cat":"企业合并","kw":"公允价值,合并,少数股东","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0373","q":"请教陈版同⼀控制企业合并问题","a":"由于此处两项交易均发⽣在2023年内，对于A⽽⾔应作为两项同⼀控制下合并交易处理。A合并C原本就属于同⼀控制下合并，因此在A的2023年度合并报表中，应将C的全年数据完整纳⼊合并。“⽤于与A公司合并的B公司合并报表是否不需要包含1-6⽉C公司的损益数据”只是合并报表的编制技术⽅法问题，C不论是先与B合并，再作为B的 ⼀部分并⼊A，还是直接并⼊A，不应影响A的合并结果，即确保对各⼦公司“既不重复，也不遗漏”。此处两项交易整体上看就是A对B、C、D均构成同⼀控制下合并。个人理解，供参考。","cat":"企业合并","kw":"合并","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0408","q":"商誉如何处理？","a":"你的理解“A公司虽然拟注销，但A公司整体业务活动还是保留的，只不过活动从事的主体由A公司变更为母公司， 所以即使A公司注销了，在公司合并报表层⾯，当时收购A公司形成的商誉仍然存在，因为形成商誉时对应的业务活动和资产仍然存在”是合理的。 但是，当初购买⽇未识别和计量被收购⽅的可辨认⽆形资产（专利申请权），虽然当时能否成功申请专利具有不确定性，但根据《企业会计准则解释第5号》第⼀条规定，对于被收购⽅满⾜该条规定的可辨认性标准的⽆形资产， 只要公允价值能够可靠计量，就应当确认⽆形资产。由于你公司未单独确认⽆形资产，很可能少计后续的累计摊销额。对此应作为差错更正处理。个人理解，供参考。","cat":"企业合并","kw":"公允价值,商誉,合并","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0443","q":"请教陈⽼师关于外币报表折算的问题","a":"由于该境外经营⼦公司是通过⾮同⼀控制下合并被纳⼊本企业合并报表范围的，对其进⾏外币报表折算主要是为了编制合并报表的需要，故可以接受采⽤购买⽇汇率作为折算起点的做法，但该做法的前提是仅折算购买⽇后的报 表，对购买⽇之前的报表不再折算。 参阅：《中审众环研究2020》之“问题5-1-25（外币报表折算汇率问题）”。个人理解，供参考。","cat":"企业合并","kw":"合并","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0485","q":"请教关于合并报表商誉的问题","a":"在⾮同⼀控制下合并中，当被收购⽅⾃⾝报表中也存在商誉时，购买⽅在计算购买⽇应确认的商誉时，应剔除被收购⽅⾃⾝报表中原有的商誉，完全重新计算。被收购⽅⾃⾝报表中原有的商誉与购买⽅合并报表中就本次收购所确认的商誉之间没有经济上的联系。 因此，A合并报表中的商誉只包含本次A并B时在购买⽇重新计算的商誉。B⾃⾝报表中原有的商誉在A的合并报表中不体现。 提问⼈：⼆回三 时间：2024-06-26 09:27:05 那在A合并报表中，B原本的商誉是冲减未分配利润还是资本公积呢回答⼈：chenyiwei 不论哪个都可以。因为B的购买⽇的权益是不会体现在A的合并报表中的。个人理解，供参考。","cat":"企业合并","kw":"商誉,合并","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0490","q":"商誉减值⽽母公司报表长期股权投资没减值","a":"这两种情况下的减值可能是有所不同的，因此这种结果也不能说完全不可能出现。但必须对该差异作出合理解释。可参考：《中审众环研究2020》之“问题1-3-22（关于并购重组中对赌期结束减值测试中减值额如何计算的问 题）”。 提问⼈：soibook 时间：2024-06-26 15:32:49 谢谢陈⽼师，长期股权投资与商誉减值测试，都使⽤收益法或市场法，可收回⾦额涉及的都基本上是⼦公司整体， 可能有个别调整，⽐如现⾦流预测，可能有营运资⾦、税前税后的差别，但可回收⾦额基本是⼀样的，差别⼤的是账⾯价值，⼀个是长期股权投资，⼀个是商誉+长期资产，后者是变动。这个公式是不是有很⼤的参考意义。长期股权投资可收回⾦额=商誉测试时的可收回⾦额*持股⽐例？ 回答⼈：chenyiwei 这两者所依据的未来盈利预测或者现⾦流量预测在很⼤程度上是相同的，但折现率、资产组范围等⽅⾯的差异会导致最终结果不同，不⼀定成⽴你说的公式。 提问⼈：soibook 时间：2024-06-28 15:24:11 谢谢陈⽼师，那实务中，企业可以在外部评估机构出具的商誉的减值报告基础上⾃⾏调整⼀下，作为长期股权投资减值的依据吗？或者说长期资产，如固定资产、长期股权投资、商誉的减值⼀定要外部的评估才算数？毕竟商誉出现⼤额减值，⽽母公司长期股权投资不减值有点不通顺，虽然投资者看的是合并报表。 回答⼈：chenyiwei ⼀般实务中多数要求进⾏评估。个人理解，供参考。","cat":"企业合并","kw":"商誉,减值,合并,固定资产","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0491","q":"反向收购原上市公司合并报表","a":"在合并报表中，由于已经按照反向购买的原则编制，故⽆需确定法律上被购买⽅（会计上的购买⽅）的收购成本， 因为其各项资产、负债都是按原账⾯价值计量的。 在重组后上市公司的个别报表中，是按照各项被收购资产（法律上的被购买⽅）的作价⾦额（以基准⽇公允价值为基础确定）作为对其长期股权投资的⼊账价值，相应增加股本和资本公积。在会计处理⽅⾯也不会涉及复杂的投资成本分摊确定问题。个人理解，供参考。","cat":"企业合并","kw":"公允价值,合并","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0528","q":"求助陈版主：该上市公司的财务报表数据是否存疑？","a":"这种情况最⼤的可能性是2019年度内发⽣同⼀控制下企业合并，相应在2019年年报中对合并报表的前期⽐较数据进 ⾏了重述。你可以看下附注中的“合并范围的变更”“在其他主体中的权益”等部分，其中应有相应披露内容。个人理解，供参考。","cat":"企业合并","kw":"合并","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0530","q":"请教陈版及各位⽼师，关于⾮同控合并前发⽣的交易及往来余额，是否需进⾏ 合并抵消","a":"由购买⽅与被购买⽅之间的交易形成的往来款项，在购买⽇之前也是⽆需抵销的，因为的购买⽇之前，被购买⽅尚未成为购买⽅合并集团的⼀部分。但在购买⽇当天，需视同与企业合并同时发⽣了⼀项对此前形成的往来款项的结算交易，消除了购买⽅账⾯上原先对被购买⽅的应收或应付款项。该项结算交易的发⽣额为双⽅之间的债权债务于购买⽇的公允价值，所以在购买⽅合并报表中有可能要确认该项债权债务的结算损益（等于该项债权债务于购买⽇的原账⾯价值与公允价值之间的差额）。 提问⼈：jwl0102 时间：2024-07-11 10:12:36 请问陈版，对于购买⽇之前已经计提的坏账准备，在购买⽇的合并报表如何处理？个人理解，供参考。","cat":"企业合并","kw":"公允价值,合并","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"QA0065","q":"持有待售资产的分类条件是什么?","a":"CAS 42规定,同时满足两个条件才能划分为持有待售:(1)在当前状况下即可立即出售;(2)出售极可能发生(已获批准、获得确定购买承诺、预计一年内完成)。其中\"当前状况下即可立即出售\"是关键--如需完成分红、清理内部往来、剥离资产等前置程序,则不满足条件。实务中常见的问题是:已作出出售决议但尚未签署正式协议的,通常不满足第二条件。个人理解,供参考。","cat":"持有待售","kw":"分类条件,可立即出售,极可能发生,确定承诺,一年内","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第42号——持有待售的非流动资产、处置组和终止经营"},{"id":"QA0066","q":"持有待售资产的减值测试和后续转回?","a":"划分为持有待售后,减值测试方法:比较账面价值与公允价值减出售费用后的净额,差额确认减值损失。后续如公允价值减出售费用回升,在原已确认的减值范围内可转回(但商誉减值不可转回)。划分为持有待售前已确认的减值(如固定资产减值),在持有待售期间不得转回。实务中出售费用的常见项目包括:中介佣金、法律费、评估费、过户费等。个人理解,供参考。","cat":"持有待售","kw":"减值测试,公允价值减出售费用,转回,商誉,出售费用","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第42号——持有待售的非流动资产、处置组和终止经营"},{"id":"QA0067","q":"持有待售资产的列报和终止确认?","a":"持有待售资产的列报要求:(1)在资产负债表中单独列示为\"持有待售资产\"(流动资产),对应的负债列为\"持有待售负债\"(流动负债);(2)停止计提折旧或摊销;(3)不再对持有待售的长期资产进行权益法核算(在\"持有待售资产\"科目列示)。出售完成时终止确认相关资产和负债,差额计入当期损益(资产处置损益)。个人理解,供参考。","cat":"持有待售","kw":"列报,单独列示,停止折旧,流动/非流动,终止确认,处置损益","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第42号——持有待售的非流动资产、处置组和终止经营、企业会计准则第2号——长期股权投资"},{"id":"QA0068","q":"处置组划分持有待售的会计处理?","a":"当企业计划出售整个处置组(如一条业务线)时,整个处置组应整体划分为持有待售。此时:处置组中的负债应同时划分为持有待售负债;处置组中的商誉按账面价值分配至持有待售资产(不可分割)。如果持有待售的处置组构成终止经营,还应在利润表中单独列报终止经营损益,且比较期也应重述。个人理解,供参考。","cat":"持有待售","kw":"处置组,持有待售负债,商誉,终止经营,比较期,重述","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第42号——持有待售的非流动资产、处置组和终止经营"},{"id":"QA0069","q":"持有待售划分后不再满足条件的处理?","a":"如果持有待售资产在分类后不再满足持有待售条件(如出售计划取消),应终止划分为持有待售,并对该资产以以下两者中较低者计量:(1)假设从未划分为持有待售情况下的账面价值(按原折旧/摊销政策计算的金额);(2)可收回金额。两者差额计入当期损益。因为持有待售期间不计提折旧,重新分类后需补提该期间应计的折旧/摊销。个人理解,供参考。","cat":"持有待售","kw":"划分取消,转回,可收回金额,账面价值,补提折旧,当期损益","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第42号——持有待售的非流动资产、处置组和终止经营"},{"id":"QA0070","q":"借款费用资本化的开始、暂停和停止条件?","a":"CAS 17规定的借款费用资本化期间:(1)开始日--同时满足资产支出已发生、借款费用已发生、购建活动已开始;(2)暂停--非正常中断连续超过3个月(如工程纠纷、资金短缺、安全事故)暂停资本化,正常中断(如天气、法定假日)不停;(3)停止日--资产达到预定可使用或可销售状态时停止。注意:所购建固定资产的各部分分别完工且可单独使用的,每一部分达到预定可使用状态时即停止该部分的借款费用资本化。个人理解,供参考。","cat":"借款费用","kw":"资本化,开始,暂停,停止,非正常中断,预定可使用状态","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第17号——借款费用"},{"id":"QA0071","q":"专门借款和一般借款的资本化金额计算区别?","a":"专门借款和一般借款资本化的计算完全不同:(1)专门借款--按实际发生利息费用减去闲置资金投资收益后的余额计算(金额即为资本化额,不受借款使用比例限制);(2)一般借款--按累计资产支出超过专门借款部分的加权平均数乘以所占用一般借款的加权平均资本化率计算。实务中易错点:一般借款必须实际占用才能资本化,不能将尚未动用的一般借款计入资本化基数。个人理解,供参考。","cat":"借款费用","kw":"专门借款,一般借款,资本化率,资产支出加权平均数,闲置资金","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第17号——借款费用"},{"id":"QA0072","q":"借款辅助费用是否可以资本化?","a":"借款的辅助费用(如手续费、佣金、律师费、评估费等)的处理分两类:(1)为购建符合资本化条件的资产而借入专门借款发生的辅助费用--在所购建资产达到预定可使用状态前,予以资本化;(2)一般借款发生的辅助费用--费用化计入当期损益(因为难以分配至具体资产)。这与借款利息的专门/一般分类逻辑一致。个人理解,供参考。","cat":"借款费用","kw":"辅助费用,手续费,资本化,费用化,专门借款,一般借款","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第17号——借款费用"},{"id":"QA0073","q":"外币专门借款汇兑差额是否资本化?","a":"CAS 17规定,外币专门借款本金及利息的汇兑差额在资本化期间内可以资本化。但仅限于外币专门借款(而非一般借款)。若外币借款是一般借款,汇兑差额只能费用化计入财务费用。资本化的汇兑差额是外币借款由于汇率变动产生的差额,性质上属于借款费用的一部分。资本化金额以当期实际发生的汇兑差额为限,不能预计。个人理解,供参考。","cat":"借款费用","kw":"外币借款,汇兑差额,专门借款,资本化,一般借款,费用化","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第17号——借款费用"},{"id":"QA0074","q":"企业集团内部借款的资本化处理?","a":"集团内部借款在合并层面需要抵销,但如借款资金实际用于子公司的资产购建:(1)子公司个别报表层面--按实际付息金额计算资本化金额;(2)合并报表层面--内部借贷利息抵销后,合并层面以集团从外部借款的实际利率为基准计算资本化额。实务中需要集团做好资金台账管理,分别核算内部借款和外部借款的资本化金额。个人理解,供参考。","cat":"借款费用","kw":"内部借款,合并报表,抵销,外部借款,资金台账,资本化率","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第17号——借款费用"},{"id":"CY0089","q":"评估增值的摊销","a":"如果⼟地是作为⼀个整体评估的，办公⽤地和⽣产⽤地的单位⾯积账⾯价值、单位⾯积评估值都相同，则如你所 述“评估增值部分也按照账⾯摊销⼜径分别计⼊管理⽤和制造费⽤”，即评估增值部分也需要在剩余⼟地使⽤年限内摊销，摊销额按2：8的⽐例分别计⼊管理费⽤和制造费⽤（或营业成本）。个人理解，供参考。","cat":"无形资产","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0091","q":"【请教陈版】企业官⽹是否能够作为⽆形资产？","a":"IFRS下有⼀个解释公告SIC-32《⽆形资产：⽹站成本》，其原理是对⾃建⽹站的成本按照⽆形资产准则中的研究开发模式进⾏会计处理。可对照该解释公告确定是否符合资本化条件、何时可以开始资本化、哪些⽀出可以资本化等问题。个人理解，供参考。","cat":"无形资产","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0112","q":"关于季节性⾷品加⼯期间⼟地使⽤权摊销计⼊哪类费⽤科⽬的问题？","a":"参照四部委2022年年报⼯作通知（财会[2022]32号），对于⼚区内⼟地使⽤权和⼚房停⼯期间的折旧和摊销，应直接计⼊营业成本处理。个人理解，供参考。","cat":"无形资产","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0116","q":"关于合作研发经费的会计处理","a":"仅仅依据知识产权归属的约定，缺乏具体的背景信息和收益分享的具体安排，⽆法判断哪⼀⽅主导该合作研发项 ⽬，以及谁可以控制该研发成果，故⽆法确定应采⽤何种会计处理模式。 建议先对照《监管规则适⽤指引——会计类第2号》之“2-8 定制化产品相关研发⽀出的会计处理”考虑应采⽤会计处理模式，如仍不清晰的，可提供进⼀步背景信息来讨论。 需要重点考虑的因素：个人理解，供参考。","cat":"无形资产","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0142","q":"求教陈版，关于研发⽀出披露疑问","a":"我理解对外销售的样机等试制产品的成本也属于该部分规定的资本化开发⽀出范围，通过“本年减少——转⼊当期损益”⼀列转出。个人理解，供参考。","cat":"无形资产","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0276","q":"关于股票期权股份⽀付本期⾏权⾦额应该如何披露","a":"个⼈理解，上市公司附注的“股份⽀付”部分中“各项权益⼯具情况”中的“本年⾏权”的⾦额应按当初授予⽇公允价值计算，即等待期内累计计⼊股份⽀付相关成本费⽤的⾦额。个人理解，供参考。","cat":"股份支付","kw":"公允价值","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0345","q":"求助陈版主，取消股权激励的资本公积能否转⼊未分配利润","a":"不可以，由股权激励形成的资本公积属于资本性投⼊性质，会计上在等待期内暂时列⼊其他资本公积。没有等待期的，或者等待期已满的资本公积（其他资本公积）可以转⼊资本溢价，⽤于转增资本。但不能直接转回未分配利 润。个人理解，供参考。","cat":"股份支付","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0374","q":"期权价格股份⽀付价格","a":"考虑此前的⾃测结果与后续评估结果差异较⼤的原因（例如当初⾃测使⽤的模型和参数是否明显不当），判断是否属于前期差错。 参考：《监管规则适⽤指引——会计类第1号》之“1-24 区分会计估计变更和差错更正”： 企业不应简单将会计估计与实际结果对⽐认定存在差错。如果企业前期作出会计估计时，未能合理使⽤报表编报时已经存在且能够取得的可靠信息，导致前期会计估计结果未恰当反映当时情况，则应属于前期差错，应当适⽤前期差错更正的会计处理⽅法；反之，如果企业前期的会计估计是以当时存在且预期能够取得的可靠信息为基础作出的，随后因资产和负债的当前状况及预期经济利益和义务发⽣了变化⽽变更会计估计的，则属于会计估计变更，应当适⽤会计估计变更的会计处理⽅法。个人理解，供参考。","cat":"股份支付","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0382","q":"请教陈版主限制性股票问题","a":"在现⾦分红可撤销的情况下，不论预计未来能否解锁，在计提分红款时，都需要借记“其他应付款——限制性股票回购义务”，也就是减少了⽇后回购时应⽀付的价款。如果后续未解锁，则按照减少后的“其他应付款——限制性股票回购义务”余额⽀付回购款，借记“其他应付款——限制性股票回购义务”，贷记银⾏存款；将回购后的股份注销 时，借记股本，贷记库存股，差额借记“资本公积——股本溢价”。个人理解，供参考。","cat":"股份支付","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0461","q":"求教陈版，股权激励期间离职⼈员激励费⽤的分摊","a":"应采⽤主帖中的“观点三”，即视同⼀次授予、分期解锁的股份⽀付处理。个人理解，供参考。","cat":"股份支付","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0403","q":"孵化园免除孵化期间的场地使⽤费并获得优先跟投权的账务处理问题","a":"个⼈理解，⾸先要明确该交易的经济实质，是完全公允的商业交易，还是包含了政府补助（A公司背后的政府单 位）因素。包括：“A公司于被审计单位⼊孵当年通过股权转让⽅式⾃⽼股东处获取被审计单位1%的股权”这⼀价格是否公允，与免除的场地使⽤费是否相当？提供给A公司的优先跟投权的公允价值多⼤（个⼈理解，如果就按照最新⼀轮的估值跟投，则该优先权的公允价值不⼤）？ 另外，对场地使⽤费的免除，能否直接界定为权益性交易，也可能存在疑问。虽然A公司持有被审计单位的少量股份（包括⼊驻时取得的1%股权和后续通过跟投取得的股权），但A公司更多地是财务投资⼈，其提供场地使⽤费 减免更多地是基于其作为政府下属单位和孵化园运营单位的⾝份，因此对于减免的场地使⽤费等计⼊资本公积的依据可能不⾜。 实务中可基于重要性原则和成本效益原则确定能否接受简化处理。个人理解，供参考。","cat":"政府补助","kw":"公允价值","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0416","q":"投资性房地产计量模式变更涉及到的递延收益摊销问题","a":"如果单纯考虑核算⽅式转换时的处理问题，则此时的递延收益应当是全部转⼊损益（需追溯调整前期）。这⾥参照了IAS 41对于“与以公允价值计量的⽣物资产相关的政府补助”的会计处理原则，即收到时直接计⼊损益。个人理解，供参考。","cat":"政府补助","kw":"公允价值,递延","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0456","q":"⼯会经费返还是政府补助吗，算⾮经吗？","a":"需⾸先确定返还的理由、资⾦来源（谁给予的、资⾦来源是什么），返还到企业账还是⼯会账、具体⽤途要求等。这些问题确定之后才能判断。个人理解，供参考。","cat":"政府补助","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0486","q":"求教陈版，公司与医院合作成⽴科研创新中⼼的会计处理","a":"该科研创新中⼼的实质是什么？是否实质上是⼄⽅（公司）部分研发环节（如临床试验）的外包？或者作为推⼴⼄ ⽅产品的渠道？其研发课题的制定是否由⼄⽅根据其⽣产经营需要来主导，研发成果是否主要供⼄⽅使⽤？ 如果上述假设符合事实，则⼄⽅（公司）应将该科创中⼼视为其⼀个研发部门来进⾏相应的会计处理。⼄⽅拨付给该中⼼的经费应按⼀定的系统、合理的⽅法分配到该中⼼的各研发项⽬，列⼊研发⽀出；取得卫健委拨付（经医院转⼿）的补助，作为与研发项⽬相关的政府补助处理。个人理解，供参考。","cat":"政府补助","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0186","q":"回购义务在什么时候调整","a":"可以这样理解：仍列报为库存股。虽然已经确定需要回购，但由于未经董事会审批及中登登记等程序，第⼀期的回购义务期末是否仍确认在其他应付款中。个人理解，供参考。","cat":"报表列报","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0200","q":"应付票据转应付账款","a":"没有专门规定，实务中也很少见到此类业务。如果应付票据到期⽆⼒兑付，⼀般仍在应付票据中核算，但需在附注中披露逾期情况。个人理解，供参考。","cat":"报表列报","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0211","q":"求助，第16号解释第⼀条，财务报表列报最早期间的期初是指哪⼀年？","a":"因为常规年报只列⽰上⼀年度和本年年初的⽐较数据，所以“企业会计准则解释第16号提到的财务报表列报最早期间的期初”是指2022年1⽉1⽇，即⽐较期间的期初。 如果是IPO三年⼀期申报报表等多期报表，则为最早列报期间的期初，例如以2021-2023三年数据申报IPO，则“企业会计准则解释第16号提到的财务报表列报最早期间的期初”是指2021年1⽉1⽇。个人理解，供参考。","cat":"报表列报","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0062","q":"求助陈版","a":"如果在资产负债表⽇或之前，已就“公司与全国性经销商拟于次年初停⽌合作，且不会发⽣⽆偿换货情形”予以明 确，则应根据变化后的基础信息为依据确认和计量期末的预计负债，⽽不应再沿⽤此前的⽅式。由此导致的变化作为会计估计变更处理。 提问⼈：你忒杀阿 时间：2024-08-15 19:14:38 A公司为境内母公司，以⼈民币为记账本位币，设⽴境外⼦公司B，B以欧元为记账本位币，先A公司销售产品给B，再由B对外销售，资产负债表⽇，A公司编制合并报表，在抵消内部交易时，假设期末不存在内部未实现损 益，在合并抵消时,抵消A公司对B的销售收⼊，以及B公司对外的销售成本，但B公司是境外⼦公司，基于合并报 表编制时利润表将按照平均汇率折算，此时抵消A公司的收⼊与B公司成本时将会存在差异，该部分抵消差异作为 外币报表折算差记⼊其他综合收益，问题：该部分内部交易抵消的差额会影响合并的利润，在测算所得税时是否考虑确认递延所得税资产，若基于外币报表折算差⼀般对所得税⽆影响的前提下，该部分是否在合并所得税勾稽表格中调整“按法定/适⽤税率计算的所得税费⽤” 回答⼈：chenyiwei ⾸先，“在抵消内部交易时，假设期末不存在内部未实现损益，在合并抵消时,抵消A公司对B的销售收⼊，以及B公司对外的销售成本”的理解是错误的。在合并抵销内部交易时，需抵销的是A对B的销售收⼊、A对B的销售成本， 以及B对外销售成本中所包含的内部交易利润。 其次，因B与A的记账本位币不同，导致B的成本（折算到⼈民币后）的⾦额可能受到外币折算差额的影响。但外 币折算差额⼀般⽆对应的递延所得税影响，故⽆需特别考虑。可以在合并所得税勾稽表格中作为“其他”项⽬调整其影响。 提问⼈：w451386810 时间：2024-08-30 11:53:48 求助陈版：本公司与其他公司成⽴了⼀家担保公司，并实际缴纳出资；担保公司在运营⼀段时间后决定注销，并将之前各股东的出资款归还；但现在由于⼀项担保业务仍存在纠纷，故⽽担保公司未能实际注销。 ⽬前本公司针对上述情况的账务处理是： 借：其他⾮流动⾦融资产 贷：其他应付款 请教陈版：上述账务处理是否合适？长期不能注销的话，是否存在股东抽逃资⾦的风险？后续如何处理合适？ 回答⼈：chenyiwei 由于被投资公司尚未注销，故原先的长期股权投资仍继续保留（可能需要对其计提减值）。如果投资款已经收回的，则建议象征性保留1元账⾯价值。 对于该项尚未解决的纠纷，应关注对本企业作为该担保公司股东的可能影响，如果本企业需要出资赔偿的，则谨慎评估确认预计负债。 根据《公司法》第256条：“公司在进⾏清算时，隐匿财产，对资产负债表或者财产清单作虚假记载，或者在未清偿债务前分配公司财产的，由公司登记机关责令改正，对公司处以隐匿财产或者未清偿债务前分配公司财产⾦额百分之五以上百分之⼗以下的罚款；对直接负责的主管⼈员和其他直接责任⼈员处以⼀万元以上⼗万元以下的罚款”。 因此在担保纠纷解决之前分配财产给股东，可能存在被处罚的风险。个人理解，供参考。","cat":"合并报表","kw":"减值,合并,所得税,递延,预计负债","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0067","q":"关于母公司代⼦公司发放⼯资的现⾦流","a":"母公司个别报表层⾯：⽀付的其他与经营活动有关的现⾦。与之相对应，相关负债余额应列报为其他应付款或者其他流动负债。 合并报表层⾯：⽀付给职⼯以及为职⼯⽀付的现⾦。与之相对应，相关负债余额应调整到应付职⼯薪酬。个人理解，供参考。","cat":"合并报表","kw":"合并","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY1015","q":"矿⼭复垦义务增加，原确认的预计负债应当如何处理？","a":"此问题中，针对原已确认复垦义务的开采⾯积重新编制复垦⽅案，由此导致预计负债需重新测算，可按照《企业会计准则解释第6号》第⼀条规定处理。 ⼀、企业因固定资产弃置费⽤确认的预计负债发⽣变动的，应当如何进⾏会计处理？ 答：企业应当进⼀步规范关于固定资产弃置费⽤的会计核算，根据《企业会计准则第4号——固定资产》应⽤指南的规定，对固定资产的弃置费⽤进⾏会计处理。 本解释所称的弃置费⽤形成的预计负债在确认后，按照实际利率法计算的利息费⽤应当确认为财务费⽤；由于技术进步、法律要求或市场环境变化等原因，特定固定资产的履⾏弃置义务可能发⽣⽀出⾦额、预计弃置时点、折现率等变动⽽引起的预计负债变动，应按照以下原则调整该固定资产的成本： 对于预计负债的减少，以该固定资产账⾯价值为限扣减固定资产成本。如果预计负债的减少额超过该固定资产账⾯价值，超出部分确认为当期损益。 对于预计负债的增加，增加该固定资产的成本。 按照上述原则调整的固定资产，在资产剩余使⽤年限内计提折旧。⼀旦该固定资产的使⽤寿命结束，预计负债的所有后续变动应在发⽣时确认为损益。个人理解，供参考。","cat":"或有事项","kw":"预计负债,固定资产","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY1219","q":"企业会计准则解释第18号","a":"可以这样理解。这个问题的关键是将保证性质保相关费⽤由销售费⽤调整到营业成本核算和列报，⽽不论其是否通过预计负债计提核算。个人理解，供参考。","cat":"或有事项","kw":"预计负债","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY1222","q":"售后维修时退下来的零部件⼊库该如何做账？","a":"⾸先，售后保证性质保性质的维修⽀出，现在规定是计⼊营业成本⽽不是销售费⽤。 这部分尚可使⽤的零部件按预计的可变现净值⼊账原材料（扣除预计修复费⽤），对应贷记营业成本（保证性质保费⽤）。如果此前就保证性质保义务确认了预计负债，发⽣维修⽀出时从预计负债中列⽀的，则收回可使⽤的零部件时，按其⼊账价值贷记预计负债。个人理解，供参考。","cat":"或有事项","kw":"预计负债","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY1470","q":"请教陈版，BOT后续修理⽀出的处理","a":"在⽆形资产模式下，对于不单独向政府或使⽤者收费的基础设施维护、更新⽀出，应参照财政部会计司发布的PPP⽆形资产模式案例中对于⾼速公路的“路⾯翻修义务”的处理⽅式，在运营期内基础设施的使⽤期间内，在两次⼤修或更新的间隔期内逐年计提预计负债，以及就已计提的部分确认利息⽀出。 如果是⾦额较⼩、发⽣频率较⾼的中⼩修理，尤其是周期的⼀年内的⽇常维护修理，⼀般在发⽣时直接将其⽀出计⼊营业成本处理。不能在运营初期⼀次性提⾜该类预计负债。个人理解，供参考。","cat":"或有事项","kw":"预计负债","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY1490","q":"存放在加⼯⼚的货物被处置","a":"该项赔偿要求属于企业的或有资产，即“去的交易或者事项形成的潜在资产，其存在须通过未来不确定事项的发⽣或不发⽣予以证实”，因此不应确认。但对于已发⽣的资产损失应及时予以确认。 后续随着上述不确定性的消失，例如法院判决确认了本企业该项求偿权的有效性，⽅可作为其他应收款予以确认。 另外，根据或有事项准则规定，企业通常不应当披露或有资产。但或有资产很可能会给企业带来经济利益的，应当披露其形成的原因、预计产⽣的财务影响等。个人理解，供参考。","cat":"或有事项","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0573","q":"有限合伙企业和关联⽅共同投资","a":"虽然合作投资⽅是LP，法律上LP不能执⾏合伙事务，但LP仍可能对合伙企业具有控制、共同控制或者重⼤影响。如果该合作投资的LP对合伙企业具有控制、共同控制或者重⼤影响的，则为关联交易。个人理解，供参考。","cat":"关联方披露","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0753","q":"求助陈版主帮忙解答上市公司股权⾮关联⽅赠予问题","a":"关键是：这个赠送的背后商业逻辑和理由是什么？是否属于关联交易⾮关联化？ 如果⽆法给出合理（符合通常的商业逻辑和商业常识）的解释和理由，则审计师可能需以审计范围受限为由，对该上市公司的报表发表保留意见或者⽆法表⽰意见。个人理解，供参考。","cat":"关联方披露","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY0858","q":"[求助] 请教陈版主：母公司资⾦归集户是否造成对⼦公司的抽逃出资","a":"根据“最⾼⼈民法院关于适⽤《中华⼈民共和国公司法》若⼲问题的规定（三）（2014年修正）”（法释[2014]2 号）第⼗⼆条：公司成⽴后，公司、股东或者公司债权⼈以相关股东的⾏为符合下列情形之⼀且损害公司权益为由，请求认定该股东抽逃出资的，⼈民法院应予⽀持： (⼀)制作虚假财务会计报表虚增利润进⾏分配； (⼆)通过虚构债权债务关系将其出资转出； (三)利⽤关联交易将出资转出； (四)其他未经法定程序将出资抽回的⾏为。 在本案例中，A公司利⽤资⾦归集操作，事实上将同⼀笔款项对⼦公司出资两次，有可能被认定为未⾜额实缴出 资，或者出资抽逃⾏为。建议与有关领域内的专业⼈⼠和政府部门沟通确认。 税务问题建议咨询税务专业⼈⼠意见。个人理解，供参考。","cat":"关联方披露","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"CY1371","q":"请教陈版，是否属于重⼤错报？","a":"考虑以下因素：（1）甲公司和⼄公司之间、他们与本企业之间分别是什么关系？是否存在关联⽅关系？（2）是否存在可能导致本企业对⼄公司的应付款具有敏感性和市场关注信息的因素？ ⼀般理解，因为重⼤错报的判断需考虑定性和定量两个因素。明细科⽬的区分从定量⻆度⽽⾔⼀般影响是不重⼤的，但需要考虑从定性⻆度⽽⾔是否存在导致其重⼤、敏感的因素。提问⼈：gpqg 时间：2025-05-08 23:15:41 陈版，您所说的「需要考虑从定性⻆度⽽⾔是否存在导致其重⼤、敏感的因素」，这⾥的重⼤ 敏感因素指的是什么呢？ 谢谢陈版！ 回答⼈：chenyiwei 就是是否涉及关联交易、资⾦占⽤等监管关注问题。个人理解，供参考。","cat":"关联方披露","kw":"","src":"陈奕蔚 会计视野论坛答疑","std_ref":""},{"id":"QA0103","q":"基本每股收益和稀释每股收益的计算差异?","a":"基本EPS=归属于普通股股东的净利润/发行在外普通股的加权平均数。稀释EPS在基本EPS基础上:(1)分母调整--加上假设稀释性潜在普通股(如可转债、认股权证、股票期权)全部转换为普通股的增量股数;(2)分子调整--加上假设转换后节省的利息费用(税后)。稀释性判断:潜在普通股具有稀释性(而非反稀释性)时才纳入稀释EPS计算。个人理解,供参考。","cat":"每股收益","kw":"基本每股收益,稀释每股收益,加权平均,潜在普通股,可转债,认股权证,稀释性","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第34号——每股收益"},{"id":"QA0104","q":"发行新股、配股和送股对每股收益的影响?","a":"不同资本变动对EPS的影响:(1)发行新股--自发行日起加权计入分母;(2)配股--含红股和配股因素,需计算理论除权价格后调整比较期;(3)股票股利、股票分拆--对所有列报期进行追溯调整,视同该变动在最早列报期初已发生;(4)资本公积转增股本--同上,追溯调整。原因是股利和分拆不改变企业的资源总量,追溯调整保证可比性。个人理解,供参考。","cat":"每股收益","kw":"新股发行,配股,股票股利,股票分拆,追溯调整,加权平均,除权","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第34号——每股收益"},{"id":"QA0105","q":"库存股对每股收益的影响?","a":"库存股(企业回购自身股份):(1)基本EPS分母需扣除库存股加权平均数--回购后分母=总股数-库存股加权平均数;(2)库存股不享有股息和表决权;(3)库存股重新发行时自发行日起加权计入分母;(4)稀释EPS中,库存股不作为潜在普通股处理。如果企业用借款大量回购,分母减少提升EPS,但同时增加财务风险,需全面评估经济实质。个人理解,供参考。","cat":"每股收益","kw":"库存股,回购,加权平均,分母,基本EPS,稀释EPS,财务风险","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第34号——每股收益"},{"id":"QA0106","q":"稀释每股收益的计算顺序?","a":"多种潜在普通股并存时,需按稀释程度从大到小的顺序逐一计入稀释EPS计算。稀释程度=增量股每股收益=增量净利润/增量股数(增量股数越小越稀释)。反稀释性的潜在普通股(增加EPS)不得计入。步骤:(1)单独计算每种潜在普通股的增量EPS;(2)按增量EPS从小到大排序(从最稀释到最不稀释);(3)逐次加入计算,直至出现反稀释。个人理解,供参考。","cat":"每股收益","kw":"稀释顺序,增量股,反稀释,排序,多种潜在普通股,计算步骤","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第34号——每股收益"},{"id":"QA0107","q":"每股收益在合并报表中的计算?","a":"合并报表中的每股收益:(1)分子--合并净利润扣除归属于少数股东的损益(归属于母公司普通股股东的净利润);(2)分母--母公司发行在外普通股的加权平均数(不被子公司的股权结构影响);(3)子公司、合营企业、联营企业发行的潜在普通股,如可行权可转换母公司普通股,计入稀释EPS。计算合并每股收益时,不调整归属于少数股东的净利润。个人理解,供参考。","cat":"每股收益","kw":"合并报表,少数股东,加权平均,母公司普通股,子公司潜在普通股,稀释","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第34号——每股收益、企业会计准则第33号——合并财务报表"},{"id":"QA0108","q":"会计政策变更和会计估计变更的区分?","a":"两者的区分影响变更的会计处理方法(追溯调整vs未来适用法):(1)政策变更--对同一交易采用不同的会计处理方法(如折旧方法从直线法改为双倍余额递减法、存货计价从先进先出改为加权平均);(2)估计变更--对原有估计进行修正(如折旧年限、坏账率、退货率、资产使用寿命)。实务中,改变折旧方法是政策变更,改变折旧年限是估计变更。个人理解,供参考。","cat":"政策/估计变更","kw":"会计政策变更,会计估计变更,追溯调整法,未来适用法,折旧方法,折旧年限","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第28号——会计政策、会计估计变更和差错更正"},{"id":"QA0109","q":"会计政策变更的追溯调整法如何操作?","a":"追溯调整法的步骤:(1)计算政策变更对列报前期最早期初留存收益的累计影响数;(2)编制调整分录(调整相关资产/负债和留存收益);(3)对比较期间的财务报表进行重述(视同新政策从一开始就使用);(4)附注中披露变更原因、影响金额和调整过程。追溯调整不调整以前年度的原始报表(仅调整可比期间的比较数据)。重大政策变更需经董事会或股东大会审议。个人理解,供参考。","cat":"政策/估计变更","kw":"追溯调整法,累计影响数,留存收益,调整分录,比较期,重述,附注披露","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第28号——会计政策、会计估计变更和差错更正"},{"id":"QA0110","q":"会计估计变更的未来适用法处理?","a":"会计估计变更采用未来适用法,不需追溯调整:(1)自变更日起按新估计处理;(2)不调整以前期间的财务报表;(3)变更的影响在当期和未来期间确认。例如:应收账款坏账率从5%调整为3%,影响当期坏账费用--不追溯调整已结账的以前期间。实务中注意:应区分是真正的估计变更还是前期差错更正(如果是对前期错误的修正)。个人理解,供参考。","cat":"政策/估计变更","kw":"未来适用法,估计变更,坏账率,折旧年限,当期影响,前期差错,区分","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第28号——会计政策、会计估计变更和差错更正"},{"id":"QA0111","q":"前期差错更正的追溯重述法?","a":"重要的前期差错应采用追溯重述法更正:(1)重述差错发生期间的财务报表(视同差错从未发生);(2)调整该期间的留存收益期初余额及相关资产/负债项目;(3)重述列报前期最早期初的留存收益。不重要的前期差错可直接调整发现当期损益。\"重要性\"的判断标准:差错金额是否影响报表使用者的经济决策。实务中,补提减值准备等常见事项往往涉及前期差错更正。个人理解,供参考。","cat":"政策/估计变更","kw":"前期差错,追溯重述法,重要性,留存收益,比较期,补提,减值准备","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第28号——会计政策、会计估计变更和差错更正"},{"id":"QA0112","q":"滥用会计政策变更的后果?","a":"如果企业滥用会计政策变更(如为操纵利润而频繁变更折旧方法、收入确认方法等),监管机关和审计师的处理:(1)认定为会计差错,要求按重大前期差错更正处理(追溯重述);(2)不能适用\"会计政策变更\"的未来适用法或追溯调整法;(3)可能需要发布前期差错更正公告并接受监管问询;(4)审计报告可能增加强调事项段甚至影响审计意见。实务中,监管对会计政策变更的合理性审查日趋严格。个人理解,供参考。","cat":"政策/估计变更","kw":"滥用,会计差错,前期差错更正,追溯重述,监管问询,操纵利润,审计意见","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第28号——会计政策、会计估计变更和差错更正"},{"i
