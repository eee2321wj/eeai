险公司赔偿跨期，账务怎么处理？","a":"“往年份，我们存货损毁的损失就确认在发⽣当年，次年收到保险赔偿再确认营业外收⼊”这个处理是合理的。存货毁损的损失和获得损害赔偿这两者不需要配⽐。1、损失在实际发⽣时即应确认，计⼊⾃然灾害发⽣年度的营业外⽀出。个人理解，供参考。","cat":"存货","kw":"存货意外损毁,保险公司赔偿跨期,账务怎么处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第1号——存货"},{"id":"CY0431","q":"存货核算","a":"按照两者的公允价值（单独售价）⽐例分摊发票总额。对于分配给B赠品的⾦额，由于该赠品只能⽤于招待赠送⽤途，故直接计⼊销售费⽤，不作为存货核算（但需注意账外备查登记，加强实物管理）。个人理解，供参考。","cat":"存货","kw":"公允价值,存货核算","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第1号——存货"},{"id":"CY1000","q":"已经发出的存货未结转成本前是不是还要继续参与库存计价","a":"发出商品的成本在其出库时确定，后续不再调整。不在库的发出商品不再参与期末库存成本的计算。个人理解，供参考。","cat":"存货","kw":"已经发出的存货未结转成本前是不是还要继续参与库存计价","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第1号——存货"},{"id":"CY0639","q":"独⽴选址的住房","a":"个⼈理解可以作为存货核算（包括在政府会计体系下）。个人理解，供参考。","cat":"存货","kw":"独⽴选址的住房","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第1号——存货"},{"id":"CY0340","q":"协会净资产是负数，需要考虑待续经营吗？","a":"《民间⾮营利组织会计制度》第三条：“⾮营利组织的会计核算应当以持续、正常的业务活动为前提”，因此也是需要考虑持续经营（运营）问题的。 《中国注册会计师审计准则第1324号——持续经营》第四条：其他财务报告编制基础可能没有明确要求管理层对持续经营能⼒作出专门评估。然⽽，如本准则第⼆条所述，如果持续经营假设是编制财务报表的基本原则，即使其他财务报告编制基础没有对此作出明确规定，管理层也需要在编制财务报表时评估持续经营能⼒。 《〈中国注册会计师审计准则第1324号——持续经营〉应⽤指南》第2条： 对公共部门实体的特殊考虑 2．在公共部门实体，管理层同样需要运⽤持续经营假设。例如，《国际公共部门会计准则第1号——财务报表列 报》规范了有关公共部门实体持续经营能⼒的问题。持续经营风险可能主要源于以下情况（包括但不限于）：公共部门实体以营利为基础经营、政府的⽀持可能减少或撤销或者使公共部门实体私有化。可能导致对公共部门实体持续经营能⼒产⽣重⼤疑虑的事项或情况，可能包括公共部门实体缺乏继续存在所需的资⾦或出台影响公共部门实体所提供服务的政策。个人理解，供参考。","cat":"审计实务","kw":"协会净资产是负数,需要考虑待续经营吗","src":"陈奕蔚 会计视野论坛答疑","std_ref":"中国注册会计师审计准则"},{"id":"CY0614","q":"发⾏债券的现⾦流","a":"根据《应⽤指南汇编2024》中“现⾦流量表”⼀章：（原书P1231、1232）： ( 1) 吸收投资收到的现⾦。 本项⽬反映企业以发⾏股票等⽅式筹集资⾦实际收到的款项净额（发⾏收⼊减去⽀付的佣⾦等发⾏费⽤后的净额） 。以发⾏股票等⽅式筹集资⾦⽽由企业直接⽀付的审计、咨询等费⽤，在“⽀付其他与筹资活动有关的现⾦”项⽬中反映。本项⽬可以根据“实收资本（或股本）”、“资本公积”、“其他权益⼯具”、“库存现⾦” 、“ 银⾏存款”等科⽬的记录分析填列。 2. 取得借款收到的现⾦。 本项⽬反映企业举借各种短期、长期借款⽽收到的现⾦，以及发⾏债券实际收到的款项净额（发⾏收⼊减去直接⽀付的佣⾦等发⾏费⽤后的净额） 。本项⽬可以根据“短期借款”、“长期借款”、“交易性⾦融负债” 、“应付债券”、 “库存现⾦”、“银⾏存款”等科⽬的记录分析填列。 所以发⾏债券收到的现⾦应填列在“取得借款收到的现⾦”项⽬内。个人理解，供参考。","cat":"审计实务","kw":"发⾏债券的现⾦流","src":"陈奕蔚 会计视野论坛答疑","std_ref":"中国注册会计师审计准则"},{"id":"CY1713","q":"审计意⻅中是否可以包含财务情况说明书？","a":"中注协发布的《⾼新技术企业认定专项审计指引》（会协[2008]83号）中并未提及财务情况说明书。即财务情况说明书不属于发表审计意⻅的范围。 但财务情况说明书也不属于《中国注册会计师审计准则第1521号——注册会计师对其他信息的责任》中所定义的“其他信息”，该准则第⼗⼀条规定，“是指在被审计单位年度报告中包含的除财务报表和审计报告以外的财务信息和⾮财务信息”，且中注协发布的《中国注册会计师审计准则问题解答第15号——其他信息》也明确指出“IPO公司的招股说明书不适⽤其他信息准则的规 定”。参照该规定，⾼新技术企业申请⼈的财务情况说明书不属于1521号审计准则定义的其他信息，在审计报告中⽆需提及。但仍需根据监管机构要求执⾏相应的⼯作，并将执⾏该等⼯作的情况记录于审计⼯作底稿中。个人理解，供参考。","cat":"审计实务","kw":"审计意⻅中是否可以包含财务情况说明书","src":"陈奕蔚 会计视野论坛答疑","std_ref":"中国注册会计师审计准则"},{"id":"CY0613","q":"⼆级市场股票交易","a":"对于⼀般的A股股票⽽⾔，交易对象⾃然直接是上市公司的股票。上市公司的股东每天都在变化，在完成标的股票在买卖双⽅之间的交割之后，由证券登记结算公司更新股东名册记录。 某些特殊情形（如境外公司在境内交易所的间接上市）的交易表的可能不直接是境外上市公司的股票，⽽是存托凭证等间接表明其股权的⼯具。此时的股东⾝份证明、股东权利⾏使、分红派息等可能有特殊的安排。 提问⼈：lee11111 时间：2024-07-29 16:17:18 感谢陈⽼师回复，上市公司的股东每天都在变化涉及⼯商信息变更么，股东每天变化⼯商登记的股权⽐例不是就不准确了，会影响审计报告披露的持股⽐例么 回答⼈：chenyiwei 股份有限公司的股东不属于⼯商登记范围，故不涉及⼯商变更。个人理解，供参考。","cat":"审计实务","kw":"⼆级市场股票交易","src":"陈奕蔚 会计视野论坛答疑","std_ref":"中国注册会计师审计准则"},{"id":"CY1613","q":"账龄1年以内占⽐99以上，如何计算预期信⽤损失率。","a":"实务中对于此类情况，为了避免引起监管或市场的不必要关注，⼀般就沿⽤原准则下的固定⽐例计提坏账准备，确保执⾏新⾦融⼯具准则后的坏账准备计提⽔平不低于原准则下。提问⼈：leo230207 时间：2025-08-09 19:25:36 ⾮常感谢您。另外想请问下，能否采⽤细化账龄分段，⽐如将账龄划分0-3个⽉、3-6个⽉、6-12个⽉、1年以上等账龄分段，按0-3个⽉迁徙⾄3-6个⽉、3-6个⽉迁徙⾄6-12个⽉、6-12个⽉迁徙⾄1年以上的⽅式计算迁徙率，以此计算预期信⽤损失率？期待您的回复。 回答⼈：chenyiwei 也可以。只要基础数据和内控能⽀持持续提供稳定可靠的基础数据。个人理解，供参考。","cat":"审计实务","kw":"请教陈版主,账龄1年以内占⽐99以上,如何计算预期信⽤损失率","src":"陈奕蔚 会计视野论坛答疑","std_ref":"中国注册会计师审计准则"},{"id":"CY1064","q":"⾮标意⻅类型","a":"如果已获得的审计证据表明持续经营假设的应⽤是不恰当的，但仍按持续经营假设编制报表，则应出具否定意⻅⽽不是⽆法表示意⻅或者保留意⻅。实务中持续经营假设的保留意⻅，⼀般仅限于：持续经营假设的应⽤本身是合理的，但对于相关的不确定性和改善措施的披露不充分。 如果依据现有审计证据⽆法判断持续经营假设是否恰当，则应提请管理层作出评估或延⻓评估期间，相应提供进⼀步的证据。如果管理层拒绝或者⽆法提供，则可能可以出具⽆法表示意⻅。虽然在实务中针对持续经营问题发表⽆法表示意⻅的情况是存在的，但这仅仅是在准则应⽤指南中提及，⽽正⽂中未提及，可能表明准则制定机构认为这种情况不应成为常态。个人理解，供参考。","cat":"审计实务","kw":"⾮标意⻅类型","src":"陈奕蔚 会计视野论坛答疑","std_ref":"中国注册会计师审计准则"},{"id":"CY0053","q":"境外⼦公司的报表币种","a":"我理解，如果对这些境外⼦公司单独出具审计报告，则不⼤可能是依据其所在国家或地区的法律法规进⾏的法定审计，其预期的报表使⽤者主要还是在中国境内。也就是，这是基于境内报表使⽤者对财务信息的需求⽽进⾏的特殊 ⽬的专项审计。既然是专项审计，则其被审计报表的编制基础可根据预期信息使⽤者的信息需求确定，如果预定使 ⽤者希望看到该⼦公司本币的财务信息，则被审计财务报表完全可以以其本币列报，在编制基础中说明即可。审计意见表述为是否符合附注所述的编制基础，⽆需出具保留意见或者添加强调事项。个人理解，供参考。","cat":"审计实务","kw":"境外⼦公司的报表币种","src":"陈奕蔚 会计视野论坛答疑","std_ref":"中国注册会计师审计准则"},{"id":"CY0072","q":"关于前任注册会计师的判断","a":"个⼈理解，从准则和应⽤指南的字⾯意思上看，主帖案例中的B所未被明确列为“前任注册会计师”。但在实务 中，B所也可以认为是“前任注册会计师”，因为其审计⼯作和审计调整建议对本次2023年年报的审计也是会产⽣影响的。尤其是如果在B所所审计的财务报表的含该期间内发⽣了对年度审计具有重⼤影响的特殊交易或事项，或者C所经审计认为经过B所审计的本年中期报表中存在重⼤错报时，有必要与B所进⾏沟通。个人理解，供参考。","cat":"审计实务","kw":"请教陈版,关于前任注册会计师的判断","src":"陈奕蔚 会计视野论坛答疑","std_ref":"中国注册会计师审计准则"},{"id":"CY1148","q":"求助！求助！","a":"取决于该种理财产品分类为何种⾦融资产。例如，净值型产品通常分类为以公允价值计量且其变动计⼊损益的⾦融资产，因此可以就银⾏回函确认的资产负债表⽇净值调整公允价值变动损 益，这与资产负债表⽇后净值的减少⽆关。 但是，建议项⽬组通过被审计单位向银⾏确认该净值的计算⽅法和依据，确保其符合《企业会计准则第39号——公允价值计量》对“公允价值计量”的定义和要求。个人理解，供参考。","cat":"审计实务","kw":"公允价值","src":"陈奕蔚 会计视野论坛答疑","std_ref":"中国注册会计师审计准则、《企业会计准则第39号——公允价值计量》"},{"id":"CY1694","q":"股东出售股权的交易款打⼊公户属于资产吗？","a":"如主帖所述，这笔钱虽然在公司名下，但是并不符合资产定义，公司⽆法拥有或者控制，且不能给公司带来经济利益，故不应确认为本企业资产，仅作备查登记。 但因为该笔款项存放在以本企业名义开⽴的账户内，本企业对此负有保管责任，同时审计时也将该笔资⾦纳⼊函证范围，故习惯上也可以接受同时确认⼀项银⾏存款和其他应付款的处理，保持两者等额即可。个人理解，供参考。","cat":"审计实务","kw":"股东出售股权的交易款打⼊公户属于资产吗","src":"陈奕蔚 会计视野论坛答疑","std_ref":"中国注册会计师审计准则"},{"id":"CY0043","q":"单项计提的外币应收款汇率变动的账务处理","a":"基本赞同主帖中的处理⽅式。 应收账款属于外币货币性资产，其可收回⾦额以原币⾦额为基础计量，故其账⾯余额和坏账准备都存在汇兑损益影响问题。附注中对于个别认定法下计提的外币应收账款坏账准备对应的汇率调整的变动原因披露为“其他”。个人理解，供参考。","cat":"外币折算","kw":"单项计提的外币应收款汇率变动的账务处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第19号——外币折算"},{"id":"CY0726","q":"⾹港⼦公司可以选择其主要发⽣交易的⾹港商业银⾏的汇率报价计算即期汇率。报表折算汇率的选择赞同主帖第2点中的意见。","a":"这⾥有差额是不合理的，建议尽可能保证两次折算的汇率在同⼀时点保持⼀致。个人理解，供参考。","cat":"外币折算","kw":"⾹港⼦公司可以选择其主要发⽣交易的⾹港商业银⾏的汇率报价计算即期汇率,报表折算汇率的选择赞同主帖第2点中的意见","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第19号——外币折算"},{"id":"CY1022","q":"外销业务期后退货怎么处理","a":"可以这样理解，即在确认应退款退货的当⽇，按当⽇即期汇率冲减收⼊。个人理解，供参考。","cat":"外币折算","kw":"求助陈版,外销业务期后退货怎么处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第19号——外币折算"},{"id":"CY1159","q":"通过供应链平台采购","a":"应将资⾦占⽤费计⼊财务费⽤（应⾃收到原材料时起，即按约定的利率按期计提利息⽀出）。该事项属于供应商融资安排，应按解释17号第⼆条规定披露。个人理解，供参考。","cat":"实务综合","kw":"通过供应链平台采购","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1196","q":"销售分成业务 核算","a":"从主帖信息来看，实际上是A公司主导了其产品在以该⾃然⼈名义开设的店铺内的销售，A公司是该销售的主要责任⼈，⾃然⼈只是提供店铺和相关销售服务。因此，A公司应在该店铺将商品销售给最终顾客时确认收⼊，收⼊⾦额为向顾客收取的款项全额，应归属于该⾃然⼈的40%分成额计⼊营业成本处理。个人理解，供参考。","cat":"实务综合","kw":"销售分成业务","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1197","q":"陈版主：关于股份⽀付披露疑问","a":"我理解只需披露截⾄本期末仍在等待期内（或者在本期内结束）的股份⽀付计划，或者本期内授予且⽆等待期的股份⽀付计划截⾄本期末计⼊资本公积⾦额的合计数。对于期初已结束等待期的股份⽀付计划计⼊资本公积的⾦额⽆需纳⼊。个人理解，供参考。","cat":"实务综合","kw":"陈版主,关于股份⽀付披露疑问","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1207","q":"代政府⽀付征地补偿⾦⽅式⼊股项⽬公司的会计处理","a":"主帖中的处理意⻅基本合理，但需注意：个人理解，供参考。","cat":"实务综合","kw":"代政府⽀付征地补偿⾦⽅式⼊股项⽬公司的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1220","q":"告假（2025.03.21）","a":"各位： 因患病，我今⽇将住院，预计整个下周都将在医院⾥。这段时间正处于忙季，出了这样的事情⾮常对不起⼤家！ 求助帖回复和版⾯管理的问题，麻烦社区管理员和其他各位版主了！ 2025/03/21个人理解，供参考。","cat":"实务综合","kw":"2025","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1224","q":"以取得⾃身权益⼯具为对价处置⼦公司股权的会计处理","a":"评估值有时并不代表公允价值，还应注意执⾏利⽤专家⼯作程序进⾏复核后才能认可其代表公允价值。个人理解，供参考。","cat":"实务综合","kw":"公允价值,以取得⾃身权益⼯具为对价处置⼦公司股权的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1235","q":"私企收到残疾⼈岗位补贴和社会保险补贴的会计处理","a":"⾸先要关注该处理的法律⻛险，即后续政府部⻔是否会检查该款项的使⽤情况，对于未按照规定⽤途使⽤的补贴款是否会追缴。如果能够合理保证该款项不会被追缴的，则可以在收到时计⼊其他收益处理。个人理解，供参考。","cat":"实务综合","kw":"私企收到残疾⼈岗位补贴和社会保险补贴的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1236","q":"可转债赎回价⼤于⾯值，最后⼀期的应付债券账⾯⾦额是否应接近赎回价","a":"这部分在赎回时⽀付的溢价，实际上是变相的利息⽀出，在测算负债部分的初始公允价值和后续计量其利息⽀出时，都应纳⼊考虑，实际上增加了可转债存续期间的利息⽀出。在可转债到期⽇，其负债部分的账⾯价值应等于到期赎回⾦额（含赎回溢价，例如主帖中的115元）和尚未⽀付的累计票⾯利息之和。个人理解，供参考。","cat":"实务综合","kw":"公允价值,可转债赎回价⼤于⾯值,最后⼀期的应付债券账⾯⾦额是否应接近赎回价","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1243","q":"股东向企业提供⽆息资⾦，是否⼀定是权益性交易？","a":"参阅： https://bbs.esnai.com/forum.php?mod=viewthread tid=5491900。个人理解，供参考。","cat":"实务综合","kw":"股东向企业提供⽆息资⾦,是否⼀定是权益性交易","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1249","q":"求助关于合伙企业制私募基⾦分配实收资本的做账问题","a":"这样的会计处理并⽆明显问题。由于合伙企业对外承担⽆限责任，其对实缴出资的要求并⽆公司制企业那样严格。况且⼏乎全部合伙企业都是在合伙协议中明确禁⽌对外举债的。个人理解，供参考。","cat":"实务综合","kw":"求助关于合伙企业制私募基⾦分配实收资本的做账问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1263","q":"收购⾃然⼈直接控制的公司，如何账务处理？","a":"⻓期股权投资的账⾯价值为负数是不合理的。建议了解两家公司打包购⼊的原因，以及对B公司⽆⼒偿还的负债是否需承担兜底责任等，以考虑如何进⾏账务处理。 ⼀般理解，以下两种结果的可能性较⼤：个人理解，供参考。","cat":"实务综合","kw":"收购⾃然⼈直接控制的公司,如何账务处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1272","q":"减免的租⾦如何账务处理","a":"严格来说，在确定承债⽅有能⼒履⾏该债务，不存在重⼤不确定性的前提下可以在协议签订并⽣效后就结转。个人理解，供参考。","cat":"实务综合","kw":"减免的租⾦如何账务处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0640","q":"预测性财务信息","a":"预测性财务信息是审计、鉴证领域的概念，类似于会计上的会计估计概念。 《企业会计准则第28号——会计政策、会计估计变更和差错更正》第⼋条：“企业据以进⾏估计的基础发⽣了变 化，或者由于取得新信息、积累更多经验以及后来的发展变化，可能需要对会计估计进⾏修订。会计估计变更的依据应当真实、可靠。 会计估计变更，是指由于资产和负债的当前状况及预期经济利益和义务发⽣了变化，从⽽对资产或负债的账⾯价值或者资产的定期消耗⾦额进⾏调整。” 上述规定表明，对会计估计，需根据取得新信息、积累更多经验以及后来的发展变化情况，对其定期或不定期地进 ⾏复核调整，必要时进⾏会计估计变更。这也是会计估计变更的理论依据。个人理解，供参考。","cat":"会计政策/估计变更","kw":"预测性财务信息","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第28号——会计政策、会计估计变更和差错更正、《企业会计准则第28号——会计政策、会计估计变更和差错更正》"},{"id":"CY0463","q":"上市公司因税停产，年报会计师是否被坑？","a":"个⼈对该案例没有深⼊研究。从⽬前的有限信息分析，需关注的是截⾄2023年年报批准报出⽇，该项税务争议是否已经存在（例如税务机关是否已经开始提出公司的重芳烃衍⽣物税务问题；以往公司的处理⽅法与同⾏业对此问题的普遍处理⽅法是否存在重⼤不⼀致等），如是则是否公司已经谨慎评估了该事项的可能影响，包括对持续经营假设适⽤性的影响和对相关负债计提充分性的影响等。 如果完全是2023年年报批准报出后新发⽣的事项，理论上对2023年年报的编制和审计应⽆影响。 就审计执业⽅⾯⽽⾔，主要涉及持续经营、期后事项、会计估计等审计准则（当然1211、1231等基础性审计准则也是有影响的，但其影响较为宽泛和间接）。个人理解，供参考。","cat":"会计政策/估计变更","kw":"上市公司因税停产,年报会计师是否被坑","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第28号——会计政策、会计估计变更和差错更正"},{"id":"CY0198","q":"母公司跨年退回⼦公司分红的处理","a":"⼀般情况下，此类利润超额分配往往是由于对前期差错进⾏更正，冲回前期虚增的利润所造成的。但当初的利润分配决议是基于当时已知的可供分配利润⾦额，且也有董事会、股东会决议作为⽀持，因此财务上依据有效的利润分配决议作出会计处理并不构成前期差错。相应地，股东依据被投资公司利润分配的股东会决议作出确认投资收益的会计处理，本⾝也不是会计差错。 因此，⼦公司发现超额分红问题后，母公司按照⼦公司的要求退还以前年度多分的红利，冲减退回当年度的投资收益（即使这样做会导致当年度母公司的投资收益为负数）仍然在会计技术上是⼀个合理的结果。个人理解，供参考。","cat":"会计政策/估计变更","kw":"请教陈版主,母公司跨年退回⼦公司分红的处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第28号——会计政策、会计估计变更和差错更正"},{"id":"CY0197","q":"固定资产竣⼯决算差额需要审计调整吗","a":"建议了解竣⼯决算调减200万元（2600-2400）的原因，确定是否存在将应费⽤化的⽀出不合理地计⼊固定资产原值的问题，即是否属于前期差错。如属于前期差错的，则应在2023年末即进⾏调整更正。 另外，鉴于竣⼯决算是在2024年1⽉作出的，距离2023年末资产负债表⽇很近，因此竣⼯决算的调整有较⼤可能性代表资产负债表⽇后调整事项，此时也需调整2023年度报表中的固定资产原值。 因此事务所的审计调整意见很可能是具有合理性的，关键是如何界定是否属于前期差错或者资产负债表⽇后调整事项。个人理解，供参考。","cat":"会计政策/估计变更","kw":"固定资产,固定资产竣⼯决算差额需要审计调整吗","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第28号——会计政策、会计估计变更和差错更正"},{"id":"CY1670","q":"关于前期会计差错更正问题","a":"披露前期差错更正事项是的财务报表附注中，⽽不是在审计报告中。 通常情况下，此类专项审计报告后附的财务报表中，可以不单独披露前期差错更正事项，但具体取决于委托⽅的要求，以及预定报表使⽤者能否接触到以前年度的审计报告和财务报表信息。如果委托⽅有要求，或者预定报表使⽤者（例如原股东和潜在新股东）可以接触到以前年度审计报告及被审计财务报表信息，则建议在附注中披露前期差错更正相关信息。 这与本次专项审计是由哪个事务所执⾏⽆关。个人理解，供参考。","cat":"会计政策/估计变更","kw":"请教陈版,关于前期会计差错更正问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第28号——会计政策、会计估计变更和差错更正"},{"id":"CY1221","q":"企业购⼊资产后，使⽤⽤途改变，该如何处理","a":"因管理层对⽤途的指定发⽣改变，导致由存货转为固定资产，不属于会计政策变更，因此其折旧计提也就不应追溯到最初购⼊时。应⾃转换⽇起，在转换⽇所估计的剩余使⽤年限内计提折旧。 另外还需注意：在现⾏的会计模式下，由存货转为固定资产是允许的，但由固定资产再转回存货处理通常是不可以的。这也就意味着：如果⽇后再次改变该批物资的⽤途，将其⽤于对外出售，则只能作为固定资产处置处理，不能转回库存商品并确认销售收⼊和销售成本。个人理解，供参考。","cat":"会计政策/估计变更","kw":"固定资产,折旧,请教陈版,企业购⼊资产后,使⽤⽤途改变,该如何处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第28号——会计政策、会计估计变更和差错更正"},{"id":"CY1115","q":"关于本位币转换中的⼀些疑问","a":"这个问题是由于报表折算和变更本位币的技术原因所导致，虽然可能理解起来有难度，但按照现⾏的会计准则，出现该结果是合理的。这也是汇率变动对报表影响的体现。 建议考虑：以前以埃镑作为本位币是否属于前期差错。即本年度是否确实发⽣了经济环境的重⼤变化（⽽不仅仅是埃镑与美元之间汇率的重⼤波动），如果此前以埃镑作为本位币属于差错的，考虑能否以尽可能合理、可⾏的⽅式更正该差错。个人理解，供参考。","cat":"会计政策/估计变更","kw":"关于本位币转换中的⼀些疑问","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第28号——会计政策、会计估计变更和差错更正"},{"id":"CY1859","q":"拟处置其他⾮流动⾦融资产","a":"如果预计最终按该价格成交的可能性很⼤（可通过资产负债表⽇后签订股权转让协议及该协议的实际履⾏情况作为佐证），且该交易对⼿⽅为⾮关联⽅的，则可以认可该“很可能的交易价格”代表了公允价值，故在2025年末应将该项⾦融资产账⾯价值调整到该公允价值，并相应确认公允价值变动损益。同时，还需要考虑前期⼀直未按公允价值调整是否构成前期差错。个人理解，供参考。","cat":"会计政策/估计变更","kw":"公允价值,拟处置其他⾮流动⾦融资产","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第28号——会计政策、会计估计变更和差错更正"},{"id":"CY1273","q":"谢谢","a":"作为质押物的票据仍按其原账⾯价值列示，即100元。这与短期借款的初始计量⾦额（95元）不同。个人理解，供参考。","cat":"实务综合","kw":"请教陈版主","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1276","q":"关于项⽬未⼊财政部PPP项⽬库的会计处理","a":"符合解释14号“双控制”“双特征”条件的项⽬均适⽤该规定，与是否已经⼊库⽆关。个人理解，供参考。","cat":"实务综合","kw":"关于项⽬未⼊财政部PPP项⽬库的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1278","q":"公司减资的账务处理","a":"如果预计在报纸上或者国家企业信⽤信息公示系统公告期间基本不可能收到异议的，则可以在股东会作出减资决议后即进⾏账务处理。这种情况仅适⽤于对外债务关系简单清晰的债务⼈。如果债权债务关系复杂的，则还是建议到公示期满，确认⽆异议后再进⾏减资的账务处理。个人理解，供参考。","cat":"实务综合","kw":"请教陈版公司减资的账务处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1281","q":"公司销售设备的尾款收回情况与后续收到产品订单的影响","a":"如果对该10万元尾款的可收回性⽆重⼤疑虑的，则应按其折现值计⼊处置价款总额，纳⼊处置损益的计算，同时确认⻓期应付款。 如果对该10万元尾款的可收回性有较⼤疑虑的，则暂时不计⼊价款总额，到后续实际收到时（或者对可收回性的疑虑消除时）计⼊资产处置损益。个人理解，供参考。","cat":"实务综合","kw":"公司销售设备的尾款收回情况与后续收到产品订单的影响","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1288","q":"上市公司执⾏企业会计准则案例解析","a":"这个案例⾃《案例解析》2012年出版第⼀版以来⼀直存在，中间各版本的观点表述也有⼀些变化。我个⼈的观点：个人理解，供参考。","cat":"实务综合","kw":"上市公司执⾏企业会计准则案例解析","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1295","q":"关于公司持有有限合伙企业的股权估值问题","a":"建议向该有限合伙企业的GP或管理⼈了解其投资项⽬的情况，利⽤管理⼈提供的管理报告等信息估算投资份额的公允价值。总体上看可⽤的⼿段还是⽐较有限的。 也可以参照基⾦业协会、证券业协会发布的相关指引，例如基⾦业协会的《私募投资基⾦⾮上市股权投资估值指引（试⾏）》、证券业协会的《⾮上市公司股权估值指引》等。个人理解，供参考。","cat":"实务综合","kw":"公允价值,关于公司持有有限合伙企业的股权估值问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1300","q":"同⼀控制下，⽀付对价吸收合并，⺟公司是否确认投资收益？","a":"如B公司吸收合并C公司向A公司⽀付了对价，且价格公允，则⺟公司A公司可以按处置处理，单体报表确认投资收益。视同A将C的股权转让给B。这个环节A是可以确认处置收益的。后续B吸收合并C，在A的个别报表层⾯⽆需进⾏账务处理。个人理解，供参考。","cat":"实务综合","kw":"合并,同⼀控制下,⽀付对价吸收合并,⺟公司是否确认投资收益","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1303","q":"⻘椒陈版主：港股流通性差，期末公允价值是否考虑流动性折扣？","a":"如果虽然在股票市场上挂牌交易，但⽇成交量很⼩，可能表明该股市并⾮该种股票投资的活跃市场，在此情况下，因为市场成交价格不能视同“活跃市场上的交易价格”，所以在⼀定程度上考虑流动性折扣是可以接受的做法。 关于流动性折扣的量化考虑，很抱歉⽬前我⼿头缺乏此类资料，建议咨询⾦融⼯具估值领域内的专业⼈⼠意⻅。个人理解，供参考。","cat":"实务综合","kw":"公允价值,⻘椒陈版主,港股流通性差,期末公允价值是否考虑流动性折扣","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1308","q":"会计和税务核算⼝径问题","a":"请参阅： https://bbs.esnai.com/thread-5492181-1-1.html。个人理解，供参考。","cat":"实务综合","kw":"会计和税务核算⼝径问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1321","q":"关于股权投资⼊账的相关问题","a":"更重要的是被投资⽅的股东会是否已就本次股权转让作出决议，其他股东是否已放弃优先购买权。 如果在这些⽅⾯不存在障碍，则后续被投资⽅的公司章程变更就只是⼀个例⾏的⼿续。对资产转让的确认不产⽣实质性影响。个人理解，供参考。","cat":"实务综合","kw":"请教陈版,关于股权投资⼊账的相关问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1327","q":"预期信⽤损失和迁徒率","a":"我理解，迁徙率法这⼀模型本身就没有考虑折现因素，因此理论上仅适⽤于实际利率为零的应收债权（包括不考虑重⼤融资成分的销售应收款）。个人理解，供参考。","cat":"实务综合","kw":"预期信⽤损失和迁徒率","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1343","q":"⽔资源费的会计处理","a":"费改税后，缴纳的⽔资源税应计⼊“税⾦及附加”科⽬。个人理解，供参考。","cat":"实务综合","kw":"⽔资源费的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1346","q":"受让债权产⽣收益的处理","a":"该笔债权的预计可收回⾦额（公允价值）为多少？ A公司对于受让的债权应按公允价值（预计可收回⾦额的折现值）⼊账，该公允价值与实际交易价格（50万元）之间的差额按权益性交易原则处理。个人理解，供参考。","cat":"实务综合","kw":"公允价值,请教陈版,受让债权产⽣收益的处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1356","q":"职⼯慈铭体检费⽤现⾦流","a":"如果是法律法规规定的对特定⾏业职业病的检查，应属于劳动保护费⽽不是职⼯薪酬，相应地现⾦流属于⽀付其他与经营活动有关的现⾦。其他情况的体检，属于公司的员⼯福利体系的⼀部分，属于职⼯薪酬的范畴，相应地现⾦流量属于⽀付给职⼯以及为职⼯⽀付的现⾦。个人理解，供参考。","cat":"实务综合","kw":"职⼯慈铭体检费⽤现⾦流","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1358","q":"《企业会计制度》下报表样式","a":"企业会计准则和《企业会计制度》是两个完全不同的体系，企业会计准则是全新的另起炉灶，不是在《企业会计制度》基础上修补，因此不存在两套体系下 报表的对⽐。事实上也⽆法对⽐， 例如由于⾦融⼯具核算规定的根本差异，导致涉及⾦融资产、⾦融负债的报表项⽬是完全不同的。个人理解，供参考。","cat":"实务综合","kw":"《企业会计制度》下报表样式","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1426","q":"关于合并范围及股份⽀付","a":"案例⼀：请核实⼄公司的收益分配顺序：为何不是优先向B、C分配固定或保底收益，⽽是优先向甲公司分配收益？该业务的实质是B、C借⽤甲公司和A公司的品牌在外地开展业务，还是甲公司和A公司为何向外地拓展业务⽽引⼊当地企业投资，优先保证B、C的利益？ 另外，如果优先保障甲公司的收益，但同时⼜由甲公司委派唯⼀的执⾏董事，这是否⽭盾？ 案例⼆：应采⽤观点②。 提问⼈：zengfengxia 时间：2025-06-09 17:41:52 ⽅案2的理由是因为从⺟公司⻆度，构成现⾦结算的股份⽀付，在结算时确认股权处置收益？ 回答⼈：chenyiwei 可这样理解。⼀⽅⾯确认股权处置损益，另⼀⽅⾯就代为承担股份⽀付费⽤确认对⼦公司的⻓期股权投资成本。个人理解，供参考。","cat":"合并报表","kw":"合并,关于合并范围及股份⽀付","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY1725","q":"购买理财产品是否要纳⼊合并范围","a":"https://bbs.esnai.com/thread-5494126-1-1.html 提问⼈：jennygzyang2025 时间：2025-09-18 20:39:59 陈版主，您好，针对公司A购买⺟公司B的联营公司银⾏C发⾏的开放式浮动收益性理财产品，持有份额超过50%，A公司是否要将理财产品纳⼊合并范围呢？谢谢回答⼈：chenyiwei 建议参考《企业会计准则解释第8号》的第⼀问“商业银⾏及其⼦公司（以下统称为“商业银⾏”)应当如何判断是否控制其按照银⾏业监督管理委员会相关规定发⾏的理财产品（以下称为“理财产品”)？” 虽然该问题是针对商业银⾏（理财产品的发⾏⽅和管理⽅），但也同样适⽤于理财产品的投资⽅。个人理解，供参考。","cat":"合并报表","kw":"合并,购买理财产品是否要纳⼊合并范围","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY0855","q":"关于同股不同权，少数股东权益该如何计算","a":"将利润分配⽐例与项⽬销售净利润率挂钩的原因是什么？是否该项⽬实际上是A操盘的？项⽬销售净利润率⾼于 10%时A多分的4%是对A的业绩奖励？ 另外，为何即使在项⽬销售净利润率低于10%(含10%)的情况下，A公司也能以20%的持股⽐例获得26%的分红？是否该6%实际上是A的管理费收⼊，或者品牌使⽤费等？ 因此，⾸先建议明确上述分红规则背后的商业逻辑，合理区分利润分配和业绩奖励。对于业绩奖励，X公司⾃⾝报表中应确认为费⽤，不能确认为利润分配；相应地A对于利润分配应确认为提供管理服务的收⼊⽽不是投资收益。在对A、X的报表进⾏合理调整的基础上，我理解仍应按调整后X公司净资产、净利润的20%计算少数股东损益。个人理解，供参考。","cat":"合并报表","kw":"少数股东,请教陈版,关于同股不同权,少数股东权益该如何计算","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY1253","q":"⺟公司和下属⾮全资⼦公司同时向另⼀⾮全资⼦公司增资","a":"⾸先明确讨论前提：A可以控制B、C。B、C均在A的合并报表范围内。 这种“⺟公司和下属⾮全资⼦公司同时向另⼀⾮全资⼦公司增资”的交易，对合并报表层⾯的资产、负债均⽆影响，但因为被投资⼦公司（C）的少数股东权益发⽣了变化，所以会在合并报表层 ⾯产⽣少数股东权益和资本公积之间此消彼⻓的变动。即增资前后C公司的少数股东权益的变动额【C公司增资后权益增资后C的少数股权⽐例-C公司增资前权益增资前C的少数股权⽐例，其中C公司增资后权益=C公司增资前权益+A、B本次对C的增资额】就是合并报表层⾯资本公积的减少额。 上述假设是A、B以现⾦对C增资。如果是实物出资，则还涉及未实现损益的抵销，会更加复杂。个人理解，供参考。","cat":"合并报表","kw":"合并,少数股东,⺟公司和下属⾮全资⼦公司同时向另⼀⾮全资⼦公司增资","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY1035","q":"有关合并报表⽐例问题","a":"由于甲公司并不能控制联营企业B公司所持有的⼦公司A的25%股权及其对应的表决权，因此该25%股权仍属于少数股权。尽管穿透后甲公司最终享有A的权益份额是80%，但甲公司合并报表中的少数股权⽐例仍是30%。 对于甲公司通过B公司间接享有的A公司10%投资收益是否需作为权益法投资收益纳⼊甲公司合并报表中的归⺟净利润这⼀问题，实务中存在争议，其实这个问题反映了合并报表所依据的“控制观”和权益法核算所依据的“拥有观”两种观念之间的冲突。按照证监会⽬前的观点，似乎是要求甲公司不应将通过B公司间接享有的A公司10%投资收益计⼊投资收益和归⺟净利润中，⽽是纳 ⼊少数股东权益中，以避免整体净利润的虚增。个人理解，供参考。","cat":"合并报表","kw":"合并,少数股东,权益法,有关合并报表⽐例问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY0107","q":"破产重整公司审计报告的特殊编制基础","a":"如果该报表主要是供破产重整完成后的投资⽅（新⼤股东）和债转股后的新股东使⽤，则从他们的信息需求⾓度考虑，他们只关⼼取得股权之后的A公司财务状况和经营成果，⽽重整之前的状况和他们关系不⼤，并且通过重整， 原有的债权债务（除保留的债务以外）均已消除，是⼀个全新的起点。因此，针对此类⽤途的特殊⽬的报表，⾃法院裁定重整程序终结之⽇开始编制是可以接受的，其期初余额即为重整完成后保留的各项资产和负债。此外也可以只列出权益总额（如有⼦公司的，应分清归母权益和少数股东损益）⽽不列资本公积、盈余公积、未分配利润等明细。 此类报表应在编制基础中充分披露其预定使⽤者范围和⽤途限制，以及编制基础的特殊之处。个人理解，供参考。","cat":"合并报表","kw":"少数股东,破产重整公司审计报告的特殊编制基础","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY0440","q":"合并层⾯利息资本化","a":"主帖观点理论上是可⾏的，但鉴于⼀般借款资本化问题的敏感性，还是建议获取充分证据证明母公司从外部借⼊的资⾦、母公司投⼊⼦公司的资⾦和⼦公司⽤于资本⽀出的资⾦这三者之间的对应关系。对⼀般借款资本化的问题 （尤其是合并报表层⾯调整出来的资本化）始终要从严把握，警惕虚增利润的舞弊风险。 另外，根据现在的投资管理模式，任何投资项⽬都必须有⼀定⽐例的⾃有资本⾦，这部分资本⾦的资⾦来源不能是外部借款。因此即使认可⼀般借款资本化，也应从资本化的基数中扣减该项⽬相关申报材料中载明的投资项⽬资本 ⾦⾦额，⽽不能简单地将加权平均资本⽀出⾼于专门借款余额的部分全部视同以⼀般借款作为资⾦来源。个人理解，供参考。","cat":"合并报表","kw":"合并,资本化,合并层⾯利息资本化","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY0280","q":"合并报表计算少数股东权益","a":"如果不考虑内部交易损益等复杂情况，合并报表层⾯在计算少数股东权益时，应⾸先将⼦公司之间的互相投资均调整为权益法核算（不论在各⼦公司的⾃⾝报表中如何核算对其他⼦公司的投资）。然后，以调整后的各⼦公司权益乘以外部少数股东直接持有该⼦公司的股权⽐例，加总后即得到合并集团层⾯的少数股东权益。 不应简单地穿透计算母公司享有⼦公司的权益⽐例，然后将100%减去该穿透享有权益⽐例作为少数股东权益。这 样会将⼦公司之间的互相投资的成本也纳⼊少数股东权益，⽽⼦公司之间的互相投资在合并报表层⾯会与被投资⼦公司的权益增加额相抵销，并不会导致合并报表层⾯归母权益或者少数股东权益的变动。个人理解，供参考。","cat":"合并报表","kw":"合并,少数股东,权益法,合并报表计算少数股东权益","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY0609","q":"票据保证⾦合并现⾦流量表列⽀","a":"由于合并报表中A、B之间的货物买卖交易（导致票据开具的基础交易）已被抵销，所以该300万元实际上体现为对借款（贴现）的还本付息。相应地，应列为筹资活动现⾦流量。 提问⼈：⼩⽩菜菜 时间：2024-11-06 16:43:48 陈⽼师，我的理解集团内部开票贴现因为在集团⾓度业务已经被抵消，因此实际从集团⾓度看是集团从银⾏融资1000万银⾏扣除融资费⽤后给到950万，同时存⼊700万做保证⾦抵押，到期后保证⾦还款700万，再⽀付300万，因此是否可以取得时作为取得借款的现⾦流，还款时作为偿还债务的现⾦流呢 回答⼈：chenyiwei 合并现⾦流量表中可以如此处理。个人理解，供参考。","cat":"合并报表","kw":"合并,票据保证⾦合并现⾦流量表列⽀","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY0465","q":"上市公司执⾏企业会计准则案例解析2024案例12-15未实现损益的抵消问题","a":"个⼈理解，该案例中未提及A合并报表层⾯关于D的少数股权⽐例如何计算。如果按照解析，将C对D的投资收益从计算A对C的权益法投资收益的基数中扣减，则A通过C间接享有的D的净利润份额只能并⼊归母净利润，否则合并报表层⾯的净利润（归母净利润和少数股东损益）就会因此减少⼀块。 这⾥的问题是对少数股权的界定，即母公司通过权益法间接享有的⼦公司净利润份额是否应并⼊少数股东损益，再通过权益法对联营企业的核算将其纳⼊合并报表中的投资收益并纳⼊归母净利润？个⼈理解，这样做法虽然导致合并报表层⾯净利润的增加，但似乎更符合合并报表的⼀般原理。 ⼀家之⾔，仅供探讨。个人理解，供参考。","cat":"合并报表","kw":"合并,少数股东,权益法,上市公司执⾏企业会计准则案例解析2024案例12-15未实现损益的抵消问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY1200","q":"转换⽇，将其他综合收益转⼊当期损益。","a":"投资性房地产转为⾃⽤房地产，只是资产形态和⽤途的转换，此前的公允价值变动并未实现。故应采⽤主帖中的第⼀种处理：不做处理，待处置该固定资产时，转⼊当期损益。提问⼈：⼀云 时间：2025-03-20 09:12:37 陈⽼师： 如果企业计划⼀直使⽤该固定资产，未计划处置，那之前形成的其他综合收益该如何处理？ 是否还有第4种处理⽅法：在固定资产使⽤期间，按折旧期限分期将之前形成的其他综合收益结转进各期损益？ 回答⼈：chenyiwei 这样只能到该固定资产报废清理时才能将其他综合收益转⼊报废清理损益。提问⼈：⼤呆呆 时间：2025-04-29 13:16:22 请教各位⽼师：某公司有⼀座办公楼，1-5层⾃⽤，6-12层出租，只有⼀个⼤的产权证？按照⾯积分摊确认固定资产和投资性房地产是否合适？如果合适，与投资性房地产可单独出售的要求相 ⽭盾？如果不合适，该如何处理？谢谢！ 回答⼈：chenyiwei ⾸先需要确定出租部分能否确认为投资性房地产：该出租部分（6-12层）如后续需要单独出售，能否进⾏产证分割？在单独办理产证过程中是否需补缴⼤额的出让⾦或者税费？其单独出售是否存在法律上的其他障碍？ 如果出租部分能够单独出售（包括应可以分割为更⼩的单元，例如按层或按房间出售），则可以确认为投资性房地产。此时整幢楼的账⾯价值（包括所占⼟地）应采⽤系统、合理的⽅式（如建筑⾯积⽐例、市场价格⽐例等）在⾃⽤和出租部分之间分摊。个人理解，供参考。","cat":"投资性房地产","kw":"公允价值,固定资产,折旧,转换⽇,将其他综合收益转⼊当期损益","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第3号——投资性房地产"},{"id":"CY0378","q":"投资性房地产转换为存货⼊账科⽬问题","a":"根据四部委《关于严格执⾏企业会计准则 切实做好企业2021年年报⼯作的通知》（财会[2021]32号）：“企业应当按照《企业会计准则第3号——投资性房地产》（财会〔2006〕3号）等相关规定，必须有确凿证据表明房地产⽤途发⽣改变，才能将投资性房地产转换为其他资产或者将其他资产转换为投资性房地产，并在附注中披露房地产转换情况、理由以及对损益或所有者权益的影响等相关信息。例如，房地产开发企业将投资性房地产转换为存货的，应当结合业务实质严格把握重新开发的判断，必须有确凿证据表明⽤于经营出租的房地产重新开发⽤于对外销售，通常该房地产应有诸如功能、性能变化等实质性的变化和重⼤的结构性调整。” 由于从投资性房地产转为存货时，必须经过上述所指的“重新开发”过程，所以转⼊“开发成本”显然⽐转⼊“开发产品”更合理。如果转⼊“开发产品”，可能被误解为可以直接对外出售，不符合上⽂要求有“重新开发”过程的要求。个人理解，供参考。","cat":"投资性房地产","kw":"投资性房地产转换为存货⼊账科⽬问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第3号——投资性房地产、《企业会计准则第3号——投资性房地产》"},{"id":"CY1233","q":"海岛使⽤权的投资性房地产","a":"确认投资性房地产应满⾜的基本条件之⼀是“能够单独计量和出售”，因此需考虑拟作为投资性房地产的项⽬能否单独确定其成本，以及能否单独出售。证监会会计部在《上市公司2022年年度财务报告会计监管报告》中提及：“审阅分析发现，部分上市公司的办公⼤楼仅能整体出售，不能分拆部分楼层出售。上市公司将部分楼层⽤于对外出租，并错误地将其作为投资性房地产核算。由于对外出租的部分楼层不能单独出售，因此不满⾜投资性房地产的确认条件，不应当作为投资性房地产处理。”。 如果该海岛是作为⼀个整体的旅游度假区来开发的，则需考虑单独出售其中的拟出租部分（如某个酒店或者某项娱乐设施）是否具有合理性和可⾏性。另外，投资性房地产应有⻓期⽤于经营性出租的明确意图和可⾏性，对此也应谨慎评价。 总体上看，海岛使⽤权及岛上游乐度假设施确认为投资性房地产的可能性不⼤。个人理解，供参考。","cat":"投资性房地产","kw":"海岛使⽤权的投资性房地产","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第3号——投资性房地产"},{"id":"CY0446","q":"关于投资性房地核算问题","a":"要考虑：该物业最初规划⽴项时，是否就以出租为长期持有⽬的？还是最初的⽬的是出售，后续根据房地产市场形势的变化情况，决定变更为出租？ 如果是前者，则⼀开始就应当作为投资性房地产核算，设置”投资性房地产——在建“明细科⽬归集其成本。建设期间理论上就应当采⽤公允价值模式计量。如果建设期内的公允价值难以合理确定的，则可以在建设期内以成本计 量，完⼯后公允价值可以可靠计量时，再改按公允价值计量，并将截⾄该⽇的累计公允价值变动计⼊当期的公允价值变动损益。 如果是后者，则涉及到投资性房地产和其他房地产之间的转换。此时应以转换⽇公允价值作为成本，转换⽇公允价值与账⾯价值之间的差额计⼊其他综合收益。个人理解，供参考。","cat":"投资性房地产","kw":"公允价值,关于投资性房地核算问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第3号——投资性房地产"},{"id":"CY1248","q":"投资性房地产后续计量模式的变更的疑问","a":"案例1：你的理解是合理的，基本的会计期间是年度，所以虽然是在2024年6⽉进⾏会计政策变更，但在完全追溯调整法下，实际从哪个时点开始执⾏变更后的会计政策反⽽不重要，因为都是按年体现会计政策变更的影响。这⾥的“变更⽇”不是实际作出变更决议之⽇，⽽是变更后会计政策⽣效当年的年初，实际执⾏中追溯到最早⽐较期间期初。 案例2：你的理解是合理的。由固定资产转为投资性房地产不是会计政策变更，因此该⽇的公允价值超出原账⾯价值的差额计⼊其他综合收益，转为投资性房地产后的公允价值变动计⼊损益并最终转⼊留存收益。 这两个问题都是准则指南的表述不严密，但不影响正常的理解和应⽤。个人理解，供参考。","cat":"投资性房地产","kw":"公允价值,固定资产,投资性房地产后续计量模式的变更的疑问","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第3号——投资性房地产"},{"id":"CY0890","q":"同⼀建筑物在列报时是否可以拆分为固定资产与投资性房地产？","a":"根据《企业会计准则第3号——投资性房地产》第⼆条规定：“投资性房地产，是指为赚取租⾦或资本增值，或两者兼有⽽持有的房地产。投资性房地产应当能够单独计量和出售。”。 因此，采⽤何种处理⽅法，取决于出租部分能否单独计量和出售。如可以，则可将同⼀幢建筑物中的出租部分单独确认为投资性房地产，其余部分确认为⾃⽤房地产；如不可以，则只能将该建筑物整体确认为固定资产。个人理解，供参考。","cat":"投资性房地产","kw":"固定资产,同⼀建筑物在列报时是否可以拆分为固定资产与投资性房地产","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第3号——投资性房地产、《企业会计准则第3号——投资性房地产》"},{"id":"CY1370","q":"《企业会计准则应⽤指南汇编2024（上册）》第⼗五章收⼊","a":"个⼈理解，这个问题实际上是⼀个翻译错误。个人理解，供参考。","cat":"实务综合","kw":"《企业会计准则应⽤指南汇编2024,》第⼗五章收⼊","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1377","q":"处置⼦公司","a":"⼀般理解，本案例相当于以负数对价处置⼦公司，因此差额计⼊投资收益（投资处置损失）。个人理解，供参考。","cat":"实务综合","kw":"处置⼦公司","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1381","q":"私募股权投资基⾦取得的业绩报酬会计核算及涉税问题","a":"由于A并未对B基⾦实际出资，因此不能取得基于出资的投资收益，⽬前取得的款项均为管理费收⼊，适⽤《企业会计准则第14号——收⼊》。不适⽤《企业会计准则第22号——⾦融⼯具确认和计量》。 税务问题建议咨询税务专业⼈⼠意⻅。个人理解，供参考。","cat":"实务综合","kw":"私募股权投资基⾦取得的业绩报酬会计核算及涉税问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则、《企业会计准则第14号——收⼊》、《企业会计准则第22号——⾦融⼯具确认和计量》"},{"id":"CY1384","q":"关于贴现应收票据终⽌确认时贴现息的处理","a":"应以《应⽤指南汇编2024》为准，计⼊财务费⽤。个人理解，供参考。","cat":"实务综合","kw":"关于贴现应收票据终⽌确认时贴现息的处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1390","q":"⼤股东⽀付给⾮全资⼦公司的业绩补偿款，计⼊哪个报表项⽬？","a":"⼤股东⽀付给被投资企业的业绩补偿款，区分两部分考虑：个人理解，供参考。","cat":"实务综合","kw":"求助陈版主,⼤股东⽀付给⾮全资⼦公司的业绩补偿款,计⼊哪个报表项⽬","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1395","q":"使⽤权资产 ⽆借款企业的折现率是否可以参考理财收益率","a":"使⽤理财产品收益率不恰当，主要考虑：个人理解，供参考。","cat":"实务综合","kw":"使⽤权资产,⽆借款企业的折现率是否可以参考理财收益率","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1396","q":"⼤神帮忙解答合并会计处理问题？","a":"https://bbs.esnai.com/forum.php?mod=viewthread tid=5492498个人理解，供参考。","cat":"实务综合","kw":"合并,请教陈版⼤神帮忙解答合并会计处理问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1402","q":"债权凭证的处理","a":"⾸先，对于此类债权凭证，不属于《票据法》的规范范围，且其转让、贴现等是附追索权的，应将其作为应收账款核算，⽽不是应收票据。 其次，因为背书转让是附追索权的，故背书转让时不能终⽌确认，应将被抵偿的应付账款转为其他流动负债（借：应付账款，贷：其他流动负债）。个人理解，供参考。","cat":"实务综合","kw":"债权凭证的处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1405","q":"演唱会⻔票收⼊确认问题","a":"主办⽅作为主要责任⼈，应按向观众收取的票款总额（不扣减代理费和服务费）确认收⼊，代理费和服务费等确认为销售费⽤。个人理解，供参考。","cat":"实务综合","kw":"请教陈版主,演唱会⻔票收⼊确认问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1406","q":"通⽤制造业收⼊确认和增值税差异的会计处理","a":"会计准则和税务规定各⾃都规定了收⼊确认时点，纳税申报应以税法规定的纳税义务发⽣时间为准，不能以开票为准。开票是在纳税义务发⽣时间必须作出的⾏为，⽽不是相反，由开票时间决定报税时间。 如果到了纳税义务发⽣时间，因某些特殊原因导致⽆法开票的，仍应做⽆票收⼊申报。具体税务⻛险管理事项，建议咨询税务专业⼈⼠。个人理解，供参考。","cat":"实务综合","kw":"求助陈版,通⽤制造业收⼊确认和增值税差异的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1428","q":"库存股结转","a":"这个问题没有明确规定，实务中⼀般建议采⽤加权平均法。个人理解，供参考。","cat":"实务综合","kw":"库存股结转","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1440","q":"⼀致⾏动协议对股权投资核算的影响","a":"虽A公司拥有董事席位，但需按C的意思表示⾏使权利。表明A不能基于其⾃身理由最⼤化的⽴场参与B公司的财务和经营决策。这种情况下A对B⽆重⼤影响。个人理解，供参考。","cat":"实务综合","kw":"⼀致⾏动协议对股权投资核算的影响","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1455","q":"撤资的会计处理","a":"应采⽤第⼆种做法，即⽀付给股东的退股款超出所减少的实收资本的差额部分，依次冲减资本公积（资本溢价）、盈余公积、未分配利润。个人理解，供参考。","cat":"实务综合","kw":"撤资的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1468","q":"未⽀付股权款会计处理","a":"此前2019年时，对该项存在不确定性的被收购⽅少数股权收购事项，是如何进⾏会计处理的？是否已假设A公司持有C公司的100%股权，C公司层⾯⽆少数股权？ 如是，现在确认该项计划⽆法完成时，建议处理：个人理解，供参考。","cat":"实务综合","kw":"未⽀付股权款会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1485","q":"业务宣传费的判定","a":"个⼈理解可以。但因为涉及到税务专业问题，建议咨询税务专业⼈⼠意⻅，并与主管税务机关沟通确认。个人理解，供参考。","cat":"实务综合","kw":"业务宣传费的判定","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1487","q":"销售公司发⽣的费⽤全部记⼊销售费⽤吗","a":"该笔⽀出的⽬的（应对汇算清缴）是为了保障该销售公司作为独⽴法⼈的存续和正常运⾏，不是与具体的销售业务相关，故应计⼊管理费⽤。 另外，此前将其全部费⽤均计⼊销售费⽤也是不合理的，此前应当也会存在类似的以保障独⽴法⼈的存续和正常运⾏为⽬的的⽀出，如⼀般管理费⽤，这类⽀出也应计⼊管理费⽤⽽不是销售费⽤。个人理解，供参考。","cat":"实务综合","kw":"销售公司发⽣的费⽤全部记⼊销售费⽤吗","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1489","q":"存放在加⼯⼚的货物被对⽅处置","a":"参阅： https://bbs.esnai.com/forum.php?mod=viewthread tid=5492958。个人理解，供参考。","cat":"实务综合","kw":"存放在加⼯⼚的货物被对⽅处置","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1492","q":"港股上市相关的费⽤的核算和现流问题","a":"发⾏费⽤的处理原则在内地企业会计准则和国际（⾹港）财务报告准则下都是⼀致的，不存在原则性的差异，实务中的差异可能更多地是由于两地IPO流程和不确定性⼤⼩的差异所导致，属于执⾏差异⽽不是准则差异。 港股上市费⽤的处理可以参考⾹港准则下的惯常做法，这些做法同时也符合内地企业会计准则下的处理原则。个人理解，供参考。","cat":"实务综合","kw":"港股上市相关的费⽤的核算和现流问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1016","q":"关于投资补助的账务处理","a":"最新版本的《应⽤指南汇编2024》的“政府补助”⼀章中已不再提及“投资补助”概念。对于不要求返还，且拨款⽅并不因此在企业中享有权益的此类拨款，因为同样满⾜政府补助的“⽆偿性特征”，故⽬前实务中倾向于作为政府补助处理。当然，前提是排除为政府代建项⽬等应计⼊营业收⼊的情形。个人理解，供参考。","cat":"政府补助","kw":"请教陈版关于投资补助的账务处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第16号——政府补助"},{"id":"CY1500","q":"请教版主，关于国有农场⾼标准农⽥会计核算的困境！","a":"建议合理确定所收到的财政资⾦的性质，即属于资本性投⼊还是与资产相关的政府补助。 “⾼标准农⽥项⽬资⾦属于⽆需偿还的政府补助，应按资本性投⼊计⼊资本公积”的表述存在逻辑⽭盾，建议向授予该项租⾦的财政部⻔核实确认其性质，并关注相关补贴批⽂中有⽆明确的计⼊资本公积的要求。个人理解，供参考。","cat":"政府补助","kw":"请教版主,关于国有农场⾼标准农⽥会计核算的困境","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第16号——政府补助"},{"id":"CY1208","q":"关于⺠营企业收到超⻓期特别国债资⾦⽤于设备更新改造的相关账务处理问题","a":"要考虑：1、该笔资⾦最终是否需要以某种形式归还给政府，作为特别国债还本付息的资⾦来源？2、政府是否因此⽽在本企业享有权益？ 如果是⽆需归还的，政府也不会因此在本企业享有权益，则作为政府补助处理；如果需要归还的，则作为负债处理；如果因此享有权益的，则按接受增资处理。个人理解，供参考。","cat":"政府补助","kw":"请教陈版主,关于⺠营企业收到超⻓期特别国债资⾦⽤于设备更新改造的相关账务处理问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第16号——政府补助"},{"id":"CY1499","q":"担保公司代偿后发⽣的追偿费⽤如何账务处理？","a":"应根据以往经验，合理估计此类⽀出最终收回的可能性。如果预计很可能收回的，则计⼊应收代偿款中，并纳⼊应收代偿款整体计提坏账准备；如果预计收回可能性不⼤或者⽆法合理估计收回可能性的，则直接计⼊管理费⽤，后续实际收回时根据实际收回⾦额冲减管理费⽤。个人理解，供参考。","cat":"实务综合","kw":"担保公司代偿后发⽣的追偿费⽤如何账务处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1518","q":"公司减资，如何核算。","a":"因为盈余公积的余额⾜够⼤，故应采⽤⽅案⼆：冲减实收资本0.5万元，盈余公积6万元。即减资款在按约定⾦额减少实收资本后，剩余部分依次冲减资本公积（资本溢价或股本溢价）、盈余公积、未分配利润。个人理解，供参考。","cat":"实务综合","kw":"公司减资,如何核算","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1527","q":"未分配利润转增资本","a":"通常情况下，以未分配利润转增资本这⼀⾏为只是被投资企业股东权益内部的结构调整（权益项⽬之间的重分类），不影响投资者对该项投资的成本或公允价值，故投资者⽆需在转增环节进 ⾏账务处理。个人理解，供参考。","cat":"实务综合","kw":"公允价值,未分配利润转增资本","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0504","q":"股权激励对象之间转让的处理","a":"虽然不是控股股东但是最⼤个⼈股东，对于已正常持有的股权，按低于公允价值的转让价格转让给新的激励对象， 相当于股东为公司承担股权激励费⽤，故公司仍应按权益结算的股份⽀付处理，确认股份⽀付费⽤。该次股份⽀付费⽤的计量⾦额为本次授予⽇的公允价值⾼于实际转让价格的差额。个人理解，供参考。","cat":"股份支付","kw":"公允价值,股权激励对象之间转让的处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第11号——股份支付"},{"id":"CY1749","q":"期权交割⽇和到期⽇不⼀致⽤哪⼀天汇率计算投资收益","a":"参考⾦融⼯具准则应⽤指南中“以常规⽅式买卖⾦融资产”的处理规定，应采⽤“交易⽇会计”，即在交易⽇进⾏相应的会计处理。如果参照该做法，则应在银⾏决定⾏权之⽇（9.5）进⾏期权结算的账务处理，相应地期权损益需根据9⽉5⽇（持有⼈提出⾏权要求之⽇）的汇率计算投资收益。个人理解，供参考。","cat":"股份支付","kw":"期权交割⽇和到期⽇不⼀致⽤哪⼀天汇率计算投资收益","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第11号——股份支付"},{"id":"CY0479","q":"看涨期权-标的是股权","a":"基本可以这样理解。 提问⼈：13820142155 时间：2024-06-28 15:44:07 陈版不好意思，我有点乱，您是回复2楼还是主贴呀回答⼈：chenyiwei 回复主帖个人理解，供参考。","cat":"股份支付","kw":"看涨期权-标的是股权","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第11号——股份支付"},{"id":"CY0147","q":"破产重整时的评估增值，⼀定确认递延所得税负债吗","a":"如果原始报表和评估值的差异是由于债务豁免（已获得必要批准和完成必要⼿续）⽽引起，则A（被重整企业）应作为债务重组收益予以确认，据此将账⾯净资产调整到与评估值⼀致；同时将债务豁免⾦额计⼊当期应纳税所得 额。这样，调整后的账⾯净资产和计税基础应⽆差异，不涉及确认递延所得税负债。 如果A企业仍有可抵扣亏损的，可基于对其未来盈利的预测，考虑能否就可抵扣亏损确认递延所得税资产。个人理解，供参考。","cat":"所得税","kw":"所得税,递延,债务重组,破产重整时的评估增值,⼀定确认递延所得税负债吗","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第18号——所得税"},{"id":"CY0334","q":"请⽰陈总关于房地产企业预售递延所得税问题的处理","a":"这种情况下，由于⽬前应纳税所得额累计为负数，实际未缴纳企业所得税，因此应整体考虑该项应纳税所得额负数，考虑能否确认与可抵扣亏损相关的递延所得税资产，即1200 25%=300万元。（⼤概率是可以这样做的） 后续交房时实现盈利，⾸先⽤于弥补上述税务亏损，其次有剩余的可⽤于转回与预缴税费相关的递延所得税资产。预缴⼟地增值税形成应纳税暂时性差异，应就此确认递延所得税负债。个人理解，供参考。","cat":"所得税","kw":"所得税,递延,请⽰陈总关于房地产企业预售递延所得税问题的处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第18号——所得税"},{"id":"CY0434","q":"企业所得税汇算清缴退税现⾦流","a":"⼀般可以作为“⽀付的各项税费”的冲抵。如果冲抵后该项⽬为负数的，则可将汇算清缴退税⾦额列⼊“收到其他与经营活动有关的现⾦”。 提问⼈：anjiaxiang1210 时间：2024-06-17 11:26:08 陈版 这个为什么不可以放 收到税费返还。回答⼈：chenyiwei 税费返还⼀般是增值税的退税，包括出⼜退税和留抵退税等，正常的汇算清缴多退少补不属于该项⽬。个人理解，供参考。","cat":"所得税","kw":"所得税,企业所得税汇算清缴退税现⾦流","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第18号——所得税"},{"id":"CY1776","q":"总分公司新设分公司的会计核算及税务问题","a":"理论上分公司可以独⽴核算，也可以是⾮独⽴核算（⼀般适⽤于规模较⼩，与总公司位于同⼀县市的分公司），但编制报表时，除⾮是特殊⽬的报表，均应将分公司报表纳⼊汇总范围，以得到完整的法⼈报表。 税务问题可能⽐较复杂，涉及不同的管理和纳税⽅式，例如增值税通常默认分公司为独⽴的纳税⼈，⽽所得税⼀般是总分公司汇总纳税（但也有例外情况），建议咨询税务专业⼈⼠意⻅。个人理解，供参考。","cat":"所得税","kw":"所得税,总分公司新设分公司的会计核算及税务问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第18号——所得税"},{"id":"CY1512","q":"计算加权平均净资产收益率","a":"⼀般情况下权益结算股份⽀付不会导致净资产总额发⽣变化，所以对于由股份⽀付导致的资本公积变动，也按照【全年发⽣额/2】列⼊加权平均净资产收益率的分⺟。即股份⽀付⼀⽅⾯确认成本费⽤，另⼀⽅⾯确认资本公积，但对净资产⽆影响。 如果就股份⽀付确认递延所得税资产时贷记资本公积的，则这部分贷记资本公积的⾦额对净资产变动的影响，也如前所述平均计算。个人理解，供参考。","cat":"所得税","kw":"所得税,递延,计算加权平均净资产收益率","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第18号——所得税"},{"id":"CY1736","q":"存货准则之相关税费的范畴问题","a":"仅在采购环节发⽣，与特定存货的采购直接相关联的增量税费（即假设不进⾏该项采购就不会发⽣的税费）可以计⼊采购存货的成本（作为使存货达到当前状态和场所的必要⽀出），不应直接计⼊损益表，但期末应关注由此导致的存货成本增加对减值的可能影响。个人理解，供参考。","cat":"资产减值","kw":"减值,存货准则之相关税费的范畴问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第8号——资产减值"},{"id":"CY0421","q":"固定资产出现减值，账⾯价值调整成未来现⾦流量现值，如何体现财务费⽤？","a":"现值只是可收回⾦额的⼀种计量⽅式。固定资产本⾝是⾮⾦融资产，其后续计量不涉及确认财务费⽤问题。在测算现值时，折现率⼀般⽤加权平均资本成本（WACC）等考虑权益成本的报酬率，不能采⽤增量借款利率等仅反映债务资本成本的报酬率。个人理解，供参考。","cat":"资产减值","kw":"减值,固定资产,固定资产出现减值,账⾯价值调整成未来现⾦流量现值,如何体现财务费⽤","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第8号——资产减值"},{"id":"CY1911","q":"⼤股东兑现回购承诺时⼤股东及⼦公司单体报表会计处理","a":"这种情况下，回购约定是对投资⼈的额外保护措施，⽽不是明股实债。相应地，此时⺟公司回购股份时应按回购价款全额（含利息）作为对⼦公司的新增⻓投成本，但因为累计利息计⼊了收购成本，故后续对该项⻓期股权投资的减值测试要从严把握。个人理解，供参考。","cat":"资产减值","kw":"减值,⼤股东兑现回购承诺时⼤股东及⼦公司单体报表会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第8号——资产减值"},{"id":"CY0734","q":"清算企业，基准⽇应交税费余额 进项税额⼤于销项税额 ，如何结转余额？","a":"如果这部分进项税额确定⽆法获得退回，则属于资产损失，转⼊清算损益处理。（但理论上对于此类进项税额⼤于销项的情况，应关注由此形成的“其他流动/⾮流动资产”是否发⽣减值。理论上在进⼊清算之前就应已经提⾜减值 了。）个人理解，供参考。","cat":"资产减值","kw":"减值,清算企业,基准⽇应交税费余额,进项税额⼤于销项税额,如何结转余额","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第8号——资产减值"},{"id":"CY1194","q":"在建⼯程减值准备核销","a":"因为是对在建⼯程的清理（即终⽌确认），故差额应作为资产报废清理的收益，计⼊营业外收⼊。不应确认为资产处置损益（确认为资产处置损益的项⽬，⼀般是作为旧货出售，资产本身的使⽤功能仍在），更不应作为减值准备转回处理。个人理解，供参考。","cat":"资产减值","kw":"减值,在建⼯程减值准备核销","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第8号——资产减值"},{"id":"CY1531","q":"年终⼀次性奖⾦分配的问题","a":"由于年终奖的计算依据是全年项⽬业绩，⽽不仅仅是12⽉份的业绩，因此⽅案⼆相对更合理。个人理解，供参考。","cat":"实务综合","kw":"年终⼀次性奖⾦分配的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1538","q":"⼀个看似简单的核算问题","a":"这类⽀出不符合业务招待费的定义，严格来说也不符合确认为职⼯福利费的条件（财企[2009]242号⽂只是规定“⾃办职⼯⻝堂经费补贴或未办职⼯⻝堂统⼀供应午餐⽀出”可列⼊福利费，没有列明加班餐费）。如果严格按照这些财务管理规定来，似乎也只有“管理费⽤——其他”了。个人理解，供参考。","cat":"实务综合","kw":"请教陈版,⼀个看似简单的核算问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1542","q":"关于未分配利润问题","a":"关键是：不仅仅是在分配的基准⽇（此处是2023年年末），⽽且在作出分配的股东会决议之⽇以及实际实施之⽇，都要保证有⾜够的未分配利润余额可供分配。主帖案例中，截⾄2025年6⽉末，未分配利润余额是-200万元，因此已⽆⾜够的未分配利润可供分配。在此情况下不能作出利润分配的决议。个人理解，供参考。","cat":"实务综合","kw":"关于未分配利润问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1559","q":"结算减少导致收⼊、单项计提应收账款坏账冲回，⾮经常性损益处理","a":"你的理解有⼀定合理性。即此时坏账准备的转回并⾮由于债务⼈信⽤⻛险的改善所导致，⽽是调减结算⾦额（相应冲减收⼊和减少应收账款）附带导致的影响。且这两个事项整体上对净利润的影响为零。 但建议考虑：该笔应收账款仍有决算调整情况，表明本企业与其仍有业务往来，在这种情况下全额计提坏账准备是否合理。个人理解，供参考。","cat":"实务综合","kw":"求助陈版主,结算减少导致收⼊,单项计提应收账款坏账冲回,⾮经常性损益处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1565","q":"关联企业之间是否可以做佣⾦收⼊","a":"如果有真实交易作为⽀持，且价格公允，则关联⽅之间也可以确认佣⾦收⼊。但要证明这⼀点，难度很⼤，尤其是主帖案例中存在做⼤A公司收⼊的舞弊动机。另外，此类关联⽅之间的佣⾦的税务⻛险很⼤，建议与税务专业⼈⼠事先沟通确认。个人理解，供参考。","cat":"实务综合","kw":"关联企业之间是否可以做佣⾦收⼊","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1568","q":"PPP项⽬不再继续，报表列示项⽬？","a":"建议根据该项⽬的终⽌协议约定处理。⼀般情况下，此类项⽬既然终⽌，后续不会再有运营期，因⽽确认⽆形资产的可能性较⼩，更⼤可能性是与政府⽅协商，就已完⼯部分的⼯程款进⾏结算，在未来⼀段时间内收回，故确认⾦融资产的可能性更⼤。如果最终处置⽅案未明确，则暂挂其他⾮流动资产。个人理解，供参考。","cat":"实务综合","kw":"请教陈版主,PPP项⽬不再继续,报表列示项⽬","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1572","q":"会计类5号第7条 逆流交易","a":"既然已有明确规定，那也就只能照此执⾏，但我个⼈对此仍有保留。 据个⼈了解，该问题之前已经深⼊讨论过，后⾯坚持⽬前的“处置等于实现”的观点（当时会上有明确提出继续抵消的观点，并进⾏对⽐讨论，但继续抵消的观点没有被直接反驳或被认为不对， 但⽐较后，仍坚持了⽬前会计类5号的观点），其核⼼的理由如下：个人理解，供参考。","cat":"实务综合","kw":"会计类5号第7条,逆流交易","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1578","q":"关于收益分配分段的合伙协议，有限合伙⼈是否合并合伙企业","a":"要考虑最终实现超过800万元收益的可能性有多⼤？即定量测算各种结果的可能性，据此定量测算GP在可变回报中所享有的量级和可变程度。据此判断GP是否为代理⼈。例如，如果退出时获得收益超过800万元的可能性不⼤，或者预计仅略微超过800万元，则GP所享有或承担回报的可变性和量级不⼤，仍属于代理⼈。个人理解，供参考。","cat":"实务综合","kw":"合并,关于收益分配分段的合伙协议,有限合伙⼈是否合并合伙企业","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1599","q":"调整考核条件的股份⽀付费⽤确认问题","a":"应采⽤观点B，即业绩条件（⾮市场条件）的修改不影响原授予⽇的权益⼯具公允价值计量。个人理解，供参考。","cat":"实务综合","kw":"公允价值,请教陈版主,调整考核条件的股份⽀付费⽤确认问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1614","q":"紧急求助有关股份⽀付⼆次授予的处理问题","a":"第⼆次转让与前次转给实控⼈（⽆等待期）的股份⽀付交易⽆直接关系，第⼆次股份⽀付的费⽤确认不能冲销之前实控⼈确认的这100万股份⽀付费⽤。第⼆次股份⽀付的费⽤总额=第⼆次授予⽇标的股票的公允价值-第⼆次股份⽀付的授予价格。个人理解，供参考。","cat":"实务综合","kw":"公允价值,紧急求助有关股份⽀付⼆次授予的处理问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1146","q":"请教陈⽼师：关于有限合伙⼈合伙企业份额","a":"这类情况可能符合《企业会计准则第37号——⾦融⼯具列报》第三章所述的特殊⾦融⼯具，即符合⾦融负债定义，但在被投资企业⾃身报表中需列报为权益⼯具。 这样处理背后的逻辑是：虽然因为该被投资主体有存续期限限制，或者明确承诺获得收益就必须及时分配，从⽽符合⾦融负债的定义，但该类⼯具在被投资主体所发⾏的各类⾦融⼯具中，对被投资主体资产的要求权是处于最劣后地位的。任何⼀个会计主体都不可能只有资产和负债⽽没有权益，因此只能将要求权处于最劣后地位的⼯具指定为权益，否则，由于资产和负债计量模式不匹配，如果没有⼀个权益项⽬作为最终的平衡项⽬，可能⽆法实现资产负债表左右两边的平衡。个人理解，供参考。","cat":"报表列报","kw":"请教陈⽼师,关于有限合伙⼈合伙企业份额","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第30号——财务报表列报、《企业会计准则第37号——⾦融⼯具列报》"},{"id":"CY1244","q":"对通道公司提供⽆息资⾦是否构成权益性交易？","a":"如果站在A公司⾃身报表的⻆度来看，该笔资⾦事实上是股东提供的⻓期资⾦，具有“准权益”的性质，只有到A收回对C的投资后才可能偿还该笔股东贷款。严格来说，该笔资⾦虽名义上是借款，但其本身已经实质上构成双⽅股东对A的资本性投⼊。在C的报表附注中应对这⼀情况进⾏充分披露。 对于C是否需对该笔资⾦计提利息的问题，我认为仍需计提确认利息⽀出。C对该笔借款的处理，类似于《中审众环研究2020》之“问题4-1-26（⺟⼦公司之间的⽆息或低息贷款在双⽅各⾃个别财务报表中的处理）”中的“情形2：P公司向S公司提供⽆息贷款100,000元。该笔贷款需到S公司有⾜够资⾦时偿还”。个人理解，供参考。","cat":"报表列报","kw":"对通道公司提供⽆息资⾦是否构成权益性交易","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第30号——财务报表列报"},{"id":"CY0742","q":"7⽉15⽇，理论上应根据截⾄该时点的最新信息对⼀个⽉后该⾦属的市场价格进⾏合理估计，据此估计相关嵌⼊衍⽣⼯具的公允价值，作为计量相应收⼊的基础；后续随着⾦属市场的波动情况对该估计进⾏调整，调整的影响计","a":"这应该是保护性条款，⼀般情况下不会被触发，故对收⼊确认⽆实质影响。提问⼈：66飞雪化蝶 时间：2024-10-10 08:47:43 感谢陈版，现有⼀个关于银⾏存款在途事项想请教您， 我司俄罗斯⼦公司转给国内母公司的货款，在路上1个多⽉了⼀直没到账（战争影响），影响合并层⾯母⼦公司往来对账，我考虑合并层⾯调整进来，但不知此笔在途资⾦放哪个科⽬合适，想放在其他货币资⾦-在途货币资⾦， 但没找到这个科⽬的设置依据 回答⼈：chenyiwei 其他货币资⾦下可以设置在途货币资⾦明细科⽬。也可以列其他流动资产。但⽆论如何列报，都需要谨慎关注其坏账可能性。个人理解，供参考。","cat":"报表列报","kw":"公允价值,合并,7⽉15⽇,理论上应根据截⾄该时点的最新信息对⼀个⽉后该⾦属的市场价格进⾏合理估计,据此估计相关嵌⼊衍⽣⼯具的公允价值,作为计量相应收⼊的基础,后续随着⾦属市场的波动情况对该估计进⾏调整,调整的影响计","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第30号——财务报表列报"},{"id":"CY0364","q":"应收票据贴现现⾦流量表列报","a":"习惯上，现⾦流量表正表中对于满⾜终⽌确认条件的票据贴现，是按照贴现净额（已扣减贴现息）作为“销售商 品、提供劳务收到的现⾦”，即贴现息虽然在利润表中列⼊投资收益，但现⾦流量却属于经营活动。此时理论上应将该贴现息从间接法的“投资收益”项⽬中剔除（也就是主帖所说的“⼀种认为贴现终⽌确认计量属于经营活动，因此不⽤填列”），但⽬前实务中较少见到现⾦流量表间接法中“投资收益”项⽬与利润表中“投资收益”项⽬⾦额不⼀致的案例，可能把这个差额挤进了经营性应收项⽬增减变动之类的其他项⽬中了。个人理解，供参考。","cat":"报表列报","kw":"应收票据贴现现⾦流量表列报","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第30号——财务报表列报"},{"id":"CY0457","q":"仅做合并审计","a":"⼀般情况下，企业的全套完整财务报表是包含个别报表和合并报表的。如果只是对其中的合并报表发表审计意见， ⽽编制基础除了不编制个别报表以外，其他⽅⾯均遵循企业会计准则的规定，则该业务属于“对单⼀财务报表和财 务报表特定要素的审计业务”，应按照《中国注册会计师审计准则第1603号——审计单⼀财务报表和财务报表特定 要素的特殊考虑》的规定出具审计报告。如果除了没有个别报表以外，编制基础中还存在其他不符合企业会计准则之处，则属于特殊编制基础财务报表的审计报告，应按《中国注册会计师审计准则第1601号——审计特殊⽬的财务报表的特殊考虑》相关规定处理。个人理解，供参考。","cat":"合并报表","kw":"合并,仅做合并审计","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY0375","q":"公交公司动⼒电池更换问题","a":"信息⽐较有限，⽆法合理判断，例如与电池更换有关的成本，有多少可由电池或车辆⼚商承担，有哪些需由运营企业承担？只有需由运营企业承担的成本才应当纳⼊补贴⾦额的测算范围。另外，补贴⾦额的测算更多地是⼀项咨询业务，与审计业务可能存在独⽴性冲突。 建议测算电动公交车运营的全周期成本（付现成本中由运营⽅承担的部分），与预计的票款等收⼊相⽐测算出每年的资⾦缺⼜，作为测算补贴⾦额的依据。 提问⼈：wwwkey 时间：2024-05-17 21:40:28 陈⽼师： 我们主要还是做咨询，评审政府补贴费⽤的合理性，更换⼀辆车的成本需要18万元。付现成本全部由运营⽅承担， 提供的是免费公交，费⽤全部由政府补贴。其他费⽤不⽤考虑，假想按⼀个固定值算。单考虑换电池的成本，政府为了简便，想让补贴更平缓，所以想提前把更换电池的成本折现，按弃置费⽤的模式，记⼀个固定资产，每年计提折旧，计⼊成本。 回答⼈：chenyiwei 会计上对8年后的更换电池并不是⼀项现时义务（除⾮与政府签订的PPP合同中对电池更换问题有明确约定），否则⽐照固定资产⼤修理⽀出处理，不应事先预提。但从财务管理⾓度这样测算是有合理性的。个人理解，供参考。","cat":"收入准则","kw":"固定资产,折旧,公交公司动⼒电池更换问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0524","q":"顾客取消订单赔偿款的账务处理","a":"应采⽤第2项。由于原材料的控制权未转移给客户，故不能确认收⼊和成本，只能将原材料账⾯价值抵减客户补偿款后的净额作报废损失处理。 提问⼈：我的梦想211 时间：2024-08-13 16:30:25 陈版，根据《上市公司执⾏企业会计准则2024》案例6-26，解析，企业根据客户的订单需求，进⾏了⽣产备货;后 续由于市场的需求变化，客户取消了相关的订单，同时⽀付给公司⼀笔赔偿款，该部分款项系由于企业履⾏履约义务⽽产⽣的向客户收取款项的权利，应将其作为营业收⼊。跟这个有什么区别吗？ 回答⼈：chenyiwei 我理解这个案例应该更是针对在⼀段时间内履约的履约义务。因为在⼀段时间内履约的履约义务实际上是在履约期间逐步将商品控制权转移给客户的，由此逐步累积向客户收款的权利。在这种情况下，客户终⽌合同的赔款中，针对已履⾏的履约义务的部分实际上是收⼊对价的收回，确认为营业收⼊是合理的。但是，如果是在⼀个时点履约的履约义务，截⾄合同终⽌时商品控制权尚未转移给客户，那么这种情况下是缺少确认收⼊的基础的。所以这个案例的表述还是可以商榷，例如增加前提：相关的履约义务属于在⼀段时间内履⾏。个人理解，供参考。","cat":"收入准则","kw":"控制权,履约义务,顾客取消订单赔偿款的账务处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY1097","q":"关于融资租赁中的直租和售后回租⽅式的账务处理","a":"这⾥的“直租”实质上和售后回租⼀样，都属于以资产为抵押的融资⾏为，因此会计处理也应当⼀样。我们在此前的技术提示中已明确了该类“直租”的会计处理建议： 另外还有⼀种常⻅的“以租代买”模式（我们理解该种模式不在《会计类3号》之3-9的规范范围内）：承租⼈先与供应商签署了买卖合同，后因资⾦紧张引⼊融资租赁交易⽅式，与融资租赁公司 （出租⼈）、供应商签订了三⽅协议，原买卖合同解除，由供应商与融资租赁公司签订买卖合同，同时承租⼈与融资租赁公司签订直接租赁合同。融资租赁公司向供应商⽀付资产价款，后续通过向承租⼈收取租⾦的⽅式收回本⾦并获得利息收⼊。租赁期结束，全部租⾦付清后，承租⼈取得租赁资产的完整所有权。 我们理解，这种融资租赁协议，名为直租，实际上融资租赁公司仅提供融资，租赁资产的控制权由供应商直接转移给承租⼈，出租⼈实质上是以租赁物为抵押，以代付资产购建款项的形式向承租⼈提供融资。因此，对于此类租赁，可以参照原租赁准则下的“售后回租构成融资租赁”或者新租赁准则下的“售后租回中的资产出售不构成销售”进⾏会计处理，不使⽤“使⽤权资产”和“租赁负债”科⽬。即承租⼈的处理要点为：个人理解，供参考。","cat":"收入准则","kw":"控制权,租赁,关于融资租赁中的直租和售后回租⽅式的账务处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0539","q":"如果甲公司现在资⾦较为困难，不能回购的可能性较⼤时，A公司如何进⾏账务处理？ 回答⼈：chenyiwei","a":"i\" tabindex=\"-1\"> 如果甲公司现在资⾦较为困难，不能回购的可能性较⼤时，A公司如何进⾏账务处理？ 回答⼈：chenyiwei 3、如果甲公司现在资⾦较为困难，不能回购的可能性较⼤时，A公司如何进⾏账务处理？ 回答⼈：chenyiwei 主帖中的A公司很可能是政府平台公司，只是提供资⾦，⾃⾝不参与建设也没有相应的管理能⼒。因此A公司不应确认建造收⼊，只需要将所垫付的资⾦确认为对甲公司的往来款项即可，不应确认在建⼯程。 如果甲公司现在资⾦较为困难，不能回购的可能性较⼤，但仍实际占⽤该产业园区时，则A公司应谨慎对上述往来 款项（债权）计提减值准备，⾄少应包括A公司延迟付款的资⾦时间价值损失。 提问⼈：zhang0922 时间：2024-07-21 10:15:44 陈版您好，项⽬涉及⼟地及房产的权属属于A公司，A公司是不是确认在建⼯程更合适；待A公司将上述建设项⽬移交甲公司时，做分期收款处置资产？ 回答⼈：chenyiwei 法律上的权属并不是会计上确认资产时需考虑的因素，⾄少不是主要因素。本案例中A不具备对资产的控制权，不应确认为⾃⾝的固定资产或存货。个人理解，供参考。","cat":"收入准则","kw":"控制权,减值,固定资产,如果甲公司现在资⾦较为困难,不能回购的可能性较⼤时,A公司如何进⾏账务处理,回答⼈,chenyiwei","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0783","q":"关于企业合并的讨论","a":"在主帖案例中，股权转让完成后，甲⼄丙三⽅股东的持股⽐例分别为46%、45%、9%，虽然⽬前甲在A公司的董事会中仍占多数，但由于已经丧失对股东会的控制权，并不能保证该情况的持久性。由于甲与⼄丙相⽐，在涉及A公司的运营⽅⾯并⽆特别突出、不可替代的优势，因此⼤概率甲丧失了对A的控制权。 主帖中关于“假设A公司是⾼科技公司，经营⽅⾯甲公司具有决对的技术先进性，⼄、丙公司确实在经营⽅⾯难以有话语权，也可能由甲公司合并A公司”这⼀判断基本上是合理的。 提问⼈：L18510021245 时间：2024-10-08 15:24:38 陈版主，若A公司将公司股东各派出董事会成员⼈数固定，写进公司章程，且修改公司章程须经2/3以上通过，甲公司股⽐不到⼀半，也就是说，甲公司不同意的修改的话，公司⽆法变更公司章程，因此甲公司能够持久的控制董事会，这样的话甲公司是否可以合并A公司呢？烦请陈版主帮忙指导，感谢！ 回答⼈：chenyiwei 仅仅依据董事会的多数，不是控制权判断的充分证据。⾸先要确定为何甲公司持股46%但却在董事会中固定占据多数。特别是当甲⽅与其他股东相⽐并⽆特殊优势时。个人理解，供参考。","cat":"收入准则","kw":"控制权,合并,关于企业合并的讨论","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY1728","q":"单⽅增资⼦公司并承担亏损后解散的合并报表处理问题","a":"在A公司单⽅⾯对该⼦公司增资时，在A公司的合并报表层⾯，相当于⺟公司向⼦公司的少数股东进⾏了利益让渡，让渡利益的⾦额就是⺟公司A代⼦公司少数股东承担⼦公司历史亏损的⾦ 额。因此，在增资时点，应按⺟公司承担⼦公司额外亏损的⾦额，在合并报表层⾯体现⼀项权益性交易，即从资本公积转⼊少数股东权益。该处理等同于⺟公司购买⼦公司的少数股权（均属于在保持控制权前提下，⺟公司对⼦公司的持股⽐例上升），只不过⽀付给少数股东的购买价款为零。 相应地，后续解散该⼦公司时，在合并报表层⾯，上述权益性交易所形成的资本公积应保持不变，分配给少数股东的⾦额与合并报表层⾯原有的少数股东权益之间的差额（如有）应计⼊投资收益。 提问⼈：⼤呆呆 时间：2025-09-30 10:07:09 陈⽼师，您的意思是在增资时点，合并报表按照增资后的⽐例确认少数股东权益，将增资前、后的少数股东权益差额作为权益性交易，计⼊资本公积。是这样吗？我觉得少数股东权益是否应该分段计算？ 回答⼈：chenyiwei 少数股东权益是时点数，不能分段计算。少数股东损益是分段计算的。两者差异体现为权益性交易，调整资本公积。个人理解，供参考。","cat":"收入准则","kw":"控制权,合并,少数股东,单⽅增资⼦公司并承担亏损后解散的合并报表处理问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY1631","q":"向陈版主求助","a":"https://bbs.esnai.com/forum.php?mod=viewthread tid=5493575个人理解，供参考。","cat":"实务综合","kw":"向陈版主求助","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1636","q":"股东未出资的情况下，能否划拨资产作为资本公积","a":"在尚未出资之前，先⽆偿划转资产给被投资企业，在法律上并⽆禁⽌性规定，但商业合理性难以证明。个人理解，供参考。","cat":"实务综合","kw":"股东未出资的情况下,能否划拨资产作为资本公积","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1658","q":"被投资单位向其他股东分红我怎么处理","a":"⾸先需确定为何单⽅⾯向C分红，B放弃？需根据其背后的理由和商业实质确定应如何处理。个人理解，供参考。","cat":"实务综合","kw":"被投资单位向其他股东分红我怎么处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1662","q":"⼦公司豁免⺟公司债务的会计与税务处理","a":"如果投资款不够冲减（如投资款200万，⽆需偿还款项300万），则超出部分通常理解应视为⼦公司对⺟公司的分配，⺟公司应计⼊投资收益处理，⽽不是计⼊⺟公司本身的资本公积。税务问题建议咨询税务专业⼈⼠意⻅。个人理解，供参考。","cat":"实务综合","kw":"⼦公司豁免⺟公司债务的会计与税务处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1674","q":"Reits发⾏费⽤应计⼊什么科⽬？","a":"即使在出表情况下，REITs的发⾏费⽤也不是形成⻓期股权投资的初始直接费⽤，不能计⼊⻓期股权投资成本。 发⾏REITs募集的资⾦确认为负债的，发⾏费⽤应计⼊（冲减）该项负债的初始计量⾦额；属于权益的，冲减资本公积。个人理解，供参考。","cat":"实务综合","kw":"Reits发⾏费⽤应计⼊什么科⽬","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0488","q":"⼦公司资本公积转⼊母公司实收资本是否可⾏以及涉税问题","a":"⼀般情况下，⼦公司的资本公积是不能转⼊母公司作为实收资本的。但在主帖案例中存在⼀个“母⼦颠倒”过程，这 ⼀过程可以理解为A公司对于B公司除了原“长期股权投资——A”以外的其他资产和业务的同⼀控制下合并，这样A ⾃⾝报表中的净资产⾦额应当也会增加。可以考虑能否以本次增加的净资产转增A的实收资本。个人理解，供参考。","cat":"长期股权投资","kw":"合并,⼦公司资本公积转⼊母公司实收资本是否可⾏以及涉税问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"CY1627","q":"评估基准⽇后新增资产是否需要评估","a":"通常情况下，评估报告的有效期⾃基准⽇起⼀年，就是假设该⼀年内被评估资产的公允价值不会发⽣重⼤变化。因此，基准⽇后但仍在评估有效期内，通常情况下其公允价值与账⾯价值差异不⼤（尤其是以成本法确定评估值的情况），⼀般⽆需重新评估新增资产。当然具体还需与联营企业的其他投资⽅确认。个人理解，供参考。","cat":"长期股权投资","kw":"公允价值,成本法,评估基准⽇后新增资产是否需要评估","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"CY0546","q":"私募股权基⾦核算问题","a":"需注意：在初始确认时指定为以公允价值计量且其变动计⼊其他综合收益的权益⼯具投资（其他权益⼯具投资） 后，该指定不可撤销，因此该基⾦是不可以再将其重分类为其他⾮流动⾦融资产的。相应地，如果本企业对该合伙企业是权益法核算，则这些处置差额也不会影响本企业的投资收益。个人理解，供参考。","cat":"长期股权投资","kw":"公允价值,权益法,私募股权基⾦核算问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"CY0916","q":"权益法超额亏损的转回（会计3号）","a":"不应这样理解。 因为此前长期股权投资账⾯价值已经减记为零，本期因其他综合收益负数，被投资企业净资产进⼀步减少，因此本期其他综合收益份额-12万元也同样在账外备查登记，不确认在表内，对于本期的其他综合收益负数⽆需账务处 理。个人理解，供参考。","cat":"长期股权投资","kw":"权益法,权益法超额亏损的转回,会计3号","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第2号——长期股权投资"},{"id":"CY1045","q":"内部交易存在税差的时候，合并抵消应当怎么去做","a":"⾸先，在⼄公司⽆法抵扣的增值税100应⼀次性计⼊管理费⽤，因此该交易就变成了：甲公司以900销售存货（成本800）给⼄公司，⼄公司期末尚有10%未实现销售。 本期应抵销的营业成本=甲销售给⼄的营业成本800+⼄实现销售的90%中的成本虚增部分（900-800）*90%+⼄公司将增值税额计⼊存货成本导致的营业成本虚增部分90=980。因此抵销分录应为： 借：营业收⼊ 900 借：管理费⽤ 100 贷：营业成本 980 贷：存货 20（=⼄公司因将增值税额计⼊存货成本导致虚增的10010%+期末存货的未实现⽑利（900-800）10%）个人理解，供参考。","cat":"合并报表","kw":"合并,请教陈版主,内部交易存在税差的时候,合并抵消应当怎么去做","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY1477","q":"及各位⼤神关于分红问题","a":"根据《关于编制合并会计报告中利润分配问题的请示的复函》（财会函[2000]7号）：“编制合并会计报表的公司，其利润分配以⺟公司的可供分配的利润为依据。合并会计报表中可供分配利润不能作为⺟公司实际分配利润的依据。”即，通常情况下利润分配以被投资企业个别报表层⾯的未分配利润为依据。 上述规定是针对⼀般企业利润分配的。国资委对于国有企业上缴国有资本收益另有规定的，从其规定。 对于此处“⼦公司B的合并报表未分配利润显低于其单体报表”的情况，应关注其合理性，考虑是否表明个别报表层⾯存在会计差错（例如对该⼦公司的⻓期股权投资减值准备计提不⾜）。个人理解，供参考。","cat":"合并报表","kw":"减值,合并,求助陈版主及各位⼤神关于分红问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY0701","q":"兄弟公司之间的交易会对母公司合并财务报表产⽣哪些影响？","a":"对于B的合并报表⽽⾔，D向C提供服务属于对外交易，会在B的合并报表中体现收⼊、成本，不涉及抵销问题，合并报表层⾯利润增加10，归母净利润增加3。 C向D提供产品或服务，B的合并报表中将会体现为成本增加，利润和归母净利润减少。提问⼈：wufaxian 时间：2024-08-24 11:30:34 谢谢陈⽼师的解答。 “ C向D提供产品或服务，B的合并报表中将会体现为成本增加，利润和归母净利润减少。”———-关于这⼀项，完全是因为D购买服务造成的成本增加吧？与BC同属于A的⼦公司⽆关，是么？ 回答⼈：chenyiwei 是。个人理解，供参考。","cat":"合并报表","kw":"合并,兄弟公司之间的交易会对母公司合并财务报表产⽣哪些影响","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY0181","q":"租⾦赔偿⾦新租赁准则下如何处理","a":"该项赔偿⾦与使⽤权资产的终⽌确认相关，因此应确认为资产处置损益。但实务中也可以接受列⼊营业外⽀出。提问⼈：沉默羔⽺ 时间：2024-04-11 13:47:00 是否可以计⼊费⽤的租赁费中呢？ 回答⼈：chenyiwei 不可以。不是正常的因使⽤资产造成的⽀出。个人理解，供参考。","cat":"租赁","kw":"租赁,租⾦赔偿⾦新租赁准则下如何处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁"},{"id":"CY0656","q":"不需重新计量租赁负债","a":"如果发⽣不属于承租⼈可控范围内事项的事件或变化，也涉及对租赁负债和使⽤权资产的重新计量，这些规定已包含在租赁变更的⼀般规定之内。第⼗五条规定的“发⽣承租⼈可控范围内的重⼤事件或变化，且影响承租⼈是否合 理确定将⾏使相应选择权的，承租⼈应当对其是否合理确定将⾏使续租选择权、购买选择权或不⾏使终⽌租赁选择权进⾏重新评估”是对这种特殊情况的强调。个人理解，供参考。","cat":"租赁","kw":"租赁,不需重新计量租赁负债","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁"},{"id":"CY0606","q":"借：所得税费⽤ -1475","a":"是，都不需要。 提问⼈：wx_5abe02573bf7 时间：2024-07-29 10:39:11 陈⽼师，使⽤权资产的账⾯价值和计税基础为什么不存在暂时性差异？我认为账⾯价值是6000万，计税基础是0， 还存在暂时性差异 回答⼈：chenyiwei 税法上也认可这是预付租⾦，需在以后的租赁期内分期扣除，所以计税基础等于预付⾦额。个人理解，供参考。","cat":"租赁","kw":"租赁,所得税,所得税费⽤,-1475","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁"},{"id":"CY1680","q":"版主⼤⼤，关于⼯程竣⼯财务决算的问题","a":"这部分虽然没有单独的预算，但应当可以根据⼯作量和单位预算标准等，模拟测算出该部分对应的预算。作为⽐较依据，可⾏性研究报告应已包含于整体项⽬的可研报告中，应可引⽤整体项 ⽬的可研报告中的相应内容。 进项税额按该部分的实际发⽣⾦额计算。个人理解，供参考。","cat":"实务综合","kw":"版主⼤⼤,关于⼯程竣⼯财务决算的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1681","q":"应付票据开具⽅承担银⾏承兑汇票贴现利息的会计处理","a":"在主帖案例中，供应商承担贴现利息，是供应商接受票据结算⽅式的前提。甲公司在这⼀过程中获得了延迟付款的融资便利，故甲公司应将应付票据转⼊短期借款，贴现利息在借款期限内 （⾄票据到期兑付时⽌）分摊，确认为各期的利息⽀出处理。 甲公司⼀次性计⼊财务费⽤的做法是不妥当的。个人理解，供参考。","cat":"实务综合","kw":"应付票据开具⽅承担银⾏承兑汇票贴现利息的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1682","q":"求助：关于⼦公司引进外部股东","a":"关键是既不能有强制回购义务，也不能有强制分红义务（不论⾦额是否固定）。因此：个人理解，供参考。","cat":"实务综合","kw":"关于⼦公司引进外部股东","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1684","q":"公司发⽣权益性交易，其他资本公积不⾜冲减","a":"权益性交易⼀般不应冲减其他资本公积，只有资本溢价可供冲减。如果资本公积（资本溢价或股本溢价）不⾜冲减的，则不⾜冲减的差额继续依次冲减盈余公积、未分配利润。个人理解，供参考。","cat":"实务综合","kw":"公司发⽣权益性交易,其他资本公积不⾜冲减","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1448","q":"以下业务可以确认为收⼊吗？","a":"不应确认收⼊，仍属于收到的损害赔偿款。 对于被挖断⽽报废的电⼒设施，按资产报废清理进⾏会计处理；对于新建的设施，按实际成本确认为固定资产，将补偿款（3万元）确认为递延收益，在新建固定资产的折旧年限内摊销，冲减各期折旧成本；或者直接将3万元冲减新建资产的成本。个人理解，供参考。","cat":"政府补助","kw":"递延,固定资产,折旧,摊销,以下业务可以确认为收⼊吗","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第16号——政府补助"},{"id":"CY1686","q":"⺟⼦公司资产负债化转问题","a":"个别报表层⾯的资本公积不应出现负数余额。 鉴于A公司（划出⽅）的股东权益项⽬只有实收资本和未分配利润，故划出时应按划出净资产账⾯价值借记未分配利润，即使这样做使得未分配利润变为负数。个人理解，供参考。","cat":"实务综合","kw":"⺟⼦公司资产负债化转问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1687","q":"政府部⻔对国有企业的资本性投⼊，现⾦流量表是放到融资活动的哪⾥？","a":"如果增加企业的实收资本的，则列⼊“吸收投资收到的现⾦”。 如果是列⼊资本公积，不增加实收资本的，则列⼊“收到其他与筹资活动有关的现⾦”。个人理解，供参考。","cat":"实务综合","kw":"政府部⻔对国有企业的资本性投⼊,现⾦流量表是放到融资活动的哪⾥","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0907","q":"三级⼦公司在集团母公司持股⽐例不同的⼆级⼦公司之间交易，期末少数股 东损益如何…","a":"合并报表中的少数股东权益应根据外部少数股东直接持有⼦公司的股权⽐例计算。在内部股权交易前后，外部少数股东直接持有任何⼦公司的股权⽐例都没有变化，所以合并报表层⾯的少数股东权益⾦额是不变的。 该交易⽇后，C的少数股东可以通过C间接享有D的留存收益和其他综合收益变动额（⾃交易⽇后起算的新变动 额）的49%，体现在归属于少数股东的留存收益中，但并不等于将C的49%股权对应的净资产（包括实收资本和资本公积，以及前期的留存收益和其他综合收益）也⼀并转移给少数股东了。 合并利润表中的少数股东损益和其他综合收益当然是要分段计算的。个人理解，供参考。","cat":"合并报表","kw":"合并,少数股东,三级⼦公司在集团母公司持股⽐例不同的⼆级⼦公司之间交易,期末少数股,东损益如何…","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY1689","q":"通过单独主体达成的共同经营","a":"这种可能性不能排除，但⾸先要证明该安排符合通常的商业逻辑，具有商业合理性。例如，在双⽅权益⽐例存在⼀定差距的情况下（6：4），为何⼩股东被授予⼀票否决权。其次，应重点关注以下问题：个人理解，供参考。","cat":"实务综合","kw":"请教陈版,通过单独主体达成的共同经营","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0432","q":"关于使⽤权资产到期后⾏使购买选择权的实务","a":"当初是否为售后回租？或者是名为直租，实际上是“以租代买”（承租⼈先与供应商签署了买卖合同，后因资⾦紧张引⼊融资租赁交易⽅式，与融资租赁公司（出租⼈）、供应商签订了三⽅协议，原买卖合同解除，由供应商与融资租赁公司签订买卖合同，同时承租⼈与融资租赁公司签订直接租赁合同。融资租赁公司向供应商⽀付资产价款，后续通过向承租⼈收取租⾦的⽅式收回本⾦并获得利息收⼊。租赁期结束，全部租⾦付清后，承租⼈取得租赁资产的完整所有权）？ 如果是上述这两种情况，则不应确认使⽤权资产和租赁负债，⽽是参照以往融资租赁承租⼈的做法，确认固定资产和长期应付款（将期满时的名义留购款的折现值也并⼊这两者的初始计量中）。这种融资租赁协议，名为直租，实际上融资租赁公司仅提供融资，租赁资产的控制权由供应商直接转移给承租⼈，出租⼈实质上是以租赁物为抵押， 以代付资产购建款项的形式向承租⼈提供融资。因此，对于此类租赁，可以参照原租赁准则下的“售后回租构成融 资租赁”或者新租赁准则下的“售后租回中的资产出售不构成销售”进⾏会计处理，不使⽤“使⽤权资产”和“租赁负 债”科⽬。即承租⼈的处理要点为：个人理解，供参考。","cat":"收入准则","kw":"控制权,租赁,固定资产,关于使⽤权资产到期后⾏使购买选择权的实务","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0801","q":"⼦公司出表后成为关联⽅，存续交易是否为关联交易？","a":"这个问题涉及到会计和证券监管两个⼜径。就会计准则⼜径⽽⾔，在A不再纳⼊C的合并范围之后，A与C之间发⽣的所有资源转移都属于关联⽅交易，应在报表附注中作为关联交易披露。 从证券监管规定⽽⾔，虽有主帖中引⽤的《深圳证券交易所上市公司信息披露指引第5号——交易与关联交易》规定，但主帖中也提及“于2024年协商按照竣⼯决算审定数结算并⼊账”，即2024年内双⽅之间的交易条款发⽣了变 化，并不是完全按照A脱离C合并范围之前双⽅已约定的条款执⾏的。在这种情况下，应就条款的修订履⾏相关决策程序。完全不履⾏决策程序也是不恰当的。个人理解，供参考。","cat":"合并报表","kw":"合并,⼦公司出表后成为关联⽅,存续交易是否为关联交易","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY1872","q":"内部交易损益的抵消对少数股东损益的影响","a":"观点⼆更合理。此问题在《企业会计准则第33号——合并财务报表（2014年修订）》第三⼗六条中已有明确规定： 第三⼗六条 ⺟公司向⼦公司出售资产所发⽣的未实现内部交易损益，应当全额抵销“归属于⺟公司所有者的净利润”。 ⼦公司向⺟公司出售资产所发⽣的未实现内部交易损益，应当按照⺟公司对该⼦公司的分配⽐例在“归属于⺟公司所有者的净利润”和“少数股东损益”之间分配抵销。 ⼦公司之间出售资产所发⽣的未实现内部交易损益，应当按照⺟公司对出售⽅⼦公司的分配⽐例在“归属于⺟公司所有者的净利润”和“少数股东损益”之间分配抵销。个人理解，供参考。","cat":"合并报表","kw":"合并,少数股东,内部交易损益的抵消对少数股东损益的影响","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表、《企业会计准则第33号——合并财务报表（2014年修订）》"},{"id":"CY1168","q":"PPP政府付费拖⽋严重，关于会计核算和税务问题","a":"收⼊准则第五条中的“对价很可能收回”的条件，是指在合同开始⽇⾄收⼊确认⽇之间对此问题作出评估，如果截⾄收⼊确认⽇，没有证据表明政府的财政状况出现问题，可能⽆⼒履⾏付款义务的，则该条件仍应被视为满⾜，即收⼊仍应确认。后续应收账款的拖⽋等事项，按照《企业会计准则第22号——⾦融⼯具确认和计量》的规定计提坏账准备。如发⽣债务重组的，则按照《企业会计准则第12号——债务重组》处理。 ⽬前的实务中，PPP模式最流⾏的时候，地⽅政府的债务问题尚未⼤规模爆发，因此⼤部分PPP项⽬都可能基于当时对地⽅政府财务状况的判断，认为符合收⼊确认条件，据此确认了收⼊和应收账款。但后续因疫情等原因导致政府财政状况恶化，导致对进⼊运营期的PPP项⽬付费⾦额发⽣拖⽋，此时不涉及对此前已确认收⼊的重新评估问题，⽽是对已确认的应收账款按照预期信⽤损失模型计提坏账准备。对于此类坏账准备的计提，可参考《上市公司执⾏企业会计准则案例解析2024》之【案例2-19】。 税务上对于坏账损失要到实际发⽣资产损失时才能扣除。因此存在可抵扣暂时性差异。对于可抵扣暂时性差异确认递延所得税资产要谨慎。个人理解，供参考。","cat":"收入准则","kw":"所得税,递延,债务重组,PPP政府付费拖⽋严重,关于会计核算和税务问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入、《企业会计准则第22号——⾦融⼯具确认和计量》、《企业会计准则第12号——债务重组》"},{"id":"CY1432","q":"只要是适⽤15号编报规则的财务报表，就应根据该规则披露重要性相关信息。2、赞同你的理解。回答⼈：chenyiwei","a":"i\" tabindex=\"-1\"> 只要是适⽤15号编报规则的财务报表，就应根据该规则披露重要性相关信息。2、赞同你的理解。回答⼈：chenyiwei 1、只要是适⽤15号编报规则的财务报表，就应根据该规则披露重要性相关信息。2、赞同你的理解。回答⼈：chenyiwei 附注中披露的经营范围⼀般摘⾃⺟公司营业执照上的记载内容，但涉及实际从事的经营活动，应同时包含⺟⼦公司。提问⼈：爬爬呀 时间：2025-06-22 15:53:30 太谢谢陈版主指导了。还有个问题想请教下：若⼦公司设⽴主要为⺟公司提供服务，最终这块收⼊都已经抵消了，那么对应⼦公司这块的收⼊会计政策是否仍需要在合并报告附注中披露呢？ 回答⼈：chenyiwei 不需要。因为该项业务并未体现在合并报表中。提问⼈：爬爬呀 时间：2025-08-17 15:58:57 继续追问下，像上市公司合并范围内关联⽅收⼊确认不恰当地采⽤总额法，但由于最终不影响合并数据。这块对于上市公司报告是否会存在重⼤影响呢？是否会表明存在重⼤错报呢？ 回答⼈：chenyiwei 对涉及各⽅的个别报表还是有影响的。个人理解，供参考。","cat":"收入准则","kw":"合并,只要是适⽤15号编报规则的财务报表,就应根据该规则披露重要性相关信息,赞同你的理解,回答⼈,chenyiwei","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0418","q":"我的观点如下：不符合研发定义，也不符合⽆形资产的定义，可以计⼊待摊费⽤，按3年禁售期摊销不知我的理解是否正确，请陈版主指点，谢谢陈版主！","a":"此问题已在其他地⽅回复过，此处补充关于后续摊销⽅式、摊销年限的回复。 由于相关经济利益的实现，只能通过B公司购买产品，故理论上最合理的摊销⽅式是采购量法，即按照本年度采购量占有效期内预计采购总量的⽐例分摊，将分摊额计⼊采购成本中。如果⽆法合理估计的（个⼈理解完全⽆法合理估计也是难以解释的，否则⽆法解释为何进⾏该项研发委托），则在预计的产品寿命期内按直线法摊销，但摊销额直接计⼊各年度营业成本，不再通过采购成本和成本核算系统过渡。 关于摊销年限，如果采⽤直线法摊销的，则需估计摊销年限，⼀般为相关产品的预计市场寿命周期。提问⼈：15827018082 时间：2024-06-03 16:02:38 背景：B公司为芯⽚开发公司，A公司委托B公司开发⼀款芯⽚，合同⾦额为1000万元，合同约定分开发阶段付 款，芯⽚开发完成后，知识产权仍归属于B公司，A公司仅享有独占使⽤权（⽆年限限制），A公司后续需要单独向B公司采购芯⽚⽤于⽣产销售（开发阶段未约定未来采购量及价格，与芯⽚开发独⽴），且最后芯⽚开发失 败，A公司仍需要承担这部分开发费⽤ 问题：个人理解，供参考。","cat":"收入准则","kw":"摊销,我的观点如下,不符合研发定义,也不符合⽆形资产的定义,可以计⼊待摊费⽤,按3年禁售期摊销不知我的理解是否正确,请陈版主指点,谢谢陈版主","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0157","q":"待执⾏合同中资产和负债的确认","a":"场景⼀：这种情况在合同刚签订和刚开始履⾏时属于待执⾏合同。后续随着服务提供逐步确认收⼊，相应逐步累积收款权利；但此时对⽅尚未⽀付款项，双⽅履⾏合同义务的程度开始出现差异，因⽽不再是待执⾏合同，此时应就双⽅履⾏合同义务程度上的差异确认资产和负债，即针对已提供的服务所对应的收款权利中尚未收到款项的部分确认应收账款或合同资产。 场景⼆：与场景⼀类似。针对已让渡使⽤权的期间（即已交付给承租⼈使⽤的期间）所对应的收款权利中尚未收到款项的部分确认应收租⾦。 场景三：融资租赁已转移租赁物所有权上的主要风险和报酬，相当于分期收款销售，⽽不是让渡有限时间内的使⽤权，故相当于本企业的主要合同义务（转移资产控制权）已全部履⾏完毕。这与经营租赁是完全不同的。个人理解，供参考。","cat":"收入准则","kw":"控制权,租赁,待执⾏合同中资产和负债的确认","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY1701","q":"请教股息红利个税现⾦流处理","a":"收到中登公司退回的款项，仍计⼊经营活动现⾦流（收到其他与经营活动有关的现⾦）。个人理解，供参考。","cat":"实务综合","kw":"请教股息红利个税现⾦流处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1822","q":"关于通过⼀致⾏动协议实现控制的企业合并会计处理问题","a":"上一页 陈版主（陈奕蔚老师）答疑历史文章（2025年09月） 下一页 陈版主（陈奕蔚老师）答疑历史文章（2025年11月） 粤ICP备18107660号 粤公网安备44060602000887号 关于网站 Copyright © 2021-2026 会计便利店 hjyweb.cn 【个人理解，供参考。","cat":"企业合并","kw":"合并,关于通过⼀致⾏动协议实现控制的企业合并会计处理问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY1335","q":"关于联营企业确认投资收益的时点","a":"确认联营企业投资收益的时点应为2025年4⽉1⽇-2025年12⽉31⽇。 过渡期内联营企业损益按约定由本企业享有的部分，增加了投资⽇（2025.3.31）可由本企业享有的可辨认净资产公允价值份额，相应减少内含商誉或者确认为营业外收⼊（内含负商誉），但不能确认为权益法下的投资收益。个人理解，供参考。","cat":"企业合并","kw":"公允价值,商誉,权益法,请教陈⽼师,关于联营企业确认投资收益的时点","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY1338","q":"⾮同控资产评估增值产⽣的递延所得税负债摊销问题","a":"将投资性房地产的后续计量由成本模式改为公允价值模式，属于会计估计变更，相应的递延所得税也应当重新计算并进⾏追溯调整。如果转换⽇的公允价值⾼于原账⾯价值（在合并报表层 ⾯，这⾥的“原账⾯价值”是指以购买⽇公允价值为基础持续计算到会计政策变更⽇的⾦额），则合并报表层⾯的递延所得税负债会因此增加，并不会减少，因此不存在转出的问题。 但需注意：此项会计政策变更不应影响到购买⽇的初始计量以及购买⽇前的账务处理。参阅：《中审众环研究2020》之“问题3-2-66（会计政策变更的追溯调整导致的合并对价分摊的处理）”。个人理解，供参考。","cat":"合并报表","kw":"公允价值,合并,所得税,递延,摊销,⾮同控资产评估增值产⽣的递延所得税负债摊销问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY1086","q":"股权激励实际⾏权价因股票分红⽽低于授予价时是否需要调整股份⽀付费⽤？","a":"不需要。 如果按照每股现⾦分红⾦额，等额调减每股的⾏权价，则该调整不改变权益⼯具的公允价值，故对等待期内股份⽀付费⽤的确认没有影响。个人理解，供参考。","cat":"股份支付","kw":"公允价值,股权激励实际⾏权价因股票分红⽽低于授予价时是否需要调整股份⽀付费⽤","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第11号——股份支付"},{"id":"CY1706","q":"由于款项回收取决于⼟地出让情况，在⽬前的房地产市场形势下，很可能有部分最终⽆法收回，即使能收回也会体现为资⾦时间价值损失，故仍按谨慎原则合理估计这些⼟地预计可实现出让的时间和出让⾦价格，","a":"新收⼊准则并不如以前那样强调收⼊成本的配⽐。这⾥结转成本的原因主要是⼟地已不再由本企业控制，且⽆法保证成本的可收回性，故⼀级开发成本已不再符合资产的定义和确认条件。个人理解，供参考。","cat":"实务综合","kw":"由于款项回收取决于⼟地出让情况,在⽬前的房地产市场形势下,很可能有部分最终⽆法收回,即使能收回也会体现为资⾦时间价值损失,故仍按谨慎原则合理估计这些⼟地预计可实现出让的时间和出让⾦价格","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0415","q":"如存在超额分配，对分配给我⽅的部分，被投资⽅应如何进⾏账务处理； 谢谢陈版！","a":"这种情况下，董事会表决权⽐例与优先分红这两者是存在⽭盾的，少数股东不享有决策控制权但又是剩余风险的直接承担者。为何会有这样的安排？⼀般上市公司收购⼦公司的业绩对赌，虽然也是由上市公司在股东会和董事会上占有多数表决权，但⾄少没有优先分红的约定。建议考虑在头5年，本公司在董事会、股东会上的表决权是否主要 是保护性、合规性的，以确定头5年是否已经取得控制权，还是头5年应按明股实债投资处理，，5年后转为真正的 股权？ 提问⼈：sjcpa123456 时间：2024-06-27 15:37:21 陈版，公司前期主导但却优先分红，主要是因为公司认为最近⼏年市场存在重⼤不确定性，所以先保证⾃⼰收益， 原股东也希望能引进公司作为股东提升被投资⽅的运营管理能⼒，也同意了公司的要求，背景就是这样，还是想请教⼀下陈版，公司这种情况下应如何进⾏会计处理，谢谢 回答⼈：chenyiwei 这种情况下，在本企业享有优先分红权期间，很可能并不控制该被投资企业，可能需作明股实债处理，相当于预付投资款，并按预付投资款收取利息。5年后转为股权投资。个人理解，供参考。","cat":"收入准则","kw":"控制权,少数股东,如存在超额分配,对分配给我⽅的部分,被投资⽅应如何进⾏账务处理,谢谢陈版","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0603","q":"epc企业问题","a":"对这类分别由母⼦公司实施的EPC项⽬，不论其各⾃的单独报表中对该项⽬如何核算，在母公司A的合并报表中， 都应重新考虑是否需将⼦公司单独签订的合同与母公司就同⼀项⽬签订的合同合并为⼀个合同（即在合并报表层⾯符合“合同合并”的条件）。如果满⾜“合同合并”条件的，则还应就合并后的合同重新识别履约义务。 如果不符合合同合并条件，或者虽然可以进⾏合同合并，但母⼦公司各⾃履⾏的部分在合并后的合同中仍被视为单独的两项履约义务，则双⽅在各⾃个别报表中确认的收⼊、成本在合并报表层⾯不应进⾏调整；如果符合合同合并条件且可以合并为⼀项履约义务的，则应针对合并后的履约义务，重新考虑其是否可在⼀段时间内确认收⼊，以及如何确定其履约进度。这种情况下需在合并报表中对母⼦公司各⾃已确认的收⼊和成本进⾏调整，这属于合并报表层⾯的“视⾓差异调整”。 “在合并层⾯同⼀履约进度”的提法是不合理的。 对于设备部分，通常理解是设备制造商将设备交付时，才将该设备的成本或价值纳⼊履约进度计算。⽣产过程中， 本企业尚未取得对设备的控制权，不应纳⼊履约进度计算。个人理解，供参考。","cat":"收入准则","kw":"控制权,合并,履约义务,请教陈版,epc企业问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0683","q":"控股股东授予少数股东看跌期权","a":"这⾥主要原因是：根据《企业会计准则第37号——⾦融⼯具列报（2017年修订）》第⼗⼀条规定：“除根据本准则 第三章分类为权益⼯具的⾦融⼯具外，如果⼀项合同使发⾏⽅承担了以现⾦或其他⾦融资产回购⾃⾝权益⼯具的义务，即使发⾏⽅的回购义务取决于合同对⼿⽅是否⾏使回售权，发⾏⽅应当在初始确认时将该义务确认为⼀项⾦融负债，其⾦额等于回购所需⽀付⾦额的现值（如远期回购价格的现值、期权⾏权价格的现值或其他回售⾦额的现 值）。如果最终发⾏⽅⽆需以现⾦或其他⾦融资产回购⾃⾝权益⼯具，应当在合同到期时将该项⾦融负债按照账⾯价值重分类为权益⼯具。” 在购买⽅的个别报表中，由于收购标的（⼦公司少数股权）并⾮⾃⾝权益⼯具，所以确实如主帖所⾔，确认⼀项以公允价值计量且其变动计⼊损益的⾦融负债（衍⽣⾦融负债）即可。 但在购买⽅的合并报表层⾯，因为⼦公司的少数股权也是合并主体的⾃⾝权益⼯具，所以需要按照上述规定，确认 ⼀项与回购⾃⾝权益⼯具的合同义务相关的⾦融负债，⾦额为需⽀付的回购⾦额的折现值（相当于本⾦+截⾄本资产负债表⽇的累计利息）。个人理解，供参考。","cat":"收入准则","kw":"公允价值,合并,少数股东,控股股东授予少数股东看跌期权","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入、《企业会计准则第37号——⾦融⼯具列报（2017年修订）》"},{"id":"CY0717","q":"长投计减值后处置股权合并报表的处理","a":"A的个别报表中针对B的长期股权投资所计提的减值准备，在其合并报表层⾯已被抵销，因此在丧失对该⼦公司的控制权时，并不涉及减值准备的转回如何在合并层⾯处理的问题。 在编制合并抵销分录时，原先冲回个别报表层⾯已计提的减值准备的分录，在处置当年仍需延续，即借记投资收 益，贷记年初未分配利润。后续年度不再编制该项抵销分录。 另外需注意：由于是A的母公司C对B增资，且B本⾝处于资不抵债状态，故A需谨慎关注C的增资价格是否公允。如果增资价格⾼于B股权的公允价值，则A因此多享有的权益应按权益性交易原则计⼊资本公积处理。 提问⼈：⼩乐安1314 时间：2024-09-13 11:45:31 感谢陈版回复，再追问⼀下，如您所说，因为是关联⽅增资，且标的公司处于资不抵债的状态，按您说的合并层的抵消分录为借记：投资收益 贷记：年初未分配利润，因为这样的权益性交易对当年的损益产⽣较⼤影响，这样是否合适呢~~ 回答⼈：chenyiwei 借记投资收益是调整个别报表层⾯的处置损益。合并层⾯处置损益的确定应遵循合并报表准则第五⼗条规定。个人理解，供参考。","cat":"收入准则","kw":"控制权,公允价值,减值,合并,请教陈版,长投计减值后处置股权合并报表的处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY1721","q":"！！卫星载荷⽣产销售，收⼊确认时点","a":"建议了解主帖中所提到的三道验收各⾃的内容，考虑后续的验收环节是否仅为⼀项“例⾏程序”（⻅《应⽤指南2024》P396）。对于仅为“例⾏程序”的验收环节，不影响收⼊确认时点的判断。 ⽆论如何，作为零部件⼚商，其收⼊确认时点不晚于整星企业的收⼊确认时点。个人理解，供参考。","cat":"实务综合","kw":"求助陈版,卫星载荷⽣产销售,收⼊确认时点","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1849","q":"关联⽅交易的承债式收购监管认定","a":"你的疑问主要是法律领域的问题，建议咨询该领域内的专业⼈⼠。 但不论法律上如何认定，鉴于本案例中收购的⽬的是取得C⼯商的矿权，因此C本身不构成业务，不适⽤企业合并准则。A应根据具体情况确定收购成本的⾦额，扣减C的其他资产和负债后， 剩余部分作为合并报表层⾯取得C的矿权的初始计量⾦额。个人理解，供参考。","cat":"企业合并","kw":"合并,关联⽅交易的承债式收购监管认定","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY1557","q":"⼦公司的负商誉被⺟公司吸收合并时怎么处理","a":"由于负商誉并不是⼀项资产，⽽是计⼊购买⽇的营业外收⼊，最终体现在留存收益中，因此⺟公司吸收合并曾经产⽣负商誉的⼦公司时，⽆需特殊处理，直接将⼦公司的各项资产、负债按照 《企业会计准则解释第7号》第四条规定并⼊即可。因为负商誉已经体现在A的留存收益中，故A在吸收合并⽇⽆需特殊处理。个人理解，供参考。","cat":"企业合并","kw":"商誉,合并,⼦公司的负商誉被⺟公司吸收合并时怎么处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0723","q":"事业单位改制为企业的情况下原⼦公司产权变更的合并财务报表 处理问题","a":"如果参照财政部会计司的准则实施问答（ http://kjs.mof.gov.cn/zt/kjzzss/ … 0211102_3762826.htm），此类情况下的合并报表应追溯到相应⼦公司的最早成⽴⽇，⽽不是母公司B的成⽴⽇。按照该逻辑，则鉴于改制后的B和此前的事业单位A是同⼀个主体延续下来的，则其合并报表也应当是原先A的合并报表（调整为企业会计准则下的编制⼜径）为基础延续编制的。在A变更为B之⽇，A⾃⾝的各项资产负债需按评估值进⾏调整并确认资本公积，但⼦公司的资产、负债保留原账⾯价值基础不变。个人理解，供参考。","cat":"合并报表","kw":"合并,请教陈版主,事业单位改制为企业的情况下原⼦公司产权变更的合并财务报表,处理问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY1733","q":"股权激励，持股平台⼈员变动导致股份被稀释，股份⽀付不利修改的处理","a":"相当于取消了100万股的股份⽀付，按加速可⾏权处理，在修改⽇加速确认该100万股对应的股份⽀付费⽤。个人理解，供参考。","cat":"股份支付","kw":"请教陈版主,股权激励,持股平台⼈员变动导致股份被稀释,股份⽀付不利修改的处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第11号——股份支付"},{"id":"CY1722","q":"专项债核算问题","a":"主帖中的账务处理意⻅基本合理。 对第三种情况，可以在实施⽅案中明确直接作为资本⾦或者资本公积，但是否可作为A政府的“出资⽂件”的代替，建议查阅相关的财政资⾦管理制度和审批流程。个人理解，供参考。","cat":"实务综合","kw":"求助陈版主,专项债核算问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0519","q":"根据该协议，我个⼈的感觉是，该协议给了12个⽉的期限，在12个⽉内，B公司给予A公司⼀项类似“代理权”的权利，即B公司变相的找了⼀个公司帮忙来卖房⼦，相当于A公司帮忙给B公司卖房⼦，只不过卖的房⼦取得的价 款可以优先抵偿AB之间的债权债务。那么此时：","a":"由于“协议签订后12个⽉内，A公司有权更改房屋认购书中的购房⼈（仅⼀次修改的资格）。如果12个⽉之后，A公司仍未指定购房⼈且完成签署⽹签商品房买卖合同，那么B公司有权将该⼯抵房出售给其他⼈，⽆需承担任何责 任”，⽽A公司能否在12个⽉内找到下家是存在较⼤不确定性的，因此只是获得了⼀项有效期1年的担保，虽有债务条件修改，但债务重组并未完成，不能终⽌确认原应收账款，最多只能在计提坏账准备时对此有所考虑。 继续作为应收账款核算，⽆需其他帐务调整处理。提问⼈：sunnnyllan 时间：2024-07-09 22:35:09 请问陈版主，如果签署的抵账协议中对于实际购房⼈未做约定（该房地产公司信⽤很好，基本不会再将⼯抵房出售给其他⼈），只约定了抵消分包商的货款，签署的抵账合同是否可视为商品房销售合同？是否可确认商品房销售收 ⼊？ 回答⼈：chenyiwei 商品房销售不是本企业的主业，因此还是建议在后续实现进⼀步向上游抵债时，将与上游之间抵债的作价⾦额与抵债资产⼊账价值之间的差额确认为其他收益或者资产处置损益。个人理解，供参考。","cat":"收入准则","kw":"债务重组,根据该协议,我个⼈的感觉是,该协议给了12个⽉的期限,在12个⽉内,B公司给予A公司⼀项类似“代理权”的权利,即B公司变相的找了⼀个公司帮忙来卖房⼦,相当于A公司帮忙给B公司卖房⼦,只不过卖的房⼦取得的价,款可以优先抵偿AB之间的债权债务,那么此时","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY1685","q":"关于运费的账务处理，请帮助我","a":"如果商品在发⾄外仓时，并⽆明确的客户订单，则此时发⾄外仓的运费和外仓存储费⽤计⼊销售费⽤处理。如果已有客户订单，则计⼊营业成本处理。参考：《监管规则适⽤指引——会计类第2号》之“2-6 运输费⽤的确认与列报”： 对于与履⾏客户合同⽆关的运输费⽤，若运输费⽤属于使存货达到⽬前场所和状态的必要⽀出，形成了预期会给企业带来经济利益的资源时，运输费⽤应当计⼊存货成本，否则应计⼊期间费⽤。 对于为履⾏客户合同⽽发⽣的运输费⽤，属于收⼊准则规范下的合同履约成本。若运输活动发⽣在商品的控制权转移之前，其通常不构成单项履约义务，企业应将相关⽀出作为与商品销售相关的成本计⼊合同履约成本，最终计⼊营业成本并予以恰当披露。若运输活动发⽣在商品控制权转移之后，其通常构成单项履约义务，企业应在确认运输服务收⼊的同时，将相关⽀出计⼊运输服务成本并予以恰当披露。 企业应结合⾃身经营活动情况并基于重要性和成本效益原则，建⽴和实施运输活动相关内部控制，充分完整地归集运输活动相关⽀出，并在各产品、各销售合同以及各履约义务之间实现合理分配。个人理解，供参考。","cat":"收入准则","kw":"控制权,履约义务,关于运费的账务处理,请帮助我","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY1106","q":"应收账款产⽣利息的账务处理","a":"这种利息收⼊应作为向客户提供的融资，即作为重⼤融资成分处理，计⼊财务费⽤——利息收⼊，不应计⼊营业收⼊。提问⼈：fasterma02 时间：2025-03-12 16:42:53 谢谢陈版主，另外，我公司并未实际收取客户的利息，⽽是通过抵减客户折扣的⽅式处理，导致客户实际享受的折扣减少，客户实际⽀付货款增加，为什么不能参考“可变对价”的处理⽅式计⼊营业收⼊呢，请您指教！ 回答⼈：chenyiwei 利息和折扣是两个互相独⽴的业务，适⽤的准则规定也不同，只是在结算时将两者相抵按净额结算⽽已。提问⼈：不哎上班 时间：2025-03-14 21:17:57 陈版，就这个问题，如果⼤多数客户逾期计息期限⽐较短的情况下，⽐如都是在1年以内就结清账款了，是否可以不考虑融资成分，将应收的利息直接计⼊营业收⼊，这样是不是也是可⾏的？ 回答⼈：chenyiwei 要考虑是否在重要性的可接受限度之内。另外，因为营业收⼊及其扣除项⽬已成为上市公司退市的财务指标，所以对于接近该财务指标的存在退市⻛险的上市公司，要尤其谨慎。个人理解，供参考。","cat":"收入准则","kw":"应收账款产⽣利息的账务处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY1267","q":"关于加盟费相关的问题","a":"需考虑”协助加盟商开办线上⽹店“是否构成⼀项单独的履约义务。如果是，则应从该笔初始费中采⽤系统、合理的⽅式分出部分价款对应于该项履约义务，相应地在完成⽹店开办这⼀履约义务时结转收⼊和成本。这种情形下不应简单地将所⽀付的开办费进⾏分期摊销。 如果不构成单项履约义务的，则可能可以分期摊销，但需根据具体情况分析。提问⼈：gpqg 时间：2025-04-02 13:43:34 陈版，如果这个开办费在合同中并没有明确展示出来，但是企业⼜确实为加盟商提供了这个 线上⽹店的服务，此时在判断该线上⽹店的服务是否构成单项履约义务时，该如何考虑呢？因为根据收⼊准则的规定，企业向客户转让该商品的承诺与合同中其他承诺可单独区分。可问题是，这个服务并没有在合同中明确展示出来，但⼜确实发⽣了，这个该如何判断是否属于单项履约义务呢？ 谢谢陈版！ 回答⼈：chenyiwei 是否单独标价并不是构成单项履约义务的考虑因素，因为准则专⻔规定了将合同总价分摊到各单项履约义务的⽅法。判断是否构成单项履约义务只能依据收⼊准则第⼗条规定。个人理解，供参考。","cat":"收入准则","kw":"履约义务,摊销,请教陈版,关于加盟费相关的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY1738","q":"关联⽅专利转让，转让⽅能否确认收益","a":"理论上说，如果该交易具有商业实质和合理商业理由，且按照标的资产的公允价值成交，则转出⽅B公司可以确认处置损益。但该事项属于⾮经常性损益，通常理解业绩对赌的⽬标应当是扣 ⾮前后孰低的净利润。或者上市公司在该笔交易前与原股东达成⼀致，该笔收益不纳⼊业绩完成情况考核。个人理解，供参考。","cat":"实务综合","kw":"公允价值,关联⽅专利转让,转让⽅能否确认收益","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1162","q":"关于同⼀控制下企业合并转让⼦公司⽅的会计处理","a":"如A公司（划出⽅）需冲减实收资本的，则需按照《公司法》规定办理减资程序，否则不能冲减实收资本，只能依次冲减资本公积（资本溢价或股本溢价）、盈余公积、未分配利润。准则层⾯不可能规定对不⾜冲减的差额可⾃动冲减实收资本，因为这样做与《公司法》是相冲突的。个人理解，供参考。","cat":"企业合并","kw":"合并,求助陈版主,关于同⼀控制下企业合并转让⼦公司⽅的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY1634","q":"请问：反向购买若存在发⾏费⽤，在合并报表中应如何处理？","a":"站在购买⽅B公司的合并报表层⾯，该项发⾏费⽤是特殊的⾮同⼀控制下合并交易费⽤，应直接计⼊管理费⽤处理。虽然在A（法律上⺟公司）个别报表中可能可以接受计⼊对B（法律上⼦公司）的⻓投成本的做法，但在合并报表层⾯需按实质还原到交易费⽤。个人理解，供参考。","cat":"企业合并","kw":"合并,反向购买若存在发⾏费⽤,在合并报表中应如何处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0303","q":"请教以所持有⼦公司股权出资新设企业的问题","a":"B公司个别报表层⾯，理论上应按“同⼀控制下合并+收购少数股权”处理，即B对A的长期股权投资成本 =600060%+1200040%=8400万元。与实收资本增加额12000万元之间的差额-3600万元借记资本公积。 但在实务操作中，为了避免出现资本公积负数，给⼈“出资不⾜”的印象，也可以接受在B的个别报表中按A股权的评估值12000万元作为B对A的长期股权投资成本，但在B的合并报表中需将A的各项资产、负债均恢复到账⾯价值计量，即在B的合并报表中完整体现同⼀控制下合并在合并报表层⾯的处理原则。个人理解，供参考。","cat":"合并报表","kw":"合并,请教以所持有⼦公司股权出资新设企业的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY1752","q":"减资的会计处理","a":"股东对被投资公司的减资视同投资处置处理。即收到或应收的减资款与⻓期股权投资原账⾯价值之间的差额计⼊投资收益。成本系按照减少的实收资本⾦额占原享有实收资本份额的⽐例对⻓期股权投资账⾯价值（含投资成本、损益调整、其他权益变动）进⾏分摊确定。个人理解，供参考。","cat":"实务综合","kw":"减资的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1770","q":"请教陈⽼师关于购买⽅为公司参股主体时，以股权转让⽅式出售电站资产确认营业收⼊….","a":"https://bbs.esnai.com/thread-5494386-1-1.html个人理解，供参考。","cat":"实务综合","kw":"请教陈⽼师关于购买⽅为公司参股主体时,以股权转让⽅式出售电站资产确认营业收⼊…","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0169","q":"关于投资设⽴民办⾮的处理","a":"⼀般可以这样处理，但具体的会计处理要看合作合同和实际操作中的具体运作情况。个人理解，供参考。","cat":"收入准则","kw":"求助陈版,关于投资设⽴民办⾮的处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY1342","q":"合并报表是否需要对投资性主体单体会计科⽬进⾏调整","a":"对于C，持股100%但认定对其⽆控制、共同控制或重⼤影响是不恰当的。如其相关活动由管理⼈等代理⼈主导，则根据《企业会计准则第33号——合并财务报表（2014年修订）》第⼗⼋条规定：“代理⼈仅代表主要责任⼈⾏使决策权，不控制被投资⽅。投资⽅将被投资⽅相关活动的决策权委托给代理⼈的，应当将该决策权视为⾃身直接持有。”。即此时仍应认定A对C具有控制权，应纳⼊合并报表范围。 对于D。A通过B对D具有重⼤影响，此时可以选择：（1）在A的合并报表层⾯将D作为⻓期股权投资按权益法核算；（2）根据《企业会计准则第2号——⻓期股权投资（2014年修订）》第九条规定，“投资⽅对联营企业的权益性投资，其中⼀部分通过⻛险投资机构、共同基⾦、信托公司或包括投连险基⾦在内的类似主体间接持有的，⽆论以上主体是否对这部分投资具有重⼤影 响，投资⽅都可以按照《企业会计准则第22号——⾦融⼯具确认和计量》的有关规定，对间接持有的该部分投资选择以公允价值计量且其变动计⼊损益，并对其余部分采⽤权益法核算。”，即继续作为FVTPL核算，个人理解，供参考。","cat":"收入准则","kw":"控制权,公允价值,合并,权益法,合并报表是否需要对投资性主体单体会计科⽬进⾏调整","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入、《企业会计准则第33号——合并财务报表（2014年修订）》、《企业会计准则第2号——⻓期股权投资（2014年修订）》、《企业会计准则第22号——⾦融⼯具确认和计量》"},{"id":"CY0764","q":"应收账款保理的账务处理","a":"应收账款通常情况下不能作为“应收款项融资”核算。可作为应收款项融资核算的只有信⽤良好的⼤型商业银⾏开出的银⾏承兑汇票。参考：《监管规则适⽤指引——会计类第2号》之“2-10 ⾦融资产管理业务模式中”出售”的判断标准”。 应收账款的保理，如果其追索权仅针对应收账款本⾝的瑕疵，⽽不是债务⼈的信⽤风险，则可能不影响被保理的应收账款本⾝在保理时点的终⽌确认。 被保理的应收账款能否终⽌确认，并不是看保理合同字⾯上的“有追”或者“⽆追”。在《计学精要2021》中对此有专门讨论，包括名为⽆追索权保理，但仍不满⾜终⽌确认条件的各种情形，可以参考。 提问⼈：SJ张⼤先⽣ 时间：2024-09-25 13:31:35 请问陈版主，如果应收账款保理可以满⾜真正意义上的终⽌确认，那是不是已经没有放在应收款项融资⾥⾯核算的必要了，直接收到保理款，借 银⾏存款 贷 应收账款了 回答⼈：chenyiwei 应收款项融资是针对保理或者转让时满⾜终⽌确认条件，有较⼤概率在到期⽇前转让但截⾄资产负债表⽇尚未转让的此类应收款项。个人理解，供参考。","cat":"收入准则","kw":"应收账款保理的账务处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0301","q":"⼦公司失控的处理","a":"根据《2020年上市公司年报会计监管报告》： 年报分析发现，个别上市公司以前年度对外收购⼦公司，本年度出现⼦公司拒绝向上市公司提交财务报表、账簿等关键资料，或阻挠上市公司进⼊办公现场进⾏审计等”失控”情形。对此，上市公司未充分考虑其是否依然享有对 ⼦公司施加控制的实质性权利，如能够通过股东⼤会、董事会等内部权利机构，或者外部司法途径等⽅式，继续⾏使控股股东权⼒，包括更换管理层、获取印章及账簿资料以及接管经营管理等，仅依据形式上的”失控”认为丧失对 ⼦公司控制，未将⼦公司纳⼊合并财务报表范围。对于实务中的类似情形，上市公司应充分分析⼦公司”失控”产⽣的原因，审慎判断其对公司经营、财务决策的影响程度并予以恰当披露。 ⾸先应对照上述规定，谨慎判断上市公司是否丧失了对该⼦公司的控制权。⼀般理解，此时在会计上⼤概率认为并未丧失控制权，应继续纳⼊合并报表范围。如果确实是丧失了控制权（这种可能性相对较⼩），则在合并报表层⾯按处置⼦公司处理，需确认处置损益，并建议利⽤该机会纠正历史上合并报表编制的错误。个人理解，供参考。","cat":"收入准则","kw":"控制权,合并,⼦公司失控的处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY1771","q":"请问各位⽼师，价格鉴定报告能否作为股东与企业交易的定价依据","a":"如果不是国有企业、上市公司等有特殊监管要求的企业，在交易双⽅协商⼀致的情况下，也可以以价格鉴定报告作为作价依据，但会计和税务上能否认可其鉴定结论代表公允价值，还需要进 ⼀步分析其所采⽤的评估⽅法和参数是否与评估执业规范存在重⼤差异，是否符合公允价值计量会计准则的相关规定等。个人理解，供参考。","cat":"实务综合","kw":"公允价值,请问各位⽼师,价格鉴定报告能否作为股东与企业交易的定价依据","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1488","q":"同⼀控制下企业合并后，合并⽅持股100，合并⽅再减资的，个别报表会计处理","a":"甲收到减资款⾸先冲减对A公司的⻓期股权投资成本，将⻓期股权投资账⾯价值冲减⾄零后，超出部分视同利润分配，确认为投资收益。但应注意：该项减资不应损害A的债权⼈利益。如可能因此导致A的对外偿债能⼒被削弱的，则甲应对此确认预计负债。个人理解，供参考。","cat":"企业合并","kw":"合并,预计负债,同⼀控制下企业合并后,合并⽅持股100,合并⽅再减资的,个别报表会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0793","q":"请问陈版主：合并之前个别报表递延所得税项⽬不应予以考虑，如何进⾏合 并？","a":"第⼆种做法更合理，即先冲销被购买⽅报表上原有的商誉和递延所得税资产负债，再根据购买对价分摊的结果确定的被购买⽅可辨认净资产公允价值，重新在购买⽅合并报表层⾯计算确定与该被购买⽅相关的商誉和递延所得税资产负债的⾦额。个人理解，供参考。","cat":"企业合并","kw":"公允价值,商誉,合并,所得税,递延,请问陈版主,合并之前个别报表递延所得税项⽬不应予以考虑,如何进⾏合","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0359","q":"长投计提减值","a":"2023年末编制合并报表时，A单体层⾯对B的长期股权投资已被抵销，相应地，对其计提的减值准备也应当抵销， 在合并报表层⾯不体现长期股权投资的减值准备和减值损失。但与此同时，鉴于“2023年B公司出现持续亏损，且近期⽆好转迹象”，表明存在减值迹象，应对B公司的各项资产进⾏减值测试和计提减值准备，在合并报表中体现针对B公司各项资产计提的减值准备和减值损失。 参考：《中审众环研究2020》之“问题2-3-29（母公司个别报表层⾯与长期股权投资减值准备相对应的递延所得税资产在合并报表层⾯的处理）”。个人理解，供参考。","cat":"合并报表","kw":"减值,合并,所得税,递延,长投计提减值","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY1772","q":"实缴认缴⽐例不⼀致情况下享有的可辨认净资产公允价值计算","a":"这个问题⾸先还是建议通过补充协议的⽅式明确各⽅股东享有的权益、损益份额和⽐例。如果没有约定或者约定不明确的，则建议按照谨慎原则处理，即：个人理解，供参考。","cat":"实务综合","kw":"公允价值,请教陈版主,实缴认缴⽐例不⼀致情况下享有的可辨认净资产公允价值计算","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1777","q":"请问如确定预缴⼟增税未来会退回时的账务处理","a":"在能够合理估计⽇后清算时可退回的⼟增税⾦额的前提下，对于预计可退回的预缴⼟地增值税可确认为⼀项资产（其他流动/⾮流动资产），在确认收⼊时不结转到税⾦及附加，到收回退税款时冲销该项资产。个人理解，供参考。","cat":"实务综合","kw":"请问如确定预缴⼟增税未来会退回时的账务处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY0803","q":"存货⼊账","a":"应按103个A⼊账，相应调整⼊账单价（总价不变）。个人理解，供参考。","cat":"存货","kw":"存货⼊账","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第1号——存货"},{"id":"CY0185","q":"回购政府代建⼚房的初始计量","a":"这种情况，虽然名义上是“三年内免费使⽤”，但实质是将⼟地款、建造成本、相关税费等延迟三年⽀付，并在延迟 ⽀付期间不计息，相当于提供三年期的⽆息贷款。 由于在房屋建成后即移交使⽤，故在办理完毕移交时，就需要确认固定资产（房屋建筑物）、⽆形资产（⼟地使⽤权）和长期应付款。 ⼟地使⽤权的⼊账价值为⼟地款的折现值； 固定资产的⼊账价值为⼚房建设费、代建管理费、建设资⾦成本之和的折现值。 对于三年期内的⼟地使⽤税和房产税，在使⽤期间先按税法规定逐年予以计提，在政府代缴后，将应交税费转⼊长期应付款（或其他应付款），到期结算。个人理解，供参考。","cat":"固定资产","kw":"固定资产,回购政府代建⼚房的初始计量","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第4号——固定资产"},{"id":"CY0936","q":"关于账务处理模式是否正确？","a":"我理解该交易的实质是：名义购车者是财务投资⼈，出资5万元，享有每⽉1000元的保底分红和年底的⼆次分红； 本公司（平台）利⽤该投资⼈的出资和向汽车⾦融公司的借款购车运营，需向汽车⾦融公司还本付息。 汽车确认为本企业的固定资产，其成本为实际购车款（包括由汽车⾦融公司代付的部分）。对应按照接受投资款和汽车⾦融公司代付的购车款之和确认为负债。其中，汽车⾦融公司代付的部分确认为借款；接受个⼈投资部分确认为以公允价值计量且其变动计⼊损益的⾦融负债。个人理解，供参考。","cat":"固定资产","kw":"公允价值,固定资产,关于账务处理模式是否正确","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第4号——固定资产"},{"id":"CY0863","q":"对于竣⼯决算报告的结果，财务是否⼀定要调整报表","a":"会计调整应以会计准则的规定为依据。在上述核减项⽬均有充分证据的前提下，应考虑这些核减项⽬在企业会计准则下是否影响固定资产成本的构成项⽬。由于具体情况不清楚，建议进⼀步核实相关背景。 ⼀般理解，施⼯期间临时⽤地的相关成本应计⼊在建⼯程成本，除⾮有证据表明该占地与该⼯程施⼯⽆直接关系； 施⼯索赔款在合理保证可收到的情况下应冲减在建⼯程成本；对于设计变更，如果按照相关标准和⾏业惯例⽽⾔确实是不需要、不合理的，则相关增量⽀出应费⽤化。个人理解，供参考。","cat":"固定资产","kw":"固定资产,对于竣⼯决算报告的结果,财务是否⼀定要调整报表","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第4号——固定资产"},{"id":"CY0752","q":"关于不动产财务决算会计处理问题","a":"根据《企业会计准则第4号——固定资产》第五条：固定资产的各组成部分具有不同使⽤寿命或者以不同⽅式为企业提供经济利益，适⽤不同折旧率或折旧⽅法的，应当分别将各组成部分确认为单项固定资产。 在主帖案例中，由于家具、家电、餐具等的使⽤寿命与房屋本体明显不同，故应分别确认为不同的固定资产。对于家电、家具，可直接按照市价确定其公允价值，从总价中扣减，剩余的是房屋本体（主体结构）部分的⼊账价值。个人理解，供参考。","cat":"固定资产","kw":"公允价值,固定资产,折旧,关于不动产财务决算会计处理问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第4号——固定资产、《企业会计准则第4号——固定资产》"},{"id":"CY1779","q":"请教陈⽼师关于睡眠账户银⾏流⽔的账务处理","a":"建议被冻结（转⼊公共账户）时，从银⾏存款转⼊对农⾏的其他应收款，解冻后转回银⾏存款。在现⾦流量表中，相应体现为⼀项⽀付、收到其他与经营活动有关的现⾦。个人理解，供参考。","cat":"实务综合","kw":"请教陈⽼师关于睡眠账户银⾏流⽔的账务处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1800","q":"关于同⼀控制下股权转让，转让⽅单家报表是否应确认投资损益？","a":"同⼀控制下的股权交易中，转出⽅是可以正常确认投资收益的（在确保交易价格公允且交易具有合理商业理由的前提下），因此主帖的第⼆种意⻅更合理。个人理解，供参考。","cat":"实务综合","kw":"求助陈版主,关于同⼀控制下股权转让,转让⽅单家报表是否应确认投资损益","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1804","q":"求助⼤神","a":"根据《企业会计准则解释第15号》第⼀条和《监管规则适⽤指引——会计类第3号》之3-11处理。个人理解，供参考。","cat":"实务综合","kw":"求助⼤神","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1416","q":"关于同⼀控制下企业合并，追溯问题","a":"不清楚你的具体情况，按理不应出现该问题，即你说的两种变化原因中，①增加资本公积（相当于被合并⽅的实收资本实收资本和资本公积中归属合并⽅的⾦额）；②导致减少资本公积，⽽不是相反。建议再核查下抵销分录编制和附注填列。个人理解，供参考。","cat":"企业合并","kw":"合并,请教陈版,关于同⼀控制下企业合并,追溯问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY1398","q":"同⼀控制下企业合并追溯时点问题","a":"如果B公司⾃2010年成⽴以来⼀直受到管委会控制，则应⼀直追溯到B公司成⽴⽇。参考： http://kjs.mof.gov.cn/zt/kjzzss/ … 0211102_3762826.htm个人理解，供参考。","cat":"企业合并","kw":"合并,请教各位,同⼀控制下企业合并追溯时点问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY1251","q":"关于吸收合并的疑问","a":"从主帖信息来看，B不构成业务，故A吸收合并B不属于企业合并。A应将其预计可收到的新房产的公允价值确认为⼀项“其他⾮流动资产”，将应付职⼯薪酬根据其承接B⼈员的情况调整后⼊账，差额调整资本公积。个人理解，供参考。","cat":"企业合并","kw":"公允价值,合并,关于吸收合并的疑问","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0561","q":"过渡期损益是否影响商誉","a":"⾮同⼀控制下合并中，交易双⽅对被购买⽅过渡期损益归属的约定，会影响到购买⽅在购买⽇获取的被购买⽅可辨认净资产公允价值。相应地，会影响到购买⽇的商誉初始计量⾦额。 如果因过渡期亏损由购买⽅承担导致商誉增加的，则后续减值测试中应从严把握。个人理解，供参考。","cat":"企业合并","kw":"公允价值,商誉,减值,合并,过渡期损益是否影响商誉","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY1051","q":"同区县国资委下属两个集团之间股权交易属于同⼀控制还是⾮同⼀控制","a":"基本赞同主帖中的理解。如果该交易并⾮由双⽅的最终控制⽅（国资委）主导，⽽是双⽅基于商业条件平等谈判的结果，构成⼀项公允且具有商业实质的交易，则按照⾮同⼀控制下企业合并处理。个人理解，供参考。","cat":"企业合并","kw":"合并,同区县国资委下属两个集团之间股权交易属于同⼀控制还是⾮同⼀控制","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY1459","q":"关于联营企业投资的内含商誉的计算⽅法","a":"需要考虑，即内含商誉采⽤与⾮同⼀控制下企业合并中被购买⽅商誉相同的计算⽅法，包括需考虑其可辨认净资产公允价值相较于原账⾯价值的增值，以及与这部分增值相关的递延所得税影响。个人理解，供参考。","cat":"企业合并","kw":"公允价值,商誉,合并,所得税,递延,关于联营企业投资的内含商誉的计算⽅法","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY1171","q":"对联营企业顺流交易，已实现损益是否需要将归属于⺟公司部分进⾏抵消？","a":"如果将对联营企业的权益法核算视作⼀项“单⾏合并”，则观点（1）更为合理；但⽬前的主流观点是（2），即对于已实现部分⽆需再进⾏抵销。 并且，参照2024年CPA会计教材，以及《监管规则适⽤指引——会计类第4号》之“4-5 权益法下顺流交易产⽣的未实现内部交易损益以处置或视同处置股权⽅式实现时的会计处理”中的表述， 后续该项顺流交易损益通过联营企业将该标的资产对外处置的⽅式实现时，在合并报表层⾯还需将此前抵销的与未实现损益对应的收⼊、成本予以恢复（借：营业成本，借：投资收益，贷： 营业收⼊）。个人理解，供参考。","cat":"合并报表","kw":"合并,权益法,对联营企业顺流交易,已实现损益是否需要将归属于⺟公司部分进⾏抵消","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY1566","q":"关于同⼀控制下企业合并，合并层⾯资本公积的处理","a":"因为没有其他⼦公司，后续不再编制合并报表，故合并报表层⾯的资本公积没有是否延续的问题。但个别报表层⾯的资本公积仍存在，且将继续延续（可⽤于转增资本或者按规定弥补亏损）。个人理解，供参考。","cat":"企业合并","kw":"合并,关于同⼀控制下企业合并,合并层⾯资本公积的处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY1410","q":"看不懂为什么披露不⼀致？","a":"是否为个别报表和合并报表层⾯的股本⾦额不⼀致？请看下该公司以前年度是否发⽣过反向购买交易。如果发⽣过反向购买，则合并报表和个别报表层⾯的股本⾦额是可能不⼀致的。个人理解，供参考。","cat":"企业合并","kw":"合并,请教陈⽼师,看不懂为什么披露不⼀致","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0905","q":"对⼦公司未分配利润是否需要确认递延所得税负债","a":"⾹港公司⾃⾝报表中，如果对内地⼦公司B采⽤成本法核算的，则⽆需就⼦公司的利润确认递延所得税负债。 在⾹港公司的合并报表中，以及更上层母公司的合并报表中，是否需确认递延所得税负债，取决于内地⼦公司C向 ⾹港公司分配利润时，以及⾹港公司将利润再分回内地母公司时，所涉及两地的税务安排。如在任⼀环节需扣缴预提所得税或者补缴税率差的，则需就将被扣缴的预提所得税和将需补缴的税率差确认递延所得税负债，除⾮满⾜ 《企业会计准则第18号——所得税》第⼗⼆条规定的条件，即内地⼦公司在可预见的未来不会分红。个人理解，供参考。","cat":"合并报表","kw":"合并,所得税,递延,成本法,对⼦公司未分配利润是否需要确认递延所得税负债","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表、《企业会计准则第18号——所得税》"},{"id":"CY0467","q":"有限合伙企业100对外投资有限公司的处理","a":"因为已知A公司对B有限合伙企业具有重⼤影响，则A对B应采⽤权益法核算。但鉴于合伙企业通常属于结构化主 体，可能存在分层的利润分配安排，故应根据合伙协议中的收益分配约定，确定本企业在合伙企业中应享有的收益和净资产份额，据此进⾏权益法核算，⽽不是简单地将合伙企业收益⾦额乘以出资⽐例。 B有限合伙企业应将C纳⼊合并范围。但如果B属于合并报表准则所指的投资性主体，且C不是为B对外投资提供服务的⼦公司，则B也可以不将C纳⼊合并报表范围，⽽是将其作为以公允价值计量且其变动计⼊损益的⾦融资产核算。个人理解，供参考。","cat":"合并报表","kw":"公允价值,合并,权益法,请教陈版主,有限合伙企业100对外投资有限公司的处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY0079","q":"境外⼟地核算","a":"参照《企业会计准则解释第1号》第⼆条规定：“中国境内企业设在境外的⼦公司在境外发⽣的交易或事项，境内不存在且受法律法规等限制或交易不常见，企业会计准则未作出规范的，可以将境外⼦公司已经进⾏的会计处理结 果，在符合《企业会计准则–基本准则》的原则下，按照国际财务报告准则进⾏调整后，并⼊境内母公司合并财务报表的相关项⽬。”。 按照IFRS下的惯例，拥有永久所有权的⼟地应确认为固定资产，不计提折旧。该处理与企业会计准则的原则和规定并不⽭盾，因此可以将该处理结果平移到母公司按中国企业会计准则编制的合并报表中。个人理解，供参考。","cat":"合并报表","kw":"合并,固定资产,折旧,境外⼟地核算","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY1812","q":"境外佣⾦何时确认销售费⽤","a":"https://bbs.esnai.com/thread-5494579-1-1.html 回答⼈：chenyiwei https://bbs.esnai.com/thread-5494579-1-1.html个人理解，供参考。","cat":"实务综合","kw":"境外佣⾦何时确认销售费⽤","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1813","q":"关于⼀揽⼦交易实现⾮同控的会计处理","a":"对于主帖的2、3两步交易是否构成⼀揽⼦交易，需对照⼀揽⼦交易的定义，即基于同⼀商业⽬的⽽⼀并筹划，互为前提和条件。建议进⼀步分析以下问题：个人理解，供参考。","cat":"实务综合","kw":"求助陈版,关于⼀揽⼦交易实现⾮同控的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1332","q":"关于租赁资产⼊账的相关问题","a":"你的处理意⻅总体上合理，但要注意： 在对⺟公司⽽⾔构成经营租赁的情况下，因为15年租⾦的市场价值是12亿元，⽽实际向⼦公司收取的租⾦是8亿元，因此差额4亿元应作为对该⼦公司的⻓投成本，确认预收账款12亿元（列报为其他⾮流动负债），该12亿元在15年内分摊确认租⾦收⼊。 在经营租赁中，预收租⾦可以不考虑资⾦时间价值因素。个人理解，供参考。","cat":"租赁","kw":"租赁,请教陈版,关于租赁资产⼊账的相关问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁"},{"id":"CY1679","q":"收到的委托经营保底收⼊的会计处理","a":"此处的提成、补⾜均属于内部承包安排，故在本公司的财务报表中，提成计⼊营业成本（或管理费⽤），补⾜⾦额冲减营业成本。 同时，被承包经营的⻔店的全部资产、负债、收⼊、成本费⽤仍需纳⼊本公司财务报表，除⾮该⻔店是以该专业团队的名义对外经营。如果该⻔店是以该专业团队名义对外经营的，则构成租赁关系，提成和补⾜都构成租⾦的⼀部分。个人理解，供参考。","cat":"租赁","kw":"租赁,请教陈版主,收到的委托经营保底收⼊的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁"},{"id":"CY0182","q":"关于汽车租赁能否确认为租赁负债和使⽤权资产的实务。","a":"汽车属于耐⽤消费品，⼀般理解不属于低价值资产；同时租赁期限6年，也不属于短期租赁。故不应简化处理，应按照准则规定确认使⽤权资产和租赁负债。同时还应按照解释16号第⼀条规定，针对租赁负债确认递延所得税资 产，针对使⽤权资产确认递延所得税负债。个人理解，供参考。","cat":"租赁","kw":"租赁,所得税,递延,关于汽车租赁能否确认为租赁负债和使⽤权资产的实务","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第21号——租赁"},{"id":"CY0308","q":"合伙企业所得税现⾦流量表填列","a":"合伙企业本⾝不是所得税纳税⼈，属于代扣代缴。关于代扣代缴税费相关现⾦流量的列报问题，⽬前实务中有两种做法：1、列⼊“⽀付的各项税费”；2、并⼊导致该项代扣代缴义务发⽣的经济交易或事项所对应的现⾦流量项⽬ （例如“向合伙⼈分配所⽀付的现⾦”）。在⽬前⽆明确规定的情况下，这两种做法均可接受，关键是确保⼀贯应 ⽤。个人理解，供参考。","cat":"所得税","kw":"所得税,合伙企业所得税现⾦流量表填列","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第18号——所得税"},{"id":"CY1787","q":"关于递延所得税资产的问题","a":"基本赞同主帖的理解。本案例中虽然A公司2025年度亏损，且预计可预⻅的未来不会产⽣⾜够多的应纳税所得额，但鉴于存在未来可转回的应纳税暂时性差异，并已就此确认递延所得税负债，故仍应在已确认的递延所得税负债的限度内，确认与可抵扣亏损相关的递延所得税资产，这部分递延所得税资产的后续转回与递延所得税负债的转回同步。个人理解，供参考。","cat":"所得税","kw":"所得税,递延,关于递延所得税资产的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第18号——所得税"},{"id":"CY1570","q":"浮动利息借款本⾦问题","a":"从主帖信息来看，该交易的实质是A受B委托进⾏资⾦管理。是否在A确认负债，需考虑A是否向B承诺保证本⾦安全和/或获取约定收益或者保底收益。如果是不保本、⽆固定收益（完全取决于出售所得款项），则A⽆需将受托资⾦确认为负债；反之则需确认负债，以反映本企业在该交易中承担的投资公允价值变动、垫资、信⽤等⻛险。个人理解，供参考。","cat":"所得税","kw":"公允价值,浮动利息借款本⾦问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第18号——所得税"},{"id":"CY1071","q":"关于股份⽀付⾏权⽇所得税费⽤，是否需要根据⾏权⽇股价调整资本公积","a":"在⾏权⽇，可税前扣除的⾦额是根据⾏权⽇股价计算的。但会计上的股份⽀付费⽤是根据授予⽇的权益⼯具公允价值计算的，在授予⽇后不再调整。因此不需要根据据⾏权时的股价和授予⽇的股价的差额调整资本公积。但由此导致的所得税费⽤抵减⾦额与按照授予⽇股价计算的⾦额之间的差额，应通过资本公积进⾏调整。个人理解，供参考。","cat":"所得税","kw":"公允价值,所得税,关于股份⽀付⾏权⽇所得税费⽤,是否需要根据⾏权⽇股价调整资本公积","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第18号——所得税"},{"id":"CY1761","q":"减资弥补亏损的会计、税务处理","a":"是否需缴纳企业所得税的税务处理问题，建议咨询税务专业⼈⼠意⻅。 如果确认需缴纳所得税的，则鉴于权益总额不变，并未发⽣《企业会计准则第18号——所得税》第⼆⼗⼀条所指的“直接在所有者权益中确认的交易或者事项”，即不属于权益性交易。故所缴纳的企业所得税仍计⼊所得税费⽤（当期所得税费⽤）。个人理解，供参考。","cat":"所得税","kw":"所得税,减资弥补亏损的会计,税务处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第18号——所得税、《企业会计准则第18号——所得税》"},{"id":"CY1816","q":"关于搬迁补偿的会计处理","a":"https://bbs.esnai.com/thread-5494608-1-1.html个人理解，供参考。","cat":"实务综合","kw":"求助陈版主,关于搬迁补偿的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1818","q":"业绩对赌未完成，触发业绩承诺项下回购的账务处理，谢谢","a":"理论上，业绩对赌未完成表明公司的盈利能⼒不如此前预期，因此除⾮出现某些特殊情况（如本企业所属⾏业正是炒作热点，⾏业整体估值在快速上升），否则这种情况应引发估值下调。如由于专属于某个投资⼈的原因⽽豁免回购，则不影响估值整体已下调的预期。但估值属于会计以外的另⼀专业领域，建议咨询该领域内的专业⼈⼠确认。个人理解，供参考。","cat":"实务综合","kw":"请教陈版主,业绩对赌未完成,触发业绩承诺项下回购的账务处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1819","q":"应收账款保理业务出表问题","a":"有这种可能性，因为这种条款设计就是⿎励保理申请⼈尽早回购的。建议关注：（1）“应收账款占⽤天数”如何计算，有⽆封顶⽇期；（2）回购权的⾏权价格如何确定。个人理解，供参考。","cat":"实务综合","kw":"应收账款保理业务出表问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1823","q":"参照《监管规则适⽤指引——会计类第3号》之“3-10 搬迁补偿事项的会计处理”：","a":"仍认定为资产处置。关键是补偿款的⾦额是否根据被征收资产的公允价值、搬迁费⽤及相关损失等因素加以确定。个人理解，供参考。","cat":"实务综合","kw":"公允价值,参照《监管规则适⽤指引——会计类第3号》之“3-10,搬迁补偿事项的会计处理”","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则——基本准则"},{"id":"CY1336","q":"⾮同控的合并会计处理问题","a":"在合并报表中，投资成本与购买⽇（2024.7.1）所享有B公司可辨认净资产公允价值份额之间的差额确认为商誉或者负商誉（营业外收⼊），即作为主帖所述的调整因素。个人理解，供参考。","cat":"企业合并","kw":"公允价值,商誉,合并,请教陈版,⾮同控的合并会计处理问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY1357","q":"⼦公司清算注销产⽣的损益在合并报表层⾯如何反映","a":"因为是全资⼦公司的注销，因此合并报表层⾯的损益仅来源于该⼦公司的资产变现损益和负债清偿损益（如⽆需偿还的对外负债）。 建议关注该⼦公司的资产和负债中，有多少是与合并范围内⺟公司和其他⼦公司之间的内部往来。因为内部往来在合并报表中本来就是需要抵销的，因此只有对外（⺟公司合并范围以外）的资产和负债才能产⽣处置损益和清偿损益。如果该⼦公司的净资产-200万元全部是由对外的资产、负债构成，且⺟公司⽆需对其⽆⼒偿还的对外负债承担兜底责任，则⽆需偿还的对外负债在合并报表层⾯是可以转为收益的。个人理解，供参考。","cat":"合并报表","kw":"合并,⼦公司清算注销产⽣的损益在合并报表层⾯如何反映","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY0300","q":"关于权益法被投资企业追溯调整的影响","a":"C公司个别报表层⾯，对于联营企业的前期差错，应基于其对本企业留存收益的影响⾦额，对照本企业（C企业⾃ ⾝）的重要性⽔平，确定是否属于重⼤差错。如属于重⼤差错的，也应当⼀并进⾏追溯重述处理。如对C⽽⾔其影响不属于重⼤差错的，则⽆需追溯重述，在当期更正即可。如果该差错针对本会计主体（C）的影响也超出了重要性限度，则对C⽽⾔也属于重⼤差错，C也相应进⾏追溯重述。 对A、B合并报表层⾯的处理同理。但由于不同层⾯公司的重要性⽔平不同，较低层次上的重⼤差错有可能在较⾼层次上不属于重⼤差错。个人理解，供参考。","cat":"合并报表","kw":"合并,权益法,关于权益法被投资企业追溯调整的影响","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY1675","q":"应收账款终⽌确认的问题","a":"https://bbs.esnai.com/thread-5493910-1-1.html 提问⼈：quheqing 时间：2025-09-03 13:36:39 你好，陈⽼师！ 公司是施⼯企业，由于客户⽆⼒⽀付施⼯款，遂与客户达成协议，客户以施⼯的房⼦抵施⼯款。公司收回房⼦将主要⽤于出售，已委托中介或第三⼈挂牌出售，但是在现实操作中，考虑到过户登记后再卖会在销售价格上打折扣，故公司暂未与客户进⾏过户登记，除此之外公司已完全取得这些房⼦的控制权。请问，公司在账务是否可以终⽌确认应收账款⽽转投资性房地产？ 回答⼈：chenyiwei ⾸先要注意何核实是否已完全取得了对这些抵债房屋的控制权，尤其是在并未办理产权过户的情况下。即，本企业能否完全⾃主决定对该房屋的持有或出售，以及在何时、以什么价格卖给 谁，并据此享有或承担出售收益和损失。相应地，不再享有向原债务⼈（房地产开发企业）索取该笔应收账款的权利。在此前提下，可终⽌确认应收账款，并将抵债房产确认为其他流动/⾮流动资产（不是投资性房地产）。个人理解，供参考。","cat":"收入准则","kw":"控制权,应收账款终⽌确认的问题","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0294","q":"融资租赁⾥⾯形式回租的会计处理","a":"这是实务中常见的“以租代买”模式（我们理解该种模式不在《监管规则适⽤指引——会计类第3号》（以下简 称“《会计类3号》”）之3-9的规范范围内）：承租⼈先与供应商签署了买卖合同，后因资⾦紧张引⼊融资租赁交易 ⽅式，与融资租赁公司（出租⼈）、供应商签订了三⽅协议，原买卖合同解除，由供应商与融资租赁公司签订买卖合同，同时承租⼈与融资租赁公司签订直接租赁合同。融资租赁公司向供应商⽀付资产价款，后续通过向承租⼈收取租⾦的⽅式收回本⾦并获得利息收⼊。租赁期结束，全部租⾦付清后，承租⼈取得租赁资产的完整所有权。 我们理解，这种融资租赁协议，名为直租，实际上融资租赁公司仅提供融资，租赁资产的控制权由供应商直接转移给承租⼈，出租⼈实质上是以租赁物为抵押，以代付资产购建款项的形式向承租⼈提供融资。因此，对于此类租 赁，可以参照原租赁准则下的“售后回租构成融资租赁”或者新租赁准则下的“售后租回中的资产出售不构成销售”进 ⾏会计处理，不使⽤“使⽤权资产”和“租赁负债”科⽬。即承租⼈的处理要点为：个人理解，供参考。","cat":"收入准则","kw":"控制权,租赁,融资租赁⾥⾯形式回租的会计处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0759","q":"你好，陈版，商誉减值不是不确认递延所得税资产吗","a":"商誉的减值不确认递延所得税资产。这是因为商誉的初始确认并未确认递延所得税负债，⽽商誉的减值是与初始确认直接相关的事项，所以也不确认递延所得税资产。个人理解，供参考。","cat":"企业合并","kw":"商誉,减值,所得税,递延,商誉减值不是不确认递延所得税资产吗","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0961","q":"关于同⼀控制下吸收合并时合并抵消对资产负债账⾯价值的影响","a":"从主帖信息来看，该项内部交易损益应当是由被吸收⽅向最终控制⽅（或最终控制⽅的其他⼦公司）销售所形成的逆流交易损益，相关标的资产并不在被吸收⽅账⾯上。相应地，合并⽅（吸收⽅）对被吸收⽅资产、负债的账⾯价值并不需要就该项未实现逆流交易损益进⾏特殊调整。由于吸收⽅⽆其他⼦公司，不需要编制合并报表，故在吸收 ⽅报表中，直接按被吸收⽅各项资产负债在最终控制⽅合并报表层⾯的账⾯价值⼊账即可，差额调整资本公积，不涉及对留存收益的调整。最终控制⽅在编制合并报表时，继续抵销未实现的逆流交易损益。个人理解，供参考。","cat":"合并报表","kw":"合并,请教陈版关于同⼀控制下吸收合并时合并抵消对资产负债账⾯价值的影响","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY1746","q":"⻓期租赁集团内⺟⼦公司平移的账务处理疑惑","a":"单体层⾯应按⽅案⼆处理，即⼦公司终⽌确认原使⽤权资产和租赁负债，差额计⼊资产处置损益；⺟公司视同⼀项新租赁进⾏会计处理。 但在合并报表层⾯，因为变更前后承租⼈都是本集团，所以在合并报表层⾯所体现的处理效果就是确保租赁的延续性，视同没有发⽣过租赁变更。因此，⼦公司个别报表层⾯的资产处置损益 （如有）应予以抵销处理。同时⺟公司个别报表层⾯确认使⽤权资产和租赁负债时使⽤的折现率等参数如与⼦公司层⾯对原租赁的会计处理不同的，则应在合并报表层⾯进⾏必要调整，视同原租赁⼀直延续。个人理解，供参考。","cat":"合并报表","kw":"合并,租赁,⻓期租赁集团内⺟⼦公司平移的账务处理疑惑","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第33号——合并财务报表"},{"id":"CY1653","q":"处置部分股权未丧失控制权以及购买少数股权内部交易损益的影响如何处理？","a":"在合并报表层⾯，顺流交易损益需进⾏抵销处理，相应地，⼦公司净资产在合并报表层⾯的账⾯价值是剔除未实现顺流交易损益的。 假设B除了上述存货采购以外未发⽣其他业务，则在A的合并报表中，截⾄部分处置股权时点，B公司净资产在合并报表层⾯的账⾯价值是1000万元（2000-未实现损益1000），此时在合并报表层⾯因部分处置⼦公司股权导致调整资本公积的⾦额为零（100-1000*10%）。 提问⼈：kyhj0314 时间：2025-09-03 16:18:12 陈版，上述案例，如果200处理10%股权，单体没有投资收益，合并层⾯有100的资本公积，如果丧失控制权时，未实现损益1000要视同全部实现，那100的资本公积必须转⼊投资收益了，否则未实现损益只实现900，这与权益性交易形成的资本公积不能转⼊投资收益⽭盾. 回答⼈：chenyiwei 既然是未实现损益，就应剔除其中在合并报表层⾯转⼊资本公积的⾦额。此类问题不适合于采⽤“未实现损益”观点讨论，⽽是按照实体理论下的分析⽅法来做。个人理解，供参考。","cat":"收入准则","kw":"控制权,合并,处置部分股权未丧失控制权以及购买少数股权内部交易损益的影响如何处理","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0588","q":"对被投资企业的少数股权","a":"股权投资的合同现⾦流量特征不符合”本⾦+利息“的基本借贷安排。在对被投资企业不具有控制、共同控制或重⼤ 影响的前提下，通常作为以公允价值计量且其变动计⼊损益的⾦融资产，列报为交易性⾦融资产或者其他⾮流动⾦融资产。满⾜⾮交易性权益⼯具投资条件的，也可以在取得⽇初始确认时不可撤销地指定为以公允价值计量且其变动计⼊其他综合收益的⾦融资产，列报为其他权益⼯具投资。 提问⼈：枫⽃⼠ 时间：2024-07-23 14:45:15 感谢两位⽼师chenyiwei reversal 被投资单位，是⼀个⾮上市企业（⼀个项⽬公司），公允价值⽆法取得，我们投资的⽬的，仅为参与其中部分施⼯任务。 是否也可以列报为公允价值计量且其变动计⼊当期损益的⾦融资产或者指定为以公允价值计量且其变动计⼊其他综合收益的⾦融资产？ 回答⼈：chenyiwei 如果是项⽬公司，⼀般是有限寿命主体，建议分类为公允价值计量且其变动计⼊当期损益的⾦融资产。不应指定为以公允价值计量且其变动计⼊其他综合收益的⾦融资产。个人理解，供参考。","cat":"收入准则","kw":"公允价值,对被投资企业的少数股权","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第14号——收入"},{"id":"CY0840","q":"关于收购少数股权的长投成本","a":"此类调整不适⽤⾮同⼀控制下企业合并中1年内可调整PPA分摊结果和商誉初始计量⾦额的规定，仍应在后续年度实际最终确定⾦额时进⾏调整，且不追溯前期。个人理解，供参考。","cat":"企业合并","kw":"商誉,合并,关于收购少数股权的长投成本","src":"陈奕蔚 会计视野论坛答疑","std_ref":"企业会计准则第20号——企业合并"},{"id":"CY0786","q":"未实现内部交易损益在处置⼦公司股权时的处理","a":"站在甲公司⾓度，该事项属于其合并报表范围内的内部交易，且该事项不改变其合并报表范围，故该次股权交易不影响该项内部交易损益在甲公司合并报表层⾯的处理，应继续抵销。 对于A公司⽽⾔，该项内部交易（在股权转让前C向D（A之⼦公司）提供建筑施⼯服务类内部交易（D公司作为固定资产管理））属于逆流交易，标的资产仍在D公司，并未随着C公司的股权处置⽽实现，故应继续抵销，不能通过“
